name: Deploy Ops Center to GitHub Pages

# POUR Operations Center(pour-operations-center.html) 단일 파일만 GitHub Pages로 배포.
# 기존 박람회 index.html(prod 연결)은 포함하지 않음.
on:
  push:
    branches: ["claude/pour-ops-center-setup-xo4qad"]
    paths:
      - "pour-operations-center.html"
      - ".github/workflows/deploy-ops-center-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site (ops-center only)
        run: |
          mkdir -p _site
          cp pour-operations-center.html _site/index.html
          cp pour-operations-center.html _site/pour-operations-center.html
          touch _site/.nojekyll

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
