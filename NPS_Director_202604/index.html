<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>드론 촬영 요청서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #f4f5f7;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1e2e;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1c2b4a 0%, #2c4270 100%);
    padding: 32px 20px 28px;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  .header-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.03em;
    line-height: 1.3;
  }

  .header-desc {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
  }

  /* Card */
  .card {
    background: #ffffff;
    margin: 16px 14px;
    border-radius: 10px;
    border: 1px solid #e4e8ef;
    overflow: hidden;
  }

  .card-title {
    padding: 14px 16px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #111111;
    letter-spacing: -0.01em;
    border-bottom: 1px solid #edf0f5;
    background: #fafbfc;
  }

  /* Field */
  .field {
    padding: 13px 16px;
    border-bottom: 1px solid #edf0f5;
    transition: background 0.15s;
  }

  .field:last-child {
    border-bottom: none;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: #8693aa;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .req { color: #4a6fa5; }

  .field input,
  .field textarea {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #1a1e2e;
    caret-color: #4a6fa5;
    padding: 0;
    line-height: 1.5;
    -webkit-appearance: none;
  }

  .field input::placeholder,
  .field textarea::placeholder {
    color: #bcc5d4;
    font-weight: 400;
    font-size: 14px;
  }

  .field textarea {
    resize: none;
    min-height: 72px;
  }

  /* Row split */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid #edf0f5;
  }

  .field-row .col {
    padding: 13px 16px;
    transition: background 0.15s;
  }

  .field-row .col:first-child {
    border-right: 1px solid #edf0f5;
  }

  /* Focus */
  .field:focus-within .field-label,
  .field-row .col:focus-within .field-label {
    color: #4a6fa5;
  }

  /* Submit */
  .btn-wrap {
    padding: 4px 14px 28px;
  }

  .btn-submit {
    width: 100%;
    background: #1c2b4a;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.15s;
    -webkit-appearance: none;
  }

  .btn-submit:active {
    background: #253758;
  }

  .btn-submit svg {
    width: 16px; height: 16px;
  }

  .form-note {
    text-align: center;
    font-size: 11px;
    color: #aab3c5;
    padding: 0 14px 12px;
    line-height: 1.6;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1c2b4a;
    color: #fff;
    border-radius: 8px;
    padding: 13px 22px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .drone-deco {
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
    width: 180px;
    height: 135px;
    pointer-events: none;
  }
</style>
  <!-- ✅ Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ====================================================
    // 🔧 Firebase 설정값을 여기에 붙여넣으세요
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    // ====================================================

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.submitToFirebase = async function() {
      const required = [
        { id: 'company',  label: '요청 회사' },
        { id: 'manager',  label: '담당자' },
        { id: 'phone',    label: '연락처' },
        { id: 'address',  label: '촬영 대상지 주소' },
        { id: 'schedule', label: '희망 촬영 일정' },
      ];

      for (const f of required) {
        const el = document.getElementById(f.id);
        if (!el.value.trim()) {
          el.focus();
          const wrap = el.closest('.field, .col');
          wrap.style.background = '#f0f4fa';
          setTimeout(() => wrap.style.background = '', 900);
          return;
        }
      }

      const btn = document.querySelector('.btn-submit');
      btn.disabled = true;
      btn.textContent = '제출 중...';

      try {
        await addDoc(collection(db, 'drone_requests'), {
          company:   document.getElementById('company').value.trim(),
          manager:   document.getElementById('manager').value.trim(),
          phone:     document.getElementById('phone').value.trim(),
          address:   document.getElementById('address').value.trim(),
          building:  document.getElementById('building').value.trim(),
          schedule:  document.getElementById('schedule').value.trim(),
          memo:      document.getElementById('memo').value.trim(),
          status:    '검토중',
          createdAt: serverTimestamp(),
        });

        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);

        // 폼 초기화
        ['company','manager','phone','address','building','schedule','memo'].forEach(id => {
          document.getElementById(id).value = '';
        });

      } catch(e) {
        alert('제출 중 오류가 발생했습니다. 다시 시도해 주세요.');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '➤ 요청서 제출하기';
      }
    };
  </script>
</head>

  <div class="header-label">📌 드론 촬영 요청서</div>
  <h1>촬영 현장 정보 입력</h1>
  <p class="header-desc">아래 항목을 작성해 주시면<br>담당자가 일정을 확인 후 연락드립니다.</p>
</div>

<div class="card">
  <div class="card-title">요청자 정보</div>

  <div class="field-row">
    <div class="col">
      <div class="field-label">요청 회사 <span class="req">*</span></div>
      <input type="text" id="company" placeholder="ABC건설" autocomplete="organization">
    </div>
    <div class="col">
      <div class="field-label">담당자 <span class="req">*</span></div>
      <input type="text" id="manager" placeholder="홍길동" autocomplete="name">
    </div>
  </div>

  <div class="field">
    <div class="field-label">연락처 <span class="req">*</span></div>
    <input type="tel" id="phone" placeholder="010-0000-0000" autocomplete="tel">
  </div>
</div>

<div class="card">
  <div class="card-title">촬영 현장 정보</div>

  <div class="field">
    <div class="field-label">촬영 대상지 주소 <span class="req">*</span></div>
    <input type="text" id="address" placeholder="예) 경기도 수원시 영통구 ○○로 123" autocomplete="street-address">
  </div>

  <div class="field">
    <div class="field-label">대상 건물 / 구역</div>
    <input type="text" id="building" placeholder="예) A동 외벽, 옥상, 지하주차장 입구">
  </div>
</div>

<div class="card">
  <div class="card-title">일정</div>

  <div class="field">
    <div class="field-label">희망 촬영 일정 <span class="req">*</span></div>
    <input type="text" id="schedule" placeholder="예) 4/1 ~ 4/15 중 가능한 날짜">
  </div>

  <div class="field">
    <div class="field-label">추가 요청사항</div>
    <textarea id="memo" placeholder="촬영 목적, 특이사항, 기타 전달 내용"></textarea>
  </div>
</div>

<p class="form-note"><span class="req">*</span> 표시 항목은 필수 입력 항목입니다</p>

<div class="btn-wrap">
  <button class="btn-submit" onclick="submitToFirebase()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
    요청서 제출하기
  </button>
</div>

<div class="toast" id="toast">✓ &nbsp;요청서가 정상 제출되었습니다</div>


</body>
</html>
