<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>컨텐츠 업로드 · POUR스토어</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{
    --or:#3182F6; --or2:#2272EB; --or-pale:#E8F2FF;
    --navy:#191F28; --navy2:#333D4B;
    --ink:#191F28; --ink2:#4E5968; --muted:#8B95A1;
    --cream:#F4F6F8; --surface:#F2F4F6; --card:#FFFFFF; --border:#EDEFF2; --border2:#E5E8EB;
    --green:#13B877; --green-pale:#E7F7F0;
    --amber:#E08600; --amber-pale:#FFF3E0;
    --red:#F04452; --red-pale:#FEECEC;
    --r:16px; --r-lg:20px;
    --shadow:0 1px 2px rgba(17,24,39,.03),0 6px 20px rgba(17,24,39,.05);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;background:#F7F8FA;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink)}

  .top{position:sticky;top:0;z-index:20;background:rgba(247,248,250,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
  .top-in{max-width:560px;margin:0 auto;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand h1{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--navy)}
  .brand p{font-size:12px;color:var(--muted);margin-top:2px}
  .save-state{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
  .save-state .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}

  .wrap{max-width:560px;margin:0 auto;padding:18px 18px 120px}
  .card{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--r);padding:18px;margin-bottom:14px}
  .card h2{font-size:15px;font-weight:800;letter-spacing:-.01em;margin-bottom:4px}
  .card .desc{font-size:12.5px;color:var(--muted);margin-bottom:14px}

  .frow{margin-bottom:13px}
  .frow:last-child{margin-bottom:0}
  .frow label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px}
  .frow input,.frow select,.frow textarea{width:100%;padding:13px 14px;border:1px solid var(--border2);border-radius:12px;background:var(--cream)}
  .frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--or);background:#fff}
  .frow textarea{resize:vertical;min-height:64px;line-height:1.5}

  .seller-lock{display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:12px;background:var(--or-pale);border:1px solid #cfe2ff}
  .seller-lock .nm{font-size:16px;font-weight:800;color:var(--or2)}
  .seller-lock .tag{font-size:11px;font-weight:700;color:var(--muted);margin-left:auto}

  .pick{display:flex;gap:10px;margin-bottom:14px}
  .pickbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:20px 10px;border-radius:14px;border:1.5px dashed var(--border2);background:var(--cream);color:var(--ink2);font-size:13px;font-weight:700}
  .pickbtn:hover{border-color:var(--or);color:var(--or);background:#fff}
  .pickbtn svg{width:26px;height:26px}

  .files{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
  .fitem{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1;background:var(--surface);border:1px solid var(--border)}
  .fitem img,.fitem video{width:100%;height:100%;object-fit:cover;display:block}
  .fitem .vbadge{position:absolute;left:6px;bottom:6px;font-size:10px;font-weight:800;color:#fff;background:rgba(0,0,0,.55);padding:2px 7px;border-radius:6px}
  .fitem .rm{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1}
  .fitem .prog{position:absolute;inset:0;background:rgba(25,31,40,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
  .fitem.done .prog{background:rgba(19,184,119,.85)}
  .fcount{font-size:12px;color:var(--muted);margin-top:10px;font-weight:600}

  .submit{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(247,248,250,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:12px 18px calc(14px + env(safe-area-inset-bottom))}
  .submit-in{max-width:560px;margin:0 auto}
  .bigbtn{width:100%;padding:16px;border-radius:14px;background:var(--or);color:#fff;font-size:15.5px;font-weight:800;letter-spacing:-.01em}
  .bigbtn:hover{background:var(--or2)}
  .bigbtn:disabled{background:var(--border2);color:var(--muted);cursor:not-allowed}

  .done-screen{text-align:center;padding:40px 20px}
  .done-screen .ic{width:72px;height:72px;border-radius:50%;background:var(--green-pale);color:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .done-screen h2{font-size:20px;font-weight:800;margin-bottom:8px}
  .done-screen p{font-size:13.5px;color:var(--ink2);line-height:1.6}
  .done-screen .again{margin-top:22px;padding:13px 22px;border-radius:12px;background:var(--surface);color:var(--ink2);font-size:13.5px;font-weight:700}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:50;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.25);white-space:nowrap}
  .empty-hint{font-size:12.5px;color:var(--muted);text-align:center;padding:16px 0}

  /* 촬영 가이드 */
  .guide h2{display:flex;align-items:center;gap:6px}
  .gscenes{display:flex;flex-direction:column;gap:12px;margin-top:6px}
  .gscene{border:1px solid var(--border2);border-radius:12px;padding:12px;background:var(--cream)}
  .gscene-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .gnum{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--or);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .gnm{font-size:14px;font-weight:800}
  .gdir{font-size:12.5px;color:var(--ink2);line-height:1.5;margin-bottom:8px;white-space:pre-wrap}
  .grefs{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px}
  .gref{display:block;position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--surface);text-decoration:none}
  .gref img{width:100%;height:100%;object-fit:cover;display:block}
  .gref span{display:none}
  .gref.noimg{aspect-ratio:auto;padding:9px 10px;display:flex;align-items:center}
  .gref.noimg img{display:none}
  .gref.noimg span{display:block;font-size:11.5px;font-weight:700;color:var(--or2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="top">
  <div class="top-in">
    <div class="brand">
      <h1>컨텐츠 업로드</h1>
      <p id="brandSub">촬영한 사진·영상을 올려주세요 · POUR스토어</p>
    </div>
    <div class="save-state"><span class="dot" id="netDot"></span><span id="netTxt">연결됨</span></div>
  </div>
</div>

<div class="wrap" id="app">
  <!-- 업로더 정보 -->
  <div class="card">
    <h2>누가 올리나요?</h2>
    <div class="desc">셀러명(또는 촬영자명)을 입력하면 해당 폴더로 자동 정리돼요.</div>
    <div id="sellerLock" style="display:none" class="seller-lock">
      <span class="nm" id="sellerLockName"></span>
      <span class="tag">전용 링크</span>
    </div>
    <div id="sellerInputWrap">
      <div class="frow">
        <label>셀러명 / 촬영자명</label>
        <input id="sellerName" type="text" placeholder="예) 홍길동스토어 · 김촬영" autocomplete="off">
      </div>
    </div>
    <div class="frow" id="productWrap">
      <label>연결할 제품 <span style="color:var(--muted);font-weight:600">(선택)</span></label>
      <select id="productSel"><option value="">제품 선택 안 함</option></select>
    </div>
  </div>

  <!-- 촬영 가이드 (제품의 협찬 촬영 장면) -->
  <div id="guideWrap"></div>

  <!-- 파일 선택 -->
  <div class="card">
    <h2>사진 · 영상 선택</h2>
    <div class="desc">방금 촬영한 것을 바로 찍거나, 앨범에서 여러 개 골라도 돼요.</div>
    <div class="pick">
      <button class="pickbtn" id="btnCapture">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        촬영하기
      </button>
      <button class="pickbtn" id="btnAlbum">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        앨범에서 선택
      </button>
    </div>
    <input id="fileCapture" type="file" accept="image/*,video/*" capture="environment" multiple hidden>
    <input id="fileAlbum" type="file" accept="image/*,video/*" multiple hidden>
    <div class="files" id="files"></div>
    <div class="fcount" id="fcount"></div>
  </div>

  <!-- 메모 -->
  <div class="card">
    <h2>메모 <span style="font-size:12px;color:var(--muted);font-weight:600">(선택)</span></h2>
    <div class="frow" style="margin-top:12px">
      <textarea id="memo" placeholder="예) 옥상 방수 시공 전/후 · 제품 박스컷 5장"></textarea>
    </div>
  </div>
</div>

<div class="submit" id="submitBar">
  <div class="submit-in">
    <button class="bigbtn" id="uploadBtn" disabled>사진·영상을 먼저 선택하세요</button>
  </div>
</div>

<script>
/* ============================================================
   컨텐츠 업로드 (셀러·외주 촬영자용, 로그인 없음)
   - Storage: 소싱-os/content/sponsors/{셀러}/{날짜}/...  또는
              소싱-os/content/products/{제품ID}/sponsor/...
   - Firestore: sourcing-os/content-uploads/items/{id}  (per-doc add)
   - 셀러 명단·제품 목록·전용링크 토큰: sourcing-os/content-state (읽기)
   보안규칙 변경 없음 (소싱-os/**, sourcing-os/{doc=**} 기존 허용 활용)
   ============================================================ */
const FB_CFG={apiKey:"AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",authDomain:"pour-app-new.firebaseapp.com",projectId:"pour-app-new",storageBucket:"pour-app-new.firebasestorage.app",messagingSenderId:"411031141847",appId:"1:411031141847:web:e658174fd4b9652cdadf92"};
const CLOUD_ROOT='소싱-os';            // Storage 루트 (기존 허용 경로)
const STATE_DOC='content-state';        // sourcing-os/content-state
const UPLOADS_DOC='content-uploads';    // sourcing-os/content-uploads/items/{id}

let fbStore=null, db=null;
try{ if(!firebase.apps.length)firebase.initializeApp(FB_CFG); fbStore=firebase.storage(); db=firebase.firestore(); }
catch(e){ console.error('[cloud] 초기화 실패:',e); }

const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// 폴더 안전 이름(한글 허용, 위험문자만 _) — 기존 uploadDocFile 규칙과 동일 계열
const slug=s=>(s||'무명').trim().replace(/[^\w.\-가-힣]+/g,'_').slice(0,60)||'무명';
const refLabel=u=>{try{const x=new URL(u);return x.hostname.replace(/^www\./,'')+(x.pathname&&x.pathname!=='/'?x.pathname:'');}catch(e){return u;}};

const params=new URLSearchParams(location.search);
const tokenParam=params.get('s')||'';      // 셀러 전용 링크 토큰
const productParam=params.get('p')||'';    // 제품 고정(선택)

let lockedSeller=null;   // {id,name,productId}
let products=[];         // [{id,name,code}]
let picked=[];           // {id,file,kind,url,status,pct}

function setNet(ok,txt){ const d=$('#netDot'),t=$('#netTxt'); if(d)d.style.background=ok?'var(--green)':'var(--red)'; if(t)t.textContent=txt; }

/* 셀러 명단·제품 목록 로드 (읽기) */
async function loadState(){
  if(!db){setNet(false,'오프라인');return;}
  try{
    const snap=await db.collection('sourcing-os').doc(STATE_DOC).get();
    const data=snap.exists?snap.data():{};
    products=Array.isArray(data.products)?data.products:[];
    const sellers=Array.isArray(data.sellers)?data.sellers:[];
    console.log(`[content-state] 제품 ${products.length}건 · 셀러 ${sellers.length}건 로드`);
    // 전용 링크 토큰 → 셀러 고정
    if(tokenParam){
      const s=sellers.find(x=>x.token===tokenParam);
      if(s){ lockedSeller={id:s.id,name:s.name,productId:s.productId||''}; applyLock(); }
      else console.warn('[token] 일치하는 셀러 링크 없음:',tokenParam);
    }
    renderProducts();
    setNet(true,'연결됨');
  }catch(e){ console.error('[content-state] 로드 실패:',e); setNet(false,'오프라인'); }
}

function applyLock(){
  $('#sellerLock').style.display='flex';
  $('#sellerLockName').textContent=lockedSeller.name;
  $('#sellerInputWrap').style.display='none';
  $('#brandSub').textContent=lockedSeller.name+' 님, 컨텐츠를 올려주세요';
}

function renderProducts(){
  const sel=$('#productSel');
  const fixed=productParam||(lockedSeller&&lockedSeller.productId)||'';
  sel.innerHTML='<option value="">제품 선택 안 함</option>'+
    products.map(p=>`<option value="${esc(p.id)}">${esc(p.name)}${p.code?' · '+esc(p.code):''}</option>`).join('');
  if(fixed){ sel.value=fixed; }
  sel.onchange=renderGuide;
  renderGuide();
}

/* 촬영 가이드 — 선택된 제품의 '협찬촬영' 장면(컷)을 셀러에게 보여줌 */
let curScenes=[];
function renderGuide(){
  const wrap=$('#guideWrap'); if(!wrap)return;
  const pid=$('#productSel')?$('#productSel').value:'';
  const p=products.find(x=>x.id===pid);
  curScenes=(p&&Array.isArray(p.scenes)?p.scenes:[]).filter(s=>s.assignee==='sponsor');
  if(!p||!curScenes.length){ wrap.innerHTML=''; return; }
  const cards=curScenes.map((s,i)=>{
    const refs=(s.refs||[]).map(r=>`<a class="gref" href="${esc(r.url)}" target="_blank" rel="noopener"><img src="${esc(r.url)}" onerror="this.closest('.gref').classList.add('noimg')"><span>${esc(refLabel(r.url))}</span></a>`).join('');
    return `<div class="gscene">
      <div class="gscene-h"><span class="gnum">${i+1}</span><span class="gnm">${esc(s.name)}</span></div>
      ${s.direction?`<div class="gdir">${esc(s.direction)}</div>`:''}
      ${refs?`<div class="grefs">${refs}</div>`:''}
    </div>`;
  }).join('');
  const opts='<option value="">장면 선택 안 함</option>'+curScenes.map(s=>`<option value="${esc(s.id)}">${esc(s.name)}</option>`).join('');
  wrap.innerHTML=`<div class="card guide">
    <h2>📸 촬영 가이드 <span style="font-size:12px;color:var(--muted);font-weight:600">· ${esc(p.name)}</span></h2>
    <div class="desc">아래 장면을 참고해서 촬영해 주세요. 올릴 때 어떤 장면인지 선택하면 정리에 도움이 돼요.</div>
    <div class="gscenes">${cards}</div>
    <div class="frow" style="margin-top:14px"><label>어떤 장면을 올리나요? <span style="color:var(--muted);font-weight:600">(선택)</span></label><select id="sceneSel">${opts}</select></div>
  </div>`;
}

/* 파일 선택 처리 */
function addFiles(fileList){
  const arr=Array.from(fileList||[]);
  for(const f of arr){
    const isVideo=(f.type||'').startsWith('video');
    picked.push({id:uid(),file:f,kind:isVideo?'video':'photo',url:URL.createObjectURL(f),status:'',pct:0});
  }
  renderFiles();
}
function removeFile(id){
  const i=picked.findIndex(x=>x.id===id);
  if(i>=0){ try{URL.revokeObjectURL(picked[i].url);}catch(e){} picked.splice(i,1); renderFiles(); }
}
function renderFiles(){
  const box=$('#files');
  box.innerHTML=picked.map(p=>{
    const media=p.kind==='video'
      ? `<video src="${p.url}" muted playsinline></video><span class="vbadge">▶ 영상</span>`
      : `<img src="${p.url}" alt="">`;
    const prog=p.status==='up'?`<div class="prog">${p.pct}%</div>`
      :p.status==='done'?`<div class="prog">✓</div>`:'';
    const rm=p.status?'':`<button class="rm" onclick="removeFile('${p.id}')">×</button>`;
    return `<div class="fitem ${p.status==='done'?'done':''}">${media}${rm}${prog}</div>`;
  }).join('');
  const n=picked.length;
  $('#fcount').textContent=n?`${n}개 선택됨`:'';
  updateBtn();
}
function updateBtn(){
  const btn=$('#uploadBtn');
  const hasFiles=picked.some(p=>p.status!=='done');
  const hasSeller=lockedSeller||(($('#sellerName').value||'').trim());
  if(!picked.length){ btn.disabled=true; btn.textContent='사진·영상을 먼저 선택하세요'; }
  else if(!hasSeller){ btn.disabled=true; btn.textContent='셀러명을 입력하세요'; }
  else if(!hasFiles){ btn.disabled=true; btn.textContent='업로드 완료'; }
  else { btn.disabled=false; const left=picked.filter(p=>p.status!=='done').length; btn.textContent=`${left}개 업로드`; }
}

/* 업로드 실행 */
let uploading=false;
async function doUpload(){
  if(uploading||!fbStore||!db)return;
  const sellerName=lockedSeller?lockedSeller.name:($('#sellerName').value||'').trim();
  if(!sellerName){ toast('셀러명을 입력하세요','red'); return; }
  const productId=$('#productSel').value||'';
  const sceneId=$('#sceneSel')?($('#sceneSel').value||''):'';
  const scene=curScenes.find(s=>s.id===sceneId);
  const sceneName=scene?scene.name:'';
  const memo=($('#memo').value||'').trim();
  uploading=true; $('#uploadBtn').disabled=true;

  const date=today();
  const queue=picked.filter(p=>p.status!=='done');
  let ok=0, fail=0;
  for(const p of queue){
    try{
      p.status='up'; p.pct=0; renderFiles();
      const ext=(p.file.name.split('.').pop()||(p.kind==='video'?'mp4':'jpg')).toLowerCase().replace(/[^\w]/g,'');
      // 제품 연결 시 제품 폴더 아래 sponsor 하위, 아니면 sponsors/{셀러}/{날짜}
      const base=productId
        ? `content/products/${slug(productId)}/sponsor/${slug(sellerName)}/${date}`
        : `content/sponsors/${slug(sellerName)}/${date}`;
      const path=`${base}/${p.id}.${ext||'bin'}`;
      const ref=fbStore.ref(CLOUD_ROOT+'/'+path);
      const task=ref.put(p.file,{contentType:p.file.type||'application/octet-stream'});
      await new Promise((resolve,reject)=>{
        task.on('state_changed',
          snap=>{ p.pct=Math.round(snap.bytesTransferred/snap.totalBytes*100); renderFiles(); },
          err=>reject(err),
          ()=>resolve());
      });
      const url=await task.snapshot.ref.getDownloadURL();
      // 메타 기록 (per-doc add → 동시 업로드 충돌 없음)
      await db.collection('sourcing-os').doc(UPLOADS_DOC).collection('items').add({
        kind:p.kind, url, path:ref.fullPath, name:p.file.name||'', size:p.file.size||0,
        sellerName, sellerId:lockedSeller?lockedSeller.id:'', productId,
        sceneId, sceneName,
        purpose:'sponsor', via:tokenParam?'link':'web', memo,
        filed:false, createdAt:new Date().toISOString()
      });
      p.status='done'; p.pct=100; ok++; renderFiles();
    }catch(e){
      console.error('[upload] 실패:',p.file&&p.file.name,e);
      p.status=''; fail++; renderFiles();
    }
  }
  uploading=false;
  console.log(`[upload] 성공 ${ok} · 실패 ${fail}`);
  if(fail===0 && ok>0){ showDone(ok,sellerName); }
  else if(ok>0){ toast(`${ok}개 완료 · ${fail}개 실패(다시 시도)`,'amber'); updateBtn(); }
  else { toast('업로드 실패 — 네트워크 확인 후 다시 시도','red'); updateBtn(); }
}

function showDone(n,sellerName){
  $('#app').innerHTML=`<div class="card"><div class="done-screen">
    <div class="ic"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
    <h2>${n}개 업로드 완료!</h2>
    <p><b>${esc(sellerName)}</b> 폴더에 정리되어 저장됐어요.<br>담당자가 확인 후 컨텐츠로 활용합니다. 감사합니다 🙏</p>
    <button class="again" onclick="location.reload()">+ 더 올리기</button>
  </div></div>`;
  $('#submitBar').style.display='none';
}

function toast(msg,type){
  const colors={red:'var(--red)',green:'var(--green)',amber:'var(--amber)'};
  const el=document.createElement('div');
  el.className='toast'; el.style.background=colors[type]||'var(--navy)'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

/* 이벤트 바인딩 */
$('#btnCapture').onclick=()=>$('#fileCapture').click();
$('#btnAlbum').onclick=()=>$('#fileAlbum').click();
$('#fileCapture').onchange=e=>{ addFiles(e.target.files); e.target.value=''; };
$('#fileAlbum').onchange=e=>{ addFiles(e.target.files); e.target.value=''; };
$('#sellerName').oninput=updateBtn;
$('#uploadBtn').onclick=doUpload;
window.removeFile=removeFile;

loadState();
</script>
