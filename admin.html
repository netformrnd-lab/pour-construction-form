  const classifyImageWithAI=async(file,method,templateList)=>{
    const base64=await fileToBase64(file);
    /* 신규 템플릿 구조: tags + methods + referenceImageUrl + desc */
    const defectList=templateList.map(t=>{
      const name=templateDisplayName(t);
      const allTags=templateAllTags(t).map(tag=>'#'+tag).join(' ');
      const methods=(t.methods||[]).length>0?` [적용공법: ${t.methods.join(', ')}]`:'';
      const refImg=t.referenceImageUrl?` (기준사진 있음)`:'';
      return `- ${name}: ${t.desc||''} ${allTags}${methods}${refImg}`;
    }).join('\n');
    const methodContext=`현재 공법: ${method}`;
    const prompt=`당신은 건축물 하자 사진을 분류하는 전문가입니다.\n${methodContext}\n\n아래 하자유형(해시태그) 중 이 사진에 가장 적합한 유형 하나를 선택하세요:\n${defectList}\n\n반드시 JSON 형식으로만 답하세요:\n{"defectType":"선택한하자유형(첫번째태그)","matchedTags":["매칭된태그들"],"confidence":0~100,"description":"한줄설명"}`;

    /* 기준사진이 있는 템플릿들의 이미지를 함께 전송 */
    const content=[{type:'text',text:prompt}];
    /* 업로드된 사진 */
    content.push({type:'image_url',image_url:{url:`data:image/jpeg;base64,${base64}`,detail:'low'}});
    /* 기준사진들 (있는 경우 URL로 전송) */
    const refTemplates=templateList.filter(t=>t.referenceImageUrl);
    for(const rt of refTemplates.slice(0,5)){
      content.push({type:'text',text:`[기준사진: ${templateDisplayName(rt)}]`});
      content.push({type:'image_url',image_url:{url:rt.referenceImageUrl,detail:'low'}});
    }

    const key=aiApiKey.trim();
    if(!key)throw new Error('OpenAI API Key가 없습니다');
    const resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        messages:[{role:'user',content}],
        max_tokens:300,
        response_format:{type:'json_object'}
      })
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'API 오류');}
    const data=await resp.json();
    return JSON.parse(data.choices[0].message.content);
  };

  const runAiBulkClassify=async()=>{

        results.push({file,method:aiBulkMethod,defectType:result.defectType||'기타',matchedTags:result.matchedTags||[result.defectType||'기타'],confidence:result.confidence||0,description:result.description||'',status:'ready',previewUrl:URL.createObjectURL(file)});
      }catch(e){

            <div>
              <div style={{fontSize:18,fontWeight:800}}>📋 하자 분류 템플릿 관리</div>
              <div style={{fontSize:12,color:'var(--text-sm)',marginTop:4}}>해시태그 + 적용공법 + 기준사진으로 AI 분류 기준을 설정합니다</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={resetTemplates} style={{padding:'7px 12px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>초기화</button>
              <button onClick={()=>setShowTemplates(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--text-sm)'}}>✕</button>
            </div>
          </div>

          {/* 템플릿 추가/수정 폼 */}
          <div style={{background:'#F8FAFC',borderRadius:12,padding:16,marginBottom:20,border:'1.5px solid var(--border)'}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:12,color:'var(--text)'}}>
              {editingTemplate?'템플릿 수정':'새 하자유형 추가'}
            </div>

            {/* 해시태그 입력 */}
            <div style={{marginBottom:12}}>
              <label style={LS}>해시태그 (중분류) *</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
                {(templateForm.tags||[]).map((tag,idx)=>(
                  <span key={idx} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:20,background:'#EDE9FE',color:'#7C3AED',fontSize:12,fontWeight:700}}>
                    #{tag}
                    <button type="button" onClick={()=>setTemplateForm({...templateForm,tags:templateForm.tags.filter((_,i)=>i!==idx)})} style={{background:'none',border:'none',color:'#7C3AED',fontSize:14,cursor:'pointer',padding:0,lineHeight:1}}>×</button>
                  </span>
                ))}
              </div>
              <div style={{display:'flex',gap:6}}>
                <input style={{...IS,flex:1}} value={templateTagInput} onChange={e=>setTemplateTagInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();const v=templateTagInput.trim().replace(/^#/,'');if(v&&!(templateForm.tags||[]).includes(v)){setTemplateForm({...templateForm,tags:[...(templateForm.tags||[]),v]});}setTemplateTagInput('');}}}
                  placeholder="태그 입력 후 Enter (예: 이음부균열)"/>
                <button type="button" onClick={()=>{const v=templateTagInput.trim().replace(/^#/,'');if(v&&!(templateForm.tags||[]).includes(v)){setTemplateForm({...templateForm,tags:[...(templateForm.tags||[]),v]});}setTemplateTagInput('');}}
                  style={{padding:'8px 14px',borderRadius:8,border:'none',background:'#7C3AED',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>추가</button>
              </div>
              {(templateForm.tags||[]).length===0&&<div style={{fontSize:11,color:'#ef4444',marginTop:4}}>해시태그를 1개 이상 입력하세요</div>}
            </div>

            {/* 적용 공법 (대분류) 복수 선택 */}
            <div style={{marginBottom:12}}>
              <label style={LS}>적용 공법 (대분류) — 복수 선택 가능</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,maxHeight:120,overflow:'auto'}}>
                {DEFAULT_POUR_METHODS.map(m=>{
                  const on=(templateForm.methods||[]).includes(m);
                  return(<button key={m} type="button" onClick={()=>{
                    const cur=templateForm.methods||[];
                    setTemplateForm({...templateForm,methods:on?cur.filter(x=>x!==m):[...cur,m]});
                  }} style={{fontSize:11,padding:'4px 10px',borderRadius:20,border:`1.5px solid ${on?'var(--blue)':'var(--border)'}`,
                    background:on?'var(--blue-l)':'#fff',color:on?'var(--blue)':'var(--text-md)',
                    cursor:'pointer',fontWeight:on?700:500,fontFamily:'inherit',transition:'all .15s'}}>{m.replace('POUR ','').replace(' 공법','')}</button>);
                })}
              </div>
              {(templateForm.methods||[]).length>0&&<div style={{fontSize:11,color:'var(--blue)',marginTop:4,fontWeight:600}}>{(templateForm.methods||[]).length}개 공법 선택됨</div>}
            </div>

            {/* 기준 사진 */}
            <div style={{marginBottom:12}}>
              <label style={LS}>기준 사진 (AI 비교용)</label>
              <div style={{display:'flex',gap:12,alignItems:'center'}}>
                {(templateForm.referenceImageUrl||templateForm.referenceImage)&&(
                  <div style={{width:80,height:80,borderRadius:10,overflow:'hidden',border:'2px solid #7C3AED',flexShrink:0}}>
                    <img src={templateForm.referenceImage?URL.createObjectURL(templateForm.referenceImage):templateForm.referenceImageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="기준사진"/>
                  </div>
                )}
                <div style={{flex:1}}>
                  <input type="file" accept="image/*" onChange={e=>{if(e.target.files[0])setTemplateForm({...templateForm,referenceImage:e.target.files[0]});}} style={{fontSize:12}}/>
                  <div style={{fontSize:11,color:'var(--text-sm)',marginTop:4}}>이 사진을 기준으로 AI가 유사 사진을 판단합니다</div>
                </div>
              </div>
            </div>

            {/* 설명 */}
            <div style={{marginBottom:12}}>
              <label style={LS}>분류 기준 설명</label>
              <textarea style={{...IS,resize:'vertical',minHeight:50}} value={templateForm.desc||''} onChange={e=>setTemplateForm({...templateForm,desc:e.target.value})} placeholder="예: 경사형 지붕재의 벤취레터 이음부에서 발생하는 균열"/>
            </div>

            <div style={{display:'flex',gap:8}}>
              {editingTemplate&&<button onClick={()=>{setEditingTemplate(null);setTemplateForm({tags:[],methods:[],desc:'',referenceImage:null,referenceImageUrl:''});setTemplateTagInput('');}} style={{padding:'8px 16px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>취소</button>}
              <button onClick={saveTemplate} style={{padding:'8px 20px',borderRadius:8,border:'none',background:'var(--blue)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{editingTemplate?'수정 저장':'추가'}</button>
            </div>
          </div>

          {/* 템플릿 목록 */}
          {templateLoading?<div style={{textAlign:'center',padding:30,color:'var(--text-sm)'}}>로딩 중...</div>:
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {templates.map((t,i)=>(
              <div key={t.id||i} style={{padding:'12px 16px',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',display:'flex',gap:12,alignItems:'flex-start'}}>
                {/* 기준사진 썸네일 */}
                {t.referenceImageUrl?(
                  <div style={{width:56,height:56,borderRadius:8,overflow:'hidden',border:'1.5px solid #E9D5FF',flexShrink:0}}>
                    <img src={t.referenceImageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                  </div>
                ):(
                  <div style={{width:56,height:56,borderRadius:8,background:'#F5F3FF',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1.5px dashed #E9D5FF'}}>
                    <span style={{fontSize:20}}>📷</span>
                  </div>
                )}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,flexWrap:'wrap'}}>
                    {templateAllTags(t).map((tag,ti)=>(
                      <span key={ti} style={{padding:'2px 8px',borderRadius:12,background:'#EDE9FE',color:'#7C3AED',fontSize:11,fontWeight:700}}>#{tag}</span>
                    ))}
                  </div>
                  {(t.methods||[]).length>0&&<div style={{fontSize:10,color:'var(--text-sm)',marginBottom:2}}>공법: {t.methods.map(m=>m.replace('POUR ','').replace(' 공법','')).join(', ')}</div>}
                  {t.desc&&<div style={{fontSize:11,color:'var(--text-sm)',lineHeight:1.5}}>{t.desc}</div>}
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button onClick={()=>{setEditingTemplate(t);setTemplateForm({tags:templateAllTags(t),methods:t.methods||[],desc:t.desc||'',referenceImage:null,referenceImageUrl:t.referenceImageUrl||''});setTemplateTagInput('');}} style={{background:'none',border:'none',fontSize:11,color:'var(--blue)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>수정</button>
                  {t.id&&<button onClick={()=>deleteTemplate(t.id)} style={{background:'none',border:'none',fontSize:11,color:'#DC2626',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>삭제</button>}
                </div>
              </div>
            ))}
          </div>}
        </div>
      </div>}

      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:800}}>🔍 공법분석 · 하자사진 분류</div>
          <div style={{fontSize:12,color:'var(--text-sm)',marginTop:4}}>
            전체 {stats.total}장 · {stats.methods}개 공법 · {stats.defects}개 하자유형
            {stats.manus>0?` · 마누스 ${stats.manus}건`:''}
            {stats.ai>0?` · AI분류 ${stats.ai}건`:''}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick={fetchPhotos} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>🔄</button>
          {photos.some(p=>p.method==='슬라브 방수')&&(
            <button onClick={()=>bulkRetag('슬라브 방수','POUR 듀얼강화방수 공법')} disabled={retagging}
              style={{padding:'8px 14px',borderRadius:8,border:'none',background:'#7C3AED',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',opacity:retagging?.6:1}}>
              {retagging?'재태깅 중...':'🔁 슬라브방수→듀얼강화방수'}
            </button>
          )}
          <button onClick={()=>setShowTemplates(true)} style={{padding:'8px 16px',borderRadius:8,border:'1.5px solid #E9D5FF',background:'#F5F3FF',color:'#7C3AED',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>📋 분류 템플릿</button>
          <button onClick={()=>{setAiBulkFiles([]);setAiBulkResults([]);setAiProgress(0);setShowAiBulk(true);}} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#6D28D9,#2563EB)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🤖 AI 자동분류</button>
          <button onClick={()=>setShowImport(true)} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'var(--gold)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>📥 마누스 연동</button>
          <button onClick={()=>{closeAddForm();setShowAdd(true);}} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'var(--blue)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>+ 사진 등록</button>
        </div>
      </div>

      {/* 🏷️ 중분류 태그 관리 (접이식) */}
      <details style={{marginBottom:16,background:'#FAF5FF',borderRadius:12,border:'1.5px solid #E9D5FF',overflow:'hidden'}}>
        <summary style={{padding:'10px 16px',cursor:'pointer',fontSize:13,fontWeight:800,color:'#7C3AED',listStyle:'none',display:'flex',alignItems:'center',gap:6,userSelect:'none'}}>
          <span style={{fontSize:10,transition:'transform .2s'}}>▶</span> 🏷️ 중분류 태그 관리 (메인/서브 · 라벨 편집 · 대표 설정)
        </summary>
        <div style={{padding:'0 16px 14px'}}>
          <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:10,lineHeight:1.6}}>
            <b style={{color:'#7C3AED'}}>메인</b>: 필터용 (수정/삭제/추가 가능) · <b style={{color:'#9CA3AF'}}>서브</b>: 사진마다 수동 입력 · 📌 사진카드에서 대표사진 지정
          </div>
          {/* 새 메인 태그 추가 */}
          <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:10}}>
            <input id="newMainTagInput" placeholder="+ 새 메인 태그 추가" onKeyDown={async(e)=>{
              if(e.key!=='Enter')return;const v=e.target.value.trim().replace(/^#/,'');if(!v)return;
              if(allDefects.includes(v)){showToast('이미 존재하는 태그입니다','error');return;}
              const next=updateTagMeta(v,{role:'main',label:v,featured:false});
              await saveDefectTypesMeta(next);if(!customTags.includes(v))setCustomTags(prev=>[...prev,v]);
              e.target.value='';showToast(`#${v} 메인 태그 추가 완료`);
            }} style={{flex:1,fontSize:11,padding:'5px 10px',borderRadius:8,border:'1.5px dashed #7C3AED',outline:'none',fontFamily:'inherit',color:'#7C3AED',background:'#FAF5FF'}}/>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {allDefects.map(d=>{
              const meta=getTagMeta(d);
              const lbl=meta?.label||d;
              const role=meta?.role||'main';
              const featured=!!meta?.featured;
              const isMain=role==='main';
              const repPhoto=meta?.photo||'';
              return(
                <div key={'tm_'+d} style={{display:'flex',alignItems:'center',gap:4,padding:'4px 8px',borderRadius:8,
                  border:`1.5px solid ${isMain?(featured?'#D97706':'#7C3AED'):'var(--border)'}`,
                  background:isMain?(featured?'#FFFBEB':'#FAF5FF'):'#F9FAFB'}}>
                  {/* 대표사진 미리보기 */}
                  {repPhoto&&<div style={{width:24,height:24,borderRadius:4,overflow:'hidden',flexShrink:0,border:'1px solid var(--border)'}}>
                    <img src={repPhoto} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt=""/>
                  </div>}
                  {/* 역할 토글 */}
                  <button onClick={async()=>{const next=updateTagMeta(d,{role:isMain?'sub':'main',featured:false});await saveDefectTypesMeta(next);}}
                    style={{fontSize:9,padding:'2px 5px',borderRadius:4,border:'none',background:isMain?'#7C3AED':'#9CA3AF',color:'#fff',cursor:'pointer',fontWeight:700,fontFamily:'inherit'}}>
                    {isMain?'메인':'서브'}
                  </button>
                  {/* 편집 가능 라벨 */}
                  <input defaultValue={lbl} key={'tl_'+d+'_'+lbl}
                    onBlur={async(e)=>{const v=e.target.value.trim();if(!v||v===lbl)return;const next=updateTagMeta(d,{label:v});await saveDefectTypesMeta(next);}}
                    onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
                    style={{width:Math.max(40,lbl.length*12+10),fontSize:11,fontWeight:700,color:isMain?'#7C3AED':'#6B7280',
                      border:'none',borderBottom:'1px dashed var(--border)',background:'transparent',outline:'none',fontFamily:'inherit',padding:'1px 2px'}}
                  />
                  {d!==lbl&&<span style={{fontSize:8,color:'var(--text-sm)',opacity:.5}}>({d})</span>}
                  {/* 삭제 (메타에서만 제거, 사진 데이터 유지) */}
                  {meta&&<button onClick={async()=>{
                    if(!confirm(`#${lbl} 태그 메타를 초기화하시겠습니까? (사진 태그는 유지됩니다)`))return;
                    const next=defectTypesMeta.filter(t=>t.id!==d);
                    await saveDefectTypesMeta(next);
                  }} style={{fontSize:9,padding:'1px 4px',borderRadius:3,border:'none',background:'transparent',color:'var(--text-sm)',cursor:'pointer',fontFamily:'inherit',opacity:.5}}>✕</button>}
                </div>
              );
            })}
          </div>
          {/* ── 고객 필터 카드 순서 ── */}
          <div style={{marginTop:14,paddingTop:12,borderTop:'1px dashed #E9D5FF'}}>
            <div style={{fontSize:11,fontWeight:800,color:'#7C3AED',marginBottom:8}}>📊 고객 필터 카드 순서 (드래그 불가 · ▲▼ 사용)</div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {mainDefects.filter(d=>isTagFeatured(d)).length>0
                ?mainDefects.filter(d=>isTagFeatured(d)).map((d,i,arr)=>{
                  const meta=getTagMeta(d);const lbl=meta?.label||d;const repPhoto=meta?.photo||'';
                  return(
                    <div key={'ord_'+d} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderRadius:8,background:'#FFFBEB',border:'1px solid #FDE68A'}}>
                      <span style={{fontSize:12,fontWeight:800,color:'#D97706',width:20,textAlign:'center'}}>{i+1}</span>
                      {repPhoto&&<div style={{width:28,height:28,borderRadius:4,overflow:'hidden',flexShrink:0,border:'1px solid var(--border)'}}><img src={repPhoto} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt=""/></div>}
                      <span style={{fontSize:12,fontWeight:700,color:'#92400E',flex:1}}>#{lbl}</span>
                      <button disabled={i===0} onClick={()=>moveTagMeta(d,-1)} style={{fontSize:11,padding:'2px 6px',borderRadius:4,border:'1px solid #E9D5FF',background:i===0?'#F9FAFB':'#fff',color:i===0?'#ccc':'#7C3AED',cursor:i===0?'default':'pointer',fontWeight:700,fontFamily:'inherit'}}>▲</button>
                      <button disabled={i===arr.length-1} onClick={()=>moveTagMeta(d,1)} style={{fontSize:11,padding:'2px 6px',borderRadius:4,border:'1px solid #E9D5FF',background:i===arr.length-1?'#F9FAFB':'#fff',color:i===arr.length-1?'#ccc':'#7C3AED',cursor:i===arr.length-1?'default':'pointer',fontWeight:700,fontFamily:'inherit'}}>▼</button>
                    </div>);
                })
                :<div style={{fontSize:10,color:'var(--text-sm)',padding:8}}>⭐ 대표 설정된 태그가 없습니다. 태그에 ⭐ featured를 설정하면 고객 화면에 표시됩니다.</div>
              }
            </div>
          </div>
        </div>
      </details>

      {/* 필터: 대분류 (공법) */}
      {methodsWithData.length>0&&<div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>대분류 · 공법</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={()=>{setSelMethod('전체');setSelDefect('전체');}} style={tabS(selMethod==='전체')}>전체</button>
          {methodsWithData.map(m=><button key={m} onClick={()=>{setSelMethod(m);setSelDefect('전체');}} style={tabS(selMethod===m)}>{m.replace('POUR ','').replace(' 공법','')}</button>)}
        </div>
      </div>}

      {/* 필터: 중분류 (하자유형) — 메인태그만 필터, 라벨 표시 */}
      {defectsForMethod.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>중분류 · 하자유형</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={()=>setSelDefect('전체')} style={tabS(selDefect==='전체')}>전체 ({(selMethod==='전체'?photos:photos.filter(p=>photoMethods(p).includes(selMethod))).length})</button>
          {defectsForMethod.filter(d=>isTagMain(d)).map(d=>{
            const cnt=(selMethod==='전체'?photos:photos.filter(p=>photoMethods(p).includes(selMethod))).filter(p=>p.defectType===d).length;
            const featured=isTagFeatured(d);
            return <button key={d} onClick={()=>setSelDefect(d)} style={{...tabS(selDefect===d),borderColor:featured&&selDefect!==d?'#D97706':undefined}}>{featured?'⭐ ':''}{getTagLabel(d)} ({cnt})</button>;
          })}
        </div>
        {defectsForMethod.filter(d=>!isTagMain(d)).length>0&&(
          <div style={{marginTop:6}}>
            <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:4}}>서브 태그</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {defectsForMethod.filter(d=>!isTagMain(d)).map(d=>{
                const cnt=(selMethod==='전체'?photos:photos.filter(p=>photoMethods(p).includes(selMethod))).filter(p=>p.defectType===d).length;
                return <button key={d} onClick={()=>setSelDefect(d)} style={{...tabS(selDefect===d),opacity:.7}}>{getTagLabel(d)} ({cnt})</button>;
              })}
            </div>
          </div>
        )}
      </div>}

      {/* 콘텐츠 */}
      {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>
      :filtered.length===0?
        <div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>
          <div style={{fontSize:48,marginBottom:12}}>📷</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>등록된 하자사진이 없습니다</div>
          <div style={{fontSize:12}}>AI 자동분류, 마누스 연동 또는 직접 등록으로 사진을 추가하세요</div>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}>

/* base64 → Firebase Storage 업로드 → URL 반환 */
async function uploadBase64ToStorage(base64, path) {
  try {
    const res = await fetch(base64);
    const blob = await res.blob();
    const ref = firebase.storage().ref(`${path}_${Date.now()}.jpg`);
    await ref.put(blob);
    return await ref.getDownloadURL();
  } catch(e) { console.error('[uploadBase64] 실패:', e); return base64; }
}

  const pasteImageFromClipboard = async () => {
    try {

      for (const item of items) {
        const imageType = item.types.find(t => t.startsWith('image/'));
        if (imageType) {
          const blob = await item.getType(imageType);
          return new File([blob], `paste_${Date.now()}.png`, { type: imageType });

  // 이미지 파일 업로드 후 base64 반환 (압축)
  const compressImageFile = (file, maxW = 1200, quality = 0.85) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxW || h > maxW) { const r = Math.min(maxW/w, maxW/h); w = Math.round(w*r); h = Math.round(h*r); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

        // process-guide 서브컬렉션 로드 (이미지 가이드 모드)

        // proposalSlides 서브컬렉션 로드

        // 추가 방안 (extraSolutions) 서브컬렉션 로드

  if (loading || !content) return (

  /* ── 공법별 공정 단계 이름 (index.html METHOD_CONTENT 동기) ── */

    crack_section: ['파손 부위 확대 제거','철근 방청 처리','POUR탄성강화파우더 단면복구','양생','시공완료'],
    crack_sheet: ['균열면 처리','POUR슈퍼복합압축시트 부착','방수액 도포','마감','시공완료'],
    ascon_repair: ['균열·파손부 절삭 제거','기층 보강 처리','POUR아스콘 재포장','다짐 마감','시공완료'],

  };
  /* steps: content.processStepNames가 있으면 사용, 없으면 기본값 */
  const defaultSteps = processNames[selectedMethod] || [];
  const steps = (content?.processStepNames && content.processStepNames.length > 0) ? content.processStepNames : defaultSteps;

  const initCustomSteps = () => {
    if (!content?.processStepNames || content.processStepNames.length === 0) {
      setContent(prev => ({...prev, processStepNames: [...defaultSteps]}));

  };
  const updateStepName = (idx, val) => {

    setContent(prev => {
      const arr = [...(prev.processStepNames || [...defaultSteps])];
      arr[idx] = val;
      return {...prev, processStepNames: arr};
    });

  const addStep = () => {

    setContent(prev => {

      arr.push('새 공정 ' + (arr.length + 1));
      return {...prev, processStepNames: arr};

  const removeStep = (idx) => {
    setContent(prev => {
      const names = [...(prev.processStepNames || [...defaultSteps])];
      const photos = [...(prev.processPhotos || [])];
      const descs = [...(prev.processDescs || [])];
      const keys = [...(prev.processKeys || [])];
      const mats = [...(prev.processMaterials || [])];
      names.splice(idx, 1);
      photos.splice(idx, 1);
      descs.splice(idx, 1);
      keys.splice(idx, 1);
      mats.splice(idx, 1);
      return {...prev, processStepNames: names, processPhotos: photos, processDescs: descs, processKeys: keys, processMaterials: mats};
    });
  };
  /* 공정 순서 이동 (▲▼) */
  const moveStep = (idx, dir) => {
    const ni = idx + dir;
    setContent(prev => {
      const names = [...(prev.processStepNames || [...defaultSteps])];
      const photos = [...(prev.processPhotos || [])];
      const descs = [...(prev.processDescs || [])];
      const keys = [...(prev.processKeys || [])];
      const mats = [...(prev.processMaterials || [])];
      if (ni < 0 || ni >= names.length) return prev;
      const swap = (arr, a, b) => { if (arr[a] !== undefined || arr[b] !== undefined) { const tmp = arr[a]; arr[a] = arr[b]; arr[b] = tmp; } };
      swap(names, idx, ni); swap(photos, idx, ni); swap(descs, idx, ni); swap(keys, idx, ni); swap(mats, idx, ni);
      return {...prev, processStepNames: names, processPhotos: photos, processDescs: descs, processKeys: keys, processMaterials: mats};

    } catch(e) { showToast('업로드 실패', 'error'); }
  };

  /* ── YouTube URL → embed 변환 ── */
  const toEmbedUrl = (url) => {
    if (!url) return '';
    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;
    if (url.includes('/embed/')) return url;
    return url;
  };
  const getYtThumb = (url) => {
    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|\/embed\/)([a-zA-Z0-9_-]{11})/);
    return ytMatch ? `https://img.youtube.com/vi/${ytMatch[1]}/mqdefault.jpg` : '';
  };

  /* ── 통합 저장 (content + casePhotos 동시) ── */
  const handleSaveAll = async () => {
    setSaving(true);
    setCasePhotosSaving(true);
    try {
      /* base64 이미지 → Firebase Storage URL 변환 */
      const clean = JSON.parse(JSON.stringify(content));

      /* processPhotos base64 변환 */
      if (clean.processPhotos) {
        for (let i = 0; i < clean.processPhotos.length; i++) {
          const p = clean.processPhotos[i];
          if (typeof p === 'string' && p.startsWith('data:')) {
            clean.processPhotos[i] = await uploadBase64ToStorage(p, `method-content/${selectedMethod}/process_${i}`);
          }
        }
      }

      /* processKeys 사진 base64 변환 */
      if (clean.processKeys) {
        for (let i = 0; i < clean.processKeys.length; i++) {
          if (clean.processKeys[i]?.photo && clean.processKeys[i].photo.startsWith('data:')) {
            clean.processKeys[i].photo = await uploadBase64ToStorage(clean.processKeys[i].photo, `method-content/${selectedMethod}/key_${i}`);
          }
        }
      }

      /* processMaterials 사진 base64 변환 */
      if (clean.processMaterials) {
        for (let i = 0; i < clean.processMaterials.length; i++) {
          if (clean.processMaterials[i]?.mediaUrl && clean.processMaterials[i].mediaUrl.startsWith('data:')) {
            clean.processMaterials[i].mediaUrl = await uploadBase64ToStorage(clean.processMaterials[i].mediaUrl, `method-content/${selectedMethod}/mat_${i}`);
          }
        }
      }

      /* method-content 저장 (화이트리스트 — 텍스트만 메인 문서, 나머지 서브컬렉션) */
      const ref = db ? db.collection(CONTENT_COLLECTION).doc(selectedMethod) : null;
      if (ref) {
        // 메인 문서에는 텍스트 필드만 화이트리스트로 저장 (base64 절대 포함 안됨)
        const textOnly = {
          cause: clean.cause || '',
          solution: clean.solution || '',
          processDescs: (clean.processDescs || []).map(d => typeof d === 'string' ? d : ''),
          processStepNames: (clean.processStepNames || []).filter(s => typeof s === 'string'),
          processPhotoPositions: clean.processPhotoPositions || [],
          processPhotos: [], // 서브컬렉션으로 이동
          processMaterials: (clean.processMaterials || []).map(m => {
            if (!m) return null;
            return { name: m.name || '', desc: m.desc || '', badge: m.badge || '', mediaType: m.mediaType || '' };
          }),
          processKeys: (clean.processKeys || []).map(k => {
            if (!k) return null;
            return { desc: k.desc || '' };
          }),
          processMode: clean.processMode || 'steps',
          extraSolutions: (clean.extraSolutions || []).map((s, idx) => ({
            name: s.name || `방안 ${idx + 2}`,
            processMode: s.processMode || 'images',
          })),
          updatedAt: new Date().toISOString(),
        };
        console.log('[saveContent] textOnly size:', JSON.stringify(textOnly).length, 'bytes');
        await ref.set(textOnly); // merge 없이 완전 교체

        /* 서브컬렉션 기존 문서 전체 삭제 헬퍼 */
        const clearSubcollection = async (colRef) => {
          const snap = await colRef.get();
          const batch = db.batch();
          snap.docs.forEach(d => batch.delete(d.ref));
          if (snap.size > 0) await batch.commit();
        };

        // step-photos 서브컬렉션 (공정사진 + 자재사진 + 핵심기술사진)
        const cProcessPhotos = clean.processPhotos || [];
        const cProcessMaterials = clean.processMaterials || [];
        const cProcessKeys = clean.processKeys || [];
        const photosCol = ref.collection('step-photos');
        await clearSubcollection(photosCol);
        const maxLen = Math.max(cProcessPhotos.length, cProcessMaterials.length, cProcessKeys.length);
        for (let i = 0; i < maxLen; i++) {
          const ph = cProcessPhotos[i];
          const mat = cProcessMaterials[i];
          const kp = cProcessKeys[i]?.photo || null;
          const docData = { processPhoto: ph||null, matPhotos: mat?.photos||[], matMediaUrl: mat?.mediaUrl||'', keyPhoto: kp };
          if (ph || mat?.photos?.length || mat?.mediaUrl || kp) {
            await photosCol.doc(String(i)).set(docData);
          }
        }

        // proposal-slides 서브컬렉션
        const cSlides = clean.proposalSlides || [];
        const slideCol = ref.collection('proposal-slides');
        await clearSubcollection(slideCol);
        if (cSlides.length > 0) {
          for (let i = 0; i < cSlides.length; i++) {
            await slideCol.doc(String(i)).set({ image: cSlides[i] });
          }
          await slideCol.doc('_meta').set({ count: cSlides.length, updatedAt: new Date().toISOString() });
        }

        // process-guide 서브컬렉션 (이미지 가이드 모드)
        const cGuideImages = clean.processGuideImages || [];
        const guideCol = ref.collection('process-guide');
        await clearSubcollection(guideCol);
        if (cGuideImages.length > 0) {
          for (let i = 0; i < cGuideImages.length; i++) {
            await guideCol.doc(String(i)).set({ image: cGuideImages[i] });
          }
          await guideCol.doc('_meta').set({ count: cGuideImages.length });
        }

        // 추가 방안 (extraSolutions) 서브컬렉션 저장
        for (let idx = 0; idx < (clean.extraSolutions || []).length; idx++) {
          const es = clean.extraSolutions[idx];
          const esSlides = es.proposalSlides || [];
          const esSlideCol = ref.collection(`extra-slides-${idx}`);
          await clearSubcollection(esSlideCol);
          if (esSlides.length > 0) {
            for (let i = 0; i < esSlides.length; i++) {
              await esSlideCol.doc(String(i)).set({ image: esSlides[i] });
            }
            await esSlideCol.doc('_meta').set({ count: esSlides.length, updatedAt: new Date().toISOString() });
          }
          const esGuide = es.processGuideImages || [];
          const esGuideCol = ref.collection(`extra-guide-${idx}`);
          await clearSubcollection(esGuideCol);
          if (esGuide.length > 0) {
            for (let i = 0; i < esGuide.length; i++) {
              await esGuideCol.doc(String(i)).set({ image: esGuide[i] });
            }
            await esGuideCol.doc('_meta').set({ count: esGuide.length });
          }
        }
      }
      /* 저장 성공 시 로컬 state도 갱신 */
      setContent(clean);

      /* config/casePhotos 저장 (base64 → URL 변환) */
      const cleanCase = JSON.parse(JSON.stringify(casePhotos));
      for (const key of Object.keys(cleanCase)) {
        const item = cleanCase[key]; if (!item) continue;
        if (item.causes) {
          for (let i = 0; i < item.causes.length; i++) {
            if (item.causes[i] && item.causes[i].startsWith('data:')) {
              item.causes[i] = await uploadBase64ToStorage(item.causes[i], `case-photos/${key}/cause_${i}`);
            }
          }
        }
        if (item.mediaThumbs) {
          for (let i = 0; i < item.mediaThumbs.length; i++) {
            if (item.mediaThumbs[i] && item.mediaThumbs[i].startsWith('data:')) {
              item.mediaThumbs[i] = await uploadBase64ToStorage(item.mediaThumbs[i], `case-photos/${key}/thumb_${i}`);
            }
          }
        }
        if (item.media) {
          for (let i = 0; i < item.media.length; i++) {
            if (item.media[i] && item.media[i].startsWith('data:')) {
              item.media[i] = await uploadBase64ToStorage(item.media[i], `case-photos/${key}/media_${i}`);
            }
          }
        }
        if (item.defectTypePhotos) {
          for (let i = 0; i < item.defectTypePhotos.length; i++) {
            if (item.defectTypePhotos[i] && item.defectTypePhotos[i].startsWith('data:')) {
              item.defectTypePhotos[i] = await uploadBase64ToStorage(item.defectTypePhotos[i], `case-photos/${key}/defectType_${i}`);
            }
          }
        }
        if (item.existingFixPhotos) {
          for (let i = 0; i < item.existingFixPhotos.length; i++) {
            if (item.existingFixPhotos[i] && item.existingFixPhotos[i].startsWith('data:')) {
              item.existingFixPhotos[i] = await uploadBase64ToStorage(item.existingFixPhotos[i], `case-photos/${key}/existingFix_${i}`);
            }
          }
        }
        /* methodIntroImages 배열 변환 (기존 단일 methodIntroImage 호환) */
        if (item.methodIntroImages && item.methodIntroImages.length > 0) {
          for (let i = 0; i < item.methodIntroImages.length; i++) {
            if (item.methodIntroImages[i] && item.methodIntroImages[i].startsWith('data:')) {
              item.methodIntroImages[i] = await uploadBase64ToStorage(item.methodIntroImages[i], `case-photos/${key}/methodIntro_${i}`);
            }
          }
          item.methodIntroImage = '';
        } else if (item.methodIntroImage && item.methodIntroImage.startsWith('data:')) {
          item.methodIntroImage = await uploadBase64ToStorage(item.methodIntroImage, `case-photos/${key}/methodIntro`);
        }
      }
      await db.collection('config').doc('casePhotos').set(cleanCase, { merge: true });
      setCasePhotos(cleanCase);

      showToast('전체 저장 완료!', 'success');
    } catch(e) {
      console.error('[handleSaveAll] 저장 실패:', e);
      showToast('저장 실패: ' + e.message, 'error');
    }
    setSaving(false);
    setCasePhotosSaving(false);
  };

  const toggleSec = (k) => setOpenSections(p => ({...p, [k]:!p[k]}));
  const getProcessKey = (idx) => (content?.processKeys||[])[idx] || {photo:'',desc:''};
  const updateProcessKey = (idx, field, val) => {
    const arr = [...(content?.processKeys||[])];
    if(!arr[idx]) arr[idx] = {photo:'',desc:''};
    arr[idx] = {...arr[idx], [field]: val};
    setContent(prev => ({...prev, processKeys: arr}));
  };

  // 공법 선택 사이드바 + 편집 영역 레이아웃
  return (
    <div style={{display:'flex',gap:0,height:'calc(100vh - 104px)',overflow:'hidden'}}>
      {/* 왼쪽: 공법 목록 */}
      <div style={{
        width:200, flexShrink:0, borderRight:'1px solid var(--border)',
        overflowY:'auto', background:'#fff'
      }}>
        {['지붕','방수','바닥','외벽','보수','토목'].map(cat => {
          const methods = POUR_METHODS_FOR_EDITOR.filter(m => m.category === cat);
          return (
            <div key={cat}>
              <div style={{
                padding:'8px 12px 4px', fontSize:10, fontWeight:700,
                color:'rgba(0,0,0,.35)', letterSpacing:1, textTransform:'uppercase',
                background:'#f8f9fa', borderBottom:'1px solid var(--border)'
              }}>{cat}</div>
              {methods.map(m => {
                const hasData = !!(casePhotos[m.id]?.causes?.some(c=>c) || content?.causeVideoUrl || (content?.processPhotos||[]).some(p=>p));
                return (
                <button key={m.id} onClick={() => setSelectedMethod(m.id)} style={{
                  width:'100%', textAlign:'left', padding:'9px 14px',
                  background: selectedMethod === m.id ? '#EFF6FF' : 'transparent',
                  border:'none', borderLeft: selectedMethod === m.id ? '3px solid #2563EB' : '3px solid transparent',
                  color: selectedMethod === m.id ? '#1D4ED8' : 'var(--text)',
                  fontSize:12, fontWeight: selectedMethod === m.id ? 700 : 400,
                  cursor:'pointer', lineHeight:1.4, display:'flex', alignItems:'center', gap:6
                }}>
                  {hasData && <span style={{width:6,height:6,borderRadius:'50%',background:'#10B981',flexShrink:0}}/>}
                  {!hasData && <span style={{width:6,height:6,borderRadius:'50%',background:'#E5E7EB',flexShrink:0}}/>}
                  {m.label}
                </button>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* 오른쪽: 3섹션 통합 편집 영역 */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* 상단 헤더 + 저장 */}
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'12px 20px', borderBottom:'1px solid var(--border)', background:'#fff', flexShrink:0
        }}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:15,fontWeight:800,color:'var(--navy)'}}>{methodInfo?.label}</span>
            <span style={{fontSize:11,color:'var(--text-sm)',background:'#F1F5F9',padding:'3px 10px',borderRadius:20,fontWeight:600}}>{methodInfo?.category}</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {contentBackup && (
            <button onClick={restoreBackup} style={{
              padding:'8px 14px', borderRadius:8, border:'1px solid #FECACA',
              background:'#FEF2F2', color:'#DC2626',
              fontSize:12, fontWeight:700, cursor:'pointer'
            }}>
              ↩ 복원
            </button>
          )}
          <button onClick={()=>{setTemplateModal(true);setTemplateStep('select');setTemplateSource(null);setTemplateSections({s2:true,s3:true,s4:true});}} style={{
            padding:'8px 16px', borderRadius:8, border:'1px solid #FDE68A',
            background:'#FFFBEB', color:'#B45309',
            fontSize:12, fontWeight:700, cursor:'pointer'
          }}>
            📥 다른 공법에서 불러오기
          </button>
          <button onClick={handleSaveAll} disabled={saving||casePhotosSaving} style={{
            padding:'8px 24px', borderRadius:8, border:'none',
            background: (saving||casePhotosSaving) ? '#94A3B8' : '#16A34A', color:'#fff',
            fontSize:13, fontWeight:700, cursor: (saving||casePhotosSaving) ? 'not-allowed' : 'pointer',
            boxShadow:'0 2px 8px rgba(22,163,74,.3)'
          }}>
            {(saving||casePhotosSaving) ? '저장 중...' : '💾 전체 저장'}
          </button>
          </div>
        </div>

        {/* ── 템플릿 불러오기 모달 (2단계: 공법 선택 → 섹션 선택) ── */}
        {templateModal && (
          <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.5)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}
            onClick={()=>setTemplateModal(false)}>
            <div style={{background:'#fff',borderRadius:16,width:500,maxHeight:'80vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}
              onClick={e=>e.stopPropagation()}>

              {templateStep==='select' ? (
                <>
                <div style={{padding:'20px 24px 16px',borderBottom:'1px solid var(--border)'}}>
                  <div style={{fontSize:16,fontWeight:800,color:'var(--navy)',marginBottom:4}}>📥 다른 공법에서 불러오기</div>
                  <div style={{fontSize:11,color:'var(--text-sm)',lineHeight:1.5}}>
                    복사할 소스 공법을 선택하세요. 다음 단계에서 어떤 섹션을 적용할지 선택할 수 있습니다.
                  </div>
                </div>
                <div style={{padding:'8px 12px',maxHeight:'50vh',overflow:'auto'}}>
                  {Object.entries(POUR_METHODS_FOR_EDITOR.reduce((acc,m)=>{(acc[m.category]=acc[m.category]||[]).push(m);return acc;},{})).map(([cat,methods])=>(
                    <div key={cat}>
                      <div style={{padding:'10px 12px 4px',fontSize:10,fontWeight:700,color:'var(--text-sm)',letterSpacing:1}}>{cat}</div>
                      {methods.map(m=>(
                        <button key={m.id} disabled={m.id===selectedMethod||templateLoading}
                          onClick={()=>loadTemplateSource(m.id)}
                          style={{
                            width:'100%',textAlign:'left',padding:'10px 14px',border:'none',
                            background:m.id===selectedMethod?'#F1F5F9':'transparent',
                            color:m.id===selectedMethod?'var(--text-sm)':'var(--navy)',
                            fontSize:12,fontWeight:m.id===selectedMethod?500:600,cursor:m.id===selectedMethod?'default':'pointer',
                            borderRadius:8,display:'flex',alignItems:'center',gap:8,
                            opacity:m.id===selectedMethod?0.4:1,fontFamily:'inherit'
                          }}
                          onMouseEnter={e=>{if(m.id!==selectedMethod)e.currentTarget.style.background='#FEF3C7';}}
                          onMouseLeave={e=>{e.currentTarget.style.background=m.id===selectedMethod?'#F1F5F9':'transparent';}}
                        >
                          <span style={{fontSize:13}}>{m.id===selectedMethod?'📌':'📄'}</span>
                          <span>{m.label}</span>
                          {m.id===selectedMethod&&<span style={{fontSize:10,color:'var(--text-sm)',marginLeft:'auto'}}>(현재 공법)</span>}
                        </button>
                      ))}
                    </div>
                  ))}
                </div>
                {templateLoading && <div style={{padding:'16px 24px',textAlign:'center',fontSize:12,color:'var(--accent)',fontWeight:700}}>⏳ 콘텐츠 로드 중...</div>}
                <div style={{padding:'12px 24px 20px',borderTop:'1px solid var(--border)',textAlign:'right'}}>
                  <button onClick={()=>setTemplateModal(false)} style={{padding:'8px 20px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',color:'var(--text-md)',fontSize:12,fontWeight:600,cursor:'pointer'}}>닫기</button>
                </div>
                </>
              ) : (
                <>
                <div style={{padding:'20px 24px 16px',borderBottom:'1px solid var(--border)'}}>
                  <div style={{fontSize:16,fontWeight:800,color:'var(--navy)',marginBottom:4}}>📋 적용할 섹션 선택</div>
                  <div style={{fontSize:11,color:'var(--text-sm)',lineHeight:1.5}}>
                    <b>"{POUR_METHODS_FOR_EDITOR.find(m=>m.id===templateSource?.id)?.label}"</b>에서 어떤 섹션을 가져올지 선택하세요.
                  </div>
                </div>
                <div style={{padding:'20px 24px'}}>
                  {[
                    {key:'s2', label:'섹션 2 — 문제 원인', desc:'발생 원인 텍스트, 원인 영상/사진, 하자유형 사진, 기존 처리방식 사진'},
                    {key:'s3', label:'섹션 3 — POUR 해결방안', desc:'제안서 슬라이드, 해결방안 요약'},
                    {key:'s4', label:'섹션 4 — POUR 시공공정', desc:'공정순서, 사진, 자재, 핵심기술, 공법소개사진, 추가방안'},
                  ].map(sec=>(
                    <label key={sec.key} style={{
                      display:'flex',alignItems:'flex-start',gap:12,padding:'14px 16px',marginBottom:8,
                      borderRadius:12,border:templateSections[sec.key]?'2px solid var(--accent)':'2px solid var(--border)',
                      background:templateSections[sec.key]?'#EFF6FF':'#fff',cursor:'pointer',transition:'all .2s'
                    }}>
                      <input type="checkbox" checked={templateSections[sec.key]}
                        onChange={e=>setTemplateSections(prev=>({...prev,[sec.key]:e.target.checked}))}
                        style={{width:18,height:18,marginTop:2,accentColor:'var(--accent)',cursor:'pointer'}}/>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--navy)',marginBottom:3}}>{sec.label}</div>
                        <div style={{fontSize:11,color:'var(--text-sm)',lineHeight:1.4}}>{sec.desc}</div>
                      </div>
                    </label>
                  ))}
                </div>
                <div style={{padding:'12px 24px 20px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between'}}>
                  <button onClick={()=>{setTemplateStep('select');setTemplateSource(null);}} style={{padding:'8px 20px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',color:'var(--text-md)',fontSize:12,fontWeight:600,cursor:'pointer'}}>← 뒤로</button>
                  <button onClick={applyTemplate} disabled={!templateSections.s2&&!templateSections.s3&&!templateSections.s4}
                    style={{padding:'8px 24px',borderRadius:8,border:'none',
                      background:(!templateSections.s2&&!templateSections.s3&&!templateSections.s4)?'#94A3B8':'var(--accent)',
                      color:'#fff',fontSize:13,fontWeight:700,cursor:(!templateSections.s2&&!templateSections.s3&&!templateSections.s4)?'not-allowed':'pointer',
                      boxShadow:'0 2px 8px rgba(37,99,235,.3)'}}>
                    ✅ 선택 섹션 적용
                  </button>
                </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* 편집 본문 — 3섹션 스크롤 */}
        <div style={{flex:1, overflow:'auto', padding:20, background:'#F8FAFC'}}>
          <div style={{maxWidth:900, margin:'0 auto', display:'flex', flexDirection:'column', gap:20}}>

          {/* ═══════════════════════════════════════════
              섹션 1: 현장 하자사진 (공법분석 메뉴에서 관리)
          ═══════════════════════════════════════════ */}
          <div style={{borderRadius:14,border:'1px solid var(--border)',overflow:'hidden',background:'#fff',boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
            <div style={{
              padding:'14px 18px',background:'linear-gradient(90deg,rgba(220,38,38,.06),transparent)',
              display:'flex',alignItems:'center',gap:8
            }}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'var(--red)',flexShrink:0}}/>
              <span style={{fontSize:14,fontWeight:800,color:'var(--navy)',flex:1}}>1. 현장 하자사진</span>
              <span style={{fontSize:11,color:'var(--text-sm)',background:'#FEF3C7',padding:'2px 8px',borderRadius:4,fontWeight:600}}>AI 자동분류 적용예정</span>
            </div>
            <div style={{padding:'16px 18px',display:'flex',alignItems:'center',gap:12,background:'#F8FAFC',borderTop:'1px solid var(--border)'}}>

        const frameRef=React.createRef();
        const dragState={dragging:false,startX:0,startY:0,startPosX:posX,startPosY:posY};

        const updatePos=(px,py)=>{
          const x=Math.max(0,Math.min(100,px));
          const y=Math.max(0,Math.min(100,py));
          const arr=[...(content?.processPhotoPositions||[])];
          arr[cropModal.stepIdx]=`${Math.round(x)}% ${Math.round(y)}%`;
          setContent(prev=>({...prev,processPhotoPositions:arr}));
        };

        const onMouseDown=(e)=>{
          e.preventDefault();
          const frame=frameRef.current;
          if(!frame)return;
          const rect=frame.getBoundingClientRect();
          dragState.dragging=true;
          dragState.startX=e.clientX;
          dragState.startY=e.clientY;
          const curPos=(content?.processPhotoPositions||[])[cropModal.stepIdx]||'50% 50%';
          const [cx,cy]=curPos.split(' ').map(v=>parseFloat(v)||50);
          dragState.startPosX=cx;
          dragState.startPosY=cy;

          const onMove=(ev)=>{
            if(!dragState.dragging)return;
            const dx=ev.clientX-dragState.startX;
            const dy=ev.clientY-dragState.startY;
            const sensitivity=0.15;
            updatePos(dragState.startPosX-dx*sensitivity, dragState.startPosY-dy*sensitivity);
          };
          const onUp=()=>{
            dragState.dragging=false;
            document.removeEventListener('mousemove',onMove);
            document.removeEventListener('mouseup',onUp);
          };
          document.addEventListener('mousemove',onMove);
          document.addEventListener('mouseup',onUp);
        };

        const curPos=(content?.processPhotoPositions||[])[cropModal.stepIdx]||'50% 50%';

                  <div ref={frameRef}
                    onMouseDown={onMouseDown}
                    style={{
                      width:'100%',aspectRatio:'747/420',borderRadius:12,overflow:'hidden',
                      border:'3px dashed var(--green)',background:'#000',position:'relative',cursor:'grab',
                      userSelect:'none'
                    }}>
                    <img src={cropModal.photoUrl} style={{
                      width:'100%',height:'100%',objectFit:'cover',
                      objectPosition:curPos,
                      pointerEvents:'none',display:'block'
                    }} alt="crop preview"/>
                    {/* 오버레이 가이드 */}
                    <div style={{position:'absolute',inset:0,pointerEvents:'none',
                      background:'linear-gradient(rgba(5,150,105,.08),transparent,rgba(5,150,105,.08))'}}>
                      {/* 중앙 십자선 */}
                      <div style={{position:'absolute',top:'50%',left:0,right:0,height:1,background:'rgba(255,255,255,.3)'}}/>
                      <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:1,background:'rgba(255,255,255,.3)'}}/>
                    </div>
                    {/* 위치 표시 */}
                    <div style={{position:'absolute',bottom:8,right:8,padding:'4px 10px',borderRadius:6,
                      background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)',
                      fontSize:10,fontWeight:700,color:'#fff'}}>
                      {curPos}
                    </div>
                  </div>
                </div>

                {/* 빠른 위치 프리셋 */}
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {[
                    {label:'좌상',val:'0% 0%'},{label:'상단',val:'50% 0%'},{label:'우상',val:'100% 0%'},
                    {label:'좌측',val:'0% 50%'},{label:'중앙',val:'50% 50%'},{label:'우측',val:'100% 50%'},
                    {label:'좌하',val:'0% 100%'},{label:'하단',val:'50% 100%'},{label:'우하',val:'100% 100%'},
                  ].map(p=>(
                    <button key={p.val} onClick={()=>updatePos(parseFloat(p.val),parseFloat(p.val.split(' ')[1]))}
                      style={{
                        padding:'6px 14px',borderRadius:8,fontSize:11,fontWeight:600,cursor:'pointer',
                        border:curPos===p.val?'2px solid var(--green)':'1px solid var(--border)',
                        background:curPos===p.val?'var(--green-l)':'#fff',

                      }}>{p.label}</button>
                  ))}
                </div>
              </div>

              <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:8,background:'#F8FAFC'}}>
                <button onClick={()=>{updatePos(50,50);}} style={{
                  padding:'8px 16px',borderRadius:8,border:'1px solid var(--border)',
                  background:'#fff',color:'var(--text-md)',fontSize:12,fontWeight:600,cursor:'pointer'
                }}>초기화</button>
                <button onClick={()=>setCropModal(null)} style={{
                  padding:'8px 20px',borderRadius:8,border:'none',
                  background:'var(--green)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'
                }}>완료</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

            <div style={{padding:16, display:'flex', gap:16}}>

                <div style={{
                  width:'100%', aspectRatio:'4/3', borderRadius:8,
                  background:'#F1F5F9', border:'2px dashed #CBD5E1',

                    <iframe src={photoUrl} style={{width:'100%', height:'100%', border:'none'}} allowFullScreen />

                    <img src={photoUrl} style={{width:'100%', height:'100%', objectFit:'cover'}} alt={stepName} />

function CasePhotosEditor({ casePhotos, setCasePhotos, loaded, onReload, compressImageFile, showToast }) {
  const [selectedId, setSelectedId] = useState(CASE_PHOTO_METHODS[0].id);
  const [uploadingKey, setUploadingKey] = useState(null);

  if (!loaded) return (
    <div style={{textAlign:'center', padding:40}}>
      <div style={{fontSize:13, color:'var(--text-md)', marginBottom:12}}>Firebase에서 하자사진 데이터를 불러오는 중...</div>
      <button onClick={onReload} style={{padding:'8px 16px', borderRadius:8, border:'1px solid var(--border)', background:'#fff', fontSize:12, cursor:'pointer'}}>🔄 다시 불러오기</button>
    </div>
  );

  const methodData = casePhotos[selectedId] || { causes: [], completed: '', media: [] };
  const causes = methodData.causes || [];
  const media = methodData.media || (methodData.gif ? [methodData.gif] : []);
  const mediaThumbs = methodData.mediaThumbs || [];

  const updateCaseData = (key, updater) => {
    setCasePhotos(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[key]) next[key] = { causes: [], completed: '', media: [] };
      updater(next[key]);
      return next;
    });
  };

  const handleCauseUpload = async (file, idx) => {
    if (!file) return;
    setUploadingKey(`cause_${idx}`);
    try {
      const b64 = await compressImageFile(file, 480, 0.75);
      updateCaseData(selectedId, d => {
        if (!d.causes) d.causes = [];
        d.causes[idx] = b64;
      });
      showToast('하자사진 업로드 완료', 'success');
    } catch(e) { showToast('업로드 실패', 'error'); }
    setUploadingKey(null);
  };

  const handleCompletedUpload = async (file) => {
    if (!file) return;
    setUploadingKey('completed');
    try {
      const b64 = await compressImageFile(file, 600, 0.8);
      updateCaseData(selectedId, d => { d.completed = b64; });
      showToast('완공사진 업로드 완료', 'success');
    } catch(e) { showToast('업로드 실패', 'error'); }
    setUploadingKey(null);
  };

  const handleMediaUpload = async (file, idx) => {
    if (!file) return;
    setUploadingKey(`media_${idx}`);
    try {
      const b64 = await compressImageFile(file, 480, 0.75);
      updateCaseData(selectedId, d => {

  const selectedMethod = CASE_PHOTO_METHODS.find(m => m.id === selectedId);

                <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:4}}>

                      <div style={{fontSize:10, color:'var(--text-sm)'}}>완공사진</div>

                  )}

                <div style={{flex:1}}>
                  <input value={url || ''} placeholder={`YouTube/Drive/mp4 URL ${mi+1}`}
                    onChange={e => updateCaseData(selectedId, d => {
                      if (!d.media) d.media = [];

                    })}

                    <button onClick={() => document.getElementById(`media_file_${selectedId}_${mi}`)?.click()}
                      style={{padding:'4px 10px', borderRadius:6, border:'1px solid var(--border)', background:'#f3f4f6', fontSize:11, cursor:'pointer'}}>📁 이미지 업로드</button>
                    <button onClick={() => updateCaseData(selectedId, d => {
                      if (d.media) d.media.splice(mi, 1);
                      if (d.mediaThumbs) d.mediaThumbs.splice(mi, 1);
                    })} style={{padding:'4px 10px', borderRadius:6, border:'1px solid #FCA5A5', background:'#FEF2F2', color:'#DC2626', fontSize:11, cursor:'pointer'}}>✕ 제거</button>
                  </div>
                </div>
              </div>
              <input type="file" accept="image/*" id={`media_file_${selectedId}_${mi}`} style={{display:'none'}}
                onChange={e => handleMediaUpload(e.target.files[0], mi)} />

          ))}

            if (!d.media) d.media = [];
            d.media.push('');
            delete d.gif;
          })} style={{padding:'6px 14px', borderRadius:8, border:'1.5px dashed var(--accent)', background:'transparent', color:'var(--accent)', fontSize:12, fontWeight:600, cursor:'pointer'}}>+ 미디어 추가</button>
        </div>
      </div>
    </div>
  );
}

// ─── 공법 카드 사진 편집기 컴포넌트 ───
function ProbPhotosEditor({ probPhotos, setProbPhotos, loaded, onReload, compressImageFile, showToast }) {
  const [uploadingKey, setUploadingKey] = useState(null);

  if (!loaded) return (
    <div style={{textAlign:'center', padding:40}}>
      <div style={{fontSize:13, color:'var(--text-md)', marginBottom:12}}>Firebase에서 공법 카드 사진 데이터를 불러오는 중...</div>
      <button onClick={onReload} style={{padding:'8px 16px', borderRadius:8, border:'1px solid var(--border)', background:'#fff', fontSize:12, cursor:'pointer'}}>🔄 다시 불러오기</button>
    </div>
  );

  const handleUpload = async (file, methodId) => {
    if (!file) return;
    setUploadingKey(methodId);
    try {
      const b64 = await compressImageFile(file, 600, 0.8);
      setProbPhotos(prev => ({ ...prev, [methodId]: b64 }));
      showToast('카드 사진 업로드 완료', 'success');
    } catch(e) { showToast('업로드 실패', 'error'); }
    setUploadingKey(null);
  };

  return (
    <div>
      <div style={{marginBottom:12, padding:'8px 12px', background:'#F5F3FF', borderRadius:8, borderLeft:'4px solid #7C3AED'}}>
        <span style={{fontSize:12, fontWeight:700, color:'#5B21B6'}}>🏗 공법 선택 화면 카드 썸네일 편집</span>
        <div style={{fontSize:11, color:'#6D28D9', marginTop:2}}>각 공법 카드에 표시되는 대표 이미지입니다. 클릭하여 업로드하거나 URL을 직접 입력하세요.</div>
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:12}}>
        {CASE_PHOTO_METHODS.map(m => {
          const src = probPhotos[m.id] || '';
          return (
            <div key={m.id} style={{background:'#fff', borderRadius:10, border:'1px solid var(--border)', overflow:'hidden'}}>
              {/* 썸네일 */}
              <div style={{
                height:120, background:'#f0f1f3', cursor:'pointer', position:'relative', overflow:'hidden'
              }} onClick={() => document.getElementById(`prob_file_${m.id}`)?.click()}>
                {src ? (
                  <img src={src} style={{width:'100%', height:'100%', objectFit:'cover'}} alt={m.label} />
                ) : (
                  <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:4}}>
                    {uploadingKey === m.id ? (
                      <div style={{fontSize:11, color:'var(--text-sm)'}}>업로드 중...</div>
                    ) : (
                      <>
                        <div style={{fontSize:28}}>📷</div>
                        <div style={{fontSize:11, color:'var(--text-sm)'}}>클릭하여 업로드</div>
                      </>
                    )}
                  </div>
                )}
                {src && (
                  <button onClick={e => { e.stopPropagation(); setProbPhotos(prev => { const n = {...prev}; delete n[m.id]; return n; }); }} style={{
                    position:'absolute', top:4, right:4, width:20, height:20, borderRadius:'50%',
                    background:'rgba(220,38,38,.9)', color:'#fff', border:'none', fontSize:10,
                    cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'
                  }}>✕</button>
                )}
              </div>
              {/* 정보 */}
              <div style={{padding:'8px 10px'}}>
                <div style={{fontSize:11, fontWeight:700, color:'var(--text)', marginBottom:4}}>{m.label}</div>
                <div style={{fontSize:10, color:'var(--text-sm)', marginBottom:6}}>{m.cat}</div>
                <input type="text" value={src || ''}
                  onChange={e => setProbPhotos(prev => ({ ...prev, [m.id]: e.target.value }))}
                  placeholder="이미지 URL 직접 입력"
                  style={{width:'100%', padding:'5px 8px', borderRadius:6, border:'1px solid var(--border)', fontSize:10, boxSizing:'border-box', fontFamily:'inherit'}}
                />
              </div>
              <input type="file" accept="image/*" id={`prob_file_${m.id}`} style={{display:'none'}}
                onChange={e => handleUpload(e.target.files[0], m.id)} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

const DOC_TYPES=['시방서','제안서','카탈로그','인증서/시험성적서','특허','회사소개서','단가표','기타'];

function SalesDocsPage({showToast}){
  const [docs,setDocs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({title:'',docType:'시방서',category:'방수',description:'',file:null});
  const [uploading,setUploading]=useState(false);
  const [filterType,setFilterType]=useState('전체');

  const fetchDocs=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection(COLLECTIONS.SALES_DOCS).get();
      const arr=[];snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      arr.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
      console.log(`[sales-docs] ${arr.length}건 로드`);
      setDocs(arr);
    }catch(e){console.error('[sales-docs] 로드 실패:',e);}
    setLoading(false);
  };

  useEffect(()=>{fetchDocs();},[]);

  const save=async()=>{
    if(!form.title.trim()){showToast('제목을 입력하세요','error');return;}
    if(!form.file&&showForm==='new'){showToast('파일을 선택하세요','error');return;}
    setUploading(true);
    try{
      let fileUrl='',fileName='',fileSize=0;
      if(form.file){
        const path=`sales-docs/${Date.now()}_${form.file.name}`;
        const ref=storage.ref(path);
        await ref.put(form.file);
        fileUrl=await ref.getDownloadURL();
        fileName=form.file.name;
        fileSize=form.file.size;
      }
      const data={
        title:form.title,docType:form.docType,category:form.category,
        description:form.description,updatedAt:new Date().toISOString(),
      };
      if(fileUrl){data.fileUrl=fileUrl;data.fileName=fileName;data.fileSize=fileSize;}

      if(showForm==='new'){
        data.createdAt=new Date().toISOString();
        await db.collection(COLLECTIONS.SALES_DOCS).add(data);
        showToast('영업자료 등록 완료');
      }else{
        await db.collection(COLLECTIONS.SALES_DOCS).doc(showForm).update(data);
        showToast('수정 완료');
      }
      setShowForm(false);setForm({title:'',docType:'시방서',category:'방수',description:'',file:null});fetchDocs();
    }catch(e){console.error(e);showToast('저장 실패','error');}
    setUploading(false);
  };

  const deleteDoc=async(id)=>{
    if(!confirm('정말 삭제하시겠습니까?'))return;
    try{
      await db.collection(COLLECTIONS.SALES_DOCS).doc(id).delete();
      showToast('삭제 완료');fetchDocs();
    }catch(e){showToast('삭제 실패','error');}
  };

  const formatSize=(bytes)=>{if(!bytes)return'-';if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';return(bytes/1048576).toFixed(1)+'MB';};

  const filtered=filterType==='전체'?docs:docs.filter(d=>d.docType===filterType);

  const TYPE_ICONS={'시방서':'📋','제안서':'📄','카탈로그':'📘','인증서/시험성적서':'🏅','특허':'📜','회사소개서':'🏢','단가표':'💲','기타':'📎'};

  /* ── 등록/수정 모달 ── */
  const FormModal=()=>(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setShowForm(false)}>
      <div style={{background:'#fff',borderRadius:16,padding:24,width:'min(440px,90vw)',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>{showForm==='new'?'영업자료 등록':'영업자료 수정'}</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>제목 *</label>
            <input style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none'}} value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="POUR 듀얼강화방수 시방서"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>자료유형</label>

                {DOC_TYPES.map(t=><option key={t} value={t}>{t}</option>)}

            <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>분류</label>
              <select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff'}} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                {['방수','도장','보수/보강','토목','공통'].map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>

          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>설명 (선택)</label>
