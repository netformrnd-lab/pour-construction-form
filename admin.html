            <input type="file" onChange={e=>setForm({...form,file:e.target.files[0]||null})} style={{fontSize:12}}/></div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:20}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
          <button onClick={save} disabled={uploading} style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'var(--blue)',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',color:'#fff',opacity:uploading?0.6:1}}>{uploading?'업로드 중...':'저장'}</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800}}>📎 영업자료 관리</div>
          <div style={{fontSize:12,color:'var(--text-sm)',marginTop:4}}>총 {docs.length}건</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={fetchDocs} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>🔄</button>
          <button onClick={()=>{setForm({title:'',docType:'시방서',category:'방수',description:'',file:null});setShowForm('new');}} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'var(--blue)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>+ 자료 등록</button>
        </div>
      </div>

      {/* 필터 탭 */}
      <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
        {['전체',...DOC_TYPES].map(t=>(
          <button key={t} onClick={()=>setFilterType(t)} style={{padding:'6px 14px',borderRadius:20,border:`1.5px solid ${filterType===t?'var(--blue)':'var(--border)'}`,background:filterType===t?'var(--blue)':'#fff',color:filterType===t?'#fff':'var(--text-md)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>{t}</button>
        ))}
      </div>

      {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>
      :filtered.length===0?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>등록된 자료가 없습니다</div>
      :<div style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{background:'var(--bg)'}}>
            {['','제목','유형','분류','크기','등록일',''].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontWeight:700,color:'var(--text-md)',fontSize:12,borderBottom:'1px solid var(--border)'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {filtered.map(d=>(
              <tr key={d.id} style={{borderBottom:'1px solid var(--border-s)'}}>
                <td style={{padding:'10px 14px',fontSize:20}}>{TYPE_ICONS[d.docType]||'📎'}</td>
                <td style={{padding:'10px 14px',fontWeight:600}}>{d.title}</td>
                <td style={{padding:'10px 14px',color:'var(--text-md)'}}>{d.docType}</td>
                <td style={{padding:'10px 14px'}}><span style={{padding:'3px 8px',borderRadius:6,background:'var(--blue-l)',color:'var(--blue)',fontSize:11,fontWeight:600}}>{d.category}</span></td>
                <td style={{padding:'10px 14px',color:'var(--text-sm)',fontSize:12}}>{formatSize(d.fileSize)}</td>
                <td style={{padding:'10px 14px',color:'var(--text-sm)',fontSize:12}}>{d.createdAt?new Date(d.createdAt).toLocaleDateString('ko'):'-'}</td>
                <td style={{padding:'10px 14px'}}>
                  <div style={{display:'flex',gap:6}}>
                    {d.fileUrl&&<a href={d.fileUrl} target="_blank" rel="noopener" style={{padding:'4px 10px',borderRadius:6,background:'var(--blue)',color:'#fff',fontSize:11,fontWeight:600,textDecoration:'none'}}>다운로드</a>}
                    <button onClick={()=>{setForm({title:d.title,docType:d.docType,category:d.category,description:d.description||'',file:null});setShowForm(d.id);}} style={{padding:'4px 10px',borderRadius:6,border:'1px solid var(--border)',background:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>수정</button>
                    <button onClick={()=>deleteDoc(d.id)} style={{padding:'4px 10px',borderRadius:6,border:'1px solid #FEE2E2',background:'#FEF2F2',color:'#DC2626',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>}

      {showForm&&<FormModal/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   박람회 전용 대시보드 + 리드 관리
   ══════════════════════════════════════════════════════════════ */
function ExpoLeadsPage({showToast,onNavigate}){
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard'); // dashboard | kanban | list
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const [bulkSelected,setBulkSelected]=useState(new Set());
  const [filterStatus,setFilterStatus]=useState('전체');

  const fetchLeads=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection('leads').get();
      let arr=[];
      snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      /* 박람회 소스만 필터 (source 없는 기존 데이터는 박람회로 간주) */
      arr=arr.filter(l=>(!l.source||['expo','exhibition','tablet','박람회','qr',''].includes(l.source))&&!l.deletedAt);
      arr.sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
      console.log(`[expo] 박람회 리드: ${arr.length}건`);
      setLeads(arr);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  useEffect(()=>{fetchLeads();},[]);

  const updateStatus=async(id,newStatus)=>{
    try{
      await db.collection('leads').doc(id).update({status:newStatus,updatedAt:new Date().toISOString()});
      setLeads(prev=>prev.map(l=>l.id===id?{...l,status:newStatus}:l));
      if(selected?.id===id)setSelected(prev=>({...prev,status:newStatus}));
      showToast(`${newStatus}(으)로 변경됨`);
    }catch(e){showToast('상태 변경 실패','error');}
  };

  const deleteLead=async(id)=>{
    if(!confirm('휴지통으로 이동하시겠습니까?'))return;
    try{
      const deletedAt=new Date().toISOString();
      await db.collection('leads').doc(id).update({deletedAt});
      setLeads(prev=>prev.map(l=>l.id===id?{...l,deletedAt}:l));
      setSelected(null);showToast('휴지통으로 이동됨');
    }catch(e){showToast('삭제 실패','error');}
  };
  const deleteSelectedLeads=async(ids)=>{
    if(!ids.size)return;
    if(!confirm(`선택한 ${ids.size}건을 휴지통으로 이동하시겠습니까?`))return;
    try{
      const deletedAt=new Date().toISOString();
      await Promise.all([...ids].map(id=>db.collection('leads').doc(id).update({deletedAt})));
      setLeads(prev=>prev.map(l=>ids.has(l.id)?{...l,deletedAt}:l));
      showToast(`${ids.size}건을 휴지통으로 이동했습니다`);
    }catch(e){showToast('삭제 실패','error');}
  };
  const restoreLead=async(id)=>{
    try{
      await db.collection('leads').doc(id).update({deletedAt:firebase.firestore.FieldValue.delete()});
      setLeads(prev=>prev.map(l=>{if(l.id!==id)return l;const{deletedAt,...rest}=l;return rest;}));
      showToast('복원 완료');
    }catch(e){showToast('복원 실패','error');}
  };

  const byStatus=(s)=>leads.filter(l=>(l.status||'신규')===s);
  const filtered=leads.filter(l=>{if(!search.trim())return true;const s=search.toLowerCase();return(l.name||'').toLowerCase().includes(s)||(l.phone||'').includes(s)||(l.building||'').toLowerCase().includes(s);});
  const formatDate=(d)=>{if(!d)return'-';const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}`};

  const todayStr=new Date().toISOString().slice(0,10);
  const todayLeads=leads.filter(l=>l.savedAt&&l.savedAt.startsWith(todayStr));
  const staffMap={};leads.forEach(l=>{if(l.staff){staffMap[l.staff]=(staffMap[l.staff]||0)+1;}});
  const staffRank=Object.entries(staffMap).sort((a,b)=>b[1]-a[1]);
  const buildingMap={};leads.forEach(l=>{if(l.building){buildingMap[l.building]=(buildingMap[l.building]||0)+1;}});
  const buildingRank=Object.entries(buildingMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  /* 상세 모달 */
  const DetailModal=()=>{
    if(!selected)return null;const l=selected;
    return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setSelected(null)}>
      <div style={{background:'#fff',borderRadius:16,padding:24,width:'min(440px,90vw)',maxHeight:'80vh',overflowY:'auto',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:800}}>{l.name||'이름없음'}</div>
          <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--text-sm)'}}>✕</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          {[{k:'전화',v:l.phone},{k:'이메일',v:l.email},{k:'건물',v:l.building},{k:'직급',v:l.position},{k:'하자',v:Array.isArray(l.problems)?l.problems.join(', '):l.problem},{k:'접수일',v:l.savedAt?new Date(l.savedAt).toLocaleDateString('ko'):'-'},{k:'담당자',v:l.staff},{k:'출처',v:l.source||'박람회'},{k:'희망착공',v:l.desiredStartDate||'-'},{k:'자료기한',v:l.docDeadline||'-'}].map(({k,v})=>v&&v!=='-'?(<div key={k} style={{padding:'8px 10px',background:'var(--bg)',borderRadius:8}}><div style={{fontSize:11,color:'var(--text-sm)',marginBottom:2}}>{k}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>):null)}
        </div>
        {l.memo&&<div style={{padding:10,background:'var(--bg)',borderRadius:8,marginBottom:16}}><div style={{fontSize:11,color:'var(--text-sm)',marginBottom:4}}>메모</div><div style={{fontSize:13,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{l.memo}</div></div>}
        {l.remark&&<div style={{padding:10,background:'#FFFBEB',borderRadius:8,marginBottom:16,border:'1px solid #FDE68A'}}><div style={{fontSize:11,color:'#92400E',marginBottom:4}}>비고</div><div style={{fontSize:13,lineHeight:1.5,whiteSpace:'pre-wrap',color:'#78350F'}}>{l.remark}</div></div>}
        {l.actions&&l.actions.length>0&&<div style={{marginBottom:16}}><div style={{fontSize:11,color:'var(--text-sm)',marginBottom:6}}>후속 조치</div><div style={{display:'flex',flexWrap:'wrap',gap:4}}>{l.actions.map((a,i)=><span key={i} style={{padding:'4px 8px',borderRadius:6,background:'var(--orange-l)',color:'var(--orange)',fontSize:11,fontWeight:600}}>{a}</span>)}</div></div>}
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:8}}>상태 변경</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
          {PIPELINE_STAGES.map(s=>(<button key={s} onClick={()=>updateStatus(l.id,s)} style={{padding:'7px 14px',borderRadius:8,border:`1.5px solid ${(l.status||'신규')===s?PIPELINE_COLORS[s]:'var(--border)'}`,background:(l.status||'신규')===s?PIPELINE_COLORS[s]:'#fff',color:(l.status||'신규')===s?'#fff':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{s}</button>))}
        </div>
        <button onClick={()=>deleteLead(l.id)} style={{width:'100%',padding:'10px 0',borderRadius:8,border:'1.5px solid #FEE2E2',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🗑 삭제</button>
      </div>
    </div>);
  };

  if(loading)return <div style={{textAlign:'center',padding:80,color:'var(--text-sm)'}}>로딩 중...</div>;

  return(
    <div style={{animation:'fadeIn .3s ease',maxWidth:1100}}>
      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:28}}>🎪</span>
          <div>
            <div style={{fontSize:20,fontWeight:800}}>박람회 영업 관리</div>
            <div style={{fontSize:12,color:'var(--text-sm)'}}>아웃바운드 · 오프라인 대면 상담</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[['dashboard','📊 대시보드'],['kanban','📋 칸반'],['list','📋 전체목록']].map(([v,label])=>(
            <button key={v} onClick={()=>{setView(v);setBulkSelected(new Set());}} style={{padding:'8px 14px',borderRadius:8,border:'1.5px solid var(--border)',background:view===v?'var(--orange)':'#fff',color:view===v?'#fff':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{label}</button>
          ))}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색" style={{padding:'8px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:12,width:140,outline:'none',fontFamily:'inherit'}}/>
          <button onClick={fetchLeads} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>🔄</button>
        </div>
      </div>

      {view==='dashboard'?(
        <>
          {/* ── 통계 카드 ── */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:20}}>
            {[{label:'전체',value:leads.length,color:'#1E293B'},{label:'오늘',value:todayLeads.length,color:'#E8780F'},{label:'신규',value:byStatus('신규').length,color:'#DC2626'},{label:'상담중',value:byStatus('상담중').length,color:'#D97706'},{label:'계약완료',value:byStatus('계약완료').length,color:'#059669'}].map(c=>(
              <div key={c.label} style={{background:'#fff',borderRadius:12,padding:'18px 16px',boxShadow:'0 2px 8px rgba(0,0,0,.04)',borderLeft:`4px solid ${c.color}`}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text-md)',marginBottom:6}}>{c.label}</div>
                <div style={{fontSize:26,fontWeight:900,color:c.color}}>{c.value}</div>
              </div>
            ))}
          </div>

          {/* ── 전환율 카드 ── */}
          {(()=>{
            const total=leads.length||1;
            const consulting=byStatus('상담중').length;
            const quote=byStatus('견적제출').length;
            const contract=byStatus('계약완료').length+byStatus('계약예정').length;
            const convRate=Math.round(contract/total*100);
            const contactRate=Math.round((leads.filter(l=>l.phone||l.email).length)/total*100);
            return(
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                {[{label:'연락처 확보율',value:`${contactRate}%`,sub:`${leads.filter(l=>l.phone||l.email).length}/${leads.length}`,color:'#2563EB'},
                  {label:'상담 전환율',value:`${Math.round(consulting/total*100)}%`,sub:`신규→상담중`,color:'#D97706'},
                  {label:'견적 전환율',value:`${Math.round(quote/total*100)}%`,sub:`상담→견적`,color:'#7C3AED'},
                  {label:'계약 전환율',value:`${convRate}%`,sub:`전체→계약`,color:'#059669'}
                ].map(c=>(
                  <div key={c.label} style={{background:'#fff',borderRadius:12,padding:'16px',boxShadow:'0 2px 8px rgba(0,0,0,.04)',textAlign:'center'}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text-md)',marginBottom:8}}>{c.label}</div>
                    <div style={{fontSize:28,fontWeight:900,color:c.color}}>{c.value}</div>
                    <div style={{fontSize:10,color:'var(--text-sm)',marginTop:4}}>{c.sub}</div>
                  </div>
                ))}
              </div>
            );
          })()}

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
            {/* ── 파이프라인 현황 ── */}
            <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📊 파이프라인 현황</div>
              {PIPELINE_STAGES.map(s=>{const cnt=byStatus(s).length;const pct=leads.length?Math.round(cnt/leads.length*100):0;return(
                <div key={s} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                    <span style={{fontWeight:600}}>{s}</span><span style={{color:'var(--text-sm)'}}>{cnt}건 ({pct}%)</span>
                  </div>
                  <div style={{height:6,borderRadius:3,background:'var(--border-s)'}}>
                    <div style={{height:'100%',borderRadius:3,background:PIPELINE_COLORS[s],width:`${pct}%`,transition:'width .3s'}}/>
                  </div>
                </div>
              );})}
            </div>

            {/* ── 담당자별 실적 ── */}
            <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>👤 담당자별 실적</div>
              {staffRank.length===0?<div style={{color:'var(--text-sm)',fontSize:13,padding:20,textAlign:'center'}}>데이터 없음</div>
              :staffRank.map(([name,cnt],i)=>(
                <div key={name} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<staffRank.length-1?'1px solid var(--border-s)':'none'}}>
                  <span style={{width:22,height:22,borderRadius:'50%',background:i===0?'var(--orange)':i===1?'#D97706':'var(--border)',color:i<2?'#fff':'var(--text-sm)',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{i+1}</span>
                  <span style={{flex:1,fontSize:13,fontWeight:600}}>{name}</span>
                  <span style={{fontSize:14,fontWeight:800,color:'var(--orange)'}}>{cnt}건</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
            {/* ── 건물유형 분포 ── */}
            <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>🏢 건물유형 분포</div>
              {buildingRank.length===0?<div style={{color:'var(--text-sm)',fontSize:13,padding:20,textAlign:'center'}}>데이터 없음</div>
              :buildingRank.map(([name,cnt])=>{const pct=leads.length?Math.round(cnt/leads.length*100):0;return(
                <div key={name} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0'}}>
                  <span style={{flex:1,fontSize:13,fontWeight:600}}>{name}</span>
                  <div style={{width:80,height:5,borderRadius:3,background:'var(--border-s)'}}>
                    <div style={{height:'100%',borderRadius:3,background:'#2563EB',width:`${pct}%`}}/>
                  </div>
                  <span style={{fontSize:12,color:'var(--text-sm)',minWidth:55,textAlign:'right'}}>{cnt}건 ({pct}%)</span>
                </div>
              );})}
            </div>

            {/* ── 하자(공법) 유형 분포 ── */}
            {(()=>{
              const probMap={};
              leads.forEach(l=>{
                const ps=Array.isArray(l.problems)?l.problems:(l.problem?[l.problem]:[]);
                ps.forEach(p=>{probMap[p]=(probMap[p]||0)+1;});
              });
              const probRank=Object.entries(probMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
              return(
                <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>⚡ 하자유형 TOP</div>
                  {probRank.length===0?<div style={{color:'var(--text-sm)',fontSize:13,padding:20,textAlign:'center'}}>데이터 없음</div>
                  :probRank.map(([name,cnt],i)=>{const pct=leads.length?Math.round(cnt/leads.length*100):0;return(
                    <div key={name} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',fontSize:12}}>
                      <span style={{fontWeight:700,color:i<3?'var(--orange)':'var(--text-sm)',minWidth:16}}>{i+1}</span>
                      <span style={{flex:1,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
                      <span style={{color:'var(--text-sm)'}}>{cnt}건</span>
                    </div>
                  );})}
                </div>
              );
            })()}
          </div>

          {/* ── 상담 메모 키워드 분석 ── */}
          {(()=>{
            const allMemos=leads.map(l=>l.memo||'').filter(m=>m.trim()).join(' ');
            const stopWords=new Set(['의','가','이','은','는','을','를','에','로','으로','와','과','도','만','까지','부터','에서','한','할','하고','있다','없다','된','들','것','수','등','그','더','좀','잘','안','못','또','및','중','후','때','위','위해','대한','통해','관련','대해']);

            // 단어 추출 (2글자 이상)
            const words=allMemos.replace(/[^가-힣a-zA-Z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>=2&&!stopWords.has(w));
            const wordMap={};words.forEach(w=>{wordMap[w]=(wordMap[w]||0)+1;});
            const wordRank=Object.entries(wordMap).sort((a,b)=>b[1]-a[1]);

            // 키워드 분류
            const positiveWords=['만족','좋','감사','관심','긍정','원','필요','희망','기대','요청','원합','빠른','급','추천','의뢰','계약','진행'];
            const negativeWords=['불만','심각','누수','균열','파손','피해','손상','위험','긴급','문제','하자','고장','노후','침수','탈락','벗겨','부식'];
            const positiveFound=wordRank.filter(([w])=>positiveWords.some(pw=>w.includes(pw))).slice(0,10);
            const negativeFound=wordRank.filter(([w])=>negativeWords.some(nw=>w.includes(nw))).slice(0,10);
            const topKeywords=wordRank.slice(0,15);

            const memoCount=leads.filter(l=>l.memo&&l.memo.trim()).length;
            const memoRate=leads.length?Math.round(memoCount/leads.length*100):0;

            return(
              <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,.04)',marginBottom:20}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                  <div style={{fontSize:14,fontWeight:700}}>💬 상담 메모 키워드 분석</div>
                  <span style={{fontSize:11,color:'var(--text-sm)'}}>메모 작성률: <b style={{color:'var(--orange)'}}>{memoRate}%</b> ({memoCount}/{leads.length})</span>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
                  {/* 잦은 키워드 */}
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:10,display:'flex',alignItems:'center',gap:4}}>🔤 잦은 키워드</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                      {topKeywords.length===0?<span style={{fontSize:12,color:'var(--text-sm)'}}>메모 데이터 없음</span>
                      :topKeywords.map(([w,cnt])=>(
                        <span key={w} style={{padding:'4px 10px',borderRadius:8,background:'var(--border-s)',color:'var(--text)',fontSize:11,fontWeight:600}}>{w} <span style={{color:'var(--text-sm)'}}>{cnt}</span></span>
                      ))}
                    </div>
                  </div>

                  {/* 긍정 키워드 */}
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:'#059669',marginBottom:10,display:'flex',alignItems:'center',gap:4}}>😊 긍정 키워드</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                      {positiveFound.length===0?<span style={{fontSize:12,color:'var(--text-sm)'}}>해당 없음</span>
                      :positiveFound.map(([w,cnt])=>(
                        <span key={w} style={{padding:'4px 10px',borderRadius:8,background:'#ECFDF5',color:'#059669',fontSize:11,fontWeight:600}}>{w} <span style={{opacity:.6}}>{cnt}</span></span>
                      ))}
                    </div>
                  </div>

                  {/* 부정 키워드 */}
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:'#DC2626',marginBottom:10,display:'flex',alignItems:'center',gap:4}}>😟 부정/하자 키워드</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                      {negativeFound.length===0?<span style={{fontSize:12,color:'var(--text-sm)'}}>해당 없음</span>
                      :negativeFound.map(([w,cnt])=>(
                        <span key={w} style={{padding:'4px 10px',borderRadius:8,background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:600}}>{w} <span style={{opacity:.6}}>{cnt}</span></span>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ── 최근 리드 ── */}
          <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,.04)',marginBottom:20}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📋 최근 상담 리드</div>
            {leads.slice(0,8).map(l=>(
              <div key={l.id} onClick={()=>setSelected(l)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 4px',borderBottom:'1px solid var(--border-s)',cursor:'pointer',fontSize:13}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:PIPELINE_COLORS[l.status||'신규'],flexShrink:0}}/>
                <span style={{fontWeight:600,flex:1}}>{l.name||'-'}</span>
                <span style={{color:'var(--text-sm)',fontSize:11}}>{l.building||''}</span>
                <span style={{padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,background:(PIPELINE_COLORS[l.status||'신규'])+'18',color:PIPELINE_COLORS[l.status||'신규']}}>{l.status||'신규'}</span>
                <span style={{color:'var(--text-sm)',fontSize:11}}>{formatDate(l.savedAt)}</span>
              </div>
            ))}
          </div>
        </>
      ):(
        /* ── 칸반 뷰 ── */
        view==='kanban'?(
        <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16,minHeight:'calc(100vh - 200px)'}}>
          {PIPELINE_STAGES.map(stage=>{
            const items=(search.trim()?filtered:leads).filter(l=>(l.status||'신규')===stage);
            return(
              <div key={stage} style={{minWidth:240,maxWidth:280,flex:'0 0 240px',background:'var(--bg)',borderRadius:12,padding:12}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'0 4px'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:PIPELINE_COLORS[stage]}}/>
                  <div style={{fontSize:13,fontWeight:800}}>{stage}</div>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',background:'var(--border-s)',borderRadius:10,padding:'2px 8px'}}>{items.length}</div>
                </div>
                {items.map(l=>(
                  <div key={l.id} onClick={()=>setSelected(l)} style={{padding:'12px 14px',background:'#fff',borderRadius:10,border:'1px solid var(--border-s)',cursor:'pointer',marginBottom:8,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                      <span style={{fontSize:14,fontWeight:700}}>{l.name||'이름없음'}</span>
                      <span style={{fontSize:10,color:'var(--text-sm)'}}>{formatDate(l.savedAt)}</span>
                    </div>
                    {l.building&&<div style={{fontSize:12,color:'var(--text-md)',marginBottom:3}}>🏢 {l.building}</div>}
                    {l.staff&&<div style={{fontSize:11,color:'var(--orange)',fontWeight:600}}>👤 {l.staff}</div>}
                  </div>
                ))}
                {items.length===0&&<div style={{textAlign:'center',padding:20,fontSize:12,color:'var(--text-sm)'}}>없음</div>}
              </div>
            );
          })}
        </div>
        ):(
        /* ── 전체 목록 뷰 (일괄 관리) ── */
        (()=>{
          const listData=(search.trim()?filtered:leads).filter(l=>filterStatus==='전체'||(l.status||'신규')===filterStatus);
          const allChecked=listData.length>0&&listData.every(l=>bulkSelected.has(l.id));
          const toggleAll=()=>{
            if(allChecked)setBulkSelected(new Set());
            else setBulkSelected(new Set(listData.map(l=>l.id)));
          };
          const toggleOne=(id)=>{
            setBulkSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
          };
          return(
            <div style={{background:'#fff',borderRadius:12,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,.04)'}}>
              {/* 필터 + 일괄 액션 바 */}
              <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border-s)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <div style={{display:'flex',gap:6}}>
                  {['전체',...PIPELINE_STAGES].map(s=>(
                    <button key={s} onClick={()=>setFilterStatus(s)} style={{padding:'4px 10px',borderRadius:20,border:'none',background:filterStatus===s?(PIPELINE_COLORS[s]||'var(--navy)'):'var(--bg)',color:filterStatus===s?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer'}}>{s}</button>
                  ))}
                </div>
                <span style={{fontSize:12,color:'var(--text-sm)',marginLeft:'auto'}}>{listData.length}건</span>
                {bulkSelected.size>0&&(
                  <button onClick={()=>deleteSelectedLeads(bulkSelected).then(()=>setBulkSelected(new Set()))}
                    style={{padding:'6px 16px',borderRadius:8,border:'none',background:'#DC2626',color:'#fff',fontSize:12,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
                    🗑 선택 {bulkSelected.size}건 휴지통
                  </button>
                )}
              </div>
              {/* 테이블 헤더 */}
              <div style={{display:'grid',gridTemplateColumns:'36px 1fr 90px 80px 90px 80px 90px',gap:0,padding:'8px 14px',background:'var(--bg)',fontSize:11,fontWeight:700,color:'var(--text-sm)',borderBottom:'1px solid var(--border-s)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <input type="checkbox" checked={allChecked} onChange={toggleAll} style={{width:15,height:15,cursor:'pointer'}}/>
                </div>
                <div>이름 / 건물유형</div><div>담당자</div><div>날짜</div><div>상태</div><div>전화</div><div>하자유형</div>
              </div>
              {/* 테이블 바디 */}
              {listData.length===0&&<div style={{padding:40,textAlign:'center',color:'var(--text-sm)',fontSize:13}}>조건에 맞는 리드가 없습니다</div>}
              {listData.map(l=>(
                <div key={l.id} style={{display:'grid',gridTemplateColumns:'36px 1fr 90px 80px 90px 80px 90px',gap:0,padding:'10px 14px',borderBottom:'1px solid var(--border-s)',fontSize:12,alignItems:'center',background:bulkSelected.has(l.id)?'#EFF6FF':'#fff',cursor:'default'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <input type="checkbox" checked={bulkSelected.has(l.id)} onChange={()=>toggleOne(l.id)} style={{width:15,height:15,cursor:'pointer'}} onClick={e=>e.stopPropagation()}/>
                  </div>
                  <div style={{cursor:'pointer'}} onClick={()=>setSelected(l)}>
                    <div style={{fontWeight:700,color:'var(--text)'}}>{l.name||'이름없음'}</div>
                    <div style={{fontSize:11,color:'var(--text-sm)',marginTop:1}}>{l.building||'-'}</div>
                  </div>
                  <div style={{fontSize:11,color:'var(--text-md)'}}>{l.staff||'-'}</div>
                  <div style={{fontSize:11,color:'var(--text-sm)'}}>{formatDate(l.savedAt)}</div>
                  <div><span style={{padding:'3px 8px',borderRadius:8,fontSize:10,fontWeight:700,background:(PIPELINE_COLORS[l.status||'신규'])+'20',color:PIPELINE_COLORS[l.status||'신규']}}>{l.status||'신규'}</span></div>
                  <div style={{fontSize:11,color:'var(--text-sm)'}}>{l.phone||'-'}</div>
                  <div style={{fontSize:11,color:'var(--text-sm)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{Array.isArray(l.problems)?l.problems.slice(0,2).join(', '):l.problem||'-'}</div>
                </div>
              ))}
            </div>
          );
        })()
        )
      )}

      <DetailModal/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   공신력 수치 관리 — site-metrics/current
   ══════════════════════════════════════════════════════════════ */
const METRICS_FIELDS=[
  {key:'totalUnits',labelKey:'totalUnitsLabel',icon:'🏘',name:'시공 세대수',unit:'세대',placeholder:'2600000',labelPlaceholder:'260만 세대'},
  {key:'patents',labelKey:'patentsLabel',icon:'📜',name:'특허/인증',unit:'개',placeholder:'70',labelPlaceholder:'70여 개'},
  {key:'partners',labelKey:'partnersLabel',icon:'🤝',name:'파트너사',unit:'곳',placeholder:'250',labelPlaceholder:'250여 곳'},
  {key:'totalArea',labelKey:'totalAreaLabel',icon:'📐',name:'시공 면적',unit:'㎡',placeholder:'1500000',labelPlaceholder:'150만 ㎡'},
  {key:'products',labelKey:'productsLabel',icon:'📦',name:'제품 수',unit:'개',placeholder:'110',labelPlaceholder:'110여 개+'},
  {key:'cooperatives',labelKey:'cooperativesLabel',icon:'🏢',name:'협력사',unit:'곳',placeholder:'250',labelPlaceholder:'250여 곳'},
];

function MetricsPage({showToast}){
  const [form,setForm]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{
        const doc=await db.collection(COLLECTIONS.SITE_METRICS).doc('current').get();
        const data=doc.exists?doc.data():{};
        const init={};
        METRICS_FIELDS.forEach(f=>{
          init[f.key]=data[f.key]!==undefined?String(data[f.key]):'';
          init[f.labelKey]=data[f.labelKey]||'';
        });
        setForm(init);
        if(data.updatedAt)setLastUpdated(data.updatedAt);
      }catch(e){console.error('[site-metrics] 로드 실패:',e);showToast('데이터 로드 실패','error');}
      setLoading(false);
    })();
  },[]);

  const save=async()=>{
    if(!form)return;
    setSaving(true);
    try{
      const data={updatedAt:new Date().toISOString()};
      METRICS_FIELDS.forEach(f=>{
        const v=parseInt(form[f.key],10);
        if(!isNaN(v))data[f.key]=v;
        data[f.labelKey]=form[f.labelKey]||'';
      });
      await db.collection(COLLECTIONS.SITE_METRICS).doc('current').set(data,{merge:true});
      setLastUpdated(data.updatedAt);
      showToast('공신력 수치 저장 완료 — 3개 사이트에 즉시 반영됩니다');
    }catch(e){console.error('[site-metrics] 저장 실패:',e);showToast('저장 실패','error');}
    setSaving(false);
  };

  if(loading)return <div style={{textAlign:'center',padding:80,color:'var(--text-sm)'}}>로딩 중...</div>;

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:14,fontFamily:'inherit',outline:'none',boxSizing:'border-box'};
  const labelStyle={fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5,display:'block'};

  return(
    <div style={{animation:'fadeIn .3s ease',maxWidth:820}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800}}>📊 공신력 수치 관리</div>
          <div style={{fontSize:12,color:'var(--text-sm)',marginTop:4}}>
            POUR솔루션 · POUR공법 · POUR스토어 3개 사이트에 실시간 반영됩니다
          </div>
          {lastUpdated&&<div style={{fontSize:11,color:'var(--text-sm)',marginTop:2}}>
            마지막 저장: {new Date(lastUpdated).toLocaleString('ko')}
          </div>}
        </div>
        <button onClick={save} disabled={saving}
          style={{padding:'10px 24px',borderRadius:10,border:'none',background:'var(--accent)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',opacity:saving?0.6:1}}>
          {saving?'저장 중...':'💾 저장하기'}
        </button>
      </div>

      {/* 안내 배너 */}
      <div style={{background:'#EFF6FF',border:'1.5px solid #BFDBFE',borderRadius:10,padding:'12px 16px',marginBottom:20,display:'flex',gap:10,alignItems:'flex-start'}}>
        <span style={{fontSize:18,flexShrink:0}}>ℹ️</span>
        <div style={{fontSize:13,color:'#1E40AF',lineHeight:1.6}}>
          <strong>표시 텍스트</strong>는 웹사이트에서 그대로 표시됩니다 (예: "260만 세대").<br/>
          <strong>실제 값</strong>은 내부 집계·API에 사용됩니다. 표시 텍스트만 변경해도 됩니다.
        </div>
      </div>

      {/* 수치 카드 그리드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        {METRICS_FIELDS.map(f=>(
          <div key={f.key} style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'var(--shadow)',border:'1px solid var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <span style={{fontSize:24}}>{f.icon}</span>
              <div style={{fontSize:14,fontWeight:800,color:'var(--text)'}}>{f.name}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <label style={labelStyle}>실제 값 ({f.unit})</label>
                <input type="number" style={inputStyle}
                  value={form?.[f.key]||''} placeholder={f.placeholder}
                  onChange={e=>setForm(prev=>({...prev,[f.key]:e.target.value}))}/>
              </div>
              <div>
                <label style={labelStyle}>표시 텍스트</label>
                <input type="text" style={inputStyle}
                  value={form?.[f.labelKey]||''} placeholder={f.labelPlaceholder}
                  onChange={e=>setForm(prev=>({...prev,[f.labelKey]:e.target.value}))}/>
              </div>
            </div>
            {/* 미리보기 */}
            <div style={{marginTop:10,padding:'8px 12px',background:'var(--bg)',borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>미리보기</span>
              <span style={{fontSize:18,fontWeight:900,color:'var(--accent)'}}>
                {form?.[f.labelKey]||form?.[f.key]||'-'}
              </span>
              <span style={{fontSize:11,color:'var(--text-sm)'}}>{f.name}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 하단 저장 버튼 */}
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:20}}>
        <button onClick={save} disabled={saving}
          style={{padding:'12px 32px',borderRadius:10,border:'none',background:'var(--accent)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',opacity:saving?0.6:1}}>
          {saving?'저장 중...':'💾 공신력 수치 저장'}
        </button>
      </div>
    </div>
  );
}

  const LINK_FIELDS=[
    {key:'specUrl',label:'시방서',icon:'📋',color:'#2563EB'},
    {key:'proposalUrl',label:'제안서',icon:'📄',color:'#7C3AED'},
    {key:'guideUrl',label:'시공가이드',icon:'📘',color:'#059669'},

  useEffect(()=>{
    (async()=>{
      try{
        const snap=await db.collection(COLLECTIONS.METHOD_LINKS).get();
        if(snap.empty){
          // Firestore에 데이터 없으면 기본값 사용
          setLinks(DEFAULT_LINKS);
        }else{
          const loaded=snap.docs.map(d=>({id:d.id,...d.data()}));
          // 기본 목록에 없는 항목도 유지하면서 병합
          const merged=DEFAULT_LINKS.map(dl=>{
            const found=loaded.find(l=>l.id===dl.id);
            return found?{...dl,...found}:dl;
          });
          setLinks(merged);
        }
      }catch(e){console.error(e);setLinks(DEFAULT_LINKS);}
      setLoading(false);
    })();
  },[]);

  const startEdit=(item)=>{
    setEditId(item.id);
    setEditForm({specUrl:item.specUrl||'',proposalUrl:item.proposalUrl||'',guideUrl:item.guideUrl||'',caseUrl:item.caseUrl||''});
  };

  const cancelEdit=()=>{setEditId(null);setEditForm({});};

  const saveEdit=async()=>{
    setSaving(true);
    try{
      await db.collection(COLLECTIONS.METHOD_LINKS).doc(editId).set({
        ...editForm,
        label:links.find(l=>l.id===editId)?.label||'',
        cat:links.find(l=>l.id===editId)?.cat||'',
        updatedAt:new Date().toISOString()
      },{merge:true});
      setLinks(prev=>prev.map(l=>l.id===editId?{...l,...editForm}:l));
      setEditId(null);setEditForm({});
      showToast('링크가 저장되었습니다');
    }catch(e){console.error(e);showToast('저장 실패: '+e.message,'error');}
    setSaving(false);
  };

  const saveAllToFirestore=async()=>{
    setSaving(true);
    try{
      const batch=db.batch();
      links.forEach(l=>{
        const ref=db.collection(COLLECTIONS.METHOD_LINKS).doc(l.id);
        batch.set(ref,{label:l.label,cat:l.cat,specUrl:l.specUrl||'',proposalUrl:l.proposalUrl||'',guideUrl:l.guideUrl||'',caseUrl:l.caseUrl||'',updatedAt:new Date().toISOString()},{merge:true});
      });
      await batch.commit();
      showToast(`${links.length}개 공법 링크가 모두 저장되었습니다`);
    }catch(e){console.error(e);showToast('일괄 저장 실패: '+e.message,'error');}
    setSaving(false);
  };

  const filtered=links.filter(l=>!search||l.label.includes(search)||l.cat.includes(search)||l.id.includes(search));
  const grouped={};
  filtered.forEach(l=>{if(!grouped[l.cat])grouped[l.cat]=[];grouped[l.cat].push(l);});

  return(

        </div>
        <button onClick={saveAllToFirestore} disabled={saving} style={{
          padding:'10px 20px',borderRadius:10,border:'none',
          background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:700,
          cursor:saving?'wait':'pointer',opacity:saving?.6:1
        }}>

          style={{width:'100%',maxWidth:400,padding:'10px 14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:13,outline:'none'}}/>
      </div>

      {/* 카테고리별 그룹 */}
      {Object.entries(grouped).map(([cat,items])=>(
        <div key={cat} style={{marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{width:4,height:18,borderRadius:2,background:CAT_COLORS[cat]||'#6B7280'}}/>
            <span style={{fontSize:15,fontWeight:800,color:'var(--text)'}}>{cat}</span>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text-sm)',background:'var(--bg)',borderRadius:6,padding:'2px 8px'}}>{items.length}개</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {items.map(item=>(
              <div key={item.id} style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden'}}>

                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:editId===item.id?'1px solid var(--border)':'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:9,fontWeight:800,color:CAT_COLORS[cat]||'#6B7280',background:(CAT_COLORS[cat]||'#6B7280')+'15',borderRadius:4,padding:'2px 6px'}}>{cat}</span>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{item.label}</span>
                    <span style={{fontSize:10,color:'var(--text-sm)'}}>({item.id})</span>
                  </div>
                  {editId===item.id?(
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={cancelEdit} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',fontSize:11,fontWeight:600,cursor:'pointer'}}>취소</button>
                      <button onClick={saveEdit} disabled={saving} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--accent)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer'}}>{saving?'저장중...':'저장'}</button>
                    </div>
                  ):(
                    <button onClick={()=>startEdit(item)} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',fontSize:11,fontWeight:600,cursor:'pointer',color:'var(--accent)'}}>수정</button>
                  )}
                </div>
                {/* 링크 필드들 */}
                {editId===item.id?(
                  <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
                    {LINK_FIELDS.map(f=>(
                      <div key={f.key}>
                        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:700,color:f.color,marginBottom:4}}>

                      const hasUrl=url&&url.trim();
                      return(
                        <div key={f.key} style={{padding:'8px 10px',borderRadius:8,background:hasUrl?f.color+'08':'#F9FAFB',border:`1px solid ${hasUrl?f.color+'25':'var(--border)'}`,minHeight:44}}>
                          <div style={{fontSize:9,fontWeight:700,color:hasUrl?f.color:'#9CA3AF',marginBottom:3,display:'flex',alignItems:'center',gap:4}}>
                            <span>{f.icon}</span>{f.label}
                          </div>
                          {hasUrl?(
                            <a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:f.color,wordBreak:'break-all',lineHeight:1.3,display:'block',maxHeight:32,overflow:'hidden',textOverflow:'ellipsis'}}>
                              {url.length>60?url.substring(0,60)+'...':url}
                            </a>
                          ):(
                            <span style={{fontSize:10,color:'#D1D5DB'}}>미등록</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   담당자 관리 — config/staffList
   ══════════════════════════════════════════════════════════════ */
function StaffPage({showToast}){
  const [staffList,setStaffList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [editIdx,setEditIdx]=useState(null); // null=목록, -1=신규, N=수정
  const [form,setForm]=useState({name:'',role:'',phone:''});

  const fetchStaff=async()=>{
    setLoading(true);
    try{
      const doc=await db.collection('config').doc('staffList').get();
      const list=(doc.exists&&doc.data().list)||[];
      console.log(`[config/staffList] ${list.length}명 로드`);
      setStaffList(list);
    }catch(e){console.error('[config/staffList] 로드 실패:',e);showToast('데이터 로드 실패','error');}
    setLoading(false);
  };

  useEffect(()=>{fetchStaff();},[]);

  const saveList=async(newList)=>{
    setSaving(true);
    try{
      await db.collection('config').doc('staffList').set({list:newList,updatedAt:new Date().toISOString()});
      setStaffList(newList);
      showToast('저장 완료');
    }catch(e){console.error(e);showToast('저장 실패','error');}
    setSaving(false);
  };

  const openNew=()=>{setForm({name:'',role:'',phone:''});setEditIdx(-1);};
  const openEdit=(i)=>{setForm({...staffList[i]});setEditIdx(i);};
  const closeForm=()=>setEditIdx(null);

  const saveForm=()=>{
    if(!form.name.trim()){showToast('이름을 입력하세요','error');return;}
    const newList=[...staffList];
    if(editIdx===-1)newList.push({...form,name:form.name.trim(),phone:form.phone.trim()});
    else newList[editIdx]={...form,name:form.name.trim(),phone:form.phone.trim()};
    saveList(newList);
    closeForm();
  };

  const removeStaff=(i)=>{
    if(!confirm(`"${staffList[i].name}"을(를) 삭제하시겠습니까?`))return;
    const newList=staffList.filter((_,idx)=>idx!==i);
    saveList(newList);
  };

  const moveUp=(i)=>{if(i===0)return;const l=[...staffList];[l[i-1],l[i]]=[l[i],l[i-1]];saveList(l);};
  const moveDown=(i)=>{if(i===staffList.length-1)return;const l=[...staffList];[l[i],l[i+1]]=[l[i+1],l[i]];saveList(l);};

  const ROLES=['영업팀장','영업사원','기술지원','현장팀장','CS담당','대표이사','기타'];

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'};
  const labelStyle={fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5,display:'block'};

  if(loading)return <div style={{textAlign:'center',padding:80,color:'var(--text-sm)'}}>로딩 중...</div>;

  return(
    <div style={{animation:'fadeIn .3s ease',maxWidth:700}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800}}>👥 담당자 관리</div>
          <div style={{fontSize:12,color:'var(--text-sm)',marginTop:4}}>총 {staffList.length}명 · 태블릿앱 상담 담당자 선택에 반영됩니다</div>
        </div>
        <button onClick={openNew} style={{padding:'10px 20px',borderRadius:10,border:'none',background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
          + 담당자 추가
        </button>
      </div>

      {staffList.length===0?(
        <div style={{textAlign:'center',padding:60,color:'var(--text-sm)',background:'#fff',borderRadius:12,border:'1px dashed var(--border)'}}>
          <div style={{fontSize:40,marginBottom:12}}>👤</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>등록된 담당자가 없습니다</div>
          <div style={{fontSize:12}}>+ 담당자 추가 버튼으로 등록해 주세요</div>
        </div>
      ):(
        <div style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden',boxShadow:'var(--shadow)'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'var(--bg)'}}>
                {['순서','이름','직책','연락처',''].map(h=>(
                  <th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:12,fontWeight:700,color:'var(--text-md)',borderBottom:'1px solid var(--border)'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {staffList.map((s,i)=>(
                <tr key={i} style={{borderBottom:'1px solid var(--border-s)',transition:'background .1s'}}
                  onMouseOver={e=>e.currentTarget.style.background='var(--bg)'}
                  onMouseOut={e=>e.currentTarget.style.background='#fff'}>
                  <td style={{padding:'10px 16px'}}>
                    <div style={{display:'flex',flexDirection:'column',gap:2}}>
                      <button onClick={()=>moveUp(i)} disabled={i===0||saving}
                        style={{background:'none',border:'none',cursor:i===0?'default':'pointer',fontSize:12,opacity:i===0?.3:1,padding:'2px 4px',lineHeight:1}}>▲</button>
                      <button onClick={()=>moveDown(i)} disabled={i===staffList.length-1||saving}
                        style={{background:'none',border:'none',cursor:i===staffList.length-1?'default':'pointer',fontSize:12,opacity:i===staffList.length-1?.3:1,padding:'2px 4px',lineHeight:1}}>▼</button>
                    </div>
                  </td>
                  <td style={{padding:'10px 16px',fontWeight:700,fontSize:14}}>{s.name}</td>
                  <td style={{padding:'10px 16px'}}>
                    <span style={{padding:'3px 8px',borderRadius:6,background:'var(--accent-l)',color:'var(--accent)',fontSize:12,fontWeight:600}}>{s.role||'—'}</span>
                  </td>
                  <td style={{padding:'10px 16px',color:'var(--text-md)',fontSize:13}}>{s.phone||'—'}</td>
                  <td style={{padding:'10px 16px'}}>
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={()=>openEdit(i)} style={{padding:'5px 12px',borderRadius:7,border:'1px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>수정</button>
                      <button onClick={()=>removeStaff(i)} style={{padding:'5px 12px',borderRadius:7,border:'1px solid #FEE2E2',background:'#FEF2F2',color:'#DC2626',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>삭제</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* 등록/수정 모달 */}
      {editIdx!==null&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={closeForm}>
          <div style={{background:'#fff',borderRadius:16,padding:28,width:'min(400px,90vw)',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:18,fontWeight:800,marginBottom:20}}>{editIdx===-1?'담당자 추가':'담당자 수정'}</div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <label style={labelStyle}>이름 *</label>
                <input style={inputStyle} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="홍길동" autoFocus/>
              </div>
              <div>
                <label style={labelStyle}>직책</label>
                <select style={{...inputStyle,background:'#fff'}} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                  <option value="">선택 안 함</option>
                  {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div>
                <label style={labelStyle}>연락처</label>
                <input style={inputStyle} value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="010-0000-0000"/>
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginTop:22}}>
              <button onClick={closeForm} style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
              <button onClick={saveForm} disabled={saving} style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'var(--accent)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',opacity:saving?0.6:1}}>
                {saving?'저장 중...':'저장'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   SMS 설정 — app-config/solapi
   ══════════════════════════════════════════════════════════════ */
function SmsPage({showToast}){
  const [form,setForm]=useState({workerUrl:'',apiKey:'',apiSecret:'',sender:''});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [testing,setTesting]=useState(false);
  const [testPhone,setTestPhone]=useState('');
  const [showSecret,setShowSecret]=useState(false);
  const [templates,setTemplates]=useState({customerThank:'',followUp:''});
  const [savingTpl,setSavingTpl]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const [cfgDoc,tplDoc]=await Promise.all([
          db.collection('app-config').doc('solapi').get(),
          db.collection('app-config').doc('smsTemplates').get(),
        ]);
        if(cfgDoc.exists)setForm({
          workerUrl:cfgDoc.data().workerUrl||'',
          apiKey:cfgDoc.data().apiKey||'',
          apiSecret:cfgDoc.data().apiSecret||'',
          sender:cfgDoc.data().sender||'',
        });
        if(tplDoc.exists)setTemplates({
          customerThank:tplDoc.data().customerThank||'',
          followUp:tplDoc.data().followUp||'',
        });
        console.log('[app-config/solapi] 로드 완료');
      }catch(e){console.error('[app-config/solapi] 로드 실패:',e);}
      setLoading(false);
    })();
  },[]);

  const save=async()=>{
    if(!form.workerUrl.trim()){showToast('Worker URL을 입력하세요','error');return;}
    setSaving(true);
    try{
      await db.collection('app-config').doc('solapi').set({
        ...form,updatedAt:new Date().toISOString()
      },{merge:true});
      showToast('SMS 설정 저장 완료');
    }catch(e){console.error(e);showToast('저장 실패','error');}
    setSaving(false);
  };

  const saveTemplates=async()=>{
    setSavingTpl(true);
    try{
      await db.collection('app-config').doc('smsTemplates').set({
        ...templates,updatedAt:new Date().toISOString()
      },{merge:true});
      showToast('템플릿 저장 완료');
    }catch(e){console.error(e);showToast('저장 실패','error');}
    setSavingTpl(false);
  };

  const testSend=async()=>{
    if(!testPhone.trim()){showToast('테스트 수신번호를 입력하세요','error');return;}
    if(!form.workerUrl.trim()){showToast('Worker URL을 먼저 저장하세요','error');return;}
    setTesting(true);
    try{
      const res=await fetch(form.workerUrl.replace(/\/$/,'')+'/send-sms',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          to:testPhone.replace(/[^0-9]/g,''),
          text:'[POUR솔루션] SMS 테스트 메시지입니다.',
          apiKey:form.apiKey,apiSecret:form.apiSecret,sender:form.sender,
        }),
      });
      const json=await res.json();
      if(res.ok)showToast('테스트 문자 발송 성공');
      else showToast('발송 실패: '+(json.error||res.status),'error');
    }catch(e){showToast('발송 오류: '+e.message,'error');}
    setTesting(false);
  };

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'};
  const labelStyle={fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5,display:'block'};
  const cardStyle={background:'#fff',borderRadius:12,padding:24,boxShadow:'var(--shadow)',marginBottom:16};

  if(loading)return <div style={{textAlign:'center',padding:80,color:'var(--text-sm)'}}>로딩 중...</div>;

  return(
    <div style={{animation:'fadeIn .3s ease',maxWidth:600}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:20}}>💬 SMS 설정</div>

      {/* Solapi 설정 */}
      <div style={cardStyle}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Solapi 연동 설정</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:20}}>
          Cloudflare Worker URL과 Solapi API 키를 입력하세요
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <label style={labelStyle}>Worker URL *</label>
            <input style={inputStyle} value={form.workerUrl} onChange={e=>setForm({...form,workerUrl:e.target.value})}
              placeholder="https://pour-sms-worker.your-account.workers.dev"/>
          </div>
          <div>
            <label style={labelStyle}>발신자 번호</label>
            <input style={inputStyle} value={form.sender} onChange={e=>setForm({...form,sender:e.target.value})}
              placeholder="1577-6587"/>
          </div>
          <div>
            <label style={labelStyle}>Solapi API Key</label>
            <input style={inputStyle} value={form.apiKey} onChange={e=>setForm({...form,apiKey:e.target.value})}
              placeholder="API Key"/>
          </div>
          <div>
            <label style={labelStyle}>Solapi API Secret</label>
            <div style={{position:'relative'}}>
              <input type={showSecret?'text':'password'} style={{...inputStyle,paddingRight:80}}
                value={form.apiSecret} onChange={e=>setForm({...form,apiSecret:e.target.value})}
                placeholder="API Secret"/>
              <button onClick={()=>setShowSecret(v=>!v)}
                style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',fontSize:11,color:'var(--text-sm)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
                {showSecret?'숨기기':'보기'}
              </button>
            </div>
          </div>
        </div>
        <button onClick={save} disabled={saving}
          style={{width:'100%',marginTop:18,padding:'12px 0',borderRadius:10,border:'none',background:'var(--accent)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',opacity:saving?0.6:1}}>
          {saving?'저장 중...':'저장'}
        </button>
      </div>

      {/* 테스트 발송 */}
      <div style={cardStyle}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>테스트 발송</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:16}}>설정이 올바른지 테스트 문자를 발송합니다</div>
        <div style={{display:'flex',gap:10}}>
          <input style={{...inputStyle,flex:1}} value={testPhone} onChange={e=>setTestPhone(e.target.value)}
            placeholder="010-0000-0000"/>
          <button onClick={testSend} disabled={testing}
            style={{padding:'10px 18px',borderRadius:8,border:'none',background:'var(--green)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',opacity:testing?0.6:1}}>
            {testing?'발송 중...':'테스트 발송'}
          </button>
        </div>
      </div>

      {/* SMS 템플릿 */}
      <div style={cardStyle}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>SMS 템플릿</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:16}}>
          <code style={{background:'var(--bg)',padding:'2px 5px',borderRadius:4,fontSize:11}}>{'{이름}'}</code> 등 변수는 발송 시 자동 치환됩니다
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <label style={labelStyle}>상담 감사 문자</label>
            <textarea style={{...inputStyle,minHeight:80,resize:'vertical',lineHeight:1.6}}
              value={templates.customerThank} onChange={e=>setTemplates({...templates,customerThank:e.target.value})}
              placeholder="{이름}님, POUR솔루션 상담 감사합니다. 담당자가 곧 연락드리겠습니다."/>
          </div>
          <div>
            <label style={labelStyle}>후속 연락 문자</label>
            <textarea style={{...inputStyle,minHeight:80,resize:'vertical',lineHeight:1.6}}
              value={templates.followUp} onChange={e=>setTemplates({...templates,followUp:e.target.value})}
              placeholder="{이름}님, POUR솔루션입니다. 지난번 상담 관련하여 연락드립니다."/>
          </div>
        </div>
        <button onClick={saveTemplates} disabled={savingTpl}
          style={{width:'100%',marginTop:18,padding:'12px 0',borderRadius:10,border:'none',background:'var(--navy)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',opacity:savingTpl?0.6:1}}>
          {savingTpl?'저장 중...':'템플릿 저장'}
        </button>
      </div>
    </div>
  );
}
