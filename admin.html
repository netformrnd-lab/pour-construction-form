const MC_CATS=['전체','방수','도장','보수/보강','토목'];

function DefectPhotosPage({showToast}){
  const [photos,setPhotos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selMethod,setSelMethod]=useState('전체');
  const [selDefect,setSelDefect]=useState('전체');
  const [showAdd,setShowAdd]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [showAiBulk,setShowAiBulk]=useState(false);
  const [showTemplates,setShowTemplates]=useState(false);
  const [lightbox,setLightbox]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [importing,setImporting]=useState(false);
  const [importJson,setImportJson]=useState('');
  const [importUrl,setImportUrl]=useState('');
  const [form,setForm]=useState({method:DEFAULT_POUR_METHODS[0],defectType:DEFAULT_DEFECT_TYPES[0],label:'',description:'',files:[]});
  const [editingId,setEditingId]=useState(null);
  /* AI 대량 업로드 상태 */
  const [aiBulkFiles,setAiBulkFiles]=useState([]);
  const [aiBulkMethod,setAiBulkMethod]=useState(DEFAULT_POUR_METHODS[0]);
  const [aiBulkResults,setAiBulkResults]=useState([]);
  const [aiProcessing,setAiProcessing]=useState(false);
  const [aiProgress,setAiProgress]=useState(0);
  const [aiApiKey,setAiApiKey]=useState(()=>localStorage.getItem('openai_api_key')||'');
  /* 템플릿 관리 상태 */
  const [templates,setTemplates]=useState([]);
  const [templateLoading,setTemplateLoading]=useState(false);
  const [editingTemplate,setEditingTemplate]=useState(null);
  const [templateForm,setTemplateForm]=useState({type:'',keywords:'',desc:''});

  const fetchPhotos=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection(COLLECTIONS.DEFECT_PHOTOS).get();
      const arr=[];snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      arr.sort((a,b)=>(a.method||'').localeCompare(b.method||'')||(a.defectType||'').localeCompare(b.defectType||'')||(a.label||'').localeCompare(b.label||''));
      console.log(`[defect-photos] ${arr.length}건 로드`);
      setPhotos(arr);
    }catch(e){console.error('[defect-photos] 로드 실패:',e);showToast('데이터 로드 실패','error');}
    setLoading(false);
  };

  /* ── 하자 템플릿 로드 ── */
  const fetchTemplates=async()=>{
    setTemplateLoading(true);
    try{
      const snap=await db.collection('defect-templates').get();
      if(snap.empty){
        setTemplates(DEFAULT_DEFECT_TEMPLATES);
      }else{
        const arr=[];snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
        arr.sort((a,b)=>(a.type||'').localeCompare(b.type||''));
        setTemplates(arr);
      }
    }catch(e){setTemplates(DEFAULT_DEFECT_TEMPLATES);}
    setTemplateLoading(false);
  };

  const saveTemplate=async()=>{
    if(!templateForm.type.trim()){showToast('하자유형명을 입력하세요','error');return;}
    try{
      const data={type:templateForm.type.trim(),keywords:templateForm.keywords.trim(),desc:templateForm.desc.trim(),updatedAt:new Date().toISOString()};
      if(editingTemplate&&editingTemplate.id){
        await db.collection('defect-templates').doc(editingTemplate.id).update(data);
      }else{
        await db.collection('defect-templates').add({...data,createdAt:new Date().toISOString()});
      }
      showToast('템플릿 저장 완료');
      setEditingTemplate(null);setTemplateForm({type:'',keywords:'',desc:''});
      fetchTemplates();
    }catch(e){showToast('저장 실패','error');}
  };

  const deleteTemplate=async(id)=>{
    if(!confirm('삭제하시겠습니까?'))return;
    try{await db.collection('defect-templates').doc(id).delete();showToast('삭제 완료');fetchTemplates();}
    catch(e){showToast('삭제 실패','error');}
  };

  const resetTemplates=async()=>{
    if(!confirm('기본 템플릿으로 초기화하시겠습니까? 기존 템플릿이 모두 삭제됩니다.'))return;
    try{
      const snap=await db.collection('defect-templates').get();
      const batch=db.batch();snap.forEach(doc=>batch.delete(doc.ref));
      await batch.commit();
      for(const t of DEFAULT_DEFECT_TEMPLATES){
        await db.collection('defect-templates').add({...t,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
      }
      showToast('기본 템플릿으로 초기화 완료');fetchTemplates();
    }catch(e){showToast('초기화 실패','error');}
  };

  useEffect(()=>{fetchPhotos();fetchTemplates();},[]);

  const allMethods=useMemo(()=>{const s=new Set(DEFAULT_POUR_METHODS);photos.forEach(p=>{if(p.method)s.add(p.method);});return [...s];},[photos]);
  const allDefects=useMemo(()=>{const s=new Set(DEFAULT_DEFECT_TYPES);photos.forEach(p=>{if(p.defectType)s.add(p.defectType);});return [...s];},[photos]);
  const methodsWithData=useMemo(()=>{const s=new Set();photos.forEach(p=>{if(p.method)s.add(p.method);});return [...s].sort();},[photos]);
  const defectsForMethod=useMemo(()=>{
    const sub=selMethod==='전체'?photos:photos.filter(p=>p.method===selMethod);
    const s=new Set();sub.forEach(p=>{if(p.defectType)s.add(p.defectType);});return [...s].sort();
  },[photos,selMethod]);

  const filtered=useMemo(()=>photos.filter(p=>{
    if(selMethod!=='전체'&&p.method!==selMethod)return false;
    if(selDefect!=='전체'&&p.defectType!==selDefect)return false;
    return true;
  }),[photos,selMethod,selDefect]);

  const grouped=useMemo(()=>{
    const map={};filtered.forEach(p=>{const k=p.defectType||'미분류';if(!map[k])map[k]=[];map[k].push(p);});
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
  },[filtered]);

  const stats=useMemo(()=>({
    total:photos.length,methods:new Set(photos.map(p=>p.method).filter(Boolean)).size,
    defects:new Set(photos.map(p=>p.defectType).filter(Boolean)).size,
    manus:photos.filter(p=>p.source==='manus').length,
    ai:photos.filter(p=>p.source==='ai').length,
  }),[photos]);

  /* 구 공법명 → 신 공법명 일괄 재태깅 */
  const [retagging,setRetagging]=useState(false);
  const bulkRetag=async(fromMethod,toMethod)=>{
    const targets=photos.filter(p=>p.method===fromMethod);
    if(!targets.length){showToast(`"${fromMethod}" 사진 없음`,'error');return;}
    if(!window.confirm(`"${fromMethod}" ${targets.length}장을 "${toMethod}"로 재태깅합니다. 계속하시겠습니까?`))return;
    setRetagging(true);
    try{
      const batch=db.batch();
      targets.forEach(p=>{batch.update(db.collection('defect-photos').doc(p.id),{method:toMethod,updatedAt:new Date().toISOString()});});
      await batch.commit();
      showToast(`${targets.length}장 재태깅 완료`,'success');
      await fetchPhotos();
    }catch(e){console.error('[bulkRetag] 실패:',e);showToast('재태깅 실패','error');}
    setRetagging(false);
  };

  const uploadFile=async(file)=>{
    const path=`defect-photos/${Date.now()}_${file.name}`;
    const ref=storage.ref(path);await ref.put(file);return await ref.getDownloadURL();
  };

  const savePhotos=async()=>{
    if(!form.method||!form.defectType){showToast('공법과 하자유형을 선택하세요','error');return;}
    if(!editingId&&!form.files.length){showToast('사진을 선택하세요','error');return;}
    setUploading(true);
    try{
      if(editingId){
        const data={method:form.method,defectType:form.defectType,label:form.label,description:form.description,updatedAt:new Date().toISOString()};
        if(form.files.length){data.imageUrl=await uploadFile(form.files[0]);}
        await db.collection(COLLECTIONS.DEFECT_PHOTOS).doc(editingId).update(data);
        showToast('수정 완료');
      }else{
        const existing=photos.filter(p=>p.method===form.method&&p.defectType===form.defectType).length;
        for(let i=0;i<form.files.length;i++){
          const url=await uploadFile(form.files[i]);
          const label=form.files.length===1&&form.label.trim()?form.label.trim():`${form.defectType}${existing+i+1}`;
          await db.collection(COLLECTIONS.DEFECT_PHOTOS).add({
            method:form.method,defectType:form.defectType,label,description:form.description,
            imageUrl:url,source:'manual',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
          });
        }
        showToast(`${form.files.length}장 등록 완료`);
      }
      closeAddForm();fetchPhotos();
    }catch(e){console.error(e);showToast('저장 실패','error');}
    setUploading(false);
  };

  const deletePhoto=async(id)=>{
    if(!confirm('삭제하시겠습니까?'))return;
    try{await db.collection(COLLECTIONS.DEFECT_PHOTOS).doc(id).delete();showToast('삭제 완료');fetchPhotos();}
    catch(e){console.error(e);showToast('삭제 실패','error');}
  };

  const startEdit=(p)=>{
    setEditingId(p.id);setForm({method:p.method,defectType:p.defectType,label:p.label||'',description:p.description||'',files:[]});setShowAdd(true);
  };

  const closeAddForm=()=>{setShowAdd(false);setEditingId(null);setForm({method:DEFAULT_POUR_METHODS[0],defectType:DEFAULT_DEFECT_TYPES[0],label:'',description:'',files:[]});};

  /* ── AI 대량 자동 분류 ── */
  const fileToBase64=(file)=>new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });

  const classifyImageWithAI=async(file,method,templateList)=>{
    const base64=await fileToBase64(file);
    const defectList=templateList.map(t=>`- ${t.type}: ${t.desc} (키워드: ${t.keywords})`).join('\n');
    const methodContext=`현재 공법: ${method}`;
    const prompt=`당신은 건축물 하자 사진을 분류하는 전문가입니다.\n${methodContext}\n\n아래 하자유형 중 이 사진에 가장 적합한 유형 하나를 선택하세요:\n${defectList}\n\n반드시 JSON 형식으로만 답하세요:\n{"defectType":"선택한하자유형","confidence":0~100,"description":"한줄설명"}`;
    const key=aiApiKey.trim();
    if(!key)throw new Error('OpenAI API Key가 없습니다');
    const resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        messages:[{role:'user',content:[
          {type:'text',text:prompt},
          {type:'image_url',image_url:{url:`data:image/jpeg;base64,${base64}`,detail:'low'}}
        ]}],
        max_tokens:200,
        response_format:{type:'json_object'}
      })
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'API 오류');}
    const data=await resp.json();
    return JSON.parse(data.choices[0].message.content);
  };

  const runAiBulkClassify=async()=>{
    if(!aiBulkFiles.length){showToast('사진을 선택하세요','error');return;}
    if(!aiApiKey.trim()){showToast('OpenAI API Key를 입력하세요','error');return;}
    localStorage.setItem('openai_api_key',aiApiKey.trim());
    setAiProcessing(true);setAiProgress(0);
    const activeTemplates=templates.length?templates:DEFAULT_DEFECT_TEMPLATES;
    const results=[];
    for(let i=0;i<aiBulkFiles.length;i++){
      const file=aiBulkFiles[i];
      try{
        const result=await classifyImageWithAI(file,aiBulkMethod,activeTemplates);
        results.push({file,method:aiBulkMethod,defectType:result.defectType||'기타',confidence:result.confidence||0,description:result.description||'',status:'ready',previewUrl:URL.createObjectURL(file)});
      }catch(e){
        results.push({file,method:aiBulkMethod,defectType:'기타',confidence:0,description:'분류 실패: '+e.message,status:'error',previewUrl:URL.createObjectURL(file)});
      }
      setAiProgress(Math.round((i+1)/aiBulkFiles.length*100));
    }
    setAiBulkResults(results);
    setAiProcessing(false);
    showToast(`${results.length}장 AI 분류 완료`,'success');
  };

  const saveAiBulkResults=async()=>{
    const toSave=aiBulkResults.filter(r=>r.status!=='saved');
    if(!toSave.length){showToast('저장할 항목이 없습니다','error');return;}
    setUploading(true);
    let saved=0;
    const updated=[...aiBulkResults];
    for(let i=0;i<updated.length;i++){
      const r=updated[i];
      if(r.status==='saved')continue;
      try{
        const url=await uploadFile(r.file);
        const existing=photos.filter(p=>p.method===r.method&&p.defectType===r.defectType).length;
        await db.collection(COLLECTIONS.DEFECT_PHOTOS).add({
          method:r.method,defectType:r.defectType,
          label:`${r.defectType}${existing+saved+1}`,
          description:r.description,imageUrl:url,
          source:'ai',aiConfidence:r.confidence,
          createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
        });
        updated[i]={...r,status:'saved'};saved++;
      }catch(e){updated[i]={...r,status:'error',description:'저장 실패: '+e.message};}
    }
    setAiBulkResults(updated);
    setUploading(false);
    showToast(`${saved}장 저장 완료`,'success');
    fetchPhotos();
  };

  /* ── 마누스 데이터 연동 ── */
  const doImport=async()=>{
    setImporting(true);
    try{
      let data=null;
      if(importUrl.trim()){
        try{
          const r=await fetch(importUrl.trim());const html=await r.text();
          const jm=html.match(/<script[^>]*type\s*=\s*["']application\/json["'][^>]*>([\s\S]*?)<\/script>/);
          if(jm){try{data=JSON.parse(jm[1]);}catch(e){}}
          if(!data){const nm=html.match(/__NEXT_DATA__.*?=\s*(\{[\s\S]*?\})\s*;?\s*<\/script>/);if(nm){try{const p=JSON.parse(nm[1]);data=p.props?.pageProps?.data||p;}catch(e){}}}
          if(!data){const imgs=[...html.matchAll(/<img[^>]+src\s*=\s*["']([^"']+)["'][^>]*(?:alt\s*=\s*["']([^"']*)["'])?/gi)];
            if(imgs.length)data=imgs.map((m,i)=>({imageUrl:m[1],label:m[2]||`사진${i+1}`,method:'미분류',defectType:'기타'}));}
        }catch(e){console.warn('URL fetch failed:',e);}
      }
      if(!data&&importJson.trim()){
        try{data=JSON.parse(importJson.trim());}catch(e){showToast('JSON 형식 오류','error');setImporting(false);return;}
      }
      if(!data){showToast('데이터를 찾을 수 없습니다','error');setImporting(false);return;}
      if(!Array.isArray(data))data=[data];
      let count=0;
      for(const item of data){
        const doc={
          method:item.method||item.공법||'미분류',defectType:item.defectType||item.하자유형||item.category||'기타',
          label:item.label||item.이름||item.name||item.title||`사진${count+1}`,
          imageUrl:item.imageUrl||item.url||item.image||item.src||item.사진||'',
          description:item.description||item.설명||item.desc||'',
          source:'manus',sourceUrl:importUrl||'',
          createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
        };
        if(doc.imageUrl){await db.collection(COLLECTIONS.DEFECT_PHOTOS).add(doc);count++;}
      }
      showToast(`${count}건 가져오기 완료`);
      setShowImport(false);setImportUrl('');setImportJson('');fetchPhotos();
    }catch(e){console.error(e);showToast('가져오기 실패','error');}
    setImporting(false);
  };

  const IS={width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none'};
  const LS={fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'};
  const tabS=(a)=>({padding:'6px 16px',borderRadius:20,border:'none',background:a?'var(--blue)':'#fff',color:a?'#fff':'var(--text-md)',fontSize:12,fontWeight:a?700:500,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',transition:'all .15s',boxShadow:a?'none':'0 1px 3px rgba(0,0,0,.06)'});

  /* ── 라이트박스 ── */
  const renderLightbox=()=>{
    if(!lightbox)return null;
    const idx=filtered.findIndex(p=>p.id===lightbox.id);
    const prev=idx>0?filtered[idx-1]:null;
    const next=idx<filtered.length-1?filtered[idx+1]:null;
    return(
      <div onClick={()=>setLightbox(null)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.85)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
        <div onClick={e=>e.stopPropagation()} style={{position:'relative',maxWidth:'90vw',maxHeight:'90vh',cursor:'default'}}>
          <img src={lightbox.imageUrl} style={{maxWidth:'90vw',maxHeight:'80vh',borderRadius:12,objectFit:'contain'}} alt={lightbox.label}/>
          <div style={{position:'absolute',bottom:-40,left:0,right:0,textAlign:'center',color:'#fff',fontSize:14}}>
            <b>{lightbox.label}</b> · {lightbox.method} · {lightbox.defectType}
          </div>
          {prev&&<button onClick={()=>setLightbox(prev)} style={{position:'absolute',left:-50,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.2)',border:'none',color:'#fff',fontSize:28,width:40,height:40,borderRadius:'50%',cursor:'pointer'}}>‹</button>}
          {next&&<button onClick={()=>setLightbox(next)} style={{position:'absolute',right:-50,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.2)',border:'none',color:'#fff',fontSize:28,width:40,height:40,borderRadius:'50%',cursor:'pointer'}}>›</button>}
          <button onClick={()=>setLightbox(null)} style={{position:'absolute',top:-16,right:-16,background:'rgba(255,255,255,.2)',border:'none',color:'#fff',fontSize:18,width:36,height:36,borderRadius:'50%',cursor:'pointer'}}>✕</button>
        </div>
      </div>
    );
  };

  /* ── 사진 카드 ── */
  const PhotoCard=({p})=>(
    <div style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden',transition:'box-shadow .2s',cursor:'pointer'}} onClick={()=>setLightbox(p)}>
      <div style={{height:160,overflow:'hidden',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        {p.imageUrl?<img src={p.imageUrl} style={{width:'100%',height:'100%',objectFit:'cover'}} alt={p.label}/>
        :<span style={{color:'var(--text-sm)',fontSize:13}}>이미지 없음</span>}
      </div>
      <div style={{padding:'10px 12px'}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label||'무제'}</div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {p.source==='manus'&&<span style={{padding:'2px 6px',borderRadius:4,background:'#FEF3C7',color:'#92400E',fontSize:10,fontWeight:600}}>마누스</span>}
          {p.source==='ai'&&<span style={{padding:'2px 6px',borderRadius:4,background:'#EDE9FE',color:'#6D28D9',fontSize:10,fontWeight:600}}>AI분류{p.aiConfidence?` ${p.aiConfidence}%`:''}</span>}
          <span style={{padding:'2px 6px',borderRadius:4,background:'var(--blue-l)',color:'var(--blue)',fontSize:10,fontWeight:600}}>{p.defectType}</span>
        </div>
      </div>
      <div style={{borderTop:'1px solid var(--border-s)',padding:'6px 12px',display:'flex',justifyContent:'flex-end',gap:8}} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>startEdit(p)} style={{background:'none',border:'none',fontSize:11,color:'var(--blue)',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>수정</button>
        <button onClick={()=>deletePhoto(p.id)} style={{background:'none',border:'none',fontSize:11,color:'#DC2626',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>삭제</button>
      </div>
    </div>
  );

  /* ── 메인 렌더 ── */
  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {renderLightbox()}

      {/* 등록/수정 모달 */}
      {showAdd&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={closeAddForm}>
        <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,padding:28,width:480,maxHeight:'80vh',overflow:'auto',boxShadow:'var(--shadow-lg)'}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:20}}>{editingId?'사진 수정':'사진 등록'}</div>
          <div style={{marginBottom:14}}><label style={LS}>대분류 (공법)</label>
            <select style={{...IS,background:'#fff'}} value={form.method} onChange={e=>setForm({...form,method:e.target.value})}>
              {allMethods.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}><label style={LS}>중분류 (하자유형)</label>
            <select style={{...IS,background:'#fff'}} value={form.defectType} onChange={e=>setForm({...form,defectType:e.target.value})}>
              {allDefects.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}><label style={LS}>라벨 {!editingId&&form.files.length>1?'(자동생성)':''}</label>
            <input style={IS} value={form.label} onChange={e=>setForm({...form,label:e.target.value})} placeholder={editingId?'라벨':'비워두면 자동생성 (예: 탈락1, 탈락2...)'} disabled={!editingId&&form.files.length>1}/>
          </div>
          <div style={{marginBottom:14}}><label style={LS}>설명 (선택)</label>
            <textarea style={{...IS,resize:'vertical',minHeight:50}} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="하자 상세 설명"/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={LS}>{editingId?'사진 변경 (선택)':'사진 업로드 (여러장 선택 가능)'}</label>
            <input type="file" accept="image/*" multiple={!editingId} onChange={e=>setForm({...form,files:Array.from(e.target.files)})} style={{fontSize:12}}/>
            {form.files.length>0&&<div style={{fontSize:11,color:'var(--text-sm)',marginTop:4}}>{form.files.length}개 파일 선택됨</div>}
            {editingId&&!form.files.length&&photos.find(p=>p.id===editingId)?.imageUrl&&<div style={{marginTop:8}}><img src={photos.find(p=>p.id===editingId)?.imageUrl} style={{width:120,height:90,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)'}} alt=""/></div>}
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={closeAddForm} style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
            <button onClick={savePhotos} disabled={uploading} style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'var(--blue)',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',color:'#fff',opacity:uploading?0.6:1}}>{uploading?'업로드 중...':editingId?'수정':'등록'}</button>
          </div>
        </div>
      </div>}

      {/* 마누스 연동 모달 */}
      {showImport&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setShowImport(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,padding:28,width:560,maxHeight:'80vh',overflow:'auto',boxShadow:'var(--shadow-lg)'}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>마누스 데이터 연동</div>
          <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:20}}>마누스 URL에서 자동 가져오기 또는 JSON 데이터를 직접 붙여넣으세요</div>
          <div style={{marginBottom:14}}><label style={LS}>마누스 URL (선택)</label>
            <input style={IS} value={importUrl} onChange={e=>setImportUrl(e.target.value)} placeholder="https://hajaviewer-xay3p7o4.manus.space/"/>
          </div>
          <div style={{marginBottom:14}}><label style={LS}>JSON 데이터 (직접 입력)</label>
            <textarea style={{...IS,resize:'vertical',minHeight:140,fontFamily:'monospace',fontSize:11}} value={importJson} onChange={e=>setImportJson(e.target.value)} placeholder={'[\n  {\n    "method": "POUR 아스팔트싱글 방수 공법",\n    "defectType": "탈락",\n    "label": "탈락1",\n    "imageUrl": "https://example.com/photo.jpg",\n    "description": ""\n  }\n]'}/>
          </div>
          <div style={{background:'var(--bg)',borderRadius:10,padding:14,marginBottom:20,fontSize:11,color:'var(--text-md)',lineHeight:1.7}}>
            <b>지원 필드명 (영문/한글 모두 가능):</b><br/>
            공법: method / 공법<br/>
            하자유형: defectType / 하자유형 / category<br/>
            라벨: label / 이름 / name / title<br/>
            이미지: imageUrl / url / image / src / 사진<br/>
            설명: description / 설명 / desc
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setShowImport(false)} style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
            <button onClick={doImport} disabled={importing} style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'var(--gold)',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',color:'#fff',opacity:importing?.6:1}}>{importing?'가져오는 중...':'가져오기'}</button>
          </div>
        </div>
      </div>}

      {/* ── AI 대량 자동 분류 모달 ── */}
      {showAiBulk&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>{if(!aiProcessing&&!uploading)setShowAiBulk(false);}}>
        <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,padding:28,width:'min(680px,95vw)',maxHeight:'88vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <div>
              <div style={{fontSize:18,fontWeight:800}}>🤖 AI 대량 자동 분류</div>
              <div style={{fontSize:12,color:'var(--text-sm)',marginTop:4}}>사진을 업로드하면 AI가 하자유형을 자동으로 판별합니다</div>
            </div>
            {!aiProcessing&&!uploading&&<button onClick={()=>setShowAiBulk(false)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--text-sm)'}}>✕</button>}
          </div>

          {/* API Key 입력 */}
          <div style={{background:'#F0F9FF',borderRadius:10,padding:14,marginBottom:16,border:'1px solid #BAE6FD'}}>
            <label style={{fontSize:12,fontWeight:700,color:'#0369A1',marginBottom:6,display:'block'}}>🔑 OpenAI API Key</label>
            <input type="password" style={{...IS,border:'1.5px solid #BAE6FD',background:'#fff'}} value={aiApiKey} onChange={e=>setAiApiKey(e.target.value)} placeholder="sk-..."/>
            <div style={{fontSize:11,color:'#0369A1',marginTop:4}}>입력한 키는 이 기기에만 저장됩니다 (localStorage)</div>
          </div>

          {/* 공법 선택 */}
          <div style={{marginBottom:14}}>
            <label style={LS}>공법 선택 (모든 사진에 동일 적용)</label>
            <select style={{...IS,background:'#fff'}} value={aiBulkMethod} onChange={e=>setAiBulkMethod(e.target.value)}>
              {DEFAULT_POUR_METHODS.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>

          {/* 파일 선택 */}
          <div style={{marginBottom:16}}>
            <label style={LS}>사진 선택 (여러 장 가능)</label>
            <input type="file" accept="image/*" multiple onChange={e=>{setAiBulkFiles(Array.from(e.target.files));setAiBulkResults([]);}} style={{fontSize:12}}/>
            {aiBulkFiles.length>0&&<div style={{fontSize:12,color:'var(--text-sm)',marginTop:6,fontWeight:600}}>{aiBulkFiles.length}장 선택됨</div>}
          </div>

          {/* 진행 상태 */}
          {aiProcessing&&(
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:12,fontWeight:600}}>
                <span>AI 분류 중...</span><span>{aiProgress}%</span>
              </div>
              <div style={{height:8,borderRadius:4,background:'#E5E7EB',overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:4,background:'linear-gradient(90deg,#6D28D9,#2563EB)',width:`${aiProgress}%`,transition:'width .3s'}}/>
              </div>
            </div>
          )}

          {/* 분류 결과 미리보기 */}
          {aiBulkResults.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:'var(--text)'}}>분류 결과 ({aiBulkResults.length}장) — 수정 후 저장하세요</div>
              <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:320,overflow:'auto'}}>
                {aiBulkResults.map((r,i)=>(
                  <div key={i} style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px',borderRadius:10,border:`1.5px solid ${r.status==='saved'?'#10B981':r.status==='error'?'#EF4444':'#E5E7EB'}`,background:r.status==='saved'?'#F0FDF4':r.status==='error'?'#FEF2F2':'#fff'}}>
                    <img src={r.previewUrl} style={{width:56,height:56,objectFit:'cover',borderRadius:8,flexShrink:0}} alt=""/>

                        <select value={r.defectType} onChange={e=>{const u=[...aiBulkResults];u[i]={...u[i],defectType:e.target.value};setAiBulkResults(u);}}
                          style={{padding:'4px 8px',borderRadius:6,border:'1.5px solid var(--border)',fontSize:12,fontFamily:'inherit',background:'#fff',outline:'none'}} disabled={r.status==='saved'}>

                        </select>
                        {r.confidence>0&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#EDE9FE',color:'#6D28D9',fontWeight:600}}>신뢰도 {r.confidence}%</span>}
                        {r.status==='saved'&&<span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'#D1FAE5',color:'#065F46',fontWeight:600}}>✓ 저장됨</span>}
                        {r.status==='error'&&<span style={{fontSize:10,color:'#DC2626',fontWeight:600}}>오류</span>}
                      </div>
                      {r.description&&<div style={{fontSize:11,color:'var(--text-sm)',marginTop:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.description}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 버튼 영역 */}
          <div style={{display:'flex',gap:10,marginTop:4}}>
            {!aiProcessing&&!uploading&&<button onClick={()=>setShowAiBulk(false)} style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>닫기</button>}
            {!aiBulkResults.length?
              <button onClick={runAiBulkClassify} disabled={aiProcessing||!aiBulkFiles.length} style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'linear-gradient(135deg,#6D28D9,#2563EB)',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',color:'#fff',opacity:(aiProcessing||!aiBulkFiles.length)?0.6:1}}>
                {aiProcessing?`분류 중... ${aiProgress}%`:'🤖 AI 자동 분류 시작'}
              </button>
            :
              <button onClick={saveAiBulkResults} disabled={uploading||aiBulkResults.every(r=>r.status==='saved')} style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'var(--green)',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',color:'#fff',opacity:uploading?0.6:1}}>
                {uploading?'저장 중...':'💾 전체 저장'}
              </button>
            }
          </div>
        </div>
      </div>}

      {/* ── 하자 템플릿 관리 모달 ── */}
      {showTemplates&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setShowTemplates(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,padding:28,width:'min(640px,95vw)',maxHeight:'88vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <div>
              <div style={{fontSize:18,fontWeight:800}}>📋 하자 분류 템플릿 관리</div>

            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={resetTemplates} style={{padding:'7px 12px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>초기화</button>

              {editingTemplate?'템플릿 수정':'새 하자유형 추가'}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div>
                <label style={LS}>하자유형명 *</label>
                <input style={IS} value={templateForm.type} onChange={e=>setTemplateForm({...templateForm,type:e.target.value})} placeholder="예: 누수"/>

              <div>
                <label style={LS}>키워드 (쉼표 구분)</label>
                <input style={IS} value={templateForm.keywords} onChange={e=>setTemplateForm({...templateForm,keywords:e.target.value})} placeholder="예: 누수,물,젖음,얼룩"/>

            </div>
            <div style={{marginBottom:12}}>
              <label style={LS}>분류 기준 설명 (AI 판단 기준)</label>

            <button onClick={()=>bulkRetag('슬라브 방수','POUR 듀얼강화방수 공법')} disabled={retagging}

          <button onClick={()=>{closeAddForm();setShowAdd(true);}} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'var(--blue)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>+ 사진 등록</button>

      {/* 필터: 대분류 (공법) */}
      {methodsWithData.length>0&&<div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>대분류 · 공법</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={()=>{setSelMethod('전체');setSelDefect('전체');}} style={tabS(selMethod==='전체')}>전체</button>
          {methodsWithData.map(m=><button key={m} onClick={()=>{setSelMethod(m);setSelDefect('전체');}} style={tabS(selMethod===m)}>{m.replace('POUR ','').replace(' 공법','')}</button>)}
        </div>
      </div>}

      {/* 필터: 중분류 (하자유형) */}
      {defectsForMethod.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>중분류 · 하자유형</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={()=>setSelDefect('전체')} style={tabS(selDefect==='전체')}>전체 ({(selMethod==='전체'?photos:photos.filter(p=>p.method===selMethod)).length})</button>
          {defectsForMethod.map(d=>{
            const cnt=(selMethod==='전체'?photos:photos.filter(p=>p.method===selMethod)).filter(p=>p.defectType===d).length;
            return <button key={d} onClick={()=>setSelDefect(d)} style={tabS(selDefect===d)}>{d} ({cnt})</button>;
          })}
        </div>
      </div>}

      {/* 콘텐츠 */}
      {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>
      :filtered.length===0?
        <div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>
          <div style={{fontSize:48,marginBottom:12}}>📷</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>등록된 하자사진이 없습니다</div>
          <div style={{fontSize:12}}>AI 자동분류, 마누스 연동 또는 직접 등록으로 사진을 추가하세요</div>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}>
            <button onClick={()=>{setAiBulkFiles([]);setAiBulkResults([]);setAiProgress(0);setShowAiBulk(true);}} style={{padding:'10px 20px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#6D28D9,#2563EB)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🤖 AI 자동분류로 시작</button>
          </div>
        </div>
      :selDefect!=='전체'?
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:14}}>
          {filtered.map(p=><PhotoCard key={p.id} p={p}/>)}
        </div>
      :
        grouped.map(([defectType,items])=>(
          <div key={defectType} style={{marginBottom:24}}>
            <div style={{fontSize:15,fontWeight:800,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
              <span style={{padding:'3px 10px',borderRadius:6,background:'var(--blue-l)',color:'var(--blue)',fontSize:12,fontWeight:700}}>{defectType}</span>
              <span style={{fontSize:12,color:'var(--text-sm)'}}>{items.length}장</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:14}}>
              {items.map(p=><PhotoCard key={p.id} p={p}/>)}
            </div>
          </div>
        ))
      }
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   영업자료 관리 — sales-docs 컬렉션 + Storage 파일 업로드

  {id:'crack_section', label:'탄성강화 단면복구', category:'보수'},
  {id:'crack_sheet', label:'복합시트 균열보수', category:'보수'},
  {id:'ascon_repair', label:'아스콘 도로 보수', category:'토목'},
  {id:'ascon_seal', label:'아스콘 씰코팅', category:'토목'},
  {id:'ascon_mma', label:'MMA 고강도 논슬립', category:'토목'},
];

// Firebase에 콘텐츠 저장/로드
const CONTENT_COLLECTION = 'method_content_overrides';

function ContentEditorPage({ showToast }) {
  const [selectedMethod, setSelectedMethod] = useState(POUR_METHODS_FOR_EDITOR[0].id);
  const [activeTab, setActiveTab] = useState('process'); // process | materials | cause | solution | case_photos | prob_photos
  const [content, setContent] = useState(null);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [previewMode, setPreviewMode] = useState(false);
  const [uploadingIdx, setUploadingIdx] = useState(null);
  // 하자사진/미디어 탭용 state
  const [casePhotos, setCasePhotos] = useState({});
  const [casePhotosLoaded, setCasePhotosLoaded] = useState(false);
  const [casePhotosSaving, setCasePhotosSaving] = useState(false);
  // 공법 카드 사진 탭용 state
  const [probPhotos, setProbPhotos] = useState({});
  const [probPhotosLoaded, setProbPhotosLoaded] = useState(false);
  const [probPhotosSaving, setProbPhotosSaving] = useState(false);

  const methodInfo = POUR_METHODS_FOR_EDITOR.find(m => m.id === selectedMethod);

  // Firestore에서 콘텐츠 로드
  useEffect(() => {
    loadContent(selectedMethod);
  }, [selectedMethod]);

  // casePhotos 최초 로드 (페이지 진입 시)
  useEffect(() => {
    if (!casePhotosLoaded) {
      loadCasePhotosFromFirestore();
    }
  }, []);

  const loadCasePhotosFromFirestore = async () => {
    try {
      const snap = await db.collection('config').doc('casePhotos').get();
      if (snap.exists) {
        setCasePhotos(snap.data());
      }
      setCasePhotosLoaded(true);
    } catch(e) {
      showToast('하자사진 로드 실패: ' + e.message, 'error');
    }
  };

  const loadProbPhotosFromFirestore = async () => {
    try {
      const snap = await db.collection('config').doc('probPhotos').get();
      if (snap.exists) {
        setProbPhotos(snap.data());
      }
      setProbPhotosLoaded(true);
    } catch(e) {
      showToast('공법카드 사진 로드 실패: ' + e.message, 'error');
    }
  };

  const saveCasePhotosToFirestore = async () => {
    setCasePhotosSaving(true);
    try {
      await db.collection('config').doc('casePhotos').set(casePhotos, { merge: true });
      showToast('하자사진 저장 완료!', 'success');
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');
    }
    setCasePhotosSaving(false);
  };

  const saveProbPhotosToFirestore = async () => {
    setProbPhotosSaving(true);
    try {
      await db.collection('config').doc('probPhotos').set(probPhotos, { merge: true });
      showToast('공법카드 사진 저장 완료!', 'success');
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');
    }
    setProbPhotosSaving(false);
  };

  // 이미지 파일 업로드 후 base64 반환 (압축)
  const compressImageFile = (file, maxW = 480, quality = 0.75) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxW || h > maxW) { const r = Math.min(maxW/w, maxW/h); w = Math.round(w*r); h = Math.round(h*r); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  const loadContent = async (methodId) => {
    setLoading(true);
    try {
      const ref = window.db ? window.db.collection(CONTENT_COLLECTION).doc(methodId) : null;
      if (ref) {
        const snap = await ref.get();
        if (snap.exists) {
          setContent(snap.data());
        } else {
          setContent({ processPhotos: [], processMaterials: [], cause: '', solution: '', processDescs: [] });
        }
      } else {
        setContent({ processPhotos: [], processMaterials: [], cause: '', solution: '', processDescs: [] });
      }
    } catch(e) {
      setContent({ processPhotos: [], processMaterials: [], cause: '', solution: '', processDescs: [] });
    }
    setLoading(false);
  };

  const saveContent = async () => {
    setSaving(true);
    try {
      const ref = window.db ? window.db.collection(CONTENT_COLLECTION).doc(selectedMethod) : null;
      if (ref) {
        await ref.set(content, { merge: true });
        showToast('저장 완료!', 'success');
      } else {
        // localStorage 폴백
        localStorage.setItem(`content_${selectedMethod}`, JSON.stringify(content));
        showToast('로컬 저장 완료 (Firebase 미연결)', 'info');
      }
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');
    }
    setSaving(false);
  };

  const handleImageUpload = async (file, type, idx) => {
    setUploadingIdx(`${type}_${idx}`);
    try {
      const compressed = await compressImage(file, 1200, 0.85);
      if (type === 'process') {
        const newPhotos = [...(content.processPhotos || [])];
        newPhotos[idx] = compressed;
        setContent(prev => ({ ...prev, processPhotos: newPhotos }));
      } else if (type === 'material') {
        const newMats = [...(content.processMaterials || [])];
        if (!newMats[idx]) newMats[idx] = {};

      showToast('업로드 실패', 'error');

    setContent(prev => ({ ...prev, processPhotos: arr }));

    setContent(prev => ({ ...prev, processMaterials: arr }));

      arr[idx] = { type: 'youtube', url: embedUrl, original: url };
      setContent(prev => ({ ...prev, processPhotos: arr }));

    slab_dual: ['모체강화함침 + 듀얼복합시트 전개','슈퍼복합압축시트 보강','듀얼복합시트 보강완료','코트재Ⅱ 도포 (중도)','상도코트재 도포','작업완료'],
    slab_pvc: ['결로방지단열시트 시공','PVC 방수층 형성','이음부 열융착','드레인 주변 처리','코트재 마감'],
    slab_urethane: ['모체강화함침','코너·이음부 복합시트 보강','우레탄 하도','우레탄 중도','코트재 상도'],

    crack_sheet: ['균열면 처리','POUR슈퍼복합압축시트 부착','방수액 도포','마감'],
    ascon_repair: ['균열·파손부 절삭 제거','기층 보강 처리','POUR아스콘 재포장','다짐 마감'],
    ascon_seal: ['표면 청소·건조','씰코팅재 도포','양생'],
    ascon_mma: ['바탕면 처리','MMA 프라이머','MMA 중도','논슬립 집게 시공','상도 마감'],
  };
  /* steps: content.processStepNames가 있으면 사용, 없으면 기본값 */
  const defaultSteps = processNames[selectedMethod] || [];
  const steps = (content?.processStepNames && content.processStepNames.length > 0) ? content.processStepNames : defaultSteps;

  const initCustomSteps = () => {
    if (!content?.processStepNames || content.processStepNames.length === 0) {
      setContent(prev => ({...prev, processStepNames: [...defaultSteps]}));
    }
  };
  const updateStepName = (idx, val) => {
    initCustomSteps();
    setContent(prev => {
      const arr = [...(prev.processStepNames || [...defaultSteps])];
      arr[idx] = val;
      return {...prev, processStepNames: arr};

  const addStep = () => {

  const removeStep = (idx) => {

      const descs = [...(prev.processDescs || [])];

  /* ── 하자사진 관련 함수 ── */
  const methodData = casePhotos[selectedMethod] || { causes: [], completed: '', media: [] };

  const updateCaseData = (key, updater) => {
    setCasePhotos(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[key]) next[key] = { causes: [], completed: '', media: [] };

  const toEmbedUrl = (url) => {

    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;
    if (url.includes('/embed/')) return url;
    return url;
  };

                return (
                <button key={m.id} onClick={() => setSelectedMethod(m.id)} style={{
                  width:'100%', textAlign:'left', padding:'9px 14px',
                  background: selectedMethod === m.id ? '#EFF6FF' : 'transparent',
                  border:'none', borderLeft: selectedMethod === m.id ? '3px solid #2563EB' : '3px solid transparent',
                  color: selectedMethod === m.id ? '#1D4ED8' : 'var(--text)',
                  fontSize:12, fontWeight: selectedMethod === m.id ? 700 : 400,
                  cursor:'pointer', lineHeight:1.4, display:'flex', alignItems:'center', gap:6
                }}>
                  {hasData && <span style={{width:6,height:6,borderRadius:'50%',background:'#10B981',flexShrink:0}}/>}
                  {!hasData && <span style={{width:6,height:6,borderRadius:'50%',background:'#E5E7EB',flexShrink:0}}/>}
                  {m.label}
                </button>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* 오른쪽: 3섹션 통합 편집 영역 */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* 상단 헤더 + 저장 */}
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'12px 20px', borderBottom:'1px solid var(--border)', background:'#fff', flexShrink:0
        }}>

            <span style={{fontSize:11,color:'var(--text-sm)',background:'#F1F5F9',padding:'3px 10px',borderRadius:20,fontWeight:600}}>{methodInfo?.category}</span>

      <div style={{fontSize:11, fontWeight:700, color:'#F59E0B', marginBottom:12}}>
        STEP 3. POUR 해결방안 — 공정 미리보기
      </div>
      {/* 타임라인 */}
      <div style={{display:'flex', flexDirection:'column', gap:0}}>
        {steps.map((step, idx) => {
          const photo = photos[idx];
          const desc = descs[idx];
          const mat = mats[idx];
          const isActive = activeStep === idx;
          const photoUrl = photo && typeof photo === 'object' ? photo.url : photo;

          return (
            <div key={idx} style={{display:'flex', gap:12, marginBottom:8}}>
              {/* 타임라인 라인 */}
              <div style={{display:'flex', flexDirection:'column', alignItems:'center', width:32, flexShrink:0}}>
                <div
                  onClick={() => setActiveStep(isActive ? -1 : idx)}
                  style={{
                    width:28, height:28, borderRadius:'50%', cursor:'pointer',
                    background: isActive ? '#F59E0B' : '#334155',
                    color: isActive ? '#000' : 'rgba(255,255,255,.6)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:12, fontWeight:700, flexShrink:0, transition:'all .2s'
                  }}>{idx + 1}</div>
                {idx < steps.length - 1 && (
                  <div style={{width:2, flex:1, minHeight:8, background:'rgba(255,255,255,.1)', margin:'2px 0'}} />
                )}
              </div>

              {/* 내용 */}
              <div style={{flex:1, paddingBottom:8}}>
                <div
                  onClick={() => setActiveStep(isActive ? -1 : idx)}
                  style={{
                    fontSize:12, fontWeight:700,
                    color: isActive ? '#F59E0B' : 'rgba(255,255,255,.8)',
                    cursor:'pointer', marginBottom: isActive ? 8 : 0
                  }}>{step}</div>

                {isActive && (
                  <div style={{
                    background:'rgba(255,255,255,.05)', borderRadius:8,
                    padding:12, border:'1px solid rgba(255,255,255,.1)'
                  }}>
                    {photoUrl ? (
                      typeof photo === 'object' && photo.type === 'youtube' ? (
                        <div style={{aspectRatio:'16/9', borderRadius:6, overflow:'hidden', marginBottom:8}}>
                          <iframe src={photoUrl} style={{width:'100%', height:'100%', border:'none'}} allowFullScreen />
                        </div>
                      ) : (
                        <img src={photoUrl} style={{
                          width:'100%', aspectRatio:'16/9', objectFit:'cover',
                          borderRadius:6, marginBottom:8
                        }} alt={step} />
                      )
                    ) : (
                      <div style={{
                        width:'100%', aspectRatio:'16/9', background:'rgba(255,255,255,.05)',
                        borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center',
                        marginBottom:8, color:'rgba(255,255,255,.3)', fontSize:12
                      }}>사진 없음</div>
                    )}
                    {desc && <p style={{fontSize:11, color:'rgba(255,255,255,.6)', margin:0, lineHeight:1.7}}>{desc}</p>}
                    {mat && mat.name && (
                      <div style={{
                        marginTop:8, padding:'6px 10px', background:'rgba(37,99,235,.2)',
                        borderRadius:6, fontSize:11, color:'#93C5FD', fontWeight:600
                      }}>📦 {mat.name}</div>
                    )}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


// ─── 하자사진/미디어 편집기 컴포넌트 ───
const CASE_PHOTO_METHODS = [
  {id:'shingle', label:'아스팔트 슁글 방수', cat:'지붕'},
  {id:'metal', label:'금속기와 방수', cat:'지붕'},
  {id:'metal_coat', label:'금속기와/칼라강판 코팅', cat:'지붕'},
  {id:'slab_dual', label:'듀얼강화방수', cat:'방수'},
  {id:'slab_pvc', label:'PVC 방수', cat:'방수'},
  {id:'slab_urethane', label:'우레탄 방수', cat:'방수'},
  {id:'slab_acrylic', label:'아크릴 배면차수', cat:'방수'},
  {id:'parking_epoxy', label:'에폭시 바닥', cat:'바닥'},
  {id:'parking_emboss', label:'엠보라이닝 도장', cat:'바닥'},
  {id:'wall_premium', label:'균열보수+재도장 (프리미엄)', cat:'외벽'},
  {id:'wall_mid', label:'균열보수+재도장 (중급)', cat:'외벽'},
  {id:'wall_economy', label:'균열보수+재도장 (경제형)', cat:'외벽'},
  {id:'crack_surface', label:'탄성강화 바탕면', cat:'보수'},
  {id:'crack_section', label:'탄성강화 단면복구', cat:'보수'},
  {id:'crack_sheet', label:'복합시트 균열보수', cat:'보수'},
  {id:'ascon_repair', label:'아스콘 균열보수', cat:'토목'},
  {id:'ascon_seal', label:'아스콘 씰코팅', cat:'토목'},
  {id:'ascon_mma', label:'MMA 고강도 논슬립', cat:'토목'},
  {id:'block', label:'보도블럭 보수', cat:'토목'},
];

function CasePhotosEditor({ casePhotos, setCasePhotos, loaded, onReload, compressImageFile, showToast }) {
  const [selectedId, setSelectedId] = useState(CASE_PHOTO_METHODS[0].id);
  const [uploadingKey, setUploadingKey] = useState(null);

  if (!loaded) return (
    <div style={{textAlign:'center', padding:40}}>
      <div style={{fontSize:13, color:'var(--text-md)', marginBottom:12}}>Firebase에서 하자사진 데이터를 불러오는 중...</div>
      <button onClick={onReload} style={{padding:'8px 16px', borderRadius:8, border:'1px solid var(--border)', background:'#fff', fontSize:12, cursor:'pointer'}}>🔄 다시 불러오기</button>
    </div>
  );

  const methodData = casePhotos[selectedId] || { causes: [], completed: '', media: [] };
  const causes = methodData.causes || [];
  const media = methodData.media || (methodData.gif ? [methodData.gif] : []);
  const mediaThumbs = methodData.mediaThumbs || [];

  const updateCaseData = (key, updater) => {
    setCasePhotos(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[key]) next[key] = { causes: [], completed: '', media: [] };
      updater(next[key]);
      return next;
    });
  };

  const handleCauseUpload = async (file, idx) => {
    if (!file) return;
    setUploadingKey(`cause_${idx}`);
    try {
      const b64 = await compressImageFile(file, 480, 0.75);
      updateCaseData(selectedId, d => {
        if (!d.causes) d.causes = [];
        d.causes[idx] = b64;
      });
      showToast('하자사진 업로드 완료', 'success');
    } catch(e) { showToast('업로드 실패', 'error'); }
    setUploadingKey(null);
  };

  const handleCompletedUpload = async (file) => {
    if (!file) return;
    setUploadingKey('completed');
    try {
      const b64 = await compressImageFile(file, 600, 0.8);
      updateCaseData(selectedId, d => { d.completed = b64; });
      showToast('완공사진 업로드 완료', 'success');
    } catch(e) { showToast('업로드 실패', 'error'); }
    setUploadingKey(null);
  };

  const handleMediaUpload = async (file, idx) => {
    if (!file) return;
    setUploadingKey(`media_${idx}`);
    try {
      const b64 = await compressImageFile(file, 480, 0.75);
      updateCaseData(selectedId, d => {
        if (!d.media) d.media = [];
        d.media[idx] = b64;
        delete d.gif;
      });
      showToast('미디어 업로드 완료', 'success');
    } catch(e) { showToast('업로드 실패', 'error'); }
    setUploadingKey(null);
  };

  const selectedMethod = CASE_PHOTO_METHODS.find(m => m.id === selectedId);

  return (
    <div style={{display:'flex', gap:0, height:'calc(100vh - 200px)', overflow:'hidden', margin:-20}}>
      {/* 왼쪽: 공법 목록 */}
      <div style={{width:180, flexShrink:0, borderRight:'1px solid var(--border)', overflowY:'auto', background:'#f8f9fa'}}>
        {['지붕','방수','바닥','외벽','보수','토목'].map(cat => {
          const ms = CASE_PHOTO_METHODS.filter(m => m.cat === cat);
          return (
            <div key={cat}>
              <div style={{padding:'6px 10px 3px', fontSize:9, fontWeight:700, color:'rgba(0,0,0,.35)', letterSpacing:1, background:'#f0f1f3', borderBottom:'1px solid var(--border)'}}>{cat.toUpperCase()}</div>
              {ms.map(m => {
                const hasData = !!(casePhotos[m.id]?.causes?.some(c=>c) || casePhotos[m.id]?.completed || casePhotos[m.id]?.media?.some(x=>x));
                return (
                  <button key={m.id} onClick={() => setSelectedId(m.id)} style={{
                    width:'100%', textAlign:'left', padding:'8px 10px',
                    background: selectedId === m.id ? '#EFF6FF' : 'transparent',
                    border:'none', borderLeft: selectedId === m.id ? '3px solid #2563EB' : '3px solid transparent',
                    color: selectedId === m.id ? '#1D4ED8' : 'var(--text)',
                    fontSize:11, fontWeight: selectedId === m.id ? 700 : 400,
                    cursor:'pointer', lineHeight:1.4, display:'flex', alignItems:'center', gap:4
                  }}>
                    {hasData && <span style={{width:6, height:6, borderRadius:'50%', background:'#10B981', flexShrink:0}} />}
                    {!hasData && <span style={{width:6, height:6, borderRadius:'50%', background:'#E5E7EB', flexShrink:0}} />}
                    {m.label}
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* 오른쪽: 편집 영역 */}
      <div style={{flex:1, overflowY:'auto', padding:16}}>
        <div style={{marginBottom:12, padding:'8px 12px', background:'#FFF7ED', borderRadius:8, borderLeft:'4px solid #F59E0B'}}>
          <span style={{fontSize:12, fontWeight:700, color:'#92400E'}}>📸 {selectedMethod?.label} — 하자사진 · 완공사진 · 미디어 편집</span>
          <div style={{fontSize:11, color:'#B45309', marginTop:2}}>사진 클릭 또는 파일 버튼으로 업로드. 저장 버튼을 눌러야 Firebase에 반영됩니다.</div>
        </div>

        {/* 하자 사진 */}
        <div style={{background:'#fff', borderRadius:10, border:'1px solid var(--border)', padding:14, marginBottom:12}}>
          <div style={{fontSize:13, fontWeight:800, color:'var(--text)', marginBottom:8}}>🔴 하자 사진 <span style={{fontSize:11, fontWeight:400, color:'var(--text-sm)'}}>({causes.filter(c=>c).length}장 등록됨)</span></div>
          <div style={{display:'flex', flexWrap:'wrap', gap:8, marginBottom:8}}>
            {[...causes, ''].map((url, i) => {
              if (i > causes.length) return null;
              const isPlaceholder = i === causes.length;
              return (
                <div key={i} style={{position:'relative'}}>
                  <div style={{
                    width:100, height:100, borderRadius:8, border:'2px dashed var(--border)',
                    background: url ? 'transparent' : '#f9fafb',
                    overflow:'hidden', cursor:'pointer', position:'relative'
                  }} onClick={() => document.getElementById(`cause_file_${selectedId}_${i}`)?.click()}>
                    {url ? (
                      <img src={url} style={{width:'100%', height:'100%', objectFit:'cover'}} alt={`하자${i+1}`} />
                    ) : (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:4}}>
                        {uploadingKey === `cause_${i}` ? (
                          <div style={{fontSize:10, color:'var(--text-sm)'}}>업로드 중...</div>
                        ) : (
                          <>
                            <div style={{fontSize:20}}>+</div>
                            <div style={{fontSize:10, color:'var(--text-sm)'}}>사진 추가</div>
                          </>
                        )}
                      </div>
                    )}
                  </div>
                  {url && (
                    <button onClick={() => updateCaseData(selectedId, d => { d.causes.splice(i, 1); })} style={{
                      position:'absolute', top:-6, right:-6, width:18, height:18, borderRadius:'50%',
                      background:'#DC2626', color:'#fff', border:'none', fontSize:10, cursor:'pointer',
                      display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700
                    }}>✕</button>
                  )}
                  <input type="file" accept="image/*" id={`cause_file_${selectedId}_${i}`} style={{display:'none'}}
                    onChange={e => handleCauseUpload(e.target.files[0], i)} />
                </div>
              );
            })}
          </div>
          <div style={{fontSize:11, color:'var(--text-sm)'}}>💡 사진을 클릭하면 파일 선택창이 열립니다. 마지막 + 버튼으로 사진을 추가할 수 있습니다.</div>
        </div>

        {/* 완공 사진 */}
        <div style={{background:'#fff', borderRadius:10, border:'1px solid var(--border)', padding:14, marginBottom:12}}>
          <div style={{fontSize:13, fontWeight:800, color:'var(--text)', marginBottom:8}}>✅ 완공 사진</div>
          <div style={{display:'flex', gap:12, alignItems:'flex-start'}}>
            <div style={{
              width:120, height:120, borderRadius:8, border:'2px dashed var(--border)',
              background: methodData.completed ? 'transparent' : '#f9fafb',
              overflow:'hidden', cursor:'pointer', flexShrink:0
            }} onClick={() => document.getElementById(`completed_file_${selectedId}`)?.click()}>
              {methodData.completed ? (
                <img src={methodData.completed} style={{width:'100%', height:'100%', objectFit:'cover'}} alt="완공" />
              ) : (
                <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:4}}>
                  {uploadingKey === 'completed' ? (
                    <div style={{fontSize:10, color:'var(--text-sm)'}}>업로드 중...</div>
                  ) : (
                    <>
                      <div style={{fontSize:24}}>🏆</div>
                      <div style={{fontSize:10, color:'var(--text-sm)'}}>완공사진</div>
                    </>
                  )}
                </div>
              )}
            </div>
            <div style={{flex:1}}>
              <input type="text" value={methodData.completed || ''}
                onChange={e => updateCaseData(selectedId, d => { d.completed = e.target.value; })}
                placeholder="완공사진 URL 직접 입력 (또는 왼쪽 클릭으로 업로드)"
                style={{width:'100%', padding:'8px 10px', borderRadius:8, border:'1px solid var(--border)', fontSize:12, boxSizing:'border-box', fontFamily:'inherit'}}
              />
              {methodData.completed && (
                <button onClick={() => updateCaseData(selectedId, d => { d.completed = ''; })} style={{
                  marginTop:6, padding:'4px 10px', borderRadius:6, border:'1px solid #FCA5A5',
                  background:'#FEF2F2', color:'#DC2626', fontSize:11, cursor:'pointer'
                }}>🗑 완공사진 제거</button>
              )}
            </div>
            <input type="file" accept="image/*" id={`completed_file_${selectedId}`} style={{display:'none'}}
              onChange={e => handleCompletedUpload(e.target.files[0])} />
          </div>
        </div>

        {/* 미디어 (YouTube/GIF/영상) */}
        <div style={{background:'#fff', borderRadius:10, border:'1px solid var(--border)', padding:14}}>
          <div style={{fontSize:13, fontWeight:800, color:'var(--text)', marginBottom:8}}>🎬 미디어 <span style={{fontSize:11, fontWeight:400, color:'var(--text-sm)'}}>YouTube · GIF · 이미지 (복수 등록 가능)</span></div>
          {media.map((url, mi) => (
            <div key={mi} style={{marginBottom:10, padding:10, background:'#f9fafb', borderRadius:8, border:'1px solid var(--border)'}}>
              <div style={{display:'flex', gap:8, alignItems:'flex-start'}}>
                {/* 썸네일 */}
                <div style={{width:80, height:60, borderRadius:6, border:'1px solid var(--border)', background:'#f0f1f3', overflow:'hidden', flexShrink:0, cursor:'pointer'}}
                  onClick={() => document.getElementById(`media_file_${selectedId}_${mi}`)?.click()}>
                  {mediaThumbs[mi] ? (
                    <img src={mediaThumbs[mi]} style={{width:'100%', height:'100%', objectFit:'cover'}} alt="썸네일" />
                  ) : url && !url.includes('youtube') && !url.includes('youtu.be') && !url.includes('embed') ? (
                    <img src={url} style={{width:'100%', height:'100%', objectFit:'cover'}} alt="미디어" />
                  ) : (
                    <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100%', fontSize:20}}>
                      {url && (url.includes('youtube') || url.includes('youtu.be') || url.includes('embed')) ? '▶️' : '🖼'}
                    </div>
                  )}
                </div>
                <div style={{flex:1}}>
                  <input value={url || ''} placeholder={`YouTube/Drive/mp4 URL ${mi+1}`}
                    onChange={e => updateCaseData(selectedId, d => {
                      if (!d.media) d.media = [];
                      d.media[mi] = e.target.value;
                      delete d.gif;
                    })}
                    style={{width:'100%', padding:'7px 10px', borderRadius:7, border:'1px solid var(--border)', fontSize:12, fontFamily:'inherit', boxSizing:'border-box'}}
                  />
                  <div style={{display:'flex', gap:6, marginTop:6}}>
                    <button onClick={() => document.getElementById(`media_file_${selectedId}_${mi}`)?.click()}
                      style={{padding:'4px 10px', borderRadius:6, border:'1px solid var(--border)', background:'#f3f4f6', fontSize:11, cursor:'pointer'}}>📁 이미지 업로드</button>
                    <button onClick={() => updateCaseData(selectedId, d => {
                      if (d.media) d.media.splice(mi, 1);
                      if (d.mediaThumbs) d.mediaThumbs.splice(mi, 1);
                    })} style={{padding:'4px 10px', borderRadius:6, border:'1px solid #FCA5A5', background:'#FEF2F2', color:'#DC2626', fontSize:11, cursor:'pointer'}}>✕ 제거</button>
                  </div>
                </div>
              </div>
              <input type="file" accept="image/*" id={`media_file_${selectedId}_${mi}`} style={{display:'none'}}
                onChange={e => handleMediaUpload(e.target.files[0], mi)} />
            </div>
          ))}
          <button onClick={() => updateCaseData(selectedId, d => {
            if (!d.media) d.media = [];
            d.media.push('');
            delete d.gif;
          })} style={{padding:'6px 14px', borderRadius:8, border:'1.5px dashed var(--accent)', background:'transparent', color:'var(--accent)', fontSize:12, fontWeight:600, cursor:'pointer'}}>+ 미디어 추가</button>
        </div>
      </div>
    </div>
  );
}

// ─── 공법 카드 사진 편집기 컴포넌트 ───
function ProbPhotosEditor({ probPhotos, setProbPhotos, loaded, onReload, compressImageFile, showToast }) {
  const [uploadingKey, setUploadingKey] = useState(null);

  if (!loaded) return (
    <div style={{textAlign:'center', padding:40}}>
      <div style={{fontSize:13, color:'var(--text-md)', marginBottom:12}}>Firebase에서 공법 카드 사진 데이터를 불러오는 중...</div>
      <button onClick={onReload} style={{padding:'8px 16px', borderRadius:8, border:'1px solid var(--border)', background:'#fff', fontSize:12, cursor:'pointer'}}>🔄 다시 불러오기</button>
    </div>
  );

  const handleUpload = async (file, methodId) => {
    if (!file) return;
    setUploadingKey(methodId);
    try {
      const b64 = await compressImageFile(file, 600, 0.8);
      setProbPhotos(prev => ({ ...prev, [methodId]: b64 }));
      showToast('카드 사진 업로드 완료', 'success');
    } catch(e) { showToast('업로드 실패', 'error'); }
    setUploadingKey(null);
  };

  return (
    <div>
      <div style={{marginBottom:12, padding:'8px 12px', background:'#F5F3FF', borderRadius:8, borderLeft:'4px solid #7C3AED'}}>
        <span style={{fontSize:12, fontWeight:700, color:'#5B21B6'}}>🏗 공법 선택 화면 카드 썸네일 편집</span>
        <div style={{fontSize:11, color:'#6D28D9', marginTop:2}}>각 공법 카드에 표시되는 대표 이미지입니다. 클릭하여 업로드하거나 URL을 직접 입력하세요.</div>
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:12}}>
        {CASE_PHOTO_METHODS.map(m => {
          const src = probPhotos[m.id] || '';
          return (
            <div key={m.id} style={{background:'#fff', borderRadius:10, border:'1px solid var(--border)', overflow:'hidden'}}>
              {/* 썸네일 */}
              <div style={{
                height:120, background:'#f0f1f3', cursor:'pointer', position:'relative', overflow:'hidden'
              }} onClick={() => document.getElementById(`prob_file_${m.id}`)?.click()}>
                {src ? (
                  <img src={src} style={{width:'100%', height:'100%', objectFit:'cover'}} alt={m.label} />
                ) : (
                  <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', gap:4}}>
                    {uploadingKey === m.id ? (
                      <div style={{fontSize:11, color:'var(--text-sm)'}}>업로드 중...</div>
                    ) : (
                      <>
                        <div style={{fontSize:28}}>📷</div>
                        <div style={{fontSize:11, color:'var(--text-sm)'}}>클릭하여 업로드</div>
                      </>
                    )}
                  </div>
                )}
                {src && (
                  <button onClick={e => { e.stopPropagation(); setProbPhotos(prev => { const n = {...prev}; delete n[m.id]; return n; }); }} style={{
                    position:'absolute', top:4, right:4, width:20, height:20, borderRadius:'50%',
                    background:'rgba(220,38,38,.9)', color:'#fff', border:'none', fontSize:10,
                    cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'
                  }}>✕</button>
                )}
              </div>
              {/* 정보 */}
              <div style={{padding:'8px 10px'}}>
                <div style={{fontSize:11, fontWeight:700, color:'var(--text)', marginBottom:4}}>{m.label}</div>
                <div style={{fontSize:10, color:'var(--text-sm)', marginBottom:6}}>{m.cat}</div>
                <input type="text" value={src || ''}
                  onChange={e => setProbPhotos(prev => ({ ...prev, [m.id]: e.target.value }))}
                  placeholder="이미지 URL 직접 입력"
                  style={{width:'100%', padding:'5px 8px', borderRadius:6, border:'1px solid var(--border)', fontSize:10, boxSizing:'border-box', fontFamily:'inherit'}}
                />
              </div>
              <input type="file" accept="image/*" id={`prob_file_${m.id}`} style={{display:'none'}}
                onChange={e => handleUpload(e.target.files[0], m.id)} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

const DOC_TYPES=['시방서','제안서','카탈로그','인증서/시험성적서','특허','회사소개서','단가표','기타'];

function SalesDocsPage({showToast}){
  const [docs,setDocs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({title:'',docType:'시방서',category:'방수',description:'',file:null});
  const [uploading,setUploading]=useState(false);
  const [filterType,setFilterType]=useState('전체');

  const fetchDocs=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection(COLLECTIONS.SALES_DOCS).get();
      const arr=[];snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      arr.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
      console.log(`[sales-docs] ${arr.length}건 로드`);
      setDocs(arr);
    }catch(e){console.error('[sales-docs] 로드 실패:',e);}
    setLoading(false);
  };

  useEffect(()=>{fetchDocs();},[]);

  const save=async()=>{
    if(!form.title.trim()){showToast('제목을 입력하세요','error');return;}
    if(!form.file&&showForm==='new'){showToast('파일을 선택하세요','error');return;}
    setUploading(true);
    try{
      let fileUrl='',fileName='',fileSize=0;
      if(form.file){
        const path=`sales-docs/${Date.now()}_${form.file.name}`;
        const ref=storage.ref(path);
        await ref.put(form.file);
        fileUrl=await ref.getDownloadURL();
        fileName=form.file.name;
        fileSize=form.file.size;
      }
      const data={
        title:form.title,docType:form.docType,category:form.category,
        description:form.description,updatedAt:new Date().toISOString(),
      };
      if(fileUrl){data.fileUrl=fileUrl;data.fileName=fileName;data.fileSize=fileSize;}

      if(showForm==='new'){
        data.createdAt=new Date().toISOString();
        await db.collection(COLLECTIONS.SALES_DOCS).add(data);
        showToast('영업자료 등록 완료');
      }else{
        await db.collection(COLLECTIONS.SALES_DOCS).doc(showForm).update(data);
        showToast('수정 완료');
      }
      setShowForm(false);setForm({title:'',docType:'시방서',category:'방수',description:'',file:null});fetchDocs();
    }catch(e){console.error(e);showToast('저장 실패','error');}
    setUploading(false);
  };

  const deleteDoc=async(id)=>{
    if(!confirm('정말 삭제하시겠습니까?'))return;
    try{
      await db.collection(COLLECTIONS.SALES_DOCS).doc(id).delete();
      showToast('삭제 완료');fetchDocs();
    }catch(e){showToast('삭제 실패','error');}
  };

  const formatSize=(bytes)=>{if(!bytes)return'-';if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';return(bytes/1048576).toFixed(1)+'MB';};

  const filtered=filterType==='전체'?docs:docs.filter(d=>d.docType===filterType);

  const TYPE_ICONS={'시방서':'📋','제안서':'📄','카탈로그':'📘','인증서/시험성적서':'🏅','특허':'📜','회사소개서':'🏢','단가표':'💲','기타':'📎'};

  /* ── 등록/수정 모달 ── */
  const FormModal=()=>(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setShowForm(false)}>
      <div style={{background:'#fff',borderRadius:16,padding:24,width:'min(440px,90vw)',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>{showForm==='new'?'영업자료 등록':'영업자료 수정'}</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>제목 *</label>
            <input style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none'}} value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="POUR 듀얼강화방수 시방서"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>자료유형</label>
              <select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff'}} value={form.docType} onChange={e=>setForm({...form,docType:e.target.value})}>
                {DOC_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select></div>
            <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>분류</label>
              <select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff'}} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                {['방수','도장','보수/보강','토목','공통'].map(c=><option key={c} value={c}>{c}</option>)}
              </select></div>
          </div>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>설명 (선택)</label>
            <textarea style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',resize:'vertical',minHeight:50}} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="자료에 대한 설명"/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:4,display:'block'}}>파일{showForm==='new'?' *':' (변경 시 선택)'}</label>
            <input type="file" onChange={e=>setForm({...form,file:e.target.files[0]||null})} style={{fontSize:12}}/></div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:20}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
          <button onClick={save} disabled={uploading} style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'var(--blue)',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit',color:'#fff',opacity:uploading?0.6:1}}>{uploading?'업로드 중...':'저장'}</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800}}>📎 영업자료 관리</div>
          <div style={{fontSize:12,color:'var(--text-sm)',marginTop:4}}>총 {docs.length}건</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={fetchDocs} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>🔄</button>
          <button onClick={()=>{setForm({title:'',docType:'시방서',category:'방수',description:'',file:null});setShowForm('new');}} style={{padding:'8px 16px',borderRadius:8,border:'none',background:'var(--blue)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>+ 자료 등록</button>
        </div>
      </div>

      {/* 필터 탭 */}
      <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
        {['전체',...DOC_TYPES].map(t=>(

        ))}
      </div>

      {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>
      :filtered.length===0?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>등록된 자료가 없습니다</div>
      :<div style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>

          <tbody>
            {filtered.map(d=>(

                <td style={{padding:'10px 14px',color:'var(--text-sm)',fontSize:12}}>{d.createdAt?new Date(d.createdAt).toLocaleDateString('ko'):'-'}</td>

                  <div style={{display:'flex',gap:6}}>
                    {d.fileUrl&&<a href={d.fileUrl} target="_blank" rel="noopener" style={{padding:'4px 10px',borderRadius:6,background:'var(--blue)',color:'#fff',fontSize:11,fontWeight:600,textDecoration:'none'}}>다운로드</a>}

                </td>
              </tr>

          </tbody>
        </table>
      </div>}

      {showForm&&<FormModal/>}
    </div>
  );
}

function ExpoLeadsPage({showToast,onNavigate}){

  const [filterStatus,setFilterStatus]=useState('전체');

  const fetchLeads=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection('leads').get();
      let arr=[];
      snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      /* 박람회 소스만 필터 (source 없는 기존 데이터는 박람회로 간주) */
      arr=arr.filter(l=>(!l.source||['expo','exhibition','tablet','박람회','qr',''].includes(l.source))&&!l.deletedAt);
      arr.sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
      console.log(`[expo] 박람회 리드: ${arr.length}건`);
      setLeads(arr);
    }catch(e){console.error(e);}
    setLoading(false);
  };

  useEffect(()=>{fetchLeads();},[]);

  const updateStatus=async(id,newStatus)=>{
    try{
      await db.collection('leads').doc(id).update({status:newStatus,updatedAt:new Date().toISOString()});
      setLeads(prev=>prev.map(l=>l.id===id?{...l,status:newStatus}:l));
      if(selected?.id===id)setSelected(prev=>({...prev,status:newStatus}));
      showToast(`${newStatus}(으)로 변경됨`);
    }catch(e){showToast('상태 변경 실패','error');}
  };

  const deleteLead=async(id)=>{
    if(!confirm('휴지통으로 이동하시겠습니까?'))return;
    try{
      const deletedAt=new Date().toISOString();
      await db.collection('leads').doc(id).update({deletedAt});
      setLeads(prev=>prev.map(l=>l.id===id?{...l,deletedAt}:l));
      setSelected(null);showToast('휴지통으로 이동됨');
    }catch(e){showToast('삭제 실패','error');}
  };

    try{
      const deletedAt=new Date().toISOString();
      await Promise.all([...ids].map(id=>db.collection('leads').doc(id).update({deletedAt})));
      setLeads(prev=>prev.map(l=>ids.has(l.id)?{...l,deletedAt}:l));
      showToast(`${ids.size}건을 휴지통으로 이동했습니다`);
    }catch(e){showToast('삭제 실패','error');}

    try{
      await db.collection('leads').doc(id).update({deletedAt:firebase.firestore.FieldValue.delete()});
