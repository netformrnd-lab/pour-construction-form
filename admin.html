      </div>
    );
  }

  const maxProb  = problemKeywords[0]?.[1] || 1;
  const maxPos   = positiveKeywords[0]?.[1] || 1;
  const maxNeg   = negativeKeywords[0]?.[1] || 1;
  const maxMonth = Math.max(...monthlyTrend.map(m => m.count), 1);

  const TABS = [
    { key: 'insight',  label: '종합 인사이트', color: '#2563EB' },
    { key: 'problem',  label: '문제 키워드',   color: '#7C3AED' },
    { key: 'positive', label: '긍정 키워드',   color: '#059669' },
    { key: 'negative', label: '부정 키워드',   color: '#DC2626' },
  ];

  // ── 순위 행 공통 컴포넌트 ──
  const RankRow = ({ name, count, rank, max, color, dimColor }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
      <div style={{ width: 18, fontSize: 11, fontWeight: 700, color: rank < 3 ? color : 'var(--text-sm)', flexShrink: 0, textAlign: 'center' }}>{rank + 1}</div>
      <div style={{ flex: 1, fontSize: 12, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</div>
      <div style={{ width: 110, height: 8, background: '#F3F4F6', borderRadius: 4, overflow: 'hidden', flexShrink: 0 }}>
        <div style={{ width: Math.round(count / max * 100) + '%', height: '100%', background: rank < 3 ? color : dimColor, borderRadius: 4 }} />
      </div>
      <div style={{ fontSize: 11, fontWeight: 700, color, minWidth: 24, textAlign: 'right' }}>{count}</div>
    </div>
  );

  return (
    <div style={{ animation: 'fadeIn .3s ease', maxWidth: 1200 }}>
      {/* 헤더 */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--text)' }}>키워드 분석 대시보드</div>
          <div style={{ fontSize: 12, color: 'var(--text-sm)', marginTop: 4 }}>박람회 상담 · NPS 기반 고객 니즈 & 영업 인사이트</div>
        </div>
        <button onClick={loadData}
          style={{ padding: '8px 14px', borderRadius: 8, border: '1px solid var(--border)', background: '#fff', fontSize: 12, fontWeight: 600, cursor: 'pointer', color: 'var(--text-md)', fontFamily: 'inherit' }}>
          새로고침
        </button>
      </div>

      {/* 요약 카드 5개 */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 10, marginBottom: 20 }}>
        {[
          { label: '총 박람회 상담', value: leads.length + '건', color: '#2563EB', bg: '#EFF6FF' },
          { label: '문제 키워드 종류', value: problemKeywords.length + '개', color: '#7C3AED', bg: '#F5F3FF' },
          { label: '긍정 키워드', value: positiveKeywords.length + '개', color: '#059669', bg: '#ECFDF5' },
          { label: '부정 키워드', value: negativeKeywords.length + '개', color: '#DC2626', bg: '#FEF2F2' },
          { label: 'NPS 응답 수', value: surveys.length + '건', color: '#D97706', bg: '#FFFBEB' },
        ].map(c => (
          <div key={c.label} style={{ background: c.bg, borderRadius: 12, padding: '14px 16px' }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: c.color, marginBottom: 6 }}>{c.label}</div>
            <div style={{ fontSize: 22, fontWeight: 900, color: c.color }}>{c.value}</div>
          </div>
        ))}
      </div>

      {/* 탭 */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
        {TABS.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}

              border: tab === t.key ? 'none' : '1px solid var(--border)',
              background: tab === t.key ? t.color : '#fff',
              color: tab === t.key ? '#fff' : 'var(--text-md)',
            }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ══ 종합 인사이트 탭 ══ */}
      {tab === 'insight' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>

          {/* 영업 액션 인사이트 카드 */}
          {insights.length > 0 && (
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>영업 액션 인사이트</div>
              <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: 14 }}>데이터 기반 자동 생성 — 즉시 활용 가능한 영업 포인트</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
                {insights.map((ins, i) => (
                  <div key={i} style={{ background: ins.bg, borderRadius: 10, padding: '14px 16px', borderLeft: `3px solid ${ins.color}` }}>
                    <div style={{ fontSize: 20, marginBottom: 8 }}>{ins.icon}</div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: ins.color, marginBottom: 5 }}>{ins.title}</div>
                    <div style={{ fontSize: 11, color: 'var(--text-md)', lineHeight: 1.55 }}>{ins.body}</div>
                  </div>
                ))}
              </div>
            </div>

          {/* 카테고리 분포 + 월별 추이 */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            {/* 문제 카테고리 */}
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>문제 카테고리 분포</div>

                    <div style={{ fontSize: 11, fontWeight: 700, color: c.color, minWidth: 66, textAlign: 'right' }}>{c.cnt}건 ({c.pct}%)</div>

              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, height: 110, padding: '0 4px' }}>

                  const isMax = m.count === maxMonth && m.count > 0;

                    <div key={m.key} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: isMax ? '#2563EB' : m.count > 0 ? 'var(--text-md)' : 'transparent' }}>{m.count}</div>
                      <div style={{ width: '100%', height: h, borderRadius: '4px 4px 0 0', background: isMax ? '#2563EB' : '#BFDBFE', transition: 'height .4s' }} />
                      <div style={{ fontSize: 10, color: 'var(--text-sm)', fontWeight: isMax ? 700 : 400 }}>{m.label}</div>
                    </div>

            </div>

          {/* 상담 대상 직급 + 영업 자료 요청 */}

              <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: 14 }}>박람회에서 직접 상담한 고객 직급 — 영업 접근 전략 수립 기준</div>
              {positionStats.length === 0 ? (
                <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
              ) : positionStats.map(([pos, cnt], i) => (
                <RankRow key={pos} name={pos} count={cnt} rank={i} max={positionStats[0][1]} color="#0891B2" dimColor="#A5F3FC" />
              ))}
            </div>
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>영업 자료 요청 현황</div>
              <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: 14 }}>상담 후 고객 요청 자료 — 박람회 사전 준비 우선순위</div>
              {actionStats.length === 0 ? (
                <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
              ) : actionStats.map(([action, cnt], i) => (
                <RankRow key={action} name={action} count={cnt} rank={i} max={actionStats[0][1]} color="#D97706" dimColor="#FCD34D" />
              ))}
            </div>
          </div>

          {/* 건물 유형별 TOP 3 문제 */}
          {buildingProblems.length > 0 && (
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>건물 유형별 주요 문제</div>
              <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: 14 }}>타겟 건물별 핵심 영업 포인트 — 방문 전 맞춤 준비에 활용하세요</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
                {buildingProblems.slice(0, 6).map(b => (
                  <div key={b.id} style={{ background: 'var(--bg)', borderRadius: 10, padding: '14px 16px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, paddingBottom: 8, borderBottom: '1px solid var(--border-s)' }}>
                      <span style={{ fontSize: 20 }}>{b.icon}</span>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700 }}>{b.label}</div>
                        <div style={{ fontSize: 10, color: 'var(--text-sm)' }}>상담 {b.count}건</div>
                      </div>
                    </div>
                    {b.topProblems.length === 0 ? (
                      <div style={{ fontSize: 11, color: 'var(--text-sm)' }}>-</div>
                    ) : b.topProblems.map(([prob, cnt], i) => (
                      <div key={prob} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: '#7C3AED', width: 14, flexShrink: 0 }}>{i + 1}</div>
                        <div style={{ flex: 1, fontSize: 11, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{prob}</div>
                        <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--text-sm)', flexShrink: 0 }}>{cnt}건</div>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 착공 희망월 + 지역 분포 */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            {/* 착공 희망월 분포 */}
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>착공 희망월 분포</div>
              <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: 14 }}>
                희망 착공일자 입력 건수: {leads.filter(l => l.desiredStartDate).length}건 —
                성수기 파악 및 일정 계획에 활용
              </div>
              {leads.filter(l => l.desiredStartDate).length === 0 ? (
                <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
              ) : (() => {
                const maxM = Math.max(...startMonthStats.map(m => m.count), 1);
                return (
                  <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 100 }}>
                    {startMonthStats.map(m => {
                      const h = m.count > 0 ? Math.max(Math.round((m.count / maxM) * 80), 4) : 4;
                      const isTop = m.count === maxM && m.count > 0;
                      return (
                        <div key={m.month} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3 }}>
                          <div style={{ fontSize: 9, fontWeight: 700, color: isTop ? '#2563EB' : m.count > 0 ? 'var(--text-md)' : 'transparent' }}>{m.count}</div>
                          <div style={{ width: '100%', height: h, borderRadius: '3px 3px 0 0', background: isTop ? '#2563EB' : '#BFDBFE' }} />
                          <div style={{ fontSize: 9, color: 'var(--text-sm)', fontWeight: isTop ? 700 : 400 }}>{m.label}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>

            {/* 지역 분포 */}
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
                <div style={{ fontSize: 13, fontWeight: 700 }}>현장 지역 분포</div>
                <button onClick={() => setShowRegionConfig(v => !v)}
                  style={{ fontSize: 10, padding: '3px 8px', borderRadius: 6, border: '1px solid var(--border)', background: showRegionConfig ? '#EFF6FF' : '#fff', color: showRegionConfig ? '#2563EB' : 'var(--text-sm)', cursor: 'pointer', fontFamily: 'inherit' }}>
                  매핑 설정
                </button>
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: showRegionConfig ? 10 : 14 }}>
                입력 건수: {leads.filter(l => l.region).length}건 — 자동 시/도 정규화 적용
              </div>

              {/* 매핑 설정 패널 */}
              {showRegionConfig && (
                <div style={{ marginBottom: 14, padding: 12, background: '#EFF6FF', borderRadius: 8, border: '1px solid #BFDBFE' }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: '#2563EB', marginBottom: 6 }}>지역 매핑 추가 (키=시도, 한 줄에 하나)</div>
                  <div style={{ fontSize: 10, color: 'var(--text-sm)', marginBottom: 8 }}>예: 역삼=서울 / 판교=경기 / 송도=인천</div>
                  <textarea
                    value={aliasText}
                    onChange={e => setAliasText(e.target.value)}
                    rows={4}
                    style={{ width: '100%', padding: '8px 10px', border: '1px solid #BFDBFE', borderRadius: 6, fontSize: 11, fontFamily: 'inherit', resize: 'vertical', boxSizing: 'border-box' }}
                    placeholder={'역삼=서울\n판교=경기\n송도=인천'}
                  />
                  <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                    <button onClick={saveRegionAliases}
                      style={{ flex: 1, padding: '7px 0', borderRadius: 6, border: 'none', background: '#2563EB', color: '#fff', fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>
                      저장
                    </button>
                    <button onClick={() => setShowRegionConfig(false)}
                      style={{ padding: '7px 12px', borderRadius: 6, border: '1px solid var(--border)', background: '#fff', fontSize: 11, cursor: 'pointer', fontFamily: 'inherit' }}>
                      닫기
                    </button>
                  </div>
                </div>

                <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>

                <RankRow key={region} name={region} count={cnt} rank={i} max={regionStats[0][1]} color="#E8780F" dimColor="#FED7AA" />
              ))}
            </div>
          </div>

          {/* 자주 언급된 문제 키워드 TOP 12 (2열) */}
          <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>자주 언급된 문제 키워드 TOP 12</div>
            <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: 14 }}>박람회 상담 고객이 선택한 하자·문제 유형 ({leads.length}건 기준)</div>
            {problemKeywords.length === 0 ? (
              <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0 32px' }}>
                {problemKeywords.slice(0, 12).map(([name, cnt]) => (
                  <KeywordBar key={name} name={name} count={cnt} max={maxProb} color="#7C3AED" />
                ))}
              </div>
            )}
          </div>

          {/* 긍정 / 부정 요약 */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: '#059669', marginBottom: 4 }}>긍정 키워드 TOP (NPS 만족 요인)</div>

              {positiveKeywords.length === 0 ? (
                <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
              ) : positiveKeywords.slice(0, 6).map(([name, cnt]) => (
                <KeywordBar key={name} name={name} count={cnt} max={maxPos} color="#059669" />
              ))}
            </div>
            <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: '#DC2626', marginBottom: 4 }}>부정 키워드 TOP (NPS 개선 요인)</div>
              <div style={{ fontSize: 11, color: 'var(--text-sm)', marginBottom: 14 }}>NPS 설문 응답 ({surveys.length}건) — 선제적 대응 필요</div>
              {negativeKeywords.length === 0 ? (
                <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
              ) : negativeKeywords.slice(0, 6).map(([name, cnt]) => (
                <KeywordBar key={name} name={name} count={cnt} max={maxNeg} color="#DC2626" />
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ══ 문제 키워드 탭 ══ */}
      {tab === 'problem' && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#7C3AED', marginBottom: 16 }}>문제 키워드 전체 순위 ({problemKeywords.length}개)</div>
            {problemKeywords.length === 0 ? (
              <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
            ) : problemKeywords.map(([name, cnt], i) => (

      )}

      {/* ══ 긍정 키워드 탭 ══ */}

              <RankRow key={name} name={name} count={cnt} rank={i} max={maxPos} color="#059669" dimColor="#6EE7B7" />

      )}

      {/* ══ 부정 키워드 탭 ══ */}
      {tab === 'negative' && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#DC2626', marginBottom: 16 }}>부정 키워드 전체 순위 ({negativeKeywords.length}개)</div>
            {negativeKeywords.length === 0 ? (
              <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
            ) : negativeKeywords.map(([name, cnt], i) => (
              <RankRow key={name} name={name} count={cnt} rank={i} max={maxNeg} color="#DC2626" dimColor="#FCA5A5" />

    </div>
  );
}

// ─── 설정 페이지 (PIN 변경) ───
function SettingsPage({ showToast, onLogout }) {
  const [currentPin, setCurrentPin] = useState('');
  const [newPin, setNewPin] = useState('');
  const [confirmPin, setConfirmPin] = useState('');
  const [changing, setChanging] = useState(false);

  const handleChangePin = async () => {
    if (newPin.length < 4) { showToast('새 PIN은 4자리 이상 입력하세요', 'error'); return; }
    if (newPin !== confirmPin) { showToast('새 PIN이 일치하지 않습니다', 'error'); return; }

    setChanging(true);
    try {
      const saved = localStorage.getItem(ADMIN_PIN_KEY);
      if (saved) {
        const hashed = await hashPin(currentPin);
        if (hashed !== saved) {
          showToast('현재 PIN이 일치하지 않습니다', 'error');
          setChanging(false);
          return;
        }
      }
      const newHash = await hashPin(newPin);
      localStorage.setItem(ADMIN_PIN_KEY, newHash);
      showToast('PIN이 변경되었습니다');
      setCurrentPin(''); setNewPin(''); setConfirmPin('');
    } catch (e) {
      showToast('PIN 변경 실패', 'error');
    } finally {
      setChanging(false);
    }
  };

  const inputStyle = {
    width: '100%', padding: '10px 14px', fontSize: 15, textAlign: 'center',
    border: '1px solid var(--border)', borderRadius: 8, outline: 'none',
    fontFamily: 'monospace', letterSpacing: 6,
  };
  const labelStyle = { fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 6, display: 'block' };

  return (
    <div style={{ animation: 'fadeIn .3s ease', maxWidth: 480 }}>
      {/* PIN 변경 */}
      <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)', marginBottom: 16 }}>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>PIN 변경</div>
        <div style={{ fontSize: 12, color: 'var(--text-sm)', marginBottom: 20 }}>
          태블릿앱과 동일한 PIN을 사용합니다
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div>
            <label style={labelStyle}>현재 PIN</label>
            <input type="password" value={currentPin} onChange={e => setCurrentPin(e.target.value)}
              maxLength={8} placeholder="●●●●" style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>새 PIN (4자리 이상)</label>
            <input type="password" value={newPin} onChange={e => setNewPin(e.target.value)}
              maxLength={8} placeholder="●●●●" style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>새 PIN 확인</label>
            <input type="password" value={confirmPin} onChange={e => setConfirmPin(e.target.value)}
              maxLength={8} placeholder="●●●●" style={inputStyle} />
          </div>
          <button onClick={handleChangePin} disabled={changing}
            style={{
              padding: '12px 0', fontSize: 14, fontWeight: 700,
              background: 'var(--accent)', color: '#fff', border: 'none',
              borderRadius: 8, cursor: 'pointer', opacity: changing ? 0.6 : 1,
              marginTop: 4
            }}>
            {changing ? '변경 중...' : 'PIN 변경'}
          </button>
        </div>
      </div>

      {/* 로그아웃 */}
      <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)' }}>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>계정</div>
        <div style={{ fontSize: 12, color: 'var(--text-sm)', marginBottom: 16 }}>
          로그아웃 시 PIN을 초기화하고 다시 설정해야 합니다
        </div>
        <button onClick={onLogout}
          style={{
            padding: '10px 20px', fontSize: 13, fontWeight: 600,
            background: '#FEE2E2', color: 'var(--red)', border: 'none',
            borderRadius: 8, cursor: 'pointer'
          }}>
          로그아웃 (PIN 초기화)
        </button>
      </div>
    </div>
  );
}

// ─── NPS 대시보드 ───
function NPSPage({ showToast }) {
  const [surveys, setSurveys] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all'); // all | promoter | passive | detractor
  const [sortBy, setSortBy] = useState('date'); // date | score
  const [campaignFilter, setCampaignFilter] = useState('all');

  const loadData = useCallback(async () => {
    try {
      const snap = await db.collection(COLLECTIONS.NPS_SURVEYS).get();
      console.log('[NPS] 설문 로드:', snap.size, '건');
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      data.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      setSurveys(data);
    } catch (e) {
      console.error('[NPS] 로드 실패:', e);
      showToast('NPS 데이터 로드 실패', 'error');
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  useEffect(() => { loadData(); }, [loadData]);

  const campaigns = useMemo(() => {
    const set = new Set(surveys.map(s => s.campaign || '미지정'));
    return ['all', ...Array.from(set)];
  }, [surveys]);

  const filtered = useMemo(() => {
    let list = surveys;
    if (campaignFilter !== 'all') {
      list = list.filter(s => (s.campaign || '미지정') === campaignFilter);
    }
    if (filter !== 'all') {
      list = list.filter(s => s.category === filter);
    }
    if (sortBy === 'score') {
      list = [...list].sort((a, b) => b.score - a.score);
    }
    return list;
  }, [surveys, filter, sortBy, campaignFilter]);

  // NPS 통계 계산
  const stats = useMemo(() => {
    const target = campaignFilter !== 'all'
      ? surveys.filter(s => (s.campaign || '미지정') === campaignFilter)
      : surveys;
    const total = target.length;
    if (total === 0) return { nps: 0, promoters: 0, passives: 0, detractors: 0, total: 0, avg: 0, dist: new Array(11).fill(0) };

    const promoters = target.filter(s => s.category === 'promoter').length;
    const passives = target.filter(s => s.category === 'passive').length;
    const detractors = target.filter(s => s.category === 'detractor').length;
    const nps = Math.round(((promoters - detractors) / total) * 100);
    const avg = (target.reduce((sum, s) => sum + (s.score || 0), 0) / total).toFixed(1);

    const dist = new Array(11).fill(0);
    target.forEach(s => { if (s.score >= 0 && s.score <= 10) dist[s.score]++; });

    return { nps, promoters, passives, detractors, total, avg, dist };
  }, [surveys, campaignFilter]);

  // 만족/불만족 요인 집계
  const factorStats = useMemo(() => {
    const target = campaignFilter !== 'all'
      ? surveys.filter(s => (s.campaign || '미지정') === campaignFilter)
      : surveys;
    const good = {};
    const bad = {};
    target.forEach(s => {
      (s.goodFactors || []).forEach(f => { good[f] = (good[f] || 0) + 1; });
      (s.badFactors || []).forEach(f => { bad[f] = (bad[f] || 0) + 1; });
    });
    const sortObj = obj => Object.entries(obj).sort((a, b) => b[1] - a[1]);
    return { good: sortObj(good), bad: sortObj(bad) };
  }, [surveys, campaignFilter]);

  // 엑셀 다운로드
  const exportExcel = () => {
    if (typeof XLSX === 'undefined') {
      showToast('XLSX 라이브러리 로딩 실패', 'error');
      return;
    }
    const rows = filtered.map(s => ({
      '제출일': s.createdAt ? new Date(s.createdAt).toLocaleString('ko') : '-',
      '캠페인': s.campaign || '-',
      '성함': s.name || '-',
      '소속': s.company || '-',
      '직책': s.position || '-',
      '연락처': s.phone || '-',
      'NPS점수': s.score,
      '구분': s.category === 'promoter' ? '추천' : s.category === 'passive' ? '중립' : '비추천',
      '만족요인': (s.goodFactors || []).join(', '),
      '개선요인': (s.badFactors || []).join(', '),
      '추가의견': s.feedback || '',
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'NPS');
    XLSX.writeFile(wb, `NPS_결과_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('엑셀 다운로드 완료');
  };

  if (loading) {
    return (
      <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-sm)' }}>
        <div style={{ width: 24, height: 24, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 12px' }} />
        NPS 데이터 로딩 중...
      </div>
    );
  }

  const npsColor = stats.nps >= 50 ? '#059669' : stats.nps >= 0 ? '#D97706' : '#DC2626';
  const maxDist = Math.max(...stats.dist, 1);

  return (
    <div style={{ animation: 'fadeIn .3s ease', maxWidth: 1200 }}>
      {/* 헤더 */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--text)' }}>NPS 대시보드</div>
          <div style={{ fontSize: 12, color: 'var(--text-sm)', marginTop: 4 }}>실시간 고객 만족도 조사 결과</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <select value={campaignFilter} onChange={e => setCampaignFilter(e.target.value)}
            style={{ padding: '8px 12px', borderRadius: 8, border: '1px solid var(--border)', fontSize: 12, fontWeight: 600, background: '#fff', cursor: 'pointer' }}>
            {campaigns.map(c => (
              <option key={c} value={c}>{c === 'all' ? '전체 캠페인' : c}</option>
            ))}
          </select>
          <button onClick={loadData}
            style={{ padding: '8px 14px', borderRadius: 8, border: '1px solid var(--border)', background: '#fff', fontSize: 12, fontWeight: 600, cursor: 'pointer', color: 'var(--text-md)' }}>
            새로고침
          </button>
          <button onClick={exportExcel}
            style={{ padding: '8px 14px', borderRadius: 8, border: 'none', background: 'var(--accent)', color: '#fff', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
            엑셀 다운로드
          </button>
        </div>
      </div>

      {/* NPS 스코어 + 구성비 카드 */}
      <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 14, marginBottom: 20 }}>
        {/* NPS 스코어 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)', textAlign: 'center' }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 12 }}>NPS 점수</div>
          <div style={{ fontSize: 56, fontWeight: 900, color: npsColor, lineHeight: 1 }}>{stats.nps}</div>
          <div style={{ fontSize: 11, color: 'var(--text-sm)', marginTop: 8 }}>
            {stats.nps >= 70 ? '매우 우수' : stats.nps >= 50 ? '우수' : stats.nps >= 0 ? '보통' : '개선 필요'}
          </div>
          <div style={{ marginTop: 16, padding: '8px 0', borderTop: '1px solid var(--border)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text-md)' }}>
              <span>평균 점수</span>
              <span style={{ fontWeight: 700 }}>{stats.avg}점</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text-md)', marginTop: 6 }}>
              <span>총 응답</span>
              <span style={{ fontWeight: 700 }}>{stats.total}건</span>
            </div>
          </div>
        </div>

        {/* 구성비 + 바 차트 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)' }}>
          {/* 3-segment bar */}
          <div style={{ display: 'flex', gap: 16, marginBottom: 20 }}>
            {[
              { label: '추천 (9-10)', count: stats.promoters, color: '#059669', bg: '#ECFDF5', pct: stats.total ? Math.round(stats.promoters / stats.total * 100) : 0 },
              { label: '중립 (7-8)', count: stats.passives, color: '#D97706', bg: '#FFFBEB', pct: stats.total ? Math.round(stats.passives / stats.total * 100) : 0 },
              { label: '비추천 (0-6)', count: stats.detractors, color: '#DC2626', bg: '#FEF2F2', pct: stats.total ? Math.round(stats.detractors / stats.total * 100) : 0 },
            ].map(seg => (
              <div key={seg.label} style={{ flex: 1, padding: '12px 14px', borderRadius: 10, background: seg.bg }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: seg.color, marginBottom: 4 }}>{seg.label}</div>
                <div style={{ fontSize: 24, fontWeight: 900, color: seg.color }}>{seg.count}<span style={{ fontSize: 13, fontWeight: 500 }}>명</span></div>
                <div style={{ fontSize: 12, color: seg.color, opacity: 0.7, marginTop: 2 }}>{seg.pct}%</div>
              </div>
            ))}
          </div>

          {/* 점수 분포 바 차트 */}
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 10 }}>점수 분포</div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 80 }}>
            {stats.dist.map((count, i) => {
              const barColor = i <= 6 ? '#FCA5A5' : i <= 8 ? '#FCD34D' : '#6EE7B7';
              const h = count > 0 ? Math.max((count / maxDist) * 70, 4) : 2;
              return (
                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: count > 0 ? 'var(--text-md)' : 'transparent' }}>{count}</div>
                  <div style={{ width: '100%', height: h, borderRadius: 3, background: barColor, transition: 'height .3s' }} />
                  <div style={{ fontSize: 10, color: 'var(--text-sm)' }}>{i}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* 요인 분석 */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
        {/* 만족 요인 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#059669', marginBottom: 14 }}>만족 요인 TOP</div>
          {factorStats.good.length === 0 ? (
            <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
          ) : factorStats.good.slice(0, 6).map(([name, cnt]) => {
            const pct = stats.total ? Math.round(cnt / stats.total * 100) : 0;
            return (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                <div style={{ flex: 1, fontSize: 12, fontWeight: 500, color: 'var(--text)' }}>{name}</div>
                <div style={{ width: 120, height: 8, background: '#F3F4F6', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ width: pct + '%', height: '100%', background: '#6EE7B7', borderRadius: 4, transition: 'width .3s' }} />
                </div>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#059669', minWidth: 36, textAlign: 'right' }}>{cnt}명</div>
              </div>
            );
          })}
        </div>

        {/* 개선 요인 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#DC2626', marginBottom: 14 }}>개선 요인 TOP</div>
          {factorStats.bad.length === 0 ? (
            <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
          ) : factorStats.bad.slice(0, 6).map(([name, cnt]) => {
            const pct = stats.total ? Math.round(cnt / stats.total * 100) : 0;
            return (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                <div style={{ flex: 1, fontSize: 12, fontWeight: 500, color: 'var(--text)' }}>{name}</div>
                <div style={{ width: 120, height: 8, background: '#F3F4F6', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ width: pct + '%', height: '100%', background: '#FCA5A5', borderRadius: 4, transition: 'width .3s' }} />
                </div>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#DC2626', minWidth: 36, textAlign: 'right' }}>{cnt}명</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 개별 응답 목록 */}
      <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 700 }}>개별 응답 ({filtered.length}건)</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[
              { key: 'all', label: '전체' },
              { key: 'promoter', label: '추천', color: '#059669' },
              { key: 'passive', label: '중립', color: '#D97706' },
              { key: 'detractor', label: '비추천', color: '#DC2626' },
            ].map(f => (
              <button key={f.key} onClick={() => setFilter(f.key)}
                style={{
                  padding: '5px 12px', borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: 'pointer',
                  border: filter === f.key ? 'none' : '1px solid var(--border)',
                  background: filter === f.key ? (f.color || 'var(--accent)') : '#fff',
                  color: filter === f.key ? '#fff' : 'var(--text-md)',
                }}>
                {f.label}
              </button>
            ))}
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              style={{ padding: '5px 10px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 11, fontWeight: 600, background: '#fff', cursor: 'pointer', marginLeft: 4 }}>
              <option value="date">최신순</option>
              <option value="score">점수순</option>
            </select>
          </div>
        </div>

        {filtered.length === 0 ? (
          <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sm)', fontSize: 13 }}>
            응답 데이터가 없습니다
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {filtered.map(s => {
              const catColor = s.category === 'promoter' ? '#059669' : s.category === 'passive' ? '#D97706' : '#DC2626';
              const catLabel = s.category === 'promoter' ? '추천' : s.category === 'passive' ? '중립' : '비추천';
              return (
                <div key={s.id} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
                  background: 'var(--bg)', borderRadius: 8, fontSize: 13
                }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    background: catColor + '15', color: catColor, fontWeight: 900, fontSize: 16, flexShrink: 0
                  }}>
                    {s.score}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontWeight: 600 }}>{s.name || '-'}</span>
                      <span style={{ fontSize: 11, color: 'var(--text-sm)' }}>{s.company || ''}</span>
                      {s.position && <span style={{ fontSize: 10, color: 'var(--text-sm)', background: 'var(--border-s)', padding: '1px 6px', borderRadius: 4 }}>{s.position}</span>}
                    </div>
                    {s.feedback && (
                      <div style={{ fontSize: 12, color: 'var(--text-md)', marginTop: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        "{s.feedback}"
                      </div>
                    )}
                    {((s.goodFactors && s.goodFactors.length > 0) || (s.badFactors && s.badFactors.length > 0)) && (
                      <div style={{ display: 'flex', gap: 4, marginTop: 4, flexWrap: 'wrap' }}>
                        {(s.goodFactors || []).map(f => (
                          <span key={f} style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: '#ECFDF5', color: '#059669' }}>{f}</span>
                        ))}
                        {(s.badFactors || []).map(f => (
                          <span key={f} style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: '#FEF2F2', color: '#DC2626' }}>{f}</span>
                        ))}
                      </div>
                    )}
                  </div>
                  <span style={{
                    padding: '3px 10px', borderRadius: 6, fontSize: 11, fontWeight: 600,
                    background: catColor + '15', color: catColor, flexShrink: 0
                  }}>
                    {catLabel}
                  </span>
                  <span style={{ fontSize: 11, color: 'var(--text-sm)', minWidth: 75, textAlign: 'right', flexShrink: 0 }}>
                    {s.createdAt ? new Date(s.createdAt).toLocaleDateString('ko') : '-'}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   영업관리 칸반 보드 — 4개 브랜드 공통 컴포넌트
   ══════════════════════════════════════════════════════════════ */
const PIPELINE_STAGES=['신규','상담중','견적제출','계약예정','계약완료'];
const PIPELINE_COLORS={'신규':'#DC2626','상담중':'#D97706','견적제출':'#2563EB','계약예정':'#7C3AED','계약완료':'#059669'};
const BRAND_CONFIG={
  /* 인바운드 — 사이트/웹폼에서 유입된 리드 */
  'inbound-solution':{collection:'leads',label:'POUR솔루션',sublabel:'인바운드',color:'#2563EB',bg:'#EFF6FF',icon:'🏢',filter:lead=>['inbound-form','site-solution','web','online'].includes(lead.source)},
  'inbound-method':{collection:'leads-method',label:'POUR공법',sublabel:'인바운드',color:'#E8780F',bg:'#FFF7ED',icon:'🔧',filter:lead=>['inbound-form','site-method','web','online'].includes(lead.source)},
  'inbound-store':{collection:'leads-store',label:'POUR스토어',sublabel:'인바운드',color:'#059669',bg:'#ECFDF5',icon:'🛒',filter:lead=>['inbound-form','site-store','web','online'].includes(lead.source)},
  'inbound-grohome':{collection:'leads-grohome',label:'그로홈',sublabel:'인바운드',color:'#6D28D9',bg:'#F5F3FF',icon:'🏠',filter:lead=>['inbound-form','site-grohome','web','online'].includes(lead.source)},
  /* 아웃바운드 — 박람회 현장 상담 리드 */
  'outbound-expo':{collection:'leads',label:'박람회',sublabel:'아웃바운드',color:'#E8780F',bg:'#FFF7ED',icon:'🎪',filter:lead=>!lead.source||['expo','exhibition','tablet','박람회','qr'].includes(lead.source)},
};

function LeadsKanbanPage({brandKey,showToast}){
  const brand=BRAND_CONFIG[brandKey];
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [viewMode,setViewMode]=useState('kanban'); // kanban | list

  /* ── 필터 상태 ── */
  const [search,setSearch]=useState('');
  const [filterDateFrom,setFilterDateFrom]=useState('');
  const [filterDateTo,setFilterDateTo]=useState('');
  const [filterStaff,setFilterStaff]=useState('전체');
  const [filterStatus,setFilterStatus]=useState('전체');
  const [filterBuilding,setFilterBuilding]=useState('전체');

  /* ── 담당자 목록 (config/staffList) ── */
  const [staffOptions,setStaffOptions]=useState([]);
  useEffect(()=>{
    db.collection('config').doc('staffList').get().then(doc=>{
      if(doc.exists)setStaffOptions((doc.data().list||[]).map(s=>s.name));
    }).catch(()=>{});
  },[]);

  const BUILDING_TYPES=['전체','아파트','관공서','일반건물','건설사'];

  const fetchLeads=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection(brand.collection).get();
      let arr=[];
      snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      if(brand.filter)arr=arr.filter(brand.filter);
      arr.sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
      console.log(`[leads] ${brand.label}(${brand.sublabel||'전체'}): ${arr.length}건 로드`);
      setLeads(arr);
    }catch(e){console.error('[leads] 로드 실패:',e);showToast('데이터 로드 실패','error');}
    setLoading(false);
  };

  useEffect(()=>{fetchLeads();},[brandKey]);

  const updateStatus=async(id,newStatus)=>{
    try{
      await db.collection(brand.collection).doc(id).update({status:newStatus,updatedAt:new Date().toISOString()});
      setLeads(prev=>prev.map(l=>l.id===id?{...l,status:newStatus}:l));
      if(selected?.id===id)setSelected(prev=>({...prev,status:newStatus}));
      showToast(`${newStatus}(으)로 변경됨`);
    }catch(e){console.error(e);showToast('상태 변경 실패','error');}
  };

  const deleteLead=async(id)=>{
    if(!confirm('정말 삭제하시겠습니까?'))return;
    try{
      await db.collection(brand.collection).doc(id).delete();
      setLeads(prev=>prev.filter(l=>l.id!==id));
      setSelected(null);
      showToast('삭제 완료');
    }catch(e){console.error(e);showToast('삭제 실패','error');}
  };

  /* ── 필터 적용 ── */
  const filtered=leads.filter(l=>{
    if(search.trim()){
      const s=search.toLowerCase();
      const hit=(l.name||'').toLowerCase().includes(s)||(l.phone||'').includes(s)
        ||(l.building||'').toLowerCase().includes(s)||(l.problem||'').toLowerCase().includes(s)
        ||(l.email||'').toLowerCase().includes(s);
      if(!hit)return false;
    }
    if(filterDateFrom){
      const from=filterDateFrom+'T00:00:00';
      if((l.savedAt||'')<from)return false;
    }
    if(filterDateTo){
      const to=filterDateTo+'T23:59:59';
      if((l.savedAt||'')>to)return false;
    }
    if(filterStaff!=='전체'&&(l.staff||'')!==filterStaff)return false;
    if(filterStatus!=='전체'&&(l.status||'신규')!==filterStatus)return false;
    if(filterBuilding!=='전체'){
      const b=(l.building||l.buildingType||'');
      if(!b.includes(filterBuilding))return false;
    }
    return true;
  });

  const byStage=(stage)=>filtered.filter(l=>(l.status||'신규')===stage);
  const hasFilter=search||filterDateFrom||filterDateTo||filterStaff!=='전체'||filterStatus!=='전체'||filterBuilding!=='전체';

  const resetFilters=()=>{
    setSearch('');setFilterDateFrom('');setFilterDateTo('');
    setFilterStaff('전체');setFilterStatus('전체');setFilterBuilding('전체');
  };

  const formatDate=(d)=>{if(!d)return'-';const dt=new Date(d);return `${dt.getMonth()+1}/${dt.getDate()}`};
  const formatDateFull=(d)=>{if(!d)return'-';return new Date(d).toLocaleDateString('ko');};

  /* ── CSV 다운로드 ── */
  const downloadCsv=()=>{
    if(!filtered.length){showToast('다운로드할 데이터가 없습니다','error');return;}
    const headers=['성함','연락처','이메일','건물/현장','하자유형','상태','담당자','접수일','메모','비고','다음액션'];
    const rows=filtered.map(l=>[
      l.name||'',l.phone||'',l.email||'',l.building||'',
      Array.isArray(l.problems)?l.problems.join('|'):(l.problem||''),
      l.status||'신규',l.staff||'',
      l.savedAt?new Date(l.savedAt).toLocaleDateString('ko'):'',
      (l.memo||'').replace(/\n/g,' '),
      (l.remark||'').replace(/\n/g,' '),
      Array.isArray(l.actions)?l.actions.join('|'):(l.nextAction||''),
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`));
    const csv='\uFEFF'+[headers.map(h=>`"${h}"`).join(','),...rows.map(r=>r.join(','))].join('\r\n');
    const today=new Date().toISOString().slice(0,10).replace(/-/g,'');
    const fname=`${brand.label}_고객DB_${today}.csv`;
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;a.click();
    URL.revokeObjectURL(url);
    showToast(`${filtered.length}건 CSV 다운로드 완료`);
  };

  /* ── 리드 상세 모달 ── */
  const DetailModal=()=>{
    if(!selected)return null;
    const l=selected;
    return(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setSelected(null)}>
        <div style={{background:'#fff',borderRadius:16,padding:24,width:'min(440px,90vw)',maxHeight:'80vh',overflowY:'auto',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:800}}>{l.name||'이름없음'}</div>
            <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--text-sm)'}}>✕</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
            {[{k:'전화',v:l.phone},{k:'이메일',v:l.email},{k:'건물',v:l.building},{k:'직급',v:l.position},{k:'하자',v:Array.isArray(l.problems)?l.problems.join(', '):l.problem},{k:'접수일',v:l.savedAt?new Date(l.savedAt).toLocaleDateString('ko'):'-'},{k:'담당자',v:l.staff},{k:'출처',v:l.source},{k:'희망착공',v:l.desiredStartDate||'-'},{k:'자료기한',v:l.docDeadline||'-'}].map(({k,v})=>v&&v!=='-'?(
              <div key={k} style={{padding:'8px 10px',background:'var(--bg)',borderRadius:8}}>
                <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:2}}>{k}</div>
                <div style={{fontSize:13,fontWeight:600}}>{v}</div>
              </div>
            ):null)}
          </div>
          {l.memo&&<div style={{padding:10,background:'var(--bg)',borderRadius:8,marginBottom:16}}>
            <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:4}}>메모</div>
            <div style={{fontSize:13,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{l.memo}</div>
          </div>}
          {l.remark&&<div style={{padding:10,background:'#FFFBEB',borderRadius:8,marginBottom:16,border:'1px solid #FDE68A'}}>
            <div style={{fontSize:11,color:'#92400E',marginBottom:4}}>비고</div>
            <div style={{fontSize:13,lineHeight:1.5,whiteSpace:'pre-wrap',color:'#78350F'}}>{l.remark}</div>
          </div>}
          {l.actions&&l.actions.length>0&&<div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:6}}>후속 조치</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{l.actions.map((a,i)=><span key={i} style={{padding:'4px 8px',borderRadius:6,background:brand.bg,color:brand.color,fontSize:11,fontWeight:600}}>{a}</span>)}</div>
          </div>}
          <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:8}}>상태 변경</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
            {PIPELINE_STAGES.map(s=>(
              <button key={s} onClick={()=>updateStatus(l.id,s)} style={{padding:'7px 14px',borderRadius:8,border:`1.5px solid ${(l.status||'신규')===s?PIPELINE_COLORS[s]:'var(--border)'}`,background:(l.status||'신규')===s?PIPELINE_COLORS[s]:'#fff',color:(l.status||'신규')===s?'#fff':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{s}</button>
            ))}
          </div>
          <button onClick={()=>deleteLead(l.id)} style={{width:'100%',padding:'10px 0',borderRadius:8,border:'1.5px solid #FEE2E2',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🗑 삭제</button>
        </div>
      </div>
    );
  };

  /* ── 칸반 카드 ── */
  const LeadCard=({lead})=>(
    <div onClick={()=>setSelected(lead)} style={{padding:'12px 14px',background:'#fff',borderRadius:10,border:'1px solid var(--border-s)',cursor:'pointer',transition:'all .15s',boxShadow:'0 1px 3px rgba(0,0,0,.04)',marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{lead.name||'이름없음'}</div>
        <div style={{fontSize:10,color:'var(--text-sm)'}}>{formatDate(lead.savedAt)}</div>
      </div>
      {lead.phone&&<div style={{fontSize:11,color:'var(--text-md)',marginBottom:2}}>📞 {lead.phone}</div>}
      {lead.building&&<div style={{fontSize:12,color:'var(--text-md)',marginBottom:4}}>🏢 {lead.building}</div>}
      {(lead.problem||lead.problems)&&<div style={{fontSize:11,color:'var(--text-sm)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>⚡ {Array.isArray(lead.problems)?lead.problems.join(', '):lead.problem}</div>}
      {lead.staff&&<div style={{fontSize:11,color:brand.color,marginTop:4,fontWeight:600}}>👤 {lead.staff}</div>}
    </div>
  );

  /* ── 칸반 뷰 ── */
  const KanbanView=()=>(
    <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16,minHeight:'calc(100vh - 280px)'}}>
      {PIPELINE_STAGES.map(stage=>{
        const items=byStage(stage);
        return(
          <div key={stage} style={{minWidth:240,maxWidth:280,flex:'0 0 240px',background:'var(--bg)',borderRadius:12,padding:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'0 4px'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:PIPELINE_COLORS[stage]}}/>
              <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>{stage}</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',background:'var(--border-s)',borderRadius:10,padding:'2px 8px'}}>{items.length}</div>
            </div>
            <div style={{minHeight:100}}>
              {items.map(l=><LeadCard key={l.id} lead={l}/>)}
              {items.length===0&&<div style={{textAlign:'center',padding:'20px 0',fontSize:12,color:'var(--text-sm)'}}>없음</div>}
            </div>
          </div>
        );
      })}
    </div>
  );

  /* ── 리스트 뷰 (컬럼 강화) ── */
  const ListView=()=>(
    <div style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:800}}>
        <thead>
          <tr style={{background:'var(--bg)'}}>
            {['성함','연락처','건물','하자','상태','담당자','접수일'].map(h=>(
              <th key={h} style={{padding:'10px 14px',textAlign:'left',fontWeight:700,color:'var(--text-md)',fontSize:12,borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {filtered.map(l=>(
            <tr key={l.id} onClick={()=>setSelected(l)}
              style={{cursor:'pointer',borderBottom:'1px solid var(--border-s)'}}
              onMouseOver={e=>e.currentTarget.style.background='var(--bg)'}
              onMouseOut={e=>e.currentTarget.style.background='#fff'}>
              <td style={{padding:'10px 14px',fontWeight:700}}>{l.name||'-'}</td>
              <td style={{padding:'10px 14px',color:'var(--text-md)',fontSize:12,whiteSpace:'nowrap'}}>{l.phone||'-'}</td>
              <td style={{padding:'10px 14px',color:'var(--text-md)',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.building||'-'}</td>
              <td style={{padding:'10px 14px',color:'var(--text-md)',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{Array.isArray(l.problems)?l.problems.join(', '):(l.problem||'-')}</td>
              <td style={{padding:'10px 14px',whiteSpace:'nowrap'}}><span style={{padding:'3px 10px',borderRadius:6,background:PIPELINE_COLORS[l.status||'신규']+'18',color:PIPELINE_COLORS[l.status||'신규'],fontSize:11,fontWeight:700}}>{l.status||'신규'}</span></td>
              <td style={{padding:'10px 14px',color:'var(--text-md)',whiteSpace:'nowrap'}}>{l.staff||'-'}</td>
              <td style={{padding:'10px 14px',color:'var(--text-sm)',fontSize:12,whiteSpace:'nowrap'}}>{formatDateFull(l.savedAt)}</td>
            </tr>
          ))}
          {filtered.length===0&&<tr><td colSpan={7} style={{padding:40,textAlign:'center',color:'var(--text-sm)'}}>조건에 맞는 리드가 없습니다</td></tr>}
        </tbody>
      </table>
    </div>
  );

  const selStyle={padding:'7px 12px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:12,fontFamily:'inherit',outline:'none',background:'#fff',cursor:'pointer'};
  const dateStyle={padding:'7px 10px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:12,fontFamily:'inherit',outline:'none'};

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {/* ── 헤더 ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:28}}>{brand.icon}</span>
          <div>
            <div style={{fontSize:20,fontWeight:800}}>{brand.label} 영업 {brand.sublabel&&<span style={{fontSize:13,fontWeight:600,color:brand.color,background:brand.bg,padding:'3px 10px',borderRadius:6,marginLeft:8}}>{brand.sublabel}</span>}</div>
            <div style={{fontSize:12,color:'var(--text-sm)'}}>전체 {leads.length}건 {hasFilter&&<span style={{color:brand.color,fontWeight:700}}>· 필터 {filtered.length}건</span>} · {PIPELINE_STAGES.map(s=>`${s} ${byStage(s).length}`).join(' · ')}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <button onClick={downloadCsv}
            style={{padding:'8px 14px',borderRadius:8,border:'1.5px solid var(--green)',background:'var(--green-l)',color:'var(--green)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
            📥 엑셀 다운로드
          </button>
          <button onClick={()=>setViewMode(viewMode==='kanban'?'list':'kanban')}
            style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
            {viewMode==='kanban'?'📋 리스트':'📊 칸반'}
          </button>
          <button onClick={fetchLeads} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>🔄</button>
        </div>
      </div>

      {/* ── 필터 바 ── */}
      <div style={{background:'#fff',borderRadius:10,border:'1px solid var(--border)',padding:'12px 16px',marginBottom:14,display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-end'}}>
        {/* 검색어 */}
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>검색</label>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="이름·전화·건물명·이메일"
            style={{...dateStyle,width:160}}/>
        </div>
        {/* 날짜 범위 */}
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>접수일 (from)</label>
          <input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={dateStyle}/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>접수일 (to)</label>
          <input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={dateStyle}/>
        </div>
        {/* 담당자 */}
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>담당자</label>
          <select value={filterStaff} onChange={e=>setFilterStaff(e.target.value)} style={selStyle}>
            <option value="전체">전체</option>
            {staffOptions.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        {/* 상태 */}
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>상태</label>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={selStyle}>
            <option value="전체">전체</option>
            {PIPELINE_STAGES.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        {/* 건물유형 */}
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>건물유형</label>
          <select value={filterBuilding} onChange={e=>setFilterBuilding(e.target.value)} style={selStyle}>
            {BUILDING_TYPES.map(b=><option key={b} value={b}>{b}</option>)}
          </select>
        </div>
        {/* 초기화 */}
        {hasFilter&&(
          <button onClick={resetFilters}
            style={{padding:'7px 14px',borderRadius:8,border:'1.5px solid #FEE2E2',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',alignSelf:'flex-end'}}>
            ✕ 필터 초기화
          </button>
        )}
      </div>

      {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>
        :viewMode==='kanban'?<KanbanView/>:<ListView/>}

      <DetailModal/>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   완공현장 관리 — defect-sites 컬렉션 + Storage 사진 업로드
   ══════════════════════════════════════════════════════════════ */
const SITE_CATS=['방수','도장','보수/보강','토목'];

function DefectSitesPage({showToast}){
  const [sites,setSites]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null); // null=목록, 'new'=신규, docId=수정
  const [form,setForm]=useState({name:'',address:'',category:'방수',buildingType:'아파트',area:'',completedAt:'',description:'',beforePhotos:[],afterPhotos:[],tags:[]});
  const [uploading,setUploading]=useState(false);
  const [tagInput,setTagInput]=useState('');

  const fetchSites=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection(COLLECTIONS.DEFECT_SITES).get();
      const arr=[];snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      arr.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
      console.log(`[defect-sites] ${arr.length}건 로드`);
      setSites(arr);
    }catch(e){console.error('[defect-sites] 로드 실패:',e);}
    setLoading(false);
  };

  useEffect(()=>{fetchSites();},[]);

  const resetForm=()=>{setForm({name:'',address:'',category:'방수',buildingType:'아파트',area:'',completedAt:'',description:'',beforePhotos:[],afterPhotos:[],tags:[]});setTagInput('');};

  const uploadPhotos=async(files,folder)=>{
    const urls=[];
    for(const file of files){
      const path=`defect-sites/${folder}/${Date.now()}_${file.name}`;
      const ref=storage.ref(path);
      await ref.put(file);
      const url=await ref.getDownloadURL();
      urls.push(url);
    }
    return urls;
  };

  const handlePhotoSelect=(e,type)=>{
    const files=Array.from(e.target.files);
    if(!files.length)return;
    setForm(prev=>({...prev,[type]:[...prev[type],...files]}));
  };

  const removePhoto=(type,idx)=>{
    setForm(prev=>({...prev,[type]:prev[type].filter((_,i)=>i!==idx)}));
  };

  const addTag=()=>{
    const t=tagInput.trim();
    if(t&&!form.tags.includes(t)){setForm(prev=>({...prev,tags:[...prev.tags,t]}));}
    setTagInput('');
  };

  const save=async()=>{
    if(!form.name.trim()||!form.address.trim()){showToast('현장명과 주소를 입력하세요','error');return;}
    setUploading(true);
    try{
      // 사진 업로드 (File 객체만 업로드, 이미 URL인 것은 유지)
      const beforeUrls=[];const afterUrls=[];
      for(const p of form.beforePhotos){
        if(typeof p==='string')beforeUrls.push(p);
        else{const u=await uploadPhotos([p],'before');beforeUrls.push(...u);}
      }
      for(const p of form.afterPhotos){
        if(typeof p==='string')afterUrls.push(p);
        else{const u=await uploadPhotos([p],'after');afterUrls.push(...u);}
      }

      const data={
        name:form.name,address:form.address,category:form.category,
        buildingType:form.buildingType,area:form.area,
        completedAt:form.completedAt,description:form.description,
        beforePhotos:beforeUrls,afterPhotos:afterUrls,
        tags:form.tags,updatedAt:new Date().toISOString(),
      };

      if(editing==='new'){
        data.createdAt=new Date().toISOString();
        const ref=await db.collection(COLLECTIONS.DEFECT_SITES).add(data);
        console.log(`[defect-sites] 신규 저장: ${ref.id}`);
        showToast('완공현장 등록 완료');
      }else{
        await db.collection(COLLECTIONS.DEFECT_SITES).doc(editing).update(data);
        showToast('수정 완료');
      }
      setEditing(null);resetForm();fetchSites();
    }catch(e){console.error(e);showToast('저장 실패','error');}
    setUploading(false);
  };

  const deleteSite=async(id)=>{
    if(!confirm('정말 삭제하시겠습니까?'))return;
    try{
      await db.collection(COLLECTIONS.DEFECT_SITES).doc(id).delete();
      showToast('삭제 완료');fetchSites();
    }catch(e){console.error(e);showToast('삭제 실패','error');}
  };

  const startEdit=(site)=>{
    setEditing(site.id);
    setForm({
      name:site.name||'',address:site.address||'',category:site.category||'방수',
      buildingType:site.buildingType||'아파트',area:site.area||'',
      completedAt:site.completedAt||'',description:site.description||'',
      beforePhotos:site.beforePhotos||[],afterPhotos:site.afterPhotos||[],
      tags:site.tags||[]
    });
  };

  /* ── 사진 미리보기 ── */
  const PhotoPreview=({photos,type})=>(
    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:8}}>
      {photos.map((p,i)=>{
        const src=typeof p==='string'?p:URL.createObjectURL(p);
        return(
          <div key={i} style={{position:'relative',width:80,height:80,borderRadius:8,overflow:'hidden',border:'1px solid var(--border)'}}>
            <img src={src} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <button onClick={()=>removePhoto(type,i)} style={{position:'absolute',top:2,right:2,width:20,height:20,borderRadius:'50%',background:'rgba(0,0,0,.6)',color:'#fff',border:'none',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>
        );
      })}
    </div>
  );

  /* ── 등록/수정 폼 ── */
  if(editing!==null)return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={()=>{setEditing(null);resetForm();}} style={{background:'none',border:'none',fontSize:20,cursor:'pointer'}}>←</button>
        <div style={{fontSize:20,fontWeight:800}}>{editing==='new'?'완공현장 등록':'완공현장 수정'}</div>
      </div>
      <div style={{background:'#fff',borderRadius:14,border:'1px solid var(--border)',padding:24,maxWidth:600}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>현장명 *</label>
            <input style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none'}} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="OO아파트 옥상 방수"/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>주소 *</label>
            <input style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none'}} value={form.address} onChange={e=>setForm({...form,address:e.target.value})} placeholder="서울시 강남구..."/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:14}}>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>공종</label>
            <select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff'}} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
              {SITE_CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select></div>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>건물유형</label>
            <select style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff'}} value={form.buildingType} onChange={e=>setForm({...form,buildingType:e.target.value})}>
              {['아파트','관공서','주택','빌라/오피스텔','병원','학교'].map(t=><option key={t} value={t}>{t}</option>)}
            </select></div>
          <div><label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>시공면적</label>
            <input style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none'}} value={form.area} onChange={e=>setForm({...form,area:e.target.value})} placeholder="500㎡"/></div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>준공일</label>
          <input type="date" style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',maxWidth:200}} value={form.completedAt} onChange={e=>setForm({...form,completedAt:e.target.value})}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>현장 설명</label>
          <textarea style={{width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13,fontFamily:'inherit',outline:'none',resize:'vertical',minHeight:60}} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="시공 내용, 특이사항 등"/>
        </div>

        {/* 사진 업로드 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:'#DC2626',marginBottom:6,display:'block'}}>시공 전 사진</label>
            <input type="file" accept="image/*" multiple onChange={e=>handlePhotoSelect(e,'beforePhotos')} style={{fontSize:12}}/>
            <PhotoPreview photos={form.beforePhotos} type="beforePhotos"/>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:'#059669',marginBottom:6,display:'block'}}>시공 후 사진</label>
            <input type="file" accept="image/*" multiple onChange={e=>handlePhotoSelect(e,'afterPhotos')} style={{fontSize:12}}/>
            <PhotoPreview photos={form.afterPhotos} type="afterPhotos"/>
          </div>
        </div>

        {/* 태그 */}
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:6,display:'block'}}>태그</label>
          <div style={{display:'flex',gap:8}}>
            <input style={{flex:1,padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:12,fontFamily:'inherit',outline:'none'}} value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addTag();}}} placeholder="#태그 입력 후 Enter"/>
            <button onClick={addTag} style={{padding:'8px 14px',borderRadius:8,border:'none',background:'var(--blue)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>추가</button>
          </div>
          {form.tags.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>

          </div>}
        </div>

        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>{setEditing(null);resetForm();}} style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>

        </div>
      </div>
    </div>
  );

  /* ── 목록 ── */
  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>

      </div>

      {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>

        {sites.map(s=>(
          <div key={s.id} style={{background:'#fff',borderRadius:14,border:'1px solid var(--border)',overflow:'hidden',cursor:'pointer',transition:'box-shadow .2s'}} onClick={()=>startEdit(s)}>
            {(s.afterPhotos?.length>0||s.beforePhotos?.length>0)&&
              <div style={{height:160,overflow:'hidden',background:'var(--bg)'}}>
                <img src={(s.afterPhotos||s.beforePhotos)[0]} style={{width:'100%',height:'100%',objectFit:'cover'}}/>

            <div style={{padding:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                <div style={{fontSize:15,fontWeight:800}}>{s.name}</div>
                <span style={{padding:'3px 8px',borderRadius:6,background:PIPELINE_COLORS[s.category==='방수'?'견적제출':'상담중']+'18',color:PIPELINE_COLORS[s.category==='방수'?'견적제출':'상담중'],fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{s.category}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text-md)',marginBottom:4}}>📍 {s.address}</div>
              {s.area&&<div style={{fontSize:12,color:'var(--text-sm)'}}>📐 {s.area} · {s.buildingType}</div>}
              {s.completedAt&&<div style={{fontSize:11,color:'var(--text-sm)',marginTop:4}}>🗓 준공: {s.completedAt}</div>}
              {s.tags?.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:8}}>
                {s.tags.slice(0,3).map((t,i)=><span key={i} style={{padding:'2px 8px',borderRadius:5,background:'var(--blue-l)',color:'var(--blue)',fontSize:10,fontWeight:600}}>{t}</span>)}
                {s.tags.length>3&&<span style={{fontSize:10,color:'var(--text-sm)'}}>+{s.tags.length-3}</span>}
              </div>}
              <div style={{display:'flex',gap:6,marginTop:10}}>
                <span style={{fontSize:11,color:'var(--text-sm)'}}>📷 전 {s.beforePhotos?.length||0}장</span>
                <span style={{fontSize:11,color:'var(--text-sm)'}}>📷 후 {s.afterPhotos?.length||0}장</span>
              </div>
            </div>
            <div style={{borderTop:'1px solid var(--border-s)',padding:'8px 16px',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={e=>{e.stopPropagation();deleteSite(s.id);}} style={{background:'none',border:'none',fontSize:12,color:'#DC2626',cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>삭제</button>
            </div>
          </div>
        ))}
      </div>}
    </div>
  );
}

function DefectPhotosPage({showToast}){

  const [showTemplates,setShowTemplates]=useState(false);
  const [lightbox,setLightbox]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [importing,setImporting]=useState(false);
  const [importJson,setImportJson]=useState('');
  const [importUrl,setImportUrl]=useState('');
  const [form,setForm]=useState({methods:[DEFAULT_POUR_METHODS[0]],defectTypes:[DEFAULT_DEFECT_TYPES[0]],description:'',files:[]});
  const [editingId,setEditingId]=useState(null);
  /* AI 대량 업로드 상태 */
  const [aiBulkFiles,setAiBulkFiles]=useState([]);
  const [aiBulkMethod,setAiBulkMethod]=useState(DEFAULT_POUR_METHODS[0]);
  const [aiBulkResults,setAiBulkResults]=useState([]);
  const [aiProcessing,setAiProcessing]=useState(false);
  const [aiProgress,setAiProgress]=useState(0);
  const [aiApiKey,setAiApiKey]=useState(()=>localStorage.getItem('openai_api_key')||'');
  /* 템플릿 관리 상태 */
  const [templates,setTemplates]=useState([]);
  const [templateLoading,setTemplateLoading]=useState(false);
  const [editingTemplate,setEditingTemplate]=useState(null);
  const [templateForm,setTemplateForm]=useState({tags:[],methods:[],desc:'',referenceImage:null,referenceImageUrl:''});
  const [templateTagInput,setTemplateTagInput]=useState('');
  /* 구 공법명 → 신 공법명 일괄 재태깅 */
  const [retagging,setRetagging]=useState(false);
  /* 새 태그 입력 (모달 내부에서 조건부 렌더링 → 훅은 반드시 최상위) */
  const [newTag,setNewTag]=useState('');
  const [customTags,setCustomTags]=useState([]);
  /* 중분류 태그 메타 (메인/서브, 라벨, 대표, 순서) — Firestore config/defectTypesMeta */
  const [defectTypesMeta,setDefectTypesMeta]=useState([]);
  const [photoOrders,setPhotoOrders]=useState({});
  const fetchDefectTypesMeta=async()=>{
    try{
      const snap=await db.collection('config').doc('defectTypesMeta').get();
      if(snap.exists){
        const data=snap.data();
        setDefectTypesMeta(data.tags||[]);
        setPhotoOrders(data.photoOrders||{});
        console.log('[defectTypesMeta] 로드',data.tags?.length,'건, photoOrders',Object.keys(data.photoOrders||{}).length,'태그');
      }
    }catch(e){console.error('[defectTypesMeta] 로드 실패:',e);}
  };
  const saveDefectTypesMeta=async(tags)=>{
    try{
      await db.collection('config').doc('defectTypesMeta').set({tags,updatedAt:new Date().toISOString()},{merge:true});
      setDefectTypesMeta(tags);
      console.log('[defectTypesMeta] 저장 완료',tags.length,'건');
    }catch(e){console.error('[defectTypesMeta] 저장 실패:',e);}
  };
  const savePhotoOrders=async(tagId,orderedIds)=>{
    const next={...photoOrders,[tagId]:orderedIds};
    try{
      await db.collection('config').doc('defectTypesMeta').set({photoOrders:next,updatedAt:new Date().toISOString()},{merge:true});
      setPhotoOrders(next);
      console.log('[photoOrders] 저장 완료',tagId,orderedIds.length,'장');
    }catch(e){console.error('[photoOrders] 저장 실패:',e);}
  };
  /* helper: 태그 ID로 메타 조회 */
  const getTagMeta=(id)=>defectTypesMeta.find(t=>t.id===id)||null;
  const getTagLabel=(id)=>{const m=getTagMeta(id);return m?.label||id;};
  const isTagMain=(id)=>{const m=getTagMeta(id);return !m||m.role!=='sub';};/* 기본값=main */
  const isTagFeatured=(id)=>{const m=getTagMeta(id);return !!m?.featured;};
  const updateTagMeta=(id,updates)=>{
    const existing=[...defectTypesMeta];
    const idx=existing.findIndex(t=>t.id===id);
    if(idx>=0){existing[idx]={...existing[idx],...updates};}
    else{existing.push({id,label:id,role:'main',featured:false,...updates});}
    return existing;
  };
  /* 태그 순서 이동 */
  const moveTagMeta=async(id,dir)=>{
    const tags=[...defectTypesMeta];
    const idx=tags.findIndex(t=>t.id===id);
    if(idx<0)return;const ni=idx+dir;
    if(ni<0||ni>=tags.length)return;
    [tags[idx],tags[ni]]=[tags[ni],tags[idx]];
    await saveDefectTypesMeta(tags);
  };

  const fetchPhotos=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection(COLLECTIONS.DEFECT_PHOTOS).get();
      const arr=[];snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      arr.sort((a,b)=>(a.method||'').localeCompare(b.method||'')||(a.defectType||'').localeCompare(b.defectType||'')||(a.label||'').localeCompare(b.label||''));
      console.log(`[defect-photos] ${arr.length}건 로드`);
      setPhotos(arr);
    }catch(e){console.error('[defect-photos] 로드 실패:',e);showToast('데이터 로드 실패','error');}
    setLoading(false);
  };

  /* ── 하자 템플릿 로드 ── */
  const fetchTemplates=async()=>{
    setTemplateLoading(true);
    try{
      const snap=await db.collection('defect-templates').get();
      if(snap.empty){
        setTemplates(DEFAULT_DEFECT_TEMPLATES);
      }else{
        const arr=[];snap.forEach(doc=>{
          const d={id:doc.id,...doc.data()};
          /* 하위 호환: 기존 type/keywords → 신규 tags/methods */
          if(!d.tags&&d.type){d.tags=[d.type,...(d.keywords||'').split(',').map(s=>s.trim()).filter(Boolean)];}
          if(!d.methods)d.methods=[];
          if(!d.referenceImageUrl)d.referenceImageUrl='';
          arr.push(d);
        });
        arr.sort((a,b)=>templateDisplayName(a).localeCompare(templateDisplayName(b)));
        setTemplates(arr);
      }
    }catch(e){setTemplates(DEFAULT_DEFECT_TEMPLATES);}
    setTemplateLoading(false);
  };

  const uploadTemplateImage=async(file)=>{
    const path=`defect-templates/${Date.now()}_${file.name}`;
    const ref=storage.ref(path);await ref.put(file);return await ref.getDownloadURL();
  };

  const saveTemplate=async()=>{

  const allDefects=useMemo(()=>{const s=new Set(DEFAULT_DEFECT_TYPES);photos.forEach(p=>{if(p.defectType)s.add(p.defectType);if(Array.isArray(p.defectTypes))p.defectTypes.forEach(t=>s.add(t));});customTags.forEach(t=>s.add(t));defectTypesMeta.forEach(t=>s.add(t.id));return [...s];},[photos,customTags,defectTypesMeta]);

  const filtered=useMemo(()=>photos.filter(p=>{

  /* ── AI 대량 자동 분류 ── */
  const fileToBase64=(file)=>new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
