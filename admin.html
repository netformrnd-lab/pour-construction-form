// ─── NPS 대시보드 ───
function NPSPage({ showToast }) {
  const [surveys, setSurveys] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all'); // all | promoter | passive | detractor
  const [sortBy, setSortBy] = useState('date'); // date | score
  const [campaignFilter, setCampaignFilter] = useState('all');

  const loadData = useCallback(async () => {
    try {
      const snap = await db.collection(COLLECTIONS.NPS_SURVEYS).get();
      console.log('[NPS] 설문 로드:', snap.size, '건');
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      data.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      setSurveys(data);
    } catch (e) {
      console.error('[NPS] 로드 실패:', e);
      showToast('NPS 데이터 로드 실패', 'error');
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  useEffect(() => { loadData(); }, [loadData]);

  const campaigns = useMemo(() => {
    const set = new Set(surveys.map(s => s.campaign || '미지정'));
    return ['all', ...Array.from(set)];
  }, [surveys]);

  const filtered = useMemo(() => {
    let list = surveys;
    if (campaignFilter !== 'all') {
      list = list.filter(s => (s.campaign || '미지정') === campaignFilter);
    }
    if (filter !== 'all') {
      list = list.filter(s => s.category === filter);
    }
    if (sortBy === 'score') {
      list = [...list].sort((a, b) => b.score - a.score);
    }
    return list;
  }, [surveys, filter, sortBy, campaignFilter]);

  // NPS 통계 계산
  const stats = useMemo(() => {
    const target = campaignFilter !== 'all'
      ? surveys.filter(s => (s.campaign || '미지정') === campaignFilter)
      : surveys;
    const total = target.length;
    if (total === 0) return { nps: 0, promoters: 0, passives: 0, detractors: 0, total: 0, avg: 0, dist: new Array(11).fill(0) };

    const promoters = target.filter(s => s.category === 'promoter').length;
    const passives = target.filter(s => s.category === 'passive').length;
    const detractors = target.filter(s => s.category === 'detractor').length;
    const nps = Math.round(((promoters - detractors) / total) * 100);
    const avg = (target.reduce((sum, s) => sum + (s.score || 0), 0) / total).toFixed(1);

    const dist = new Array(11).fill(0);
    target.forEach(s => { if (s.score >= 0 && s.score <= 10) dist[s.score]++; });

    return { nps, promoters, passives, detractors, total, avg, dist };
  }, [surveys, campaignFilter]);

  // 만족/불만족 요인 집계
  const factorStats = useMemo(() => {
    const target = campaignFilter !== 'all'
      ? surveys.filter(s => (s.campaign || '미지정') === campaignFilter)
      : surveys;
    const good = {};
    const bad = {};
    target.forEach(s => {
      (s.goodFactors || []).forEach(f => { good[f] = (good[f] || 0) + 1; });
      (s.badFactors || []).forEach(f => { bad[f] = (bad[f] || 0) + 1; });
    });
    const sortObj = obj => Object.entries(obj).sort((a, b) => b[1] - a[1]);
    return { good: sortObj(good), bad: sortObj(bad) };
  }, [surveys, campaignFilter]);

  // 엑셀 다운로드
  const exportExcel = () => {
    if (typeof XLSX === 'undefined') {
      showToast('XLSX 라이브러리 로딩 실패', 'error');
      return;
    }
    const rows = filtered.map(s => ({
      '제출일': s.createdAt ? new Date(s.createdAt).toLocaleString('ko') : '-',
      '캠페인': s.campaign || '-',
      '성함': s.name || '-',
      '소속': s.company || '-',
      '직책': s.position || '-',
      '연락처': s.phone || '-',
      'NPS점수': s.score,
      '구분': s.category === 'promoter' ? '추천' : s.category === 'passive' ? '중립' : '비추천',
      '만족요인': (s.goodFactors || []).join(', '),
      '개선요인': (s.badFactors || []).join(', '),
      '추가의견': s.feedback || '',
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'NPS');
    XLSX.writeFile(wb, `NPS_결과_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('엑셀 다운로드 완료');
  };

  if (loading) {
    return (
      <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-sm)' }}>
        <div style={{ width: 24, height: 24, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 12px' }} />
        NPS 데이터 로딩 중...
      </div>
    );
  }

  const npsColor = stats.nps >= 50 ? '#059669' : stats.nps >= 0 ? '#D97706' : '#DC2626';
  const maxDist = Math.max(...stats.dist, 1);

  return (
    <div style={{ animation: 'fadeIn .3s ease', maxWidth: 1200 }}>
      {/* 헤더 */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--text)' }}>NPS 대시보드</div>
          <div style={{ fontSize: 12, color: 'var(--text-sm)', marginTop: 4 }}>실시간 고객 만족도 조사 결과</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <select value={campaignFilter} onChange={e => setCampaignFilter(e.target.value)}
            style={{ padding: '8px 12px', borderRadius: 8, border: '1px solid var(--border)', fontSize: 12, fontWeight: 600, background: '#fff', cursor: 'pointer' }}>
            {campaigns.map(c => (
              <option key={c} value={c}>{c === 'all' ? '전체 캠페인' : c}</option>
            ))}
          </select>
          <button onClick={loadData}
            style={{ padding: '8px 14px', borderRadius: 8, border: '1px solid var(--border)', background: '#fff', fontSize: 12, fontWeight: 600, cursor: 'pointer', color: 'var(--text-md)' }}>
            새로고침
          </button>
          <button onClick={exportExcel}
            style={{ padding: '8px 14px', borderRadius: 8, border: 'none', background: 'var(--accent)', color: '#fff', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
            엑셀 다운로드
          </button>
        </div>
      </div>

      {/* NPS 스코어 + 구성비 카드 */}
      <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 14, marginBottom: 20 }}>
        {/* NPS 스코어 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)', textAlign: 'center' }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 12 }}>NPS 점수</div>
          <div style={{ fontSize: 56, fontWeight: 900, color: npsColor, lineHeight: 1 }}>{stats.nps}</div>
          <div style={{ fontSize: 11, color: 'var(--text-sm)', marginTop: 8 }}>
            {stats.nps >= 70 ? '매우 우수' : stats.nps >= 50 ? '우수' : stats.nps >= 0 ? '보통' : '개선 필요'}
          </div>
          <div style={{ marginTop: 16, padding: '8px 0', borderTop: '1px solid var(--border)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text-md)' }}>
              <span>평균 점수</span>
              <span style={{ fontWeight: 700 }}>{stats.avg}점</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text-md)', marginTop: 6 }}>
              <span>총 응답</span>
              <span style={{ fontWeight: 700 }}>{stats.total}건</span>
            </div>
          </div>
        </div>

        {/* 구성비 + 바 차트 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)' }}>
          {/* 3-segment bar */}
          <div style={{ display: 'flex', gap: 16, marginBottom: 20 }}>
            {[
              { label: '추천 (9-10)', count: stats.promoters, color: '#059669', bg: '#ECFDF5', pct: stats.total ? Math.round(stats.promoters / stats.total * 100) : 0 },
              { label: '중립 (7-8)', count: stats.passives, color: '#D97706', bg: '#FFFBEB', pct: stats.total ? Math.round(stats.passives / stats.total * 100) : 0 },
              { label: '비추천 (0-6)', count: stats.detractors, color: '#DC2626', bg: '#FEF2F2', pct: stats.total ? Math.round(stats.detractors / stats.total * 100) : 0 },
            ].map(seg => (
              <div key={seg.label} style={{ flex: 1, padding: '12px 14px', borderRadius: 10, background: seg.bg }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: seg.color, marginBottom: 4 }}>{seg.label}</div>
                <div style={{ fontSize: 24, fontWeight: 900, color: seg.color }}>{seg.count}<span style={{ fontSize: 13, fontWeight: 500 }}>명</span></div>
                <div style={{ fontSize: 12, color: seg.color, opacity: 0.7, marginTop: 2 }}>{seg.pct}%</div>
              </div>
            ))}
          </div>

          {/* 점수 분포 바 차트 */}
          <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 10 }}>점수 분포</div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 80 }}>
            {stats.dist.map((count, i) => {
              const barColor = i <= 6 ? '#FCA5A5' : i <= 8 ? '#FCD34D' : '#6EE7B7';
              const h = count > 0 ? Math.max((count / maxDist) * 70, 4) : 2;
              return (
                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: count > 0 ? 'var(--text-md)' : 'transparent' }}>{count}</div>
                  <div style={{ width: '100%', height: h, borderRadius: 3, background: barColor, transition: 'height .3s' }} />
                  <div style={{ fontSize: 10, color: 'var(--text-sm)' }}>{i}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* 요인 분석 */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
        {/* 만족 요인 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#059669', marginBottom: 14 }}>만족 요인 TOP</div>
          {factorStats.good.length === 0 ? (
            <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
          ) : factorStats.good.slice(0, 6).map(([name, cnt]) => {
            const pct = stats.total ? Math.round(cnt / stats.total * 100) : 0;
            return (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                <div style={{ flex: 1, fontSize: 12, fontWeight: 500, color: 'var(--text)' }}>{name}</div>
                <div style={{ width: 120, height: 8, background: '#F3F4F6', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ width: pct + '%', height: '100%', background: '#6EE7B7', borderRadius: 4, transition: 'width .3s' }} />
                </div>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#059669', minWidth: 36, textAlign: 'right' }}>{cnt}명</div>
              </div>
            );
          })}
        </div>

        {/* 개선 요인 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#DC2626', marginBottom: 14 }}>개선 요인 TOP</div>
          {factorStats.bad.length === 0 ? (
            <div style={{ fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 20 }}>데이터 없음</div>
          ) : factorStats.bad.slice(0, 6).map(([name, cnt]) => {
            const pct = stats.total ? Math.round(cnt / stats.total * 100) : 0;
            return (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
                <div style={{ flex: 1, fontSize: 12, fontWeight: 500, color: 'var(--text)' }}>{name}</div>
                <div style={{ width: 120, height: 8, background: '#F3F4F6', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ width: pct + '%', height: '100%', background: '#FCA5A5', borderRadius: 4, transition: 'width .3s' }} />
                </div>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#DC2626', minWidth: 36, textAlign: 'right' }}>{cnt}명</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 개별 응답 목록 */}
      <div style={{ background: '#fff', borderRadius: 12, padding: 20, boxShadow: 'var(--shadow)' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 700 }}>개별 응답 ({filtered.length}건)</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[
              { key: 'all', label: '전체' },
              { key: 'promoter', label: '추천', color: '#059669' },
              { key: 'passive', label: '중립', color: '#D97706' },
              { key: 'detractor', label: '비추천', color: '#DC2626' },
            ].map(f => (
              <button key={f.key} onClick={() => setFilter(f.key)}
                style={{
                  padding: '5px 12px', borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: 'pointer',
                  border: filter === f.key ? 'none' : '1px solid var(--border)',
                  background: filter === f.key ? (f.color || 'var(--accent)') : '#fff',
                  color: filter === f.key ? '#fff' : 'var(--text-md)',
                }}>
                {f.label}
              </button>
            ))}
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              style={{ padding: '5px 10px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 11, fontWeight: 600, background: '#fff', cursor: 'pointer', marginLeft: 4 }}>
              <option value="date">최신순</option>
              <option value="score">점수순</option>
            </select>
          </div>
        </div>

        {filtered.length === 0 ? (
          <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sm)', fontSize: 13 }}>
            응답 데이터가 없습니다
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {filtered.map(s => {
              const catColor = s.category === 'promoter' ? '#059669' : s.category === 'passive' ? '#D97706' : '#DC2626';
              const catLabel = s.category === 'promoter' ? '추천' : s.category === 'passive' ? '중립' : '비추천';
              return (
                <div key={s.id} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
                  background: 'var(--bg)', borderRadius: 8, fontSize: 13
                }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    background: catColor + '15', color: catColor, fontWeight: 900, fontSize: 16, flexShrink: 0
                  }}>
                    {s.score}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontWeight: 600 }}>{s.name || '-'}</span>
                      <span style={{ fontSize: 11, color: 'var(--text-sm)' }}>{s.company || ''}</span>
                      {s.position && <span style={{ fontSize: 10, color: 'var(--text-sm)', background: 'var(--border-s)', padding: '1px 6px', borderRadius: 4 }}>{s.position}</span>}
                    </div>
                    {s.feedback && (
                      <div style={{ fontSize: 12, color: 'var(--text-md)', marginTop: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        "{s.feedback}"
                      </div>
                    )}
                    {((s.goodFactors && s.goodFactors.length > 0) || (s.badFactors && s.badFactors.length > 0)) && (
                      <div style={{ display: 'flex', gap: 4, marginTop: 4, flexWrap: 'wrap' }}>
                        {(s.goodFactors || []).map(f => (
                          <span key={f} style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: '#ECFDF5', color: '#059669' }}>{f}</span>
                        ))}
                        {(s.badFactors || []).map(f => (
                          <span key={f} style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: '#FEF2F2', color: '#DC2626' }}>{f}</span>
                        ))}
                      </div>
                    )}
                  </div>
                  <span style={{
                    padding: '3px 10px', borderRadius: 6, fontSize: 11, fontWeight: 600,
                    background: catColor + '15', color: catColor, flexShrink: 0
                  }}>
                    {catLabel}
                  </span>
                  <span style={{ fontSize: 11, color: 'var(--text-sm)', minWidth: 75, textAlign: 'right', flexShrink: 0 }}>
                    {s.createdAt ? new Date(s.createdAt).toLocaleDateString('ko') : '-'}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   영업관리 칸반 보드 — 4개 브랜드 공통 컴포넌트
   ══════════════════════════════════════════════════════════════ */
const PIPELINE_STAGES=['신규','상담중','견적제출','계약예정','계약완료'];
const PIPELINE_COLORS={'신규':'#DC2626','상담중':'#D97706','견적제출':'#2563EB','계약예정':'#7C3AED','계약완료':'#059669'};
const BRAND_CONFIG={
  'leads-solution':{collection:'leads',label:'POUR솔루션',color:'#2563EB',bg:'#EFF6FF',icon:'🏢'},
  'leads-method':{collection:'leads-method',label:'POUR공법',color:'#E8780F',bg:'#FFF7ED',icon:'🔧'},
  'leads-store':{collection:'leads-store',label:'POUR스토어',color:'#059669',bg:'#ECFDF5',icon:'🛒'},
  'leads-grohome':{collection:'leads-grohome',label:'그로홈',color:'#6D28D9',bg:'#F5F3FF',icon:'🏠'},
};

function LeadsKanbanPage({brandKey,showToast}){
  const brand=BRAND_CONFIG[brandKey];
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const [viewMode,setViewMode]=useState('kanban'); // kanban | list

  const fetchLeads=async()=>{
    setLoading(true);
    try{
      const snap=await db.collection(brand.collection).get();
      const arr=[];
      snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      arr.sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
      console.log(`[leads] ${brand.label}: ${arr.length}건 로드`);
      setLeads(arr);
    }catch(e){console.error('[leads] 로드 실패:',e);}
    setLoading(false);
  };

  useEffect(()=>{fetchLeads();},[brandKey]);

  const updateStatus=async(id,newStatus)=>{
    try{
      await db.collection(brand.collection).doc(id).update({status:newStatus,updatedAt:new Date().toISOString()});
      setLeads(prev=>prev.map(l=>l.id===id?{...l,status:newStatus}:l));
      if(selected?.id===id)setSelected(prev=>({...prev,status:newStatus}));
      showToast(`${newStatus}(으)로 변경됨`);
    }catch(e){console.error(e);showToast('상태 변경 실패','error');}
  };

  const deleteLead=async(id)=>{
    if(!confirm('정말 삭제하시겠습니까?'))return;
    try{
      await db.collection(brand.collection).doc(id).delete();
      setLeads(prev=>prev.filter(l=>l.id!==id));
      setSelected(null);
      showToast('삭제 완료');
    }catch(e){console.error(e);showToast('삭제 실패','error');}
  };

  const filtered=leads.filter(l=>{
    if(!search.trim())return true;
    const s=search.toLowerCase();
    return (l.name||'').toLowerCase().includes(s)||(l.phone||'').includes(s)||(l.building||'').toLowerCase().includes(s)||(l.problem||'').toLowerCase().includes(s);
  });

  const byStage=(stage)=>filtered.filter(l=>(l.status||'신규')===stage);

  const formatDate=(d)=>{if(!d)return'-';const dt=new Date(d);return `${dt.getMonth()+1}/${dt.getDate()}`};

  /* ── 리드 상세 모달 ── */
  const DetailModal=()=>{
    if(!selected)return null;
    const l=selected;
    return(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setSelected(null)}>
        <div style={{background:'#fff',borderRadius:16,padding:24,width:'min(440px,90vw)',maxHeight:'80vh',overflowY:'auto',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:800}}>{l.name||'이름없음'}</div>
            <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--text-sm)'}}>✕</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
            {[{k:'전화',v:l.phone},{k:'이메일',v:l.email},{k:'건물',v:l.building},{k:'직급',v:l.position},{k:'하자',v:Array.isArray(l.problems)?l.problems.join(', '):l.problem},{k:'접수일',v:l.savedAt?new Date(l.savedAt).toLocaleDateString('ko'):'-'},{k:'담당자',v:l.staff},{k:'출처',v:l.source},{k:'희망착공',v:l.desiredStartDate||'-'},{k:'자료기한',v:l.docDeadline||'-'}].map(({k,v})=>v&&v!=='-'?(
              <div key={k} style={{padding:'8px 10px',background:'var(--bg)',borderRadius:8}}>
                <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:2}}>{k}</div>
                <div style={{fontSize:13,fontWeight:600}}>{v}</div>
              </div>
            ):null)}
          </div>
          {l.memo&&<div style={{padding:10,background:'var(--bg)',borderRadius:8,marginBottom:16}}>
            <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:4}}>메모</div>
            <div style={{fontSize:13,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{l.memo}</div>
          </div>}
          {l.actions&&l.actions.length>0&&<div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:6}}>후속 조치</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{l.actions.map((a,i)=><span key={i} style={{padding:'4px 8px',borderRadius:6,background:brand.bg,color:brand.color,fontSize:11,fontWeight:600}}>{a}</span>)}</div>
          </div>}
          <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:8}}>상태 변경</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
            {PIPELINE_STAGES.map(s=>(
              <button key={s} onClick={()=>updateStatus(l.id,s)} style={{padding:'7px 14px',borderRadius:8,border:`1.5px solid ${(l.status||'신규')===s?PIPELINE_COLORS[s]:'var(--border)'}`,background:(l.status||'신규')===s?PIPELINE_COLORS[s]:'#fff',color:(l.status||'신규')===s?'#fff':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{s}</button>
            ))}
          </div>
          <button onClick={()=>deleteLead(l.id)} style={{width:'100%',padding:'10px 0',borderRadius:8,border:'1.5px solid #FEE2E2',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🗑 삭제</button>
        </div>
      </div>
    );
  };

  /* ── 칸반 카드 ── */
  const LeadCard=({lead})=>(
    <div onClick={()=>setSelected(lead)} style={{padding:'12px 14px',background:'#fff',borderRadius:10,border:'1px solid var(--border-s)',cursor:'pointer',transition:'all .15s',boxShadow:'0 1px 3px rgba(0,0,0,.04)',marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{lead.name||'이름없음'}</div>
        <div style={{fontSize:10,color:'var(--text-sm)'}}>{formatDate(lead.savedAt)}</div>
      </div>
      {lead.building&&<div style={{fontSize:12,color:'var(--text-md)',marginBottom:4}}>🏢 {lead.building}</div>}
      {(lead.problem||lead.problems)&&<div style={{fontSize:11,color:'var(--text-sm)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>⚡ {Array.isArray(lead.problems)?lead.problems.join(', '):lead.problem}</div>}
      {lead.staff&&<div style={{fontSize:11,color:brand.color,marginTop:4,fontWeight:600}}>👤 {lead.staff}</div>}
    </div>
  );

  /* ── 칸반 뷰 ── */
  const KanbanView=()=>(
    <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16,minHeight:'calc(100vh - 200px)'}}>
      {PIPELINE_STAGES.map(stage=>{
        const items=byStage(stage);
        return(
          <div key={stage} style={{minWidth:240,maxWidth:280,flex:'0 0 240px',background:'var(--bg)',borderRadius:12,padding:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'0 4px'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:PIPELINE_COLORS[stage]}}/>
              <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>{stage}</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',background:'var(--border-s)',borderRadius:10,padding:'2px 8px'}}>{items.length}</div>
            </div>
            <div style={{minHeight:100}}>
              {items.map(l=><LeadCard key={l.id} lead={l}/>)}
              {items.length===0&&<div style={{textAlign:'center',padding:'20px 0',fontSize:12,color:'var(--text-sm)'}}>없음</div>}
            </div>
          </div>
        );
      })}
    </div>
  );

  /* ── 리스트 뷰 ── */
  const ListView=()=>(
    <div style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead>
          <tr style={{background:'var(--bg)'}}>
            {['성함','건물','하자','상태','담당자','접수일'].map(h=>(
              <th key={h} style={{padding:'10px 14px',textAlign:'left',fontWeight:700,color:'var(--text-md)',fontSize:12,borderBottom:'1px solid var(--border)'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {filtered.map(l=>(
            <tr key={l.id} onClick={()=>setSelected(l)} style={{cursor:'pointer',borderBottom:'1px solid var(--border-s)'}}>
              <td style={{padding:'10px 14px',fontWeight:600}}>{l.name||'-'}</td>
              <td style={{padding:'10px 14px',color:'var(--text-md)'}}>{l.building||'-'}</td>
              <td style={{padding:'10px 14px',color:'var(--text-md)',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{Array.isArray(l.problems)?l.problems.join(', '):(l.problem||'-')}</td>
              <td style={{padding:'10px 14px'}}><span style={{padding:'3px 10px',borderRadius:6,background:PIPELINE_COLORS[l.status||'신규']+'18',color:PIPELINE_COLORS[l.status||'신규'],fontSize:11,fontWeight:700}}>{l.status||'신규'}</span></td>
              <td style={{padding:'10px 14px',color:'var(--text-md)'}}>{l.staff||'-'}</td>
              <td style={{padding:'10px 14px',color:'var(--text-sm)',fontSize:12}}>{formatDate(l.savedAt)}</td>
            </tr>
          ))}
          {filtered.length===0&&<tr><td colSpan={6} style={{padding:40,textAlign:'center',color:'var(--text-sm)'}}>리드가 없습니다</td></tr>}
        </tbody>
      </table>
    </div>
  );

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:28}}>{brand.icon}</span>
          <div>
            <div style={{fontSize:20,fontWeight:800}}>{brand.label} 영업</div>
            <div style={{fontSize:12,color:'var(--text-sm)'}}>총 {leads.length}건 · {PIPELINE_STAGES.map(s=>`${s} ${byStage(s).length}`).join(' · ')}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색 (이름, 전화, 건물)" style={{padding:'8px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:12,width:180,outline:'none',fontFamily:'inherit'}}/>
          <button onClick={()=>setViewMode(viewMode==='kanban'?'list':'kanban')} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>{viewMode==='kanban'?'📋 리스트':'📊 칸반'}</button>
          <button onClick={fetchLeads} style={{padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>🔄</button>
        </div>
      </div>

      {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>
        :viewMode==='kanban'?<KanbanView/>:<ListView/>}

      <DetailModal/>
    </div>
  );
}

function PagePlaceholder({ title, icon, description }) {
  return (
    <div style={{
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      height:'100%', color:'var(--text-sm)', animation:'fadeIn .3s ease'
    }}>
      <div style={{fontSize:48, marginBottom:16}}>{icon}</div>
      <div style={{fontSize:18, fontWeight:700, color:'var(--text)', marginBottom:8}}>{title}</div>
      <div style={{fontSize:13}}>{description || '준비 중입니다'}</div>
    </div>
  );
}

// ─── 메인 App ───
function App() {
  const [authed, setAuthed] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(
    () => localStorage.getItem(SIDEBAR_COLLAPSED_KEY) === 'true'
  );
  const [toast, setToast] = useState(null);

  const toggleSidebar = () => {
    setSidebarCollapsed(prev => {
      localStorage.setItem(SIDEBAR_COLLAPSED_KEY, String(!prev));
      return !prev;
    });
  };

  const showToast = useCallback((msg, type = 'success') => {
    setToast({ msg, type });
  }, []);

  if (!authed) return <PinScreen onAuth={() => setAuthed(true)} />;

  const renderPage = () => {
    switch (page) {
      case 'dashboard':
        return <DashboardPage onNavigate={setPage} />;
      case 'products':
        return <ProductsPage showToast={showToast} />;
      case 'leads-solution':
        return <LeadsKanbanPage brandKey="leads-solution" showToast={showToast} />;
      case 'leads-method':
        return <LeadsKanbanPage brandKey="leads-method" showToast={showToast} />;
      case 'leads-store':
        return <LeadsKanbanPage brandKey="leads-store" showToast={showToast} />;
      case 'leads-grohome':
        return <LeadsKanbanPage brandKey="leads-grohome" showToast={showToast} />;
      case 'inquiries':
        return <PagePlaceholder title="문의접수" icon="📬" description="사이트 문의 접수 관리" />;
      case 'metrics':
        return <PagePlaceholder title="공신력 수치" icon="📊" description="3개 사이트 실시간 반영 수치 관리" />;
      case 'resources':
        return <PagePlaceholder title="영업자료" icon="📎" description="시방서, 카탈로그, 인증서 관리" />;
      case 'partners':
        return <PagePlaceholder title="파트너사" icon="🏢" description="파트너사 계약 및 등급 관리" />;
      case 'staff':
        return <PagePlaceholder title="담당자" icon="👥" description="담당자 목록 관리" />;
      case 'nps':
        return <NPSPage showToast={showToast} />;
      case 'sms':
        return <PagePlaceholder title="SMS 설정" icon="💬" description="SMS 발송 및 템플릿 관리" />;
      case 'settings':
        return <SettingsPage showToast={showToast} onLogout={() => { localStorage.removeItem(ADMIN_PIN_KEY); setAuthed(false); }} />;
      default:
        return <PagePlaceholder title="페이지 없음" icon="🔍" />;
    }
  };

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
      <Sidebar
        current={page}
        onNavigate={setPage}
        collapsed={sidebarCollapsed}
        onToggle={toggleSidebar}
      />
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* 헤더 */}
        <div style={{
          height:56, padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between',
          background:'#fff', borderBottom:'1px solid var(--border)', flexShrink:0
        }}>
          <div style={{fontSize:15, fontWeight:700, color:'var(--text)'}}>
            {MENU.find(m => m.key === page)?.icon} {MENU.find(m => m.key === page)?.label || '영업관리센터'}
          </div>
          <button onClick={() => { localStorage.removeItem(ADMIN_PIN_KEY); setAuthed(false); }}
            style={{
              background:'none', border:'1px solid var(--border)', borderRadius:8,
              padding:'6px 14px', fontSize:12, color:'var(--text-md)', cursor:'pointer'
            }}>
            로그아웃
          </button>
        </div>
        {/* 콘텐츠 */}
        <div style={{flex:1, overflow:'auto', padding:24, background:'var(--bg)'}}>
          {renderPage()}
        </div>
      </div>
      {toast && <Toast message={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
