const MENU = [

// ─── PIN 인증 ───
const hashPin = async (pin) => {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
};

function PinScreen({ onAuth }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [mode, setMode] = useState('checking'); // checking | setup | verify
  const [fails, setFails] = useState(0);
  const [locked, setLocked] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    const saved = localStorage.getItem(ADMIN_PIN_KEY);
    setMode(saved ? 'verify' : 'setup');
    setTimeout(() => inputRef.current?.focus(), 300);
  }, []);

  useEffect(() => {
    if (fails >= 3) {
      setLocked(true);
      setError('3회 실패. 30초 후 재시도');
      const t = setTimeout(() => { setLocked(false); setFails(0); setError(''); }, 30000);
      return () => clearTimeout(t);
    }
  }, [fails]);

  const handleSubmit = async () => {
    if (locked || pin.length < 4) return;
    const hashed = await hashPin(pin);
    if (mode === 'setup') {
      localStorage.setItem(ADMIN_PIN_KEY, hashed);
      onAuth();
    } else {
      const saved = localStorage.getItem(ADMIN_PIN_KEY);
      if (hashed === saved) {
        onAuth();
      } else {
        setFails(f => f + 1);
        setError('PIN이 일치하지 않습니다');
        setPin('');
      }
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') handleSubmit();
  };

  if (mode === 'checking') return null;

  return (
    <div style={{
      height:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      background:'linear-gradient(135deg, #0D1B2A 0%, #1A2E42 100%)'
    }}>
      <div style={{
        background:'#fff', borderRadius:20, padding:'48px 40px', width:380,
        boxShadow:'0 20px 60px rgba(0,0,0,.3)', animation:'fadeIn .4s ease',
        textAlign:'center'
      }}>
        <div style={{fontSize:32, fontWeight:900, color:'var(--navy)', marginBottom:4}}>
          넷폼알앤디
        </div>
        <div style={{fontSize:14, color:'var(--text-md)', marginBottom:32}}>
          영업관리센터
        </div>
        <div style={{fontSize:13, fontWeight:600, color:'var(--text-md)', marginBottom:12}}>
          {mode === 'setup' ? 'PIN 설정 (4자리 이상)' : 'PIN 입력'}
        </div>
        <input
          ref={inputRef}
          type="password"
          value={pin}
          onChange={e => { setPin(e.target.value); setError(''); }}
          onKeyDown={handleKeyDown}
          maxLength={8}
          disabled={locked}
          placeholder="●●●●"
          style={{
            width:'100%', padding:'14px 16px', fontSize:24, textAlign:'center',
            border:`2px solid ${error ? 'var(--red)' : 'var(--border)'}`,
            borderRadius:12, outline:'none', letterSpacing:8, fontFamily:'monospace',
            transition:'border-color .2s',
            animation: error ? 'shake .4s ease' : 'none'
          }}
        />
        {error && (
          <div style={{color:'var(--red)', fontSize:12, fontWeight:600, marginTop:8}}>{error}</div>
        )}
        <button
          onClick={handleSubmit}
          disabled={locked || pin.length < 4}
          style={{
            width:'100%', marginTop:20, padding:'14px 0', fontSize:15, fontWeight:700,
            background: (locked || pin.length < 4) ? '#D1D5DB' : 'var(--accent)',
            color:'#fff', border:'none', borderRadius:12, cursor:'pointer',
            transition:'background .2s'
          }}
        >
          {mode === 'setup' ? 'PIN 설정 완료' : '로그인'}
        </button>
        <div style={{marginTop:16, fontSize:11, color:'var(--text-sm)'}}>
          태블릿앱과 동일한 PIN을 사용합니다
        </div>
      </div>
    </div>
  );
}

// ─── 토스트 ───
function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', zIndex:9999,
      padding:'12px 24px', borderRadius:12, fontSize:13, fontWeight:700,
      background: type === 'success' ? 'var(--green)' : 'var(--red)', color:'#fff',
      boxShadow:'0 6px 24px rgba(0,0,0,.25)', whiteSpace:'nowrap',
      animation:'fadeIn .25s ease'
    }}>
      {type === 'success' ? '✅' : '❌'} {message}
    </div>
  );
}

// ─── 사이드바 ───

      minWidth: collapsed ? 64 : 260,
      height:'100vh', background:'var(--navy)', color:'#fff',

    }}>
      {/* 헤더 */}
      <div style={{
        padding: collapsed ? '20px 12px' : '20px 20px',
        borderBottom:'1px solid rgba(255,255,255,.08)',
        display:'flex', alignItems:'center', justifyContent:'space-between'
      }}>
        {!collapsed && (
          <div>
            <div style={{fontSize:15, fontWeight:800}}>넷폼알앤디</div>
            <div style={{fontSize:11, color:'rgba(255,255,255,.45)', marginTop:2}}>영업관리센터</div>
          </div>
        )}
        <button onClick={onToggle} style={{
          background:'none', border:'none', color:'rgba(255,255,255,.5)',
          cursor:'pointer', fontSize:18, padding:4, flexShrink:0
        }}>
          {collapsed ? '▶' : '◀'}
        </button>
      </div>

      {/* 메뉴 */}
      <div style={{flex:1, overflowY:'auto', padding:'8px 0'}}>
        {MENU.map((item, i) => {
          if (item.section) {
            if (collapsed) return <div key={i} style={{height:1, background:'rgba(255,255,255,.06)', margin:'8px 12px'}} />;
            return (
              <div key={i} style={{
                padding:'16px 20px 6px', fontSize:10, fontWeight:700,
                color:'rgba(255,255,255,.3)', letterSpacing:1, textTransform:'uppercase'
              }}>
                {item.section}
              </div>
            );
          }
          const active = current === item.key;
          return (
            <button key={item.key} onClick={() => onNavigate(item.key)} style={{
              width:'100%', display:'flex', alignItems:'center', gap: collapsed ? 0 : 10,
              justifyContent: collapsed ? 'center' : 'flex-start',
              padding: collapsed ? '10px 0' : '10px 20px',
              background: active ? 'rgba(37,99,235,.2)' : 'transparent',
              border:'none', color: active ? '#60A5FA' : 'rgba(255,255,255,.6)',
              fontSize:13, fontWeight: active ? 700 : 500, cursor:'pointer',
              borderRight: active ? '3px solid #60A5FA' : '3px solid transparent',
              transition:'all .15s ease'
            }}>
              <span style={{fontSize:16}}>{item.icon}</span>
              {!collapsed && <span>{item.label}</span>}
            </button>
          );
        })}
      </div>

      {/* 하단 바로가기 */}
      <div style={{
        padding: collapsed ? '12px 8px' : '12px 20px',
        borderTop:'1px solid rgba(255,255,255,.08)'
      }}>
        <a href="./index.html" target="_blank" style={{
          display:'flex', alignItems:'center', gap:8, justifyContent: collapsed ? 'center' : 'flex-start',
          color:'rgba(255,255,255,.4)', textDecoration:'none', fontSize:12
        }}>
          <span>📱</span>
          {!collapsed && <span>태블릿앱 열기</span>}
        </a>
      </div>
    </div>
  );
}

// ─── 판매채널 정의 ───
const CHANNELS = [
  { key: 'sabangnet',    label: '사방넷',      color: '#1A73E8', urlTpl: null },
  { key: 'imweb',        label: '아임웹(카페24)', color: '#5B2EFF', urlTpl: null },
  { key: 'auction',      label: '옥션',         color: '#E44D26', urlTpl: id => `https://itempage3.auction.co.kr/DetailView.aspx?ItemNo=${id}` },
  { key: 'gmarket',      label: 'G마켓',        color: '#00B050', urlTpl: id => `https://item.gmarket.co.kr/Item?goodscode=${id}` },
  { key: 'elevenst',     label: '11번가',       color: '#FF0050', urlTpl: id => `https://www.11st.co.kr/products/${id}` },
  { key: 'coupang',      label: '쿠팡',         color: '#E64626', urlTpl: id => `https://www.coupang.com/vp/products/${id}` },
  { key: 'ohouse',       label: '오늘의집',      color: '#35C5F0', urlTpl: id => `https://ohou.se/productions/${id}` },
  { key: 'smartstore',   label: '스마트스토어',   color: '#03C75A', urlTpl: id => `https://smartstore.naver.com/pourstore/products/${id}` },
];

// ─── 상품관리 페이지 ───
function ProductsPage({ showToast }) {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [editingId, setEditingId] = useState(null); // null=목록, 'new'=신규, docId=수정
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const [expandedChannel, setExpandedChannel] = useState(null); // 채널 상세 펼침

  // Firestore 로드
  useEffect(() => {
    (async () => {
      try {
        const snap = await db.collection(COLLECTIONS.PRODUCTS).get();
        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        console.log(`[products] ${docs.length}건 로드`);
        docs.sort((a, b) => (b.updatedAt || b.createdAt || '').localeCompare(a.updatedAt || a.createdAt || ''));
        setProducts(docs);
      } catch (e) {
        console.error('[products] 로드 실패:', e);
        showToast('상품 로드 실패', 'error');
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  // 빈 폼 생성
  const emptyForm = () => ({
    name: '',
    category: '',
    brand: 'store',
    thumbnail: '',
    price: '',
    salePrice: '',
    options: '',
    description: '',
    channels: CHANNELS.reduce((acc, ch) => { acc[ch.key] = ''; return acc; }, {}),
    isActive: true,
  });

  // 신규 등록
  const startNew = () => {
    setForm(emptyForm());
    setEditingId('new');
  };

  // 수정
  const startEdit = (product) => {
    setForm({
      name: product.name || '',
      category: product.category || '',
      brand: product.brand || 'store',
      thumbnail: product.thumbnail || '',
      price: product.price || '',
      salePrice: product.salePrice || '',
      options: product.options || '',
      description: product.description || '',
      channels: CHANNELS.reduce((acc, ch) => {
        acc[ch.key] = product.channels?.[ch.key] || '';
        return acc;
      }, {}),
      isActive: product.isActive !== false,
    });
    setEditingId(product.id);
  };

  // 저장
  const handleSave = async () => {
    if (!form.name.trim()) { showToast('상품명을 입력하세요', 'error'); return; }
    setSaving(true);
    try {
      const now = new Date().toISOString();
      const data = {
        ...form,
        price: form.price ? Number(form.price) : 0,
        salePrice: form.salePrice ? Number(form.salePrice) : 0,
        updatedAt: now,
      };
      if (editingId === 'new') {
        data.createdAt = now;
        const ref = await db.collection(COLLECTIONS.PRODUCTS).add(data);
        console.log(`[products] 신규 저장: ${ref.id}`);
        setProducts(prev => [{ id: ref.id, ...data }, ...prev]);
        showToast('상품이 등록되었습니다');
      } else {
        await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).update(data);
        console.log(`[products] 수정 완료: ${editingId}`);
        setProducts(prev => prev.map(p => p.id === editingId ? { ...p, ...data } : p));
        showToast('상품이 수정되었습니다');
      }
      setEditingId(null);
      setForm(null);
    } catch (e) {
      console.error('[products] 저장 실패:', e);
      showToast('저장 실패: ' + e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  // 삭제
  const handleDelete = async (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    try {
      await db.collection(COLLECTIONS.PRODUCTS).doc(id).delete();
      setProducts(prev => prev.filter(p => p.id !== id));
      showToast('삭제 완료');
      if (editingId === id) { setEditingId(null); setForm(null); }
    } catch (e) {
      console.error('[products] 삭제 실패:', e);
      showToast('삭제 실패', 'error');
    }
  };

  // 필터
  const filtered = useMemo(() => {
    if (!search.trim()) return products;
    const q = search.toLowerCase();
    return products.filter(p =>
      (p.name || '').toLowerCase().includes(q) ||
      (p.category || '').toLowerCase().includes(q)
    );
  }, [products, search]);

  // 채널 연결 수 계산
  const countChannels = (p) => CHANNELS.filter(ch => p.channels?.[ch.key]).length;

  // ─── 편집 폼 화면 ───
  if (form && editingId) {
    const inputStyle = {
      width: '100%', padding: '10px 12px', fontSize: 13, border: '1px solid var(--border)',
      borderRadius: 8, outline: 'none', fontFamily: 'inherit',
    };
    const labelStyle = { fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 4, display: 'block' };

    return (
      <div style={{ animation: 'fadeIn .3s ease', maxWidth: 900 }}>
        {/* 상단 */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <button onClick={() => { setEditingId(null); setForm(null); }}
            style={{ background: 'none', border: 'none', fontSize: 14, color: 'var(--accent)', cursor: 'pointer', fontWeight: 600 }}>
            ← 목록으로
          </button>
          <div style={{ display: 'flex', gap: 8 }}>
            {editingId !== 'new' && (
              <button onClick={() => handleDelete(editingId)}
                style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: '#FEE2E2', color: 'var(--red)', border: 'none', borderRadius: 8, cursor: 'pointer' }}>
                삭제
              </button>
            )}
            <button onClick={handleSave} disabled={saving}
              style={{ padding: '8px 20px', fontSize: 13, fontWeight: 700, background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', opacity: saving ? 0.6 : 1 }}>
              {saving ? '저장 중...' : '저장'}
            </button>
          </div>
        </div>

        {/* 기본 정보 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)', marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 16 }}>기본 정보</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>상품명 *</label>
              <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="예: POUR 우레탄 방수 키트" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>카테고리</label>
              <input value={form.category} onChange={e => setForm({ ...form, category: e.target.value })} placeholder="예: 셀프방수킷" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>브랜드</label>
              <select value={form.brand} onChange={e => setForm({ ...form, brand: e.target.value })}
                style={{ ...inputStyle, cursor: 'pointer' }}>
                <option value="store">POUR스토어</option>
                <option value="grohome">그로홈</option>
              </select>
            </div>
            <div>
              <label style={labelStyle}>소비자가 (원)</label>
              <input type="number" value={form.price} onChange={e => setForm({ ...form, price: e.target.value })} placeholder="0" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>판매가 (원)</label>
              <input type="number" value={form.salePrice} onChange={e => setForm({ ...form, salePrice: e.target.value })} placeholder="0" style={inputStyle} />
            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>옵션 (쉼표 구분)</label>
              <input value={form.options} onChange={e => setForm({ ...form, options: e.target.value })} placeholder="예: 소형(5kg), 중형(10kg), 대형(20kg)" style={inputStyle} />
            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>썸네일 이미지 URL</label>
              <input value={form.thumbnail} onChange={e => setForm({ ...form, thumbnail: e.target.value })} placeholder="https://..." style={inputStyle} />
            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>상품 설명</label>
              <textarea value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} rows={3}
                placeholder="간단한 상품 설명"
                style={{ ...inputStyle, resize: 'vertical' }} />
            </div>
            <div>
              <label style={{ ...labelStyle, display: 'flex', alignItems: 'center', gap: 8 }}>
                <input type="checkbox" checked={form.isActive} onChange={e => setForm({ ...form, isActive: e.target.checked })} />
                판매 활성
              </label>
            </div>
          </div>
        </div>

        {/* 채널별 상품번호 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>판매채널 상품번호</div>
          <div style={{ fontSize: 12, color: 'var(--text-sm)', marginBottom: 16 }}>
            각 채널의 상품번호를 입력하면 해당 채널 상품 페이지로 바로 이동할 수 있습니다
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {CHANNELS.map(ch => {
              const val = form.channels[ch.key] || '';
              const link = val && ch.urlTpl ? ch.urlTpl(val) : null;
              return (
                <div key={ch.key} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px',
                  background: val ? 'var(--accent-l)' : 'var(--border-s)', borderRadius: 10,
                  border: `1px solid ${val ? 'var(--blue-m)' : 'var(--border)'}`,
                  transition: 'all .15s ease'
                }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: '50%',
                    background: val ? ch.color : '#D1D5DB', flexShrink: 0
                  }} />
                  <div style={{ width: 110, fontSize: 13, fontWeight: 600, color: 'var(--text)', flexShrink: 0 }}>
                    {ch.label}
                  </div>
                  <input
                    value={val}
                    onChange={e => setForm({ ...form, channels: { ...form.channels, [ch.key]: e.target.value } })}
                    placeholder="상품번호 입력"
                    style={{
                      flex: 1, padding: '8px 10px', fontSize: 13, border: '1px solid var(--border)',
                      borderRadius: 6, outline: 'none', fontFamily: 'monospace', background: '#fff'
                    }}
                  />
                  {link && (
                    <a href={link} target="_blank" rel="noopener"
                      style={{ fontSize: 11, color: 'var(--accent)', textDecoration: 'none', fontWeight: 600, whiteSpace: 'nowrap' }}>
                      링크 →
                    </a>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ─── 상품 목록 ───
  return (
    <div style={{ animation: 'fadeIn .3s ease' }}>
      {/* 상단 액션바 */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="상품명 / 카테고리 검색..."
            style={{
              padding: '9px 14px', fontSize: 13, border: '1px solid var(--border)',
              borderRadius: 8, outline: 'none', width: 260
            }}
          />
          <span style={{ fontSize: 12, color: 'var(--text-sm)' }}>총 {filtered.length}건</span>
        </div>
        <button onClick={startNew} style={{
          padding: '9px 18px', fontSize: 13, fontWeight: 700,
          background: 'var(--accent)', color: '#fff', border: 'none',
          borderRadius: 8, cursor: 'pointer'
        }}>
          + 상품 등록
        </button>
      </div>

      {/* 로딩 */}
      {loading && (
        <div style={{ textAlign: 'center', padding: 60, color: 'var(--text-sm)' }}>
          <div style={{ width: 24, height: 24, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 12px' }} />
          로딩 중...
        </div>
      )}

      {/* 빈 상태 */}
      {!loading && filtered.length === 0 && (
        <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-sm)' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📦</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)', marginBottom: 4 }}>
            {search ? '검색 결과가 없습니다' : '등록된 상품이 없습니다'}
          </div>
          <div style={{ fontSize: 13 }}>상품을 등록하고 채널별 상품번호를 연결하세요</div>
        </div>
      )}

      {/* 상품 카드 리스트 */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filtered.map(p => {
          const chCount = countChannels(p);
          const isExpanded = expandedChannel === p.id;
          return (
            <div key={p.id} style={{
              background: '#fff', borderRadius: 12, boxShadow: 'var(--shadow)',
              overflow: 'hidden', border: '1px solid var(--border-s)'
            }}>
              {/* 메인 행 */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 14, padding: '14px 18px', cursor: 'pointer'
              }} onClick={() => setExpandedChannel(isExpanded ? null : p.id)}>
                {/* 썸네일 */}
                <div style={{
                  width: 48, height: 48, borderRadius: 8, background: '#F3F4F6',
                  flexShrink: 0, overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                  {p.thumbnail
                    ? <img src={p.thumbnail} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                    : <span style={{ fontSize: 22 }}>📦</span>
                  }
                </div>
                {/* 상품 정보 */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {p.name}
                    </span>
                    {!p.isActive && (
                      <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 6px', background: '#FEE2E2', color: 'var(--red)', borderRadius: 4 }}>
                        비활성
                      </span>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--text-sm)', marginTop: 2 }}>
                    {p.category || '-'} · {p.salePrice ? Number(p.salePrice).toLocaleString() + '원' : '-'}
                  </div>
                </div>
                {/* 채널 연결 뱃지 */}
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0
                }}>
                  <div style={{
                    padding: '4px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700,
                    background: chCount > 0 ? 'var(--green-l)' : '#F3F4F6',
                    color: chCount > 0 ? 'var(--green)' : 'var(--text-sm)'
                  }}>
                    {chCount}/{CHANNELS.length} 채널
                  </div>
                  <span style={{ fontSize: 12, color: 'var(--text-sm)', transition: 'transform .2s', transform: isExpanded ? 'rotate(180deg)' : 'rotate(0)' }}>▼</span>
                </div>
                {/* 수정 버튼 */}
                <button onClick={e => { e.stopPropagation(); startEdit(p); }}
                  style={{
                    padding: '6px 14px', fontSize: 12, fontWeight: 600,
                    background: 'var(--accent-l)', color: 'var(--accent)', border: 'none',
                    borderRadius: 6, cursor: 'pointer', flexShrink: 0
                  }}>
                  수정
                </button>
              </div>

              {/* 채널 상세 (펼침) */}
              {isExpanded && (
                <div style={{
                  padding: '0 18px 14px', borderTop: '1px solid var(--border-s)',
                  animation: 'fadeIn .2s ease'
                }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-sm)', padding: '10px 0 6px' }}>
                    연결된 판매채널
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 6 }}>
                    {CHANNELS.map(ch => {
                      const val = p.channels?.[ch.key];
                      const link = val && ch.urlTpl ? ch.urlTpl(val) : null;
                      return (
                        <div key={ch.key} style={{
                          display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px',
                          borderRadius: 6, fontSize: 12,
                          background: val ? '#F0FDF4' : '#F9FAFB',
                          color: val ? 'var(--text)' : 'var(--text-sm)'
                        }}>
                          <div style={{ width: 6, height: 6, borderRadius: '50%', background: val ? ch.color : '#D1D5DB' }} />
                          <span style={{ fontWeight: 600, width: 80, flexShrink: 0 }}>{ch.label}</span>
                          {val ? (
                            <>
                              <span style={{ fontFamily: 'monospace', fontSize: 11 }}>{val}</span>
                              {link && (
                                <a href={link} target="_blank" rel="noopener"
                                  style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--accent)', textDecoration: 'none', fontWeight: 600 }}>
                                  열기→
                                </a>
                              )}
                            </>
                          ) : (
                            <span style={{ fontSize: 11 }}>미연결</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── 페이지 Placeholder ───
function PagePlaceholder({ title, icon, description }) {
  return (
    <div style={{
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      height:'100%', color:'var(--text-sm)', animation:'fadeIn .3s ease'
    }}>
      <div style={{fontSize:48, marginBottom:16}}>{icon}</div>
      <div style={{fontSize:18, fontWeight:700, color:'var(--text)', marginBottom:8}}>{title}</div>
      <div style={{fontSize:13}}>{description || '준비 중입니다'}</div>
    </div>
  );
}

// ─── 메인 App ───
function App() {
  const [authed, setAuthed] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(
    () => localStorage.getItem(SIDEBAR_COLLAPSED_KEY) === 'true'
  );
  const [toast, setToast] = useState(null);

  const toggleSidebar = () => {
    setSidebarCollapsed(prev => {
      localStorage.setItem(SIDEBAR_COLLAPSED_KEY, String(!prev));
      return !prev;
    });
  };

  const showToast = useCallback((msg, type = 'success') => {
    setToast({ msg, type });
  }, []);

  if (!authed) return <PinScreen onAuth={() => setAuthed(true)} />;

  const renderPage = () => {
    switch (page) {
      case 'dashboard':
        return <PagePlaceholder title="대시보드" icon="📊" description="전체 현황을 한눈에 확인합니다" />;
      case 'products':
        return <ProductsPage showToast={showToast} />;
      case 'leads-solution':
        return <PagePlaceholder title="POUR솔루션 영업" icon="🏢" description="박람회 리드 + 아웃바운드 영업" />;
      case 'leads-method':
        return <PagePlaceholder title="POUR공법 영업" icon="🔧" description="시공사 리드 + 입찰 관리" />;
      case 'leads-store':
        return <PagePlaceholder title="POUR스토어 영업" icon="🛒" description="스토어 리드 관리" />;
      case 'leads-grohome':
        return <PagePlaceholder title="그로홈 영업" icon="🏠" description="그로홈 리드 관리" />;
      case 'inquiries':
        return <PagePlaceholder title="문의접수" icon="📬" description="사이트 문의 접수 관리" />;
      case 'metrics':
        return <PagePlaceholder title="공신력 수치" icon="📊" description="3개 사이트 실시간 반영 수치 관리" />;
      case 'resources':
        return <PagePlaceholder title="영업자료" icon="📎" description="시방서, 카탈로그, 인증서 관리" />;
      case 'partners':
        return <PagePlaceholder title="파트너사" icon="🏢" description="파트너사 계약 및 등급 관리" />;
      case 'staff':
        return <PagePlaceholder title="담당자" icon="👥" description="담당자 목록 관리" />;
      case 'sms':
        return <PagePlaceholder title="SMS 설정" icon="💬" description="SMS 발송 및 템플릿 관리" />;
      case 'settings':
        return <PagePlaceholder title="설정" icon="⚙️" description="시스템 설정" />;
      default:
        return <PagePlaceholder title="페이지 없음" icon="🔍" />;
    }
  };

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
      <Sidebar
        current={page}
        onNavigate={setPage}
        collapsed={sidebarCollapsed}
        onToggle={toggleSidebar}
      />
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* 헤더 */}
        <div style={{
          height:56, padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between',
          background:'#fff', borderBottom:'1px solid var(--border)', flexShrink:0
        }}>
          <div style={{fontSize:15, fontWeight:700, color:'var(--text)'}}>
            {MENU.find(m => m.key === page)?.icon} {MENU.find(m => m.key === page)?.label || '영업관리센터'}
          </div>
          <button onClick={() => { localStorage.removeItem(ADMIN_PIN_KEY); setAuthed(false); }}
            style={{
              background:'none', border:'1px solid var(--border)', borderRadius:8,
              padding:'6px 14px', fontSize:12, color:'var(--text-md)', cursor:'pointer'
            }}>
            로그아웃
          </button>
        </div>
        {/* 콘텐츠 */}
        <div style={{flex:1, overflow:'auto', padding:24, background:'var(--bg)'}}>
          {renderPage()}
        </div>
      </div>
      {toast && <Toast message={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
