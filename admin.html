// ─── PIN 인증 ───
const hashPin = async (pin) => {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
};

function PinScreen({ onAuth }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [mode, setMode] = useState('checking'); // checking | setup | verify
  const [fails, setFails] = useState(0);
  const [locked, setLocked] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    const saved = localStorage.getItem(ADMIN_PIN_KEY);
    setMode(saved ? 'verify' : 'setup');
    setTimeout(() => inputRef.current?.focus(), 300);
  }, []);

  useEffect(() => {
    if (fails >= 3) {
      setLocked(true);
      setError('3회 실패. 30초 후 재시도');
      const t = setTimeout(() => { setLocked(false); setFails(0); setError(''); }, 30000);
      return () => clearTimeout(t);
    }
  }, [fails]);

  const handleSubmit = async () => {
    if (locked || pin.length < 4) return;
    const hashed = await hashPin(pin);
    if (mode === 'setup') {
      localStorage.setItem(ADMIN_PIN_KEY, hashed);
      onAuth();
    } else {
      const saved = localStorage.getItem(ADMIN_PIN_KEY);
      if (hashed === saved) {
        onAuth();
      } else {
        setFails(f => f + 1);
        setError('PIN이 일치하지 않습니다');
        setPin('');
      }
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') handleSubmit();
  };

  if (mode === 'checking') return null;

  return (
    <div style={{
      height:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      background:'linear-gradient(135deg, #0D1B2A 0%, #1A2E42 100%)'
    }}>

          영업관리센터
        </div>
        <div style={{fontSize:13, fontWeight:600, color:'var(--text-md)', marginBottom:12}}>
          {mode === 'setup' ? 'PIN 설정 (4자리 이상)' : 'PIN 입력'}
        </div>
        <input
          ref={inputRef}
          type="password"
          value={pin}
          onChange={e => { setPin(e.target.value); setError(''); }}
          onKeyDown={handleKeyDown}
          maxLength={8}
          disabled={locked}
          placeholder="●●●●"
          style={{
            width:'100%', padding:'14px 16px', fontSize:24, textAlign:'center',
            border:`2px solid ${error ? 'var(--red)' : 'var(--border)'}`,
            borderRadius:12, outline:'none', letterSpacing:8, fontFamily:'monospace',
            transition:'border-color .2s',
            animation: error ? 'shake .4s ease' : 'none'
          }}
        />
        {error && (
          <div style={{color:'var(--red)', fontSize:12, fontWeight:600, marginTop:8}}>{error}</div>
        )}
        <button
          onClick={handleSubmit}
          disabled={locked || pin.length < 4}
          style={{
            width:'100%', marginTop:20, padding:'14px 0', fontSize:15, fontWeight:700,
            background: (locked || pin.length < 4) ? '#D1D5DB' : 'var(--accent)',
            color:'#fff', border:'none', borderRadius:12, cursor:'pointer',
            transition:'background .2s'

// ─── 이미지 압축 유틸 ───
const compressImage = (file, maxW = 860, quality = 0.7) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = e.target.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

// Storage 업로드 → 공개 URL 반환
const uploadToStorage = async (path, file) => {
  const ref = storage.ref().child(path);
  const compressed = await compressImage(file);
  const blob = await fetch(compressed).then(r => r.blob());
  await ref.put(blob, { contentType: 'image/jpeg' });
  const url = await ref.getDownloadURL();
  console.log(`[storage] 업로드 완료: ${path}`);
  return url;
};

// ─── 엑셀 파싱 유틸 ───
const parseExcel = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      console.log(`[excel] ${rows.length}행 파싱`);
      resolve(rows);
    } catch (err) { reject(err); }
  };
  reader.onerror = reject;
  reader.readAsArrayBuffer(file);
});

const imwebRowToProduct = (row) => {
  const name = String(row['상품명'] || '');
  // 브랜드 추출: [그로홈], [POUR] 등
  const brandMatch = name.match(/^\[([^\]]+)\]/);
  let brand = 'store';
  if (brandMatch) {
    const b = brandMatch[1].toLowerCase();
    if (b.includes('그로홈')) brand = 'grohome';
  }
  // 옵션 조합
  const optNames = String(row['필수옵션명'] || '');
  const optVals = String(row['필수옵션값'] || '');
  const optStr = optVals || optNames;

  return {
    name,
    category: String(row['카테고리ID'] || ''),
    brand,
    price: Number(row['정가'] || row['판매가'] || 0),
    salePrice: Number(row['판매가'] || 0),
    options: optStr,
    description: '',
    thumbnail: String(row['대표이미지URL'] || ''),
    detailHtml: String(row['상품상세정보'] || ''),

        <div style={{ display:'flex', gap:8, marginBottom:16 }}>
          <input value={newCat} onChange={e => setNewCat(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addCategory()}
            placeholder="새 카테고리명 입력"
            style={{ flex:1, padding:'12px 14px', fontSize:14, border:'1px solid var(--border)', borderRadius:8, outline:'none' }} />
          <button onClick={addCategory} style={{
            padding:'12px 20px', fontSize:14, fontWeight:700, background:'var(--accent)',
            color:'#fff', border:'none', borderRadius:8, cursor:'pointer', flexShrink:0
          }}>추가</button>
        </div>

        {/* 카테고리 목록 */}
        <div style={{ flex:1, overflowY:'auto', marginBottom:16 }}>
          {list.length === 0 ? (
            <div style={{ textAlign:'center', padding:30, color:'var(--text-sm)', fontSize:14 }}>등록된 카테고리가 없습니다</div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {list.map((cat, idx) => (
                <div key={idx} style={{
                  display:'flex', alignItems:'center', justifyContent:'space-between',
                  padding:'10px 14px', background:'var(--bg)', borderRadius:8, fontSize:14
                }}>
                  <span style={{ fontWeight:600 }}>{cat}</span>
                  <button onClick={() => removeCategory(idx)} style={{
                    padding:'4px 12px', fontSize:12, fontWeight:600, background:'#FEE2E2',
                    color:'var(--red)', border:'none', borderRadius:4, cursor:'pointer'
                  }}>삭제</button>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{ display:'flex', gap:10 }}>
          <button onClick={onClose} style={{
            flex:1, padding:'14px 0', fontSize:15, fontWeight:600, background:'var(--border-s)',
            color:'var(--text-md)', border:'none', borderRadius:10, cursor:'pointer'
          }}>취소</button>
          <button onClick={() => onSave(list)} style={{
            flex:1, padding:'14px 0', fontSize:15, fontWeight:700, background:'var(--accent)',
            color:'#fff', border:'none', borderRadius:10, cursor:'pointer'
          }}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ─── 상품관리 페이지 ───
function ProductsPage({ showToast }) {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [editingId, setEditingId] = useState(null); // null=목록, 'new'=신규, docId=수정
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const [expandedChannel, setExpandedChannel] = useState(null);
  const [statusFilter, setStatusFilter] = useState('전체');
  const [tagFilter, setTagFilter] = useState(null);
  const [categoryFilter, setCategoryFilter] = useState(null);
  const [categories, setCategories] = useState([]);
  const [showCategoryManager, setShowCategoryManager] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [confirmModal, setConfirmModal] = useState(null);
  const [visibleCount, setVisibleCount] = useState(30);

  // Firestore 로드
  useEffect(() => {
    (async () => {
      try {
        const [snap, catDoc] = await Promise.all([
          db.collection(COLLECTIONS.PRODUCTS).get(),
          db.collection('config').doc(CATEGORIES_DOC).get(),
        ]);
        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        console.log(`[products] ${docs.length}건 로드`);
        docs.sort((a, b) => (b.updatedAt || b.createdAt || '').localeCompare(a.updatedAt || a.createdAt || ''));
        setProducts(docs);
        if (catDoc.exists) {
          setCategories(catDoc.data().list || []);
          console.log(`[categories] ${(catDoc.data().list || []).length}개 로드`);
        }
      } catch (e) {
        console.error('[products] 로드 실패:', e);
        showToast('상품 로드 실패', 'error');
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  // 카테고리 저장
  const saveCategories = async (list) => {
    try {
      await db.collection('config').doc(CATEGORIES_DOC).set({ list, updatedAt: new Date().toISOString() });
      setCategories(list);
      setShowCategoryManager(false);
      showToast(`카테고리 ${list.length}개 저장 완료`);
    } catch (e) {
      console.error('[categories] 저장 실패:', e);
      showToast('카테고리 저장 실패', 'error');
    }
  };

  // 빈 폼 생성
  const emptyForm = () => ({
    name: '',
    category: '',
    brand: 'store',
    thumbnail: '',
    price: '',
    salePrice: '',
    options: '',
    description: '',
    channels: CHANNELS.reduce((acc, ch) => { acc[ch.key] = ''; return acc; }, {}),
    detailImages: [],
    detailHtml: '',
    tags: [],
    isActive: true,
  });

  const [uploading, setUploading] = useState(false);
  const [detailTab, setDetailTab] = useState('visual'); // visual | images | html | preview
  const [slotCount, setSlotCount] = useState(10);
  const editorRef = useRef(null);
  const visualImgRef = useRef(null);
  const excelRef = useRef(null);
  const detailImgRef = useRef(null);

  // 엑셀 일괄 등록 (Firestore batch 사용 — 500건씩)
  const handleExcelUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';
    try {
      setUploading(true);
      const rows = await parseExcel(file);
      if (rows.length === 0) { showToast('엑셀에 데이터가 없습니다', 'error'); return; }
      const now = new Date().toISOString();
      const newProducts = [];
      let batch = db.batch();
      let batchCount = 0;
      let total = 0;

      for (const row of rows) {
        const data = excelRowToProduct(row);
        if (!data.name) continue;
        data.createdAt = now;
        data.updatedAt = now;
        const ref = db.collection(COLLECTIONS.PRODUCTS).doc();
        batch.set(ref, data);
        newProducts.push({ id: ref.id, ...data });
        batchCount++;
        total++;

        if (batchCount >= 450) {
          await batch.commit();
          console.log(`[excel] batch commit: ${total}건`);
          batch = db.batch();
          batchCount = 0;
        }
      }
      if (batchCount > 0) await batch.commit();

      setProducts(prev => [...newProducts, ...prev]);
      console.log(`[excel] ${total}건 등록 완료`);
      showToast(`${total}건 일괄 등록 완료`);
    } catch (err) {
      console.error('[excel] 업로드 실패:', err);
      showToast('엑셀 처리 실패: ' + err.message, 'error');
    } finally {
      setUploading(false);
    }
  };

  // 엑셀 템플릿 다운로드
  const downloadTemplate = () => {
    const header = ['상품명', '카테고리', '브랜드', '소비자가', '판매가', '옵션', '설명', '썸네일',
      ...CHANNELS.map(ch => ch.label)];
    const sample = ['POUR 우레탄 방수 키트', '셀프방수킷', 'store', '35000', '29800',
      '소형(5kg), 대형(10kg)', '옥상 셀프 방수용', '',
      '', '', '', '', '', '', '', ''];
    const ws = XLSX.utils.aoa_to_sheet([header, sample]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '상품');
    XLSX.writeFile(wb, '상품등록_템플릿.xlsx');
  };

  // 상세 이미지 업로드 (Firebase Storage)
  const handleDetailImageUpload = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    e.target.value = '';
    setUploading(true);
    try {
      const productId = editingId === 'new' ? 'temp_' + Date.now() : editingId;
      const newImages = [...(form.detailImages || [])];
      for (let i = 0; i < files.length; i++) {
        const idx = newImages.length + 1;
        const path = `product-details/${productId}/detail-${idx}-${Date.now()}.jpg`;
        const url = await uploadToStorage(path, files[i]);
        newImages.push({ url, path, order: idx });
      }
      setForm({ ...form, detailImages: newImages });
      showToast(`${files.length}장 업로드 완료`);
    } catch (err) {
      console.error('[detail-img] 업로드 실패:', err);
      showToast('이미지 업로드 실패: ' + err.message, 'error');
    } finally {
      setUploading(false);
    }
  };

  // 상세 이미지 삭제
  const removeDetailImage = (idx) => {
    setForm({ ...form, detailImages: form.detailImages.filter((_, i) => i !== idx) });
  };

  // 상세 이미지 → HTML 자동 생성
  const generateHtmlFromImages = () => {
    if (!form.detailImages?.length) { showToast('업로드된 이미지가 없습니다', 'error'); return; }
    const html = form.detailImages
      .map(img => `<img src="${img.url}" style="width:100%;display:block;" alt="${form.name || '상품 상세'}">`)
      .join('\n');
    setForm({ ...form, detailHtml: html });
    setDetailTab('html');
    showToast('HTML 코드가 생성되었습니다');
  };

  // HTML 코드 클립보드 복사
  const copyHtml = () => {
    if (!form.detailHtml) { showToast('복사할 코드가 없습니다', 'error'); return; }
    navigator.clipboard.writeText(form.detailHtml).then(() => showToast('코드가 클립보드에 복사되었습니다'));
  };

  // 비주얼 에디터: 서식 명령
  const execCmd = (cmd, val) => { document.execCommand(cmd, false, val); editorRef.current?.focus(); };

  // 비주얼 에디터: 이미지 삽입 (Storage 업로드)
  const insertVisualImage = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    e.target.value = '';
    setUploading(true);
    try {
      const productId = editingId === 'new' ? 'temp_' + Date.now() : editingId;
      for (const file of files) {
        const path = `product-details/${productId}/visual-${Date.now()}.jpg`;
        const url = await uploadToStorage(path, file);
        execCmd('insertHTML', `<img src="${url}" style="width:100%;display:block;margin:8px 0;" alt="상품 이미지">`);
      }
      showToast(`${files.length}장 삽입 완료`);
    } catch (err) {
      console.error('[visual-editor] 이미지 삽입 실패:', err);
      showToast('이미지 삽입 실패', 'error');
    } finally {
      setUploading(false);
    }
  };

  // 비주얼 에디터 → HTML 반영하기
  const applyVisualToHtml = () => {
    if (!editorRef.current) return;
    const html = editorRef.current.innerHTML;
    setForm({ ...form, detailHtml: html });
    showToast('상세페이지가 반영되었습니다');
  };

  // HTML → 비주얼 에디터에 로드
  const loadHtmlToVisual = () => {
    if (editorRef.current && form.detailHtml) {
      editorRef.current.innerHTML = form.detailHtml;
    }
  };

  // 신규 등록
  const startNew = () => {
    setForm(emptyForm());
    setEditingId('new');
  };

  // 수정
  const startEdit = (product) => {
    setForm({
      name: product.name || '',
      category: product.category || '',
      brand: product.brand || 'store',
      thumbnail: product.thumbnail || '',
      price: product.price || '',
      salePrice: product.salePrice || '',
      options: product.options || '',
      description: product.description || '',
      channels: CHANNELS.reduce((acc, ch) => {
        acc[ch.key] = product.channels?.[ch.key] || '';
        return acc;
      }, {}),
      detailImages: product.detailImages || [],
      detailHtml: product.detailHtml || '',
      tags: product.tags || [],
      isActive: product.isActive !== false,
    });
    setEditingId(product.id);
  };

  // 빠른 상태 변경 (목록에서 직접)
  const quickStatusChange = async (productId, newStatus) => {
    try {
      await db.collection(COLLECTIONS.PRODUCTS).doc(productId).update({ salesStatus: newStatus, updatedAt: new Date().toISOString() });
      setProducts(prev => prev.map(p => p.id === productId ? { ...p, salesStatus: newStatus } : p));
      showToast(`${STATUS_ICON[newStatus]} ${newStatus}(으)로 변경됨`);
    } catch (e) {
      console.error('[products] 상태변경 실패:', e);
      showToast('상태 변경 실패', 'error');
    }
  };

  // 벌크 액션
  const bulkAction = async (action, value) => {
    if (selected.size === 0) return;
    const ids = Array.from(selected);
    try {
      const batch = db.batch();
      const now = new Date().toISOString();
      ids.forEach(id => {
        const ref = db.collection(COLLECTIONS.PRODUCTS).doc(id);
        if (action === 'status') batch.update(ref, { salesStatus: value, updatedAt: now });
        if (action === 'delete') batch.delete(ref);
      });
      await batch.commit();
      if (action === 'delete') {
        setProducts(prev => prev.filter(p => !selected.has(p.id)));
      } else {
        setProducts(prev => prev.map(p => selected.has(p.id) ? { ...p, salesStatus: value } : p));
      }
      setSelected(new Set());
      showToast(`${ids.length}건 처리 완료`);
    } catch (e) {
      console.error('[products] 벌크 실패:', e);
      showToast('처리 실패', 'error');
    }
  };

  // 채널 링크 (imwebUrl 지원)
  const getChannelLink = (product, chKey) => {
    const val = product.channels?.[chKey];
    if (!val) return null;
    const ch = CHANNELS.find(c => c.key === chKey);
    if (ch?.urlTpl) return ch.urlTpl(val);
    if (chKey === 'imweb' && product.imwebUrl) return product.imwebUrl;
    return null;
  };

  // 프록시 등록 상태 토글
  const toggleProxyRegistered = async (productId, chKey) => {
    const product = products.find(p => p.id === productId);
    const registered = product?.proxyRegistered || {};
    const newVal = !registered[chKey];
    const updated = { ...registered, [chKey]: newVal };
    try {
      await db.collection(COLLECTIONS.PRODUCTS).doc(productId).update({ proxyRegistered: updated, updatedAt: new Date().toISOString() });
      setProducts(prev => prev.map(p => p.id === productId ? { ...p, proxyRegistered: updated } : p));
      showToast(newVal ? '프록시 등록 완료 표시' : '미등록으로 변경');
    } catch (e) {
      console.error('[proxy] 상태변경 실패:', e);
      showToast('상태 변경 실패', 'error');
    }
  };

  // 수정 후 경과 시간 표시
  const getTimeSince = (isoStr) => {
    if (!isoStr) return '';
    const diff = Date.now() - new Date(isoStr).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return `${min}분 전`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}시간 전`;
    const day = Math.floor(hr / 24);
    return `${day}일 전`;
  };

  // 프록시 반영 상태 계산
  const getProxyStatus = (product, chKey) => {
    if (!product.channels?.[chKey]) return 'none'; // 채널 미연결
    if (!product.proxyRegistered?.[chKey]) return 'unregistered'; // 프록시 미등록
    if (!product.updatedAt) return 'synced';
    const diff = Date.now() - new Date(product.updatedAt).getTime();
    if (diff < 600000) return 'syncing'; // 10분 이내 → 반영 중
    return 'synced'; // 1시간 이후 → 반영 완료
  };

  // 변경이력 state
  const [historyOpen, setHistoryOpen] = useState(false);
  const [historyList, setHistoryList] = useState([]);
  const [historyLoading, setHistoryLoading] = useState(false);

  // 변경이력 로드 (30일 이내)
  const loadHistory = async (productId) => {
    setHistoryLoading(true);
    try {
      const cutoff = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
      const snap = await db.collection(COLLECTIONS.PRODUCTS).doc(productId).collection('history').get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(h => h.changedAt >= cutoff)
        .sort((a, b) => (b.changedAt || '').localeCompare(a.changedAt || ''));
      console.log(`[history] ${productId}: ${docs.length}건 (30일 이내)`);
      setHistoryList(docs);
    } catch (e) {
      console.error('[history] 로드 실패:', e);
      showToast('변경이력 로드 실패', 'error');
    } finally {
      setHistoryLoading(false);
    }
  };

  // 히스토리에서 복원
  const restoreFromHistory = async (snapshot) => {
    if (!editingId || editingId === 'new') return;
    try {
      const { id, changedAt, changedBy, changedFields, ...restoreData } = snapshot;
      await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).update({
        ...restoreData.snapshot,
        updatedAt: new Date().toISOString(),
      });
      setProducts(prev => prev.map(p => p.id === editingId ? { ...p, ...restoreData.snapshot } : p));
      startEdit({ id: editingId, ...restoreData.snapshot });
      setHistoryOpen(false);
      showToast('이전 버전으로 복원되었습니다');
    } catch (e) {
      console.error('[history] 복원 실패:', e);
      showToast('복원 실패', 'error');
    }
  };

  // 저장 (히스토리 기록 포함)
  const handleSave = async () => {
    if (!form.name.trim()) { showToast('상품명을 입력하세요', 'error'); return; }
    setSaving(true);
    try {
      const now = new Date().toISOString();
      const data = {
        ...form,
        price: form.price ? Number(form.price) : 0,
        salePrice: form.salePrice ? Number(form.salePrice) : 0,
        updatedAt: now,
      };
      if (editingId === 'new') {
        data.createdAt = now;
        const ref = await db.collection(COLLECTIONS.PRODUCTS).add(data);
        console.log(`[products] 신규 저장: ${ref.id}`);
        setProducts(prev => [{ id: ref.id, ...data }, ...prev]);
        showToast('상품이 등록되었습니다');
      } else {
        // 저장 전: 이전 데이터를 히스토리에 기록
        const oldProduct = products.find(p => p.id === editingId);
        if (oldProduct) {
          const changedFields = Object.keys(data).filter(k => JSON.stringify(data[k]) !== JSON.stringify(oldProduct[k]));
          if (changedFields.length > 0) {
            const { id: _skipId, ...rawSnapshot } = oldProduct;
            // Firestore는 undefined 값을 허용하지 않으므로 재귀적으로 제거
            const cleanObj = (obj) => {
              if (obj === null || obj === undefined) return null;
              if (Array.isArray(obj)) return obj.map(cleanObj);
              if (typeof obj === 'object') {
                const cleaned = {};
                for (const [k, v] of Object.entries(obj)) {
                  if (v !== undefined) cleaned[k] = cleanObj(v);
                }
                return cleaned;
              }
              return obj;
            };
            const snapshotData = cleanObj(rawSnapshot);
            await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).collection('history').add({
              snapshot: snapshotData,
              changedFields,
              changedAt: now,
              changedBy: '관리자',
            });
            console.log(`[history] 변경 기록: ${changedFields.join(', ')}`);
          }
        }
        await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).update(data);
        console.log(`[products] 수정 완료: ${editingId}`);
        setProducts(prev => prev.map(p => p.id === editingId ? { ...p, ...data } : p));
        showToast('상품이 수정되었습니다');
      }
      setEditingId(null);
      setForm(null);
    } catch (e) {
      console.error('[products] 저장 실패:', e);
      showToast('저장 실패: ' + e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  // 삭제
  const handleDelete = async (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    try {
      await db.collection(COLLECTIONS.PRODUCTS).doc(id).delete();
      setProducts(prev => prev.filter(p => p.id !== id));
      showToast('삭제 완료');
      if (editingId === id) { setEditingId(null); setForm(null); }
    } catch (e) {
      console.error('[products] 삭제 실패:', e);
      showToast('삭제 실패', 'error');
    }
  };

  // 필터
  const filtered = useMemo(() => {
    let list = products;
    if (statusFilter !== '전체') {
      list = list.filter(p => (p.salesStatus || '판매중') === statusFilter);
    }
    if (tagFilter) {
      list = list.filter(p => p.tags?.includes(tagFilter));
    }
    if (categoryFilter) {
      list = list.filter(p => (p.category || '') === categoryFilter);
    }
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q) ||
        (p.imwebId || '').includes(q)
      );
    }
    return list;
  }, [products, search, statusFilter, tagFilter, categoryFilter]);

  // 채널 연결 수 계산
  const countChannels = (p) => CHANNELS.filter(ch => p.channels?.[ch.key]).length;

  // ─── 편집 폼 화면 ───
  if (form && editingId) {
    const inputStyle = {
      width: '100%', padding: '10px 12px', fontSize: 13, border: '1px solid var(--border)',
      borderRadius: 8, outline: 'none', fontFamily: 'inherit',
    };
    const labelStyle = { fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 4, display: 'block' };

    return (
      <div style={{ animation: 'fadeIn .3s ease', maxWidth: 900 }}>
        {/* 상단 */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <button onClick={() => { setEditingId(null); setForm(null); }}
            style={{ background: 'none', border: 'none', fontSize: 14, color: 'var(--accent)', cursor: 'pointer', fontWeight: 600 }}>
            ← 목록으로
          </button>
          <div style={{ display: 'flex', gap: 8 }}>
            {editingId !== 'new' && (
              <button onClick={() => { setHistoryOpen(true); loadHistory(editingId); }}
                style={{ padding: '10px 18px', fontSize: 14, fontWeight: 600, background: '#fff', color: 'var(--text-md)', border: '1px solid var(--border)', borderRadius: 8, cursor: 'pointer' }}>
                📋 변경이력
              </button>
            )}
            {editingId !== 'new' && (
              <button onClick={() => setConfirmModal({ message: '이 상품을 삭제하시겠습니까?', onConfirm: () => { handleDelete(editingId); setConfirmModal(null); } })}

                삭제

            <button onClick={handleSave} disabled={saving}

              {saving ? '저장 중...' : '💾 저장하기'}
            </button>
          </div>
        </div>

        {/* 기본 정보 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)', marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 16 }}>기본 정보</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>상품명 *</label>
              <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="예: POUR 우레탄 방수 키트" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>카테고리</label>
              <div style={{ display: 'flex', gap: 6 }}>
                <select value={categories.includes(form.category) ? form.category : '__custom__'}
                  onChange={e => { if (e.target.value !== '__custom__') setForm({ ...form, category: e.target.value }); }}
                  style={{ ...inputStyle, flex: 1, cursor: 'pointer' }}>
                  <option value="">선택하세요</option>
                  {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  {form.category && !categories.includes(form.category) && (
                    <option value="__custom__">{form.category} (직접입력)</option>
                  )}
                  <option value="__custom__">직접 입력...</option>
                </select>
                <button onClick={() => setShowCategoryManager(true)} type="button"
                  style={{ padding: '8px 12px', fontSize: 12, fontWeight: 600, background: 'var(--border-s)', color: 'var(--text-md)', border: '1px solid var(--border)', borderRadius: 8, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                  관리
                </button>
              </div>
              {(form.category && !categories.includes(form.category)) || (!categories.includes(form.category) && form.category) ? (
                <input value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}
                  placeholder="카테고리명 직접 입력" style={{ ...inputStyle, marginTop: 6 }} />
              ) : null}
            </div>
            <div>
              <label style={labelStyle}>브랜드</label>
              <select value={form.brand} onChange={e => setForm({ ...form, brand: e.target.value })}

            <div>
              <label style={labelStyle}>소비자가 (원)</label>
              <input type="number" value={form.price} onChange={e => setForm({ ...form, price: e.target.value })} placeholder="0" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>판매가 (원)</label>
              <input type="number" value={form.salePrice} onChange={e => setForm({ ...form, salePrice: e.target.value })} placeholder="0" style={inputStyle} />
            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>옵션 (쉼표 구분)</label>
              <input value={form.options} onChange={e => setForm({ ...form, options: e.target.value })} placeholder="예: 소형(5kg), 중형(10kg), 대형(20kg)" style={inputStyle} />
            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>썸네일 이미지 URL</label>
              <input value={form.thumbnail} onChange={e => setForm({ ...form, thumbnail: e.target.value })} placeholder="https://..." style={inputStyle} />
            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>상품 설명</label>
              <textarea value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} rows={3}
                placeholder="간단한 상품 설명"
                style={{ ...inputStyle, resize: 'vertical' }} />
            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>태그</label>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {PRODUCT_TAGS.map(t => {
                  const active = form.tags?.includes(t.key);
                  return (
                    <button key={t.key} onClick={() => {
                      const tags = form.tags || [];
                      setForm({ ...form, tags: active ? tags.filter(k => k !== t.key) : [...tags, t.key] });
                    }} style={{
                      padding: '8px 16px', fontSize: 14, fontWeight: active ? 700 : 500,
                      background: active ? t.bg : '#F9FAFB', color: active ? t.color : 'var(--text-sm)',
                      border: `2px solid ${active ? t.color : 'var(--border)'}`, borderRadius: 20,
                      cursor: 'pointer', transition: 'all .15s ease'
                    }}>
                      {t.label}
                    </button>
                  );
                })}
              </div>
            </div>
            <div>
              <label style={{ ...labelStyle, display: 'flex', alignItems: 'center', gap: 8 }}>
                <input type="checkbox" checked={form.isActive} onChange={e => setForm({ ...form, isActive: e.target.checked })} style={{ width: 18, height: 18 }} />
                <span style={{ fontSize: 14 }}>판매 활성</span>
              </label>
            </div>
          </div>
        </div>

        {/* 상세페이지 관리 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)', marginBottom: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>상세페이지 관리</div>
              <button onClick={() => setConfirmModal({
                isInfo: true,
                message: '상세페이지 마켓 연동 안내',
                onConfirm: () => setConfirmModal(null),
              })} style={{
                padding: '4px 10px', fontSize: 12, fontWeight: 600,
                background: 'var(--accent-l)', color: 'var(--accent)', border: 'none',
                borderRadius: 6, cursor: 'pointer'
              }}>
                참고사항
              </button>
            </div>
            <div style={{ display: 'flex', gap: 4 }}>
              {['visual', 'images', 'html', 'preview'].map(t => (
                <button key={t} onClick={() => { setDetailTab(t); if (t === 'visual') setTimeout(loadHtmlToVisual, 100); }} style={{
                  padding: '6px 14px', fontSize: 13, fontWeight: 600, borderRadius: 8, border: 'none', cursor: 'pointer',
                  background: detailTab === t ? 'var(--accent)' : 'var(--border-s)',
                  color: detailTab === t ? '#fff' : 'var(--text-md)'
                }}>
                  {{ visual: '비주얼편집', images: '이미지', html: 'HTML코드', preview: '미리보기' }[t]}
                </button>
              ))}
            </div>
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-sm)', marginBottom: 16 }}>
            이미지 업로드 → HTML 생성 → 각 마켓에 코드 복붙. 이미지 교체 시 전 채널 자동 반영.
          </div>

          {/* 마켓용 고정 URL 안내 */}
          {editingId && editingId !== 'new' && (form.detailImages?.length > 0 || form.detailHtml) && (() => {
            const baseUrl = `${window.location.origin}/api/product-img?id=${editingId}`;
            const htmlImgCount = (form.detailHtml || '').match(/<img[^>]+src=/gi)?.length || 0;
            const allSlotCode = Array.from({ length: slotCount }, (_, idx) =>
              `<img src="${baseUrl}&n=${idx}" style="width:100%;display:block;">`
            ).join('\n');
            return (
              <div style={{
                padding: '14px 18px', marginBottom: 14, background: '#ECFDF5', borderRadius: 10,
                border: '1px solid #A7F3D0', fontSize: 13
              }}>
                <div style={{ fontWeight: 700, color: 'var(--green)', marginBottom: 8, fontSize: 14 }}>마켓용 고정 URL (수정 시 ~10분 내 자동반영)</div>

                {/* 슬롯 수 선택 */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 6 }}>
                    슬롯 수 선택
                    <span style={{ fontSize: 11, fontWeight: 400, color: 'var(--text-sm)', marginLeft: 6 }}>
                      (현재 이미지 {htmlImgCount}장 · 여유분 포함 등록 권장)
                    </span>
                  </div>
                  <div style={{ display: 'flex', gap: 6 }}>
                    {[5, 10, 15, 20].map(n => (
                      <button key={n} onClick={() => setSlotCount(n)} style={{
                        padding: '6px 14px', fontSize: 13, fontWeight: 700, borderRadius: 6, cursor: 'pointer', border: 'none',
                        background: slotCount === n ? 'var(--green)' : 'var(--border-s)',
                        color: slotCount === n ? '#fff' : 'var(--text-md)',
                      }}>{n}장</button>
                    ))}
                  </div>
                </div>

                {/* 전체 코드 한 번에 복사 */}
                <button onClick={() => { navigator.clipboard.writeText(allSlotCode); showToast(`${slotCount}슬롯 HTML 코드 복사됨 — 대행업체에 전달하세요`); }}
                  style={{
                    width: '100%', padding: '12px 0', fontSize: 14, fontWeight: 800, marginBottom: 12,
                    background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer'
                  }}>
                  전체 코드 복사 ({slotCount}슬롯) — 대행업체 전달용
                </button>

                {/* 슬롯 목록 */}
                <div style={{ marginBottom: 8 }}>
                  {Array.from({ length: slotCount }, (_, idx) => {
                    const imgUrl = `${baseUrl}&n=${idx}`;
                    const isActive = idx < htmlImgCount;
                    return (
                      <div key={idx} style={{
                        display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3,
                        opacity: isActive ? 1 : 0.45,

                        <span style={{
                          fontSize: 10, fontWeight: 700, minWidth: 44, padding: '2px 6px', borderRadius: 4, textAlign: 'center',
                          background: isActive ? '#D1FAE5' : 'var(--border-s)',
                          color: isActive ? 'var(--green)' : 'var(--text-sm)',
                        }}>{isActive ? `이미지${idx + 1}` : `슬롯${idx + 1}`}</span>
                        <code style={{ fontSize: 10, flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: 'var(--text-md)' }}>{imgUrl}</code>
                        <button onClick={() => { navigator.clipboard.writeText(`<img src="${imgUrl}" style="width:100%;display:block;">`); showToast('img 태그 복사됨'); }}

                      </div>
                    );
                  })}
                </div>

                <div style={{ fontSize: 11, color: 'var(--text-sm)', lineHeight: 1.6 }}>
                  이미지가 있는 슬롯(진하게)은 바로 표시되고, 빈 슬롯(흐리게)은 이후 어드민에서 이미지 추가 시 자동으로 활성화됩니다.
                </div>

          {detailTab === 'visual' && (
            <div>
              {/* 툴바 */}

                display: 'flex', flexWrap: 'wrap', gap: 4, padding: '8px 10px', marginBottom: 8,
                background: '#F9FAFB', borderRadius: 8, border: '1px solid var(--border)'
              }}>
                <button onClick={() => execCmd('bold')} title="굵게" style={{ padding: '6px 12px', fontSize: 14, fontWeight: 900, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>B</button>
                <button onClick={() => execCmd('italic')} title="기울임" style={{ padding: '6px 12px', fontSize: 14, fontStyle: 'italic', background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>I</button>
                <button onClick={() => execCmd('underline')} title="밑줄" style={{ padding: '6px 12px', fontSize: 14, textDecoration: 'underline', background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>U</button>
                <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
                <button onClick={() => execCmd('fontSize', 3)} title="작게" style={{ padding: '6px 10px', fontSize: 12, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>소</button>
                <button onClick={() => execCmd('fontSize', 4)} title="보통" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>중</button>
                <button onClick={() => execCmd('fontSize', 6)} title="크게" style={{ padding: '6px 10px', fontSize: 18, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>대</button>
                <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
                <button onClick={() => execCmd('justifyLeft')} title="왼쪽 정렬" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>◧</button>
                <button onClick={() => execCmd('justifyCenter')} title="가운데 정렬" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>◫</button>
                <button onClick={() => execCmd('justifyRight')} title="오른쪽 정렬" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>◨</button>
                <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
                <button onClick={() => execCmd('insertHorizontalRule')} title="구분선" style={{ padding: '6px 12px', fontSize: 13, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>━ 구분선</button>
                <input ref={visualImgRef} type="file" accept="image/*" multiple onChange={insertVisualImage} style={{ display: 'none' }} />
                <button onClick={() => visualImgRef.current?.click()} disabled={uploading}

                  {uploading ? '업로드중...' : '🖼 이미지 삽입'}
                </button>
              </div>

              {/* 에디터 영역 */}
              <div
                ref={editorRef}
                contentEditable
                style={{
                  minHeight: 400, padding: 20, border: '2px solid var(--border)',
                  borderRadius: 10, outline: 'none', fontSize: 15, lineHeight: 1.8,
                  background: '#fff', overflowY: 'auto', maxHeight: 600,
                }}
                onFocus={() => { if (editorRef.current && !editorRef.current.innerHTML.trim()) editorRef.current.innerHTML = '<p>여기에 상세페이지 내용을 입력하세요...</p>'; }}
              />

              {/* 반영하기 버튼 */}
              <button onClick={applyVisualToHtml}
                style={{
                  width: '100%', marginTop: 12, padding: '16px 0', fontSize: 16, fontWeight: 800,
                  background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 10, cursor: 'pointer'
                }}>
                편집완료 → 반영하기
              </button>
              <div style={{ fontSize: 12, color: 'var(--text-sm)', marginTop: 6, textAlign: 'center' }}>
                반영 후 "HTML코드" 탭에서 코드를 복사하여 마켓에 붙여넣으세요
              </div>
            </div>
          )}

          {/* 이미지 탭 */}
          {detailTab === 'images' && (
            <div>
              <input ref={detailImgRef} type="file" accept="image/*" multiple onChange={handleDetailImageUpload} style={{ display: 'none' }} />
              <button onClick={() => detailImgRef.current?.click()} disabled={uploading}
                style={{
                  width: '100%', padding: 20, border: '2px dashed var(--border)', borderRadius: 10,
                  background: 'var(--border-s)', cursor: 'pointer', textAlign: 'center',
                  fontSize: 13, color: 'var(--text-md)', marginBottom: 12
                }}>
                {uploading ? '업로드 중...' : '+ 상세 이미지 추가 (여러 장 선택 가능)'}
              </button>
              {form.detailImages?.length > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {form.detailImages.map((img, idx) => (
                    <div key={idx} style={{
                      display: 'flex', alignItems: 'center', gap: 12, padding: 10,
                      background: 'var(--border-s)', borderRadius: 8
                    }}>
                      <img src={img.url} style={{ width: 60, height: 60, objectFit: 'cover', borderRadius: 6 }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600 }}>이미지 {idx + 1}</div>
                        <div style={{ fontSize: 10, color: 'var(--text-sm)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {img.url?.substring(0, 60)}...
                        </div>
                      </div>
                      <button onClick={() => removeDetailImage(idx)}
                        style={{ padding: '4px 10px', fontSize: 11, background: '#FEE2E2', color: 'var(--red)', border: 'none', borderRadius: 4, cursor: 'pointer' }}>
                        삭제
                      </button>
                    </div>
                  ))}
                  <button onClick={generateHtmlFromImages}
                    style={{
                      padding: '10px 0', fontSize: 13, fontWeight: 700, background: 'var(--accent)',
                      color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', marginTop: 4
                    }}>
                    HTML 코드 생성
                  </button>
                </div>
              )}
            </div>
          )}

          {/* HTML 코드 탭 */}
          {detailTab === 'html' && (
            <div>
              <textarea
                value={form.detailHtml || ''}
                onChange={e => setForm({ ...form, detailHtml: e.target.value })}
                rows={12}
                placeholder={'<div style="text-align:center">\n  <img src="이미지URL" style="width:100%">\n</div>'}
                style={{
                  width: '100%', padding: 12, fontSize: 12, fontFamily: 'monospace',
                  border: '1px solid var(--border)', borderRadius: 8, outline: 'none',
                  resize: 'vertical', lineHeight: 1.6, background: '#1E1E1E', color: '#D4D4D4'
                }}
              />
              <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                <button onClick={copyHtml}
                  style={{
                    flex: 1, padding: '10px 0', fontSize: 13, fontWeight: 700,
                    background: 'var(--accent-l)', color: 'var(--accent)', border: 'none',
                    borderRadius: 8, cursor: 'pointer'
                  }}>
                  코드 복사 (마켓 붙여넣기용)
                </button>
                <button onClick={() => setDetailTab('preview')}
                  style={{
                    padding: '10px 16px', fontSize: 13, fontWeight: 600,
                    background: 'var(--border-s)', color: 'var(--text-md)', border: 'none',
                    borderRadius: 8, cursor: 'pointer'
                  }}>
                  미리보기
                </button>
              </div>
            </div>
          )}

          {/* 미리보기 탭 */}
          {detailTab === 'preview' && (
            <div>
              {form.detailHtml ? (
                <div style={{
                  border: '1px solid var(--border)', borderRadius: 8, padding: 16,
                  maxWidth: 860, margin: '0 auto', background: '#fff'
                }}>
                  <div dangerouslySetInnerHTML={{ __html: form.detailHtml }} />
                </div>
              ) : (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sm)', fontSize: 13 }}>
                  HTML 코드가 없습니다. 이미지를 업로드하고 HTML을 생성하거나 직접 입력하세요.
                </div>
              )}
            </div>
          )}
        </div>

        {/* 채널별 상품번호 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>판매채널 상품번호</div>
          <div style={{ fontSize: 12, color: 'var(--text-sm)', marginBottom: 16 }}>
            각 채널의 상품번호를 입력하면 해당 채널 상품 페이지로 바로 이동할 수 있습니다
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {CHANNELS.map(ch => {
              const val = form.channels[ch.key] || '';
              const link = val && ch.urlTpl ? ch.urlTpl(val) : null;
              return (
                <div key={ch.key} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px',
                  background: val ? 'var(--accent-l)' : 'var(--border-s)', borderRadius: 10,
                  border: `1px solid ${val ? 'var(--blue-m)' : 'var(--border)'}`,
                  transition: 'all .15s ease'
                }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: '50%',
                    background: val ? ch.color : '#D1D5DB', flexShrink: 0
                  }} />
                  <div style={{ width: 110, fontSize: 13, fontWeight: 600, color: 'var(--text)', flexShrink: 0 }}>
                    {ch.label}
                  </div>
                  <input
                    value={val}
                    onChange={e => setForm({ ...form, channels: { ...form.channels, [ch.key]: e.target.value } })}
                    placeholder="상품번호 입력"
                    style={{
                      flex: 1, padding: '8px 10px', fontSize: 13, border: '1px solid var(--border)',
                      borderRadius: 6, outline: 'none', fontFamily: 'monospace', background: '#fff'
                    }}
                  />
                  {link && (
                    <a href={link} target="_blank" rel="noopener"
                      style={{ fontSize: 11, color: 'var(--accent)', textDecoration: 'none', fontWeight: 600, whiteSpace: 'nowrap' }}>
                      링크 →
                    </a>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ─── 상품 목록 ───
  const allSelected = filtered.length > 0 && filtered.every(p => selected.has(p.id));
  const toggleAll = () => {
    if (allSelected) setSelected(new Set());
    else setSelected(new Set(filtered.map(p => p.id)));
  };
  const toggleOne = (id) => {
    const s = new Set(selected);
    s.has(id) ? s.delete(id) : s.add(id);
    setSelected(s);
  };

  return (
    <div style={{ animation: 'fadeIn .3s ease' }}>
      {/* 상태 필터 */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
        {SALES_STATUS.map(s => {
          const cnt = s === '전체' ? products.length : products.filter(p => (p.salesStatus || '판매중') === s).length;
          const icon = STATUS_ICON[s] || '';
          return (
            <button key={s} onClick={() => { setStatusFilter(s); setSelected(new Set()); setVisibleCount(30); }} style={{
              padding: '10px 20px', fontSize: 14, fontWeight: statusFilter === s ? 700 : 500,
              background: statusFilter === s ? (s === '판매중' ? 'var(--green)' : s === '품절' ? 'var(--red)' : s === '숨김' ? 'var(--text-sm)' : 'var(--accent)') : '#fff',
              color: statusFilter === s ? '#fff' : 'var(--text-md)',
              border: statusFilter === s ? 'none' : '1px solid var(--border)',
              borderRadius: 24, cursor: 'pointer', minHeight: 42,
            }}>
              {icon} {s} ({cnt})
            </button>
          );
        })}
      </div>

      {/* 태그 필터 */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap' }}>
        {tagFilter && (
          <button onClick={() => setTagFilter(null)} style={{
            padding: '5px 12px', fontSize: 12, fontWeight: 600,
            background: 'var(--red)', color: '#fff', border: 'none',
            borderRadius: 16, cursor: 'pointer'
          }}>✕ 태그 해제</button>
        )}
        {PRODUCT_TAGS.map(t => (
          <button key={t.key} onClick={() => setTagFilter(tagFilter === t.key ? null : t.key)} style={{
            padding: '5px 14px', fontSize: 12, fontWeight: tagFilter === t.key ? 700 : 500,
            background: tagFilter === t.key ? t.bg : '#fff',
            color: tagFilter === t.key ? t.color : 'var(--text-sm)',
            border: `1px solid ${tagFilter === t.key ? t.color : 'var(--border)'}`,
            borderRadius: 16, cursor: 'pointer'
          }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* 카테고리 필터 */}
      {categories.length > 0 && (
        <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-sm)', marginRight: 4 }}>카테고리:</span>
          {categoryFilter && (
            <button onClick={() => setCategoryFilter(null)} style={{
              padding: '5px 12px', fontSize: 12, fontWeight: 600,
              background: 'var(--red)', color: '#fff', border: 'none',
              borderRadius: 16, cursor: 'pointer'
            }}>✕ 해제</button>
          )}
          {categories.map(c => (
            <button key={c} onClick={() => setCategoryFilter(categoryFilter === c ? null : c)} style={{
              padding: '5px 14px', fontSize: 12, fontWeight: categoryFilter === c ? 700 : 500,
              background: categoryFilter === c ? 'var(--accent)' : '#fff',
              color: categoryFilter === c ? '#fff' : 'var(--text-md)',
              border: `1px solid ${categoryFilter === c ? 'var(--accent)' : 'var(--border)'}`,
              borderRadius: 16, cursor: 'pointer'
            }}>
              {c}
            </button>
          ))}
          <button onClick={() => setShowCategoryManager(true)} style={{
            padding: '5px 12px', fontSize: 11, fontWeight: 600,
            background: 'none', color: 'var(--text-sm)', border: '1px dashed var(--border)',
            borderRadius: 16, cursor: 'pointer'
          }}>+ 관리</button>
        </div>
      )}

      {/* 벌크 액션바 */}
      {selected.size > 0 && (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', marginBottom: 12,
          background: 'var(--accent-l)', borderRadius: 10, border: '1px solid var(--blue-m)',
          flexWrap: 'wrap'
        }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--accent)' }}>
            {selected.size}건 선택됨
          </span>
          <button onClick={() => bulkAction('status', '판매중')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>🟢 판매중</button>
          <button onClick={() => bulkAction('status', '품절')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--red)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>🔴 품절</button>
          <button onClick={() => bulkAction('status', '숨김')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--text-sm)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>⬜ 숨김</button>
          <button onClick={() => setConfirmModal({ message: `선택한 ${selected.size}건을 삭제하시겠습니까?`, onConfirm: () => { bulkAction('delete'); setConfirmModal(null); } })}
            style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: '#FEE2E2', color: 'var(--red)', border: 'none', borderRadius: 8, cursor: 'pointer', marginLeft: 'auto' }}>삭제</button>
          <button onClick={() => setSelected(new Set())} style={{ padding: '8px 12px', fontSize: 13, background: 'none', border: 'none', color: 'var(--text-sm)', cursor: 'pointer' }}>취소</button>
        </div>
      )}

      {/* 상단 액션바 */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="상품명 / 아임웹ID 검색..."
            style={{
              padding: '11px 16px', fontSize: 14, border: '1px solid var(--border)',
              borderRadius: 8, outline: 'none', width: 260
            }}
          />
          <span style={{ fontSize: 13, color: 'var(--text-sm)', fontWeight: 600 }}>{filtered.length}건</span>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={downloadTemplate} style={{
            padding: '10px 16px', fontSize: 13, fontWeight: 600,
            background: '#fff', color: 'var(--text-md)', border: '1px solid var(--border)',
            borderRadius: 8, cursor: 'pointer'
          }}>
            엑셀 템플릿
          </button>
          <input ref={excelRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleExcelUpload} style={{ display: 'none' }} />
          <button onClick={() => excelRef.current?.click()} disabled={uploading} style={{
            padding: '10px 16px', fontSize: 13, fontWeight: 600,
            background: 'var(--green-l)', color: 'var(--green)', border: 'none',
            borderRadius: 8, cursor: 'pointer', opacity: uploading ? 0.6 : 1
          }}>
            {uploading ? '처리 중...' : '엑셀 일괄등록'}
          </button>
          <button onClick={startNew} style={{
            padding: '10px 20px', fontSize: 14, fontWeight: 700,
            background: 'var(--accent)', color: '#fff', border: 'none',
            borderRadius: 8, cursor: 'pointer'
          }}>
            + 상품 등록
          </button>
        </div>
      </div>

      {/* 로딩 */}
      {loading && (
        <div style={{ textAlign: 'center', padding: 60, color: 'var(--text-sm)' }}>
          <div style={{ width: 28, height: 28, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 12px' }} />
          <div style={{ fontSize: 14 }}>상품을 불러오는 중...</div>
        </div>
      )}

      {/* 빈 상태 */}
      {!loading && filtered.length === 0 && (
        <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-sm)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📦</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--text)', marginBottom: 6 }}>
            {search ? '검색 결과가 없습니다' : '등록된 상품이 없습니다'}
          </div>
          <div style={{ fontSize: 14 }}>상품을 등록하고 채널별 상품번호를 연결하세요</div>
        </div>
      )}

      {/* 전체 선택 */}
      {!loading && filtered.length > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, paddingLeft: 4 }}>
          <input type="checkbox" checked={allSelected} onChange={toggleAll} style={{ width: 18, height: 18, cursor: 'pointer' }} />
          <span style={{ fontSize: 13, color: 'var(--text-sm)' }}>전체 선택</span>
        </div>
      )}

      {/* 상품 카드 리스트 */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filtered.slice(0, visibleCount).map(p => {
          const chCount = countChannels(p);
          const isExpanded = expandedChannel === p.id;
          const isChecked = selected.has(p.id);
          return (
            <div key={p.id} style={{
              background: '#fff', borderRadius: 12, boxShadow: 'var(--shadow)',
              overflow: 'hidden', border: isChecked ? '2px solid var(--accent)' : '1px solid var(--border-s)',
              transition: 'border .15s ease'
            }}>
              {/* 메인 행 */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: '16px 18px', cursor: 'pointer'
              }} onClick={() => setExpandedChannel(isExpanded ? null : p.id)}>
                {/* 체크박스 */}
                <input type="checkbox" checked={isChecked} onChange={e => { e.stopPropagation(); toggleOne(p.id); }}
                  onClick={e => e.stopPropagation()}
                  style={{ width: 20, height: 20, cursor: 'pointer', flexShrink: 0 }} />
                {/* 썸네일 */}
                <div style={{
                  width: 52, height: 52, borderRadius: 8, background: '#F3F4F6',
                  flexShrink: 0, overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                  {p.thumbnail
                    ? <img src={p.thumbnail} style={{ width: '100%', height: '100%', objectFit: 'cover' }} alt="" />
                    : <span style={{ fontSize: 24 }}>📦</span>
                  }
                </div>
                {/* 상품 정보 */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 15, fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {p.name}
                    </span>
                    {p.imwebId && (
                      <span style={{ fontSize: 10, fontWeight: 600, padding: '2px 6px', background: '#EDE9FE', color: '#6D28D9', borderRadius: 4 }}>#{p.imwebId}</span>
                    )}
                  </div>
                  <div style={{ fontSize: 13, color: 'var(--text-md)', marginTop: 3 }}>
                    {p.salePrice ? Number(p.salePrice).toLocaleString() + '원' : '-'}
                    {p.category ? ` · ${p.category}` : ''}
                  </div>
                  {/* 태그 */}
                  {p.tags?.length > 0 && (
                    <div style={{ display: 'flex', gap: 4, marginTop: 4, flexWrap: 'wrap' }}>
                      {p.tags.map(tk => {
                        const t = getTag(tk);
                        return t ? (
                          <span key={tk} style={{ fontSize: 10, fontWeight: 600, padding: '2px 8px', background: t.bg, color: t.color, borderRadius: 10 }}>
                            {t.label}
                          </span>
                        ) : null;
                      })}
                    </div>
                  )}
                </div>
                {/* 빠른 상태 변경 */}
                <select value={p.salesStatus || '판매중'} onChange={e => { e.stopPropagation(); quickStatusChange(p.id, e.target.value); }}
                  onClick={e => e.stopPropagation()}
                  style={{
                    padding: '8px 10px', fontSize: 13, fontWeight: 600, borderRadius: 8, cursor: 'pointer', flexShrink: 0,
                    border: '1px solid var(--border)', outline: 'none',
                    background: p.salesStatus === '판매중' ? '#ECFDF5' : p.salesStatus === '품절' ? '#FEE2E2' : '#F3F4F6',
                    color: p.salesStatus === '판매중' ? 'var(--green)' : p.salesStatus === '품절' ? 'var(--red)' : 'var(--text-sm)',
                  }}>
                  <option value="판매중">🟢 판매중</option>
                  <option value="품절">🔴 품절</option>
                  <option value="숨김">⬜ 숨김</option>
                </select>
                {/* 채널 연결 뱃지 */}
                <div style={{
                  padding: '6px 12px', borderRadius: 20, fontSize: 12, fontWeight: 700, flexShrink: 0,
                  background: chCount > 0 ? 'var(--green-l)' : '#F3F4F6',
                  color: chCount > 0 ? 'var(--green)' : 'var(--text-sm)'
                }}>
                  {chCount > 0 ? `${chCount}개 채널` : '미연결'}
                </div>
                <span style={{ fontSize: 14, color: 'var(--text-sm)', transition: 'transform .2s', transform: isExpanded ? 'rotate(180deg)' : 'rotate(0)' }}>▼</span>
                {/* 수정 버튼 */}
                <button onClick={e => { e.stopPropagation(); startEdit(p); }}
                  style={{
                    padding: '10px 20px', fontSize: 14, fontWeight: 700,
                    background: 'var(--accent)', color: '#fff', border: 'none',
                    borderRadius: 8, cursor: 'pointer', flexShrink: 0
                  }}>
                  수정하기
                </button>
              </div>

              {/* 채널 상세 (펼침) — 프록시 반영 상태 포함 */}
              {isExpanded && (
                <div style={{
                  padding: '0 18px 16px', borderTop: '1px solid var(--border-s)',
                  animation: 'fadeIn .2s ease'
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 0 8px' }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>판매채널 반영 상태</div>
                    {p.updatedAt && (
                      <span style={{ fontSize: 12, color: 'var(--text-sm)' }}>마지막 수정: {getTimeSince(p.updatedAt)}</span>
                    )}
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 8 }}>
                    {CHANNELS.map(ch => {
                      const val = p.channels?.[ch.key];
                      const link = getChannelLink(p, ch.key);
                      const status = getProxyStatus(p, ch.key);
                      const statusUI = {
                        none: { icon: '⚪', label: '미연결', color: '#D1D5DB', bg: '#F9FAFB' },
                        unregistered: { icon: '🔴', label: '프록시 미등록', color: 'var(--red)', bg: '#FEF2F2' },

                padding: 16, marginBottom: 10, background: 'var(--bg)', borderRadius: 10,
                border: '1px solid var(--border-s)'

                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 6 }}>
                  {h.changedAt ? new Date(h.changedAt).toLocaleString('ko') : '-'}
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-md)', marginBottom: 8 }}>
                  변경: {(h.changedFields || []).map(f => {
                    const labels = { name: '상품명', salePrice: '판매가', price: '소비자가', salesStatus: '상태', detailHtml: '상세페이지', tags: '태그', options: '옵션', channels: '채널' };
                    return labels[f] || f;
                  }).join(', ')}
                </div>
                <button onClick={() => restoreFromHistory(h)}
                  style={{
                    padding: '8px 16px', fontSize: 13, fontWeight: 700,
                    background: 'var(--accent-l)', color: 'var(--accent)', border: 'none',
                    borderRadius: 6, cursor: 'pointer', width: '100%'
                  }}>
                  이 버전으로 복원
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
      {showCategoryManager && <CategoryManager categories={categories} onSave={saveCategories} onClose={() => setShowCategoryManager(false)} />}
      {confirmModal && <ConfirmModal message={confirmModal.message} onConfirm={confirmModal.onConfirm} onCancel={() => setConfirmModal(null)} isInfo={confirmModal.isInfo} />}
    </div>
  );
}

  { name: '제주', kw: ['제주','서귀포'] },
];

function normalizeRegion(raw, aliases = {}) {
  if (!raw || !raw.trim()) return null;
  const r = raw.trim();
  // 사용자 정의 매핑 먼저 확인 (키워드 포함 여부)
  for (const [kw, target] of Object.entries(aliases)) {
    if (r.includes(kw.trim())) return target.trim();
  }
  // 기본 룰
  for (const reg of REGION_BASE_MAP) {
    if (reg.kw.some(kw => r.includes(kw))) return reg.name;
  }
  return r; // 매핑 불가 시 원본 반환
}

// ─── 키워드 분석 공통 컴포넌트 ───
function KeywordBar({ name, count, max, color }) {
  const pct = Math.round((count / max) * 100);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
      <div style={{ flex: 1, fontSize: 12, fontWeight: 500, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</div>
      <div style={{ width: 130, height: 8, background: '#F3F4F6', borderRadius: 4, overflow: 'hidden', flexShrink: 0 }}>
        <div style={{ width: pct + '%', height: '100%', background: color, borderRadius: 4, transition: 'width .4s' }} />
      </div>
      <div style={{ fontSize: 11, fontWeight: 700, color, minWidth: 28, textAlign: 'right', flexShrink: 0 }}>{count}</div>
    </div>
  );
}

function KeywordTagCloud({ keywords, color, bg }) {
  if (keywords.length === 0) return React.createElement('div', { style: { fontSize: 12, color: 'var(--text-sm)', textAlign: 'center', padding: 24 } }, '데이터 없음');
  const max = keywords[0][1];
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, padding: '4px 0' }}>
      {keywords.map(([name, cnt]) => {
        const ratio = cnt / max;
        const fontSize = Math.round(10 + ratio * 8);
        return (
          <span key={name} style={{
            padding: '4px 10px', borderRadius: 20, background: bg, color,
            fontSize, fontWeight: ratio > 0.6 ? 700 : 500,
            opacity: 0.5 + ratio * 0.5, border: `1px solid ${color}30`,
            display: 'inline-block',
          }}>
            {name} <span style={{ fontSize: fontSize - 2 }}>({cnt})</span>
          </span>
        );
      })}
    </div>
  );
}

// ─── 키워드 분석 대시보드 ───
function KeywordDashboardPage({ showToast }) {
  const [leads, setLeads] = useState([]);
  const [surveys, setSurveys] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('insight'); // insight | problem | positive | negative
  const [regionAliases, setRegionAliases] = useState({}); // { "역삼": "서울", ... }
  const [showRegionConfig, setShowRegionConfig] = useState(false);
  const [aliasText, setAliasText] = useState(''); // 편집용 텍스트

  const loadData = useCallback(async () => {
    setLoading(true);
    try {
      const [leadsSnap, npsSnap, aliasDoc] = await Promise.all([
        db.collection(COLLECTIONS.LEADS).get(),
        db.collection(COLLECTIONS.NPS_SURVEYS).get(),
        db.collection('config').doc('region-mapping').get(),
      ]);
      console.log(`[keywords] leads:${leadsSnap.size} nps:${npsSnap.size}`);
      const leadsData = leadsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const expoLeads = leadsData.filter(l => !l.source || ['expo','exhibition','tablet','박람회','qr',''].includes(l.source));
      setLeads(expoLeads);
      setSurveys(npsSnap.docs.map(d => ({ id: d.id, ...d.data() })));
      if (aliasDoc.exists) {
        const aliases = aliasDoc.data().aliases || {};
        setRegionAliases(aliases);
        setAliasText(Object.entries(aliases).map(([k, v]) => `${k}=${v}`).join('\n'));
      }
    } catch (e) {
      console.error('[keywords] 로드 실패:', e);
      showToast('데이터 로드 실패', 'error');
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  const saveRegionAliases = async () => {
    try {
      const aliases = {};
      aliasText.split('\n').forEach(line => {
        const [k, v] = line.split('=');
        if (k && v && k.trim() && v.trim()) aliases[k.trim()] = v.trim();
      });
      await db.collection('config').doc('region-mapping').set({ aliases, updatedAt: new Date().toISOString() });
      setRegionAliases(aliases);
      showToast('지역 매핑 저장 완료');
      setShowRegionConfig(false);
    } catch (e) {
      console.error(e);
      showToast('저장 실패', 'error');
    }
  };

  useEffect(() => { loadData(); }, [loadData]);

  // ── 문제 키워드 집계 ──
  const problemKeywords = useMemo(() => {
    const map = {};
    leads.forEach(l => {
      (l.problems || []).forEach(p => { if (p && p !== '-') map[p] = (map[p] || 0) + 1; });
      if (l.problem && l.problem !== '-' && !(l.problems || []).includes(l.problem))
        map[l.problem] = (map[l.problem] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [leads]);

  // ── 문제 카테고리 분포 ──
  const catStats = useMemo(() => {
    const map = {};
    leads.forEach(l => { if (l.problemCat && l.problemCat !== '-') map[l.problemCat] = (map[l.problemCat] || 0) + 1; });
    const total = Object.values(map).reduce((a, b) => a + b, 0) || 1;
    const colors = { '방수': '#2563EB', '도장': '#D97706', '보수/보강': '#7C3AED', '토목': '#059669' };
    return Object.entries(map).sort((a, b) => b[1] - a[1])
      .map(([cat, cnt]) => ({ cat, cnt, pct: Math.round(cnt / total * 100), color: colors[cat] || '#6B7280' }));
  }, [leads]);

  // ── 건물 유형별 TOP 3 문제 ──
  const buildingProblems = useMemo(() => {
    const bmap = {};
    const BICONS = { apt: '🏢', gov: '🏛', house: '🏠', villa: '🏬', hospital: '🏥', school: '🏫' };
    leads.forEach(l => {
      const bid = l.buildingId;
      if (!bid || bid === '-') return;
      if (!bmap[bid]) bmap[bid] = { label: l.building || bid, icon: BICONS[bid] || '🏗', problems: {}, count: 0 };
      bmap[bid].count++;
      (l.problems || []).forEach(p => { if (p && p !== '-') bmap[bid].problems[p] = (bmap[bid].problems[p] || 0) + 1; });
      if (l.problem && l.problem !== '-' && !(l.problems || []).includes(l.problem))
        bmap[bid].problems[l.problem] = (bmap[bid].problems[l.problem] || 0) + 1;
    });
    return Object.entries(bmap)
      .map(([id, d]) => ({ id, ...d, topProblems: Object.entries(d.problems).sort((a, b) => b[1] - a[1]).slice(0, 3) }))
      .sort((a, b) => b.count - a.count);
  }, [leads]);

  // ── 영업 자료 요청 집계 ──
  const actionStats = useMemo(() => {
    const map = {};
    leads.forEach(l => { (l.actions || []).forEach(a => { if (a) map[a] = (map[a] || 0) + 1; }); });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [leads]);

  // ── 고객 직급 집계 ──
  const positionStats = useMemo(() => {
    const map = {};
    leads.forEach(l => { if (l.position && l.position !== '-') map[l.position] = (map[l.position] || 0) + 1; });
    return Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 6);
  }, [leads]);

  // ── 월별 상담 추이 (최근 6개월) ──
  const monthlyTrend = useMemo(() => {
    const now = new Date();
    const months = Array.from({ length: 6 }, (_, i) => {
      const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
      return { key: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`, label: `${d.getMonth() + 1}월`, count: 0 };
    });
    leads.forEach(l => {
      if (!l.savedAt) return;
      const m = months.find(m => m.key === l.savedAt.slice(0, 7));
      if (m) m.count++;
    });
    return months;
  }, [leads]);

  // ── 긍정 / 부정 키워드 ──
  const positiveKeywords = useMemo(() => {
    const map = {};
    surveys.forEach(s => { (s.goodFactors || []).forEach(f => { if (f) map[f] = (map[f] || 0) + 1; }); });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [surveys]);

  const negativeKeywords = useMemo(() => {
    const map = {};
    surveys.forEach(s => { (s.badFactors || []).forEach(f => { if (f) map[f] = (map[f] || 0) + 1; }); });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [surveys]);

  // ── 착공 희망월 분포 (1~12월) ──
  const startMonthStats = useMemo(() => {
    const map = {};
    leads.forEach(l => {
      if (!l.desiredStartDate) return;
      const m = parseInt(l.desiredStartDate.slice(5, 7), 10);
      if (m >= 1 && m <= 12) map[m] = (map[m] || 0) + 1;
    });
    return Array.from({ length: 12 }, (_, i) => ({ month: i + 1, label: `${i + 1}월`, count: map[i + 1] || 0 }));
  }, [leads]);

  // ── 지역 분포 (정규화 적용) ──
  const regionStats = useMemo(() => {
    const map = {};
    leads.forEach(l => {
      const norm = normalizeRegion(l.region, regionAliases);
      if (norm) map[norm] = (map[norm] || 0) + 1;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [leads, regionAliases]);

  // ── 자동 영업 인사이트 생성 ──
  const insights = useMemo(() => {
    const list = [];
    if (catStats[0]) {
      const top3 = problemKeywords.slice(0, 3).map(([n]) => n.replace(/^POUR\s+/, '').split(' ')[0]).join(', ');
      list.push({ color: '#7C3AED', bg: '#F5F3FF', icon: '🎯', title: `핵심 니즈: ${catStats[0].cat} 분야 (${catStats[0].pct}%)`, body: `상담의 ${catStats[0].pct}%가 ${catStats[0].cat} 하자. 자주 언급: ${top3}` });
    }
    if (buildingProblems[0]) {
      const b = buildingProblems[0];
      list.push({ color: '#2563EB', bg: '#EFF6FF', icon: '🏢', title: `주요 타겟: ${b.label} (${b.count}건)`, body: `방문 1위 건물 유형. 핵심 문제: ${b.topProblems.slice(0, 2).map(([n]) => n.replace(/^POUR\s+/, '').split(' ')[0]).join(', ')}` });
    }
    if (actionStats[0]) {
      list.push({ color: '#D97706', bg: '#FFFBEB', icon: '📋', title: `자료 요청 1위: ${actionStats[0][0]} (${actionStats[0][1]}건)`, body: `상담 후 ${actionStats[0][0]} 요청 최다. 현장 사전 준비 필수 자료로 관리하세요.` });
    }
    if (positionStats[0]) {
      const total = positionStats.reduce((s, [, c]) => s + c, 0);
      const pct = total ? Math.round(positionStats[0][1] / total * 100) : 0;
      list.push({ color: '#0891B2', bg: '#ECFEFF', icon: '👤', title: `상담 대상 직급 1위: ${positionStats[0][0]} (${pct}%)`, body: `상담 고객 직급 중 ${positionStats[0][0]}이(가) 가장 많음. 직급별 맞춤 제안서를 사전 준비하세요.` });
    }
    if (positiveKeywords[0]) {
      list.push({ color: '#059669', bg: '#ECFDF5', icon: '⭐', title: `핵심 강점: "${positiveKeywords[0][0]}"`, body: `NPS 만족 요인 1위 (${positiveKeywords[0][1]}명). 영업 첫 멘트 & 제안서 첫 페이지에 강조하세요.` });
    }
    if (negativeKeywords[0]) {
      list.push({ color: '#DC2626', bg: '#FEF2F2', icon: '🔧', title: `개선 집중: "${negativeKeywords[0][0]}"`, body: `NPS 개선 요인 1위 (${negativeKeywords[0][1]}명). 상담 중 선제적 해명으로 고객 불안을 해소하세요.` });
    }
    return list;
  }, [catStats, problemKeywords, buildingProblems, actionStats, positionStats, positiveKeywords, negativeKeywords]);

  if (loading) {
    return (
      <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-sm)' }}>
        <div style={{ width: 24, height: 24, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 12px' }} />
