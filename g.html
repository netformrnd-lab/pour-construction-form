<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POUR — 이동 중…</title>
<!--
  POUR스토어 마케팅 추적 리다이렉트 (공개 페이지)
  사용: /g?l=<링크ID>  →  mkt-links/<ID>.clicks 자동 +1 후 목적지 URL로 이동
  · 로그인 불필요(고객이 광고·블로그·카페에서 클릭). 대시보드와 같은 pourstoreproject 사용.
  · 보안규칙: mkt-links read=공개, update=clicks/lastClickAt 1증가만 공개 허용.
-->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyB9VC75Hs8eAdXxy9n2aVsCeFUnCGX4xhA",
  authDomain:"pourstoreproject.firebaseapp.com",
  projectId:"pourstoreproject",
  storageBucket:"pourstoreproject.firebasestorage.app",
  messagingSenderId:"549863414475",
  appId:"1:549863414475:web:9c696d7f85d82a7b7bd94e"
});
const db=firebase.firestore();
(async()=>{
  const id=new URLSearchParams(location.search).get('l');
  if(!id){ document.getElementById('msg').textContent='잘못된 링크입니다.'; return; }
  try{
    const ref=db.collection('mkt-links').doc(id);
    const doc=await ref.get();
    if(!doc.exists||!doc.data().url){ document.getElementById('msg').textContent='만료되었거나 잘못된 링크입니다.'; return; }
    const url=doc.data().url;
    // 클릭 집계 (실패해도 이동은 진행)
    try{ await ref.update({ clicks:firebase.firestore.FieldValue.increment(1), lastClickAt:new Date().toISOString() }); }
    catch(e){ console.warn('클릭 집계 실패:', e.code||e); }
    location.replace(url);
  }catch(e){
    document.getElementById('msg').textContent='이동 중 오류가 발생했습니다.';
    console.error(e);
  }
})();
</script>
<style>
  body{font-family:'Pretendard','Malgun Gothic',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#F8FAFC;color:#64748B;text-align:center}
  .box{max-width:280px}
  .sp{width:30px;height:30px;border:3px solid #D5D9DE;border-top-color:#107C41;border-radius:50%;margin:0 auto 12px;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  p{font-size:14px}
</style>
</head>
<body>
  <div class="box"><div class="sp"></div><p id="msg">페이지로 이동 중…</p></div>
</body>
</html>
