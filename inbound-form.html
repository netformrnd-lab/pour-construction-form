<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>POUR | 건물 하자 셀프진단</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

const db = firebase.firestore();
</script>
<style>
:root{
  --blue:#2563EB;--blue-l:#EFF6FF;--blue-m:#BFDBFE;
  --orange:#E8780F;--orange-l:#FFF7ED;
  --green:#059669;--green-l:#ECFDF5;
  --text:#1E293B;--text-md:#64748B;--text-sm:#94A3B8;
  --bg:#F8FAFC;--card:#FFFFFF;--border:#E2E8F0;--border-s:#F1F5F9;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100dvh;}

.container{max-width:480px;margin:0 auto;padding:0 20px 100px;}
.header{text-align:center;padding:40px 0 28px;}
.header-logo{font-size:22px;font-weight:900;color:var(--blue);letter-spacing:-.5px;}
.header-logo span{color:var(--orange);}
.header-sub{font-size:13px;color:var(--text-md);margin-top:6px;line-height:1.5;}

.progress-bar{display:flex;gap:6px;margin-bottom:28px;}
.progress-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
.progress-dot.active{background:var(--blue);}
.progress-dot.done{background:var(--green);}

.step-title{font-size:18px;font-weight:800;margin-bottom:6px;}
.step-sub{font-size:13px;color:var(--text-md);margin-bottom:20px;line-height:1.5;}

.card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}

.chip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chip{display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;font-family:inherit;font-size:14px;font-weight:600;color:var(--text);text-align:left;}
.chip:active{transform:scale(.97);}
.chip.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue);}
.chip-icon{font-size:24px;flex-shrink:0;}
.chip-text{display:flex;flex-direction:column;gap:2px;}
.chip-label{font-size:14px;font-weight:700;}
.chip-sub{font-size:11px;font-weight:400;color:var(--text-sm);}
.chip.on .chip-sub{color:var(--blue);}

.problem-list{display:flex;flex-direction:column;gap:8px;}
.problem-chip{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;width:100%;}
.problem-chip:active{transform:scale(.98);}
.problem-chip.on{border-color:var(--blue);background:var(--blue-l);}
.problem-icon{font-size:22px;flex-shrink:0;}
.problem-info{flex:1;min-width:0;}
.problem-label{font-size:14px;font-weight:700;color:var(--text);}
.problem-desc{font-size:11px;color:var(--text-sm);margin-top:2px;}
.problem-chip.on .problem-label{color:var(--blue);}

.cat-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.cat-tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text-md);transition:all .2s;}
.cat-tab.on{border-color:var(--blue);background:var(--blue);color:#fff;}

.form-group{margin-bottom:16px;}
.form-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:7px;display:block;}
.form-label .req{color:#EF4444;font-size:11px;}
.form-input{width:100%;padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-weight:500;color:var(--text);background:var(--card);outline:none;font-family:inherit;transition:border-color .2s;}
.form-input:focus{border-color:var(--blue);}
.form-input::placeholder{color:var(--text-sm);}
textarea.form-input{resize:vertical;min-height:80px;}

.btn-row{display:flex;gap:10px;margin-top:24px;}
.btn{padding:14px 0;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;border:none;transition:all .2s;text-align:center;}
.btn:active{transform:scale(.97);}
.btn-outline{background:var(--card);border:1.5px solid var(--border);color:var(--text-md);flex:1;}
.btn-blue{background:var(--blue);color:#fff;flex:2;}
.btn-blue:disabled{opacity:.5;cursor:not-allowed;}

.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.tag{padding:5px 10px;border-radius:8px;background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:600;}

.result-card{text-align:center;padding:40px 20px;}
.result-icon{font-size:56px;margin-bottom:16px;}
.result-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.result-sub{font-size:14px;color:var(--text-md);line-height:1.6;margin-bottom:24px;}

.summary-card{background:var(--blue-l);border-radius:12px;padding:16px;margin-bottom:16px;text-align:left;}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;}
.summary-label{color:var(--text-md);font-weight:500;}
.summary-value{color:var(--text);font-weight:700;}

.spec-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;text-decoration:none;margin-top:8px;transition:opacity .2s;}
.spec-link:hover{opacity:.85;}

@media(max-width:400px){
  .chip-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

/* ── 데이터 ── */
const BUILDING_TYPES=[
  {id:'apt',label:'아파트',sub:'공동주택',icon:'🏢'},
  {id:'gov',label:'관공서',sub:'공공건물',icon:'🏛'},
  {id:'house',label:'주택',sub:'단독·다세대',icon:'🏠'},
  {id:'villa',label:'빌라/오피스텔',sub:'소규모 공동주택',icon:'🏬'},
  {id:'hospital',label:'병원',sub:'의료시설',icon:'🏥'},
  {id:'school',label:'학교',sub:'교육시설',icon:'🏫'},
];

const PROBLEMS=[
  {id:'roof_leak',cat:'방수',label:'옥상·지붕 누수',icon:'💧',desc:'방수층 손상, 물고임, 침수 발생'},
  {id:'wall_leak',cat:'방수',label:'외벽 누수',icon:'🌧',desc:'외벽 조인트, 창호 주변 침수'},
  {id:'basement_leak',cat:'방수',label:'지하 누수',icon:'🚗',desc:'지하주차장 천장·벽체 누수'},
  {id:'crack',cat:'보수',label:'균열·크랙',icon:'⚡',desc:'콘크리트 벽·바닥 균열 발생'},
  {id:'paint_peel',cat:'도장',label:'도장 벗겨짐',icon:'🎨',desc:'외벽·내벽 도장 박리·변색'},
  {id:'parking_damage',cat:'도장',label:'주차장 바닥 손상',icon:'🅿️',desc:'에폭시 벗겨짐, 바닥 분진'},
  {id:'ascon_crack',cat:'토목',label:'아스콘 파손',icon:'🛣',desc:'도로·주차장 아스콘 균열·침하'},
  {id:'block_damage',cat:'토목',label:'보도블럭 파손',icon:'🧱',desc:'블럭 침하, 이탈, 파손'},
  {id:'other',cat:'기타',label:'기타 하자',icon:'🔧',desc:'위 항목에 해당하지 않는 문제'},
];

const CATS=['전체','방수','보수','도장','토목','기타'];

/* ── 앱 ── */
function App(){
  const [step,setStep]=useState(0);
  const [building,setBuilding]=useState(null);
  const [selectedProblems,setSelectedProblems]=useState([]);
  const [cat,setCat]=useState('전체');
  const [form,setForm]=useState({name:'',phone:'',email:'',company:'',detail:'',desiredStartDate:'',docDeadline:''});
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);

  const totalSteps=4;
  const filteredProblems=cat==='전체'?PROBLEMS:PROBLEMS.filter(p=>p.cat===cat);
  const toggleProblem=(p)=>setSelectedProblems(prev=>prev.find(x=>x.id===p.id)?prev.filter(x=>x.id!==p.id):[...prev,p]);

  const canNext=()=>{
    if(step===0)return !!building;
    if(step===1)return selectedProblems.length>0;
    if(step===2)return form.name.trim()&&(form.phone.trim()||form.email.trim());
    return true;
  };

  const save=async()=>{
    setSaving(true);
    try{
      await db.collection('leads').add({
        savedAt:new Date().toISOString(),
        source:'inbound-form',
        status:'신규',
        building:building.label,
        buildingId:building.id,
        problems:selectedProblems.map(p=>p.label),
        problemCats:[...new Set(selectedProblems.map(p=>p.cat))],
        name:form.name,
        phone:form.phone,
        email:form.email,
        company:form.company,
        detail:form.detail,
        desiredStartDate:form.desiredStartDate,
        docDeadline:form.docDeadline,
      });
      console.log('[inbound-form] lead 저장 완료');
      setDone(true);
    }catch(e){
      console.error('[inbound-form] 저장 실패:',e);
      alert('저장 중 오류가 발생했습니다. 다시 시도해주세요.');
    }
    setSaving(false);
  };

  /* ── 완료 화면 ── */
  if(done)return(
    <div className="container">
      <div className="result-card">
        <div className="result-icon">✅</div>
        <div className="result-title">접수 완료!</div>
        <div className="result-sub">담당자가 확인 후 빠르게 연락드리겠습니다.<br/>감사합니다.</div>
        <div className="summary-card">
          <div className="summary-row"><span className="summary-label">건물유형</span><span className="summary-value">{building?.label}</span></div>
          <div className="summary-row"><span className="summary-label">하자유형</span><span className="summary-value">{selectedProblems.map(p=>p.label).join(', ')}</span></div>
          <div className="summary-row"><span className="summary-label">성함</span><span className="summary-value">{form.name}</span></div>
          {form.desiredStartDate&&<div className="summary-row"><span className="summary-label">희망 착공일</span><span className="summary-value">{form.desiredStartDate}</span></div>}
          {form.docDeadline&&<div className="summary-row"><span className="summary-label">자료 제출 기한</span><span className="summary-value">{form.docDeadline}</span></div>}
        </div>
        <button className="btn btn-blue" style={{width:'100%'}} onClick={()=>{setStep(0);setBuilding(null);setSelectedProblems([]);setForm({name:'',phone:'',email:'',company:'',detail:'',desiredStartDate:'',docDeadline:''});setDone(false);}}>새 진단 시작</button>
      </div>
    </div>
  );

  return(
    <div className="container">
      <div className="header">
        <div className="header-logo">POUR<span>solution</span></div>
        <div className="header-sub">건물 하자, 스스로 진단하고<br/>전문가 상담까지 한 번에</div>
      </div>

      {/* 진행 표시 */}
      <div className="progress-bar">
        {[0,1,2,3].map(i=>(
          <div key={i} className={`progress-dot ${i<step?'done':''} ${i===step?'active':''}`}/>
        ))}
      </div>

      {/* Step 0: 건물유형 */}
      {step===0&&(
        <div>
          <div className="step-title">어떤 건물인가요?</div>
          <div className="step-sub">하자가 발생한 건물 유형을 선택해주세요</div>
          <div className="chip-grid">
            {BUILDING_TYPES.map(b=>(
              <button key={b.id} className={`chip ${building?.id===b.id?'on':''}`} onClick={()=>setBuilding(b)}>
                <span className="chip-icon">{b.icon}</span>
                <span className="chip-text">
                  <span className="chip-label">{b.label}</span>
                  <span className="chip-sub">{b.sub}</span>
                </span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Step 1: 하자유형 */}
      {step===1&&(
        <div>
          <div className="step-title">어떤 문제가 있나요?</div>
          <div className="step-sub">해당하는 하자를 모두 선택해주세요 (복수 선택 가능)</div>
          <div className="cat-tabs">
            {CATS.map(c=>(
              <button key={c} className={`cat-tab ${cat===c?'on':''}`} onClick={()=>setCat(c)}>{c}</button>
            ))}
          </div>
          <div className="problem-list">
            {filteredProblems.map(p=>(
              <button key={p.id} className={`problem-chip ${selectedProblems.find(x=>x.id===p.id)?'on':''}`} onClick={()=>toggleProblem(p)}>
                <span className="problem-icon">{p.icon}</span>
                <span className="problem-info">
                  <div className="problem-label">{p.label}</div>
                  <div className="problem-desc">{p.desc}</div>
                </span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Step 2: 연락처 */}
      {step===2&&(
        <div>
          <div className="step-title">연락처를 알려주세요</div>
          <div className="step-sub">상담을 위해 연락 가능한 정보를 입력해주세요</div>
          <div className="card">
            <div className="form-group">
              <label className="form-label">성함 <span className="req">*</span></label>
              <input className="form-input" placeholder="홍길동" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">전화번호 <span className="req">* (전화 또는 이메일 필수)</span></label>
              <input className="form-input" placeholder="010-0000-0000" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} inputMode="tel"/>
            </div>
            <div className="form-group">
              <label className="form-label">이메일</label>
              <input className="form-input" placeholder="example@email.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} inputMode="email"/>
            </div>
            <div className="form-group">
              <label className="form-label">소속/회사명 (선택)</label>
              <input className="form-input" placeholder="OO아파트 관리사무소" value={form.company} onChange={e=>setForm({...form,company:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="form-label">상세 설명 (선택)</label>
              <textarea className="form-input" placeholder="하자 상황을 자세히 설명해주시면 더 정확한 상담이 가능합니다." value={form.detail} onChange={e=>setForm({...form,detail:e.target.value})} rows={3}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">희망 착공일 (선택)</label>
                <input className="form-input" type="date" value={form.desiredStartDate} onChange={e=>setForm({...form,desiredStartDate:e.target.value})}/>
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">자료 제출 기한 (선택)</label>
                <input className="form-input" type="date" value={form.docDeadline} onChange={e=>setForm({...form,docDeadline:e.target.value})}/>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Step 3: 확인 */}
      {step===3&&(
        <div>
          <div className="step-title">입력 내용 확인</div>
          <div className="step-sub">아래 내용으로 상담을 접수합니다</div>
          <div className="card">
            <div className="summary-row"><span className="summary-label">건물유형</span><span className="summary-value">{building?.icon} {building?.label}</span></div>
            <div className="summary-row"><span className="summary-label">하자유형</span><span className="summary-value">{selectedProblems.map(p=>p.label).join(', ')}</span></div>
            <div style={{borderTop:'1px solid var(--border-s)',margin:'10px 0'}}/>
            <div className="summary-row"><span className="summary-label">성함</span><span className="summary-value">{form.name}</span></div>
            {form.phone&&<div className="summary-row"><span className="summary-label">전화번호</span><span className="summary-value">{form.phone}</span></div>}
            {form.email&&<div className="summary-row"><span className="summary-label">이메일</span><span className="summary-value">{form.email}</span></div>}
            {form.company&&<div className="summary-row"><span className="summary-label">소속</span><span className="summary-value">{form.company}</span></div>}
            {form.detail&&<div style={{marginTop:10}}><span className="summary-label">상세 설명</span><div style={{fontSize:13,color:'var(--text)',marginTop:4,lineHeight:1.5}}>{form.detail}</div></div>}
            {form.desiredStartDate&&<div className="summary-row" style={{marginTop:6}}><span className="summary-label">희망 착공일</span><span className="summary-value">{form.desiredStartDate}</span></div>}
            {form.docDeadline&&<div className="summary-row"><span className="summary-label">자료 제출 기한</span><span className="summary-value">{form.docDeadline}</span></div>}
          </div>
          <p style={{fontSize:11,color:'var(--text-sm)',textAlign:'center',lineHeight:1.5}}>수집된 정보는 상담 목적으로만 활용되며,<br/>담당자가 확인 후 빠르게 연락드립니다.</p>
        </div>
      )}

      {/* 하단 버튼 */}
      <div className="btn-row">
        {step>0&&<button className="btn btn-outline" onClick={()=>setStep(step-1)}>이전</button>}
        {step<3&&<button className="btn btn-blue" disabled={!canNext()} onClick={()=>setStep(step+1)}>{step===0?'다음 →':'다음 →'}</button>}
        {step===3&&<button className="btn btn-blue" disabled={saving} onClick={save}>{saving?'접수 중...':'📩 상담 접수하기'}</button>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
