<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;background:#fff;overflow:hidden;}
body{font-family:'Pretendard',-apple-system,sans-serif;color:#191F28;-webkit-font-smoothing:antialiased;}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#fff;opacity:0;pointer-events:none;transform:translateX(24px);transition:opacity .2s ease,transform .2s ease;}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* NAV */
.nav{display:flex;align-items:center;height:56px;padding:0 8px;flex-shrink:0;border-bottom:1px solid #F2F4F6;background:#fff;position:relative;}
.nav-back{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:50%;font-size:20px;color:#191F28;}
.nav-back:active{background:#F2F4F6;}
.nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:700;color:#191F28;white-space:nowrap;}
.nav-right{margin-left:auto;padding-right:4px;}
.nav-text-btn{padding:8px 12px;border:none;background:none;font-size:14px;font-weight:700;color:#2563EB;cursor:pointer;font-family:inherit;border-radius:10px;}
.nav-text-btn:active{background:#EFF6FF;}

/* BOTTOM */
.bottom{padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid #F2F4F6;display:flex;gap:8px;flex-shrink:0;background:#fff;}
.btn{flex:1;padding:15px 0;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .1s;}
.btn:active{opacity:.75;}
.btn:disabled{opacity:.4;}
.btn-gray{background:#F2F4F6;color:#191F28;}
.btn-blue{background:#2563EB;color:#fff;flex:2;}

/* ── SETUP SCREEN ── */
.setup-wrap{flex:1;overflow-y:auto;padding:40px 24px 60px;}
.setup-wrap::-webkit-scrollbar{display:none;}
.setup-eyebrow{font-size:11px;font-weight:700;color:#B0B8C1;letter-spacing:.08em;margin-bottom:24px;}
.setup-h{font-size:26px;font-weight:900;letter-spacing:-.6px;line-height:1.3;margin-bottom:6px;}
.setup-sub{font-size:14px;color:#8B95A1;margin-bottom:28px;line-height:1.65;}
.setup-section-title{font-size:12px;font-weight:700;color:#8B95A1;margin-bottom:10px;letter-spacing:.05em;}
.cta-big{width:100%;padding:19px;border-radius:17px;border:none;background:#2563EB;color:#fff;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;}
.cta-big:active{background:#1D4ED8;}
.cta-big:disabled{opacity:.4;}

/* Staff pick chips on setup */
.staff-pick-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.staff-pick-row{display:flex;align-items:center;gap:8px;padding:14px 16px;border-radius:16px;border:1.5px solid #E5E8EB;background:#F8F9FA;cursor:pointer;transition:all .14s;}
.staff-pick-row.sel{background:#EFF6FF;border-color:#2563EB;}
.staff-pick-row.sel .sprow-name{color:#1D4ED8;}
.sprow-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;}
.sprow-name{font-size:15px;font-weight:700;color:#191F28;flex:1;}
.sprow-check{width:22px;height:22px;border-radius:50%;border:2px solid #E5E8EB;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.sprow-check.on{background:#2563EB;border-color:#2563EB;color:#fff;}
.sprow-actions{display:flex;gap:4px;}
.sprow-edit-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(0,0,0,.05);color:#8B95A1;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sprow-edit-btn:active{background:rgba(0,0,0,.1);}
.add-staff-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:16px;border:1.5px dashed #D1D5DB;cursor:pointer;transition:background .12s;}
.add-staff-row:active{background:#F8F9FA;}
.add-staff-icon{width:36px;height:36px;border-radius:50%;background:#F2F4F6;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.add-staff-text{font-size:14px;font-weight:600;color:#8B95A1;}

/* day chips */
.day-row{display:flex;gap:8px;margin-bottom:28px;}
.day-chip{flex:1;padding:13px 0;border-radius:13px;border:1.5px solid #E5E8EB;background:#F8F9FA;font-size:14px;font-weight:700;color:#8B95A1;cursor:pointer;font-family:inherit;text-align:center;transition:all .12s;}
.day-chip.on{background:#191F28;color:#fff;border-color:#191F28;}

/* HOME */
.home-hero{background:linear-gradient(155deg,#0A1628 0%,#1A3566 55%,#2563EB 100%);padding:52px 28px 44px;position:relative;overflow:hidden;}
.home-hero::after{content:'';position:absolute;right:-60px;bottom:-60px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.04);}
.home-eyebrow{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.08em;margin-bottom:18px;}
.home-h1{font-size:32px;font-weight:900;line-height:1.22;letter-spacing:-.8px;color:#fff;margin-bottom:24px;position:relative;z-index:1;}
.home-h1 em{color:#FBBF24;font-style:normal;}
.home-expo{padding:14px 18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.13);border-radius:14px;display:flex;align-items:center;justify-content:space-between;}
.expo-info div:first-child{font-size:13px;font-weight:700;color:#fff;}
.expo-info div:last-child{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.staff-badge{display:flex;align-items:center;gap:6px;padding:6px 11px 6px 8px;background:rgba(255,255,255,.12);border-radius:100px;cursor:pointer;border:1px solid rgba(255,255,255,.15);flex-shrink:0;}
.staff-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;flex-shrink:0;}
.staff-badge-name{font-size:12px;font-weight:700;color:#fff;}
.home-body{padding:22px 20px 100px;}
.home-leads-btn{width:100%;padding:15px;border-radius:15px;border:1.5px solid #E5E8EB;background:#fff;color:#6B7684;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.home-leads-btn:active{background:#F8F9FA;}
.sec-title{font-size:11px;font-weight:700;color:#B0B8C1;letter-spacing:.08em;margin:22px 0 12px;}
.stat-row{display:flex;gap:8px;}
.stat-card{flex:1;background:#F8F9FA;border-radius:14px;padding:14px 16px;}
.stat-num{font-size:22px;font-weight:900;color:#191F28;letter-spacing:-.5px;}
.stat-label{font-size:11px;color:#8B95A1;margin-top:3px;}

/* BUILDING */
.page-head{padding:22px 20px 14px;}
.page-h{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.35;}
.page-sub{font-size:14px;color:#8B95A1;margin-top:5px;}
.blist{padding:0 16px 40px;display:flex;flex-direction:column;gap:8px;}
.brow{display:flex;align-items:center;gap:14px;padding:15px 18px;background:#F8F9FA;border-radius:18px;cursor:pointer;border:1.5px solid transparent;transition:all .14s;}
.brow:active{background:#EFF6FF;border-color:#BFDBFE;}
.brow-icon{width:48px;height:48px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.brow-body{flex:1;}
.brow-name{font-size:15px;font-weight:700;color:#191F28;}
.brow-sub{font-size:12px;color:#8B95A1;margin-top:1px;}
.brow-cnt{font-size:12px;font-weight:700;color:#2563EB;background:#EFF6FF;padding:3px 10px;border-radius:100px;flex-shrink:0;}
.brow-arr{color:#D1D5DB;font-size:18px;margin-left:4px;}

/* GUIDES */
.guide-ctx{display:flex;align-items:center;gap:8px;padding:12px 20px 0;}
.ctx-pill{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;background:#191F28;color:#fff;}
.ctx-cnt{font-size:12px;color:#8B95A1;}
.guide-list{padding:10px 16px 100px;display:flex;flex-direction:column;gap:12px;}
.gcard{border:1.5px solid #E5E8EB;border-radius:20px;overflow:hidden;background:#fff;}
.gcard-thumb{width:100%;aspect-ratio:16/7;background:linear-gradient(135deg,#1E3A5F,#2563EB);position:relative;display:flex;align-items:center;justify-content:center;}
.gcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.gcard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 55%);}
.gcard-tags{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;display:flex;gap:5px;}
.gtag{background:rgba(255,255,255,.18);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;}
.gcard-ph{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.3;}
.gcard-body{padding:14px 16px 0;}
.gcard-cat{display:inline-flex;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;margin-bottom:7px;}
.cb-방수{background:#DBEAFE;color:#1D4ED8;}
.cb-도장{background:#FEF9C3;color:#92400E;}
.gcard-title{font-size:17px;font-weight:800;color:#191F28;letter-spacing:-.3px;margin-bottom:4px;}
.gcard-desc{font-size:13px;color:#6B7684;line-height:1.6;}
.gcard-btns{display:flex;border-top:1px solid #F2F4F6;margin-top:13px;}
.gbtn{flex:1;padding:14px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:700;border:none;background:none;cursor:pointer;font-family:inherit;color:#2563EB;text-decoration:none;}
.gbtn:active{background:#F0F6FF;}
.gbtn.primary{background:#2563EB;color:#fff;flex:2;}
.gbtn.primary:active{background:#1D4ED8;}
.gbtn+.gbtn{border-left:1px solid #F2F4F6;}
.fab{position:fixed;right:20px;bottom:max(24px,env(safe-area-inset-bottom));background:#191F28;color:#fff;border:none;border-radius:100px;padding:14px 22px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:100;}
.fab:active{transform:scale(.95);}

/* CS MEMO */
.memo-wrap{padding:0 0 90px;}
.msec{padding:18px 20px 0;}
.msec-label{font-size:11px;font-weight:700;color:#B0B8C1;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.msec-label::before{content:'';width:3px;height:11px;border-radius:2px;background:#2563EB;flex-shrink:0;}
.ctx-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.ctx-chip{display:flex;align-items:center;gap:5px;padding:7px 13px;background:#F2F4F6;border-radius:100px;font-size:13px;font-weight:600;color:#6B7684;}
.ctx-chip.blue{background:#EFF6FF;color:#1D4ED8;}

/* staff confirm bar in memo */
.staff-confirm-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#F5F3FF;border-radius:14px;border:1.5px solid #EDE9FE;}
.scb-left{display:flex;align-items:center;gap:10px;}
.scb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.scb-info{}
.scb-name{font-size:14px;font-weight:800;color:#191F28;}
.scb-day{font-size:11px;color:#7C3AED;font-weight:600;}
.scb-change{font-size:13px;font-weight:700;color:#7C3AED;padding:7px 12px;border-radius:100px;border:1.5px solid #DDD6FE;background:#fff;cursor:pointer;font-family:inherit;}

.chip-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:9px 15px;border-radius:100px;border:1.5px solid #E5E8EB;background:#fff;font-size:13px;font-weight:600;color:#6B7684;cursor:pointer;font-family:inherit;transition:all .12s;}
.chip:active{transform:scale(.96);}
.chip.on{background:#191F28;color:#fff;border-color:#191F28;}
.minput{width:100%;padding:15px 16px;border-radius:14px;border:1.5px solid #E5E8EB;font-size:15px;color:#191F28;background:#F8F9FA;outline:none;font-family:inherit;transition:all .15s;}
.minput:focus{border-color:#2563EB;background:#fff;}
textarea.minput{resize:none;line-height:1.6;}
.minput-col{display:flex;flex-direction:column;gap:10px;}
.mdiv{height:1px;background:#F2F4F6;margin-top:18px;}
.staff-box{background:#F5F3FF;border:1.5px solid #EDE9FE;border-radius:18px;padding:16px;margin:18px 16px 0;}
.staff-box-title{font-size:12px;font-weight:700;color:#7C3AED;letter-spacing:.06em;margin-bottom:14px;}
.atag-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.atag{display:flex;align-items:center;gap:6px;padding:10px 15px;border-radius:12px;border:1.5px solid #DDD6FE;background:#fff;font-size:13px;font-weight:700;color:#7C3AED;cursor:pointer;font-family:inherit;transition:all .12s;}
.atag:active{transform:scale(.97);}
.atag.on{background:#7C3AED;color:#fff;border-color:#7C3AED;}
.staff-memo-label{font-size:12px;font-weight:700;color:#7C3AED;margin-bottom:7px;}

/* SUCCESS */
.success-top{background:linear-gradient(155deg,#0A1628,#1A3566);padding:34px 28px 30px;flex-shrink:0;}
.success-icon{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px;}
.success-h{font-size:22px;font-weight:900;color:#fff;margin-bottom:5px;}
.success-sub{font-size:13px;color:rgba(255,255,255,.5);line-height:1.65;}
.success-body{padding:20px 20px 60px;}
.sum-card{background:#F8F9FA;border-radius:16px;padding:16px 18px;margin-bottom:20px;}
.sum-title{font-size:11px;font-weight:700;color:#B0B8C1;letter-spacing:.07em;margin-bottom:12px;}
.srow{display:flex;gap:10px;margin-bottom:7px;}
.skey{font-size:13px;font-weight:600;color:#8B95A1;min-width:62px;flex-shrink:0;}
.sval{font-size:13px;color:#191F28;line-height:1.55;}
.tl-h{font-size:15px;font-weight:800;margin-bottom:16px;}
.tl-item{display:flex;gap:14px;}
.tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
.tl-dot.done{background:#2563EB;}
.tl-dot.todo{background:#F2F4F6;}
.tl-line{width:1.5px;flex:1;background:#E5E8EB;margin:3px 0;}
.tl-body{padding:3px 0 20px;}
.tl-day{font-size:11px;font-weight:700;color:#B0B8C1;margin-bottom:2px;}
.tl-step{font-size:14px;font-weight:700;color:#191F28;}
.tl-desc{font-size:12px;color:#8B95A1;line-height:1.5;margin-top:2px;}
.tl-now{background:#EFF6FF;border-radius:9px;padding:7px 12px;margin-top:6px;font-size:12px;color:#1D4ED8;font-weight:600;}
.sbtns{display:flex;gap:8px;margin-top:8px;}
.sbtn{flex:1;padding:14px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.sbtn-g{background:#F2F4F6;color:#191F28;}
.sbtn-b{background:#2563EB;color:#fff;flex:1.5;}

/* LOG */
.logwrap{padding:12px 16px 80px;}
.logcard{background:#191F28;border-radius:18px;padding:18px 20px;margin-bottom:14px;}
.logtop{font-size:11px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.08em;margin-bottom:12px;}
.logrow{display:flex;gap:10px;margin-bottom:6px;}
.logkey{font-size:12px;font-weight:600;color:#60A5FA;min-width:64px;flex-shrink:0;}
.logval{font-size:12px;color:rgba(255,255,255,.8);line-height:1.55;}
.logdiv{height:1px;background:rgba(255,255,255,.08);margin:10px 0;}
.memo-label{font-size:14px;font-weight:700;margin-bottom:8px;}
.memo-box{width:100%;padding:14px 16px;border-radius:14px;border:1.5px dashed #E5E8EB;background:#F8F9FA;font-size:14px;color:#191F28;resize:none;outline:none;font-family:inherit;line-height:1.7;min-height:88px;transition:all .15s;}
.memo-box:focus{border-color:#7C3AED;background:#fff;border-style:solid;}

/* LEADS */
.filter-row{display:flex;gap:7px;padding:12px 16px 0;overflow-x:auto;}
.filter-row::-webkit-scrollbar{display:none;}
.f-chip{padding:7px 14px;border-radius:100px;border:1.5px solid #E5E8EB;background:#fff;font-size:13px;font-weight:600;color:#8B95A1;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.f-chip.on{background:#191F28;color:#fff;border-color:#191F28;}
.lead-card{border:1.5px solid #E5E8EB;border-radius:18px;padding:16px;background:#fff;}
.lead-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.lead-num{width:28px;height:28px;border-radius:50%;background:#191F28;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.lead-name{font-size:16px;font-weight:800;color:#191F28;margin-left:8px;}
.lead-staff-tag{font-size:11px;font-weight:700;color:#7C3AED;background:#F5F3FF;padding:3px 8px;border-radius:6px;white-space:nowrap;}
.lead-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.lpill{font-size:12px;padding:4px 10px;border-radius:100px;background:#F2F4F6;color:#6B7684;}
.lpill.blue{background:#EFF6FF;color:#1D4ED8;font-weight:600;}
.lead-probs{font-size:12px;color:#8B95A1;margin-bottom:7px;line-height:1.5;}
.lead-atags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.latag{font-size:11px;font-weight:700;background:#F5F3FF;color:#6D28D9;padding:3px 8px;border-radius:6px;}
.lead-memo{font-size:12px;color:#8B95A1;border-top:1px solid #F2F4F6;padding-top:8px;font-style:italic;line-height:1.5;}
.lead-cta{display:flex;gap:7px;margin-top:12px;}
.lcta{flex:1;padding:10px;border-radius:10px;background:#F2F4F6;color:#191F28;font-size:13px;font-weight:700;text-align:center;text-decoration:none;display:block;border:none;cursor:pointer;font-family:inherit;}
.lcta.mail{background:#EFF6FF;color:#1D4ED8;}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-sheet::-webkit-scrollbar{display:none;}
.modal-handle{width:36px;height:4px;border-radius:2px;background:#E5E8EB;margin:0 auto 20px;}
.modal-h{font-size:18px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:14px;color:#8B95A1;margin-bottom:20px;}
.modal-input{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid #E5E8EB;font-size:16px;color:#191F28;background:#F8F9FA;outline:none;font-family:inherit;transition:all .15s;margin-bottom:12px;}
.modal-input:focus{border-color:#2563EB;background:#fff;}
.modal-save-btn{width:100%;padding:16px;border-radius:14px;border:none;background:#2563EB;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
.modal-save-btn:active{background:#1D4ED8;}
.modal-cancel-link{display:block;text-align:center;font-size:14px;color:#8B95A1;margin-top:14px;cursor:pointer;padding:6px;}

/* Staff list in modal */

/* ── QR Modal ── */
function QRModal({url,title,onClose}){
  const ref=useRef();
  useEffect(()=>{
    if(ref.current&&url){ref.current.innerHTML='';new QRCode(ref.current,{text:url,width:200,height:200,colorDark:'#191F28',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});}
  },[url]);
  return(
    <div className="qr-bg" onClick={onClose}>
      <div className="qr-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:24}}>📱</div>
        <div className="qr-title">{title}</div>
        <div ref={ref}/>
        <div className="qr-url">{url}</div>
      </div>
      <button className="qr-close" onClick={onClose}>닫기</button>
    </div>
  );
}

/* mode: 'setup'(최초 설정) | 'switch'(담당자 전환) */
function StaffManagerModal({mode, currentStaffId, staffDay, onSelect, onClose}){
  const [staffList,setStaffList]=useState(loadStaffList);
  const [day,setDay]=useState(staffDay||'4/16(목)');
  const [selectedId,setSelectedId]=useState(currentStaffId||'');
  const [addMode,setAddMode]=useState(false);
  const [editTarget,setEditTarget]=useState(null); // staff object
  const [inputName,setInputName]=useState('');

  const refreshList=()=>setStaffList(loadStaffList());

  const handleAddOrEdit=()=>{
    if(!inputName.trim())return;
    if(editTarget){
      const next=loadStaffList().map(s=>s.id===editTarget.id?{...s,name:inputName.trim()}:s);
      saveStaffList(next);setStaffList(next);
    } else {
      const newS={id:'s'+Date.now(),name:inputName.trim()};
      const next=[...loadStaffList(),newS];
      saveStaffList(next);setStaffList(next);
      setSelectedId(newS.id);
    }
    setAddMode(false);setEditTarget(null);setInputName('');
  };

  const handleDelete=(id)=>{
    if(!confirm('삭제하시겠어요?'))return;
    const next=loadStaffList().filter(s=>s.id!==id);
    saveStaffList(next);setStaffList(next);
    if(selectedId===id)setSelectedId('');
  };

  const handleEdit=(s)=>{setEditTarget(s);setInputName(s.name);setAddMode(true);};

  const handleConfirm=()=>{
    if(!selectedId){alert('담당자를 선택해주세요');return;}
    const s=staffList.find(x=>x.id===selectedId);
    if(!s)return;
    localStorage.setItem('pourStaffId',selectedId);
    localStorage.setItem('pourDay',day);
    onSelect(s,day);
  };

  const isSetupMode=mode==='setup';

  return(
    <div className="modal-bg" onClick={mode==='switch'?onClose:undefined}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-h">{isSetupMode?'담당자 설정':'담당자 변경'}</div>
        <div className="modal-sub">{isSetupMode?'상담을 시작할 담당자를 선택하고 날짜를 확인해주세요':'다른 담당자로 전환하거나 날짜를 변경하세요'}</div>

        {/* 날짜 선택 */}
        <div style={{marginBottom:20}}>
          <div className="setup-section-title" style={{marginBottom:8}}>오늘 날짜</div>
          <div className="day-row" style={{marginBottom:0}}>
            {DAYS.map(d=><button key={d} className={`day-chip ${day===d?'on':''}`} onClick={()=>setDay(d)}>{d}</button>)}
          </div>
        </div>

        {/* 담당자 목록 */}
        <div className="setup-section-title">담당자 선택</div>
        <div className="staff-modal-list">
          {staffList.length===0&&!addMode&&(
            <div style={{padding:'16px',textAlign:'center',color:'#B0B8C1',fontSize:14}}>등록된 담당자가 없어요</div>
          )}
          {staffList.map(s=>(
            <div key={s.id} className={`staff-modal-row ${selectedId===s.id?'sel':''}`}
              onClick={()=>setSelectedId(s.id)}>
              <div className="smr-avatar" style={{background:getColor(s.id)}}>{getAvatar(s.name)}</div>
              <span className={`smr-name ${selectedId===s.id?'sel':''}`}>{s.name}</span>
              <div className="smr-btns" onClick={e=>e.stopPropagation()}>
                <button className="smr-btn" onClick={()=>handleEdit(s)}>✏️</button>
                <button className="smr-btn del" onClick={()=>handleDelete(s.id)}>🗑</button>
              </div>
            </div>
          ))}
        </div>

        {/* 추가 / 편집 폼 */}
        {addMode?(
          <div style={{background:'#F8F9FA',borderRadius:14,padding:14,marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:'#8B95A1',marginBottom:8}}>{editTarget?'이름 수정':'새 담당자 추가'}</div>
            <input className="modal-input" style={{marginBottom:10}} placeholder="담당자 이름 입력" value={inputName} onChange={e=>setInputName(e.target.value)} autoFocus/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setAddMode(false);setEditTarget(null);setInputName('');}} style={{flex:1,padding:'11px',borderRadius:10,border:'1.5px solid #E5E8EB',background:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'#6B7684'}}>취소</button>
              <button onClick={handleAddOrEdit} style={{flex:2,padding:'11px',borderRadius:10,border:'none',background:'#191F28',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{editTarget?'수정':'추가'}</button>
            </div>
          </div>
        ):(
          <button className="add-new-staff-btn" onClick={()=>{setAddMode(true);setEditTarget(null);setInputName('');}}>
            ＋ 새 담당자 추가
          </button>
        )}

        <button className="modal-save-btn" onClick={handleConfirm}>
          {isSetupMode?'상담 시작하기 →':'확인'}
        </button>
        {mode==='switch'&&<div className="modal-cancel-link" onClick={onClose}>취소</div>}
      </div>
    </div>
  );
}

/* ── App ── */
function App(){
  const [staffId,setStaffId]=useState(()=>localStorage.getItem('pourStaffId')||'');
  const [staffName,setStaffName]=useState(()=>{
    const id=localStorage.getItem('pourStaffId');
    if(!id)return '';
    const list=loadStaffList();
    return list.find(s=>s.id===id)?.name||'';
  });
  const [staffDay,setStaffDay]=useState(()=>localStorage.getItem('pourDay')||'4/16(목)');
  const [showStaffMgr,setShowStaffMgr]=useState(false);
  const [staffMgrMode,setStaffMgrMode]=useState('setup');

  const [screen,setScreen]=useState('home');
  const [building,setBuilding]=useState(null);

  /* CS memo */
  const [csName,setCsName]=useState('');
  const [csPhone,setCsPhone]=useState('');
  const [csEmail,setCsEmail]=useState('');
  const [csContact,setCsContact]=useState([]);
  const [csProbs,setCsProbs]=useState([]);
  const [csActions,setCsActions]=useState([]);
  const [csMemo,setCsMemo]=useState('');
  /* 메모 작성 시 담당자 확인용 */
  const [memoStaffId,setMemoStaffId]=useState('');
  const [memoStaffName,setMemoStaffName]=useState('');
  const [memoDay,setMemoDay]=useState('');
  const [showMemoStaffPicker,setShowMemoStaffPicker]=useState(false);
  const [saving,setSaving]=useState(false);

  const [leads,setLeads]=useState([]);

  const [staffList,setStaffList]=useState([]);

    setStaffId(s.id);setStaffName(s.name);setStaffDay(day);

  const reset=()=>{
    setCsName('');setCsPhone('');setCsEmail('');setCsContact([]);
    setCsProbs([]);setCsActions([]);setCsMemo('');
    setSelectedProblems([]);
    setMemoStaffId('');setMemoStaffName('');setMemoDay('');
  };
  const goHome=()=>{setScreen('home');setBuilding(null);reset();loadTodayCount();};
  const toggle=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const filteredGuides=building?GUIDES.filter(g=>g.buildings.includes(building.id)):GUIDES;

  const loadTodayCount=useCallback(async()=>{
    try{const s=await db.collection('leads').where('day','==',staffDay).get();setTodayCount(s.size);}catch(e){}
  },[staffDay]);
  useEffect(()=>{if(isSetup)loadTodayCount();},[isSetup,loadTodayCount]);

  /* CS 메모 화면 열기 → 담당자 확인 + 선택된 문제 pre-fill */
  const openMemo=()=>{
    setMemoStaffId(staffId);
    setMemoStaffName(staffName);
    setMemoDay(staffDay);
    /* 문제유형 선택 화면에서 고른 항목 자동 반영 */
    if(selectedProblems.length>0) setCsProbs(selectedProblems);
    setScreen('cs-memo');
  };

  /* 저장 */
  const saveMemo=async()=>{
    if(!csName.trim()||(!csPhone.trim()&&!csEmail.trim())){alert('성함과 연락처를 입력해주세요');return;}
    if(!memoStaffId){alert('담당자를 확인해주세요');return;}
    setSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:memoDay,
      staffId:memoStaffId,staff:memoStaffName,
      name:csName,phone:csPhone,email:csEmail,contactMethod:csContact,
      building:building?.label||'-',buildingId:building?.id||'-',
      problems:csProbs,
      actions:csActions.map(id=>ACTION_TAGS.find(t=>t.id===id)?.label||id),
      memo:csMemo,status:'신규',
    };
    try{await db.collection('leads').add(data);setTodayCount(p=>p+1);}
    catch(e){console.warn('저장 실패',e);}
    setSaving(false);
    setScreen('success');
  };

  const loadLeads=async()=>{
    try{
      const s=await db.collection('leads').orderBy('savedAt','desc').get();
      const all=s.docs.map(d=>({id:d.id,...d.data()}));
      setLeads(all);
      setStaffList([...new Set(all.map(l=>l.staff).filter(Boolean))]);
    }catch(e){setLeads([]);}
    setScreen('leads');
  };

        <div style={{fontSize:14,color:'#8B95A1',marginBottom:32,lineHeight:1.65}}>오늘 상담을 시작할 담당자를 선택하세요.<br/>태블릿 10대 모두 각자 담당자를 설정해요.</div>
        <button className="cta-big" style={{maxWidth:360,width:'100%'}} onClick={()=>openStaffMgr('setup')}>

      <div className={`screen ${screen==='home'?'active':''}`}>

              </div>
              <div className="staff-badge" onClick={()=>openStaffMgr('switch')}>
                <div className="staff-dot"/>

                <span className="staff-badge-name">{staffDay} · {staffName}</span>
              </div>
            </div>
          </div>
          <div className="home-body">

            <button className="home-leads-btn" onClick={loadLeads}>📋 상담 리드 목록 보기</button>
            <div className="sec-title">오늘 현황 · {staffDay}</div>

            <div className="success-icon">✅</div>
            <div className="success-h">저장 완료!</div>
            <div className="success-sub">{csName}님 정보가 기록됐어요.<br/>담당자 {memoStaffName}이(가) 후속 연락드립니다.</div>
          </div>
          <div className="success-body">
            <div className="sum-card">
              <div className="sum-title">접수 요약</div>
              {[
                ['담당자',`${memoStaffName} · ${memoDay}`],
                ['성함',csName],['전화',csPhone||'-'],['이메일',csEmail||'-'],
                ['연락방법',csContact.join(' · ')||'-'],
                ['건물유형',building?.label||'-'],
                ['주요 문제',csProbs.join(' · ')||'-'],
                ['2차 액션',csActions.map(id=>ACTION_TAGS.find(t=>t.id===id)?.label||id).join(', ')||'-'],
              ].map(([k,v])=>(
                <div key={k} className="srow"><span className="skey">{k}</span><span className="sval">{v}</span></div>
              ))}
            </div>
            <div className="tl-h">📅 이후 진행 순서</div>
            <div style={{display:'flex',flexDirection:'column'}}>
              {TL.map((t,i)=>(
                <div key={i} className="tl-item">
                  <div className="tl-left">
                    <div className={`tl-dot ${t.done?'done':'todo'}`}>{t.icon}</div>
                    {i<TL.length-1&&<div className="tl-line"/>}
                  </div>
                  <div className="tl-body">
                    <div className="tl-day">{t.day}</div>
                    <div className="tl-step">{t.step}</div>
                    <div className="tl-desc">{t.desc}</div>
                    {t.done&&<div className="tl-now">지금 완료됐어요 ✓</div>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{marginTop:16,padding:'14px 16px',background:'#F8F9FA',borderRadius:13,fontSize:13,color:'#6B7684',lineHeight:1.7}}>
              💡 <strong style={{color:'#191F28'}}>견적은 현장 방문 후 산출</strong>됩니다.<br/>건물 상태·면적·시공 범위에 따라 차이가 있어 정밀 진단 후 안내드립니다.
            </div>
            <div className="sbtns">
              <button className="sbtn sbtn-g" onClick={()=>setScreen('log')}>상담일지</button>
              <button className="sbtn sbtn-b" onClick={goHome}>다음 고객 →</button>
            </div>
          </div>
        </div>
      </div>

      {/* ════ LOG ════ */}
      <div className={`screen ${screen==='log'?'active':''}`}>
        <div className="nav">
          <button className="nav-back" onClick={()=>setScreen('success')}>←</button>
          <span className="nav-title">상담일지</span>
        </div>
        <div className="scroll">
          <div className="logwrap">
            <div className="logcard">
              <div className="logtop">POUR솔루션 박람회 CS메모 · {memoDay}</div>
              {[
                ['담당자',memoStaffName],['성함',csName||'-'],['전화',csPhone||'-'],
                ['이메일',csEmail||'-'],['연락방법',csContact.join(' · ')||'-'],
                ['건물유형',building?.label||'-'],['주요문제',csProbs.join(' / ')||'-'],
                ['2차액션',csActions.map(id=>ACTION_TAGS.find(t=>t.id===id)?.label||id).join(', ')||'-'],
              ].map(([k,v])=>(
                <div key={k} className="logrow"><span className="logkey">{k}</span><span className="logval">{v}</span></div>
              ))}
              {csMemo&&<><div className="logdiv"/><div className="logrow"><span className="logkey">메모</span><span className="logval">{csMemo}</span></div></>}
            </div>
            <div className="memo-label">✏️ 추가 메모</div>
            <textarea className="memo-box" placeholder="추가로 기록할 내용..." value={csMemo} onChange={e=>setCsMemo(e.target.value)} rows={4}/>
          </div>
        </div>
        <div className="bottom">
          <button className="btn btn-gray" onClick={goHome}>다음 고객</button>
          <button className="btn btn-blue" onClick={()=>{
            const t=[
              `POUR박람회 CS메모 [${memoDay}·${memoStaffName}]`,
              `성함:${csName}`,`전화:${csPhone||'-'}`,`이메일:${csEmail||'-'}`,
              `연락방법:${csContact.join('·')||'-'}`,
              `건물:${building?.label||'-'}`,`문제:${csProbs.join('/')||'-'}`,
              `액션:${csActions.map(id=>ACTION_TAGS.find(t=>t.id===id)?.label||id).join(',')||'-'}`,
              `메모:${csMemo||'-'}`,
            ].join('\n');
            navigator.clipboard?.writeText(t);alert('복사됐어요!');
          }}>복사하기</button>
        </div>
      </div>

      {/* ════ LEADS ════ */}
      <div className={`screen ${screen==='leads'?'active':''}`}>
        <div className="nav">
          <button className="nav-back" onClick={goHome}>←</button>
          <span className="nav-title">상담 리드</span>
          <div className="nav-right" style={{paddingRight:12}}>
            <span style={{fontSize:12,color:'#8B95A1',fontWeight:700}}>{displayLeads.length}건</span>
          </div>
        </div>
        {staffList.length>0&&(
          <div className="filter-row">
            {['전체',...staffList].map(s=>(
              <button key={s} className={`f-chip ${filterStaff===s?'on':''}`} onClick={()=>setFilterStaff(s)}>{s}</button>
            ))}
          </div>
        )}
        <div className="scroll">
          {displayLeads.length===0?(
            <div className="empty">저장된 상담 내역이 없어요</div>
          ):(
            <div style={{padding:'12px 16px 80px',display:'flex',flexDirection:'column',gap:'10px'}}>
              {displayLeads.map((l,i)=>(
                <div key={l.id||i} className="lead-card">
                  <div className="lead-top">
                    <div style={{display:'flex',alignItems:'center'}}>
                      <div className="lead-num">{i+1}</div>
                      <div className="lead-name">{l.name}</div>
                    </div>
                    <span className="lead-staff-tag">{l.staff} · {l.day}</span>
                  </div>
                  <div className="lead-pills">
                    {l.phone&&<span className="lpill">📞 {l.phone}</span>}
                    {l.email&&<span className="lpill">📧 {l.email}</span>}
                    {l.building&&<span className="lpill blue">{l.building}</span>}
                    {l.contactMethod?.length>0&&<span className="lpill">💬 {l.contactMethod.join('·')}</span>}
                  </div>
                  {l.problems?.length>0&&<div className="lead-probs">🔧 {l.problems.join(' · ')}</div>}
                  {l.actions?.length>0&&<div className="lead-atags">{l.actions.map(a=><span key={a} className="latag">{a}</span>)}</div>}
                  {l.memo&&<div className="lead-memo">"{l.memo}"</div>}
                  <div className="lead-cta">
                    {l.phone&&<a href={`tel:${l.phone}`} className="lcta">📞 전화</a>}
                    {l.phone&&<a href={`sms:${l.phone}`} className="lcta">💬 문자</a>}
                    {l.email&&<a href={`mailto:${l.email}`} className="lcta mail">📧 메일</a>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="bottom">
          <button className="btn btn-gray" onClick={goHome}>홈으로</button>
          <button className="btn btn-blue" onClick={()=>{
            const txt=displayLeads.map((l,i)=>[
              `[${i+1}] ${l.name} (${l.staff}·${l.day})`,
              `전화:${l.phone||'-'} 이메일:${l.email||'-'}`,
              `건물:${l.building} 문제:${l.problems?.join(',')||'-'}`,
              `액션:${l.actions?.join(',')||'-'}`,
              l.memo?`메모:${l.memo}`:'','---'
            ].filter(Boolean).join('\n')).join('\n');
            navigator.clipboard?.writeText(txt);alert(`${displayLeads.length}건 복사됐어요!`);
          }}>전체 복사</button>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
