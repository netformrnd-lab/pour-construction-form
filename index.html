        </div>
        <div className="hdr-div"/>
        <div className="hdr-sub">CS 메모</div>
        <div className="hdr-r"><button className="btn-back" onClick={onBack}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>
      </div>
      <div className="memo-scroll-wrap">
      <div className="memo-scroll" ref={memoScrollRef}>

        {/* 담당자 확인 */}
        <div className="msec">
          <div className="msec-title purple">담당자 확인</div>
          <div className="staff-confirm">
            <div className="sc-left">
              <div className="sc-avatar" style={{background:getColor(memoStaffId)}}>{getAvatar(memoStaffName)}</div>
              <div><div className="sc-name">{memoStaffName||'미선택'}</div><div className="sc-day">{memoDay}</div></div>
            </div>
            <button className="sc-change" onClick={()=>setShowStaffPicker(true)}>변경</button>
          </div>
        </div>

        {/* 컨텍스트 */}
        <div className="msec">
          <div className="msec-title">상담 컨텍스트</div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {building&&<span className="ctx-pill">{building.icon} {building.label}</span>}
            {problem&&<span className="ctx-pill blue">[{problem.cat}] {problem.label}</span>}
          </div>
        </div>

        {/* 주요 문제 (편집 가능) */}
        <div className="msec">
          <div className="msec-title">주요 문제 <span style={{fontWeight:400,color:'var(--border)',fontSize:11,letterSpacing:0,textTransform:'none'}}>(복수 선택)</span></div>
          <div className="chip-wrap">
            {ALL_PROBLEMS.map(p=>(
              <button key={p.id} className={`chip ${csProbs.includes(p.label)?'on':''}`} onClick={()=>toggle(csProbs,setCsProbs,p.label)}>{p.label}</button>
            ))}
          </div>
        </div>

        {/* 고객 정보 */}
        <div className="msec">
          <div className="msec-title">고객 정보 <span style={{color:'var(--blue)',fontWeight:700,fontSize:11,letterSpacing:0,textTransform:'none'}}>* 전화 또는 이메일 필수</span></div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:8}}>
              <input className="minput" placeholder="성함 *" value={csName} onChange={e=>setCsName(e.target.value)}/>
              <div style={{position:'relative'}}>
                <button className="minput" style={{textAlign:'left',cursor:'pointer',color:csPosition?'var(--text)':'var(--text-sm)',position:'relative',paddingRight:28}} onClick={()=>setCsShowPosition(!csShowPosition)}>{csPosition||'직급'}<span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:10,color:'var(--text-sm)'}}>▼</span></button>
                {csShowPosition&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid var(--border)',borderRadius:9,boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:10,overflow:'hidden',marginTop:2,maxHeight:200,overflowY:'auto'}}>
                  {getPositions(building?.id).map(p=>(
                    <button key={p} onClick={()=>{setCsPosition(p);setCsShowPosition(false);}} style={{width:'100%',padding:'10px 14px',border:'none',background:csPosition===p?'var(--blue-l)':'#fff',color:csPosition===p?'var(--blue)':'var(--text)',fontSize:13,fontWeight:csPosition===p?700:500,cursor:'pointer',fontFamily:'inherit',textAlign:'left',borderBottom:'1px solid var(--border-s)'}}>{p}</button>
                  ))}
                </div>}
              </div>
            </div>
            <input className="minput" placeholder="전화번호" value={csPhone} onChange={e=>setCsPhone(e.target.value)} inputMode="tel"/>
            <input className="minput" placeholder="이메일 (선택)" value={csEmail} onChange={e=>setCsEmail(e.target.value)} inputMode="email"/>
          </div>
        </div>

        {/* 연락 방법 */}
        <div className="msec">
          <div className="msec-title">선호 연락 방법</div>
          <div className="chip-wrap">
            {['문자','전화','이메일','카카오톡'].map(m=>(
              <button key={m} className={`chip ${csContact.includes(m)?'on':''}`} onClick={()=>toggle(csContact,setCsContact,m)}>{m}</button>
            ))}
          </div>
        </div>

        {/* 영업사원 전용 */}
        <div className="msec" style={{background:'var(--purple-l)',border:'1.5px solid var(--purple-m)'}}>
          <div className="msec-title purple">영업사원 메모 <span style={{fontWeight:400,fontSize:11,color:'#A78BFA',textTransform:'none',letterSpacing:0}}>(상담 후 추가 가능)</span></div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
            {ACTION_TAGS.map(t=>(
              <button key={t.id} className={`atag ${csActions.includes(t.id)?'on':''}`} onClick={()=>toggle(csActions,setCsActions,t.id)}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
          <div style={{fontSize:12,fontWeight:700,color:'var(--purple)',marginBottom:7}}>현장 메모</div>
          <textarea className="minput" style={{borderColor:'var(--purple-m)'}} rows={3} placeholder="고객 반응, 특이사항, 후속 참고사항..." value={csMemo} onChange={e=>setCsMemo(e.target.value)}/>
        </div>
      </div>
      <ScrollRail scrollRef={memoScrollRef}/>
      </div>

      {/* 저장 확인 모달 */}
      {saveConfirm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setSaveConfirm(false)}>
          <div style={{background:'#fff',borderRadius:16,padding:'28px 24px',width:'min(320px,85vw)',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:36,marginBottom:12}}>💾</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:6}}>저장하시겠습니까?</div>
            <div style={{fontSize:13,color:'var(--text-md)',marginBottom:20,lineHeight:1.5}}>입력한 상담 메모를 저장합니다</div>
            <div style={{display:'flex',gap:10}}>
              <button style={{flex:1,padding:'13px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--bg)',fontSize:14,fontWeight:700,color:'var(--text-md)',cursor:'pointer',fontFamily:'inherit'}} onClick={()=>setSaveConfirm(false)}>취소</button>
              <button style={{flex:2,padding:'13px 0',borderRadius:10,border:'none',background:'var(--blue)',fontSize:14,fontWeight:800,color:'#fff',cursor:'pointer',fontFamily:'inherit'}} onClick={()=>{setSaveConfirm(false);save();}} disabled={saving}>{saving?'저장 중...':'저장하기'}</button>
            </div>
          </div>
        </div>
      )}

      <div className="bottom-bar">
        <button className="btn btn-outline btn-lg" style={{flex:1}} onClick={onBack}>취소</button>
        <button className="btn btn-blue btn-lg" style={{flex:2}} onPointerDown={e=>{if(e.pointerType==='touch'&&isPenActive()){e.preventDefault();e.stopPropagation();}}} onClick={()=>{if(isPenActive())return;setSaveConfirm(true);}} disabled={saving}>{saving?'저장 중...':'저장하기'}</button>
      </div>
    </div>
  );
}

/* ── Solution Screen ── */
function SolutionScreen({building,problem,staffId,staffName,staffDay,onBack,onNewCustomer,visible,externalNote,onExternalNote}){
  /* ── 모든 useState 최상단 선언 (React 훅 규칙) ── */
  const [qr,setQr]=useState(null);
  const [zoomPhoto,setZoomPhoto]=useState(null);
  const [subScreen,setSubScreen]=useState('main');
  const [contactDone,setContactDone]=useState(false);
  const [memo,setMemo]=useState('');
  const [savedCSData,setSavedCSData]=useState(null);
  const [showNote,setShowNote]=useState(false);
  const [ntName,setNtName]=useState('');
  const [ntCompany,setNtCompany]=useState('');
  const [ntPosition,setNtPosition]=useState('');
  const [ntShowPosition,setNtShowPosition]=useState(false);
  const [ntPhone,setNtPhone]=useState('');
  const [ntEmail,setNtEmail]=useState('');
  const [ntContact,setNtContact]=useState([]);
  const [ntInterests,setNtInterests]=useState([]);
  const [ntDeliveryDocs,setNtDeliveryDocs]=useState([]);
  const [ntDeliveryMedia,setNtDeliveryMedia]=useState([]);
  const [ntMemo,setNtMemo]=useState('');
  const [ntSaving,setNtSaving]=useState(false);
  const [ntDone,setNtDone]=useState(false);
  const [ntPencilMode,setNtPencilMode]=useState(true);
  const [ntMemoImgs,setNtMemoImgs]=useState([]);
  const ntMemoRef=useRef(null);
  useEffect(()=>{if(!ntPencilMode&&ntMemoRef.current){ntMemoRef.current.focus();}},[ntPencilMode]);
  const [ntOpenSec,setNtOpenSec]=useState(new Set([]));
  const [ntBizCard,setNtBizCard]=useState({front:null,back:null});
  const ntBizCardOpenRef=useRef(null);
  const [ntQuickSms,setNtQuickSms]=useState(false);
  const [ntSmsText,setNtSmsText]=useState('');
  const [ntSmsSending,setNtSmsSending]=useState(false);

  const ntToggleSec=sec=>setNtOpenSec(p=>{const n=new Set(p);n.has(sec)?n.delete(sec):n.add(sec);return n;});
  const ntHasData=()=>!!(ntName||ntCompany||ntPhone||ntEmail||ntMemo||ntInterests.length||ntContact.length||ntBizCard?.front);
  const ntSafeClose=()=>{if(ntHasData()&&!window.confirm('입력한 내용이 저장되지 않았습니다. 닫으시겠어요?'))return;setShowNote(false);};
  const [effectiveBuildingId,setEffectiveBuildingId]=useState(building?.id||null);
  const [casePhotos,setCasePhotos]=useState(()=>loadCasePhotos());
  useEffect(()=>{syncPhotosFromFirestore(setCasePhotos,null);},[]);

  if(externalNote&&!showNote){setShowNote(true);if(onExternalNote)onExternalNote(false);}
  if(!problem) return null;

  // 새 구조: problem 자체가 공법 정보를 담고 있음
  const guide=problem.guideId?GUIDES.find(g=>g.id===problem.guideId):null;
  const photos=casePhotos[problem.id]||{causes:['','',''],completed:'',gif:''};
  const today=new Date();
  const dateStr=`2026년 4월 ${today.getDate()<=18?today.getDate():'__'}일`;

  const toggleNt=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);

  const saveNote=async()=>{
    if(!ntName.trim()||!ntPhone.trim()){alert('성함과 전화번호를 입력해주세요');return;}
    setNtSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:staffDay,staffId,staff:staffName,
      name:ntName,company:ntCompany,position:ntPosition,
      phone:ntPhone,email:ntEmail,contactMethod:ntContact,
      building:building?.label||'-',buildingId:building?.id||'-',
      problem:problem?.label||'-',problemCat:problem?.cat||'-',
      problems:[problem?.label].filter(Boolean),
      method:problem?.label||'-',
      interests:ntInterests,
      deliveryDocs:ntDeliveryDocs,
      deliveryMedia:ntDeliveryMedia,
      businessCard:ntBizCard,
      memo:ntMemo,memoImgs:ntMemoImgs,status:'신규',
    };
    try{await db.collection('leads').add(data);}catch(e){console.warn(e);}
    // 자동 SMS 발송 (fire-and-forget)
    const smsCfg=loadSolapiConfig();
    if(smsCfg.workerUrl){
      const smsData={name:ntName,phone:ntPhone,building:building?.label||'-',problem:problem?.label||'-',staff:staffName,staffId,company:ntCompany,position:ntPosition,buildingType:building?.label||'-',datetime:dateStr};
      if(smsCfg.autoCustomer!==false&&ntPhone){
        sendSMS(ntPhone,fillTemplate(loadSmsTemplates().customerThank,smsData)).catch(()=>{});
      }
      if(smsCfg.autoStaff!==false){
        const sp=loadStaffList().find(s=>s.id===staffId)?.phone;
        if(sp)sendSMS(sp,fillTemplate(loadSmsTemplates().staffNotify,smsData)).catch(()=>{});
      }
    }
    setNtSaving(false);setNtDone(true);
  };
  const ntResetAndClose=()=>{
    setShowNote(false);setNtDone(false);setNtQuickSms(false);
    setNtName('');setNtCompany('');setNtPosition('');
    setNtPhone('');setNtEmail('');setNtContact([]);
    setNtInterests([]);setNtDeliveryDocs([]);setNtDeliveryMedia([]);
    setNtMemo('');setNtMemoImgs([]);
  };

  const logText=[
    `박람회: 공동주택관리산업박람회 (벡스코)`,`상담일시: ${dateStr}`,``,
    `건물유형: ${building?.label||'-'} (${building?.sub||'-'})`,
    `주요 문제: [${problem.cat}] ${problem.label}`,
    `추천 공법: ${problem.label}`,
    `시방서: ${problem.specUrl}`,`시공사례: ${problem.caseUrl||''}`,``,
    `다음 액션: □ 방문진단  □ 시방서 전달  □ 회사소개서`,
    `특이사항: ${memo||'(없음)'}`,
  ].join('\n');

                <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:6,scrollSnapType:'x mandatory',WebkitOverflowScrolling:'touch'}}>
                  {(photos.causes||[]).filter(s=>s).map((src,i)=>(
                    <div key={i} style={{flex:'0 0 92%',scrollSnapAlign:'start',borderRadius:12,overflow:'hidden',border:'1.5px solid var(--border)',background:'#000',position:'relative',aspectRatio:'16/10',cursor:'pointer'}} onClick={()=>setZoomPhoto({src,alt:`현장사진 ${i+1}`})}>
                      <img src={src} alt={`현장사진${i+1}`} style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}/>
                      <span style={{position:'absolute',bottom:6,left:8,padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:800,background:'rgba(0,0,0,.6)',color:'#fff'}}>현장 {i+1}</span>
                      <span style={{position:'absolute',top:6,right:8,padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:700,background:'rgba(0,0,0,.5)',color:'#fff'}}>🔍 확대</span>
                    </div>
                  ))}
                </div>
              ):(
                <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:6}}>
                  {['','',''].map((_,i)=>(
                    <div key={i} style={{flex:'0 0 60%',borderRadius:12,border:'1.5px dashed var(--border)',background:'var(--bg)',aspectRatio:'16/10',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
                      <span style={{fontSize:22,opacity:.2}}>📷</span>
                      <span style={{fontSize:10,color:'var(--text-sm)',fontWeight:600}}>관리자에서 추가</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── 2. GIF / 동영상 미디어 ── */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:8}}>🎬 시공 과정</div>
              {(photos?.gif||problem.gifUrl)?(
                <div style={{borderRadius:12,overflow:'hidden',border:'1.5px solid var(--border)',background:'#000',position:'relative',maxHeight:400}}>
                  <img src={photos?.gif||problem.gifUrl} alt="시공 과정 GIF" style={{width:'100%',maxHeight:400,objectFit:'contain',display:'block',imageRendering:'auto'}}/>
                </div>
              ):(
                <div style={{borderRadius:12,border:'1.5px dashed var(--border)',background:'var(--bg)',aspectRatio:'16/9',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6}}>
                  <span style={{fontSize:28,opacity:.2}}>🎬</span>
                  <span style={{fontSize:10,color:'var(--text-sm)',fontWeight:600}}>관리자에서 GIF/영상 추가</span>
                </div>
              )}
            </div>

            {/* ── 3. 공법 태그 ── */}
            {problem.tags&&problem.tags.length>0&&(
              <div style={{marginBottom:16}}>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {problem.tags.map((t,i)=>(
                    <span key={i} style={{padding:'4px 10px',borderRadius:20,background:'var(--bg)',border:'1px solid var(--border)',fontSize:11,fontWeight:600,color:'var(--text-md)'}}>{t}</span>
                  ))}
                </div>
              </div>
            )}

            {/* ── 4. 완공사진 ── */}
            {photos?.completed&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:8}}>✅ 완공사진</div>
                <div style={{borderRadius:12,overflow:'hidden',border:'1.5px solid var(--border)',position:'relative',aspectRatio:'16/10',background:'#000',cursor:'pointer'}} onClick={()=>setZoomPhoto({src:photos.completed,alt:'완공사진'})}>
                  <img src={photos.completed} style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}/>
                  <span style={{position:'absolute',top:6,left:6,padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:800,background:'rgba(5,150,105,.85)',color:'#fff'}}>완공사진</span>
                  <span style={{position:'absolute',top:6,right:6,padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:700,background:'rgba(0,0,0,.5)',color:'#fff'}}>🔍 확대</span>
                </div>
              </div>
            )}

            {/* ── 5. 자료 바로가기 — 제안서/시방서, 가이드북, 시공사례 ── */}
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:10}}>📱 자료 바로가기 · QR 전달</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
              {[
                {label:'시방서',icon:'📄',url:problem.specUrl,qrTitle:'시방서'},
                {label:'가이드북',icon:'📖',url:guide?guide.url:'',qrTitle:'가이드북',empty:!guide},
                {label:'시공사례',icon:'🏗',url:problem.caseUrl||'',qrTitle:'시공사례',empty:!problem.caseUrl},
              ].map(l=>(
                <div key={l.label} style={{background:l.empty?'var(--bg)':'var(--card)',border:'1.5px solid var(--border)',borderRadius:12,overflow:'hidden',display:'flex',flexDirection:'column',opacity:l.empty?.4:1}}>
                  {l.empty
                    ?<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,padding:'14px 6px 10px'}}>
                      <span style={{fontSize:24,opacity:.3}}>{l.icon}</span>
                      <span style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',textAlign:'center'}}>준비 중</span>
                    </div>
                    :<a href={l.url} target="_blank" rel="noreferrer"
                      style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,padding:'14px 6px 10px',textDecoration:'none'}}>
                      <span style={{fontSize:24}}>{l.icon}</span>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--text)',textAlign:'center'}}>{l.label}</span>
                    </a>
                  }
                  {!l.empty&&<button onClick={()=>setQr({url:l.url,title:l.qrTitle})}
                    style={{width:'100%',padding:'8px 0',border:'none',borderTop:'1px solid var(--border)',background:'var(--accent-l)',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                    <span style={{fontSize:14}}>📱</span>
                    <span style={{fontSize:9,fontWeight:800,color:'var(--accent)'}}>QR</span>
                  </button>}
                </div>
              ))}
            </div>

            {/* ── 6. 제안서 바로보기 (PDF/링크) ── */}
            {problem.proposalUrl&&(
              <div style={{marginBottom:16}}>
                <a href={problem.proposalUrl} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',background:'var(--navy)',borderRadius:12,textDecoration:'none',border:'1px solid rgba(255,255,255,.1)'}}>
                  <span style={{fontSize:24}}>📋</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:800,color:'#fff'}}>제안서 바로보기</div>
                    <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:2}}>고객에게 바로 보여주세요</div>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:'var(--blue-m)'}}>열기 →</span>
                </a>
              </div>
            )}
        </>
      </div>

      {/* ── 통합 영업 노트 시트 ── */}
      {showNote&&(
        <div className="sheet-bg" onClick={()=>setShowNote(false)}>
          <div className="note-sheet" onClick={e=>e.stopPropagation()}>

            {ntDone?(
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 20px 40px'}}>
                <div style={{fontSize:44,marginBottom:10}}>✅</div>
                <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>영업 메모 저장됐어요!</div>
                <div style={{fontSize:13,color:'var(--text-sm)',marginBottom:20}}>{ntName}님 · {staffName} · {staffDay}</div>
                {!ntQuickSms?(
                  <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',maxWidth:300}}>
                    {ntPhone&&loadSolapiConfig().workerUrl&&(
                      <button onClick={()=>{const tpls=loadSmsTemplates();const vars={name:ntName,building:building?.label||'-',problem:problem?.label||'-',staff:staffName,phone:ntPhone,company:ntCompany,position:ntPosition,buildingType:building?.label||'-',datetime:dateStr};setNtSmsText(fillTemplate(tpls.customerThank,vars));setNtQuickSms(true);}}
                        style={{padding:'14px 20px',borderRadius:12,border:'none',background:'var(--blue)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
                        💬 바로 문자 보내기
                      </button>
                    )}
                    <button onClick={ntResetAndClose}
                      style={{padding:'12px 20px',borderRadius:12,border:'1.5px solid var(--border)',background:'#fff',color:'var(--text-md)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                      닫기
                    </button>
                  </div>
                ):(
                  <div style={{width:'100%',maxWidth:360,padding:'0 10px'}}>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:6}}>수신: <span style={{color:'var(--blue)'}}>{ntPhone}</span> ({ntName})</div>
                    <textarea value={ntSmsText} onChange={e=>setNtSmsText(e.target.value)}
                      style={{width:'100%',minHeight:100,padding:'12px 14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:13,lineHeight:1.7,color:'var(--text)',fontFamily:'inherit',resize:'none',outline:'none',boxSizing:'border-box'}}/>
                    <div style={{fontSize:10,color:'var(--text-sm)',margin:'6px 0 12px'}}>{ntSmsText.length}자 {ntSmsText.length>90?'(LMS)':'(SMS)'}</div>
                    <div style={{display:'flex',gap:10}}>
                      <button onClick={ntResetAndClose}
                        style={{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--bg)',fontSize:13,fontWeight:700,color:'var(--text-md)',cursor:'pointer',fontFamily:'inherit'}}>
                        건너뛰기
                      </button>
                      <button onClick={async()=>{if(!ntPhone)return;setNtSmsSending(true);const r=await sendSMS(ntPhone,ntSmsText);setNtSmsSending(false);if(r.success){setNtQuickSms(false);ntResetAndClose();}else{alert('발송 실패: '+(typeof r.error==='string'?r.error:JSON.stringify(r.error)));}}} disabled={ntSmsSending}
                        style={{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'var(--blue)',fontSize:14,fontWeight:800,color:'#fff',cursor:'pointer',fontFamily:'inherit',opacity:ntSmsSending?.6:1}}>
                        {ntSmsSending?'발송 중...':'발송하기'}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ):(
              <>
                {/* ── 헤더 ── */}
                <div className="note-sheet-head" style={{borderBottom:'1px solid var(--border)',paddingBottom:10}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontSize:16,fontWeight:900,color:'var(--text)'}}>📝 영업 메모</span>
                      <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 10px',background:'var(--purple-l)',borderRadius:20}}>
                        <div style={{width:20,height:20,borderRadius:'50%',background:getColor(staffId),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff'}}>{getAvatar(staffName)}</div>
                        <span style={{fontSize:12,fontWeight:700,color:'var(--purple)'}}>{staffName}</span>
                        <span style={{fontSize:11,color:'var(--text-sm)'}}>· {staffDay}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <button onClick={()=>ntBizCardOpenRef.current?.()} style={{padding:'5px 10px',borderRadius:8,border:'1.5px solid var(--border)',background:'var(--bg)',fontSize:12,fontWeight:700,color:'var(--text)',cursor:'pointer',display:'flex',alignItems:'center',gap:3}}>📇 명함</button>
                      <button className="note-head-save" onPointerDown={e=>{if(e.pointerType==='touch'&&isPenActive()){e.preventDefault();e.stopPropagation();}}} onClick={e=>{if(isPenActive())return;saveNote();}} disabled={ntSaving}>{ntSaving?'저장 중...':'저장하기'}</button>
                      <button onClick={ntSafeClose} style={{width:32,height:32,borderRadius:'50%',border:'none',background:'var(--bg)',color:'var(--text-md)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                    </div>
                  </div>
                  <div className="note-ctx" style={{marginTop:8,marginBottom:0}}>
                    <div className="note-ctx-row">
                      {building?<span className="note-ctx-tag">{building?.label}</span>:<span className="note-ctx-tag" style={{opacity:.5}}>건물 미선택</span>}
                      {problem?.cat&&<span className="note-ctx-tag">{problem.cat}</span>}
                      {problem?.label&&<span className="note-ctx-tag">{problem.label}</span>}
                    </div>
                    {problem?.label&&<div className="note-ctx-method">→ {problem.label}</div>}
                  </div>
                </div>

                {/* 명함 촬영 (헤더 버튼용 - 숨김) */}
                <div style={{position:'absolute',left:'-9999px'}}><BusinessCardCapture onCapture={(side,img)=>setNtBizCard(p=>({...p,[side]:img}))} openRef={ntBizCardOpenRef}/></div>

                {/* ── 본문 ── */}
                <div style={{display:'flex',flex:1,overflow:'hidden'}}>
                <div className="note-sheet-scroll" style={{flex:1,minWidth:0}}>

                  {/* 고객 정보 */}
                  <div style={{padding:'12px 0 8px',flexShrink:0}}>
                    <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>고객 정보</div>
                    <input className="note-input" style={{marginBottom:6,fontSize:13}} placeholder="건물명 또는 업체명" value={ntCompany} onChange={e=>setNtCompany(e.target.value)}/>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}}>
                      {BUILDING_TYPES.map(b=>(
                        <button key={b.id} onClick={()=>{if(effectiveBuildingId===b.id){setEffectiveBuildingId(null);}else{setEffectiveBuildingId(b.id);setNtPosition('');}}}
                          style={{padding:'4px 10px',borderRadius:20,border:`1.5px solid ${effectiveBuildingId===b.id?'var(--navy)':'var(--border)'}`,background:effectiveBuildingId===b.id?'var(--navy)':'#fff',color:effectiveBuildingId===b.id?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                          {b.icon} {b.label}
                        </button>
                      ))}
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 2fr',gap:5}}>
                      <input className="note-input" style={{fontSize:13}} placeholder="성함 *" value={ntName} onChange={e=>setNtName(e.target.value)}/>
                      <div style={{position:'relative'}}>
                        <button className="note-input" style={{fontSize:13,textAlign:'left',cursor:'pointer',color:ntPosition?'var(--text)':'var(--text-sm)'}} onClick={()=>setNtShowPosition(!ntShowPosition)}>{ntPosition||'직급'}<span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:10,color:'var(--text-sm)'}}>▼</span></button>
                        {ntShowPosition&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid var(--border)',borderRadius:9,boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:10,overflow:'hidden',marginTop:2}}>
                          {getPositions(effectiveBuildingId).map(p=>(
                            <button key={p} onClick={()=>{setNtPosition(p);setNtShowPosition(false);}} style={{width:'100%',padding:'10px 14px',border:'none',background:ntPosition===p?'var(--blue-l)':'#fff',color:ntPosition===p?'var(--blue)':'var(--text)',fontSize:13,fontWeight:ntPosition===p?700:500,cursor:'pointer',fontFamily:'inherit',textAlign:'left',borderBottom:'1px solid var(--border-s)'}}>{p}</button>
                          ))}
                        </div>}
                      </div>
                      <input className="note-input" style={{fontSize:13}} placeholder="연락처 *" value={ntPhone} onChange={e=>setNtPhone(e.target.value)} inputMode="tel"/>
                    </div>
                  </div>

                  {/* 아코디언 옵션들 (연락 방법 / 후속 조치) */}
                  <div style={{marginBottom:10,border:'1px solid var(--border)',borderRadius:9,overflow:'hidden'}}>
                    {/* 연락 방법 */}
                    <div className="acc-row">
                      <button className="acc-head" onClick={()=>ntToggleSec('contact')}>
                        <div className="acc-head-left">
                          <span className="acc-head-title">📞 연락 방법</span>
                          {ntContact.length>0&&<span className="acc-badge">{ntContact.join('·')}</span>}
                        </div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:ntOpenSec.has('contact')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                      </button>
                      {ntOpenSec.has('contact')&&(
                        <div className="acc-body">
                          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                            {['문자','전화','이메일','카카오톡'].map(m=>(
                              <button key={m} className={`note-chip ${ntContact.includes(m)?'on':''}`} style={{fontSize:13,padding:'7px 14px'}} onClick={()=>toggleNt(ntContact,setNtContact,m)}>{m}</button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                    {/* 후속 조치 */}
                    <div className="acc-row" style={{borderBottom:'none'}}>
                      <button className="acc-head" onClick={()=>ntToggleSec('delivery')}>
                        <div className="acc-head-left">
                          <span className="acc-head-title">📬 후속 조치</span>
                          {(ntDeliveryDocs.length+ntDeliveryMedia.length)>0&&<span className="acc-badge">{ntDeliveryDocs.length+ntDeliveryMedia.length}건</span>}
                        </div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:ntOpenSec.has('delivery')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                      </button>
                      {ntOpenSec.has('delivery')&&(
                        <div className="acc-body">
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>전달할 자료</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
                            {DELIVERY_DOCS.map(d=>(
                              <button key={d} onClick={()=>toggleNt(ntDeliveryDocs,setNtDeliveryDocs,d)}
                                style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${ntDeliveryDocs.includes(d)?'var(--accent)':'var(--border)'}`,background:ntDeliveryDocs.includes(d)?'var(--accent-l)':'#fff',color:ntDeliveryDocs.includes(d)?'var(--accent)':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                                {d}
                              </button>
                            ))}
                          </div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>전달 매체</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                            {DELIVERY_MEDIA.map(m=>(
                              <button key={m} onClick={()=>toggleNt(ntDeliveryMedia,setNtDeliveryMedia,m)}
                                style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${ntDeliveryMedia.includes(m)?'#059669':'var(--border)'}`,background:ntDeliveryMedia.includes(m)?'#D1FAE5':'#fff',color:ntDeliveryMedia.includes(m)?'#065F46':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                                {m}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* 입력 모드 토글 */}
                  <div style={{marginBottom:8,flexShrink:0}}>
                    <div className="mode-toggle">
                      <button className={`mode-btn ${!ntPencilMode?'on':''}`} onClick={()=>setNtPencilMode(false)}>⌨️ 키보드 입력</button>
                      <button className={`mode-btn ${ntPencilMode?'on':''}`} onClick={()=>setNtPencilMode(true)}>✏️ 펜슬 낙서</button>
                    </div>
                  </div>

                  {/* 상담 메모 */}
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>상담 메모</div>
                    {ntPencilMode
                      ?<DrawCanvas onDataUrl={setNtMemoImgs}/>
                      :<textarea
                        className="note-memo"
                        style={{resize:'none',minHeight:300,width:'100%',fontSize:15,lineHeight:'1.85'}}
                        placeholder="고객 반응, 특이사항, 요청사항..."
                        ref={ntMemoRef}
                        value={ntMemo} onChange={e=>setNtMemo(e.target.value)}
                      />
                    }
                  </div>

                </div>{/* 본문 끝 */}
                <div className="pencil-scroll-zone" style={{minHeight:'auto'}}>
                  <span className="pencil-scroll-label">손으로 터치하여 스크롤</span>
                </div>
                </div>{/* flex wrapper 끝 */}
              </>
            )}
          </div>
        </div>
      )}


    </div>
  );
}

/* ── Leads Screen ── */
function  LeadsScreen({onBack}){
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterStaff,setFilterStaff]=useState('전체');
  const [staffList,setStaffList]=useState([]);
  const [expandedId,setExpandedId]=useState(null);

        <div className="hdr-div"/><div className="hdr-sub">상담 유입</div>
        <div className="hdr-r">
          <span style={{fontSize:12,color:'rgba(255,255,255,.5)',fontWeight:700}}>{display.length}건</span>
          <button className="btn-back" onClick={onBack}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button>
        </div>
      </div>
      {staffList.length>0&&(
        <div className="filter-row">
          {['전체',...staffList].map(s=>(
            <button key={s} className={`f-chip ${filterStaff===s?'on':''}`} onClick={()=>setFilterStaff(s)}>{s}</button>
          ))}
        </div>
      )}
      <div className="leads-scroll">
        {loading&&<div style={{padding:'40px',textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>}
        {!loading&&display.length===0&&<div className="empty">저장된 상담 내역이 없어요</div>}
        {display.map((l,i)=>{
          const isOpen=expandedId===(l.id||i);
          const hasMemo=l.memo||l.memoImgs?.length>0;
          return(
          <div key={l.id||i} className="lead-card" style={{padding:0,overflow:'hidden'}}>
            {/* 헤더 — 항상 표시 */}
            <div style={{padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:8}} onClick={()=>setExpandedId(isOpen?null:(l.id||i))}>
              <div className="lead-num">{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span className="lead-name" style={{margin:0}}>{l.name}</span>
                  {l.phone&&<span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>{l.phone}</span>}
                </div>
                <div style={{fontSize:11,color:'var(--text-sm)',fontWeight:600,marginTop:1}}>
                  {l.staff} · {l.day}{l.building?` · ${l.building}`:''}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                {hasMemo&&<span style={{fontSize:10,background:'#FEF3C7',color:'#92400E',padding:'2px 6px',borderRadius:8,fontWeight:700}}>메모</span>}
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-sm)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:isOpen?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s'}}><path d="M6 9l6 6 6-6"/></svg>
              </div>
            </div>
            {/* 펼쳐진 상세 */}
            {isOpen&&(
              <div style={{borderTop:'1px solid var(--border)',padding:'10px 14px',display:'flex',flexDirection:'column',gap:8}}>
                <div className="lead-pills" style={{margin:0}}>
                  {l.phone&&<span className="lpill">📞 {l.phone}</span>}
                  {l.email&&<span className="lpill">📧 {l.email}</span>}
                  {l.building&&<span className="lpill blue">{l.building}</span>}
                  {l.contactMethod?.length>0&&<span className="lpill">💬 {l.contactMethod.join('·')}</span>}
                </div>
                {l.problems?.length>0&&<div className="lead-prob" style={{margin:0}}>🔧 {l.problems.join(' · ')}</div>}
                {l.actions?.length>0&&<div className="lead-atags" style={{margin:0}}>{l.actions.map(a=><span key={a} className="latag">{a}</span>)}</div>}
                {hasMemo&&(
                  <div className="lead-memo" style={{padding:'8px 10px',background:'#FFFBEB',borderRadius:8,border:'1px solid #FDE68A',fontStyle:'normal'}}>
                    {l.memo&&<div style={{fontSize:12,lineHeight:1.5,marginBottom:l.memoImgs?.length>0?6:0}}>"{l.memo}"</div>}
                    {l.memoImgs?.map((img,pi)=>(
                      <div key={pi} style={{marginBottom:pi<l.memoImgs.length-1?6:0}}>
                        {l.memoImgs.length>1&&<div style={{fontSize:9,fontWeight:700,color:'#B45309',marginBottom:2}}>{pi+1}페이지</div>}
                        <img src={img} alt={`펜슬 메모 ${pi+1}p`} style={{width:'100%',borderRadius:6,display:'block'}}/>
                      </div>
                    ))}
                  </div>
                )}
                <div className="lead-cta" style={{margin:0}}>
                  {l.phone&&<a href={`tel:${l.phone}`} className="lcta">📞 전화</a>}
                  {l.phone&&<button className="lcta" onClick={()=>setSmsTarget({phone:l.phone,name:l.name,building:l.building,problem:l.problem,staff:l.staff})}>💬 솔라피</button>}
                  {l.phone&&<a href={`sms:${l.phone}`} className="lcta">💬 기본</a>}
                  {l.email&&<a href={`mailto:${l.email}`} className="lcta mail">📧 메일</a>}
                </div>
              </div>
            )}
          </div>
          );
        })}
      </div>
      <div className="bottom-bar">
        <button className="btn btn-outline btn-lg" onClick={onBack}>홈으로</button>
        <button className="btn btn-navy btn-lg" style={{flex:1}} onClick={()=>{

}

/* ── 명함 촬영 컴포넌트 ── */
function BusinessCardCapture({onCapture,openRef}){
  const [frontImg,setFrontImg]=useState(null);
  const [backImg,setBackImg]=useState(null);
  const [camOpen,setCamOpen]=useState(false);
  const [camSide,setCamSide]=useState('front'); // 'front' or 'back'
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const canvasRef=useRef(null);

  const openCam=(side)=>{
    setCamSide(side);setCamOpen(true);
    setTimeout(()=>{
      navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}})
        .then(stream=>{streamRef.current=stream;if(videoRef.current)videoRef.current.srcObject=stream;})
        .catch(e=>{alert('카메라 접근 권한이 필요합니다');setCamOpen(false);});
    },100);
  };
  useEffect(()=>{if(openRef)openRef.current=()=>openCam('front');},[]);
  const closeCam=()=>{
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current=null;setCamOpen(false);
  };
  const capture=()=>{
    const video=videoRef.current;if(!video)return;
    const c=canvasRef.current||document.createElement('canvas');
    canvasRef.current=c;
    c.width=video.videoWidth;c.height=video.videoHeight;
    const ctx=c.getContext('2d');ctx.drawImage(video,0,0);
    const dataUrl=c.toDataURL('image/jpeg',0.85);
    if(camSide==='front'){setFrontImg(dataUrl);if(onCapture)onCapture('front',dataUrl);}
    else{setBackImg(dataUrl);if(onCapture)onCapture('back',dataUrl);}
    closeCam();
    // 앞면 촬영 직후 뒷면 안내
    if(camSide==='front'&&!backImg){
      setTimeout(()=>{if(confirm('뒷면도 촬영하시겠어요?'))openCam('back');},400);
    }
  };
  const removeFront=()=>{setFrontImg(null);if(onCapture)onCapture('front',null);};
  const removeBack=()=>{setBackImg(null);if(onCapture)onCapture('back',null);};

  return(
    <>
      {(frontImg||backImg)?(
        <div className="bc-preview-row">
          {frontImg&&<div className="bc-preview-card">
            <img src={frontImg} alt="앞면"/>
            <span className="bc-preview-label">앞면</span>
            <button className="bc-preview-del" onClick={removeFront}>✕</button>
          </div>}
          {backImg&&<div className="bc-preview-card">
            <img src={backImg} alt="뒷면"/>
            <span className="bc-preview-label">뒷면</span>
            <button className="bc-preview-del" onClick={removeBack}>✕</button>
          </div>}
          {!backImg&&<button className="bc-preview-card" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:80,cursor:'pointer',border:'1.5px dashed var(--border)'}} onClick={()=>openCam('back')}>
            <div style={{textAlign:'center',padding:10}}><div style={{fontSize:20,marginBottom:4}}>📸</div><div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>뒷면 촬영</div></div>
          </button>}
          {frontImg&&!backImg&&null}
          <button style={{position:'absolute',right:4,bottom:4,fontSize:10,background:'none',border:'none',color:'var(--blue)',fontWeight:700,cursor:'pointer',padding:4}} onClick={()=>openCam('front')}>앞면 재촬영</button>
        </div>
      ):(
        <button className="bc-btn" onClick={()=>openCam('front')}>
          <span className="bc-btn-icon">📇</span>
          <div><div className="bc-btn-text">명함 촬영</div><div className="bc-btn-sub">앞면 필수 · 뒷면 선택</div></div>
        </button>
      )}

      {camOpen&&(
        <div className="bc-cam-overlay">
          <div className="bc-cam-header">
            <span className="bc-cam-header-title">명함 {camSide==='front'?'앞면':'뒷면'} 촬영</span>
            <button className="bc-cam-close" onClick={closeCam}>✕</button>
          </div>
          <div className="bc-cam-body">
            <video ref={videoRef} className="bc-cam-video" autoPlay playsInline muted/>
            <div className="bc-cam-guide" style={{width:'80%',aspectRatio:'9/5',top:'50%',left:'10%',transform:'translateY(-50%)'}}>
              <span className="bc-cam-guide-label">명함을 테두리 안에 맞춰주세요</span>
            </div>
          </div>
          <div className="bc-cam-footer">
            <button className="bc-cam-shutter" onClick={capture}/>
          </div>
        </div>
      )}
    </>
  );
}

/* ── 기술연구소: 기술/MOU 상담 메모 ── */

}

/* ── 그로홈: 영업 메모 시트 (간소화) ── */
function GrohomeNoteSheet({staffId,staffName,staffDay,grohomeCat,onClose}){
  const [name,setName]=useState('');
  const [phone,setPhone]=useState('');
  const [actions,setActions]=useState([]);
  const [memo,setMemo]=useState('');
  const [pencilMode,setPencilMode]=useState(true);
  const [memoImgs,setMemoImgs]=useState([]);
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const memoRef=useRef(null);
  const toggle=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const hasData=()=>!!(name||phone||memo||actions.length);
  const safeClose=()=>{if(hasData()&&!window.confirm('입력한 내용이 저장되지 않았습니다. 닫으시겠어요?'))return;onClose();};
  const accentColor='#F97316';

  const save=async()=>{
    if(!name.trim()||!phone.trim()){alert('성함과 전화번호를 입력해주세요');return;}
    setSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:staffDay,staffId,staff:staffName,
      brand:'grohome',category:grohomeCat?.label||'-',
      name,phone,
      actions:actions.map(id=>GROHOME_ACTION_TAGS.find(t=>t.id===id)?.label||id),
      memo,memoImgs,status:'신규',
    };
    try{await db.collection('leads-grohome').add(data);}catch(e){console.warn(e);}
    const smsCfg=loadSolapiConfig();
    if(smsCfg.workerUrl&&smsCfg.autoCustomer!==false&&phone){
      const txt=`${name}님, 그로홈 상담 감사합니다. 관심 상품 정보 보내드릴게요. grohome.co.kr`;
      sendSMS(phone,txt).catch(()=>{});
    }
    setSaving(false);setDone(true);
  };

  return(
    <div className="sheet-bg" onClick={safeClose}>
      <div className="note-sheet" onClick={e=>e.stopPropagation()}>
        {done?(
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 20px'}}>
            <div style={{fontSize:44,marginBottom:10}}>✅</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>그로홈 상담 메모 저장됐어요!</div>
            <div style={{fontSize:13,color:'var(--text-sm)',marginBottom:20}}>{name}님 · {staffName} · {staffDay}</div>
            <button onClick={onClose} style={{padding:'12px 28px',borderRadius:12,border:'none',background:accentColor,color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>닫기</button>
          </div>
        ):(
          <>
            <div className="note-sheet-head" style={{borderBottom:'1px solid var(--border)',paddingBottom:10}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontSize:16,fontWeight:900,color:'var(--text)'}}>🏠 그로홈 메모</span>
                <div style={{display:'flex',gap:6}}>
                  <button className="note-head-save" style={{background:accentColor}} onClick={save} disabled={saving}>{saving?'저장 중...':'저장하기'}</button>
                  <button onClick={safeClose} style={{width:32,height:32,borderRadius:'50%',border:'none',background:'var(--bg)',color:'var(--text-md)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                </div>
              </div>
              {grohomeCat&&(
                <div className="note-ctx" style={{marginTop:8,marginBottom:0}}>
                  <div className="note-ctx-row">
                    <span className="note-ctx-tag">{grohomeCat.icon} {grohomeCat.label}</span>
                    <span className="note-ctx-tag" style={{opacity:.7}}>{grohomeCat.sub}</span>
                  </div>
                </div>
              )}
            </div>
            <div className="note-sheet-scroll">
              <div style={{padding:'12px 0 8px'}}>
                <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>고객 정보</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                  <input className="note-input" style={{fontSize:13}} placeholder="성함 *" value={name} onChange={e=>setName(e.target.value)}/>
                  <input className="note-input" style={{fontSize:13}} placeholder="연락처 *" value={phone} onChange={e=>setPhone(e.target.value)} inputMode="tel"/>
                </div>
              </div>
              {/* 액션 태그 */}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>후속 조치</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {GROHOME_ACTION_TAGS.map(t=>(
                    <button key={t.id} className={`note-chip ${actions.includes(t.id)?'on':''}`}
                      style={{fontSize:12,padding:'6px 12px',borderColor:actions.includes(t.id)?accentColor:'',color:actions.includes(t.id)?accentColor:''}}
                      onClick={()=>toggle(actions,setActions,t.id)}>
                      {t.icon} {t.label}
                    </button>
                  ))}
                </div>
              </div>
              {/* 메모 */}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>상담 메모</div>
                <div className="mode-toggle" style={{marginBottom:8}}>
                  <button className={`mode-btn ${!pencilMode?'on':''}`} onClick={()=>setPencilMode(false)}>⌨️ 키보드</button>
                  <button className={`mode-btn ${pencilMode?'on':''}`} onClick={()=>setPencilMode(true)}>✏️ 펜슬</button>
                </div>
                {pencilMode
                  ?<DrawCanvas onDataUrl={setMemoImgs}/>
                  :<textarea ref={memoRef} className="note-memo"
                    style={{resize:'none',minHeight:180,width:'100%',fontSize:14,lineHeight:'1.8'}}
                    placeholder="고객 반응, 관심 제품, 요청사항..."
                    value={memo} onChange={e=>setMemo(e.target.value)}/>
                }
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── Global Note Sheet (솔루션 외 화면) ── */
function GlobalNoteSheet({building,problem,staffId,staffName,staffDay,onClose}){
  const [name,setName]=useState('');
  const [company,setCompany]=useState('');
  const [position,setPosition]=useState('');
  const [showPosition,setShowPosition]=useState(false);
  const [phone,setPhone]=useState('');
  const [contact,setContact]=useState([]);
  const [interests,setInterests]=useState([]);
  const [deliveryDocs,setDeliveryDocs]=useState([]);
  const [deliveryMedia,setDeliveryMedia]=useState([]);
  const [memo,setMemo]=useState('');
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const [pencilMode,setPencilMode]=useState(true);
  const [memoImgs,setMemoImgs]=useState([]);
  const memoRef=useRef(null);
  const bizCardOpenRef=useRef(null);
  useEffect(()=>{if(!pencilMode&&memoRef.current){memoRef.current.focus();}},[pencilMode]);
  const [openSec,setOpenSec]=useState(new Set([]));
  const [bizCard,setBizCard]=useState({front:null,back:null});
  const [effectiveBuildingId,setEffectiveBuildingId]=useState(building?.id||null);
  const [quickSms,setQuickSms]=useState(false);
  const [smsText,setSmsText]=useState('');
  const [smsSending,setSmsSending]=useState(false);
  const [smsType,setSmsType]=useState('customer');
  const [showSmsModal,setShowSmsModal]=useState(false);
  const toggle=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const toggleSec=sec=>setOpenSec(p=>{const n=new Set(p);n.has(sec)?n.delete(sec):n.add(sec);return n;});
  const hasData=()=>!!(name||company||phone||memo||interests.length||contact.length||bizCard?.front);
  const safeClose=()=>{if(hasData()&&!window.confirm('입력한 내용이 저장되지 않았습니다. 닫으시겠어요?'))return;onClose();};

  const save=async()=>{
    if(!name.trim()||!phone.trim()){alert('성함과 전화번호를 입력해주세요');return;}
    setSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:staffDay,staffId,staff:staffName,
      name,company,position,phone,contactMethod:contact,
      building:building?.label||'-',buildingId:building?.id||'-',
      problem:problem?.label||'-',problemCat:problem?.cat||'-',
      problems:problem?[problem.label]:[],
      interests,deliveryDocs,deliveryMedia,
      businessCard:bizCard,
      memo,memoImgs,status:'신규',
    };
    try{await db.collection('leads').add(data);}catch(e){console.warn(e);}
    // 자동 SMS 발송 (fire-and-forget)
    const smsCfg=loadSolapiConfig();
    if(smsCfg.workerUrl){
      const smsData={name,phone,building:building?.label||'-',problem:problem?.label||'-',staff:staffName,staffId,company,position,buildingType:building?.label||'-',datetime:staffDay};
      if(smsCfg.autoCustomer!==false&&phone){
        sendSMS(phone,fillTemplate(loadSmsTemplates().customerThank,smsData)).catch(()=>{});
      }
      if(smsCfg.autoStaff!==false){
        const sp=loadStaffList().find(s=>s.id===staffId)?.phone;
        if(sp)sendSMS(sp,fillTemplate(loadSmsTemplates().staffNotify,smsData)).catch(()=>{});
      }
    }
    setSaving(false);setDone(true);
  };

  return(
    <div className="sheet-bg" onClick={safeClose}>
      <div className="note-sheet" onClick={e=>e.stopPropagation()}>
        {showSmsModal&&<SmsModal phone={phone} name={name} building={building?.label||'-'} problem={problem?.label||'-'} staff={staffName} company={company} position={position} buildingType={building?.label||'-'} datetime={staffDay} onClose={()=>setShowSmsModal(false)} onToast={(msg,type)=>{if(type==='error')alert(msg);}}/>}
        {done?(
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 20px'}}>
            <div style={{fontSize:44,marginBottom:10}}>✅</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>영업 메모 저장됐어요!</div>
            <div style={{fontSize:13,color:'var(--text-sm)',marginBottom:20}}>{name}님 · {staffName} · {staffDay}</div>
            {!quickSms?(
              <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',maxWidth:300}}>
                {phone&&loadSolapiConfig().workerUrl&&(
                  <button onClick={()=>{const tpls=loadSmsTemplates();const vars={name,building:building?.label||'-',problem:problem?.label||'-',staff:staffName,phone,company,position,buildingType:building?.label||'-',datetime:staffDay};setSmsText(fillTemplate(tpls.customerThank,vars));setQuickSms(true);}}
                    style={{padding:'14px 20px',borderRadius:12,border:'none',background:'var(--blue)',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
                    💬 바로 문자 보내기
                  </button>
                )}
                <button onClick={onClose}
                  style={{padding:'12px 20px',borderRadius:12,border:'1.5px solid var(--border)',background:'#fff',color:'var(--text-md)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                  닫기

              </div>
            ):(
              <div style={{width:'100%',maxWidth:360,padding:'0 10px'}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:8}}>수신: <span style={{color:'var(--blue)'}}>{phone}</span> ({name})</div>
                <div style={{display:'flex',gap:6,marginBottom:10}}>
                  {[{key:'customer',label:'고객 감사',color:'var(--blue)',bg:'var(--blue-l)',tpl:'customerThank'},{key:'staff',label:'담당자 알림',color:'var(--purple)',bg:'var(--purple-l)',tpl:'staffNotify'}].map(({key,label,color,bg,tpl})=>(
                    <button key={key} style={{flex:1,padding:'8px 0',borderRadius:8,border:'1.5px solid '+(smsType===key?color:'var(--border)'),background:smsType===key?bg:'#fff',fontSize:12,fontWeight:700,color:smsType===key?color:'var(--text-md)',cursor:'pointer',fontFamily:'inherit'}}

                <textarea value={smsText} onChange={e=>setSmsText(e.target.value)}

/* ── PhotoSlot: 클릭→파일선택/URL, 붙여넣기→이미지 삽입 ── */
function PhotoSlot({src,label,onSet,onRemove,wide,aspect}){
  const fileRef=useRef(null);
  const wrapRef=useRef(null);
  const handleFile=(file)=>{
    if(!file||!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=480;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        onSet(c.toDataURL('image/jpeg',0.7));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  useEffect(()=>{
    const el=wrapRef.current;if(!el)return;
    const handler=(e)=>{
      const items=e.clipboardData?.items;if(!items)return;
      for(let it of items){
        if(it.type.startsWith('image/')){
          e.preventDefault();handleFile(it.getAsFile());return;
        }
      }
    };
    el.addEventListener('paste',handler);
    return()=>el.removeEventListener('paste',handler);
  });
  return(
    <div ref={wrapRef} tabIndex={0}
      style={{position:'relative',width:wide?'100%':120,height:wide?80:90,borderRadius:10,overflow:'hidden',border:'1.5px solid var(--border)',background:'#f3f4f6',flexShrink:0,cursor:'pointer',aspectRatio:aspect||'auto',outline:'none'}}
      onClick={()=>{
        const choice=src?window.confirm('새 사진으로 교체하시겠습니까?\n\n[확인] 파일 선택\n[취소] URL 직접 입력'):null;
        if(choice===true||!src){fileRef.current?.click();}
        else if(choice===false){const u=prompt('이미지 URL 입력:',src||'');if(u!==null)onSet(u);}
      }}>
      {src
        ?<>
          <img src={src} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
          <button onClick={(e)=>{e.stopPropagation();onRemove();}}
            style={{position:'absolute',top:3,right:3,width:18,height:18,borderRadius:'50%',border:'none',background:'rgba(0,0,0,.55)',color:'#fff',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
        </>
        :<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
          <span style={{fontSize:20,opacity:.25}}>📷</span>
          <span style={{fontSize:9,color:'var(--text-sm)',fontWeight:600,textAlign:'center',lineHeight:1.2}}>{label||'클릭 또는\n붙여넣기'}</span>
        </div>
      }
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
        onChange={(e)=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';}}/>
    </div>
  );
}

  const [filterDay,setFilterDay]=useState('전체');
  const [filterStaff,setFilterStaff]=useState('전체');
  const [filterBuilding,setFilterBuilding]=useState('전체');
  const [filterStatus,setFilterStatus]=useState('전체');
  const [expanded,setExpanded]=useState(null);

  const [showPinChange,setShowPinChange]=useState(false);

  const STATUS_OPTIONS=['신규','연락완료','계약예정','보류','기타'];
  const STATUS_COLOR={신규:'#2563EB',연락완료:'#059669',계약예정:'#7C3AED',보류:'#9CA3AF',기타:'#D97706'};

  useEffect(()=>{
    db.collection('leads').orderBy('savedAt','desc').get()
      .then(s=>{setLeads(s.docs.map(d=>({id:d.id,...d.data()})));})
      .catch(()=>{})
      .finally(()=>setLoading(false));
    syncPhotosFromFirestore(setCasePhotos,setProbPhotos);
  },[]);

  const staffList=[...new Set(leads.map(l=>l.staff).filter(Boolean))];
  const buildingList=[...new Set(leads.map(l=>l.building).filter(Boolean))];

  // 필터 적용
  const activeLeads=leads.filter(l=>!l.deletedAt);
  const trashedLeads=leads.filter(l=>!!l.deletedAt);
  const display=activeLeads.filter(l=>{
    if(filterDay!=='전체'&&l.day!==filterDay)return false;
    if(filterStaff!=='전체'&&l.staff!==filterStaff)return false;
    if(filterBuilding!=='전체'&&l.building!==filterBuilding)return false;
    if(filterStatus!=='전체'&&(l.status||'신규')!==filterStatus)return false;
    if(search){
      const q=search.toLowerCase();
      if(!(l.name||'').toLowerCase().includes(q)&&!(l.phone||'').includes(q)&&!(l.memo||'').toLowerCase().includes(q))return false;
    }
    return true;
  });

  // 통계 계산
  const byDay=DAYS.map(d=>({day:d,count:activeLeads.filter(l=>l.day===d).length}));
  const byStaff=staffList.map(s=>({staff:s,count:activeLeads.filter(l=>l.staff===s).length})).sort((a,b)=>b.count-a.count);
  const byBuilding=buildingList.map(b=>({building:b,count:activeLeads.filter(l=>l.building===b).length})).sort((a,b)=>b.count-a.count);
  const byStatus=STATUS_OPTIONS.map(s=>({status:s,count:activeLeads.filter(l=>(l.status||'신규')===s).length}));
  const maxDay=Math.max(...byDay.map(d=>d.count),1);
  const maxStaff=Math.max(...byStaff.map(s=>s.count),1);

  // 상태 변경
  const changeStatus=async(id,status)=>{
    try{
      await db.collection('leads').doc(id).update({status});
      setLeads(p=>p.map(l=>l.id===id?{...l,status}:l));
    }catch(e){alert('변경 실패');}
  };

  // 삭제 (soft delete)
  const deleteLead=async(id)=>{
    if(!window.confirm('이 상담 내역을 휴지통으로 이동하시겠어요?'))return;
    try{
      const deletedAt=new Date().toISOString();
      await db.collection('leads').doc(id).update({deletedAt});
      setLeads(p=>p.map(l=>l.id===id?{...l,deletedAt}:l));
      if(expanded===id)setExpanded(null);
    }catch(e){alert('삭제 실패');}
  };

  // 복원
  const restoreLead=async(id)=>{
    try{
      await db.collection('leads').doc(id).update({deletedAt:firebase.firestore.FieldValue.delete()});
      setLeads(p=>p.map(l=>l.id===id?(()=>{const{deletedAt,...rest}=l;return rest;})():l));

  };
