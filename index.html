                      <span style={{fontSize:30}}>{icon}</span>
                      <div>
                        <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>{title}</div>
                        <div style={{fontSize:10,color:'var(--text-sm)',marginTop:2}}>{sub}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {loading&&<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>}

      {/* ── 통계 탭 ── */}
      {!loading&&tab==='stat'&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
          {/* 요약 카드 */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',gridColumn:'1/-1'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>📅 날짜별 상담</div>
              {byDay.map(({day,count})=>(
                <div key={day} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text)',width:72,flexShrink:0}}>{day}</span>
                  <div style={{flex:1,height:18,background:'var(--bg)',borderRadius:6,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${(count/maxDay)*100}%`,background:'#2563EB',borderRadius:6,transition:'width .3s',minWidth:count>0?4:0}}/>
                  </div>
                  <span style={{fontSize:13,fontWeight:900,color:'var(--accent)',width:28,textAlign:'right'}}>{count}</span>
                </div>
              ))}
            </div>
            {[
              {label:'총 상담', value:leads.length, icon:'👥', color:'#2563EB'},
              {label:'오늘 신규', value:byStatus.find(s=>s.status==='신규')?.count||0, icon:'🆕', color:'#059669'},
              {label:'연락완료', value:byStatus.find(s=>s.status==='연락완료')?.count||0, icon:'✅', color:'#7C3AED'},
              {label:'계약예정', value:byStatus.find(s=>s.status==='계약예정')?.count||0, icon:'🤝', color:'#D97706'},
            ].map(({label,value,icon,color})=>(
              <div key={label} style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',textAlign:'center'}}>
                <div style={{fontSize:22}}>{icon}</div>
                <div style={{fontSize:22,fontWeight:900,color,marginTop:2}}>{value}</div>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text-sm)',marginTop:2}}>{label}</div>
              </div>
            ))}
          </div>

          {/* 담당자별 */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:10}}>👤 담당자별 실적</div>
            {byStaff.length===0
              ?<div style={{fontSize:12,color:'var(--text-sm)',textAlign:'center',padding:'6px 0'}}>0건</div>
              :byStaff.map(({staff,count},i)=>(
                <div key={staff} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:i===0?'#D97706':'var(--text)',width:16}}>{i+1}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{staff}</span>
                  <div style={{width:100,height:14,background:'var(--bg)',borderRadius:6,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${(count/maxStaff)*100}%`,background:i===0?'#D97706':'#60A5FA',borderRadius:6}}/>
                  </div>
                  <span style={{fontSize:13,fontWeight:900,color:'var(--accent)',width:24,textAlign:'right'}}>{count}</span>
                </div>
              ))
            }
          </div>

          {/* 건물유형별 */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:10}}>🏢 건물유형별</div>
            {byBuilding.length===0
              ?<div style={{fontSize:12,color:'var(--text-sm)',textAlign:'center',padding:'6px 0'}}>0건</div>
              :<div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {byBuilding.map(({building,count})=>(
                  <div key={building} style={{background:'var(--accent-l)',border:'1px solid #BFDBFE',borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--accent)'}}>{building}</span>
                    <span style={{fontSize:11,fontWeight:900,color:'var(--accent)'}}>{count}건</span>
                  </div>
                ))}
              </div>
            }
          </div>

          {/* 고객 직급별 */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:10}}>🪪 상담 대상 직급</div>
            {byPosition.length===0
              ?<div style={{fontSize:12,color:'var(--text-sm)',textAlign:'center',padding:'6px 0'}}>0건 — CS메모 저장 시 직급 선택 필요</div>
              :<div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {byPosition.map(([pos,cnt],i)=>(
                  <div key={pos} style={{background:i===0?'#EFF6FF':'var(--bg)',border:`1px solid ${i===0?'#93C5FD':'var(--border)'}`,borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:12,fontWeight:700,color:i===0?'#2563EB':'var(--text)'}}>{pos}</span>
                    <span style={{fontSize:11,fontWeight:900,color:i===0?'#2563EB':'var(--text-md)'}}>{cnt}명</span>
                  </div>
                ))}
              </div>
            }
          </div>

          {/* 상태별 */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:10}}>📌 상태별 현황</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {byStatus.map(({status,count})=>(
                <div key={status} style={{background:'var(--bg)',border:`1.5px solid ${STATUS_COLOR[status]||'#E5E7EB'}`,borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:STATUS_COLOR[status]||'#E5E7EB',flexShrink:0,display:'block'}}/>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{status}</span>
                  <span style={{fontSize:11,fontWeight:900,color:'var(--text-md)'}}>{count}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── 키워드 탭 ── */}
      {!loading&&tab==='keyword'&&(
        <div style={{flex:1,overflowY:'auto',padding:'14px'}}>
          {/* 키워드 상세 모달 */}
          {keywordDetail&&(
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setKeywordDetail(null)}>
              <div style={{background:'#fff',borderRadius:16,padding:20,width:'min(500px,90vw)',maxHeight:'70vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 12px 40px rgba(0,0,0,.25)'}} onClick={e=>e.stopPropagation()}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexShrink:0}}>
                  <div><div style={{fontSize:16,fontWeight:800}}>{keywordDetail.label}</div><div style={{fontSize:12,color:'var(--text-sm)'}}>{keywordDetail.leads.length}건</div></div>
                  <button onClick={()=>setKeywordDetail(null)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--text-sm)'}}>✕</button>
                </div>
                <div style={{overflowY:'auto',flex:1}}>
                  {keywordDetail.leads.map((l,i)=>(
                    <div key={l.id||i} style={{padding:'10px 12px',borderBottom:'1px solid var(--border-s)',fontSize:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{fontWeight:800,fontSize:14}}>{l.name||'이름없음'}</span>
                        <span style={{color:'var(--text-sm)'}}>{l.phone||''}</span>
                        <span style={{padding:'2px 8px',borderRadius:6,background:(STATUS_COLOR[l.status||'신규']||'#9CA3AF'),color:'#fff',fontSize:10,fontWeight:700}}>{l.status||'신규'}</span>
                      </div>
                      <div style={{color:'var(--text-md)',marginBottom:2}}>🏢 {l.building||'-'} · 👤 {l.staff||'-'} · {l.day||'-'}</div>
                      {l.memo&&<div style={{color:'var(--text)',background:'var(--bg)',borderRadius:8,padding:'6px 10px',marginTop:4,lineHeight:1.5,fontSize:11,whiteSpace:'pre-wrap'}}>{l.memo.slice(0,200)}{l.memo.length>200?'...':''}</div>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* 요약 카드 */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
            {[
              {label:'문제 키워드',value:byProblem.length+'종',color:'#7C3AED',bg:'#F5F3FF'},
              {label:'자료 요청',value:byAction.length+'종',color:'#D97706',bg:'#FFFBEB'},
              {label:'메모 키워드',value:(()=>{const allM=activeLeads.map(l=>l.memo||'').filter(m=>m.trim()).join(' ');const ws=allM.replace(/[^가-힣a-zA-Z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>=2);const wm={};ws.forEach(w=>{wm[w]=(wm[w]||0)+1;});return Object.keys(wm).length;})()+'개',color:'#E8780F',bg:'#FFF7ED'},
            ].map(c=>(
              <div key={c.label} style={{background:c.bg,borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
                <div style={{fontSize:9,fontWeight:700,color:c.color,marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:18,fontWeight:900,color:c.color}}>{c.value}</div>
              </div>
            ))}
          </div>

          {/* 자주 언급된 문제 키워드 — 클릭 시 상세 */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'#7C3AED',marginBottom:10}}>🔧 자주 언급된 문제 키워드 <span style={{fontWeight:400,fontSize:10,color:'var(--text-sm)'}}>(클릭하면 상담 상세 확인)</span></div>
            {byProblem.length===0
              ?<div style={{fontSize:12,color:'var(--text-sm)',textAlign:'center',padding:'6px 0'}}>0건</div>
              :byProblem.slice(0,10).map(([name,cnt],i)=>{
                const pct=Math.round(cnt/byProblem[0][1]*100);
                return(
                  <div key={name} onClick={()=>{
                    const matched=activeLeads.filter(l=>{const ps=Array.isArray(l.problems)?l.problems:(l.problem?[l.problem]:[]);return ps.some(p=>p===name);});
                    setKeywordDetail({label:'🔧 '+name,leads:matched});
                  }} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,cursor:'pointer',padding:'4px 6px',borderRadius:8,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='var(--bg)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                    <span style={{fontSize:11,fontWeight:700,color:i<3?'#7C3AED':'var(--text-sm)',width:16,textAlign:'center'}}>{i+1}</span>
                    <span style={{flex:1,fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
                    <div style={{width:70,height:8,background:'var(--bg)',borderRadius:4,overflow:'hidden',flexShrink:0}}>
                      <div style={{height:'100%',width:pct+'%',background:i<3?'#7C3AED':'#C4B5FD',borderRadius:4}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:900,color:'#7C3AED',width:20,textAlign:'right'}}>{cnt}</span>
                  </div>
                );
              })
            }
          </div>

          {/* 메모 키워드 분석 — 신규 */}
          {(()=>{
            const stopWords=new Set(['의','가','이','은','는','을','를','에','로','으로','와','과','도','만','까지','부터','에서','한','할','하고','있다','없다','된','들','것','수','등','그','더','좀','잘','안','못','또','및','중','후','때','위','위해','대한','통해','관련','대해','합니다','했는데','하다','아주']);
            const allMemos=activeLeads.map(l=>l.memo||'').filter(m=>m.trim());
            const allText=allMemos.join(' ');
            const words=allText.replace(/[^가-힣a-zA-Z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>=2&&!stopWords.has(w));
            const wm={};words.forEach(w=>{wm[w]=(wm[w]||0)+1;});
            const wordRank=Object.entries(wm).sort((a,b)=>b[1]-a[1]);

            const positiveWords=['만족','좋','감사','관심','긍정','원','필요','희망','기대','요청','추천','의뢰','계약','진행','빠른','급'];
            const negativeWords=['불만','심각','누수','균열','파손','피해','손상','위험','긴급','문제','하자','고장','노후','침수','탈락','벗겨','부식','탈피'];
            const positiveFound=wordRank.filter(([w])=>positiveWords.some(pw=>w.includes(pw))).slice(0,8);
            const negativeFound=wordRank.filter(([w])=>negativeWords.some(nw=>w.includes(nw))).slice(0,8);
            const topKw=wordRank.slice(0,12);
            const memoRate=activeLeads.length?Math.round(allMemos.length/activeLeads.length*100):0;

            return(
              <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:'#E8780F'}}>💬 메모 키워드 분석</div>
                  <span style={{fontSize:10,color:'var(--text-sm)'}}>메모 작성률 <b style={{color:'#E8780F'}}>{memoRate}%</b> ({allMemos.length}/{activeLeads.length})</span>
                </div>

                {/* 잦은 키워드 */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text-md)',marginBottom:6}}>🔤 자주 등장하는 키워드</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                    {topKw.length===0?<span style={{fontSize:11,color:'var(--text-sm)'}}>메모 없음</span>
                    :topKw.map(([w,cnt])=>(
                      <button key={w} onClick={()=>{
                        const matched=activeLeads.filter(l=>(l.memo||'').includes(w));
                        setKeywordDetail({label:'🔤 "'+w+'" 언급 상담',leads:matched});
                      }} style={{padding:'5px 12px',borderRadius:8,background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}>
                        {w} <span style={{color:'var(--text-sm)',fontWeight:800}}>{cnt}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* 긍정/부정 */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'#059669',marginBottom:6}}>😊 긍정 키워드</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {positiveFound.length===0?<span style={{fontSize:10,color:'var(--text-sm)'}}>없음</span>
                      :positiveFound.map(([w,cnt])=>(
                        <button key={w} onClick={()=>{const m=activeLeads.filter(l=>(l.memo||'').includes(w));setKeywordDetail({label:'😊 "'+w+'"',leads:m});}} style={{padding:'3px 8px',borderRadius:6,background:'#ECFDF5',border:'none',color:'#059669',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{w} {cnt}</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'#DC2626',marginBottom:6}}>😟 부정/하자 키워드</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {negativeFound.length===0?<span style={{fontSize:10,color:'var(--text-sm)'}}>없음</span>
                      :negativeFound.map(([w,cnt])=>(
                        <button key={w} onClick={()=>{const m=activeLeads.filter(l=>(l.memo||'').includes(w));setKeywordDetail({label:'😟 "'+w+'"',leads:m});}} style={{padding:'3px 8px',borderRadius:6,background:'#FEF2F2',border:'none',color:'#DC2626',fontSize:10,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{w} {cnt}</button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );

                    return(

                        ══════════════════════════════════════════ */}

                          <div style={{padding:'10px 12px',background:'linear-gradient(90deg,rgba(220,38,38,.08),transparent)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>

                            <span style={{fontSize:12,fontWeight:800,color:'var(--navy)'}}>1. 현장 하자사진</span>

                          <div style={{padding:'12px'}}>
                            <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:8}}>길게 눌러 드래그로 순서 변경 가능</div>

                              {(data.causes||[]).map((url,i)=>(

                                        const up=JSON.parse(JSON.stringify(casePhotos));
                                        const arr=up[key].causes;
                                        const [moved]=arr.splice(from.index,1);
                                        arr.splice(i,0,moved);
                                        if(up[key].causeMeta&&up[key].causeMeta.length>0){
                                          const mArr=up[key].causeMeta;

                                          mArr.splice(i,0,movedM);
                                        }
                                        setCasePhotos(up);
                                      }
                                    }catch(e2){}
                                  }}
                                  style={{position:'relative',cursor:'grab'}}>
                                  <PhotoSlot

                                    onRemove={()=>{const up=JSON.parse(JSON.stringify(casePhotos));up[key].causes.splice(i,1);if(up[key].causeMeta)up[key].causeMeta.splice(i,1);setCasePhotos(up);}}
                                  />
                                  {/* 하자유형/위치 메타 */}
                                  {(()=>{
                                    const meta=(data.causeMeta||[])[i]||{};
                                    return(
                                      <div style={{marginTop:3,display:'flex',flexDirection:'column',gap:2}}>
                                        <select value={meta.defectType||''} onChange={e=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key].causeMeta)up[key].causeMeta=[];while(up[key].causeMeta.length<=i)up[key].causeMeta.push({});up[key].causeMeta[i]={...up[key].causeMeta[i],defectType:e.target.value};setCasePhotos(up);}}

                                          <option value=''>하자유형</option>

                                        <select value={meta.defectPart||''} onChange={e=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key].causeMeta)up[key].causeMeta=[];while(up[key].causeMeta.length<=i)up[key].causeMeta.push({});up[key].causeMeta[i]={...up[key].causeMeta[i],defectPart:e.target.value};setCasePhotos(up);}}
                                          style={{width:100,padding:'2px 4px',borderRadius:5,border:'1px solid var(--border)',fontSize:10,fontFamily:'inherit',background:'#fff'}}>

                                        <input value={meta.defectDetail||''} placeholder='세부설명'
                                          onChange={e=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key].causeMeta)up[key].causeMeta=[];while(up[key].causeMeta.length<=i)up[key].causeMeta.push({});up[key].causeMeta[i]={...up[key].causeMeta[i],defectDetail:e.target.value};setCasePhotos(up);}}

                                      </div>

                                <span style={{fontSize:24}}>+</span>추가
                              </button>
                            </div>
                          </div>
                        </div>

                        {/* ══════════════════════════════════════════
                            섹션 2: 왜 이 문제가 생기나 — 원인 영상
                        ══════════════════════════════════════════ */}
                        <div style={{borderRadius:12,border:'1px solid var(--border)',overflow:'hidden',background:'var(--card)'}}>
                          <div style={{padding:'10px 12px',background:'linear-gradient(90deg,rgba(220,38,38,.06),transparent)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
                            <div style={{width:6,height:6,borderRadius:'50%',background:'var(--red)',flexShrink:0}}/>
                            <span style={{fontSize:12,fontWeight:800,color:'var(--navy)'}}>2. 왜 이 문제가 생기나 — 원인 영상</span>
                          </div>
                          <div style={{padding:'12px'}}>
                            <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:10}}>
                              YouTube 링크 입력 → 썸네일 자동 표시 / 이미지 직접 업로드 가능
                            </div>
                            {/* 미리보기 — 고객용 UI와 동일 */}
                            {mediaList.length>0&&(
                              <div style={{marginBottom:12}}>
                                <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>미리보기</div>
                                <div style={{display:'flex',gap:6,overflowX:'auto',scrollSnapType:'x mandatory',WebkitOverflowScrolling:'touch',scrollbarWidth:'none',msOverflowStyle:'none',paddingBottom:4}}>
                                  {mediaList.map((src,i)=>{
                                    const parsed=parseVideoUrl(src);
                                    const isVid=!!parsed;
                                    const thumbSrc=(data.mediaThumbs||[])[i];
                                    const ytId=parsed&&parsed.type==='youtube'?src.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/)?.[1]:null;
                                    const ytThumb=ytId?`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`:null;
                                    const cardThumb=thumbSrc||ytThumb;
                                    return(
                                      <div key={i} style={{flex:'0 0 35%',scrollSnapAlign:'start',borderRadius:10,overflow:'hidden',background:'#111',position:'relative',aspectRatio:'9/16',flexShrink:0}}>
                                        {cardThumb?(
                                          <img src={cardThumb} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                                        ):!isVid?(
                                          <img src={src} alt={`미디어 ${i+1}`} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                                        ):(
                                          <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#1a1a2e,#16213e)',gap:6}}>
                                            <div style={{width:44,height:44,borderRadius:'50%',background:'rgba(255,255,255,.12)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                              <span style={{fontSize:20,marginLeft:2,color:'#fff'}}>▶</span>
                                            </div>
                                            <span style={{fontSize:10,color:'rgba(255,255,255,.5)',fontWeight:600}}>영상 재생</span>
                                          </div>
                                        )}
                                        {isVid&&cardThumb&&(
                                          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                                            <div style={{width:44,height:44,borderRadius:'50%',background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
                                              <span style={{fontSize:18,color:'#fff',marginLeft:2}}>▶</span>
                                            </div>
                                          </div>
                                        )}
                                        {/* 삭제 버튼 */}
                                        <button onClick={()=>{const up=JSON.parse(JSON.stringify(casePhotos));const m=up[key]?.media||[];m.splice(i,1);if(up[key].mediaThumbs)up[key].mediaThumbs.splice(i,1);up[key].media=m;setCasePhotos(up);}}
                                          style={{position:'absolute',top:4,right:4,width:20,height:20,borderRadius:'50%',border:'none',background:'rgba(220,38,38,.85)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                            {/* URL 입력 목록 */}
                            <div style={{display:'flex',flexDirection:'column',gap:8}}>
                              {(data.media||(data.gif?[data.gif]:[])).map((url,mi)=>{
                                const mParsed=parseVideoUrl(url);
                                const isVid=!!mParsed;
                                const thumbSrc=(data.mediaThumbs||[])[mi];
                                const ytId=mParsed&&mParsed.type==='youtube'?url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/)?.[1]:null;
                                const ytThumb=ytId?`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`:null;
                                const cardThumb=thumbSrc||ytThumb;
                                return(
                                  <div key={mi} style={{padding:'10px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)'}}>
                                    {cardThumb&&(
                                      <div style={{marginBottom:8,borderRadius:8,overflow:'hidden',aspectRatio:'16/9',background:'#111',position:'relative'}}>
                                        <img src={cardThumb} alt="썸네일" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                                        {isVid&&(
                                          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                                            <div style={{width:40,height:40,borderRadius:'50%',background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
                                              <span style={{fontSize:16,color:'#fff',marginLeft:2}}>▶</span>
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                    {/* 썸네일 업로드 (이미지 전용) */}
                                    {isVid&&!ytThumb&&(
                                      <div style={{marginBottom:6}}>
                                        <div style={{fontSize:9,color:'var(--text-sm)',marginBottom:3}}>📷 썸네일 이미지</div>
                                        {thumbSrc&&<img src={thumbSrc} alt="썸네일" style={{width:'100%',maxHeight:80,objectFit:'cover',borderRadius:6,marginBottom:4,border:'1px solid var(--border)'}}/>}
                                        <input type="file" accept="image/*" id={`mt-${key}-${mi}`} style={{display:'none'}}
                                          onChange={e=>{
                                            const file=e.target.files[0];if(!file)return;
                                            const reader=new FileReader();
                                            reader.onload=(ev)=>{
                                              const img=new Image();
                                              img.onload=()=>{
                                                const MAX=320;let w=img.width,h=img.height;
                                                if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
                                                const c=document.createElement('canvas');c.width=w;c.height=h;
                                                c.getContext('2d').drawImage(img,0,0,w,h);
                                                const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key].mediaThumbs)up[key].mediaThumbs=[];
                                                up[key].mediaThumbs[mi]=c.toDataURL('image/jpeg',0.7);setCasePhotos(up);
                                              };img.src=ev.target.result;
                                            };reader.readAsDataURL(file);e.target.value='';
                                          }}/>
                                        <button onClick={()=>document.getElementById(`mt-${key}-${mi}`)?.click()}
                                          style={{padding:'3px 8px',borderRadius:5,border:'1px solid var(--border)',background:'#f3f4f6',fontSize:10,cursor:'pointer',fontFamily:'inherit'}}>📁 썸네일 업로드</button>
                                      </div>
                                    )}
                                    <div style={{display:'flex',gap:6}}>
                                      <input value={url||''} placeholder={`YouTube/Drive/mp4 URL ${mi+1}`}
                                        onChange={e=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',media:[]};const m=up[key].media||(up[key].gif?[up[key].gif]:[]);m[mi]=e.target.value;up[key].media=m;delete up[key].gif;setCasePhotos(up);}}
                                        style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid var(--border)',fontSize:12,fontFamily:'inherit',boxSizing:'border-box'}}/>
                                      <input type="file" accept="image/*" id={`mf-${key}-${mi}`} style={{display:'none'}}
                                        onChange={e=>{
                                          const file=e.target.files[0];if(!file)return;
                                          if(file.size>10*1024*1024){alert('이미지가 너무 큽니다 (최대 10MB)');e.target.value='';return;}
                                          const reader=new FileReader();
                                          reader.onload=(ev)=>{
                                            const img=new Image();
                                            img.onload=()=>{
                                              const MAX=480;let w=img.width,h=img.height;
                                              if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
                                              const c=document.createElement('canvas');c.width=w;c.height=h;
                                              c.getContext('2d').drawImage(img,0,0,w,h);
                                              const up=JSON.parse(JSON.stringify(casePhotos));
                                              if(!up[key])up[key]={causes:[],completed:'',media:[]};
                                              const m=up[key].media||(up[key].gif?[up[key].gif]:[]);
                                              m[mi]=c.toDataURL('image/jpeg',0.7);up[key].media=m;delete up[key].gif;
                                              setCasePhotos(up);
                                            };img.src=ev.target.result;
                                          };reader.readAsDataURL(file);e.target.value='';
                                        }}/>
                                      <button onClick={()=>document.getElementById(`mf-${key}-${mi}`)?.click()}
                                        title="이미지 업로드"
                                        style={{padding:'0 10px',borderRadius:8,border:'1px solid var(--border)',background:'#f3f4f6',fontSize:16,cursor:'pointer',lineHeight:1,fontFamily:'inherit'}}>📁</button>
                                      <button onClick={()=>{const up=JSON.parse(JSON.stringify(casePhotos));const m=up[key]?.media||(up[key]?.gif?[up[key].gif]:[]);m.splice(mi,1);if(up[key].mediaThumbs)up[key].mediaThumbs.splice(mi,1);up[key].media=m;delete up[key].gif;setCasePhotos(up);}}
                                        style={{padding:'0 10px',borderRadius:8,border:'1px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>✕</button>
                                    </div>
                                  </div>
                                );
                              })}
                              <button onClick={()=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',media:[]};const m=up[key].media||(up[key].gif?[up[key].gif]:[]);m.push('');up[key].media=m;delete up[key].gif;setCasePhotos(up);}}
                                style={{padding:'8px 14px',borderRadius:8,border:'1.5px dashed var(--border)',background:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--accent)'}}>+ 영상/이미지 추가</button>
                            </div>
                          </div>
                        </div>

                        {/* ══════════════════════════════════════════
                            섹션 3: POUR 해결방안 — 시공공정
                        ══════════════════════════════════════════ */}
                        {mc&&mc.process&&mc.process.length>0&&(
                          <div style={{borderRadius:12,border:'1px solid var(--border)',overflow:'hidden',background:'var(--card)'}}>
                            <div style={{padding:'10px 12px',background:'linear-gradient(90deg,rgba(5,150,105,.08),transparent)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
                              <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',flexShrink:0}}/>
                              <span style={{fontSize:12,fontWeight:800,color:'var(--navy)'}}>3. POUR 해결방안 — 시공공정</span>
                            </div>
                            <div style={{padding:'12px'}}>
                              <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:12}}>각 공정 단계별 시공 사진/영상을 등록합니다. 고객 화면에 동일하게 표시됩니다.</div>
                              {/* 고객용 타임라인 UI 동일 */}
                              <div style={{display:'flex',flexDirection:'column',gap:0}}>
                                {mc.process.map((step,si)=>{
                                  const stepData=(processSteps[si])||{};
                                  const stepDesc=(mc.processDescs||[])[si];
                                  const isLast=si===mc.process.length-1;
                                  const hasMedia=!!(stepData.url);

                                    <div key={si} style={{display:'flex',gap:0,position:'relative'}}>
                                      {/* 타임라인 좌측 */}

                                        </div>
                                        {!isLast&&<div style={{width:2,flex:1,minHeight:8,background:'var(--border)',opacity:.5,margin:'2px 0'}}/>}
                                      </div>
                                      {/* 콘텐츠 우측 */}
                                      <div style={{flex:1,paddingLeft:8,paddingBottom:isLast?0:14}}>

/* ── 담당자 관리 탭 컴포넌트 ── */
function StaffManageTab(){
  const [sList,setSList]=useState(loadStaffList);
  const [addMode,setAddMode]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const [inputName,setInputName]=useState('');
  const [inputPhone,setInputPhone]=useState('');
  const [inputPosition,setInputPosition]=useState('');

  const handleSave=()=>{
    if(!inputName.trim())return;
    if(editTarget){
      const next=sList.map(s=>s.id===editTarget.id?{...s,name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,''),position:inputPosition.trim()}:s);
      saveStaffList(next);setSList(next);
    }else{
      const ns={id:'s'+Date.now(),name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,''),position:inputPosition.trim()};
      const next=[...sList,ns];
      saveStaffList(next);setSList(next);
    }
    setAddMode(false);setEditTarget(null);setInputName('');setInputPhone('');setInputPosition('');
  };
  const handleDel=id=>{
    if(!confirm('이 담당자를 삭제하시겠어요?'))return;
    const next=sList.filter(s=>s.id!==id);
    saveStaffList(next);setSList(next);
  };
  const handleEdit=s=>{setEditTarget(s);setInputName(s.name);setInputPhone(s.phone||'');setInputPosition(s.position||'');setAddMode(true);};

  return(
    <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>👤 담당자 관리</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:14,lineHeight:1.6}}>담당자를 추가·수정·삭제할 수 있습니다.</div>

            <input className="sheet-input" placeholder="직급 (선택)" value={inputPosition} onChange={e=>setInputPosition(e.target.value)} style={{marginBottom:8}}/>
            <input className="sheet-input" placeholder="전화번호 (선택)" value={inputPhone} onChange={e=>setInputPhone(e.target.value)} type="tel" style={{marginBottom:10}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setAddMode(false);setEditTarget(null);setInputName('');setInputPhone('');setInputPosition('');}} style={{flex:1,padding:'10px',borderRadius:9,border:'1.5px solid var(--border)',background:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
              <button onClick={handleSave} style={{flex:2,padding:'10px',borderRadius:9,border:'none',background:'var(--navy)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{editTarget?'수정 완료':'추가'}</button>
            </div>
          </div>
        ):(
          <button onClick={()=>{setAddMode(true);setEditTarget(null);setInputName('');setInputPhone('');setInputPosition('');}} style={{width:'100%',padding:'12px',borderRadius:12,border:'2px dashed var(--border)',background:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--accent)'}}>＋ 새 담당자 추가</button>
        )}
      </div>
    </div>
  );
}

/* ── 태그 관리 섹션 컴포넌트 ── */
function TagManagerSection({defectTags,setDefectTags,tagSaving,setTagSaving}){
  /* 편집 state: {type:'major'|'part', idx:number, field:'label'|'icon', value:string} */
  const [editCell,setEditCell]=useState(null);
  /* 신규 입력 state */
  const [newMajorLabel,setNewMajorLabel]=useState('');
  const [newMajorIcon,setNewMajorIcon]=useState('');
  const [newPartLabel,setNewPartLabel]=useState('');
  const [saveMsg,setSaveMsg]=useState(null);

  const handleSave=async()=>{
    setTagSaving(true);setSaveMsg(null);
    try{
      await saveDefectTags(defectTags);
      setSaveMsg({ok:true,text:'저장 완료! 태블릿에서 새로고침하세요.'});
    }catch(e){
      setSaveMsg({ok:false,text:'저장 실패: '+e.message});
    }finally{setTagSaving(false);}
  };

  /* 라벨/아이콘 업데이트 */
  const updateTag=(type,idx,field,val)=>{
    const next=JSON.parse(JSON.stringify(defectTags));
    next[type][idx][field]=val;
    /* id도 label과 동기 (id=label 방식) */
    if(field==='label')next[type][idx].id=val;
    setDefectTags(next);
  };
  /* 삭제 */
  const removeTag=(type,idx)=>{
    const next=JSON.parse(JSON.stringify(defectTags));
    next[type].splice(idx,1);
    setDefectTags(next);
  };
  /* 추가 */
  const addMajor=()=>{
    if(!newMajorLabel.trim())return;
    const next=JSON.parse(JSON.stringify(defectTags));
    next.major.push({id:newMajorLabel.trim(),label:newMajorLabel.trim(),icon:newMajorIcon.trim()||'📌'});
    setDefectTags(next);setNewMajorLabel('');setNewMajorIcon('');
  };
  const addPart=()=>{
    if(!newPartLabel.trim())return;
    const next=JSON.parse(JSON.stringify(defectTags));
    next.part.push({id:newPartLabel.trim(),label:newPartLabel.trim()});
    setDefectTags(next);setNewPartLabel('');
  };

  const rowStyle={display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,background:'var(--bg)',marginBottom:6,border:'1px solid var(--border)'};
  const inputStyle={padding:'4px 8px',borderRadius:6,border:'1.5px solid var(--accent)',fontFamily:'inherit',fontSize:12,background:'#fff',outline:'none'};

  return(
    <div>
      <div style={{fontSize:13,color:'var(--text-sm)',marginBottom:16,lineHeight:1.6}}>
        하자 사진에 붙이는 <b>하자 유형</b>과 <b>하자 위치</b> 태그를 편집합니다.<br/>
        태그를 수정/삭제해도 <b>이미 저장된 사진의 태그값은 자동 변경되지 않습니다.</b>
      </div>

      {/* ── 하자 유형 (대분류) ── */}
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:900,color:'var(--text)',marginBottom:10}}>💧 하자 유형 (대분류)</div>
        {(defectTags.major||[]).map((d,i)=>(
          <div key={i} style={rowStyle}>
            {/* 아이콘 */}
            {editCell?.type==='major'&&editCell.idx===i&&editCell.field==='icon'?(
              <input autoFocus value={editCell.value} onChange={e=>setEditCell({...editCell,value:e.target.value})}
                onBlur={()=>{updateTag('major',i,'icon',editCell.value);setEditCell(null);}}
                onKeyDown={e=>{if(e.key==='Enter'){updateTag('major',i,'icon',editCell.value);setEditCell(null);}}}
                style={{...inputStyle,width:48,textAlign:'center'}}/>
            ):(
              <span onClick={()=>setEditCell({type:'major',idx:i,field:'icon',value:d.icon||''})}
                style={{fontSize:18,cursor:'pointer',minWidth:28,textAlign:'center'}} title="클릭하여 아이콘 변경">{d.icon||'📌'}</span>
            )}
            {/* 라벨 */}
            {editCell?.type==='major'&&editCell.idx===i&&editCell.field==='label'?(
              <input autoFocus value={editCell.value} onChange={e=>setEditCell({...editCell,value:e.target.value})}
                onBlur={()=>{updateTag('major',i,'label',editCell.value);setEditCell(null);}}
                onKeyDown={e=>{if(e.key==='Enter'){updateTag('major',i,'label',editCell.value);setEditCell(null);}}}
                style={{...inputStyle,flex:1}}/>
            ):(
              <span onClick={()=>setEditCell({type:'major',idx:i,field:'label',value:d.label})}
                style={{flex:1,fontSize:13,fontWeight:700,cursor:'pointer',color:'var(--text)'}} title="클릭하여 이름 변경">{d.label}</span>
            )}
            <button onClick={()=>removeTag('major',i)}
              style={{padding:'3px 10px',borderRadius:6,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>삭제</button>
          </div>
        ))}
        {/* 신규 추가 행 */}
        <div style={{display:'flex',gap:6,marginTop:8}}>
          <input value={newMajorIcon} onChange={e=>setNewMajorIcon(e.target.value)} placeholder="🆕"
            style={{...inputStyle,width:48,textAlign:'center'}}/>
          <input value={newMajorLabel} onChange={e=>setNewMajorLabel(e.target.value)} placeholder="새 유형 이름"
            onKeyDown={e=>{if(e.key==='Enter')addMajor();}}
            style={{...inputStyle,flex:1}}/>
          <button onClick={addMajor}
            style={{padding:'5px 14px',borderRadius:8,border:'none',background:'var(--accent)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>+ 추가</button>
        </div>
      </div>

      {/* ── 하자 위치 (중분류) ── */}
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:900,color:'var(--text)',marginBottom:10}}>📍 하자 위치 (중분류)</div>
        {(defectTags.part||[]).map((d,i)=>(
          <div key={i} style={rowStyle}>
            {editCell?.type==='part'&&editCell.idx===i?(
              <input autoFocus value={editCell.value} onChange={e=>setEditCell({...editCell,value:e.target.value})}
                onBlur={()=>{updateTag('part',i,'label',editCell.value);setEditCell(null);}}
                onKeyDown={e=>{if(e.key==='Enter'){updateTag('part',i,'label',editCell.value);setEditCell(null);}}}
                style={{...inputStyle,flex:1}}/>
            ):(
              <span onClick={()=>setEditCell({type:'part',idx:i,field:'label',value:d.label})}
                style={{flex:1,fontSize:13,fontWeight:700,cursor:'pointer',color:'var(--text)'}} title="클릭하여 이름 변경">{d.label}</span>
            )}
            <button onClick={()=>removeTag('part',i)}
              style={{padding:'3px 10px',borderRadius:6,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>삭제</button>
          </div>
        ))}
        {/* 신규 추가 행 */}
        <div style={{display:'flex',gap:6,marginTop:8}}>
          <input value={newPartLabel} onChange={e=>setNewPartLabel(e.target.value)} placeholder="새 위치 이름"
            onKeyDown={e=>{if(e.key==='Enter')addPart();}}
            style={{...inputStyle,flex:1}}/>
          <button onClick={addPart}
            style={{padding:'5px 14px',borderRadius:8,border:'none',background:'var(--accent)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>+ 추가</button>
        </div>
      </div>

      {/* 저장 버튼 */}
      <div style={{position:'sticky',bottom:0,background:'linear-gradient(transparent,var(--bg) 20%)',padding:'20px 0 10px',zIndex:5}}>
        {saveMsg&&(
          <div style={{textAlign:'center',fontSize:12,fontWeight:700,color:saveMsg.ok?'#059669':'#DC2626',marginBottom:8}}>{saveMsg.ok?'✅':'❌'} {saveMsg.text}</div>
        )}
        <button onClick={handleSave} disabled={tagSaving}
          style={{width:'100%',padding:'16px',borderRadius:12,border:'none',background:tagSaving?'#9CA3AF':'var(--accent)',color:'#fff',fontSize:16,fontWeight:900,cursor:tagSaving?'not-allowed':'pointer',fontFamily:'inherit',boxShadow:'0 4px 16px rgba(37,99,235,.3)',transition:'all .2s'}}>
          {tagSaving?'💾 저장 중...':'💾 수정 완료 — 태블릿에 반영'}
        </button>
        <div style={{textAlign:'center',fontSize:11,color:'var(--text-sm)',marginTop:8}}>태그 수정 후 이 버튼을 눌러야 태블릿에 반영됩니다</div>
      </div>
    </div>
  );
}

/* ── SMS 설정 탭 컴포넌트 ── */
function SmsSettingsTab(){
  const [cfg,setCfg]=useState(loadSolapiConfig);
  const [tpls,setTpls]=useState(loadSmsTemplates);
  const [saved,setSaved]=useState('');
  const [testPhone,setTestPhone]=useState('');
  const [testing,setTesting]=useState(false);

  const saveCfg=(next)=>{setCfg(next);saveSolapiConfig(next);setSaved('설정 저장됨');setTimeout(()=>setSaved(''),2000);};
  const saveTpl=(next)=>{setTpls(next);saveSmsTemplates(next);setSaved('템플릿 저장됨');setTimeout(()=>setSaved(''),2000);};

  const testSend=async()=>{
    if(!testPhone.trim()){alert('테스트 번호를 입력하세요');return;}
    setTesting(true);
    const r=await sendSMS(testPhone,'[POUR솔루션] 테스트 문자입니다. 정상 수신되면 설정 완료!');
    setTesting(false);
    if(r.success)setSaved('테스트 발송 성공!');
    else alert('발송 실패: '+(typeof r.error==='string'?r.error:JSON.stringify(r.error)));
  };

  const previewVars={name:'홍길동',building:'아파트',problem:'옥상 누수',staff:'김영업',phone:'01012345678',company:'강남아파트관리소',position:'관리소장',buildingType:'아파트',datetime:'3/20(금)'};

  return(
    <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
      {saved&&<div style={{position:'fixed',top:80,left:'50%',transform:'translateX(-50%)',zIndex:2000,
        padding:'8px 18px',borderRadius:10,fontSize:12,fontWeight:700,background:'#059669',color:'#fff',boxShadow:'0 4px 16px rgba(0,0,0,.15)'}}>{saved}</div>}

      {/* 솔라피 연결 설정 */}
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>⚙️ 솔라피 연결</div>
        <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:12,lineHeight:1.6}}>
          솔라피 API 정보를 입력하면 문자 발송이 가능합니다.
        </div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>Worker URL</div>
        <input value={cfg.workerUrl||''} onChange={e=>saveCfg({...cfg,workerUrl:e.target.value})}
          placeholder="https://pour-app-prod.pages.dev"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>API Key</div>
        <input value={cfg.apiKey||''} onChange={e=>saveCfg({...cfg,apiKey:e.target.value})}
          placeholder="솔라피 API Key"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>API Secret</div>
        <input value={cfg.apiSecret||''} onChange={e=>saveCfg({...cfg,apiSecret:e.target.value})} type="password"
          placeholder="솔라피 API Secret"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>발신번호</div>
        <input value={cfg.sender||''} onChange={e=>saveCfg({...cfg,sender:e.target.value})}
          placeholder="01012345678"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}} type="tel"/>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input value={testPhone} onChange={e=>setTestPhone(e.target.value)} placeholder="테스트 번호 (01012345678)"
            style={{flex:1,padding:'10px 12px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:12,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box'}} type="tel"/>
          <button onClick={testSend} disabled={testing||!cfg.workerUrl||!cfg.apiKey||!cfg.apiSecret||!cfg.sender}
            style={{padding:'10px 16px',borderRadius:9,border:'none',background:(cfg.workerUrl&&cfg.apiKey&&cfg.apiSecret&&cfg.sender)?'var(--blue)':'var(--border)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',opacity:testing?0.6:1,whiteSpace:'nowrap'}}>

        </div>
        <div style={{marginTop:8,padding:'8px 10px',background:'var(--bg)',borderRadius:8,fontSize:10,color:'var(--text-sm)',lineHeight:1.6}}>

        </label>
        <label style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg)',borderRadius:9,cursor:'pointer'}}>

            style={{width:18,height:18,accentColor:'var(--purple)'}}/>
          <div><div style={{fontSize:13,fontWeight:700}}>담당자 알림 문자</div><div style={{fontSize:11,color:'var(--text-sm)'}}>저장 시 담당 영업사원에게 알림</div></div>

function ClaudeProxySettingsTab(){

  const [testResult,setTestResult]=useState('');

  const save=(next)=>{setCfg(next);saveClaudeProxyConfig(next);setSaved('저장됨');setTimeout(()=>setSaved(''),2000);};

  const testVision=async()=>{
    if(!cfg.workerUrl||!cfg.workerSecret){setTestResult('❌ URL과 Secret을 먼저 저장하세요');return;}
    setTesting(true);setTestResult('');
    /* 단색 1×1 테스트 이미지 */

    const currentHash=await hashPin(current);

        <input type="password" inputMode="numeric" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/[^0-9]/g,''))} placeholder="새 비밀번호" style={i} maxLength={8}/>
        <input type="password" inputMode="numeric" value={confirm} onChange={e=>setConfirm(e.target.value.replace(/[^0-9]/g,''))} placeholder="새 비밀번호 확인" style={i} maxLength={8} onKeyDown={e=>{if(e.key==='Enter')handleChange();}}/>

      </div>
    </div>
  );
}

/* ── PIN Modal ── */
function PinModal({mode,onSuccess,onClose}){
  const [pin,setPin]=useState('');
  const [pinConfirm,setPinConfirm]=useState('');
  const [error,setError]=useState('');
  const [failCount,setFailCount]=useState(0);
  const [locked,setLocked]=useState(false);
  const [lockTimer,setLockTimer]=useState(0);
  useEffect(()=>{if(lockTimer<=0){setLocked(false);return;}const t=setInterval(()=>setLockTimer(p=>{if(p<=1){setLocked(false);return 0;}return p-1;}),1000);return()=>clearInterval(t);},[lockTimer]);

  const handleSetup=async()=>{
    if(pin.length<4){setError('4자리 이상 입력하세요');return;}
    if(pin!==pinConfirm){setError('비밀번호가 일치하지 않습니다');return;}
    const hash=await hashPin(pin);
    saveAdminPin(hash);
    onSuccess();
  };
  const handleVerify=async()=>{
    if(locked)return;
    const hash=await hashPin(pin);
    if(hash===loadAdminPin()){setFailCount(0);onSuccess();}
    else{const next=failCount+1;setFailCount(next);if(next>=3){setLocked(true);setLockTimer(30);setError('3회 실패 — 30초 후 재시도');}else{setError(`비밀번호가 틀렸습니다 (${next}/3)`);}setPin('');}
  };

  const overlayStyle={position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(6px)'};
  const boxStyle={background:'#fff',borderRadius:18,padding:'32px 24px',width:'min(340px,88vw)',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.25)'};
  const inputStyle={width:'100%',padding:'14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:20,fontWeight:800,textAlign:'center',letterSpacing:'0.5em',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:8};
  const btnStyle={width:'100%',padding:'14px',borderRadius:10,border:'none',background:'var(--navy)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit',marginTop:8};

  return(
    <div style={overlayStyle} onClick={onClose}>
      <div style={boxStyle} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:32,marginBottom:8}}>{mode==='setup'?'🔐':'🔒'}</div>
        <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>{mode==='setup'?'관리자 비밀번호 설정':'관리자 인증'}</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:18}}>{mode==='setup'?'4자리 이상 숫자를 입력하세요':'비밀번호를 입력하세요'}</div>
        <input type="password" inputMode="numeric" value={pin} onChange={e=>setPin(e.target.value.replace(/[^0-9]/g,''))} placeholder="비밀번호" style={inputStyle} autoFocus maxLength={8} onKeyDown={e=>{if(e.key==='Enter'){mode==='setup'?undefined:handleVerify();}}}/>
        {mode==='setup'&&<input type="password" inputMode="numeric" value={pinConfirm} onChange={e=>setPinConfirm(e.target.value.replace(/[^0-9]/g,''))} placeholder="비밀번호 확인" style={inputStyle} maxLength={8} onKeyDown={e=>{if(e.key==='Enter')handleSetup();}}/>}
        {error&&<div style={{fontSize:12,color:'#DC2626',fontWeight:700,marginBottom:4}}>{error}</div>}
        {locked&&<div style={{fontSize:11,color:'var(--text-sm)',marginBottom:4}}>{lockTimer}초 후 재시도 가능</div>}
        <button style={{...btnStyle,opacity:locked?0.5:1}} disabled={locked} onClick={mode==='setup'?handleSetup:handleVerify}>{mode==='setup'?'설정 완료':'확인'}</button>
        <button style={{...btnStyle,background:'transparent',color:'var(--text-sm)',border:'1.5px solid var(--border)',marginTop:6}} onClick={onClose}>취소</button>
      </div>
    </div>
  );
}

          <div className="hdr-r"><button className="btn-back" onClick={goHome}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>

          {/* 공법 카드 그리드 */}
          <div style={{display:'grid',gridTemplateColumns:`repeat(${gridCols},1fr)`,gap:gridCols===3?8:10,paddingBottom:8}}>
            {filtered.map(p=>(
              <button key={p.id} style={{display:'flex',flexDirection:'column',background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:12,cursor:'pointer',textAlign:'left',fontFamily:'inherit',overflow:'hidden',transition:'all .13s',padding:0}} onClick={()=>{setProblem(p);setScreen('solution');}}>
                <div style={{width:'100%',aspectRatio:'4/3',background:'linear-gradient(135deg,var(--blue-l),var(--blue-m))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,position:'relative',flexShrink:0}}>

        </div>
      </div>

      {/* SOLUTION */}
      <SolutionScreen
        visible={screen==='solution'}
        building={building} problem={problem}

      {screen==='leads'&&<LeadsScreen onBack={goHome}/>}

      {/* ADMIN */}
      {screen==='admin'&&<AdminScreen onBack={()=>{setProbPhotos(loadProblemPhotos());goHome();}}/>}

      {/* POUR스토어 */}
      {screen==='store-category'&&(
        <StoreCategoryScreen

          onBack={goHome}

      {/* 기술연구소 */}
      {screen==='tech-memo'&&(
        <TechMemoSheet

      {/* ── 전역 FAB: 메모 버튼 ── */}
      {screen!=='home'&&screen!=='admin'&&screen!=='store-category'&&screen!=='tech-memo'&&!globalNote&&!(solutionNoteOpen&&screen==='solution')&&(
        <div className="fab-wrap">
          <button className="fab fab-memo"
            onClick={()=>setGlobalNote(true)}
            style={{width:60,height:60,borderRadius:18}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span className="fab-label">메모</span>
          </button>
        </div>
      )}

      {/* ── 전역 메모 시트 (솔루션 외 화면용) ── */}
      {/* ── 새 상담 확인 팝업 ── */}
      {confirmNew&&(
        <div className="confirm-overlay" onClick={()=>setConfirmNew(false)}>
          <div className="confirm-box" onClick={e=>e.stopPropagation()}>
            <div className="confirm-icon">🔄</div>
            <div className="confirm-title">새 상담을 시작할까요?</div>
            <div className="confirm-sub">현재 상담 내용이 초기화됩니다.<br/>영업 메모를 먼저 저장하셨나요?</div>
            <div className="confirm-btns">
              <button className="confirm-cancel" onClick={()=>setConfirmNew(false)}>취소</button>
              <button className="confirm-ok" onClick={()=>{setConfirmNew(false);goHome();}}>새 상담 시작</button>
            </div>
          </div>
        </div>
      )}

      {/* GlobalNoteSheet 제거 — SolutionScreen의 메모를 전역으로 사용 */}

      {/* ── PIN 인증 모달 ── */}
      {showPinModal&&<PinModal mode={showPinModal} onSuccess={()=>{setAdminAuth(true);sessionStorage.setItem('pourAdminAuth','true');setShowPinModal(false);setScreen('admin');}} onClose={()=>setShowPinModal(false)}/>}
    </div>
  );
}

<script>
/* ── PWA Service Worker 등록 + 설치 프롬프트 ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(()=>console.log('[PWA] SW 등록 완료')).catch(e=>console.warn('[PWA] SW 등록 실패:',e));
}

/* ── Chrome PWA 설치 배너 ── */
(function(){
  let deferredPrompt = null;

  // 이미 설치됨 or 이미 닫음 → 배너 안 띄움
  if(window.matchMedia('(display-mode: standalone)').matches) return;
  if(navigator.standalone) return;
  if(localStorage.getItem('pwa-install-dismissed')) return;

  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner(){
    if(document.getElementById('pwa-install-banner')) return;

    var banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:100000;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;font-family:Pretendard,sans-serif;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.3);gap:10px;';

    var text = document.createElement('span');
    text.textContent = '📲 POUR상담 앱을 설치하면 더 빠르게 사용할 수 있습니다';
    text.style.cssText = 'flex:1;min-width:0;';

    var installBtn = document.createElement('button');
    installBtn.textContent = '설치';
    installBtn.style.cssText = 'padding:6px 18px;border:none;border-radius:6px;background:#fff;color:#2563EB;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit;';
    installBtn.onclick = function(){
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result){
        console.log('[PWA] 설치 선택:', result.outcome);
        deferredPrompt = null;
        banner.remove();
      });
    };

    var closeBtn = document.createElement('button');
    closeBtn.textContent = '✕';
    closeBtn.style.cssText = 'padding:4px 8px;border:none;background:transparent;color:rgba(255,255,255,0.8);font-size:18px;cursor:pointer;line-height:1;';
    closeBtn.onclick = function(){
      banner.remove();
      localStorage.setItem('pwa-install-dismissed', '1');
    };

    banner.appendChild(text);
    banner.appendChild(installBtn);
    banner.appendChild(closeBtn);
    document.body.appendChild(banner);
  }
})();
</script>
