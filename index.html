/* ── Staff Manager Modal ── */
function StaffModal({mode,currentStaffId,staffDay,onSelect,onClose}){
  const [list,setList]=useState(loadStaffList);
  const [day,setDay]=useState(staffDay||'4/16(목)');
  const [selId,setSelId]=useState(currentStaffId||'');
  const [addMode,setAddMode]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const [inputName,setInputName]=useState('');
  const [inputPhone,setInputPhone]=useState('');

  /* 열릴 때 Firestore에서 최신 담당자 목록 동기화 */
  useEffect(()=>{syncStaffFromFirestore().then(r=>{if(r)setList(r);});},[]);

  const handleSaveStaff=()=>{
    if(!inputName.trim())return;
    if(editTarget){
      const next=loadStaffList().map(s=>s.id===editTarget.id?{...s,name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,'')}:s);
      saveStaffList(next);setList(next);
    }else{
      const ns={id:'s'+Date.now(),name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,'')};
      const next=[...loadStaffList(),ns];
      saveStaffList(next);setList(next);setSelId(ns.id);
    }
    setAddMode(false);setEditTarget(null);setInputName('');setInputPhone('');
  };
  const handleDelete=id=>{
    if(!confirm('삭제하시겠어요?'))return;
    const next=loadStaffList().filter(s=>s.id!==id);
    saveStaffList(next);setList(next);
    if(selId===id)setSelId('');
  };
  const handleEdit=s=>{setEditTarget(s);setInputName(s.name);setInputPhone(s.phone||'');setAddMode(true);};
  const handleConfirm=()=>{
    if(!selId){alert('담당자를 선택해주세요');return;}
    const s=list.find(x=>x.id===selId);if(!s)return;
    localStorage.setItem('pourStaffId',selId);
    localStorage.setItem('pourStaffName',s.name);
    localStorage.setItem('pourDay',day);
    onSelect(s,day);
  };

  return(
    <div className="sheet-bg" onClick={mode==='switch'?onClose:undefined}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-h">{mode==='setup'?'담당자 설정':'담당자 변경'}</div>
        <div className="sheet-sub">{mode==='setup'?'상담을 시작할 담당자를 선택하고 날짜를 확인해주세요':'다른 담당자로 전환하거나 날짜를 변경하세요'}</div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-sm)',marginBottom:8,letterSpacing:'.05em'}}>오늘 날짜</div>
        <div className="day-row">
          {DAYS.map(d=><button key={d} className={`day-chip ${day===d?'on':''}`} onClick={()=>setDay(d)}>{d}</button>)}
        </div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-sm)',marginBottom:8,letterSpacing:'.05em'}}>담당자 선택</div>
        <div className="staff-list">
          {list.length===0&&!addMode&&<div style={{padding:'12px',textAlign:'center',color:'var(--text-sm)',fontSize:13}}>등록된 담당자가 없어요</div>}
          {list.map(s=>(
            <div key={s.id} className={`staff-row ${selId===s.id?'sel':''}`} onClick={()=>setSelId(s.id)}>
              <div className="sr-avatar" style={{background:getColor(s.id)}}>{getAvatar(s.name)}</div>
              <div style={{flex:1,minWidth:0}}>
                <span className={`sr-name ${selId===s.id?'sel':''}`}>{s.name}</span>
                {s.phone&&<div style={{fontSize:10,color:'var(--text-sm)',marginTop:1}}>{s.phone.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3')}</div>}
              </div>
              <div className="sr-btns" onClick={e=>e.stopPropagation()}>
                <button className="sr-btn" onClick={()=>handleEdit(s)}>✏️</button>
                <button className="sr-btn del" onClick={()=>handleDelete(s.id)}>🗑</button>
              </div>
            </div>
          ))}
        </div>
        {addMode?(
          <div style={{background:'var(--bg)',borderRadius:12,padding:13,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>{editTarget?'정보 수정':'새 담당자 추가'}</div>
            <input className="sheet-input" placeholder="담당자 이름" value={inputName} onChange={e=>setInputName(e.target.value)} autoFocus/>
            <input className="sheet-input" placeholder="전화번호 (문자 알림용, 선택)" value={inputPhone} onChange={e=>setInputPhone(e.target.value)} type="tel" style={{marginTop:6}}/>
            <div style={{display:'flex',gap:8,marginTop:6}}>
              <button onClick={()=>{setAddMode(false);setEditTarget(null);setInputName('');}} style={{flex:1,padding:'10px',borderRadius:9,border:'1.5px solid var(--border)',background:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
              <button onClick={handleSaveStaff} style={{flex:2,padding:'10px',borderRadius:9,border:'none',background:'var(--navy)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{editTarget?'수정':'추가'}</button>
            </div>
          </div>
        ):(
          <button className="add-staff-btn" onClick={()=>{setAddMode(true);setEditTarget(null);setInputName('');}}>＋ 새 담당자 추가</button>
        )}
        <button className="sheet-confirm-btn" onClick={handleConfirm}>{mode==='setup'?'시작하기 →':'확인'}</button>
        {mode==='switch'&&<div className="sheet-cancel" onClick={onClose}>취소</div>}
      </div>
    </div>
  );
}

/* ── CS Memo Screen ── */
function CSMemoScreen({building,problem,staffId,staffName,staffDay,onBack,onSaved}){
  const [memoStaffId,setMemoStaffId]=useState(staffId);
  const [memoStaffName,setMemoStaffName]=useState(staffName);
  const [memoDay,setMemoDay]=useState(staffDay);
  const [showStaffPicker,setShowStaffPicker]=useState(false);
  const [csName,setCsName]=useState('');
  const [csPhone,setCsPhone]=useState('');
  const [csEmail,setCsEmail]=useState('');
  const [csContact,setCsContact]=useState([]);
  const [csProbs,setCsProbs]=useState(problem?[problem.label]:[]);
  const [csActions,setCsActions]=useState([]);
  const [csMemo,setCsMemo]=useState('');
  const [csPosition,setCsPosition]=useState('');
  const [csShowPosition,setCsShowPosition]=useState(false);
  const [csDesiredStart,setCsDesiredStart]=useState('');
  const [csDocDeadline,setCsDocDeadline]=useState('');
  const [saving,setSaving]=useState(false);
  const [saveConfirm,setSaveConfirm]=useState(false);
  const memoScrollRef=useRef(null);
  const toggle=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);

  const save=async()=>{
    if(!csName.trim()||(!csPhone.trim()&&!csEmail.trim())){alert('성함과 연락처를 입력해주세요');return;}
    setSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:memoDay,staffId:memoStaffId,staff:memoStaffName,
      name:csName,phone:csPhone,email:csEmail,position:csPosition,contactMethod:csContact,
      building:building?.label||'-',buildingId:building?.id||'-',
      problem:problem?.label||'-',problemCat:problem?.cat||'-',
      problems:csProbs,
      actions:csActions.map(id=>ACTION_TAGS.find(t=>t.id===id)?.label||id),
      memo:csMemo,desiredStartDate:csDesiredStart,docDeadline:csDocDeadline,status:'신규',source:getUrlSource(),
    };
    try{await db.collection('leads').add(data);}catch(e){console.warn(e);}
    sendToSheet(Object.assign({_sheetType:'lead'},data));
    // 자동 SMS 발송 (fire-and-forget)
    const smsCfg=loadSolapiConfig();
    if(smsCfg.workerUrl){
      const smsData={name:csName,phone:csPhone,building:building?.label||'-',problem:problem?.label||'-',staff:memoStaffName,staffId:memoStaffId,company:'',position:csPosition,buildingType:building?.label||'-',datetime:memoDay};
      if(smsCfg.autoCustomer!==false&&csPhone){
        sendSMS(csPhone,fillTemplate(loadSmsTemplates().customerThank,smsData)).catch(()=>{});
      }
      if(smsCfg.autoStaff!==false){
        const sp=loadStaffList().find(s=>s.id===memoStaffId)?.phone;
        if(sp)sendSMS(sp,fillTemplate(loadSmsTemplates().staffNotify,smsData)).catch(()=>{});
      }
    }
    setSaving(false);
    onSaved(data);
  };

  return(
    <div className="screen active memo-screen">
      {showStaffPicker&&(
        <StaffModal mode="switch" currentStaffId={memoStaffId} staffDay={memoDay}
          onSelect={(s,d)=>{setMemoStaffId(s.id);setMemoStaffName(s.name);setMemoDay(d);setShowStaffPicker(false);}}
          onClose={()=>setShowStaffPicker(false)}/>
      )}
      <div className="hdr">
        <div className="hdr-brand">
          <img src="/logo-pour.png" alt="Netform R&D" style={{height:'32px',width:'auto',display:'block',filter:'brightness(0) invert(1)'}}/>
        </div>
        <div className="hdr-div"/>
        <div className="hdr-sub">CS 메모</div>
        <div className="hdr-r"><button className="btn-back" onClick={onBack}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>
      </div>
      <div className="memo-scroll-wrap">
      <div className="memo-scroll" ref={memoScrollRef}>

        {/* 담당자 확인 */}
        <div className="msec">
          <div className="msec-title purple">담당자 확인</div>
          <div className="staff-confirm">
            <div className="sc-left">
              <div className="sc-avatar" style={{background:getColor(memoStaffId)}}>{getAvatar(memoStaffName)}</div>
              <div><div className="sc-name">{memoStaffName||'미선택'}</div><div className="sc-day">{memoDay}</div></div>
            </div>
            <button className="sc-change" onClick={()=>setShowStaffPicker(true)}>변경</button>
          </div>
        </div>

        {/* 컨텍스트 */}
        <div className="msec">
          <div className="msec-title">상담 컨텍스트</div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {building&&<span className="ctx-pill">{building.icon} {building.label}</span>}
            {problem&&<span className="ctx-pill blue">[{problem.cat}] {problem.label}</span>}
          </div>
        </div>

        {/* 주요 문제 (편집 가능) */}
        <div className="msec">
          <div className="msec-title">주요 문제 <span style={{fontWeight:400,color:'var(--border)',fontSize:11,letterSpacing:0,textTransform:'none'}}>(복수 선택)</span></div>
          <div className="chip-wrap">
            {ALL_PROBLEMS.map(p=>(
              <button key={p.id} className={`chip ${csProbs.includes(p.label)?'on':''}`} onClick={()=>toggle(csProbs,setCsProbs,p.label)}>{p.label}</button>
            ))}
          </div>
        </div>

        {/* 고객 정보 */}
        <div className="msec">
          <div className="msec-title">고객 정보 <span style={{color:'var(--blue)',fontWeight:700,fontSize:11,letterSpacing:0,textTransform:'none'}}>* 전화 또는 이메일 필수</span></div>

                {csShowPosition&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid var(--border)',borderRadius:9,boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:10,overflow:'hidden',marginTop:2,maxHeight:200,overflowY:'auto'}}>
                  {getPositions(building?.id).map(p=>(
                    <button key={p} onClick={()=>{setCsPosition(p);setCsShowPosition(false);}} style={{width:'100%',padding:'10px 14px',border:'none',background:csPosition===p?'var(--blue-l)':'#fff',color:csPosition===p?'var(--blue)':'var(--text)',fontSize:13,fontWeight:csPosition===p?700:500,cursor:'pointer',fontFamily:'inherit',textAlign:'left',borderBottom:'1px solid var(--border-s)'}}>{p}</button>
                  ))}
                </div>}
              </div>
            </div>
            <input className="minput" placeholder="전화번호" value={csPhone} onChange={e=>setCsPhone(e.target.value)} inputMode="tel"/>
            <input className="minput" placeholder="이메일 (선택)" value={csEmail} onChange={e=>setCsEmail(e.target.value)} inputMode="email"/>

            {ACTION_TAGS.map(t=>(
              <button key={t.id} className={`atag ${csActions.includes(t.id)?'on':''}`} onClick={()=>toggle(csActions,setCsActions,t.id)}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
          <div style={{fontSize:12,fontWeight:700,color:'var(--purple)',marginBottom:7}}>현장 메모</div>
          <textarea className="minput" style={{borderColor:'var(--purple-m)'}} rows={3} placeholder="고객 반응, 특이사항, 후속 참고사항..." value={csMemo} onChange={e=>setCsMemo(e.target.value)}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:14}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--purple)',marginBottom:7}}>희망 착공일자</div>
              <input className="minput" type="date" style={{borderColor:'var(--purple-m)'}} value={csDesiredStart} onChange={e=>setCsDesiredStart(e.target.value)}/>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--purple)',marginBottom:7}}>자료 제출 기한</div>
              <input className="minput" type="date" style={{borderColor:'var(--purple-m)'}} value={csDocDeadline} onChange={e=>setCsDocDeadline(e.target.value)}/>
            </div>
          </div>
        </div>
      </div>
      </div>

      {/* 저장 확인 모달 */}
      {saveConfirm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}} onClick={()=>setSaveConfirm(false)}>
          <div style={{background:'#fff',borderRadius:16,padding:'28px 24px',width:'min(320px,85vw)',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:36,marginBottom:12}}>💾</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:6}}>저장하시겠습니까?</div>
            <div style={{fontSize:13,color:'var(--text-md)',marginBottom:20,lineHeight:1.5}}>입력한 상담 메모를 저장합니다</div>
            <div style={{display:'flex',gap:10}}>
              <button style={{flex:1,padding:'13px 0',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--bg)',fontSize:14,fontWeight:700,color:'var(--text-md)',cursor:'pointer',fontFamily:'inherit'}} onClick={()=>setSaveConfirm(false)}>취소</button>
              <button style={{flex:2,padding:'13px 0',borderRadius:10,border:'none',background:'var(--blue)',fontSize:14,fontWeight:800,color:'#fff',cursor:'pointer',fontFamily:'inherit'}} onClick={()=>{setSaveConfirm(false);save();}} disabled={saving}>{saving?'저장 중...':'저장하기'}</button>
            </div>
          </div>
        </div>
      )}

      <div className="bottom-bar">
        <button className="btn btn-outline btn-lg" style={{flex:1}} onClick={onBack}>취소</button>

      </div>
    </div>
  );

  const [ntMemo,setNtMemo]=useState('');

  const [ntPencilMode,setNtPencilMode]=useState(true);
  const [ntMemoImgs,setNtMemoImgs]=useState([]);

  const [ntStep,setNtStep]=useState('info'); // 'info' | 'memo'
  const [ntOpenSec,setNtOpenSec]=useState(new Set([]));
  const [ntBizCard,setNtBizCard]=useState({front:null,back:null});

  const [ntQuickSms,setNtQuickSms]=useState(false);

  const [ntSmsSending,setNtSmsSending]=useState(false);

  const ntSafeClose=()=>{if(ntHasData()&&!window.confirm('입력한 내용이 저장되지 않았습니다. 닫으시겠어요?'))return;setShowNote(false);};

    setNtSaving(true);

      savedAt:new Date().toISOString(),day:staffDay,staffId,staff:staffName,

      phone:ntPhone,email:ntEmail,contactMethod:ntContact,

      problem:problem?.label||'-',problemCat:problem?.cat||'-',

      interests:ntInterests,
      deliveryDocs:ntDeliveryDocs,

      businessCard:ntBizCard,
      memo:ntMemo,memoImgs:ntMemoImgs,keywords:ntKeywords,brandTag:ntBrandTag,status:'신규',source:getUrlSource(),
    };
    try{await db.collection('leads').add(data);}catch(e){console.warn(e);}
    sendToSheet(Object.assign({_sheetType:'lead'},data));
    // 자동 SMS 발송 (fire-and-forget)
    const smsCfg=loadSolapiConfig();
    if(smsCfg.workerUrl){
      const smsData={name:ntName,phone:ntPhone,building:building?.label||'-',problem:problem?.label||'-',staff:staffName,staffId,company:ntCompany,position:ntPosition,buildingType:building?.label||'-',datetime:dateStr};
      if(smsCfg.autoCustomer!==false&&ntPhone){
        sendSMS(ntPhone,fillTemplate(loadSmsTemplates().customerThank,smsData)).catch(()=>{});
      }
      if(smsCfg.autoStaff!==false){
        const sp=loadStaffList().find(s=>s.id===staffId)?.phone;
        if(sp)sendSMS(sp,fillTemplate(loadSmsTemplates().staffNotify,smsData)).catch(()=>{});
      }
    }
    setNtSaving(false);setNtDone(true);
  };

    setShowNote(false);setNtDone(false);setNtQuickSms(false);
    setNtName('');setNtCompany('');setNtPosition('');
    setNtPhone('');setNtEmail('');setNtContact([]);

    setNtMemo('');setNtMemoImgs([]);setNtKeywords([]);setNtBrandTag('POUR공법');setNtStep('info');
  };

  const logText=[
    `박람회: 공동주택관리산업박람회 (벡스코)`,`상담일시: ${dateStr}`,``,
    `건물유형: ${building?.label||'-'} (${building?.sub||'-'})`,
    `주요 문제: [${problem.cat}] ${problem.label}`,
    `추천 공법: ${problem.label}`,
    `제안서: ${problem.specUrl}`,``,
    `다음 액션: □ 방문진단  □ 제안서 전달  □ 회사소개서`,
    `특이사항: ${memo||'(없음)'}`,
  ].join('\n');



  return(
    <>
    <div className={`screen ${visible?'active':''}`} style={{background:'var(--bg)'}}>
      {qr&&<QRModal url={qr.url} title={qr.title} onClose={()=>setQr(null)}/>}
      {zoomPhoto&&<PhotoZoomModal photos={zoomPhoto.photos} index={zoomPhoto.index} onClose={()=>setZoomPhoto(null)}/>}
      {mediaViewer!==null&&(()=>{
        const mList=(photos.media||[]).filter(s=>s);
        const mThumbs=photos.mediaThumbs||[];
        const mSrc=mList[mediaViewer]||'';
        const mParsed=parseVideoUrl(mSrc);
        const mIsVid=!!mParsed;
        const getThumb=(idx,url)=>{
          if(mThumbs[idx])return mThumbs[idx];
          const p=parseVideoUrl(url);
          if(p&&p.type==='youtube'){const m2=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);if(m2)return`https://img.youtube.com/vi/${m2[1]}/hqdefault.jpg`;}
          if(!p)return url;
          return null;
        };
        // 썸네일 스트립: 이전 1개 + 현재 + 다음 (최대 4개)
        const stripItems=[];
        const stripStart=Math.max(0,mediaViewer-1);
        for(let si=stripStart;si<Math.min(stripStart+4,mList.length);si++){
          stripItems.push({idx:si,thumb:getThumb(si,mList[si]),isCurrent:si===mediaViewer});
        }
        return(
          <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'#000',zIndex:950,overflow:'hidden',touchAction:'none'}}
            onTouchStart={e=>{
              const s=mvSwipeRef.current;
              if(e.touches.length===2&&!mIsVid){
                const dx2=e.touches[0].clientX-e.touches[1].clientX,dy2=e.touches[0].clientY-e.touches[1].clientY;
                s.startDist=Math.sqrt(dx2*dx2+dy2*dy2);s.startScale=s.scale||1;
              }else if(e.touches.length===1&&!mIsVid){
                const now=Date.now();
                if(now-(s.lastTap||0)<300){
                  e.preventDefault();
                  if((s.scale||1)>1.1){s.scale=1;s.posX=0;s.posY=0;setMvScale(1);setMvPos({x:0,y:0});}
                  else{s.scale=2.5;s.posX=0;s.posY=0;setMvScale(2.5);setMvPos({x:0,y:0});}
                  s.lastTap=0;return;
                }
                s.lastTap=now;
                if((s.scale||1)>1){s.panning=true;s.startX=e.touches[0].clientX;s.startY2=e.touches[0].clientY;s.startPosX=s.posX||0;s.startPosY=s.posY||0;}
              }
            }}
            onTouchMove={e=>{
              const s=mvSwipeRef.current;
              if(e.touches.length===2&&!mIsVid){
                e.preventDefault();
                const dx2=e.touches[0].clientX-e.touches[1].clientX,dy2=e.touches[0].clientY-e.touches[1].clientY;
                const dist=Math.sqrt(dx2*dx2+dy2*dy2);
                let ns=s.startScale*(dist/s.startDist);ns=Math.max(1,Math.min(5,ns));
                s.scale=ns;setMvScale(ns);
                if(ns<=1){s.posX=0;s.posY=0;setMvPos({x:0,y:0});}
              }else if(e.touches.length===1&&s.panning&&(s.scale||1)>1){
                e.preventDefault();
                const dx3=e.touches[0].clientX-s.startX;
                const dy3=e.touches[0].clientY-s.startY2;
                s.posX=s.startPosX+dx3;s.posY=s.startPosY+dy3;
                setMvPos({x:s.posX,y:s.posY});
              }
            }}
            onTouchEnd={e=>{
              const s=mvSwipeRef.current;
              if(e.touches.length<2){s.startDist=0;}
              if(e.touches.length===0){s.panning=false;}
              if((s.scale||1)<=1){s.scale=1;s.posX=0;s.posY=0;setMvScale(1);setMvPos({x:0,y:0});}
            }}
          >
            {/* 상단: 썸네일 스트립 */}
            <div style={{position:'absolute',top:0,left:0,right:0,padding:'14px 14px 20px',background:'linear-gradient(to bottom,rgba(0,0,0,.8) 0%,rgba(0,0,0,.4) 70%,transparent 100%)',zIndex:4}}
              onTouchStart={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()} onTouchEnd={e=>e.stopPropagation()}>
              {/* 카운터 */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10}}>
                <span style={{fontSize:12,color:'rgba(255,255,255,.7)',fontWeight:700,background:'rgba(0,0,0,.4)',padding:'3px 10px',borderRadius:20,backdropFilter:'blur(4px)'}}>{mediaViewer+1} / {mList.length}</span>
              </div>
              {/* 뒤로가기 버튼 — 우상단 고정 */}
              <button onTouchEnd={e=>{e.stopPropagation();setMediaViewer(null);setInlinePlayIdx(null);}} onClick={()=>{setMediaViewer(null);setInlinePlayIdx(null);}}
                style={{position:'absolute',top:14,right:14,width:44,height:44,borderRadius:12,border:'2px solid rgba(255,255,255,.35)',background:'rgba(0,0,0,.55)',backdropFilter:'blur(10px)',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:6,flexShrink:0}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
              </button>
              {/* 썸네일 스트립 — 중앙 정렬 */}
              {mList.length>1&&(
                <div style={{display:'flex',gap:6,justifyContent:'center'}}>
                  {stripItems.map(({idx,thumb,isCurrent})=>(
                    <div key={idx} onClick={()=>setMediaViewer(idx)}
                      style={{width:48,height:64,borderRadius:8,overflow:'hidden',cursor:'pointer',position:'relative',
                        border:isCurrent?'2px solid #fff':'2px solid rgba(255,255,255,.2)',
                        opacity:isCurrent?1:1,
                        transition:'all .2s'}}>
                      {thumb?(
                        <img src={thumb} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block',
                          filter:isCurrent?'none':'brightness(.35)',transition:'filter .2s'}}/>
                      ):(
                        <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
                          background:isCurrent?'#2a2a3e':'#111',transition:'background .2s'}}>
                          <span style={{fontSize:14,color:isCurrent?'#fff':'rgba(255,255,255,.3)'}}>▶</span>
                        </div>
                      )}
                      {!isCurrent&&(
                        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.3)'}}/>
                      )}
                    </div>
                  ))}
                  {stripStart+4<mList.length&&(
                    <div style={{width:48,height:64,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <span style={{fontSize:11,color:'rgba(255,255,255,.4)',fontWeight:700}}>+{mList.length-stripStart-4}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
            {/* 메인 미디어 — 전체 화면 */}
            <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center'}}
              onClick={()=>{if(mParsed&&mParsed.type==='direct'&&mvVideoRef.current){if(mvVideoRef.current.paused){mvVideoRef.current.play();setMvPlaying(true);}else{mvVideoRef.current.pause();setMvPlaying(false);}}}}
            >
              {mIsVid?(
                mParsed.type==='direct'?(
                  <video key={mSrc} ref={mvVideoRef} src={mSrc}
                    style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}
                    playsInline controls loop autoPlay
                    onPlay={()=>setMvPlaying(true)} onPause={()=>setMvPlaying(false)}/>
                ):(
                  <iframe key={mSrc} src={mParsed.embedUrl}
                    style={{width:'100%',height:'100%',border:'none'}}
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                    allowFullScreen/>
                )
              ):(
                <img src={mSrc} alt="미디어" style={{width:'100%',height:'100%',objectFit:'contain',display:'block',transform:`translate(${mvPos.x}px,${mvPos.y}px) scale(${mvScale})`,transition:mvScale<=1?'transform .15s':'none'}}/>
              )}
              {mParsed&&mParsed.type==='direct'&&!mvPlaying&&(
                <div style={{position:'absolute',pointerEvents:'none',width:68,height:68,borderRadius:'50%',background:'rgba(0,0,0,.55)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{fontSize:30,color:'#fff',marginLeft:5}}>▶</span>
                </div>
              )}
            </div>
          </div>
        );
      })()}



      <div className="hdr">
        <div className="hdr-brand">
          <img src="/logo-pour.png" alt="Netform R&D" style={{height:'32px',width:'auto',display:'block',filter:'brightness(0) invert(1)'}}/>
        </div>
        <div className="hdr-div"/><div className="hdr-sub">공법 분석</div>
        <div className="hdr-r"><button className="btn-back" onClick={onBack}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>
      </div>
      <div className="sol-header">

        <div className="sol-name">{problem.label}</div>

                        </div>
                      </div>

                      {/* 건물 유형 — 3가지 */}
                      <div style={{display:'flex',gap:6}}>

                          const sel=effectiveBuildingId===b.id;
                          return <button key={b.id} onClick={()=>{if(sel){setEffectiveBuildingId(null);}else{setEffectiveBuildingId(b.id);setNtPosition('');}}}

                        <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4,letterSpacing:'.04em'}}>성함 <span style={{color:'var(--blue)'}}>*</span></div>
                        <div style={{position:'relative'}}>
                          <textarea className="note-input" rows="1" value={ntName}
                            onFocus={e=>{e.target.dataset.focused=Date.now();}}
                            onChange={e=>{const v=e.target.value.replace(/\n/g,'');const f=parseInt(e.target.dataset.focused||0);if(Date.now()-f<300&&!ntName&&v==='.')return;setNtName(v);}}
                            style={{fontSize:18,padding:'14px 44px 14px 14px',minHeight:56,resize:'none',lineHeight:1.4,width:'100%',boxSizing:'border-box'}}
                            placeholder="펜슬로 필기"/>
                          {ntName&&<button onClick={()=>setNtName(v=>v.slice(0,-1))}
                            style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',width:36,height:36,borderRadius:'50%',border:'1.5px solid var(--border)',background:'#fff',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-sm)',fontFamily:'inherit',boxShadow:'0 1px 4px rgba(0,0,0,.08)'}}>←</button>}
                        </div>
                      </div>

                      {/* 연락처 — 큰 필기 영역 + 백스페이스 */}

                        <div style={{position:'relative'}}>
                          <textarea className="note-input" rows="1" value={ntPhone}
                            onFocus={e=>{e.target.dataset.focused=Date.now();}}
                            onChange={e=>{const v=e.target.value.replace(/\n/g,'');const f=parseInt(e.target.dataset.focused||0);if(Date.now()-f<300&&!ntPhone&&v==='.')return;setNtPhone(v);}}
                            style={{fontSize:18,padding:'14px 44px 14px 14px',minHeight:56,resize:'none',lineHeight:1.4,width:'100%',boxSizing:'border-box'}}
                            placeholder="펜슬로 필기"/>
                          {ntPhone&&<button onClick={()=>setNtPhone(v=>v.slice(0,-1))}
                            style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',width:36,height:36,borderRadius:'50%',border:'1.5px solid var(--border)',background:'#fff',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-sm)',fontFamily:'inherit',boxShadow:'0 1px 4px rgba(0,0,0,.08)'}}>←</button>}
                        </div>
                      </div>

                      {/* 직급 — 아파트/관공서면 표시, 일반건물이면 선택적 */}
                      {(effectiveBuildingId&&effectiveBuildingId!=='etc'||ntShowPosition||ntPosition)&&(
                        <div style={{position:'relative'}}>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4,letterSpacing:'.04em'}}>직급</div>
                          <button className="note-input" style={{fontSize:14,padding:'12px 14px',textAlign:'left',cursor:'pointer',color:ntPosition?'var(--text)':'var(--text-sm)',width:'100%'}} onClick={()=>setNtShowPosition(!ntShowPosition)}>{ntPosition||'선택하세요'}<span style={{position:'absolute',right:14,top:'auto',bottom:14,fontSize:10,color:'var(--text-sm)'}}>▼</span></button>
                          {ntShowPosition&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid var(--border)',borderRadius:9,boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:10,overflow:'hidden',marginTop:2,maxHeight:200,overflowY:'auto'}}>
                            {getPositions(effectiveBuildingId).map(p=>(
                              <button key={p} onClick={()=>{setNtPosition(p);setNtShowPosition(false);}} style={{width:'100%',padding:'11px 14px',border:'none',background:ntPosition===p?'var(--blue-l)':'#fff',color:ntPosition===p?'var(--blue)':'var(--text)',fontSize:13,fontWeight:ntPosition===p?700:500,cursor:'pointer',fontFamily:'inherit',textAlign:'left',borderBottom:'1px solid var(--border-s)'}}>{p}</button>
                            ))}
                          </div>}
                        </div>
                      )}

                      {/* 메모 작성 / 건너뛰기 */}
                      <div style={{display:'flex',gap:6,marginTop:4}}>
                        <button onClick={()=>setNtStep('memo')}
                          style={{flex:1,padding:'14px',borderRadius:12,border:'none',background:'var(--navy)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:6,boxShadow:'0 2px 8px rgba(11,29,58,.3)'}}>
                          📝 메모 작성
                        </button>
                        <button onClick={()=>setNtStep('memo')}
                          style={{padding:'14px 18px',borderRadius:12,border:'1.5px solid var(--border)',background:'#fff',color:'var(--text-sm)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                          건너뛰기 ›
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                {/* ── 본문: 텍스트 메모 + 낙서장 ── */}
                {ntStep==='memo'&&(
                  <div style={{display:'flex',flex:1,overflow:'hidden'}}>
                  <div className="note-sheet-scroll" style={{flex:1,minWidth:0}}
                    ref={el=>{
                      if(!el)return;
                      if(!el._twoFingerBound){
                        el._twoFingerBound=true;
                        el.addEventListener('touchstart',ev=>{el._touchCount=ev.touches.length;el._lastY2=ev.touches.length>=2?(ev.touches[0].clientY+ev.touches[1].clientY)/2:0;},{passive:false});
                        el.addEventListener('touchmove',ev=>{
                          if(ev.touches.length>=2){const cy=(ev.touches[0].clientY+ev.touches[1].clientY)/2;el.scrollTop+=(el._lastY2-cy);el._lastY2=cy;ev.preventDefault();}
                        },{passive:false});
                      }
                    }}
                    onPointerDown={e=>{if(e.pointerType==='pen'){markPenActive();const tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;e.currentTarget.classList.add('pen-active');}}}
                    onPointerUp={e=>{setTimeout(()=>e.currentTarget?.classList?.remove('pen-active'),800);}}
                    onPointerCancel={e=>{setTimeout(()=>e.currentTarget?.classList?.remove('pen-active'),800);}}>

                    <MemoTextarea value={ntMemo} onChange={setNtMemo}
                      onDoodleToggle={()=>setNtDoodleOpen(v=>!v)} doodleOpen={ntDoodleOpen}
                      doodleContent={React.createElement(DrawCanvas,{onDataUrl:setNtMemoImgs})}/>

                  </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      )}

    </>
  );
}

/* ── Leads Screen ── */

/* ── 명함 촬영 컴포넌트 ── */
function BusinessCardCapture({onCapture,openRef}){
  const [frontImg,setFrontImg]=useState(null);
  const [backImg,setBackImg]=useState(null);
  const [camOpen,setCamOpen]=useState(false);
  const [camSide,setCamSide]=useState('front'); // 'front' or 'back'
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const canvasRef=useRef(null);

  const openCam=(side)=>{
    setCamSide(side);setCamOpen(true);
    setTimeout(()=>{
      navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}})
        .then(stream=>{streamRef.current=stream;if(videoRef.current)videoRef.current.srcObject=stream;})
        .catch(e=>{alert('카메라 접근 권한이 필요합니다');setCamOpen(false);});
    },100);
  };
  useEffect(()=>{if(openRef)openRef.current=()=>openCam('front');},[]);
  const closeCam=()=>{
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current=null;setCamOpen(false);
  };
  const capture=()=>{
    const video=videoRef.current;if(!video)return;
    const c=canvasRef.current||document.createElement('canvas');
    canvasRef.current=c;
    c.width=video.videoWidth;c.height=video.videoHeight;
    const ctx=c.getContext('2d');ctx.drawImage(video,0,0);
    const dataUrl=c.toDataURL('image/jpeg',0.85);
    if(camSide==='front'){setFrontImg(dataUrl);if(onCapture)onCapture('front',dataUrl);}
    else{setBackImg(dataUrl);if(onCapture)onCapture('back',dataUrl);}
    closeCam();
    // 앞면 촬영 직후 뒷면 안내
    if(camSide==='front'&&!backImg){
      setTimeout(()=>{if(confirm('뒷면도 촬영하시겠어요?'))openCam('back');},400);
    }
  };
  const removeFront=()=>{setFrontImg(null);if(onCapture)onCapture('front',null);};
  const removeBack=()=>{setBackImg(null);if(onCapture)onCapture('back',null);};

  return(
    <>
      {(frontImg||backImg)?(
        <div className="bc-preview-row">
          {frontImg&&<div className="bc-preview-card">
            <img src={frontImg} alt="앞면"/>
            <span className="bc-preview-label">앞면</span>
            <button className="bc-preview-del" onClick={removeFront}>✕</button>
          </div>}
          {backImg&&<div className="bc-preview-card">
            <img src={backImg} alt="뒷면"/>
            <span className="bc-preview-label">뒷면</span>
            <button className="bc-preview-del" onClick={removeBack}>✕</button>
          </div>}
          {!backImg&&<button className="bc-preview-card" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:80,cursor:'pointer',border:'1.5px dashed var(--border)'}} onClick={()=>openCam('back')}>
            <div style={{textAlign:'center',padding:10}}><div style={{fontSize:20,marginBottom:4}}>📸</div><div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>뒷면 촬영</div></div>
          </button>}
          {frontImg&&!backImg&&null}
          <button style={{position:'absolute',right:4,bottom:4,fontSize:10,background:'none',border:'none',color:'var(--blue)',fontWeight:700,cursor:'pointer',padding:4}} onClick={()=>openCam('front')}>앞면 재촬영</button>
        </div>
      ):(
        <button className="bc-btn" onClick={()=>openCam('front')}>
          <span className="bc-btn-icon">📇</span>
          <div><div className="bc-btn-text">명함 촬영</div><div className="bc-btn-sub">앞면 필수 · 뒷면 선택</div></div>
        </button>
      )}

      {camOpen&&(
        <div className="bc-cam-overlay">
          <div className="bc-cam-header">
            <span className="bc-cam-header-title">명함 {camSide==='front'?'앞면':'뒷면'} 촬영</span>
            <button className="bc-cam-close" onClick={closeCam}>✕</button>
          </div>
          <div className="bc-cam-body">
            <video ref={videoRef} className="bc-cam-video" autoPlay playsInline muted/>
            <div className="bc-cam-guide" style={{width:'80%',aspectRatio:'9/5',top:'50%',left:'10%',transform:'translateY(-50%)'}}>
              <span className="bc-cam-guide-label">명함을 테두리 안에 맞춰주세요</span>
            </div>
          </div>
          <div className="bc-cam-footer">
            <button className="bc-cam-shutter" onClick={capture}/>
          </div>
        </div>
      )}
    </>
  );
}

          grohomeCat={grohomeCat||GROHOME_CATS[0]}

      )}
    </div>
  );
}

/* ── PhotoSlot: 클릭→파일선택/URL, 붙여넣기→이미지 삽입 ── */
function PhotoSlot({src,label,onSet,onRemove,wide,aspect}){
  const fileRef=useRef(null);
  const wrapRef=useRef(null);
  const handleFile=(file)=>{
    if(!file||!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=480;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        onSet(c.toDataURL('image/jpeg',0.7));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  useEffect(()=>{
    const el=wrapRef.current;if(!el)return;
    const handler=(e)=>{
      const items=e.clipboardData?.items;if(!items)return;
      for(let it of items){
        if(it.type.startsWith('image/')){
          e.preventDefault();handleFile(it.getAsFile());return;
        }
      }
    };
    el.addEventListener('paste',handler);
    return()=>el.removeEventListener('paste',handler);
  });
  return(
    <div ref={wrapRef} tabIndex={0}
      style={{position:'relative',width:wide?'100%':120,height:wide?80:90,borderRadius:10,overflow:'hidden',border:'1.5px solid var(--border)',background:'#f3f4f6',flexShrink:0,cursor:'pointer',aspectRatio:aspect||'auto',outline:'none'}}
      onClick={()=>{
        const choice=src?window.confirm('새 사진으로 교체하시겠습니까?\n\n[확인] 파일 선택\n[취소] URL 직접 입력'):null;
        if(choice===true||!src){fileRef.current?.click();}
        else if(choice===false){const u=prompt('이미지 URL 입력:',src||'');if(u!==null)onSet(u);}
      }}>
      {src
        ?<>
          <img src={src} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
          <button onClick={(e)=>{e.stopPropagation();onRemove();}}
            style={{position:'absolute',top:3,right:3,width:18,height:18,borderRadius:'50%',border:'none',background:'rgba(0,0,0,.55)',color:'#fff',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
        </>
        :<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
          <span style={{fontSize:20,opacity:.25}}>📷</span>
          <span style={{fontSize:9,color:'var(--text-sm)',fontWeight:600,textAlign:'center',lineHeight:1.2}}>{label||'클릭 또는\n붙여넣기'}</span>
        </div>
      }
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
        onChange={(e)=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';}}/>
    </div>
  );
}

/* ── QR 통계 탭 컴포넌트 ── */
function QrStatsTab(){
  const [qrStats,setQrStats]=useState(null);
  const [qrLoading,setQrLoading]=useState(true);
  useEffect(()=>{
    db.collection('qr-stats').get()
      .then(s=>{
        const rows=s.docs.map(d=>({id:d.id,...d.data()}));
        rows.sort((a,b)=>(b.count||0)-(a.count||0));
        setQrStats(rows);
      })
      .catch(e=>{console.warn('qr-stats 로드 실패:',e);setQrStats([]);})
      .finally(()=>setQrLoading(false));
  },[]);
  if(qrLoading)return <div style={{textAlign:'center',padding:40,color:'var(--text-sm)'}}>불러오는 중...</div>;
  if(!qrStats||qrStats.length===0)return(
    <div style={{textAlign:'center',padding:'40px 20px'}}>
      <div style={{fontSize:40,marginBottom:10}}>📊</div>
      <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:6}}>아직 QR 통계가 없습니다</div>
      <div style={{fontSize:12,color:'var(--text-sm)',lineHeight:1.6,marginBottom:20}}>
        QR코드 스캔 시 Firestore의 <code style={{background:'var(--bg)',padding:'2px 6px',borderRadius:4}}>qr-stats</code> 컬렉션에 자동으로 기록됩니다.
      </div>
      <div style={{background:'var(--bg)',borderRadius:10,padding:'14px',textAlign:'left',fontSize:11,color:'var(--text-sm)',lineHeight:1.8}}>
        <div style={{fontWeight:800,marginBottom:4}}>📌 QR 통계 연동 방법:</div>
        1. QR코드 URL에 <code style={{background:'var(--card)',padding:'1px 4px',borderRadius:3}}>?src=banner-name</code> 추가<br/>
        2. 랜딩 페이지에서 <code style={{background:'var(--card)',padding:'1px 4px',borderRadius:3}}>src</code> 파라미터 읽기<br/>
        3. Firestore <code style={{background:'var(--card)',padding:'1px 4px',borderRadius:3}}>qr-stats/배너명</code> 문서의 count 증가<br/>
        4. 이 대시보드에서 자동 집계 확인
      </div>
    </div>
  );
  const maxCount=Math.max(...qrStats.map(q=>q.count||0),1);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {qrStats.map(q=>(
        <div key={q.id} style={{background:'var(--card)',borderRadius:10,border:'1px solid var(--border)',padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:4}}>{q.label||q.id}</div>
            <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:6,wordBreak:'break-all'}}>{q.url||''}</div>
            <div style={{height:6,borderRadius:3,background:'var(--bg)',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${((q.count||0)/maxCount)*100}%`,background:'var(--blue)',borderRadius:3,transition:'width .3s'}}/>
            </div>
          </div>
          <div style={{textAlign:'center',flexShrink:0}}>
            <div style={{fontSize:22,fontWeight:900,color:'var(--blue)'}}>{q.count||0}</div>
            <div style={{fontSize:9,fontWeight:700,color:'var(--text-sm)'}}>스캔</div>
          </div>
        </div>
      ))}
    </div>
  );
}

    }catch(e){alert('변경 실패');}

                      <div style={{display:'flex',alignItems:'center',gap:6}}>

                        {l.email&&<a href={`mailto:${l.email}`} style={{flex:1,minWidth:80,textAlign:'center',padding:'8px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:8,color:'#059669',fontSize:12,fontWeight:700,textDecoration:'none'}}>📧 메일</a>}
                      </div>

                      {/* 상담 내용 */}
                      {l.problems?.length>0&&(
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4}}>문제유형</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {l.problems.map(p=><span key={p} style={{fontSize:11,padding:'3px 8px',background:'#FEF3C7',color:'#92400E',borderRadius:20,fontWeight:700}}>{p}</span>)}
                          </div>
                        </div>
                      )}
                      {l.actions?.length>0&&(
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4}}>액션태그</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {l.actions.map(a=><span key={a} style={{fontSize:11,padding:'3px 8px',background:'#EDE9FE',color:'#5B21B6',borderRadius:20,fontWeight:700}}>{a}</span>)}
                          </div>
                        </div>
                      )}
                      {(l.memo||l.memoImgs?.length>0)&&(
                        <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:8,padding:'8px 10px'}}>
                          <div style={{fontSize:10,fontWeight:700,color:'#92400E',marginBottom:4}}>메모</div>
                          {l.memo&&<div style={{fontSize:12,color:'#78350F',lineHeight:1.5,marginBottom:l.memoImgs?.length>0?6:0}}>{l.memo}</div>}
                          {l.memoImgs?.map((img,pi)=>(
                            <div key={pi} style={{marginBottom:pi<l.memoImgs.length-1?6:0}}>
                              {l.memoImgs.length>1&&<div style={{fontSize:9,fontWeight:700,color:'#B45309',marginBottom:2}}>{pi+1}페이지</div>}
                              <img src={img} alt={`펜슬 메모 ${pi+1}p`} style={{width:'100%',borderRadius:6,display:'block'}}/>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* 상태 변경 */}
                      <div>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>상태 변경</div>
                        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                          {STATUS_OPTIONS.map(s=>(
                            <button key={s} onClick={()=>changeStatus(l.id,s)} style={{padding:'5px 10px',borderRadius:20,border:`1.5px solid ${STATUS_COLOR[s]||'#9CA3AF'}`,background:status===s?STATUS_COLOR[s]||'#9CA3AF':'#fff',color:status===s?'#fff':STATUS_COLOR[s]||'#9CA3AF',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                              {s}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* 저장시각 + 삭제 */}
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <span style={{fontSize:10,color:'var(--text-sm)'}}>{l.savedAt?new Date(l.savedAt).toLocaleString('ko'):''}</span>
                        <button onClick={()=>deleteLead(l.id)} style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer'}}>🗑 삭제</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 선택 삭제 바 */}
          {selectMode&&selectedIds.size>0&&(
            <div style={{padding:'10px 14px',background:'#FEF2F2',borderTop:'1.5px solid #FCA5A5',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <span style={{fontSize:13,fontWeight:800,color:'#DC2626'}}>{selectedIds.size}건 선택됨</span>
              <button onClick={deleteSelected} style={{padding:'8px 20px',borderRadius:10,border:'none',background:'#DC2626',color:'#fff',fontSize:13,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                🗑 휴지통으로 이동
              </button>
            </div>
          )}
        </div>
      )}

      {/* ── 담당자 관리 탭 ── */}
      {!loading&&tab==='staff'&&(
        <StaffManageTab/>
      )}

      {/* ── 사진 관리 탭 ── */}
      {!loading&&tab==='photos'&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>

          {/* ── 하자 사진 관리 ── */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>📸 공법별 사진 · 미디어 관리</div>
            <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:6,lineHeight:1.6}}>
              아래 사진은 <b>공법 상세 화면</b>에 표시됩니다.<br/>
              · <b>하자 사진</b> → 상단 정사각형 슬라이드<br/>
              · <b>미디어</b> → 관련 미디어 슬라이드 (GIF/영상/비교사진, 복수 등록 가능)<br/>
              사진 클릭 → 파일 선택 / 이미지 복사 후 붙여넣기(Ctrl+V) 가능
            </div>

            {ALL_PROBLEMS.map(p=>{
              const key=p.id;
              const data=casePhotos[key]||{causes:['','',''],completed:'',gif:''};
              return(
                <div key={key} style={{marginBottom:18,padding:'14px',background:'var(--bg)',borderRadius:12,border:'1px solid var(--border)'}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:2}}>{p.label}</div>
                  <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:10}}>{p.cat} · {p.sub}</div>

                  {/* 하자 사진들 */}
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>하자 사진</div>
                  <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                    {(data.causes||[]).map((url,i)=>(
                      <PhotoSlot key={i} src={url} label={`사진 ${i+1}`}
                        onSet={(v)=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:['','',''],completed:'',gif:''};up[key].causes[i]=v;setCasePhotos(up);}}
                        onRemove={()=>{const up=JSON.parse(JSON.stringify(casePhotos));up[key].causes.splice(i,1);setCasePhotos(up);}}
                      />
                    ))}
                    <button onClick={()=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',gif:''};up[key].causes.push('');setCasePhotos(up);}}
                      style={{width:100,height:75,borderRadius:10,border:'2px dashed var(--border)',background:'#fff',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,color:'var(--text-sm)',fontSize:11,fontWeight:700}}>
                      <span style={{fontSize:24}}>+</span>추가
                    </button>
                  </div>

                  {/* 관련 미디어 (복수) */}
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:4}}>🎬 관련 미디어</div>
                  <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:6,opacity:.7}}>영상/GIF → URL 입력 · 이미지 → 📁 업로드 가능</div>
                  {(data.media||(data.gif?[data.gif]:[])).map((url,mi)=>{
                    const mParsed=parseVideoUrl(url);
                    const isVid=!!mParsed;
                    const thumbVal=(data.mediaThumbs||[])[mi]||'';
                    return(
                      <div key={mi} style={{marginBottom:10,padding:8,background:'var(--card)',borderRadius:8,border:'1px solid var(--border)'}}>
                        {/* 프리뷰 */}
                        {url&&(
                          <div style={{marginBottom:6,display:'flex',gap:6,alignItems:'center'}}>
                            <div style={{borderRadius:6,overflow:'hidden',border:'1px solid var(--border)',background:'#000',width:100,height:75,flexShrink:0}}>
                              {isVid
                                ?(mParsed.type==='direct'
                                  ?<video src={url} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} muted playsInline/>
                                  :thumbVal
                                    ?<img src={thumbVal} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt="썸네일"/>
                                    :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#1a1a2e',color:'#fff',fontSize:10,fontWeight:700}}>▶ 영상</div>)
                                :<img src={url} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt={`미디어 ${mi+1}`}/>
                              }
                            </div>
                            {isVid&&(
                              <div style={{flex:1,fontSize:10,color:'var(--text-sm)',lineHeight:1.5}}>
                                <div style={{fontWeight:700,marginBottom:2}}>🖼 썸네일</div>
                                <input value={thumbVal} placeholder="썸네일 이미지 URL"
                                  onChange={e=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key].mediaThumbs)up[key].mediaThumbs=[];up[key].mediaThumbs[mi]=e.target.value;setCasePhotos(up);}}
                                  style={{width:'100%',padding:'5px 8px',borderRadius:6,border:'1px solid var(--border)',fontSize:11,fontFamily:'inherit',boxSizing:'border-box'}}/>
                                <input type="file" accept="image/*" id={`mt-${key}-${mi}`} style={{display:'none'}}
                                  onChange={e=>{
                                    const file=e.target.files[0];if(!file)return;
                                    const reader=new FileReader();
                                    reader.onload=(ev)=>{
                                      const img=new Image();
                                      img.onload=()=>{
                                        const MAX=320;let w=img.width,h=img.height;
                                        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
                                        const c=document.createElement('canvas');c.width=w;c.height=h;
                                        c.getContext('2d').drawImage(img,0,0,w,h);
                                        const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key].mediaThumbs)up[key].mediaThumbs=[];
                                        up[key].mediaThumbs[mi]=c.toDataURL('image/jpeg',0.7);setCasePhotos(up);
                                      };img.src=ev.target.result;
                                    };reader.readAsDataURL(file);e.target.value='';
                                  }}/>
                                <button onClick={()=>document.getElementById(`mt-${key}-${mi}`)?.click()}
                                  style={{marginTop:3,padding:'3px 8px',borderRadius:5,border:'1px solid var(--border)',background:'#f3f4f6',fontSize:10,cursor:'pointer',fontFamily:'inherit'}}>📁 썸네일 업로드</button>
                              </div>
                            )}
                          </div>
                        )}
                        {/* URL 입력 + 버튼들 */}
                        <div style={{display:'flex',gap:6}}>
                          <input value={url||''} placeholder={`YouTube/Drive/mp4 URL ${mi+1}`}
                            onChange={e=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',media:[]};const m=up[key].media||(up[key].gif?[up[key].gif]:[]);m[mi]=e.target.value;up[key].media=m;delete up[key].gif;setCasePhotos(up);}}
                            style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid var(--border)',fontSize:12,fontFamily:'inherit',boxSizing:'border-box'}}/>
                          <input type="file" accept="image/*"
                            id={`mf-${key}-${mi}`} style={{display:'none'}}
                            onChange={e=>{
                              const file=e.target.files[0];if(!file)return;
                              if(file.size>10*1024*1024){alert('이미지가 너무 큽니다 (최대 10MB)');e.target.value='';return;}
                              const saveMedia=(dataUrl)=>{
                                const up=JSON.parse(JSON.stringify(casePhotos));
                                if(!up[key])up[key]={causes:[],completed:'',media:[]};
                                const m=up[key].media||(up[key].gif?[up[key].gif]:[]);
                                m[mi]=dataUrl;up[key].media=m;delete up[key].gif;
                                setCasePhotos(up);
                              };
                              const reader=new FileReader();
                              reader.onload=(ev)=>{
                                const img=new Image();
                                img.onload=()=>{
                                  const MAX=480;
                                  let w=img.width,h=img.height;
                                  if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
                                  const c=document.createElement('canvas');c.width=w;c.height=h;
                                  c.getContext('2d').drawImage(img,0,0,w,h);
                                  saveMedia(c.toDataURL('image/jpeg',0.7));
                                };
                                img.src=ev.target.result;
                              };
                              reader.readAsDataURL(file);
                              e.target.value='';
                            }}/>
                          <button onClick={()=>document.getElementById(`mf-${key}-${mi}`)?.click()}
                            title="이미지 업로드 (영상은 URL 입력)"
                            style={{padding:'0 10px',borderRadius:8,border:'1px solid var(--border)',background:'#f3f4f6',fontSize:16,cursor:'pointer',lineHeight:1,fontFamily:'inherit'}}>📁</button>
                          <button onClick={()=>{const up=JSON.parse(JSON.stringify(casePhotos));const m=up[key]?.media||(up[key]?.gif?[up[key].gif]:[]);m.splice(mi,1);if(up[key].mediaThumbs)up[key].mediaThumbs.splice(mi,1);up[key].media=m;delete up[key].gif;setCasePhotos(up);}}
                            style={{padding:'0 10px',borderRadius:8,border:'1px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                  <button onClick={()=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',media:[]};const m=up[key].media||(up[key].gif?[up[key].gif]:[]);m.push('');up[key].media=m;delete up[key].gif;setCasePhotos(up);}}
                    style={{padding:'6px 14px',borderRadius:8,border:'1.5px dashed var(--border)',background:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--accent)',marginBottom:12}}>+ 미디어 추가</button>
                </div>
              );
            })}

          <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>🏗 공법 카드 사진</div>
            <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:14}}>공법 선택 화면에 보이는 카드 썸네일입니다.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {ALL_PROBLEMS.map(p=>(
                <div key={p.id} style={{borderRadius:10,border:'1.5px solid var(--border)',overflow:'hidden',background:'#fff'}}>
                  <PhotoSlot src={probPhotos[p.id]||p.img||''} label={p.label} aspect="4/3"
                    onSet={(v)=>{const up={...probPhotos,[p.id]:v};setProbPhotos(up);}}
                    onRemove={()=>{const up={...probPhotos};delete up[p.id];setProbPhotos(up);}}
                  />
                  <div style={{padding:'6px 8px'}}>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--text)',lineHeight:1.3}}>{p.label}</div>
                    <div style={{fontSize:10,color:'var(--text-sm)'}}>{p.cat}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* ── 수정 완료 버튼 (하단 고정) ── */}
          <div style={{position:'sticky',bottom:0,background:'linear-gradient(transparent,var(--bg) 20%)',padding:'20px 0 10px',zIndex:5}}>
            <button id="photoSaveBtn" onClick={async()=>{
              const btn=document.getElementById('photoSaveBtn');btn.disabled=true;btn.textContent='💾 저장 중...';
              saveCasePhotos(casePhotos);
              saveProblemPhotos(probPhotos);
              await new Promise(r=>setTimeout(r,3000));
              btn.textContent='✅ 저장 완료! 태블릿에서 새로고침하세요';btn.style.background='#059669';
              setTimeout(()=>{btn.textContent='💾 수정 완료 — 태블릿에 반영';btn.style.background='var(--accent)';btn.disabled=false;},3000);
            }} style={{width:'100%',padding:'16px',borderRadius:12,border:'none',background:'var(--accent)',color:'#fff',fontSize:16,fontWeight:900,cursor:'pointer',fontFamily:'inherit',boxShadow:'0 4px 16px rgba(37,99,235,.3)',transition:'all .2s'}}>
              💾 수정 완료 — 태블릿에 반영
            </button>
            <div style={{textAlign:'center',fontSize:11,color:'var(--text-sm)',marginTop:8}}>사진 수정 후 이 버튼을 눌러야 태블릿에 반영됩니다</div>
          </div>
        </div>
      )}

      {/* ── 휴지통 탭 ── */}
      {!loading&&tab==='qr'&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
          <div style={{fontSize:16,fontWeight:800,color:'var(--text)',marginBottom:16}}>🔲 QR코드 통계 대시보드</div>
          <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:16,lineHeight:1.6}}>
            배너/카탈로그에 인쇄된 QR코드별 스캔 횟수를 추적합니다.
          </div>
          <QrStatsTab/>
        </div>
      )}

      {!loading&&tab==='trash'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* 헤더 */}
          <div style={{padding:'10px 14px',background:'#FEF2F2',borderBottom:'1.5px solid #FCA5A5',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <span style={{fontSize:13,fontWeight:900,color:'#DC2626'}}>🗑 휴지통 ({trashedLeads.length}건)</span>

          </div>
          <div style={{flex:1,overflowY:'auto',padding:'12px'}}>
            {trashedLeads.length===0&&<div className="empty">휴지통이 비어있습니다</div>}
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {trashedLeads.map((l,i)=>(
                <div key={l.id||i} style={{background:'var(--card)',borderRadius:12,border:'1px solid #FCA5A5',padding:'12px 14px'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                        <span style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{l.name||'이름없음'}</span>
                        <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>{l.phone}</span>
                      </div>
                      <div style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>{l.staff} · {l.day} · {l.building}</div>
                      {l.problems?.length>0&&(
                        <div style={{display:'flex',flexWrap:'wrap',gap:3,marginTop:4}}>
                          {l.problems.map(p=><span key={p} style={{fontSize:10,padding:'2px 6px',background:'#FEF3C7',color:'#92400E',borderRadius:20,fontWeight:700}}>{p}</span>)}
                        </div>
                      )}
                    </div>
                    <span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:10,background:'#FEF2F2',color:'#DC2626',border:'1px solid #FCA5A5',flexShrink:0}}>{l.status||'신규'}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span style={{fontSize:10,color:'#DC2626',fontWeight:600}}>🗑 삭제: {l.deletedAt?new Date(l.deletedAt).toLocaleString('ko'):''}</span>
                    <button onClick={()=>restoreLead(l.id)} style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid #BBF7D0',background:'#F0FDF4',color:'#059669',fontSize:11,fontWeight:700,cursor:'pointer'}}>↩ 복원</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── 문자 설정 탭 ── */}
      {!loading&&tab==='sms'&&(
        <SmsSettingsTab/>
      )}

      {/* SMS 모달 & 토스트 */}
      {smsTarget&&<SmsModal phone={smsTarget.phone} name={smsTarget.name} building={smsTarget.building} problem={smsTarget.problem} staff={smsTarget.staff} company={smsTarget.company||''} position={smsTarget.position||''} buildingType={smsTarget.building||''} datetime={smsTarget.day||''}
        onClose={()=>setSmsTarget(null)} onToast={(msg,type)=>setToast({msg,type})}/>}
      {toast&&<SmsToast message={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      {showPinChange&&<PinChangeModal onClose={()=>setShowPinChange(false)} onDone={()=>{setShowPinChange(false);setToast({type:'success',msg:'비밀번호가 변경되었습니다'});setTimeout(()=>setToast(null),2500);}}/>}
    </div>
  );
}

/* ── 담당자 관리 탭 컴포넌트 ── */
function StaffManageTab(){
  const [sList,setSList]=useState(loadStaffList);
  const [addMode,setAddMode]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const [inputName,setInputName]=useState('');
  const [inputPhone,setInputPhone]=useState('');
  const [inputPosition,setInputPosition]=useState('');

  const handleSave=()=>{
    if(!inputName.trim())return;
    if(editTarget){
      const next=sList.map(s=>s.id===editTarget.id?{...s,name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,''),position:inputPosition.trim()}:s);
      saveStaffList(next);setSList(next);
    }else{
      const ns={id:'s'+Date.now(),name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,''),position:inputPosition.trim()};
      const next=[...sList,ns];
      saveStaffList(next);setSList(next);
    }
    setAddMode(false);setEditTarget(null);setInputName('');setInputPhone('');setInputPosition('');
  };
  const handleDel=id=>{
    if(!confirm('이 담당자를 삭제하시겠어요?'))return;
    const next=sList.filter(s=>s.id!==id);
    saveStaffList(next);setSList(next);
  };
  const handleEdit=s=>{setEditTarget(s);setInputName(s.name);setInputPhone(s.phone||'');setInputPosition(s.position||'');setAddMode(true);};

  return(
    <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>👤 담당자 관리</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:14,lineHeight:1.6}}>담당자를 추가·수정·삭제할 수 있습니다.</div>

        {sList.length===0&&!addMode&&<div style={{textAlign:'center',padding:'24px',color:'var(--text-sm)',fontSize:13}}>등록된 담당자가 없습니다</div>}
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {sList.map(s=>(
            <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'var(--bg)',borderRadius:12,border:'1px solid var(--border)'}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:getColor(s.id),display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:'#fff',flexShrink:0}}>{getAvatar(s.name)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:800,color:'var(--text)'}}>{s.name}</div>
                <div style={{fontSize:11,color:'var(--text-sm)',marginTop:1}}>
                  {s.position&&<span style={{marginRight:8,fontWeight:600}}>{s.position}</span>}
                  {s.phone&&<span>{s.phone.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3')}</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>handleEdit(s)} style={{padding:'6px 10px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:11,fontWeight:700,cursor:'pointer'}}>수정</button>
                <button onClick={()=>handleDel(s.id)} style={{padding:'6px 10px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer'}}>삭제</button>
              </div>
            </div>
          ))}
        </div>
        {addMode?(
          <div style={{background:'var(--bg)',borderRadius:12,padding:14,border:'1px solid var(--border)'}}>
            <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:10}}>{editTarget?'담당자 수정':'새 담당자 추가'}</div>
            <input className="sheet-input" placeholder="이름 *" value={inputName} onChange={e=>setInputName(e.target.value)} autoFocus style={{marginBottom:8}}/>
            <input className="sheet-input" placeholder="직급 (선택)" value={inputPosition} onChange={e=>setInputPosition(e.target.value)} style={{marginBottom:8}}/>
            <input className="sheet-input" placeholder="전화번호 (선택)" value={inputPhone} onChange={e=>setInputPhone(e.target.value)} type="tel" style={{marginBottom:10}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setAddMode(false);setEditTarget(null);setInputName('');setInputPhone('');setInputPosition('');}} style={{flex:1,padding:'10px',borderRadius:9,border:'1.5px solid var(--border)',background:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
              <button onClick={handleSave} style={{flex:2,padding:'10px',borderRadius:9,border:'none',background:'var(--navy)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{editTarget?'수정 완료':'추가'}</button>
            </div>
          </div>
        ):(
          <button onClick={()=>{setAddMode(true);setEditTarget(null);setInputName('');setInputPhone('');setInputPosition('');}} style={{width:'100%',padding:'12px',borderRadius:12,border:'2px dashed var(--border)',background:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--accent)'}}>＋ 새 담당자 추가</button>
        )}
      </div>
    </div>
  );
}

/* ── SMS 설정 탭 컴포넌트 ── */
function SmsSettingsTab(){
  const [cfg,setCfg]=useState(loadSolapiConfig);
  const [tpls,setTpls]=useState(loadSmsTemplates);
  const [saved,setSaved]=useState('');
  const [testPhone,setTestPhone]=useState('');
  const [testing,setTesting]=useState(false);

  const saveCfg=(next)=>{setCfg(next);saveSolapiConfig(next);setSaved('설정 저장됨');setTimeout(()=>setSaved(''),2000);};
  const saveTpl=(next)=>{setTpls(next);saveSmsTemplates(next);setSaved('템플릿 저장됨');setTimeout(()=>setSaved(''),2000);};

  const testSend=async()=>{
    if(!testPhone.trim()){alert('테스트 번호를 입력하세요');return;}
    setTesting(true);
    const r=await sendSMS(testPhone,'[POUR솔루션] 테스트 문자입니다. 정상 수신되면 설정 완료!');
    setTesting(false);
    if(r.success)setSaved('테스트 발송 성공!');
    else alert('발송 실패: '+(typeof r.error==='string'?r.error:JSON.stringify(r.error)));
  };

  const previewVars={name:'홍길동',building:'아파트',problem:'옥상 누수',staff:'김영업',phone:'01012345678',company:'강남아파트관리소',position:'관리소장',buildingType:'아파트',datetime:'3/20(금)'};

  return(
    <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
      {saved&&<div style={{position:'fixed',top:80,left:'50%',transform:'translateX(-50%)',zIndex:2000,
        padding:'8px 18px',borderRadius:10,fontSize:12,fontWeight:700,background:'#059669',color:'#fff',boxShadow:'0 4px 16px rgba(0,0,0,.15)'}}>{saved}</div>}

      {/* 솔라피 연결 설정 */}
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>⚙️ 솔라피 연결</div>
        <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:12,lineHeight:1.6}}>
          솔라피 API 정보를 입력하면 문자 발송이 가능합니다.
        </div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>Worker URL</div>
        <input value={cfg.workerUrl||''} onChange={e=>saveCfg({...cfg,workerUrl:e.target.value})}
          placeholder="https://pour-app-prod.pages.dev"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>API Key</div>
        <input value={cfg.apiKey||''} onChange={e=>saveCfg({...cfg,apiKey:e.target.value})}
          placeholder="솔라피 API Key"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>API Secret</div>
        <input value={cfg.apiSecret||''} onChange={e=>saveCfg({...cfg,apiSecret:e.target.value})} type="password"
          placeholder="솔라피 API Secret"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}}/>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5}}>발신번호</div>
        <input value={cfg.sender||''} onChange={e=>saveCfg({...cfg,sender:e.target.value})}
          placeholder="01012345678"
          style={{width:'100%',padding:'11px 13px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:10}} type="tel"/>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input value={testPhone} onChange={e=>setTestPhone(e.target.value)} placeholder="테스트 번호 (01012345678)"
            style={{flex:1,padding:'10px 12px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:12,color:'var(--text)',background:'var(--bg)',outline:'none',fontFamily:'inherit',boxSizing:'border-box'}} type="tel"/>
          <button onClick={testSend} disabled={testing||!cfg.workerUrl||!cfg.apiKey||!cfg.apiSecret||!cfg.sender}

        <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:12,lineHeight:1.6}}>
          상담 저장 시 자동으로 문자를 보낼지 설정합니다.
        </div>
        <label style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg)',borderRadius:9,marginBottom:8,cursor:'pointer'}}>
          <input type="checkbox" checked={cfg.autoCustomer!==false} onChange={e=>saveCfg({...cfg,autoCustomer:e.target.checked})}
            style={{width:18,height:18,accentColor:'var(--blue)'}}/>
          <div><div style={{fontSize:13,fontWeight:700}}>고객 감사 문자</div><div style={{fontSize:11,color:'var(--text-sm)'}}>저장 시 고객에게 자동 발송</div></div>
        </label>
        <label style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg)',borderRadius:9,cursor:'pointer'}}>
          <input type="checkbox" checked={cfg.autoStaff!==false} onChange={e=>saveCfg({...cfg,autoStaff:e.target.checked})}
            style={{width:18,height:18,accentColor:'var(--purple)'}}/>
          <div><div style={{fontSize:13,fontWeight:700}}>담당자 알림 문자</div><div style={{fontSize:11,color:'var(--text-sm)'}}>저장 시 담당 영업사원에게 알림</div></div>
        </label>
      </div>

      {/* 고객 감사 템플릿 */}
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>📨 고객 감사 문자 템플릿</div>
        <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:8,lineHeight:1.5}}>
          변수: <code style={{background:'var(--bg)',padding:'1px 5px',borderRadius:4}}>{'{{name}}'}</code>{' '}
          <code style={{background:'var(--bg)',padding:'1px 5px',borderRadius:4}}>{'{{building}}'}</code>{' '}
          <code style={{background:'var(--bg)',padding:'1px 5px',borderRadius:4}}>{'{{problem}}'}</code>{' '}
          <code style={{background:'var(--bg)',padding:'1px 5px',borderRadius:4}}>{'{{staff}}'}</code>
        </div>
        <textarea value={tpls.customerThank} onChange={e=>saveTpl({...tpls,customerThank:e.target.value})}
          style={{width:'100%',minHeight:80,padding:'12px 14px',borderRadius:9,border:'1.5px solid var(--border)',fontSize:13,
