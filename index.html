<title>넷폼알앤디 · 박람회 상담</title>

<!-- PWA: 홈 화면 추가 시 앱처럼 전체화면 실행 -->
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/logo-pour.png">
<link rel="icon" type="image/png" href="/logo-pour.png">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* ── 환경 자동 감지 (prod / dev) ── */
const IS_PREVIEW = location.hostname !== 'pour-construction-form.pages.dev'
                && !location.hostname.startsWith('localhost')
                && !location.hostname.startsWith('127.');

const FIREBASE_CONFIG = IS_PREVIEW
  ? { /* ── 2차 개발용 (Preview → pour-app-dev) ── */
      apiKey:"AIzaSyAvxEOMw1ND96VNKfQykGDmzGw_z_NPRds",
      authDomain:"pour-app-dev.firebaseapp.com",
      projectId:"pour-app-dev",
      storageBucket:"pour-app-dev.firebasestorage.app",
      messagingSenderId:"42873704117",
      appId:"1:42873704117:web:ca21e80fe8b885904538fc"
    }
  : { /* ── 운영용 (Production) ── */
      apiKey:"AIzaSyByDdBamhF6yINMm8uE0t7NRN0w865sYNE",
      authDomain:"pour-app-prod.firebaseapp.com",
      projectId:"pour-app-prod",
      storageBucket:"pour-app-prod.firebasestorage.app",
      messagingSenderId:"258161197518",
      appId:"1:258161197518:web:e4f99fad335c981e78ab9f"
    };

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

// ─── Google Sheets 연동 ───
// Apps Script 배포 URL을 여기에 붙여넣으세요
const GOOGLE_SHEET_URL = '';

function sendToSheet(data) {
  if (!GOOGLE_SHEET_URL) return;
  fetch(GOOGLE_SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).then(function() {
    console.log('[Sheet] 전송 완료');
  }).catch(function(e) {
    console.warn('[Sheet] 전송 실패 (무시):', e);
  });
}
function getUrlSource(){try{return new URLSearchParams(window.location.search).get('source')||'';}catch(e){return'';}}
// QR 스캔 카운트 기록 (페이지 로드 시 ?source= 파라미터가 있으면 qr-stats에 기록)
(function(){
  try{
    const src=getUrlSource();
    if(!src)return;
    db.collection('qr-stats').doc(src).set(
      {count:firebase.firestore.FieldValue.increment(1),lastScan:new Date().toISOString()},
      {merge:true}
    ).catch(e=>console.warn('qr-stats 기록 실패:',e));
  }catch(e){console.warn('qr-stats 초기화 실패:',e);}
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* 이미지 화질 최적화 */
img{image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;}
img[src$=".gif"],img[alt*="GIF"]{image-rendering:auto;}
:root{
  /* 브랜드 코어 */
  --navy:#0D1B2A; --navy2:#1A2E42;
  --blue:#2563EB; --blue-l:#EFF6FF; --blue-m:#BFDBFE;
  /* 토스 스타일 액센트: 단일 포인트 컬러 */
  --accent:#2563EB;        /* 주요 액션 */
  --accent-s:#1E40AF;      /* hover/active */
  --accent-l:#EFF6FF;      /* 배경 tint */
  /* 세컨더리 */
  --gold:#D97706; --green:#059669; --green-l:#ECFDF5;
  --red:#DC2626; --orange:#EA580C;
  --purple:#6D28D9; --purple-l:#F5F3FF; --purple-m:#EDE9FE;
  /* 텍스트 — 토스 스타일: 명도 차이로 위계 */
  --text:#111827; --text-md:#4B5563; --text-sm:#9CA3AF;
  /* 배경 — 아주 밝은 회색 (토스와 동일) */
  --bg:#F9FAFB; --card:#FFFFFF; --border:#E5E7EB; --border-s:#F3F4F6;
  --r:12px; --r-sm:8px; --r-lg:18px;
  --shadow:0 1px 6px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;transform:translateX(18px);}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0);}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;padding:0 20px;height:64px;background:var(--navy);flex-shrink:0;gap:12px;}
.hdr-brand{display:flex;flex-direction:column;gap:2px;}
.hdr-company{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.04em;}
.hdr-logo{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px;}
.hdr-logo em{color:var(--gold);font-style:normal;}
.hdr-brand-logos{display:flex;gap:5px;align-items:center;margin-top:1px;}
.hdr-brand-pill{padding:1px 7px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45);letter-spacing:.02em;cursor:default;}
.hdr-div{width:1px;height:24px;background:rgba(255,255,255,.15);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.45);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:6px;}
/* ── 플로팅 액션 버튼 ── */
.fab-wrap{position:fixed;right:24px;bottom:32px;display:flex;flex-direction:column;gap:12px;z-index:100;}
body.media-viewer-open .fab-wrap{display:none !important;}
.fab{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform .13s,box-shadow .13s;font-family:inherit;}
.fab:active{transform:scale(.91);}
.fab-new{background:#2563EB;color:#fff;box-shadow:0 4px 18px rgba(37,99,235,.5);}
.fab-memo{background:#6D28D9;color:#fff;box-shadow:0 4px 18px rgba(109,40,217,.4);}
.fab-icon{font-size:19px;line-height:1;}
.fab-label{font-size:9px;font-weight:800;letter-spacing:.02em;margin-top:1px;}
.btn-back{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .14s;flex-shrink:0;}
.btn-back:active{background:rgba(255,255,255,.2);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px 20px 24px;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{display:none;}

/* ── HOME ── */
.home-screen{background:var(--navy);position:relative;overflow:hidden;min-height:100vh;}
.hbg{position:absolute;border-radius:50%;background:rgba(37,99,235,.12);pointer-events:none;}
.home-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh;padding:40px 40px 40px;box-sizing:border-box;gap:0;}
.home-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.28);color:var(--gold);font-size:13px;font-weight:600;margin-bottom:20px;letter-spacing:.03em;}
.home-logo{font-size:72px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;margin-bottom:8px;}
.home-logo em{color:var(--gold);font-style:normal;}
.home-tagline{font-size:16px;color:rgba(255,255,255,.5);font-weight:300;margin-bottom:40px;letter-spacing:.02em;}
.home-expo-card{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:20px 36px;text-align:center;margin-bottom:40px;width:100%;max-width:480px;}
.home-expo-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;}
.home-expo-date{font-size:13px;color:rgba(255,255,255,.45);}
.btn-start{display:flex;align-items:center;justify-content:center;gap:12px;padding:22px 60px;border-radius:var(--r);border:none;background:var(--blue);color:#fff;font-size:20px;font-weight:800;box-shadow:0 4px 20px rgba(37,99,235,.45);letter-spacing:-.2px;transition:all .18s;margin-bottom:14px;}
.btn-start:active{transform:scale(.97);background:#1347C0;}
.home-leads-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px 28px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.65);font-size:15px;font-weight:600;width:100%;max-width:480px;}
.home-leads-btn:active{background:rgba(255,255,255,.08);}
.staff-badge-home{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;cursor:pointer;position:absolute;top:16px;right:20px;z-index:10;}
.sba{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.sbn{font-size:12px;font-weight:700;color:#fff;}
.home-stat{display:flex;gap:10px;margin-top:16px;}
.hstat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 20px;text-align:center;}
.hstat-n{font-size:20px;font-weight:800;color:#fff;}
.hstat-l{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}

/* ── PAGE TITLES ── */
.page-h{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text-md);margin-bottom:16px;line-height:1.55;}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sm);margin-bottom:12px;flex-wrap:wrap;}
.bc-sep{color:var(--border);}
.breadcrumb span:last-child{color:var(--text);font-weight:600;}

/* ── BUILDING GRID ── */
.building-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.building-card{background:var(--card);border-radius:var(--r);padding:18px 16px;border:2px solid var(--border);cursor:pointer;transition:all .17s;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.building-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--blue);transform:scaleX(0);transition:transform .17s;transform-origin:left;}
.building-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.building-card:hover::before{transform:scaleX(1);}
.building-card:active{transform:scale(.98);}
.bc-arrow{position:absolute;top:18px;right:18px;width:28px;height:28px;border-radius:50%;background:var(--blue-l);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:14px;transition:all .17s;}
.building-card:hover .bc-arrow{background:var(--blue);color:#fff;}
.bc-icon{font-size:34px;margin-bottom:2px;}
.bc-name{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.4px;}
.bc-sub{font-size:12px;color:var(--text-md);}
.bc-targets{margin-top:6px;padding-top:10px;border-top:1px solid var(--border);font-size:13px;color:var(--text-md);line-height:1.6;font-weight:500;}

/* ── PROBLEM TABS & GRID ── */
.tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--text-md);transition:all .14s;}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.tab:active{transform:scale(.97);}
.problems-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.problem-card{background:var(--card);border-radius:var(--r);border:2px solid var(--border);cursor:pointer;transition:all .14s;overflow:hidden;box-shadow:var(--shadow);}
.problem-card:hover{border-color:var(--blue);transform:translateY(-2px);}
.problem-card:active{transform:scale(.97);}
.prob-img{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--blue-l),var(--blue-m));display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;}
.prob-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.prob-cat-badge{position:absolute;top:7px;left:7px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.03em;}
.cat-방수{background:#DBEAFE;color:#1D4ED8;}
.cat-도장{background:#FEF9C3;color:#92400E;}
.cat-보수보강{background:#D1FAE5;color:#065F46;}
.cat-토목{background:#FFE4E6;color:#9F1239;}
.prob-name{padding:10px 12px;font-size:13px;font-weight:600;color:var(--text);line-height:1.4;}

/* ── 칩형 문제 리스트 (스크롤 없는 그리드) ── */
.prob-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-bottom:4px;}
.prob-chip{display:flex;flex-direction:column;background:var(--card);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .13s;text-align:left;font-family:inherit;overflow:hidden;}
.prob-chip:active{transform:scale(.97);}
.prob-chip:hover{border-color:var(--blue);}
.prob-chip-thumb{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--blue-l),var(--blue-m));display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;flex-shrink:0;}
.prob-chip-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.prob-chip-body{padding:8px 10px 10px;}
.prob-chip-text{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.prob-chip-cat{font-size:10px;font-weight:600;color:var(--text-sm);margin-top:2px;}

/* ── 원인 가로 슬라이더 ── */
.cause-slider{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.cause-slider::-webkit-scrollbar{display:none;}
.cause-slide{flex:0 0 72%;scroll-snap-align:start;background:var(--card);border-radius:var(--r);overflow:hidden;border:1.5px solid var(--border);box-shadow:var(--shadow);min-width:0;}
.cause-slide-head{display:flex;align-items:center;gap:8px;padding:9px 14px 8px;}
.cause-slide-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cause-slide-kw{font-size:15px;font-weight:900;color:var(--text);letter-spacing:-.3px;}
.cause-slide-photo{width:100%;aspect-ratio:16/6;background:linear-gradient(135deg,#e8edf2,#d4dce6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;position:relative;overflow:hidden;}
.cause-slide-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cause-slide-desc{padding:8px 14px 10px;font-size:12px;color:var(--text-md);line-height:1.5;}
.slider-dots{display:flex;justify-content:center;gap:6px;margin-top:8px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s;}
.sdot.on{background:var(--blue);width:18px;border-radius:3px;}

/* ── 장점 2×2 그리드 ── */
.benefit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.benefit-grid-item{display:flex;align-items:flex-start;gap:8px;padding:11px 12px;background:var(--card);border-radius:10px;border:1px solid var(--border);}
.bgi-check{width:20px;height:20px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.bgi-check span{font-size:10px;color:var(--green);font-weight:800;}
.bgi-text{font-size:12px;color:var(--text);line-height:1.5;font-weight:500;}

/* ── SOLUTION ── */
.sol-header{background:var(--navy);padding:11px 20px;flex-shrink:0;}
.sol-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.sol-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-sm);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.cause-card{background:var(--blue-l);border-radius:var(--r);padding:18px 20px;border-left:4px solid var(--blue);margin-bottom:22px;}
.cause-text{font-size:14px;line-height:1.9;color:var(--text);}
.method-card{background:var(--card);border-radius:var(--r);border:2px solid var(--blue);padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow);}
.method-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:700;margin-bottom:7px;}
.method-name{font-size:17px;font-weight:800;color:var(--text);margin-bottom:5px;letter-spacing:-.3px;}
.method-feature{font-size:13px;color:var(--text-md);line-height:1.65;margin-bottom:12px;}
.method-actions{display:flex;gap:7px;flex-wrap:wrap;}

/* QR 전달 카드 */
.qr-transfer-section{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow);}
.qr-transfer-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.qr-btns-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qr-btn-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .14s;font-family:inherit;}
.qr-btn-item:active{transform:scale(.97);}
.qr-btn-item:hover{border-color:var(--blue);background:var(--blue-l);}
.qbi-icon{font-size:22px;}
.qbi-label{font-size:11px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;}
.qbi-sub{font-size:10px;color:var(--text-sm);text-align:center;}

/* case card */
.case-card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;text-decoration:none;transition:all .14s;box-shadow:var(--shadow);margin-bottom:8px;}
.case-card:hover{border-color:var(--blue);transform:translateX(2px);}
.cc-text{flex:1;}
.cc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.cc-sub{font-size:11px;color:var(--text-sm);}
.cc-arr{color:var(--blue);font-size:17px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .14s;text-decoration:none;white-space:nowrap;font-family:inherit;}
.btn:active{transform:scale(.97);}
.btn-blue{background:var(--accent);color:#fff;}
.btn-blue:active{background:var(--accent-s);}
.btn-outline-blue{background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue-m);}
.btn-outline{background:var(--card);color:var(--text-md);border:1.5px solid var(--border);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-lg{padding:14px 24px;font-size:15px;border-radius:var(--r);}
.btn-full{width:100%;}
.btn-sm{padding:7px 13px;font-size:12px;}

/* ── BOTTOM BAR ── */
.bottom-bar{padding:14px 20px;padding-bottom:max(14px,env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.06);}

/* ── QR MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(8,14,30,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px;backdrop-filter:blur(8px);}
.qr-modal-title{font-size:20px;font-weight:800;color:#fff;text-align:center;max-width:280px;line-height:1.35;}
.qr-modal-sub{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-top:-10px;}
.qr-modal-box{background:#fff;padding:22px;border-radius:20px;box-shadow:0 0 60px rgba(37,99,235,.3);}
.qr-modal-url{font-size:11px;color:rgba(255,255,255,.35);text-align:center;max-width:300px;word-break:break-all;margin-top:-8px;}

/* ── MODAL SHEET ── */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:stretch;justify-content:flex-end;backdrop-filter:blur(4px);overscroll-behavior:contain;touch-action:auto;}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:20px 20px 44px;width:100%;max-height:88vh;overflow-y:auto;}
.sheet::-webkit-scrollbar{display:none;}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
.sheet-h{font-size:17px;font-weight:800;margin-bottom:4px;}
.sheet-sub{font-size:13px;color:var(--text-md);margin-bottom:18px;}

/* ── CS MEMO ── */
.memo-screen{background:var(--bg);}
.memo-scroll-wrap{flex:1;display:flex;overflow:hidden;position:relative;}
.memo-scroll{flex:1;overflow-y:auto;padding:20px 20px 90px;}
.memo-scroll::-webkit-scrollbar{display:none;}
.scroll-rail{width:36px;flex-shrink:0;background:linear-gradient(to right,var(--border-s),var(--bg));border-left:1.5px solid var(--border);display:flex;align-items:stretch;justify-content:center;touch-action:none;cursor:pointer;-webkit-user-select:none;user-select:none;}
.scroll-rail-track{width:8px;background:var(--border);border-radius:4px;position:relative;margin:12px 0;}
.scroll-rail-thumb{position:absolute;left:0;width:8px;background:var(--navy);border-radius:4px;min-height:40px;transition:background .12s;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.scroll-rail-thumb:active{background:var(--blue);}
/* ── Photo Zoom Modal ── */
.photo-zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1100;display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:none;-webkit-user-select:none;user-select:none;}
.photo-zoom-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;}
.photo-zoom-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.photo-zoom-container img{max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;transition:transform .15s ease;image-rendering:-webkit-optimize-contrast;}
.photo-zoom-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.5);font-weight:600;pointer-events:none;}
.msec{background:var(--card);border-radius:var(--r);padding:18px 18px;margin-bottom:10px;box-shadow:var(--shadow);}
.msec-title{font-size:11px;font-weight:700;color:var(--text-sm);letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:7px;text-transform:uppercase;}
.msec-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--blue);flex-shrink:0;}
.msec-title.purple::before{background:var(--purple);}
.staff-confirm{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--purple-l);border-radius:12px;border:1.5px solid var(--purple-m);}
.sc-left{display:flex;align-items:center;gap:10px;}
.sc-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.sc-name{font-size:14px;font-weight:800;color:var(--text);}
.sc-day{font-size:11px;color:var(--purple);font-weight:600;}
.sc-change{font-size:13px;font-weight:700;color:var(--purple);padding:6px 12px;border-radius:100px;border:1.5px solid var(--purple-m);background:#fff;font-family:inherit;}
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:8px 14px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text-md);cursor:pointer;font-family:inherit;transition:all .12s;}
.chip:active{transform:scale(.96);}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.atag{display:flex;align-items:center;gap:5px;padding:9px 14px;border-radius:10px;border:1.5px solid var(--purple-m);background:#fff;font-size:13px;font-weight:700;color:var(--purple);cursor:pointer;font-family:inherit;transition:all .12s;}
.atag:active{transform:scale(.97);}
.atag.on{background:var(--purple);color:#fff;border-color:var(--purple);}
.minput{width:100%;padding:13px 15px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:var(--bg);outline:none;font-family:inherit;transition:all .14s;}
.minput:focus{border-color:var(--blue);background:#fff;}
textarea.minput{resize:none;line-height:1.6;}
.ctx-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--navy);color:#fff;border-radius:100px;font-size:12px;font-weight:700;}
.ctx-pill.blue{background:var(--blue-l);color:var(--blue);}

/* ── CONTACT FORM ── */
.form-card{background:var(--card);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);margin-bottom:14px;}
.form-field{margin-bottom:18px;}
.form-label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:7px;}
.form-label .req{color:var(--blue);margin-left:2px;}
.form-input{width:100%;padding:13px 15px;border-radius:var(--r-sm);border:1.5px solid var(--border);font-size:14px;color:var(--text);background:var(--card);outline:none;transition:border-color .14s;font-family:inherit;}
.form-input:focus{border-color:var(--blue);}
.form-input.ro{background:var(--bg);color:var(--text-md);}
textarea.form-input{resize:none;min-height:88px;line-height:1.6;}

/* ── LOG ── */
.log-box{background:var(--navy);border-radius:var(--r);padding:22px 24px;margin-bottom:14px;font-size:13px;line-height:2;color:rgba(255,255,255,.6);}
.log-row{display:flex;gap:12px;}
.log-key{color:rgba(245,158,11,.8);font-weight:600;min-width:86px;flex-shrink:0;}
.log-val{color:rgba(255,255,255,.9);}
.log-div{border-top:1px solid rgba(255,255,255,.1);margin:10px 0;}
.log-sec{color:rgba(255,255,255,.3);font-size:11px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;}

/* ── SUCCESS ── */
.success-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:36px;}
.success-icon{width:74px;height:74px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:6px;}
.success-title{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.5px;}
.success-sub{font-size:14px;color:var(--text-md);line-height:1.7;max-width:340px;}

/* ── LEADS ── */
.filter-row{display:flex;gap:6px;padding:10px 20px 0;overflow-x:auto;flex-shrink:0;}
.filter-row::-webkit-scrollbar{display:none;}
.f-chip{padding:6px 13px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--text-md);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.f-chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.leads-scroll{flex:1;overflow-y:auto;padding:10px 20px 80px;}
.leads-scroll::-webkit-scrollbar{display:none;}
.lead-card{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);border:1.5px solid var(--border);}
.lead-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.lead-num{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.lead-name{font-size:15px;font-weight:800;color:var(--text);margin-left:8px;}
.lead-staff-tag{font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-l);padding:3px 8px;border-radius:6px;white-space:nowrap;}
.lead-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
.lpill{font-size:11px;padding:3px 9px;border-radius:100px;background:var(--bg);color:var(--text-md);}
.lpill.blue{background:var(--blue-l);color:var(--blue);font-weight:600;}
.lead-prob{font-size:11px;color:var(--text-sm);margin-bottom:6px;}
.lead-atags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.latag{font-size:11px;font-weight:700;background:var(--purple-l);color:var(--purple);padding:2px 8px;border-radius:5px;}
.lead-memo{font-size:11px;color:var(--text-sm);border-top:1px solid var(--border);padding-top:7px;font-style:italic;line-height:1.5;}
.lead-cta{display:flex;gap:6px;margin-top:10px;}
.lcta{flex:1;padding:9px;border-radius:9px;background:var(--bg);color:var(--text);font-size:12px;font-weight:700;text-align:center;text-decoration:none;display:block;border:none;cursor:pointer;font-family:inherit;}
.lcta.mail{background:var(--blue-l);color:var(--blue);}

/* ── STAFF MODAL ── */
.staff-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.staff-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .13s;}
.staff-row.sel{background:var(--blue-l);border-color:var(--blue);}
.sr-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.sr-name{font-size:14px;font-weight:700;color:var(--text);flex:1;}
.sr-name.sel{color:var(--blue);}
.sr-btns{display:flex;gap:5px;}
.sr-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(0,0,0,.06);color:var(--text-sm);font-size:13px;display:flex;align-items:center;justify-content:center;}
.sr-btn.del{color:var(--red);background:rgba(239,68,68,.08);}
.sr-btn:active{opacity:.7;}
.add-staff-btn{width:100%;padding:12px;border-radius:12px;border:1.5px dashed var(--border);background:#fff;color:var(--text-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:18px;}
.day-row{display:flex;gap:8px;margin-bottom:18px;}
.day-chip{flex:1;padding:12px 0;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:700;color:var(--text-sm);cursor:pointer;font-family:inherit;text-align:center;transition:all .12s;}
.day-chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.sheet-input{width:100%;padding:13px 15px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;color:var(--text);background:var(--bg);outline:none;font-family:inherit;transition:all .14s;margin-bottom:10px;}
.sheet-input:focus{border-color:var(--blue);background:#fff;}
.sheet-confirm-btn{width:100%;padding:15px;border-radius:var(--r);border:none;background:var(--blue);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
.sheet-cancel{display:block;text-align:center;font-size:13px;color:var(--text-sm);margin-top:13px;cursor:pointer;padding:5px;}

.empty{padding:60px 24px;text-align:center;color:var(--text-sm);font-size:14px;line-height:1.7;}

/* ── SOLUTION TABS ── */


/* ── BEFORE/AFTER PHOTOS ── */
.ba-wrap{margin-bottom:16px;}
.ba-caption{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;padding:0 2px;}
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ba-slot{border-radius:12px;overflow:hidden;position:relative;aspect-ratio:4/3;}
.ba-img{width:100%;height:100%;object-fit:cover;display:block;}
.ba-label{position:absolute;top:8px;left:8px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.03em;}
.ba-label.before{background:rgba(239,68,68,.85);color:#fff;}
.ba-label.after{background:rgba(5,150,105,.85);color:#fff;}
.ba-empty{width:100%;height:100%;background:linear-gradient(135deg,var(--bg),#e2e8f0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.ba-empty-icon{font-size:24px;opacity:.35;}
.ba-empty-txt{font-size:11px;color:var(--text-sm);font-weight:600;}
.ba-hint{margin-top:8px;padding:10px 14px;background:var(--blue-l);border-radius:9px;font-size:12px;color:var(--blue);font-weight:600;line-height:1.5;}

/* ── CAUSE CARDS (shortform style) ── */
.cc2{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);border:1.5px solid var(--border);}
.cc2-head{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;}
.cc2-num{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cc2-kw{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.4px;}
.cc2-photo{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#e8edf2,#d4dce6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;position:relative;}
.cc2-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cc2-photo-icon{font-size:28px;opacity:.25;}
.cc2-photo-txt{font-size:11px;font-weight:600;color:var(--text-sm);}
.cc2-desc{padding:11px 16px 14px;font-size:13px;color:var(--text-md);line-height:1.65;border-top:1px solid var(--border);}
/* benefit list */
.benefit-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.benefit-item:last-child{border-bottom:none;padding-bottom:0;}
.benefit-check{width:22px;height:22px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.benefit-check span{font-size:11px;color:var(--green);font-weight:800;}
.benefit-text{font-size:14px;color:var(--text);line-height:1.55;font-weight:500;}
/* ── CONFIRM POPUP ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px 20px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.confirm-icon{font-size:36px;text-align:center;margin-bottom:12px;}
.confirm-title{font-size:17px;font-weight:900;color:var(--text);text-align:center;margin-bottom:6px;letter-spacing:-.3px;}
.confirm-sub{font-size:13px;color:var(--text-sm);text-align:center;line-height:1.6;margin-bottom:22px;}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.confirm-cancel{padding:13px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:14px;font-weight:700;color:var(--text-md);cursor:pointer;font-family:inherit;}
.confirm-ok{padding:13px;border-radius:10px;border:none;background:var(--accent);font-size:14px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit;}
.confirm-ok:active{background:var(--accent-s);}

.spinner{width:32px;height:32px;border:3px solid var(--blue-l);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── SCROLL HINT ── */
.scroll-fade{position:relative;}
.scroll-fade::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(to top,var(--bg),transparent);pointer-events:none;border-radius:0 0 var(--r) var(--r);}
.content.scroll-fade::after{background:linear-gradient(to top,#F0F4F8 0%,transparent 100%);}

/* ── UNIFIED NOTE SHEET ── */
.note-sheet{background:#fff;width:min(860px,96vw);height:100%;display:flex;flex-direction:column;overflow:hidden;box-shadow:-8px 0 40px rgba(0,0,0,.18);}
.note-sheet::-webkit-scrollbar{display:none;}
.note-sheet-scroll{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;}
.note-sheet-scroll.pen-active{overflow-y:hidden!important;touch-action:pan-y!important;pointer-events:auto;}
.note-sheet-scroll.pen-active .draw-canvas-wrap{touch-action:none!important;}
.note-sheet-scroll input,.note-sheet-scroll textarea,.note-sheet-scroll select,.note-sheet-scroll button{touch-action:auto!important;-webkit-user-select:text!important;user-select:text!important;}
.note-sheet input,.note-sheet textarea,.note-sheet select{touch-action:auto!important;-webkit-user-select:text!important;user-select:text!important;}
.note-sheet-scroll::-webkit-scrollbar{display:none;}
.media-scroll::-webkit-scrollbar{display:none;}
.note-memo{width:100%;padding:14px 16px;border-radius:9px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:var(--bg);outline:none;font-family:inherit;resize:none;line-height:1.8;transition:border-color .14s;min-height:300px;}
.note-memo:focus{border-color:var(--purple);background:#fff;}
.note-sheet-head{padding:12px 16px 0;flex-shrink:0;}
.note-sheet-foot{padding:10px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--border);background:#fff;flex-shrink:0;}
.note-ctx{background:var(--navy);border-radius:9px;padding:8px 12px;margin-bottom:10px;}
.note-ctx-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.note-ctx-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);}
.note-ctx-method{font-size:12px;font-weight:700;color:var(--gold);margin-top:4px;}
.note-row{display:flex;gap:8px;margin-bottom:10px;}
.note-input{width:100%;padding:14px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;color:var(--text);background:var(--bg);outline:none;font-family:inherit;transition:all .14s;box-sizing:border-box;min-height:48px;}
.note-input:focus{border-color:var(--blue);background:#fff;}
.note-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.note-chip{padding:5px 11px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;color:var(--text-md);cursor:pointer;font-family:inherit;transition:all .12s;}
.note-chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.note-atag{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:8px;border:1.5px solid var(--purple-m);background:#fff;font-size:12px;font-weight:700;color:var(--purple);cursor:pointer;font-family:inherit;}
.note-atag.on{background:var(--purple);color:#fff;border-color:var(--purple);}
.note-memo-wrap{position:relative;margin-bottom:10px;}

/* ── 명함 촬영 ── */
.bc-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1.5px dashed var(--border);background:var(--bg);cursor:pointer;font-family:inherit;width:100%;margin-bottom:8px;transition:all .14s;}
.bc-btn:active{background:var(--blue-l);border-color:var(--blue);}
.bc-btn-icon{font-size:20px;}
.bc-btn-text{font-size:13px;font-weight:700;color:var(--text);}
.bc-btn-sub{font-size:11px;color:var(--text-sm);}
.bc-preview-row{display:flex;gap:8px;margin-bottom:8px;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

/* ── 글로벌 펜 감지: 필기 중 저장버튼 팜 터치 방지 ── */
window.__penActive=false;
window.__penTimer=null;
window.__penEverDetected=false;
window.__penEverTimer=null;
const markPenActive=()=>{window.__penActive=true;window.__penEverDetected=true;clearTimeout(window.__penTimer);window.__penTimer=setTimeout(()=>{window.__penActive=false;},2000);clearTimeout(window.__penEverTimer);window.__penEverTimer=setTimeout(()=>{window.__penEverDetected=false;},10000);};
const isPenActive=()=>window.__penActive;

/* ══ MemoTextarea – 펜슬 메모 (가로 도구바 + 낙서장 탭 전환) ══ */
function MemoTextarea({value,onChange,placeholder,minHeight=600,onDoodleToggle,doodleOpen,doodleContent}){
  const histRef=useRef([value||'']);
  const [confirmDelete,setConfirmDelete]=useState(false);
  const idxRef=useRef(0);
  const timerRef=useRef(null);
  const taRef=useRef(null);
  const push=useCallback((v)=>{
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>{
      const h=histRef.current;
      if(h[idxRef.current]===v) return;
      histRef.current=h.slice(0,idxRef.current+1).concat(v);
      idxRef.current=histRef.current.length-1;
    },400);
  },[]);
  const handleChange=useCallback((e)=>{
    const v=e.target.value;onChange(v);push(v);
  },[onChange,push]);
  const insertAt=useCallback((text)=>{
    const ta=taRef.current;
    const s=ta?ta.selectionStart:value.length;
    const e2=ta?ta.selectionEnd:value.length;
    const nv=value.slice(0,s)+text+value.slice(e2);
    push(value);onChange(nv);
    setTimeout(()=>{if(ta){ta.selectionStart=ta.selectionEnd=s+text.length;ta.focus();}},0);
  },[value,onChange,push]);
  const undo=useCallback(()=>{
    clearTimeout(timerRef.current);
    const h=histRef.current;
    if(h[idxRef.current]!==value){histRef.current=h.slice(0,idxRef.current+1).concat(value);idxRef.current=histRef.current.length-1;}
    if(idxRef.current>0){idxRef.current--;onChange(histRef.current[idxRef.current]);}
  },[value,onChange]);
  const redo=useCallback(()=>{
    clearTimeout(timerRef.current);
    if(idxRef.current<histRef.current.length-1){idxRef.current++;onChange(histRef.current[idxRef.current]);}
  },[onChange]);
  const clearAll=useCallback(()=>{
    if(!value)return;
    const h=histRef.current;
    if(h[idxRef.current]!==value){histRef.current=h.slice(0,idxRef.current+1).concat(value);idxRef.current=histRef.current.length-1;}
    histRef.current=histRef.current.slice(0,idxRef.current+1).concat('');idxRef.current=histRef.current.length-1;onChange('');setConfirmDelete(false);
  },[value,onChange]);
  const backspace=useCallback(()=>{
    if(!value)return;
    const ta=taRef.current;
    const s=ta?ta.selectionStart:value.length;
    const e2=ta?ta.selectionEnd:value.length;
    let nv,newPos;
    if(s!==e2){/* 선택 영역 삭제 */nv=value.slice(0,s)+value.slice(e2);newPos=s;}
    else{if(s===0)return;nv=value.slice(0,s-1)+value.slice(s);newPos=s-1;}
    push(value);onChange(nv);
    setTimeout(()=>{if(ta){ta.selectionStart=ta.selectionEnd=newPos;ta.focus();}},0);
  },[value,onChange,push]);
  const canUndo=histRef.current.length>1&&idxRef.current>0||value!==histRef.current[idxRef.current];
  const canRedo=idxRef.current<histRef.current.length-1;
  /* 도구바 버튼 스타일 */
  const tBtn=(icon,label,onClick,color,bg,disabled)=>
    React.createElement('button',{key:label,onClick,disabled,title:label,
      style:{padding:'6px 8px',borderRadius:8,border:'none',background:disabled?'transparent':bg,color:disabled?'#ccc':color,
        fontSize:13,fontWeight:700,cursor:disabled?'default':'pointer',fontFamily:'inherit',
        display:'flex',alignItems:'center',justifyContent:'center',gap:3,
        opacity:disabled?0.35:1,transition:'all .1s',flexShrink:0,whiteSpace:'nowrap'}},
      React.createElement('span',{style:{fontSize:15,lineHeight:1}},icon),
      React.createElement('span',{style:{fontSize:10,fontWeight:700}},label)
    );
  return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:0,position:'relative'}},
    /* 상단 가로 도구바 */
    React.createElement('div',{style:{display:'flex',gap:3,padding:'7px 10px',background:'#f1f3f5',borderRadius:'12px 12px 0 0',border:'1.5px solid var(--border)',borderBottom:'none',flexWrap:'wrap',alignItems:'center'}},
      onDoodleToggle&&tBtn('🎨',doodleOpen?'✏️메모':'낙서장',onDoodleToggle,'#7C3AED',doodleOpen?'rgba(124,58,237,.2)':'#F5F3FF'),
      tBtn('🗑','전체삭제',()=>{if(value)setConfirmDelete(true);},'#DC2626','#FEF2F2',!value),
      React.createElement('div',{key:'s1',style:{width:2,height:26,background:'#bbb',borderRadius:1,margin:'0 5px'}}),
      tBtn('↪','다시',redo,'#4F46E5','#EEF2FF',!canRedo),
      tBtn('↩','되돌리기',undo,'#4F46E5','#EEF2FF',!canUndo),
      tBtn('←','지우기',backspace,'#EA580C','#FFF7ED',!value),
      React.createElement('div',{key:'s2',style:{width:2,height:26,background:'#bbb',borderRadius:1,margin:'0 5px'}}),
      tBtn('␣','공백',()=>insertAt(' '),'#059669','#F0FDF4'),
      tBtn('↵','줄바꿈',()=>insertAt('\n'),'#4F46E5','#EEF2FF'),
    ),
    /* 전체삭제 확인 바 — 도구바 바로 아래 */
    confirmDelete&&React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'8px 12px',background:'#FEF2F2',borderLeft:'1.5px solid #FECACA',borderRight:'1.5px solid #FECACA'}},
      React.createElement('span',{style:{fontSize:13,fontWeight:700,color:'#DC2626'}},'전체 삭제할까요?'),
      React.createElement('button',{onClick:clearAll,style:{padding:'6px 16px',borderRadius:8,border:'none',background:'#DC2626',color:'#fff',fontSize:13,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}},'삭제'),
      React.createElement('button',{onClick:()=>setConfirmDelete(false),style:{padding:'6px 16px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',color:'var(--text-sm)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}},'취소'),
    ),
    /* 낙서장 모드: DrawCanvas를 textarea 자리에 표시 (스크롤 불필요) */
    doodleOpen&&doodleContent?React.createElement('div',{style:{border:'1.5px solid rgba(124,58,237,.25)',borderTop:'none',borderRadius:'0 0 12px 12px',overflow:'hidden',background:'#FAFAFF',minHeight:minHeight}},doodleContent):
    /* 텍스트 메모 모드 */
    React.createElement('textarea',{ref:taRef,className:'note-input',value:value,onChange:handleChange,
      placeholder:placeholder||"✏️ 펜슬로 직접 필기하세요\n상담 내용, 특이사항, 요청사항 등",
      style:{fontSize:16,padding:'16px',minHeight:minHeight,resize:'vertical',lineHeight:1.7,fontFamily:'inherit',
        width:'100%',boxSizing:'border-box',borderRadius:'0 0 12px 12px',flex:1}}),
  );
}

/* ══ DrawCanvas Component (Notability-style) ══ */
const DRAW_COLORS=['#111827','#DC2626','#2563EB','#059669','#D97706','#7C3AED'];
const HIGHLIGHT_COLORS=['rgba(255,235,59,.35)','rgba(76,175,80,.30)','rgba(33,150,243,.30)','rgba(244,67,54,.30)','rgba(255,152,0,.30)'];
function DrawCanvas({onDataUrl}){
  const canvasRef=useRef(null);
  const [tool,setTool]=useState('pen'); // 'pen'|'highlighter'|'eraser'
  const [color,setColor]=useState('#111827');
  const [hlColor,setHlColor]=useState(HIGHLIGHT_COLORS[0]);
  const [lineW,setLineW]=useState(2);
  const drawing=useRef(false);
  const penDetected=useRef(false);
  const [,forceRender]=useState(0);

  /* multi-page support */
  const pages=useRef([{strokes:[],undoStack:[],redoStack:[]}]);
  const [currentPage,setCurrentPage]=useState(0);
  const [totalPages,setTotalPages]=useState(1);

  /* stroke-based storage: {points:[{x,y,p}], color, width, type:'pen'|'hl', opacity} */
  const strokes=useRef(pages.current[0].strokes);
  const currentStroke=useRef(null);
  const undoStack=useRef(pages.current[0].undoStack);
  const redoStack=useRef(pages.current[0].redoStack);

  const switchPage=(idx)=>{
    /* save current page */
    pages.current[currentPage]={strokes:strokes.current,undoStack:undoStack.current,redoStack:redoStack.current};
    /* load target page */
    const pg=pages.current[idx];
    strokes.current=pg.strokes;undoStack.current=pg.undoStack;redoStack.current=pg.redoStack;
    currentStroke.current=null;
    setCurrentPage(idx);
    setTimeout(()=>redraw(),0);
  };
  const addPage=()=>{
    pages.current[currentPage]={strokes:strokes.current,undoStack:undoStack.current,redoStack:redoStack.current};
    pages.current.push({strokes:[],undoStack:[],redoStack:[]});
    const newIdx=pages.current.length-1;
    strokes.current=[];undoStack.current=[];redoStack.current=[];
    currentStroke.current=null;
    setTotalPages(pages.current.length);
    setCurrentPage(newIdx);
    setTimeout(()=>redraw(),0);
  };

  const getCtx=()=>canvasRef.current?.getContext('2d');

  /* ── smooth bezier curve through points ── */
  const drawSmoothStroke=(ctx,s)=>{
    const pts=s.points;if(pts.length<2)return;
    ctx.save();
    ctx.globalAlpha=s.opacity||1;
    ctx.globalCompositeOperation=s.type==='hl'?'multiply':'source-over';
    ctx.strokeStyle=s.color;
    ctx.lineCap='round';ctx.lineJoin='round';

    if(pts.length===2){
      ctx.lineWidth=s.width*(pts[0].p||1);
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);ctx.lineTo(pts[1].x,pts[1].y);ctx.stroke();
      ctx.restore();return;
    }

    /* variable-width via segments (pressure) */
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[i],p1=pts[i+1];
      const pressure=(p0.p+p1.p)/2||1;
      ctx.lineWidth=s.width*pressure;
      ctx.beginPath();
      if(i===0){ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);}
      else{
        const prev=pts[i-1];
        const cpx=(prev.x+p0.x*2+p1.x)/4;
        const cpy=(prev.y+p0.y*2+p1.y)/4;
        ctx.moveTo((prev.x+p0.x)/2,(prev.y+p0.y)/2);
        ctx.quadraticCurveTo(p0.x,p0.y,(p0.x+p1.x)/2,(p0.y+p1.y)/2);
      }
      ctx.stroke();
    }
    ctx.restore();
  };

  const redraw=()=>{
    const c=canvasRef.current;if(!c)return;
    const ctx=getCtx();const dpr=window.devicePixelRatio||1;
    ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,c.width/dpr,c.height/dpr);
    /* draw ruled lines */
    const h=c.height/dpr;const spacing=32;
    ctx.strokeStyle='#e8ecf0';ctx.lineWidth=0.5;
    for(let y=spacing;y<h;y+=spacing){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width/dpr,y);ctx.stroke();}
    /* draw strokes */
    strokes.current.forEach(s=>drawSmoothStroke(ctx,s));
    if(currentStroke.current)drawSmoothStroke(ctx,currentStroke.current);
    ctx.restore();
  };

  const resize=useCallback(()=>{
    const c=canvasRef.current;if(!c)return;
    const wrap=c.parentElement;const dpr=window.devicePixelRatio||1;
    c.width=wrap.clientWidth*dpr;c.height=Math.max(wrap.clientHeight,800)*dpr;
    c.style.width=wrap.clientWidth+'px';c.style.height=Math.max(wrap.clientHeight,800)+'px';
    const ctx=getCtx();ctx.scale(dpr,dpr);
    redraw();
  },[]);

  useEffect(()=>{resize();window.addEventListener('resize',resize);return()=>window.removeEventListener('resize',resize);},[resize]);

  const pushUndo=()=>{undoStack.current.push(JSON.parse(JSON.stringify(strokes.current)));redoStack.current=[];};
  const undo=()=>{
    if(undoStack.current.length===0)return;
    redoStack.current.push(JSON.parse(JSON.stringify(strokes.current)));
    strokes.current=undoStack.current.pop();
    redraw();forceRender(n=>n+1);setTimeout(()=>emitDataUrl(),0);
  };
  const redo=()=>{
    if(redoStack.current.length===0)return;
    undoStack.current.push(JSON.parse(JSON.stringify(strokes.current)));
    strokes.current=redoStack.current.pop();
    redraw();forceRender(n=>n+1);setTimeout(()=>emitDataUrl(),0);
  };
  const clearAll=()=>{
    if(strokes.current.length===0)return;
    if(!window.confirm('그린 내용을 모두 지우시겠어요?'))return;
    pushUndo();strokes.current=[];currentStroke.current=null;
    redraw();forceRender(n=>n+1);setTimeout(()=>emitDataUrl(),0);
  };

  /* keyboard shortcuts: Ctrl+Z undo, Ctrl+Y/Ctrl+Shift+Z redo */
  useEffect(()=>{
    const handler=(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
      if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
    };
    window.addEventListener('keydown',handler);return()=>window.removeEventListener('keydown',handler);
  },[]);

  /* hit-test with line-segment distance */
  const distToSeg=(px,py,ax,ay,bx,by)=>{
    const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
    if(len2===0)return Math.hypot(px-ax,py-ay);
    let t=((px-ax)*dx+(py-ay)*dy)/len2;
    t=Math.max(0,Math.min(1,t));
    return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
  };
  const hitStroke=(s,px,py,thresh)=>{
    for(let i=0;i<s.points.length-1;i++){
      if(distToSeg(px,py,s.points[i].x,s.points[i].y,s.points[i+1].x,s.points[i+1].y)<thresh+s.width/2)return true;
    }
    if(s.points.length===1)return Math.hypot(s.points[0].x-px,s.points[0].y-py)<thresh;
    return false;
  };

  const getPos=(e)=>{
    const c=canvasRef.current;const r=c.getBoundingClientRect();
    const pressure=e.pressure||0.5;
    return{x:e.clientX-r.left,y:e.clientY-r.top,p:Math.max(0.2,Math.min(1.5,pressure*1.5))};
  };

  const start=(e)=>{
    e.preventDefault();
    /* palm rejection: once pen is detected on this canvas OR globally, always ignore touch */
    if(e.pointerType==='pen'){penDetected.current=true;markPenActive();}
    if(e.pointerType==='touch'&&(penDetected.current||window.__penEverDetected))return;
    if(e.pointerType==='touch'&&drawing.current)return;
    e.target.setPointerCapture(e.pointerId);
    drawing.current=true;
    const p=getPos(e);
    if(tool==='eraser'){
      const thresh=15;
      let changed=false;
      pushUndo();
      strokes.current=strokes.current.filter(s=>{
        if(hitStroke(s,p.x,p.y,thresh)){changed=true;return false;}
        return true;
      });
      if(changed)redraw();else undoStack.current.pop();
    }else{
      const isHl=tool==='highlighter';
      currentStroke.current={
        points:[p],
        color:isHl?hlColor:color,
        width:isHl?lineW*8:lineW,
        type:isHl?'hl':'pen',
        opacity:isHl?1:1
      };
    }
  };
  const move=(e)=>{
    e.preventDefault();
    if(!drawing.current)return;
    if(e.pointerType==='pen')markPenActive();
    if(e.pointerType==='touch'&&(penDetected.current||window.__penEverDetected))return;
    const p=getPos(e);
    if(tool==='eraser'){
      const thresh=15;let changed=false;
      const before=strokes.current.length;
      strokes.current=strokes.current.filter(s=>{
        if(hitStroke(s,p.x,p.y,thresh)){changed=true;return false;}
        return true;
      });
      if(changed)redraw();
    }else if(currentStroke.current){
      currentStroke.current.points.push(p);
      /* incremental draw for performance */
      const ctx=getCtx();const pts=currentStroke.current.points;const len=pts.length;
      if(len>=2){
        const dpr=window.devicePixelRatio||1;const s=currentStroke.current;
        ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);
        ctx.globalAlpha=s.opacity||1;
        ctx.globalCompositeOperation=s.type==='hl'?'multiply':'source-over';
        ctx.strokeStyle=s.color;ctx.lineCap='round';ctx.lineJoin='round';
        const p0=pts[len-2],p1=pts[len-1];
        ctx.lineWidth=s.width*((p0.p+p1.p)/2||1);
        ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();
        ctx.restore();
      }
    }
  };
  const emitDataUrl=()=>{
    if(!onDataUrl)return;
    const c=canvasRef.current;if(!c)return;
    // 현재 페이지 저장
    pages.current[currentPage]={strokes:strokes.current,undoStack:undoStack.current,redoStack:redoStack.current};
    const dpr=window.devicePixelRatio||1;
    const w=c.width/dpr;const h=c.height/dpr;const spacing=32;
    const imgs=pages.current
      .filter(pg=>pg.strokes.length>0)
      .map(pg=>{
        const off=document.createElement('canvas');off.width=c.width;off.height=c.height;
        const ctx=off.getContext('2d');
        ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);
        ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='#e8ecf0';ctx.lineWidth=0.5;
        for(let y=spacing;y<h;y+=spacing){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
        pg.strokes.forEach(s=>drawSmoothStroke(ctx,s));
        ctx.restore();
        return off.toDataURL('image/png');
      });
    onDataUrl(imgs);
  };
  const end=(e)=>{
    if(!drawing.current)return;
    drawing.current=false;
    if(tool!=='eraser'&&currentStroke.current){
      if(currentStroke.current.points.length>=2){
        pushUndo();
        strokes.current.push(currentStroke.current);
        forceRender(n=>n+1);
      }
      currentStroke.current=null;
      redraw();emitDataUrl();
    }else if(tool==='eraser'){
      emitDataUrl();
    }
  };

  const canUndo=undoStack.current.length>0;
  const canRedo=redoStack.current.length>0;

  return(
    <div>
      <div className="draw-toolbar">
        {/* tools row 1 */}
        <button className={`draw-tool ${tool==='pen'?'on':''}`} onClick={()=>setTool('pen')} title="펜">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
        </button>
        <button className={`draw-tool ${tool==='highlighter'?'on':''}`} onClick={()=>setTool('highlighter')} title="형광펜" style={{background:tool==='highlighter'?hlColor:'#fff',borderColor:tool==='highlighter'?'var(--navy)':'var(--border)'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={tool==='highlighter'?'#333':'currentColor'} strokeWidth="2" strokeLinecap="round"><path d="M15.5 4.5l4 4L8 20H4v-4L15.5 4.5z"/><path d="M12 8l4 4"/></svg>
        </button>
        <button className={`draw-tool ${tool==='eraser'?'on':''}`} onClick={()=>setTool('eraser')} title="획 지우개">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20 20H7L3 16l9-9 8 8-4 4"/><path d="M6 11l8 8"/></svg>
        </button>
        <div className="draw-sep"/>
        {/* colors: show pen or highlighter colors based on tool */}
        {tool==='highlighter'
          ?HIGHLIGHT_COLORS.map(c=>(
            <div key={c} className={`draw-color ${hlColor===c?'on':''}`} style={{background:c}} onClick={()=>setHlColor(c)}/>
          ))
          :DRAW_COLORS.map(c=>(
            <div key={c} className={`draw-color ${color===c&&tool!=='eraser'?'on':''}`} style={{background:c}} onClick={()=>{setColor(c);if(tool==='eraser')setTool('pen');}}/>
          ))
        }
        <div className="draw-sep"/>
        <div className="draw-size">
          <span className="draw-size-label">{tool==='highlighter'?'폭':'굵기'}</span>
          <input type="range" min="1" max="8" value={lineW} onChange={e=>setLineW(+e.target.value)} style={{width:55,accentColor:'var(--navy)'}}/>
          <span style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',minWidth:14,textAlign:'center'}}>{lineW}</span>
        </div>
        <div className="draw-sep"/>
        <button className="draw-tool" onClick={undo} title="되돌리기 (Ctrl+Z)" style={{opacity:canUndo?1:.35}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M3 10h13a4 4 0 010 8H9"/><path d="M3 10l5-5M3 10l5 5"/></svg>
        </button>
        <button className="draw-tool" onClick={redo} title="다시하기 (Ctrl+Y)" style={{opacity:canRedo?1:.35}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 10H8a4 4 0 000 8h7"/><path d="M21 10l-5-5M21 10l-5 5"/></svg>
        </button>
        <button className="draw-tool" onClick={clearAll} title="전체 지우기" style={{opacity:strokes.current.length>0?1:.35}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/></svg>
        </button>
        <div className="draw-sep"/>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <button className="draw-tool" onClick={()=>{if(currentPage>0)switchPage(currentPage-1);}} style={{opacity:currentPage>0?1:.35,padding:'2px 4px'}} title="이전 페이지">◀</button>
          <span style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',minWidth:30,textAlign:'center'}}>{currentPage+1}/{totalPages}</span>
          <button className="draw-tool" onClick={()=>{if(currentPage<totalPages-1)switchPage(currentPage+1);}} style={{opacity:currentPage<totalPages-1?1:.35,padding:'2px 4px'}} title="다음 페이지">▶</button>
          <button className="draw-tool" onClick={addPage} style={{padding:'2px 6px',fontSize:12,fontWeight:800}} title="페이지 추가">+</button>
        </div>
      </div>
      <div className="draw-canvas-wrap" style={{minHeight:800}}>
        <canvas ref={canvasRef}
          onPointerDown={start} onPointerMove={move} onPointerUp={end} onPointerLeave={end}
          style={{display:'block',cursor:tool==='eraser'?'cell':'crosshair',touchAction:'none'}}
        />
      </div>
    </div>
  );
}

// ── 영상 URL 헬퍼 ──
const parseVideoUrl=(url)=>{
  if(!url)return null;
  // YouTube
  let m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
  if(m)return{type:'youtube',embedUrl:`https://www.youtube.com/embed/${m[1]}?autoplay=1&playsinline=1`};
  // Google Drive
  m=url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([\w-]+)/);
  if(m)return{type:'gdrive',embedUrl:`https://drive.google.com/file/d/${m[1]}/preview`};
  // Vimeo
  m=url.match(/vimeo\.com\/(\d+)/);
  if(m)return{type:'vimeo',embedUrl:`https://player.vimeo.com/video/${m[1]}?autoplay=1`};
  // Naver TV / blog video
  m=url.match(/tv\.naver\.com\/(?:v|embed)\/(\d+)/);
  if(m)return{type:'navertv',embedUrl:`https://tv.naver.com/embed/${m[1]}?autoPlay=true`};
  // Direct video file
  if(/\.(mp4|webm|mov|ogg)(\?|$)/i.test(url)||url.startsWith('data:video/'))return{type:'direct',embedUrl:url};
  return null;
};
const isVideoUrl=(url)=>!!parseVideoUrl(url);

const DEFAULT_CASE_PHOTOS={};
// 각 공법별 사진은 동적으로 관리 (pourCasePhotos에 {[methodId]:{causes:['','',''],completed:'',gif:''}} 형태)
const loadCasePhotos=()=>{try{return{...DEFAULT_CASE_PHOTOS,...JSON.parse(localStorage.getItem('pourCasePhotos')||'{}')};}catch{return DEFAULT_CASE_PHOTOS;}};
const saveCasePhotos=p=>{
  try{localStorage.setItem('pourCasePhotos',JSON.stringify(p));}catch(e){alert('저장 공간이 부족합니다. 일부 사진을 삭제해주세요.');}
  /* Firestore에 저장 (base64 → Storage 업로드 후 URL로 교체) */
  (async()=>{
    try{
      const clean=JSON.parse(JSON.stringify(p));
      /* base64 데이터를 Storage에 업로드하고 URL로 교체 */
      for(const key of Object.keys(clean)){
        const item=clean[key];if(!item)continue;
        /* causes 배열 */
        if(item.causes){
          for(let i=0;i<item.causes.length;i++){
            if(item.causes[i]&&item.causes[i].startsWith('data:')){
              item.causes[i]=await uploadBase64ToStorage(item.causes[i],`case-photos/${key}/cause_${i}`);
            }
          }
        }
        /* completed */
        if(item.completed&&item.completed.startsWith('data:')){
          item.completed=await uploadBase64ToStorage(item.completed,`case-photos/${key}/completed`);
        }
        /* mediaThumbs */
        if(item.mediaThumbs){
          for(let i=0;i<item.mediaThumbs.length;i++){
            if(item.mediaThumbs[i]&&item.mediaThumbs[i].startsWith('data:')){
              item.mediaThumbs[i]=await uploadBase64ToStorage(item.mediaThumbs[i],`case-photos/${key}/thumb_${i}`);
            }
          }
        }
      }
      await db.collection('config').doc('casePhotos').set(clean);
      /* Storage URL로 교체된 데이터를 localStorage에도 업데이트 */
      try{localStorage.setItem('pourCasePhotos',JSON.stringify(clean));}catch(e){}
      console.log('[saveCasePhotos] Firestore 저장 완료');
    }catch(e){console.error('[saveCasePhotos] Firestore 저장 실패:',e);}
  })();
};
/* base64 → Firebase Storage 업로드 → URL 반환 */
async function uploadBase64ToStorage(base64,path){
  try{
    const res=await fetch(base64);const blob=await res.blob();
    const ref=firebase.storage().ref(`${path}_${Date.now()}.jpg`);
    await ref.put(blob);
    return await ref.getDownloadURL();
  }catch(e){console.error('[uploadBase64] 실패:',e);return base64;}
}

};

function fillTemplate(tpl,data){return tpl.replace(/\{\{(\w+)\}\}/g,(_,k)=>data[k]||'');}

async function sendSMS(to,text){
  const cfg=loadSolapiConfig();
  if(!cfg.workerUrl)return{success:false,error:'솔라피 Worker URL 미설정'};
  if(!cfg.apiKey||!cfg.apiSecret||!cfg.sender)return{success:false,error:'솔라피 API Key/Secret/발신번호 미설정'};
  try{
    const res=await fetch(cfg.workerUrl.replace(/\/$/,'')+'/send-sms',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to:to.replace(/[^0-9]/g,''),text,apiKey:cfg.apiKey,apiSecret:cfg.apiSecret,sender:cfg.sender})
    });
    const json=await res.json();
    return res.ok?{success:true,data:json}:{success:false,error:json.error||'발송실패'};
  }catch(e){return{success:false,error:e.message};}
}

async function autoSendSMS(data){
  const tpls=loadSmsTemplates();
  const cfg=loadSolapiConfig();
  if(!cfg.workerUrl)return[];
  const vars={name:data.name||'',building:data.building||'',problem:data.problem||'',staff:data.staff||'',phone:data.phone||'',company:data.company||'',position:data.position||'',buildingType:data.buildingType||data.building||'',datetime:data.datetime||''};
  const results=[];
  if(data.phone){
    results.push(sendSMS(data.phone,fillTemplate(tpls.customerThank,vars)).then(r=>({type:'고객',r})));
  }
  const staffPhone=loadStaffList().find(s=>s.id===data.staffId)?.phone;
  if(staffPhone){
    results.push(sendSMS(staffPhone,fillTemplate(tpls.staffNotify,vars)).then(r=>({type:'담당자',r})));
  }
  return Promise.allSettled(results);
}

/* ── Scroll Rail (memo 전용 오른쪽 스크롤 드래그 레일) ── */
function ScrollRail({scrollRef}){
  const trackRef=useRef();
  const thumbRef=useRef();
  const dragging=useRef(false);

  useEffect(()=>{
    const el=scrollRef?.current;
    if(!el)return;
    const update=()=>{
      if(!trackRef.current||!thumbRef.current)return;
      const {scrollTop,scrollHeight,clientHeight}=el;
      if(scrollHeight<=clientHeight){thumbRef.current.style.display='none';return;}
      thumbRef.current.style.display='block';
      const trackH=trackRef.current.offsetHeight;
      const ratio=clientHeight/scrollHeight;
      const thumbH=Math.max(30,trackH*ratio);
      const thumbTop=(scrollTop/(scrollHeight-clientHeight))*(trackH-thumbH);
      thumbRef.current.style.height=thumbH+'px';
      thumbRef.current.style.top=thumbTop+'px';
    };
    el.addEventListener('scroll',update,{passive:true});
    const ro=new ResizeObserver(update);ro.observe(el);
    setTimeout(update,150);
    return()=>{el.removeEventListener('scroll',update);ro.disconnect();};
  },[scrollRef]);

  const doScroll=(e)=>{
    const el=scrollRef?.current;
    if(!el||!trackRef.current)return;
    const rect=trackRef.current.getBoundingClientRect();
    const ratio=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
    el.scrollTop=ratio*(el.scrollHeight-el.clientHeight);
  };
  const onPointerDown=(e)=>{
    e.preventDefault();
    if(e.target.setPointerCapture)e.target.setPointerCapture(e.pointerId);
    dragging.current=true;
    doScroll(e);
  };
  const onPointerMove=(e)=>{if(dragging.current){e.preventDefault();doScroll(e);}};
  const onPointerUp=()=>{dragging.current=false;};

  return(
    <div className="scroll-rail"
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}>
      <div className="scroll-rail-track" ref={trackRef}>
        <div className="scroll-rail-thumb" ref={thumbRef}/>
      </div>
    </div>
  );
}

/* ── Photo Zoom Modal (갤러리 모드: 썸네일 네비게이션 + 핀치 줌) ── */
function PhotoZoomModal({photos,index:initIndex,src,alt,onClose}){
  /* 단일/복수 모드 호환 */
  const list=photos||[{src,alt}];
  const [idx,setIdx]=useState(initIndex||0);
  const [scale,setScale]=useState(1);
  const [pos,setPos]=useState({x:0,y:0});
  const imgRef=useRef();
  const stateRef=useRef({scale:1,x:0,y:0,startDist:0,startScale:1,panning:false,startX:0,startY:0,startPosX:0,startPosY:0,lastTap:0});

  const reset=()=>{setScale(1);setPos({x:0,y:0});stateRef.current.scale=1;stateRef.current.x=0;stateRef.current.y=0;};
  const goTo=(i)=>{if(i<0||i>=list.length)return;reset();setIdx(i);};

  const onTouchStart=(e)=>{
    const s=stateRef.current;
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      s.startDist=Math.sqrt(dx*dx+dy*dy);
      s.startScale=s.scale;
    }else if(e.touches.length===1){
      const now=Date.now();
      if(now-s.lastTap<300){
        e.preventDefault();
        if(s.scale>1.1){reset();}
        else{s.scale=2.5;s.x=0;s.y=0;setScale(2.5);setPos({x:0,y:0});}
        s.lastTap=0;return;
      }
      s.lastTap=now;
      if(s.scale>1){
        s.panning=true;s.startX=e.touches[0].clientX;s.startY=e.touches[0].clientY;
        s.startPosX=s.x;s.startPosY=s.y;
      }
    }
  };
  const onTouchMove=(e)=>{
    const s=stateRef.current;
    if(e.touches.length===2){
      e.preventDefault();
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      let ns=s.startScale*(dist/s.startDist);
      ns=Math.max(1,Math.min(5,ns));
      s.scale=ns;setScale(ns);
      if(ns<=1){s.x=0;s.y=0;setPos({x:0,y:0});}
    }else if(e.touches.length===1&&s.panning){
      e.preventDefault();
      const dx=e.touches[0].clientX-s.startX;
      const dy=e.touches[0].clientY-s.startY;
      s.x=s.startPosX+dx;s.y=s.startPosY+dy;
      setPos({x:s.x,y:s.y});
    }
  };
  const onTouchEnd=(e)=>{
    const s=stateRef.current;
    if(e.touches.length<2){s.startDist=0;}
    if(e.touches.length===0){s.panning=false;}
    if(s.scale<=1)reset();
  };

  const cur=list[idx]||{};
  /* 썸네일 스트립 */
  const stripStart=Math.max(0,idx-1);
  const stripItems=[];
  for(let si=stripStart;si<Math.min(stripStart+4,list.length);si++){
    stripItems.push({i:si,src:list[si].src,on:si===idx});
  }

  return(
    <div className="photo-zoom-overlay" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      {/* 닫기 버튼 — 우상단 고정, 터치 이벤트 전파 차단 */}
      <button style={{position:'absolute',top:14,right:14,width:44,height:44,borderRadius:12,border:'2px solid rgba(255,255,255,.35)',background:'rgba(0,0,0,.55)',backdropFilter:'blur(10px)',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:10,fontSize:22,fontWeight:700}}
        onTouchEnd={e=>{e.stopPropagation();onClose();}} onClick={onClose}>✕</button>
      {/* 상단: 카운터 + 썸네일 */}
      {list.length>1&&(
        <div style={{position:'absolute',top:0,left:0,right:0,padding:'14px 14px 20px',background:'linear-gradient(to bottom,rgba(0,0,0,.8) 0%,rgba(0,0,0,.4) 70%,transparent 100%)',zIndex:4}}
          onTouchStart={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()} onTouchEnd={e=>e.stopPropagation()}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10}}>
            <span style={{fontSize:12,color:'rgba(255,255,255,.7)',fontWeight:700,background:'rgba(0,0,0,.4)',padding:'3px 10px',borderRadius:20,backdropFilter:'blur(4px)'}}>{idx+1} / {list.length}</span>
          </div>
          <div style={{display:'flex',gap:6,justifyContent:'center'}}>
            {stripItems.map(({i:si,src:ts,on})=>(
              <div key={si} onClick={()=>goTo(si)}
                style={{width:48,height:48,borderRadius:8,overflow:'hidden',cursor:'pointer',position:'relative',
                  border:on?'2px solid #fff':'2px solid rgba(255,255,255,.2)',transition:'all .2s'}}>
                <img src={ts} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block',
                  filter:on?'none':'brightness(.35)',transition:'filter .2s'}}/>
                {!on&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.3)'}}/>}
              </div>
            ))}
            {stripStart+4<list.length&&(
              <div style={{width:48,height:48,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:11,color:'rgba(255,255,255,.4)',fontWeight:700}}>+{list.length-stripStart-4}</span>
              </div>
            )}
          </div>
        </div>
      )}
      <div className="photo-zoom-container">
        <img ref={imgRef} src={cur.src} alt={cur.alt||''} style={{transform:`translate(${pos.x}px,${pos.y}px) scale(${scale})`}} draggable={false}/>
      </div>
      <div className="photo-zoom-hint">{scale<=1?(list.length>1?'썸네일 탭으로 이동 · 더블탭으로 확대':'더블탭 또는 핀치로 확대'):''}</div>
    </div>
  );
}

/* ── QR Modal ── */
function QRModal({url,title,onClose}){
  const ref=useRef();
  useEffect(()=>{
    if(ref.current&&url){ref.current.innerHTML='';new QRCode(ref.current,{text:url,width:240,height:240,colorDark:'#0B1D3A',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});}
  },[url]);
  return(
    <div className="modal-overlay" onClick={onClose}>
