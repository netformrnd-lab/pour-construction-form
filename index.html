/* ── Scroll Rail (memo 전용 오른쪽 스크롤 드래그 레일) ── */
function ScrollRail({scrollRef}){
  const trackRef=useRef();
  const thumbRef=useRef();
  const dragging=useRef(false);

  useEffect(()=>{
    const el=scrollRef?.current;
    if(!el)return;
    const update=()=>{
      if(!trackRef.current||!thumbRef.current)return;
      const {scrollTop,scrollHeight,clientHeight}=el;
      if(scrollHeight<=clientHeight){thumbRef.current.style.display='none';return;}
      thumbRef.current.style.display='block';
      const trackH=trackRef.current.offsetHeight;
      const ratio=clientHeight/scrollHeight;
      const thumbH=Math.max(30,trackH*ratio);
      const thumbTop=(scrollTop/(scrollHeight-clientHeight))*(trackH-thumbH);
      thumbRef.current.style.height=thumbH+'px';
      thumbRef.current.style.top=thumbTop+'px';
    };
    el.addEventListener('scroll',update,{passive:true});
    const ro=new ResizeObserver(update);ro.observe(el);
    setTimeout(update,150);
    return()=>{el.removeEventListener('scroll',update);ro.disconnect();};
  },[scrollRef]);

  const doScroll=(e)=>{
    const el=scrollRef?.current;
    if(!el||!trackRef.current)return;
    const rect=trackRef.current.getBoundingClientRect();
    const ratio=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
    el.scrollTop=ratio*(el.scrollHeight-el.clientHeight);
  };
  const onPointerDown=(e)=>{
    e.preventDefault();
    if(e.target.setPointerCapture)e.target.setPointerCapture(e.pointerId);
    dragging.current=true;
    doScroll(e);
  };
  const onPointerMove=(e)=>{if(dragging.current){e.preventDefault();doScroll(e);}};
  const onPointerUp=()=>{dragging.current=false;};

  return(
    <div className="scroll-rail"
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp}>
      <div className="scroll-rail-track" ref={trackRef}>
        <div className="scroll-rail-thumb" ref={thumbRef}/>
      </div>
    </div>
  );
}

/* ── Photo Zoom Modal (갤러리 모드: 썸네일 네비게이션 + 핀치 줌) ── */
function PhotoZoomModal({photos,index:initIndex,src,alt,onClose}){
  /* 단일/복수 모드 호환 */
  const list=photos||[{src,alt}];
  const [idx,setIdx]=useState(initIndex||0);
  const [scale,setScale]=useState(1);
  const [pos,setPos]=useState({x:0,y:0});
  const [swipeX,setSwipeX]=useState(0); /* 스와이프 오프셋 */
  const [transitioning,setTransitioning]=useState(false);
  const imgRef=useRef();
  const stateRef=useRef({
    scale:1,x:0,y:0,
    startDist:0,startScale:1,
    panning:false,swiping:false,
    startX:0,startY:0,startPosX:0,startPosY:0,
    lastTap:0,swipeStartX:0,swipeDeltaX:0,
    touchStartTime:0,pinching:false
  });

  const reset=()=>{setScale(1);setPos({x:0,y:0});setSwipeX(0);
    const s=stateRef.current;s.scale=1;s.x=0;s.y=0;s.swipeDeltaX=0;};
  const goTo=(i)=>{if(i<0||i>=list.length)return;reset();setIdx(i);};

  /* 스와이프로 사진 전환 (애니메이션) */
  const swipeNavigate=(dir)=>{
    const nextIdx=idx+dir;
    if(nextIdx<0||nextIdx>=list.length){
      /* 끝이면 바운스 */
      setSwipeX(0);return;
    }
    setTransitioning(true);
    setSwipeX(dir*-window.innerWidth);
    setTimeout(()=>{
      setTransitioning(false);
      setSwipeX(0);
      reset();setIdx(nextIdx);
    },200);
  };

  const onTouchStart=(e)=>{
    const s=stateRef.current;
    s.touchStartTime=Date.now();
    s.pinching=false;

    if(e.touches.length===2){
      /* 핀치 줌 시작 */
      s.pinching=true;s.swiping=false;s.panning=false;
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      s.startDist=Math.sqrt(dx*dx+dy*dy);
      s.startScale=s.scale;
    }else if(e.touches.length===1){
      /* 더블탭 감지 */
      const now=Date.now();
      if(now-s.lastTap<300){
        e.preventDefault();
        if(s.scale>1.1){reset();}
        else{s.scale=2.5;s.x=0;s.y=0;setScale(2.5);setPos({x:0,y:0});}
        s.lastTap=0;return;
      }
      s.lastTap=now;

      if(s.scale>1.05){
        /* 줌 상태: 패닝 */
        s.panning=true;s.swiping=false;
        s.startX=e.touches[0].clientX;s.startY=e.touches[0].clientY;
        s.startPosX=s.x;s.startPosY=s.y;
      }else{
        /* 기본 상태: 스와이프 준비 */
        s.swiping=true;s.panning=false;
        s.swipeStartX=e.touches[0].clientX;
        s.startY=e.touches[0].clientY;
        s.swipeDeltaX=0;
      }
    }
  };

  const onTouchMove=(e)=>{
    const s=stateRef.current;
    if(e.touches.length===2){
      /* 핀치 줌 */
      e.preventDefault();
      s.pinching=true;s.swiping=false;
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(s.startDist===0)return;
      let ns=s.startScale*(dist/s.startDist);
      ns=Math.max(1,Math.min(5,ns));
      s.scale=ns;setScale(ns);
      if(ns<=1){s.x=0;s.y=0;setPos({x:0,y:0});}
    }else if(e.touches.length===1){
      if(s.panning&&s.scale>1.05){
        /* 줌 상태: 패닝 */
        e.preventDefault();
        const dx=e.touches[0].clientX-s.startX;
        const dy=e.touches[0].clientY-s.startY;
        s.x=s.startPosX+dx;s.y=s.startPosY+dy;
        setPos({x:s.x,y:s.y});
      }else if(s.swiping&&s.scale<=1.05&&!s.pinching){
        /* 스와이프 (좌/우 이동) */
        const dx=e.touches[0].clientX-s.swipeStartX;
        const dy=e.touches[0].clientY-s.startY;
        /* 수평 이동이 수직보다 크면 스와이프 */
        if(Math.abs(dx)>Math.abs(dy)*1.2){
          e.preventDefault();
          s.swipeDeltaX=dx;
          setSwipeX(dx);
        }
      }
    }
  };

  const onTouchEnd=(e)=>{
    const s=stateRef.current;
    if(e.touches.length<2){s.startDist=0;s.pinching=false;}
    if(e.touches.length===0){
      /* 스와이프 완료 판정 */
      if(s.swiping&&Math.abs(s.swipeDeltaX)>60&&s.scale<=1.05){
        const dir=s.swipeDeltaX<0?1:-1; /* 왼쪽 스와이프 = 다음 */
        swipeNavigate(dir);
      }else{
        setSwipeX(0);
      }
      s.panning=false;s.swiping=false;s.swipeDeltaX=0;
      /* 줌 아웃 시 1 미만이면 1로 보정 */
      if(s.scale<1){s.scale=1;setScale(1);s.x=0;s.y=0;setPos({x:0,y:0});}
    }
  };

  const cur=list[idx]||{};

  return(
    <div className="photo-zoom-overlay" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      {/* 닫기 버튼 */}
      <button style={{position:'absolute',top:14,right:14,width:44,height:44,borderRadius:12,border:'2px solid rgba(255,255,255,.35)',background:'rgba(0,0,0,.55)',backdropFilter:'blur(10px)',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:10,fontSize:22,fontWeight:700}}
        onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onClose();}} onClick={e=>{e.stopPropagation();e.preventDefault();onClose();}}>✕</button>
      {/* 상단: 카운터 + 썸네일 (2배 크기) */}
      {list.length>1&&(
        <div style={{position:'absolute',top:0,left:0,right:0,padding:'14px 14px 20px',background:'linear-gradient(to bottom,rgba(0,0,0,.8) 0%,rgba(0,0,0,.4) 70%,transparent 100%)',zIndex:4}}
          onTouchStart={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()} onTouchEnd={e=>e.stopPropagation()}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10}}>
            <span style={{fontSize:13,color:'rgba(255,255,255,.7)',fontWeight:700,background:'rgba(0,0,0,.4)',padding:'4px 12px',borderRadius:20,backdropFilter:'blur(4px)'}}>{idx+1} / {list.length}</span>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'center',overflowX:'auto',padding:'0 8px'}}>
            {list.map((item,si)=>(
              <div key={si} onClick={()=>goTo(si)}
                style={{width:80,height:80,flexShrink:0,borderRadius:10,overflow:'hidden',cursor:'pointer',position:'relative',
                  border:si===idx?'3px solid #fff':'3px solid rgba(255,255,255,.15)',transition:'all .2s',
                  boxShadow:si===idx?'0 0 12px rgba(255,255,255,.3)':'none'}}>
                <img src={item.src} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block',
                  filter:si===idx?'none':'brightness(.4)',transition:'filter .2s'}}/>
              </div>
            ))}
          </div>
        </div>
      )}
      {/* 메인 이미지 (스와이프 오프셋 적용) */}
      <div className="photo-zoom-container" style={{transition:transitioning?'transform .2s ease':'none',transform:`translateX(${swipeX}px)`}}>
        <img ref={imgRef} src={cur.src} alt={cur.alt||''} style={{transform:`translate(${pos.x}px,${pos.y}px) scale(${scale})`,transition:transitioning?'none':'transform .12s ease'}} draggable={false}/>
      </div>
      {/* 좌우 화살표 힌트 */}
      {scale<=1.05&&list.length>1&&(
        <>
          {idx>0&&<div style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:5,pointerEvents:'none'}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
          </div>}
          {idx<list.length-1&&<div style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:5,pointerEvents:'none'}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="2.5"><path d="M9 18l6-6-6-6"/></svg>
          </div>}
        </>
      )}
      <div className="photo-zoom-hint">{scale<=1.05?(list.length>1?'좌우 스와이프로 이동 · 더블탭으로 확대':'더블탭 또는 핀치로 확대'):''}</div>
    </div>
  );
}

/* ── 이미지 리사이즈 (Firestore 저장용 압축) ── */
function resizeImageFile(file,maxW=900,quality=0.72){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxW/img.width);
        const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

          if(mThumbs[idx])return mThumbs[idx];
          const p=parseVideoUrl(url);
          if(p&&p.type==='youtube'){const m2=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);if(m2)return`https://img.youtube.com/vi/${m2[1]}/hqdefault.jpg`;}

        // 썸네일 스트립: 이전 1개 + 현재 + 다음 (최대 4개)

          <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'#000',zIndex:950,overflow:'hidden',touchAction:'none'}}
            onTouchStart={e=>{
              const s=mvSwipeRef.current;
              if(e.touches.length===2&&!mIsVid){
                const dx2=e.touches[0].clientX-e.touches[1].clientX,dy2=e.touches[0].clientY-e.touches[1].clientY;
                s.startDist=Math.sqrt(dx2*dx2+dy2*dy2);s.startScale=s.scale||1;
              }else if(e.touches.length===1){
                s.swipeStartX=e.touches[0].clientX;
                s.swipeStartY=e.touches[0].clientY;
                s.swiping=false;
                if(!mIsVid){
                  const now=Date.now();
                  if(now-(s.lastTap||0)<300){
                    e.preventDefault();
                    if((s.scale||1)>1.1){s.scale=1;s.posX=0;s.posY=0;setMvScale(1);setMvPos({x:0,y:0});}
                    else{s.scale=2.5;s.posX=0;s.posY=0;setMvScale(2.5);setMvPos({x:0,y:0});}
                    s.lastTap=0;return;
                  }
                  s.lastTap=now;
                  if((s.scale||1)>1){s.panning=true;s.startX=e.touches[0].clientX;s.startY2=e.touches[0].clientY;s.startPosX=s.posX||0;s.startPosY=s.posY||0;}
                }
              }
            }}
            onTouchMove={e=>{
              const s=mvSwipeRef.current;

                e.preventDefault();
                const dx2=e.touches[0].clientX-e.touches[1].clientX,dy2=e.touches[0].clientY-e.touches[1].clientY;
                const dist=Math.sqrt(dx2*dx2+dy2*dy2);
                let ns=s.startScale*(dist/s.startDist);ns=Math.max(1,Math.min(5,ns));
                s.scale=ns;setMvScale(ns);
                if(ns<=1){s.posX=0;s.posY=0;setMvPos({x:0,y:0});}
              }else if(e.touches.length===1&&s.panning&&(s.scale||1)>1&&!mIsVid){
                e.preventDefault();
                const dx3=e.touches[0].clientX-s.startX;
                const dy3=e.touches[0].clientY-s.startY2;
                s.posX=s.startPosX+dx3;s.posY=s.startPosY+dy3;
                setMvPos({x:s.posX,y:s.posY});
              }else if(e.touches.length===1&&mIsVid){
                /* 영상: 좌우 스와이프 감지 */
                const dx=e.touches[0].clientX-s.swipeStartX;
                const dy=e.touches[0].clientY-s.swipeStartY;
                if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>30)s.swiping=true;
              }
            }}
            onTouchEnd={e=>{
              const s=mvSwipeRef.current;
              if(e.touches.length<2){s.startDist=0;}

              </button>
              {/* 썸네일 스트립 — 중앙 정렬 */}
              {mList.length>1&&(
                <div style={{display:'flex',gap:6,justifyContent:'center'}}>

                    <div key={idx} onClick={()=>setMediaViewer(idx)}
                      style={{width:48,height:64,borderRadius:8,overflow:'hidden',cursor:'pointer',position:'relative',

                          <span style={{fontSize:14,color:isCurrent?'#fff':'rgba(255,255,255,.3)'}}>▶</span>
                        </div>
                      )}
                      {!isCurrent&&(
                        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.3)'}}/>
                      )}
                    </div>
                  ))}
                  {stripStart+4<mList.length&&(
                    <div style={{width:48,height:64,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <span style={{fontSize:11,color:'rgba(255,255,255,.4)',fontWeight:700}}>+{mList.length-stripStart-4}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
            {/* 메인 미디어 — 전체 화면 */}
            <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center'}}

                mParsed.type==='direct'?(
                  <video key={mSrc} ref={mvVideoRef} src={mSrc}
                    style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}
                    playsInline controls loop autoPlay
                    onPlay={()=>setMvPlaying(true)} onPause={()=>setMvPlaying(false)}/>
                ):(
                  <iframe key={mSrc} src={mParsed.embedUrl}
                    style={{width:'100%',height:'100%',border:'none'}}
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"

              ):(
                <img src={mSrc} alt="미디어" style={{width:'100%',height:'100%',objectFit:'contain',display:'block',transform:`translate(${mvPos.x}px,${mvPos.y}px) scale(${mvScale})`,transition:mvScale<=1?'transform .15s':'none'}}/>

                  <span style={{fontSize:30,color:'#fff',marginLeft:5}}>▶</span>
                </div>

            </div>
          </div>
        );
      })()}

            <div style={{flex:1,borderRadius:10,border:'1px solid rgba(255,255,255,.15)',background:'rgba(255,255,255,.07)',overflow:'hidden'}}>

                  <button onClick={()=>openDoc(guideDoc.url,'시공 가이드','📖',guideDoc.switchTo)}

                    <span style={{fontSize:24}}>📖</span>
                    <div><div style={{fontSize:12,fontWeight:800,color:'#f5c563'}}>시공 가이드</div><div style={{fontSize:9,color:'rgba(255,255,255,.4)'}}>앱 안에서 바로 보기</div></div>
                  </button>
                  <button onClick={()=>setQr({url:guideDoc.url,title:'📖 시공 가이드'})}
                    style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4,padding:'8px',background:'rgba(245,158,11,.08)',border:'none',cursor:'pointer',fontFamily:'inherit'}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(245,197,99,.8)" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="4" height="4" rx="1"/></svg>
                    <span style={{fontSize:10,fontWeight:700,color:'#f5c563'}}>QR로 전달</span>
                  </button>
                </div>
              ):(
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 14px',opacity:.3}}>
                  <span style={{fontSize:24}}>📖</span><span style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.5)'}}>시공 가이드 준비 중</span>

          </div>

        })()}

      {/* 탭 */}


      <div className="content">
        <div className="breadcrumb">
          <span>{problem.cat}</span><span className="bc-sep">›</span>
          <span>{problem.label}</span>

        {/* ── 공법 상세 ── */}
        <>
            {/* ── STEP 1. 현장 하자사진 — "이런 문제 있으신가요?" ── */}
            {(()=>{
              const causeList=(photos?.causes||[]).filter(s=>s);
              const photosWithMeta=defectPhotos.length>0
                ?defectPhotos.map(p=>({src:p.imageUrl||'',defectType:p.defectType||'',defectPart:p.defectPart||'',defectDetail:'',label:p.label||''}))

              let filtered=photosWithMeta;
              if(activeDefect!=='all')filtered=filtered.filter(p=>p.defectType===activeDefect);
              if(activePart!=='all')filtered=filtered.filter(p=>p.defectPart===activePart);
              const grouped={};
              existingMajor.forEach(type=>{grouped[type]=photosWithMeta.filter(p=>p.defectType===type);});

                const c=act?'var(--accent)':'var(--border)';
                const W=7,T=1.5;

                </>);
              };
              const hasActive=activeDefect!=='all';
              /* 사진 선택 헬퍼 */
              const toggleSelect=src=>{
                setSelectedDefectPhotos(prev=>{
                  const n=new Set(prev);
                  n.has(src)?n.delete(src):n.add(src);
                  return n;
                });
              };
              const addSelectedToMemo=()=>{
                if(!selectedDefectPhotos.size)return;
                setNtMemoImgs(prev=>[...prev,...Array.from(selectedDefectPhotos)]);
                setSelectedDefectPhotos(new Set());
                setPhotoSelectMode(false);
                setPhotoAddToast(true);
                setTimeout(()=>setPhotoAddToast(false),2600);
              };
              /* 카메라/파일 → 리사이즈 → Claude Vision 자동분류 → 태그 확인 모달 */
              const defectTypeOpts=[...new Set(defectPhotos.map(p=>p.defectType).filter(Boolean))];
              if(!defectTypeOpts.length)defectTypeOpts.push(...['누수','균열','들뜸','백화','박리','기타']);
              const handlePhotoFiles=files=>{
                Array.from(files).forEach(async file=>{
                  if(!file.type.startsWith('image/'))return;
                  const id=Date.now()+Math.random();
                  setNtFieldPhotos(prev=>[...prev,{id,src:'',defectType:'',defectPart:'',severity:'',confidence:null,aiReason:'',confirmed:false,analyzing:true}]);
                  const src=await resizeImageFile(file);
                  setNtFieldPhotos(prev=>prev.map(p=>p.id===id?{...p,src}:p));
                  /* Claude Vision 호출 */
                  const aiResult=await callClaudeVision(src,defectTypeOpts);
                  setNtFieldPhotos(prev=>prev.map(p=>p.id===id?{...p,analyzing:false,...(aiResult||{})}:p));
                  /* 결과와 함께 확인 모달 열기 */
                  setFieldPhotoTag({
                    defectType:aiResult?.defectType||'',
                    defectPart:aiResult?.defectPart||'',
                    severity:aiResult?.severity||'',
                    confidence:aiResult?.confidence||null,
                    aiReason:aiResult?.reason||'',
                  });
                  setFieldPhotoModal({id,src});
                });

                      <button onClick={()=>fileInputRef.current?.click()}

                    style={{display:'none'}} onChange={e=>{handlePhotoFiles(e.target.files);e.target.value='';}}/>

                          scrollSnapType:'x mandatory',WebkitOverflowScrolling:'touch',
                          scrollbarWidth:'none',msOverflowStyle:'none'}}>
                          {(()=>{
                            const isAct=activeDefect==='all';
                            return(
                              <div onClick={()=>changePhotoFilter('all','all')}
                                className={isAct?'df-card-in df-active-card':'df-card-in'}
                                style={{flex:'0 0 82px',scrollSnapAlign:'start',borderRadius:10,overflow:'hidden',cursor:'pointer',
                                  border:`1.5px solid ${isAct?'var(--accent)':'var(--border)'}`,
                                  background:isAct?'var(--accent-l)':'var(--bg)',
                                  transform:isAct?'scale(1.06) translateY(-3px)':hasActive?'scale(0.94)':'scale(1)',
                                  opacity:isAct?1:hasActive?.65:1,
                                  transition:'transform .38s cubic-bezier(.19,1,.22,1),opacity .28s,border-color .2s,background .2s',
                                  flexShrink:0,position:'relative'}}>
                                <Mk act={isAct}/>
                                {isAct&&<div style={{position:'absolute',bottom:0,left:0,right:0,height:2,background:'var(--accent)',transformOrigin:'left',animation:'accentGrow .38s cubic-bezier(.19,1,.22,1) both'}}/>}

                                  <div style={{height:'100%',width:'100%',background:isAct?'var(--accent)':'var(--border)',transition:'background .3s'}}/>

                          })()}

                              <div key={type} onClick={()=>changePhotoFilter(type,'all')}

                                    <img src={rep} alt={type} className={isAct?'df-img-ken':''}

                                  </div>
                                ):(
                                  <div style={{height:60,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'var(--border)'}}>◌</div>
                                )}
                                <div style={{padding:'5px 7px 4px',borderTop:'1px solid var(--border-s)'}}>
                                  <div style={{fontSize:9,fontWeight:800,color:isAct?'var(--accent)':'var(--text-md)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',letterSpacing:'.01em'}}>#{type}</div>
                                </div>
                                <div style={{height:2,background:'var(--border-s)'}}>
                                  <div style={{height:'100%',width:`${Math.round((grp.length/(photosWithMeta.length||1))*100)}%`,background:isAct?'var(--accent)':'var(--blue-m)',transition:'width .45s cubic-bezier(.19,1,.22,1),background .3s'}}/>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      {/* ── 소분류 사진 스트립 ── */}

                          <div style={{display:'flex',alignItems:'center',gap:5}}>
                            <div style={{width:10,height:1.5,background:'var(--accent)',borderRadius:1}}/>
                            <div style={{width:4,height:1.5,background:'var(--blue-m)',borderRadius:1}}/>
                            <span style={{fontSize:10,fontWeight:700,color:'var(--text-md)',letterSpacing:'.06em'}}>{activeDefect==='all'?'전체':'#'+activeDefect}</span>
                          </div>
                          {activeDefect!=='all'&&(
                            <span style={{fontSize:9,fontWeight:700,color:'var(--accent)',background:'var(--accent-l)',borderRadius:4,padding:'1px 5px'}}>
                              {Math.round((filtered.length/(photosWithMeta.length||1))*100)}%
                            </span>
                          )}
                        </div>
                        <div className={isPhotoExiting?'photo-grid-exit':''}>
                          <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:4,
                            scrollSnapType:'x mandatory',WebkitOverflowScrolling:'touch',
                            scrollbarWidth:'none',msOverflowStyle:'none'}}>
                            {filtered.map((p,i)=>{
                              const isSel=selectedDefectPhotos.has(p.src);
                              return(
                                <div key={activeDefect+'_'+i}
                                  className="defect-photo-card df-photo-in"
                                  style={{flex:'0 0 70%',maxWidth:270,scrollSnapAlign:'start',
                                    borderRadius:10,overflow:'hidden',
                                    border:`${isSel&&photoSelectMode?'2.5px solid var(--accent)':'1px solid var(--border)'}`,
                                    background:'#000',position:'relative',aspectRatio:'4/3',
                                    cursor:'pointer',animationDelay:`${i*55}ms`,flexShrink:0,
                                    boxShadow:isSel&&photoSelectMode?'0 0 0 3px rgba(37,99,235,.3)':'0 2px 12px rgba(13,27,42,.12)',
                                    transition:'border-color .2s,box-shadow .2s'}}
                                  onClick={()=>{
                                    if(photoSelectMode){toggleSelect(p.src);}
                                    else{const allList=filtered.map(x=>({src:x.src,alt:'하자사진'}));setZoomPhoto({photos:allList,index:i});}
                                  }}>
                                  <img src={p.src} alt={`하자사진${i+1}`}
                                    style={{width:'100%',height:'100%',objectFit:'cover',display:'block',
                                      opacity:photoSelectMode&&!isSel?.7:1,transition:'opacity .2s'}}/>
                                  {/* 선택 체크 오버레이 */}
                                  {photoSelectMode&&(
                                    <div style={{position:'absolute',top:7,left:7,width:22,height:22,borderRadius:'50%',
                                      background:isSel?'var(--accent)':'rgba(0,0,0,.45)',
                                      border:`2px solid ${isSel?'var(--accent)':'rgba(255,255,255,.7)'}`,
                                      display:'flex',alignItems:'center',justifyContent:'center',
                                      transition:'all .18s cubic-bezier(.19,1,.22,1)'}}>
                                      {isSel&&<span style={{fontSize:11,color:'#fff',lineHeight:1}}>✓</span>}
                                    </div>
                                  )}
                                  {/* 인덱스 */}
                                  <div style={{position:'absolute',top:7,right:7,background:'rgba(13,27,42,.6)',borderRadius:4,padding:'1px 6px',fontSize:9,fontWeight:700,color:'rgba(255,255,255,.85)',fontVariantNumeric:'tabular-nums',letterSpacing:'.06em'}}>
                                    {String(i+1).padStart(2,'0')}
                                  </div>
                                  {/* 좌상단 코너 마크 */}
                                  <div style={{position:'absolute',top:6,left:6,width:8,height:8,pointerEvents:'none'}}>
                                    <div style={{position:'absolute',top:0,left:0,width:8,height:1.5,background:'rgba(255,255,255,.5)'}}/>
                                    <div style={{position:'absolute',top:0,left:0,width:1.5,height:8,background:'rgba(255,255,255,.5)'}}/>
                                  </div>
                                  {/* 하단 레이블 */}

                                      {p.defectType&&(<span style={{fontSize:9,fontWeight:700,color:'#fff',letterSpacing:'.05em',background:'rgba(37,99,235,.8)',borderRadius:4,padding:'2px 7px'}}>#{p.defectType}</span>)}
                                      {p.defectPart&&p.defectPart!==p.defectType&&(<span style={{fontSize:9,fontWeight:600,color:'rgba(255,255,255,.8)',background:'rgba(255,255,255,.14)',borderRadius:4,padding:'2px 6px'}}>#{p.defectPart}</span>)}
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    </>
                  ):(
                    <div style={{padding:'14px 14px 16px',display:'flex',gap:7}}>
                      {['','',''].map((_,i)=>(
                        <div key={i} style={{flex:'0 0 82px',borderRadius:10,border:'1.5px dashed var(--border)',aspectRatio:'1/1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,background:'var(--bg)'}}>
                          <span style={{fontSize:20,opacity:.2}}>📷</span>

                        </div>

                              <div style={{fontSize:9,fontWeight:700,color:'#78350F',marginTop:3}}>{s.label}</div>
                              {s.note&&<div style={{fontSize:7,color:'var(--text-sm)',marginTop:2,lineHeight:1.3}}>{s.note}</div>}

            </div>

            {/* ── 하단 CTA: 담당자 연락처 카드 + QR ── */}

                <div style={{fontSize:9,fontWeight:800,color:'rgba(255,255,255,.5)',letterSpacing:'.07em',marginBottom:10}}>담당 컨설턴트</div>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:44,height:44,borderRadius:'50%',background:'rgba(37,99,235,.3)',border:'2px solid rgba(37,99,235,.5)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <span style={{fontSize:16,fontWeight:900,color:'#93C5FD'}}>{staffName?staffName.charAt(0):''}</span>
                  </div>

                    <div style={{fontSize:11,color:'rgba(255,255,255,.6)'}}>POUR솔루션 컨설턴트</div>

                    <span style={{fontSize:9,fontWeight:700,color:'#93C5FD'}}>{staffDisplayPhone}</span>

                <div style={{marginTop:12,paddingTop:10,borderTop:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',gap:6}}>

                      <div ref={el=>{
                        if(el&&el.childElementCount===0&&window.QRCode){

            </div>
          </div>
        </div>
      );
    })()}

    </>
  );
}

/* ── Leads Screen ── */
function  LeadsScreen({onBack}){
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterStaff,setFilterStaff]=useState('전체');
  const [staffList,setStaffList]=useState([]);
  const [expandedId,setExpandedId]=useState(null);
  const [detailLead,setDetailLead]=useState(null);

  useEffect(()=>{
    db.collection('leads').orderBy('savedAt','desc').get()
      .then(s=>{const all=s.docs.map(d=>({id:d.id,...d.data()}));setLeads(all);setStaffList([...new Set(all.map(l=>l.staff).filter(Boolean))]);})
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[]);

  const display=filterStaff==='전체'?leads:leads.filter(l=>l.staff===filterStaff);

  return(
    <div className="screen active" style={{background:'var(--bg)'}}>
      <div className="hdr">
        <div className="hdr-brand">
          <img src="/logo-pour.png" alt="Netform R&D" style={{height:'32px',width:'auto',display:'block',filter:'brightness(0) invert(1)'}}/>
        </div>
        <div className="hdr-div"/><div className="hdr-sub">상담 유입</div>
        <div className="hdr-r">
          <span style={{fontSize:12,color:'rgba(255,255,255,.5)',fontWeight:700}}>{display.length}건</span>
          <button className="btn-back" onClick={onBack}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button>
        </div>
      </div>
      {staffList.length>0&&(
        <div className="filter-row">
          {['전체',...staffList].map(s=>(
            <button key={s} className={`f-chip ${filterStaff===s?'on':''}`} onClick={()=>setFilterStaff(s)}>{s}</button>
          ))}
        </div>
      )}
      <div className="leads-scroll">
        {loading&&<div style={{padding:'40px',textAlign:'center'}}><div className="spinner" style={{margin:'0 auto'}}/></div>}
        {!loading&&display.length===0&&<div className="empty">저장된 상담 내역이 없어요</div>}
        {display.map((l,i)=>{
          const isOpen=expandedId===(l.id||i);
          const hasMemo=l.memo||l.memoImgs?.length>0;
          return(
          <div key={l.id||i} className="lead-card" style={{padding:0,overflow:'hidden'}}>
            {/* 헤더 — 항상 표시 */}
            <div style={{padding:'12px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:8}} onClick={()=>setDetailLead(l)}>
              <div className="lead-num">{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span className="lead-name" style={{margin:0}}>{l.name}</span>

/* ── 명함 촬영 컴포넌트 ── */
function BusinessCardCapture({onCapture,openRef}){
  const [frontImg,setFrontImg]=useState(null);
  const [backImg,setBackImg]=useState(null);
  const [camOpen,setCamOpen]=useState(false);
  const [camSide,setCamSide]=useState('front'); // 'front' or 'back'
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const canvasRef=useRef(null);

  const openCam=(side)=>{
    setCamSide(side);setCamOpen(true);
    setTimeout(()=>{
      navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}})
        .then(stream=>{streamRef.current=stream;if(videoRef.current)videoRef.current.srcObject=stream;})
        .catch(e=>{alert('카메라 접근 권한이 필요합니다');setCamOpen(false);});
    },100);
  };
  useEffect(()=>{if(openRef)openRef.current=()=>openCam('front');},[]);
  const closeCam=()=>{
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    streamRef.current=null;setCamOpen(false);
  };
  const capture=()=>{
    const video=videoRef.current;if(!video)return;
    const c=canvasRef.current||document.createElement('canvas');
    canvasRef.current=c;
    c.width=video.videoWidth;c.height=video.videoHeight;
    const ctx=c.getContext('2d');ctx.drawImage(video,0,0);
    const dataUrl=c.toDataURL('image/jpeg',0.85);
    if(camSide==='front'){setFrontImg(dataUrl);if(onCapture)onCapture('front',dataUrl);}
    else{setBackImg(dataUrl);if(onCapture)onCapture('back',dataUrl);}
    closeCam();
    // 앞면 촬영 직후 뒷면 안내
    if(camSide==='front'&&!backImg){
      setTimeout(()=>{if(confirm('뒷면도 촬영하시겠어요?'))openCam('back');},400);
    }
  };
  const removeFront=()=>{setFrontImg(null);if(onCapture)onCapture('front',null);};
  const removeBack=()=>{setBackImg(null);if(onCapture)onCapture('back',null);};

  return(
    <>
      {(frontImg||backImg)?(
        <div className="bc-preview-row">
          {frontImg&&<div className="bc-preview-card">
            <img src={frontImg} alt="앞면"/>
            <span className="bc-preview-label">앞면</span>
            <button className="bc-preview-del" onClick={removeFront}>✕</button>
          </div>}
          {backImg&&<div className="bc-preview-card">
            <img src={backImg} alt="뒷면"/>
            <span className="bc-preview-label">뒷면</span>
            <button className="bc-preview-del" onClick={removeBack}>✕</button>
          </div>}
          {!backImg&&<button className="bc-preview-card" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:80,cursor:'pointer',border:'1.5px dashed var(--border)'}} onClick={()=>openCam('back')}>
            <div style={{textAlign:'center',padding:10}}><div style={{fontSize:20,marginBottom:4}}>📸</div><div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)'}}>뒷면 촬영</div></div>
          </button>}
          {frontImg&&!backImg&&null}
          <button style={{position:'absolute',right:4,bottom:4,fontSize:10,background:'none',border:'none',color:'var(--blue)',fontWeight:700,cursor:'pointer',padding:4}} onClick={()=>openCam('front')}>앞면 재촬영</button>
        </div>
      ):(
        <button className="bc-btn" onClick={()=>openCam('front')}>
          <span className="bc-btn-icon">📇</span>
          <div><div className="bc-btn-text">명함 촬영</div><div className="bc-btn-sub">앞면 필수 · 뒷면 선택</div></div>
        </button>
      )}

      {camOpen&&(
        <div className="bc-cam-overlay">
          <div className="bc-cam-header">
            <span className="bc-cam-header-title">명함 {camSide==='front'?'앞면':'뒷면'} 촬영</span>
            <button className="bc-cam-close" onClick={closeCam}>✕</button>
          </div>
          <div className="bc-cam-body">
            <video ref={videoRef} className="bc-cam-video" autoPlay playsInline muted/>
            <div className="bc-cam-guide" style={{width:'80%',aspectRatio:'9/5',top:'50%',left:'10%',transform:'translateY(-50%)'}}>
              <span className="bc-cam-guide-label">명함을 테두리 안에 맞춰주세요</span>
            </div>
          </div>
          <div className="bc-cam-footer">
            <button className="bc-cam-shutter" onClick={capture}/>
          </div>
        </div>
      )}
    </>
  );
}

                <span style={{fontSize:11,fontWeight:700,color:'var(--blue)',display:'flex',alignItems:'center',gap:4}}>{doodleOpen?'접기 ▲':'펼치기 ▼'}</span>

          </>
        )}
      </div>
    </div>
  );
}

                {id:'partner',icon:'🤝',label:'파트너사/시공연결',sub:'파트너 혜택 · 시공 매칭 · 사업 제휴'},

              ].map(t=>(
                <button key={t.id} onClick={()=>{
                  setInquiryType(t.id);

                  else if(t.id==='partner')setShowPartner(true);

              {prob&&<span style={{padding:'3px 10px',borderRadius:20,border:'1.5px solid rgba(234,88,12,.4)',background:accentBg,fontSize:11,fontWeight:700,color:accent}}>{prob.icon} {prob.label}</span>}

/* ── POUR스토어: 영업 메모 시트 ── */
function StoreNoteSheet({staffId,staffName,staffDay,building,problem,onClose}){
  const [name,setName]=useState('');
  const [company,setCompany]=useState('');
  const [phone,setPhone]=useState('');
  const [actions,setActions]=useState([]);
  const [memo,setMemo]=useState('');
  const [pencilMode,setPencilMode]=useState(true);
  const [memoImgs,setMemoImgs]=useState([]);
  const [doodleOpen,setDoodleOpen]=useState(false);
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const memoRef=useRef(null);
  const toggle=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const hasData=()=>!!(name||phone||memo||actions.length);
  const safeClose=()=>{if(hasData()&&!window.confirm('입력한 내용이 저장되지 않았습니다. 닫으시겠어요?'))return;onClose();};
  const accentOrange='#EA580C';

  const save=async()=>{
    if(!name.trim()||!phone.trim()){alert('성함과 전화번호를 입력해주세요');return;}
    setSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:staffDay,staffId,staff:staffName,
      brand:'store',building:building?.label||'-',problem:problem?.label||'-',
      name,company,phone,
      actions:actions.map(id=>STORE_ACTION_TAGS.find(t=>t.id===id)?.label||id),
      memo,memoImgs,status:'신규',source:getUrlSource(),fieldMode:localStorage.getItem('pourFieldMode')||'expo',
    };
    try{await db.collection('leads-store').add(data);}catch(e){console.warn(e);}
    const smsCfg=loadSolapiConfig();
    if(smsCfg.workerUrl&&smsCfg.autoCustomer!==false&&phone){
      const txt=`${name}님, POUR스토어 상담 감사합니다. 관심 자재 정보를 보내드릴게요. pourstore.kr`;
      sendSMS(phone,txt).catch(()=>{});
    }
    setSaving(false);setDone(true);
  };

  return(
    <div className="sheet-bg" onClick={safeClose}>
      <div className="note-sheet" onClick={e=>e.stopPropagation()}>
        {done?(
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 20px'}}>
            <div style={{fontSize:44,marginBottom:10}}>✅</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>스토어 상담 메모 저장됐어요!</div>
            <div style={{fontSize:13,color:'var(--text-sm)',marginBottom:20}}>{name}님 · {staffName} · {staffDay}</div>
            <button onClick={onClose} style={{padding:'12px 28px',borderRadius:12,border:'none',background:accentOrange,color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>닫기</button>
          </div>
        ):(
          <>
            <div className="note-sheet-head" style={{borderBottom:'1px solid var(--border)',paddingBottom:10}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontSize:16,fontWeight:900,color:'var(--text)'}}>🛒 스토어 영업 메모</span>
                <div style={{display:'flex',gap:6}}>
                  <button className="note-head-save" style={{background:accentOrange}} onClick={save} disabled={saving}>{saving?'저장 중...':'저장하기'}</button>
                  <button onClick={safeClose} style={{width:32,height:32,borderRadius:'50%',border:'none',background:'var(--bg)',color:'var(--text-md)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                </div>
              </div>
              {(building||problem)&&(
                <div className="note-ctx" style={{marginTop:8,marginBottom:0}}>
                  <div className="note-ctx-row">
                    {building&&<span className="note-ctx-tag">{building.icon} {building.label}</span>}
                    {problem&&<span className="note-ctx-tag">{problem.icon} {problem.label}</span>}
                  </div>
                </div>
              )}
            </div>
            <div className="note-sheet-scroll">
              <div style={{padding:'12px 0 8px'}}>
                <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>고객 정보</div>
                <input className="note-input" style={{marginBottom:6,fontSize:13}} placeholder="회사명 / 업체명 (선택)" value={company} onChange={e=>setCompany(e.target.value)}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                  <input className="note-input" style={{fontSize:13}} placeholder="성함 *" value={name} onChange={e=>setName(e.target.value)}/>
                  <input className="note-input" style={{fontSize:13}} placeholder="연락처 *" value={phone} onChange={e=>setPhone(e.target.value)} inputMode="tel"/>
                </div>
              </div>
              {/* 낙서장 */}
              <div style={{marginBottom:10,borderTop:'2px solid var(--border)'}}>
                <button onClick={()=>setDoodleOpen(!doodleOpen)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 4px',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}>
                  <span style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase'}}>🎨 낙서장</span>
                  <span style={{fontSize:11,fontWeight:700,color:'var(--blue)',display:'flex',alignItems:'center',gap:4}}>{doodleOpen?'접기 ▲':'펼치기 ▼'}</span>
                </button>
                {doodleOpen&&<DrawCanvas onDataUrl={setMemoImgs}/>}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── PhotoSlot: 클릭→파일선택/URL, 붙여넣기→이미지 삽입 ── */
/* maxSize: 리사이즈 최대 픽셀 (기본 800), quality: JPEG 품질 (기본 0.8) */
function PhotoSlot({src,label,onSet,onRemove,wide,aspect,maxSize,quality}){
  const MAX=maxSize||800;
  const QUALITY=quality||0.8;
  const fileRef=useRef(null);
  const wrapRef=useRef(null);
  const [resizeInfo,setResizeInfo]=useState(null);
  const handleFile=(file)=>{
    if(!file||!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const origW=img.width,origH=img.height;
        let w=origW,h=origH;
        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        const result=c.toDataURL('image/jpeg',QUALITY);
        const sizeKB=Math.round(result.length*3/4/1024);
        setResizeInfo(`${origW}×${origH} → ${w}×${h} (${sizeKB}KB)`);
        setTimeout(()=>setResizeInfo(null),3000);
        onSet(result);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  useEffect(()=>{
    const el=wrapRef.current;if(!el)return;
    const handler=(e)=>{
      const items=e.clipboardData?.items;if(!items)return;
      for(let it of items){
        if(it.type.startsWith('image/')){
          e.preventDefault();handleFile(it.getAsFile());return;
        }
      }
    };
    el.addEventListener('paste',handler);
    return()=>el.removeEventListener('paste',handler);
  });
  return(
    <div ref={wrapRef} tabIndex={0}
      style={{position:'relative',width:wide?'100%':120,height:wide?80:90,borderRadius:10,overflow:'hidden',border:'1.5px solid var(--border)',background:'#f3f4f6',flexShrink:0,cursor:'pointer',aspectRatio:aspect||'auto',outline:'none'}}
      onClick={()=>{
        const choice=src?window.confirm('새 사진으로 교체하시겠습니까?\n\n[확인] 파일 선택\n[취소] URL 직접 입력'):null;
        if(choice===true||!src){fileRef.current?.click();}
        else if(choice===false){const u=prompt('이미지 URL 입력:',src||'');if(u!==null)onSet(u);}
      }}>
      {src
        ?<>
          <img src={src} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
          <button onClick={(e)=>{e.stopPropagation();onRemove();}}
            style={{position:'absolute',top:3,right:3,width:18,height:18,borderRadius:'50%',border:'none',background:'rgba(0,0,0,.55)',color:'#fff',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
          {resizeInfo&&<div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(0,0,0,.7)',color:'#4ADE80',fontSize:8,fontWeight:700,padding:'3px 6px',textAlign:'center'}}>{resizeInfo}</div>}
        </>
        :<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
          <span style={{fontSize:20,opacity:.25}}>📷</span>
          <span style={{fontSize:9,color:'var(--text-sm)',fontWeight:600,textAlign:'center',lineHeight:1.2}}>{label||'클릭 또는\n붙여넣기'}</span>
          <span style={{fontSize:7,color:'var(--text-sm)',opacity:.5}}>최대 {MAX}px</span>
        </div>
      }
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
        onChange={(e)=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';}}/>
    </div>
  );
}

/* ── QR 통계 탭 컴포넌트 ── */
function QrStatsTab(){
  const [qrStats,setQrStats]=useState(null);
  const [qrLoading,setQrLoading]=useState(true);
  useEffect(()=>{
    db.collection('qr-stats').get()
      .then(s=>{
        const rows=s.docs.map(d=>({id:d.id,...d.data()}));
        rows.sort((a,b)=>(b.count||0)-(a.count||0));
        setQrStats(rows);
      })
      .catch(e=>{console.warn('qr-stats 로드 실패:',e);setQrStats([]);})
      .finally(()=>setQrLoading(false));
  },[]);
  if(qrLoading)return <div style={{textAlign:'center',padding:40,color:'var(--text-sm)'}}>불러오는 중...</div>;
  if(!qrStats||qrStats.length===0)return(
    <div style={{textAlign:'center',padding:'40px 20px'}}>
      <div style={{fontSize:40,marginBottom:10}}>📊</div>
      <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:6}}>아직 QR 통계가 없습니다</div>
      <div style={{fontSize:12,color:'var(--text-sm)',lineHeight:1.6,marginBottom:20}}>
        QR코드 스캔 시 Firestore의 <code style={{background:'var(--bg)',padding:'2px 6px',borderRadius:4}}>qr-stats</code> 컬렉션에 자동으로 기록됩니다.
      </div>
      <div style={{background:'var(--bg)',borderRadius:10,padding:'14px',textAlign:'left',fontSize:11,color:'var(--text-sm)',lineHeight:1.8}}>
        <div style={{fontWeight:800,marginBottom:4}}>📌 QR 통계 연동 방법:</div>
        1. QR코드 URL에 <code style={{background:'var(--card)',padding:'1px 4px',borderRadius:3}}>?src=banner-name</code> 추가<br/>
        2. 랜딩 페이지에서 <code style={{background:'var(--card)',padding:'1px 4px',borderRadius:3}}>src</code> 파라미터 읽기<br/>
        3. Firestore <code style={{background:'var(--card)',padding:'1px 4px',borderRadius:3}}>qr-stats/배너명</code> 문서의 count 증가<br/>
        4. 이 대시보드에서 자동 집계 확인
      </div>
    </div>
  );
  const maxCount=Math.max(...qrStats.map(q=>q.count||0),1);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {qrStats.map(q=>(
        <div key={q.id} style={{background:'var(--card)',borderRadius:10,border:'1px solid var(--border)',padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:4}}>{q.label||q.id}</div>
            <div style={{fontSize:11,color:'var(--text-sm)',marginBottom:6,wordBreak:'break-all'}}>{q.url||''}</div>
            <div style={{height:6,borderRadius:3,background:'var(--bg)',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${((q.count||0)/maxCount)*100}%`,background:'var(--blue)',borderRadius:3,transition:'width .3s'}}/>
            </div>
          </div>
          <div style={{textAlign:'center',flexShrink:0}}>
            <div style={{fontSize:22,fontWeight:900,color:'var(--blue)'}}>{q.count||0}</div>
            <div style={{fontSize:9,fontWeight:700,color:'var(--text-sm)'}}>스캔</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── 링크 클릭 통계 컴포넌트 ── */
function LinkClickStats(){
  const [linkStats,setLinkStats]=useState([]);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    db.collection('short-links').get().then(snap=>{
      const arr=[];snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
      arr.sort((a,b)=>(b.clicks||0)-(a.clicks||0));
      setLinkStats(arr);setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[]);
  if(!loaded||linkStats.length===0)return null;
  const totalClicks=linkStats.reduce((s,l)=>s+(l.clicks||0),0);
  return(
    <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'#7C3AED'}}>🔗 전송 링크 클릭 통계</div>
        <span style={{fontSize:10,color:'var(--text-sm)'}}>총 {totalClicks}회 클릭 · {linkStats.length}개 링크</span>
      </div>
      {linkStats.filter(l=>l.clicks>0).slice(0,8).map((l,i)=>(
        <div key={l.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,fontSize:12}}>
          <span style={{fontWeight:700,color:'#7C3AED',width:16,textAlign:'center'}}>{i+1}</span>
          <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600}}>{l.label||l.url?.slice(0,40)}</span>
          {l.customerName&&<span style={{fontSize:10,color:'var(--text-sm)'}}>{l.customerName}</span>}
          <span style={{fontWeight:900,color:'#7C3AED'}}>{l.clicks}회</span>
        </div>
      ))}
      {linkStats.filter(l=>l.clicks>0).length===0&&<div style={{fontSize:12,color:'var(--text-sm)',textAlign:'center',padding:10}}>아직 클릭 데이터 없음</div>}
    </div>
  );
}

/* ── SMS 발송 내역 컴포넌트 ── */
function SmsLogView({phone}){
  const [logs,setLogs]=useState(null);
  useEffect(()=>{
    const clean=phone.replace(/[^0-9]/g,'');
    db.collection('sms-logs').get().then(snap=>{
      const arr=[];snap.forEach(d=>arr.push(d.data()));
      setLogs(arr.filter(s=>(s.phone||'').replace(/[^0-9]/g,'')===clean).sort((a,b)=>(b.sentAt||'').localeCompare(a.sentAt||'')));
    }).catch(()=>setLogs([]));
  },[phone]);
  if(!logs||logs.length===0)return null;
  return(
    <div style={{marginTop:8,padding:'8px 10px',background:'var(--blue-l)',borderRadius:8,border:'1px solid var(--blue-m)'}}>
      <div style={{fontSize:10,fontWeight:700,color:'var(--blue)',marginBottom:4}}>💬 발송 문자 ({logs.length}건)</div>
      {logs.map((s,i)=>(
        <div key={i} style={{fontSize:10,color:'var(--text)',marginBottom:4,padding:'4px 6px',background:'#fff',borderRadius:6,lineHeight:1.4}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
            <span style={{fontWeight:600,color:'var(--blue)'}}>{s.sentAt?new Date(s.sentAt).toLocaleString('ko'):''}</span>
            {s.links?.length>0&&<span style={{color:'var(--text-sm)'}}>📎 {s.links.join(', ')}</span>}
          </div>
          <div style={{whiteSpace:'pre-wrap',color:'var(--text-md)'}}>{(s.text||'').slice(0,100)}{(s.text||'').length>100?'...':''}</div>
        </div>
      ))}
    </div>
  );
}

function AdminScreen({onBack}){
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('stat'); // 'stat' | 'list' | 'photos' | 'sms'
  const [casePhotos,setCasePhotos]=useState(()=>loadCasePhotos());
  const [probPhotos,setProbPhotos]=useState(()=>loadProblemPhotos());
  const [defectTags,setDefectTags]=useState(()=>loadDefectTags());
  const [tagSaving,setTagSaving]=useState(false);
  const [photoCardTab,setPhotoCardTab]=useState({}); // {[methodId]: 'defect'|'media'|'process'}
  const [search,setSearch]=useState('');
  const [filterDay,setFilterDay]=useState('전체');
  const [filterStaff,setFilterStaff]=useState('전체');
  const [filterBuilding,setFilterBuilding]=useState('전체');
  const [filterStatus,setFilterStatus]=useState('전체');
  const [expanded,setExpanded]=useState(null);
  const [smsTarget,setSmsTarget]=useState(null);
  const [keywordDetail,setKeywordDetail]=useState(null);
  const [toast,setToast]=useState(null);
  const [showPinChange,setShowPinChange]=useState(false);
  const [undoInfo,setUndoInfo]=useState(null);
  const undoTimer=React.useRef(null);
  const [showSettings,setShowSettings]=useState(false);
  const [settingsUnlocked,setSettingsUnlocked]=useState(false);
  const [settingsPin,setSettingsPin]=useState('');
  const [settingsPinError,setSettingsPinError]=useState('');
  const [adminReport,setAdminReport]=useState(null); // {leadId, status:'saving'|'done'|'error', reportId}
  const generateAdminReport=async(l)=>{
    setAdminReport({leadId:l.id,status:'saving',reportId:null});
    const reportId=(()=>{const c='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';return Array.from({length:8},()=>c[Math.floor(Math.random()*c.length)]).join('');})();
    // problems[] 레이블 → 공법 ID 매핑
    const methods=(l.problems||[]).map(label=>{
      const p=ALL_PROBLEMS.find(x=>x.label===label);
      if(!p)return null;
      const mc=getMethodContent(p.id);const ms=METHOD_STATS[p.id];
      return{id:p.id,label:p.label,cat:p.cat||'',
        cause:mc?.cause||'',process:mc?.process||[],solution:mc?.solution||'',
        cert:ms?.cert||'',stats:ms?.stats||[]};
    }).filter(Boolean);
    if(!methods.length&&l.problem){
      const p=ALL_PROBLEMS.find(x=>x.label===l.problem);
      if(p){const mc=getMethodContent(p.id);const ms=METHOD_STATS[p.id];
        methods.push({id:p.id,label:p.label,cat:p.cat||'',cause:mc?.cause||'',process:mc?.process||[],solution:mc?.solution||'',cert:ms?.cert||'',stats:ms?.stats||[]});}
    }
    const reportData={reportId,name:l.name||'',phone:l.phone||'',building:l.building||'',
      methods,staffId:l.staffId||'',staffName:l.staff||'',leadId:l.id||'',
      createdAt:new Date().toISOString()};
    try{
      await db.collection('customer-reports').doc(reportId).set(reportData);
      setAdminReport({leadId:l.id,status:'done',reportId});
    }catch(e){setAdminReport({leadId:l.id,status:'error',reportId:null});}
  };

  const openSettings=()=>{setSettingsPin('');setSettingsPinError('');setShowSettings(true);};
  const closeSettings=()=>{setShowSettings(false);setSettingsUnlocked(false);setSettingsPin('');setSettingsPinError('');};
  const verifySettingsPin=async()=>{
    const h=await hashPin(settingsPin);
    if(h===loadAdminPin()){setSettingsUnlocked(true);setSettingsPin('');setSettingsPinError('');}
    else{setSettingsPinError('비밀번호가 틀렸습니다');setSettingsPin('');}
  };
  const openSettingsTab=(k)=>{setTab(k);closeSettings();};

  const DAYS=['4/16(목)','4/17(금)','4/18(토)'];
  const STATUS_OPTIONS=['신규','연락완료','계약예정','보류','기타'];
  const STATUS_COLOR={신규:'#2563EB',연락완료:'#059669',계약예정:'#7C3AED',보류:'#9CA3AF',기타:'#D97706'};

  useEffect(()=>{
    db.collection('leads').orderBy('savedAt','desc').get()
      .then(s=>{setLeads(s.docs.map(d=>({id:d.id,...d.data()})));})
      .catch(()=>{})
      .finally(()=>setLoading(false));
    syncPhotosFromFirestore(setCasePhotos,setProbPhotos);
    syncDefectTagsFromFirestore(setDefectTags);
  },[]);

  const staffList=[...new Set(leads.map(l=>l.staff).filter(Boolean))];
  const buildingList=[...new Set(leads.map(l=>l.building).filter(Boolean))];

  // 필터 적용
  const activeLeads=leads.filter(l=>!l.deletedAt);
  const trashedLeads=leads.filter(l=>!!l.deletedAt);
  const display=activeLeads.filter(l=>{
    if(filterDay!=='전체'&&l.day!==filterDay)return false;
    if(filterStaff!=='전체'&&l.staff!==filterStaff)return false;
    if(filterBuilding!=='전체'&&l.building!==filterBuilding)return false;
    if(filterStatus!=='전체'&&(l.status||'신규')!==filterStatus)return false;
    if(search){
      const q=search.toLowerCase();
      if(!(l.name||'').toLowerCase().includes(q)&&!(l.phone||'').includes(q)&&!(l.memo||'').toLowerCase().includes(q))return false;
    }
    return true;
  });

  // 통계 계산
  const byDay=DAYS.map(d=>({day:d,count:activeLeads.filter(l=>l.day===d).length}));
  const byStaff=staffList.map(s=>({staff:s,count:activeLeads.filter(l=>l.staff===s).length})).sort((a,b)=>b.count-a.count);
  const byBuilding=buildingList.map(b=>({building:b,count:activeLeads.filter(l=>l.building===b).length})).sort((a,b)=>b.count-a.count);
  const byStatus=STATUS_OPTIONS.map(s=>({status:s,count:activeLeads.filter(l=>(l.status||'신규')===s).length}));
  const maxDay=Math.max(...byDay.map(d=>d.count),1);
  const maxStaff=Math.max(...byStaff.map(s=>s.count),1);

  // 키워드 집계
  const byPosition=(()=>{const m={};activeLeads.forEach(l=>{if(l.position&&l.position!=='-')m[l.position]=(m[l.position]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);})();
  const byProblem=(()=>{const m={};activeLeads.forEach(l=>{(l.problems||[]).forEach(p=>{if(p&&p!=='-')m[p]=(m[p]||0)+1;});if(l.problem&&l.problem!=='-'&&!(l.problems||[]).includes(l.problem))m[l.problem]=(m[l.problem]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);})();
  const byAction=(()=>{const m={};activeLeads.forEach(l=>{(l.actions||[]).forEach(a=>{if(a)m[a]=(m[a]||0)+1;});});return Object.entries(m).sort((a,b)=>b[1]-a[1]);})();
  const byRegion=(()=>{const m={};activeLeads.forEach(l=>{const r=normalizeRegionSimple(l.region||'');if(r)m[r]=(m[r]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);})();
  const byStartMonth=Array.from({length:12},(_,i)=>{const mo=i+1;return{month:mo,label:`${mo}월`,count:activeLeads.filter(l=>l.desiredStartDate&&parseInt(l.desiredStartDate.slice(5,7),10)===mo).length};});
  const maxStartMonth=Math.max(...byStartMonth.map(m=>m.count),1);

  // 상태 변경 (undo 5초)
  const changeStatus=async(id,newStatus)=>{
    const lead=leads.find(l=>l.id===id);
    if(!lead||(lead.status||'신규')===newStatus)return;
    const prevStatus=lead.status||'신규';
    try{
      await db.collection('leads').doc(id).update({status:newStatus});
      setLeads(p=>p.map(l=>l.id===id?{...l,status:newStatus}:l));
      if(undoTimer.current)clearTimeout(undoTimer.current);
      setUndoInfo({id,name:lead.name,prevStatus,newStatus});
      undoTimer.current=setTimeout(()=>{setUndoInfo(null);undoTimer.current=null;},5000);
    }catch(e){alert('변경 실패');}
  };
  const undoStatus=async()=>{
    if(!undoInfo)return;
    if(undoTimer.current){clearTimeout(undoTimer.current);undoTimer.current=null;}
    const{id,prevStatus}=undoInfo;
    setUndoInfo(null);
    try{
      await db.collection('leads').doc(id).update({status:prevStatus});
      setLeads(p=>p.map(l=>l.id===id?{...l,status:prevStatus}:l));
    }catch(e){alert('취소 실패');}
  };

  // 삭제 (soft delete)
  const deleteLead=async(id)=>{
    if(!window.confirm('이 상담 내역을 휴지통으로 이동하시겠어요?'))return;
    try{
      const deletedAt=new Date().toISOString();
      await db.collection('leads').doc(id).update({deletedAt});
      setLeads(p=>p.map(l=>l.id===id?{...l,deletedAt}:l));
      if(expanded===id)setExpanded(null);
    }catch(e){alert('삭제 실패');}
  };

  // 복원
  const restoreLead=async(id)=>{
    try{
      await db.collection('leads').doc(id).update({deletedAt:firebase.firestore.FieldValue.delete()});
      setLeads(p=>p.map(l=>l.id===id?(()=>{const{deletedAt,...rest}=l;return rest;})():l));
    }catch(e){alert('복원 실패');}
  };

  // CSV 다운로드
  const downloadCSV=()=>{
    const headers=['번호','이름','전화','이메일','담당자','날짜','건물유형','문제','액션태그','메모','상태','유입경로','저장시각'];
    const rows=display.map((l,i)=>[

      (l.memo||'').replace(/,/g,'·'),l.status||'신규',l.source||'직접',l.savedAt||''
    ]);
    const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`POUR박람회_유입_${new Date().toLocaleDateString('ko')}.csv`;
    a.click();
  };

  return(
    <div className="screen active" style={{background:'var(--bg)',display:'flex',flexDirection:'column',height:'100vh'}}>
      {/* 헤더 */}
      <div className="hdr" style={{background:'var(--navy)',flexShrink:0}}>
        <div className="hdr-brand">
          <span style={{fontSize:13,fontWeight:900,color:'#fff',letterSpacing:'-.3px'}}>POUR 관리자</span>
        </div>
        <div className="hdr-div"/>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,.5)',fontWeight:600}}>전체 {activeLeads.length}건</span>
        </div>
        <div className="hdr-r">
          <button onClick={()=>setShowPinChange(true)} style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:7,padding:'6px 12px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',marginRight:4}}>🔑 비번</button>
          <button onClick={openSettings} style={{background:'rgba(255,255,255,.18)',border:'1px solid rgba(255,255,255,.25)',borderRadius:7,padding:'6px 12px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',marginRight:4}}>⚙️ 설정</button>
          <button onClick={downloadCSV} style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:7,padding:'6px 12px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',marginRight:8}}>CSV ↓</button>
          <button className="btn-back" onClick={onBack}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
          </button>

        {[['stat','📊 통계'],['list','📋 유입'],['keyword','🔑 키워드'],['qr','🔲 QR'],['trash','🗑']].map(([k,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flexShrink:0,padding:'11px 10px',background:'none',border:'none',color:tab===k?'#fff':'rgba(255,255,255,.4)',fontSize:12,fontWeight:tab===k?800:600,cursor:'pointer',borderBottom:tab===k?'2px solid #60A5FA':'2px solid transparent',transition:'all .15s'}}>

        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:3000,display:'flex',alignItems:'flex-start',justifyContent:'center',backdropFilter:'blur(6px)',overflowY:'auto',padding:'24px 0'}}>
          <div style={{background:'var(--bg)',borderRadius:20,width:'min(640px,96vw)',boxShadow:'0 20px 60px rgba(0,0,0,.35)',overflow:'hidden',margin:'auto'}}>

                <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:20}}>
                  <button onClick={closeSettings} style={{padding:'12px 24px',borderRadius:12,border:'1.5px solid var(--border)',background:'var(--bg)',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>취소</button>

              <div style={{padding:'28px 24px'}}>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
                  {[
                    {k:'photos',icon:'📸',title:'사진 관리',sub:'공법별 하자사진 · 미디어'},
                    {k:'sms',icon:'💬',title:'문자 설정',sub:'자동발송 · 템플릿 관리'},
                    {k:'ai',icon:'🤖',title:'AI 분류 설정',sub:'Claude Vision · 자동태깅'},
                    {k:'staff',icon:'👤',title:'담당자 관리',sub:'영업직원 추가 · 편집'},
                    {k:'tags',icon:'🏷',title:'태그 관리',sub:'하자유형 · 하자위치 편집'},
                  ].map(({k,icon,title,sub})=>(
                    <button key={k} onClick={()=>openSettingsTab(k)} style={{padding:'20px 12px',borderRadius:16,border:'2px solid var(--border)',background:'var(--card)',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:8,transition:'all .15s'}}
