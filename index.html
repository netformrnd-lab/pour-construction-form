<style>
:root{
  /* 브랜드 코어 */
  --navy:#0D1B2A; --navy2:#1A2E42;
  --blue:#2563EB; --blue-l:#EFF6FF; --blue-m:#BFDBFE;
  /* 토스 스타일 액센트: 단일 포인트 컬러 */
  --accent:#2563EB;        /* 주요 액션 */
  --accent-s:#1E40AF;      /* hover/active */
  --accent-l:#EFF6FF;      /* 배경 tint */
  /* 세컨더리 */
  --gold:#D97706; --green:#059669; --green-l:#ECFDF5;
  --red:#DC2626; --orange:#EA580C;
  --purple:#6D28D9; --purple-l:#F5F3FF; --purple-m:#EDE9FE;
  /* 텍스트 — 토스 스타일: 명도 차이로 위계 */
  --text:#111827; --text-md:#4B5563; --text-sm:#9CA3AF;
  /* 배경 — 아주 밝은 회색 (토스와 동일) */
  --bg:#F9FAFB; --card:#FFFFFF; --border:#E5E7EB; --border-s:#F3F4F6;
  --r:12px; --r-sm:8px; --r-lg:18px;
  --shadow:0 1px 6px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;transform:translateX(18px);}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0);}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;padding:0 20px;height:64px;background:var(--navy);flex-shrink:0;gap:12px;}
.hdr-brand{display:flex;flex-direction:column;gap:2px;}
.hdr-company{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.04em;}
.hdr-logo{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px;}
.hdr-logo em{color:var(--gold);font-style:normal;}
.hdr-brand-logos{display:flex;gap:5px;align-items:center;margin-top:1px;}
.hdr-brand-pill{padding:1px 7px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45);letter-spacing:.02em;cursor:default;}
.hdr-div{width:1px;height:24px;background:rgba(255,255,255,.15);}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.45);}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:6px;}
/* ── 플로팅 액션 버튼 ── */
.fab-wrap{position:fixed;right:24px;bottom:32px;display:flex;flex-direction:column;gap:12px;z-index:100;}
.fab{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform .13s,box-shadow .13s;font-family:inherit;}
.fab:active{transform:scale(.91);}
.fab-new{background:#2563EB;color:#fff;box-shadow:0 4px 18px rgba(37,99,235,.5);}
.fab-memo{background:#6D28D9;color:#fff;box-shadow:0 4px 18px rgba(109,40,217,.4);}
.fab-icon{font-size:19px;line-height:1;}
.fab-label{font-size:9px;font-weight:800;letter-spacing:.02em;margin-top:1px;}
.btn-back{width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .14s;flex-shrink:0;}
.btn-back:active{background:rgba(255,255,255,.2);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px 20px 24px;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{display:none;}

/* ── HOME ── */
.home-screen{background:var(--navy);position:relative;overflow:hidden;}
.hbg{position:absolute;border-radius:50%;background:rgba(37,99,235,.12);pointer-events:none;}
.home-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:40px 40px 0;box-sizing:border-box;gap:0;}
.home-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.28);color:var(--gold);font-size:13px;font-weight:600;margin-bottom:20px;letter-spacing:.03em;}
.home-logo{font-size:72px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;margin-bottom:8px;}
.home-logo em{color:var(--gold);font-style:normal;}
.home-tagline{font-size:16px;color:rgba(255,255,255,.5);font-weight:300;margin-bottom:40px;letter-spacing:.02em;}
.home-expo-card{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:20px 36px;text-align:center;margin-bottom:40px;width:100%;max-width:480px;}
.home-expo-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;}
.home-expo-date{font-size:13px;color:rgba(255,255,255,.45);}
.btn-start{display:flex;align-items:center;justify-content:center;gap:12px;padding:22px 60px;border-radius:var(--r);border:none;background:var(--blue);color:#fff;font-size:20px;font-weight:800;box-shadow:0 4px 20px rgba(37,99,235,.45);letter-spacing:-.2px;transition:all .18s;margin-bottom:14px;}
.btn-start:active{transform:scale(.97);background:#1347C0;}
.home-leads-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px 28px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.65);font-size:15px;font-weight:600;width:100%;max-width:480px;}
.home-leads-btn:active{background:rgba(255,255,255,.08);}
.staff-badge-home{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;cursor:pointer;position:absolute;top:16px;right:20px;z-index:10;}
.sba{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.sbn{font-size:12px;font-weight:700;color:#fff;}
.home-stat{display:flex;gap:10px;margin-top:16px;}
.hstat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 20px;text-align:center;}
.hstat-n{font-size:20px;font-weight:800;color:#fff;}
.hstat-l{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}

/* ── PAGE TITLES ── */
.page-h{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.5px;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text-md);margin-bottom:16px;line-height:1.55;}
.breadcrumb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-sm);margin-bottom:12px;flex-wrap:wrap;}
.bc-sep{color:var(--border);}
.breadcrumb span:last-child{color:var(--text);font-weight:600;}

/* ── BUILDING GRID ── */
.building-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.building-card{background:var(--card);border-radius:var(--r);padding:18px 16px;border:2px solid var(--border);cursor:pointer;transition:all .17s;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.building-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--blue);transform:scaleX(0);transition:transform .17s;transform-origin:left;}
.building-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.building-card:hover::before{transform:scaleX(1);}
.building-card:active{transform:scale(.98);}
.bc-arrow{position:absolute;top:18px;right:18px;width:28px;height:28px;border-radius:50%;background:var(--blue-l);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:14px;transition:all .17s;}
.building-card:hover .bc-arrow{background:var(--blue);color:#fff;}
.bc-icon{font-size:34px;margin-bottom:2px;}
.bc-name{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.4px;}
.bc-sub{font-size:12px;color:var(--text-md);}
.bc-targets{margin-top:6px;padding-top:10px;border-top:1px solid var(--border);font-size:13px;color:var(--text-md);line-height:1.6;font-weight:500;}

/* ── PROBLEM TABS & GRID ── */
.tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--text-md);transition:all .14s;}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.tab:active{transform:scale(.97);}
.problems-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.problem-card{background:var(--card);border-radius:var(--r);border:2px solid var(--border);cursor:pointer;transition:all .14s;overflow:hidden;box-shadow:var(--shadow);}
.problem-card:hover{border-color:var(--blue);transform:translateY(-2px);}
.problem-card:active{transform:scale(.97);}
.prob-img{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--blue-l),var(--blue-m));display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;}
.prob-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.prob-cat-badge{position:absolute;top:7px;left:7px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.03em;}
.cat-방수{background:#DBEAFE;color:#1D4ED8;}
.cat-도장{background:#FEF9C3;color:#92400E;}
.cat-보수보강{background:#D1FAE5;color:#065F46;}
.cat-토목{background:#FFE4E6;color:#9F1239;}
.prob-name{padding:10px 12px;font-size:13px;font-weight:600;color:var(--text);line-height:1.4;}

/* ── 칩형 문제 리스트 (스크롤 없는 그리드) ── */
.prob-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-bottom:4px;}
.prob-chip{display:flex;flex-direction:column;background:var(--card);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .13s;text-align:left;font-family:inherit;overflow:hidden;}
.prob-chip:active{transform:scale(.97);}
.prob-chip:hover{border-color:var(--blue);}
.prob-chip-thumb{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--blue-l),var(--blue-m));display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;flex-shrink:0;}
.prob-chip-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.prob-chip-body{padding:8px 10px 10px;}
.prob-chip-text{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.prob-chip-cat{font-size:10px;font-weight:600;color:var(--text-sm);margin-top:2px;}

/* ── 원인 가로 슬라이더 ── */
.cause-slider{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.cause-slider::-webkit-scrollbar{display:none;}
.cause-slide{flex:0 0 72%;scroll-snap-align:start;background:var(--card);border-radius:var(--r);overflow:hidden;border:1.5px solid var(--border);box-shadow:var(--shadow);min-width:0;}
.cause-slide-head{display:flex;align-items:center;gap:8px;padding:9px 14px 8px;}
.cause-slide-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cause-slide-kw{font-size:15px;font-weight:900;color:var(--text);letter-spacing:-.3px;}
.cause-slide-photo{width:100%;aspect-ratio:16/6;background:linear-gradient(135deg,#e8edf2,#d4dce6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;position:relative;overflow:hidden;}
.cause-slide-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cause-slide-desc{padding:8px 14px 10px;font-size:12px;color:var(--text-md);line-height:1.5;}
.slider-dots{display:flex;justify-content:center;gap:6px;margin-top:8px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s;}
.sdot.on{background:var(--blue);width:18px;border-radius:3px;}

/* ── 장점 2×2 그리드 ── */
.benefit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.benefit-grid-item{display:flex;align-items:flex-start;gap:8px;padding:11px 12px;background:var(--card);border-radius:10px;border:1px solid var(--border);}
.bgi-check{width:20px;height:20px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.bgi-check span{font-size:10px;color:var(--green);font-weight:800;}
.bgi-text{font-size:12px;color:var(--text);line-height:1.5;font-weight:500;}

/* ── SOLUTION ── */
.sol-header{background:var(--navy);padding:11px 20px;flex-shrink:0;}
.sol-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.sol-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-sm);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.cause-card{background:var(--blue-l);border-radius:var(--r);padding:18px 20px;border-left:4px solid var(--blue);margin-bottom:22px;}
.cause-text{font-size:14px;line-height:1.9;color:var(--text);}
.method-card{background:var(--card);border-radius:var(--r);border:2px solid var(--blue);padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow);}
.method-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:700;margin-bottom:7px;}
.method-name{font-size:17px;font-weight:800;color:var(--text);margin-bottom:5px;letter-spacing:-.3px;}
.method-feature{font-size:13px;color:var(--text-md);line-height:1.65;margin-bottom:12px;}
.method-actions{display:flex;gap:7px;flex-wrap:wrap;}

/* QR 전달 카드 */
.qr-transfer-section{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow);}
.qr-transfer-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.qr-btns-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qr-btn-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .14s;font-family:inherit;}
.qr-btn-item:active{transform:scale(.97);}
.qr-btn-item:hover{border-color:var(--blue);background:var(--blue-l);}
.qbi-icon{font-size:22px;}
.qbi-label{font-size:11px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;}
.qbi-sub{font-size:10px;color:var(--text-sm);text-align:center;}

/* case card */
.case-card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;text-decoration:none;transition:all .14s;box-shadow:var(--shadow);margin-bottom:8px;}
.case-card:hover{border-color:var(--blue);transform:translateX(2px);}
.cc-text{flex:1;}
.cc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.cc-sub{font-size:11px;color:var(--text-sm);}
.cc-arr{color:var(--blue);font-size:17px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .14s;text-decoration:none;white-space:nowrap;font-family:inherit;}
.btn:active{transform:scale(.97);}
.btn-blue{background:var(--accent);color:#fff;}
.btn-blue:active{background:var(--accent-s);}
.btn-outline-blue{background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue-m);}
.btn-outline{background:var(--card);color:var(--text-md);border:1.5px solid var(--border);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-lg{padding:14px 24px;font-size:15px;border-radius:var(--r);}
.btn-full{width:100%;}
.btn-sm{padding:7px 13px;font-size:12px;}

/* ── BOTTOM BAR ── */
.bottom-bar{padding:14px 20px;padding-bottom:max(14px,env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.06);}

/* ── QR MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(8,14,30,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px;backdrop-filter:blur(8px);}
.qr-modal-title{font-size:20px;font-weight:800;color:#fff;text-align:center;max-width:280px;line-height:1.35;}
.qr-modal-sub{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-top:-10px;}
.qr-modal-box{background:#fff;padding:22px;border-radius:20px;box-shadow:0 0 60px rgba(37,99,235,.3);}
.qr-modal-url{font-size:11px;color:rgba(255,255,255,.35);text-align:center;max-width:300px;word-break:break-all;margin-top:-8px;}

/* ── MODAL SHEET ── */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:stretch;justify-content:flex-end;backdrop-filter:blur(4px);}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:20px 20px 44px;width:100%;max-height:88vh;overflow-y:auto;}
.sheet::-webkit-scrollbar{display:none;}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
.sheet-h{font-size:17px;font-weight:800;margin-bottom:4px;}
.sheet-sub{font-size:13px;color:var(--text-md);margin-bottom:18px;}

/* ── CS MEMO ── */
.memo-screen{background:var(--bg);}
.memo-scroll{flex:1;overflow-y:auto;padding:20px 20px 90px;}
.memo-scroll::-webkit-scrollbar{display:none;}

/* ── helpers ── */
const loadStaffList=()=>{try{return JSON.parse(localStorage.getItem('pourStaffList')||'[]');}catch{return[];}};
const saveStaffList=l=>localStorage.setItem('pourStaffList',JSON.stringify(l));
const getAvatar=n=>n?n.charAt(0).toUpperCase():'?';
const getColor=id=>STAFF_COLORS[(id||'').length%STAFF_COLORS.length];

/* ── QR Modal ── */
function QRModal({url,title,onClose}){
  const ref=useRef();
  useEffect(()=>{
    if(ref.current&&url){ref.current.innerHTML='';new QRCode(ref.current,{text:url,width:240,height:240,colorDark:'#0B1D3A',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});}
  },[url]);
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="qr-modal-title">📱 폰으로 스캔하세요</div>
      <div className="qr-modal-sub">{title}</div>
      <div className="qr-modal-box" onClick={e=>e.stopPropagation()}>
        <div ref={ref}/>
      </div>
      <div className="qr-modal-url">{url}</div>
      <button className="btn btn-outline-blue" onClick={onClose} style={{marginTop:4}}>✕ 닫기</button>
    </div>
  );
}

/* ── Staff Manager Modal ── */
function StaffModal({mode,currentStaffId,staffDay,onSelect,onClose}){
  const [list,setList]=useState(loadStaffList);
  const [day,setDay]=useState(staffDay||'4/16(목)');
  const [selId,setSelId]=useState(currentStaffId||'');
  const [addMode,setAddMode]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const [inputName,setInputName]=useState('');

  const handleSaveStaff=()=>{
    if(!inputName.trim())return;
    if(editTarget){
      const next=loadStaffList().map(s=>s.id===editTarget.id?{...s,name:inputName.trim()}:s);
      saveStaffList(next);setList(next);
    }else{
      const ns={id:'s'+Date.now(),name:inputName.trim()};
      const next=[...loadStaffList(),ns];
      saveStaffList(next);setList(next);setSelId(ns.id);
    }
    setAddMode(false);setEditTarget(null);setInputName('');
  };
  const handleDelete=id=>{
    if(!confirm('삭제하시겠어요?'))return;
    const next=loadStaffList().filter(s=>s.id!==id);
    saveStaffList(next);setList(next);
    if(selId===id)setSelId('');
  };
  const handleEdit=s=>{setEditTarget(s);setInputName(s.name);setAddMode(true);};
  const handleConfirm=()=>{
    if(!selId){alert('담당자를 선택해주세요');return;}
    const s=list.find(x=>x.id===selId);if(!s)return;
    localStorage.setItem('pourStaffId',selId);
    localStorage.setItem('pourStaffName',s.name);
    localStorage.setItem('pourDay',day);
    onSelect(s,day);
  };

  return(
    <div className="sheet-bg" onClick={mode==='switch'?onClose:undefined}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-h">{mode==='setup'?'담당자 설정':'담당자 변경'}</div>
        <div className="sheet-sub">{mode==='setup'?'상담을 시작할 담당자를 선택하고 날짜를 확인해주세요':'다른 담당자로 전환하거나 날짜를 변경하세요'}</div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-sm)',marginBottom:8,letterSpacing:'.05em'}}>오늘 날짜</div>
        <div className="day-row">
          {DAYS.map(d=><button key={d} className={`day-chip ${day===d?'on':''}`} onClick={()=>setDay(d)}>{d}</button>)}
        </div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text-sm)',marginBottom:8,letterSpacing:'.05em'}}>담당자 선택</div>
        <div className="staff-list">
          {list.length===0&&!addMode&&<div style={{padding:'12px',textAlign:'center',color:'var(--text-sm)',fontSize:13}}>등록된 담당자가 없어요</div>}
          {list.map(s=>(
            <div key={s.id} className={`staff-row ${selId===s.id?'sel':''}`} onClick={()=>setSelId(s.id)}>
              <div className="sr-avatar" style={{background:getColor(s.id)}}>{getAvatar(s.name)}</div>
              <span className={`sr-name ${selId===s.id?'sel':''}`}>{s.name}</span>
              <div className="sr-btns" onClick={e=>e.stopPropagation()}>
                <button className="sr-btn" onClick={()=>handleEdit(s)}>✏️</button>
                <button className="sr-btn del" onClick={()=>handleDelete(s.id)}>🗑</button>
              </div>
            </div>
          ))}
        </div>
        {addMode?(
          <div style={{background:'var(--bg)',borderRadius:12,padding:13,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>{editTarget?'이름 수정':'새 담당자 추가'}</div>
            <input className="sheet-input" placeholder="담당자 이름" value={inputName} onChange={e=>setInputName(e.target.value)} autoFocus/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setAddMode(false);setEditTarget(null);setInputName('');}} style={{flex:1,padding:'10px',borderRadius:9,border:'1.5px solid var(--border)',background:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:'var(--text-md)'}}>취소</button>
              <button onClick={handleSaveStaff} style={{flex:2,padding:'10px',borderRadius:9,border:'none',background:'var(--navy)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>{editTarget?'수정':'추가'}</button>
            </div>
          </div>
        ):(
          <button className="add-staff-btn" onClick={()=>{setAddMode(true);setEditTarget(null);setInputName('');}}>＋ 새 담당자 추가</button>
        )}
        <button className="sheet-confirm-btn" onClick={handleConfirm}>{mode==='setup'?'시작하기 →':'확인'}</button>
        {mode==='switch'&&<div className="sheet-cancel" onClick={onClose}>취소</div>}
      </div>
    </div>
  );
}

        <div className="hdr-div"/>
        <div className="hdr-sub">CS 메모</div>
        <div className="hdr-r"><button className="btn-back" onClick={onBack}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>
      </div>
      <div className="memo-scroll">

        {/* 담당자 확인 */}
        <div className="msec">
          <div className="msec-title purple">담당자 확인</div>
          <div className="staff-confirm">
            <div className="sc-left">
              <div className="sc-avatar" style={{background:getColor(memoStaffId)}}>{getAvatar(memoStaffName)}</div>
              <div><div className="sc-name">{memoStaffName||'미선택'}</div><div className="sc-day">{memoDay}</div></div>
            </div>
            <button className="sc-change" onClick={()=>setShowStaffPicker(true)}>변경</button>
          </div>
        </div>

        {/* 컨텍스트 */}
        <div className="msec">
          <div className="msec-title">상담 컨텍스트</div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {building&&<span className="ctx-pill">{building.icon} {building.label}</span>}
            {problem&&<span className="ctx-pill blue">[{problem.cat}] {problem.label}</span>}
          </div>
        </div>

        {/* 주요 문제 (편집 가능) */}
        <div className="msec">
          <div className="msec-title">주요 문제 <span style={{fontWeight:400,color:'var(--border)',fontSize:11,letterSpacing:0,textTransform:'none'}}>(복수 선택)</span></div>
          <div className="chip-wrap">
            {ALL_PROBLEMS.map(p=>(
              <button key={p.id} className={`chip ${csProbs.includes(p.label)?'on':''}`} onClick={()=>toggle(csProbs,setCsProbs,p.label)}>{p.label}</button>
            ))}
          </div>
        </div>

        {/* 고객 정보 */}
        <div className="msec">
          <div className="msec-title">고객 정보 <span style={{color:'var(--blue)',fontWeight:700,fontSize:11,letterSpacing:0,textTransform:'none'}}>* 전화 또는 이메일 필수</span></div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            <input className="minput" placeholder="성함 *" value={csName} onChange={e=>setCsName(e.target.value)}/>
            <input className="minput" placeholder="전화번호" value={csPhone} onChange={e=>setCsPhone(e.target.value)} inputMode="tel"/>
            <input className="minput" placeholder="이메일 (선택)" value={csEmail} onChange={e=>setCsEmail(e.target.value)} inputMode="email"/>
          </div>
        </div>

        <div className="msec">
          <div className="msec-title">선호 연락 방법</div>
          <div className="chip-wrap">
            {['문자','전화','이메일','카카오톡'].map(m=>(

          <div className="msec-title purple">영업사원 메모 <span style={{fontWeight:400,fontSize:11,color:'#A78BFA',textTransform:'none',letterSpacing:0}}>(상담 후 추가 가능)</span></div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:14}}>
            {ACTION_TAGS.map(t=>(
              <button key={t.id} className={`atag ${csActions.includes(t.id)?'on':''}`} onClick={()=>toggle(csActions,setCsActions,t.id)}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
          <div style={{fontSize:12,fontWeight:700,color:'var(--purple)',marginBottom:7}}>현장 메모</div>
          <textarea className="minput" style={{borderColor:'var(--purple-m)'}} rows={3} placeholder="고객 반응, 특이사항, 후속 참고사항..." value={csMemo} onChange={e=>setCsMemo(e.target.value)}/>
        </div>
      </div>
      <div className="bottom-bar">
        <button className="btn btn-outline btn-lg" style={{flex:1}} onClick={onBack}>취소</button>
        <button className="btn btn-blue btn-lg" style={{flex:2}} onClick={save} disabled={saving}>{saving?'저장 중...':'저장하기'}</button>
      </div>
    </div>
  );
}

/* ── Contact Form ── */
function ContactForm({building,problem,done,onSubmit,onBack,onLog,onNewCustomer}){
  const [name,setName]=useState('');
  const [phone,setPhone]=useState('');
  const [request,setRequest]=useState('');
  const [loading,setLoading]=useState(false);

  if(done) return(

/* ── Solution Screen ── */
function SolutionScreen({building,problem,staffId,staffName,staffDay,onBack,onNewCustomer,visible,externalNote,onExternalNote}){
  /* ── 모든 useState 최상단 선언 (React 훅 규칙) ── */
  const [qr,setQr]=useState(null);
  const [subScreen,setSubScreen]=useState('main');
  const [contactDone,setContactDone]=useState(false);
  const [memo,setMemo]=useState('');
  const [savedCSData,setSavedCSData]=useState(null);
  const [showNote,setShowNote]=useState(false);
  const [ntName,setNtName]=useState('');
  const [ntCompany,setNtCompany]=useState('');
  const [ntPosition,setNtPosition]=useState('');
  const [ntPhone,setNtPhone]=useState('');
  const [ntEmail,setNtEmail]=useState('');
  const [ntContact,setNtContact]=useState([]);
  const [ntInterests,setNtInterests]=useState([]);
  const [ntDeliveryDocs,setNtDeliveryDocs]=useState([]);
  const [ntDeliveryMedia,setNtDeliveryMedia]=useState([]);
  const [ntMemo,setNtMemo]=useState('');
  const [ntSaving,setNtSaving]=useState(false);
  const [ntDone,setNtDone]=useState(false);
  const [ntPencilMode,setNtPencilMode]=useState(false);
  const [ntOpenSec,setNtOpenSec]=useState(new Set([]));

  const ntToggleSec=sec=>setNtOpenSec(p=>{const n=new Set(p);n.has(sec)?n.delete(sec):n.add(sec);return n;});

  const sol=problem?SOLUTIONS[problem.id]:null;
  if(externalNote&&!showNote){setShowNote(true);if(onExternalNote)onExternalNote(false);}
  if(!sol||!building||!problem) return null;

  const guide=sol.guideId?GUIDES.find(g=>g.id===sol.guideId):null;
  const photos=sol.photosKey?CASE_PHOTOS[sol.photosKey]:null;
  const today=new Date();
  const dateStr=`2026년 4월 ${today.getDate()<=18?today.getDate():'__'}일`;

  const toggleNt=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);

  const saveNote=async()=>{
    if(!ntName.trim()||!ntPhone.trim()){alert('성함과 전화번호를 입력해주세요');return;}
    setNtSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:staffDay,staffId,staff:staffName,
      name:ntName,company:ntCompany,position:ntPosition,
      phone:ntPhone,email:ntEmail,contactMethod:ntContact,
      building:building?.label||'-',buildingId:building?.id||'-',
      problem:problem?.label||'-',problemCat:problem?.cat||'-',
      problems:[problem?.label].filter(Boolean),
      method:sol?.methods?.[0]?.name||'-',
      interests:ntInterests,
      deliveryDocs:ntDeliveryDocs,
      deliveryMedia:ntDeliveryMedia,
      memo:ntMemo,status:'신규',
    };
    try{await db.collection('leads').add(data);}catch(e){console.warn(e);}

                {/* ── 헤더 ── */}
                <div className="note-sheet-head" style={{borderBottom:'1px solid var(--border)',paddingBottom:10}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontSize:16,fontWeight:900,color:'var(--text)'}}>📝 영업 메모</span>
                      <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 10px',background:'var(--purple-l)',borderRadius:20}}>
                        <div style={{width:20,height:20,borderRadius:'50%',background:getColor(staffId),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff'}}>{getAvatar(staffName)}</div>
                        <span style={{fontSize:12,fontWeight:700,color:'var(--purple)'}}>{staffName}</span>
                        <span style={{fontSize:11,color:'var(--text-sm)'}}>· {staffDay}</span>
                      </div>
                    </div>
                    <button onClick={()=>setShowNote(false)} style={{width:32,height:32,borderRadius:'50%',border:'none',background:'var(--bg)',color:'var(--text-md)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                  </div>
                  <div className="note-ctx" style={{marginTop:8,marginBottom:0}}>
                    <div className="note-ctx-row">
                      {building?<span className="note-ctx-tag">{building?.label}</span>:<span className="note-ctx-tag" style={{opacity:.5}}>건물 미선택</span>}
                      {problem?.cat&&<span className="note-ctx-tag">{problem.cat}</span>}
                      {problem?.label&&<span className="note-ctx-tag">{problem.label}</span>}
                    </div>
                    {sol?.methods?.[0]?.name&&<div className="note-ctx-method">→ {sol.methods[0].name}</div>}
                  </div>
                </div>

                {/* ── 2분할 본문 ── */}
                <div style={{flex:1,display:'flex',overflow:'hidden'}}>

                  {/* 왼쪽: 고객정보 + 메모 */}
                  <div style={{flex:'0 0 58%',display:'flex',flexDirection:'column',borderRight:'1px solid var(--border)',overflow:'hidden'}}>
                    {/* 고객 정보 */}
                    <div style={{padding:'12px 14px 8px',flexShrink:0}}>
                      <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>고객 정보</div>
                      <input className="note-input" style={{marginBottom:6,fontSize:13}} placeholder="건물명 또는 업체명" value={ntCompany} onChange={e=>setNtCompany(e.target.value)}/>
                      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 2fr',gap:5}}>
                        <input className="note-input" style={{fontSize:13}} placeholder="성함 *" value={ntName} onChange={e=>setNtName(e.target.value)}/>
                        <input className="note-input" style={{fontSize:13}} placeholder="직급" value={ntPosition} onChange={e=>setNtPosition(e.target.value)}/>
                        <input className="note-input" style={{fontSize:13}} placeholder="연락처 *" value={ntPhone} onChange={e=>setNtPhone(e.target.value)} inputMode="tel"/>
                      </div>
                    </div>

                    {/* 입력 모드 토글 */}
                    <div style={{padding:'0 14px 8px',flexShrink:0}}>
                      <div className="mode-toggle">
                        <button className={`mode-btn ${!ntPencilMode?'on':''}`} onClick={()=>setNtPencilMode(false)}>⌨️ 키보드 입력</button>
                        <button className={`mode-btn ${ntPencilMode?'on':''}`} onClick={()=>setNtPencilMode(true)}>✏️ 펜슬 필기</button>
                      </div>
                      {ntPencilMode&&<div style={{fontSize:11,color:'var(--text-sm)',textAlign:'center',marginTop:5,fontWeight:600}}>Apple Pencil로 바로 필기하세요 · Scribble 지원</div>}
                    </div>

                    {/* 메모 영역 (매우 크게) */}
                    <div style={{flex:1,padding:'0 14px 12px',display:'flex',flexDirection:'column',minHeight:500}}>
                      <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>상담 메모</div>
                      <textarea
                        className={`note-memo ${ntPencilMode?'memo-pencil':''}`}
                        style={{flex:1,resize:'none',minHeight:500,
                          fontSize:ntPencilMode?17:15,
                          lineHeight:ntPencilMode?'2.6em':'1.85',
                        }}
                        inputMode={ntPencilMode?'none':undefined}
                        autoCorrect={ntPencilMode?'off':'on'}
                        autoCapitalize={ntPencilMode?'off':'sentences'}
                        spellCheck={!ntPencilMode}
                        placeholder={ntPencilMode?'Apple Pencil로 필기하세요 ✏️':'고객 반응, 특이사항, 요청사항...'}
                        value={ntMemo} onChange={e=>setNtMemo(e.target.value)}
                      />
                    </div>
                  </div>

                  {/* 오른쪽: 아코디언 옵션들 */}
                  <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>

                    {/* 관심 공사 종류 */}
                    <div className="acc-row">
                      <button className="acc-head" onClick={()=>ntToggleSec('interests')}>
                        <div className="acc-head-left">
                          <span className="acc-head-title">🏗 관심 공사 종류</span>
                          {ntInterests.length>0&&<span className="acc-badge">{ntInterests.length}</span>}
                        </div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:ntOpenSec.has('interests')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                      </button>
                      {ntOpenSec.has('interests')&&(
                        <div className="acc-body">
                          {INTEREST_CATS.map(({cat,items})=>(
                            <div key={cat} style={{marginBottom:10}}>
                              <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:5,textTransform:'uppercase',letterSpacing:'.05em'}}>{cat}</div>
                              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                                {items.map(item=>(
                                  <button key={item} onClick={()=>toggleNt(ntInterests,setNtInterests,item)}
                                    style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${ntInterests.includes(item)?'var(--navy)':'var(--border)'}`,background:ntInterests.includes(item)?'var(--navy)':'#fff',color:ntInterests.includes(item)?'#fff':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                                    {item}
                                  </button>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>

                    {/* 연락 방법 */}
                    <div className="acc-row">
                      <button className="acc-head" onClick={()=>ntToggleSec('contact')}>
                        <div className="acc-head-left">
                          <span className="acc-head-title">📞 연락 방법</span>
                          {ntContact.length>0&&<span className="acc-badge">{ntContact.join('·')}</span>}
                        </div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:ntOpenSec.has('contact')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                      </button>
                      {ntOpenSec.has('contact')&&(
                        <div className="acc-body">
                          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                            {['문자','전화','이메일','카카오톡'].map(m=>(
                              <button key={m} className={`note-chip ${ntContact.includes(m)?'on':''}`} style={{fontSize:13,padding:'7px 14px'}} onClick={()=>toggleNt(ntContact,setNtContact,m)}>{m}</button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                    {/* 후속 조치 */}
                    <div className="acc-row">
                      <button className="acc-head" onClick={()=>ntToggleSec('delivery')}>
                        <div className="acc-head-left">
                          <span className="acc-head-title">📬 후속 조치</span>
                          {(ntDeliveryDocs.length+ntDeliveryMedia.length)>0&&<span className="acc-badge">{ntDeliveryDocs.length+ntDeliveryMedia.length}건</span>}
                        </div>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:ntOpenSec.has('delivery')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                      </button>
                      {ntOpenSec.has('delivery')&&(
                        <div className="acc-body">
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>전달할 자료</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
                            {DELIVERY_DOCS.map(d=>(
                              <button key={d} onClick={()=>toggleNt(ntDeliveryDocs,setNtDeliveryDocs,d)}
                                style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${ntDeliveryDocs.includes(d)?'var(--accent)':'var(--border)'}`,background:ntDeliveryDocs.includes(d)?'var(--accent-l)':'#fff',color:ntDeliveryDocs.includes(d)?'var(--accent)':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                                {d}
                              </button>
                            ))}
                          </div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>전달 매체</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                            {DELIVERY_MEDIA.map(m=>(
                              <button key={m} onClick={()=>toggleNt(ntDeliveryMedia,setNtDeliveryMedia,m)}
                                style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${ntDeliveryMedia.includes(m)?'#059669':'var(--border)'}`,background:ntDeliveryMedia.includes(m)?'#D1FAE5':'#fff',color:ntDeliveryMedia.includes(m)?'#065F46':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                                {m}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                    {/* 여백 */}
                    <div style={{flex:1}}/>
                  </div>

                </div>{/* 2분할 끝 */}

                {/* ── 저장 버튼 ── */}
                <div className="note-sheet-foot">
                  <button className="note-save-btn" onClick={saveNote} disabled={ntSaving}>
                    {ntSaving?'저장 중...':'저장하기'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}


    </div>
  );
}

/* ── Global Note Sheet (솔루션 외 화면) ── */
function GlobalNoteSheet({building,problem,staffId,staffName,staffDay,onClose}){
  const [name,setName]=useState('');
  const [company,setCompany]=useState('');
  const [position,setPosition]=useState('');
  const [phone,setPhone]=useState('');
  const [contact,setContact]=useState([]);
  const [interests,setInterests]=useState([]);
  const [deliveryDocs,setDeliveryDocs]=useState([]);
  const [deliveryMedia,setDeliveryMedia]=useState([]);
  const [memo,setMemo]=useState('');
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const [pencilMode,setPencilMode]=useState(false);
  const [openSec,setOpenSec]=useState(new Set([]));
  const toggle=(arr,set,v)=>set(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const toggleSec=sec=>setOpenSec(p=>{const n=new Set(p);n.has(sec)?n.delete(sec):n.add(sec);return n;});

  const save=async()=>{
    if(!name.trim()||!phone.trim()){alert('성함과 전화번호를 입력해주세요');return;}
    setSaving(true);
    const data={
      savedAt:new Date().toISOString(),day:staffDay,staffId,staff:staffName,
      name,company,position,phone,contactMethod:contact,
      building:building?.label||'-',buildingId:building?.id||'-',
      problem:problem?.label||'-',problemCat:problem?.cat||'-',
      problems:problem?[problem.label]:[],
      interests,deliveryDocs,deliveryMedia,
      memo,status:'신규',
    };
    try{await db.collection('leads').add(data);}catch(e){console.warn(e);}
    setSaving(false);setDone(true);
    setTimeout(()=>onClose(),1400);
  };

  return(
    <div className="sheet-bg" onClick={onClose}>
      <div className="note-sheet" onClick={e=>e.stopPropagation()}>
        {done?(
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 20px'}}>
            <div style={{fontSize:44,marginBottom:10}}>✅</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--text)'}}>영업 메모 저장됐어요!</div>
          </div>
        ):(
          <>
            {/* ── 헤더 ── */}
            <div className="note-sheet-head" style={{borderBottom:'1px solid var(--border)',paddingBottom:10}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:16,fontWeight:900,color:'var(--text)'}}>📝 영업 메모</span>
                  <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 10px',background:'var(--purple-l)',borderRadius:20}}>
                    <div style={{width:20,height:20,borderRadius:'50%',background:getColor(staffId),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff'}}>{getAvatar(staffName)}</div>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--purple)'}}>{staffName}</span>
                    <span style={{fontSize:11,color:'var(--text-sm)'}}>· {staffDay}</span>
                  </div>
                </div>
                <button onClick={onClose} style={{width:32,height:32,borderRadius:'50%',border:'none',background:'var(--bg)',color:'var(--text-md)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
              </div>
              <div className="note-ctx" style={{marginTop:8,marginBottom:0}}>
                <div className="note-ctx-row">
                  {building?<span className="note-ctx-tag">{building.label}</span>:<span className="note-ctx-tag" style={{opacity:.5}}>건물 미선택</span>}
                  {problem?.label&&<span className="note-ctx-tag">{problem.label}</span>}
                </div>
              </div>
            </div>

            {/* ── 2분할 본문 ── */}
            <div style={{flex:1,display:'flex',overflow:'hidden'}}>

              {/* 왼쪽: 고객정보 + 메모 */}
              <div style={{flex:'0 0 58%',display:'flex',flexDirection:'column',borderRight:'1px solid var(--border)',overflow:'hidden'}}>
                <div style={{padding:'12px 14px 8px',flexShrink:0}}>
                  <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>고객 정보</div>
                  <input className="note-input" style={{marginBottom:6,fontSize:13}} placeholder="건물명 또는 업체명" value={company} onChange={e=>setCompany(e.target.value)}/>
                  <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 2fr',gap:5}}>
                    <input className="note-input" style={{fontSize:13}} placeholder="성함 *" value={name} onChange={e=>setName(e.target.value)}/>
                    <input className="note-input" style={{fontSize:13}} placeholder="직급" value={position} onChange={e=>setPosition(e.target.value)}/>
                    <input className="note-input" style={{fontSize:13}} placeholder="연락처 *" value={phone} onChange={e=>setPhone(e.target.value)} inputMode="tel"/>
                  </div>
                </div>

                {/* 모드 토글 */}
                <div style={{padding:'0 14px 8px',flexShrink:0}}>
                  <div className="mode-toggle">
                    <button className={`mode-btn ${!pencilMode?'on':''}`} onClick={()=>setPencilMode(false)}>⌨️ 키보드 입력</button>
                    <button className={`mode-btn ${pencilMode?'on':''}`} onClick={()=>setPencilMode(true)}>✏️ 펜슬 필기</button>
                  </div>
                  {pencilMode&&<div style={{fontSize:11,color:'var(--text-sm)',textAlign:'center',marginTop:5,fontWeight:600}}>Apple Pencil로 바로 필기하세요 · Scribble 지원</div>}
                </div>

                {/* 메모 영역 */}
                <div style={{flex:1,padding:'0 14px 12px',display:'flex',flexDirection:'column',minHeight:0}}>
                  <div style={{fontSize:10,fontWeight:800,color:'var(--text-sm)',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>상담 메모</div>
                  <textarea
                    className={`note-memo ${pencilMode?'memo-pencil':''}`}
                    style={{flex:1,resize:'none',minHeight:0,
                      fontSize:pencilMode?17:14,
                      lineHeight:pencilMode?'2.6em':'1.75',
                    }}
                    inputMode={pencilMode?'none':undefined}
                    autoCorrect={pencilMode?'off':'on'}
                    autoCapitalize={pencilMode?'off':'sentences'}
                    spellCheck={!pencilMode}
                    placeholder={pencilMode?'Apple Pencil로 필기하세요 ✏️':'고객 반응, 특이사항, 요청사항...'}
                    value={memo} onChange={e=>setMemo(e.target.value)}
                  />
                </div>
              </div>

              {/* 오른쪽: 아코디언 */}
              <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>

                {/* 관심 공사 종류 */}
                <div className="acc-row">
                  <button className="acc-head" onClick={()=>toggleSec('interests')}>
                    <div className="acc-head-left">
                      <span className="acc-head-title">🏗 관심 공사 종류</span>
                      {interests.length>0&&<span className="acc-badge">{interests.length}</span>}
                    </div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:openSec.has('interests')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                  </button>
                  {openSec.has('interests')&&(
                    <div className="acc-body">
                      {INTEREST_CATS.map(({cat,items})=>(
                        <div key={cat} style={{marginBottom:10}}>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:5,textTransform:'uppercase',letterSpacing:'.05em'}}>{cat}</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                            {items.map(item=>(
                              <button key={item} onClick={()=>toggle(interests,setInterests,item)}
                                style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${interests.includes(item)?'var(--navy)':'var(--border)'}`,background:interests.includes(item)?'var(--navy)':'#fff',color:interests.includes(item)?'#fff':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                                {item}
                              </button>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* 연락 방법 */}
                <div className="acc-row">
                  <button className="acc-head" onClick={()=>toggleSec('contact')}>
                    <div className="acc-head-left">
                      <span className="acc-head-title">📞 연락 방법</span>
                      {contact.length>0&&<span className="acc-badge">{contact.join('·')}</span>}
                    </div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:openSec.has('contact')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                  </button>
                  {openSec.has('contact')&&(
                    <div className="acc-body">
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {['문자','전화','이메일','카카오톡'].map(m=>(
                          <button key={m} className={`note-chip ${contact.includes(m)?'on':''}`} style={{fontSize:13,padding:'7px 14px'}} onClick={()=>toggle(contact,setContact,m)}>{m}</button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                {/* 후속 조치 */}
                <div className="acc-row">
                  <button className="acc-head" onClick={()=>toggleSec('delivery')}>
                    <div className="acc-head-left">
                      <span className="acc-head-title">📬 후속 조치</span>
                      {(deliveryDocs.length+deliveryMedia.length)>0&&<span className="acc-badge">{deliveryDocs.length+deliveryMedia.length}건</span>}
                    </div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{flexShrink:0,transform:openSec.has('delivery')?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',color:'var(--text-sm)'}}><path d="M6 9l6 6 6-6"/></svg>
                  </button>
                  {openSec.has('delivery')&&(
                    <div className="acc-body">
                      <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>전달할 자료</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
                        {DELIVERY_DOCS.map(d=>(
                          <button key={d} onClick={()=>toggle(deliveryDocs,setDeliveryDocs,d)}
                            style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${deliveryDocs.includes(d)?'var(--accent)':'var(--border)'}`,background:deliveryDocs.includes(d)?'var(--accent-l)':'#fff',color:deliveryDocs.includes(d)?'var(--accent)':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                            {d}
                          </button>
                        ))}
                      </div>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>전달 매체</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                        {DELIVERY_MEDIA.map(m=>(
                          <button key={m} onClick={()=>toggle(deliveryMedia,setDeliveryMedia,m)}
                            style={{padding:'6px 10px',borderRadius:20,border:`1.5px solid ${deliveryMedia.includes(m)?'#059669':'var(--border)'}`,background:deliveryMedia.includes(m)?'#D1FAE5':'#fff',color:deliveryMedia.includes(m)?'#065F46':'var(--text)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all .12s'}}>
                            {m}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div style={{flex:1}}/>
              </div>

            </div>{/* 2분할 끝 */}

            {/* ── 저장 ── */}
            <div className="note-sheet-foot">
              <button className="note-save-btn" onClick={save} disabled={saving}>{saving?'저장 중...':'저장하기'}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}
/* ── Admin Screen ── */
function AdminScreen({onBack}){
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('stat'); // 'stat' | 'list'
  const [search,setSearch]=useState('');
  const [filterDay,setFilterDay]=useState('전체');
  const [filterStaff,setFilterStaff]=useState('전체');
  const [filterBuilding,setFilterBuilding]=useState('전체');
  const [filterStatus,setFilterStatus]=useState('전체');
  const [expanded,setExpanded]=useState(null);

  const DAYS=['4/16(목)','4/17(금)','4/18(토)'];
  const STATUS_OPTIONS=['신규','연락완료','계약예정','보류','기타'];
  const STATUS_COLOR={신규:'#2563EB',연락완료:'#059669',계약예정:'#7C3AED',보류:'#9CA3AF',기타:'#D97706'};

  useEffect(()=>{
    db.collection('leads').orderBy('savedAt','desc').get()
      .then(s=>{setLeads(s.docs.map(d=>({id:d.id,...d.data()})));})
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[]);

  const staffList=[...new Set(leads.map(l=>l.staff).filter(Boolean))];
  const buildingList=[...new Set(leads.map(l=>l.building).filter(Boolean))];

  // 필터 적용
  const display=leads.filter(l=>{
    if(filterDay!=='전체'&&l.day!==filterDay)return false;
    if(filterStaff!=='전체'&&l.staff!==filterStaff)return false;
    if(filterBuilding!=='전체'&&l.building!==filterBuilding)return false;
    if(filterStatus!=='전체'&&(l.status||'신규')!==filterStatus)return false;
    if(search){
      const q=search.toLowerCase();
      if(!(l.name||'').toLowerCase().includes(q)&&!(l.phone||'').includes(q)&&!(l.memo||'').toLowerCase().includes(q))return false;
    }
    return true;
  });

  // 통계 계산
  const byDay=DAYS.map(d=>({day:d,count:leads.filter(l=>l.day===d).length}));
  const byStaff=staffList.map(s=>({staff:s,count:leads.filter(l=>l.staff===s).length})).sort((a,b)=>b.count-a.count);
  const byBuilding=buildingList.map(b=>({building:b,count:leads.filter(l=>l.building===b).length})).sort((a,b)=>b.count-a.count);
  const byStatus=STATUS_OPTIONS.map(s=>({status:s,count:leads.filter(l=>(l.status||'신규')===s).length}));
  const maxDay=Math.max(...byDay.map(d=>d.count),1);
  const maxStaff=Math.max(...byStaff.map(s=>s.count),1);

  // 상태 변경
  const changeStatus=async(id,status)=>{
    try{
      await db.collection('leads').doc(id).update({status});
      setLeads(p=>p.map(l=>l.id===id?{...l,status}:l));
    }catch(e){alert('변경 실패');}
  };

  // 삭제
  const deleteLead=async(id)=>{
    if(!window.confirm('이 상담 내역을 삭제하시겠어요?'))return;
    try{
      await db.collection('leads').doc(id).delete();
      setLeads(p=>p.filter(l=>l.id!==id));
      if(expanded===id)setExpanded(null);
    }catch(e){alert('삭제 실패');}
  };

  // CSV 다운로드
  const downloadCSV=()=>{
    const headers=['번호','이름','전화','이메일','담당자','날짜','건물유형','문제','액션태그','메모','상태','저장시각'];
    const rows=display.map((l,i)=>[
      i+1,l.name||'',l.phone||'',l.email||'',l.staff||'',l.day||'',
      l.building||'',l.problems?.join('|')||'',l.actions?.join('|')||'',
      (l.memo||'').replace(/,/g,'·'),l.status||'신규',l.savedAt||''
    ]);
    const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`POUR박람회_리드_${new Date().toLocaleDateString('ko')}.csv`;
    a.click();
  };

  return(
    <div className="screen active" style={{background:'var(--bg)',display:'flex',flexDirection:'column',height:'100vh'}}>
      {/* 헤더 */}
      <div className="hdr" style={{background:'var(--navy)',flexShrink:0}}>
        <div className="hdr-brand">
          <span style={{fontSize:13,fontWeight:900,color:'#fff',letterSpacing:'-.3px'}}>POUR 관리자</span>
        </div>
        <div className="hdr-div"/>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,.5)',fontWeight:600}}>전체 {leads.length}건</span>
        </div>
        <div className="hdr-r">
          <button onClick={downloadCSV} style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:7,padding:'6px 12px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',marginRight:8}}>CSV ↓</button>
          <button className="btn-back" onClick={onBack}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
          </button>
        </div>
      </div>

      {/* 탭 */}
      <div style={{display:'flex',background:'var(--navy)',borderBottom:'1px solid rgba(255,255,255,.1)',flexShrink:0}}>
        {[['stat','📊 통계'],['list','📋 리드 관리']].map(([k,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'12px 0',background:'none',border:'none',color:tab===k?'#fff':'rgba(255,255,255,.4)',fontSize:13,fontWeight:tab===k?800:600,cursor:'pointer',borderBottom:tab===k?'2px solid #60A5FA':'2px solid transparent',transition:'all .15s'}}>
            {label}
          </button>
        ))}
      </div>

      {loading&&<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>}

      {/* ── 통계 탭 ── */}
      {!loading&&tab==='stat'&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
          {/* 요약 카드 */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',gridColumn:'1/-1'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:8}}>📅 날짜별 상담</div>
              {byDay.map(({day,count})=>(
                <div key={day} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text)',width:72,flexShrink:0}}>{day}</span>
                  <div style={{flex:1,height:18,background:'var(--bg)',borderRadius:6,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${(count/maxDay)*100}%`,background:'#2563EB',borderRadius:6,transition:'width .3s',minWidth:count>0?4:0}}/>
                  </div>
                  <span style={{fontSize:13,fontWeight:900,color:'var(--accent)',width:28,textAlign:'right'}}>{count}</span>
                </div>
              ))}
            </div>
            {[
              {label:'총 상담', value:leads.length, icon:'👥', color:'#2563EB'},
              {label:'오늘 신규', value:byStatus.find(s=>s.status==='신규')?.count||0, icon:'🆕', color:'#059669'},
              {label:'연락완료', value:byStatus.find(s=>s.status==='연락완료')?.count||0, icon:'✅', color:'#7C3AED'},
              {label:'계약예정', value:byStatus.find(s=>s.status==='계약예정')?.count||0, icon:'🤝', color:'#D97706'},
            ].map(({label,value,icon,color})=>(
              <div key={label} style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',textAlign:'center'}}>
                <div style={{fontSize:22}}>{icon}</div>
                <div style={{fontSize:22,fontWeight:900,color,marginTop:2}}>{value}</div>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text-sm)',marginTop:2}}>{label}</div>
              </div>
            ))}
          </div>

          {/* 담당자별 */}
          {byStaff.length>0&&(
            <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:10}}>👤 담당자별 실적</div>
              {byStaff.map(({staff,count},i)=>(
                <div key={staff} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:i===0?'#D97706':'var(--text)',width:16}}>{i+1}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{staff}</span>
                  <div style={{width:100,height:14,background:'var(--bg)',borderRadius:6,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${(count/maxStaff)*100}%`,background:i===0?'#D97706':'#60A5FA',borderRadius:6}}/>
                  </div>
                  <span style={{fontSize:13,fontWeight:900,color:'var(--accent)',width:24,textAlign:'right'}}>{count}</span>
                </div>
              ))}
            </div>
          )}

          {/* 건물유형별 */}
          {byBuilding.length>0&&(
            <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:10}}>🏢 건물유형별</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {byBuilding.map(({building,count})=>(
                  <div key={building} style={{background:'var(--accent-l)',border:'1px solid #BFDBFE',borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--accent)'}}>{building}</span>
                    <span style={{fontSize:11,fontWeight:900,color:'var(--accent)'}}>{count}건</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 상태별 */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:10}}>📌 상태별 현황</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {byStatus.map(({status,count})=>(
                <div key={status} style={{background:'var(--bg)',border:`1.5px solid ${STATUS_COLOR[status]||'#E5E7EB'}`,borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:STATUS_COLOR[status]||'#E5E7EB',flexShrink:0,display:'block'}}/>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{status}</span>
                  <span style={{fontSize:11,fontWeight:900,color:'var(--text-md)'}}>{count}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── 리드 관리 탭 ── */}
      {!loading&&tab==='list'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* 검색 + 필터 */}
          <div style={{padding:'10px 14px',background:'#fff',borderBottom:'1px solid var(--border)',flexShrink:0}}>
            <input
              value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="이름·전화·메모 검색…"
              style={{width:'100%',padding:'9px 14px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:13,fontWeight:600,outline:'none',boxSizing:'border-box',marginBottom:8}}
            />
            <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
              {/* 날짜 */}
              {['전체',...DAYS].map(d=>(
                <button key={d} onClick={()=>setFilterDay(d)} style={{flexShrink:0,padding:'5px 10px',borderRadius:20,border:'none',background:filterDay===d?'var(--navy)':'var(--bg)',color:filterDay===d?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer'}}>{d}</button>
              ))}
              <div style={{width:1,background:'var(--border)',flexShrink:0,margin:'0 2px'}}/>
              {/* 담당자 */}
              {staffList.length>0&&['전체',...staffList].map(s=>(
                <button key={'s'+s} onClick={()=>setFilterStaff(s)} style={{flexShrink:0,padding:'5px 10px',borderRadius:20,border:'none',background:filterStaff===s?'#7C3AED':'var(--bg)',color:filterStaff===s?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer'}}>{s}</button>
              ))}
              <div style={{width:1,background:'var(--border)',flexShrink:0,margin:'0 2px'}}/>
              {/* 상태 */}
              {['전체',...STATUS_OPTIONS].map(s=>(
                <button key={'st'+s} onClick={()=>setFilterStatus(s)} style={{flexShrink:0,padding:'5px 10px',borderRadius:20,border:'none',background:filterStatus===s?STATUS_COLOR[s]||'var(--navy)':'var(--bg)',color:filterStatus===s?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer'}}>{s}</button>
              ))}
            </div>
          </div>

          {/* 결과 카운트 */}
          <div style={{padding:'6px 14px',background:'var(--bg)',borderBottom:'1px solid var(--border)',fontSize:11,fontWeight:700,color:'var(--text-sm)',flexShrink:0}}>
            {display.length}건 표시 중 / 전체 {leads.length}건
          </div>

          {/* 리드 목록 */}
          <div style={{flex:1,overflowY:'auto',padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
            {display.length===0&&<div className="empty">조건에 맞는 상담이 없어요</div>}
            {display.map((l,i)=>{
              const isOpen=expanded===l.id;
              const status=l.status||'신규';
              return(
                <div key={l.id||i} style={{background:'var(--card)',borderRadius:12,border:`1.5px solid ${isOpen?'var(--accent)':'var(--border)'}`,overflow:'hidden',transition:'border-color .15s'}}>
                  {/* 카드 헤더 - 탭으로 열고닫기 */}
                  <div style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setExpanded(isOpen?null:l.id)}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',width:20,textAlign:'center'}}>{i+1}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{l.name||'이름없음'}</span>
                        <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>{l.phone}</span>
                      </div>
                      <div style={{fontSize:11,color:'var(--text-sm)',fontWeight:600,marginTop:2}}>
                        {l.staff} · {l.day} · {l.building}
                      </div>
                    </div>
                    <span style={{fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:12,background:STATUS_COLOR[status]||'#9CA3AF',color:'#fff',flexShrink:0}}>{status}</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-sm)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,transform:isOpen?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s'}}><path d="M6 9l6 6 6-6"/></svg>
                  </div>

                  {/* 펼쳐진 상세 */}
                  {isOpen&&(
                    <div style={{borderTop:'1px solid var(--border)',padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
                      {/* 연락처 */}
                      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                        {l.phone&&<a href={`tel:${l.phone}`} style={{flex:1,minWidth:80,textAlign:'center',padding:'8px',background:'var(--accent-l)',border:'1px solid #BFDBFE',borderRadius:8,color:'var(--accent)',fontSize:12,fontWeight:700,textDecoration:'none'}}>📞 전화</a>}
                        {l.phone&&<a href={`sms:${l.phone}`} style={{flex:1,minWidth:80,textAlign:'center',padding:'8px',background:'var(--accent-l)',border:'1px solid #BFDBFE',borderRadius:8,color:'var(--accent)',fontSize:12,fontWeight:700,textDecoration:'none'}}>💬 문자</a>}
                        {l.email&&<a href={`mailto:${l.email}`} style={{flex:1,minWidth:80,textAlign:'center',padding:'8px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:8,color:'#059669',fontSize:12,fontWeight:700,textDecoration:'none'}}>📧 메일</a>}
                      </div>

                      {/* 상담 내용 */}
                      {l.problems?.length>0&&(
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4}}>문제유형</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {l.problems.map(p=><span key={p} style={{fontSize:11,padding:'3px 8px',background:'#FEF3C7',color:'#92400E',borderRadius:20,fontWeight:700}}>{p}</span>)}
                          </div>
                        </div>
                      )}
                      {l.actions?.length>0&&(
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4}}>액션태그</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {l.actions.map(a=><span key={a} style={{fontSize:11,padding:'3px 8px',background:'#EDE9FE',color:'#5B21B6',borderRadius:20,fontWeight:700}}>{a}</span>)}
                          </div>
                        </div>
                      )}
                      {l.memo&&(
                        <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:8,padding:'8px 10px'}}>
                          <div style={{fontSize:10,fontWeight:700,color:'#92400E',marginBottom:2}}>메모</div>
                          <div style={{fontSize:12,color:'#78350F',lineHeight:1.5}}>{l.memo}</div>
                        </div>
                      )}

                      {/* 상태 변경 */}
                      <div>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>상태 변경</div>
                        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                          {STATUS_OPTIONS.map(s=>(
                            <button key={s} onClick={()=>changeStatus(l.id,s)} style={{padding:'5px 10px',borderRadius:20,border:`1.5px solid ${STATUS_COLOR[s]||'#9CA3AF'}`,background:status===s?STATUS_COLOR[s]||'#9CA3AF':'#fff',color:status===s?'#fff':STATUS_COLOR[s]||'#9CA3AF',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                              {s}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* 저장시각 + 삭제 */}
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <span style={{fontSize:10,color:'var(--text-sm)'}}>{l.savedAt?new Date(l.savedAt).toLocaleString('ko'):''}</span>
                        <button onClick={()=>deleteLead(l.id)} style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer'}}>🗑 삭제</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const [staffId,setStaffId]=useState(()=>localStorage.getItem('pourStaffId')||'');
  const [staffName,setStaffName]=useState(()=>{
    // name을 직접 저장한 값 우선, 없으면 list에서 조회
    const saved=localStorage.getItem('pourStaffName');
    if(saved)return saved;
    const id=localStorage.getItem('pourStaffId');
    if(!id)return'';
    return loadStaffList().find(s=>s.id===id)?.name||'';
  });
  const [staffDay,setStaffDay]=useState(()=>localStorage.getItem('pourDay')||'4/16(목)');
  const [showStaffMgr,setShowStaffMgr]=useState(false);
  const [staffMgrMode,setStaffMgrMode]=useState('setup');
  const [screen,setScreen]=useState('home');
  const [building,setBuilding]=useState(null);
  const [problem,setProblem]=useState(null);
  const [cat,setCat]=useState('전체');
  const [todayCount,setTodayCount]=useState(0);
  const [globalNote,setGlobalNote]=useState(false);
  const [confirmNew,setConfirmNew]=useState(false);

  const isSetup=!!(staffId&&staffName);

  const handleStaffSelect=(s,day)=>{
    localStorage.setItem('pourStaffId',s.id);
    localStorage.setItem('pourStaffName',s.name);
    localStorage.setItem('pourDay',day);
    setStaffId(s.id);setStaffName(s.name);setStaffDay(day);setShowStaffMgr(false);
  };
  const openStaffMgr=mode=>{setStaffMgrMode(mode);setShowStaffMgr(true);};

  const loadCount=useCallback(async()=>{
    try{const s=await db.collection('leads').where('day','==',staffDay).get();setTodayCount(s.size);}catch(e){}
  },[staffDay]);
  useEffect(()=>{if(isSetup)loadCount();},[isSetup,loadCount]);

  const goHome=()=>{setScreen('home');setBuilding(null);setProblem(null);setCat('전체');loadCount();};
  // 건물유형에 맞는 문제만 필터 → 추가로 카테고리 탭 필터
  const buildingProblems=building?ALL_PROBLEMS.filter(p=>BUILDING_PROBLEMS[building.id]?.includes(p.id)):ALL_PROBLEMS;
  const filtered=cat==='전체'?buildingProblems:buildingProblems.filter(p=>p.cat===cat);

  if(!isSetup) return(
    <div style={{height:'100vh',background:'var(--navy)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 32px',textAlign:'center',gap:12}}>
      <div style={{fontSize:48,marginBottom:8}}>👋</div>
      <div style={{fontSize:26,fontWeight:900,color:'#fff',letterSpacing:'-.5px',lineHeight:1.3,marginBottom:6}}>담당자를<br/>설정해주세요</div>
      <div style={{fontSize:14,color:'rgba(255,255,255,.45)',marginBottom:28,lineHeight:1.7}}>오늘 상담을 시작할 담당자를 선택하세요.<br/>태블릿 10대 모두 각자 설정해요.</div>
      <button className="btn-start" style={{width:'100%',maxWidth:320}} onClick={()=>openStaffMgr('setup')}>담당자 설정하기 →</button>
      {showStaffMgr&&<StaffModal mode="setup" currentStaffId="" staffDay={staffDay} onSelect={handleStaffSelect} onClose={()=>setShowStaffMgr(false)}/>}
    </div>
  );

  return(
    <div style={{height:'100vh',position:'relative',overflow:'hidden'}}>
      {showStaffMgr&&<StaffModal mode={staffMgrMode} currentStaffId={staffId} staffDay={staffDay} onSelect={handleStaffSelect} onClose={()=>setShowStaffMgr(false)}/>}

      {/* HOME */}
      <div className={`screen ${screen==='home'?'active':''} home-screen`}>
        <div className="staff-badge-home" onClick={()=>openStaffMgr('switch')}>
          <div className="sba" style={{background:getColor(staffId)}}>{getAvatar(staffName)}</div>
          <span className="sbn">{staffDay} · {staffName}</span>
        </div>
        <div className="hbg" style={{width:600,height:600,top:-200,right:-150}}/>
        <div className="hbg" style={{width:300,height:300,bottom:-100,left:-80}}/>
