              {byStatus.map(({status,count})=>(
                <div key={status} style={{background:'var(--bg)',border:`1.5px solid ${STATUS_COLOR[status]||'#E5E7EB'}`,borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:STATUS_COLOR[status]||'#E5E7EB',flexShrink:0,display:'block'}}/>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{status}</span>
                  <span style={{fontSize:11,fontWeight:900,color:'var(--text-md)'}}>{count}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── 유입 관리 탭 ── */}
      {!loading&&tab==='list'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* 검색 + 필터 */}
          <div style={{padding:'10px 14px',background:'#fff',borderBottom:'1px solid var(--border)',flexShrink:0}}>
            <input
              value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="이름·전화·메모 검색…"
              style={{width:'100%',padding:'9px 14px',border:'1.5px solid var(--border)',borderRadius:10,fontSize:13,fontWeight:600,outline:'none',boxSizing:'border-box',marginBottom:8}}
            />
            <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
              {/* 날짜 */}
              {['전체',...DAYS].map(d=>(
                <button key={d} onClick={()=>setFilterDay(d)} style={{flexShrink:0,padding:'5px 10px',borderRadius:20,border:'none',background:filterDay===d?'var(--navy)':'var(--bg)',color:filterDay===d?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer'}}>{d}</button>
              ))}
              <div style={{width:1,background:'var(--border)',flexShrink:0,margin:'0 2px'}}/>
              {/* 담당자 */}
              {staffList.length>0&&['전체',...staffList].map(s=>(
                <button key={'s'+s} onClick={()=>setFilterStaff(s)} style={{flexShrink:0,padding:'5px 10px',borderRadius:20,border:'none',background:filterStaff===s?'#7C3AED':'var(--bg)',color:filterStaff===s?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer'}}>{s}</button>
              ))}
              <div style={{width:1,background:'var(--border)',flexShrink:0,margin:'0 2px'}}/>
              {/* 상태 */}
              {['전체',...STATUS_OPTIONS].map(s=>(
                <button key={'st'+s} onClick={()=>setFilterStatus(s)} style={{flexShrink:0,padding:'5px 10px',borderRadius:20,border:'none',background:filterStatus===s?STATUS_COLOR[s]||'var(--navy)':'var(--bg)',color:filterStatus===s?'#fff':'var(--text)',fontSize:11,fontWeight:700,cursor:'pointer'}}>{s}</button>
              ))}
            </div>
          </div>

          {/* 결과 카운트 */}
          <div style={{padding:'6px 14px',background:'var(--bg)',borderBottom:'1px solid var(--border)',fontSize:11,fontWeight:700,color:'var(--text-sm)',flexShrink:0}}>
            {display.length}건 표시 중 / 전체 {activeLeads.length}건
          </div>

          {/* 리드 목록 */}
          <div style={{flex:1,overflowY:'auto',padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
            {display.length===0&&<div className="empty">조건에 맞는 상담이 없어요</div>}
            {display.map((l,i)=>{
              const isOpen=expanded===l.id;
              const status=l.status||'신규';
              return(
                <div key={l.id||i} style={{background:'var(--card)',borderRadius:12,border:`1.5px solid ${isOpen?'var(--accent)':'var(--border)'}`,overflow:'hidden',transition:'border-color .15s'}}>
                  {/* 카드 헤더 - 탭으로 열고닫기 */}
                  <div style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setExpanded(isOpen?null:l.id)}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',width:20,textAlign:'center'}}>{i+1}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{l.name||'이름없음'}</span>
                        <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>{l.phone}</span>
                      </div>
                      <div style={{fontSize:11,color:'var(--text-sm)',fontWeight:600,marginTop:2}}>
                        {l.staff} · {l.day} · {l.building}
                      </div>
                    </div>
                    <span style={{fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:12,background:STATUS_COLOR[status]||'#9CA3AF',color:'#fff',flexShrink:0}}>{status}</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-sm)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,transform:isOpen?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s'}}><path d="M6 9l6 6 6-6"/></svg>
                  </div>

                  {/* 펼쳐진 상세 */}
                  {isOpen&&(
                    <div style={{borderTop:'1px solid var(--border)',padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
                      {/* 연락처 */}
                      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                        {l.phone&&<a href={`tel:${l.phone}`} style={{flex:1,minWidth:80,textAlign:'center',padding:'8px',background:'var(--accent-l)',border:'1px solid #BFDBFE',borderRadius:8,color:'var(--accent)',fontSize:12,fontWeight:700,textDecoration:'none'}}>📞 전화</a>}
                        {l.phone&&<button onClick={()=>setSmsTarget({phone:l.phone,name:l.name,building:l.building,problem:l.problem,staff:l.staff})} style={{flex:1,minWidth:80,textAlign:'center',padding:'8px',background:'var(--purple-l)',border:'1px solid var(--purple-m)',borderRadius:8,color:'var(--purple)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>💬 솔라피</button>}
                        {l.email&&<a href={`mailto:${l.email}`} style={{flex:1,minWidth:80,textAlign:'center',padding:'8px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:8,color:'#059669',fontSize:12,fontWeight:700,textDecoration:'none'}}>📧 메일</a>}
                      </div>

                      {/* 상담 내용 */}
                      {l.problems?.length>0&&(
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4}}>문제유형</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {l.problems.map(p=><span key={p} style={{fontSize:11,padding:'3px 8px',background:'#FEF3C7',color:'#92400E',borderRadius:20,fontWeight:700}}>{p}</span>)}
                          </div>
                        </div>
                      )}
                      {l.actions?.length>0&&(
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:4}}>액션태그</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {l.actions.map(a=><span key={a} style={{fontSize:11,padding:'3px 8px',background:'#EDE9FE',color:'#5B21B6',borderRadius:20,fontWeight:700}}>{a}</span>)}
                          </div>
                        </div>
                      )}
                      {(l.memo||l.memoImgs?.length>0)&&(
                        <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:8,padding:'8px 10px'}}>
                          <div style={{fontSize:10,fontWeight:700,color:'#92400E',marginBottom:4}}>메모</div>
                          {l.memo&&<div style={{fontSize:12,color:'#78350F',lineHeight:1.5,marginBottom:l.memoImgs?.length>0?6:0}}>{l.memo}</div>}
                          {l.memoImgs?.map((img,pi)=>(
                            <div key={pi} style={{marginBottom:pi<l.memoImgs.length-1?6:0}}>
                              {l.memoImgs.length>1&&<div style={{fontSize:9,fontWeight:700,color:'#B45309',marginBottom:2}}>{pi+1}페이지</div>}
                              <img src={img} alt={`펜슬 메모 ${pi+1}p`} style={{width:'100%',borderRadius:6,display:'block'}}/>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* 상태 변경 */}
                      <div>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>상태 변경</div>
                        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                          {STATUS_OPTIONS.map(s=>(
                            <button key={s} onClick={()=>changeStatus(l.id,s)} style={{padding:'5px 10px',borderRadius:20,border:`1.5px solid ${STATUS_COLOR[s]||'#9CA3AF'}`,background:status===s?STATUS_COLOR[s]||'#9CA3AF':'#fff',color:status===s?'#fff':STATUS_COLOR[s]||'#9CA3AF',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                              {s}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* 저장시각 + 삭제 */}
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <span style={{fontSize:10,color:'var(--text-sm)'}}>{l.savedAt?new Date(l.savedAt).toLocaleString('ko'):''}</span>
                        <button onClick={()=>deleteLead(l.id)} style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer'}}>🗑 삭제</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── 담당자 관리 탭 ── */}
      {!loading&&tab==='staff'&&(
        <StaffManageTab/>
      )}

      {/* ── 사진 관리 탭 ── */}
      {!loading&&tab==='photos'&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>

          {/* ── 하자 현장 사진 관리 ── */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>📸 공법별 사진 · GIF 관리</div>
            <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:6,lineHeight:1.6}}>
              아래 사진은 <b>공법 상세 화면</b>에 표시됩니다.<br/>
              · <b>현장 사진</b> → 상단 가로 슬라이드<br/>
              · <b>GIF</b> → 시공 과정 미디어<br/>
              · <b>완공사진</b> → 하단에 노출<br/>
              사진 클릭 → 파일 선택 / 이미지 복사 후 붙여넣기(Ctrl+V) 가능
            </div>

            {ALL_PROBLEMS.map(p=>{
              const key=p.id;
              const data=casePhotos[key]||{causes:['','',''],completed:'',gif:''};
              return(
                <div key={key} style={{marginBottom:18,padding:'14px',background:'var(--bg)',borderRadius:12,border:'1px solid var(--border)'}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:2}}>{p.label}</div>
                  <div style={{fontSize:10,color:'var(--text-sm)',marginBottom:10}}>{p.cat} · {p.sub}</div>

                  {/* 현장 사진들 */}
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>현장 사진</div>
                  <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                    {(data.causes||[]).map((url,i)=>(
                      <PhotoSlot key={i} src={url} label={`사진 ${i+1}`}
                        onSet={(v)=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:['','',''],completed:'',gif:''};up[key].causes[i]=v;setCasePhotos(up);saveCasePhotos(up);}}
                        onRemove={()=>{const up=JSON.parse(JSON.stringify(casePhotos));up[key].causes.splice(i,1);setCasePhotos(up);saveCasePhotos(up);}}
                      />
                    ))}
                    <button onClick={()=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',gif:''};up[key].causes.push('');setCasePhotos(up);saveCasePhotos(up);}}
                      style={{width:100,height:75,borderRadius:10,border:'2px dashed var(--border)',background:'#fff',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,color:'var(--text-sm)',fontSize:11,fontWeight:700}}>
                      <span style={{fontSize:24}}>+</span>추가
                    </button>
                  </div>

                  {/* GIF URL */}
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>🎬 GIF URL</div>
                  <input value={data.gif||''} placeholder="https://... GIF 또는 영상 URL" onChange={e=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',gif:''};up[key].gif=e.target.value;setCasePhotos(up);saveCasePhotos(up);}}
                    style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid var(--border)',fontSize:12,fontFamily:'inherit',marginBottom:12,boxSizing:'border-box'}}/>

                  {/* 완공사진 */}
                  <div style={{fontSize:11,fontWeight:700,color:'var(--text-sm)',marginBottom:6}}>완공사진</div>
                  <PhotoSlot src={data.completed||''} label="완공사진" wide
                    onSet={(v)=>{const up=JSON.parse(JSON.stringify(casePhotos));if(!up[key])up[key]={causes:[],completed:'',gif:''};up[key].completed=v;setCasePhotos(up);saveCasePhotos(up);}}
                    onRemove={()=>{const up=JSON.parse(JSON.stringify(casePhotos));up[key].completed='';setCasePhotos(up);saveCasePhotos(up);}}
                  />
                </div>
              );
            })}
          </div>

          {/* ── 보유 니즈 카드 사진 ── */}
          <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>🏗 보유 니즈 카드 사진</div>
            <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:14}}>문제 선택 화면에 보이는 카드 썸네일입니다.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {ALL_PROBLEMS.map(p=>(
                <div key={p.id} style={{borderRadius:10,border:'1.5px solid var(--border)',overflow:'hidden',background:'#fff'}}>
                  <PhotoSlot src={probPhotos[p.id]||p.img||''} label={p.label} aspect="4/3"
                    onSet={(v)=>{const up={...probPhotos,[p.id]:v};setProbPhotos(up);saveProblemPhotos(up);}}
                    onRemove={()=>{const up={...probPhotos};delete up[p.id];setProbPhotos(up);saveProblemPhotos(up);}}
                  />
                  <div style={{padding:'6px 8px'}}>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--text)',lineHeight:1.3}}>{p.label}</div>
                    <div style={{fontSize:10,color:'var(--text-sm)'}}>{p.cat}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── 휴지통 탭 ── */}
      {!loading&&tab==='trash'&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
          <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:12}}>🗑 휴지통 ({trashedLeads.length}건)</div>
          {trashedLeads.length===0&&<div className="empty">휴지통이 비어있습니다</div>}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {trashedLeads.map((l,i)=>(
              <div key={l.id||i} style={{background:'var(--card)',borderRadius:12,border:'1px solid var(--border)',padding:'12px 14px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{l.name||'이름없음'}</span>
                  <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>{l.phone}</span>
                  <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600,marginLeft:'auto'}}>{l.staff} · {l.building}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:10,color:'#DC2626'}}>삭제: {l.deletedAt?new Date(l.deletedAt).toLocaleString('ko'):''}</span>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>restoreLead(l.id)} style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid #BBF7D0',background:'#F0FDF4',color:'#059669',fontSize:11,fontWeight:700,cursor:'pointer'}}>복원</button>
                    <button onClick={()=>permanentDeleteLead(l.id)} style={{padding:'5px 12px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer'}}>영구삭제</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 문자 설정 탭 ── */}
      {!loading&&tab==='sms'&&(
        <SmsSettingsTab/>
      )}

      {/* SMS 모달 & 토스트 */}
      {smsTarget&&<SmsModal phone={smsTarget.phone} name={smsTarget.name} building={smsTarget.building} problem={smsTarget.problem} staff={smsTarget.staff} company={smsTarget.company||''} position={smsTarget.position||''} buildingType={smsTarget.building||''} datetime={smsTarget.day||''}
        onClose={()=>setSmsTarget(null)} onToast={(msg,type)=>setToast({msg,type})}/>}
      {toast&&<SmsToast message={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      {showPinChange&&<PinChangeModal onClose={()=>setShowPinChange(false)} onDone={()=>{setShowPinChange(false);setToast({type:'success',msg:'비밀번호가 변경되었습니다'});setTimeout(()=>setToast(null),2500);}}/>}
    </div>
  );
}

/* ── 담당자 관리 탭 컴포넌트 ── */
function StaffManageTab(){
  const [sList,setSList]=useState(loadStaffList);
  const [addMode,setAddMode]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const [inputName,setInputName]=useState('');
  const [inputPhone,setInputPhone]=useState('');
  const [inputPosition,setInputPosition]=useState('');

  const handleSave=()=>{
    if(!inputName.trim())return;
    if(editTarget){
      const next=sList.map(s=>s.id===editTarget.id?{...s,name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,''),position:inputPosition.trim()}:s);
      saveStaffList(next);setSList(next);
    }else{
      const ns={id:'s'+Date.now(),name:inputName.trim(),phone:(inputPhone||'').replace(/[^0-9]/g,''),position:inputPosition.trim()};
      const next=[...sList,ns];
      saveStaffList(next);setSList(next);
    }
    setAddMode(false);setEditTarget(null);setInputName('');setInputPhone('');setInputPosition('');
  };
  const handleDel=id=>{
    if(!confirm('이 담당자를 삭제하시겠어요?'))return;
    const next=sList.filter(s=>s.id!==id);
    saveStaffList(next);setSList(next);
  };
  const handleEdit=s=>{setEditTarget(s);setInputName(s.name);setInputPhone(s.phone||'');setInputPosition(s.position||'');setAddMode(true);};

  return(
    <div style={{flex:1,overflowY:'auto',padding:'16px'}}>
      <div style={{background:'var(--card)',borderRadius:12,padding:'16px',border:'1px solid var(--border)',marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:900,color:'var(--text)',marginBottom:4}}>👤 담당자 관리</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:14,lineHeight:1.6}}>담당자를 추가·수정·삭제할 수 있습니다.</div>

        {sList.length===0&&!addMode&&<div style={{textAlign:'center',padding:'24px',color:'var(--text-sm)',fontSize:13}}>등록된 담당자가 없습니다</div>}
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {sList.map(s=>(
            <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'var(--bg)',borderRadius:12,border:'1px solid var(--border)'}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:getColor(s.id),display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:'#fff',flexShrink:0}}>{getAvatar(s.name)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:800,color:'var(--text)'}}>{s.name}</div>
                <div style={{fontSize:11,color:'var(--text-sm)',marginTop:1}}>
                  {s.position&&<span style={{marginRight:8,fontWeight:600}}>{s.position}</span>}
                  {s.phone&&<span>{s.phone.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3')}</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>handleEdit(s)} style={{padding:'6px 10px',borderRadius:8,border:'1.5px solid var(--border)',background:'#fff',fontSize:11,fontWeight:700,cursor:'pointer'}}>수정</button>
                <button onClick={()=>handleDel(s.id)} style={{padding:'6px 10px',borderRadius:8,border:'1.5px solid #FCA5A5',background:'#FEF2F2',color:'#DC2626',fontSize:11,fontWeight:700,cursor:'pointer'}}>삭제</button>
              </div>
            </div>
          ))}
        </div>
        {addMode?(
          <div style={{background:'var(--bg)',borderRadius:12,padding:14,border:'1px solid var(--border)'}}>
            <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:10}}>{editTarget?'담당자 수정':'새 담당자 추가'}</div>
            <input className="sheet-input" placeholder="이름 *" value={inputName} onChange={e=>setInputName(e.target.value)} autoFocus style={{marginBottom:8}}/>

function PinChangeModal({onClose,onDone}){
  const [current,setCurrent]=useState('');
  const [newPin,setNewPin]=useState('');
  const [confirm,setConfirm]=useState('');
  const [error,setError]=useState('');
  const handleChange=async()=>{
    const currentHash=await hashPin(current);
    if(currentHash!==loadAdminPin()){setError('현재 비밀번호가 틀렸습니다');return;}
    if(newPin.length<4){setError('4자리 이상 입력하세요');return;}
    if(newPin!==confirm){setError('새 비밀번호가 일치하지 않습니다');return;}
    const hash=await hashPin(newPin);
    saveAdminPin(hash);
    onDone();
  };
  const s={position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(6px)'};
  const b={background:'#fff',borderRadius:18,padding:'28px 24px',width:'min(340px,88vw)',boxShadow:'0 12px 40px rgba(0,0,0,.25)'};
  const i={width:'100%',padding:'12px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:16,fontWeight:700,textAlign:'center',letterSpacing:'.4em',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:8};

        <input type="password" inputMode="numeric" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/[^0-9]/g,''))} placeholder="새 비밀번호" style={i} maxLength={8}/>
        <input type="password" inputMode="numeric" value={confirm} onChange={e=>setConfirm(e.target.value.replace(/[^0-9]/g,''))} placeholder="새 비밀번호 확인" style={i} maxLength={8} onKeyDown={e=>{if(e.key==='Enter')handleChange();}}/>
        {error&&<div style={{fontSize:12,color:'#DC2626',fontWeight:700,textAlign:'center',marginBottom:6}}>{error}</div>}
        <button onClick={handleChange} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:'var(--navy)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit',marginTop:4}}>변경하기</button>
        <button onClick={onClose} style={{width:'100%',padding:'11px',borderRadius:10,border:'1.5px solid var(--border)',background:'transparent',color:'var(--text-sm)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',marginTop:6}}>취소</button>
      </div>
    </div>
  );
}

/* ── PIN Modal ── */
function PinModal({mode,onSuccess,onClose}){
  const [pin,setPin]=useState('');
  const [pinConfirm,setPinConfirm]=useState('');
  const [error,setError]=useState('');
  const [failCount,setFailCount]=useState(0);
  const [locked,setLocked]=useState(false);
  const [lockTimer,setLockTimer]=useState(0);
  useEffect(()=>{if(lockTimer<=0){setLocked(false);return;}const t=setInterval(()=>setLockTimer(p=>{if(p<=1){setLocked(false);return 0;}return p-1;}),1000);return()=>clearInterval(t);},[lockTimer]);

  const handleSetup=async()=>{
    if(pin.length<4){setError('4자리 이상 입력하세요');return;}
    if(pin!==pinConfirm){setError('비밀번호가 일치하지 않습니다');return;}
    const hash=await hashPin(pin);
    saveAdminPin(hash);
    onSuccess();
  };
  const handleVerify=async()=>{
    if(locked)return;
    const hash=await hashPin(pin);
    if(hash===loadAdminPin()){setFailCount(0);onSuccess();}
    else{const next=failCount+1;setFailCount(next);if(next>=3){setLocked(true);setLockTimer(30);setError('3회 실패 — 30초 후 재시도');}else{setError(`비밀번호가 틀렸습니다 (${next}/3)`);}setPin('');}
  };

  const overlayStyle={position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(6px)'};
  const boxStyle={background:'#fff',borderRadius:18,padding:'32px 24px',width:'min(340px,88vw)',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.25)'};
  const inputStyle={width:'100%',padding:'14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:20,fontWeight:800,textAlign:'center',letterSpacing:'0.5em',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:8};
  const btnStyle={width:'100%',padding:'14px',borderRadius:10,border:'none',background:'var(--navy)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit',marginTop:8};

  return(
    <div style={overlayStyle} onClick={onClose}>
      <div style={boxStyle} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:32,marginBottom:8}}>{mode==='setup'?'🔐':'🔒'}</div>
        <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>{mode==='setup'?'관리자 비밀번호 설정':'관리자 인증'}</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:18}}>{mode==='setup'?'4자리 이상 숫자를 입력하세요':'비밀번호를 입력하세요'}</div>
        <input type="password" inputMode="numeric" value={pin} onChange={e=>setPin(e.target.value.replace(/[^0-9]/g,''))} placeholder="비밀번호" style={inputStyle} autoFocus maxLength={8} onKeyDown={e=>{if(e.key==='Enter'){mode==='setup'?undefined:handleVerify();}}}/>
        {mode==='setup'&&<input type="password" inputMode="numeric" value={pinConfirm} onChange={e=>setPinConfirm(e.target.value.replace(/[^0-9]/g,''))} placeholder="비밀번호 확인" style={inputStyle} maxLength={8} onKeyDown={e=>{if(e.key==='Enter')handleSetup();}}/>}
        {error&&<div style={{fontSize:12,color:'#DC2626',fontWeight:700,marginBottom:4}}>{error}</div>}
        {locked&&<div style={{fontSize:11,color:'var(--text-sm)',marginBottom:4}}>{lockTimer}초 후 재시도 가능</div>}
        <button style={{...btnStyle,opacity:locked?.5:1}} disabled={locked} onClick={mode==='setup'?handleSetup:handleVerify}>{mode==='setup'?'설정 완료':'확인'}</button>
        <button style={{...btnStyle,background:'transparent',color:'var(--text-sm)',border:'1.5px solid var(--border)',marginTop:6}} onClick={onClose}>취소</button>
      </div>
    </div>
  );
}

  const [confirmNew,setConfirmNew]=useState(false);

  const [adminAuth,setAdminAuth]=useState(()=>sessionStorage.getItem('pourAdminAuth')==='true');
  const [showPinModal,setShowPinModal]=useState(false);

  useEffect(()=>{syncPhotosFromFirestore(null,setProbPhotos);},[]);

  const isSetup=!!(staffId&&staffName);

  const handleStaffSelect=(s,day)=>{
    localStorage.setItem('pourStaffId',s.id);
    localStorage.setItem('pourStaffName',s.name);
    localStorage.setItem('pourDay',day);
    setStaffId(s.id);setStaffName(s.name);setStaffDay(day);setShowStaffMgr(false);
  };
  const openStaffMgr=mode=>{setStaffMgrMode(mode);setShowStaffMgr(true);};

  const loadCount=useCallback(async()=>{
    try{const s=await db.collection('leads').where('day','==',staffDay).get();setTodayCount(s.size);}catch(e){}
  },[staffDay]);
  useEffect(()=>{if(isSetup)loadCount();},[isSetup,loadCount]);

  const goHome=()=>{setScreen('home');setBuilding(null);setProblem(null);setCat('전체');setBrand(null);setGrohomeCat(null);loadCount();};
  // 건물유형에 맞는 문제만 필터 → 추가로 카테고리 탭 필터
  const buildingProblems=ALL_PROBLEMS;
  const filtered=cat==='전체'?buildingProblems:buildingProblems.filter(p=>p.cat===cat);

  if(!isSetup) return(
    <div style={{height:'100vh',background:'var(--navy)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 32px',textAlign:'center',gap:12}}>
      <div style={{fontSize:48,marginBottom:8}}>👋</div>
      <div style={{fontSize:26,fontWeight:900,color:'#fff',letterSpacing:'-.5px',lineHeight:1.3,marginBottom:6}}>담당자를<br/>설정해주세요</div>
      <div style={{fontSize:14,color:'rgba(255,255,255,.45)',marginBottom:28,lineHeight:1.7}}>오늘 상담을 시작할 담당자를 선택하세요.<br/>태블릿 10대 모두 각자 설정해요.</div>
      <button className="btn-start" style={{width:'100%',maxWidth:320}} onClick={()=>openStaffMgr('setup')}>담당자 설정하기 →</button>
      {showStaffMgr&&<StaffModal mode="setup" currentStaffId="" staffDay={staffDay} onSelect={handleStaffSelect} onClose={()=>setShowStaffMgr(false)}/>}
    </div>
  );

  return(
    <div style={{height:'100vh',position:'relative',overflow:'hidden'}}>
      {showStaffMgr&&<StaffModal mode={staffMgrMode} currentStaffId={staffId} staffDay={staffDay} onSelect={handleStaffSelect} onClose={()=>setShowStaffMgr(false)}/>}

      {/* HOME */}
      <div className={`screen ${screen==='home'?'active':''} home-screen`}>
        <div className="staff-badge-home" onClick={()=>openStaffMgr('switch')}>
          <div className="sba" style={{background:getColor(staffId)}}>{getAvatar(staffName)}</div>
          <span className="sbn">{staffDay} · {staffName}</span>
        </div>
        <div className="hbg" style={{width:600,height:600,top:-200,right:-150}}/>
        <div className="hbg" style={{width:300,height:300,bottom:-100,left:-80}}/>

          <div className="hdr-div"/><div className="hdr-sub">보유 니즈 선택</div>
          <div className="hdr-r"><button className="btn-back" onClick={goHome}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>
        </div>
        <div className="content">
          {/* 카테고리 탭 */}
          <div className="tabs" style={{marginBottom:14}}>
            {CATS.map(ct=>(
              <button key={ct} className={`tab ${cat===ct?'on':''}`} style={{padding:'5px 13px',fontSize:12}} onClick={()=>setCat(ct)}>{ct}</button>
            ))}
          </div>
          {/* 2열 공법 카드 그리드 */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,paddingBottom:8}}>
            {filtered.map(p=>(
              <button key={p.id} style={{display:'flex',flexDirection:'column',background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:12,cursor:'pointer',textAlign:'left',fontFamily:'inherit',overflow:'hidden',transition:'all .13s',padding:0}} onClick={()=>{setProblem(p);setScreen('solution');}}>
                <div style={{width:'100%',aspectRatio:'4/3',background:'linear-gradient(135deg,var(--blue-l),var(--blue-m))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,position:'relative',flexShrink:0}}>
                  {(probPhotos[p.id]||p.img)?<img src={probPhotos[p.id]||p.img} alt={p.label} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain',background:'#f3f4f6'}}/>:<span>{p.icon}</span>}
                </div>
                <div style={{padding:'8px 10px 10px'}}>
                  <div style={{fontSize:10,fontWeight:600,color:'var(--text-sm)'}}>{p.sub}</div>
                  <div style={{fontSize:12,fontWeight:800,color:'var(--text)',lineHeight:1.3,marginTop:2}}>{p.label}</div>
                  {p.tags&&<div style={{fontSize:9,color:'var(--text-sm)',marginTop:4,lineHeight:1.5}}>{p.tags.slice(0,2).join(' ')}</div>}
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* SOLUTION */}
      <SolutionScreen
        visible={screen==='solution'}
        building={building} problem={problem}
        staffId={staffId} staffName={staffName} staffDay={staffDay}
        onBack={()=>setScreen('problem')} onNewCustomer={goHome}
        externalNote={globalNote} onExternalNote={setGlobalNote}
      />

      {/* LEADS */}
      {screen==='leads'&&<LeadsScreen onBack={goHome}/>}

      {/* ADMIN */}
      {screen==='admin'&&<AdminScreen onBack={()=>{setProbPhotos(loadProblemPhotos());goHome();}}/>}

      {/* POUR스토어 */}
      {screen==='store-category'&&(
        <StoreCategoryScreen
          staffId={staffId} staffName={staffName} staffDay={staffDay}
          onBack={goHome}
        />
      )}

      {/* 기술연구소 */}
      {screen==='tech-memo'&&(
        <TechMemoSheet
          staffId={staffId} staffName={staffName} staffDay={staffDay}
          onBack={goHome}
        />
      )}

      {/* ── 전역 FAB: 홈/어드민/스토어/그로홈/기술연구소 제외 ── */}
      {screen!=='home'&&screen!=='admin'&&screen!=='store-category'&&screen!=='tech-memo'&&(
        <div className="fab-wrap">
          <button className="fab fab-new" onClick={()=>setConfirmNew(true)} title="새 상담 시작">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span className="fab-label">새 상담</span>
          </button>
          <button className="fab fab-memo" onClick={()=>setGlobalNote(true)} title="영업 메모">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span className="fab-label">메모</span>
          </button>
        </div>
      )}

      {/* ── 전역 메모 시트 (솔루션 외 화면용) ── */}
      {/* ── 새 상담 확인 팝업 ── */}
      {confirmNew&&(
        <div className="confirm-overlay" onClick={()=>setConfirmNew(false)}>
          <div className="confirm-box" onClick={e=>e.stopPropagation()}>
            <div className="confirm-icon">🔄</div>
            <div className="confirm-title">새 상담을 시작할까요?</div>
            <div className="confirm-sub">현재 상담 내용이 초기화됩니다.<br/>영업 메모를 먼저 저장하셨나요?</div>
            <div className="confirm-btns">
              <button className="confirm-cancel" onClick={()=>setConfirmNew(false)}>취소</button>
              <button className="confirm-ok" onClick={()=>{setConfirmNew(false);goHome();}}>새 상담 시작</button>
            </div>
          </div>
        </div>
      )}

      {globalNote&&screen!=='solution'&&(
        <GlobalNoteSheet
          building={building} problem={problem}
          staffId={staffId} staffName={staffName} staffDay={staffDay}
          onClose={()=>setGlobalNote(false)}
        />
      )}

      {/* ── PIN 인증 모달 ── */}
      {showPinModal&&<PinModal mode={showPinModal} onSuccess={()=>{setAdminAuth(true);sessionStorage.setItem('pourAdminAuth','true');setShowPinModal(false);setScreen('admin');}} onClose={()=>setShowPinModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
