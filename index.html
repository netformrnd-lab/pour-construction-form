        </div>
          <div className="hdr-div"/><div className="hdr-sub">{building?.label} · 문제 선택</div>
          <div className="hdr-r"><button className="btn-back" onClick={()=>setScreen('building')}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>
        </div>
        <div className="content">
          {/* 헤더: 건물유형 + 카테고리 탭 한 줄 */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
            <span style={{padding:'5px 12px',background:'var(--navy)',color:'#fff',borderRadius:100,fontSize:12,fontWeight:700,flexShrink:0}}>{building?.icon} {building?.label}</span>
            {[...new Set(buildingProblems.map(p=>p.cat))].map(ct=>(
              <button key={ct} className={`tab ${cat===ct?'on':''}`} style={{padding:'5px 13px',fontSize:12}} onClick={()=>setCat(ct)}>{ct}</button>
            ))}
            {cat!=='전체'&&<button className="tab" style={{padding:'5px 13px',fontSize:12}} onClick={()=>setCat('전체')}>전체</button>}
          </div>
          {/* 3열 칩 그리드 — 한 화면 내 완성 */}
          <div className="prob-chips">
            {filtered.map(p=>(
              <button key={p.id} className="prob-chip" onClick={()=>{setProblem(p);setScreen('solution');}}>
                <div className="prob-chip-thumb">
                  {p.img?<img src={p.img} alt={p.label}/>:<span>{p.icon}</span>}
                </div>
                <div className="prob-chip-body">
                  <div className="prob-chip-text">{p.label}</div>
                  <div className="prob-chip-cat">{p.cat}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* SOLUTION */}
      <SolutionScreen
        visible={screen==='solution'}
        building={building} problem={problem}
        staffId={staffId} staffName={staffName} staffDay={staffDay}
        onBack={()=>setScreen('problem')} onNewCustomer={goHome}
        externalNote={globalNote} onExternalNote={setGlobalNote}
      />

      {/* LEADS */}
      {screen==='leads'&&<LeadsScreen onBack={goHome}/>}

      {/* ADMIN */}
      {screen==='admin'&&<AdminScreen onBack={goHome}/>}

      {/* ── 전역 FAB: 홈 제외 모든 화면 ── */}
      {screen!=='home'&&screen!=='admin'&&(
        <div className="fab-wrap">
          <button className="fab fab-new" onClick={()=>setConfirmNew(true)} title="새 상담 시작">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span className="fab-label">새 상담</span>
          </button>
          {/* 새 상담 FAB 위 툴팁 */}
          <button className="fab fab-memo" onClick={()=>setGlobalNote(true)} title="영업 메모">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span className="fab-label">메모</span>
          </button>
        </div>
      )}

      {/* ── 전역 메모 시트 (솔루션 외 화면용) ── */}
      {/* ── 새 상담 확인 팝업 ── */}
      {confirmNew&&(
        <div className="confirm-overlay" onClick={()=>setConfirmNew(false)}>
          <div className="confirm-box" onClick={e=>e.stopPropagation()}>
            <div className="confirm-icon">🔄</div>
            <div className="confirm-title">새 상담을 시작할까요?</div>
            <div className="confirm-sub">현재 상담 내용이 초기화됩니다.<br/>영업 메모를 먼저 저장하셨나요?</div>
            <div className="confirm-btns">
              <button className="confirm-cancel" onClick={()=>setConfirmNew(false)}>취소</button>
              <button className="confirm-ok" onClick={()=>{setConfirmNew(false);goHome();}}>새 상담 시작</button>
            </div>
          </div>
        </div>
      )}

      {globalNote&&screen!=='solution'&&(
        <GlobalNoteSheet
          building={building} problem={problem}
          staffId={staffId} staffName={staffName} staffDay={staffDay}
          onClose={()=>setGlobalNote(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
