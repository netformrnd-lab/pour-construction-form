/* ── PIN Change Modal ── */
function PinChangeModal({onClose,onDone}){
  const [current,setCurrent]=useState('');
  const [newPin,setNewPin]=useState('');
  const [confirm,setConfirm]=useState('');
  const [error,setError]=useState('');
  const handleChange=async()=>{
    const currentHash=await hashPin(current);
    if(currentHash!==loadAdminPin()){setError('현재 비밀번호가 틀렸습니다');return;}
    if(newPin.length<4){setError('4자리 이상 입력하세요');return;}
    if(newPin!==confirm){setError('새 비밀번호가 일치하지 않습니다');return;}
    const hash=await hashPin(newPin);
    saveAdminPin(hash);
    onDone();
  };
  const s={position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(6px)'};
  const b={background:'#fff',borderRadius:18,padding:'28px 24px',width:'min(340px,88vw)',boxShadow:'0 12px 40px rgba(0,0,0,.25)'};
  const i={width:'100%',padding:'12px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:16,fontWeight:700,textAlign:'center',letterSpacing:'.4em',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:8};
  return(
    <div style={s} onClick={onClose}>
      <div style={b} onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:'center',fontSize:17,fontWeight:800,marginBottom:16}}>🔑 비밀번호 변경</div>
        <input type="password" inputMode="numeric" value={current} onChange={e=>setCurrent(e.target.value.replace(/[^0-9]/g,''))} placeholder="현재 비밀번호" style={i} maxLength={8} autoFocus/>
        <input type="password" inputMode="numeric" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/[^0-9]/g,''))} placeholder="새 비밀번호" style={i} maxLength={8}/>
        <input type="password" inputMode="numeric" value={confirm} onChange={e=>setConfirm(e.target.value.replace(/[^0-9]/g,''))} placeholder="새 비밀번호 확인" style={i} maxLength={8} onKeyDown={e=>{if(e.key==='Enter')handleChange();}}/>
        {error&&<div style={{fontSize:12,color:'#DC2626',fontWeight:700,textAlign:'center',marginBottom:6}}>{error}</div>}
        <button onClick={handleChange} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:'var(--navy)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit',marginTop:4}}>변경하기</button>
        <button onClick={onClose} style={{width:'100%',padding:'11px',borderRadius:10,border:'1.5px solid var(--border)',background:'transparent',color:'var(--text-sm)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',marginTop:6}}>취소</button>
      </div>
    </div>
  );
}

/* ── PIN Modal ── */
function PinModal({mode,onSuccess,onClose}){
  const [pin,setPin]=useState('');
  const [pinConfirm,setPinConfirm]=useState('');
  const [error,setError]=useState('');
  const [failCount,setFailCount]=useState(0);
  const [locked,setLocked]=useState(false);
  const [lockTimer,setLockTimer]=useState(0);
  useEffect(()=>{if(lockTimer<=0){setLocked(false);return;}const t=setInterval(()=>setLockTimer(p=>{if(p<=1){setLocked(false);return 0;}return p-1;}),1000);return()=>clearInterval(t);},[lockTimer]);

  const handleSetup=async()=>{
    if(pin.length<4){setError('4자리 이상 입력하세요');return;}
    if(pin!==pinConfirm){setError('비밀번호가 일치하지 않습니다');return;}
    const hash=await hashPin(pin);
    saveAdminPin(hash);
    onSuccess();
  };
  const handleVerify=async()=>{
    if(locked)return;
    const hash=await hashPin(pin);
    if(hash===loadAdminPin()){setFailCount(0);onSuccess();}
    else{const next=failCount+1;setFailCount(next);if(next>=3){setLocked(true);setLockTimer(30);setError('3회 실패 — 30초 후 재시도');}else{setError(`비밀번호가 틀렸습니다 (${next}/3)`);}setPin('');}
  };

  const overlayStyle={position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(6px)'};
  const boxStyle={background:'#fff',borderRadius:18,padding:'32px 24px',width:'min(340px,88vw)',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.25)'};
  const inputStyle={width:'100%',padding:'14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:20,fontWeight:800,textAlign:'center',letterSpacing:'0.5em',outline:'none',fontFamily:'inherit',boxSizing:'border-box',marginBottom:8};
  const btnStyle={width:'100%',padding:'14px',borderRadius:10,border:'none',background:'var(--navy)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit',marginTop:8};

  return(
    <div style={overlayStyle} onClick={onClose}>
      <div style={boxStyle} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:32,marginBottom:8}}>{mode==='setup'?'🔐':'🔒'}</div>
        <div style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>{mode==='setup'?'관리자 비밀번호 설정':'관리자 인증'}</div>
        <div style={{fontSize:12,color:'var(--text-sm)',marginBottom:18}}>{mode==='setup'?'4자리 이상 숫자를 입력하세요':'비밀번호를 입력하세요'}</div>
        <input type="password" inputMode="numeric" value={pin} onChange={e=>setPin(e.target.value.replace(/[^0-9]/g,''))} placeholder="비밀번호" style={inputStyle} autoFocus maxLength={8} onKeyDown={e=>{if(e.key==='Enter'){mode==='setup'?undefined:handleVerify();}}}/>
        {mode==='setup'&&<input type="password" inputMode="numeric" value={pinConfirm} onChange={e=>setPinConfirm(e.target.value.replace(/[^0-9]/g,''))} placeholder="비밀번호 확인" style={inputStyle} maxLength={8} onKeyDown={e=>{if(e.key==='Enter')handleSetup();}}/>}
        {error&&<div style={{fontSize:12,color:'#DC2626',fontWeight:700,marginBottom:4}}>{error}</div>}
        {locked&&<div style={{fontSize:11,color:'var(--text-sm)',marginBottom:4}}>{lockTimer}초 후 재시도 가능</div>}
        <button style={{...btnStyle,opacity:locked?0.5:1}} disabled={locked} onClick={mode==='setup'?handleSetup:handleVerify}>{mode==='setup'?'설정 완료':'확인'}</button>
        <button style={{...btnStyle,background:'transparent',color:'var(--text-sm)',border:'1.5px solid var(--border)',marginTop:6}} onClick={onClose}>취소</button>
      </div>
    </div>
  );
}

        <div className="hdr">
          <div className="hdr-brand">
          <img src="/logo-pour.png" alt="Netform R&D" style={{height:'32px',width:'auto',display:'block',filter:'brightness(0) invert(1)'}}/>
        </div>
          <div className="hdr-div"/><div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><div className="hdr-sub" style={{margin:0}}>공법 선택</div><div style={{display:'flex',gap:4,marginLeft:12}}>{[2,3].map(n=>(<button key={n} onClick={()=>{setGridCols(n);localStorage.setItem('pourGridCols',n);}} style={{width:28,height:28,borderRadius:6,border:`1.5px solid ${gridCols===n?'var(--accent)':'var(--border)'}`,background:gridCols===n?'var(--accent-l)':'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}><svg width="14" height="14" viewBox="0 0 16 16" fill={gridCols===n?'var(--accent)':'var(--text-sm)'}>{n===2?<><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></>:<><rect x="0" y="0" width="4" height="4" rx="1"/><rect x="6" y="0" width="4" height="4" rx="1"/><rect x="12" y="0" width="4" height="4" rx="1"/><rect x="0" y="6" width="4" height="4" rx="1"/><rect x="6" y="6" width="4" height="4" rx="1"/><rect x="12" y="6" width="4" height="4" rx="1"/><rect x="0" y="12" width="4" height="4" rx="1"/><rect x="6" y="12" width="4" height="4" rx="1"/><rect x="12" y="12" width="4" height="4" rx="1"/></>}</svg></button>))}</div></div>
          <div className="hdr-r"><button className="btn-back" onClick={goHome}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg></button></div>
        </div>
        <div className="content">
          {/* 카테고리 탭 */}
          <div className="tabs" style={{marginBottom:14}}>
            {CATS.map(ct=>(
              <button key={ct} className={`tab ${cat===ct?'on':''}`} style={{padding:'5px 13px',fontSize:12}} onClick={()=>setCat(ct)}>{ct}</button>
            ))}
          </div>
          {/* 공법 카드 그리드 */}
          <div style={{display:'grid',gridTemplateColumns:`repeat(${gridCols},1fr)`,gap:gridCols===3?8:10,paddingBottom:8}}>
            {filtered.map(p=>(
              <button key={p.id} style={{display:'flex',flexDirection:'column',background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:12,cursor:'pointer',textAlign:'left',fontFamily:'inherit',overflow:'hidden',transition:'all .13s',padding:0}} onClick={()=>{setProblem(p);setScreen('solution');}}>
                <div style={{width:'100%',aspectRatio:'4/3',background:'linear-gradient(135deg,var(--blue-l),var(--blue-m))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,position:'relative',flexShrink:0}}>
                  {(probPhotos[p.id]||p.img)?<img src={probPhotos[p.id]||p.img} alt={p.label} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain',background:'#f3f4f6'}}/>:<span>{p.icon}</span>}
                </div>
                <div style={{padding:'8px 10px 10px'}}>
                  <div style={{fontSize:10,fontWeight:600,color:'var(--text-sm)'}}>{p.sub}</div>
                  <div style={{fontSize:12,fontWeight:800,color:'var(--text)',lineHeight:1.3,marginTop:2}}>{p.label}</div>
                  {p.tags&&<div style={{fontSize:9,color:'var(--text-sm)',marginTop:4,lineHeight:1.5}}>{p.tags.slice(0,2).join(' ')}</div>}
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* SOLUTION */}
      <SolutionScreen
        visible={screen==='solution'}
        building={building} problem={problem}
        staffId={staffId} staffName={staffName} staffDay={staffDay}
        onBack={()=>setScreen('problem')} onNewCustomer={goHome}
        externalNote={globalNote} onExternalNote={setGlobalNote} onNoteChange={setSolutionNoteOpen}
      />

      {/* LEADS */}
      {screen==='leads'&&<LeadsScreen onBack={goHome}/>}

      {/* ADMIN */}
      {screen==='admin'&&<AdminScreen onBack={()=>{setProbPhotos(loadProblemPhotos());goHome();}}/>}

      {/* POUR스토어 */}
      {screen==='store-category'&&(
        <StoreCategoryScreen
          staffId={staffId} staffName={staffName} staffDay={staffDay}
          onBack={goHome}
        />
      )}

      {/* 기술연구소 */}
      {screen==='tech-memo'&&(
        <TechMemoSheet
          staffId={staffId} staffName={staffName} staffDay={staffDay}
          onBack={goHome}
        />
      )}

      {/* ── 전역 FAB: 홈/어드민/스토어/그로홈/기술연구소 제외 ── */}
      {screen!=='home'&&screen!=='admin'&&screen!=='store-category'&&screen!=='tech-memo'&&!globalNote&&!(solutionNoteOpen&&screen==='solution')&&(
        <div className="fab-wrap">
          <button className="fab fab-new" onClick={()=>setConfirmNew(true)} title="새 상담 시작">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span className="fab-label">새 상담</span>
          </button>
          <button className="fab fab-memo" onClick={()=>setGlobalNote(true)} title="영업 메모">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span className="fab-label">메모</span>
          </button>
        </div>
      )}

      {/* ── 전역 메모 시트 (솔루션 외 화면용) ── */}
      {/* ── 새 상담 확인 팝업 ── */}
      {confirmNew&&(
        <div className="confirm-overlay" onClick={()=>setConfirmNew(false)}>
          <div className="confirm-box" onClick={e=>e.stopPropagation()}>
            <div className="confirm-icon">🔄</div>
            <div className="confirm-title">새 상담을 시작할까요?</div>
            <div className="confirm-sub">현재 상담 내용이 초기화됩니다.<br/>영업 메모를 먼저 저장하셨나요?</div>
            <div className="confirm-btns">
              <button className="confirm-cancel" onClick={()=>setConfirmNew(false)}>취소</button>
              <button className="confirm-ok" onClick={()=>{setConfirmNew(false);goHome();}}>새 상담 시작</button>
            </div>
          </div>
        </div>
      )}

      {globalNote&&screen!=='solution'&&(
        <GlobalNoteSheet
          building={building} problem={problem}
          staffId={staffId} staffName={staffName} staffDay={staffDay}
          onClose={()=>setGlobalNote(false)}
        />
      )}

      {/* ── PIN 인증 모달 ── */}
      {showPinModal&&<PinModal mode={showPinModal} onSuccess={()=>{setAdminAuth(true);sessionStorage.setItem('pourAdminAuth','true');setShowPinModal(false);setScreen('admin');}} onClose={()=>setShowPinModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

/* ── DEV 모드 배지 (Preview 배포 시 화면 좌하단 표시) ── */
if(IS_PREVIEW){
  const badge=document.createElement('div');
  badge.innerHTML='🔧 DEV';
  Object.assign(badge.style,{position:'fixed',bottom:'8px',left:'8px',background:'#E8780F',color:'#fff',fontSize:'11px',fontWeight:'800',padding:'4px 10px',borderRadius:'6px',zIndex:'99999',opacity:'0.85',pointerEvents:'none',fontFamily:'Pretendard,sans-serif'});
  document.body.appendChild(badge);
}
</script>

  navigator.serviceWorker.register('/sw.js').then(()=>console.log('[PWA] SW 등록 완료')).catch(e=>console.warn('[PWA] SW 등록 실패:',e));
}
</script>
</body>
</html>
