<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>POUR스토어 | 시공 후 설문</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain:"pour-app-new.firebaseapp.com",
  projectId:"pour-app-new",
  storageBucket:"pour-app-new.firebasestorage.app",
  messagingSenderId:"411031141847",
  appId:"1:411031141847:web:e658174fd4b9652cdadf92"
});
const db=firebase.firestore();
</script>
<style>
:root{--brand:#059669;--brand-d:#047857;--brand-l:#ECFDF5;--brand-m:#A7F3D0;--navy:#0F1F3A;--text:#1E293B;--text-md:#64748B;--text-sm:#94A3B8;--bg:#F8FAFC;--card:#FFF;--border:#E2E8F0;--r:14px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}
.wrap{max-width:480px;margin:0 auto;padding:0 0 60px;}
/* ── 헤더 ── */
.hero{background:linear-gradient(135deg,#047857 0%,#059669 55%,#10B981 100%);padding:34px 22px 30px;color:#fff;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;right:-30px;bottom:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08);}
.hero-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;background:rgba(255,255,255,.18);padding:5px 11px;border-radius:20px;margin-bottom:14px;}
.hero h1{font-size:23px;font-weight:800;letter-spacing:-.03em;line-height:1.35;}
.hero p{margin-top:10px;font-size:13px;color:rgba(255,255,255,.82);line-height:1.65;}
/* ── 카드 ── */
.card{background:var(--card);margin:16px 14px 0;border-radius:var(--r);border:1px solid var(--border);padding:20px 18px;box-shadow:0 2px 10px rgba(15,31,58,.05);}
.q-no{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;background:var(--brand-l);color:var(--brand-d);font-size:12px;font-weight:800;margin-right:8px;}
.q-title{font-size:15.5px;font-weight:700;color:var(--text);line-height:1.5;display:flex;align-items:flex-start;}
.q-title .req{color:#EF4444;font-size:13px;margin-left:4px;}
.q-sub{font-size:12px;color:var(--text-sm);margin:6px 0 0 30px;line-height:1.5;}
/* ── 5점 척도 ── */
.scale{display:flex;gap:7px;margin-top:16px;}
.scale-btn{flex:1;aspect-ratio:1/1;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-size:17px;font-weight:800;color:var(--text-md);cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.scale-btn:active{transform:scale(.94);}
.scale-btn.on{border-color:var(--brand);background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(5,150,105,.28);}
.scale-ends{display:flex;justify-content:space-between;margin-top:9px;font-size:11px;color:var(--text-sm);font-weight:500;padding:0 2px;}
/* ── 칩 ── */
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;}
.chip{flex:1 1 auto;min-width:calc(33% - 6px);padding:13px 10px;border-radius:11px;border:1.5px solid var(--border);background:var(--card);font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--text);text-align:center;}
.chip:active{transform:scale(.96);}
.chip.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand-d);}
.chip-col{flex-direction:column;}
.chip-col .chip{flex:none;min-width:0;width:100%;text-align:left;padding:14px 16px;}
/* ── 입력 ── */
.ta{width:100%;margin-top:14px;padding:13px 14px;border-radius:11px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:var(--card);outline:none;font-family:inherit;resize:vertical;min-height:96px;line-height:1.6;}
.ta:focus{border-color:var(--brand);}
.fi{width:100%;padding:12px 14px;border-radius:11px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:var(--card);outline:none;font-family:inherit;}
.fi:focus{border-color:var(--brand);}
.fl{font-size:12px;font-weight:700;color:var(--text-md);margin-bottom:7px;display:block;}
.fg{margin-top:14px;}
.opt{font-size:11px;font-weight:600;color:var(--text-sm);}
/* ── 버튼 ── */
.btn{width:calc(100% - 28px);margin:20px 14px 0;padding:16px;border-radius:13px;border:none;background:var(--brand);color:#fff;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .2s;box-shadow:0 6px 18px rgba(5,150,105,.25);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.privacy{font-size:10.5px;color:var(--text-sm);text-align:center;margin:14px 24px 0;line-height:1.6;}
/* ── 완료 ── */
.done{text-align:center;padding:60px 26px;}
.done-emoji{font-size:56px;margin-bottom:16px;}
.done-title{font-size:22px;font-weight:800;margin-bottom:10px;color:var(--navy);}
.done-sub{font-size:14px;color:var(--text-md);line-height:1.7;}
.done-nps{display:inline-flex;align-items:center;gap:6px;margin-top:22px;padding:9px 16px;border-radius:22px;background:var(--brand-l);color:var(--brand-d);font-size:13px;font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

const RECOMMEND_ENDS=['매우 아니다','매우 그렇다'];
const SATISFY_ENDS=['매우 불만족','매우 만족'];
const AMOUNT_OPTS=['남았어요','딱 맞았어요','모자랐어요'];
const HARD_OPTS=['도구 사용','자재 바르는 법','시간·체력','자재 부족','기타'];

// 5점 추천의향 → NPS 카테고리·0~10 환산 (기존 nps-surveys 리포팅 호환)
function toCategory(v){ return v>=5?'promoter':v>=4?'passive':'detractor'; }
function toScore10(v){ return Math.round((v-1)/4*10); } // 1→0,2→3,3→5,4→8,5→10

function Scale({value,onChange,ends}){
  return(
    <div>
      <div className="scale">
        {[1,2,3,4,5].map(n=>(
          <button key={n} type="button" className={`scale-btn ${value===n?'on':''}`} onClick={()=>onChange(n)}>{n}</button>
        ))}
      </div>
      <div className="scale-ends"><span>{ends[0]}</span><span>{ends[1]}</span></div>
    </div>
  );
}

function App(){
  const [recommend,setRecommend]=useState(null);
  const [satisfy,setSatisfy]=useState(null);
  const [amount,setAmount]=useState('');
  const [hard,setHard]=useState('');
  const [feedback,setFeedback]=useState('');
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);

  const save=async()=>{
    if(recommend===null){alert('1번 문항(추천 의향)을 선택해주세요.');window.scrollTo({top:0,behavior:'smooth'});return;}
    if(satisfy===null){alert('2번 문항(만족도)을 선택해주세요.');return;}
    if(!amount){alert('3번 문항(자재 양)을 선택해주세요.');return;}
    setSaving(true);
    try{
      await db.collection('nps-surveys').add({
        campaign:'store-post-construction',
        surveyType:'store',
        brand:'store',
        brandName:'POUR스토어',
        // 원본 응답
        recommendScore:recommend,      // 1~5 (Q1 추천 의향)
        satisfactionScore:satisfy,     // 1~5 (Q2 만족도)
        materialAmount:amount,         // Q3 자재 양
        difficulty:hard||'',           // Q4 힘들었던 점
        feedback:feedback.trim(),      // Q5 서술형
        // NPS 리포팅 호환 필드
        score:toScore10(recommend),
        category:toCategory(recommend),
        goodFactors:[],
        badFactors:hard?[hard]:[],
        createdAt:new Date().toISOString(),
        source:'nps-store',
      });
      console.log('[nps-store] 설문 제출 완료 · recommend:',recommend,'satisfy:',satisfy);
      setDone(true);
      window.scrollTo({top:0,behavior:'smooth'});
    }catch(e){
      console.error('[nps-store] 제출 실패:',e);
      alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    }
    setSaving(false);
  };

  if(done)return(
    <div className="wrap"><div className="done">
      <div className="done-emoji">🎉</div>
      <div className="done-title">소중한 의견 감사합니다!</div>
      <div className="done-sub">보내주신 답변은 더 쉽고 오래가는<br/>POUR스토어 자재와 가이드를 만드는 데<br/>소중하게 사용됩니다.</div>
      <div className="done-nps">🎁 기프티콘 추첨은 패키지 구매 고객 대상으로 진행돼요</div>
    </div></div>
  );

  return(
    <div className="wrap">
      <div className="hero">
        <span className="hero-badge">POUR스토어 · 시공 후 설문</span>
        <h1>셀프시공, 어떠셨나요?</h1>
        <p>1분이면 충분해요. 여러분의 솔직한 후기가<br/>다음 시공을 더 쉽게 만듭니다.</p>
      </div>

      {/* Q1 추천 의향 (NPS) */}
      <div className="card">
        <div className="q-title"><span className="q-no">1</span>POUR스토어를 주변에 추천하고 싶으세요?<span className="req">*</span></div>
        <Scale value={recommend} onChange={setRecommend} ends={RECOMMEND_ENDS}/>
      </div>

      {/* Q2 만족도 */}
      <div className="card">
        <div className="q-title"><span className="q-no">2</span>시공 결과에 만족하세요?<span className="req">*</span></div>
        <Scale value={satisfy} onChange={setSatisfy} ends={SATISFY_ENDS}/>
      </div>

      {/* Q3 자재 양 */}
      <div className="card">
        <div className="q-title"><span className="q-no">3</span>받으신 자재 양은 어땠나요?<span className="req">*</span></div>
        <div className="chips">
          {AMOUNT_OPTS.map(o=>(
            <button key={o} type="button" className={`chip ${amount===o?'on':''}`} onClick={()=>setAmount(o)}>{o}</button>
          ))}
        </div>
      </div>

      {/* Q4 힘들었던 점 */}
      <div className="card">
        <div className="q-title"><span className="q-no">4</span>시공하면서 가장 힘들었던 점은 무엇이었나요?</div>
        <div className="q-sub">해당하는 항목을 하나 골라주세요</div>
        <div className="chips chip-col">
          {HARD_OPTS.map(o=>(
            <button key={o} type="button" className={`chip ${hard===o?'on':''}`} onClick={()=>setHard(hard===o?'':o)}>{o}</button>
          ))}
        </div>
      </div>

      {/* Q5 서술형 */}
      <div className="card">
        <div className="q-title"><span className="q-no">5</span>하고 싶은 말이나 문의사항을 자유롭게 남겨주세요.</div>
        <textarea className="ta" placeholder="예) 옥상 방수 하고 나서 누수가 멈췄어요! / 자재가 조금 모자랐어요 / 문의사항이 있어요" value={feedback} onChange={e=>setFeedback(e.target.value)}/>
      </div>

      <button className="btn" disabled={saving} onClick={save}>{saving?'제출 중...':'설문 제출하기'}</button>
      <div className="privacy">🎁 기프티콘 추첨은 패키지 구매 고객 대상 · 별도 연락처 입력은 필요 없어요.<br/>수집된 응답은 서비스 개선 목적으로만 활용됩니다.</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
