<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POUR 스토어 로고</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .logo-wrap {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
      <defs>
        <!--
          원호 텍스트 경로:
          상단 반원 (반시계 방향 → 왼쪽 시작)
          중심 (250,250), 반지름 172
          시작점: 좌측 (78, 250) → 상단 → 우측 (422, 250)
        -->
        <path id="arcTop"
          d="M 78,250 A 172,172 0 1,1 422,250"/>

        <!-- 내부 원 클립 -->
        <clipPath id="innerClip">
          <circle cx="250" cy="250" r="172"/>
        </clipPath>
      </defs>

      <!-- ===== 1. 외곽 네이비 원 ===== -->
      <circle cx="250" cy="250" r="210" fill="#1b2d5e"/>

      <!-- ===== 2. 내부 흰색 원 ===== -->
      <circle cx="250" cy="250" r="172" fill="white"/>

      <!-- ===== 3. 하단 배너 ===== -->
      <g clip-path="url(#innerClip)">
        <rect x="0" y="360" width="500" height="165" fill="#1b2d5e"/>
      </g>
      <!-- 배너 상단 흰 구분선 -->
      <path d="M 78,360 A 172,172 0 0,0 422,360"
            fill="none" stroke="white" stroke-width="3"/>

      <!-- ===== 4. 페인트 붓 (왼쪽, 집 뒤) ===== -->
      <!-- 원본: 붓이 약 -25도 기울어져 왼쪽 상단에서 오른쪽 하단 방향 -->
      <g transform="rotate(-25, 190, 195)">
        <!-- 손잡이 (네이비) -->
        <rect x="180" y="52" width="20" height="132" rx="7" fill="#1b2d5e"/>
        <!-- 페룰 (회색) -->
        <rect x="177" y="181" width="26" height="16" rx="3" fill="#8fa0b8"/>
        <!-- 붓 털 (오렌지 사다리꼴) -->
        <polygon points="174,197 167,274 213,274 206,197" fill="#c95214"/>
        <!-- 붓 털 끝 (어두운 오렌지) -->
        <ellipse cx="190" cy="273" rx="23" ry="10" fill="#a84010"/>
      </g>

      <!-- ===== 5. 집 아이콘 ===== -->
      <!-- 지붕 오렌지 삼각형 -->
      <polygon points="110,250 250,150 290,250" fill="#c95214"/>
      <polygon points="110,250 250,150 290,250"
               fill="none" stroke="#1b2d5e" stroke-width="5" stroke-linejoin="round"/>

      <!-- 집 몸체 흰색 -->
      <rect x="133" y="250" width="157" height="118" fill="white"/>
      <rect x="133" y="250" width="157" height="118"
            fill="none" stroke="#1b2d5e" stroke-width="5"/>

      <!-- 지붕 내부 흰색 삼각형 -->
      <polygon points="133,250 250,168 278,250" fill="white"/>
      <polygon points="133,250 250,168 278,250"
               fill="none" stroke="#1b2d5e" stroke-width="4"/>

      <!-- 오른쪽 오렌지 기둥 -->
      <rect x="263" y="250" width="27" height="118" fill="#c95214"/>

      <!-- 창문 (네이비 4분할) -->
      <rect x="147" y="265" width="50" height="48" fill="#1b2d5e"/>
      <line x1="172" y1="265" x2="172" y2="313" stroke="white" stroke-width="4"/>
      <line x1="147" y1="289" x2="197" y2="289" stroke="white" stroke-width="4"/>

      <!-- ===== 6. 페인트 롤러 (오른쪽, 집 앞) ===== -->
      <!-- 원본: 롤러가 약 -10도 기울어져 오른쪽 상단에 위치 -->
      <g transform="rotate(-10, 335, 190)">
        <!-- 롤러 헤드 (오렌지 원통) -->
        <rect x="292" y="105" width="90" height="36" rx="18" fill="#c95214"/>
        <rect x="292" y="105" width="90" height="36" rx="18"
              fill="none" stroke="#1b2d5e" stroke-width="3"/>
        <!-- 롤러 연결 세로 막대 -->
        <rect x="318" y="139" width="14" height="62" rx="5" fill="#1b2d5e"/>
        <!-- 가로 막대 -->
        <rect x="278" y="193" width="54" height="14" rx="5" fill="#1b2d5e"/>
        <!-- 손잡이 세로 막대 -->
        <rect x="278" y="207" width="14" height="52" rx="5" fill="#1b2d5e"/>
      </g>

      <!-- ===== 7. 상단 원호 텍스트 ===== -->
      <!--
        원본: "도장 ● 방수 ● 균열보수" 가 상단 원호를 따라 균등하게 배치
        startOffset을 조정하여 중앙 정렬 효과
      -->
      <text font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif"
            font-size="20" fill="white" font-weight="700" letter-spacing="2.5">
        <textPath href="#arcTop" startOffset="50%" text-anchor="middle">도장 ● 방수 ● 균열보수</textPath>
      </text>

      <!-- ===== 8. 하단 배너 텍스트 ===== -->
      <text x="250" y="402"
        text-anchor="middle"
        font-family="'Noto Sans KR', 'Malgun Gothic', Arial Black, sans-serif"
        font-size="35" font-weight="900" fill="white" letter-spacing="3">POUR 스토어</text>

      <!-- ===== 9. 원 테두리 ===== -->
      <circle cx="250" cy="250" r="210" fill="none" stroke="white" stroke-width="2.5"/>
      <circle cx="250" cy="250" r="172" fill="none" stroke="#1b2d5e" stroke-width="4"/>
    </svg>
  </div>
</body>
</html>
