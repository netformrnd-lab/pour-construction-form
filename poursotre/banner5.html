<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>배너5 — 로고+슬로건 (4,500×1,500mm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --or:#E8780F; --or2:#F49A3A;
  --navy:#0F1F5C; --ink:#111827; --white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#CBD5E1;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px;font-family:'Noto Sans KR','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

.W-scaler{transform-origin:top left;}

/* ══ Canvas: 4500×1500 → 2250×750px (1:2) ══ */
.W{
  width:2250px;height:750px;background:var(--navy);
  background-image:
    linear-gradient(rgba(255,255,255,0.028) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.028) 1px,transparent 1px);
  background-size:90px 90px;
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
}

/* 배경 장식 */
.W::before{content:'';position:absolute;top:-300px;right:-200px;width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(232,120,15,0.09) 0%,transparent 60%);pointer-events:none;}
.W::after{content:'';position:absolute;bottom:-200px;left:-100px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,120,15,0.05) 0%,transparent 60%);pointer-events:none;}
.bg-circle-1{position:absolute;top:50%;left:15%;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.015);transform:translateY(-50%);pointer-events:none;}
.bg-circle-2{position:absolute;top:50%;right:15%;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,0.015);transform:translateY(-50%);pointer-events:none;}

/* 전체 레이아웃 */
.layout{display:flex;align-items:center;width:100%;height:100%;padding:0 120px;position:relative;z-index:1;gap:0;}

/* ── 왼쪽: 로고 ── */
.logo-section{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.logo-img{height:320px;width:auto;filter:drop-shadow(0 8px 32px rgba(0,0,0,0.35));}
.logo-sub{font-size:13px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:4px;text-transform:uppercase;}

/* ── 구분선 ── */
.vert-divider{width:1px;height:320px;background:linear-gradient(180deg,transparent 0%,rgba(232,120,15,0.6) 40%,rgba(232,120,15,0.6) 60%,transparent 100%);margin:0 80px;flex-shrink:0;}

/* ── 오른쪽: 슬로건 + 통계 ── */
.text-section{flex:1;display:flex;flex-direction:column;gap:0;}

.pre-label{font-size:13px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:4px;text-transform:uppercase;margin-bottom:16px;}
.pre-label em{font-style:normal;color:var(--or);opacity:0.8;}

.slogan-main{font-size:66px;font-weight:900;color:#fff;line-height:1.12;letter-spacing:-1.5px;}
.slogan-main em{font-style:normal;color:var(--or2);}
.slogan-main .line2{font-size:58px;color:rgba(255,255,255,0.92);}

.slogan-sub{font-size:18px;font-weight:400;color:rgba(255,255,255,0.4);margin-top:14px;letter-spacing:0.3px;}

/* 구분선 */
.h-rule{width:100%;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.12) 0%,transparent 80%);margin:28px 0;}

/* 통계 */
.stats{display:flex;gap:0;}
.stat{display:flex;flex-direction:column;padding:0 44px;}
.stat:first-child{padding-left:0;}
.stat+.stat{border-left:1px solid rgba(255,255,255,0.1);}
.stat-num{font-size:46px;font-weight:900;color:var(--or2);font-family:'Arial Black',sans-serif;line-height:1;}
.stat-label{font-size:12px;color:rgba(255,255,255,0.38);margin-top:6px;letter-spacing:0.3px;}

/* 하단 오렌지 라인 */
.bottom-line{position:absolute;bottom:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--or) 0%,var(--or2) 60%,transparent 100%);z-index:10;}

/* 박람회 */
.expo-info{position:absolute;bottom:22px;right:120px;display:flex;align-items:center;gap:14px;z-index:1;}
.expo-text{font-size:11px;color:rgba(255,255,255,0.28);text-align:right;line-height:1.4;letter-spacing:0.3px;}
.expo-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.18);}

/* ── 유틸 ── */
#save-btn{position:fixed;top:10px;right:10px;z-index:9999;padding:8px 16px;background:var(--or);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-family:inherit;}
#view-toggle{position:fixed;top:10px;left:10px;z-index:9999;padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;display:none;}
</style>
</head>
<body>
<div class="W-scaler">
<div class="W">
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>

  <div class="layout">
    <!-- 로고 -->
    <div class="logo-section">
      <img class="logo-img" src="1.배경x_로고.png" alt="POUR스토어">
      <span class="logo-sub">POUR STORE</span>
    </div>

    <div class="vert-divider"></div>

    <!-- 슬로건 + 통계 -->
    <div class="text-section">
      <div class="pre-label"><em>POUR스토어</em>가 제공하는</div>

      <div class="slogan-main">
        <em>쉽고 오래가는</em><br>
        <span class="line2">건축물 유지보수 자재의 모든것</span>
      </div>
      <div class="slogan-sub">한 번 시공해 본 현장은 다시 찾습니다</div>

      <div class="h-rule"></div>

      <div class="stats">
        <div class="stat">
          <span class="stat-num">260만+</span>
          <span class="stat-label">시공된 건물 세대 수</span>
        </div>
        <div class="stat">
          <span class="stat-num">150만+</span>
          <span class="stat-label">누적 판매 수</span>
        </div>
        <div class="stat">
          <span class="stat-num">250+</span>
          <span class="stat-label">협력 파트너 수</span>
        </div>
        <div class="stat">
          <span class="stat-num">70여+</span>
          <span class="stat-label">국가 등록 특허</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 박람회 정보 -->
  <div class="expo-info">
    <span class="expo-text">공동주택관리산업박람회</span>
    <span class="expo-dot"></span>
    <span class="expo-text">BEXCO 벡스코</span>
    <span class="expo-dot"></span>
    <span class="expo-text">2026.04.16 – 18</span>
  </div>

  <div class="bottom-line"></div>
</div>
</div>

<button id="view-toggle">🔍 확대 보기</button>
<button id="save-btn">📷 PNG 저장</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
  var CANVAS_W = 2250, CANVAS_H = 750;
  var isFit = true;
  var btn = document.getElementById('view-toggle');
  var scaler = document.querySelector('.W-scaler');

  function applyFit(){
    isFit = true;
    var s = window.innerWidth / CANVAS_W;
    scaler.style.transform = 'scale('+s+')';
    scaler.style.transformOrigin = 'top left';
    scaler.style.width = CANVAS_W + 'px';
    scaler.style.marginBottom = (CANVAS_H * s - CANVAS_H) + 'px';
    document.body.style.padding = '0';
    document.body.style.justifyContent = 'flex-start';
    document.documentElement.style.overflowX = 'hidden';
    document.body.style.overflowX = 'hidden';
    btn.textContent = '🔍 확대 보기';
  }

  function applyFull(){
    isFit = false;
    scaler.style.transform = 'none';
    scaler.style.width = '';
    scaler.style.marginBottom = '0';
    document.body.style.padding = '16px';
    document.body.style.justifyContent = 'flex-start';
    document.documentElement.style.overflowX = 'auto';
    document.body.style.overflowX = 'auto';
    btn.textContent = '🔎 전체 보기';
  }

  function init(){
    if(window.innerWidth < CANVAS_W + 60){
      applyFit();
      btn.style.display = 'inline-block';
    } else {
      applyFull();
      btn.style.display = 'none';
    }
  }

  btn.addEventListener('click', function(){ if(isFit) applyFull(); else applyFit(); });
  init();
  window.addEventListener('resize', init);
})();

document.getElementById('save-btn').addEventListener('click', function(){
  var b = this; b.textContent = '⏳ 저장 중...'; b.style.pointerEvents = 'none';
  html2canvas(document.querySelector('.W'), {
    scale: 5, useCORS: true, allowTaint: true, backgroundColor: '#0F1F5C', width: 2250, height: 750
  }).then(function(c){
    var a = document.createElement('a');
    a.download = '배너5_로고슬로건_' + new Date().toISOString().slice(0,10) + '.png';
    a.href = c.toDataURL('image/png'); a.click();
    b.textContent = '📷 PNG 저장'; b.style.pointerEvents = 'auto';
  }).catch(function(e){alert('실패: '+e.message);b.textContent='📷 PNG 저장';b.style.pointerEvents='auto';});
});
</script>
</body>
</html>
