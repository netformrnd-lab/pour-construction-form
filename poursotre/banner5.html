<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>배너5 — 로고+슬로건 (4,500×1,500mm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --or:#E8780F; --or2:#F49A3A;
  --navy:#0F1F5C; --ink:#111827; --white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#CBD5E1;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px;font-family:'Noto Sans KR','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;}

.W-scaler{transform-origin:top left;}

/* ══ Canvas: 4500×1500 → 2250×750px (1:2) ══ */
.W{width:2250px;height:750px;background:var(--navy);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* 배경 장식 원 */
.W::before{content:'';position:absolute;top:-120px;right:-120px;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none;}
.W::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.03);pointer-events:none;}

/* 중앙 콘텐츠 */
.content{display:flex;flex-direction:column;align-items:center;gap:24px;position:relative;z-index:1;}

/* 로고 */
.logo-area{display:flex;align-items:flex-end;gap:12px;}
.logo-bars{display:flex;align-items:flex-end;gap:6px;height:70px;}
.logo-bars span{display:block;background:var(--or);border-radius:4px;}
.logo-bars span:nth-child(1){width:12px;height:42px;}
.logo-bars span:nth-child(2){width:12px;height:55px;}
.logo-bars span:nth-child(3){width:12px;height:70px;}
.logo-bars span:nth-child(4){width:12px;height:50px;}
.logo-text{display:flex;flex-direction:column;}
.logo-text .main{font-size:60px;font-weight:900;color:#fff;letter-spacing:6px;line-height:1;}
.logo-text .sub{font-size:18px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:10px;margin-top:2px;}

/* 구분선 */
.divider{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--or),transparent);}

/* 슬로건 */
.slogan{text-align:center;}
.slogan-main{font-size:36px;font-weight:900;color:#fff;letter-spacing:-0.5px;line-height:1.3;}
.slogan-main em{font-style:normal;color:var(--or2);}
.slogan-sub{font-size:16px;font-weight:400;color:rgba(255,255,255,0.55);margin-top:8px;letter-spacing:1px;}

/* 하단 오렌지 라인 */
.bottom-line{position:absolute;bottom:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--or) 0%,var(--or2) 100%);z-index:10;}

/* ── 유틸 버튼 ── */
#save-btn{position:fixed;top:10px;right:10px;z-index:9999;padding:8px 16px;background:var(--or);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-family:inherit;}
#view-toggle{position:fixed;top:10px;left:10px;z-index:9999;padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;display:none;}
</style>
</head>
<body>
<div class="W-scaler">
<div class="W">
  <div class="content">
    <div class="logo-area">
      <div class="logo-bars"><span></span><span></span><span></span><span></span></div>
      <div class="logo-text">
        <div class="main">POUR</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="slogan">
      <div class="slogan-main"><em>건물의 수명</em>을 바꾸는 자재</div>
      <div class="slogan-sub">260만 세대가 선택한 검증된 방수 · 보수 솔루션</div>
    </div>
  </div>
  <div class="bottom-line"></div>
</div>
</div>

<button id="view-toggle">🔍 확대 보기</button>
<button id="save-btn">📷 PNG 저장</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
  var CANVAS_W = 2250, CANVAS_H = 750;
  var isFit = true;
  var btn = document.getElementById('view-toggle');
  var scaler = document.querySelector('.W-scaler');

  function applyFit(){
    var vw = window.innerWidth;
    var s = vw / CANVAS_W;
    scaler.style.transform = 'scale('+s+')';
    scaler.style.transformOrigin = 'top left';
    scaler.style.width = CANVAS_W + 'px';
    scaler.style.marginBottom = (CANVAS_H * s - CANVAS_H) + 'px';
    document.body.style.padding = '0';
    document.body.style.justifyContent = 'flex-start';
    document.body.style.alignItems = 'flex-start';
  }
  function applyFull(){
    scaler.style.transform = 'none';
    scaler.style.width = '';
    scaler.style.marginBottom = '0';
    document.body.style.padding = '24px';
    document.body.style.justifyContent = 'center';
    document.body.style.alignItems = 'flex-start';
  }
  function init(){
    if(window.innerWidth < CANVAS_W + 60){
      applyFit();isFit=true;btn.style.display='inline-block';btn.textContent='🔍 원본 보기';
    }else{applyFull();isFit=false;btn.style.display='none';}
  }
  btn.addEventListener('click', function(){isFit=!isFit;isFit?applyFit():applyFull();});
  init();
  window.addEventListener('resize', init);
})();

document.getElementById('save-btn').addEventListener('click', function(){
  var btn = this;
  btn.textContent = '⏳ 저장 중...';
  btn.style.pointerEvents = 'none';
  html2canvas(document.querySelector('.W'), {
    scale: 5, useCORS: true, allowTaint: true, backgroundColor: '#0F1F5C', width: 2250, height: 750
  }).then(function(canvas){
    var link = document.createElement('a');
    link.download = '배너5_로고슬로건_' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '📷 PNG 저장';
    btn.style.pointerEvents = 'auto';
  }).catch(function(err){
    alert('저장 실패: ' + err.message);
    btn.textContent = '📷 PNG 저장';
    btn.style.pointerEvents = 'auto';
  });
});
</script>
</body>
</html>
