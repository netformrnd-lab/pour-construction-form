<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>배너6 — 제품 전체이미지 + R&D 기술력 (2,250×750mm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --or:#E8780F; --or2:#F49A3A; --or-pale:rgba(232,120,15,0.08);
  --navy:#0F1F5C; --ink:#111827; --ink2:#374151; --muted:#6B7280;
  --light:#F9F7F4; --border:rgba(0,0,0,0.08); --white:#FFFFFF;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:0 2px 8px rgba(0,0,0,0.08);
  --r-sm:8px; --r-md:12px; --r-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#CBD5E1;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px;font-family:'Noto Sans KR','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

.W-scaler{transform-origin:top left;}

/* ══ Canvas: 2250×750 → 1125×375px (1:2) ══ */
.W{width:1125px;height:375px;background:linear-gradient(160deg,#F9F7F4 0%,#FFF5EA 100%);position:relative;overflow:hidden;display:flex;padding:24px 30px;}

/* 배경 장식 */
.W::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(232,120,15,0.08) 0%,transparent 70%);pointer-events:none;}

/* ── 왼쪽: R&D 기술력 ── */
.left{flex:0 0 400px;display:flex;flex-direction:column;justify-content:center;gap:11px;position:relative;z-index:1;}

.brand-row{display:flex;align-items:center;gap:6px;}
.brand-logo{height:26px;width:auto;}
.brand-badge{font-size:7.5px;font-weight:700;background:var(--navy);color:#fff;border-radius:12px;padding:2px 8px;}

.title{font-size:17px;font-weight:900;color:var(--ink);line-height:1.25;letter-spacing:-0.5px;}
.title em{font-style:normal;color:var(--or);}

/* 특허 + MOU */
.rnd-row{display:flex;align-items:flex-start;gap:10px;}
.patent-chip{background:var(--or);color:#fff;border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;min-width:54px;}
.patent-num{font-size:22px;font-weight:900;line-height:1;font-family:'Arial Black',sans-serif;}
.patent-label{font-size:7px;font-weight:700;opacity:0.9;margin-top:2px;white-space:nowrap;}
.mou-list{display:flex;flex-direction:column;gap:4px;justify-content:center;}
.mou-item{font-size:7.5px;color:var(--ink2);display:flex;align-items:flex-start;gap:5px;line-height:1.35;}
.mou-dot{width:4px;height:4px;border-radius:50%;background:var(--or);flex-shrink:0;margin-top:4px;}

/* 인증 */
.cert-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.cert-tag{font-size:7.5px;font-weight:700;border:1.5px solid var(--navy);color:var(--navy);border-radius:6px;padding:3px 9px;}
.cert-note{font-size:7px;color:var(--muted);}

/* 연구소 */
.lab-row{display:flex;align-items:center;gap:5px;}
.lab-icon{width:14px;height:14px;background:var(--navy);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lab-icon svg{width:9px;height:9px;fill:#fff;}
.lab-text{font-size:7.5px;font-weight:600;color:var(--ink2);}

/* ── 오른쪽: 제품 전체이미지 ── */
.right{flex:1;position:relative;margin-left:20px;z-index:1;display:flex;align-items:stretch;}
.prod-full-img{width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:var(--r-md);box-shadow:var(--shadow-md);}
.prod-full-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#f0ede8 0%,#e8e2d9 100%);border-radius:var(--r-md);border:2px dashed rgba(232,120,15,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.prod-full-placeholder span{font-size:10px;color:var(--muted);text-align:center;line-height:1.5;}

/* 하단 오렌지 라인 */
.bottom-line{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--or) 0%,var(--or2) 100%);z-index:10;}

/* ── 유틸 버튼 ── */
#save-btn{position:fixed;top:10px;right:10px;z-index:9999;padding:8px 16px;background:var(--or);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-family:inherit;}
#view-toggle{position:fixed;top:10px;left:10px;z-index:9999;padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;display:none;}
</style>
</head>
<body>
<div class="W-scaler">
<div class="W">

  <!-- ── 왼쪽: R&D 기술력 ── -->
  <div class="left">
    <div class="brand-row">
      <img class="brand-logo" src="1.배경x_로고.png" alt="POUR스토어" onerror="this.style.display='none'">
      <span class="brand-badge">자체 기술연구소 운영</span>
    </div>
    <div class="title">
      기술력이 다른 자재,<br>
      <em>특허 70여 개</em>로 증명합니다
    </div>

    <!-- 특허 + MOU -->
    <div class="rnd-row">
      <div class="patent-chip">
        <span class="patent-num">70+</span>
        <span class="patent-label">특허기술</span>
      </div>
      <div class="mou-list">
        <div class="mou-item"><span class="mou-dot"></span>하이퐁 건설협회 MOU</div>
        <div class="mou-item"><span class="mou-dot"></span>ETRI · 건축 리노베이션 AI 기술 공동 개발 MOU</div>
        <div class="mou-item"><span class="mou-dot"></span>강남제비스코 MOU</div>
        <div class="mou-item"><span class="mou-dot"></span>서울과학기술대학교 MOU</div>
      </div>
    </div>

    <!-- 인증 (내일 업데이트) -->
    <div class="cert-row">
      <span class="cert-tag">인증 ①</span>
      <span class="cert-tag">인증 ②</span>
      <span class="cert-note">※ 내일 업데이트 예정</span>
    </div>
  </div>

  <!-- ── 오른쪽: 제품 전체이미지 ── -->
  <!-- 이미지 준비 후 아래 주석 해제하고 placeholder div 삭제 -->
  <div class="right">
    <!-- <img class="prod-full-img" src="제품전체이미지.jpg" alt="POUR스토어 전 제품 라인업"> -->
    <div class="prod-full-placeholder">
      <span style="font-size:24px;">📷</span>
      <span>제품 전체이미지<br>(AI 제작 중)</span>
    </div>
  </div>

  <div class="bottom-line"></div>
</div>
</div>

<button id="view-toggle">🔍 확대 보기</button>
<button id="save-btn">📷 PNG 저장</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
  var CANVAS_W = 1125, CANVAS_H = 375;
  var isFit = true;
  var btn = document.getElementById('view-toggle');
  var scaler = document.querySelector('.W-scaler');

  function applyFit(){
    isFit = true;
    var s = window.innerWidth / CANVAS_W;
    scaler.style.transform = 'scale('+s+')';
    scaler.style.transformOrigin = 'top left';
    scaler.style.width = CANVAS_W + 'px';
    scaler.style.marginBottom = (CANVAS_H * s - CANVAS_H) + 'px';
    document.body.style.padding = '0';
    document.body.style.justifyContent = 'flex-start';
    document.body.style.alignItems = 'flex-start';
    document.documentElement.style.overflowX = 'hidden';
    document.body.style.overflowX = 'hidden';
    btn.textContent = '🔍 확대 보기';
  }
  function applyFull(){
    isFit = false;
    scaler.style.transform = 'none';
    scaler.style.width = '';
    scaler.style.marginBottom = '0';
    document.body.style.padding = '16px';
    document.body.style.justifyContent = 'flex-start';
    document.body.style.alignItems = 'flex-start';
    document.documentElement.style.overflowX = 'auto';
    document.body.style.overflowX = 'auto';
    btn.textContent = '🔎 전체 보기';
  }
  function init(){
    if(window.innerWidth < CANVAS_W + 60){
      applyFit();
      btn.style.display = 'inline-block';
    } else {
      applyFull();
      btn.style.display = 'none';
    }
  }
  btn.addEventListener('click', function(){ if(isFit) applyFull(); else applyFit(); });
  init();
  window.addEventListener('resize', init);
})();

document.getElementById('save-btn').addEventListener('click', function(){
  var btn = this;
  btn.textContent = '⏳ 저장 중...';
  btn.style.pointerEvents = 'none';
  html2canvas(document.querySelector('.W'), {
    scale: 5, useCORS: true, allowTaint: true, backgroundColor: '#F9F7F4', width: 1125, height: 375
  }).then(function(canvas){
    var link = document.createElement('a');
    link.download = '배너6_제품세트_' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '📷 PNG 저장';
    btn.style.pointerEvents = 'auto';
  }).catch(function(err){
    alert('저장 실패: ' + err.message);
    btn.textContent = '📷 PNG 저장';
    btn.style.pointerEvents = 'auto';
  });
});
</script>
</body>
</html>
