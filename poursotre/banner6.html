<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POUR스토어 배너 6 — 2,250×750mm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ══ Design System (3번 배너 동일) ══ */
:root {
  --or:#E8780F; --or2:#F49A3A; --or-pale:rgba(232,120,15,0.08);
  --navy:#0F1F5C; --ink:#111827; --ink2:#374151; --muted:#6B7280;
  --light:#F9F7F4; --border:rgba(0,0,0,0.09); --white:#FFFFFF;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07);
  --shadow-md:0 2px 10px rgba(0,0,0,0.09);
  --r-sm:8px; --r-md:12px; --r-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  background:#CBD5E1;
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:24px;
  font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.W-scaler{transform-origin:top left;}

/* ══ Canvas: 1125×380px (= 2250×760 @2x) ══ */
.W{
  width:1125px;
  background:linear-gradient(160deg,#F9F7F4 0%,#FFF5EA 100%);
  border-radius:var(--r-lg);
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
  box-shadow:0 4px 24px rgba(0,0,0,0.10);
}

/* 배경 장식 — 오른쪽 오렌지 glow */
.W::before{
  content:'';position:absolute;top:-80px;right:-80px;
  width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,120,15,0.09) 0%,transparent 68%);
  pointer-events:none;z-index:0;
}
.W::after{
  content:'';position:absolute;bottom:-60px;left:30%;
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,120,15,0.05) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ══ 상단 오렌지 헤더 ══ */
.top-head{
  background:linear-gradient(135deg,var(--or) 0%,var(--or2) 100%);
  padding:14px 48px 13px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;flex-shrink:0;z-index:1;
}
.top-head::before{
  content:'';position:absolute;top:-50px;right:-50px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,0.10);pointer-events:none;
}
.top-head::after{
  content:'';position:absolute;bottom:-30px;right:160px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,0.07);pointer-events:none;
}

.head-left{display:flex;flex-direction:column;gap:5px;position:relative;z-index:1;}
.logo-row{display:flex;align-items:center;gap:10px;}
.store-logo{height:36px;width:auto;}

.badge-row{display:flex;gap:6px;}
.badge{font-size:8.5px;font-weight:700;border-radius:20px;padding:3px 10px;}
.bw{background:rgba(255,255,255,0.20);color:#fff;border:1px solid rgba(255,255,255,0.30);}
.bd{background:var(--navy);color:#fff;}

.head-pre{font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:-0.1px;}
.head-title{font-size:20px;font-weight:900;color:#fff;line-height:1.2;letter-spacing:-0.7px;}

/* 오른쪽 stat 4종 */
.head-stats{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:var(--r-md);
  overflow:hidden;
  position:relative;z-index:1;
  flex-shrink:0;
}
.hstat{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 20px;
  min-width:90px;
}
.hstat+.hstat{border-left:1px solid rgba(255,255,255,0.20);}
.hstat-n{font-size:17px;font-weight:900;color:#fff;font-family:'Arial Black',Arial,sans-serif;line-height:1;}
.hstat-l{font-size:7.5px;color:rgba(255,255,255,0.78);margin-top:3px;text-align:center;line-height:1.3;}

/* ══ 본문 — 가로 2열 (MOU + 제품) ══ */
.body-wrap{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  padding:18px 40px 20px;
  position:relative;z-index:1;
}

.col-left{
  display:flex;flex-direction:column;gap:10px;
  padding-right:24px;
}
.col-right{
  display:flex;flex-direction:column;gap:10px;
  padding-left:24px;
}

/* MOU 섹션 레이블 */
.section-label-row{display:flex;align-items:center;gap:8px;}
.section-bar{width:3px;height:14px;background:var(--or);border-radius:2px;flex-shrink:0;}
.section-label-text{font-size:10px;font-weight:800;color:var(--ink);letter-spacing:1.5px;text-transform:uppercase;}

/* MOU 카드 그리드 */
.mou-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:8px;
  flex:1;
}
.mou-card{
  background:#fff;
  border:1px solid var(--border);
  border-left:3px solid var(--or);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  padding:14px 15px;
  display:flex;flex-direction:column;gap:5px;
  box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
  justify-content:center;
}
.mou-card.etri{border-left-color:var(--navy);}
.mou-card.etri .mou-benefit{color:var(--navy);}
.mou-card.seoultech{border-left-color:#2563EB;}
.mou-card.seoultech .mou-benefit{color:#2563EB;}

.mou-org{font-size:11px;font-weight:800;color:var(--ink);line-height:1.3;}
.mou-benefit{font-size:10px;font-weight:700;color:var(--or);line-height:1.4;}

/* 제품 사진 플레이스홀더 */
.prod-area{
  flex:1;
  border:1.5px dashed rgba(232,120,15,0.30);
  border-radius:var(--r-md);
  background:rgba(255,255,255,0.65);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.prod-area img.prod-photo{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:var(--r-md);
  display:block;
}
.prod-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:16px;text-align:center;
}
.prod-placeholder-grid{
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:6px;width:110px;height:74px;
}
.prod-placeholder-grid span{background:rgba(0,0,0,0.08);border-radius:4px;display:block;}
.prod-placeholder-text{font-size:11px;font-weight:700;color:var(--ink2);line-height:1.4;}
</style>
</head>
<body>
<div class="W-scaler">
<div class="W">

  <!-- ══ 상단 오렌지 헤더 ══ -->
  <div class="top-head">
    <div class="head-left">
      <div class="logo-row">
        <img class="store-logo" src="logo_white.png" alt="POUR스토어"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div style="display:none;align-items:center;gap:5px;">
          <div style="display:flex;align-items:flex-end;gap:2px;height:20px;">
            <span style="display:block;width:4px;height:12px;background:rgba(255,255,255,0.95);border-radius:2px;"></span>
            <span style="display:block;width:4px;height:16px;background:rgba(255,255,255,0.95);border-radius:2px;"></span>
            <span style="display:block;width:4px;height:20px;background:rgba(255,255,255,0.95);border-radius:2px;"></span>
            <span style="display:block;width:4px;height:14px;background:rgba(255,255,255,0.95);border-radius:2px;"></span>
          </div>
          <span style="font-size:14px;font-weight:900;color:#fff;letter-spacing:1px;">POUR스토어</span>
        </div>
      </div>
      <div class="badge-row">
        <span class="badge bw">자체 기술연구소 운영</span>
        <span class="badge bd">국가 등록 특허 70여 개</span>
      </div>
      <div class="head-pre">자체 R&amp;D로 탄생한 기술,</div>
      <div class="head-title">국가 등록 특허 70여 개로 증명합니다</div>
    </div>

    <!-- stat 4종 -->
    <div class="head-stats">
      <div class="hstat">
        <span class="hstat-n">70여+</span>
        <span class="hstat-l">국가 등록 특허</span>
      </div>
      <div class="hstat">
        <span class="hstat-n">110여 개</span>
        <span class="hstat-l">고품질 제품 보유</span>
      </div>
      <div class="hstat">
        <span class="hstat-n">260만</span>
        <span class="hstat-l">세대 현장 검증</span>
      </div>
      <div class="hstat">
        <span class="hstat-n">250여 곳</span>
        <span class="hstat-l">시공 협력사</span>
      </div>
    </div>
  </div>

  <!-- ══ 본문 ══ -->
  <div class="body-wrap">

    <!-- 왼쪽: MOU -->
    <div class="col-left">
      <div class="section-label-row">
        <div class="section-bar"></div>
        <span class="section-label-text">MOU 체결 기관</span>
      </div>
      <div class="mou-grid">
        <div class="mou-card">
          <div class="mou-org">베트남 하이퐁 건설협회 (HACC)</div>
          <div class="mou-benefit">해외 스마트도시 현장 공식 채택</div>
        </div>
        <div class="mou-card etri">
          <div class="mou-org">한국전자통신연구원 (ETRI)</div>
          <div class="mou-benefit">국내 최초 AI 도료 품질 자동 측정</div>
        </div>
        <div class="mou-card">
          <div class="mou-org">강남제비스코(주)</div>
          <div class="mou-benefit">대한민국 도료 리더와 기술 결합</div>
        </div>
        <div class="mou-card seoultech">
          <div class="mou-org">서울과학기술대학교 방수기술연구소</div>
          <div class="mou-benefit">대학 연구소의 학술 성능 검증</div>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 제품 사진 -->
    <div class="col-right">
      <div class="prod-area">
        <!-- 실제 사진 준비 시 아래 주석 해제 후 src 변경 -->
        <!-- <img class="prod-photo" src="products_studio.jpg" alt="POUR스토어 전 제품 라인업"> -->
        <div class="prod-placeholder">
          <div class="prod-placeholder-grid">
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="prod-placeholder-text">200여 개 제품 스튜디오 사진</div>
        </div>
      </div>
    </div>

  </div><!-- /body-wrap -->

</div><!-- /W -->
</div><!-- /W-scaler -->

<script>
(function(){
  var CANVAS_W = 1125;
  var scaler = document.querySelector('.W-scaler');
  function applyFit(){
    var vw = window.innerWidth - 48;
    var s = Math.min(vw / CANVAS_W, 1);
    scaler.style.transform = 'scale('+s+')';
    scaler.style.transformOrigin = 'top left';
    scaler.style.width = CANVAS_W + 'px';
    var h = document.querySelector('.W').offsetHeight;
    scaler.style.marginBottom = (h * s - h) + 'px';
    document.body.style.padding = '24px';
    document.body.style.justifyContent = 'flex-start';
    document.body.style.alignItems = 'flex-start';
  }
  applyFit();
  window.addEventListener('resize', applyFit);
})();
</script>
</body>
</html>
