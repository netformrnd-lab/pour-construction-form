// ============================================================
// StaffPage — 담당자 마스터 (staff 컬렉션 CRUD)
// ============================================================
function StaffPage({ onToast }) {
  const { activeStaff, audit } = useActiveStaffContext();
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editId, setEditId] = useState(null); // null | 'new' | docId
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');
  const [filterActive, setFilterActive] = useState('active'); // active|all|inactive
  const [viewMode, setViewMode] = useState('card'); // 'card' | 'table' — 업무관리 페이지처럼 사람 카드 그리드를 기본으로

  async function load() {
    try {
      const snap = await db.collection(COLLECTIONS.STAFF).get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      docs.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));
      console.log(`[staff] ${docs.length}명 로드`);
      setList(docs);
    } catch (e) {
      console.error('[staff] 로드 실패:', e);
      onToast({ message: '담당자 로드 실패: ' + e.message, type: 'error' });
    }
    setLoading(false);
  }
  useEffect(() => { load(); }, []);

  const emptyForm = () => ({
    name: '', email: '', phone: '',
    active: true, isAdmin: false,
    kpiMemberId: '', kpiInitial: '', kpiColor: '#3B82F6',
  });

  const openNew = () => { setForm(emptyForm()); setEditId('new'); };
  const openEdit = (s) => {
    setForm({
      name: s.name || '', email: s.email || '', phone: s.phone || '',
      active: s.active !== false, isAdmin: !!s.isAdmin,
      kpiMemberId: s.kpiMemberId || '', kpiInitial: s.kpiInitial || '', kpiColor: s.kpiColor || '#3B82F6',
    });
    setEditId(s.id);
  };
  const cancel = () => { setEditId(null); setForm(null); };

  const updateField = (key, val) => {
    setForm(prev => {
      const next = { ...prev, [key]: val };
      if (key === 'name' && !prev.kpiInitial) {
        next.kpiInitial = (val || '').trim().charAt(0);
      }
      return next;
    });
  };

  const validate = () => {
    if (!form.name.trim()) return '이름은 필수입니다';
    if (!form.email.trim()) return '이메일은 필수입니다 (OTP 인증 식별자)';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email.trim())) return '이메일 형식이 올바르지 않습니다';
    const dup = list.find(s => s.id !== editId && (s.email || '').toLowerCase() === form.email.trim().toLowerCase());
    if (dup) return `이메일 중복: "${dup.name}" 와(과) 동일`;
    return null;
  };

  const save = async () => {
    const err = validate();
    if (err) { onToast({ message: err, type: 'error' }); return; }
    setSaving(true);
    try {
      const baseData = {
        name: form.name.trim(),
        email: form.email.trim().toLowerCase(),
        phone: form.phone.trim(),
        active: !!form.active,
        isAdmin: !!form.isAdmin,
        kpiMemberId: form.kpiMemberId.trim() || null,
        kpiInitial: form.kpiInitial.trim().slice(0, 2),
        kpiColor: form.kpiColor,
      };
      if (editId === 'new') {
        const data = {
          ...baseData,
          ...audit.create(),
          lastLoginAt: null,
          loginCount: 0,
        };
        await db.collection(COLLECTIONS.STAFF).add(data);
        onToast({ message: `담당자 "${data.name}" 등록 완료`, type: 'success' });
      } else {
        await db.collection(COLLECTIONS.STAFF).doc(editId).update({ ...baseData, ...audit.update() });
        onToast({ message: `담당자 "${baseData.name}" 수정 완료`, type: 'success' });
      }
      await load();
      cancel();
    } catch (e) {
      console.error('[staff] 저장 실패:', e);
      onToast({ message: '저장 실패: ' + e.message, type: 'error' });
    }
    setSaving(false);
  };

  const toggleActive = async (s) => {
    const willActivate = !s.active;
    if (!willActivate && !confirm(`"${s.name}" 비활성화 — 어드민 접근/드롭다운에서 숨김 처리됩니다. 진행할까요?`)) return;
    try {
      await db.collection(COLLECTIONS.STAFF).doc(s.id).update({ active: willActivate, ...audit.update() });
      onToast({ message: `"${s.name}" ${willActivate ? '활성화' : '비활성화'} 완료`, type: 'success' });
      await load();
    } catch (e) {
      onToast({ message: '상태 변경 실패: ' + e.message, type: 'error' });
    }
  };

  const filtered = list.filter(s => {
    if (filterActive === 'active' && s.active === false) return false;
    if (filterActive === 'inactive' && s.active !== false) return false;
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      if (!(s.name || '').toLowerCase().includes(q)
        && !(s.email || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const inputCss = { padding:'10px 12px', border:'1px solid var(--border)', borderRadius:8, fontSize:13, fontWeight:600, background:'#fff', color:'var(--text)', outline:'none', width:'100%' };
  const labelCss = { display:'block', fontSize:11, fontWeight:800, color:'var(--text-md)', letterSpacing:.3, marginBottom:6 };

  if (loading) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;

  if (editId) {
    const isNew = editId === 'new';
    return (
      <div style={{ padding:'24px 32px', maxWidth:920 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22 }}>
          <div>
            <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', marginBottom:4 }}>{isNew ? '담당자 등록' : '담당자 수정'}</h1>
            <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
              {isNew ? '신규 담당자를 등록합니다. 이메일은 향후 OTP 인증의 식별자가 됩니다.' : `ID: ${editId}`}
            </div>
          </div>
          <button onClick={cancel} style={{ padding:'10px 18px', border:'1px solid var(--border)', borderRadius:9, fontSize:13, fontWeight:700, color:'var(--text-md)', background:'#fff' }}>← 목록</button>
        </div>

        <div style={{ background:'#fff', borderRadius:14, padding:24, boxShadow:'var(--shadow)', marginBottom:16 }}>
          <h2 style={{ fontSize:13, fontWeight:900, color:'var(--or-d)', marginBottom:16 }}>기본 정보</h2>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
            <div><label style={labelCss}>이름 *</label><input style={inputCss} value={form.name} onChange={e => updateField('name', e.target.value)} placeholder="홍길동" /></div>
            <div><label style={labelCss}>이메일 * <span style={{ color:'var(--or-d)' }}>(OTP 인증 식별자)</span></label><input style={inputCss} type="email" value={form.email} onChange={e => updateField('email', e.target.value)} placeholder="staff@netformrnd.com" /></div>
            <div><label style={labelCss}>연락처</label><input style={inputCss} value={form.phone} onChange={e => updateField('phone', e.target.value)} placeholder="010-1234-5678" /></div>
          </div>
        </div>

        <div style={{ background:'#fff', borderRadius:14, padding:24, boxShadow:'var(--shadow)', marginBottom:16 }}>
          <h2 style={{ fontSize:13, fontWeight:900, color:'var(--or-d)', marginBottom:16 }}>활성 / 권한</h2>
          <div style={{ display:'flex', gap:24, flexWrap:'wrap' }}>
            <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, fontWeight:700 }}>
              <input type="checkbox" checked={form.active} onChange={e => updateField('active', e.target.checked)} />
              활성 (체크 해제 시 어드민 접근 차단, 드롭다운에서 숨김)
            </label>
            <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, fontWeight:700 }}>
              <input type="checkbox" checked={form.isAdmin} onChange={e => updateField('isAdmin', e.target.checked)} />
              담당자 마스터 관리 권한 (다른 담당자 등록·수정 가능)
            </label>
          </div>
        </div>

        <div style={{ background:'#fff', borderRadius:14, padding:24, boxShadow:'var(--shadow)', marginBottom:16 }}>
          <h2 style={{ fontSize:13, fontWeight:900, color:'var(--or-d)', marginBottom:4 }}>KPI 시스템 연동 (선택)</h2>
          <p style={{ fontSize:11, color:'var(--text-sm)', fontWeight:600, marginBottom:14 }}>pour-os-v6-2.html(KPI/업무관리)와 연결하기 위한 식별자. 향후 KPI 시스템을 어드민에 흡수할 때 사용.</p>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 160px', gap:16 }}>
            <div><label style={labelCss}>KPI 멤버 ID</label><input style={inputCss} value={form.kpiMemberId} onChange={e => updateField('kpiMemberId', e.target.value)} placeholder="m1, m2, m3 ..." /></div>
            <div><label style={labelCss}>이니셜 (1~2자)</label><input style={inputCss} value={form.kpiInitial} onChange={e => updateField('kpiInitial', e.target.value)} placeholder="홍" maxLength={2} /></div>
            <div>
              <label style={labelCss}>대표 컬러</label>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <input type="color" value={form.kpiColor} onChange={e => updateField('kpiColor', e.target.value)} style={{ width:40, height:40, border:'1px solid var(--border)', borderRadius:8, padding:0, background:'#fff' }} />
                <input style={{ ...inputCss, fontFamily:'monospace', fontSize:12 }} value={form.kpiColor} onChange={e => updateField('kpiColor', e.target.value)} />
              </div>
            </div>
          </div>
        </div>

        <div style={{ display:'flex', gap:12, justifyContent:'flex-end' }}>
          <button onClick={cancel} disabled={saving} style={{ padding:'12px 24px', border:'1px solid var(--border)', borderRadius:10, fontSize:13, fontWeight:800, color:'var(--text-md)', background:'#fff' }}>취소</button>
          <button onClick={save} disabled={saving} style={{ padding:'12px 28px', borderRadius:10, fontSize:13, fontWeight:900, color:'#fff', background: saving ? 'var(--text-sm)' : 'linear-gradient(135deg, var(--or), var(--or-d))', boxShadow:'0 4px 12px rgba(249,115,22,.25)' }}>
            {saving ? '저장 중...' : (isNew ? '담당자 등록' : '변경 저장')}
          </button>
        </div>
      </div>
    );
  }

  // ─── 합계 통계 ───
  const totalActive = list.filter(s => s.active !== false).length;
  const totalInactive = list.length - totalActive;
  const totalAdmins = list.filter(s => s.isAdmin).length;
  // 본인 매칭
  const isMe = (s) => activeStaff && s.id === activeStaff.id;

  return (
    <div style={{ padding:'24px 32px' }}>
      {/* ─── 페이지 헤더 ─── */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, gap:16, flexWrap:'wrap' }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', marginBottom:4 }}>👥 담당자 관리</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
            어드민에서 활동하는 담당자 마스터. 모든 작업(상품·공신력·링크·업무관리 등)이 담당자와 자동 연결됩니다.
          </div>
        </div>
        <button onClick={openNew} style={{ padding:'12px 22px', borderRadius:10, fontSize:13, fontWeight:900, color:'#fff', background:'linear-gradient(135deg, var(--or), var(--or-d))', boxShadow:'0 4px 12px rgba(249,115,22,.25)' }}>+ 신규 담당자</button>
      </div>

      {/* ─── 합계 위젯 (업무관리 페이지 패턴) ─── */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(150px, 1fr))', gap:10, marginBottom:14 }}>
        <div style={{ padding:'14px 16px', background:'#fff', border:'1.5px solid var(--border)', borderLeft:'4px solid var(--or)', borderRadius:10, boxShadow:'var(--shadow)' }}>
          <div style={{ fontSize:10.5, fontWeight:800, color:'var(--text-sm)', letterSpacing:.4 }}>전체 담당자</div>
          <div style={{ fontSize:26, fontWeight:900, color:'var(--text)', lineHeight:1, marginTop:6 }}>{list.length}<span style={{ fontSize:13, color:'var(--text-sm)', fontWeight:700, marginLeft:4 }}>명</span></div>
          <div style={{ fontSize:11, color:'var(--text-sm)', fontWeight:700, marginTop:4 }}>등록된 모든 인원</div>
        </div>
        <div style={{ padding:'14px 16px', background:'#fff', border:'1.5px solid var(--border)', borderLeft:'4px solid #2BC472', borderRadius:10, boxShadow:'var(--shadow)' }}>
          <div style={{ fontSize:10.5, fontWeight:800, color:'var(--text-sm)', letterSpacing:.4 }}>활성</div>
          <div style={{ fontSize:26, fontWeight:900, color:'#047857', lineHeight:1, marginTop:6 }}>{totalActive}<span style={{ fontSize:13, color:'var(--text-sm)', fontWeight:700, marginLeft:4 }}>명</span></div>
          <div style={{ fontSize:11, color:'var(--text-sm)', fontWeight:700, marginTop:4 }}>어드민 접근 가능</div>
        </div>
        <div style={{ padding:'14px 16px', background:'#fff', border:'1.5px solid var(--border)', borderLeft:'4px solid #9CA3AF', borderRadius:10, boxShadow:'var(--shadow)' }}>
          <div style={{ fontSize:10.5, fontWeight:800, color:'var(--text-sm)', letterSpacing:.4 }}>비활성</div>
          <div style={{ fontSize:26, fontWeight:900, color:'#6B7280', lineHeight:1, marginTop:6 }}>{totalInactive}<span style={{ fontSize:13, color:'var(--text-sm)', fontWeight:700, marginLeft:4 }}>명</span></div>
          <div style={{ fontSize:11, color:'var(--text-sm)', fontWeight:700, marginTop:4 }}>접근 차단</div>
        </div>
        <div style={{ padding:'14px 16px', background:'#fff', border:'1.5px solid var(--border)', borderLeft:'4px solid var(--or-d)', borderRadius:10, boxShadow:'var(--shadow)' }}>
          <div style={{ fontSize:10.5, fontWeight:800, color:'var(--text-sm)', letterSpacing:.4 }}>본인</div>
          <div style={{ fontSize:16, fontWeight:900, color:'var(--text)', lineHeight:1.2, marginTop:6, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
            {activeStaff ? activeStaff.name : <span style={{ color:'var(--text-sm)', fontSize:13 }}>미선택</span>}
          </div>
          <div style={{ fontSize:11, color:'var(--text-sm)', fontWeight:700, marginTop:4 }}>{activeStaff ? '활동 담당자' : 'PIN 후 선택'}</div>
        </div>
      </div>

      {/* 역할(KPI 카테고리) 분포 박스 제거 — 프로젝트별 배정 + 부서·소속 필드 모두 폐지 */}
      {totalAdmins > 0 && (
        <div style={{ padding:'8px 14px', marginBottom:14, fontSize:11, color:'var(--or-d)', fontWeight:800 }}>
          마스터 관리자 {totalAdmins}명
        </div>
      )}

      {/* ─── 검색 + 필터 + 뷰 토글 ─── */}
      <div style={{ display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center' }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 이름·이메일 검색" style={{ ...inputCss, maxWidth:280, padding:'9px 14px' }} />
        <select value={filterActive} onChange={e => setFilterActive(e.target.value)} style={{ ...inputCss, maxWidth:140, padding:'9px 14px' }}>
          <option value="active">활성만</option>
          <option value="all">전체</option>
          <option value="inactive">비활성만</option>
        </select>
        {/* 뷰 모드 토글 */}
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:700 }}>
            총 <b style={{ color:'var(--text)' }}>{filtered.length}</b>명 / 전체 {list.length}명
          </div>
          <div style={{ display:'inline-flex', border:'1px solid var(--border)', borderRadius:8, overflow:'hidden' }}>
            <button onClick={() => setViewMode('card')} style={{
              padding:'7px 12px', fontSize:11.5, fontWeight:800,
              background: viewMode === 'card' ? 'var(--or)' : '#fff',
              color: viewMode === 'card' ? '#fff' : 'var(--text-sm)',
            }}>🃏 카드</button>
            <button onClick={() => setViewMode('table')} style={{
              padding:'7px 12px', fontSize:11.5, fontWeight:800,
              background: viewMode === 'table' ? 'var(--or)' : '#fff',
              color: viewMode === 'table' ? '#fff' : 'var(--text-sm)',
              borderLeft:'1px solid var(--border)',
            }}>📋 표</button>
          </div>
        </div>
      </div>

      {filtered.length === 0 ? (
        <Empty icon="👥" title={list.length === 0 ? "등록된 담당자가 없습니다" : "조건에 맞는 담당자가 없습니다"}
          desc={list.length === 0 ? "+ 신규 담당자 버튼을 눌러 첫 담당자를 등록하세요. 이메일은 향후 OTP 인증에 사용됩니다." : "필터를 조정해 보세요."} />
      ) : viewMode === 'card' ? (
        // ─── 카드 뷰 (역할 그룹화 제거 — 단일 그리드) ───
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:12 }}>
          {filtered.map(s => {
            const me = isMe(s);
            const c = s.kpiColor || '#9CA3AF';
            return (
              <div key={s.id} style={{
                background: me ? 'linear-gradient(180deg, #F3FBF6 0%, #FFFFFF 70%)' : '#fff',
                borderRadius:12, padding:'16px 18px',
                border: me ? `2px solid #2BC472` : `1.5px solid var(--border)`,
                borderTop: `4px solid ${c}`,
                boxShadow: me ? '0 4px 16px rgba(43,196,114,.18)' : 'var(--shadow)',
                opacity: s.active === false ? 0.65 : 1,
                position:'relative',
              }}>
                {me && (
                  <span style={{ position:'absolute', top:10, right:12, padding:'2px 8px', fontSize:9.5, fontWeight:900, color:'#fff', background:'#2BC472', borderRadius:999, letterSpacing:0.3 }}>본인</span>
                )}
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                  <div style={{ width:46, height:46, borderRadius:'50%', background:c, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, fontWeight:900, flexShrink:0 }}>
                    {s.kpiInitial || (s.name || '?').charAt(0)}
                  </div>
                  <div style={{ minWidth:0, flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:900, letterSpacing:-0.2, color:'var(--text)' }}>{s.name}</div>
                    <div style={{ display:'flex', gap:6, marginTop:2, flexWrap:'wrap', alignItems:'center' }}>
                      {s.isAdmin && <span style={{ fontSize:9, fontWeight:900, color:'var(--or-d)', background:'var(--or-l)', padding:'1px 6px', borderRadius:4 }}>마스터 관리자</span>}
                      {s.active === false && <span style={{ fontSize:9, fontWeight:900, color:'#6B7280', background:'#F3F4F6', padding:'1px 6px', borderRadius:4 }}>비활성</span>}
                    </div>
                  </div>
                </div>
                <div style={{ fontSize:11, color:'var(--text-md)', fontWeight:600, lineHeight:1.6, paddingBottom:10, borderBottom:'1px dashed var(--border)', marginBottom:10 }}>
                  {s.email && <div style={{ fontFamily:'monospace', fontSize:10.5, color:'var(--text-sm)', wordBreak:'break-all' }}>✉ {s.email}</div>}
                  {s.phone && <div>📞 {s.phone}</div>}
                  {!s.email && !s.phone && <div style={{ color:'var(--text-xs)' }}>—</div>}
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:10, color:'var(--text-sm)', fontWeight:700, marginBottom:10 }}>
                  <div>
                    {s.createdByStaffName && <div>등록: {s.createdByStaffName} · {relativeTime(s.createdAt)}</div>}
                    {s.updatedByStaffName && s.updatedAt !== s.createdAt && <div>수정: {s.updatedByStaffName} · {relativeTime(s.updatedAt)}</div>}
                    {!s.createdByStaffName && <div style={{ color:'var(--text-xs)' }}>{relativeTime(s.createdAt)}</div>}
                  </div>
                </div>
                <div style={{ display:'flex', gap:6 }}>
                  <button onClick={() => openEdit(s)} style={{ flex:1, padding:'7px 0', borderRadius:7, fontSize:11, fontWeight:800, color:'var(--or-d)', border:'1px solid var(--or-l)', background:'#fff' }}>수정</button>
                  <button onClick={() => toggleActive(s)} style={{ flex:1, padding:'7px 0', borderRadius:7, fontSize:11, fontWeight:800, color: s.active === false ? '#047857' : '#6B7280', border:'1px solid var(--border)', background:'#fff' }}>
                    {s.active === false ? '활성화' : '비활성화'}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        // ─── 표 뷰 ───
        <div style={{ background:'#fff', borderRadius:'var(--r-lg)', overflow:'hidden', border:'1px solid var(--border)' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'var(--bg)' }}>
                <th style={th()}>이름</th>
                <th style={th()}>이메일</th>
                <th style={th()}>연락처</th>
                <th style={th()}>상태</th>
                <th style={th()}>등록</th>
                <th style={th()}>최근 수정</th>
                <th style={{ ...th(), textAlign:'right' }}>작업</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(s => {
                const c = s.kpiColor || '#9CA3AF';
                const me = isMe(s);
                return (
                  <tr key={s.id} style={{ borderTop:'1px solid var(--border-s)', background: me ? 'rgba(43,196,114,.05)' : undefined }}>
                    <td style={td()}>
                      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                        <div style={{ width:32, height:32, borderRadius:'50%', background: c, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:900, boxShadow: me ? '0 0 0 2px #2BC472' : 'none' }}>
                          {s.kpiInitial || (s.name || '?').charAt(0)}
                        </div>
                        <div>
                          <div style={{ fontWeight:800, display:'flex', alignItems:'center', gap:6 }}>
                            {s.name}
                            {me && <span style={{ fontSize:9, fontWeight:900, color:'#fff', background:'#2BC472', padding:'1px 6px', borderRadius:999 }}>본인</span>}
                          </div>
                          {s.isAdmin && <div style={{ fontSize:10, fontWeight:800, color:'var(--or-d)' }}>마스터 관리자</div>}
                        </div>
                      </div>
                    </td>
                    <td style={td()}>
                      <span style={{ fontFamily:'monospace', fontSize:11.5 }}>{s.email || '-'}</span>
                    </td>
                    <td style={td()}>{s.phone || '-'}</td>
                    <td style={td()}>
                      <span style={{ display:'inline-block', padding:'3px 10px', borderRadius:5, fontSize:11, fontWeight:800,
                        background: s.active === false ? '#F3F4F6' : '#D1FAE5',
                        color: s.active === false ? '#6B7280' : '#047857' }}>
                        {s.active === false ? '비활성' : '활성'}
                      </span>
                    </td>
                    <td style={td()}>
                      {s.createdByStaffName ? (
                        <div style={{ fontSize:11, fontWeight:700 }}>{s.createdByStaffName}</div>
                      ) : (
                        <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:600 }}>—</div>
                      )}
                      <div style={{ fontSize:10, color:'var(--text-sm)', fontWeight:600 }}>{relativeTime(s.createdAt)}</div>
                    </td>
                    <td style={td()}>
                      {s.updatedByStaffName ? (
                        <div style={{ fontSize:11, fontWeight:700 }}>{s.updatedByStaffName}</div>
                      ) : (
                        <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:600 }}>—</div>
                      )}
                      <div style={{ fontSize:10, color:'var(--text-sm)', fontWeight:600 }}>{relativeTime(s.updatedAt)}</div>
                    </td>
                    <td style={{ ...td(), textAlign:'right' }}>
                      <button onClick={() => openEdit(s)} style={{ padding:'6px 12px', borderRadius:7, fontSize:11, fontWeight:800, color:'var(--or-d)', border:'1px solid var(--or-l)', background:'#fff', marginRight:6 }}>수정</button>
                      <button onClick={() => toggleActive(s)} style={{ padding:'6px 12px', borderRadius:7, fontSize:11, fontWeight:800, color: s.active === false ? '#047857' : '#6B7280', border:'1px solid var(--border)', background:'#fff' }}>
                        {s.active === false ? '활성화' : '비활성화'}
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ============================================================
// FirebaseUsagePage — Firebase Console 단순 링크 (옵션 C)
// ============================================================
function FirebaseUsagePage() {

// ============================================================
// POUR OS 흡수 PR 1 — Dashboard + Recurring Tasks
// v22 (pour-os-v22.html)의 대시보드 + 반복업무 기능을 React로 재구현.
// 메모: 대시보드의 isFixed 고정업무 = pour-recurring.pinned 토글로 자동 동기화.
// ============================================================

const WEEK_DAYS = ['월','화','수','목','금'];
const ALL_DAYS = ['일','월','화','수','목','금','토'];
const PRIORITY_META = {
  high: { label: '높음', icon: '🔴' },
  mid:  { label: '중간', icon: '🟡' },
  low:  { label: '낮음', icon: '🟢' },
};
const TASK_STATUS_META = {
  active:  { label: '진행', icon: '▶' },
  hold:    { label: '보류', icon: '⏸' },
  stopped: { label: '중단', icon: '⛔' },
  resume:  { label: '재개', icon: '🔄' },
};

// D-day 문자열 계산
function calcDday(iso) {
  if (!iso) return '';
  const target = new Date(iso); target.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((target - today) / 86400000);
  if (diff === 0) return 'D-day';
  if (diff > 0) return `D-${diff}`;
  return `D+${-diff}`;
}

// ISO 주차 키 'YYYY-Www' — 활동지표 주간 기록 키. 주 시작=월요일 기준.
function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;            // 일=7
  date.setUTCDate(date.getUTCDate() + 4 - day); // 목요일로 이동(ISO)
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return `${date.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
}

// 반복업무가 현재 staff에 배정됐는지 — assigneeStaffIds: 'all' | [id, ...] | id
function isRecurringForStaff(r, staffId) {
  if (!staffId) return false;
  const a = r.assigneeStaffIds;
  if (a === 'all') return true;
  if (Array.isArray(a)) return a.includes(staffId);
  return a === staffId;
}

// 오늘의 반복업무 인스턴스 자동 생성 (dedup: recurringId + performedDate + staffId)
// 호출: DashboardPage·RecurringTasksPage 마운트 시 1회
async function generateRecurringForToday({ recurring, tasks, staffId, audit }) {
  if (!staffId) return { created: 0 };
  const today = new Date();
  const todayKey = today.toISOString().split('T')[0];
  const todayDay = ALL_DAYS[today.getDay()];
  const todayMonthDay = today.getDate();
  const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const isLastDayToday = todayMonthDay === lastDayOfMonth;

  const mine = (recurring || []).filter(r => r.active !== false && isRecurringForStaff(r, staffId));
  const newTasks = [];
  for (const r of mine) {
    let should = false;
    if (r.recurType === 'daily') should = true;
    else if (r.recurType === 'weekly' && r.weekDay === todayDay) should = true;
    else if (r.recurType === 'monthly') {
      if (r.monthDay === 'last' && isLastDayToday) should = true;
      else if (typeof r.monthDay === 'number' && r.monthDay === todayMonthDay) should = true;
    }
    if (!should) continue;
    // dedup
    const exists = (tasks || []).some(t => t.recurringId === r.id && t.performedDate === todayKey && t.staffId === staffId);
    if (exists) continue;
    newTasks.push({
      staffId,
      title: r.title,
      done: false,
      priority: r.priority || 'mid',
      projectId: r.projectId || null,
      weekDay: todayDay,
      weekSlot: null,
      dueDate: '',
      isFixed: r.pinned === true,
      pulledToday: true,
      recurringId: r.id,
      performedDate: todayKey,
      notes: '',
      attachments: [],
      status: 'active',
      time: r.time || '',
      ...audit.create(),
    });
  }
  // Firestore 일괄 추가
  for (const data of newTasks) {
    await db.collection(COLLECTIONS.POUR_TASKS).add(data);
  }
  return { created: newTasks.length };
}

// ============================================================
// useStaffTasks / useStaffRecurring — 활동 담당자의 task·반복업무 실시간 구독
// ============================================================
function useStaffTasks(staffId) {
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!staffId) { setTasks([]); setLoading(false); return; }
    const unsub = db.collection(COLLECTIONS.POUR_TASKS).where('staffId','==',staffId).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`[pour-tasks] ${list.length}건 (${staffId})`);
      setTasks(list);
      setLoading(false);
    }, err => { console.error('[pour-tasks] 구독 실패:', err); setLoading(false); });
    return unsub;
  }, [staffId]);
  return { tasks, loading };
}
function useStaffRecurring(staffId) {
  const [recurring, setRecurring] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!staffId) { setRecurring([]); setLoading(false); return; }
    // assigneeStaffIds 'all' 포함하기 위해 전체 구독 후 클라이언트 필터
    const unsub = db.collection(COLLECTIONS.POUR_RECURRING).onSnapshot(snap => {
      const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // 담당자(assignee) 또는 생성자(staffId) 본인이면 노출 — 리드가 남에게 배정한 것도 관리 가능
      const mine = all.filter(r => r.active !== false && (r.staffId === staffId || isRecurringForStaff(r, staffId)));
      console.log(`[pour-recurring] ${mine.length}건 (${staffId} / 전체 ${all.length})`);
      setRecurring(mine);
      setLoading(false);
    }, err => { console.error('[pour-recurring] 구독 실패:', err); setLoading(false); });
    return unsub;
  }, [staffId]);
  return { recurring, loading };
}

// ============================================================
// DashboardPage — 주간 5슬롯 + 오늘 업무 + 고정업무 + 마감 임박
// ============================================================
function DashboardPage({ onToast, onNav }) {
  const { activeStaff, audit } = useActiveStaffContext();
  const { tasks, loading: loadingTasks } = useStaffTasks(activeStaff?.id);
  const { recurring, loading: loadingRec } = useStaffRecurring(activeStaff?.id);
  // 프로젝트 인라인 연결용 — useAllOkrData에서 projects만 사용 (loading은 무시, [] fallback)
  const okrData = useAllOkrData();
  const projects = okrData.projects || [];
  const [generated, setGenerated] = useState(false);
  const [slotPick, setSlotPick] = useState(null);  // 주간 슬롯 배정 모달 {day, slot, current}

  // 오늘의 반복업무 자동 생성 (마운트 + 데이터 로드 1회)
  useEffect(() => {
    if (!activeStaff?.id || loadingTasks || loadingRec || generated) return;
    setGenerated(true);
    generateRecurringForToday({ recurring, tasks, staffId: activeStaff.id, audit }).then(({ created }) => {
      if (created > 0) onToast({ message: `🔁 오늘의 반복업무 ${created}건 자동 추가`, type: 'success' });
    });
  }, [activeStaff?.id, loadingTasks, loadingRec, generated]);

  if (!activeStaff) {
    return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>활동 담당자 선택이 필요합니다. 사이드바 상단 ↻로 전환하세요.</div>;
  }
  if (loadingTasks || loadingRec) {
    return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;
  }

  // TodayTaskTable의 빠른 추가 행에서 호출 — 오늘 요일로 즉시 등록 (pulledToday=true)
  const addTask = async (data) => {
    const t0 = new Date();
    const dayKey = t0.toISOString().split('T')[0];
    const todayDay0 = ALL_DAYS[t0.getDay()];
    const targetDay = data.weekDay || todayDay0;
    try {
      await db.collection(COLLECTIONS.POUR_TASKS).add({
        staffId: activeStaff.id,
        title: (data.title || '').trim(),
        done: false,
        priority: data.priority || 'mid',
        projectId: data.projectId || null,
        projectName: data.projectName || null,
        weekDay: targetDay,
        weekSlot: data.weekSlot || null,
        dueDate: data.dueDate || '',
        isFixed: false,
        pulledToday: targetDay === todayDay0,
        performedDate: targetDay === todayDay0 ? dayKey : null,
        notes: '',
        attachments: [],
        status: 'active',
        ...audit.create(),
      });
      onToast({ message: `✅ "${(data.title || '').trim()}" 추가`, type: 'success' });
    } catch (e) {
      onToast({ message: '추가 실패: ' + e.message, type: 'error' });
      throw e;
    }
  };

  const today = new Date();
  const todayDay = ALL_DAYS[today.getDay()];
  const todayKey = today.toISOString().split('T')[0];
  const myTasks = tasks;  // 이미 staffId로 필터됨
  // 고정업무 = 반복업무로 등록한 오늘 인스턴스(recurringId 보유) 또는 isFixed 플래그. 그 외는 오늘 업무.
  const isFixedTask = (t) => t.recurringId ? t.performedDate === todayKey : !!t.isFixed;
  const todayTasksFinal = myTasks.filter(t => !isFixedTask(t) && (t.weekDay === todayDay || t.pulledToday));
  const fixedTasks = myTasks.filter(isFixedTask)
    .sort((a, b) => (b.isFixed ? 1 : 0) - (a.isFixed ? 1 : 0));  // 📌(pinned=isFixed) 상단 정렬

  // 마감 임박 D-3 이내
  const urgentTasks = myTasks.filter(t => {
    if (t.done || !t.dueDate) return false;
    const diff = Math.ceil((new Date(t.dueDate) - today) / 86400000);
    return diff >= 0 && diff <= 3;
  });

  // 주간 5슬롯 (월~금)
  const slotsByDay = {};
  WEEK_DAYS.forEach(d => {
    const dayTasks = myTasks.filter(t => t.weekDay === d && !isFixedTask(t));
    slotsByDay[d] = [1,2,3,4,5].map(p => dayTasks.find(t => t.weekSlot === p) || null);
  });

  // 주간 슬롯 배정 핸들러 (빈 슬롯 클릭 → 배정 / 채워진 슬롯 → 교체·비우기)
  const assignToSlot = async (taskId, day, slot) => {
    try {
      const occupant = myTasks.find(t => t.weekDay === day && t.weekSlot === slot && t.id !== taskId);
      const batch = db.batch();
      if (occupant) batch.update(db.collection(COLLECTIONS.POUR_TASKS).doc(occupant.id), { weekSlot: null, ...audit.update() });
      batch.update(db.collection(COLLECTIONS.POUR_TASKS).doc(taskId), { weekDay: day, weekSlot: slot, ...audit.update() });
      await batch.commit();
      onToast({ message: `📆 ${day}요일 ${slot}순위에 배치`, type: 'success' });
    } catch (e) { onToast({ message: '배치 실패: ' + e.message, type: 'error' }); }
    setSlotPick(null);
  };
  const clearSlot = async (task) => {
    if (!task) { setSlotPick(null); return; }
    try {
      await db.collection(COLLECTIONS.POUR_TASKS).doc(task.id).update({ weekSlot: null, ...audit.update() });
      onToast({ message: '슬롯 비움 (업무는 유지)', type: 'success' });
    } catch (e) { onToast({ message: '실패: ' + e.message, type: 'error' }); }
    setSlotPick(null);
  };
  const createInSlot = async (title, day, slot) => {
    const t = (title || '').trim();
    if (!t) return;
    try {
      const occupant = myTasks.find(x => x.weekDay === day && x.weekSlot === slot);
      if (occupant) await db.collection(COLLECTIONS.POUR_TASKS).doc(occupant.id).update({ weekSlot: null, ...audit.update() });
      await db.collection(COLLECTIONS.POUR_TASKS).add({
        staffId: activeStaff.id, title: t, done: false, priority: 'mid', projectId: null, projectName: null,
        weekDay: day, weekSlot: slot, dueDate: '', isFixed: false,
        pulledToday: day === todayDay, performedDate: day === todayDay ? todayKey : null,
        notes: '', attachments: [], status: 'active', ...audit.create(),
      });
      onToast({ message: `📆 ${day}요일 ${slot}순위에 새 업무 배치`, type: 'success' });
    } catch (e) { onToast({ message: '추가 실패: ' + e.message, type: 'error' }); }
    setSlotPick(null);
  };

  // 통계
  const totalToday = todayTasksFinal.length;
  const doneToday = todayTasksFinal.filter(t => t.done).length;

  return (
    <div style={{ padding:'24px 32px', maxWidth:1280 }}>
      {/* 헤더 */}
      <div style={{ marginBottom:18 }}>
        <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>🏠 오늘 업무</h1>
        <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
          {activeStaff.name} · {todayDay}요일 · 오늘 업무 {doneToday}/{totalToday} · 고정업무 {fixedTasks.length}건
        </div>
      </div>

      {/* 마감 임박 배너 */}
      {urgentTasks.length > 0 && (
        <div style={{ background:'rgba(229,57,53,.08)', border:'1.5px solid rgba(229,57,53,.3)', borderRadius:10, padding:'10px 16px', marginBottom:16, display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
          <span style={{ fontSize:16 }}>🚨</span>
          <span style={{ fontSize:12.5, fontWeight:800, color:'#DC2626' }}>D-3 이내 마감</span>
          <div style={{ display:'flex', gap:6, flexWrap:'wrap', flex:1 }}>
            {urgentTasks.map(t => {
              const dd = calcDday(t.dueDate);
              return <span key={t.id} style={{ background:'rgba(229,57,53,.15)', color:'#DC2626', padding:'2px 9px', borderRadius:999, fontSize:11, fontWeight:800 }}>{t.title} {dd}</span>;
            })}
          </div>
        </div>
      )}

      {/* 주간 5슬롯 */}
      <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:12, padding:16, marginBottom:18, boxShadow:'var(--shadow)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <div style={{ fontSize:13, fontWeight:900, color:'var(--text)' }}>📆 주간 업무 배치 (월~금 · 우선순위 1~5)</div>
          <div style={{ fontSize:10.5, fontWeight:700, color:'var(--text-sm)' }}>슬롯 클릭 시 미완료 업무 선택 · 5칸 = 매일 핵심 5건만</div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:10 }}>
          {WEEK_DAYS.map(d => {
            const isToday = d === todayDay;
            return (
              <div key={d} style={{ background: isToday ? 'rgba(249,115,22,.06)' : 'var(--bg)', border: isToday ? '1.5px solid var(--or)' : '1px solid var(--border)', borderRadius:10, padding:'10px 8px' }}>
                <div style={{ fontSize:11, fontWeight:900, color: isToday ? 'var(--or-d)' : 'var(--text-md)', marginBottom:8, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <span>{d}요일</span>
                  {isToday && <span style={{ fontSize:9, fontWeight:900, color:'#fff', background:'var(--or)', padding:'1px 6px', borderRadius:999 }}>오늘</span>}
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:5 }}>

                    const slotNum = i + 1;
                    if (t) {

            <div style={{ fontSize:10.5, fontWeight:700, color:'var(--text-sm)' }}>{doneToday}/{totalToday} 완료 · 표 안에서 바로 편집·추가</div>
          </div>
