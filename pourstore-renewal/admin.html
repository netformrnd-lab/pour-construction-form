// ActiveStaffContext — 현재 활동 중인 staff를 모든 컴포넌트에 전역 제공.
// 이 context를 통해 모든 CRUD 작업에 createdByStaffId/Name·updatedByStaffId/Name 자동 첨부됨.
// 사용:
//   const { activeStaff, audit } = useActiveStaffContext();
//   await db.collection(...).add({ ...data, ...audit.create() });  // 신규 등록
//   await db.collection(...).doc(id).update({ ...data, ...audit.update() });  // 수정
// ============================================================
const ActiveStaffContext = createContext(null);
function useActiveStaffContext() {
  return useContext(ActiveStaffContext) || { activeStaff: null, audit: { create: () => ({}), update: () => ({}) } };
}
// audit 헬퍼 — createdAt/updatedAt + staff stamp를 한 번에
function buildAuditHelpers(activeStaff) {
  const stamp = () => ({
    staffId: activeStaff?.id || null,
    staffName: activeStaff?.name || null,
  });
  return {
    create: () => {
      const now = nowIso();
      const s = stamp();
      return {
        createdAt: now,
        createdByStaffId: s.staffId,
        createdByStaffName: s.staffName,
        updatedAt: now,
        updatedByStaffId: s.staffId,
        updatedByStaffName: s.staffName,
      };
    },
    update: () => {
      const s = stamp();
      return {
        updatedAt: nowIso(),
        updatedByStaffId: s.staffId,
        updatedByStaffName: s.staffName,
      };
    },
  };
}
// 상대 시간 표시 — "12분 전" / "3시간 전" / 3일 이상이면 날짜
function relativeTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const diff = Date.now() - d.getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return '방금';
  if (m < 60) return `${m}분 전`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}시간 전`;
  const days = Math.floor(h / 24);
  if (days < 3) return `${days}일 전`;
  return d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' });
}

async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// /send-sms (Cloudflare Pages Function) 호출
// 환경변수 미설정 시: { ok: false, skipped: true }
async function sendSMS(to, text) {
  try {
    const cleaned = (to || '').replace(/[^0-9]/g, '');
    if (!cleaned || cleaned.length < 9) return { ok: false, error: '전화번호 형식 오류' };
    const res = await fetch('/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: cleaned, text })
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) return { ok: false, error: json.error || `HTTP ${res.status}` };
    return { ok: true, data: json };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  if (isNaN(d)) return '-';
  return d.toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\. /g, '-').replace('.','');
}

function fmtPrice(n) {
  if (n == null || n === '') return '-';
  return Number(n).toLocaleString('ko-KR');
}

function nowIso() { return new Date().toISOString(); }
function genId() { return 'id-' + Math.random().toString(36).slice(2, 10); }

function surfLabel(id) { const s = SURFS.find(x => x.id === id); return s ? s.name : id; }
function surfRisk(id) { const s = SURFS.find(x => x.id === id); return s ? s.risk : 'ok'; }

// 지금은 PIN 인증 통과 후 staff 목록에서 본인 선택.
// ============================================================
function getActiveStaffId() {
  try { return localStorage.getItem(ACTIVE_STAFF_KEY); } catch (e) { return null; }
}
function setActiveStaffId(id) {
  try {
    if (id) localStorage.setItem(ACTIVE_STAFF_KEY, id);
    else localStorage.removeItem(ACTIVE_STAFF_KEY);
  } catch (e) {}
}

// useStaffMembers — staff 컬렉션을 POUR OS 멤버처럼 사용 (활성만, 이름순)
// onSnapshot 실시간 구독 — 어드민에서 staff 추가/수정 시 즉시 반영
function useStaffMembers({ includeInactive = false } = {}) {
  const [members, setMembers] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    const unsub = db.collection(COLLECTIONS.STAFF).onSnapshot(snap => {
      let list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!includeInactive) list = list.filter(s => s.active !== false);
      list.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));
      console.log(`[useStaffMembers] ${list.length}명 (active${includeInactive?'+inactive':' only'})`);
      setMembers(list);
      setLoading(false);
    }, err => {
      console.error('[useStaffMembers] 구독 실패:', err);
      setLoading(false);
    });
    return unsub;
  }, [includeInactive]);
  return { members, loading };
}

// useActiveStaff — 현재 활동 중인 staff 객체 (members 중에서)
function useActiveStaff(members) {
  const [activeId, setActiveIdState] = useState(getActiveStaffId());
  const active = useMemo(() => members.find(m => m.id === activeId) || null, [members, activeId]);
  const setActive = (id) => { setActiveStaffId(id); setActiveIdState(id); };
  // 저장된 staffId가 active 목록에 없으면 (비활성 처리 등) 초기화
  useEffect(() => {
    if (activeId && members.length && !active) setActive(null);
  }, [activeId, members.length, active]);
  return { active, activeId, setActive };
}

// ============================================================
// Matching Requests (시공연결 신청)
// ============================================================
function MatchingRequests({ requests, partners, rules, onUpdate, onToast }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let list = requests;
    if (filter !== 'all') list = list.filter(r => r.status === filter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(r => (r.customerName || '').toLowerCase().includes(q) || (r.customerPhone || '').includes(q) || (r.address || '').toLowerCase().includes(q));
    }
    return list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  }, [requests, filter, search]);

  function autoMatch(req) {
    // 부위 → surf 매칭, 지역 → region 매칭
    const region = req.region;
    const surf = (req.methods && req.methods[0]) || '';
    const candidates = partners.filter(p => {
      if (p.contractStatus !== '활성') return false;
      if (region && p.regions && p.regions.length && !p.regions.includes(region)) return false;
      if (surf && p.specialities && p.specialities.length && !p.specialities.includes(surf)) return false;
      return true;
    });
    candidates.sort((a, b) => {
      const gradeOrder = { 'A': 0, 'B': 1, 'C': 2 };
      return (gradeOrder[a.grade] ?? 9) - (gradeOrder[b.grade] ?? 9);
    });
    return candidates.slice(0, 3);
  }

  return (
    <div>
      <Header title="시공연결 신청 관리" subtitle="자사몰 시공 매칭 신청 → 자동 매칭 → 수동 검토 → 파트너 통보" />
      <div style={{ padding:'20px 32px 0' }}>
        <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>

          <button onClick={() => { setSelected({ _new:true, status:'신규', methods:[], region:'서울', createdAt: nowIso() }); }} style={btnPrimary()}>+ 신규 등록</button>

      </div>

                    {['상태','신청일','고객','연락처','지역','부위','자동매칭'].map(h => (
                      <th key={h} style={th()}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(r => {
                    const matches = autoMatch(r);
                    return (
                      <tr key={r.id} onClick={() => setSelected(r)} style={{ cursor:'pointer', borderBottom:'1px solid var(--border-s)' }} onMouseOver={e => e.currentTarget.style.background='var(--or-pale)'} onMouseOut={e => e.currentTarget.style.background='#fff'}>
                        <td style={td()}><StatusBadge status={r.status} /></td>
                        <td style={td()}>{fmtDate(r.createdAt)}</td>

            try {
              if (data._new) {
                const { _new, ...payload } = data;
                payload.createdAt = payload.createdAt || nowIso();
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.MATCHING_REQUESTS).add(payload);
                onToast({ message: '신청 등록 완료', type: 'success' });
              } else {

          }}

      )}

  );
}

// ============================================================
// Portal PIN Block (재사용 — 파트너/대리점 모달 공통)
// ============================================================
function PortalPinBlock({ data, update, collection, onToast }) {
  const [issuedPin, setIssuedPin] = useState(null);  // 방금 발급/생성된 평문 PIN
  const [busy, setBusy] = useState(false);
  const hasPin = !!data.portalPinHash;
  const phone = data.contactPhone;
  const accountId = data.id;

  function generatePin() {
    return Math.floor(100000 + Math.random() * 900000).toString();  // 6자리
  }

  function buildPinSmsText(pin) {
    const baseUrl = location.origin + '/pourstore-renewal';
    return `[POUR스토어 포털] 로그인 PIN 발급
PIN: ${pin}
포털: ${baseUrl}/portal
키오스크: ${baseUrl}/kiosk
※ 본 메시지는 1회 발송, 안전 보관 부탁드립니다`;
  }

  async function autoSendSms(pin) {
    const text = buildPinSmsText(pin);
    const r = await sendSMS(phone, text);
    if (r.ok) {
      onToast({ message: `📱 ${phone}로 PIN 자동 전송 완료`, type: 'success' });
    } else {
      onToast({ message: `⚠️ SMS 전송 실패: ${r.error} — 화면 PIN을 직접 전달하세요`, type: 'error' });
    }
  }

  async function issue() {
    if (!phone) { onToast({ message: '전화번호 먼저 입력 후 저장해 주세요', type: 'error' }); return; }
    if (!accountId) { onToast({ message: '먼저 계정을 저장해 주세요', type: 'error' }); return; }
    setBusy(true);
    try {
      const newPin = generatePin();
      const h = await hashPin(newPin);
      await db.collection(collection).doc(accountId).set({ portalPinHash: h, portalPinIssuedAt: nowIso() }, { merge: true });
      update('portalPinHash', h);
      update('portalPinIssuedAt', nowIso());
      setIssuedPin(newPin);
      onToast({ message: '신규 PIN 발급 완료', type: 'success' });
      // 발급 직후 자동 SMS 전송 시도 (실패해도 발급은 완료)
      autoSendSms(newPin);
    } catch (e) { onToast({ message: '발급 실패: ' + e.message, type: 'error' }); }
    setBusy(false);
  }

  async function resendSms() {
    if (!issuedPin) { onToast({ message: '재전송할 PIN이 없습니다 (재발급 후 가능)', type: 'error' }); return; }
    setBusy(true);
    await autoSendSms(issuedPin);
    setBusy(false);
  }

  async function reset() {
    if (!confirm('PIN을 초기화하면 기존 PIN으로 로그인할 수 없습니다. 계속하시겠습니까?')) return;
    setBusy(true);
    try {
      await db.collection(collection).doc(accountId).set({ portalPinHash: null, portalPinIssuedAt: null }, { merge: true });
      update('portalPinHash', null);
      update('portalPinIssuedAt', null);
      setIssuedPin(null);
      onToast({ message: 'PIN 초기화 완료', type: 'success' });
    } catch (e) { onToast({ message: '초기화 실패: ' + e.message, type: 'error' }); }
    setBusy(false);
  }

  return (
    <div style={{ padding:16, background:'linear-gradient(135deg, #FFF7ED, #FFEDD5)', border:'1px solid #FED7AA', borderRadius:12, marginBottom:14 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10, flexWrap:'wrap', gap:8 }}>
        <div>
          <div style={{ fontSize:12, fontWeight:900, color:'var(--or-d)', letterSpacing:.5 }}>🔑 포털 로그인 PIN</div>
          <div style={{ fontSize:11, color:'var(--text-md)', fontWeight:700, marginTop:3 }}>
            {hasPin ? <>발급됨 · {data.portalPinIssuedAt ? fmtDate(data.portalPinIssuedAt) : ''}</> : <span style={{ color:'var(--red)' }}>미발급 — 포털·키오스크 로그인 불가</span>}
          </div>
        </div>
        <div style={{ display:'flex', gap:6 }}>

function tierByMonthly(monthly) {
  const m = Number(monthly) || 0;
  return DEALER_TIERS.find(t => m >= t.monthlyMin && m < t.monthlyMax) || DEALER_TIERS[0];
}
function tierMeta(id) { return DEALER_TIERS.find(t => t.id === id) || DEALER_TIERS[0]; }

function TierBadge({ tier, size = 'md' }) {
  const t = tierMeta(tier);
  const sm = size === 'sm';
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      padding: sm ? '3px 9px' : '4px 11px',
      fontSize: sm ? 10.5 : 11.5, fontWeight:900, letterSpacing:.5,
      background:t.bg, border:`1px solid ${t.border}`, color:t.color, borderRadius:6
    }}>
      {tier === 'Gold' ? '⭐' : tier === 'Platinum' ? '💎' : '◆'} {t.label}
      <span style={{ opacity:.7, fontWeight:700 }}>· {t.margin}%</span>
    </span>
  );
}
function DealerStatusBadge({ status }) {
  const c = DEALER_STATUS_COLOR[status] || DEALER_STATUS_COLOR['대기'];
  return <span style={{ display:'inline-block', padding:'3px 9px', background:c.bg, border:`1px solid ${c.border}`, color:c.color, fontSize:10.5, fontWeight:900, borderRadius:5, letterSpacing:.3 }}>{status}</span>;
}

function Dealers({ dealers, onUpdate, onToast }) {
  const [tierFilter, setTierFilter] = useState('all');

  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let list = dealers;
    if (tierFilter !== 'all') list = list.filter(d => d.tier === tierFilter);
    if (statusFilter !== 'all') list = list.filter(d => d.contractStatus === statusFilter);
    if (regionFilter !== 'all') list = list.filter(d => d.region === regionFilter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(d => (d.companyName || '').toLowerCase().includes(q) || (d.representative || '').toLowerCase().includes(q) || (d.contactPhone || '').includes(q));
    }
    return list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  }, [dealers, tierFilter, statusFilter, regionFilter, search]);

  const tierCounts = useMemo(() => {
    return DEALER_TIERS.reduce((acc, t) => {
      acc[t.id] = dealers.filter(d => d.tier === t.id && d.contractStatus === '활성').length;
      return acc;
    }, {});
  }, [dealers]);

  return (
    <div>
      <Header title="대리점 관리" subtitle="Silver / Gold / Platinum 3티어 등급 + 권역 단독 영업권 관리" />

      <div style={{ padding:'20px 32px 0' }}>
        {/* Tier 요약 카드 */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:12, marginBottom:18 }}>
          {DEALER_TIERS.map(t => {
            const cnt = tierCounts[t.id] || 0;
            const total = dealers.filter(d => d.tier === t.id).length;
            return (
              <div key={t.id} style={{
                background:'#fff', padding:'16px 18px', borderRadius:12,
                border:`1.5px solid ${t.border}`, position:'relative', overflow:'hidden'
              }}>
                <div style={{ position:'absolute', top:0, right:0, width:60, height:60, background:t.bg, borderRadius:'50%', transform:'translate(20px,-20px)', opacity:.6 }} />
                <div style={{ position:'relative' }}>
                  <div style={{ fontSize:11, fontWeight:800, color:t.color, letterSpacing:.8, marginBottom:6 }}>
                    {t.id === 'Gold' ? '⭐' : t.id === 'Platinum' ? '💎' : '◆'} {t.label} · {t.margin}%
                  </div>
                  <div style={{ fontSize:24, fontWeight:900, color:'var(--navy)', letterSpacing:-.6, lineHeight:1 }}>
                    {cnt}<span style={{ fontSize:13, color:'var(--text-sm)', fontWeight:700, marginLeft:5 }}>/ {total}</span>
                  </div>
                  <div style={{ fontSize:10.5, color:'var(--text-xs)', fontWeight:700, marginTop:4 }}>활성 / 전체</div>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
          <select value={tierFilter} onChange={e => setTierFilter(e.target.value)} style={inputStyle({ minWidth:120 })}>
            <option value="all">전체 등급</option>
            {DEALER_TIERS.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
          </select>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={inputStyle({ minWidth:110 })}>
            <option value="all">전체 상태</option>
            {DEALER_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select value={regionFilter} onChange={e => setRegionFilter(e.target.value)} style={inputStyle({ minWidth:110 })}>
            <option value="all">전체 권역</option>
            {REGIONS.map(r => <option key={r} value={r}>{r}</option>)}
          </select>
          <input type="text" placeholder="회사명·대표·연락처 검색" value={search} onChange={e => setSearch(e.target.value)} style={inputStyle({ flex:1, minWidth:200 })} />
          <button onClick={() => setSelected({ _new:true, tier:'Silver', contractStatus:'대기', region:'서울', categories:[], monthlySales:0, initialStock:10000000, creditLimit:5000000 })} style={btnPrimary()}>+ 대리점 등록</button>
        </div>
      </div>

      <div style={{ padding:'0 32px 32px' }}>
        {filtered.length === 0 ? (
          <Empty icon="🏪" title="등록된 대리점이 없습니다" desc={dealers.length === 0 ? '신규 대리점을 등록해 주세요' : '필터 조건에 맞는 대리점이 없습니다'} />
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(340px, 1fr))', gap:12 }}>
            {filtered.map(d => {
              const t = tierMeta(d.tier);
              return (
                <button key={d.id} onClick={() => setSelected(d)} style={{
                  background:'#fff', padding:'18px 20px', borderRadius:'var(--r-lg)',
                  border:`1px solid ${d.tier === 'Gold' ? t.border : 'var(--border)'}`,
                  textAlign:'left', cursor:'pointer', position:'relative', overflow:'hidden'
                }} onMouseOver={e => { e.currentTarget.style.boxShadow = 'var(--shadow)'; e.currentTarget.style.transform = 'translateY(-2px)'; }} onMouseOut={e => { e.currentTarget.style.boxShadow = 'none'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                  <div style={{ position:'absolute', top:0, left:0, right:0, height:3, background:t.color }} />
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10, gap:8 }}>
                    <h4 style={{ fontSize:14.5, fontWeight:900, color:'var(--navy)', letterSpacing:-0.3, flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{d.companyName || '(이름없음)'}</h4>

                    {d.representative ? `대표 ${d.representative} · ` : ''}{d.contactPhone || '-'}
                  </div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginBottom:10 }}>
                    {d.region && <span style={miniChip()}>📍 {d.region}</span>}
                    <span style={{ ...miniChip(), background: d.inventoryMode === 'stocked' ? '#DBEAFE' : 'var(--or-pale)', borderColor: d.inventoryMode === 'stocked' ? '#93C5FD' : 'var(--or-l)', color: d.inventoryMode === 'stocked' ? '#1E40AF' : 'var(--or-d)' }}>{d.inventoryMode === 'stocked' ? '🏪 유재고' : '📦 무재고'}</span>
                    {d.exclusiveRegion && <span style={{ ...miniChip(), background:'#FEE2E2', borderColor:'#FCA5A5', color:'#DC2626' }}>🛡 단독 {d.exclusiveRegion}</span>}
                  </div>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:10, borderTop:'1px solid var(--border-s)', fontSize:11, color:'var(--text-sm)', fontWeight:700 }}>
                    <span>월 매출 <b style={{ color:'var(--navy)' }}>{fmtPrice(d.monthlySales || 0)}원</b></span>
                    <span>{(d.categories || []).length}개 카테고리</span>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>

      {selected && (
        <DealerDetail
          dealer={selected}
          onToast={onToast}
          onClose={() => setSelected(null)}
          onSave={async (data) => {
            try {
              if (data._new) {
                const { _new, ...payload } = data;
                payload.createdAt = nowIso();
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.DEALERS).add(payload);
                onToast({ message: '대리점 등록 완료', type: 'success' });
              } else {
                const { id, ...payload } = data;
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.DEALERS).doc(id).set(payload, { merge: true });
                onToast({ message: '저장 완료', type: 'success' });
              }
              setSelected(null);
              onUpdate();
            } catch (e) {
              console.error(e);
              onToast({ message: '저장 실패: ' + e.message, type: 'error' });
            }
          }}
          onDelete={async (id) => {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try {
              await db.collection(COLLECTIONS.DEALERS).doc(id).delete();
              onToast({ message: '삭제 완료', type: 'success' });
              setSelected(null);
              onUpdate();
            } catch (e) { onToast({ message: '삭제 실패: ' + e.message, type: 'error' }); }
          }}
        />
      )}
    </div>
  );
}

          <Field label="만료일"><input type="date" value={data.contractExpiry || ''} onChange={e => update('contractExpiry', e.target.value)} style={inputStyle()} /></Field>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginTop:8 }}>
          <Field label="초도 재고 매입액 (원)">
            <input type="number" value={data.initialStock || 0} onChange={e => update('initialStock', Number(e.target.value))} style={inputStyle()} placeholder="10000000" />
          </Field>
          <Field label="외상 한도 (원)">
            <input type="number" value={data.creditLimit || 0} onChange={e => update('creditLimit', Number(e.target.value))} style={inputStyle()} placeholder="5000000" />
          </Field>

        <Field label="💰 대리점 본사 입금 계좌 안내 (대리점이 송금 시 사용할 본사 계좌 — 청구서에 기재)">
          <input type="text" value={data.accountInfo || ''} onChange={e => update('accountInfo', e.target.value)} style={inputStyle()} placeholder="대리점 메모 — 본사 입금 계좌·예금주 등 (CSV 청구서에 표시됨)" />

// ============================================================
// Items Editor (재사용 — 발주/주문 공통)
// ============================================================
function ItemsEditor({ items, onChange }) {
  const list = items || [];
  function update(idx, key, val) {
    const next = list.map((it, i) => i === idx ? { ...it, [key]: val } : it);
    onChange(next);
  }
  function add() {
    onChange([...list, { name:'', qty:1, unitPrice:0 }]);
  }
  function remove(idx) {
    onChange(list.filter((_, i) => i !== idx));
  }
  const total = list.reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.unitPrice) || 0), 0);
  return (
    <div>
      {list.length === 0 ? (
        <div style={{ padding:'24px 14px', textAlign:'center', background:'var(--bg)', border:'1px dashed var(--border)', borderRadius:10, fontSize:12, color:'var(--text-sm)', fontWeight:700 }}>
          품목이 없습니다. 아래 + 버튼으로 추가하세요.
        </div>
      ) : (
        <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 80px 120px 120px 36px', gap:8, padding:'10px 12px', background:'#fff', borderBottom:'1px solid var(--border)', fontSize:11, fontWeight:800, color:'var(--text-sm)', letterSpacing:.3 }}>
            <span>품목</span><span style={{ textAlign:'right' }}>수량</span><span style={{ textAlign:'right' }}>단가</span><span style={{ textAlign:'right' }}>합계</span><span></span>
          </div>
          {list.map((it, idx) => {
            const sub = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
            return (
              <div key={idx} style={{ display:'grid', gridTemplateColumns:'1fr 80px 120px 120px 36px', gap:8, padding:'8px 12px', borderBottom:'1px solid var(--border-s)', alignItems:'center' }}>
                <input value={it.name} onChange={e => update(idx, 'name', e.target.value)} placeholder="제품명" style={{ ...inputStyle({ padding:'7px 10px', fontSize:12.5, background:'#fff' }) }} />
                <input type="number" value={it.qty} onChange={e => update(idx, 'qty', Number(e.target.value))} style={{ ...inputStyle({ padding:'7px 10px', fontSize:12.5, textAlign:'right', background:'#fff' }) }} />
                <input type="number" value={it.unitPrice} onChange={e => update(idx, 'unitPrice', Number(e.target.value))} style={{ ...inputStyle({ padding:'7px 10px', fontSize:12.5, textAlign:'right', background:'#fff' }) }} />
                <div style={{ textAlign:'right', fontSize:12.5, fontWeight:800, color:'var(--navy)' }}>{fmtPrice(sub)}원</div>
                <button onClick={() => remove(idx)} style={{ width:30, height:30, borderRadius:6, color:'var(--red)', fontSize:14 }}>✕</button>
              </div>
            );
          })}
          <div style={{ padding:'12px 14px', background:'#fff', display:'flex', justifyContent:'space-between', alignItems:'center', borderTop:'2px solid var(--border)' }}>
            <button onClick={add} style={{ padding:'7px 14px', borderRadius:8, fontSize:12, fontWeight:800, color:'var(--or-d)', background:'var(--or-pale)', border:'1px solid var(--or-l)' }}>+ 품목 추가</button>
            <div style={{ fontSize:13, color:'var(--text-md)', fontWeight:700 }}>합계 <b style={{ color:'var(--or-d)', fontSize:16, marginLeft:6, letterSpacing:-.3 }}>{fmtPrice(total)}원</b></div>
          </div>
        </div>
      )}
      {list.length === 0 && (
        <button onClick={add} style={{ marginTop:8, padding:'8px 14px', borderRadius:8, fontSize:12, fontWeight:800, color:'var(--or-d)', background:'var(--or-pale)', border:'1px solid var(--or-l)' }}>+ 품목 추가</button>
      )}
    </div>
  );
}

function StatusPill({ status, colorMap }) {
  const c = colorMap[status] || { bg:'#F3F4F6', border:'#E5E7EB', color:'#6B7280' };
  return <span style={{ display:'inline-block', padding:'3px 9px', background:c.bg, border:`1px solid ${c.border}`, color:c.color, fontSize:10.5, fontWeight:900, borderRadius:5, letterSpacing:.3 }}>{status}</span>;
}

// ============================================================
// Purchase Orders (발주 관리 — 대리점 → 본사)
// ============================================================
function PurchaseOrders({ purchaseOrders, dealers, onUpdate, onToast }) {
  const [statusFilter, setStatusFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let list = purchaseOrders;
    if (statusFilter !== 'all') list = list.filter(p => p.status === statusFilter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(p => (p.dealerName || '').toLowerCase().includes(q) || (p.orderNo || '').toLowerCase().includes(q));
    }
    return list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  }, [purchaseOrders, statusFilter, search]);

  const totals = useMemo(() => {
    const active = purchaseOrders.filter(p => !['취소'].includes(p.status));
    return {
      count: active.length,
      pending: purchaseOrders.filter(p => ['신규','승인','출고대기'].includes(p.status)).length,
      shipping: purchaseOrders.filter(p => p.status === '배송중').length,
      monthAmount: purchaseOrders
        .filter(p => p.status !== '취소' && p.createdAt && new Date(p.createdAt) > new Date(Date.now() - 30*24*60*60*1000))
        .reduce((s, p) => s + (p.totalAmount || 0), 0),
    };
  }, [purchaseOrders]);

  return (
    <div>
      <Header title="발주 관리" subtitle="대리점이 본사에 발주한 자재 주문 처리 — 승인 → 출고 → 배송 → 입고" />

      <div style={{ padding:'20px 32px 0' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:12, marginBottom:18 }}>
          <SummaryCard icon="📦" label="진행 중 발주" value={totals.count} color="var(--or)" />
          <SummaryCard icon="⏱" label="처리 대기" value={totals.pending} color="var(--amber)" />
          <SummaryCard icon="🚚" label="배송 중" value={totals.shipping} color="var(--navy)" />
          <SummaryCard icon="💰" label="최근 30일 발주액" value={fmtPrice(totals.monthAmount) + '원'} color="var(--green)" small />
        </div>

        <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={inputStyle({ minWidth:140 })}>
            <option value="all">전체 상태 ({purchaseOrders.length})</option>
            {PO_STATUS.map(s => {
              const cnt = purchaseOrders.filter(p => p.status === s).length;
              return <option key={s} value={s}>{s} ({cnt})</option>;
            })}
          </select>
          <input type="text" placeholder="대리점·발주번호 검색" value={search} onChange={e => setSearch(e.target.value)} style={inputStyle({ flex:1, minWidth:200 })} />
          <button onClick={() => setSelected({
            _new:true, status:'신규', items:[], paymentType:'외상',
            createdAt: nowIso(), orderNo: 'PO-' + Date.now().toString().slice(-8)
          })} style={btnPrimary()}>+ 신규 발주</button>
        </div>
      </div>

      <div style={{ padding:'0 32px 32px' }}>
        {filtered.length === 0 ? (
          <Empty icon="📦" title="발주 내역이 없습니다" desc="대리점에서 자재 발주가 들어오면 여기에 표시됩니다" />
        ) : (
          <div style={{ background:'#fff', borderRadius:'var(--r-lg)', border:'1px solid var(--border)', overflow:'hidden' }}>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', fontSize:12.5, borderCollapse:'collapse' }}>
                <thead style={{ background:'var(--bg)' }}>
                  <tr>
                    {['상태','발주번호','발주일','대리점','품목수','합계','결제'].map(h => <th key={h} style={th()}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(p => (
                    <tr key={p.id} onClick={() => setSelected(p)} style={{ cursor:'pointer', borderBottom:'1px solid var(--border-s)' }} onMouseOver={e => e.currentTarget.style.background='var(--or-pale)'} onMouseOut={e => e.currentTarget.style.background='#fff'}>
                      <td style={td()}><StatusPill status={p.status} colorMap={PO_STATUS_COLOR} /></td>
                      <td style={td()}><span style={{ fontFamily:'monospace', fontWeight:700, color:'var(--text-md)' }}>{p.orderNo || '-'}</span></td>
                      <td style={td()}>{fmtDate(p.createdAt)}</td>
                      <td style={td()}><b style={{ color:'var(--navy)' }}>{p.dealerName || '-'}</b></td>
                      <td style={td()}>{(p.items || []).length}건</td>
                      <td style={{ ...td(), textAlign:'right', fontWeight:800, color:'var(--navy)' }}>{fmtPrice(p.totalAmount || 0)}원</td>
                      <td style={td()}><span style={{ ...miniChip(), background: p.paymentType === '완료' ? 'var(--green-l)' : 'var(--bg)', borderColor: p.paymentType === '완료' ? 'var(--green-m)' : 'var(--border)', color: p.paymentType === '완료' ? 'var(--green)' : 'var(--text-sm)' }}>{p.paymentType || '-'}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {selected && (
        <PurchaseOrderDetail
          po={selected}
          dealers={dealers}
          onClose={() => setSelected(null)}
          onSave={async (data) => {
            try {
              data.totalAmount = (data.items || []).reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.unitPrice) || 0), 0);
              if (data._new) {
                const { _new, ...payload } = data;
                payload.createdAt = payload.createdAt || nowIso();
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.PURCHASE_ORDERS).add(payload);
                onToast({ message: '발주 등록 완료', type: 'success' });
              } else {
                const { id, ...payload } = data;
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.PURCHASE_ORDERS).doc(id).set(payload, { merge: true });
                onToast({ message: '저장 완료', type: 'success' });
              }
              setSelected(null);
              onUpdate();
            } catch (e) { console.error(e); onToast({ message: '저장 실패: ' + e.message, type: 'error' }); }
          }}
          onDelete={async (id) => {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try { await db.collection(COLLECTIONS.PURCHASE_ORDERS).doc(id).delete(); onToast({ message:'삭제 완료', type:'success' }); setSelected(null); onUpdate(); }
            catch (e) { onToast({ message:'삭제 실패: '+e.message, type:'error' }); }
          }}
        />
      )}
    </div>
  );
}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
        <Field label="배송 주소"><input type="text" value={data.shippingAddress || ''} onChange={e => update('shippingAddress', e.target.value)} style={inputStyle()} /></Field>
        <Field label="송장 번호"><input type="text" value={data.trackingNo || ''} onChange={e => update('trackingNo', e.target.value)} style={inputStyle({ fontFamily:'monospace' })} /></Field>
      </div>
      <Field label="관리자 메모"><textarea value={data.adminMemo || ''} onChange={e => update('adminMemo', e.target.value)} style={{ ...inputStyle(), minHeight:60, resize:'vertical' }} /></Field>

      <div style={{ display:'flex', gap:8, marginTop:24, paddingTop:18, borderTop:'1px solid var(--border-s)' }}>
        {!po._new && <button onClick={() => onDelete(data.id)} style={{ padding:'12px 18px', borderRadius:10, fontSize:13, fontWeight:800, color:'var(--red)', background:'var(--red-l)', border:'1px solid var(--red-m)' }}>삭제</button>}
        <div style={{ flex:1 }} />
        <button onClick={onClose} style={btnGhost()}>취소</button>
        <button onClick={() => onSave(data)} style={btnPrimary()}>{po._new ? '등록' : '저장'}</button>
      </div>
    </Modal>
  );
}

// ============================================================
// Orders (주문 관리 — 자사몰 + 대리점 매장 + 전화)
// ============================================================
function Orders({ orders, dealers, onUpdate, onToast }) {
  const [statusFilter, setStatusFilter] = useState('all');
  const [sourceFilter, setSourceFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let list = orders;
    if (statusFilter !== 'all') list = list.filter(o => o.status === statusFilter);
    if (sourceFilter !== 'all') list = list.filter(o => o.source === sourceFilter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(o => (o.customerName || '').toLowerCase().includes(q) || (o.customerPhone || '').includes(q) || (o.orderNo || '').toLowerCase().includes(q));
    }
    return list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  }, [orders, statusFilter, sourceFilter, search]);

  const summary = useMemo(() => {
    const active = orders.filter(o => o.status !== '환불');
    return {
      total: active.length,
      pending: orders.filter(o => ['신규','입금대기','입금확인','출고','결제대기','결제완료','배송준비'].includes(o.status)).length,
      shipping: orders.filter(o => o.status === '배송중').length,
      monthAmount: orders
        .filter(o => o.status !== '환불' && o.createdAt && new Date(o.createdAt) > new Date(Date.now() - 30*24*60*60*1000))
        .reduce((s, o) => s + (o.totalAmount || 0), 0),
    };
  }, [orders]);

  return (
    <div>
      <Header title="주문 관리" subtitle="자사몰 + 대리점 매장 + 전화 주문 통합 관리" />

      <div style={{ padding:'20px 32px 0' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:12, marginBottom:18 }}>
          <SummaryCard icon="🛒" label="활성 주문" value={summary.total} color="var(--or)" />
          <SummaryCard icon="⏱" label="처리 대기" value={summary.pending} color="var(--amber)" />
          <SummaryCard icon="🚚" label="배송 중" value={summary.shipping} color="var(--navy)" />
          <SummaryCard icon="💰" label="최근 30일 매출" value={fmtPrice(summary.monthAmount) + '원'} color="var(--green)" small />
        </div>

        <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={inputStyle({ minWidth:130 })}>
            <option value="all">전체 상태</option>
            {ORDER_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select value={sourceFilter} onChange={e => setSourceFilter(e.target.value)} style={inputStyle({ minWidth:130 })}>
            <option value="all">전체 채널</option>
            {ORDER_SOURCES.map(s => <option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
          </select>
          <input type="text" placeholder="주문번호·고객명·연락처" value={search} onChange={e => setSearch(e.target.value)} style={inputStyle({ flex:1, minWidth:200 })} />
          <button onClick={() => setSelected({
            _new:true, status:'신규', source:'pourstore-site', items:[],
            createdAt: nowIso(), orderNo: 'OR-' + Date.now().toString().slice(-8)
          })} style={btnPrimary()}>+ 신규 주문</button>
        </div>
      </div>

      <div style={{ padding:'0 32px 32px' }}>
        {filtered.length === 0 ? (
          <Empty icon="🛒" title="주문 내역이 없습니다" desc="자사몰·대리점·전화 주문이 들어오면 여기에 표시됩니다" />
        ) : (
          <div style={{ background:'#fff', borderRadius:'var(--r-lg)', border:'1px solid var(--border)', overflow:'hidden' }}>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', fontSize:12.5, borderCollapse:'collapse' }}>
                <thead style={{ background:'var(--bg)' }}>
                  <tr>
                    {['상태','채널','주문번호','주문일','고객','품목수','합계'].map(h => <th key={h} style={th()}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(o => {
                    const src = ORDER_SOURCES.find(x => x.id === o.source);
                    return (
                      <tr key={o.id} onClick={() => setSelected(o)} style={{ cursor:'pointer', borderBottom:'1px solid var(--border-s)' }} onMouseOver={e => e.currentTarget.style.background='var(--or-pale)'} onMouseOut={e => e.currentTarget.style.background='#fff'}>
                        <td style={td()}><StatusPill status={o.status} colorMap={ORDER_STATUS_COLOR} /></td>
                        <td style={td()}>
                          <span style={{ fontSize:12, fontWeight:700, color:'var(--text-md)' }}>{src ? src.icon : '📋'} {src ? src.label : '-'}</span>
                          {o.dealerName && <div style={{ fontSize:10.5, color:'var(--text-xs)', marginTop:2 }}>· {o.dealerName}</div>}
                        </td>
                        <td style={td()}><span style={{ fontFamily:'monospace', fontWeight:700, color:'var(--text-md)' }}>{o.orderNo || '-'}</span></td>
                        <td style={td()}>{fmtDate(o.createdAt)}</td>
                        <td style={td()}>
                          <b style={{ color:'var(--navy)' }}>{o.customerName || '-'}</b>
                          {o.customerPhone && <div style={{ fontSize:10.5, color:'var(--text-xs)', fontWeight:700, marginTop:2 }}>{o.customerPhone}</div>}
                        </td>
                        <td style={td()}>{(o.items || []).length}건</td>
                        <td style={{ ...td(), textAlign:'right', fontWeight:800, color:'var(--navy)' }}>{fmtPrice(o.totalAmount || 0)}원</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {selected && (
        <OrderDetail
          order={selected}
          dealers={dealers}
          onClose={() => setSelected(null)}
          onSave={async (data) => {
            try {
              data.totalAmount = (data.items || []).reduce((s, it) => s + (Number(it.qty) || 0) * (Number(it.unitPrice) || 0), 0);
              if (data._new) {
                const { _new, ...payload } = data;
                payload.createdAt = payload.createdAt || nowIso();
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.DEALER_ORDERS).add(payload);
                onToast({ message: '주문 등록 완료', type: 'success' });
              } else {
                const { id, ...payload } = data;
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.DEALER_ORDERS).doc(id).set(payload, { merge: true });
                onToast({ message: '저장 완료', type: 'success' });
              }
              setSelected(null);
              onUpdate();
            } catch (e) { console.error(e); onToast({ message: '저장 실패: ' + e.message, type: 'error' }); }
          }}
          onDelete={async (id) => {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try { await db.collection(COLLECTIONS.DEALER_ORDERS).doc(id).delete(); onToast({ message:'삭제 완료', type:'success' }); setSelected(null); onUpdate(); }
            catch (e) { onToast({ message:'삭제 실패: '+e.message, type:'error' }); }
          }}
        />
      )}
    </div>
  );
}

function OrderDetail({ order, dealers, onClose, onSave, onDelete }) {
  const [data, setData] = useState(order);
  const update = (k, v) => setData(d => ({ ...d, [k]: v }));
  const isDealerOrder = data.source === 'dealer-store';

  return (
    <Modal open={true} onClose={onClose} title={order._new ? '신규 주문 등록' : `주문 상세 — ${order.orderNo || ''}`} width={840}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14, marginBottom:14 }}>
        <Field label="주문번호"><input type="text" value={data.orderNo || ''} onChange={e => update('orderNo', e.target.value)} style={inputStyle({ fontFamily:'monospace' })} /></Field>
        <Field label="상태">
          <select value={data.status || '신규'} onChange={e => update('status', e.target.value)} style={inputStyle()}>
            {ORDER_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="주문 채널">
          <select value={data.source || 'pourstore-site'} onChange={e => update('source', e.target.value)} style={inputStyle()}>
            {ORDER_SOURCES.map(s => <option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
          </select>
        </Field>
      </div>

      {isDealerOrder && (
        <Field label="처리 대리점">
          <select value={data.dealerId || ''} onChange={e => {
            const d = dealers.find(x => x.id === e.target.value);
            update('dealerId', e.target.value);
            if (d) update('dealerName', d.companyName);
          }} style={inputStyle()}>
            <option value="">대리점 선택</option>
            {dealers.filter(d => d.contractStatus === '활성').map(d => <option key={d.id} value={d.id}>{d.companyName} · {d.region}</option>)}
          </select>
        </Field>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
        <Field label="고객명"><input type="text" value={data.customerName || ''} onChange={e => update('customerName', e.target.value)} style={inputStyle()} /></Field>
        <Field label="연락처"><input type="text" value={data.customerPhone || ''} onChange={e => update('customerPhone', e.target.value)} style={inputStyle()} placeholder="010-0000-0000" /></Field>
      </div>

      <Field label="주문 품목">
        <ItemsEditor items={data.items || []} onChange={items => update('items', items)} />
      </Field>

      <div style={{ padding:14, background:'var(--or-pale)', border:'1px solid var(--or-l)', borderRadius:10, marginBottom:14 }}>
        <div style={{ fontSize:11, fontWeight:900, color:'var(--or-d)', letterSpacing:.5, marginBottom:8 }}>💰 본사 입금 확인 (선입금 모델)</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:8 }}>
          <Field label="입금자명·입금일">
            <input type="text" value={data.payerNote || ''} onChange={e => update('payerNote', e.target.value)} style={inputStyle()} placeholder="○○건축자재 / 5월 4일 14:20" />
          </Field>
          <Field label="입금 확인일"><input type="date" value={data.paidDate || ''} onChange={e => update('paidDate', e.target.value)} style={inputStyle()} /></Field>
        </div>
        {data.dealerId && (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, padding:'10px 12px', background:'#fff', borderRadius:8, marginBottom:8, fontSize:12, fontWeight:800 }}>
            <span style={{ color:'var(--text-md)' }}>대리점 송금 예정 (공급단가)</span>
            <span style={{ color:'var(--or-d)', fontFamily:'Bebas Neue', fontSize:18 }}>
              {(() => {
                const tierMap = { Silver:22, Gold:28, Platinum:35 };
                const dealer = dealers.find(d => d.id === data.dealerId);
                const margin = tierMap[dealer?.tier || 'Silver'] || 22;
                const supply = Math.round((data.totalAmount || 0) * (1 - margin/100) / 1000) * 1000;
                return fmtPrice(supply) + '원';
              })()}
            </span>
          </div>
        )}
        <div style={{ fontSize:11, color:'var(--text-md)', fontWeight:700, lineHeight:1.55 }}>
          대리점이 본사 계좌로 공급단가 송금 → 입금 확인 후 상태 <b style={{ color:'var(--green)' }}>입금확인</b> → 자재 출고/발주 진행
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
        <Field label="배송 주소"><input type="text" value={data.shippingAddress || ''} onChange={e => update('shippingAddress', e.target.value)} style={inputStyle()} /></Field>
        <Field label="송장 번호"><input type="text" value={data.trackingNo || ''} onChange={e => update('trackingNo', e.target.value)} style={inputStyle({ fontFamily:'monospace' })} /></Field>
      </div>
      <Field label="관리자 메모"><textarea value={data.adminMemo || ''} onChange={e => update('adminMemo', e.target.value)} style={{ ...inputStyle(), minHeight:60, resize:'vertical' }} /></Field>

      <div style={{ display:'flex', gap:8, marginTop:24, paddingTop:18, borderTop:'1px solid var(--border-s)' }}>
        {!order._new && <button onClick={() => onDelete(data.id)} style={{ padding:'12px 18px', borderRadius:10, fontSize:13, fontWeight:800, color:'var(--red)', background:'var(--red-l)', border:'1px solid var(--red-m)' }}>삭제</button>}
        <div style={{ flex:1 }} />
        <button onClick={onClose} style={btnGhost()}>취소</button>
        <button onClick={() => onSave(data)} style={btnPrimary()}>{order._new ? '등록' : '저장'}</button>
      </div>
    </Modal>
  );
}

function SummaryCard({ icon, label, value, color, small }) {
  return (
    <div style={{ background:'#fff', padding:'16px 18px', borderRadius:12, border:'1px solid var(--border)', boxShadow:'var(--shadow)' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
        <span style={{ fontSize:11, fontWeight:800, color:'var(--text-sm)', letterSpacing:.5 }}>{label}</span>
        <span style={{ fontSize:16 }}>{icon}</span>
      </div>
      <div style={{ fontSize: small ? 18 : 24, fontWeight:900, color, letterSpacing:-.5, lineHeight:1.1 }}>{value}</div>
    </div>
  );
}

// ============================================================
// Inquiries (문의 관리 — 자사몰·카카오·전화·이메일 통합)
// ============================================================
function Inquiries({ inquiries, onUpdate, onToast }) {
  const [statusFilter, setStatusFilter] = useState('all');
  const [channelFilter, setChannelFilter] = useState('all');
  const [categoryFilter, setCategoryFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = useMemo(() => {
    let list = inquiries;
    if (statusFilter !== 'all') list = list.filter(i => i.status === statusFilter);
    if (channelFilter !== 'all') list = list.filter(i => i.channel === channelFilter);
    if (categoryFilter !== 'all') list = list.filter(i => i.category === categoryFilter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(i => (i.customerName || '').toLowerCase().includes(q) || (i.customerPhone || '').includes(q) || (i.message || '').toLowerCase().includes(q));
    }
    return list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  }, [inquiries, statusFilter, channelFilter, categoryFilter, search]);

  const summary = useMemo(() => {
    return {
      total: inquiries.length,
      pending: inquiries.filter(i => ['신규','검토중'].includes(i.status)).length,
      today: inquiries.filter(i => i.createdAt && new Date(i.createdAt) > new Date(Date.now() - 24*60*60*1000)).length,
      avgResponse: '—',  // 향후 응답 시간 계산
    };
  }, [inquiries]);

  return (
    <div>
      <Header title="문의 관리" subtitle="자사몰 폼 · 카카오톡 채널 · 전화 · 이메일 통합 관리" />

      <div style={{ padding:'20px 32px 0' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:12, marginBottom:18 }}>
          <SummaryCard icon="💬" label="전체 문의" value={summary.total} color="var(--or)" />
          <SummaryCard icon="⏱" label="처리 대기" value={summary.pending} color="var(--red)" />
          <SummaryCard icon="📅" label="오늘 신규" value={summary.today} color="var(--navy)" />
          <SummaryCard icon="⚡" label="평균 응답시간" value={summary.avgResponse} color="var(--green)" small />
        </div>

        <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={inputStyle({ minWidth:120 })}>
            <option value="all">전체 상태</option>
            {INQUIRY_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select value={channelFilter} onChange={e => setChannelFilter(e.target.value)} style={inputStyle({ minWidth:130 })}>
            <option value="all">전체 채널</option>
            {INQUIRY_CHANNELS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
          </select>
          <select value={categoryFilter} onChange={e => setCategoryFilter(e.target.value)} style={inputStyle({ minWidth:130 })}>
            <option value="all">전체 분류</option>
            {INQUIRY_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          <input type="text" placeholder="고객명·연락처·내용 검색" value={search} onChange={e => setSearch(e.target.value)} style={inputStyle({ flex:1, minWidth:200 })} />
          <button onClick={() => setSelected({
            _new:true, status:'신규', channel:'phone', category:'제품 문의', createdAt: nowIso()
          })} style={btnPrimary()}>+ 수동 등록</button>
        </div>
      </div>

      <div style={{ padding:'0 32px 32px' }}>
        {filtered.length === 0 ? (
          <Empty icon="💬" title="문의가 없습니다" desc="자사몰·카카오·전화 문의가 들어오면 여기에 표시됩니다" />
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {filtered.map(i => {
              const ch = INQUIRY_CHANNELS.find(x => x.id === i.channel);
              return (
                <button key={i.id} onClick={() => setSelected(i)} style={{
                  background:'#fff', padding:'16px 20px', borderRadius:'var(--r-lg)', border:'1px solid var(--border)',
                  textAlign:'left', cursor:'pointer', boxShadow:'var(--shadow)'
                }} onMouseOver={e => { e.currentTarget.style.borderColor = 'var(--or-l)'; e.currentTarget.style.transform = 'translateY(-1px)'; }} onMouseOut={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.transform = 'translateY(0)'; }}>
                  <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, marginBottom:8 }}>
                    <div style={{ flex:1, minWidth:0, display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
                      <StatusPill status={i.status} colorMap={INQUIRY_STATUS_COLOR} />
                      <span style={{ ...miniChip(), background:'var(--bg)', borderColor:'var(--border)', color:'var(--text-md)' }}>{ch ? ch.icon : '📋'} {ch ? ch.label : '-'}</span>
                      <span style={miniChip()}>{i.category || '-'}</span>
                      <b style={{ fontSize:13, color:'var(--navy)' }}>{i.customerName || '(이름없음)'}</b>
                      {i.customerPhone && <span style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:700 }}>{i.customerPhone}</span>}
                    </div>
                    <span style={{ fontSize:11, color:'var(--text-xs)', fontWeight:700, whiteSpace:'nowrap' }}>{fmtDate(i.createdAt)}</span>
                  </div>
                  <div style={{ fontSize:12.5, color:'var(--text-md)', fontWeight:600, lineHeight:1.6, marginBottom:6, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
                    {i.message || '내용 없음'}
                  </div>
                  {i.reply && (
                    <div style={{ marginTop:8, padding:'8px 12px', background:'var(--green-l)', border:'1px solid var(--green-m)', borderRadius:8, fontSize:12, color:'var(--text)', fontWeight:600 }}>
                      <span style={{ fontSize:10.5, fontWeight:800, color:'var(--green)', letterSpacing:.3, marginRight:6 }}>↩ 답변</span>
                      {i.reply}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {selected && (
        <InquiryDetail
          inquiry={selected}
          onClose={() => setSelected(null)}
          onSave={async (data) => {
            try {
              if (data._new) {
                const { _new, ...payload } = data;
                payload.createdAt = payload.createdAt || nowIso();
                payload.updatedAt = nowIso();
                await db.collection(COLLECTIONS.SITE_INQUIRIES).add(payload);
                onToast({ message: '문의 등록 완료', type: 'success' });
              } else {
                const { id, ...payload } = data;
                payload.updatedAt = nowIso();
                if (data.reply && !data.repliedAt) payload.repliedAt = nowIso();
                await db.collection(COLLECTIONS.SITE_INQUIRIES).doc(id).set(payload, { merge: true });
                onToast({ message: '저장 완료', type: 'success' });
              }
              setSelected(null);
              onUpdate();
            } catch (e) { console.error(e); onToast({ message:'저장 실패: '+e.message, type:'error' }); }
          }}
          onDelete={async (id) => {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try { await db.collection(COLLECTIONS.SITE_INQUIRIES).doc(id).delete(); onToast({ message:'삭제 완료', type:'success' }); setSelected(null); onUpdate(); }
            catch (e) { onToast({ message:'삭제 실패: '+e.message, type:'error' }); }
          }}
        />
      )}
    </div>
  );
}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14, marginBottom:14 }}>
        <Field label="상태">
          <select value={data.status || '신규'} onChange={e => update('status', e.target.value)} style={inputStyle()}>
            {INQUIRY_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="채널">
          <select value={data.channel || 'phone'} onChange={e => update('channel', e.target.value)} style={inputStyle()}>
            {INQUIRY_CHANNELS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
          </select>
        </Field>
        <Field label="분류">
          <select value={data.category || '제품 문의'} onChange={e => update('category', e.target.value)} style={inputStyle()}>
            {INQUIRY_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </Field>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14, marginBottom:14 }}>
        <Field label="고객명"><input type="text" value={data.customerName || ''} onChange={e => update('customerName', e.target.value)} style={inputStyle()} /></Field>
        <Field label="연락처"><input type="text" value={data.customerPhone || ''} onChange={e => update('customerPhone', e.target.value)} style={inputStyle()} placeholder="010-0000-0000" /></Field>
        <Field label="이메일"><input type="email" value={data.customerEmail || ''} onChange={e => update('customerEmail', e.target.value)} style={inputStyle()} /></Field>

      <Field label="문의 내용">
        <textarea value={data.message || ''} onChange={e => update('message', e.target.value)} style={{ ...inputStyle(), minHeight:100, resize:'vertical' }} placeholder="고객 문의 원문" />
      </Field>

      <Field label="답변 (작성 후 저장하면 자동으로 답변 시각 기록)">

        {data.repliedAt && <div style={{ fontSize:10.5, color:'var(--green)', fontWeight:800, marginTop:5 }}>✓ 답변 완료: {fmtDate(data.repliedAt)}</div>}
      </Field>

      <Field label="담당자"><input type="text" value={data.assignedStaff || ''} onChange={e => update('assignedStaff', e.target.value)} style={inputStyle()} placeholder="처리 담당자명" /></Field>
      <Field label="관리자 메모"><textarea value={data.adminMemo || ''} onChange={e => update('adminMemo', e.target.value)} style={{ ...inputStyle(), minHeight:60, resize:'vertical' }} placeholder="내부 메모" /></Field>

      <div style={{ display:'flex', gap:8, marginTop:24, paddingTop:18, borderTop:'1px solid var(--border-s)' }}>
        {!inquiry._new && <button onClick={() => onDelete(data.id)} style={{ padding:'12px 18px', borderRadius:10, fontSize:13, fontWeight:800, color:'var(--red)', background:'var(--red-l)', border:'1px solid var(--red-m)' }}>삭제</button>}
        <div style={{ flex:1 }} />

        <button onClick={() => onSave(data)} style={btnPrimary()}>{inquiry._new ? '등록' : '저장'}</button>
      </div>
    </Modal>
  );
}

// ============================================================
// Sales Dashboard (매출 대시보드)
// 정산 워크플로우는 폐기됨 (선입금 모델은 매 거래 즉시 정산)
// 이 메뉴는 단순 매출 통계 + CSV 내보내기 용도
// ============================================================
function Settlement({ orders, dealers, onToast }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth() + 1);
  const [statusFilter, setStatusFilter] = useState('confirmed');  // confirmed | all

  const periodLabel = `${year}년 ${String(month).padStart(2, '0')}월`;
  const startIso = new Date(year, month - 1, 1).toISOString();
  const endIso = new Date(year, month, 1).toISOString();

  const summary = useMemo(() => {
    const period = orders.filter(o => o.createdAt && o.createdAt >= startIso && o.createdAt < endIso);
    const isConfirmed = (o) => ['입금확인','출고','배송중','완료','결제완료','배송준비'].includes(o.status);
    const eligible = statusFilter === 'confirmed' ? period.filter(isConfirmed) : period.filter(o => !['취소','환불'].includes(o.status));

    // 대리점별 집계
    const byDealer = {};
    for (const o of eligible) {
      const did = o.dealerId;
      if (!did) continue;
      if (!byDealer[did]) byDealer[did] = { count: 0, sales: 0, dealerName: o.dealerName || '' };
      byDealer[did].count += 1;
      byDealer[did].sales += (o.totalAmount || 0);
    }

    const tierMap = { Silver: 22, Gold: 28, Platinum: 35 };
    const rows = Object.entries(byDealer).map(([did, agg]) => {
      const d = dealers.find(x => x.id === did);
      const tier = d?.tier || 'Silver';
      const margin = tierMap[tier] || 22;
      const dealerMargin = Math.round(agg.sales * margin / 100);
      const supplyAmount = agg.sales - dealerMargin;
      return {
        dealerId: did,
        dealerName: d?.companyName || agg.dealerName || '(미상)',
        tier, margin,
        region: d?.region || '-',
        contactPhone: d?.contactPhone || '-',
        inventoryMode: d?.inventoryMode || 'no-stock',
        count: agg.count,
        sales: agg.sales, supplyAmount, dealerMargin,
      };
    }).sort((a, b) => b.sales - a.sales);

    const totalSales = rows.reduce((s, r) => s + r.sales, 0);
    const totalSupply = rows.reduce((s, r) => s + r.supplyAmount, 0);
    const totalDealerMargin = rows.reduce((s, r) => s + r.dealerMargin, 0);
    const totalCount = rows.reduce((s, r) => s + r.count, 0);

    // 자사몰·전화 직판도 별도 집계 (대리점 없는 주문)
    const directOrders = eligible.filter(o => !o.dealerId);
    const directSales = directOrders.reduce((s, o) => s + (o.totalAmount || 0), 0);

    return { rows, totalSales, totalSupply, totalDealerMargin, totalCount, periodCount: period.length, directOrders: directOrders.length, directSales };
  }, [orders, dealers, year, month, statusFilter, startIso, endIso]);

  function exportCsv() {
    const header = ['대리점명','지역','티어','마진율','운영방식','연락처','주문건수','정가매출(원)','본사입금(공급단가,원)','대리점마진(원)'];
    const rows = summary.rows.map(r => [
      r.dealerName, r.region, r.tier, `${r.margin}%`,
      r.inventoryMode === 'stocked' ? '유재고' : '무재고',
      r.contactPhone, r.count, r.sales, r.supplyAmount, r.dealerMargin
    ]);
    const totalRow = ['합계','','','','','', summary.totalCount, summary.totalSales, summary.totalSupply, summary.totalDealerMargin];
    const allRows = [header, ...rows, totalRow];
    const csv = allRows.map(row => row.map(cell => {
      const s = String(cell ?? '');
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(',')).join('\n');
    const bom = '﻿';
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pourstore-sales-${year}${String(month).padStart(2,'0')}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    onToast({ message: `CSV 다운로드 완료 — ${summary.rows.length}개 대리점`, type: 'success' });
  }

  function changePeriod(delta) {
    let m = month + delta;
    let y = year;
    while (m < 1) { m += 12; y -= 1; }
    while (m > 12) { m -= 12; y += 1; }
    setYear(y); setMonth(m);
  }

  return (
    <div>
      <Header title="매출 대시보드" subtitle="대리점별 매출·본사 입금·마진 통계 (선입금 모델 — 별도 정산 절차 없음)" />

      <div style={{ padding:'20px 32px 0' }}>
        {/* 기간 선택 */}
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:14, flexWrap:'wrap' }}>
          <button onClick={() => changePeriod(-1)} style={{ padding:'9px 14px', borderRadius:9, fontSize:13, fontWeight:800, background:'#fff', border:'1px solid var(--border)', color:'var(--text-md)' }}>◂ 이전</button>
          <div style={{ padding:'9px 18px', background:'linear-gradient(135deg, var(--or), var(--or-d))', color:'#fff', borderRadius:9, fontSize:14, fontWeight:900, letterSpacing:-0.3, boxShadow:'0 4px 10px rgba(249,115,22,.3)' }}>{periodLabel}</div>
          <button onClick={() => changePeriod(1)} style={{ padding:'9px 14px', borderRadius:9, fontSize:13, fontWeight:800, background:'#fff', border:'1px solid var(--border)', color:'var(--text-md)' }}>다음 ▸</button>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={inputStyle({ minWidth:160, marginLeft:8 })}>
            <option value="confirmed">입금확인 이상만</option>
            <option value="all">취소·환불 외 전체</option>
          </select>
          <div style={{ flex:1 }} />
          <button onClick={exportCsv} disabled={summary.rows.length === 0} style={btnPrimary()}>📥 매출 CSV</button>
        </div>

        {/* 합계 카드 */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:12, marginBottom:18 }}>
          <SummaryCard icon="📋" label={`${periodLabel} 주문`} value={`${summary.periodCount}건`} color="var(--navy)" />
          <SummaryCard icon="💰" label="정가 매출 합계" value={`${fmtPrice(summary.totalSales + summary.directSales)}원`} color="var(--or)" small />
          <SummaryCard icon="📥" label="본사 입금 (공급단가)" value={`${fmtPrice(summary.totalSupply + summary.directSales)}원`} color="var(--green)" small highlight />
          <SummaryCard icon="🏪" label="대리점 마진 합계" value={`${fmtPrice(summary.totalDealerMargin)}원`} color="var(--text-md)" small />
        </div>

        {summary.directOrders > 0 && (
          <div style={{ marginBottom:14, padding:'10px 14px', background:'var(--bg)', border:'1px dashed var(--border)', borderRadius:10, fontSize:11.5, color:'var(--text-sm)', fontWeight:700 }}>
            ℹ️ 자사몰 직판 + 전화 주문 (대리점 없음): <b style={{ color:'var(--text-md)' }}>{summary.directOrders}건</b> · {fmtPrice(summary.directSales)}원 (대리점 표에서 제외)
          </div>
        )}
      </div>

      <div style={{ padding:'0 32px 32px' }}>
        {summary.rows.length === 0 ? (
          <Empty icon="📊" title="해당 기간 매출이 없습니다" desc={`${periodLabel}에 입금확인된 대리점 주문이 없습니다`} />
        ) : (
          <div style={{ background:'#fff', borderRadius:'var(--r-lg)', border:'1px solid var(--border)', overflow:'hidden' }}>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', fontSize:12.5, borderCollapse:'collapse' }}>
                <thead style={{ background:'var(--bg)' }}>
                  <tr>
                    {['#','대리점','지역','티어','운영','주문','정가매출','본사 입금','대리점 마진'].map(h => <th key={h} style={th()}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {summary.rows.map((r, i) => (
                    <tr key={r.dealerId} style={{ borderBottom:'1px solid var(--border-s)' }}>
                      <td style={td()}><span style={{ fontFamily:'Bebas Neue, monospace', fontSize:14, color:'var(--or-d)', fontWeight:900 }}>{i + 1}</span></td>
                      <td style={td()}><b style={{ color:'var(--navy)' }}>{r.dealerName}</b></td>
                      <td style={td()}>{r.region}</td>
                      <td style={td()}><TierBadge tier={r.tier} size="sm" /></td>
                      <td style={td()}>
                        <span style={{ padding:'2px 7px', background: r.inventoryMode === 'stocked' ? '#DBEAFE' : 'var(--or-pale)', border:`1px solid ${r.inventoryMode === 'stocked' ? '#93C5FD' : 'var(--or-l)'}`, color: r.inventoryMode === 'stocked' ? '#1E40AF' : 'var(--or-d)', fontSize:10, fontWeight:900, borderRadius:4 }}>
                          {r.inventoryMode === 'stocked' ? '🏪 유재고' : '📦 무재고'}
                        </span>
                      </td>
                      <td style={td()}>{r.count}건</td>
                      <td style={{ ...td(), textAlign:'right', fontWeight:700, color:'var(--text-md)' }}>{fmtPrice(r.sales)}원</td>
                      <td style={{ ...td(), textAlign:'right', fontWeight:900, color:'var(--green)' }}>{fmtPrice(r.supplyAmount)}원</td>
                      <td style={{ ...td(), textAlign:'right', fontWeight:700, color:'var(--text-sm)', fontSize:11.5 }}>{fmtPrice(r.dealerMargin)}원</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot style={{ background:'linear-gradient(135deg, #ECFDF5, #D1FAE5)' }}>
                  <tr style={{ borderTop:'2px solid var(--green-m)' }}>
                    <td colSpan="5" style={{ ...td(), fontWeight:900, color:'var(--navy)', fontSize:13 }}>합계</td>
                    <td style={{ ...td(), fontWeight:900, fontSize:13 }}>{summary.totalCount}건</td>
                    <td style={{ ...td(), textAlign:'right', fontWeight:800, fontSize:13, color:'var(--text-md)' }}>{fmtPrice(summary.totalSales)}원</td>
                    <td style={{ ...td(), textAlign:'right', fontWeight:900, fontSize:14, color:'var(--green)' }}>{fmtPrice(summary.totalSupply)}원</td>
                    <td style={{ ...td(), textAlign:'right', fontWeight:800, fontSize:12, color:'var(--text-sm)' }}>{fmtPrice(summary.totalDealerMargin)}원</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}

        <div style={{ marginTop:18, padding:'14px 18px', background:'var(--or-pale)', border:'1px solid var(--or-l)', borderRadius:12, fontSize:12, color:'var(--text-md)', fontWeight:700, lineHeight:1.7 }}>
          💡 <b style={{ color:'var(--or-d)' }}>선입금 모델</b> — 별도 월말 정산 없음. 매 주문마다 대리점이 본사에 공급단가 선입금 → 입금 확인 후 발주·출고. 본 화면은 단순 매출 통계 용도.
        </div>
      </div>
    </div>
  );
}

// Settings
// ============================================================
function Settings({ onToast }) {
  const [oldPin, setOldPin] = useState('');
  const [newPin, setNewPin] = useState('');
  const [confirmPin, setConfirmPin] = useState('');

  // 본사 계좌 정보 (Firestore: app-config/hq-account)
  const [hqAccount, setHqAccount] = useState({ bankName:'', accountNo:'', accountHolder:'' });
  const [hqLoaded, setHqLoaded] = useState(false);
  const [hqSaving, setHqSaving] = useState(false);

  useEffect(() => {
    db.collection('app-config').doc('hq-account').get().then(doc => {
      if (doc.exists) setHqAccount({ bankName:'', accountNo:'', accountHolder:'', ...doc.data() });
      setHqLoaded(true);
    }).catch(e => { console.error(e); setHqLoaded(true); });
  }, []);

  async function saveHqAccount() {
    if (!hqAccount.bankName || !hqAccount.accountNo || !hqAccount.accountHolder) {
      onToast({ message:'은행명·계좌번호·예금주 모두 입력', type:'error' }); return;
    }
    setHqSaving(true);
    try {
      await db.collection('app-config').doc('hq-account').set({ ...hqAccount, updatedAt: nowIso() }, { merge:true });
      onToast({ message:'본사 계좌 저장 완료 — portal·청구서에 자동 반영', type:'success' });
    } catch (e) { onToast({ message:'저장 실패: '+e.message, type:'error' }); }
    setHqSaving(false);
  }

  async function changePin() {
    if (!oldPin || !newPin || !confirmPin) { onToast({ message: '모든 항목 입력', type: 'error' }); return; }
    if (newPin !== confirmPin) { onToast({ message: '새 PIN 불일치', type: 'error' }); return; }
    if (newPin.length < 4) { onToast({ message: 'PIN은 4자리 이상', type: 'error' }); return; }
    const stored = localStorage.getItem(ADMIN_PIN_KEY);
    const oldH = await hashPin(oldPin);
    if (oldH !== stored) { onToast({ message: '현재 PIN 불일치', type: 'error' }); return; }
    const newH = await hashPin(newPin);
    localStorage.setItem(ADMIN_PIN_KEY, newH);
    setOldPin(''); setNewPin(''); setConfirmPin('');
    onToast({ message: 'PIN 변경 완료', type: 'success' });
  }

  return (
    <div>
      <Header title="설정" subtitle="본사 계좌 · PIN 변경 · 어드민 정보" />
      <div style={{ padding:'24px 32px', maxWidth:560, display:'flex', flexDirection:'column', gap:18 }}>

        {/* 본사 입금 계좌 */}
        <div style={{ background:'#fff', padding:'24px 26px', borderRadius:'var(--r-lg)', border:'1px solid var(--border)' }}>
          <h3 style={{ fontSize:14, fontWeight:900, color:'var(--navy)', marginBottom:6 }}>💰 본사 입금 계좌 (대리점이 송금받는 계좌)</h3>
          <div style={{ fontSize:12, color:'var(--text-sm)', fontWeight:700, marginBottom:16, lineHeight:1.55 }}>
            portal 새 주문 모달·청구서 CSV에 자동 표시됩니다.
          </div>
          <Field label="은행명">
            <input type="text" value={hqAccount.bankName} onChange={e => setHqAccount(d => ({...d, bankName:e.target.value}))} style={inputStyle()} placeholder="국민은행" />
          </Field>
          <Field label="계좌번호">
            <input type="text" value={hqAccount.accountNo} onChange={e => setHqAccount(d => ({...d, accountNo:e.target.value}))} style={inputStyle({ fontFamily:'monospace' })} placeholder="123456-78-901234" />
          </Field>
          <Field label="예금주">
            <input type="text" value={hqAccount.accountHolder} onChange={e => setHqAccount(d => ({...d, accountHolder:e.target.value}))} style={inputStyle()} placeholder="(주)POUR스토어" />
          </Field>
          <button onClick={saveHqAccount} disabled={hqSaving || !hqLoaded} style={btnPrimary({ width:'100%', marginTop:8 })}>{hqSaving ? '저장 중...' : '저장하기'}</button>
        </div>

        {/* PIN 변경 */}
        <div style={{ background:'#fff', padding:'24px 26px', borderRadius:'var(--r-lg)', border:'1px solid var(--border)' }}>
          <h3 style={{ fontSize:14, fontWeight:900, color:'var(--navy)', marginBottom:16 }}>🔒 PIN 변경</h3>
          <Field label="현재 PIN"><input type="password" value={oldPin} onChange={e => setOldPin(e.target.value.replace(/\D/g, '').slice(0, 8))} style={inputStyle()} /></Field>
          <Field label="새 PIN"><input type="password" value={newPin} onChange={e => setNewPin(e.target.value.replace(/\D/g, '').slice(0, 8))} style={inputStyle()} /></Field>
          <Field label="새 PIN 확인"><input type="password" value={confirmPin} onChange={e => setConfirmPin(e.target.value.replace(/\D/g, '').slice(0, 8))} style={inputStyle()} /></Field>
          <button onClick={changePin} style={btnPrimary({ width:'100%', marginTop:8 })}>변경하기</button>
        </div>
      </div>
    </div>
  );
}

// ─── 엑셀 파싱 유틸 (ProductsPage 의존성) ───
const parseExcel = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      console.log(`[excel] ${rows.length}행 파싱`);
      resolve(rows);
    } catch (err) { reject(err); }
  };
  reader.onerror = reject;
  reader.readAsArrayBuffer(file);
});

// 아임웹 형식 감지
const isImwebFormat = (row) => row.hasOwnProperty('상품번호') && row.hasOwnProperty('판매상태');

// 아임웹 행 → 상품 데이터 변환
const imwebRowToProduct = (row) => {
  const name = String(row['상품명'] || '');
  const brandMatch = name.match(/^\[([^\]]+)\]/);
  let brand = 'store';
  if (brandMatch) {
    const b = brandMatch[1].toLowerCase();
    if (b.includes('그로홈')) brand = 'grohome';
  }

    brand: row['브랜드'] || 'store',

};

  return (

    if (!file) return;
    e.target.value = '';
    try {
      setUploading(true);
      const rows = await parseExcel(file);
      if (rows.length === 0) { showToast('엑셀에 데이터가 없습니다', 'error'); return; }
      const auditStamp = audit.create();
      const newProducts = [];
      let batch = db.batch();
      let batchCount = 0;
      let total = 0;

      for (const row of rows) {
        const data = excelRowToProduct(row);
        if (!data.name) continue;
        Object.assign(data, auditStamp);
        const ref = db.collection(COLLECTIONS.PRODUCTS).doc();
        batch.set(ref, data);
        newProducts.push({ id: ref.id, ...data });
        batchCount++;
        total++;

        if (batchCount >= 450) {
          await batch.commit();
          console.log(`[excel] batch commit: ${total}건`);
          batch = db.batch();
          batchCount = 0;
        }
      }
      if (batchCount > 0) await batch.commit();

      setProducts(prev => [...newProducts, ...prev]);
      console.log(`[excel] ${total}건 등록 완료`);
      showToast(`${total}건 일괄 등록 완료`);

  // 수정

  // 빠른 상태 변경 (목록에서 직접)
  const quickStatusChange = async (productId, newStatus) => {
    try {
      const auditStamp = audit.update();
      await db.collection(COLLECTIONS.PRODUCTS).doc(productId).update({ salesStatus: newStatus, ...auditStamp });
      setProducts(prev => prev.map(p => p.id === productId ? { ...p, salesStatus: newStatus, ...auditStamp } : p));

  };

  // 벌크 액션
  const bulkAction = async (action, value) => {
    if (selected.size === 0) return;
    const ids = Array.from(selected);
    try {
      const batch = db.batch();
      const auditStamp = audit.update();
      ids.forEach(id => {
        const ref = db.collection(COLLECTIONS.PRODUCTS).doc(id);
        if (action === 'status') batch.update(ref, { salesStatus: value, ...auditStamp });
        if (action === 'delete') batch.delete(ref);
      });
      await batch.commit();
      if (action === 'delete') {
        setProducts(prev => prev.filter(p => !selected.has(p.id)));
      } else {
        setProducts(prev => prev.map(p => selected.has(p.id) ? { ...p, salesStatus: value } : p));
      }
      setSelected(new Set());
      showToast(`${ids.length}건 처리 완료`);
    } catch (e) {
      console.error('[products] 벌크 실패:', e);
      showToast('처리 실패', 'error');
    }
  };

  // 채널 링크 (imwebUrl 지원)
  const getChannelLink = (product, chKey) => {
    const val = product.channels?.[chKey];
    if (!val) return null;
    const ch = CHANNELS.find(c => c.key === chKey);
    if (ch?.urlTpl) return ch.urlTpl(val);
    if (chKey === 'imweb' && product.imwebUrl) return product.imwebUrl;

  // 프록시 등록 상태 토글
  const toggleProxyRegistered = async (productId, chKey) => {
    const product = products.find(p => p.id === productId);
    const registered = product?.proxyRegistered || {};
    const newVal = !registered[chKey];
    const updated = { ...registered, [chKey]: newVal };
    try {
      const auditStamp = audit.update();
      await db.collection(COLLECTIONS.PRODUCTS).doc(productId).update({ proxyRegistered: updated, ...auditStamp });
      setProducts(prev => prev.map(p => p.id === productId ? { ...p, proxyRegistered: updated, ...auditStamp } : p));
      showToast(newVal ? '프록시 등록 완료 표시' : '미등록으로 변경');

      console.error('[proxy] 상태변경 실패:', e);

  // 수정 후 경과 시간 표시
  const getTimeSince = (isoStr) => {
    if (!isoStr) return '';
    const diff = Date.now() - new Date(isoStr).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return `${min}분 전`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}시간 전`;
    const day = Math.floor(hr / 24);
    return `${day}일 전`;
  };

  // 프록시 반영 상태 계산
  const getProxyStatus = (product, chKey) => {
    if (!product.channels?.[chKey]) return 'none'; // 채널 미연결
    if (!product.proxyRegistered?.[chKey]) return 'unregistered'; // 프록시 미등록
    if (!product.updatedAt) return 'synced';
    const diff = Date.now() - new Date(product.updatedAt).getTime();
    if (diff < 600000) return 'syncing'; // 10분 이내 → 반영 중
    return 'synced'; // 1시간 이후 → 반영 완료
  };

  // 변경이력 state
  const [historyOpen, setHistoryOpen] = useState(false);

  const [historyLoading, setHistoryLoading] = useState(false);

  // 변경이력 로드 (30일 이내)
  const loadHistory = async (productId) => {
    setHistoryLoading(true);
    try {
      const cutoff = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
      const snap = await db.collection(COLLECTIONS.PRODUCTS).doc(productId).collection('history').get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(h => h.changedAt >= cutoff)
        .sort((a, b) => (b.changedAt || '').localeCompare(a.changedAt || ''));
      console.log(`[history] ${productId}: ${docs.length}건 (30일 이내)`);
      setHistoryList(docs);
    } catch (e) {
      console.error('[history] 로드 실패:', e);
      showToast('변경이력 로드 실패', 'error');

      setHistoryLoading(false);

  const restoreFromHistory = async (snapshot) => {

      const isNew = editingId === 'new';

        price: form.price ? Number(form.price) : 0,

      const now = auditStamp.updatedAt;
      if (isNew) {
