        console.log(`[products] 신규 저장: ${ref.id}`);
        setProducts(prev => [{ id: ref.id, ...data }, ...prev]);
        showToast('상품이 등록되었습니다');
      } else {
        // 저장 전: 이전 데이터를 히스토리에 기록
        const oldProduct = products.find(p => p.id === editingId);
        if (oldProduct) {
          const changedFields = Object.keys(data).filter(k => JSON.stringify(data[k]) !== JSON.stringify(oldProduct[k]));
          if (changedFields.length > 0) {
            const { id: _skipId, ...rawSnapshot } = oldProduct;
            // Firestore는 undefined 값을 허용하지 않으므로 재귀적으로 제거
            const cleanObj = (obj) => {
              if (obj === null || obj === undefined) return null;
              if (Array.isArray(obj)) return obj.map(cleanObj);
              if (typeof obj === 'object') {
                const cleaned = {};
                for (const [k, v] of Object.entries(obj)) {
                  if (v !== undefined) cleaned[k] = cleanObj(v);
                }
                return cleaned;
              }
              return obj;
            };
            const snapshotData = cleanObj(rawSnapshot);
            await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).collection('history').add({
              snapshot: snapshotData,
              changedFields,
              changedAt: now,
              changedByStaffId: auditStamp.updatedByStaffId,
              changedByStaffName: auditStamp.updatedByStaffName || '관리자',
            });
            console.log(`[history] 변경 기록: ${changedFields.join(', ')}`);
          }
        }
        await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).update(data);
        console.log(`[products] 수정 완료: ${editingId}`);
        setProducts(prev => prev.map(p => p.id === editingId ? { ...p, ...data } : p));
        showToast('상품이 수정되었습니다');
      }
      setEditingId(null);
      setForm(null);
    } catch (e) {
      console.error('[products] 저장 실패:', e);
      showToast('저장 실패: ' + e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  // 삭제
  const handleDelete = async (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    try {

  // 필터
  const filtered = useMemo(() => {

      );

    return list;
  }, [products, search, statusFilter, tagFilter, categoryFilter]);

  // 채널 연결 수 계산
  const countChannels = (p) => CHANNELS.filter(ch => p.channels?.[ch.key]).length;

  // ─── 편집 폼 화면 ───
  if (form && editingId) {

      width: '100%', padding: '10px 12px', fontSize: 13, border: '1px solid var(--border)',

      <div style={{ animation: 'fadeIn .3s ease', maxWidth: 900 }}>

          <div style={{ display: 'flex', gap: 8 }}>

              <button onClick={() => { setHistoryOpen(true); loadHistory(editingId); }}

              </button>

            </button>

        {/* 기본 정보 */}

            <div>

                  onChange={e => { if (e.target.value !== '__custom__') setForm({ ...form, category: e.target.value }); }}
                  style={{ ...inputStyle, flex: 1, cursor: 'pointer' }}>
                  <option value="">선택하세요</option>
                  {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  {form.category && !categories.includes(form.category) && (

                  <option value="__custom__">직접 입력...</option>

            </div>
            <div>
              <label style={labelStyle}>브랜드</label>

            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>상품 설명</label>
              <textarea value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} rows={3}

            </div>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>태그</label>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {PRODUCT_TAGS.map(t => {

                <button onClick={() => { navigator.clipboard.writeText(allSlotCode); showToast(`${slotCount}슬롯 HTML 코드 복사됨 — 대행업체에 전달하세요`); }}
                  style={{
                    width: '100%', padding: '12px 0', fontSize: 14, fontWeight: 800, marginBottom: 12,
                    background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer'
                  }}>
                  전체 코드 복사 ({slotCount}슬롯) — 대행업체 전달용
                </button>

                {/* 슬롯 목록 */}
                <div style={{ marginBottom: 8 }}>
                  {Array.from({ length: slotCount }, (_, idx) => {
                    const imgUrl = `${baseUrl}&n=${idx}`;
                    const isActive = idx < htmlImgCount;
                    return (
                      <div key={idx} style={{
                        display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3,
                        opacity: isActive ? 1 : 0.45,
                      }}>
                        <span style={{
                          fontSize: 10, fontWeight: 700, minWidth: 44, padding: '2px 6px', borderRadius: 4, textAlign: 'center',
                          background: isActive ? '#D1FAE5' : 'var(--border-s)',
                          color: isActive ? 'var(--green)' : 'var(--text-sm)',
                        }}>{isActive ? `이미지${idx + 1}` : `슬롯${idx + 1}`}</span>
                        <code style={{ fontSize: 10, flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: 'var(--text-md)' }}>{imgUrl}</code>
                        <button onClick={() => { navigator.clipboard.writeText(`<img src="${imgUrl}" style="width:100%;display:block;">`); showToast('img 태그 복사됨'); }}
                          style={{ padding: '3px 8px', fontSize: 10, fontWeight: 600, background: 'var(--accent-l)', color: 'var(--accent)', border: 'none', borderRadius: 4, cursor: 'pointer', flexShrink: 0 }}>복사</button>
                      </div>
                    );
                  })}
                </div>

                <div style={{ fontSize: 11, color: 'var(--text-sm)', lineHeight: 1.6 }}>
                  이미지가 있는 슬롯(진하게)은 바로 표시되고, 빈 슬롯(흐리게)은 이후 어드민에서 이미지 추가 시 자동으로 활성화됩니다.
                </div>
              </div>
            );
          })()}

          {/* 비주얼편집 탭 */}
          {detailTab === 'visual' && (
            <div>
              {/* 툴바 */}
              <div style={{
                display: 'flex', flexWrap: 'wrap', gap: 4, padding: '8px 10px', marginBottom: 8,
                background: '#F9FAFB', borderRadius: 8, border: '1px solid var(--border)'
              }}>
                <button onClick={() => execCmd('bold')} title="굵게" style={{ padding: '6px 12px', fontSize: 14, fontWeight: 900, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>B</button>
                <button onClick={() => execCmd('italic')} title="기울임" style={{ padding: '6px 12px', fontSize: 14, fontStyle: 'italic', background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>I</button>
                <button onClick={() => execCmd('underline')} title="밑줄" style={{ padding: '6px 12px', fontSize: 14, textDecoration: 'underline', background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>U</button>
                <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
                <button onClick={() => execCmd('fontSize', 3)} title="작게" style={{ padding: '6px 10px', fontSize: 12, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>소</button>
                <button onClick={() => execCmd('fontSize', 4)} title="보통" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>중</button>
                <button onClick={() => execCmd('fontSize', 6)} title="크게" style={{ padding: '6px 10px', fontSize: 18, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>대</button>
                <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
                <button onClick={() => execCmd('justifyLeft')} title="왼쪽 정렬" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>◧</button>
                <button onClick={() => execCmd('justifyCenter')} title="가운데 정렬" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>◫</button>
                <button onClick={() => execCmd('justifyRight')} title="오른쪽 정렬" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>◨</button>
                <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
                <button onClick={() => execCmd('insertHorizontalRule')} title="구분선" style={{ padding: '6px 12px', fontSize: 13, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>━ 구분선</button>
                <input ref={visualImgRef} type="file" accept="image/*" multiple onChange={insertVisualImage} style={{ display: 'none' }} />
                <button onClick={() => visualImgRef.current?.click()} disabled={uploading}
                  style={{ padding: '6px 14px', fontSize: 13, fontWeight: 600, background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 6, cursor: 'pointer', opacity: uploading ? 0.6 : 1 }}>
                  {uploading ? '업로드중...' : '🖼 이미지 삽입'}
                </button>
              </div>

              {/* 에디터 영역 */}
              <div
                ref={editorRef}
                contentEditable
                style={{
                  minHeight: 400, padding: 20, border: '2px solid var(--border)',
                  borderRadius: 10, outline: 'none', fontSize: 15, lineHeight: 1.8,
                  background: '#fff', overflowY: 'auto', maxHeight: 600,
                }}
                onFocus={() => { if (editorRef.current && !editorRef.current.innerHTML.trim()) editorRef.current.innerHTML = '<p>여기에 상세페이지 내용을 입력하세요...</p>'; }}
              />

              {/* 반영하기 버튼 */}
              <button onClick={applyVisualToHtml}
                style={{
                  width: '100%', marginTop: 12, padding: '16px 0', fontSize: 16, fontWeight: 800,
                  background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 10, cursor: 'pointer'
                }}>
                편집완료 → 반영하기
              </button>
              <div style={{ fontSize: 12, color: 'var(--text-sm)', marginTop: 6, textAlign: 'center' }}>
                반영 후 "HTML코드" 탭에서 코드를 복사하여 마켓에 붙여넣으세요
              </div>
            </div>
          )}

          {/* 이미지 탭 */}
          {detailTab === 'images' && (
            <div>
              <input ref={detailImgRef} type="file" accept="image/*" multiple onChange={handleDetailImageUpload} style={{ display: 'none' }} />
              <button onClick={() => detailImgRef.current?.click()} disabled={uploading}
                style={{
                  width: '100%', padding: 20, border: '2px dashed var(--border)', borderRadius: 10,
                  background: 'var(--border-s)', cursor: 'pointer', textAlign: 'center',
                  fontSize: 13, color: 'var(--text-md)', marginBottom: 12
                }}>
                {uploading ? '업로드 중...' : '+ 상세 이미지 추가 (여러 장 선택 가능)'}
              </button>
              {form.detailImages?.length > 0 && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {form.detailImages.map((img, idx) => (
                    <div key={idx} style={{
                      display: 'flex', alignItems: 'center', gap: 12, padding: 10,
                      background: 'var(--border-s)', borderRadius: 8
                    }}>
                      <img src={img.url} style={{ width: 60, height: 60, objectFit: 'cover', borderRadius: 6 }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600 }}>이미지 {idx + 1}</div>
                        <div style={{ fontSize: 10, color: 'var(--text-sm)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {img.url?.substring(0, 60)}...
                        </div>
                      </div>
                      <button onClick={() => removeDetailImage(idx)}
                        style={{ padding: '4px 10px', fontSize: 11, background: '#FEE2E2', color: 'var(--red)', border: 'none', borderRadius: 4, cursor: 'pointer' }}>
                        삭제
                      </button>
                    </div>
                  ))}
                  <button onClick={generateHtmlFromImages}
                    style={{
                      padding: '10px 0', fontSize: 13, fontWeight: 700, background: 'var(--accent)',
                      color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', marginTop: 4
                    }}>
                    HTML 코드 생성
                  </button>
                </div>
              )}
            </div>
          )}

          {/* HTML 코드 탭 */}
          {detailTab === 'html' && (
            <div>
              <textarea
                value={form.detailHtml || ''}
                onChange={e => setForm({ ...form, detailHtml: e.target.value })}
                rows={12}
                placeholder={'<div style="text-align:center">\n  <img src="이미지URL" style="width:100%">\n</div>'}
                style={{
                  width: '100%', padding: 12, fontSize: 12, fontFamily: 'monospace',
                  border: '1px solid var(--border)', borderRadius: 8, outline: 'none',
                  resize: 'vertical', lineHeight: 1.6, background: '#1E1E1E', color: '#D4D4D4'
                }}
              />
              <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                <button onClick={copyHtml}
                  style={{
                    flex: 1, padding: '10px 0', fontSize: 13, fontWeight: 700,
                    background: 'var(--accent-l)', color: 'var(--accent)', border: 'none',
                    borderRadius: 8, cursor: 'pointer'
                  }}>
                  코드 복사 (마켓 붙여넣기용)
                </button>
                <button onClick={() => setDetailTab('preview')}
                  style={{
                    padding: '10px 16px', fontSize: 13, fontWeight: 600,
                    background: 'var(--border-s)', color: 'var(--text-md)', border: 'none',
                    borderRadius: 8, cursor: 'pointer'
                  }}>
                  미리보기
                </button>
              </div>
            </div>
          )}

          {/* 미리보기 탭 */}
          {detailTab === 'preview' && (
            <div>
              {form.detailHtml ? (
                <div style={{
                  border: '1px solid var(--border)', borderRadius: 8, padding: 16,
                  maxWidth: 860, margin: '0 auto', background: '#fff'
                }}>
                  <div dangerouslySetInnerHTML={{ __html: form.detailHtml }} />
                </div>
              ) : (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sm)', fontSize: 13 }}>
                  HTML 코드가 없습니다. 이미지를 업로드하고 HTML을 생성하거나 직접 입력하세요.
                </div>
              )}
            </div>
          )}
        </div>

        {/* 채널별 상품번호 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>판매채널 상품번호</div>
          <div style={{ fontSize: 12, color: 'var(--text-sm)', marginBottom: 16 }}>
            각 채널의 상품번호를 입력하면 해당 채널 상품 페이지로 바로 이동할 수 있습니다
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {CHANNELS.map(ch => {
              const val = form.channels[ch.key] || '';
              const link = val && ch.urlTpl ? ch.urlTpl(val) : null;
              return (
                <div key={ch.key} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px',
                  background: val ? 'var(--accent-l)' : 'var(--border-s)', borderRadius: 10,
                  border: `1px solid ${val ? 'var(--blue-m)' : 'var(--border)'}`,
                  transition: 'all .15s ease'
                }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: '50%',
                    background: val ? ch.color : '#D1D5DB', flexShrink: 0
                  }} />
                  <div style={{ width: 110, fontSize: 13, fontWeight: 600, color: 'var(--text)', flexShrink: 0 }}>
                    {ch.label}
                  </div>
                  <input
                    value={val}
                    onChange={e => setForm({ ...form, channels: { ...form.channels, [ch.key]: e.target.value } })}
                    placeholder="상품번호 입력"
                    style={{
                      flex: 1, padding: '8px 10px', fontSize: 13, border: '1px solid var(--border)',
                      borderRadius: 6, outline: 'none', fontFamily: 'monospace', background: '#fff'
                    }}
                  />
                  {link && (
                    <a href={link} target="_blank" rel="noopener"
                      style={{ fontSize: 11, color: 'var(--accent)', textDecoration: 'none', fontWeight: 600, whiteSpace: 'nowrap' }}>
                      링크 →
                    </a>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ─── 상품 목록 ───
  const allSelected = filtered.length > 0 && filtered.every(p => selected.has(p.id));
  const toggleAll = () => {
    if (allSelected) setSelected(new Set());
    else setSelected(new Set(filtered.map(p => p.id)));
  };
  const toggleOne = (id) => {
    const s = new Set(selected);
    s.has(id) ? s.delete(id) : s.add(id);
    setSelected(s);
  };

  return (
    <div style={{ padding:'24px 32px', animation: 'fadeIn .3s ease' }}>
      {/* 페이지 헤더 */}
      <div style={{ marginBottom:22 }}>
        <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>📦 상품관리</h1>
        <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>POUR스토어 자사몰·8개 판매채널 상품 마스터. 카테고리·태그·판매상태 관리.</div>
      </div>
      {/* 상태 필터 */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
        {SALES_STATUS.map(s => {
          const cnt = s === '전체' ? products.length : products.filter(p => (p.salesStatus || '판매중') === s).length;
          const icon = STATUS_ICON[s] || '';
          return (
            <button key={s} onClick={() => { setStatusFilter(s); setSelected(new Set()); setVisibleCount(30); }} style={{
              padding: '10px 20px', fontSize: 14, fontWeight: statusFilter === s ? 700 : 500,
              background: statusFilter === s ? (s === '판매중' ? 'var(--green)' : s === '품절' ? 'var(--red)' : s === '숨김' ? 'var(--text-sm)' : 'var(--accent)') : '#fff',
              color: statusFilter === s ? '#fff' : 'var(--text-md)',
              border: statusFilter === s ? 'none' : '1px solid var(--border)',
              borderRadius: 24, cursor: 'pointer', minHeight: 42,
            }}>
              {icon} {s} ({cnt})
            </button>
          );
        })}
      </div>

      {/* 태그 필터 */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap' }}>
        {tagFilter && (
          <button onClick={() => setTagFilter(null)} style={{
            padding: '5px 12px', fontSize: 12, fontWeight: 600,
            background: 'var(--red)', color: '#fff', border: 'none',
            borderRadius: 16, cursor: 'pointer'
          }}>✕ 태그 해제</button>
        )}
        {PRODUCT_TAGS.map(t => (
          <button key={t.key} onClick={() => setTagFilter(tagFilter === t.key ? null : t.key)} style={{
            padding: '5px 14px', fontSize: 12, fontWeight: tagFilter === t.key ? 700 : 500,
            background: tagFilter === t.key ? t.bg : '#fff',
            color: tagFilter === t.key ? t.color : 'var(--text-sm)',
            border: `1px solid ${tagFilter === t.key ? t.color : 'var(--border)'}`,
            borderRadius: 16, cursor: 'pointer'
          }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* 카테고리 필터 */}
      {categories.length > 0 && (
        <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-sm)', marginRight: 4 }}>카테고리:</span>
          {categoryFilter && (
            <button onClick={() => setCategoryFilter(null)} style={{
              padding: '5px 12px', fontSize: 12, fontWeight: 600,
              background: 'var(--red)', color: '#fff', border: 'none',
              borderRadius: 16, cursor: 'pointer'
            }}>✕ 해제</button>
          )}
          {categories.map(c => (
            <button key={c} onClick={() => setCategoryFilter(categoryFilter === c ? null : c)} style={{
              padding: '5px 14px', fontSize: 12, fontWeight: categoryFilter === c ? 700 : 500,
              background: categoryFilter === c ? 'var(--accent)' : '#fff',
              color: categoryFilter === c ? '#fff' : 'var(--text-md)',
              border: `1px solid ${categoryFilter === c ? 'var(--accent)' : 'var(--border)'}`,
              borderRadius: 16, cursor: 'pointer'
            }}>
              {c}
            </button>
          ))}
          <button onClick={() => setShowCategoryManager(true)} style={{
            padding: '5px 12px', fontSize: 11, fontWeight: 600,
            background: 'none', color: 'var(--text-sm)', border: '1px dashed var(--border)',
            borderRadius: 16, cursor: 'pointer'
          }}>+ 관리</button>
        </div>
      )}

      {/* 벌크 액션바 */}
      {selected.size > 0 && (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', marginBottom: 12,
          background: 'var(--accent-l)', borderRadius: 10, border: '1px solid var(--blue-m)',
          flexWrap: 'wrap'
        }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--accent)' }}>
            {selected.size}건 선택됨
          </span>
          <button onClick={() => bulkAction('status', '판매중')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>🟢 판매중</button>
          <button onClick={() => bulkAction('status', '품절')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--red)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>🔴 품절</button>
          <button onClick={() => bulkAction('status', '숨김')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--text-sm)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>⬜ 숨김</button>
          <button onClick={() => setConfirmModal({ message: `선택한 ${selected.size}건을 삭제하시겠습니까?`, onConfirm: () => { bulkAction('delete'); setConfirmModal(null); } })}
            style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: '#FEE2E2', color: 'var(--red)', border: 'none', borderRadius: 8, cursor: 'pointer', marginLeft: 'auto' }}>삭제</button>
          <button onClick={() => setSelected(new Set())} style={{ padding: '8px 12px', fontSize: 13, background: 'none', border: 'none', color: 'var(--text-sm)', cursor: 'pointer' }}>취소</button>
        </div>
      )}

      {/* 상단 액션바 */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="상품명 / 아임웹ID 검색..."
            style={{
              padding: '11px 16px', fontSize: 14, border: '1px solid var(--border)',
              borderRadius: 8, outline: 'none', width: 260
            }}
          />
          <span style={{ fontSize: 13, color: 'var(--text-sm)', fontWeight: 600 }}>{filtered.length}건</span>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={downloadTemplate} style={{
            padding: '10px 16px', fontSize: 13, fontWeight: 600,
            background: '#fff', color: 'var(--text-md)', border: '1px solid var(--border)',
            borderRadius: 8, cursor: 'pointer'
          }}>
            엑셀 템플릿
          </button>
          <input ref={excelRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleExcelUpload} style={{ display: 'none' }} />
          <button onClick={() => excelRef.current?.click()} disabled={uploading} style={{
            padding: '10px 16px', fontSize: 13, fontWeight: 600,
            background: 'var(--green-l)', color: 'var(--green)', border: 'none',
            borderRadius: 8, cursor: 'pointer', opacity: uploading ? 0.6 : 1
          }}>
            {uploading ? '처리 중...' : '엑셀 일괄등록'}
          </button>
          <button onClick={startNew} style={{
            padding: '10px 20px', fontSize: 13, fontWeight: 900,
            background: 'linear-gradient(135deg, var(--or), var(--or-d))', color: '#fff',
            borderRadius: 10, cursor: 'pointer', boxShadow:'0 4px 12px rgba(249,115,22,.25)'
          }}>
            + 상품 등록
          </button>
        </div>
      </div>

      {/* 로딩 */}
      {loading && (
        <div style={{ textAlign: 'center', padding: 60, color: 'var(--text-sm)' }}>
          <div style={{ width: 28, height: 28, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 12px' }} />
          <div style={{ fontSize: 14 }}>상품을 불러오는 중...</div>
        </div>
      )}

      {/* 빈 상태 */}
      {!loading && filtered.length === 0 && (
        <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-sm)' }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📦</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: 'var(--text)', marginBottom: 6 }}>
            {search ? '검색 결과가 없습니다' : '등록된 상품이 없습니다'}
          </div>
          <div style={{ fontSize: 14 }}>상품을 등록하고 채널별 상품번호를 연결하세요</div>
        </div>
      )}

      {/* 전체 선택 */}
      {!loading && filtered.length > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, paddingLeft: 4 }}>
          <input type="checkbox" checked={allSelected} onChange={toggleAll} style={{ width: 18, height: 18, cursor: 'pointer' }} />
          <span style={{ fontSize: 13, color: 'var(--text-sm)' }}>전체 선택</span>
        </div>
      )}

                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 8 }}>
                    {CHANNELS.map(ch => {

                      const link = getChannelLink(p, ch.key);
                      const status = getProxyStatus(p, ch.key);
                      const statusUI = {
                        none: { icon: '⚪', label: '미연결', color: '#D1D5DB', bg: '#F9FAFB' },
                        unregistered: { icon: '🔴', label: '프록시 미등록', color: 'var(--red)', bg: '#FEF2F2' },
                        syncing: { icon: '🔵', label: `반영 중 (~${Math.max(1, 10 - Math.floor((Date.now() - new Date(p.updatedAt).getTime()) / 60000))}분 후)`, color: 'var(--accent)', bg: 'var(--accent-l)' },
                        synced: { icon: '🟢', label: '자동반영 중', color: 'var(--green)', bg: '#ECFDF5' },
                      }[status];
                      return (
                        <div key={ch.key} style={{

                                {statusUI.icon} {statusUI.label}
                              </span>
                              <div style={{ marginLeft: 'auto', display: 'flex', gap: 4 }}>
                                {status === 'unregistered' && (
                                  <button onClick={e => { e.stopPropagation(); toggleProxyRegistered(p.id, ch.key); }}

                                    등록 완료
                                  </button>
                                )}
                                {(status === 'syncing' || status === 'synced') && (
                                  <button onClick={e => { e.stopPropagation(); toggleProxyRegistered(p.id, ch.key); }}
                                    style={{ padding: '4px 8px', fontSize: 10, fontWeight: 500, background: 'none', color: 'var(--text-sm)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }}>
                                    해제

                                )}
                                {link && (
                                  <button onClick={e => { e.stopPropagation(); window.open(link, '_blank'); }}
                                    style={{ padding: '4px 10px', fontSize: 11, fontWeight: 600, background: 'var(--accent-l)', color: 'var(--accent)', border: 'none', borderRadius: 4, cursor: 'pointer' }}>
                                    열기→
                                  </button>
                                )}
                              </div>
                            </>
                          ) : (
                            <span style={{ fontSize: 12, color: '#D1D5DB' }}>미연결</span>
                          )}

                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* 더 보기 */}
      {filtered.length > visibleCount && (
        <button onClick={() => setVisibleCount(v => v + 30)}
          style={{
            width: '100%', padding: '16px 0', marginTop: 12, fontSize: 15, fontWeight: 700,
            background: '#fff', color: 'var(--accent)', border: '1px solid var(--border)',

      {historyOpen && (
        <div style={{

        }} onClick={() => setHistoryOpen(false)}>
          <div onClick={e => e.stopPropagation()} style={{

                  변경: {(h.changedFields || []).map(f => {
                    const labels = { name: '상품명', salePrice: '판매가', price: '소비자가', salesStatus: '상태', detailHtml: '상세페이지', tags: '태그', options: '옵션', channels: '채널' };

              </div>

        </div>

    </div>
  );

/* ══════════════════════════════════════════════════════════════
   공신력 수치 관리 — site-metrics/current
   ══════════════════════════════════════════════════════════════ */
const METRICS_FIELDS=[
  {key:'totalUnits',labelKey:'totalUnitsLabel',icon:'🏘',name:'시공 세대수',unit:'세대',placeholder:'2600000',labelPlaceholder:'260만 세대'},
  {key:'patents',labelKey:'patentsLabel',icon:'📜',name:'특허/인증',unit:'개',placeholder:'70',labelPlaceholder:'70여 개'},
  {key:'partners',labelKey:'partnersLabel',icon:'🤝',name:'파트너사',unit:'곳',placeholder:'250',labelPlaceholder:'250여 곳'},
  {key:'totalArea',labelKey:'totalAreaLabel',icon:'📐',name:'시공 면적',unit:'㎡',placeholder:'1500000',labelPlaceholder:'150만 ㎡'},
  {key:'products',labelKey:'productsLabel',icon:'📦',name:'제품 수',unit:'개',placeholder:'110',labelPlaceholder:'110여 개+'},
  {key:'cooperatives',labelKey:'cooperativesLabel',icon:'🏢',name:'협력사',unit:'곳',placeholder:'250',labelPlaceholder:'250여 곳'},
];

function MetricsPage({showToast}){
  const { audit } = useActiveStaffContext();
  const [form,setForm]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(null);
  const [lastUpdatedByName,setLastUpdatedByName]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{
        const doc=await db.collection(COLLECTIONS.SITE_METRICS).doc('current').get();
        const data=doc.exists?doc.data():{};
        const init={};
        METRICS_FIELDS.forEach(f=>{
          init[f.key]=data[f.key]!==undefined?String(data[f.key]):'';
          init[f.labelKey]=data[f.labelKey]||'';
        });
        setForm(init);
        if(data.updatedAt)setLastUpdated(data.updatedAt);
        if(data.updatedByStaffName)setLastUpdatedByName(data.updatedByStaffName);
      }catch(e){console.error('[site-metrics] 로드 실패:',e);showToast('데이터 로드 실패','error');}
      setLoading(false);
    })();
  },[]);

  const save=async()=>{
    if(!form)return;
    setSaving(true);
    try{
      const auditStamp = audit.update();
      const data={...auditStamp};
      METRICS_FIELDS.forEach(f=>{
        const v=parseInt(form[f.key],10);
        if(!isNaN(v))data[f.key]=v;
        data[f.labelKey]=form[f.labelKey]||'';
      });
      await db.collection(COLLECTIONS.SITE_METRICS).doc('current').set(data,{merge:true});
      setLastUpdated(data.updatedAt);
      setLastUpdatedByName(auditStamp.updatedByStaffName || null);
      showToast('공신력 수치 저장 완료 — 3개 사이트에 즉시 반영됩니다');
    }catch(e){console.error('[site-metrics] 저장 실패:',e);showToast('저장 실패','error');}
    setSaving(false);
  };

  if(loading)return <div style={{textAlign:'center',padding:80,color:'var(--text-sm)'}}>로딩 중...</div>;

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:14,fontFamily:'inherit',outline:'none',boxSizing:'border-box'};
  const labelStyle={fontSize:12,fontWeight:700,color:'var(--text-md)',marginBottom:5,display:'block'};

  return(
    <div style={{padding:'24px 32px',maxWidth:980,animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,gap:16,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:900,color:'var(--navy)',letterSpacing:-0.6,marginBottom:4}}>📊 공신력 수치</h1>
          <div style={{fontSize:12.5,color:'var(--text-sm)',fontWeight:700}}>
            POUR솔루션 · POUR공법 · POUR스토어 3개 사이트에 실시간 반영됩니다
            {lastUpdated && <span style={{marginLeft:8,color:'var(--text-xs)',fontWeight:600}}>· 마지막 저장 {relativeTime(lastUpdated)}{lastUpdatedByName?` · ${lastUpdatedByName}`:''}</span>}
          </div>
        </div>
        <button onClick={save} disabled={saving} style={{padding:'12px 24px',borderRadius:10,fontSize:13,fontWeight:900,color:'#fff',background:saving?'var(--text-sm)':'linear-gradient(135deg, var(--or), var(--or-d))',boxShadow:'0 4px 12px rgba(249,115,22,.25)'}}>
          {saving?'저장 중...':'💾 저장하기'}
        </button>
      </div>

      {/* 안내 배너 — 오렌지 톤 */}
      <div style={{background:'var(--or-pale)',border:'1.5px solid var(--or-l)',borderRadius:12,padding:'12px 16px',marginBottom:20,display:'flex',gap:10,alignItems:'flex-start'}}>
        <span style={{fontSize:18,flexShrink:0}}>ℹ️</span>
        <div style={{fontSize:13,color:'var(--or-d)',lineHeight:1.6,fontWeight:600}}>
          <strong>표시 텍스트</strong>는 웹사이트에서 그대로 표시됩니다 (예: "260만 세대").<br/>
          <strong>실제 값</strong>은 내부 집계·API에 사용됩니다. 표시 텍스트만 변경해도 됩니다.
        </div>
      </div>

      {/* 수치 카드 그리드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        {METRICS_FIELDS.map(f=>(
          <div key={f.key} style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'var(--shadow)',border:'1px solid var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <span style={{fontSize:24}}>{f.icon}</span>
              <div style={{fontSize:14,fontWeight:800,color:'var(--text)'}}>{f.name}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <label style={labelStyle}>실제 값 ({f.unit})</label>
                <input type="number" style={inputStyle}
                  value={form?.[f.key]||''} placeholder={f.placeholder}
                  onChange={e=>setForm(prev=>({...prev,[f.key]:e.target.value}))}/>
              </div>
              <div>
                <label style={labelStyle}>표시 텍스트</label>
                <input type="text" style={inputStyle}
                  value={form?.[f.labelKey]||''} placeholder={f.labelPlaceholder}
                  onChange={e=>setForm(prev=>({...prev,[f.labelKey]:e.target.value}))}/>
              </div>
            </div>
            {/* 미리보기 */}
            <div style={{marginTop:10,padding:'8px 12px',background:'var(--bg)',borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>미리보기</span>
              <span style={{fontSize:18,fontWeight:900,color:'var(--accent)'}}>
                {form?.[f.labelKey]||form?.[f.key]||'-'}
              </span>
              <span style={{fontSize:11,color:'var(--text-sm)'}}>{f.name}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 하단 저장 버튼 */}
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:20}}>
        <button onClick={save} disabled={saving}
          style={{padding:'12px 32px',borderRadius:10,fontSize:13,fontWeight:900,color:'#fff',background:saving?'var(--text-sm)':'linear-gradient(135deg, var(--or), var(--or-d))',boxShadow:'0 4px 12px rgba(249,115,22,.25)'}}>
          {saving?'저장 중...':'💾 공신력 수치 저장'}
        </button>
      </div>
    </div>
  );
}

    {id:'ascon_seal',label:'POUR 아스콘 씰코팅 공법',cat:'토목',specUrl:'https://www.poursolution.net/173',proposalUrl:'https://firebasestorage.googleapis.com/v0/b/pour-app-new.firebasestorage.app/o/Proposal%2F%ED%86%A0%EB%AA%A9%2FPOUR%EC%95%84%EC%8A%A4%EC%BD%98_%EC%94%B0%EC%BD%94%ED%8C%85_%EA%B3%B5%EB%B2%95_%EC%B9%B4%EB%8B%AC%EB%A1%9C%EA%B7%B8.pdf?alt=media&token=3a646ddf-6ae2-4012-8724-79d6b2b26073',guideUrl:'',caseUrl:'https://www.poursolution.net/portfolio'},
    {id:'ascon_mma',label:'POUR MMA 공법',cat:'토목',specUrl:'https://www.poursolution.net/197',proposalUrl:'https://firebasestorage.googleapis.com/v0/b/pour-app-new.firebasestorage.app/o/Proposal%2F%ED%86%A0%EB%AA%A9%2FPOUR%EA%B3%B5%EB%B2%95_%EC%A0%9C%EC%95%88%EC%84%9C(ver08.)_mma%EA%B3%B5%EB%B2%95.pdf?alt=media&token=a4f1cc41-5b6b-44e7-b511-603b873c9f0f',guideUrl:'',caseUrl:'https://www.poursolution.net/portfolio'},
    {id:'block',label:'POUR 보도블럭 보수 및 단면 복구',cat:'토목',specUrl:'https://www.poursolution.net/77',proposalUrl:'',guideUrl:'',caseUrl:'https://www.poursolution.net/portfolio'},
  ];

  const LINK_FIELDS=[
    {key:'specUrl',label:'시방서',icon:'📋',color:'#2563EB'},
    {key:'proposalUrl',label:'제안서',icon:'📄',color:'#7C3AED'},
    {key:'guideUrl',label:'시공가이드',icon:'📘',color:'#059669'},
    {key:'caseUrl',label:'시공사례',icon:'🏗',color:'#D97706'},
  ];

  const CAT_COLORS={'방수':'#2563EB','도장':'#D97706','보수/보강':'#059669','토목':'#DC2626'};

  useEffect(()=>{
    (async()=>{
      try{
        const snap=await db.collection(COLLECTIONS.METHOD_LINKS).get();
        if(snap.empty){
          // Firestore에 데이터 없으면 기본값 사용
          setLinks(DEFAULT_LINKS);
        }else{
          const loaded=snap.docs.map(d=>({id:d.id,...d.data()}));
          // 기본 목록에 없는 항목도 유지하면서 병합
          const merged=DEFAULT_LINKS.map(dl=>{
            const found=loaded.find(l=>l.id===dl.id);
            return found?{...dl,...found}:dl;
          });
          setLinks(merged);
        }
      }catch(e){console.error(e);setLinks(DEFAULT_LINKS);}
      setLoading(false);
    })();
  },[]);

  const startEdit=(item)=>{
    setEditId(item.id);
    setEditForm({specUrl:item.specUrl||'',proposalUrl:item.proposalUrl||'',guideUrl:item.guideUrl||'',caseUrl:item.caseUrl||''});
  };

  const cancelEdit=()=>{setEditId(null);setEditForm({});};

  const saveEdit=async()=>{
    setSaving(true);
    try{
      const auditStamp = audit.update();
      await db.collection(COLLECTIONS.METHOD_LINKS).doc(editId).set({
        ...editForm,
        label:links.find(l=>l.id===editId)?.label||'',
        cat:links.find(l=>l.id===editId)?.cat||'',
        ...auditStamp,
      },{merge:true});
      setLinks(prev=>prev.map(l=>l.id===editId?{...l,...editForm,...auditStamp}:l));
      setEditId(null);setEditForm({});
      showToast('링크가 저장되었습니다');
    }catch(e){console.error(e);showToast('저장 실패: '+e.message,'error');}
    setSaving(false);
  };

  const saveAllToFirestore=async()=>{
    setSaving(true);
    try{
      const auditStamp = audit.update();
      const batch=db.batch();
      links.forEach(l=>{
        const ref=db.collection(COLLECTIONS.METHOD_LINKS).doc(l.id);
        batch.set(ref,{label:l.label,cat:l.cat,specUrl:l.specUrl||'',proposalUrl:l.proposalUrl||'',guideUrl:l.guideUrl||'',caseUrl:l.caseUrl||'',...auditStamp},{merge:true});
      });
      await batch.commit();
      setLinks(prev=>prev.map(l=>({...l,...auditStamp})));
      showToast(`${links.length}개 공법 링크가 모두 저장되었습니다`);
    }catch(e){console.error(e);showToast('일괄 저장 실패: '+e.message,'error');}
    setSaving(false);
  };

  const filtered=links.filter(l=>!search||l.label.includes(search)||l.cat.includes(search)||l.id.includes(search));
  const grouped={};
  filtered.forEach(l=>{if(!grouped[l.cat])grouped[l.cat]=[];grouped[l.cat].push(l);});

  if(loading)return <div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>;

  return(
    <div style={{padding:'24px 32px',maxWidth:1140}}>
      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,flexWrap:'wrap',gap:16}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:900,color:'var(--navy)',letterSpacing:-0.6,marginBottom:4}}>🔗 링크 관리</h1>
          <div style={{fontSize:12.5,color:'var(--text-sm)',fontWeight:700}}>공법별 제안서·시방서·시공가이드·시공사례 링크. 변경 시 태블릿 앱과 고객 문자에 자동 반영됩니다.</div>
        </div>
        <button onClick={saveAllToFirestore} disabled={saving} style={{
          padding:'12px 24px',borderRadius:10,fontSize:13,fontWeight:900,color:'#fff',
          background:saving?'var(--text-sm)':'linear-gradient(135deg, var(--or), var(--or-d))',
          boxShadow:'0 4px 12px rgba(249,115,22,.25)',cursor:saving?'wait':'pointer'
        }}>
          {saving?'저장 중...':'전체 일괄 저장'}
        </button>
      </div>

      {/* 검색 */}
      <div style={{marginBottom:16}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="공법명 또는 카테고리 검색..."
          style={{width:'100%',maxWidth:400,padding:'10px 14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:13,outline:'none'}}/>
      </div>

      {/* 카테고리별 그룹 */}
      {Object.entries(grouped).map(([cat,items])=>(
        <div key={cat} style={{marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{width:4,height:18,borderRadius:2,background:CAT_COLORS[cat]||'#6B7280'}}/>
            <span style={{fontSize:15,fontWeight:800,color:'var(--text)'}}>{cat}</span>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text-sm)',background:'var(--bg)',borderRadius:6,padding:'2px 8px'}}>{items.length}개</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {items.map(item=>(
              <div key={item.id} style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden'}}>
                {/* 공법 헤더 */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:editId===item.id?'1px solid var(--border)':'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <span style={{fontSize:9,fontWeight:800,color:CAT_COLORS[cat]||'#6B7280',background:(CAT_COLORS[cat]||'#6B7280')+'15',borderRadius:4,padding:'2px 6px'}}>{cat}</span>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{item.label}</span>
                    <span style={{fontSize:10,color:'var(--text-sm)'}}>({item.id})</span>
                    {item.updatedByStaffName && (
                      <span style={{fontSize:10,color:'var(--text-sm)',fontWeight:600}}>· {item.updatedByStaffName} {relativeTime(item.updatedAt)}</span>
                    )}
                  </div>
                  {editId===item.id?(
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={cancelEdit} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',fontSize:11,fontWeight:600,cursor:'pointer'}}>취소</button>
                      <button onClick={saveEdit} disabled={saving} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--accent)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer'}}>{saving?'저장중...':'저장'}</button>
                    </div>
                  ):(
                    <button onClick={()=>startEdit(item)} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',fontSize:11,fontWeight:600,cursor:'pointer',color:'var(--accent)'}}>수정</button>
                  )}
                </div>
                {/* 링크 필드들 */}
                {editId===item.id?(
                  <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
                    {LINK_FIELDS.map(f=>(
                      <div key={f.key}>
                        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:700,color:f.color,marginBottom:4}}>
                          <span>{f.icon}</span>{f.label}
                        </label>
                        <input value={editForm[f.key]||''} onChange={e=>setEditForm(prev=>({...prev,[f.key]:e.target.value}))}
                          placeholder={`${f.label} URL을 입력하세요`}
                          style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:12,outline:'none',fontFamily:'monospace'}}/>
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{padding:'8px 16px 12px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
                    {LINK_FIELDS.map(f=>{
                      const url=item[f.key];
                      const hasUrl=url&&url.trim();
                      return(
                        <div key={f.key} style={{padding:'8px 10px',borderRadius:8,background:hasUrl?f.color+'08':'#F9FAFB',border:`1px solid ${hasUrl?f.color+'25':'var(--border)'}`,minHeight:44}}>
                          <div style={{fontSize:9,fontWeight:700,color:hasUrl?f.color:'#9CA3AF',marginBottom:3,display:'flex',alignItems:'center',gap:4}}>
                            <span>{f.icon}</span>{f.label}
                          </div>
                          {hasUrl?(
                            <a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:f.color,wordBreak:'break-all',lineHeight:1.3,display:'block',maxHeight:32,overflow:'hidden',textOverflow:'ellipsis'}}>
                              {url.length>60?url.substring(0,60)+'...':url}
                            </a>
                          ):(
                            <span style={{fontSize:10,color:'#D1D5DB'}}>미등록</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// PreviewPage — 자사몰 페이지 관리 (preview.html iframe 임베드)
// ============================================================
function PreviewPage() {
  const { activeStaff, staffMembers } = useActiveStaffContext();
  const iframeRef = useRef(null);
  // staff 목록·활동 staff를 builder.js로 동기화 (postMessage)
  const sendStaffSync = useMemo(() => () => {
    const win = iframeRef.current?.contentWindow;
    if (!win) return;
    const activeList = (staffMembers || []).filter(s => s.active !== false);
    win.postMessage({
      type: 'admin-staff-sync',
      payload: {
        staff: activeList.map(s => ({
          id: s.id, name: s.name, role: s.role,
          color: s.kpiColor || null,
          email: s.email || null,
        })),
        activeStaffId: activeStaff?.id || null,
      },
    }, '*');
  }, [staffMembers, activeStaff?.id]);

  // iframe 로드 직후 + staff 변경 시 자동 송신
  useEffect(() => { sendStaffSync(); }, [sendStaffSync]);

  // builder가 "ready" 신호 보내면 즉시 한 번 더 sync (load 타이밍 안전망)
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data && e.data.type === 'builder-ready') sendStaffSync();
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [sendStaffSync]);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', background:'var(--bg)' }}>
      <div style={{
        padding:'14px 20px', borderBottom:'1px solid var(--border)', background:'#fff',
        display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap'
      }}>
        <div>
          <h1 style={{ fontSize:16, fontWeight:900, color:'var(--navy)', marginBottom:2 }}>🎨 자사몰 페이지 관리</h1>
          <div style={{ fontSize:11, color:'var(--text-sm)', fontWeight:700 }}>
            POUR스토어 자사몰 리뉴얼 — 페이지·상품 빌더. 담당자는 어드민 마스터를 자동 동기화합니다.
          </div>
        </div>
        <a href="./preview.html" target="_blank" rel="noopener noreferrer" style={{
          padding:'7px 14px', fontSize:11.5, fontWeight:800, color:'var(--or-d)',
          border:'1px solid var(--or-l)', borderRadius:7, background:'#fff', display:'inline-flex', alignItems:'center', gap:6
        }}>
          새창에서 열기 <span style={{ fontSize:10 }}>↗</span>
        </a>
      </div>
      <iframe
        ref={iframeRef}
        src="./preview.html"
        title="자사몰 페이지 관리"
        onLoad={sendStaffSync}
        style={{ flex:1, width:'100%', border:0, background:'#fff' }}
      />
    </div>
  );
}

// ============================================================
// StaffPage — 담당자 마스터 (staff 컬렉션 CRUD)
// ============================================================
function StaffPage({ onToast }) {
  const { activeStaff, audit } = useActiveStaffContext();
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editId, setEditId] = useState(null); // null | 'new' | docId
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');
  const [filterRole, setFilterRole] = useState('all');
  const [filterActive, setFilterActive] = useState('active'); // active|all|inactive

  async function load() {
    try {
      const snap = await db.collection(COLLECTIONS.STAFF).get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      docs.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));
      console.log(`[staff] ${docs.length}명 로드`);
      setList(docs);
    } catch (e) {
      console.error('[staff] 로드 실패:', e);
      onToast({ message: '담당자 로드 실패: ' + e.message, type: 'error' });
    }
    setLoading(false);
  }
  useEffect(() => { load(); }, []);

  const emptyForm = () => ({
    name: '', email: '', phone: '',
    role: 'commerce', department: '', companyType: '본사',
    active: true, isAdmin: false,
    kpiMemberId: '', kpiInitial: '', kpiColor: ROLE_META.commerce.color,
  });

  const openNew = () => { setForm(emptyForm()); setEditId('new'); };
  const openEdit = (s) => {
    setForm({
      name: s.name || '', email: s.email || '', phone: s.phone || '',
      role: s.role || 'commerce', department: s.department || '', companyType: s.companyType || '본사',
      active: s.active !== false, isAdmin: !!s.isAdmin,
      kpiMemberId: s.kpiMemberId || '', kpiInitial: s.kpiInitial || '', kpiColor: s.kpiColor || (ROLE_META[s.role]?.color || '#3B82F6'),
    });
    setEditId(s.id);
  };
  const cancel = () => { setEditId(null); setForm(null); };

  const updateField = (key, val) => {
    setForm(prev => {
      const next = { ...prev, [key]: val };
      if (key === 'role' && (!prev.kpiColor || prev.kpiColor === (ROLE_META[prev.role]?.color))) {
        next.kpiColor = ROLE_META[val]?.color || prev.kpiColor;
      }
      if (key === 'name' && !prev.kpiInitial) {
        next.kpiInitial = (val || '').trim().charAt(0);
      }
      return next;
    });
  };

  const validate = () => {
    if (!form.name.trim()) return '이름은 필수입니다';
    if (!form.email.trim()) return '이메일은 필수입니다 (OTP 인증 식별자)';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email.trim())) return '이메일 형식이 올바르지 않습니다';
    if (!ROLE_KEYS.includes(form.role)) return '역할을 선택하세요';
    const dup = list.find(s => s.id !== editId && (s.email || '').toLowerCase() === form.email.trim().toLowerCase());
    if (dup) return `이메일 중복: "${dup.name}" 와(과) 동일`;
    return null;
  };

  const save = async () => {
    const err = validate();
    if (err) { onToast({ message: err, type: 'error' }); return; }
    setSaving(true);
    try {
      const baseData = {
        name: form.name.trim(),
        email: form.email.trim().toLowerCase(),
        phone: form.phone.trim(),
        role: form.role,
        department: form.department.trim(),
        companyType: form.companyType,
        active: !!form.active,
        isAdmin: !!form.isAdmin,
        kpiMemberId: form.kpiMemberId.trim() || null,
        kpiInitial: form.kpiInitial.trim().slice(0, 2),
        kpiColor: form.kpiColor,
      };
      if (editId === 'new') {
        const data = {
          ...baseData,
          ...audit.create(),
          lastLoginAt: null,
          loginCount: 0,
        };
        await db.collection(COLLECTIONS.STAFF).add(data);
        onToast({ message: `담당자 "${data.name}" 등록 완료`, type: 'success' });
      } else {
        await db.collection(COLLECTIONS.STAFF).doc(editId).update({ ...baseData, ...audit.update() });
        onToast({ message: `담당자 "${baseData.name}" 수정 완료`, type: 'success' });
      }
      await load();
      cancel();
    } catch (e) {
      console.error('[staff] 저장 실패:', e);
      onToast({ message: '저장 실패: ' + e.message, type: 'error' });
    }
    setSaving(false);
  };

  const toggleActive = async (s) => {
    const willActivate = !s.active;
    if (!willActivate && !confirm(`"${s.name}" 비활성화 — 어드민 접근/드롭다운에서 숨김 처리됩니다. 진행할까요?`)) return;
    try {
      await db.collection(COLLECTIONS.STAFF).doc(s.id).update({ active: willActivate, ...audit.update() });
      onToast({ message: `"${s.name}" ${willActivate ? '활성화' : '비활성화'} 완료`, type: 'success' });
      await load();
    } catch (e) {
      onToast({ message: '상태 변경 실패: ' + e.message, type: 'error' });
    }
  };

  const filtered = list.filter(s => {
    if (filterActive === 'active' && s.active === false) return false;
    if (filterActive === 'inactive' && s.active !== false) return false;
    if (filterRole !== 'all' && s.role !== filterRole) return false;
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      if (!(s.name || '').toLowerCase().includes(q)
        && !(s.email || '').toLowerCase().includes(q)
        && !(s.department || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const inputCss = { padding:'10px 12px', border:'1px solid var(--border)', borderRadius:8, fontSize:13, fontWeight:600, background:'#fff', color:'var(--text)', outline:'none', width:'100%' };
  const labelCss = { display:'block', fontSize:11, fontWeight:800, color:'var(--text-md)', letterSpacing:.3, marginBottom:6 };

  if (loading) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;

  if (editId) {
    const isNew = editId === 'new';
    return (
      <div style={{ padding:'24px 32px', maxWidth:920 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22 }}>
          <div>
            <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', marginBottom:4 }}>{isNew ? '담당자 등록' : '담당자 수정'}</h1>
            <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
              {isNew ? '신규 담당자를 등록합니다. 이메일은 향후 OTP 인증의 식별자가 됩니다.' : `ID: ${editId}`}
            </div>
          </div>
          <button onClick={cancel} style={{ padding:'10px 18px', border:'1px solid var(--border)', borderRadius:9, fontSize:13, fontWeight:700, color:'var(--text-md)', background:'#fff' }}>← 목록</button>
        </div>

        <div style={{ background:'#fff', borderRadius:14, padding:24, boxShadow:'var(--shadow)', marginBottom:16 }}>
          <h2 style={{ fontSize:13, fontWeight:900, color:'var(--or-d)', marginBottom:16 }}>기본 정보</h2>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
            <div><label style={labelCss}>이름 *</label><input style={inputCss} value={form.name} onChange={e => updateField('name', e.target.value)} placeholder="홍길동" /></div>
            <div><label style={labelCss}>이메일 * <span style={{ color:'var(--or-d)' }}>(OTP 인증 식별자)</span></label><input style={inputCss} type="email" value={form.email} onChange={e => updateField('email', e.target.value)} placeholder="staff@netformrnd.com" /></div>
            <div><label style={labelCss}>연락처</label><input style={inputCss} value={form.phone} onChange={e => updateField('phone', e.target.value)} placeholder="010-1234-5678" /></div>
            <div><label style={labelCss}>부서</label><input style={inputCss} value={form.department} onChange={e => updateField('department', e.target.value)} placeholder="커머스1팀 / 유통혁신팀 등" /></div>
            <div>
              <label style={labelCss}>소속</label>
              <select style={inputCss} value={form.companyType} onChange={e => updateField('companyType', e.target.value)}>
                {COMPANY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>
        </div>

        <div style={{ background:'#fff', borderRadius:14, padding:24, boxShadow:'var(--shadow)', marginBottom:16 }}>
          <h2 style={{ fontSize:13, fontWeight:900, color:'var(--or-d)', marginBottom:14 }}>역할 (KPI 시스템 카테고리)</h2>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(220px, 1fr))', gap:10 }}>
            {ROLE_KEYS.map(rk => {
              const meta = ROLE_META[rk];
              const on = form.role === rk;
              return (
                <button key={rk} onClick={() => updateField('role', rk)} style={{
                  padding:'14px 14px', borderRadius:10, textAlign:'left',
                  border: on ? `2px solid ${meta.color}` : '1px solid var(--border)',
                  background: on ? meta.color + '0F' : '#fff'
                }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                    <span style={{ fontSize:18 }}>{meta.icon}</span>
                    <span style={{ fontSize:13, fontWeight:900, color: on ? meta.color : 'var(--text)' }}>{meta.label}</span>
                  </div>
                  <div style={{ fontSize:11, fontWeight:600, color:'var(--text-sm)', lineHeight:1.5 }}>{meta.desc}</div>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ background:'#fff', borderRadius:14, padding:24, boxShadow:'var(--shadow)', marginBottom:16 }}>
          <h2 style={{ fontSize:13, fontWeight:900, color:'var(--or-d)', marginBottom:16 }}>활성 / 권한</h2>
          <div style={{ display:'flex', gap:24, flexWrap:'wrap' }}>
            <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, fontWeight:700 }}>
              <input type="checkbox" checked={form.active} onChange={e => updateField('active', e.target.checked)} />
              활성 (체크 해제 시 어드민 접근 차단, 드롭다운에서 숨김)
            </label>
            <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, fontWeight:700 }}>
              <input type="checkbox" checked={form.isAdmin} onChange={e => updateField('isAdmin', e.target.checked)} />
              담당자 마스터 관리 권한 (다른 담당자 등록·수정 가능)
            </label>
          </div>
        </div>

        <div style={{ background:'#fff', borderRadius:14, padding:24, boxShadow:'var(--shadow)', marginBottom:16 }}>
          <h2 style={{ fontSize:13, fontWeight:900, color:'var(--or-d)', marginBottom:4 }}>KPI 시스템 연동 (선택)</h2>
          <p style={{ fontSize:11, color:'var(--text-sm)', fontWeight:600, marginBottom:14 }}>pour-os-v6-2.html(KPI/업무관리)와 연결하기 위한 식별자. 향후 KPI 시스템을 어드민에 흡수할 때 사용.</p>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 160px', gap:16 }}>
            <div><label style={labelCss}>KPI 멤버 ID</label><input style={inputCss} value={form.kpiMemberId} onChange={e => updateField('kpiMemberId', e.target.value)} placeholder="m1, m2, m3 ..." /></div>
            <div><label style={labelCss}>이니셜 (1~2자)</label><input style={inputCss} value={form.kpiInitial} onChange={e => updateField('kpiInitial', e.target.value)} placeholder="홍" maxLength={2} /></div>
            <div>
              <label style={labelCss}>대표 컬러</label>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <input type="color" value={form.kpiColor} onChange={e => updateField('kpiColor', e.target.value)} style={{ width:40, height:40, border:'1px solid var(--border)', borderRadius:8, padding:0, background:'#fff' }} />
                <input style={{ ...inputCss, fontFamily:'monospace', fontSize:12 }} value={form.kpiColor} onChange={e => updateField('kpiColor', e.target.value)} />
              </div>
            </div>
          </div>
        </div>

        <div style={{ display:'flex', gap:12, justifyContent:'flex-end' }}>
          <button onClick={cancel} disabled={saving} style={{ padding:'12px 24px', border:'1px solid var(--border)', borderRadius:10, fontSize:13, fontWeight:800, color:'var(--text-md)', background:'#fff' }}>취소</button>
          <button onClick={save} disabled={saving} style={{ padding:'12px 28px', borderRadius:10, fontSize:13, fontWeight:900, color:'#fff', background: saving ? 'var(--text-sm)' : 'linear-gradient(135deg, var(--or), var(--or-d))', boxShadow:'0 4px 12px rgba(249,115,22,.25)' }}>
            {saving ? '저장 중...' : (isNew ? '담당자 등록' : '변경 저장')}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding:'24px 32px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20, gap:16, flexWrap:'wrap' }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', marginBottom:4 }}>👥 담당자 관리</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
            어드민에서 활동하는 담당자 마스터. 향후 모든 작업은 담당자와 연결되어 기록됩니다.
          </div>
        </div>
        <button onClick={openNew} style={{ padding:'12px 22px', borderRadius:10, fontSize:13, fontWeight:900, color:'#fff', background:'linear-gradient(135deg, var(--or), var(--or-d))', boxShadow:'0 4px 12px rgba(249,115,22,.25)' }}>+ 신규 담당자</button>
      </div>

      <div style={{ display:'flex', gap:10, marginBottom:16, flexWrap:'wrap' }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="이름·이메일·부서 검색" style={{ ...inputCss, maxWidth:280, padding:'9px 14px' }} />
        <select value={filterRole} onChange={e => setFilterRole(e.target.value)} style={{ ...inputCss, maxWidth:200, padding:'9px 14px' }}>
          <option value="all">전체 역할</option>
          {ROLE_KEYS.map(rk => <option key={rk} value={rk}>{ROLE_META[rk].icon} {ROLE_META[rk].label}</option>)}
        </select>
        <select value={filterActive} onChange={e => setFilterActive(e.target.value)} style={{ ...inputCss, maxWidth:160, padding:'9px 14px' }}>
          <option value="active">활성만</option>
          <option value="all">전체</option>
          <option value="inactive">비활성만</option>
        </select>
        <div style={{ alignSelf:'center', fontSize:12, color:'var(--text-sm)', fontWeight:700, marginLeft:'auto' }}>
          총 {filtered.length}명 / 전체 {list.length}명
        </div>
      </div>

      {filtered.length === 0 ? (
        <Empty icon="👥" title={list.length === 0 ? "등록된 담당자가 없습니다" : "조건에 맞는 담당자가 없습니다"}
          desc={list.length === 0 ? "+ 신규 담당자 버튼을 눌러 첫 담당자를 등록하세요. 이메일은 향후 OTP 인증에 사용됩니다." : "필터를 조정해 보세요."} />
      ) : (
        <div style={{ background:'#fff', borderRadius:'var(--r-lg)', overflow:'hidden', border:'1px solid var(--border)' }}>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'var(--bg)' }}>
                <th style={th()}>이름</th>
                <th style={th()}>역할</th>
                <th style={th()}>이메일</th>
                <th style={th()}>부서·소속</th>
                <th style={th()}>연락처</th>
                <th style={th()}>상태</th>
                <th style={th()}>등록</th>
                <th style={th()}>최근 수정</th>
                <th style={{ ...th(), textAlign:'right' }}>작업</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(s => {
                const meta = ROLE_META[s.role] || { label: s.role, icon: '❔', color: '#9CA3AF' };
                return (
                  <tr key={s.id} style={{ borderTop:'1px solid var(--border-s)' }}>
                    <td style={td()}>
                      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                        <div style={{ width:32, height:32, borderRadius:'50%', background: s.kpiColor || meta.color, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:900 }}>
                          {s.kpiInitial || (s.name || '?').charAt(0)}
                        </div>
                        <div>
                          <div style={{ fontWeight:800 }}>{s.name}</div>
                          {s.isAdmin && <div style={{ fontSize:10, fontWeight:800, color:'var(--or-d)' }}>마스터 관리자</div>}
                        </div>
                      </div>
                    </td>
                    <td style={td()}>
                      <span style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'4px 10px', background: meta.color + '15', color: meta.color, borderRadius:6, fontSize:11, fontWeight:900 }}>
                        {meta.icon} {meta.label}
                      </span>
                    </td>
                    <td style={td()}>
                      <span style={{ fontFamily:'monospace', fontSize:11.5 }}>{s.email || '-'}</span>
                    </td>
                    <td style={td()}>
                      <div style={{ fontSize:12 }}>{s.department || '-'}</div>
                      <div style={{ fontSize:10.5, color:'var(--text-sm)', fontWeight:700 }}>{s.companyType || '본사'}</div>
                    </td>
                    <td style={td()}>{s.phone || '-'}</td>
                    <td style={td()}>
                      <span style={{ display:'inline-block', padding:'3px 10px', borderRadius:5, fontSize:11, fontWeight:800,
                        background: s.active === false ? '#F3F4F6' : '#D1FAE5',
                        color: s.active === false ? '#6B7280' : '#047857' }}>
                        {s.active === false ? '비활성' : '활성'}
                      </span>
                    </td>
                    <td style={td()}>
                      {s.createdByStaffName ? (
                        <div style={{ fontSize:11, fontWeight:700 }}>{s.createdByStaffName}</div>
                      ) : (
                        <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:600 }}>—</div>
                      )}
                      <div style={{ fontSize:10, color:'var(--text-sm)', fontWeight:600 }}>{relativeTime(s.createdAt)}</div>
                    </td>
                    <td style={td()}>
                      {s.updatedByStaffName ? (
                        <div style={{ fontSize:11, fontWeight:700 }}>{s.updatedByStaffName}</div>
                      ) : (
                        <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:600 }}>—</div>
                      )}
                      <div style={{ fontSize:10, color:'var(--text-sm)', fontWeight:600 }}>{relativeTime(s.updatedAt)}</div>
                    </td>
                    <td style={{ ...td(), textAlign:'right' }}>
                      <button onClick={() => openEdit(s)} style={{ padding:'6px 12px', borderRadius:7, fontSize:11, fontWeight:800, color:'var(--or-d)', border:'1px solid var(--or-l)', background:'#fff', marginRight:6 }}>수정</button>
                      <button onClick={() => toggleActive(s)} style={{ padding:'6px 12px', borderRadius:7, fontSize:11, fontWeight:800, color: s.active === false ? '#047857' : '#6B7280', border:'1px solid var(--border)', background:'#fff' }}>
                        {s.active === false ? '활성화' : '비활성화'}
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ============================================================
// App
// ============================================================
function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [active, setActive] = useState('dashboard');
  const [toast, setToast] = useState(null);

  // 활동 staff 추적 — KPI 업무관리(POUR OS 흡수)의 모든 작업이 이 staff에 연결됨.
  // PIN 통과 후 ActiveStaffPicker에서 선택 → localStorage 캐시 → 이후 로그인 자동.
  const { members: staffMembers } = useStaffMembers();
  const { active: activeStaff, activeId: activeStaffId, setActive: setActiveStaff } = useActiveStaff(staffMembers);
  const [pickerSkipped, setPickerSkipped] = useState(false);  // 담당자 0명일 때 "없이 진입" 선택 시

  const [requests, setRequests] = useState([]);
  const [partners, setPartners] = useState([]);
  const [rules, setRules] = useState([]);
  const [dealers, setDealers] = useState([]);
  const [purchaseOrders, setPurchaseOrders] = useState([]);
  const [orders, setOrders] = useState([]);
  const [inquiries, setInquiries] = useState([]);

  async function loadAll() {
    try {
      const [reqSnap, partSnap, ruleSnap, dealerSnap, poSnap, orderSnap, inqSnap] = await Promise.all([
        db.collection(COLLECTIONS.MATCHING_REQUESTS).get(),
        db.collection(COLLECTIONS.PARTNER_COMPANIES).get(),
        db.collection(COLLECTIONS.MATCHING_RULES).get(),
        db.collection(COLLECTIONS.DEALERS).get(),
        db.collection(COLLECTIONS.PURCHASE_ORDERS).get(),
        db.collection(COLLECTIONS.DEALER_ORDERS).get(),
        db.collection(COLLECTIONS.SITE_INQUIRIES).get(),
      ]);
      setRequests(reqSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setPartners(partSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setRules(ruleSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setDealers(dealerSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setPurchaseOrders(poSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setOrders(orderSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setInquiries(inqSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      console.log(`[loadAll] req=${reqSnap.size} part=${partSnap.size} rules=${ruleSnap.size} dealers=${dealerSnap.size} po=${poSnap.size} orders=${orderSnap.size} inq=${inqSnap.size}`);
    } catch (e) {
      console.error('[loadAll] failed:', e);
      setToast({ message: '데이터 로드 실패: ' + e.message, type: 'error' });
    }
  }

  useEffect(() => { if (unlocked) loadAll(); }, [unlocked]);

  if (!unlocked) {
    return (
      <>
        <PinScreen onUnlock={() => setUnlocked(true)} onToast={setToast} />
        {toast && <Toast {...toast} onDone={() => setToast(null)} />}
      </>
    );
  }

  // PIN 통과 후, activeStaff 미설정이면 ActiveStaffPicker 단계
  // (pickerSkipped: 담당자 0명일 때 "담당자 없이 진입"으로 우회 → 담당자 관리에서 등록 후 다시 선택)
  if (!activeStaffId && !pickerSkipped) {
    return (
      <>
        <ActiveStaffPicker
          onPicked={(id) => {
            if (id) {
              setActiveStaff(id);
              setToast({ message: '담당자 선택 완료', type: 'success' });
            } else {
              setPickerSkipped(true);
              setActive('staff');  // 담당자 관리 메뉴로 자동 이동
            }
          }}
          onToast={setToast}
        />
        {toast && <Toast {...toast} onDone={() => setToast(null)} />}
      </>
    );
  }

  const stats = {
    matching: requests.filter(r => !['완료','취소'].includes(r.status)).length,
    partners: partners.filter(p => p.contractStatus === '활성').length,
    dealers: dealers.filter(d => d.contractStatus === '활성').length,
    orders: orders.filter(o => ['신규','입금대기','입금확인','출고','결제대기','결제완료','배송준비'].includes(o.status)).length,
  };

  // audit helper — 모든 CRUD 작업에 createdByStaffId/Name·updatedByStaffId/Name 자동 첨부
  const audit = useMemo(() => buildAuditHelpers(activeStaff), [activeStaff?.id, activeStaff?.name]);
  const activeStaffCtx = useMemo(() => ({ activeStaff, audit, staffMembers }), [activeStaff, audit, staffMembers]);

  return (
    <ActiveStaffContext.Provider value={activeStaffCtx}>
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar
        active={active}
        onNav={setActive}
        onLogout={() => { setActiveStaff(null); setPickerSkipped(false); setUnlocked(false); }}
        activeStaff={activeStaff}
        onSwitchStaff={() => { setActiveStaff(null); setPickerSkipped(false); }}
      />
      <main style={{ flex:1, minWidth:0 }}>
        {active === 'dashboard' && <Dashboard stats={stats} />}
        {active === 'matching' && <MatchingRequests requests={requests} partners={partners} rules={rules} onUpdate={loadAll} onToast={setToast} />}
        {active === 'partners' && <Partners partners={partners} onUpdate={loadAll} onToast={setToast} />}
        {active === 'rules' && <MatchingRules />}
        {active === 'dealers' && <Dealers dealers={dealers} onUpdate={loadAll} onToast={setToast} />}
        {active === 'purchase-orders' && <PurchaseOrders purchaseOrders={purchaseOrders} dealers={dealers} onUpdate={loadAll} onToast={setToast} />}
        {active === 'orders' && <Orders orders={orders} dealers={dealers} onUpdate={loadAll} onToast={setToast} />}
        {active === 'settlement' && <Settlement orders={orders} dealers={dealers} onToast={setToast} />}
        {active === 'inquiries' && <Inquiries inquiries={inquiries} onUpdate={loadAll} onToast={setToast} />}
        {active === 'preview' && <PreviewPage />}
        {active === 'products' && <ProductsPage showToast={(msg, type='success') => setToast({ message: msg, type })} />}
        {active === 'metrics' && <MetricsPage showToast={(msg, type='success') => setToast({ message: msg, type })} />}
        {active === 'method-links' && <MethodLinksPage showToast={(msg, type='success') => setToast({ message: msg, type })} />}
        {active === 'staff' && <StaffPage onToast={setToast} />}
        {active === 'firebase-usage' && <FirebaseUsagePage />}
        {active === 'settings' && <Settings onToast={setToast} />}
      </main>
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </div>
    </ActiveStaffContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
