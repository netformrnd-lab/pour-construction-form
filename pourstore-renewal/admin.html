const AI_REVIEW_CONFIG_KEY = 'pourAiReviewConfig';
// Claude 모델 — 2026 현행 ID (claude-sonnet-4-20250514 등 4.0 스냅샷은 은퇴됨)
const AI_REVIEW_MODELS = [
  { id: 'claude-sonnet-4-6', label: 'claude-sonnet-4.6 (균형, 권장)' },
  { id: 'claude-opus-4-7', label: 'claude-opus-4.7 (최고 품질, 더 비쌈)' },
  { id: 'claude-haiku-4-5-20251001', label: 'claude-haiku-4.5 (저렴, 빠름)' },
];
const AI_REVIEW_DEFAULT_MODEL = 'claude-sonnet-4-6';
// 저장된 값이 은퇴 모델이면 현행 기본값으로 보정 (옛 localStorage가 또 404 내는 것 방지)
const normalizeAiModel = (m) => AI_REVIEW_MODELS.some(x => x.id === m) ? m : AI_REVIEW_DEFAULT_MODEL;
function loadAiReviewConfig() {
  try {
    const c = JSON.parse(localStorage.getItem(AI_REVIEW_CONFIG_KEY) || '{}');

}
function saveAiReviewConfig(cfg) {

}

// 이번 주(월~금) 데이터 스냅샷 — Claude 입력용
async function buildWeekSnapshot(activeStaff) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7));
  monday.setHours(0,0,0,0);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  friday.setHours(23,59,59,999);
  const weekOf = monday.toISOString().split('T')[0];
  const fmtIso = (d) => d.toISOString();

  // 병렬 조회
  const [staffSnap, tasksSnap, projsSnap, kpisSnap, journalsSnap, channelsSnap] = await Promise.all([
    db.collection(COLLECTIONS.STAFF).get(),
    db.collection(COLLECTIONS.POUR_TASKS).get(),
    db.collection(COLLECTIONS.POUR_PROJECTS).get(),
    db.collection(COLLECTIONS.POUR_KPIS).get(),
    db.collection(COLLECTIONS.POUR_JOURNALS).get(),
    db.collection(COLLECTIONS.WORK_CHANNELS).get(),
  ]);
  const staff = staffSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(s => s.active !== false);
  const tasks = tasksSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const projects = projsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const kpis = kpisSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const journals = journalsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const channels = channelsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  // 이번 주 task 완료 — doneAt이 monday~friday 안
  const inThisWeek = (iso) => {
    if (!iso) return false;
    const t = new Date(iso).getTime();
    return t >= monday.getTime() && t <= friday.getTime();
  };
  const weekDoneTasks = tasks.filter(t => t.done && inThisWeek(t.doneAt));
  const weekJournals = journals.filter(j => j.date >= weekOf && j.date <= friday.toISOString().split('T')[0]);

  // 담당자별 통계
  const byStaff = staff.map(s => {
    const sid = s.id;
    const doneCount = weekDoneTasks.filter(t => t.staffId === sid).length;
    const myProjects = projects.filter(p => (p.assigneeStaffIds || []).includes(sid));
    const avgProgress = myProjects.length === 0 ? 0
      : Math.round(myProjects.reduce((sum, p) => sum + (Number(p.progress) || 0), 0) / myProjects.length);
    const myJournals = weekJournals.filter(j => j.staffId === sid);
    const totalHours = myJournals.reduce((sum, j) => sum + (Number(j.hoursSpent) || 0), 0);
    return {
      name: s.name, kpiMemberId: s.kpiMemberId || '미설정',
      projects: myProjects.length, avgProgress, weekTasksDone: doneCount,
      weekHours: totalHours, weekJournals: myJournals.length,
    };
  });

  // KPI 현황 — 결과지표(매출·진척도, KR 연결)와 활동지표(선행 행동량, 프로젝트 연결) 구분

    .sort((a, b) => (b.progress || 0) - (a.progress || 0));

    ],
    collections: ['staff', 'pour-tasks', 'pour-recurring', 'pour-projects', 'pour-objectives', 'pour-keyresults', 'pour-kpis', 'pour-journals', 'work-channels', 'work-mgmt', 'pour-ai-reviews', 'pour-os'],
    aiReviewHistory: 0,  // 이전 분석 수 (인보크 시점에 갱신)
    techStack: 'React 18 (Babel standalone) · Firebase Firestore + Storage · Cloudflare Pages · 단일 HTML 파일',
    knownGaps: [
      'CRM센터·매출관리센터 메뉴 준비 중 (페이지 코드는 있으나 사이드바 미연결)',
      '회의록(meetings)·캘린더 흡수 미완',
      '활동지표(프로젝트 선행지표)와 결과지표(매출) 간 인과 분석·예측 자동화 (현재 수동 입력·병렬 표시까지)',
      'AB 테스트 실행·측정 도구 (현재 권장만, 실행 추적 없음)',
    ],
  };

  return {
    weekOf, weekStart: fmtIso(monday), weekEnd: fmtIso(friday),
    runByStaff: activeStaff?.name,
    teamSize: staff.length,
    byStaff,
    weekTasksTotal: weekDoneTasks.length,
    weekJournalsTotal: weekJournals.length,
    kpiSummary,
    projectSummary,
    channels: channels.filter(c => c.status === 'active').map(c => ({ code: c.code, name: c.name, target: c.target, krGroup: c.krGroup })),
    adminContext,
  };
}

# 주의사항
- 4인 부담 분배 (특히 민지·란) 균형 평가 포함

function FridayReviewPage({ onToast }) {
  const { activeStaff, audit } = useActiveStaffContext();
  const [config, setConfig] = useState(loadAiReviewConfig);
  const [showConfig, setShowConfig] = useState(false);
  const [running, setRunning] = useState(false);
  const [latestResult, setLatestResult] = useState(null);
  const [history, setHistory] = useState([]);
  const [loadingHistory, setLoadingHistory] = useState(true);

  useEffect(() => {
    const unsub = db.collection(COLLECTIONS.POUR_AI_REVIEWS).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      setHistory(list);
      setLoadingHistory(false);
    }, err => { console.error('[pour-ai-reviews]', err); setLoadingHistory(false); });
    return unsub;
  }, []);

  if (!activeStaff) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>활동 담당자 선택이 필요합니다.</div>;

  const today = new Date();
  const isFriday = today.getDay() === 5;
  const dayName = ['일','월','화','수','목','금','토'][today.getDay()];

  const cfgValid = !!(config.workerUrl && config.workerSecret && config.claudeApiKey);

  const runReview = async () => {
    if (!cfgValid) {
      onToast({ message: '먼저 [⚙️ 설정] 버튼으로 Worker URL/Secret/Claude API Key 입력', type: 'error' });
      setShowConfig(true);
      return;
    }
    if (!confirm(`이번 주 (월~금) 데이터로 Claude AI 분석을 실행합니다.\n· Cloudflare Worker 호출 (소량 토큰 비용)\n· 결과는 pour-ai-reviews에 누적 저장\n\n진행할까요?`)) return;
    setRunning(true);
    setLatestResult(null);
    try {
      // 1) 스냅샷 수집
      const snapshot = await buildWeekSnapshot(activeStaff);
      const prompt = buildClaudePrompt(snapshot);

      // 2) Worker 호출
      const res = await fetch(config.workerUrl.replace(/\/+$/, ''), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Worker-Secret': config.workerSecret },
        body: JSON.stringify({
          workerSecret: config.workerSecret,
          claudeApiKey: config.claudeApiKey,
          model: normalizeAiModel(config.model),
          max_tokens: 16000, // 2트랙 한국어 분석은 4096 초과 → 잘려서 JSON 파싱 실패하던 문제 해결
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      const json = await res.json();
      if (!res.ok) {
        throw new Error(json.error || `Worker HTTP ${res.status}`);
      }
      const rawText = json.content?.[0]?.text || '';
      let parsed = null;
      try {
        const m = rawText.match(/\{[\s\S]*\}/);
        if (m) parsed = JSON.parse(m[0]);
      } catch (e) { /* fallthrough */ }

      // 3) 저장
      const doc = {
        weekOf: snapshot.weekOf,
        runAt: nowIso(),
        runByStaffId: activeStaff.id, runByStaffName: activeStaff.name,
        snapshot,
        llm: {
          model: json.model || normalizeAiModel(config.model),
          inputTokens: json.usage?.input_tokens || null,
          outputTokens: json.usage?.output_tokens || null,
        },
        insights: parsed ? {
          summary: parsed.summary || '',
          achievements: parsed.achievements || [],
          concerns: parsed.concerns || [],
          recommendations: parsed.recommendations || [],
        } : null,
        abTests: parsed?.abTests || [],
        dataInsights: parsed?.dataInsights || [],
        adminDiagnosis: parsed?.adminDiagnosis || null,
        rawText,
        parseError: parsed ? null : 'JSON 파싱 실패 (rawText 참조)',
        ...audit.create(),
      };
      const saved = await db.collection(COLLECTIONS.POUR_AI_REVIEWS).add(doc);
      setLatestResult({ id: saved.id, ...doc });
      saveAiReviewConfig({ ...config, lastRun: nowIso() });
      onToast({ message: `🤖 주간 점검 완료 — pour-ai-reviews에 저장 (input ${doc.llm.inputTokens || '?'}T / output ${doc.llm.outputTokens || '?'}T)`, type: 'success' });
    } catch (e) {
      onToast({ message: '점검 실패: ' + e.message, type: 'error' });
    }
    setRunning(false);
  };

  return (
    <div style={{ padding:'24px 32px', maxWidth:1100 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, gap:12, flexWrap:'wrap' }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>🤖 AI 주간 점검 (Friday Review)</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700, lineHeight:1.7 }}>
            매주 금요일 1클릭으로 이번 주 실데이터를 Claude AI가 분석 → 데이터 자산화로 브랜드 성장.
            <br/>오늘은 <b style={{ color: isFriday ? 'var(--or-d)' : 'var(--text)' }}>{dayName}요일{isFriday ? ' (점검 권장일 🔔)' : ''}</b> · 누적 분석 {history.length}건
          </div>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={() => setShowConfig(true)} title="Claude API 키 · Worker URL 설정" style={{
            padding:'10px 14px', borderRadius:9, fontSize:12.5, fontWeight:800, color:'var(--text-md)', background:'#fff', border:'1.5px solid var(--border)'
          }}>⚙️ 설정 {cfgValid ? '✓' : '⚠'}</button>
          <button onClick={runReview} disabled={running} style={{
            padding:'10px 22px', borderRadius:10, fontSize:14, fontWeight:900, color:'#fff',
            background: running ? 'var(--text-sm)' : (isFriday ? 'linear-gradient(135deg, #F59E0B, #EA580C)' : 'linear-gradient(135deg, var(--or), var(--or-d))'),
            boxShadow:'0 4px 14px rgba(249,115,22,.25)', cursor: running ? 'not-allowed' : 'pointer'
          }}>{running ? '⏳ 분석 중...' : '🔍 이번 주 점검 실행'}</button>
        </div>
      </div>

      {/* 안내 박스 — 2 트랙 분석 */}
      <div style={{ padding:'14px 18px', marginBottom:18, background:'#EFF6FF', border:'1.5px solid #BFDBFE', borderRadius:11, fontSize:12, color:'#1E40AF', fontWeight:700, lineHeight:1.7 }}>
        💡 <b>2 트랙 분석 — 운영 판단 + 어드민 자체 고도화</b>
        <div style={{ marginTop:6, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          <div style={{ padding:'8px 10px', background:'#fff', border:'1px solid #BFDBFE', borderRadius:7 }}>
            <div style={{ fontSize:11.5, fontWeight:900, color:'#1E40AF', marginBottom:3 }}>🅰️ 운영 분석</div>
            <ul style={{ margin:0, padding:'0 0 0 16px', fontSize:10.5, color:'#1E3A8A', fontWeight:600, lineHeight:1.7 }}>
              <li>잘 진행된 항목 / 우려</li>
              <li>다음 주 권장 액션</li>
              <li>A/B 테스트 제안</li>
              <li>데이터 통찰 (자산화)</li>
            </ul>
          </div>
          <div style={{ padding:'8px 10px', background:'#fff', border:'1px solid #FCD34D', borderRadius:7 }}>
            <div style={{ fontSize:11.5, fontWeight:900, color:'#B45309', marginBottom:3 }}>🅱️ 어드민 자체 진단</div>
            <ul style={{ margin:0, padding:'0 0 0 16px', fontSize:10.5, color:'#7C2D12', fontWeight:600, lineHeight:1.7 }}>
              <li>📌 누락된 기능 (페이지별)</li>
              <li>🎨 UX 이슈</li>
              <li>📊 데이터 갭</li>
              <li>🚀 개발 제안 (우선순위·복잡도)</li>
            </ul>
          </div>
        </div>
        <div style={{ marginTop:8, fontSize:10.5, color:'#1E3A8A', fontWeight:600 }}>
          🅰️로 프로젝트·업무 방향 결정 → 🅱️로 어드민 자체 고도화 → 누적 데이터(pour-ai-reviews)로 브랜드 성장
        </div>
      </div>

      {/* 최근 결과 */}
      {latestResult && <ReviewResultCard review={latestResult} highlight />}

      {/* 과거 리뷰 목록 */}
      {history.length > 0 && (
        <div style={{ marginTop:18 }}>
          <h2 style={{ fontSize:14, fontWeight:900, color:'var(--navy)', marginBottom:10 }}>📚 누적 리뷰 ({history.length}건)</h2>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {history.filter(h => !latestResult || h.id !== latestResult.id).map(r => <ReviewResultCard key={r.id} review={r} />)}
          </div>
        </div>
      )}
      {!loadingHistory && history.length === 0 && !latestResult && (
        <div style={{ padding:40, textAlign:'center', background:'#fff', border:'1px dashed var(--border)', borderRadius:12, color:'var(--text-sm)', fontSize:13, fontWeight:600 }}>
          아직 분석 결과가 없습니다. 우상단 <b>[🔍 이번 주 점검 실행]</b>으로 첫 분석을 진행하세요.
        </div>
      )}

      {/* 설정 모달 */}
      <Modal open={showConfig} onClose={() => setShowConfig(false)} title="⚙️ AI 점검 설정 (1회 입력)" width={560}>
        <AiReviewConfigForm config={config} onSave={(cfg) => { setConfig(cfg); saveAiReviewConfig(cfg); setShowConfig(false); onToast({ message: '설정 저장 완료', type: 'success' }); }} onCancel={() => setShowConfig(false)} />
      </Modal>
    </div>
  );
}

function ReviewResultCard({ review, highlight }) {
  const [open, setOpen] = useState(!!highlight);
  const ins = review.insights || {};
  return (
    <div style={{
      background:'#fff', borderRadius:12,
      border: highlight ? '2px solid var(--or)' : '1px solid var(--border)',
      boxShadow: highlight ? '0 4px 16px rgba(249,115,22,.18)' : 'var(--shadow)',
      overflow:'hidden'
    }}>
      <button onClick={() => setOpen(!open)} style={{ width:'100%', padding:'14px 18px', textAlign:'left', background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
        <div style={{ minWidth:0, flex:1 }}>
          <div style={{ fontSize:13, fontWeight:900, color:'var(--text)', marginBottom:3 }}>
            🗓️ {review.weekOf} 주간 점검
            {highlight && <span style={{ marginLeft:8, fontSize:10, fontWeight:900, color:'#fff', background:'var(--or)', padding:'2px 7px', borderRadius:4 }}>최신</span>}
          </div>
          {ins.summary && <div style={{ fontSize:12, fontWeight:700, color:'var(--text-md)' }}>{ins.summary}</div>}
          <div style={{ fontSize:10, color:'var(--text-sm)', fontWeight:600, marginTop:2 }}>
            {review.runByStaffName} · {relativeTime(review.runAt || review.createdAt)}
            {review.llm?.inputTokens && ` · ${review.llm.inputTokens + review.llm.outputTokens} tokens`}
            {review.parseError && <span style={{ color:'#DC2626', marginLeft:6 }}>⚠ {review.parseError}</span>}
          </div>
        </div>
        <span style={{ fontSize:14, color:'var(--text-sm)' }}>{open ? '▾' : '▸'}</span>
      </button>
      {open && (
        <div style={{ padding:'0 18px 18px', borderTop:'1px dashed var(--border)' }}>
          {ins.achievements?.length > 0 && (
            <Section title="🎯 잘 진행된 항목" color="#047857" items={ins.achievements} />
          )}
          {ins.concerns?.length > 0 && (
            <Section title="⚠️ 우려·개선 필요" color="#DC2626" items={ins.concerns} />
          )}
          {ins.recommendations?.length > 0 && (
            <Section title="📝 다음 주 권장 액션" color="var(--or-d)" items={ins.recommendations} />
          )}
          {review.abTests?.length > 0 && (
            <div style={{ marginTop:14 }}>
              <h4 style={{ fontSize:12, fontWeight:900, color:'#7C3AED', marginBottom:6 }}>🧪 A/B 테스트 제안 ({review.abTests.length})</h4>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {review.abTests.map((ab, i) => (
                  <div key={i} style={{ padding:'10px 12px', background:'#F5F3FF', border:'1px solid #DDD6FE', borderRadius:8, fontSize:11.5, fontWeight:600, lineHeight:1.6, color:'#4C1D95' }}>
                    <div style={{ fontWeight:900, marginBottom:3 }}>📍 {ab.projectName} <span style={{ fontSize:9, color:'#6D28D9', marginLeft:5 }}>{ab.duration}</span></div>
                    <div><b>가설:</b> {ab.hypothesis}</div>
                    <div style={{ marginTop:2, display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
                      <div style={{ padding:'4px 7px', background:'#EDE9FE', borderRadius:5 }}><b>A:</b> {ab.variantA}</div>
                      <div style={{ padding:'4px 7px', background:'#EDE9FE', borderRadius:5 }}><b>B:</b> {ab.variantB}</div>
                    </div>
                    <div style={{ marginTop:3 }}><b>측정:</b> {ab.metric}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {review.dataInsights?.length > 0 && (
            <Section title="💎 데이터 통찰 (자산화)" color="#1E40AF" items={review.dataInsights} />
          )}

          {/* ★ 어드민 자체 진단 — 사용자 핵심 비전: AI가 어드민 부족점을 짚으면 개발해서 고도화 */}
          {review.adminDiagnosis && <AdminDiagnosisBlock dx={review.adminDiagnosis} />}

          {review.parseError && review.rawText && (
            <details style={{ marginTop:14, fontSize:11, color:'var(--text-sm)' }}>
              <summary style={{ cursor:'pointer', fontWeight:800 }}>🔍 원본 응답 보기 (파싱 실패)</summary>
              <pre style={{ marginTop:6, padding:10, background:'var(--bg)', borderRadius:6, fontSize:10.5, whiteSpace:'pre-wrap', maxHeight:300, overflow:'auto' }}>{review.rawText}</pre>
            </details>
          )}
        </div>
      )}
    </div>
  );
}

    <div style={{ marginTop:18, padding:'14px 16px', background:'linear-gradient(135deg, #FFF7ED, #FFFBEB)', border:'2px solid #FCD34D', borderRadius:10 }}>
      <h4 style={{ fontSize:13, fontWeight:900, color:'#B45309', marginBottom:8, letterSpacing:-0.3 }}>
        🛠️ 어드민센터 자체 진단 · 고도화 제안
        <span style={{ fontSize:10, fontWeight:700, color:'#92400E', marginLeft:6 }}>(개발 우선순위 결정용)</span>

        <div style={{ marginBottom:10 }}>

          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {dx.missingFeatures.map((f, i) => (
              <div key={i} style={{ padding:'8px 10px', background:'#fff', border:'1px solid #FED7AA', borderRadius:7, fontSize:11.5, color:'var(--text-md)', fontWeight:600, lineHeight:1.6 }}>
                <div style={{ fontWeight:900, color:'#0F1F5C' }}>
                  📍 {f.page} · {f.feature}
                  <Chip color={PRIO_COLOR[f.priority] || '#6B7280'} text={(f.priority || 'mid').toUpperCase()} />
                  <Chip color={COMPLEX_COLOR[f.complexity] || '#6B7280'} text={f.complexity || 'medium'} />
                </div>
                <div style={{ fontSize:11, color:'var(--text-md)', marginTop:2 }}>{f.reason}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {has(dx.uxIssues) && (
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:11, fontWeight:900, color:'#92400E', marginBottom:5 }}>🎨 UX 이슈 ({dx.uxIssues.length})</div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {dx.uxIssues.map((u, i) => (
              <div key={i} style={{ padding:'8px 10px', background:'#fff', border:'1px solid #FED7AA', borderRadius:7, fontSize:11.5, color:'var(--text-md)', fontWeight:600, lineHeight:1.6 }}>
                <div style={{ fontWeight:900, color:'#0F1F5C' }}>📍 {u.page}</div>
                <div style={{ fontSize:11, color:'#DC2626', marginTop:2 }}><b>이슈:</b> {u.issue}</div>
                <div style={{ fontSize:11, color:'#047857', marginTop:2 }}><b>제안:</b> {u.suggestion}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {has(dx.dataGaps) && (
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:11, fontWeight:900, color:'#92400E', marginBottom:5 }}>📊 데이터 갭 ({dx.dataGaps.length})</div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {dx.dataGaps.map((g, i) => (
              <div key={i} style={{ padding:'8px 10px', background:'#fff', border:'1px solid #FED7AA', borderRadius:7, fontSize:11.5, color:'var(--text-md)', fontWeight:600, lineHeight:1.6 }}>
                <div style={{ fontWeight:900, color:'#0F1F5C' }}>📍 {g.topic}</div>
                <div style={{ fontSize:11, color:'#DC2626', marginTop:2 }}><b>누락:</b> {g.missing}</div>
                <div style={{ fontSize:11, color:'#047857', marginTop:2 }}><b>개선:</b> {g.howToImprove}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {has(dx.developmentSuggestions) && (
        <div>
          <div style={{ fontSize:11, fontWeight:900, color:'#92400E', marginBottom:5 }}>🚀 개발 제안 ({dx.developmentSuggestions.length})</div>
          <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
            {dx.developmentSuggestions.map((d, i) => (
              <div key={i} style={{ padding:'8px 10px', background:'#fff', border:'1px solid #FED7AA', borderRadius:7, fontSize:11.5, color:'var(--text-md)', fontWeight:600, lineHeight:1.6 }}>
                <div style={{ fontWeight:900, color:'#0F1F5C' }}>
                  🚀 {d.title}
                  <Chip color={PRIO_COLOR[d.priority] || '#6B7280'} text={(d.priority || 'mid').toUpperCase()} />
                  <Chip color={COMPLEX_COLOR[d.complexity] || '#6B7280'} text={d.complexity || 'medium'} />
                </div>
                <div style={{ fontSize:11, color:'var(--text-md)', marginTop:2 }}><b>이유:</b> {d.rationale}</div>
                <div style={{ fontSize:11, color:'#047857', marginTop:2 }}><b>기대 효과:</b> {d.expectedImpact}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ marginTop:10, padding:'8px 10px', background:'rgba(180,83,9,.08)', borderRadius:6, fontSize:10.5, color:'#7C2D12', fontWeight:700, lineHeight:1.6 }}>
        💬 이 진단을 받아 개발에 반영하려면: 우선순위 high·complexity small부터 처리 → 다음 주 점검에서 효과 확인 → 누적 데이터로 어드민 자체가 진화.
      </div>
    </div>
  );
}

        ⚠️ 입력값은 <b>localStorage</b>에 저장됩니다 (브라우저별, 본인 PC에만). 다른 담당자도 사용하려면 각자 1회 입력 필요.

          style={{ padding:'9px 22px', borderRadius:8, fontSize:13, fontWeight:900, color:'#fff', background:'var(--or)', opacity: (!workerUrl.trim() || !workerSecret.trim() || !claudeApiKey.trim()) ? 0.5 : 1 }}>저장</button>

// App
// ============================================================
function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [active, setActive] = useState('dashboard');
  const [toast, setToast] = useState(null);

  // 활동 staff 추적 — KPI 업무관리(POUR OS 흡수)의 모든 작업이 이 staff에 연결됨.
  // PIN 통과 후 ActiveStaffPicker에서 선택 → localStorage 캐시 → 이후 로그인 자동.
  const { members: staffMembers } = useStaffMembers();
  const { active: activeStaff, activeId: activeStaffId, setActive: setActiveStaff } = useActiveStaff(staffMembers);
  const [pickerSkipped, setPickerSkipped] = useState(false);  // 담당자 0명일 때 "없이 진입" 선택 시

  // audit helper — 모든 CRUD 작업에 createdByStaffId/Name·updatedByStaffId/Name 자동 첨부
  // ⚠️ early return(if (!unlocked) ...) 이전에 호출해야 hooks 호출 순서 유지됨 (React #310 방지)
  const audit = useMemo(() => buildAuditHelpers(activeStaff), [activeStaff?.id, activeStaff?.name]);
  const activeStaffCtx = useMemo(() => ({ activeStaff, audit, staffMembers }), [activeStaff, audit, staffMembers]);

  const [requests, setRequests] = useState([]);
  const [partners, setPartners] = useState([]);
  const [rules, setRules] = useState([]);
  const [dealers, setDealers] = useState([]);
  const [purchaseOrders, setPurchaseOrders] = useState([]);
  const [orders, setOrders] = useState([]);
  const [inquiries, setInquiries] = useState([]);

  async function loadAll() {
    try {
      const [reqSnap, partSnap, ruleSnap, dealerSnap, poSnap, orderSnap, inqSnap] = await Promise.all([
        db.collection(COLLECTIONS.MATCHING_REQUESTS).get(),
        db.collection(COLLECTIONS.PARTNER_COMPANIES).get(),
        db.collection(COLLECTIONS.MATCHING_RULES).get(),
        db.collection(COLLECTIONS.DEALERS).get(),
        db.collection(COLLECTIONS.PURCHASE_ORDERS).get(),
        db.collection(COLLECTIONS.DEALER_ORDERS).get(),
        db.collection(COLLECTIONS.SITE_INQUIRIES).get(),
      ]);
      setRequests(reqSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setPartners(partSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setRules(ruleSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setDealers(dealerSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setPurchaseOrders(poSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setOrders(orderSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      setInquiries(inqSnap.docs.map(d => ({ id:d.id, ...d.data() })));
      console.log(`[loadAll] req=${reqSnap.size} part=${partSnap.size} rules=${ruleSnap.size} dealers=${dealerSnap.size} po=${poSnap.size} orders=${orderSnap.size} inq=${inqSnap.size}`);
    } catch (e) {
      console.error('[loadAll] failed:', e);
      setToast({ message: '데이터 로드 실패: ' + e.message, type: 'error' });
    }
  }

  useEffect(() => { if (unlocked) loadAll(); }, [unlocked]);

  if (!unlocked) {
    return (
      <>
        <PinScreen onUnlock={() => setUnlocked(true)} onToast={setToast} />
        {toast && <Toast {...toast} onDone={() => setToast(null)} />}
      </>
    );
  }

  // PIN 통과 후, activeStaff 미설정이면 ActiveStaffPicker 단계
  // (pickerSkipped: 담당자 0명일 때 "담당자 없이 진입"으로 우회 → 담당자 관리에서 등록 후 다시 선택)
  if (!activeStaffId && !pickerSkipped) {
    return (
      <>
        <ActiveStaffPicker
          onPicked={(id) => {
            if (id) {
              setActiveStaff(id);
              setToast({ message: '담당자 선택 완료', type: 'success' });
            } else {
              setPickerSkipped(true);
              setActive('staff');  // 담당자 관리 메뉴로 자동 이동
            }
          }}
          onToast={setToast}
        />
        {toast && <Toast {...toast} onDone={() => setToast(null)} />}
      </>
    );
  }

  const stats = {
    matching: requests.filter(r => !['완료','취소'].includes(r.status)).length,
    partners: partners.filter(p => p.contractStatus === '활성').length,
    dealers: dealers.filter(d => d.contractStatus === '활성').length,
    orders: orders.filter(o => ['신규','입금대기','입금확인','출고','결제대기','결제완료','배송준비'].includes(o.status)).length,
  };

  return (
    <ActiveStaffContext.Provider value={activeStaffCtx}>
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar
        active={active}
        onNav={setActive}
        onLogout={() => { setActiveStaff(null); setPickerSkipped(false); setUnlocked(false); }}
        activeStaff={activeStaff}
        onSwitchStaff={() => { setActiveStaff(null); setPickerSkipped(false); }}
      />
      <main style={{ flex:1, minWidth:0 }}>
        {active === 'dashboard' && <Dashboard stats={stats} />}
        {active === 'matching' && <MatchingRequests requests={requests} partners={partners} rules={rules} onUpdate={loadAll} onToast={setToast} />}
        {active === 'partners' && <Partners partners={partners} onUpdate={loadAll} onToast={setToast} />}
        {active === 'rules' && <MatchingRules />}
        {active === 'dealers' && <Dealers dealers={dealers} onUpdate={loadAll} onToast={setToast} />}
        {active === 'purchase-orders' && <PurchaseOrders purchaseOrders={purchaseOrders} dealers={dealers} onUpdate={loadAll} onToast={setToast} />}
        {active === 'orders' && <Orders orders={orders} dealers={dealers} onUpdate={loadAll} onToast={setToast} />}
        {active === 'settlement' && <Settlement orders={orders} dealers={dealers} onToast={setToast} />}
        {active === 'inquiries' && <Inquiries inquiries={inquiries} onUpdate={loadAll} onToast={setToast} />}
        {active === 'workmgmt' && <WorkMgmtPage />}
        {active === 'pour-os' && <PourOsPage />}
        {active === 'dashboard-os' && <DashboardPage onToast={setToast} onNav={setActive} />}
        {active === 'recurring' && <RecurringTasksPage onToast={setToast} />}
        {active === 'okr' && <OKRPage onToast={setToast} />}
        {active === 'projects' && <ProjectsPage onToast={setToast} />}
        {active === 'journals' && <JournalsPage onToast={setToast} />}
        {active === 'channels' && <ChannelsPage onToast={setToast} />}
        {active === 'ai-review' && <FridayReviewPage onToast={setToast} />}
        {active === 'preview' && <PreviewPage />}
        {active === 'products' && <ProductsPage showToast={(msg, type='success') => setToast({ message: msg, type })} />}
        {active === 'metrics' && <MetricsPage showToast={(msg, type='success') => setToast({ message: msg, type })} />}
        {active === 'method-links' && <MethodLinksPage showToast={(msg, type='success') => setToast({ message: msg, type })} />}
        {active === 'staff' && <StaffPage onToast={setToast} />}
        {active === 'firebase-usage' && <FirebaseUsagePage />}
        {active === 'settings' && <Settings onToast={setToast} />}
      </main>
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
      <InstallAppBanner />
    </div>
    </ActiveStaffContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
