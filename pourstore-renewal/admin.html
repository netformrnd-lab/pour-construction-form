            tasks={todayTasksFinal}
            projects={projects}
            audit={audit}
            activeStaff={activeStaff}
            onAdd={addTask}
            onToast={onToast}
          />
        </div>

        {/* 📌 고정업무 — pinned 반복업무 인스턴스. DB 관리는 "📌 고정업무 (반복)" 페이지에서. */}
        <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:12, padding:16, boxShadow:'var(--shadow)' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10, gap:6 }}>
            <div style={{ fontSize:13, fontWeight:900, color:'var(--text)' }}>📌 고정업무</div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontSize:10.5, fontWeight:700, color:'var(--text-sm)' }}>{fixedTasks.filter(t => t.done).length}/{fixedTasks.length}</span>
              {onNav && (
                <button onClick={() => onNav('recurring')} title="고정업무 DB(반복업무) 관리로 이동"
                  style={{ padding:'3px 8px', borderRadius:5, fontSize:10, fontWeight:800, color:'var(--or-d)', background:'var(--or-pale, #FFF7ED)', border:'1px solid var(--or-l, #FED7AA)', cursor:'pointer' }}>
                  관리 →
                </button>
              )}
            </div>
          </div>
          {fixedTasks.length === 0 ? (
            <div style={{ padding:'18px 8px', textAlign:'center', color:'var(--text-sm)', fontSize:11, fontWeight:600, lineHeight:1.6 }}>
              아직 고정업무가 없습니다.<br/>
              {onNav ? (
                <button onClick={() => onNav('recurring')} style={{ marginTop:6, padding:'6px 12px', borderRadius:6, fontSize:11, fontWeight:800, color:'#fff', background:'var(--or)', cursor:'pointer' }}>
                  📌 고정업무 등록하러 가기
                </button>
              ) : <>사이드바 <b>업무 DB · 설정 → 📌 고정업무 (반복)</b>에서<br/>매일·매주 반복 업무를 등록하면 여기 표시됩니다</>}
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
              {fixedTasks.map(t => (
                <TodayTaskRow key={t.id} task={t} audit={audit} compact />
              ))}
            </div>
          )}
        </div>
      </div>
      {slotPick && (
        <SlotAssignModal
          day={slotPick.day} slot={slotPick.slot} current={slotPick.current}
          tasks={myTasks.filter(t => !t.done && !isFixedTask(t))}
          projects={projects}
          onAssign={(taskId) => assignToSlot(taskId, slotPick.day, slotPick.slot)}
          onClear={() => clearSlot(slotPick.current)}
          onCreate={(title) => createInSlot(title, slotPick.day, slotPick.slot)}
          onClose={() => setSlotPick(null)}
        />
      )}
    </div>
  );
}

// ============================================================
// SlotAssignModal — 주간 슬롯(요일·우선순위)에 업무 배정/교체/신규
// 정렬: 1) 프로젝트 priority(🔴 high → 🟡 mid → 🟢 low → 미연결)
//       2) task priority
//       3) 마감일(가까운 순)
// ============================================================
function SlotAssignModal({ day, slot, current, tasks, projects, onAssign, onClear, onCreate, onClose }) {
  const [newTitle, setNewTitle] = useState('');
  const projectsById = useMemo(() => {
    const m = {};
    (projects || []).forEach(p => { m[p.id] = p; });
    return m;
  }, [projects]);

  // 프로젝트 priority 정렬 + task priority + 마감일 종합 정렬
  const sorted = useMemo(() => {
    return tasks
      .filter(t => !(t.weekDay === day && t.weekSlot === slot))
      .map(t => {
        const proj = t.projectId ? projectsById[t.projectId] : null;
        return { ...t, _project: proj };
      })
      .sort((a, b) => {
        const pa = a._project ? projectPriorityRank(a._project.priority) : 3;
        const pb = b._project ? projectPriorityRank(b._project.priority) : 3;
        if (pa !== pb) return pa - pb;
        const taRank = projectPriorityRank(a.priority);
        const tbRank = projectPriorityRank(b.priority);
        if (taRank !== tbRank) return taRank - tbRank;
        return (a.dueDate || '￿').localeCompare(b.dueDate || '￿');
      });
  }, [tasks, projectsById, day, slot]);

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.4)', zIndex:3000, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div onClick={e => e.stopPropagation()} style={{ width:'100%', maxWidth:520, background:'#fff', borderRadius:14, boxShadow:'var(--shadow-lg)', padding:'20px 22px', maxHeight:'82vh', display:'flex', flexDirection:'column' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <div style={{ fontSize:15, fontWeight:900, color:'var(--navy)' }}>📆 {day}요일 · {slot}순위 슬롯</div>
          <button onClick={onClose} style={{ fontSize:18, color:'var(--text-sm)', background:'transparent', cursor:'pointer', border:'none' }}>✕</button>
        </div>
        {current && (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, padding:'9px 12px', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:9, marginBottom:12 }}>
            <span style={{ fontSize:12.5, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>현재: {current.title}</span>
            <button onClick={onClear} style={{ flexShrink:0, padding:'5px 11px', borderRadius:7, fontSize:11, fontWeight:800, color:'#DC2626', border:'1px solid var(--red-l, #FEE2E2)', background:'#fff', cursor:'pointer' }}>슬롯 비우기</button>
          </div>
        )}
        <div style={{ fontSize:11, fontWeight:800, color:'var(--text-sm)', marginBottom:6 }}>새 업무 만들어 배치</div>
        <div style={{ display:'flex', gap:6, marginBottom:14 }}>
          <input value={newTitle} onChange={e => setNewTitle(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && newTitle.trim()) onCreate(newTitle); }} placeholder="새 업무 입력 후 Enter" style={{ flex:1, padding:'8px 10px', border:'1px solid var(--border)', borderRadius:8, fontSize:12.5, fontWeight:600, outline:'none' }} />
          <button onClick={() => newTitle.trim() && onCreate(newTitle)} disabled={!newTitle.trim()} style={{ padding:'8px 14px', borderRadius:8, fontSize:12, fontWeight:900, color:'#fff', background: newTitle.trim() ? 'var(--or)' : 'var(--text-sm)', cursor: newTitle.trim() ? 'pointer' : 'not-allowed', border:'none' }}>추가</button>
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
          <div style={{ fontSize:11, fontWeight:800, color:'var(--text-sm)' }}>기존 미완료 업무 배치 ({sorted.length})</div>
          <div style={{ fontSize:9.5, fontWeight:700, color:'var(--text-xs)' }}>프로젝트 중요도 순 (🔴→🟡→🟢)</div>
        </div>
        <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:5 }}>
          {sorted.length === 0 ? (
            <div style={{ padding:'14px', textAlign:'center', fontSize:11.5, color:'var(--text-sm)', fontWeight:600 }}>배치할 미완료 업무가 없습니다.</div>
          ) : sorted.map(t => {
            const placed = t.weekDay && t.weekSlot;
            const proj = t._project;
            const projPm = proj ? (PRIORITY_META_PROJECT[proj.priority] || PRIORITY_META_PROJECT.mid) : null;
            return (
              <button key={t.id} onClick={() => onAssign(t.id)} style={{
                display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8, padding:'9px 11px',
                borderRadius:8, border:'1px solid var(--border)', background:'#fff', textAlign:'left', cursor:'pointer'
              }}>
                <div style={{ flex:1, minWidth:0 }}>
                  {/* 프로젝트 칩 */}
                  {proj && projPm && (
                    <div style={{ display:'flex', alignItems:'center', gap:5, marginBottom:3 }}>
                      <span style={{ fontSize:9, fontWeight:900, color:projPm.color, background:projPm.bg, padding:'1px 5px', borderRadius:4 }}>{projPm.icon}</span>
                      <span style={{ fontSize:9.5, fontWeight:800, color:'var(--text-md)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:300 }}>🗂️ {proj.name}</span>
                    </div>
                  )}
                  {!proj && t.projectName && (
                    <div style={{ fontSize:9.5, fontWeight:700, color:'var(--text-sm)', marginBottom:3 }}>🗂️ {t.projectName}</div>
                  )}
                  {!proj && !t.projectName && (
                    <div style={{ fontSize:9, fontWeight:700, color:'var(--text-xs)', marginBottom:3, fontStyle:'italic' }}>· 프로젝트 미연결 ·</div>
                  )}
                  {/* task 제목 */}
                  <div style={{ fontSize:12.5, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {(PRIORITY_META[t.priority] || {}).icon || ''} {t.title}
                  </div>
                </div>
                {placed && <span style={{ flexShrink:0, fontSize:9.5, fontWeight:800, color:'var(--text-sm)', whiteSpace:'nowrap', marginTop:6 }}>{t.weekDay}·{t.weekSlot}순위 →</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// TaskNotesModal — task 메모 + 사진 첨부 (빠른 판별용)
// 데이터: task.notes(string) + task.attachments([{name, url, path, size, contentType, uploadedAt}])
// 영향: 이 메모·첨부는 어디에도 영향 주지 않음 — 담당자 본인의 빠른 판별/기록용
// 저장: Firestore task 문서에 직접 (1MB 한도 충분 — 파일은 URL만 저장)
// 파일: Firebase Storage `task-attachments/{taskId}/{filename}`
// ============================================================
function TaskNotesModal({ task, audit, onClose, onToast }) {
  const [notes, setNotes] = useState(typeof task.notes === 'string' ? task.notes : '');
  const [attachments, setAttachments] = useState(Array.isArray(task.attachments) ? task.attachments : []);
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving] = useState(false);
  const fileInputRef = useRef(null);

  const MAX_FILE_MB = 5;
  const MAX_FILES = 10;

  const handleFileSelect = async (files) => {
    if (!files || files.length === 0) return;
    if (attachments.length + files.length > MAX_FILES) {
      onToast({ message: `첨부는 최대 ${MAX_FILES}장까지 가능합니다`, type: 'error' });
      return;
    }
    setUploading(true);
    const newAttachments = [];
    for (const file of files) {
      if (!file.type.startsWith('image/')) {
        onToast({ message: `${file.name} — 이미지 파일만 가능`, type: 'error' });
        continue;
      }
      if (file.size > MAX_FILE_MB * 1024 * 1024) {
        onToast({ message: `${file.name} — ${MAX_FILE_MB}MB 초과`, type: 'error' });
        continue;
      }
      try {
        const ts = Date.now();
        const safeName = file.name.replace(/[^\w.\-]/g, '_');
        const path = `task-attachments/${task.id}/${ts}_${safeName}`;
        const ref = storage.ref(path);
        const snap = await ref.put(file);
        const url = await snap.ref.getDownloadURL();
        newAttachments.push({
          name: file.name,
          url,
          path,
          size: file.size,
          contentType: file.type,
          uploadedAt: nowIso(),
        });
      } catch (e) {
        onToast({ message: `${file.name} 업로드 실패: ${e.message}`, type: 'error' });
      }
    }
    setAttachments(prev => [...prev, ...newAttachments]);
    setUploading(false);
    if (fileInputRef.current) fileInputRef.current.value = '';
  };

  const removeAttachment = async (att) => {
    if (!confirm(`"${att.name}" 첨부를 삭제할까요?`)) return;
    try {
      if (att.path) {
        try { await storage.ref(att.path).delete(); } catch (e) { /* 이미 삭제된 경우 무시 */ }
      }
      setAttachments(prev => prev.filter(a => a.url !== att.url));
    } catch (e) {
      onToast({ message: '삭제 실패: ' + e.message, type: 'error' });
    }
  };

  const handleSave = async () => {
    setSaving(true);
    try {
      await db.collection(COLLECTIONS.POUR_TASKS).doc(task.id).update({
        notes: notes.trim() || '',
        attachments,
        ...audit.update(),
      });
      onToast({ message: '메모·첨부 저장 완료', type: 'success' });
      onClose();
    } catch (e) {
      onToast({ message: '저장 실패: ' + e.message, type: 'error' });
    }
    setSaving(false);
  };

  return (
    <Modal open={true} onClose={onClose} title={`📎 메모·첨부 — ${task.title}`} width={620}>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        {/* 메모 */}
        <div>
          <label style={{ fontSize:11, fontWeight:800, color:'var(--text-md)', display:'block', marginBottom:5 }}>
            📝 메모 (담당자 본인의 빠른 기록용 — 다른 곳에 영향 없음)
          </label>
          <textarea
            value={notes}
            onChange={e => setNotes(e.target.value)}
            placeholder="예: 채림님 확인 필요 / 자료 위치 / 상태 등 빠른 메모..."
            rows={4}
            style={{
              width:'100%', padding:'10px 12px', border:'1px solid var(--border)', borderRadius:8,
              fontSize:13, fontWeight:500, color:'var(--text)', outline:'none', resize:'vertical',
              minHeight:80, background:'var(--card)',
            }}
          />
        </div>

        {/* 첨부 사진 */}
        <div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
            <label style={{ fontSize:11, fontWeight:800, color:'var(--text-md)' }}>
              🖼 사진 첨부 ({attachments.length}/{MAX_FILES}) — 각 {MAX_FILE_MB}MB 이내
            </label>
            <button
              onClick={() => fileInputRef.current?.click()}
              disabled={uploading || attachments.length >= MAX_FILES}
              style={{
                padding:'5px 12px', borderRadius:6, fontSize:11, fontWeight:800, color:'#fff',
                background: (uploading || attachments.length >= MAX_FILES) ? 'var(--text-sm)' : 'var(--or)',
                cursor: (uploading || attachments.length >= MAX_FILES) ? 'not-allowed' : 'pointer',
              }}>
              {uploading ? '업로드 중...' : '+ 사진 추가'}
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept="image/*"
              multiple
              onChange={e => handleFileSelect(Array.from(e.target.files || []))}
              style={{ display:'none' }}
            />
          </div>

          {attachments.length === 0 ? (
            <div style={{
              padding:'24px 12px', textAlign:'center', border:'1.5px dashed var(--border)', borderRadius:8,
              fontSize:12, fontWeight:600, color:'var(--text-sm)', background:'var(--bg)',
            }}>
              아직 첨부된 사진이 없습니다
            </div>
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(110px, 1fr))', gap:8 }}>
              {attachments.map((att, idx) => (
                <div key={att.url + idx} style={{
                  position:'relative', borderRadius:8, overflow:'hidden', border:'1px solid var(--border)',
                  background:'var(--bg)', aspectRatio:'1',
                }}>
                  <a href={att.url} target="_blank" rel="noopener noreferrer" title={att.name} style={{ display:'block', width:'100%', height:'100%' }}>
                    <img src={att.url} alt={att.name} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                  </a>
                  <button
                    onClick={(e) => { e.stopPropagation(); removeAttachment(att); }}
                    title="삭제"
                    style={{
                      position:'absolute', top:4, right:4, width:22, height:22, borderRadius:'50%',
                      background:'rgba(220,38,38,.9)', color:'#fff', fontSize:11, fontWeight:900,
                      display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
                    }}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* 액션 */}
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8, paddingTop:6, borderTop:'1px solid var(--border-s)' }}>
          <button onClick={onClose} style={{
            padding:'9px 18px', borderRadius:8, fontSize:12, fontWeight:800, color:'var(--text-md)',
            background:'var(--bg)', border:'1px solid var(--border)',
          }}>취소</button>
          <button onClick={handleSave} disabled={saving || uploading} style={{
            padding:'9px 22px', borderRadius:8, fontSize:12, fontWeight:900, color:'#fff',
            background: (saving || uploading) ? 'var(--text-sm)' : 'var(--or)',
            cursor: (saving || uploading) ? 'not-allowed' : 'pointer',
          }}>{saving ? '저장 중...' : '저장'}</button>
        </div>
      </div>
    </Modal>
  );
}

// TodayTaskTable — v22 스타일 인라인 편집 테이블 + 빠른 추가 행
// 모든 편집은 그 자리에서 즉시 Firestore 반영. 마지막 행은 항상 빈 입력 행.
// ============================================================
function TodayTaskTable({ tasks, projects, audit, activeStaff, onAdd, onToast }) {
  const [quickTitle, setQuickTitle] = useState('');
  const [quickProjectId, setQuickProjectId] = useState('');
  const [quickPriority, setQuickPriority] = useState('mid');
  const [quickDue, setQuickDue] = useState('');
  const [adding, setAdding] = useState(false);
  // 📎 메모·첨부 모달 — 열린 task 객체 또는 null
  const [notesTask, setNotesTask] = useState(null);

  const myProjects = projects.filter(p => Array.isArray(p.assigneeStaffIds) && p.assigneeStaffIds.includes(activeStaff.id));

  // ⭐ 프로젝트 즐겨찾기 — 담당자별 staff.favoriteProjectIds에 저장(기기 간 동기화). 즐겨찾기는 드롭다운 상단 우선노출.
  const favIds = activeStaff.favoriteProjectIds || [];
  const sortedMyProjects = [...myProjects].sort((a, b) => {
    const fa = favIds.includes(a.id) ? 0 : 1, fb = favIds.includes(b.id) ? 0 : 1;
    if (fa !== fb) return fa - fb;
    return (a.name || '').localeCompare(b.name || '', 'ko');
  });
  const toggleFav = async (pid) => {
    if (!pid) return;
    const cur = activeStaff.favoriteProjectIds || [];
    const next = cur.includes(pid) ? cur.filter(x => x !== pid) : [...cur, pid];
    try {
      await db.collection(COLLECTIONS.STAFF).doc(activeStaff.id).update({ favoriteProjectIds: next });
      onToast({ message: cur.includes(pid) ? '즐겨찾기 해제' : '⭐ 즐겨찾기 추가 (상단 노출)', type: 'success' });
    } catch (e) { onToast({ message: '즐겨찾기 저장 실패: ' + e.message, type: 'error' }); }
  };

  const updateField = async (taskId, patch) => {
    try {
      await db.collection(COLLECTIONS.POUR_TASKS).doc(taskId).update({ ...patch, ...audit.update() });
    } catch (e) {
      onToast({ message: '저장 실패: ' + e.message, type: 'error' });
    }
  };

  const toggleDone = async (t) => {
    const newDone = !t.done;
    await updateField(t.id, { done: newDone, doneAt: newDone ? nowIso() : null });
  };

  const deleteTask = async (t) => {
    if (!confirm(`"${t.title}" 삭제할까요?`)) return;
    await db.collection(COLLECTIONS.POUR_TASKS).doc(t.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };

  const handleQuickAdd = async () => {
    if (!quickTitle.trim() || adding) return;
    setAdding(true);
    try {
      const selected = projects.find(p => p.id === quickProjectId);
      await onAdd({
        title: quickTitle,
        projectId: quickProjectId || null,
        projectName: selected?.name || null,
        weekDay: null,  // null이면 addTask에서 todayDay로 자동 설정
        weekSlot: null,
        priority: quickPriority,
        dueDate: quickDue || '',
      });
      // 입력 초기화 (프로젝트·우선순위는 유지 → 연속 입력 편의)
      setQuickTitle('');
      setQuickDue('');
    } catch (e) {
      onToast({ message: '추가 실패: ' + e.message, type: 'error' });
    }
    setAdding(false);
  };

  // 스타일
  const th = { padding:'8px 6px', fontSize:10.5, fontWeight:800, color:'var(--text-sm)', letterSpacing:.4, textAlign:'left', borderBottom:'1.5px solid var(--border)', background:'var(--bg)' };
  const td = { padding:'7px 6px', fontSize:12, borderBottom:'1px dashed var(--border-s)', verticalAlign:'middle' };
  const cellInput = { width:'100%', background:'transparent', border:'none', fontSize:12.5, fontWeight:600, color:'var(--text)', outline:'none', padding:'2px 4px' };
  const cellSelect = { background:'var(--bg)', border:'1px solid var(--border)', borderRadius:5, fontSize:11, fontWeight:700, padding:'3px 5px', cursor:'pointer', width:'100%' };

  // ProjectSelect — 본인 배정 프로젝트만 노출. 그 외 프로젝트는 의도적으로 숨김 (혼란 방지).
  // 단, 이미 선택된 프로젝트가 본인 배정이 아닌 경우엔 그 프로젝트도 유지 (편집 기존 값 보존).
  // 새 프로젝트 연결이 필요하면 프로젝트 페이지에서 본인을 담당자로 추가 후 사용.
  const ProjectSelect = ({ value, onChange }) => {
    const inMine = !value || myProjects.some(p => p.id === value);
    const externalSelected = !inMine ? projects.find(p => p.id === value) : null;
    const starred = !!value && favIds.includes(value);
    return (
      <div style={{ display:'flex', alignItems:'center', gap:3 }}>
        <select value={value || ''} onChange={onChange}
          style={{ ...cellSelect, flex:1, color: value ? 'var(--or-d)' : 'var(--text-sm)' }}
          title={myProjects.length === 0 ? '본인 배정 프로젝트가 없습니다 — 프로젝트 페이지에서 담당자 배정 필요' : '⭐ 즐겨찾기 프로젝트는 상단에 표시'}>
          <option value="">+ 프로젝트</option>
          {myProjects.length === 0 ? (
            <option disabled>— 본인 배정 프로젝트 없음 (프로젝트 페이지에서 담당자 배정) —</option>
          ) : (
            sortedMyProjects.map(p => <option key={p.id} value={p.id}>{favIds.includes(p.id) ? '⭐ ' : ''}{p.name} ({p.progress || 0}%)</option>)
          )}
          {externalSelected && (
            <option value={externalSelected.id}>↳ {externalSelected.name} (외부 — 기존 연결 유지)</option>
          )}
        </select>
        <button onClick={() => toggleFav(value)} disabled={!value}
          title={!value ? '프로젝트 선택 후 즐겨찾기' : starred ? '즐겨찾기 해제' : '즐겨찾기 — 상단 우선노출'}
          style={{ width:22, height:22, flexShrink:0, borderRadius:5, fontSize:12, lineHeight:1, padding:0, background:'transparent', border:'none', cursor: value ? 'pointer' : 'default', opacity: value ? 1 : 0.3, color: starred ? 'var(--gold, #D97706)' : 'var(--text-sm)' }}>
          {starred ? '⭐' : '☆'}
        </button>
      </div>
    );
  };

  return (
    <div style={{ overflow:'hidden', border:'1px solid var(--border)', borderRadius:9 }}>
      <table style={{ width:'100%', borderCollapse:'collapse' }}>
        <thead>
          <tr>
            <th style={{ ...th, width:32, textAlign:'center' }}>✓</th>
            <th style={th}>업무 내용</th>
            <th style={{ ...th, width:130 }}>프로젝트</th>
            <th style={{ ...th, width:75 }}>우선순위</th>
            <th style={{ ...th, width:95 }}>마감</th>
            <th style={{ ...th, width:65 }}>상태</th>
            <th style={{ ...th, width:36, textAlign:'center' }} title="메모·첨부">📎</th>
            <th style={{ ...th, width:32, textAlign:'center' }}></th>
          </tr>
        </thead>
        <tbody>
          {tasks.length === 0 && (
            <tr>
              <td colSpan={8} style={{ padding:'18px 12px', textAlign:'center', color:'var(--text-sm)', fontSize:12, fontWeight:600 }}>
                오늘 배치된 업무가 없습니다. 아래 행에 바로 입력하거나, 위 주간 슬롯을 클릭하세요.
              </td>
            </tr>
          )}
          {tasks.map(t => {
            const dd = t.dueDate ? calcDday(t.dueDate) : '';
            const ddColor = dd === 'D-day' || dd.startsWith('D+') ? '#DC2626' : 'var(--text-sm)';
            const proj = projects.find(p => p.id === t.projectId);
            return (
              <tr key={t.id} style={{ background: t.done ? 'rgba(43,196,114,.05)' : 'transparent', opacity: t.done ? 0.7 : 1 }}>
                <td style={{ ...td, textAlign:'center' }}>
                  <input type="checkbox" checked={!!t.done} onChange={() => toggleDone(t)} style={{ accentColor:'var(--green)', cursor:'pointer' }} />
                </td>
                <td style={td}>
                  <input
                    defaultValue={t.title}
                    onBlur={e => { if (e.target.value !== t.title) updateField(t.id, { title: e.target.value }); }}
                    onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                    placeholder="업무 내용..."
                    style={{ ...cellInput, fontWeight:700, textDecoration: t.done ? 'line-through' : 'none' }}
                  />
                </td>
                <td style={td}>
                  <ProjectSelect value={t.projectId} onChange={e => {
                    const pid = e.target.value;
                    const p = projects.find(x => x.id === pid);
                    updateField(t.id, { projectId: pid || null, projectName: p?.name || null });
                  }} />
                </td>
                <td style={td}>
                  <select value={t.priority || 'mid'} onChange={e => updateField(t.id, { priority: e.target.value })} style={cellSelect}>
                    <option value="high">🔴 높음</option>
                    <option value="mid">🟡 중간</option>
                    <option value="low">🟢 낮음</option>
                  </select>
                </td>
                <td style={td}>
                  {t.dueDate ? (
                    <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                      <input type="date" defaultValue={t.dueDate}
                        onChange={e => updateField(t.id, { dueDate: e.target.value })}
                        style={{ ...cellInput, fontSize:10.5, color:'var(--text-md)', cursor:'pointer' }} />
                      <span style={{ fontSize:10, fontWeight:900, color:ddColor, whiteSpace:'nowrap' }}>{dd}</span>
                    </div>
                  ) : (
                    <input type="date" defaultValue=""
                      onChange={e => updateField(t.id, { dueDate: e.target.value })}
                      style={{ ...cellInput, fontSize:10.5, color:'var(--text-sm)', cursor:'pointer' }}
                      title="마감일 추가" />
                  )}
                </td>
                <td style={td}>
                  <select value={t.status || 'active'} onChange={e => updateField(t.id, { status: e.target.value })} style={cellSelect}>
                    <option value="active">▶ 진행</option>
                    <option value="hold">⏸ 보류</option>
                    <option value="stopped">⛔ 중단</option>
                    <option value="resume">🔄 재개</option>
                  </select>
                </td>
                <td style={{ ...td, textAlign:'center', position:'relative' }}>
                  {(() => {
                    const hasNotes = typeof t.notes === 'string' && t.notes.trim().length > 0;
                    const attCount = Array.isArray(t.attachments) ? t.attachments.length : 0;
                    const has = hasNotes || attCount > 0;
                    return (
                      <button onClick={() => setNotesTask(t)}
                        title={has ? `메모${hasNotes ? ' O' : ''} · 첨부 ${attCount}장` : '메모·첨부 추가'}
                        style={{
                          width:24, height:22, borderRadius:5, fontSize:12, padding:0,
                          background: has ? 'var(--or-l)' : 'transparent',
                          color: has ? 'var(--or-d)' : 'var(--text-sm)',
                          cursor:'pointer', position:'relative', fontWeight:800,
                        }}>
                        📎{attCount > 0 && <sub style={{ fontSize:8, fontWeight:900 }}>{attCount}</sub>}
                      </button>
                    );
                  })()}
                </td>
                <td style={{ ...td, textAlign:'center' }}>
                  <button onClick={() => deleteTask(t)} title="삭제"
                    style={{ width:22, height:22, borderRadius:5, fontSize:11, color:'#DC2626', background:'transparent', cursor:'pointer' }}>🗑</button>
                </td>
              </tr>
            );
          })}
          {/* 빠른 추가 행 — 항상 마지막에 표시. Enter로 즉시 추가, 프로젝트·우선순위·마감 인라인 입력 */}
          <tr style={{ background:'var(--or-pale, #FFF7ED)' }}>
            <td style={{ ...td, textAlign:'center' }}>
              <span style={{ fontSize:18, color:'var(--or)', fontWeight:900 }}>+</span>
            </td>
            <td style={td}>
              <input
                value={quickTitle}
                onChange={e => setQuickTitle(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') handleQuickAdd(); }}
                placeholder="새 업무 입력 후 Enter ↵"
                style={{ ...cellInput, fontWeight:700 }}
              />
            </td>
            <td style={td}>
              <ProjectSelect value={quickProjectId} onChange={e => setQuickProjectId(e.target.value)} />
            </td>
            <td style={td}>
              <select value={quickPriority} onChange={e => setQuickPriority(e.target.value)} style={cellSelect}>
                <option value="high">🔴 높음</option>
                <option value="mid">🟡 중간</option>
                <option value="low">🟢 낮음</option>
              </select>
            </td>
            <td style={td}>
              <input type="date" value={quickDue} onChange={e => setQuickDue(e.target.value)}
                style={{ ...cellInput, fontSize:10.5, cursor:'pointer' }} title="마감일 (선택)" />
            </td>
            <td colSpan={3} style={{ ...td, textAlign:'center' }}>
              <button onClick={handleQuickAdd} disabled={adding || !quickTitle.trim()} style={{
                padding:'4px 12px', borderRadius:6, fontSize:11, fontWeight:900, color:'#fff',
                background: (adding || !quickTitle.trim()) ? 'var(--text-sm)' : 'var(--or)', cursor:(adding || !quickTitle.trim()) ? 'not-allowed' : 'pointer'
              }}>+ 추가</button>
            </td>
          </tr>
        </tbody>
      </table>
      {/* 📎 메모·첨부 모달 — 빠른 판별용. 데이터는 task 문서에 직접 저장(다른 페이지 영향 없음) */}
      {notesTask && (
        <TaskNotesModal
          task={notesTask}
          audit={audit}
          onClose={() => setNotesTask(null)}
          onToast={onToast}
        />
      )}
    </div>
  );
}

// 오늘 업무 한 줄 (체크박스 + 제목 + 우선순위 + 마감) — 고정업무 영역에서만 사용
function TodayTaskRow({ task, audit, compact }) {
  const toggleDone = async () => {
    const newDone = !task.done;
    await db.collection(COLLECTIONS.POUR_TASKS).doc(task.id).update({
      done: newDone,
      doneAt: newDone ? nowIso() : null,
      ...audit.update(),
    });
  };
  const dd = task.dueDate ? calcDday(task.dueDate) : '';
  const pri = PRIORITY_META[task.priority] || PRIORITY_META.mid;
  return (
    <label style={{
      display:'flex', alignItems:'center', gap:8, padding: compact ? '5px 8px' : '7px 10px',
      background: task.done ? 'rgba(43,196,114,.06)' : 'var(--bg)', borderRadius:6, cursor:'pointer',
      opacity: task.done ? 0.65 : 1
    }}>
      <input type="checkbox" checked={!!task.done} onChange={toggleDone} style={{ accentColor:'var(--green)' }} />
      <span style={{ flex:1, fontSize: compact ? 11 : 12.5, fontWeight:700, color:'var(--text)', textDecoration: task.done ? 'line-through' : 'none' }}>
        {task.title}
      </span>
      {!compact && <span style={{ fontSize:11 }}>{pri.icon}</span>}
      {dd && <span style={{ fontSize:10, fontWeight:800, color: dd === 'D-day' || dd.startsWith('D+') ? '#DC2626' : 'var(--text-sm)' }}>{dd}</span>}
    </label>
  );
}

// ============================================================
// AssigneePicker — 반복업무 담당자 다중 선택 (체크박스 팝오버). 값: 'all' | [staffId,...]
// ============================================================
function AssigneePicker({ value, staffMembers, onChange }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState(null);  // position:fixed 좌표 (overflow:hidden 컨테이너 탈출용)
  const btnRef = useRef(null);
  const menuRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    const h = (e) => {
      if (btnRef.current && btnRef.current.contains(e.target)) return;
      if (menuRef.current && menuRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);
  const isAll = value === 'all';
  const ids = isAll ? [] : (Array.isArray(value) ? value : (value ? [value] : []));
  const label = isAll ? '전체' : (ids.length === 0 ? '미지정' : ids.length === 1 ? ((staffMembers.find(s => s.id === ids[0]) || {}).name || '1명') : `${ids.length}명`);
  const toggleStaff = (id) => {
    if (isAll) { onChange([id]); return; }
    onChange(ids.includes(id) ? ids.filter(x => x !== id) : [...ids, id]);
  };
  const openMenu = () => {
    if (open) { setOpen(false); return; }
    const r = btnRef.current.getBoundingClientRect();
    const menuH = Math.min(60 + staffMembers.length * 34, 260);
    const below = window.innerHeight - r.bottom;
    const top = below > menuH + 8 ? r.bottom + 4 : Math.max(8, r.top - menuH - 4);  // 아래 공간 부족 시 위로
    setPos({ top, left: r.left, width: Math.max(r.width, 170) });
    setOpen(true);
  };
  return (
    <>
      <button ref={btnRef} onClick={openMenu} title="담당자 지정 (다중 선택)" style={{ width:'100%', padding:'5px 8px', border:'1px solid var(--border)', borderRadius:6, fontSize:11.5, fontWeight:700, background:'#fff', cursor:'pointer', textAlign:'left', color: (isAll || ids.length) ? 'var(--text)' : 'var(--text-sm)' }}>
        👤 {label} ▾
      </button>
      {open && pos && (
        <div ref={menuRef} style={{ position:'fixed', top:pos.top, left:pos.left, width:pos.width, zIndex:4000, background:'#fff', border:'1px solid var(--border)', borderRadius:8, boxShadow:'var(--shadow-lg)', padding:6, maxHeight:260, overflowY:'auto' }}>
          <label style={{ display:'flex', alignItems:'center', gap:7, padding:'6px 8px', borderRadius:6, cursor:'pointer', fontSize:12, fontWeight:800, color:'var(--or-d)' }}>
            <input type="checkbox" checked={isAll} onChange={() => onChange(isAll ? [] : 'all')} style={{ accentColor:'var(--or)', cursor:'pointer' }} />
            전체 (전 담당자에게 생성)
          </label>
          <div style={{ height:1, background:'var(--border-s)', margin:'4px 0' }} />
          {staffMembers.map(s => (
            <label key={s.id} style={{ display:'flex', alignItems:'center', gap:7, padding:'6px 8px', borderRadius:6, cursor: isAll ? 'default' : 'pointer', fontSize:12, fontWeight:700, color:'var(--text)', opacity: isAll ? 0.5 : 1 }}>
              <input type="checkbox" checked={isAll || ids.includes(s.id)} disabled={isAll} onChange={() => toggleStaff(s.id)} style={{ accentColor:'var(--or)', cursor: isAll ? 'default' : 'pointer' }} />
              {s.name}
            </label>
          ))}
        </div>
      )}
    </>
  );
}

// ============================================================
// RecurringTasksPage — 반복업무 엑셀 표 + 빠른 추가 + 📌 토글
// ============================================================
function RecurringTasksPage({ onToast }) {
  const { activeStaff, audit, staffMembers } = useActiveStaffContext();
  const { recurring, loading } = useStaffRecurring(activeStaff?.id);
  const [adding, setAdding] = useState(false);
  const [newRow, setNewRow] = useState({
    title: '', recurType: 'daily', weekDay: '월', monthDay: 1, time: '', priority: 'mid', pinned: false, assigneeStaffIds: [],
  });

  if (!activeStaff) {
    return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>활동 담당자 선택이 필요합니다.</div>;
  }
  if (loading) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;

  const togglePinned = async (r) => {
    await db.collection(COLLECTIONS.POUR_RECURRING).doc(r.id).update({
      pinned: !r.pinned,
      ...audit.update(),
    });
    // 오늘 인스턴스 isFixed도 즉시 동기화
    const todayKey = new Date().toISOString().split('T')[0];
    const snap = await db.collection(COLLECTIONS.POUR_TASKS)
      .where('recurringId','==',r.id).where('performedDate','==',todayKey).get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.update(d.ref, { isFixed: !r.pinned, ...audit.update() }));
    if (snap.size > 0) await batch.commit();
    onToast({ message: `📌 ${r.title} ${!r.pinned ? '고정' : '해제'}`, type: 'success' });
  };

  const toggleActive = async (r) => {
    await db.collection(COLLECTIONS.POUR_RECURRING).doc(r.id).update({ active: !r.active, ...audit.update() });
    onToast({ message: `${r.title} ${!r.active ? '활성화' : '비활성화'}`, type: 'success' });
  };

  const deleteOne = async (r) => {
    if (!confirm(`"${r.title}" 반복업무를 삭제할까요? 오늘 생성된 인스턴스는 별도로 유지됩니다.`)) return;
    await db.collection(COLLECTIONS.POUR_RECURRING).doc(r.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };

  const updateField = async (r, field, value) => {
    await db.collection(COLLECTIONS.POUR_RECURRING).doc(r.id).update({ [field]: value, ...audit.update() });
  };

  const addNew = async () => {
    if (!newRow.title.trim()) { onToast({ message: '업무 내용을 입력하세요', type: 'error' }); return; }
    setAdding(true);
    try {
      // 담당자 미선택 시 본인에게 배정 (고아 업무 방지)
      const av = newRow.assigneeStaffIds;
      const assignee = av === 'all' ? 'all' : (Array.isArray(av) && av.length ? av : [activeStaff.id]);
      const data = {
        staffId: activeStaff.id,
        assigneeStaffIds: assignee,
        title: newRow.title.trim(),
        recurType: newRow.recurType,
        weekDay: newRow.recurType === 'weekly' ? newRow.weekDay : null,
        monthDay: newRow.recurType === 'monthly' ? newRow.monthDay : null,
        time: newRow.time,
        priority: newRow.priority,
        projectId: null,
        description: '',
        pinned: newRow.pinned,
        active: true,
        ...audit.create(),
      };
      await db.collection(COLLECTIONS.POUR_RECURRING).add(data);
      setNewRow({ title: '', recurType: newRow.recurType, weekDay: '월', monthDay: 1, time: '', priority: 'mid', pinned: false, assigneeStaffIds: [] });
      onToast({ message: '반복업무 추가 완료', type: 'success' });
    } catch (e) {
      onToast({ message: '추가 실패: ' + e.message, type: 'error' });
    }
    setAdding(false);
  };

  const tdSty = { padding:'8px 10px', fontSize:12, borderBottom:'1px dashed var(--border-s)' };
  const thSty = { padding:'10px 10px', fontSize:10.5, fontWeight:800, color:'var(--text-sm)', textAlign:'left', letterSpacing:.4, borderBottom:'1px solid var(--border)' };
  const inputSty = { padding:'5px 8px', border:'1px solid var(--border)', borderRadius:6, fontSize:11.5, fontWeight:600, background:'#fff', outline:'none', width:'100%' };

  // 정렬: 주기(주→월→일) + 시간
  const order = { weekly: 0, monthly: 1, daily: 2 };
  const sorted = [...recurring].sort((a,b) => {
    const o = (order[a.recurType] ?? 9) - (order[b.recurType] ?? 9);
    if (o !== 0) return o;
    return (a.time || '').localeCompare(b.time || '');
  });

  return (
    <div style={{ padding:'24px 32px', maxWidth:1280 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, gap:14, flexWrap:'wrap' }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>📌 고정업무 (반복)</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700, lineHeight:1.7 }}>
            {activeStaff.name} · {recurring.length}건 (본인 담당+생성) · <b>오늘 업무 페이지의 📌 고정업무 DB 관리 페이지</b>
            <br/>여기 등록한 반복 업무는 담당자의 오늘 업무 → <b>📌 고정업무</b> 영역에 자동 표시됨 · 담당자 다중 지정 가능 · 📌는 상단 고정
          </div>
        </div>
      </div>

      <div style={{ background:'#fff', borderRadius:12, border:'1px solid var(--border)', overflow:'hidden', boxShadow:'var(--shadow)' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:'var(--bg)' }}>
              <th style={{ ...thSty, width:60 }}>주기</th>
              <th style={{ ...thSty, width:80 }}>요일/일자</th>
              <th style={{ ...thSty, width:70 }}>시간</th>
              <th style={{ ...thSty, width:70 }}>우선순위</th>
              <th style={{ ...thSty, width:120 }}>담당자</th>
              <th style={thSty}>업무 내용</th>
              <th style={{ ...thSty, width:50, textAlign:'center' }}>📌</th>
              <th style={{ ...thSty, width:80, textAlign:'right' }}>액션</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(r => (
              <tr key={r.id} style={{ opacity: r.active === false ? 0.5 : 1 }}>
                <td style={tdSty}>
                  <select value={r.recurType} onChange={e => updateField(r, 'recurType', e.target.value)} style={inputSty}>
                    <option value="daily">매일</option>
                    <option value="weekly">매주</option>
                    <option value="monthly">매월</option>
                  </select>
                </td>
                <td style={tdSty}>
                  {r.recurType === 'weekly' && (
                    <select value={r.weekDay || '월'} onChange={e => updateField(r, 'weekDay', e.target.value)} style={inputSty}>
                      {ALL_DAYS.map(d => <option key={d} value={d}>{d}</option>)}
                    </select>
                  )}
                  {r.recurType === 'monthly' && (
                    <select value={r.monthDay} onChange={e => updateField(r, 'monthDay', e.target.value === 'last' ? 'last' : parseInt(e.target.value, 10))} style={inputSty}>
                      {[...Array(31)].map((_, i) => <option key={i+1} value={i+1}>{i+1}일</option>)}
                      <option value="last">말일</option>
                    </select>
                  )}
                  {r.recurType === 'daily' && <span style={{ color:'var(--text-xs)', fontSize:11 }}>—</span>}
                </td>
                <td style={tdSty}>
                  <input type="time" value={r.time || ''} onChange={e => updateField(r, 'time', e.target.value)} style={inputSty} />
                </td>
                <td style={tdSty}>

// OKR · 프로젝트 · 업무일지 — 공통 hooks/유틸
// 데이터 모델 (CLAUDE.md PART 12-2 기준):
//   pour-objectives   — Objective (O)
//   pour-keyresults   — Key Result (KR), objectiveId 참조
//   pour-kpis         — KPI. 두 종류 공존:
//                       (A) 결과지표/진척도: keyResultId 참조 (KR의 측정수치). source='manual'(매출 등) | 'auto-progress'(프로젝트 progress 평균)
//                       (B) 활동지표(leading): kind='activity', projectId 참조, period='weekly', history:[{week,value,at,by}] — 프로젝트별 선행 행동량
//   pour-projects     — KR 달성을 위한 실행 단위. assigneeStaffIds: [] 다중 담당자, keyResultId 연결, progress 0~100
//   pour-journals     — 업무일지: 담당자가 프로젝트별로 작성 (date, content, hoursSpent, progressDelta)
// 단일 진실 소스(staff 컬렉션)와 audit 헬퍼는 모든 페이지에서 공유.
// ============================================================
function useAllOkrData() {
  const [objectives, setObjectives] = useState([]);
  const [keyResults, setKeyResults] = useState([]);
  const [kpis, setKpis] = useState([]);
  const [projects, setProjects] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    let counters = { o: false, kr: false, kpi: false, proj: false };
    const checkDone = () => { if (counters.o && counters.kr && counters.kpi && counters.proj) setLoading(false); };
    const u1 = db.collection(COLLECTIONS.POUR_OBJECTIVES).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`[pour-objectives] ${list.length}건`);
      setObjectives(list); counters.o = true; checkDone();
    }, err => { console.error('[pour-objectives]', err); counters.o = true; checkDone(); });
    const u2 = db.collection(COLLECTIONS.POUR_KEYRESULTS).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`[pour-keyresults] ${list.length}건`);
      setKeyResults(list); counters.kr = true; checkDone();
    }, err => { console.error('[pour-keyresults]', err); counters.kr = true; checkDone(); });
    const u3 = db.collection(COLLECTIONS.POUR_KPIS).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`[pour-kpis] ${list.length}건`);
      setKpis(list); counters.kpi = true; checkDone();
    }, err => { console.error('[pour-kpis]', err); counters.kpi = true; checkDone(); });
    const u4 = db.collection(COLLECTIONS.POUR_PROJECTS).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`[pour-projects] ${list.length}건`);
      setProjects(list); counters.proj = true; checkDone();
    }, err => { console.error('[pour-projects]', err); counters.proj = true; checkDone(); });
    return () => { u1(); u2(); u3(); u4(); };
  }, []);
  return { objectives, keyResults, kpis, projects, loading };
}

function useJournals() {
  const [journals, setJournals] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    const unsub = db.collection(COLLECTIONS.POUR_JOURNALS).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // 날짜 desc → 작성 시간 desc 정렬 (클라이언트 정렬: index 생성 회피)
      list.sort((a, b) => {
        const d = (b.date || '').localeCompare(a.date || '');
        if (d !== 0) return d;
        return (b.createdAt || '').localeCompare(a.createdAt || '');
      });
      console.log(`[pour-journals] ${list.length}건`);
      setJournals(list);
      setLoading(false);
    }, err => { console.error('[pour-journals]', err); setLoading(false); });
    return unsub;
  }, []);
  return { journals, loading };
}

// KPI 자동산출: 연결된 keyResultId의 모든 프로젝트 progress 평균 (source='auto-progress')
function computeKpiAutoValue(kpi, projects) {
  if (!kpi || kpi.source !== 'auto-progress') return kpi?.current ?? 0;
  const linked = projects.filter(p => p.keyResultId === kpi.keyResultId);
  if (linked.length === 0) return 0;
  const sum = linked.reduce((s, p) => s + (Number(p.progress) || 0), 0);
  return Math.round(sum / linked.length);
}

// KR 진척도(0~100): 소속 프로젝트 progress 평균
function computeKrProgress(kr, projects) {
  const linked = projects.filter(p => p.keyResultId === kr.id);
  if (linked.length === 0) return 0;
  const sum = linked.reduce((s, p) => s + (Number(p.progress) || 0), 0);
  return Math.round(sum / linked.length);
}

// 담당자별 프로젝트 기여도 (assigneeStaffIds 포함된 프로젝트의 progress 평균)
function computeStaffContribution(staffId, projects) {
  const mine = projects.filter(p => Array.isArray(p.assigneeStaffIds) && p.assigneeStaffIds.includes(staffId));
  if (mine.length === 0) return { count: 0, avgProgress: 0, doneCount: 0 };
  const sum = mine.reduce((s, p) => s + (Number(p.progress) || 0), 0);
  const doneCount = mine.filter(p => p.status === 'done' || Number(p.progress) >= 100).length;
  return { count: mine.length, avgProgress: Math.round(sum / mine.length), doneCount };
}

// ============================================================
// OKRPage — Objective → KR → 결과지표 KPI(매출 수동·진척도 자동) 트리
// 회사 OKR 1개(매출 10억) 가정 + 다중 KR + KR별 결과지표 KPI. (선행 활동지표는 프로젝트 페이지)
// ============================================================
function OKRPage({ onToast }) {
  const { activeStaff, audit, staffMembers } = useActiveStaffContext();
  const { objectives, keyResults, kpis, projects, loading } = useAllOkrData();
  const [showObjModal, setShowObjModal] = useState(false);
  const [showKrModal, setShowKrModal] = useState(null);   // objectiveId
  const [showKpiModal, setShowKpiModal] = useState(null); // keyResultId
  const [seeding, setSeeding] = useState(false);

  if (!activeStaff) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>활동 담당자 선택이 필요합니다.</div>;
  if (loading) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;

  // 🌱 기본 OKR·KPI 일괄 시드 — 1 Objective + 3 KR + 16 KPI
  const seedOKR = async () => {
    if (!confirm(
      `기본 OKR을 일괄 등록합니다:\n` +
      `· Objective 1개 (2026년 매출 10억)\n` +
      `· Key Result 3개 (KR1 직판 5억 / KR2 B2B 5억 / KR3 운영 4모듈)\n` +
      `· KPI ${OKR_SEED.keyResults.reduce((s, kr) => s + kr.kpis.length, 0)}개\n\n` +
      `매출 KPI는 매주 금요일 수동 입력, 활동지표 KPI는 프로젝트 진척도 평균으로 자동 산출됩니다.\n\n` +
      `진행할까요?`
    )) return;
    setSeeding(true);
    try {
      // 1) Objective
      const objRef = await db.collection(COLLECTIONS.POUR_OBJECTIVES).add({
        title: OKR_SEED.objective.title,
        target: OKR_SEED.objective.target,
        unit: OKR_SEED.objective.unit,
        year: OKR_SEED.objective.year,
        current: 0,
        ownerStaffId: activeStaff.id, ownerStaffName: activeStaff.name,
        description: '',
        ...audit.create(),
      });
      // 2) Key Results + KPI 순차 등록 (각 KR id를 받아 KPI에 연결)
      let krCount = 0, kpiCount = 0;
      for (const kr of OKR_SEED.keyResults) {
        const krRef = await db.collection(COLLECTIONS.POUR_KEYRESULTS).add({
          objectiveId: objRef.id,
          krKey: kr.krKey,                  // 'KR1' | 'KR2' | 'KR3' — 프로젝트 시드 매핑 키
          title: kr.title,
          target: kr.target,
          current: 0,
          unit: kr.unit,
          channel: kr.channel,
          description: '',
          ...audit.create(),
        });
        krCount++;
        for (const k of kr.kpis) {
          await db.collection(COLLECTIONS.POUR_KPIS).add({
            keyResultId: krRef.id,
            name: k.name,
            target: k.target,
            baseline: k.baseline || 0,
            current: k.baseline || 0,
            unit: k.unit,
            source: k.source,
            channelCode: k.channelCode || null,  // 채널 매핑 (예: OWN, P4, G)
            history: [],
            staffId: activeStaff.id,
            ...audit.create(),
          });
          kpiCount++;
        }
      }
      onToast({ message: `🌱 OKR 시드 완료 — Objective 1 / KR ${krCount} / KPI ${kpiCount}`, type: 'success' });
    } catch (e) {
      onToast({ message: '시드 실패: ' + e.message, type: 'error' });
    }
    setSeeding(false);
  };

  const addObjective = async (title, target, unit, year) => {
    await db.collection(COLLECTIONS.POUR_OBJECTIVES).add({
      title, target: Number(target) || 0, current: 0, unit: unit || '',
      year: year || new Date().getFullYear(),
      ownerStaffId: activeStaff.id, ownerStaffName: activeStaff.name,
      description: '',
      ...audit.create(),
    });
    onToast({ message: 'Objective 추가 완료', type: 'success' });
  };
  const addKR = async (objectiveId, title, target, unit, channel) => {
    await db.collection(COLLECTIONS.POUR_KEYRESULTS).add({
      objectiveId, title, target: Number(target) || 0, current: 0, unit: unit || '',
      channel: channel || 'ops',
      ...audit.create(),
    });
    onToast({ message: 'Key Result 추가 완료', type: 'success' });
  };
  const addKpi = async (keyResultId, name, target, baseline, unit, source) => {
    await db.collection(COLLECTIONS.POUR_KPIS).add({
      keyResultId, name, target: Number(target) || 0, baseline: Number(baseline) || 0,
      unit: unit || '', source: source || 'manual', current: Number(baseline) || 0, history: [],
      staffId: activeStaff.id,
      ...audit.create(),
    });
    onToast({ message: '결과지표 KPI 추가 완료', type: 'success' });
  };
  const updateKpiValue = async (kpi, newValue) => {
    const v = Number(newValue) || 0;
    const history = [...(kpi.history || []), { value: v, at: nowIso(), by: activeStaff.id }];
    await db.collection(COLLECTIONS.POUR_KPIS).doc(kpi.id).update({
      current: v, history: history.slice(-50),
      ...audit.update(),
    });
    onToast({ message: 'KPI 값 업데이트', type: 'success' });
  };
  const delObjective = async (o) => {
    if (!confirm(`Objective "${o.title}" 삭제? (하위 KR/KPI는 별도로 삭제 필요)`)) return;
    await db.collection(COLLECTIONS.POUR_OBJECTIVES).doc(o.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };
  const delKR = async (kr) => {
    if (!confirm(`KR "${kr.title}" 삭제?`)) return;
    await db.collection(COLLECTIONS.POUR_KEYRESULTS).doc(kr.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };
  const delKpi = async (k) => {
    if (!confirm(`KPI "${k.name}" 삭제?`)) return;
    await db.collection(COLLECTIONS.POUR_KPIS).doc(k.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };

  return (
    <div style={{ padding:'24px 32px', maxWidth:1280 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, flexWrap:'wrap', gap:12 }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>🎯 OKR · 결과지표</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
            Objective {objectives.length} · Key Result {keyResults.length} · 결과지표 KPI {kpis.filter(k => k.kind !== 'activity').length} · 프로젝트 {projects.length} · 📈 활동지표 {kpis.filter(k => k.kind === 'activity').length}(프로젝트)
            <br/>※ source=<b>auto-progress</b> 설정 시 KPI 값은 연결 프로젝트들의 진척도 평균으로 자동 산출됩니다.
          </div>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {objectives.length === 0 && (
            <button onClick={seedOKR} disabled={seeding} style={{
              padding:'10px 16px', borderRadius:9, fontSize:13, fontWeight:900, color:'#fff',
              background:'#0F1F5C', border:'none', opacity: seeding ? 0.6 : 1,
            }}>🌱 기본 OKR·KPI 일괄 등록 ({1}·{3}·{OKR_SEED.keyResults.reduce((s, kr) => s + kr.kpis.length, 0)})</button>
          )}
          <button onClick={() => setShowObjModal(true)} style={{
            padding:'10px 18px', borderRadius:9, fontSize:13, fontWeight:900, color:'#fff',
            background:'linear-gradient(135deg, var(--or), var(--or-d))',
          }}>+ Objective 추가</button>
        </div>
      </div>

      {/* 매주 금요일 입력 안내 (Objective 등록되어 있고 manual KPI가 있을 때) */}
      {objectives.length > 0 && kpis.some(k => k.source === 'manual') && (() => {
        const today = new Date();
        const isFriday = today.getDay() === 5;
        const dayOfWeek = ['일','월','화','수','목','금','토'][today.getDay()];
        return (
          <div style={{
            padding:'12px 16px', marginBottom:18,
            background: isFriday ? 'linear-gradient(135deg, #FEF3C7, #FDE68A)' : 'var(--or-pale, #FFF7ED)',
            border: isFriday ? '2px solid #F59E0B' : '1px dashed var(--or-l, #FED7AA)',
            borderRadius:10, fontSize:11.5, color: isFriday ? '#92400E' : 'var(--or-d, #B45309)',
            fontWeight:700, lineHeight:1.7, display:'flex', alignItems:'center', gap:10
          }}>
            <span style={{ fontSize:18 }}>{isFriday ? '🔔' : '📅'}</span>
            <div style={{ flex:1 }}>
              <b>{isFriday ? '오늘은 금요일 — 매출 KPI 산출 입력일!' : `오늘은 ${dayOfWeek}요일`}</b>
              {' · '}매주 금요일에 각 채널 매출 KPI(수동 입력)에 이번 주 실적을 입력해 주세요.
              <span style={{ fontSize:10.5, fontWeight:600, marginLeft:6 }}>(💰 매출=결과지표 ✏️수동 / 📊 진척도 🔁자동 · 선행 <b>활동지표</b>는 🗂️프로젝트에서 입력)</span>
            </div>
          </div>
        );
      })()}

      {objectives.length === 0 ? (
        <div style={{ padding:60, textAlign:'center', background:'#fff', border:'1px dashed var(--border)', borderRadius:12, color:'var(--text-sm)', fontSize:13, fontWeight:600 }}>
          등록된 Objective가 없습니다.<br/>
          👉 상단의 <b style={{ color:'var(--navy)' }}>[🌱 기본 OKR·KPI 일괄 등록]</b> 버튼 한 번 클릭으로 2026년 매출 10억 OKR이 자동 등록됩니다.<br/>
          (또는 [+ Objective 추가]로 1개씩 직접 입력)
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
          {objectives.map(o => {
            const myKRs = keyResults.filter(kr => kr.objectiveId === o.id);
            const oProgress = myKRs.length === 0 ? 0 : Math.round(myKRs.reduce((s, kr) => s + computeKrProgress(kr, projects), 0) / myKRs.length);
            return (
              <div key={o.id} style={{ background:'#fff', borderRadius:14, border:'1.5px solid var(--border)', boxShadow:'var(--shadow)', overflow:'hidden' }}>
                {/* Objective 헤더 */}
                <div style={{ padding:'18px 22px', background:'linear-gradient(135deg, var(--navy), var(--navy2))', color:'#fff' }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:10 }}>
                    <div style={{ minWidth:0, flex:1 }}>
                      <div style={{ fontSize:10.5, fontWeight:800, color:'rgba(255,255,255,.65)', letterSpacing:1, marginBottom:4 }}>OBJECTIVE · {o.year || ''}</div>
                      <div style={{ fontSize:17, fontWeight:900, letterSpacing:-0.4 }}>{o.title}</div>
                      {o.target ? (
                        <div style={{ fontSize:11.5, color:'rgba(255,255,255,.8)', fontWeight:700, marginTop:4 }}>
                          목표: {fmtPrice(o.target)} {o.unit || ''} · 평균 진척도: <b>{oProgress}%</b>
                        </div>
                      ) : null}
                    </div>
                    <div style={{ display:'flex', gap:6 }}>
                      <button onClick={() => setShowKrModal(o.id)} style={{ padding:'7px 12px', borderRadius:7, fontSize:11.5, fontWeight:800, color:'#fff', background:'rgba(255,255,255,.16)', border:'1px solid rgba(255,255,255,.3)' }}>+ KR</button>
                      <button onClick={() => delObjective(o)} style={{ padding:'7px 10px', borderRadius:7, fontSize:11.5, fontWeight:800, color:'rgba(255,255,255,.85)', background:'rgba(0,0,0,.2)', border:'1px solid rgba(255,255,255,.15)' }}>삭제</button>
                    </div>
                  </div>
                  {/* Objective progress bar */}
                  <div style={{ marginTop:12, height:6, background:'rgba(255,255,255,.15)', borderRadius:3, overflow:'hidden' }}>
                    <div style={{ width:`${oProgress}%`, height:'100%', background:'linear-gradient(90deg, #FFD66B, var(--or))' }} />
                  </div>
                </div>

                {/* KR 목록 */}
                <div style={{ padding:'14px 18px', display:'flex', flexDirection:'column', gap:12 }}>
                  {myKRs.length === 0 ? (
                    <div style={{ padding:18, textAlign:'center', color:'var(--text-sm)', fontSize:12, fontWeight:600, border:'1px dashed var(--border)', borderRadius:8 }}>
                      Key Result가 없습니다. 우상단 [+ KR] 버튼으로 추가하세요.
                    </div>
                  ) : myKRs.map(kr => {
                    const myKpis = kpis.filter(k => k.keyResultId === kr.id);
                    const linkedProjects = projects.filter(p => p.keyResultId === kr.id);
                    const krProg = computeKrProgress(kr, projects);
                    const channelMeta = {
                      inbound:  { label: 'Inbound',  color:'#2563EB', bg:'#DBEAFE' },
                      outbound: { label: 'Outbound', color:'#7C3AED', bg:'#EDE9FE' },
                      ops:      { label: 'Ops',      color:'#059669', bg:'#D1FAE5' },
                    }[kr.channel || 'ops'] || { label: 'Ops', color:'#059669', bg:'#D1FAE5' };
                    return (
                      <div key={kr.id} style={{ border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px', background:'var(--bg)' }}>
                        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:8, marginBottom:8 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0, flex:1 }}>
                            <span style={{ padding:'2px 7px', borderRadius:5, fontSize:10, fontWeight:900, color:channelMeta.color, background:channelMeta.bg }}>{channelMeta.label}</span>
                            <span style={{ fontSize:13.5, fontWeight:900, color:'var(--text)' }}>{kr.title}</span>
                            <span style={{ fontSize:11, fontWeight:800, color:'var(--text-sm)' }}>· 목표 {fmtPrice(kr.target)} {kr.unit}</span>
                            <span style={{ fontSize:11, fontWeight:900, color:'var(--or-d)' }}>· {krProg}%</span>
                          </div>
                          <div style={{ display:'flex', gap:6 }}>
                            <button onClick={() => setShowKpiModal(kr.id)} style={{ padding:'5px 10px', borderRadius:6, fontSize:11, fontWeight:800, color:'#fff', background:'var(--or)' }}>+ KPI</button>
                            <button onClick={() => delKR(kr)} style={{ padding:'5px 9px', borderRadius:6, fontSize:11, fontWeight:800, color:'#DC2626', background:'#fff', border:'1px solid #FECACA' }}>삭제</button>
                          </div>
                        </div>
                        {/* KR progress */}
                        <div style={{ height:5, background:'#fff', borderRadius:3, overflow:'hidden', border:'1px solid var(--border)', marginBottom:10 }}>
                          <div style={{ width:`${krProg}%`, height:'100%', background:'var(--or)' }} />
                        </div>

                        {/* 연결된 프로젝트 요약 */}
                        <div style={{ fontSize:11, color:'var(--text-md)', fontWeight:700, marginBottom:8 }}>
                          🗂️ 연결 프로젝트: {linkedProjects.length === 0 ? '없음' : linkedProjects.map(p => `${p.name}(${p.progress||0}%)`).join(' · ')}
                        </div>

                        {/* 결과지표 KPI(매출=수동) + 진척도(auto-progress). 활동지표는 프로젝트 페이지 */}
                        {myKpis.length > 0 && (
                          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))', gap:8 }}>
                            {myKpis.map(k => {
                              const current = k.source === 'auto-progress' ? computeKpiAutoValue(k, projects) : (k.current || 0);
                              const tgt = k.target || 1;
                              const pct = Math.min(100, Math.round((current / tgt) * 100));
                              const lastUpdate = k.history && k.history.length > 0 ? k.history[k.history.length - 1] : null;
                              const isManual = k.source === 'manual';
                              return (
                                <div key={k.id} style={{
                                  background:'#fff', borderRadius:8, padding:'10px 12px',
                                  border: isManual ? '1.5px solid var(--or-l, #FED7AA)' : '1px solid var(--border)',
                                }}>
                                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4, gap:4 }}>
                                    <div style={{ fontSize:10.5, fontWeight:800, color:'var(--text-md)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{k.source === 'auto-progress' ? (k.name || '').replace('활동지표', '진척도') : k.name}</div>
                                    <button onClick={() => delKpi(k)} title="삭제" style={{ fontSize:10, color:'var(--text-sm)', flexShrink:0 }}>×</button>
                                  </div>
                                  {isManual ? (
                                    <div style={{ display:'flex', alignItems:'center', gap:4, marginBottom:3 }}>
                                      <input type="number" defaultValue={k.current || 0}
                                        onBlur={e => { if (Number(e.target.value) !== Number(k.current)) updateKpiValue(k, e.target.value); }}
                                        onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                                        placeholder="0"
                                        title="값 입력 후 Enter 또는 다른 곳 클릭 시 저장"
                                        style={{ flex:1, minWidth:60, padding:'4px 6px', fontSize:14, fontWeight:900, color:'var(--or-d)', border:'1.5px solid var(--or)', borderRadius:5, outline:'none' }} />
                                      <span style={{ fontSize:9.5, color:'var(--text-sm)', fontWeight:700, whiteSpace:'nowrap' }}>/ {fmtPrice(tgt)}</span>
                                    </div>
                                  ) : (
                                    <div style={{ display:'flex', alignItems:'baseline', gap:4, marginBottom:3 }}>
                                      <span style={{ fontSize:15, fontWeight:900, color:'var(--or-d)' }}>{fmtPrice(current)}</span>
                                      <span style={{ fontSize:10, color:'var(--text-sm)', fontWeight:700 }}>/ {fmtPrice(tgt)} {k.unit || ''}</span>
                                    </div>
                                  )}
                                  <div style={{ height:4, background:'var(--bg)', borderRadius:2, overflow:'hidden' }}>
                                    <div style={{ width:`${pct}%`, height:'100%', background:pct >= 100 ? 'var(--green)' : 'var(--or)' }} />
                                  </div>
                                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:3, gap:4 }}>
                                    <span style={{ fontSize:9.5, color:'var(--text-sm)', fontWeight:700 }}>
                                      {k.source === 'auto-progress' ? '🔁 진척도(프로젝트 평균)' : k.source === 'auto' ? '🔁 자동' : '✏️ 수동 (금요일 입력)'}
                                    </span>
                                    <span style={{ fontSize:9.5, color:pct >= 100 ? 'var(--green)' : 'var(--text-sm)', fontWeight:900 }}>{pct}%</span>
                                  </div>
                                  {isManual && lastUpdate && (
                                    <div style={{ fontSize:9, color:'var(--text-xs)', fontWeight:600, marginTop:2 }}>
                                      🕒 최근 입력 {relativeTime(lastUpdate.at)}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Objective 추가 모달 */}
      <Modal open={showObjModal} onClose={() => setShowObjModal(false)} title="Objective 추가" width={460}>
        <ObjectiveForm onSubmit={(d) => { addObjective(d.title, d.target, d.unit, d.year); setShowObjModal(false); }} onCancel={() => setShowObjModal(false)} />
      </Modal>
      {/* KR 추가 모달 */}
      <Modal open={!!showKrModal} onClose={() => setShowKrModal(null)} title="Key Result 추가" width={460}>
        {showKrModal && <KRForm onSubmit={(d) => { addKR(showKrModal, d.title, d.target, d.unit, d.channel); setShowKrModal(null); }} onCancel={() => setShowKrModal(null)} />}
      </Modal>
      {/* KPI 추가 모달 */}
      <Modal open={!!showKpiModal} onClose={() => setShowKpiModal(null)} title="결과지표 KPI 추가 (매출·진척도)" width={500}>
        {showKpiModal && <KpiForm onSubmit={(d) => { addKpi(showKpiModal, d.name, d.target, d.baseline, d.unit, d.source); setShowKpiModal(null); }} onCancel={() => setShowKpiModal(null)} />}
      </Modal>
    </div>
  );
}
