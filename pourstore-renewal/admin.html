  const [selected, setSelected] = useState(new Set());
  const [confirmModal, setConfirmModal] = useState(null);
  const [visibleCount, setVisibleCount] = useState(30);

  // Firestore 로드
  useEffect(() => {
    (async () => {
      try {
        const [snap, catDoc] = await Promise.all([
          db.collection(COLLECTIONS.PRODUCTS).get(),
          db.collection('config').doc(CATEGORIES_DOC).get(),
        ]);
        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        console.log(`[products] ${docs.length}건 로드`);
        docs.sort((a, b) => (b.updatedAt || b.createdAt || '').localeCompare(a.updatedAt || a.createdAt || ''));
        setProducts(docs);
        if (catDoc.exists) {
          setCategories(catDoc.data().list || []);
          console.log(`[categories] ${(catDoc.data().list || []).length}개 로드`);
        }
      } catch (e) {
        console.error('[products] 로드 실패:', e);
        showToast('상품 로드 실패', 'error');
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  // 카테고리 저장
  const saveCategories = async (list) => {
    try {
      await db.collection('config').doc(CATEGORIES_DOC).set({ list, updatedAt: new Date().toISOString() });
      setCategories(list);
      setShowCategoryManager(false);
      showToast(`카테고리 ${list.length}개 저장 완료`);
    } catch (e) {
      console.error('[categories] 저장 실패:', e);
      showToast('카테고리 저장 실패', 'error');
    }
  };

  // 빈 폼 생성
  const emptyForm = () => ({
    name: '',
    category: '',
    brand: 'store',
    thumbnail: '',
    price: '',
    salePrice: '',
    options: '',
    description: '',
    channels: CHANNELS.reduce((acc, ch) => { acc[ch.key] = ''; return acc; }, {}),
    detailImages: [],
    detailHtml: '',
    tags: [],
    isActive: true,
  });

  const [uploading, setUploading] = useState(false);
  const [detailTab, setDetailTab] = useState('visual'); // visual | images | html | preview
  const [slotCount, setSlotCount] = useState(10);
  const editorRef = useRef(null);
  const visualImgRef = useRef(null);
  const excelRef = useRef(null);
  const detailImgRef = useRef(null);

  // 엑셀 일괄 등록 (Firestore batch 사용 — 500건씩)
  const handleExcelUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';
    try {
      setUploading(true);
      const rows = await parseExcel(file);
      if (rows.length === 0) { showToast('엑셀에 데이터가 없습니다', 'error'); return; }
      const auditStamp = audit.create();
      const newProducts = [];
      let batch = db.batch();
      let batchCount = 0;
      let total = 0;

      for (const row of rows) {
        const data = excelRowToProduct(row);
        if (!data.name) continue;
        Object.assign(data, auditStamp);
        const ref = db.collection(COLLECTIONS.PRODUCTS).doc();
        batch.set(ref, data);
        newProducts.push({ id: ref.id, ...data });
        batchCount++;
        total++;

        if (batchCount >= 450) {
          await batch.commit();
          console.log(`[excel] batch commit: ${total}건`);
          batch = db.batch();
          batchCount = 0;
        }
      }
      if (batchCount > 0) await batch.commit();

      setProducts(prev => [...newProducts, ...prev]);
      console.log(`[excel] ${total}건 등록 완료`);
      showToast(`${total}건 일괄 등록 완료`);
    } catch (err) {
      console.error('[excel] 업로드 실패:', err);
      showToast('엑셀 처리 실패: ' + err.message, 'error');
    } finally {
      setUploading(false);
    }
  };

  // 엑셀 템플릿 다운로드
  const downloadTemplate = () => {
    const header = ['상품명', '카테고리', '브랜드', '소비자가', '판매가', '옵션', '설명', '썸네일',
      ...CHANNELS.map(ch => ch.label)];
    const sample = ['POUR 우레탄 방수 키트', '셀프방수킷', 'store', '35000', '29800',
      '소형(5kg), 대형(10kg)', '옥상 셀프 방수용', '',
      '', '', '', '', '', '', '', ''];
    const ws = XLSX.utils.aoa_to_sheet([header, sample]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '상품');
    XLSX.writeFile(wb, '상품등록_템플릿.xlsx');
  };

  // 상세 이미지 업로드 (Firebase Storage)
  const handleDetailImageUpload = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    e.target.value = '';
    setUploading(true);
    try {
      const productId = editingId === 'new' ? 'temp_' + Date.now() : editingId;
      const newImages = [...(form.detailImages || [])];
      for (let i = 0; i < files.length; i++) {
        const idx = newImages.length + 1;
        const path = `product-details/${productId}/detail-${idx}-${Date.now()}.jpg`;
        const url = await uploadToStorage(path, files[i]);
        newImages.push({ url, path, order: idx });
      }
      setForm({ ...form, detailImages: newImages });
      showToast(`${files.length}장 업로드 완료`);
    } catch (err) {
      console.error('[detail-img] 업로드 실패:', err);
      showToast('이미지 업로드 실패: ' + err.message, 'error');
    } finally {
      setUploading(false);
    }
  };

  // 상세 이미지 삭제
  const removeDetailImage = (idx) => {
    setForm({ ...form, detailImages: form.detailImages.filter((_, i) => i !== idx) });
  };

  // 상세 이미지 → HTML 자동 생성
  const generateHtmlFromImages = () => {
    if (!form.detailImages?.length) { showToast('업로드된 이미지가 없습니다', 'error'); return; }
    const html = form.detailImages
      .map(img => `<img src="${img.url}" style="width:100%;display:block;" alt="${form.name || '상품 상세'}">`)
      .join('\n');
    setForm({ ...form, detailHtml: html });
    setDetailTab('html');
    showToast('HTML 코드가 생성되었습니다');
  };

  // HTML 코드 클립보드 복사
  const copyHtml = () => {
    if (!form.detailHtml) { showToast('복사할 코드가 없습니다', 'error'); return; }
    navigator.clipboard.writeText(form.detailHtml).then(() => showToast('코드가 클립보드에 복사되었습니다'));
  };

  // 비주얼 에디터: 서식 명령
  const execCmd = (cmd, val) => { document.execCommand(cmd, false, val); editorRef.current?.focus(); };

  // 비주얼 에디터: 이미지 삽입 (Storage 업로드)
  const insertVisualImage = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    e.target.value = '';
    setUploading(true);
    try {
      const productId = editingId === 'new' ? 'temp_' + Date.now() : editingId;
      for (const file of files) {
        const path = `product-details/${productId}/visual-${Date.now()}.jpg`;
        const url = await uploadToStorage(path, file);
        execCmd('insertHTML', `<img src="${url}" style="width:100%;display:block;margin:8px 0;" alt="상품 이미지">`);
      }
      showToast(`${files.length}장 삽입 완료`);
    } catch (err) {
      console.error('[visual-editor] 이미지 삽입 실패:', err);
      showToast('이미지 삽입 실패', 'error');
    } finally {
      setUploading(false);
    }
  };

  // 비주얼 에디터 → HTML 반영하기
  const applyVisualToHtml = () => {
    if (!editorRef.current) return;
    const html = editorRef.current.innerHTML;
    setForm({ ...form, detailHtml: html });
    showToast('상세페이지가 반영되었습니다');
  };

  // HTML → 비주얼 에디터에 로드
  const loadHtmlToVisual = () => {
    if (editorRef.current && form.detailHtml) {
      editorRef.current.innerHTML = form.detailHtml;
    }
  };

  // 신규 등록
  const startNew = () => {
    setForm(emptyForm());
    setEditingId('new');
  };

  // 수정
  const startEdit = (product) => {
    setForm({
      name: product.name || '',
      category: product.category || '',
      brand: product.brand || 'store',
      thumbnail: product.thumbnail || '',
      price: product.price || '',
      salePrice: product.salePrice || '',
      options: product.options || '',
      description: product.description || '',
      channels: CHANNELS.reduce((acc, ch) => {
        acc[ch.key] = product.channels?.[ch.key] || '';
        return acc;
      }, {}),
      detailImages: product.detailImages || [],
      detailHtml: product.detailHtml || '',
      tags: product.tags || [],
      isActive: product.isActive !== false,
    });
    setEditingId(product.id);
  };

  // 빠른 상태 변경 (목록에서 직접)
  const quickStatusChange = async (productId, newStatus) => {
    try {
      const auditStamp = audit.update();
      await db.collection(COLLECTIONS.PRODUCTS).doc(productId).update({ salesStatus: newStatus, ...auditStamp });
      setProducts(prev => prev.map(p => p.id === productId ? { ...p, salesStatus: newStatus, ...auditStamp } : p));
      showToast(`${STATUS_ICON[newStatus]} ${newStatus}(으)로 변경됨`);
    } catch (e) {
      console.error('[products] 상태변경 실패:', e);
      showToast('상태 변경 실패', 'error');
    }
  };

  // 벌크 액션
  const bulkAction = async (action, value) => {
    if (selected.size === 0) return;
    const ids = Array.from(selected);
    try {
      const batch = db.batch();
      const auditStamp = audit.update();
      ids.forEach(id => {
        const ref = db.collection(COLLECTIONS.PRODUCTS).doc(id);
        if (action === 'status') batch.update(ref, { salesStatus: value, ...auditStamp });
        if (action === 'delete') batch.delete(ref);
      });
      await batch.commit();
      if (action === 'delete') {
        setProducts(prev => prev.filter(p => !selected.has(p.id)));
      } else {
        setProducts(prev => prev.map(p => selected.has(p.id) ? { ...p, salesStatus: value } : p));
      }
      setSelected(new Set());
      showToast(`${ids.length}건 처리 완료`);
    } catch (e) {
      console.error('[products] 벌크 실패:', e);
      showToast('처리 실패', 'error');
    }
  };

  // 채널 링크 (imwebUrl 지원)
  const getChannelLink = (product, chKey) => {
    const val = product.channels?.[chKey];
    if (!val) return null;
    const ch = CHANNELS.find(c => c.key === chKey);
    if (ch?.urlTpl) return ch.urlTpl(val);
    if (chKey === 'imweb' && product.imwebUrl) return product.imwebUrl;
    return null;
  };

  // 프록시 등록 상태 토글
  const toggleProxyRegistered = async (productId, chKey) => {
    const product = products.find(p => p.id === productId);
    const registered = product?.proxyRegistered || {};
    const newVal = !registered[chKey];
    const updated = { ...registered, [chKey]: newVal };
    try {
      const auditStamp = audit.update();
      await db.collection(COLLECTIONS.PRODUCTS).doc(productId).update({ proxyRegistered: updated, ...auditStamp });
      setProducts(prev => prev.map(p => p.id === productId ? { ...p, proxyRegistered: updated, ...auditStamp } : p));
      showToast(newVal ? '프록시 등록 완료 표시' : '미등록으로 변경');
    } catch (e) {
      console.error('[proxy] 상태변경 실패:', e);
      showToast('상태 변경 실패', 'error');
    }
  };

  // 수정 후 경과 시간 표시
  const getTimeSince = (isoStr) => {
    if (!isoStr) return '';
    const diff = Date.now() - new Date(isoStr).getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return `${min}분 전`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}시간 전`;
    const day = Math.floor(hr / 24);
    return `${day}일 전`;
  };

  // 프록시 반영 상태 계산
  const getProxyStatus = (product, chKey) => {
    if (!product.channels?.[chKey]) return 'none'; // 채널 미연결
    if (!product.proxyRegistered?.[chKey]) return 'unregistered'; // 프록시 미등록
    if (!product.updatedAt) return 'synced';
    const diff = Date.now() - new Date(product.updatedAt).getTime();
    if (diff < 600000) return 'syncing'; // 10분 이내 → 반영 중
    return 'synced'; // 1시간 이후 → 반영 완료
  };

  // 변경이력 state
  const [historyOpen, setHistoryOpen] = useState(false);
  const [historyList, setHistoryList] = useState([]);
  const [historyLoading, setHistoryLoading] = useState(false);

  // 변경이력 로드 (30일 이내)
  const loadHistory = async (productId) => {
    setHistoryLoading(true);
    try {
      const cutoff = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
      const snap = await db.collection(COLLECTIONS.PRODUCTS).doc(productId).collection('history').get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(h => h.changedAt >= cutoff)
        .sort((a, b) => (b.changedAt || '').localeCompare(a.changedAt || ''));
      console.log(`[history] ${productId}: ${docs.length}건 (30일 이내)`);
      setHistoryList(docs);
    } catch (e) {
      console.error('[history] 로드 실패:', e);
      showToast('변경이력 로드 실패', 'error');
    } finally {
      setHistoryLoading(false);
    }
  };

  // 히스토리에서 복원
  const restoreFromHistory = async (snapshot) => {
    if (!editingId || editingId === 'new') return;
    try {
      const { id, changedAt, changedBy, changedFields, ...restoreData } = snapshot;
      const auditStamp = audit.update();
      await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).update({
        ...restoreData.snapshot,
        ...auditStamp,
      });
      setProducts(prev => prev.map(p => p.id === editingId ? { ...p, ...restoreData.snapshot, ...auditStamp } : p));
      startEdit({ id: editingId, ...restoreData.snapshot });
      setHistoryOpen(false);
      showToast('이전 버전으로 복원되었습니다');
    } catch (e) {
      console.error('[history] 복원 실패:', e);
      showToast('복원 실패', 'error');
    }
  };

  // 저장 (히스토리 기록 포함)
  const handleSave = async () => {
    if (!form.name.trim()) { showToast('상품명을 입력하세요', 'error'); return; }
    setSaving(true);
    try {
      const isNew = editingId === 'new';
      const auditStamp = isNew ? audit.create() : audit.update();
      const data = {
        ...form,
        price: form.price ? Number(form.price) : 0,
        salePrice: form.salePrice ? Number(form.salePrice) : 0,
        ...auditStamp,
      };
      const now = auditStamp.updatedAt;
      if (isNew) {
        const ref = await db.collection(COLLECTIONS.PRODUCTS).add(data);
        console.log(`[products] 신규 저장: ${ref.id}`);
        setProducts(prev => [{ id: ref.id, ...data }, ...prev]);
        showToast('상품이 등록되었습니다');
      } else {
        // 저장 전: 이전 데이터를 히스토리에 기록
        const oldProduct = products.find(p => p.id === editingId);
        if (oldProduct) {
          const changedFields = Object.keys(data).filter(k => JSON.stringify(data[k]) !== JSON.stringify(oldProduct[k]));
          if (changedFields.length > 0) {
            const { id: _skipId, ...rawSnapshot } = oldProduct;
            // Firestore는 undefined 값을 허용하지 않으므로 재귀적으로 제거
            const cleanObj = (obj) => {
              if (obj === null || obj === undefined) return null;
              if (Array.isArray(obj)) return obj.map(cleanObj);
              if (typeof obj === 'object') {
                const cleaned = {};
                for (const [k, v] of Object.entries(obj)) {
                  if (v !== undefined) cleaned[k] = cleanObj(v);
                }
                return cleaned;
              }
              return obj;
            };
            const snapshotData = cleanObj(rawSnapshot);
            await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).collection('history').add({
              snapshot: snapshotData,
              changedFields,
              changedAt: now,
              changedByStaffId: auditStamp.updatedByStaffId,
              changedByStaffName: auditStamp.updatedByStaffName || '관리자',
            });
            console.log(`[history] 변경 기록: ${changedFields.join(', ')}`);
          }
        }
        await db.collection(COLLECTIONS.PRODUCTS).doc(editingId).update(data);
        console.log(`[products] 수정 완료: ${editingId}`);
        setProducts(prev => prev.map(p => p.id === editingId ? { ...p, ...data } : p));
        showToast('상품이 수정되었습니다');
      }
      setEditingId(null);
      setForm(null);
    } catch (e) {
      console.error('[products] 저장 실패:', e);
      showToast('저장 실패: ' + e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  // 삭제
  const handleDelete = async (id) => {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    try {
      await db.collection(COLLECTIONS.PRODUCTS).doc(id).delete();
      setProducts(prev => prev.filter(p => p.id !== id));
      showToast('삭제 완료');
      if (editingId === id) { setEditingId(null); setForm(null); }
    } catch (e) {
      console.error('[products] 삭제 실패:', e);
      showToast('삭제 실패', 'error');
    }
  };

  // 필터
  const filtered = useMemo(() => {
    let list = products;
    if (statusFilter !== '전체') {
      list = list.filter(p => (p.salesStatus || '판매중') === statusFilter);
    }
    if (tagFilter) {
      list = list.filter(p => p.tags?.includes(tagFilter));
    }
    if (categoryFilter) {
      list = list.filter(p => (p.category || '') === categoryFilter);
    }
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q) ||
        (p.imwebId || '').includes(q)
      );
    }
    return list;
  }, [products, search, statusFilter, tagFilter, categoryFilter]);

  // 채널 연결 수 계산
  const countChannels = (p) => CHANNELS.filter(ch => p.channels?.[ch.key]).length;

  // ─── 편집 폼 화면 ───
  if (form && editingId) {
    const inputStyle = {
      width: '100%', padding: '10px 12px', fontSize: 13, border: '1px solid var(--border)',
      borderRadius: 8, outline: 'none', fontFamily: 'inherit',
    };
    const labelStyle = { fontSize: 12, fontWeight: 600, color: 'var(--text-md)', marginBottom: 4, display: 'block' };

    return (
      <div style={{ animation: 'fadeIn .3s ease', maxWidth: 900 }}>
        {/* 상단 */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <button onClick={() => { setEditingId(null); setForm(null); }}
            style={{ background: 'none', border: 'none', fontSize: 14, color: 'var(--accent)', cursor: 'pointer', fontWeight: 600 }}>
            ← 목록으로
          </button>
          <div style={{ display: 'flex', gap: 8 }}>
            {editingId !== 'new' && (
              <button onClick={() => { setHistoryOpen(true); loadHistory(editingId); }}
                style={{ padding: '10px 18px', fontSize: 14, fontWeight: 600, background: '#fff', color: 'var(--text-md)', border: '1px solid var(--border)', borderRadius: 8, cursor: 'pointer' }}>
                📋 변경이력
              </button>
            )}
            {editingId !== 'new' && (
              <button onClick={() => setConfirmModal({ message: '이 상품을 삭제하시겠습니까?', onConfirm: () => { handleDelete(editingId); setConfirmModal(null); } })}
                style={{ padding: '10px 18px', fontSize: 14, fontWeight: 600, background: '#FEE2E2', color: 'var(--red)', border: 'none', borderRadius: 8, cursor: 'pointer' }}>
                삭제
              </button>
            )}
            <button onClick={handleSave} disabled={saving}
              style={{ padding: '10px 24px', fontSize: 15, fontWeight: 700, background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer', opacity: saving ? 0.6 : 1 }}>
              {saving ? '저장 중...' : '💾 저장하기'}
            </button>
          </div>
        </div>

        {/* 기본 정보 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)', marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 16 }}>기본 정보</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div style={{ gridColumn: '1 / -1' }}>
              <label style={labelStyle}>상품명 *</label>
              <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="예: POUR 우레탄 방수 키트" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>카테고리</label>
              <div style={{ display: 'flex', gap: 6 }}>
                <select value={categories.includes(form.category) ? form.category : '__custom__'}

              <label style={labelStyle}>태그</label>

                  const active = form.tags?.includes(t.key);
                  return (
                    <button key={t.key} onClick={() => {
                      const tags = form.tags || [];
                      setForm({ ...form, tags: active ? tags.filter(k => k !== t.key) : [...tags, t.key] });
                    }} style={{
                      padding: '8px 16px', fontSize: 14, fontWeight: active ? 700 : 500,
                      background: active ? t.bg : '#F9FAFB', color: active ? t.color : 'var(--text-sm)',

            const baseUrl = `${window.location.origin}/api/product-img?id=${editingId}`;
            const htmlImgCount = (form.detailHtml || '').match(/<img[^>]+src=/gi)?.length || 0;
            const allSlotCode = Array.from({ length: slotCount }, (_, idx) =>

            return (
              <div style={{
                padding: '14px 18px', marginBottom: 14, background: '#ECFDF5', borderRadius: 10,

                <button onClick={() => execCmd('underline')} title="밑줄" style={{ padding: '6px 12px', fontSize: 14, textDecoration: 'underline', background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>U</button>
                <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
                <button onClick={() => execCmd('fontSize', 3)} title="작게" style={{ padding: '6px 10px', fontSize: 12, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>소</button>

                <button onClick={() => execCmd('justifyRight')} title="오른쪽 정렬" style={{ padding: '6px 10px', fontSize: 14, background: '#fff', border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }}>◨</button>

                  width: '100%', padding: 12, fontSize: 12, fontFamily: 'monospace',

                    borderRadius: 8, cursor: 'pointer'

                <button onClick={() => setDetailTab('preview')}

                    padding: '10px 16px', fontSize: 13, fontWeight: 600,

                  미리보기

              </div>
            </div>

          {detailTab === 'preview' && (
            <div>
              {form.detailHtml ? (
                <div style={{
                  border: '1px solid var(--border)', borderRadius: 8, padding: 16,
                  maxWidth: 860, margin: '0 auto', background: '#fff'

              ) : (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sm)', fontSize: 13 }}>
                  HTML 코드가 없습니다. 이미지를 업로드하고 HTML을 생성하거나 직접 입력하세요.
                </div>
              )}
            </div>
          )}
        </div>

        {/* 채널별 상품번호 */}
        <div style={{ background: '#fff', borderRadius: 12, padding: 24, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>판매채널 상품번호</div>

            각 채널의 상품번호를 입력하면 해당 채널 상품 페이지로 바로 이동할 수 있습니다
          </div>

              const link = val && ch.urlTpl ? ch.urlTpl(val) : null;
              return (
                <div key={ch.key} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px',
                  background: val ? 'var(--accent-l)' : 'var(--border-s)', borderRadius: 10,
                  border: `1px solid ${val ? 'var(--blue-m)' : 'var(--border)'}`,
                  transition: 'all .15s ease'
                }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: '50%',
                    background: val ? ch.color : '#D1D5DB', flexShrink: 0
                  }} />
                  <div style={{ width: 110, fontSize: 13, fontWeight: 600, color: 'var(--text)', flexShrink: 0 }}>
                    {ch.label}
                  </div>
                  <input
                    value={val}
                    onChange={e => setForm({ ...form, channels: { ...form.channels, [ch.key]: e.target.value } })}
                    placeholder="상품번호 입력"
                    style={{
                      flex: 1, padding: '8px 10px', fontSize: 13, border: '1px solid var(--border)',
                      borderRadius: 6, outline: 'none', fontFamily: 'monospace', background: '#fff'
                    }}
                  />
                  {link && (
                    <a href={link} target="_blank" rel="noopener"
                      style={{ fontSize: 11, color: 'var(--accent)', textDecoration: 'none', fontWeight: 600, whiteSpace: 'nowrap' }}>
                      링크 →
                    </a>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ─── 상품 목록 ───
  const allSelected = filtered.length > 0 && filtered.every(p => selected.has(p.id));
  const toggleAll = () => {
    if (allSelected) setSelected(new Set());
    else setSelected(new Set(filtered.map(p => p.id)));
  };
  const toggleOne = (id) => {
    const s = new Set(selected);
    s.has(id) ? s.delete(id) : s.add(id);
    setSelected(s);
  };

  return (
    <div style={{ padding:'24px 32px', animation: 'fadeIn .3s ease' }}>
      {/* 페이지 헤더 */}
      <div style={{ marginBottom:22 }}>
        <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>📦 상품관리</h1>
        <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>POUR스토어 자사몰·8개 판매채널 상품 마스터. 카테고리·태그·판매상태 관리.</div>
      </div>
      {/* 상태 필터 */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
        {SALES_STATUS.map(s => {
          const cnt = s === '전체' ? products.length : products.filter(p => (p.salesStatus || '판매중') === s).length;
          const icon = STATUS_ICON[s] || '';
          return (
            <button key={s} onClick={() => { setStatusFilter(s); setSelected(new Set()); setVisibleCount(30); }} style={{
              padding: '10px 20px', fontSize: 14, fontWeight: statusFilter === s ? 700 : 500,
              background: statusFilter === s ? (s === '판매중' ? 'var(--green)' : s === '품절' ? 'var(--red)' : s === '숨김' ? 'var(--text-sm)' : 'var(--accent)') : '#fff',
              color: statusFilter === s ? '#fff' : 'var(--text-md)',
              border: statusFilter === s ? 'none' : '1px solid var(--border)',
              borderRadius: 24, cursor: 'pointer', minHeight: 42,
            }}>
              {icon} {s} ({cnt})
            </button>
          );
        })}
      </div>

      {/* 태그 필터 */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap' }}>
        {tagFilter && (
          <button onClick={() => setTagFilter(null)} style={{
            padding: '5px 12px', fontSize: 12, fontWeight: 600,
            background: 'var(--red)', color: '#fff', border: 'none',
            borderRadius: 16, cursor: 'pointer'
          }}>✕ 태그 해제</button>
        )}
        {PRODUCT_TAGS.map(t => (
          <button key={t.key} onClick={() => setTagFilter(tagFilter === t.key ? null : t.key)} style={{
            padding: '5px 14px', fontSize: 12, fontWeight: tagFilter === t.key ? 700 : 500,
            background: tagFilter === t.key ? t.bg : '#fff',
            color: tagFilter === t.key ? t.color : 'var(--text-sm)',
            border: `1px solid ${tagFilter === t.key ? t.color : 'var(--border)'}`,
            borderRadius: 16, cursor: 'pointer'
          }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* 카테고리 필터 */}
      {categories.length > 0 && (
        <div style={{ display: 'flex', gap: 4, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-sm)', marginRight: 4 }}>카테고리:</span>
          {categoryFilter && (
            <button onClick={() => setCategoryFilter(null)} style={{
              padding: '5px 12px', fontSize: 12, fontWeight: 600,
              background: 'var(--red)', color: '#fff', border: 'none',
              borderRadius: 16, cursor: 'pointer'
            }}>✕ 해제</button>
          )}
          {categories.map(c => (
            <button key={c} onClick={() => setCategoryFilter(categoryFilter === c ? null : c)} style={{
              padding: '5px 14px', fontSize: 12, fontWeight: categoryFilter === c ? 700 : 500,
              background: categoryFilter === c ? 'var(--accent)' : '#fff',
              color: categoryFilter === c ? '#fff' : 'var(--text-md)',
              border: `1px solid ${categoryFilter === c ? 'var(--accent)' : 'var(--border)'}`,
              borderRadius: 16, cursor: 'pointer'
            }}>
              {c}
            </button>
          ))}
          <button onClick={() => setShowCategoryManager(true)} style={{
            padding: '5px 12px', fontSize: 11, fontWeight: 600,
            background: 'none', color: 'var(--text-sm)', border: '1px dashed var(--border)',
            borderRadius: 16, cursor: 'pointer'
          }}>+ 관리</button>
        </div>
      )}

      {/* 벌크 액션바 */}
      {selected.size > 0 && (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', marginBottom: 12,
          background: 'var(--accent-l)', borderRadius: 10, border: '1px solid var(--blue-m)',
          flexWrap: 'wrap'
        }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--accent)' }}>
            {selected.size}건 선택됨
          </span>
          <button onClick={() => bulkAction('status', '판매중')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>🟢 판매중</button>
          <button onClick={() => bulkAction('status', '품절')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--red)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>🔴 품절</button>
          <button onClick={() => bulkAction('status', '숨김')} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: 'var(--text-sm)', color: '#fff', border: 'none', borderRadius: 8, cursor: 'pointer' }}>⬜ 숨김</button>
          <button onClick={() => setConfirmModal({ message: `선택한 ${selected.size}건을 삭제하시겠습니까?`, onConfirm: () => { bulkAction('delete'); setConfirmModal(null); } })}
            style={{ padding: '8px 16px', fontSize: 13, fontWeight: 600, background: '#FEE2E2', color: 'var(--red)', border: 'none', borderRadius: 8, cursor: 'pointer', marginLeft: 'auto' }}>삭제</button>
          <button onClick={() => setSelected(new Set())} style={{ padding: '8px 12px', fontSize: 13, background: 'none', border: 'none', color: 'var(--text-sm)', cursor: 'pointer' }}>취소</button>
        </div>
      )}

      {/* 상단 액션바 */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="상품명 / 아임웹ID 검색..."
            style={{
              padding: '11px 16px', fontSize: 14, border: '1px solid var(--border)',
              borderRadius: 8, outline: 'none', width: 260
            }}
          />
          <span style={{ fontSize: 13, color: 'var(--text-sm)', fontWeight: 600 }}>{filtered.length}건</span>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={downloadTemplate} style={{
            padding: '10px 16px', fontSize: 13, fontWeight: 600,
            background: '#fff', color: 'var(--text-md)', border: '1px solid var(--border)',
            borderRadius: 8, cursor: 'pointer'
          }}>
            엑셀 템플릿
          </button>
          <input ref={excelRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleExcelUpload} style={{ display: 'none' }} />
          <button onClick={() => excelRef.current?.click()} disabled={uploading} style={{
            padding: '10px 16px', fontSize: 13, fontWeight: 600,
            background: 'var(--green-l)', color: 'var(--green)', border: 'none',
            borderRadius: 8, cursor: 'pointer', opacity: uploading ? 0.6 : 1
          }}>
            {uploading ? '처리 중...' : '엑셀 일괄등록'}
          </button>
          <button onClick={startNew} style={{
            padding: '10px 20px', fontSize: 13, fontWeight: 900,
            background: 'linear-gradient(135deg, var(--or), var(--or-d))', color: '#fff',
            borderRadius: 10, cursor: 'pointer', boxShadow:'0 4px 12px rgba(249,115,22,.25)'
          }}>

          </button>
        </div>
      </div>

      {/* 로딩 */}
      {loading && (
        <div style={{ textAlign: 'center', padding: 60, color: 'var(--text-sm)' }}>
          <div style={{ width: 28, height: 28, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 12px' }} />
          <div style={{ fontSize: 14 }}>상품을 불러오는 중...</div>
        </div>

      {/* 빈 상태 */}
      {!loading && filtered.length === 0 && (
        <div style={{ textAlign: 'center', padding: 80, color: 'var(--text-sm)' }}>

          </div>
          <div style={{ fontSize: 14 }}>상품을 등록하고 채널별 상품번호를 연결하세요</div>
        </div>
      )}

      {/* 전체 선택 */}
      {!loading && filtered.length > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, paddingLeft: 4 }}>
          <input type="checkbox" checked={allSelected} onChange={toggleAll} style={{ width: 18, height: 18, cursor: 'pointer' }} />

          const isExpanded = expandedChannel === p.id;
          const isChecked = selected.has(p.id);

            <div key={p.id} style={{
              background: '#fff', borderRadius: 12, boxShadow: 'var(--shadow)',

              <div style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: '16px 18px', cursor: 'pointer'

                <input type="checkbox" checked={isChecked} onChange={e => { e.stopPropagation(); toggleOne(p.id); }}

                  width: 52, height: 52, borderRadius: 8, background: '#F3F4F6',
                  flexShrink: 0, overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center'

                  {p.thumbnail

                </div>

                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 15, fontWeight: 700, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {p.name}
                    </span>

                      <span style={{ fontSize: 10, fontWeight: 600, padding: '2px 6px', background: '#EDE9FE', color: '#6D28D9', borderRadius: 4 }}>#{p.imwebId}</span>

                    {p.salePrice ? Number(p.salePrice).toLocaleString() + '원' : '-'}

                  </div>
                  {/* 태그 */}
                  {p.tags?.length > 0 && (
                    <div style={{ display: 'flex', gap: 4, marginTop: 4, flexWrap: 'wrap' }}>
                      {p.tags.map(tk => {
                        const t = getTag(tk);
                        return t ? (
                          <span key={tk} style={{ fontSize: 10, fontWeight: 600, padding: '2px 8px', background: t.bg, color: t.color, borderRadius: 10 }}>

                          </span>

                      })}
                    </div>
                  )}
                </div>
                {/* 빠른 상태 변경 */}
                <select value={p.salesStatus || '판매중'} onChange={e => { e.stopPropagation(); quickStatusChange(p.id, e.target.value); }}
                  onClick={e => e.stopPropagation()}

                    padding: '8px 10px', fontSize: 13, fontWeight: 600, borderRadius: 8, cursor: 'pointer', flexShrink: 0,
                    border: '1px solid var(--border)', outline: 'none',
                    background: p.salesStatus === '판매중' ? '#ECFDF5' : p.salesStatus === '품절' ? '#FEE2E2' : '#F3F4F6',
                    color: p.salesStatus === '판매중' ? 'var(--green)' : p.salesStatus === '품절' ? 'var(--red)' : 'var(--text-sm)',
                  }}>
                  <option value="판매중">🟢 판매중</option>
                  <option value="품절">🔴 품절</option>
                  <option value="숨김">⬜ 숨김</option>
                </select>
                {/* 채널 연결 뱃지 */}
                <div style={{
                  padding: '6px 12px', borderRadius: 20, fontSize: 12, fontWeight: 700, flexShrink: 0,
                  background: chCount > 0 ? 'var(--green-l)' : '#F3F4F6',
                  color: chCount > 0 ? 'var(--green)' : 'var(--text-sm)'
                }}>
                  {chCount > 0 ? `${chCount}개 채널` : '미연결'}
                </div>
                <span style={{ fontSize: 14, color: 'var(--text-sm)', transition: 'transform .2s', transform: isExpanded ? 'rotate(180deg)' : 'rotate(0)' }}>▼</span>
                {/* 수정 버튼 */}
                <button onClick={e => { e.stopPropagation(); startEdit(p); }}
                  style={{
                    padding: '10px 20px', fontSize: 14, fontWeight: 700,
                    background: 'var(--accent)', color: '#fff', border: 'none',
                    borderRadius: 8, cursor: 'pointer', flexShrink: 0
                  }}>
                  수정하기
                </button>
              </div>

              {/* 채널 상세 (펼침) — 프록시 반영 상태 포함 */}
              {isExpanded && (
                <div style={{
                  padding: '0 18px 16px', borderTop: '1px solid var(--border-s)',
                  animation: 'fadeIn .2s ease'
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 0 8px' }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>판매채널 반영 상태</div>
                    {p.updatedAt && (
                      <span style={{ fontSize: 12, color: 'var(--text-sm)' }}>마지막 수정: {getTimeSince(p.updatedAt)}</span>
                    )}
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 8 }}>
                    {CHANNELS.map(ch => {
                      const val = p.channels?.[ch.key];
                      const link = getChannelLink(p, ch.key);
                      const status = getProxyStatus(p, ch.key);
                      const statusUI = {
                        none: { icon: '⚪', label: '미연결', color: '#D1D5DB', bg: '#F9FAFB' },
                        unregistered: { icon: '🔴', label: '프록시 미등록', color: 'var(--red)', bg: '#FEF2F2' },
                        syncing: { icon: '🔵', label: `반영 중 (~${Math.max(1, 10 - Math.floor((Date.now() - new Date(p.updatedAt).getTime()) / 60000))}분 후)`, color: 'var(--accent)', bg: 'var(--accent-l)' },
                        synced: { icon: '🟢', label: '자동반영 중', color: 'var(--green)', bg: '#ECFDF5' },
                      }[status];
                      return (
                        <div key={ch.key} style={{
                          display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
                          borderRadius: 10, fontSize: 13, background: statusUI.bg,
                          border: `1px solid ${val ? ch.color + '30' : 'var(--border-s)'}`,
                        }}>
                          <div style={{ width: 8, height: 8, borderRadius: '50%', background: val ? ch.color : '#D1D5DB', flexShrink: 0 }} />
                          <span style={{ fontWeight: 600, minWidth: 90 }}>{ch.label}</span>
                          {val ? (
                            <>
                              <span style={{ fontFamily: 'monospace', fontSize: 11 }}>{val}</span>
                              <span style={{ fontSize: 11, fontWeight: 700, color: statusUI.color, whiteSpace: 'nowrap' }}>
                                {statusUI.icon} {statusUI.label}
                              </span>
                              <div style={{ marginLeft: 'auto', display: 'flex', gap: 4 }}>
                                {status === 'unregistered' && (
                                  <button onClick={e => { e.stopPropagation(); toggleProxyRegistered(p.id, ch.key); }}
                                    style={{ padding: '4px 10px', fontSize: 11, fontWeight: 600, background: 'var(--green)', color: '#fff', border: 'none', borderRadius: 4, cursor: 'pointer' }}>
                                    등록 완료
                                  </button>
                                )}
                                {(status === 'syncing' || status === 'synced') && (
                                  <button onClick={e => { e.stopPropagation(); toggleProxyRegistered(p.id, ch.key); }}
                                    style={{ padding: '4px 8px', fontSize: 10, fontWeight: 500, background: 'none', color: 'var(--text-sm)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }}>
                                    해제
                                  </button>
                                )}
                                {link && (
                                  <button onClick={e => { e.stopPropagation(); window.open(link, '_blank'); }}
                                    style={{ padding: '4px 10px', fontSize: 11, fontWeight: 600, background: 'var(--accent-l)', color: 'var(--accent)', border: 'none', borderRadius: 4, cursor: 'pointer' }}>
                                    열기→
                                  </button>
                                )}
                              </div>
                            </>
                          ) : (
                            <span style={{ fontSize: 12, color: '#D1D5DB' }}>미연결</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* 더 보기 */}
      {filtered.length > visibleCount && (
        <button onClick={() => setVisibleCount(v => v + 30)}
          style={{
            width: '100%', padding: '16px 0', marginTop: 12, fontSize: 15, fontWeight: 700,
            background: '#fff', color: 'var(--accent)', border: '1px solid var(--border)',
            borderRadius: 10, cursor: 'pointer'
          }}>
          더 보기 ({visibleCount}/{filtered.length}건)
        </button>
      )}

      {/* 변경이력 모달 */}
      {historyOpen && (
        <div style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,.4)', zIndex: 9997,
          display: 'flex', justifyContent: 'flex-end', animation: 'fadeIn .2s ease'
        }} onClick={() => setHistoryOpen(false)}>
          <div onClick={e => e.stopPropagation()} style={{
            width: 420, maxWidth: '90vw', height: '100vh', background: '#fff',
            boxShadow: '-10px 0 30px rgba(0,0,0,.15)', overflowY: 'auto', padding: 24
          }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
              <div style={{ fontSize: 17, fontWeight: 800 }}>📋 변경이력 (최근 1개월)</div>
              <button onClick={() => setHistoryOpen(false)} style={{ background: 'none', border: 'none', fontSize: 20, cursor: 'pointer', color: 'var(--text-sm)' }}>✕</button>
            </div>
            {historyLoading && (
              <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sm)', fontSize: 14 }}>불러오는 중...</div>
            )}
            {!historyLoading && historyList.length === 0 && (
              <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-sm)', fontSize: 14 }}>변경이력이 없습니다</div>
            )}
            {historyList.map(h => (
              <div key={h.id} style={{
                padding: 16, marginBottom: 10, background: 'var(--bg)', borderRadius: 10,
                border: '1px solid var(--border-s)'
              }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 6 }}>
                  {h.changedAt ? new Date(h.changedAt).toLocaleString('ko') : '-'}
                </div>
                <div style={{ fontSize: 12, color: 'var(--text-md)', marginBottom: 8 }}>
                  변경: {(h.changedFields || []).map(f => {
                    const labels = { name: '상품명', salePrice: '판매가', price: '소비자가', salesStatus: '상태', detailHtml: '상세페이지', tags: '태그', options: '옵션', channels: '채널' };
                    return labels[f] || f;
                  }).join(', ')}
                </div>
                <button onClick={() => restoreFromHistory(h)}
                  style={{
                    padding: '8px 16px', fontSize: 13, fontWeight: 700,
                    background: 'var(--accent-l)', color: 'var(--accent)', border: 'none',
                    borderRadius: 6, cursor: 'pointer', width: '100%'
                  }}>
                  이 버전으로 복원
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
      {showCategoryManager && <CategoryManager categories={categories} onSave={saveCategories} onClose={() => setShowCategoryManager(false)} />}
      {confirmModal && <ConfirmModal message={confirmModal.message} onConfirm={confirmModal.onConfirm} onCancel={() => setConfirmModal(null)} isInfo={confirmModal.isInfo} />}
    </div>
  );
}
/* ══════════════════════════════════════════════════════════════
   공신력 수치 관리 — site-metrics/current
   ══════════════════════════════════════════════════════════════ */
const METRICS_FIELDS=[
  {key:'totalUnits',labelKey:'totalUnitsLabel',icon:'🏘',name:'시공 세대수',unit:'세대',placeholder:'2600000',labelPlaceholder:'260만 세대'},
  {key:'patents',labelKey:'patentsLabel',icon:'📜',name:'특허/인증',unit:'개',placeholder:'70',labelPlaceholder:'70여 개'},
  {key:'partners',labelKey:'partnersLabel',icon:'🤝',name:'파트너사',unit:'곳',placeholder:'250',labelPlaceholder:'250여 곳'},
  {key:'totalArea',labelKey:'totalAreaLabel',icon:'📐',name:'시공 면적',unit:'㎡',placeholder:'1500000',labelPlaceholder:'150만 ㎡'},
  {key:'products',labelKey:'productsLabel',icon:'📦',name:'제품 수',unit:'개',placeholder:'110',labelPlaceholder:'110여 개+'},
  {key:'cooperatives',labelKey:'cooperativesLabel',icon:'🏢',name:'협력사',unit:'곳',placeholder:'250',labelPlaceholder:'250여 곳'},
];

function MetricsPage({showToast}){
  const { audit } = useActiveStaffContext();
  const [form,setForm]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(null);
  const [lastUpdatedByName,setLastUpdatedByName]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{
        const doc=await db.collection(COLLECTIONS.SITE_METRICS).doc('current').get();
        const data=doc.exists?doc.data():{};
        const init={};
        METRICS_FIELDS.forEach(f=>{
          init[f.key]=data[f.key]!==undefined?String(data[f.key]):'';
          init[f.labelKey]=data[f.labelKey]||'';
        });
        setForm(init);
        if(data.updatedAt)setLastUpdated(data.updatedAt);
        if(data.updatedByStaffName)setLastUpdatedByName(data.updatedByStaffName);
      }catch(e){console.error('[site-metrics] 로드 실패:',e);showToast('데이터 로드 실패','error');}
      setLoading(false);
    })();
  },[]);

  const save=async()=>{
    if(!form)return;
    setSaving(true);
    try{
      const auditStamp = audit.update();
      const data={...auditStamp};
      METRICS_FIELDS.forEach(f=>{
        const v=parseInt(form[f.key],10);
        if(!isNaN(v))data[f.key]=v;
        data[f.labelKey]=form[f.labelKey]||'';
      });
      await db.collection(COLLECTIONS.SITE_METRICS).doc('current').set(data,{merge:true});
      setLastUpdated(data.updatedAt);
      setLastUpdatedByName(auditStamp.updatedByStaffName || null);
      showToast('공신력 수치 저장 완료 — 3개 사이트에 즉시 반영됩니다');
    }catch(e){console.error('[site-metrics] 저장 실패:',e);showToast('저장 실패','error');}
    setSaving(false);
  };

  if(loading)return <div style={{textAlign:'center',padding:80,color:'var(--text-sm)'}}>로딩 중...</div>;

  const inputStyle={width:'100%',padding:'10px 14px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:14,fontFamily:'inherit',outline:'none',boxSizing:'border-box'};

  return(
    <div style={{padding:'24px 32px',maxWidth:980,animation:'fadeIn .3s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,gap:16,flexWrap:'wrap'}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:900,color:'var(--navy)',letterSpacing:-0.6,marginBottom:4}}>📊 공신력 수치</h1>
          <div style={{fontSize:12.5,color:'var(--text-sm)',fontWeight:700}}>
            POUR솔루션 · POUR공법 · POUR스토어 3개 사이트에 실시간 반영됩니다
            {lastUpdated && <span style={{marginLeft:8,color:'var(--text-xs)',fontWeight:600}}>· 마지막 저장 {relativeTime(lastUpdated)}{lastUpdatedByName?` · ${lastUpdatedByName}`:''}</span>}
          </div>
        </div>
        <button onClick={save} disabled={saving} style={{padding:'12px 24px',borderRadius:10,fontSize:13,fontWeight:900,color:'#fff',background:saving?'var(--text-sm)':'linear-gradient(135deg, var(--or), var(--or-d))',boxShadow:'0 4px 12px rgba(249,115,22,.25)'}}>
          {saving?'저장 중...':'💾 저장하기'}
        </button>
      </div>

      {/* 안내 배너 — 오렌지 톤 */}
      <div style={{background:'var(--or-pale)',border:'1.5px solid var(--or-l)',borderRadius:12,padding:'12px 16px',marginBottom:20,display:'flex',gap:10,alignItems:'flex-start'}}>
        <span style={{fontSize:18,flexShrink:0}}>ℹ️</span>
        <div style={{fontSize:13,color:'var(--or-d)',lineHeight:1.6,fontWeight:600}}>
          <strong>표시 텍스트</strong>는 웹사이트에서 그대로 표시됩니다 (예: "260만 세대").<br/>
          <strong>실제 값</strong>은 내부 집계·API에 사용됩니다. 표시 텍스트만 변경해도 됩니다.
        </div>
      </div>

      {/* 수치 카드 그리드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
        {METRICS_FIELDS.map(f=>(
          <div key={f.key} style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'var(--shadow)',border:'1px solid var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
              <span style={{fontSize:24}}>{f.icon}</span>
              <div style={{fontSize:14,fontWeight:800,color:'var(--text)'}}>{f.name}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <label style={labelStyle}>실제 값 ({f.unit})</label>
                <input type="number" style={inputStyle}
                  value={form?.[f.key]||''} placeholder={f.placeholder}
                  onChange={e=>setForm(prev=>({...prev,[f.key]:e.target.value}))}/>
              </div>
              <div>
                <label style={labelStyle}>표시 텍스트</label>
                <input type="text" style={inputStyle}
                  value={form?.[f.labelKey]||''} placeholder={f.labelPlaceholder}
                  onChange={e=>setForm(prev=>({...prev,[f.labelKey]:e.target.value}))}/>
              </div>
            </div>
            {/* 미리보기 */}
            <div style={{marginTop:10,padding:'8px 12px',background:'var(--bg)',borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,color:'var(--text-sm)',fontWeight:600}}>미리보기</span>
              <span style={{fontSize:18,fontWeight:900,color:'var(--accent)'}}>
                {form?.[f.labelKey]||form?.[f.key]||'-'}
              </span>
              <span style={{fontSize:11,color:'var(--text-sm)'}}>{f.name}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 하단 저장 버튼 */}
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:20}}>
        <button onClick={save} disabled={saving}
          style={{padding:'12px 32px',borderRadius:10,fontSize:13,fontWeight:900,color:'#fff',background:saving?'var(--text-sm)':'linear-gradient(135deg, var(--or), var(--or-d))',boxShadow:'0 4px 12px rgba(249,115,22,.25)'}}>
          {saving?'저장 중...':'💾 공신력 수치 저장'}
        </button>
      </div>
    </div>
  );
}

  const saveAllToFirestore=async()=>{
    setSaving(true);
    try{
      const auditStamp = audit.update();
      const batch=db.batch();
      links.forEach(l=>{
        const ref=db.collection(COLLECTIONS.METHOD_LINKS).doc(l.id);
        batch.set(ref,{label:l.label,cat:l.cat,specUrl:l.specUrl||'',proposalUrl:l.proposalUrl||'',guideUrl:l.guideUrl||'',caseUrl:l.caseUrl||'',...auditStamp},{merge:true});
      });
      await batch.commit();
      setLinks(prev=>prev.map(l=>({...l,...auditStamp})));
      showToast(`${links.length}개 공법 링크가 모두 저장되었습니다`);
    }catch(e){console.error(e);showToast('일괄 저장 실패: '+e.message,'error');}
    setSaving(false);
  };

  const filtered=links.filter(l=>!search||l.label.includes(search)||l.cat.includes(search)||l.id.includes(search));
  const grouped={};
  filtered.forEach(l=>{if(!grouped[l.cat])grouped[l.cat]=[];grouped[l.cat].push(l);});

  if(loading)return <div style={{textAlign:'center',padding:60,color:'var(--text-sm)'}}>로딩 중...</div>;

  return(
    <div style={{padding:'24px 32px',maxWidth:1140}}>
      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,flexWrap:'wrap',gap:16}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:900,color:'var(--navy)',letterSpacing:-0.6,marginBottom:4}}>🔗 링크 관리</h1>
          <div style={{fontSize:12.5,color:'var(--text-sm)',fontWeight:700}}>공법별 제안서·시방서·시공가이드·시공사례 링크. 변경 시 태블릿 앱과 고객 문자에 자동 반영됩니다.</div>
        </div>
        <button onClick={saveAllToFirestore} disabled={saving} style={{
          padding:'12px 24px',borderRadius:10,fontSize:13,fontWeight:900,color:'#fff',
          background:saving?'var(--text-sm)':'linear-gradient(135deg, var(--or), var(--or-d))',
          boxShadow:'0 4px 12px rgba(249,115,22,.25)',cursor:saving?'wait':'pointer'
        }}>
          {saving?'저장 중...':'전체 일괄 저장'}
        </button>
      </div>

      {/* 검색 */}
      <div style={{marginBottom:16}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="공법명 또는 카테고리 검색..."
          style={{width:'100%',maxWidth:400,padding:'10px 14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:13,outline:'none'}}/>
      </div>

      {/* 카테고리별 그룹 */}
      {Object.entries(grouped).map(([cat,items])=>(
        <div key={cat} style={{marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{width:4,height:18,borderRadius:2,background:CAT_COLORS[cat]||'#6B7280'}}/>
            <span style={{fontSize:15,fontWeight:800,color:'var(--text)'}}>{cat}</span>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text-sm)',background:'var(--bg)',borderRadius:6,padding:'2px 8px'}}>{items.length}개</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {items.map(item=>(
              <div key={item.id} style={{background:'#fff',borderRadius:12,border:'1px solid var(--border)',overflow:'hidden'}}>
                {/* 공법 헤더 */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:editId===item.id?'1px solid var(--border)':'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <span style={{fontSize:9,fontWeight:800,color:CAT_COLORS[cat]||'#6B7280',background:(CAT_COLORS[cat]||'#6B7280')+'15',borderRadius:4,padding:'2px 6px'}}>{cat}</span>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{item.label}</span>
                    <span style={{fontSize:10,color:'var(--text-sm)'}}>({item.id})</span>
                    {item.updatedByStaffName && (
                      <span style={{fontSize:10,color:'var(--text-sm)',fontWeight:600}}>· {item.updatedByStaffName} {relativeTime(item.updatedAt)}</span>
                    )}
                  </div>
                  {editId===item.id?(
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={cancelEdit} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',fontSize:11,fontWeight:600,cursor:'pointer'}}>취소</button>
                      <button onClick={saveEdit} disabled={saving} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--accent)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer'}}>{saving?'저장중...':'저장'}</button>
                    </div>
                  ):(
                    <button onClick={()=>startEdit(item)} style={{padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',fontSize:11,fontWeight:600,cursor:'pointer',color:'var(--accent)'}}>수정</button>
                  )}
                </div>
                {/* 링크 필드들 */}
                {editId===item.id?(
                  <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
                    {LINK_FIELDS.map(f=>(
                      <div key={f.key}>

                          <span>{f.icon}</span>{f.label}
                        </label>
                        <input value={editForm[f.key]||''} onChange={e=>setEditForm(prev=>({...prev,[f.key]:e.target.value}))}

                          style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:12,outline:'none',fontFamily:'monospace'}}/>
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{padding:'8px 16px 12px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
                    {LINK_FIELDS.map(f=>{
                      const url=item[f.key];
                      const hasUrl=url&&url.trim();
                      return(
                        <div key={f.key} style={{padding:'8px 10px',borderRadius:8,background:hasUrl?f.color+'08':'#F9FAFB',border:`1px solid ${hasUrl?f.color+'25':'var(--border)'}`,minHeight:44}}>
                          <div style={{fontSize:9,fontWeight:700,color:hasUrl?f.color:'#9CA3AF',marginBottom:3,display:'flex',alignItems:'center',gap:4}}>
                            <span>{f.icon}</span>{f.label}
                          </div>
                          {hasUrl?(
                            <a href={url} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:f.color,wordBreak:'break-all',lineHeight:1.3,display:'block',maxHeight:32,overflow:'hidden',textOverflow:'ellipsis'}}>

                            </a>
                          ):(
                            <span style={{fontSize:10,color:'#D1D5DB'}}>미등록</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}
