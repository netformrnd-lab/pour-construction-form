function KpiForm({ onSubmit, onCancel }) {
  const [name, setName] = useState('');
  const [target, setTarget] = useState('');
  const [baseline, setBaseline] = useState('0');
  const [unit, setUnit] = useState('');
  const [source, setSource] = useState('manual');
  const inputSty = { width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:13, fontWeight:600, background:'#fff', outline:'none', marginTop:4 };
  const labelSty = { fontSize:11, fontWeight:800, color:'var(--text-md)', letterSpacing:.3 };
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div><label style={labelSty}>KPI 이름 *</label><input value={name} onChange={e => setName(e.target.value)} placeholder="월간 신규 거래처 수" style={inputSty} /></div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 100px', gap:10 }}>
        <div><label style={labelSty}>목표값</label><input type="number" value={target} onChange={e => setTarget(e.target.value)} placeholder="50" style={inputSty} /></div>
        <div><label style={labelSty}>기준값</label><input type="number" value={baseline} onChange={e => setBaseline(e.target.value)} placeholder="0" style={inputSty} /></div>
        <div><label style={labelSty}>단위</label><input value={unit} onChange={e => setUnit(e.target.value)} placeholder="건" style={inputSty} /></div>
      </div>
      <div>
        <label style={labelSty}>측정 방식</label>
        <select value={source} onChange={e => setSource(e.target.value)} style={inputSty}>
          <option value="manual">✏️ 수동 입력 (담당자가 KPI 카드에서 직접 수정)</option>
          <option value="auto-progress">🔁 자동 — 연결된 프로젝트 진척도 평균</option>
          <option value="auto">🔁 자동 — 외부 시스템(향후 연동)</option>
        </select>
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:8 }}>
        <button onClick={onCancel} style={{ padding:'9px 18px', borderRadius:8, fontSize:12, fontWeight:800, background:'var(--bg)', color:'var(--text-md)' }}>취소</button>
        <button disabled={!name.trim()} onClick={() => onSubmit({ name: name.trim(), target, baseline, unit, source })} style={{ padding:'9px 18px', borderRadius:8, fontSize:12, fontWeight:900, color:'#fff', background:'var(--or)', opacity: name.trim() ? 1 : 0.5 }}>추가</button>
      </div>
    </div>
  );
}

// ============================================================
// ProjectsPage — pour-projects CRUD + 다중 담당자 배정 + KR 연결
// 모든 담당자에게 보이며, 본인 배정 프로젝트는 강조 표시.
// ============================================================
// ============================================================
// ProjectActivityMetrics — 프로젝트별 활동지표(leading metric)
// 결과지표(매출)는 OKR/KR에, 활동지표(콜드콜·미팅·견적·콘텐츠 등 선행 행동량)는 프로젝트에 연결.
// pour-kpis 재사용: { kind:'activity', projectId, name, unit, target(주간), period:'weekly',
//                     source:'manual', current, history:[{week,value,at,by}] }
// ============================================================
function ProjectActivityMetrics({ project, kpis, activeStaff, audit, onToast }) {
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState('');
  const [unit, setUnit] = useState('건');
  const [target, setTarget] = useState('');
  const metrics = kpis.filter(k => k.kind === 'activity' && k.projectId === project.id);
  const wk = isoWeek(new Date());

  const weekVal = (m, week) => {
    const h = (m.history || []).find(x => x.week === week);
    return h ? Number(h.value) || 0 : 0;
  };
  const recentWeeks = (() => {
    const out = []; const base = new Date();
    for (let i = 3; i >= 0; i--) { const d = new Date(base); d.setDate(base.getDate() - i * 7); out.push(isoWeek(d)); }
    return out;
  })();

  const setWeekValue = async (m, value) => {
    const v = Number(value) || 0;
    const hist = [...(m.history || [])];
    const i = hist.findIndex(h => h.week === wk);
    const entry = { week: wk, value: v, at: nowIso(), by: activeStaff.id };
    if (i >= 0) hist[i] = entry; else hist.push(entry);
    try {
      await db.collection(COLLECTIONS.POUR_KPIS).doc(m.id).update({ history: hist, current: v, ...audit.update() });
    } catch (e) { onToast({ message: '활동지표 저장 실패: ' + e.message, type: 'error' }); }
  };
  const addMetric = async () => {
    if (!name.trim()) { onToast({ message: '활동지표명을 입력하세요', type: 'error' }); return; }
    try {
      await db.collection(COLLECTIONS.POUR_KPIS).add({
        kind: 'activity', projectId: project.id, keyResultId: null, staffId: activeStaff.id,
        name: name.trim(), unit: (unit || '건').trim(), target: Number(target) || 0,
        period: 'weekly', source: 'manual', current: 0, history: [], ...audit.create(),
      });
      setName(''); setTarget(''); setAdding(false);
      onToast({ message: '📈 활동지표 추가', type: 'success' });
    } catch (e) { onToast({ message: '추가 실패: ' + e.message, type: 'error' }); }
  };
  const delMetric = async (m) => {
    if (!confirm(`활동지표 "${m.name}"를 삭제할까요?`)) return;
    try { await db.collection(COLLECTIONS.POUR_KPIS).doc(m.id).delete(); }
    catch (e) { onToast({ message: '삭제 실패: ' + e.message, type: 'error' }); }
  };

  const lblSty = { fontSize:9, fontWeight:800, color:'var(--text-sm)', letterSpacing:.3 };
  return (
    <div style={{ borderTop:'1px dashed var(--border)', paddingTop:8, marginTop:2 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
        <span style={{ fontSize:10.5, fontWeight:900, color:'var(--text-md)' }}>📈 활동지표 <span style={{ fontWeight:700, color:'var(--text-sm)' }}>(선행 · 이번주 {wk.split('-W')[1]}주차)</span></span>
        <button onClick={() => setAdding(a => !a)} title="활동지표 추가" style={{ fontSize:10, fontWeight:800, color:'var(--or-d)', background:'var(--or-pale, #FFF7ED)', border:'1px solid var(--or-l, #FED7AA)', borderRadius:5, padding:'2px 7px', cursor:'pointer' }}>{adding ? '닫기' : '+ 추가'}</button>
      </div>

      {metrics.length === 0 && !adding && (
        <div style={{ fontSize:10, color:'var(--text-sm)', fontWeight:600, fontStyle:'italic', padding:'2px 0 4px' }}>
          매출을 만드는 선행 행동(콜드콜·미팅·견적·콘텐츠 등)을 [+ 추가]로 등록하고 매주 입력하세요.
        </div>
      )}

      {metrics.map(m => {
        const cur = weekVal(m, wk);
        const tgt = Number(m.target) || 0;
        const max = Math.max(1, ...recentWeeks.map(w => weekVal(m, w)), tgt);
        return (
          <div key={m.id} style={{ display:'flex', alignItems:'center', gap:7, padding:'4px 0' }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:11, fontWeight:800, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.name}</div>
              {/* 최근 4주 미니 막대 */}
              <div style={{ display:'flex', alignItems:'flex-end', gap:2, height:14, marginTop:2 }} title={recentWeeks.map(w => `${w.split('-W')[1]}주:${weekVal(m,w)}`).join(' · ')}>
                {recentWeeks.map(w => {
                  const v = weekVal(m, w);
                  return <div key={w} style={{ width:6, height:`${Math.max(2, Math.round((v / max) * 14))}px`, background: w === wk ? 'var(--or)' : 'var(--border)', borderRadius:1 }} />;
                })}
              </div>
            </div>
            <input type="number" defaultValue={cur} key={m.id + wk + cur}
              onBlur={e => { if (Number(e.target.value) !== cur) setWeekValue(m, e.target.value); }}
              onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
              title="이번 주 실적 입력 후 Enter"
              style={{ width:46, padding:'4px 5px', fontSize:12.5, fontWeight:900, color:'var(--or-d)', border:'1.5px solid var(--or)', borderRadius:5, outline:'none', textAlign:'right' }} />
            <span style={{ fontSize:9.5, fontWeight:700, color:'var(--text-sm)', whiteSpace:'nowrap' }}>/ {tgt}{m.unit || ''}</span>
            <button onClick={() => delMetric(m)} title="삭제" style={{ fontSize:11, color:'var(--text-sm)', background:'transparent', border:'none', cursor:'pointer' }}>×</button>
          </div>
        );
      })}

      {adding && (
        <div style={{ display:'flex', gap:4, marginTop:6, flexWrap:'wrap', alignItems:'center' }}>
          <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') addMetric(); }} placeholder="활동지표명 (예: 콜드콜 건수)" style={{ flex:'1 1 130px', minWidth:110, padding:'5px 7px', fontSize:11, fontWeight:600, border:'1px solid var(--border)', borderRadius:5, outline:'none' }} />
          <input value={target} onChange={e => setTarget(e.target.value)} type="number" placeholder="주간목표" style={{ width:64, padding:'5px 6px', fontSize:11, fontWeight:600, border:'1px solid var(--border)', borderRadius:5, outline:'none' }} />
          <input value={unit} onChange={e => setUnit(e.target.value)} placeholder="단위" style={{ width:44, padding:'5px 6px', fontSize:11, fontWeight:600, border:'1px solid var(--border)', borderRadius:5, outline:'none' }} />
          <button onClick={addMetric} disabled={!name.trim()} style={{ padding:'5px 11px', borderRadius:6, fontSize:11, fontWeight:900, color:'#fff', background: name.trim() ? 'var(--or)' : 'var(--text-sm)', border:'none', cursor: name.trim() ? 'pointer' : 'not-allowed' }}>추가</button>
        </div>
      )}
    </div>
  );
}

function ProjectsPage({ onToast }) {
  const { activeStaff, audit, staffMembers } = useActiveStaffContext();
  const { keyResults, kpis, projects, loading } = useAllOkrData();
  // ⚠️ 모든 useState/useEffect는 반드시 early return 위에 호출해야 함 (React #310 방지)
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);  // project object
  const [filterStaffId, setFilterStaffId] = useState('mine');  // mine|all|<staffId>
  const [filterStatus, setFilterStatus] = useState('open');    // open|all|done
  const [seeding, setSeeding] = useState(false);
  const [remapping, setRemapping] = useState(false);  // 본인 매핑 재계산 진행 중
  const [seedingExtras, setSeedingExtras] = useState(false);  // 활동지표·task 보충 진행 중
  // ⚠️ 모든 useState/useEffect는 반드시 early return 위에 (React Rules of Hooks · #310 방지)

  if (!activeStaff) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>활동 담당자 선택이 필요합니다.</div>;
  if (loading) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;

  // 🌱 workmgmt 55개 프로젝트를 pour-projects로 일괄 시드
  // 매핑:
  //   krKey ('KR1'|'KR2'|'KR3') → keyResults에서 동일 krKey인 KR의 id
  //   ownerKey ('songhee'|'minji'|'ran') → staff 컬렉션에서 kpiMemberId === ownerKey인 staff의 id
  // 매칭 실패한 경우: 그대로 null로 두고 사용자가 나중에 수동 배정
  const seedProjects = async () => {
    // 사전 점검
    const krByKey = {};
    keyResults.forEach(kr => { if (kr.krKey) krByKey[kr.krKey] = kr.id; });
    const missingKRs = ['KR1','KR2','KR3'].filter(k => !krByKey[k]);
    if (missingKRs.length > 0) {
      if (!confirm(
        `⚠️ 일부 Key Result가 등록되지 않았습니다: ${missingKRs.join(', ')}\n\n` +
        `해당 KR에 속한 프로젝트는 keyResultId 없이 등록됩니다.\n` +
        `먼저 OKR 페이지에서 [🌱 기본 OKR·KPI 일괄 등록]을 실행하면 KR이 자동 매핑됩니다.\n\n` +
        `이대로 진행할까요?`
      )) return;
    }

    const staffByKpi = {};
    staffMembers.forEach(s => { if (s.kpiMemberId) staffByKpi[s.kpiMemberId] = s; });
    const usedKpiKeys = new Set();
    WORKMGMT_PROJECTS_SEED.forEach(p => {
      if (p.ownerKey) usedKpiKeys.add(p.ownerKey);
      (p.collabKeys || []).forEach(k => usedKpiKeys.add(k));
    });
    const missingStaff = [...usedKpiKeys].filter(k => !staffByKpi[k]);
    if (missingStaff.length > 0) {
      if (!confirm(
        `⚠️ 일부 담당자가 어드민에 등록되지 않았거나 매칭 ID가 없습니다: ${missingStaff.join(', ')}\n\n` +
        `해당 owner/협업자는 빈 상태로 등록되며, 나중에 프로젝트 편집에서 직접 배정 가능합니다.\n` +
        `담당자 관리에서 각 담당자의 "업무관리 연동 *" 섹션에서 매칭 ID를 설정하면 자동 매핑됩니다.\n\n` +
        `이대로 진행할까요?`
      )) return;
    }

    if (!confirm(`기본 프로젝트 ${WORKMGMT_PROJECTS_SEED.length}건을 일괄 등록합니다.\n진행할까요?`)) return;

    setSeeding(true);
    try {
      const today = new Date().toISOString().split('T')[0];
      let added = 0;
      for (const p of WORKMGMT_PROJECTS_SEED) {
        const ownerStaff = p.ownerKey ? staffByKpi[p.ownerKey] : null;
        const collabStaff = (p.collabKeys || []).map(k => staffByKpi[k]).filter(Boolean);
        const assigneeStaffIds = [ownerStaff, ...collabStaff].filter(Boolean).map(s => s.id);
        await db.collection(COLLECTIONS.POUR_PROJECTS).add({
          name: p.name,
          description: p.group + (p.note ? ' · ' + p.note : ''),
          keyResultId: p.krKey ? (krByKey[p.krKey] || null) : null,
          krGroup: p.group,
          projectCode: p.code,
          priority: p.priority || 'mid',  // 🔴 high · 🟡 mid · 🟢 low — 슬롯 클릭 시 정렬 + 카드 칩
          assigneeStaffIds,
          ownerStaffId: ownerStaff?.id || null,
          ownerStaffName: ownerStaff?.name || null,
          status: 'active',
          progress: 0,
          dueDate: '',
          startDate: today,
          contribution: 0,
          ...audit.create(),
        });
        added++;
      }
      onToast({ message: `🌱 프로젝트 시드 완료 — ${added}건 등록 (priority 포함)`, type: 'success' });
    } catch (e) {
      onToast({ message: '시드 실패: ' + e.message, type: 'error' });
    }
    setSeeding(false);
  };

  // 🌱 활동지표·기본 task 일괄 보충 — 이미 등록된 프로젝트(projectCode 매칭)에 대해 KPI/task 추가
  // 중복 방지: 동일 이름 KPI/task가 있으면 스킵
  // (useState는 위로 이동 — early return 이후 호출 시 React #310 발생)
  const seedKpisAndTasks = async () => {
    if (!confirm(
      `프로젝트별 권장 활동지표(KPI) + 기본 task를 일괄 보충합니다.\n\n` +
      `· KPI: 각 프로젝트 1~2개 (이름·단위만, 목표값은 사용자가 입력)\n` +
      `· task: 각 프로젝트 2~3개 (제목만, weekDay 미배정)\n` +
      `· 동일 이름은 중복 추가 안 함\n` +
      `· projectCode 미설정 프로젝트는 이름으로 fallback 매칭 + projectCode 자동 백필\n\n` +
      `진행할까요?`
    )) return;
    setSeedingExtras(true);
    try {
      // 기존 KPI·task·프로젝트 조회
      const [existingKpisSnap, existingTasksSnap, existingProjectsSnap] = await Promise.all([
        db.collection(COLLECTIONS.POUR_KPIS).get(),
        db.collection(COLLECTIONS.POUR_TASKS).get(),
        db.collection(COLLECTIONS.POUR_PROJECTS).get(),
      ]);
      const existingKpis = existingKpisSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const existingTasks = existingTasksSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const existingProjects = existingProjectsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`[seed-extras] 시작 — 기존 프로젝트 ${existingProjects.length}건 / KPI ${existingKpis.length}건 / task ${existingTasks.length}건`);

      // 인덱스 구축: projectCode 우선, 이름 fallback
      const projectsByCode = {};
      const projectsByName = {};
      let codedCount = 0, namedCount = 0;
      existingProjects.forEach(p => {
        if (p.projectCode) { projectsByCode[p.projectCode] = p; codedCount++; }
        if (p.name) { projectsByName[p.name] = p; namedCount++; }
      });
      console.log(`[seed-extras] projectCode 매칭 가능: ${codedCount}건 / 이름 인덱스: ${namedCount}건`);

      let kpiAdded = 0, taskAdded = 0;
      let matchedProjects = 0, skippedProjects = 0;
      let codeBackfilled = 0;

      for (const p of WORKMGMT_PROJECTS_SEED) {
        // 1순위: projectCode 매칭, 2순위: 이름 정확 일치
        let proj = projectsByCode[p.code];
        let matchedBy = 'code';
        if (!proj && projectsByName[p.name]) {
          proj = projectsByName[p.name];
          matchedBy = 'name';
        }
        if (!proj) {
          skippedProjects++;
          continue;
        }
        matchedProjects++;

        // projectCode 백필 — 이름으로 매칭됐는데 projectCode 비어있으면 자동 채움
        if (matchedBy === 'name' && !proj.projectCode) {
          try {
            await db.collection(COLLECTIONS.POUR_PROJECTS).doc(proj.id).update({
              projectCode: p.code,
              ...audit.update(),
            });
            proj = { ...proj, projectCode: p.code };
            codeBackfilled++;
          } catch (e) { console.warn('[seed-extras] code 백필 실패:', e.message); }
        }

        // KPI 보충 — 동일 projectId·name 중복 방지 (keyResultId는 빈 KR 일 수 있어 projectId 우선)
        for (const k of (p.kpis || [])) {
          const dup = existingKpis.find(x =>
            (x.projectId === proj.id || (x.keyResultId && x.keyResultId === proj.keyResultId)) &&
            x.name === k.name
          );
          if (dup) continue;
          await db.collection(COLLECTIONS.POUR_KPIS).add({
            keyResultId: proj.keyResultId || null,
            projectId: proj.id,
            projectName: proj.name,
            name: k.name,
            target: 0,           // 사용자가 직접 입력
            baseline: 0,
            current: 0,
            unit: k.unit || '',
            source: 'manual',
            channelCode: null,
            history: [],
            staffId: proj.ownerStaffId || activeStaff.id,
            ...audit.create(),
          });
          kpiAdded++;
        }

        // task 보충
        for (const taskTitle of (p.tasks || [])) {
          const dup = existingTasks.find(t => t.projectId === proj.id && t.title === taskTitle);
          if (dup) continue;
          await db.collection(COLLECTIONS.POUR_TASKS).add({
            staffId: proj.ownerStaffId || activeStaff.id,
            title: taskTitle,
            done: false,
            priority: 'mid',
            projectId: proj.id,
            projectName: proj.name,
            weekDay: null,
            weekSlot: null,
            dueDate: '',
            isFixed: false,
            pulledToday: false,
            performedDate: null,
            notes: '',
            attachments: [],
            status: 'active',
            ...audit.create(),
          });
          taskAdded++;
        }
      }

      console.log(`[seed-extras] 완료 — 매칭 ${matchedProjects}건 / 스킵 ${skippedProjects}건 / code 백필 ${codeBackfilled}건 / KPI +${kpiAdded} / task +${taskAdded}`);

      // 친절한 토스트 — 0건이면 원인 안내
      if (matchedProjects === 0) {
        const seedCount = WORKMGMT_PROJECTS_SEED.length;
        alert(
          `⚠️ 매칭된 프로젝트가 0건입니다.\n\n` +
          `현재 등록된 프로젝트: ${existingProjects.length}건\n` +
          `시드 데이터: ${seedCount}건\n` +
          `projectCode 매칭 가능 프로젝트: ${codedCount}건\n\n` +
          `원인 가능성:\n` +
          `1) 프로젝트가 [+ 직접 추가]로 등록되어 시드의 이름·code와 다름\n` +
          `2) 프로젝트 시드를 안 했음 — 먼저 [🌱 기본 프로젝트 일괄 등록]\n\n` +
          `해결:\n` +
          `· 빈 컬렉션에 [🌱 기본 프로젝트 일괄 등록] 실행 후 재시도\n` +
          `· 또는 시드 프로젝트의 이름을 ${seedCount}개 표준 이름으로 맞춰 주세요 (콘솔 [seed-extras] 로그 참조)`
        );
      } else if (kpiAdded === 0 && taskAdded === 0) {
        onToast({ message: `🌱 보충 — 매칭 ${matchedProjects}건 / 모두 이미 등록됨 (중복 스킵)`, type: 'info' });
      } else {
        onToast({ message: `🌱 보충 완료 — 매칭 ${matchedProjects}건 · KPI +${kpiAdded} · task +${taskAdded}${codeBackfilled ? ` · code 백필 ${codeBackfilled}` : ''}`, type: 'success' });
      }
    } catch (e) {
      console.error('[seed-extras] 실패:', e);
      onToast({ message: '보충 실패: ' + e.message, type: 'error' });
    }
    setSeedingExtras(false);
  };

  // 🔄 본인/담당자 매핑 재계산 — 시드 후 staff.kpiMemberId 설정한 경우 55개 프로젝트 일괄 보정
  // 스마트 자동 추론: staff.name에 '송희' 포함 → kpiMemberId='songhee', '민지'→'minji', '란'→'ran'
  // 1) 미설정 staff를 이름으로 자동 추론 → 미리보기 confirm → staff.kpiMemberId 업데이트
  // 2) 프로젝트의 ownerStaffId/assigneeStaffIds를 시드 데이터 기준으로 일괄 재계산
  const inferKpiId = (name) => {
    const n = String(name || '').trim();
    if (!n) return null;
    if (n.includes('송희')) return 'songhee';
    if (n.includes('민지')) return 'minji';
    if (n.includes('란')) return 'ran';
    return null;
  };

  const remapOwners = async () => {
    const seedByCode = {};
    WORKMGMT_PROJECTS_SEED.forEach(p => { if (p.code) seedByCode[p.code] = p; });
    // 시드에서 사용된 매칭 ID
    const usedKeys = new Set();
    WORKMGMT_PROJECTS_SEED.forEach(p => {
      if (p.ownerKey) usedKeys.add(p.ownerKey);
      (p.collabKeys || []).forEach(k => usedKeys.add(k));
    });

    // 현재 staff의 kpiMemberId 인덱스
    const staffByKpi = {};
    staffMembers.forEach(s => { if (s.kpiMemberId) staffByKpi[s.kpiMemberId] = s; });

    // 1단계: 미설정 매칭 ID를 staff 이름으로 자동 추론
    const missing = [...usedKeys].filter(k => !staffByKpi[k]);
    const autoSuggest = [];  // { staff, inferredId } 목록
    if (missing.length > 0) {
      const idToStaff = {};  // 추론 결과 임시 인덱스
      staffMembers.forEach(s => {
        if (s.kpiMemberId) return;  // 이미 설정된 staff는 건너뜀
        const id = inferKpiId(s.name);
        if (id && missing.includes(id) && !idToStaff[id]) {
          idToStaff[id] = s;
          autoSuggest.push({ staff: s, inferredId: id });
        }
      });

      const stillMissing = missing.filter(k => !idToStaff[k]);
      if (autoSuggest.length === 0) {
        alert(
          `⚠️ 시드 프로젝트의 매칭 ID(${missing.join(', ')})가 staff에 등록되지 않았습니다.\n\n` +
          `자동 추론도 실패 — 이름에 "송희/민지/란"이 포함된 staff가 필요합니다.\n\n` +
          `해결: 담당자 관리에서 staff 이름이 김송희·김민지·이란 등으로 등록되어 있어야 합니다.\n` +
          `또는 [+ 프로젝트 추가]에서 직접 담당자를 선택해 주세요.`
        );
        return;
      }

      // 미리보기 confirm
      const lines = autoSuggest.map(s => `  ${s.staff.name} → ${s.inferredId}`).join('\n');
      const missingLine = stillMissing.length > 0
        ? `\n\n⚠️ 여전히 매핑 안 됨: ${stillMissing.join(', ')} (해당 owner의 프로젝트는 빈 채로 남음)\n`
        : '';
      if (!confirm(
        `🤖 자동 추론 결과 — 다음과 같이 staff를 자동 매핑합니다:\n\n` +
        lines + missingLine + `\n` +
        `[확인] 클릭 시:\n` +
        `  1) staff의 kpiMemberId를 자동 설정\n` +
        `  2) 프로젝트 ${projects.filter(p => p.projectCode).length}건의 owner/담당자 자동 재매핑\n` +
        `\n진행할까요?`
      )) return;

      setRemapping(true);
      try {
        // staff 자동 업데이트
        for (const s of autoSuggest) {
          await db.collection(COLLECTIONS.STAFF).doc(s.staff.id).update({
            kpiMemberId: s.inferredId,
            ...audit.update(),
          });
          // 로컬 인덱스도 갱신 → 이어서 프로젝트 재매핑할 때 즉시 반영
          staffByKpi[s.inferredId] = { ...s.staff, kpiMemberId: s.inferredId };
        }
      } catch (e) {
        onToast({ message: 'staff 자동 매핑 실패: ' + e.message, type: 'error' });
        setRemapping(false);
        return;
      }
    } else {
      // 미설정 없으면 단순 confirm
      const target = projects.filter(p => p.projectCode && seedByCode[p.projectCode]);
      if (target.length === 0) {
        onToast({ message: 'projectCode 있는 시드 프로젝트가 없습니다', type: 'info' });
        return;
      }
      if (!confirm(`프로젝트 ${target.length}건의 owner/담당자를 재매핑합니다. 진행할까요?`)) return;
      setRemapping(true);
    }

    // 2단계: 프로젝트 재매핑
    try {
      const target = projects.filter(p => p.projectCode && seedByCode[p.projectCode]);
      let updated = 0;
      for (const p of target) {
        const seed = seedByCode[p.projectCode];
        const owner = seed.ownerKey ? staffByKpi[seed.ownerKey] : null;
        const collabs = (seed.collabKeys || []).map(k => staffByKpi[k]).filter(Boolean);
        const assigneeStaffIds = [owner, ...collabs].filter(Boolean).map(s => s.id);
        const patch = {
          ownerStaffId: owner?.id || null,
          ownerStaffName: owner?.name || null,
          assigneeStaffIds,
          ...audit.update(),
        };
        // priority 필드가 없거나 무효하면 시드 값으로 보충 (기존 사용자가 설정한 값은 유지)
        if (!['high','mid','low'].includes(p.priority) && seed.priority) {
          patch.priority = seed.priority;
        }
        await db.collection(COLLECTIONS.POUR_PROJECTS).doc(p.id).update(patch);
        updated++;
      }
      const staffMsg = autoSuggest.length > 0 ? `staff ${autoSuggest.length}명 + ` : '';
      onToast({ message: `🔄 ${staffMsg}프로젝트 ${updated}건 재매핑 완료`, type: 'success' });
    } catch (e) {
      onToast({ message: '프로젝트 재매핑 실패: ' + e.message, type: 'error' });
    }
    setRemapping(false);
  };

  const addProject = async (data) => {
    await db.collection(COLLECTIONS.POUR_PROJECTS).add({
      name: data.name,
      description: data.description || '',
      keyResultId: data.keyResultId || null,
      priority: data.priority || 'mid',
      assigneeStaffIds: data.assigneeStaffIds || [],
      ownerStaffId: data.ownerStaffId || activeStaff.id,
      ownerStaffName: (staffMembers.find(s => s.id === (data.ownerStaffId || activeStaff.id)) || {}).name || activeStaff.name,
      status: 'active',
      progress: 0,
      dueDate: data.dueDate || '',
      startDate: data.startDate || new Date().toISOString().split('T')[0],
      contribution: Number(data.contribution) || 0,
      ...audit.create(),
    });
    onToast({ message: '프로젝트 추가 완료', type: 'success' });
  };

  const updateProject = async (id, patch) => {
    await db.collection(COLLECTIONS.POUR_PROJECTS).doc(id).update({ ...patch, ...audit.update() });
  };

  const delProject = async (p) => {
    if (!confirm(`프로젝트 "${p.name}" 삭제? (연결 일지/업무는 별도로 유지)`)) return;
    await db.collection(COLLECTIONS.POUR_PROJECTS).doc(p.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };

  // 필터링
  let filtered = projects.slice();
  if (filterStaffId === 'mine') {
    filtered = filtered.filter(p => Array.isArray(p.assigneeStaffIds) && p.assigneeStaffIds.includes(activeStaff.id));
  } else if (filterStaffId !== 'all') {
    filtered = filtered.filter(p => Array.isArray(p.assigneeStaffIds) && p.assigneeStaffIds.includes(filterStaffId));
  }
  if (filterStatus === 'open') filtered = filtered.filter(p => p.status !== 'done' && (p.progress || 0) < 100);
  else if (filterStatus === 'done') filtered = filtered.filter(p => p.status === 'done' || (p.progress || 0) >= 100);
  // 정렬: 진척도 asc → 마감 asc
  filtered.sort((a, b) => {
    const p = (Number(a.progress) || 0) - (Number(b.progress) || 0);
    if (p !== 0) return p;
    return (a.dueDate || 'z').localeCompare(b.dueDate || 'z');
  });

  // 담당자별 통계 (전체 staff)
  const staffStats = staffMembers.map(s => ({ staff: s, ...computeStaffContribution(s.id, projects) }));

  const STATUS_META = {
    active: { label:'진행', color:'#2563EB', bg:'#DBEAFE' },
    paused: { label:'보류', color:'#D97706', bg:'#FEF3C7' },
    done:   { label:'완료', color:'#059669', bg:'#D1FAE5' },
  };

  return (
    <div style={{ padding:'24px 32px', maxWidth:1280 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:12 }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>🗂️ 프로젝트</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
            전체 {projects.length} · 진행 {projects.filter(p => p.status !== 'done' && (p.progress||0) < 100).length} · 완료 {projects.filter(p => p.status === 'done' || (p.progress||0) >= 100).length}
          </div>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {projects.length === 0 && (
            <button onClick={seedProjects} disabled={seeding} style={{
              padding:'10px 16px', borderRadius:9, fontSize:13, fontWeight:900, color:'#fff',
              background:'#0F1F5C', border:'none', opacity: seeding ? 0.6 : 1,
            }}>🌱 기본 프로젝트 일괄 등록 ({WORKMGMT_PROJECTS_SEED.length}건)</button>
          )}
          {projects.length > 0 && projects.some(p => p.projectCode) && (
            <button onClick={remapOwners} disabled={remapping} title="시드 프로젝트의 owner/담당자를 staff.kpiMemberId 기준으로 일괄 재매핑"
              style={{
                padding:'10px 14px', borderRadius:9, fontSize:12.5, fontWeight:900, color:'var(--navy)',
                background:'#fff', border:'1.5px solid var(--navy)', opacity: remapping ? 0.6 : 1,
              }}>🔄 본인 매핑 재계산</button>
          )}
          {projects.length > 0 && projects.some(p => p.projectCode) && (
            <button onClick={seedKpisAndTasks} disabled={seedingExtras} title="프로젝트별 권장 활동지표(KPI) + 기본 task 일괄 보충"
              style={{
                padding:'10px 14px', borderRadius:9, fontSize:12.5, fontWeight:900, color:'#fff',
                background:'#7C3AED', border:'none', opacity: seedingExtras ? 0.6 : 1,
              }}>🌱 활동지표·task 보충</button>
          )}
          <button onClick={() => setShowAdd(true)} style={{
            padding:'10px 18px', borderRadius:9, fontSize:13, fontWeight:900, color:'#fff',
            background:'linear-gradient(135deg, var(--or), var(--or-d))',
          }}>+ 프로젝트 추가</button>
        </div>
      </div>

      {/* 본인 배정 프로젝트 0건 + 전체는 있을 때 안내 배너 */}
      {(() => {
        const mineCount = projects.filter(p => Array.isArray(p.assigneeStaffIds) && p.assigneeStaffIds.includes(activeStaff.id)).length;
        if (projects.length === 0 || mineCount > 0) return null;
        const hasSeed = projects.some(p => p.projectCode);
        return (
          <div style={{ padding:'12px 16px', marginBottom:14, background:'#FEE2E2', border:'1.5px solid #FCA5A5', borderRadius:10, fontSize:12, color:'#991B1B', fontWeight:700, lineHeight:1.7 }}>
            ⚠️ <b>본인({activeStaff.name}) 배정 프로젝트가 0건입니다.</b> (전체 {projects.length}건)
            <div style={{ marginTop:6, fontSize:11.5, color:'#7F1D1D', fontWeight:600 }}>
              {hasSeed
                ? <>👉 우상단 <b>[🔄 본인 매핑 재계산]</b> 버튼을 클릭하세요. 이름으로 자동 매핑(김송희→songhee 등)되어 시드 프로젝트 {projects.filter(p => p.projectCode).length}건의 owner/담당자가 한 번에 채워집니다.</>
                : <>직접 추가한 프로젝트만 있으므로, 각 프로젝트 편집 → 담당자 토글에서 본인 추가하세요.</>
              }
              <br/>또는 필터를 <b>"전체 담당자"</b>로 바꾸면 모든 프로젝트가 보입니다.
            </div>
          </div>
        );
      })()}

      {/* 담당자별 기여 위젯 */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))', gap:10, marginBottom:18 }}>
        {staffStats.map(({ staff, count, avgProgress, doneCount }) => {
          const isMe = staff.id === activeStaff.id;
          return (
            <div key={staff.id} style={{
              background: isMe ? 'linear-gradient(135deg, var(--or-pale), #fff)' : '#fff',
              border: isMe ? '2px solid var(--or)' : '1px solid var(--border)',
              borderRadius:11, padding:'12px 14px', boxShadow:'var(--shadow)'
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                <div style={{ width:30, height:30, borderRadius:'50%', background:staff.kpiColor || '#9CA3AF', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:900 }}>
                  {staff.kpiInitial || (staff.name || '?').charAt(0)}
                </div>
                <div style={{ fontSize:12, fontWeight:900, color:'var(--text)' }}>{staff.name} {isMe && <span style={{ fontSize:9, color:'var(--or-d)', marginLeft:3 }}>(나)</span>}</div>
              </div>
              <div style={{ fontSize:11, fontWeight:700, color:'var(--text-md)', display:'flex', justifyContent:'space-between' }}>
                <span>프로젝트</span><span style={{ fontWeight:900, color:'var(--or-d)' }}>{count}</span>
              </div>
              <div style={{ fontSize:11, fontWeight:700, color:'var(--text-md)', display:'flex', justifyContent:'space-between', marginTop:3 }}>
                <span>평균 진척</span><span style={{ fontWeight:900, color:'var(--or-d)' }}>{avgProgress}%</span>
              </div>
              <div style={{ fontSize:11, fontWeight:700, color:'var(--text-md)', display:'flex', justifyContent:'space-between', marginTop:3 }}>
                <span>완료</span><span style={{ fontWeight:900, color:'var(--green)' }}>{doneCount}</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* 필터 */}
      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap' }}>
        <select value={filterStaffId} onChange={e => setFilterStaffId(e.target.value)} style={{ padding:'7px 11px', borderRadius:7, border:'1.5px solid var(--border)', fontSize:11.5, fontWeight:700, background:'#fff' }}>
          <option value="mine">📍 내 프로젝트</option>
          <option value="all">전체 담당자</option>
          {staffMembers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ padding:'7px 11px', borderRadius:7, border:'1.5px solid var(--border)', fontSize:11.5, fontWeight:700, background:'#fff' }}>
          <option value="open">진행/보류</option>
          <option value="done">완료</option>
          <option value="all">전체</option>
        </select>
        <div style={{ flex:1, textAlign:'right', fontSize:11.5, color:'var(--text-sm)', fontWeight:700, alignSelf:'center' }}>
          {filtered.length}건 표시
        </div>
      </div>

      {/* 프로젝트 카드 그리드 */}
      {filtered.length === 0 ? (
        <div style={{ padding:60, textAlign:'center', background:'#fff', border:'1px dashed var(--border)', borderRadius:12, color:'var(--text-sm)', fontSize:13, fontWeight:600 }}>
          {projects.length === 0 ? (
            <>
              등록된 프로젝트가 없습니다.<br/>
              👉 상단의 <b style={{ color:'var(--navy)' }}>[🌱 기본 프로젝트 일괄 등록 ({WORKMGMT_PROJECTS_SEED.length}건)]</b> 버튼 한 번 클릭으로 workmgmt 55개 프로젝트가 KR과 자동 연결되어 등록됩니다.<br/>
              <span style={{ fontSize:11, color:'var(--text-xs)' }}>※ 사전에 OKR 페이지에서 KR을 먼저 등록해야 자동 매칭됩니다.</span>
            </>
          ) : '조건에 맞는 프로젝트가 없습니다.'}
        </div>
      ) : (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:12 }}>
          {filtered.map(p => {
            const kr = keyResults.find(k => k.id === p.keyResultId);
            const assignees = (p.assigneeStaffIds || []).map(id => staffMembers.find(s => s.id === id)).filter(Boolean);
            const isMine = (p.assigneeStaffIds || []).includes(activeStaff.id);
            const status = p.status === 'done' || (p.progress || 0) >= 100 ? 'done' : (p.status || 'active');
            const meta = STATUS_META[status] || STATUS_META.active;
            return (
              <div key={p.id} style={{
                background:'#fff', borderRadius:12, padding:'14px 16px',
                border: isMine ? '2px solid var(--or)' : '1px solid var(--border)',
                boxShadow:'var(--shadow)', display:'flex', flexDirection:'column', gap:10
              }}>
                <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4, flexWrap:'wrap' }}>
                      <span style={{ padding:'2px 7px', borderRadius:5, fontSize:9.5, fontWeight:900, color:meta.color, background:meta.bg }}>{meta.label}</span>
                      {(() => {
                        const pm = PRIORITY_META_PROJECT[p.priority] || PRIORITY_META_PROJECT.mid;
                        return <span title={`중요도: ${pm.label}`} style={{ padding:'2px 7px', borderRadius:5, fontSize:9.5, fontWeight:900, color:pm.color, background:pm.bg }}>{pm.icon} {pm.label}</span>;
                      })()}
                      {isMine && <span style={{ fontSize:9.5, fontWeight:900, color:'var(--or-d)', background:'var(--or-pale)', padding:'2px 7px', borderRadius:5 }}>📍 내 프로젝트</span>}
                    </div>
                    <div style={{ fontSize:14, fontWeight:900, color:'var(--text)', marginBottom:3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.name}</div>
                    {kr && (
                      <div style={{ fontSize:10.5, fontWeight:700, color:'var(--text-sm)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        🔗 KR: {kr.title}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setEditing(p)} title="편집" style={{ width:26, height:26, borderRadius:6, fontSize:13, background:'var(--bg)' }}>✎</button>
                  <button onClick={() => delProject(p)} title="삭제" style={{ width:26, height:26, borderRadius:6, fontSize:13, color:'#DC2626' }}>×</button>
                </div>

                {/* 진척도 슬라이더 */}
                <div>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
                    <span style={{ fontSize:10.5, fontWeight:800, color:'var(--text-md)' }}>진척도</span>
                    <span style={{ fontSize:13, fontWeight:900, color:'var(--or-d)' }}>{p.progress || 0}%</span>
                  </div>
                  <input type="range" min="0" max="100" step="5" value={p.progress || 0}
                    onChange={e => updateProject(p.id, { progress: Number(e.target.value) })}
                    style={{ width:'100%', accentColor:'var(--or)' }} />
                </div>

                {/* 담당자 + 마감 */}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:-4 }}>
                    {assignees.length === 0 ? (
                      <span style={{ fontSize:10.5, color:'var(--text-sm)', fontWeight:700, fontStyle:'italic' }}>담당자 미배정</span>
                    ) : assignees.slice(0, 4).map((s, i) => (
                      <div key={s.id} title={s.name} style={{
                        width:26, height:26, borderRadius:'50%', background:s.kpiColor || '#9CA3AF', color:'#fff',
                        display:'flex', alignItems:'center', justifyContent:'center', fontSize:10.5, fontWeight:900,
                        marginLeft: i === 0 ? 0 : -6, border:'2px solid #fff'
                      }}>{s.kpiInitial || (s.name || '?').charAt(0)}</div>
                    ))}
                    {assignees.length > 4 && <span style={{ fontSize:10, fontWeight:800, color:'var(--text-sm)', marginLeft:4 }}>+{assignees.length - 4}</span>}
                  </div>
                  {p.dueDate && (
                    <span style={{ fontSize:10.5, fontWeight:800, color: calcDday(p.dueDate) === 'D-day' || (calcDday(p.dueDate) || '').startsWith('D+') ? '#DC2626' : 'var(--text-sm)' }}>
                      📅 {p.dueDate} ({calcDday(p.dueDate)})
                    </span>
                  )}
                </div>

                {/* 상태 전환 */}
                <select value={status} onChange={e => updateProject(p.id, { status: e.target.value })} style={{
                  padding:'5px 9px', borderRadius:6, border:'1px solid var(--border)', fontSize:11, fontWeight:700, background:'var(--bg)'
                }}>
                  <option value="active">▶ 진행</option>
                  <option value="paused">⏸ 보류</option>
                  <option value="done">✅ 완료</option>
                </select>

                {/* 📈 활동지표 (선행 행동량) — 결과지표(매출)는 OKR, 활동지표는 프로젝트에 */}
                <ProjectActivityMetrics project={p} kpis={kpis} activeStaff={activeStaff} audit={audit} onToast={onToast} />
              </div>
            );
          })}
        </div>
      )}

      <Modal open={showAdd} onClose={() => setShowAdd(false)} title="프로젝트 추가" width={560}>
        {showAdd && <ProjectForm
          onSubmit={(d) => { addProject(d); setShowAdd(false); }}
          onCancel={() => setShowAdd(false)}
          keyResults={keyResults}
          staffMembers={staffMembers}
          activeStaff={activeStaff}
        />}
      </Modal>
      <Modal open={!!editing} onClose={() => setEditing(null)} title="프로젝트 편집" width={560}>
        {editing && <ProjectForm
          initial={editing}
          onSubmit={(d) => {
            const patch = {
              name: d.name, description: d.description, keyResultId: d.keyResultId || null,
              priority: d.priority || 'mid',
              assigneeStaffIds: d.assigneeStaffIds || [], dueDate: d.dueDate || '',
              startDate: d.startDate || '', contribution: Number(d.contribution) || 0,
              ownerStaffId: d.ownerStaffId,
              ownerStaffName: (staffMembers.find(s => s.id === d.ownerStaffId) || {}).name || '',
            };
            updateProject(editing.id, patch).then(() => onToast({ message: '저장 완료', type: 'success' }));
            setEditing(null);
          }}
          onCancel={() => setEditing(null)}
          keyResults={keyResults}
          staffMembers={staffMembers}
          activeStaff={activeStaff}
        />}
      </Modal>
    </div>
  );
}

function ProjectForm({ initial, onSubmit, onCancel, keyResults, staffMembers, activeStaff }) {
  const [name, setName] = useState(initial?.name || '');
  const [description, setDescription] = useState(initial?.description || '');
  const [keyResultId, setKeyResultId] = useState(initial?.keyResultId || '');
  const [priority, setPriority] = useState(initial?.priority || 'mid');
  const [assigneeStaffIds, setAssigneeStaffIds] = useState(initial?.assigneeStaffIds || [activeStaff.id]);
  const [ownerStaffId, setOwnerStaffId] = useState(initial?.ownerStaffId || activeStaff.id);
  const [dueDate, setDueDate] = useState(initial?.dueDate || '');
  const [startDate, setStartDate] = useState(initial?.startDate || new Date().toISOString().split('T')[0]);
  const [contribution, setContribution] = useState(initial?.contribution || 0);
  const inputSty = { width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:13, fontWeight:600, background:'#fff', outline:'none', marginTop:4 };
  const labelSty = { fontSize:11, fontWeight:800, color:'var(--text-md)', letterSpacing:.3 };

  const toggleAssignee = (id) => {
    setAssigneeStaffIds(arr => arr.includes(id) ? arr.filter(x => x !== id) : [...arr, id]);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div><label style={labelSty}>프로젝트명 *</label><input value={name} onChange={e => setName(e.target.value)} placeholder="자사몰 SEO 최적화" style={inputSty} /></div>
      <div><label style={labelSty}>설명</label><textarea value={description} onChange={e => setDescription(e.target.value)} placeholder="목표·범위·산출물·검수 기준 등" rows={3} style={{ ...inputSty, resize:'vertical', fontFamily:'inherit' }} /></div>
      <div>
        <label style={labelSty}>연결 KR (선택)</label>
        <select value={keyResultId} onChange={e => setKeyResultId(e.target.value)} style={inputSty}>
          <option value="">— KR 미연결 —</option>
          {keyResults.map(kr => <option key={kr.id} value={kr.id}>{kr.title}</option>)}
        </select>
      </div>
      <div>
        <label style={labelSty}>담당자 (다중 선택) *</label>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(140px, 1fr))', gap:6, marginTop:6 }}>
          {staffMembers.map(s => {
            const on = assigneeStaffIds.includes(s.id);
            return (
              <button key={s.id} type="button" onClick={() => toggleAssignee(s.id)} style={{
                display:'flex', alignItems:'center', gap:6, padding:'8px 10px', borderRadius:8,
                border: on ? `2px solid var(--or)` : '1.5px solid var(--border)',
                background: on ? 'var(--or-pale)' : '#fff',
                textAlign:'left', fontSize:12, fontWeight:800, color:'var(--text)'
              }}>
                <div style={{ width:22, height:22, borderRadius:'50%', background:s.kpiColor || '#9CA3AF', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:900, flexShrink:0 }}>
                  {s.kpiInitial || (s.name || '?').charAt(0)}
                </div>
                <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.name}</span>
                {on && <span style={{ marginLeft:'auto', color:'var(--or-d)', fontSize:11 }}>✓</span>}
              </button>
            );
          })}
        </div>
      </div>
      <div>
        <label style={labelSty}>오너 (책임자)</label>
        <select value={ownerStaffId} onChange={e => setOwnerStaffId(e.target.value)} style={inputSty}>
          {staffMembers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
      </div>
      <div>
        <label style={labelSty}>중요도 (priority) *</label>
        <select value={priority} onChange={e => setPriority(e.target.value)} style={inputSty}>
          <option value="high">🔴 HIGH — 매출·시스템 직결 (슬롯 우선 노출)</option>
          <option value="mid">🟡 MID — 일상 운영</option>
          <option value="low">🟢 LOW — 보조·정기</option>
        </select>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 130px', gap:10 }}>
        <div><label style={labelSty}>시작일</label><input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} style={inputSty} /></div>
        <div><label style={labelSty}>마감일</label><input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} style={inputSty} /></div>
        <div><label style={labelSty}>기여(원)</label><input type="number" value={contribution} onChange={e => setContribution(e.target.value)} style={inputSty} /></div>
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:8 }}>
        <button onClick={onCancel} style={{ padding:'9px 18px', borderRadius:8, fontSize:12, fontWeight:800, background:'var(--bg)', color:'var(--text-md)' }}>취소</button>
        <button disabled={!name.trim() || assigneeStaffIds.length === 0} onClick={() => onSubmit({ name: name.trim(), description, keyResultId, priority, assigneeStaffIds, ownerStaffId, dueDate, startDate, contribution })} style={{ padding:'9px 18px', borderRadius:8, fontSize:12, fontWeight:900, color:'#fff', background:'var(--or)', opacity: (!name.trim() || assigneeStaffIds.length === 0) ? 0.5 : 1 }}>{initial ? '저장' : '추가'}</button>
      </div>
    </div>
  );
}

// ============================================================
// JournalsPage — 업무일지 (프로젝트별 일일 기록)
// 본인 일지 작성 + 모든 일지 열람 가능 (팀 투명성)
// 일지 작성 시 프로젝트 progressDelta 입력하면 해당 프로젝트 progress가 자동 누적됨.
// ============================================================
function JournalsPage({ onToast }) {
  const { activeStaff, audit, staffMembers } = useActiveStaffContext();
  const { projects, loading: loadingProj } = useAllOkrData();
  const { journals, loading: loadingJ } = useJournals();
  const [showAdd, setShowAdd] = useState(false);
  const [filterStaffId, setFilterStaffId] = useState('all'); // all | mine | <staffId>
  const [filterProjectId, setFilterProjectId] = useState('all');
  const [filterDate, setFilterDate] = useState(''); // YYYY-MM-DD

  if (!activeStaff) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>활동 담당자 선택이 필요합니다.</div>;
  if (loadingProj || loadingJ) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;

  const addJournal = async (data) => {
    const project = projects.find(p => p.id === data.projectId);
    const projectName = project?.name || '';
    await db.collection(COLLECTIONS.POUR_JOURNALS).add({
      staffId: activeStaff.id,
      staffName: activeStaff.name,
      date: data.date,
      projectId: data.projectId || null,
      projectName,
      content: data.content,
      hoursSpent: Number(data.hoursSpent) || 0,
      progressDelta: Number(data.progressDelta) || 0,
      mood: data.mood || 'normal',
      attachments: [],
      ...audit.create(),
    });
    // progress 누적
    if (project && Number(data.progressDelta)) {
      const newProgress = Math.max(0, Math.min(100, (Number(project.progress) || 0) + Number(data.progressDelta)));
      await db.collection(COLLECTIONS.POUR_PROJECTS).doc(project.id).update({
        progress: newProgress, ...audit.update(),
      });
    }
    onToast({ message: '업무일지 작성 완료', type: 'success' });
  };

  const delJournal = async (j) => {
    if (j.staffId !== activeStaff.id) {
      onToast({ message: '본인 일지만 삭제할 수 있습니다', type: 'error' });
      return;
    }
    if (!confirm('이 일지를 삭제할까요? (프로젝트 진척도는 자동 복원되지 않습니다)')) return;
    await db.collection(COLLECTIONS.POUR_JOURNALS).doc(j.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };

  // 필터링
  let filtered = journals.slice();
  if (filterStaffId === 'mine') filtered = filtered.filter(j => j.staffId === activeStaff.id);
  else if (filterStaffId !== 'all') filtered = filtered.filter(j => j.staffId === filterStaffId);
  if (filterProjectId !== 'all') filtered = filtered.filter(j => j.projectId === filterProjectId);
  if (filterDate) filtered = filtered.filter(j => j.date === filterDate);

  // 통계: 본인 이번주(최근7일) 일지·시간
  const today = new Date(); today.setHours(0,0,0,0);
  const weekAgo = new Date(today.getTime() - 6 * 86400000);
  const weekKey = weekAgo.toISOString().split('T')[0];
  const myWeekJournals = journals.filter(j => j.staffId === activeStaff.id && (j.date || '') >= weekKey);
  const myWeekHours = myWeekJournals.reduce((s, j) => s + (Number(j.hoursSpent) || 0), 0);
  const myWeekProgressDelta = myWeekJournals.reduce((s, j) => s + (Number(j.progressDelta) || 0), 0);

  const MOOD_META = {
    good:   { icon:'😀', label:'순조' },
    normal: { icon:'😐', label:'보통' },
    tough:  { icon:'😣', label:'난항' },
  };

  return (
    <div style={{ padding:'24px 32px', maxWidth:1280 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:12 }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>📝 업무일지</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
            {activeStaff.name} · 최근 7일 일지 <b style={{ color:'var(--or-d)' }}>{myWeekJournals.length}</b>건 · 누적시간 <b style={{ color:'var(--or-d)' }}>{myWeekHours}</b>h · 진척기여 <b style={{ color:'var(--or-d)' }}>+{myWeekProgressDelta}%</b>
          </div>
        </div>
        <button onClick={() => setShowAdd(true)} style={{
          padding:'10px 18px', borderRadius:9, fontSize:13, fontWeight:900, color:'#fff',
          background:'linear-gradient(135deg, var(--or), var(--or-d))',
        }}>+ 일지 작성</button>
      </div>

      {/* 필터 */}
      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap' }}>
        <select value={filterStaffId} onChange={e => setFilterStaffId(e.target.value)} style={{ padding:'7px 11px', borderRadius:7, border:'1.5px solid var(--border)', fontSize:11.5, fontWeight:700, background:'#fff' }}>
          <option value="all">전체 담당자</option>
          <option value="mine">📍 내 일지만</option>
          {staffMembers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select value={filterProjectId} onChange={e => setFilterProjectId(e.target.value)} style={{ padding:'7px 11px', borderRadius:7, border:'1.5px solid var(--border)', fontSize:11.5, fontWeight:700, background:'#fff' }}>
          <option value="all">전체 프로젝트</option>
          {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} style={{ padding:'7px 11px', borderRadius:7, border:'1.5px solid var(--border)', fontSize:11.5, fontWeight:700, background:'#fff' }} />
        {filterDate && <button onClick={() => setFilterDate('')} style={{ padding:'7px 12px', borderRadius:7, fontSize:11, fontWeight:800, background:'var(--bg)', color:'var(--text-md)' }}>날짜 초기화</button>}
        <div style={{ flex:1, textAlign:'right', fontSize:11.5, color:'var(--text-sm)', fontWeight:700, alignSelf:'center' }}>
          {filtered.length}건 표시
        </div>
      </div>

      {/* 일지 리스트 */}
      {filtered.length === 0 ? (
        <div style={{ padding:60, textAlign:'center', background:'#fff', border:'1px dashed var(--border)', borderRadius:12, color:'var(--text-sm)', fontSize:13, fontWeight:600 }}>
          조건에 맞는 일지가 없습니다. [+ 일지 작성]으로 첫 일지를 남겨보세요.
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {filtered.map(j => {
            const staff = staffMembers.find(s => s.id === j.staffId);
            const c = staff?.kpiColor || '#9CA3AF';
            const initial = staff?.kpiInitial || (j.staffName || '?').charAt(0);
            const isMine = j.staffId === activeStaff.id;
            const mood = MOOD_META[j.mood] || MOOD_META.normal;
            return (
              <div key={j.id} style={{
                background:'#fff', borderRadius:11, padding:'14px 16px',
                border: isMine ? '2px solid var(--or)' : '1px solid var(--border)',
                boxShadow:'var(--shadow)', display:'flex', gap:12
              }}>
                <div style={{ width:36, height:36, borderRadius:'50%', background:c, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:900, flexShrink:0 }}>
                  {initial}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6, flexWrap:'wrap' }}>
                    <span style={{ fontSize:13, fontWeight:900, color:'var(--text)' }}>{j.staffName}</span>
                    <span style={{ fontSize:10.5, fontWeight:700, color:'var(--text-sm)' }}>{j.date}</span>
                    {j.projectName && <span style={{ fontSize:10.5, fontWeight:800, color:'var(--or-d)', background:'var(--or-pale)', padding:'2px 8px', borderRadius:5 }}>🗂️ {j.projectName}</span>}
                    <span title={mood.label} style={{ fontSize:14 }}>{mood.icon}</span>
                    {Number(j.hoursSpent) > 0 && <span style={{ fontSize:10.5, fontWeight:700, color:'var(--text-md)' }}>⏱ {j.hoursSpent}h</span>}
                    {Number(j.progressDelta) !== 0 && <span style={{ fontSize:10.5, fontWeight:800, color: Number(j.progressDelta) > 0 ? 'var(--green)' : '#DC2626' }}>
                      {Number(j.progressDelta) > 0 ? '↑' : '↓'} {Math.abs(Number(j.progressDelta))}%
                    </span>}
                  </div>
                  <div style={{ fontSize:12.5, fontWeight:600, color:'var(--text-md)', whiteSpace:'pre-wrap', lineHeight:1.7 }}>{j.content}</div>
                </div>
                {isMine && (
                  <button onClick={() => delJournal(j)} title="삭제" style={{ width:26, height:26, borderRadius:6, fontSize:13, color:'#DC2626', flexShrink:0 }}>×</button>
                )}
              </div>
            );
          })}
        </div>
      )}

      <Modal open={showAdd} onClose={() => setShowAdd(false)} title="업무일지 작성" width={520}>
        {showAdd && <JournalForm
          onSubmit={(d) => { addJournal(d); setShowAdd(false); }}
          onCancel={() => setShowAdd(false)}
          projects={projects}
          activeStaff={activeStaff}
        />}
      </Modal>
    </div>
  );
}

function JournalForm({ onSubmit, onCancel, projects, activeStaff }) {
  const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
  const [projectId, setProjectId] = useState('');
  const [content, setContent] = useState('');
  const [hoursSpent, setHoursSpent] = useState('');
  const [progressDelta, setProgressDelta] = useState('0');
  const [mood, setMood] = useState('normal');
  const inputSty = { width:'100%', padding:'10px 12px', border:'1.5px solid var(--border)', borderRadius:8, fontSize:13, fontWeight:600, background:'#fff', outline:'none', marginTop:4 };
  const labelSty = { fontSize:11, fontWeight:800, color:'var(--text-md)', letterSpacing:.3 };

  // 본인 배정 프로젝트만 표시 (오타·실수 방지)
  const myProjects = projects.filter(p => Array.isArray(p.assigneeStaffIds) && p.assigneeStaffIds.includes(activeStaff.id));

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'grid', gridTemplateColumns:'150px 1fr', gap:10 }}>
        <div><label style={labelSty}>날짜 *</label><input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputSty} /></div>
        <div>
          <label style={labelSty}>프로젝트 *</label>
          <select value={projectId} onChange={e => setProjectId(e.target.value)} style={inputSty}>
            <option value="">— 선택 —</option>
            {myProjects.length === 0 && <option disabled>본인 배정 프로젝트가 없습니다</option>}
            {myProjects.map(p => <option key={p.id} value={p.id}>{p.name} ({p.progress || 0}%)</option>)}
            {/* 본인 외 프로젝트도 보고용으로 선택 가능 */}
            {projects.filter(p => !myProjects.includes(p)).length > 0 && (
              <optgroup label="— 다른 담당자 프로젝트 (보고용) —">
                {projects.filter(p => !myProjects.includes(p)).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </optgroup>
            )}
          </select>
        </div>
      </div>
      <div>
        <label style={labelSty}>내용 *</label>
        <textarea value={content} onChange={e => setContent(e.target.value)} placeholder="오늘 한 일·이슈·다음 액션…" rows={5} style={{ ...inputSty, resize:'vertical', fontFamily:'inherit' }} />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
        <div><label style={labelSty}>소요시간 (h)</label><input type="number" value={hoursSpent} onChange={e => setHoursSpent(e.target.value)} placeholder="2" min="0" step="0.5" style={inputSty} /></div>
        <div>
          <label style={labelSty}>진척도 변동 (%)</label>
          <input type="number" value={progressDelta} onChange={e => setProgressDelta(e.target.value)} placeholder="+10" min="-100" max="100" step="5" style={inputSty} />
        </div>
        <div>
          <label style={labelSty}>분위기</label>
          <select value={mood} onChange={e => setMood(e.target.value)} style={inputSty}>
            <option value="good">😀 순조</option>
            <option value="normal">😐 보통</option>
            <option value="tough">😣 난항</option>
          </select>
        </div>
      </div>
      <div style={{ fontSize:10.5, color:'var(--text-sm)', fontWeight:600, lineHeight:1.6, padding:'8px 10px', background:'var(--or-pale)', borderRadius:7 }}>
        💡 진척도 변동을 입력하면 해당 프로젝트의 진척도(progress)에 자동 누적됩니다. (예: +10% 입력 시 프로젝트 0→10%)
        <br/>※ 일지 삭제 시 자동 복원되지 않으니, 잘못 입력 시 프로젝트 페이지에서 슬라이더로 직접 보정하세요.
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:4 }}>
        <button onClick={onCancel} style={{ padding:'9px 18px', borderRadius:8, fontSize:12, fontWeight:800, background:'var(--bg)', color:'var(--text-md)' }}>취소</button>
        <button disabled={!content.trim() || !projectId} onClick={() => onSubmit({ date, projectId, content: content.trim(), hoursSpent, progressDelta, mood })} style={{ padding:'9px 18px', borderRadius:8, fontSize:12, fontWeight:900, color:'#fff', background:'var(--or)', opacity: (!content.trim() || !projectId) ? 0.5 : 1 }}>작성</button>
      </div>
    </div>
  );
}

// ============================================================
// ChannelsPage — 거래코드·채널 관리
// 데이터 모델 (work-channels):
//   { code(예 'G'), krGroup('KR1'|'KR2'|'KR3'|'기타'), name, target, unit, description,
//     status('active'|'draft'|'archived'), order, createdAt/By, updatedAt/By }
// 용도:
//   workmgmt의 KR 하위 세부 채널(P3·P4·G·M 등 거래코드)을 어드민에서 직접 추가·편집·아카이브.
//   예: 2026-05 벤처나라 등록 → G 조달청·관급 채널 신설 → 여기서 등록만으로 시스템 반영.
//   향후 workmgmt가 본 컬렉션을 읽어 동적으로 KR 트리에 표시 (현 PR 범위 외).
// ============================================================
const CHANNEL_KR_GROUPS = ['KR1', 'KR2', 'KR3', '기타'];
const CHANNEL_STATUS_META = {
  active:   { label: '운영',  color: '#047857', bg: '#D1FAE5' },
  draft:    { label: '준비',  color: '#B45309', bg: '#FEF3C7' },
  archived: { label: '종료',  color: '#6B7280', bg: '#F3F4F6' },
};

// 기본 거래코드 시드 — workmgmt KR breakdown과 1:1 매핑 (KR1·KR2)
// "기본 채널 일괄 등록" 버튼 1회 클릭 시 채워짐. 이후 자유 편집.
const DEFAULT_CHANNELS_SEED = [
  // KR1 — POUR 직판 5억
  { code: 'OWN',  krGroup: 'KR1', name: '자사몰 직판',           target: 300000000, unit: '원', description: 'pourstore.net 직판 (PG·CRM 자체)' },
  { code: 'MK',   krGroup: 'KR1', name: '마켓플레이스',          target: 150000000, unit: '원', description: '스마트스토어·쿠팡·11번가·G마켓·옥션·오늘의집' },
  { code: 'SHOW', krGroup: 'KR1', name: '쇼룸·전화·박람회',      target:  50000000, unit: '원', description: '오프라인 쇼룸·전화 주문·박람회 현장 매출' },
  // KR2 — B2B 종합 5억
  { code: 'P4', krGroup: 'KR2', name: '파트너사',                target: 300000000, unit: '원', description: 'POUR 공법 파트너사 직거래' },
  { code: 'P3', krGroup: 'KR2', name: '대리점·오프라인몰',       target:  80000000, unit: '원', description: '지역 대리점·오프라인 자재상' },
  { code: 'H',  krGroup: 'KR2', name: '이관 (공법·솔루션)',      target:  50000000, unit: '원', description: 'POUR공법·솔루션 영업에서 이관된 단건 거래' },
  { code: 'P5', krGroup: 'KR2', name: '위탁·브로커',             target:  40000000, unit: '원', description: '위탁 셀러·인플루언서·유튜버·브로커' },
  { code: 'P6', krGroup: 'KR2', name: '온라인 도매',             target:  30000000, unit: '원', description: '도매꾹·나비엠알오·온라인 도매 MOQ 운영' },
  { code: 'M',  krGroup: 'KR2', name: '시공매칭',                target: 0,         unit: '원', description: '자재 + 시공 한묶음 매칭 (TBD)' },
  { code: 'G',  krGroup: 'KR2', name: '조달청·관급 (벤처나라)',   target: 0,         unit: '원', description: '벤처나라 등록 → 건축사 스펙 인서트 → 시공사·관급 발주 (신설, 학습기간)' },
];

function ChannelsPage({ onToast }) {
  const { activeStaff, audit } = useActiveStaffContext();
  const [channels, setChannels] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(null);  // null | 'new' | channel object
  const [showPoster, setShowPoster] = useState(false);
  const [seeding, setSeeding] = useState(false);

  useEffect(() => {
    const unsub = db.collection(COLLECTIONS.WORK_CHANNELS).onSnapshot(snap => {
      const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      list.sort((a, b) => {
        const k = (a.krGroup || '').localeCompare(b.krGroup || '');
        if (k !== 0) return k;
        return (Number(a.order) || 0) - (Number(b.order) || 0);
      });
      console.log(`[work-channels] ${list.length}건 로드`);
      setChannels(list);
      setLoading(false);
    }, err => { console.error('[work-channels]', err); setLoading(false); });
    return unsub;
  }, []);

  if (!activeStaff) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>활동 담당자 선택이 필요합니다.</div>;
  if (loading) return <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>로딩 중...</div>;

  const addChannel = async (data) => {
    await db.collection(COLLECTIONS.WORK_CHANNELS).add({
      code: data.code.trim().toUpperCase(),
      krGroup: data.krGroup,
      name: data.name.trim(),
      target: Number(data.target) || 0,
      unit: data.unit || '원',
      description: data.description || '',
      status: data.status || 'draft',
      order: Number(data.order) || (channels.filter(c => c.krGroup === data.krGroup).length + 1),
      ...audit.create(),
    });
    onToast({ message: `채널 "${data.code} ${data.name}" 등록`, type: 'success' });
  };
  const updateChannel = async (id, patch) => {
    await db.collection(COLLECTIONS.WORK_CHANNELS).doc(id).update({ ...patch, ...audit.update() });
  };
  const delChannel = async (c) => {
    if (!confirm(`채널 "${c.code} ${c.name}" 삭제? 관련 프로젝트/일지는 별도로 유지됩니다.`)) return;
    await db.collection(COLLECTIONS.WORK_CHANNELS).doc(c.id).delete();
    onToast({ message: '삭제 완료', type: 'success' });
  };

  // 기본 채널 일괄 등록 — workmgmt KR breakdown을 work-channels로 1회 시드
  const seedDefaults = async () => {
    const existingCodes = new Set(channels.map(c => (c.code || '').toUpperCase()));
    const toAdd = DEFAULT_CHANNELS_SEED.filter(s => !existingCodes.has(s.code.toUpperCase()));
    if (toAdd.length === 0) { onToast({ message: '이미 모든 기본 채널이 등록되어 있습니다', type: 'info' }); return; }
    if (!confirm(`기본 채널 ${toAdd.length}건을 일괄 등록합니다.\n(이미 등록된 코드는 건너뜁니다)\n진행할까요?`)) return;
    setSeeding(true);
    try {
      const krOrder = { KR1: 0, KR2: 100, KR3: 200, '기타': 900 };
      let idx = 0;
      for (const s of toAdd) {
        await db.collection(COLLECTIONS.WORK_CHANNELS).add({
          code: s.code.toUpperCase(),
          krGroup: s.krGroup,
          name: s.name,
          target: s.target,
          unit: s.unit,
          description: s.description,
          status: s.target > 0 ? 'active' : 'draft',
          order: (krOrder[s.krGroup] || 0) + idx,
          ...audit.create(),
        });
        idx++;
      }
      onToast({ message: `기본 채널 ${toAdd.length}건 등록 완료`, type: 'success' });
    } catch (e) {
      onToast({ message: '일괄 등록 실패: ' + e.message, type: 'error' });
    }
    setSeeding(false);
  };

  // KR 그룹별 묶기
  const byKr = {};
  CHANNEL_KR_GROUPS.forEach(g => { byKr[g] = channels.filter(c => c.krGroup === g); });

  return (
    <div style={{ padding:'24px 32px', maxWidth:1280 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, flexWrap:'wrap', gap:12 }}>
        <div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:4 }}>🏷️ 거래코드·채널</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>
            KR 하위 거래 채널(예: <b>P3 대리점·오프라인몰</b>, <b>P4 파트너사</b>, <b>G 조달청·관급</b>) 관리.
            <br/>전체 {channels.length} · 운영 {channels.filter(c => c.status === 'active').length} · 준비 {channels.filter(c => c.status === 'draft').length} · 종료 {channels.filter(c => c.status === 'archived').length}
          </div>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {channels.length > 0 && (
            <button onClick={() => setShowPoster(true)} style={{
              padding:'10px 16px', borderRadius:9, fontSize:13, fontWeight:900, color:'var(--navy)',
              background:'#fff', border:'1.5px solid var(--navy)',
            }} title="A4 인쇄용 포스터 — 벽에 붙여 팀원들이 항상 보게 하기">📄 인쇄용 포스터</button>
          )}
          {channels.length === 0 && (
            <button onClick={seedDefaults} disabled={seeding} style={{
              padding:'10px 16px', borderRadius:9, fontSize:13, fontWeight:900, color:'#fff',
              background:'#0F1F5C', border:'none', opacity: seeding ? 0.6 : 1,
            }}>🌱 기본 채널 일괄 등록 (10건)</button>
          )}
          <button onClick={() => setShowForm('new')} style={{
            padding:'10px 18px', borderRadius:9, fontSize:13, fontWeight:900, color:'#fff',
            background:'linear-gradient(135deg, var(--or), var(--or-d))',
          }}>+ 채널 추가</button>
        </div>
      </div>

      {/* 안내 박스 (벤처나라 사례) */}
      <div style={{ padding:'12px 14px', marginBottom:18, background:'var(--or-pale, #FFF7ED)', border:'1px dashed var(--or-l, #FED7AA)', borderRadius:9, fontSize:11.5, color:'var(--or-d, #B45309)', fontWeight:700, lineHeight:1.7 }}>
        💡 새 거래 채널 추가 워크플로우 — 예: <b>벤처나라 등록 → 조달청·관급 (G) 신설</b>
        <ol style={{ margin:'6px 0 0 16px', padding:0, fontSize:11, fontWeight:600, color:'#7C2D12' }}>
          <li>이 페이지에서 [+ 채널 추가] → 코드(G) · 이름(조달청·관급) · KR(KR2) · 목표 입력 → 저장</li>
          <li>업무관리(workmgmt)에 관련 프로젝트는 별도로 등록 (지금은 workmgmt.html 데이터에 직접 반영, 향후 work-channels를 동적 로드)</li>
          <li>OKR 페이지에서 해당 KR의 진척도 자동 산출 가능</li>
        </ol>
      </div>

      {channels.length === 0 ? (
        <div style={{ padding:60, textAlign:'center', background:'#fff', border:'1px dashed var(--border)', borderRadius:12, color:'var(--text-sm)', fontSize:13, fontWeight:600 }}>
          등록된 거래 채널이 없습니다.
          <br/>👉 상단의 <b style={{ color:'var(--navy)' }}>[🌱 기본 채널 일괄 등록]</b> 버튼 한 번 클릭으로 KR1·KR2 기본 10개 채널이 자동 등록됩니다.
          <br/>(또는 [+ 채널 추가]로 1개씩 직접 입력)
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {CHANNEL_KR_GROUPS.map(grp => {
            const items = byKr[grp];
            if (items.length === 0) return null;
            return (
              <div key={grp} style={{ background:'#fff', borderRadius:12, border:'1px solid var(--border)', boxShadow:'var(--shadow)', overflow:'hidden' }}>
                <div style={{ padding:'12px 18px', background:'var(--bg)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <div style={{ fontSize:13, fontWeight:900, color:'var(--navy)' }}>📂 {grp} <span style={{ fontSize:11, color:'var(--text-sm)', fontWeight:700, marginLeft:6 }}>{items.length}개 채널</span></div>
                </div>
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                  <thead>
                    <tr style={{ background:'#fff' }}>
                      <th style={{ ...th(), width:70 }}>코드</th>
                      <th style={th()}>채널명</th>
                      <th style={{ ...th(), width:100 }}>목표</th>
                      <th style={{ ...th(), width:80 }}>상태</th>
                      <th style={th()}>설명</th>
                      <th style={{ ...th(), width:120, textAlign:'right' }}>작업</th>
                    </tr>
                  </thead>
                  <tbody>
                    {items.map(c => {
                      const meta = CHANNEL_STATUS_META[c.status] || CHANNEL_STATUS_META.draft;
                      return (
                        <tr key={c.id} style={{ borderTop:'1px solid var(--border-s)', opacity: c.status === 'archived' ? 0.6 : 1 }}>
                          <td style={td()}><b style={{ color:'var(--or-d)', fontFamily:'monospace' }}>{c.code}</b></td>
                          <td style={td()}><b>{c.name}</b></td>
                          <td style={td()}>{c.target ? `${fmtPrice(c.target)} ${c.unit || ''}` : <span style={{ color:'var(--text-xs)' }}>—</span>}</td>
                          <td style={td()}>
                            <select value={c.status || 'draft'} onChange={e => updateChannel(c.id, { status: e.target.value })} style={{ padding:'3px 7px', borderRadius:5, fontSize:11, fontWeight:800, color:meta.color, background:meta.bg, border:'1px solid '+meta.bg }}>
                              {Object.entries(CHANNEL_STATUS_META).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                            </select>
                          </td>
                          <td style={{ ...td(), fontSize:11, color:'var(--text-md)' }}>{c.description || <span style={{ color:'var(--text-xs)' }}>—</span>}</td>
                          <td style={{ ...td(), textAlign:'right' }}>
                            <button onClick={() => setShowForm(c)} style={{ padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:800, color:'var(--or-d)', border:'1px solid var(--or-l)', background:'#fff', marginRight:4 }}>편집</button>
                            <button onClick={() => delChannel(c)} style={{ padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:800, color:'#DC2626', border:'1px solid #FECACA', background:'#fff' }}>삭제</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      )}

      <Modal open={!!showForm} onClose={() => setShowForm(null)} title={showForm === 'new' ? '거래 채널 추가' : '거래 채널 편집'} width={520}>
        {showForm && <ChannelForm
          initial={showForm === 'new' ? null : showForm}
          existingCodes={channels.filter(c => showForm === 'new' || c.id !== showForm.id).map(c => c.code)}
          onSubmit={(d) => {
            if (showForm === 'new') addChannel(d);
            else updateChannel(showForm.id, {
              code: d.code.trim().toUpperCase(), krGroup: d.krGroup, name: d.name.trim(),
              target: Number(d.target) || 0, unit: d.unit, description: d.description,
              status: d.status, order: Number(d.order) || 0,
            }).then(() => onToast({ message: '저장 완료', type: 'success' }));
            setShowForm(null);
          }}
          onCancel={() => setShowForm(null)}
        />}
      </Modal>

      {showPoster && <ChannelsPoster channels={channels} onClose={() => setShowPoster(false)} />}
    </div>
  );
}

// ============================================================
// ChannelsPoster — A4 인쇄용 포스터 (벽에 붙여 팀원 암기용)
// 큰 코드 + 채널명 + 목표를 KR 그룹별로 시각 정리.
// window.print() 호출 시 @media print 룰이 사이드바·헤더·기타 UI 전부 숨기고
// .print-only 영역(이 포스터)만 A4 1장에 출력.
// ============================================================
const KR_POSTER_META = {
  KR1: { label: 'KR1 · POUR 직판',           sub: '자사몰·마켓·쇼룸 — 5억', accent: '#3182F6', bg: '#EBF3FF' },
  KR2: { label: 'KR2 · B2B 종합',            sub: '파트너·대리점·도매·관급 — 5억', accent: '#9C27B0', bg: '#F5E9F7' },
  KR3: { label: 'KR3 · 운영 시스템',          sub: 'CRM·매출관리·어드민·매뉴얼', accent: '#FF6F00', bg: '#FFF3E0' },
  '기타': { label: '기타',                    sub: '', accent: '#6B7280', bg: '#F3F4F6' },
};

function ChannelsPoster({ channels, onClose }) {
  // 화면용은 모달 컨테이너, 인쇄용은 print-only 컨테이너에 똑같은 HTML 1회만 렌더 (CSS로 보임 제어)
  const active = channels.filter(c => c.status !== 'archived');
  const byKr = {};
  CHANNEL_KR_GROUPS.forEach(g => { byKr[g] = active.filter(c => c.krGroup === g).sort((a,b) => (Number(a.order)||0) - (Number(b.order)||0)); });
  const today = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' });

  const PosterContent = () => (
    <div className="channels-poster" style={{
      width:'100%', maxWidth: 794, margin:'0 auto',  // A4 portrait width @ 96dpi ≈ 794px
      background:'#fff', padding:'24px 28px',
      fontFamily:'inherit', color:'#0F1F5C', boxSizing:'border-box',
    }}>
      {/* 헤더 */}
      <div style={{ borderBottom:'3px solid #0F1F5C', paddingBottom:10, marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
        <div>
          <div style={{ fontSize:11, fontWeight:800, color:'#EA580C', letterSpacing:3, marginBottom:2 }}>POUR STORE · TRANSACTION CODES</div>
          <h1 style={{ fontSize:24, fontWeight:900, letterSpacing:-0.8, lineHeight:1.1 }}>거래코드 마스터 · O1 매출 10억</h1>
          <div style={{ fontSize:11.5, fontWeight:700, color:'#4B5563', marginTop:3 }}>3인 (송희·민지·란) · KR1 5억 + KR2 5억 · 코드는 모두 외워서 일합시다</div>
        </div>
        <div style={{ textAlign:'right', fontSize:10.5, fontWeight:700, color:'#6B7280' }}>
          기준일 {today}<br/>총 {active.length}개 채널
        </div>
      </div>

      {/* KR1 + KR2 가로 2열 */}
      {['KR1', 'KR2'].map(grp => {
        const items = byKr[grp];
        if (!items || items.length === 0) return null;
        const meta = KR_POSTER_META[grp];
        return (
          <div key={grp} style={{ marginBottom:14, border:`2px solid ${meta.accent}`, borderRadius:10, overflow:'hidden', pageBreakInside:'avoid' }}>
            <div style={{ background:meta.accent, color:'#fff', padding:'8px 14px', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
              <div style={{ fontSize:14, fontWeight:900, letterSpacing:-0.3 }}>{meta.label}</div>
              <div style={{ fontSize:11, fontWeight:700, opacity:.95 }}>{meta.sub}</div>
            </div>
            <div style={{ background:meta.bg, padding:10, display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:8 }}>
              {items.map(c => {
                const isNew = (c.description || '').includes('신설') || c.code === 'G';
                return (
                  <div key={c.id} style={{ background:'#fff', border:`1.5px solid ${meta.accent}`, borderRadius:8, padding:'10px 12px', position:'relative', minHeight:78 }}>
                    {isNew && <span style={{ position:'absolute', top:4, right:4, fontSize:8.5, fontWeight:900, color:'#fff', background:'#DC2626', padding:'1px 6px', borderRadius:4, letterSpacing:0.5 }}>NEW</span>}
                    <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:3 }}>
                      <span style={{ fontSize:24, fontWeight:900, color:meta.accent, fontFamily:'monospace', letterSpacing:-1 }}>{c.code}</span>
                      <span style={{ fontSize:12, fontWeight:800, color:'#0F1F5C', flex:1, lineHeight:1.15 }}>{c.name}</span>
                    </div>
                    <div style={{ fontSize:11, fontWeight:800, color:meta.accent, marginBottom:3 }}>
                      {c.target > 0 ? `${(c.target / 100000000).toFixed(1)}억` : (c.target === 0 ? 'TBD' : `${fmtPrice(c.target)} ${c.unit||''}`)}
                    </div>
                    {c.description && (
                      <div style={{ fontSize:9.5, fontWeight:600, color:'#4B5563', lineHeight:1.35 }}>{c.description}</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* KR3 + 기타 */}
      {['KR3', '기타'].filter(grp => byKr[grp]?.length).map(grp => {
        const items = byKr[grp];
        const meta = KR_POSTER_META[grp];
        return (
          <div key={grp} style={{ marginBottom:12, border:`1.5px solid ${meta.accent}`, borderRadius:8, padding:'8px 12px', background:meta.bg, pageBreakInside:'avoid' }}>
            <div style={{ fontSize:11, fontWeight:900, color:meta.accent, marginBottom:5 }}>{meta.label}</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {items.map(c => (
                <span key={c.id} style={{ background:'#fff', padding:'4px 9px', borderRadius:5, border:`1px solid ${meta.accent}`, fontSize:10, fontWeight:800, color:'#0F1F5C' }}>
                  <b style={{ color:meta.accent, fontFamily:'monospace' }}>{c.code}</b> · {c.name}
                </span>
              ))}
            </div>
          </div>
        );
      })}

      {/* 영업 흐름 다이어그램 (조달청 G 채널이 있을 때만) */}
      {active.some(c => c.code === 'G') && (

// ============================================================
// InstallAppButton — PWA 설치 트리거 (PC/모바일 모두 동작)
// 흐름:
//   1) 브라우저가 PWA 설치 가능 판단 → beforeinstallprompt 이벤트 발생
//   2) 우리는 이벤트를 가로채 저장 + 사용자에게 "📥 앱으로 설치" 버튼 노출
//   3) 클릭 → prompt() 호출 → 사용자 OK 시 설치
//   4) 이미 standalone 모드(설치 후 실행)거나 사용자가 닫았으면 숨김 (24시간 캐시)
// 지원: Chrome/Edge/Brave/Opera (Windows/macOS/Linux/Android) · Safari(iOS 16.4+ 일부 다름)
// ============================================================
const INSTALL_DISMISS_KEY = 'pourAdminInstallDismissed';
function useInstallPrompt() {
  const [installEvent, setInstallEvent] = useState(null);
  const [installed, setInstalled] = useState(false);
  const [dismissedUntil, setDismissedUntil] = useState(() => {
    try { return Number(localStorage.getItem(INSTALL_DISMISS_KEY) || 0); } catch (_) { return 0; }
  });

  useEffect(() => {
    // 이미 standalone(설치 후 실행) 또는 iOS 홈화면 추가 모드
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
    if (isStandalone) { setInstalled(true); return; }

    const onBeforeInstall = (e) => {
      e.preventDefault();
      setInstallEvent(e);
      console.log('[pwa] beforeinstallprompt 캡처 — 설치 가능');
    };
    const onInstalled = () => {
      setInstalled(true);
      setInstallEvent(null);
      console.log('[pwa] appinstalled — 설치 완료');
    };
    window.addEventListener('beforeinstallprompt', onBeforeInstall);
    window.addEventListener('appinstalled', onInstalled);
    return () => {
      window.removeEventListener('beforeinstallprompt', onBeforeInstall);
      window.removeEventListener('appinstalled', onInstalled);
    };
  }, []);

  const promptInstall = async () => {
    if (!installEvent) return { ok: false, reason: 'no-event' };
    installEvent.prompt();
    const choice = await installEvent.userChoice;
    setInstallEvent(null);
    return { ok: choice.outcome === 'accepted', outcome: choice.outcome };
  };

  const dismiss = (hours = 24) => {
    const until = Date.now() + hours * 3600 * 1000;
    try { localStorage.setItem(INSTALL_DISMISS_KEY, String(until)); } catch (_) {}
    setDismissedUntil(until);
  };

  const visible = !installed && !!installEvent && Date.now() > dismissedUntil;
  return { visible, installed, hasEvent: !!installEvent, promptInstall, dismiss };
}
