<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>POUR 기술지원 봇 (사내)</title>
<!--
  chat-internal.html — POUR 사내 팀원용 기술지원 챗봇 v1
  · 지식: 기술연구소 Firebase(pour-k) products 컬렉션을 '라이브'로 읽어 구성(연구소가 갱신하면 자동 진화)
          + pour-app-new chatbot-kb(audience internal/전체) 병합
  · 답변: 검색(키워드·태그) 매칭. 내부용이라 규격·공법·적용부위까지 상세 제공
  · 못 맞추면 안내 + 질문을 chatbot-internal-logs에 기록(진화 루프)
  · 간단 PIN 게이트(사내 제한). 데이터 특성상 강한 보안은 아님 — 필요 시 Auth로 강화.
-->
<style>
:root{
  --or:#E8780F; --or-d:#C8650D; --or-l:#FFF7EF; --or-m:#FBE2C4;
  --navy:#0F1F5C; --ink:#111827; --ink2:#2F3438; --muted:#9AA0A6;
  --line:#EEF0F2; --bg:#F5F6F8; --card:#fff; --green:#03C75A; --blue:#2563EB;
}
*{box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; letter-spacing:-0.02em; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg); color:var(--ink2); display:flex; justify-content:center;}
.cw{width:100%; max-width:560px; height:100dvh; min-height:100%; background:var(--card); display:flex; flex-direction:column; overflow:hidden; box-shadow:0 0 40px rgba(15,31,92,.06);}
.cw-hd{flex-shrink:0; display:flex; align-items:center; gap:11px; padding:14px 16px; background:linear-gradient(120deg,#0d1836,var(--navy)); color:#fff;}
.cw-hd .ava{width:40px; height:40px; border-radius:12px; background:var(--or); display:grid; place-items:center; flex-shrink:0;}
.cw-hd .ava svg{width:22px; height:22px; color:#fff;}
.cw-hd .tt{flex:1; min-width:0;}
.cw-hd .tt .n{font-size:15px; font-weight:800; display:flex; align-items:center; gap:6px;}
.cw-hd .tt .n .tag{font-size:10px; font-weight:800; background:rgba(255,255,255,.16); padding:2px 7px; border-radius:6px; letter-spacing:0;}
.cw-hd .tt .n .dot{width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px rgba(3,199,90,.25);}
.cw-hd .tt .s{font-size:11.5px; font-weight:500; color:rgba(255,255,255,.72); margin-top:2px;}
.cw-body{flex:1; overflow-y:auto; padding:16px 14px 8px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth;}
.cw-body::-webkit-scrollbar{width:6px;} .cw-body::-webkit-scrollbar-thumb{background:#E2E5E9; border-radius:6px;}
.row{display:flex; gap:8px; align-items:flex-end; max-width:100%;}
.row.bot{align-self:flex-start;}
.row.me{align-self:flex-end; flex-direction:row-reverse;}
.row .bava{width:28px; height:28px; border-radius:9px; background:var(--or-l); border:1px solid var(--or-m); display:grid; place-items:center; flex-shrink:0;}
.row .bava svg{width:15px; height:15px; color:var(--or);}
.bubble{padding:11px 14px; border-radius:15px; font-size:14px; line-height:1.6; font-weight:500; white-space:pre-line; word-break:break-word; max-width:82vw;}
@media(min-width:560px){.bubble{max-width:410px;}}
.row.bot .bubble{background:#F4F5F7; color:var(--ink2); border-bottom-left-radius:5px;}
.row.me .bubble{background:var(--or); color:#fff; border-bottom-right-radius:5px;}
.bubble b, .bubble strong{font-weight:800;}
.chips{display:flex; flex-wrap:wrap; gap:7px; align-self:flex-start; max-width:94%; margin:-2px 0 2px 36px;}
.chip{border:1px solid var(--or-m); background:#fff; color:var(--or-d); font-size:12.5px; font-weight:700; padding:7px 13px; border-radius:20px; cursor:pointer; transition:.12s; line-height:1;}
.chip:hover{background:var(--or-l); border-color:var(--or);}
.chip.ghost{border-color:var(--line); color:var(--ink2);}
.chip.ghost:hover{background:var(--bg); border-color:var(--muted);}
.typing{display:flex; gap:4px; padding:13px 15px;}
.typing span{width:7px; height:7px; border-radius:50%; background:#C4C9CF; animation:tp 1s infinite;}
.typing span:nth-child(2){animation-delay:.15s;} .typing span:nth-child(3){animation-delay:.3s;}
@keyframes tp{0%,60%,100%{opacity:.3; transform:translateY(0);} 30%{opacity:1; transform:translateY(-3px);}}
.cw-ft{flex-shrink:0; border-top:1px solid var(--line); padding:10px 12px calc(10px + env(safe-area-inset-bottom)); background:#fff;}
.cw-ft form{display:flex; align-items:center; gap:8px; background:var(--bg); border:1.5px solid var(--line); border-radius:24px; padding:6px 6px 6px 16px; transition:.15s;}
.cw-ft form:focus-within{border-color:var(--or); background:#fff;}
.cw-ft input{flex:1; min-width:0; border:0; outline:0; background:none; font-size:14.5px; color:var(--ink);}
.cw-ft input::placeholder{color:#B0B6BD;}
.cw-ft button{flex-shrink:0; width:38px; height:38px; border-radius:50%; border:0; background:var(--or); display:grid; place-items:center; cursor:pointer; transition:.15s;}
.cw-ft button:disabled{background:#D6D9DD; cursor:default;}
.cw-ft button svg{width:18px; height:18px; color:#fff;}
.cw-guard{font-size:10.5px; color:var(--muted); text-align:center; margin-top:7px; font-weight:500;}
/* PIN 게이트 */
.gate{position:fixed; inset:0; background:#0d1836; display:grid; place-items:center; z-index:100; padding:20px;}
.gate.hide{display:none;}
.gate-card{width:100%; max-width:320px; background:#fff; border-radius:18px; padding:26px 22px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.3);}
.gate-card .gi{width:48px; height:48px; border-radius:14px; background:var(--or-l); display:grid; place-items:center; margin:0 auto 14px;}
.gate-card .gi svg{width:24px; height:24px; color:var(--or);}
.gate-card h1{font-size:16px; font-weight:800; color:var(--ink); margin-bottom:4px;}
.gate-card p{font-size:12px; color:var(--muted); margin-bottom:18px;}
.gate-card input{width:100%; border:1.5px solid var(--line); border-radius:11px; padding:12px 14px; font-size:16px; text-align:center; letter-spacing:4px; outline:none;}
.gate-card input:focus{border-color:var(--or);}
.gate-card button{width:100%; margin-top:10px; border:0; background:var(--navy); color:#fff; font-size:14px; font-weight:800; padding:12px; border-radius:11px; cursor:pointer;}
.gate-err{color:#DC2626; font-size:12px; font-weight:700; margin-top:8px; min-height:16px;}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
    <h1>POUR 기술지원 봇 (사내)</h1>
    <p>사내 전용입니다. PIN을 입력하세요.</p>
    <input id="pin" type="password" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off"/>
    <button id="pinBtn" type="button">입장</button>
    <div class="gate-err" id="pinErr"></div>
  </div>
</div>

<div class="cw">
  <div class="cw-hd">
    <div class="ava" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12l8-4.5M12 12v9M12 12L4 7.5"/></svg>
    </div>
    <div class="tt">
      <div class="n">POUR 기술지원 봇 <span class="tag">사내</span><span class="dot"></span></div>
      <div class="s">기술연구소 제품 자료 기반 · 규격/공법/적용부위 안내</div>
    </div>
  </div>
  <div class="cw-body" id="body"></div>
  <div class="cw-ft">
    <form id="form" autocomplete="off">
      <input id="input" type="text" placeholder="제품·공법·규격을 물어보세요 (예: 탄성강화 파우더 배합비)" aria-label="메시지 입력"/>
      <button id="send" type="submit" aria-label="보내기" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l16-8-6 16-3-6-7-2z"/></svg>
      </button>
    </form>
    <div class="cw-guard">기술연구소(pour-k) 자료를 실시간으로 읽습니다 · 사내 참고용</div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 우리 프로젝트(로그/보조지식)
const APP_MAIN = {
  apiKey: "AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain: "pour-app-new.firebaseapp.com", projectId: "pour-app-new",
  storageBucket: "pour-app-new.firebasestorage.app", messagingSenderId: "411031141847",
  appId: "1:411031141847:web:e658174fd4b9652cdadf92"
};
// 기술연구소 프로젝트(지식 소스)
const APP_POURK = {
  apiKey: "AIzaSyDH9oj7rTgySAYrXJQfbFo2U6B4wB3cjho",
  authDomain: "pour-k.firebaseapp.com", projectId: "pour-k",
  storageBucket: "pour-k.firebasestorage.app", messagingSenderId: "548427623760",
  appId: "1:548427623760:web:7767b3b08b280911b51055"
};
const mainApp = getApps().find(a=>a.name==='[DEFAULT]') || initializeApp(APP_MAIN);
const pourkApp = getApps().find(a=>a.name==='pourk') || initializeApp(APP_POURK, 'pourk');
const dbMain = getFirestore(mainApp);
const dbPourk = getFirestore(pourkApp);

// ===== PIN 게이트 (사내 제한) =====
const INTERNAL_PIN = "1234"; // 필요 시 교체
const AUTH_KEY = "pourInternalBotAuth";
const gate = document.getElementById('gate');
const pinInput = document.getElementById('pin');
const pinErr = document.getElementById('pinErr');
function openApp(){ gate.classList.add('hide'); boot(); }
function tryPin(){ if (pinInput.value === INTERNAL_PIN){ try{localStorage.setItem(AUTH_KEY,'1');}catch(e){} openApp(); } else { pinErr.textContent='PIN이 올바르지 않습니다.'; pinInput.value=''; pinInput.focus(); } }
document.getElementById('pinBtn').onclick = tryPin;
pinInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryPin(); });
let booted=false;
if ((()=>{try{return localStorage.getItem(AUTH_KEY)==='1';}catch(e){return false;}})()) openApp(); else setTimeout(()=>pinInput.focus(),200);

// ===== 카테고리 한글 태그 =====
const CAT_KO = { asphalt:['아스팔트','아스콘','도로','포장'], functional:['기능성'], 'oil-based':['유성'], powder:['분말','파우더'], repair:['보수','부속'], sheet:['시트'], 'water-based':['수성','프라이머'] };
const START_CHIPS = ["탄성강화 파우더 배합비","균열보수시트 특징","씰코트 적용부위","코트재 공법","침투성표면강화재","전체 제품 목록"];

// ===== DOM =====
const bodyEl=document.getElementById('body'), form=document.getElementById('form'), input=document.getElementById('input'), sendBtn=document.getElementById('send');
const norm = s => (s||'').toString().toLowerCase().replace(/[\s\.,!?~·:;()\[\]'"·\-\/]/g,'');
const esc = s => (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let KB = [];
function scrollDown(){ requestAnimationFrame(()=>{ bodyEl.scrollTop=bodyEl.scrollHeight; }); }
const BOT_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/></svg>';

function addBot(text,{chips}={}){
  const row=document.createElement('div'); row.className='row bot';
  row.innerHTML='<div class="bava">'+BOT_SVG+'</div><div class="bubble">'+esc(text)+'</div>';
  bodyEl.appendChild(row); if(chips&&chips.length) renderChips(chips); scrollDown();
}
function addMe(text){ const row=document.createElement('div'); row.className='row me'; row.innerHTML='<div class="bubble">'+esc(text)+'</div>'; bodyEl.appendChild(row); scrollDown(); }
function renderChips(list){
  const wrap=document.createElement('div'); wrap.className='chips'; wrap.dataset.transient='1';
  list.forEach(c=>{ const b=document.createElement('button'); b.className='chip'+(c.ghost?' ghost':''); b.type='button'; b.textContent=c.label||c; b.onclick=()=>{ removeTransient(); handle(c.value||c.label||c); }; wrap.appendChild(b); });
  bodyEl.appendChild(wrap); scrollDown();
}
function removeTransient(){ bodyEl.querySelectorAll('[data-transient]').forEach(n=>n.remove()); }
function typing(){ const row=document.createElement('div'); row.className='row bot'; row.innerHTML='<div class="bava">'+BOT_SVG+'</div><div class="bubble typing"><span></span><span></span><span></span></div>'; bodyEl.appendChild(row); scrollDown(); return row; }

// ===== pour-k products → KB =====
function fmtProduct(p, catKo){
  const L=[];
  L.push('■ '+(p.name||'제품'));
  if(p.role) L.push('· 정의 : '+p.role);
  if(p.desc) L.push('· 요약 : '+p.desc);
  if(Array.isArray(p.features)&&p.features.length){
    L.push('· 특징 :');
    p.features.forEach(f=>{ if(f&&f.name) L.push('   - '+f.name+(f.desc?' : '+f.desc:'')); });
  }
  if(Array.isArray(p.methods)&&p.methods.length) L.push('· 적용 공법 : '+p.methods.join(', '));
  if(Array.isArray(p.applications)&&p.applications.length) L.push('· 적용 부위 : '+p.applications.join(', '));
  if(p.specs&&typeof p.specs==='object'){
    const sp=Object.entries(p.specs).filter(([k,v])=>v).map(([k,v])=>k+' '+v);
    if(sp.length) L.push('· 규격 : '+sp.join(' / '));
  }
  if(catKo&&catKo.length) L.push('· 분류 : '+catKo.join('/'));
  return L.join('\n');
}
function buildEntry(p, catId){
  const catKo = CAT_KO[catId]||[catId];
  const feat = Array.isArray(p.features)?p.features.map(f=>f&&f.name).filter(Boolean):[];
  const tags = [p.name, ...(p.methods||[]), ...(p.applications||[]), ...feat, ...catKo].filter(Boolean);
  const text = [p.role, p.desc, feat.join(' '), (p.methods||[]).join(' '), (p.applications||[]).join(' ')].join(' ');
  return { q:p.name||'', a:fmtProduct(p,catKo), tags, text, name:p.name||'' };
}

// ===== 매칭 =====
function scoreEntry(e, query){
  const qn=norm(query);
  const words=(query.toLowerCase().match(/[가-힣a-z0-9]+/g)||[]).filter(w=>w.length>=2);
  let s=0;
  (e.tags||[]).forEach(t=>{ const tn=norm(t); if(!tn) return;
    if(qn.includes(tn)||tn.includes(qn)) s+=4;
    else if(words.some(w=>{const wn=norm(w); return wn.length>=2&&(tn.includes(wn)||wn.includes(tn));})) s+=3; });
  const qtn=norm(e.q); words.forEach(w=>{const wn=norm(w); if(wn.length>=2&&qtn.includes(wn)) s+=2;});
  const txn=norm(e.text||''); words.forEach(w=>{const wn=norm(w); if(wn.length>=2&&txn.includes(wn)) s+=1;});
  return s;
}
function search(q){ return KB.map(e=>({e,s:scoreEntry(e,q)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s); }

async function log(query, matched, score){
  try{ await addDoc(collection(dbMain,"chatbot-internal-logs"),{ q:query, matched:matched?matched.q:null, score:score||0, audience:"internal", source:"chat-internal", ts:new Date().toISOString() }); }
  catch(e){ console.log("[internal] 로그 스킵:", e&&e.message); }
}

function listAllProducts(){ return "현재 등록된 제품입니다.\n\n" + KB.map(e=>'· '+e.name).join('\n') + "\n\n제품명을 입력하시면 상세(규격·공법·적용부위)를 안내합니다."; }

async function handle(query){
  query=(query||'').trim(); if(!query) return;
  addMe(query); const t=typing();
  await new Promise(r=>setTimeout(r,380)); t.remove();

  if(/(전체|목록|리스트|어떤 제품|제품 종류|다 보여|모든 제품)/.test(query)){
    addBot(listAllProducts(), { chips: KB.slice(0,6).map(e=>({label:shorten(e.name), value:e.name, ghost:true})) });
    log(query, null, 0); return;
  }
  const res=search(query); const top=res[0]; const good=top&&top.s>=4;
  if(good){
    addBot(top.e.a, { chips: relChips(res) });
    log(query, top.e, top.s);
  } else {
    addBot("해당 내용은 아직 등록된 제품 자료에서 찾지 못했어요. 아래 제품으로 확인하시거나, 기술연구소에 자료 등록을 요청해 주세요.", { chips: startChips() });
    log(query, null, 0);
  }
}
function relChips(res){ const r=res.slice(1,3).map(x=>({label:shorten(x.e.name), value:x.e.name, ghost:true})); return r.length?r:startChips(); }
function startChips(){ return START_CHIPS.map(c=>({label:c})); }
function shorten(s){ s=(s||'').replace(/\?+$/,''); return s.length>16?s.slice(0,16)+'…':s; }

form.addEventListener('submit', e=>{ e.preventDefault(); const v=input.value.trim(); if(!v) return; input.value=''; sendBtn.disabled=true; removeTransient(); handle(v); });
input.addEventListener('input', ()=>{ sendBtn.disabled=!input.value.trim(); });

// ===== 시작 =====
async function boot(){
  if(booted) return; booted=true;
  // 1) 기술연구소 pour-k products 라이브 로드
  try{
    const snap=await getDocs(collection(dbPourk,"products"));
    let n=0;
    snap.docs.forEach(d=>{
      const data=d.data(); const items=Array.isArray(data.items)?data.items:[];
      items.forEach(p=>{ if(p&&p.name){ KB.push(buildEntry(p, d.id)); n++; } });
    });
    console.log("[internal] pour-k 제품 "+n+"건 로드");
  }catch(e){ console.log("[internal] pour-k 로드 실패:", e&&e.message); }
  // 2) 보조 지식 chatbot-kb(audience internal/전체) 병합
  try{
    const snap=await getDocs(collection(dbMain,"chatbot-kb"));
    const seen=new Set(KB.map(e=>norm(e.q)));
    snap.docs.forEach(d=>{ const k=d.data();
      if(k.status&&k.status!=='active') return;
      const aud=Array.isArray(k.audience)?k.audience:[];
      if(!(aud.length===0||aud.includes('internal'))) return;
      if(!k.q||!k.a||seen.has(norm(k.q))) return; seen.add(norm(k.q));
      KB.push({ q:k.q, a:k.a, tags:Array.isArray(k.tags)?k.tags:[], text:'', name:k.q });
    });
  }catch(e){ console.log("[internal] chatbot-kb 병합 스킵:", e&&e.message); }
  console.log("[internal] 지식 총 "+KB.length+"건");

  if(KB.length){
    addBot("안녕하세요, POUR 기술지원 봇입니다. 기술연구소 제품 자료를 기반으로 규격·공법·적용부위를 안내해 드려요. 아래에서 골라보시거나 제품명을 입력해 주세요.", { chips: startChips() });
  } else {
    addBot("지식 자료를 불러오지 못했어요. 네트워크 또는 pour-k 접근 권한을 확인해 주세요. (F12 콘솔 로그 참고)", { chips: startChips() });
  }
}
</script>
</body>
</html>
