async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function nowIso() { return new Date().toISOString(); }
function genId() { return 'id-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso); if (isNaN(d)) return '-';
  return d.toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function relativeTime(iso) {
  if (!iso) return '';
  const d = new Date(iso); if (isNaN(d)) return '';
  const m = Math.floor((Date.now() - d.getTime()) / 60000);
  if (m < 1) return '방금'; if (m < 60) return `${m}분 전`;
  const h = Math.floor(m / 60); if (h < 24) return `${h}시간 전`;
  const days = Math.floor(h / 24); if (days < 3) return `${days}일 전`;
  return d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' });
}
function modelMeta(id) { return MODELS.find(m => m.id === id) || MODELS[0]; }
function estCostUSD(model, tin, tout) {
  const m = modelMeta(model);
  return ((tin || 0) / 1e6) * m.priceIn + ((tout || 0) / 1e6) * m.priceOut;
}

// ── AI 설정 (localStorage) ──
function loadAiConfig() {
  try {
    const c = JSON.parse(localStorage.getItem(AI_CONFIG_KEY) || '{}');
    if (!MODELS.find(m => m.id === c.model)) c.model = DEFAULT_MODEL;
    return { workerUrl: '', workerSecret: '', claudeApiKey: '', maxTokens: 1024, ...c };
  } catch { return { workerUrl: '', workerSecret: '', claudeApiKey: '', model: DEFAULT_MODEL, maxTokens: 1024 }; }
}
function saveAiConfig(cfg) { try { localStorage.setItem(AI_CONFIG_KEY, JSON.stringify(cfg)); } catch {} }
function aiConfigValid(c) { return !!(c && c.workerUrl && c.workerSecret && c.claudeApiKey); }

// ── Claude 프록시 호출 (workers/claude-proxy.js) ──
async function callClaude(cfg, { system, messages, maxTokens }) {
  const res = await fetch(cfg.workerUrl.replace(/\/+$/, ''), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Worker-Secret': cfg.workerSecret },
    body: JSON.stringify({
      workerSecret: cfg.workerSecret,
      claudeApiKey: cfg.claudeApiKey,
      model: cfg.model || DEFAULT_MODEL,
      max_tokens: maxTokens || cfg.maxTokens || 1024,
      system,
      messages,
    }),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `Worker HTTP ${res.status}`);
  return {
    text: json.content?.[0]?.text || '',
    inputTokens: json.usage?.input_tokens || 0,
    outputTokens: json.usage?.output_tokens || 0,
    model: json.model || cfg.model,
  };
}

// ── 지식베이스 검색(간단 키워드 RAG) ──
function kbForBot(kb, bot) {
  return kb.filter(k => k.status !== 'archived' &&
    (!Array.isArray(k.audience) || k.audience.length === 0 || k.audience.includes(bot.audience)));
}
function scoreOverlap(text, query) {
  const q = (query || '').toLowerCase().match(/[가-힣a-z0-9]{2,}/g) || [];
  const t = (text || '').toLowerCase();
  let s = 0; q.forEach(w => { if (t.includes(w)) s++; });
  return s;
}
function buildKbBlock(kb, bot, userText, maxChars = 3200) {
  const pool = kbForBot(kb, bot);
  if (!pool.length) return '';
  const ranked = pool
    .map(k => ({ k, s: scoreOverlap((k.q || '') + ' ' + (k.a || '') + ' ' + (k.tags || []).join(' '), userText) }))
    .sort((a, b) => b.s - a.s);
  // 매칭 0개뿐이면 상위 일부라도 제공
  const picked = ranked.filter(r => r.s > 0).slice(0, 8);
  const use = picked.length ? picked : ranked.slice(0, 4);
  let out = '', n = 0;
  for (const { k } of use) {
    const chunk = k.type === 'faq'
      ? `Q: ${k.q}\nA: ${k.a}`
      : `[${k.q || '문서'}] ${k.a}`;
    if (out.length + chunk.length > maxChars) break;
    out += (out ? '\n\n' : '') + chunk; n++;
  }
  return out;
}
function buildSystemPrompt(bot, kbBlock) {
  const lines = [];
  lines.push(bot.systemPrompt || PERSONA_SEED[bot.audience] || '');
  if ((bot.guardrails || []).length) {
    lines.push('\n## 반드시 지킬 규칙');
    bot.guardrails.forEach(g => lines.push('- ' + g));
  }
  if (kbBlock) {
    lines.push('\n## 참고 지식 (아래 내용만 사실 근거로 사용. 여기 없는 수치·약속은 지어내지 말 것)');
    lines.push(kbBlock);
  } else {
    lines.push('\n(참고 지식 없음 — 일반 안내만 하고, 구체 수치·금액·보증은 약속하지 말 것)');
  }
  lines.push('\n답변은 한국어로 간결하게. 모르면 모른다고 말하고 담당자 연결을 안내하세요.');
  return lines.join('\n');
}

// ============================================================
function PinScreen({ onUnlock, onToast }) {
  const [pin, setPin] = useState('');
  const [stored, setStored] = useState(null);
  useEffect(() => {
    const s = localStorage.getItem(ADMIN_PIN_KEY);
    if (!s) hashPin(DEFAULT_PIN).then(h => { localStorage.setItem(ADMIN_PIN_KEY, h); setStored(h); });
    else setStored(s);
  }, []);
  async function submit() {
    if (!pin || pin.length < 4) { onToast({ message: 'PIN 4자리 이상 입력', type: 'error' }); return; }
    const h = await hashPin(pin);
    if (h === stored) onUnlock();
    else { onToast({ message: 'PIN 불일치', type: 'error' }); setPin(''); }
  }
  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24,
      background:'linear-gradient(135deg, #FFFBF5 0%, #FFF7ED 50%, #FFFBF5 100%)' }}>
      <div style={{ background:'#fff', borderRadius:24, padding:'40px 36px', maxWidth:420, width:'100%', boxShadow:'0 22px 48px rgba(15,31,92,.1)', border:'1px solid var(--border)' }}>
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <div style={{ width:60, height:60, margin:'0 auto 16px', borderRadius:18, background:'linear-gradient(135deg, var(--navy), var(--navy2))', display:'grid', placeItems:'center', fontSize:30 }}>💬</div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:6 }}>POUR스토어 챗봇센터</h1>
          <div style={{ fontSize:12, color:'var(--text-sm)', fontWeight:700 }}>봇 스튜디오 · 지식베이스 · 대화로그 · 분석</div>
        </div>
        <input type="password" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, '').slice(0, 8))}
          onKeyDown={e => e.key === 'Enter' && submit()} placeholder="PIN 입력 (기본 1234)" autoFocus
          style={{ width:'100%', padding:'16px 18px', fontSize:18, fontWeight:800, letterSpacing:6, textAlign:'center',
            border:'2px solid var(--border)', borderRadius:14, marginBottom:14, background:'var(--bg)', outline:'none', color:'var(--navy)' }} />
        <button onClick={submit} style={{ width:'100%', padding:'15px', background:'linear-gradient(135deg, var(--navy), var(--navy2))', color:'#fff', fontSize:14, fontWeight:900, borderRadius:14 }}>로그인 →</button>
        <div style={{ marginTop:16, padding:'10px 14px', background:'var(--or-pale)', border:'1px solid var(--or-l)', borderRadius:10, fontSize:11.5, color:'var(--text-md)', fontWeight:700, lineHeight:1.6 }}>
          💡 어드민센터와 동일한 PIN을 사용합니다 (기본 <b style={{ color:'var(--or-d)' }}>1234</b>)
        </div>
      </div>
    </div>
  );
}

function useCollection(name, deps = []) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const reload = async () => {
    setLoading(true);
    try {
      const snap = await db.collection(name).get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log(`[${name}] ${docs.length}건 로드`);
      setData(docs);
    } catch (e) { console.error(`[${name}] 로드 실패:`, e); }
    setLoading(false);
  };
  useEffect(() => { reload(); }, deps);
  return { data, loading, reload, setData };
}

function emptyBot(audience = 'internal') {
  return {
    name: '', audience,
    systemPrompt: PERSONA_SEED[audience],
    guardrails: [...GUARDRAIL_SEED[audience]],
    greeting: GREETING_SEED[audience],
    quickReplies: [...QUICKREPLY_SEED[audience]],
    model: DEFAULT_MODEL, maxTokens: 1024,
    status: 'draft',
  };
}
function BotStudioPage({ onToast, onTest }) {
  const { data: bots, loading, reload } = useCollection(COLLECTIONS.BOTS);
  const [editing, setEditing] = useState(null);

  const seedDefaults = async () => {
    if (!confirm('대상별 기본 봇 4종(내부·B2C·B2B·자사몰)을 생성합니다. 내부 팀봇만 게시(published) 상태로 만듭니다. 진행할까요?')) return;
    try {
      const existing = new Set(bots.map(b => b.audience + '|' + b.name));
      const batch = db.batch();
      let n = 0;
      for (const aud of AUDIENCE_KEYS) {
        const name = AUDIENCES[aud].label;
        if (existing.has(aud + '|' + name)) continue;
        const ref = db.collection(COLLECTIONS.BOTS).doc();
        batch.set(ref, { ...emptyBot(aud), name, status: aud === 'internal' ? 'published' : 'draft', createdAt: nowIso(), updatedAt: nowIso() });
        n++;
      }
      await batch.commit();
      onToast({ message: `${n}개 봇 생성 완료`, type: 'success' });
      reload();
    } catch (e) { onToast({ message: '생성 실패: ' + e.message, type: 'error' }); }
  };

  const save = async (bot) => {
    try {
      const payload = { ...bot, updatedAt: nowIso() };
      if (bot.id) { delete payload.id; await db.collection(COLLECTIONS.BOTS).doc(bot.id).update(payload); }
      else { payload.createdAt = nowIso(); await db.collection(COLLECTIONS.BOTS).add(payload); }
      onToast({ message: '저장 완료', type: 'success' });
      setEditing(null); reload();
    } catch (e) { onToast({ message: '저장 실패: ' + e.message, type: 'error' }); }
  };
  const remove = async (bot) => {
    if (!confirm(`'${bot.name}' 봇을 삭제할까요?`)) return;
    try { await db.collection(COLLECTIONS.BOTS).doc(bot.id).delete(); onToast({ message: '삭제됨', type: 'success' }); reload(); }
    catch (e) { onToast({ message: '삭제 실패: ' + e.message, type: 'error' }); }
  };
  const togglePublish = async (bot) => {
    const next = bot.status === 'published' ? 'draft' : 'published';
    try { await db.collection(COLLECTIONS.BOTS).doc(bot.id).update({ status: next, updatedAt: nowIso() }); reload(); }
    catch (e) { onToast({ message: e.message, type: 'error' }); }
  };

  return (
    <>
      <Header title="봇 스튜디오" subtitle="봇 프로필을 만들고 페르소나·가드레일·모델을 설정합니다. 하나의 엔진으로 여러 봇을 운영합니다."
        actions={<>
          {!loading && bots.length === 0 && <button onClick={seedDefaults} style={btnGhost()}>🌱 기본 봇 4종 생성</button>}
          <button onClick={() => setEditing(emptyBot('internal'))} style={btnPrimary()}>+ 새 봇</button>
        </>} />
      <div style={{ padding:'24px 32px' }}>
        {loading ? <div style={{ color:'var(--text-sm)', padding:40, textAlign:'center' }}>불러오는 중…</div>
        : bots.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text-sm)' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🤖</div>
            <div style={{ fontWeight:800, color:'var(--text-md)', marginBottom:6 }}>아직 봇이 없습니다</div>
            <div style={{ fontSize:12.5, marginBottom:18 }}>기본 봇 4종을 한 번에 만들거나, 새 봇을 직접 추가하세요.</div>
            <button onClick={seedDefaults} style={btnPrimary()}>🌱 기본 봇 4종 생성</button>
          </div>
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:16 }}>
            {bots.slice().sort((a,b) => AUDIENCE_KEYS.indexOf(a.audience) - AUDIENCE_KEYS.indexOf(b.audience)).map(bot => (
              <div key={bot.id} style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r)', padding:18, boxShadow:'var(--shadow)' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8, marginBottom:10 }}>
                  <div style={{ minWidth:0 }}>
                    <div style={{ fontSize:15, fontWeight:900, color:'var(--navy)', marginBottom:6 }}>{bot.name || '(이름 없음)'}</div>
                    <AudienceBadge audience={bot.audience} />
                  </div>
                  <button onClick={() => togglePublish(bot)} title="게시 상태 토글" style={{ fontSize:11, fontWeight:800, padding:'3px 9px', borderRadius:6,
                    color: bot.status === 'published' ? 'var(--green)' : 'var(--text-sm)',
                    background: bot.status === 'published' ? 'var(--green-l)' : 'var(--bg)',
                    border: `1px solid ${bot.status === 'published' ? 'var(--green-m)' : 'var(--border)'}` }}>
                    {bot.status === 'published' ? '● 게시중' : '○ 초안'}
                  </button>
                </div>
                <div style={{ fontSize:12, color:'var(--text-sm)', lineHeight:1.5, height:54, overflow:'hidden', marginBottom:12 }}>{bot.systemPrompt}</div>
                <div style={{ display:'flex', gap:6, fontSize:10.5, color:'var(--text-xs)', fontWeight:700, marginBottom:14, flexWrap:'wrap' }}>
                  <span style={{ background:'var(--bg)', padding:'2px 7px', borderRadius:5 }}>{modelMeta(bot.model).label.split(' —')[0]}</span>
                  <span style={{ background:'var(--bg)', padding:'2px 7px', borderRadius:5 }}>가드레일 {(bot.guardrails||[]).length}</span>
                  <span style={{ background:'var(--bg)', padding:'2px 7px', borderRadius:5 }}>퀵리플 {(bot.quickReplies||[]).length}</span>
                </div>
                <div style={{ display:'flex', gap:6 }}>
                  <button onClick={() => onTest(bot.id)} style={{ ...btnGhost({ flex:1 }), color:'var(--or-d)', borderColor:'var(--or-l)', background:'var(--or-pale)' }}>💬 테스트</button>
                  <button onClick={() => setEditing(bot)} style={btnGhost({ flex:1 })}>✏️ 편집</button>
                  <button onClick={() => remove(bot)} style={btnGhost({ color:'var(--red)' })}>🗑</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {editing && <BotEditModal bot={editing} onClose={() => setEditing(null)} onSave={save} />}
    </>
  );
}
function BotEditModal({ bot, onClose, onSave }) {
  const [f, setF] = useState({ ...bot, guardrails: [...(bot.guardrails||[])], quickReplies: [...(bot.quickReplies||[])] });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const applyAudienceSeed = (aud) => {
    if (!confirm('이 대상의 기본 페르소나·가드레일·인사말로 초기화할까요? (현재 입력 내용 덮어씀)')) return;
    setF(p => ({ ...p, audience: aud, systemPrompt: PERSONA_SEED[aud], guardrails: [...GUARDRAIL_SEED[aud]], greeting: GREETING_SEED[aud], quickReplies: [...QUICKREPLY_SEED[aud]] }));
  };
  return (
    <Modal open onClose={onClose} title={bot.id ? '봇 편집' : '새 봇 만들기'} width={760}>
      <div style={{ display:'grid', gap:16 }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <div>
            <label style={labelSty}>봇 이름</label>
            <input style={inputSty} value={f.name} onChange={e => set('name', e.target.value)} placeholder="예: 내부 팀봇" />
          </div>
          <div>
            <label style={labelSty}>대상</label>
            <select style={inputSty} value={f.audience} onChange={e => applyAudienceSeed(e.target.value)}>
              {AUDIENCE_KEYS.map(a => <option key={a} value={a}>{AUDIENCES[a].icon} {AUDIENCES[a].label}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label style={labelSty}>페르소나 (시스템 프롬프트)</label>
          <textarea style={{ ...inputSty, minHeight:90, resize:'vertical', lineHeight:1.6 }} value={f.systemPrompt} onChange={e => set('systemPrompt', e.target.value)} />
        </div>
        <div>
          <label style={labelSty}>가드레일 (절대 규칙) — 한 줄에 하나</label>
          <textarea style={{ ...inputSty, minHeight:110, resize:'vertical', lineHeight:1.6, fontSize:12.5 }}
            value={(f.guardrails || []).join('\n')} onChange={e => set('guardrails', e.target.value.split('\n').map(s => s.trim()).filter(Boolean))} />
          <div style={{ fontSize:11, color:'var(--text-xs)', marginTop:5 }}>고객봇은 견적 금액·타사 언급·근거없는 보증·개인정보 직접요청 금지 규칙을 유지하세요.</div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <div>
            <label style={labelSty}>모델</label>
            <select style={inputSty} value={f.model} onChange={e => set('model', e.target.value)}>
              {MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
          </div>
          <div>
            <label style={labelSty}>최대 응답 토큰</label>
            <input type="number" style={inputSty} value={f.maxTokens} onChange={e => set('maxTokens', parseInt(e.target.value) || 1024)} />
          </div>
        </div>
        <div>
          <label style={labelSty}>첫 인사말</label>
          <input style={inputSty} value={f.greeting} onChange={e => set('greeting', e.target.value)} />
        </div>
        <div>
          <label style={labelSty}>퀵리플라이 (쉼표로 구분)</label>
          <input style={inputSty} value={(f.quickReplies || []).join(', ')} onChange={e => set('quickReplies', e.target.value.split(',').map(s => s.trim()).filter(Boolean))} />
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:10, paddingTop:6 }}>
          <label style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, fontWeight:700, color:'var(--text-md)' }}>
            <input type="checkbox" checked={f.status === 'published'} onChange={e => set('status', e.target.checked ? 'published' : 'draft')} />

          </label>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={onClose} style={btnGhost()}>취소</button>

          </div>
        </div>
      </div>
    </Modal>
  );

function KnowledgePage({ onToast }) {
  const { data: kb, loading, reload } = useCollection(COLLECTIONS.KB);

  const [importing, setImporting] = useState(false);
  const [q, setQ] = useState('');
  const [audFilter, setAudFilter] = useState('all');

  const filtered = kb.filter(k =>
    (audFilter === 'all' || !Array.isArray(k.audience) || k.audience.length === 0 || k.audience.includes(audFilter)) &&
    (!q || ((k.q || '') + (k.a || '') + (k.tags || []).join(' ')).toLowerCase().includes(q.toLowerCase()))

        <input style={{ ...inputSty, maxWidth:280 }} placeholder="🔍 검색 (질문·답변·태그)" value={q} onChange={e => setQ(e.target.value)} />

                      {(k.tags||[]).map(t => <span key={t} style={{ fontSize:10.5, color:'var(--text-sm)', background:'var(--bg)', padding:'1px 7px', borderRadius:5, fontWeight:700 }}>#{t}</span>)}
                    </div>
                    <div style={{ fontSize:13.5, fontWeight:800, color:'var(--navy)', marginBottom:4 }}>{k.q}</div>
                    <div style={{ fontSize:12.5, color:'var(--text-md)', lineHeight:1.55, whiteSpace:'pre-wrap' }}>{(k.a||'').slice(0, 220)}{(k.a||'').length>220?'…':''}</div>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                    <button onClick={() => setEditing(k)} style={btnGhost({ padding:'6px 10px' })}>✏️</button>
                    <button onClick={() => remove(k)} style={btnGhost({ padding:'6px 10px', color:'var(--red)' })}>🗑</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {editing && <KbEditModal entry={editing} onClose={() => setEditing(null)} onSave={save} />}
      {importing && <KbImportModal onClose={() => setImporting(false)} onDone={() => { setImporting(false); reload(); }} onToast={onToast} />}
    </>
  );
}

  const toggleAud = (a) => setF(p => ({ ...p, audience: p.audience.includes(a) ? p.audience.filter(x => x !== a) : [...p.audience, a] }));
  return (
    <Modal open onClose={onClose} title={entry.id ? '지식 편집' : '지식 추가'} width={680}>
      <div style={{ display:'grid', gap:14 }}>
        <div>
          <label style={labelSty}>유형</label>
          <div style={{ display:'flex', gap:8 }}>

              <button key={t} onClick={() => set('type', t)} style={{ ...btnGhost({ flex:1 }), background: f.type===t?'var(--navy)':'var(--bg)', color: f.type===t?'#fff':'var(--text-md)', borderColor: f.type===t?'var(--navy)':'var(--border)' }}>

        <div>
          <label style={labelSty}>{f.type==='faq'?'질문':'제목'}</label>

        </div>
        <div>
          <label style={labelSty}>{f.type==='faq'?'답변':'본문'}</label>
          <textarea style={{ ...inputSty, minHeight:120, resize:'vertical', lineHeight:1.6 }} value={f.a} onChange={e => set('a', e.target.value)} />

          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {AUDIENCE_KEYS.map(a => (
              <button key={a} onClick={() => toggleAud(a)} style={{ ...btnGhost(), background: f.audience.includes(a)?AUDIENCES[a].bg:'var(--bg)', color: f.audience.includes(a)?AUDIENCES[a].color:'var(--text-sm)', borderColor: f.audience.includes(a)?AUDIENCES[a].border:'var(--border)' }}>
                {AUDIENCES[a].icon} {AUDIENCES[a].label}
              </button>
            ))}
          </div>
        </div>
        <div>
          <label style={labelSty}>태그 (쉼표로 구분)</label>
          <input style={inputSty} value={(f.tags||[]).join(', ')} onChange={e => set('tags', e.target.value.split(',').map(s => s.trim()).filter(Boolean))} placeholder="예: 반품, 환불, CS" />
        </div>
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8, paddingTop:4 }}>
          <button onClick={onClose} style={btnGhost()}>취소</button>
          <button onClick={() => { if (!f.q.trim() || !f.a.trim()) return alert('질문/답변을 입력하세요'); onSave(f); }} style={btnPrimary()}>저장</button>
        </div>
      </div>
    </Modal>
  );
}
function KbImportModal({ onClose, onDone, onToast }) {
  const [text, setText] = useState('');
  const [title, setTitle] = useState('');
  const [audience, setAudience] = useState(['internal']);
  const [mode, setMode] = useState('para'); // para: 문단 분할 / qa: Q:/A: 파싱
  const [busy, setBusy] = useState(false);
  const toggleAud = (a) => setAudience(p => p.includes(a) ? p.filter(x => x !== a) : [...p, a]);

  const parse = () => {
    if (mode === 'qa') {
      const entries = [];
      const blocks = text.split(/\n(?=\s*(?:Q[:.\)]|질문[:.\)]))/i);
      blocks.forEach(b => {
        const m = b.match(/(?:Q[:.\)]|질문[:.\)])\s*([\s\S]*?)\n\s*(?:A[:.\)]|답[변]?[:.\)])\s*([\s\S]*)/i);
        if (m) entries.push({ type:'faq', q: m[1].trim(), a: m[2].trim() });
      });
      return entries;
    }
    // 문단 분할: 빈 줄 기준, 헤딩(짧은 줄)을 제목으로
    return text.split(/\n\s*\n/).map(b => b.trim()).filter(b => b.length > 10).map((b, i) => {
      const firstLine = b.split('\n')[0].trim();
      const isHeading = firstLine.length <= 40 && b.split('\n').length > 1;
      return { type:'doc', q: isHeading ? firstLine : `${title || '문서'} #${i+1}`, a: isHeading ? b.split('\n').slice(1).join('\n').trim() : b };
    });
  };
  const preview = text.trim() ? parse() : [];

  const doImport = async () => {
    const entries = parse();
    if (!entries.length) { onToast({ message: '분할된 항목이 없습니다', type: 'error' }); return; }
    setBusy(true);
    try {
      const batch = db.batch();
      entries.forEach(e => {
        const ref = db.collection(COLLECTIONS.KB).doc();
        batch.set(ref, { ...e, tags: title ? [title] : [], audience, status:'active', source:'import', createdAt: nowIso(), updatedAt: nowIso() });
      });
      await batch.commit();
      onToast({ message: `${entries.length}건 임포트 완료`, type: 'success' });
      onDone();
    } catch (err) { onToast({ message: '임포트 실패: ' + err.message, type: 'error' }); }
    setBusy(false);
  };

  return (
    <Modal open onClose={onClose} title="매뉴얼 임포트" width={760}>
      <div style={{ display:'grid', gap:14 }}>
        <div style={{ fontSize:12.5, color:'var(--text-md)', background:'var(--or-pale)', border:'1px solid var(--or-l)', borderRadius:8, padding:'10px 12px', lineHeight:1.6 }}>
          기존 매뉴얼·SOP 문서를 붙여넣으면 자동으로 지식 항목으로 분할 저장합니다. 분할 후 [지식베이스]에서 개별 편집할 수 있습니다.
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <div>
            <label style={labelSty}>문서 제목(태그)</label>
            <input style={inputSty} value={title} onChange={e => setTitle(e.target.value)} placeholder="예: CS 응대 매뉴얼" />
          </div>
          <div>
            <label style={labelSty}>분할 방식</label>
            <select style={inputSty} value={mode} onChange={e => setMode(e.target.value)}>
              <option value="para">문단 분할 (빈 줄 기준)</option>
              <option value="qa">Q&amp;A 파싱 (Q:/A: 형식)</option>
            </select>
          </div>
        </div>
        <div>
          <label style={labelSty}>적용 대상</label>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {AUDIENCE_KEYS.map(a => (
              <button key={a} onClick={() => toggleAud(a)} style={{ ...btnGhost(), background: audience.includes(a)?AUDIENCES[a].bg:'var(--bg)', color: audience.includes(a)?AUDIENCES[a].color:'var(--text-sm)', borderColor: audience.includes(a)?AUDIENCES[a].border:'var(--border)' }}>
                {AUDIENCES[a].icon} {AUDIENCES[a].label}
              </button>
            ))}
          </div>
        </div>
        <div>
          <label style={labelSty}>매뉴얼 본문 붙여넣기</label>
          <textarea style={{ ...inputSty, minHeight:160, resize:'vertical', fontSize:12.5, lineHeight:1.6 }} value={text} onChange={e => setText(e.target.value)}
            placeholder={mode==='qa' ? 'Q: 반품은 어떻게 하나요?\nA: 수령 후 7일 이내...\n\nQ: ...' : '문단을 빈 줄로 구분해서 붙여넣으세요.'} />
        </div>
        {preview.length > 0 && <div style={{ fontSize:12, color:'var(--text-sm)', fontWeight:700 }}>분할 미리보기: <b style={{ color:'var(--or-d)' }}>{preview.length}</b>개 항목</div>}
        <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
          <button onClick={onClose} style={btnGhost()}>취소</button>
          <button onClick={doImport} disabled={busy || !preview.length} style={btnPrimary({ opacity: busy||!preview.length?.5:1 })}>{busy ? '저장 중…' : `${preview.length}건 임포트`}</button>
        </div>
      </div>
    </Modal>
  );
}

function PlaygroundPage({ onToast, cfg, presetBotId, onNeedSettings }) {
  const { data: bots } = useCollection(COLLECTIONS.BOTS);
  const { data: kb } = useCollection(COLLECTIONS.KB);
  const [botId, setBotId] = useState(presetBotId || '');
  const [msgs, setMsgs] = useState([]); // {role, content, ts}
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [usage, setUsage] = useState({ tin: 0, tout: 0 });
  const sessionRef = useRef(null);
  const scrollRef = useRef(null);

  const bot = bots.find(b => b.id === botId);
  useEffect(() => { if (!botId && bots.length) setBotId(presetBotId && bots.find(b=>b.id===presetBotId) ? presetBotId : bots[0].id); }, [bots]);
  useEffect(() => { resetChat(); }, [botId]);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs, sending]);

  function resetChat() {
    sessionRef.current = null; setUsage({ tin: 0, tout: 0 });
    setMsgs(bot ? [{ role: 'assistant', content: bot.greeting || '안녕하세요!', ts: nowIso() }] : []);
  }

  async function persistSession(allMsgs, addTin, addTout) {
    const data = {
      botId, botName: bot?.name || '', audience: bot?.audience || '', channel: 'playground',
      model: cfg.model, messages: allMsgs,
      tokensIn: usage.tin + addTin, tokensOut: usage.tout + addTout,
      turns: allMsgs.filter(m => m.role === 'user').length,
      resolved: null, rating: null, updatedAt: nowIso(),
    };
    try {
      if (!sessionRef.current) {
        data.startedAt = nowIso();
        const ref = await db.collection(COLLECTIONS.SESSIONS).add(data);
        sessionRef.current = ref.id;
      } else {
        await db.collection(COLLECTIONS.SESSIONS).doc(sessionRef.current).update(data);
      }
    } catch (e) { console.error('[session] 저장 실패:', e); }
  }

  async function send(text) {
    const content = (text != null ? text : input).trim();
    if (!content || sending || !bot) return;
    if (!aiConfigValid(cfg)) { onNeedSettings(); return; }
    setInput('');
    const userMsg = { role: 'user', content, ts: nowIso() };
    const base = [...msgs, userMsg];
    setMsgs(base); setSending(true);
    try {
      const kbBlock = buildKbBlock(kb, bot, content);
      const system = buildSystemPrompt(bot, kbBlock);
      // 대화 맥락은 최근 12개로 제한(토큰 절약)
      const history = base.filter(m => m.role === 'user' || m.role === 'assistant').slice(-12).map(m => ({ role: m.role, content: m.content }));
      const r = await callClaude(cfg, { system, messages: history, maxTokens: bot.maxTokens || cfg.maxTokens });
      const botMsg = { role: 'assistant', content: r.text || '(응답 없음)', ts: nowIso() };
      const next = [...base, botMsg];
      setMsgs(next);
      setUsage(u => ({ tin: u.tin + r.inputTokens, tout: u.tout + r.outputTokens }));
      await persistSession(next, r.inputTokens, r.outputTokens);
    } catch (e) {
      setMsgs(m => [...m, { role: 'assistant', content: '⚠️ 오류: ' + e.message, ts: nowIso(), error: true }]);
      onToast({ message: '호출 실패: ' + e.message, type: 'error' });
    }
    setSending(false);
  }

  async function rate(val) {
    if (!sessionRef.current) return;
    try { await db.collection(COLLECTIONS.SESSIONS).doc(sessionRef.current).update({ rating: val, updatedAt: nowIso() }); onToast({ message: '평가 저장됨', type: 'success' }); }
    catch (e) { onToast({ message: e.message, type: 'error' }); }
  }

  const costUSD = estCostUSD(cfg.model, usage.tin, usage.tout);

  return (
    <>
      <Header title="플레이그라운드" subtitle="봇과 실제 대화하며 테스트합니다. 모든 대화는 [대화 로그]에 저장되어 고도화 데이터가 됩니다."
        actions={
          <select style={{ ...inputSty, maxWidth:220 }} value={botId} onChange={e => setBotId(e.target.value)}>
            {bots.length === 0 && <option value="">봇 없음 — 먼저 생성</option>}
            {bots.map(b => <option key={b.id} value={b.id}>{AUDIENCES[b.audience]?.icon} {b.name}</option>)}
          </select>
        } />
      {!aiConfigValid(cfg) && (
        <div style={{ margin:'16px 32px 0', padding:'12px 16px', background:'var(--amber-l)', border:'1px solid var(--amber-m)', borderRadius:10, fontSize:12.5, fontWeight:700, color:'#92400E', display:'flex', justifyContent:'space-between', alignItems:'center', gap:10 }}>
          <span>⚠️ AI 워커 설정이 필요합니다. (Worker URL · Secret · Anthropic Key)</span>
          <button onClick={onNeedSettings} style={btnGhost({ background:'#fff' })}>설정으로 →</button>
        </div>
      )}
      <div style={{ padding:'18px 32px', display:'flex', flexDirection:'column', height:'calc(100vh - 92px)' }}>
        <div style={{ flex:1, display:'flex', flexDirection:'column', background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r-lg)', overflow:'hidden', boxShadow:'var(--shadow)' }}>
          <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--border-s)', display:'flex', justifyContent:'space-between', alignItems:'center', gap:8, flexWrap:'wrap' }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              {bot && <AudienceBadge audience={bot.audience} />}
              <span style={{ fontSize:12, color:'var(--text-sm)', fontWeight:700 }}>{modelMeta(cfg.model).label.split(' —')[0]}</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <span style={{ fontSize:11, color:'var(--text-xs)', fontWeight:700 }}>토큰 {usage.tin}↓ {usage.tout}↑ · 약 ${costUSD.toFixed(4)} (₩{Math.round(costUSD*USD_KRW).toLocaleString()})</span>
              <button onClick={resetChat} style={btnGhost({ padding:'5px 10px', fontSize:11.5 })}>↻ 새 대화</button>
            </div>
          </div>
          <div ref={scrollRef} className="cb-scroll" style={{ flex:1, overflowY:'auto', padding:'18px 18px', background:'var(--bg)' }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ display:'flex', justifyContent: m.role==='user'?'flex-end':'flex-start', marginBottom:12 }}>
                <div style={{ maxWidth:'74%', padding:'10px 14px', borderRadius: m.role==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px',
                  background: m.role==='user'?'linear-gradient(135deg, var(--navy), var(--navy2))': m.error?'var(--red-l)':'#fff',
                  color: m.role==='user'?'#fff':'var(--text)', border: m.role==='user'?'none':'1px solid var(--border)',
                  fontSize:13.5, lineHeight:1.6, whiteSpace:'pre-wrap', boxShadow:'var(--shadow)' }}>{m.content}</div>
              </div>
            ))}
            {sending && (
              <div style={{ display:'flex', justifyContent:'flex-start', marginBottom:12 }}>
                <div style={{ padding:'12px 16px', borderRadius:'14px 14px 14px 4px', background:'#fff', border:'1px solid var(--border)' }}>
                  {[0,1,2].map(i => <span key={i} style={{ display:'inline-block', width:7, height:7, borderRadius:'50%', background:'var(--text-xs)', margin:'0 2px', animation:`cbBlink 1.2s ${i*0.2}s infinite` }} />)}
                </div>
              </div>
            )}
          </div>
          {bot && (bot.quickReplies||[]).length > 0 && msgs.length <= 1 && (
            <div style={{ padding:'10px 16px 0', display:'flex', gap:8, flexWrap:'wrap' }}>
              {bot.quickReplies.map((qr, i) => <button key={i} onClick={() => send(qr)} style={{ ...btnGhost({ padding:'7px 12px', fontSize:12 }), background:'var(--or-pale)', borderColor:'var(--or-l)', color:'var(--or-d)' }}>{qr}</button>)}
            </div>
          )}
          <div style={{ padding:'12px 16px', borderTop:'1px solid var(--border-s)', display:'flex', gap:10, alignItems:'flex-end' }}>
            <textarea value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
              placeholder={bot ? '메시지를 입력하세요 (Enter 전송, Shift+Enter 줄바꿈)' : '먼저 봇을 선택하세요'} disabled={!bot}
              rows={1} style={{ ...inputSty, resize:'none', maxHeight:120, minHeight:42, padding:'11px 14px' }} />
            <button onClick={() => send()} disabled={sending || !bot || !input.trim()} style={btnPrimary({ opacity: sending||!bot||!input.trim()?.5:1, padding:'11px 20px' })}>전송</button>
          </div>
          {sessionRef.current && (
            <div style={{ padding:'8px 16px 12px', display:'flex', gap:8, alignItems:'center', justifyContent:'flex-end' }}>
              <span style={{ fontSize:11, color:'var(--text-xs)', fontWeight:700 }}>이 답변 어땠나요?</span>
              <button onClick={() => rate('up')} style={btnGhost({ padding:'5px 10px' })}>👍</button>
              <button onClick={() => rate('down')} style={btnGhost({ padding:'5px 10px' })}>👎</button>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

                  <span style={{ fontSize:10.5, color:'var(--text-xs)', fontWeight:700 }}>{relativeTime(s.startedAt)}</span>
                </div>
                <div style={{ fontSize:12.5, color:'var(--text-md)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{last ? last.content : '(대화 없음)'}</div>
                <div style={{ display:'flex', gap:6, marginTop:7, alignItems:'center' }}>
                  <span style={{ fontSize:10, color:'var(--text-xs)', fontWeight:700 }}>{s.turns||0}턴</span>
                  {s.rating==='up' && <span style={{ fontSize:11 }}>👍</span>}
                  {s.rating==='down' && <span style={{ fontSize:11 }}>👎</span>}
                  {s.resolved===true && <Badge color="var(--green)" bg="var(--green-l)" border="var(--green-m)">해결</Badge>}
                  {s.resolved===false && <Badge color="var(--red)" bg="var(--red-l)" border="var(--red-m)">미해결</Badge>}
                </div>
              </button>
            );
          })}
        </div>
        <div className="cb-scroll" style={{ flex:1, overflowY:'auto', background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r-lg)', boxShadow:'var(--shadow)' }}>
          {!sel ? <div style={{ padding:60, textAlign:'center', color:'var(--text-sm)' }}>왼쪽에서 대화를 선택하세요</div>
          : (
            <>
              <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border-s)', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10, position:'sticky', top:0, background:'#fff', zIndex:1 }}>
                <div>
                  <div style={{ fontSize:14, fontWeight:900, color:'var(--navy)' }}>{sel.botName}</div>
                  <div style={{ fontSize:11, color:'var(--text-sm)', fontWeight:700, marginTop:2 }}>{fmtDate(sel.startedAt)} · {sel.turns||0}턴 · 토큰 {sel.tokensIn||0}↓ {sel.tokensOut||0}↑</div>
                </div>
                <div style={{ display:'flex', gap:6 }}>
                  <button onClick={() => setResolved(sel, true)} style={btnGhost({ color: sel.resolved===true?'var(--green)':'var(--text-md)' })}>✓ 해결</button>
                  <button onClick={() => setResolved(sel, false)} style={btnGhost({ color: sel.resolved===false?'var(--red)':'var(--text-md)' })}>✕ 미해결</button>
                </div>
              </div>
              <div style={{ padding:'18px 20px' }}>
                {(sel.messages||[]).map((m, i) => {
                  const prevUser = m.role==='assistant' ? (sel.messages.slice(0, i).reverse().find(x => x.role==='user')) : null;
                  return (
                    <div key={i} style={{ display:'flex', justifyContent: m.role==='user'?'flex-end':'flex-start', marginBottom:10 }}>
                      <div style={{ maxWidth:'78%' }}>
                        <div style={{ padding:'9px 13px', borderRadius: m.role==='user'?'12px 12px 4px 12px':'12px 12px 12px 4px',
                          background: m.role==='user'?'var(--navy)':'var(--bg)', color: m.role==='user'?'#fff':'var(--text)',
                          fontSize:13, lineHeight:1.55, whiteSpace:'pre-wrap' }}>{m.content}</div>
                        {m.role==='assistant' && prevUser && !m.error && (
                          <button onClick={() => setPromote({ type:'faq', q: prevUser.content, a: m.content, tags:[], audience: sel.audience?[sel.audience]:[] })}
                            style={{ fontSize:10.5, color:'var(--or-d)', fontWeight:700, marginTop:4, padding:'2px 4px' }}>＋ 지식베이스로 승격</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      </div>
      {promote && <KbEditModal entry={promote} onClose={() => setPromote(null)} onSave={savePromote} />}
    </>
  );
}

// ============================================================
// 5) 대시보드 — 비용(내부/고객용) · 봇별 사용량·비용 · 인기 질문
// ============================================================
const CUSTOMER_AUDIENCES = ['b2c', 'b2b', 'store'];
function isCustomer(aud) { return CUSTOMER_AUDIENCES.includes(aud); }
function won(usd) { return Math.round((usd || 0) * USD_KRW).toLocaleString(); }

function DashboardPage({ cfg }) {
  const { data: sessions, loading } = useCollection(COLLECTIONS.SESSIONS);
  const { data: bots } = useCollection(COLLECTIONS.BOTS);
  const { data: kb } = useCollection(COLLECTIONS.KB);
  const [period, setPeriod] = useState('month'); // month | 30d | all

  const now = new Date();
  const periodLabel = { month: '이번 달', '30d': '최근 30일', all: '전체' }[period];

  const stats = useMemo(() => {
    const inPeriod = (iso) => {
      if (period === 'all') return true;
      const d = new Date(iso); if (isNaN(d)) return false;
      if (period === 'month') return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
      return (now.getTime() - d.getTime()) <= 30 * 24 * 3600 * 1000;
    };
    const list = sessions.filter(s => inPeriod(s.startedAt || s.updatedAt));
    const cost = (s) => estCostUSD(s.model || cfg.model, s.tokensIn, s.tokensOut);

    let usdInternal = 0, usdCustomer = 0, usdTotal = 0, tin = 0, tout = 0;
    let unresolved = 0, up = 0, down = 0, turns = 0;
    const byBot = {};
    list.forEach(s => {
      const c = cost(s); usdTotal += c;
      const aud = s.audience || 'internal';
      if (isCustomer(aud)) usdCustomer += c; else usdInternal += c;
      tin += s.tokensIn || 0; tout += s.tokensOut || 0; turns += s.turns || 0;
      if (s.resolved === false) unresolved++;
      if (s.rating === 'up') up++; if (s.rating === 'down') down++;
      const key = s.botId || s.botName || '?';
      const b = byBot[key] || (byBot[key] = { name: s.botName || '(삭제된 봇)', audience: aud, convos: 0, tin: 0, tout: 0, usd: 0, turns: 0, up: 0, down: 0, unresolved: 0 });
      b.convos++; b.tin += s.tokensIn || 0; b.tout += s.tokensOut || 0; b.usd += c; b.turns += s.turns || 0;
      if (s.rating === 'up') b.up++; if (s.rating === 'down') b.down++; if (s.resolved === false) b.unresolved++;
    });

    // 인기 질문 — 고객이 보낸 user 메시지 빈도
    const qCount = {};
    list.forEach(s => (s.messages || []).forEach(m => {
      if (m.role !== 'user') return;
      const raw = (m.content || '').trim().replace(/\s+/g, ' ');
      if (raw.length < 2) return;
      const key = raw.length > 70 ? raw.slice(0, 70) + '…' : raw;
      const e = qCount[key] || (qCount[key] = { count: 0, internal: 0, customer: 0 });
      e.count++; if (isCustomer(s.audience)) e.customer++; else e.internal++;
    }));
    const topQuestions = Object.entries(qCount).map(([q, v]) => ({ q, ...v })).sort((a, b) => b.count - a.count).slice(0, 12);

    // 이번 달 월말 예상 (현재 추세 단순 외삽)
    let projInternal = usdInternal, projCustomer = usdCustomer, projTotal = usdTotal;
    if (period === 'month') {
      const day = now.getDate();
      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      const f = day > 0 ? daysInMonth / day : 1;
      projInternal = usdInternal * f; projCustomer = usdCustomer * f; projTotal = usdTotal * f;
    }

    const botRows = Object.values(byBot).sort((a, b) => b.convos - a.convos);
    return { count: list.length, usdInternal, usdCustomer, usdTotal, projInternal, projCustomer, projTotal,
      tin, tout, unresolved, up, down, turns, botRows, topQuestions, avgTurns: list.length ? (turns / list.length).toFixed(1) : 0 };
  }, [sessions, period, cfg.model]);

  const periodBtn = (id, label) => (
    <button onClick={() => setPeriod(id)} style={{ padding:'7px 14px', borderRadius:8, fontSize:12.5, fontWeight:800,
      background: period === id ? 'var(--navy)' : 'var(--bg)', color: period === id ? '#fff' : 'var(--text-md)',
      border: `1px solid ${period === id ? 'var(--navy)' : 'var(--border)'}` }}>{label}</button>
  );

  // 비용 카드 (내부/고객용/합계)
  const costCard = (title, icon, usd, proj, accent) => (
    <div style={{ background:'#fff', border:`1px solid var(--border)`, borderLeft:`4px solid ${accent}`, borderRadius:'var(--r)', padding:'18px 20px', boxShadow:'var(--shadow)' }}>
      <div style={{ fontSize:12.5, color:'var(--text-md)', fontWeight:800, marginBottom:10, display:'flex', alignItems:'center', gap:6 }}>{icon} {title}</div>
      <div style={{ fontSize:28, fontWeight:900, color: accent, letterSpacing:-0.5 }}>₩{won(usd)}</div>
      <div style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:700, marginTop:3 }}>${usd.toFixed(3)} · {periodLabel} 누적</div>
      {period === 'month' && (
        <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:700, marginTop:8, paddingTop:8, borderTop:'1px dashed var(--border)' }}>
          📈 월말 예상 <b style={{ color: accent }}>₩{won(proj)}</b> <span style={{ opacity:.7 }}>(현재 추세)</span>
        </div>
      )}
    </div>
  );

  const miniCard = (label, val, sub, color) => (
    <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r)', padding:'14px 16px', boxShadow:'var(--shadow)' }}>
      <div style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:700, marginBottom:6 }}>{label}</div>
      <div style={{ fontSize:20, fontWeight:900, color: color || 'var(--navy)', letterSpacing:-0.4 }}>{val}</div>
      {sub && <div style={{ fontSize:10.5, color:'var(--text-xs)', fontWeight:700, marginTop:3 }}>{sub}</div>}
    </div>
  );

  const maxConvos = Math.max(1, ...stats.botRows.map(b => b.convos));
  const maxQ = Math.max(1, ...stats.topQuestions.map(q => q.count));

  return (
    <>
      <Header title="대시보드" subtitle="비용(내부/고객용)·봇별 사용량·인기 질문을 한눈에. 데이터가 쌓일수록 정확해집니다."
        actions={<div style={{ display:'flex', gap:6 }}>{periodBtn('month', '이번 달')}{periodBtn('30d', '최근 30일')}{periodBtn('all', '전체')}</div>} />
      <div className="cb-scroll" style={{ padding:'24px 32px', overflowY:'auto', height:'calc(100vh - 92px)' }}>
        {loading ? <div style={{ color:'var(--text-sm)', padding:40, textAlign:'center' }}>집계 중…</div> : (
          <>
            {/* 비용 — 내부 / 고객용 / 합계 */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(240px, 1fr))', gap:14, marginBottom:18 }}>
              {costCard('내부용 (CS팀 봇)', '🧑‍💼', stats.usdInternal, stats.projInternal, 'var(--navy)')}
              {costCard('고객용 (B2C·B2B·자사몰)', '🛒', stats.usdCustomer, stats.projCustomer, 'var(--or-d)')}
              {costCard('합계', '💰', stats.usdTotal, stats.projTotal, 'var(--green)')}
            </div>
            <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:600, marginBottom:22, lineHeight:1.6 }}>
              ※ 비용은 모델 토큰 단가 기반 추정치입니다(환율 ₩{USD_KRW.toLocaleString()}/$ 가정). 실제 청구액은 Anthropic 콘솔 기준이며, 한국어는 토큰을 더 써서 1.2~1.3배 높게 나올 수 있습니다.
            </div>

            {/* 요약 미니 카드 */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(150px, 1fr))', gap:12, marginBottom:26 }}>
              {miniCard('대화 수', stats.count.toLocaleString(), `평균 ${stats.avgTurns}턴`)}
              {miniCard('미해결', stats.unresolved.toLocaleString(), '지식베이스 보강 대상', stats.unresolved ? 'var(--red)' : 'var(--green)')}
              {miniCard('만족도', `👍${stats.up} / 👎${stats.down}`, '플레이그라운드 평가')}
              {miniCard('누적 토큰', (stats.tin + stats.tout).toLocaleString(), `${stats.tin}↓ ${stats.tout}↑`)}
              {miniCard('게시 봇', `${bots.filter(b => b.status === 'published').length} / ${bots.length}`, '게시 / 전체')}
              {miniCard('지식 항목', kb.length.toLocaleString(), 'FAQ·문서')}
            </div>

            {/* 봇별 사용량·비용 랭킹 */}
            <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r)', padding:'18px 20px', boxShadow:'var(--shadow)', marginBottom:22 }}>
              <div style={{ fontSize:13.5, fontWeight:900, color:'var(--navy)', marginBottom:4 }}>🏆 봇별 사용량 · 비용</div>
              <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:600, marginBottom:14 }}>가장 많이 쓰인 봇과 봇별 추정비용 ({periodLabel})</div>
              {stats.botRows.length === 0 ? <div style={{ fontSize:12.5, color:'var(--text-sm)', padding:'16px 0' }}>아직 데이터가 없습니다. 플레이그라운드에서 봇과 대화하면 쌓입니다.</div>
              : (
                <div style={{ overflowX:'auto' }}>
                  <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12.5 }}>
                    <thead>
                      <tr style={{ color:'var(--text-sm)', fontWeight:800, textAlign:'left', borderBottom:'1px solid var(--border)' }}>
                        <th style={{ padding:'8px 6px' }}>봇</th>
                        <th style={{ padding:'8px 6px' }}>대상</th>
                        <th style={{ padding:'8px 6px', textAlign:'right' }}>대화수</th>
                        <th style={{ padding:'8px 6px', textAlign:'right' }}>평균턴</th>
                        <th style={{ padding:'8px 6px', textAlign:'right' }}>토큰</th>
                        <th style={{ padding:'8px 6px', textAlign:'right' }}>추정비용</th>
                        <th style={{ padding:'8px 6px', textAlign:'right' }}>만족</th>
                        <th style={{ padding:'8px 6px', textAlign:'right' }}>미해결</th>
                      </tr>
                    </thead>
                    <tbody>
                      {stats.botRows.map((b, i) => {
                        const a = AUDIENCES[b.audience] || AUDIENCES.internal;
                        return (
                          <tr key={i} style={{ borderBottom:'1px solid var(--border-s)' }}>
                            <td style={{ padding:'9px 6px', fontWeight:800, color:'var(--navy)' }}>
                              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                                <span style={{ flex:1, minWidth:90, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{b.name}</span>
                                <div style={{ width:50, height:6, background:'var(--bg)', borderRadius:4, overflow:'hidden', flexShrink:0 }}>
                                  <div style={{ width:`${(b.convos / maxConvos) * 100}%`, height:'100%', background:'linear-gradient(90deg, var(--or), var(--or-d))' }} />
                                </div>
                              </div>
                            </td>
                            <td style={{ padding:'9px 6px' }}><span style={{ fontSize:11, color:a.color }}>{a.icon} {isCustomer(b.audience) ? '고객' : '내부'}</span></td>
                            <td style={{ padding:'9px 6px', textAlign:'right', fontWeight:800 }}>{b.convos}</td>
                            <td style={{ padding:'9px 6px', textAlign:'right', color:'var(--text-md)' }}>{b.convos ? (b.turns / b.convos).toFixed(1) : 0}</td>
                            <td style={{ padding:'9px 6px', textAlign:'right', color:'var(--text-sm)' }}>{(b.tin + b.tout).toLocaleString()}</td>
                            <td style={{ padding:'9px 6px', textAlign:'right', fontWeight:800, color:'var(--or-d)' }}>₩{won(b.usd)}</td>
                            <td style={{ padding:'9px 6px', textAlign:'right' }}>{b.up || b.down ? `👍${b.up} 👎${b.down}` : '-'}</td>
                            <td style={{ padding:'9px 6px', textAlign:'right', color: b.unresolved ? 'var(--red)' : 'var(--text-xs)', fontWeight: b.unresolved ? 800 : 400 }}>{b.unresolved || '-'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>

            {/* 인기 질문 */}
            <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r)', padding:'18px 20px', boxShadow:'var(--shadow)' }}>
              <div style={{ fontSize:13.5, fontWeight:900, color:'var(--navy)', marginBottom:4 }}>💬 많이 한 질문 TOP {stats.topQuestions.length || ''}</div>
              <div style={{ fontSize:11, color:'var(--text-xs)', fontWeight:600, marginBottom:14 }}>자주 묻는 주제 → 지식베이스/FAQ로 승격하면 봇이 정확해집니다 ({periodLabel})</div>
              {stats.topQuestions.length === 0 ? <div style={{ fontSize:12.5, color:'var(--text-sm)', padding:'16px 0' }}>아직 질문 데이터가 없습니다.</div>
              : stats.topQuestions.map((q, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:9 }}>
                  <div style={{ width:22, fontSize:12, fontWeight:900, color:'var(--text-xs)', textAlign:'right' }}>{i + 1}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12.5, fontWeight:700, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{q.q}</div>
                    <div style={{ height:5, background:'var(--bg)', borderRadius:4, overflow:'hidden', marginTop:4 }}>
                      <div style={{ width:`${(q.count / maxQ) * 100}%`, height:'100%', background:'linear-gradient(90deg, var(--navy), var(--blue))' }} />
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:5, alignItems:'center', flexShrink:0 }}>
                    {q.customer > 0 && <span title="고객" style={{ fontSize:10 }}>🛒{q.customer}</span>}
                    {q.internal > 0 && <span title="내부" style={{ fontSize:10 }}>🧑‍💼{q.internal}</span>}
                    <span style={{ fontSize:12, fontWeight:900, color:'var(--navy)', minWidth:24, textAlign:'right' }}>{q.count}</span>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </>
  );
}

function SettingsPage({ cfg, onSave, onToast }) {
  const [f, setF] = useState({ ...cfg });
  const [pin1, setPin1] = useState(''); const [pin2, setPin2] = useState('');
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const changePin = async () => {
    if (!pin1 || pin1.length < 4) return onToast({ message: 'PIN 4자리 이상', type: 'error' });
    if (pin1 !== pin2) return onToast({ message: 'PIN 불일치', type: 'error' });
    const h = await hashPin(pin1);
    localStorage.setItem(ADMIN_PIN_KEY, h);
    setPin1(''); setPin2('');
    onToast({ message: 'PIN 변경됨 (어드민센터 공통)', type: 'success' });
  };

  return (
    <>
      <Header title="설정" subtitle="AI 워커 연결 · 모델 · PIN. 무료한도 단계에선 Haiku + 낮은 토큰 상한을 권장합니다." />
      <div style={{ padding:'24px 32px', maxWidth:720, display:'grid', gap:20 }}>
        <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r)', padding:'20px 22px', boxShadow:'var(--shadow)' }}>
          <div style={{ fontSize:14, fontWeight:900, color:'var(--navy)', marginBottom:4 }}>🔌 AI 워커 연결</div>
          <div style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:600, marginBottom:16, lineHeight:1.6 }}>
            기존 <code style={{ background:'var(--bg)', padding:'1px 5px', borderRadius:4 }}>workers/claude-proxy.js</code>를 배포한 뒤 URL·Secret을 입력하세요. Anthropic 키는 워커로만 전달되고 브라우저에 노출되지 않습니다(내부용).
          </div>
          <div style={{ display:'grid', gap:14 }}>
            <div><label style={labelSty}>Worker URL</label><input style={inputSty} value={f.workerUrl} onChange={e => set('workerUrl', e.target.value)} placeholder="https://pour-claude-proxy.YOURDOMAIN.workers.dev" /></div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
              <div><label style={labelSty}>Worker Secret</label><input type="password" style={inputSty} value={f.workerSecret} onChange={e => set('workerSecret', e.target.value)} /></div>
              <div><label style={labelSty}>Anthropic API Key</label><input type="password" style={inputSty} value={f.claudeApiKey} onChange={e => set('claudeApiKey', e.target.value)} placeholder="sk-ant-..." /></div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
              <div><label style={labelSty}>기본 모델</label>
                <select style={inputSty} value={f.model} onChange={e => set('model', e.target.value)}>{MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}</select>
              </div>
              <div><label style={labelSty}>기본 최대 토큰</label><input type="number" style={inputSty} value={f.maxTokens} onChange={e => set('maxTokens', parseInt(e.target.value)||1024)} /></div>
            </div>
            <div style={{ display:'flex', justifyContent:'flex-end' }}>
              <button onClick={() => { onSave(f); onToast({ message: '설정 저장됨', type: 'success' }); }} style={btnPrimary()}>저장</button>
            </div>
          </div>
        </div>
        <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--r)', padding:'20px 22px', boxShadow:'var(--shadow)' }}>
          <div style={{ fontSize:14, fontWeight:900, color:'var(--navy)', marginBottom:16 }}>🔑 PIN 변경 <span style={{ fontSize:11, color:'var(--text-xs)', fontWeight:700 }}>(어드민센터와 공통)</span></div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:12, alignItems:'end' }}>
            <div><label style={labelSty}>새 PIN</label><input type="password" style={inputSty} value={pin1} onChange={e => setPin1(e.target.value.replace(/\D/g,'').slice(0,8))} /></div>
            <div><label style={labelSty}>새 PIN 확인</label><input type="password" style={inputSty} value={pin2} onChange={e => setPin2(e.target.value.replace(/\D/g,'').slice(0,8))} /></div>
            <button onClick={changePin} style={btnPrimary()}>변경</button>
          </div>
        </div>
        <div style={{ fontSize:11.5, color:'var(--text-xs)', lineHeight:1.7, background:'var(--or-pale)', border:'1px solid var(--or-l)', borderRadius:10, padding:'12px 14px' }}>
          ⚠️ 현재 설정은 <b>이 브라우저</b>에만 저장됩니다(localStorage). 고객용 위젯(B2C/B2B/자사몰)은 시크릿 노출 위험이 있어 별도 공개 엔드포인트 설계가 필요합니다 — 3차에서 진행 예정.
        </div>
      </div>
    </>
  );
}

// ============================================================
// App
// ============================================================
function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [active, setActive] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [cfg, setCfg] = useState(loadAiConfig);
  const [presetBotId, setPresetBotId] = useState(null);

  const saveCfg = (c) => { setCfg(c); saveAiConfig(c); };
  const goTest = (botId) => { setPresetBotId(botId); setActive('playground'); };

  if (!unlocked) {
    return (<>
      <PinScreen onUnlock={() => setUnlocked(true)} onToast={setToast} />
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </>);
  }

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar active={active} onNav={(id) => { setPresetBotId(null); setActive(id); }} onLogout={() => setUnlocked(false)} cfgValid={aiConfigValid(cfg)} />
      <main style={{ flex:1, minWidth:0, background:'var(--bg)' }}>
        {active === 'dashboard' && <DashboardPage cfg={cfg} />}
        {active === 'studio' && <BotStudioPage onToast={setToast} onTest={goTest} />}
        {active === 'knowledge' && <KnowledgePage onToast={setToast} />}
        {active === 'playground' && <PlaygroundPage onToast={setToast} cfg={cfg} presetBotId={presetBotId} onNeedSettings={() => setActive('settings')} />}
        {active === 'logs' && <LogsPage onToast={setToast} />}
        {active === 'settings' && <SettingsPage cfg={cfg} onSave={saveCfg} onToast={setToast} />}
      </main>
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
// 인브라우저 Babel — classic 런타임으로 직접 변환 (admin.html과 동일 패턴)
(function(){
  try{
    var src = document.getElementById('appsrc').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]], filename: 'chatbot.jsx' }).code;
    var s = document.createElement('script');
    s.text = out;
    document.body.appendChild(s);
  }catch(e){
    console.error('[chatbot] Babel 변환 실패:', e);
    var r = document.getElementById('root');
    if(r) r.innerHTML = '<div style="padding:40px;font-family:Pretendard,sans-serif;color:#b91c1c;font-size:14px">앱 로딩 오류: ' + (e&&e.message||e) + '</div>';
  }
})();
</script>
</body>
</html>
