<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const COLLECTIONS = {
  DEALERS: 'dealers',
  DEALER_ORDERS: 'dealer-orders',
};
const SETUP_KEY = 'pourKioskSetup'; // { dealerId, dealerName, ts }
const SETUP_TTL = 30 * 24 * 60 * 60 * 1000; // 30 days

async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function fmtPrice(n) { return n == null ? '-' : Number(n).toLocaleString('ko-KR'); }
function normalizePhone(p) { return (p || '').replace(/[^0-9]/g, ''); }
function loadSetup() {
  try {
    const raw = localStorage.getItem(SETUP_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (Date.now() - (s.ts || 0) > SETUP_TTL) { localStorage.removeItem(SETUP_KEY); return null; }
    return s;
  } catch (e) { return null; }
}
function saveSetup(s) { localStorage.setItem(SETUP_KEY, JSON.stringify({ ...s, ts: Date.now() })); }
function clearSetup() { localStorage.removeItem(SETUP_KEY); }

// ============================================================
// QR Code component
// ============================================================
function QRCode({ value, size = 240 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.QRCode) return;
    ref.current.innerHTML = '';
    new window.QRCode(ref.current, {
      text: value, width: size, height: size,
      colorDark: '#0F1F5C', colorLight: '#ffffff',
      correctLevel: window.QRCode.CorrectLevel.M,
    });
  }, [value, size]);
  return <div ref={ref} style={{ display:'inline-block', padding:14, background:'#fff', borderRadius:14, boxShadow:'0 6px 24px rgba(15,31,92,.15)' }} />;
}

// ============================================================
// Setup Screen — 처음 키오스크에 대리점 바인딩
// ============================================================
function SetupScreen({ onReady, onError }) {
  const [phone, setPhone] = useState('');
  const [pin, setPin] = useState('');
  const [busy, setBusy] = useState(false);

  async function bind() {
    if (!phone || !pin) { onError('전화번호와 PIN을 입력하세요'); return; }
    setBusy(true);
    try {
      const np = normalizePhone(phone);
      const snap = await db.collection(COLLECTIONS.DEALERS).get();
      const dealer = snap.docs.map(d => ({ id:d.id, ...d.data() })).find(d => normalizePhone(d.contactPhone) === np);
      if (!dealer) { onError('등록된 대리점을 찾을 수 없습니다'); setBusy(false); return; }
      if (!dealer.portalPinHash) { onError('PIN이 설정되지 않았습니다 — POUR스토어 어드민에 문의'); setBusy(false); return; }
      const h = await hashPin(pin);
      if (h !== dealer.portalPinHash) { onError('PIN 불일치'); setBusy(false); return; }
      if (dealer.contractStatus !== '활성') { onError('계약 상태가 활성이 아닙니다'); setBusy(false); return; }
      saveSetup({ dealerId: dealer.id, dealerName: dealer.companyName });
      onReady({ dealerId: dealer.id, dealerName: dealer.companyName });
    } catch (e) {
      console.error(e);
      onError('연결 실패: ' + e.message);
    } finally { setBusy(false); }
  }

  return (
    <div style={{ width:'100%', height:'100%', display:'grid', placeItems:'center', padding:40 }}>
      <div className="fade-in" style={{ background:'#fff', borderRadius:28, padding:'48px 44px', maxWidth:520, width:'100%', boxShadow:'0 22px 60px rgba(15,31,92,.15)', border:'1px solid var(--border)' }}>
        <div style={{ textAlign:'center', marginBottom:32 }}>
          <div style={{ width:72, height:72, margin:'0 auto 18px', borderRadius:22, background:'linear-gradient(135deg, var(--or), var(--or-d))', display:'grid', placeItems:'center', fontSize:36, color:'#fff', boxShadow:'0 10px 24px rgba(249,115,22,.3)' }}>📱</div>
          <h1 style={{ fontSize:28, fontWeight:900, color:'var(--navy)', letterSpacing:-0.8, marginBottom:8 }}>키오스크 초기 설정</h1>
          <div style={{ fontSize:14, color:'var(--text-md)', fontWeight:700, lineHeight:1.65 }}>대리점 계정으로 1회 바인딩하면 이 태블릿이 매장 키오스크로 작동합니다</div>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={{ display:'block', fontSize:12, fontWeight:800, color:'var(--or-d)', letterSpacing:.5, marginBottom:8 }}>대리점 전화번호</label>
          <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="010-0000-0000" autoFocus
            style={{ width:'100%', padding:'16px 20px', fontSize:18, fontWeight:700, border:'2px solid var(--border)', borderRadius:14, background:'var(--bg)', outline:'none' }} />
        </div>
        <div style={{ marginBottom:18 }}>
          <label style={{ display:'block', fontSize:12, fontWeight:800, color:'var(--or-d)', letterSpacing:.5, marginBottom:8 }}>PIN (4자리 이상)</label>
          <input type="password" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, '').slice(0, 8))} onKeyDown={e => e.key==='Enter'&&bind()}
            style={{ width:'100%', padding:'16px 20px', fontSize:22, fontWeight:800, letterSpacing:8, textAlign:'center', border:'2px solid var(--border)', borderRadius:14, background:'var(--bg)', outline:'none' }} />
        </div>
        <button onClick={bind} disabled={busy} style={{
          width:'100%', padding:'18px', background: busy ? '#9CA3AF' : 'linear-gradient(135deg, var(--or), var(--or-d))', color:'#fff',
          fontSize:16, fontWeight:900, borderRadius:14, boxShadow:'0 8px 22px rgba(249,115,22,.35)'
        }}>{busy ? '연결 중...' : '키오스크 시작 →'}</button>
      </div>
    </div>
  );
}

            <div style={{ fontSize:32, marginBottom:8 }}>👨‍💼</div>
            <div style={{ fontSize:15, fontWeight:900, color:'var(--navy)', letterSpacing:-.3, marginBottom:6 }}>매장 직원이 도와드립니다</div>
            <div style={{ fontSize:11.5, color:'var(--text-md)', fontWeight:700, lineHeight:1.65 }}>주문번호 <b style={{ color:'var(--or-d)' }}>{order.orderNo || '-'}</b>로<br/>본사몰(Cafe24)에서 결제 처리</div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:6, fontSize:12, color:'var(--text-md)', fontWeight:700, lineHeight:1.6, textAlign:'left', padding:'0 6px' }}>
            <div>✓ 카드 / 계좌이체 / 무통장 가능</div>
            <div>✓ 영수증 자동 발송</div>
            <div>✓ 본사 직배송 — 빠른 도착</div>
          </div>
          <div style={{ marginTop:14, padding:'10px 12px', background:'#fff', border:'1px dashed var(--or-l)', borderRadius:10, fontSize:11, color:'var(--text-md)', fontWeight:700 }}>
            본인 폰으로도 결제 가능 — <a href={cafe24Url} style={{ color:'var(--or-d)', fontWeight:900, textDecoration:'underline' }}>www.pourstore.net</a>
          </div>
        </div>
      </div>

      {order.customerName && (
        <div style={{ marginTop:18, padding:'12px 18px', background:'#fff', border:'1px solid var(--border)', borderRadius:12, display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:8, fontSize:13, fontWeight:700, color:'var(--text-md)' }}>
          <span>주문자: <b style={{ color:'var(--navy)' }}>{order.customerName}</b> · {order.customerPhone || '-'}</span>
          <span style={{ fontSize:11, color:'var(--text-xs)' }}>{order.shippingAddress || ''}</span>
        </div>
      )}
    </div>
  );
}

// ============================================================
// Paid Screen
// ============================================================
function PaidScreen({ order }) {
  return (
    <div className="fade-in" style={{ width:'100%', height:'100%', display:'grid', placeItems:'center', padding:40, background:'linear-gradient(135deg, #ECFDF5, #D1FAE5)' }}>
      <div style={{ textAlign:'center', maxWidth:560 }}>
        <div className="pulse" style={{ width:120, height:120, margin:'0 auto 32px', borderRadius:'50%', background:'#fff', display:'grid', placeItems:'center', fontSize:60, boxShadow:'0 16px 40px rgba(5,150,105,.3)' }}>✅</div>
        <h1 style={{ fontSize:42, fontWeight:900, color:'var(--navy)', letterSpacing:-1.2, marginBottom:14 }}>결제 완료!</h1>
        <p style={{ fontSize:17, color:'var(--text-md)', lineHeight:1.7, fontWeight:700, marginBottom:24 }}>
          주문이 정상 접수되었습니다.<br/>
          POUR스토어가 빠르게 처리해 드릴게요.
        </p>
        <div style={{ padding:'16px 24px', background:'#fff', borderRadius:14, border:'1px solid var(--green-l)', display:'inline-block' }}>
          <div style={{ fontSize:11, fontWeight:800, color:'var(--green)', letterSpacing:.5, marginBottom:4 }}>주문번호</div>
          <div style={{ fontSize:18, fontWeight:900, color:'var(--navy)', fontFamily:'monospace' }}>{order.orderNo || '-'}</div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// App
// ============================================================
function App() {
  const [setup, setSetup] = useState(loadSetup());
  const [latestOrder, setLatestOrder] = useState(null);
  const [error, setError] = useState(null);
  const [showAdmin, setShowAdmin] = useState(false);
  const [mode, setMode] = useState(null);  // null = 메인 메뉴 / 'guide'/'catalog'/'estimate'/'videos'/'qr'

  useEffect(() => {
    if (!setup) return;
    // 실시간 구독 — 해당 대리점의 최신 활성 주문
    const unsub = db.collection(COLLECTIONS.DEALER_ORDERS)
      .where('dealerId', '==', setup.dealerId)
      .onSnapshot(snap => {
        const list = snap.docs.map(d => ({ id:d.id, ...d.data() }));
        // 활성 = 결제대기/결제완료/배송준비 중에서 가장 최신
        const active = list
          .filter(o => ['결제대기','결제완료','배송준비'].includes(o.status))
          .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''))[0];
        // 최근 60초 내 결제완료된 주문은 PaidScreen 표시
        if (active) setLatestOrder(active);
        else {
          const justPaid = list
            .filter(o => o.status === '결제완료' && o.updatedAt && (Date.now() - new Date(o.updatedAt).getTime()) < 60000)
            .sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''))[0];
          setLatestOrder(justPaid || null);
        }
      }, err => { console.error(err); setError('실시간 동기화 실패: ' + err.message); });
    return unsub;
  }, [setup]);

  useEffect(() => {
    if (!error) return;
    const t = setTimeout(() => setError(null), 3500);
    return () => clearTimeout(t);
  }, [error]);

  // 주문이 들어오면 어느 모드에 있든 자동으로 OrderDisplay 전환
  useEffect(() => {
    if (latestOrder && mode) setMode(null);
  }, [latestOrder]);

  function reset() { clearSetup(); setSetup(null); setLatestOrder(null); setShowAdmin(false); setMode(null); }

  if (!setup) {
    return (
      <>
        <SetupScreen onReady={s => setSetup(s)} onError={e => setError(e)} />
        {error && <ErrorBanner message={error} />}
      </>
    );
  }

  if (showAdmin) {
    return (
      <div style={{ width:'100%', height:'100%', display:'grid', placeItems:'center', padding:40 }}>
        <div style={{ background:'#fff', borderRadius:24, padding:'40px 36px', maxWidth:480, width:'100%', boxShadow:'0 22px 48px rgba(15,31,92,.1)', border:'1px solid var(--border)' }}>
          <h2 style={{ fontSize:20, fontWeight:900, color:'var(--navy)', marginBottom:8 }}>키오스크 설정</h2>
          <div style={{ fontSize:13, color:'var(--text-md)', marginBottom:24, fontWeight:700 }}>현재 바인딩된 대리점</div>
          <div style={{ padding:'18px 20px', background:'var(--bg)', borderRadius:12, marginBottom:24, fontSize:16, fontWeight:900, color:'var(--navy)' }}>{setup.dealerName}</div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={() => setShowAdmin(false)} style={{ flex:1, padding:'14px', background:'#fff', color:'var(--text-md)', border:'1px solid var(--border)', borderRadius:12, fontSize:14, fontWeight:800 }}>닫기</button>
            <button onClick={reset} style={{ flex:1, padding:'14px', background:'var(--red)', color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:800 }}>키오스크 해제</button>
          </div>
        </div>
      </div>
    );
  }

  const isPaid = latestOrder && latestOrder.status === '결제완료';

  return (
    <>
      {/* 주문 발생 시 — 모든 모드 무시하고 OrderDisplay/PaidScreen */}
      {latestOrder && !isPaid && <OrderDisplay order={latestOrder} dealer={setup} />}
      {latestOrder && isPaid && <PaidScreen order={latestOrder} />}
      {/* 주문 없을 때 — 모드 전환 */}
      {!latestOrder && !mode && <WelcomeScreen dealer={setup} onAdmin={() => setShowAdmin(true)} onMode={setMode} />}
      {!latestOrder && mode && <ModePlaceholder mode={mode} dealer={setup} onBack={() => setMode(null)} />}
      {error && <ErrorBanner message={error} />}
    </>
  );
}

function ErrorBanner({ message }) {
  return (
    <div style={{ position:'fixed', bottom:30, left:'50%', transform:'translateX(-50%)', padding:'12px 22px', background:'#DC2626', color:'#fff', borderRadius:12, fontSize:13, fontWeight:700, boxShadow:'0 6px 24px rgba(0,0,0,.25)', zIndex:5000 }}>
      ❌ {message}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
