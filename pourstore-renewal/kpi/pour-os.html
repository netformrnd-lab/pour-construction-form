<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POUR OS — 팀 실행 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --bg4: #262626;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --text: #e8e8e8;
  --text2: #a0a0a0;
  --text3: #666;
  --accent: #e8632a;
  --accent2: #ff7a3d;
  --accent-dim: rgba(232,99,42,0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.15);
  --yellow: #eab308;
  --yellow-dim: rgba(234,179,8,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.15);
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.main { flex: 1; overflow-y: auto; background: var(--bg); }

/* ── SIDEBAR ── */
.sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
.logo { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
.logo span { color: var(--text2); font-weight: 400; font-size: 12px; display: block; margin-top: 2px; }
.member-select { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.member-select label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.member-btn { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg3); cursor: pointer; color: var(--text); font-size: 13px; font-family: inherit; transition: all 0.15s; }
.member-btn:hover { border-color: var(--accent); }
.member-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.member-info { flex: 1; text-align: left; }
.member-name { font-size: 13px; font-weight: 600; }
.member-role { font-size: 11px; color: var(--text3); }
.nav-section { padding: 8px 0; }
.nav-label { padding: 6px 16px 4px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; border-left: 2px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
.nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
.sidebar-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); }
.api-btn { width: 100%; padding: 8px; border-radius: var(--radius-sm); border: 1px dashed var(--border2); background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.api-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── PAGE HEADER ── */
.page-header { padding: 24px 28px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.page-title { font-size: 20px; font-weight: 700; }
.page-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); border: none; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 6px; border-radius: var(--radius-sm); background: transparent; border: 1px solid var(--border2); color: var(--text2); cursor: pointer; font-size: 14px; transition: all 0.15s; }
.btn-icon:hover { background: var(--bg3); color: var(--text); }

/* ── CARDS ── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
.card-header { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.card-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.card-body { padding: 12px 16px; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-orange { background: var(--accent-dim); color: var(--accent); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-gray { background: var(--bg4); color: var(--text3); }

/* ── PRIORITY DOTS ── */
.priority { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.priority-high { background: var(--red); }
.priority-mid { background: var(--yellow); }
.priority-low { background: var(--green); }
/* ── TAB BUTTONS ── */
.tab-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 12px; font-family: inherit; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.tab-btn:hover { background: var(--bg3); color: var(--text); }
.tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── PROGRESS ── */
.progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.3s; }
.progress-fill.blue { background: var(--blue); }
.progress-fill.green { background: var(--green); }

/* ── SECTIONS ── */
.page-content { padding: 20px 28px; display: flex; flex-direction: column; gap: 20px; }

/* ── WEEKLY PLAN SECTION ── */
.weekly-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.day-col { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.day-header { padding: 8px 10px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.day-name { font-size: 12px; font-weight: 600; }
.day-date { font-size: 11px; color: var(--text3); }
.day-header.today { background: var(--accent-dim); }
.day-header.today .day-name { color: var(--accent); }
.day-tasks { padding: 6px; min-height: 80px; display: flex; flex-direction: column; gap: 4px; }
.week-task-item { padding: 5px 8px; border-radius: 5px; background: var(--bg3); border: 1px solid var(--border); font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.week-task-item:hover { border-color: var(--accent); }
.week-task-item.done { opacity: 0.4; text-decoration: line-through; }
.week-task-item.pulled { border-color: var(--blue); background: var(--blue-dim); }
.week-slot { display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:5px; font-size:12px; margin-bottom:3px; cursor:pointer; transition:all .15s; }
.week-slot.empty { border:1px dashed var(--border2); color:var(--text3); }
.week-slot.empty:hover { border-color:var(--accent); color:var(--accent); background:rgba(99,102,241,.06); }
.week-slot.filled { background:var(--bg3); border:1px solid var(--border); }
.week-slot.filled:hover { border-color:var(--accent); }
.week-slot.filled.done { opacity:.5; }
.slot-num { font-size:10px; font-weight:700; color:var(--accent); min-width:14px; }
.slot-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.slot-empty-text { font-size:11px; }
.slot-dday { font-size:10px; font-weight:600; padding:1px 4px; border-radius:3px; background:rgba(99,102,241,.15); color:var(--accent); white-space:nowrap; }
.slot-dday.dday-today { background:rgba(34,197,94,.2); color:#22c55e; }
.slot-dday.dday-over { background:rgba(239,68,68,.15); color:var(--red); }
.dday-badge { font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; }
.dday-badge.dday-upcoming { background:rgba(99,102,241,.15); color:var(--accent); }
.dday-badge.dday-today { background:rgba(34,197,94,.2); color:#22c55e; }
.dday-badge.dday-over { background:rgba(239,68,68,.15); color:var(--red); }
.today-badge { font-size:10px; font-weight:600; padding:1px 6px; border-radius:10px; background:var(--accent); color:#fff; margin-left:4px; }
.add-day-task { padding: 4px 8px; border-radius: 5px; border: 1px dashed var(--border2); background: transparent; color: var(--text3); font-size: 11px; cursor: pointer; font-family: inherit; width: 100%; text-align: left; transition: all 0.15s; }
.add-day-task:hover { border-color: var(--accent); color: var(--accent); }

/* ── TODAY SECTION ── */
.today-grid { display: grid; grid-template-columns: 1fr 280px; gap: 16px; }
.task-table { width: 100%; border-collapse: collapse; }
.task-table th { padding: 8px 10px; text-align: left; font-size: 11px; color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border); background: var(--bg3); }
.task-table td { padding: 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
.task-table tr:hover td { background: var(--bg3); }
.task-table tr.done-row td { opacity: 0.45; }
.task-row-check { padding: 8px 10px; }
.task-row-check input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
.task-row-text { padding: 8px 6px; }
.task-row-text input { background: transparent; border: none; color: var(--text); font-size: 13px; font-family: inherit; width: 100%; outline: none; }
.task-row-text input::placeholder { color: var(--text3); }
.task-row-text input:focus { background: var(--bg4); border-radius: 4px; padding: 2px 4px; }
.task-row-project { padding: 8px 6px; }
.task-row-priority { padding: 8px 10px; }
.task-row-attach { padding: 8px 10px; }
.task-row-actions { padding: 8px 10px; }
.project-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: var(--bg4); color: var(--text2); cursor: pointer; border: 1px solid var(--border); white-space: nowrap; }
.project-tag:hover { border-color: var(--blue); color: var(--blue); }
.proj-inline-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; padding: 3px 6px; cursor: pointer; max-width: 130px; font-family: inherit; }
.proj-inline-select:hover { border-color: var(--accent); }
.proj-inline-select:focus { outline: none; border-color: var(--accent); }
.quick-add-row { background: rgba(232,99,42,0.04); }
.quick-add-row td { padding: 8px 10px; border-top: 2px dashed rgba(232,99,42,0.2); border-bottom: none !important; }
.quick-add-row:hover td { background: rgba(232,99,42,0.06); }
.quick-add-row #quickAddInput::placeholder { color: var(--text3); font-style: italic; }
.attach-count { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text3); cursor: pointer; }
.attach-count:hover { color: var(--blue); }
.fixed-task-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
.fixed-task-item:last-child { border-bottom: none; }
.fixed-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--purple-dim); color: var(--purple); font-weight: 600; flex-shrink: 0; }

/* ── CALENDAR SECTION ── */
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
.cal-header-cell { background: var(--bg3); padding: 8px; text-align: center; font-size: 11px; color: var(--text3); font-weight: 500; }
.cal-cell { background: var(--bg2); padding: 6px; min-height: 80px; position: relative; }
.cal-cell.other-month { background: var(--bg); }
.cal-cell.today-cell { background: var(--accent-dim); }
.cal-date { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.cal-cell.today-cell .cal-date { color: var(--accent); font-weight: 700; }
/* 통합 캘린더 */
.cal-head { padding:8px 4px; text-align:center; font-size:11px; color:var(--text3); font-weight:600; border-bottom:1px solid var(--border); }
.cal-table { width:100%; border-collapse:collapse; table-layout:fixed; }
.cal-table th, .cal-table td { width: calc(100% / 7); }
.cal-head.cal-sun { color:#ef4444; }
.cal-head.cal-sat { color:#3b82f6; }
.cal-cell { vertical-align:top; padding:6px; height:110px; border:1px solid var(--border); cursor:pointer; transition:background .1s; overflow:hidden; }
.cal-cell:hover { background:var(--bg3); }
.cal-cell.empty { background:var(--bg); cursor:default; height:110px; }
.cal-cell.cal-today { background:rgba(232,99,42,.08); }
.cal-cell.cal-sun .cal-day-num { color:#ef4444; }
.cal-cell.cal-sat .cal-day-num { color:#3b82f6; }
.cal-day-num { font-size:12px; font-weight:600; margin-bottom:4px; }
.cal-cell.cal-today .cal-day-num { color:var(--accent); }
.cal-evt { font-size:10px; padding:2px 5px; border-radius:3px; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
.cal-task-chip { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.cal-task-chip.overdue { background: var(--red-dim); color: var(--red); }
.cal-task-chip.upcoming { background: var(--blue-dim); color: var(--blue); }
.cal-task-chip.today-task { background: var(--accent-dim); color: var(--accent); }

/* ── PROJECT PROGRESS ── */
.project-list { display: flex; flex-direction: column; gap: 8px; }
.project-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; }
.project-row:hover { border-color: var(--border2); background: var(--bg3); }
.project-row-info { flex: 1; min-width: 0; }
.project-row-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-row-meta { font-size: 11px; color: var(--text3); display: flex; gap: 10px; }
.project-row-progress { width: 160px; flex-shrink: 0; }
.project-row-pct { font-size: 12px; font-weight: 600; text-align: right; margin-bottom: 4px; }

/* ── COMPANY VIEW ── */
.member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.member-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.member-card-header { padding: 12px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.member-card-body { padding: 12px 14px; }
.member-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.member-stat-row:last-child { border-bottom: none; }
.member-stat-label { color: var(--text3); }
.member-stat-value { font-weight: 600; }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; }
.modal.modal-large { max-width: 800px; }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.form-input, .form-select, .form-textarea { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-select option { background: var(--bg3); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── MEMBER PICKER OVERLAY ── */
.member-picker { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; }
.member-picker-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 480px; max-width: 90vw; }
.member-picker-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.member-picker-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.member-picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.member-pick-btn { padding: 14px 10px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg3); cursor: pointer; text-align: center; transition: all 0.15s; color: var(--text); font-family: inherit; }
.member-pick-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
.member-pick-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; margin: 0 auto 8px; }
.member-pick-name { font-size: 13px; font-weight: 600; }
.member-pick-role { font-size: 11px; color: var(--text3); margin-top: 2px; }
.add-member-btn { width: 100%; padding: 10px; border-radius: var(--radius); border: 1px dashed var(--border2); background: transparent; color: var(--text3); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.add-member-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; z-index: 9999; animation: slideUp 0.2s ease; max-width: 300px; }
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── TABS ── */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); padding: 0 28px; background: var(--bg2); }
.tab { padding: 10px 16px; font-size: 13px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; font-weight: 500; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 32px 20px; color: var(--text3); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty-text { font-size: 13px; }

/* ── SECTION TITLE ── */
.section-title { font-size: 13px; font-weight: 700; color: var(--text2); display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.section-title .count { background: var(--bg4); color: var(--text3); font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 500; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── MOBILE (≤ 768px) ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .app-shell { flex-direction: column; }
  .main-content { padding-bottom: 80px; } /* bottom-nav 가림 방지 */

  /* 페이지 헤더 — 세로 정렬 + 버튼 줄바꿈 */
  .page-header { padding: 14px 16px; flex-direction: column; align-items: stretch; gap: 10px; }
  .page-header .header-actions { flex-wrap: wrap; gap: 6px; }
  .page-header .header-actions .btn,
  .page-header .header-actions .form-input { font-size: 12px; padding: 6px 10px; }
  .page-header .header-actions .form-input { width: 100% !important; min-width: 0; }
  .page-title { font-size: 18px; }
  .page-subtitle { font-size: 11px; }
  .page-content { padding: 12px; }

  /* 그리드들 일괄 1열 */

  .today-grid { grid-template-columns: 1fr; }

  /* 테이블 가로 스크롤 (오늘 업무 등) */

  /* 빠른 추가 행 모바일 보완 */

  /* 프로젝트 행 */

  .project-row-info { min-width: 100%; }
  .project-row-progress { width: 100%; }

  /* 모달 — 화면 거의 가득 */
  .modal { padding: 8px !important; }
  .modal-content { width: 100% !important; max-width: 100% !important; max-height: 92vh !important; }
  .modal-body { padding: 14px !important; max-height: 65vh; overflow-y: auto; }

  /* form-row 1열 */

  /* OKR 트리 1열 */
  .card .card-body > div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }

  /* 탭 가로 스크롤 */
  .tabs { padding: 0 12px; overflow-x: auto; flex-wrap: nowrap; white-space: nowrap; }
  .tabs::-webkit-scrollbar { display: none; }

  /* 멤버 선택 */
  .member-picker-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }

  /* 카드 패딩 약간 줄임 */
  .card { padding: 12px; }
  .section-title { font-size: 13px; padding: 0 2px; }

  /* bottom-nav 표시 */
  .bottom-nav { display: flex; }
}

/* ── 작은 모바일 (≤ 480px) ── */
@media (max-width: 480px) {
  .weekly-grid { grid-template-columns: 1fr; }
  .page-title { font-size: 16px; }
  .task-table th { font-size: 9px; }
}
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; font-size: 10px; color: var(--text3); cursor: pointer; gap: 3px; border: none; background: none; font-family: inherit; }

/* ── ATTACH LIST ── */

/* ── JOURNAL ── */

.journal-text { font-size: 13px; line-height: 1.6; white-space: pre-wrap; }

</style>
</head>

<!-- MODALS -->
<div id="modalContainer"></div>

<script>
// ══════════════════════════════════════════════
// DATA STORE
// ══════════════════════════════════════════════
const STORE_KEY = 'pour-os-v21';
const LEGACY_KEYS = ['pour-os-v20', 'pour-os-v19', 'pour-os-v18', 'pour-os-v17', 'pour-os-v16', 'pour-os-v15', 'pour-os-v14', 'pour-os-v13', 'pour-os-v12', 'pour-os-v11', 'pour-os-v10', 'pour-os-v9', 'pour-os-v8', 'pour-os-v7', 'pour-os-v6', 'pour-os-v5'];
const LAST_BACKUP_KEY = 'pour-os-last-backup';
let state = loadState();

function loadState() {
  try {
    // v7 데이터 우선 로드
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return migrateNoteFields(JSON.parse(raw));
    // 이전 버전 자동 마이그레이션 (v6 → v5 순으로 탐색)
    for (const legacy of LEGACY_KEYS) {
      const rawLegacy = localStorage.getItem(legacy);
      if (rawLegacy) {
        const old = JSON.parse(rawLegacy);
        const migrated = Object.assign(defaultState(), old);
        if (migrated.tasks) migrated.tasks = migrated.tasks.map(t => ({ status: 'active', notes: [], doneAt: null, ...t }));
        if (migrated.kpis) migrated.kpis = migrated.kpis.map(k => ({ source: 'manual', history: [], ...k }));
        if (!migrated.scheduleEvents) migrated.scheduleEvents = [];
        if (!migrated.journals) migrated.journals = [];
        if (!migrated.objectives) migrated.objectives = [];    // v11 신규
        if (!migrated.keyResults) migrated.keyResults = [];    // v11 신규
        if (!migrated.recurringTasks) migrated.recurringTasks = [];  // v14 신규
        if (!migrated.customerEvents) migrated.customerEvents = [];  // v18 신규
        const fixed = migrateNoteFields(migrated);
        localStorage.setItem(STORE_KEY, JSON.stringify(fixed));
        console.log(`[POUR OS] ${legacy} → ${STORE_KEY} 마이그레이션 완료`);
        return fixed;
      }
    }
  } catch(e) { console.error('[POUR OS] loadState 오류:', e); }
  return defaultState();
}

// v6 이하 메모 필드 통일 (text ↔ content 혼용 → content로 통일)
function migrateNoteFields(s) {
  if (s.tasks) {
    s.tasks.forEach(t => {
      if (Array.isArray(t.notes)) {
        t.notes = t.notes.map(n => {
          if (n.text && !n.content) return { ...n, content: n.text };
          return n;
        });
      }
    });
  }
  return s;
}

function defaultState() {
  return {
    currentMember: null,
    members: [
      { id: 'm1', name: '대표', role: '전략/기획', color: '#e8632a', initial: '대' },
      { id: 'm2', name: '마케팅', role: '콘텐츠/광고', color: '#3b82f6', initial: '마' },
      { id: 'm3', name: '영업', role: '파트너/B2B', color: '#22c55e', initial: '영' },
    ],
    tasks: [],       // { id, memberId, title, done, priority, projectId, dueDate, isFixed, attachments, weekDay, createdAt }
    projects: [],    // v11: { id, memberId, name, category, status, progress, dueDate, description, kpiId?, contribution? }
    journals: [],    // { id, memberId, date, content, aiResult, createdAt }
    fixedTasks: [],  // { id, memberId, title, time, color }
    objectives: [],  // v11: { id, memberId, title, year, target, current, unit, description }
    keyResults: [],  // v11: { id, objectiveId, title, target, current, unit, channel, description }
    recurringTasks: [], // v14: { id, memberId, title, recurType('daily'|'weekly'|'monthly'), weekDay?, monthDay?, time, priority, projectId, description, active, createdAt }
    customerEvents: [], // v18: { id, customerType('B2C'|'B2B'), eventKind, title, description, startDate, endDate?, time, status, ownerId, channels:[], target, expectedReach?, budget?, notes, attachments, createdAt }
    okrs: [],        // v10 호환 (사용 안 함, 마이그레이션 시 비움)
    kpis: [],        // v11: { id, memberId, keyResultId, name, target, baseline, unit, source('auto'|'manual'), current(manual용), history:[] }
    meetings: [],    // { id, memberId, title, date, attendees, agenda, notes, actionItems, createdAt }
    scheduleEvents: [], // { id, title, type(박람회|탐방|미팅|프로젝트|기타), date, endDate, description, memberId, projectId, color }
    apiKey: '',
  };
}

function saveState() {
  try {
    const json = JSON.stringify(state);
    localStorage.setItem(STORE_KEY, json);
    // 용량 표시: localStorage는 보통 5-10MB 한도. 4MB 이상 경고
    const usedKB = Math.round(json.length / 1024);
    const usedMB = (usedKB / 1024).toFixed(2);
    const pct = Math.min(100, Math.round(usedKB / 5120 * 100)); // 5MB 기준
    const warn = document.getElementById('storageWarning');
    const meter = document.getElementById('storageMeter');
    const meterBar = document.getElementById('storageMeterBar');
    const meterText = document.getElementById('storageMeterText');
    if (warn) warn.style.display = usedKB > 4000 ? 'block' : 'none';
    if (meter && meterBar && meterText) {
      meterBar.style.width = pct + '%';
      meterBar.style.background = pct >= 80 ? '#ef4444' : pct >= 60 ? '#eab308' : '#22c55e';
      meterText.textContent = `${usedMB}MB / ~5MB`;
    }
    // 백업 권유 (7일 이상 미백업)
    checkBackupReminder();
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      alert('⚠️ 저장 공간이 가득 찼습니다. 백업 후 오래된 데이터를 정리해주세요.');
    } else {
      console.error('[POUR OS] saveState 오류:', e);
    }
  }
}

function checkBackupReminder() {
  const last = localStorage.getItem(LAST_BACKUP_KEY);
  const reminderEl = document.getElementById('backupReminder');
  if (!reminderEl) return;
  if (!last) { reminderEl.style.display = 'block'; return; }
  const days = Math.floor((Date.now() - parseInt(last)) / (1000*60*60*24));
  reminderEl.style.display = days >= 7 ? 'block' : 'none';
}

// v12에서 v11 시드 데이터(p_seed11_*) 감지·정리·재시드
function checkLegacyManualProjects() {
  if (!state.currentMember) return;
  if (localStorage.getItem('pour-os-v12-cleanup-shown')) return;
  if (state.currentMember !== 'm1') return;
  // v11 시드: p_seed11_*, kpi.mode 보유, 매출 O 단일 (운영 O 없음)
  const v11Projects = state.projects.filter(p => p.id && p.id.startsWith('p_seed11_'));
  const v10Projects = state.projects.filter(p => p.id && (p.id.startsWith('p_kpi_') || p.id.startsWith('p_seed_page')));
  const v10Tasks = state.tasks.filter(t => t.id && (t.id.startsWith('t_kpi_') || t.id.startsWith('t_seed_page')));
  const v10Kpis = state.kpis.filter(k => k.memberId === state.currentMember && k.mode);
  const v10Okrs = state.okrs.filter(o => o.id && o.id.startsWith('o_seed_'));
  // 이미 운영 O가 있으면 v12 시드 완료 상태
  const hasOpsObj = state.objectives.some(o => o.memberId === state.currentMember && o.title.includes('운영 시스템'));
  if (hasOpsObj) {
    localStorage.setItem('pour-os-v12-cleanup-shown','1');
    return;
  }
  const totalCleanup = v11Projects.length + v10Projects.length + v10Kpis.length;
  if (totalCleanup === 0 && state.objectives.length === 0) {
    // 시드 받아본 적 없는 신규 사용자
    return;
  }
  showModal(`
    <div class="modal-header"><div class="modal-title">🔄 v12 OKR 트리 업그레이드</div><button class="modal-close" onclick="closeModal();localStorage.setItem('pour-os-v12-cleanup-shown','1')">×</button></div>
    <div class="modal-body">
      <div style="font-size:13px;line-height:1.7;color:var(--text2);margin-bottom:14px">
        v12에서는 OKR 트리가 확장되었습니다:<br>
        ➕ <strong>O2 운영 시스템</strong> (매출관리·매뉴얼·어드민)<br>
        ➕ <strong>4개 신규 프로젝트</strong> (CRM 센터·POUR 길잡이·자사몰 포스팅·상품 콘텐츠 패키지)<br>
        ➕ <strong>auto-progress 모드</strong> (운영 시스템 KPI용 진척률 평균)
      </div>
      ${v11Projects.length > 0 || v10Projects.length > 0 ? `
        <div class="card" style="padding:12px;margin-bottom:12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2)">
          <div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:6px">정리 대상 (이전 버전 시드)</div>
          <div style="font-size:12px;color:var(--text2)">v11 시드 프로젝트: ${v11Projects.length}개</div>
          <div style="font-size:12px;color:var(--text2)">v10 시드 프로젝트: ${v10Projects.length}개</div>
          <div style="font-size:12px;color:var(--text2)">v10 시드 업무: ${v10Tasks.length}개</div>
          <div style="font-size:12px;color:var(--text2)">v10 시드 KPI: ${v10Kpis.length}개</div>
        </div>
      ` : ''}
      <div class="card" style="padding:12px;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2)">
        <div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px">새로 시드될 v12 트리</div>
        <div style="font-size:12px;color:var(--text2)">Objective 2 · Key Result 3 · KPI 9 · Project 17</div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:10px">사용자가 직접 만든 프로젝트·업무·O·KR은 모두 유지됩니다.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal();localStorage.setItem('pour-os-v12-cleanup-shown','1')">나중에</button>
      <button class="btn btn-primary btn-sm" onclick="cleanupLegacyManualProjects()">🔄 정리 + v12 트리 시드</button>
    </div>
  `, 'large');
}

function cleanupLegacyManualProjects() {
  const beforeProj = state.projects.length;
  const beforeTasks = state.tasks.length;
  const beforeKpis = state.kpis.length;
  // 이전 버전 시드 제거 (사용자 직접 데이터는 보존)
  state.projects = state.projects.filter(p => !(p.id && (p.id.startsWith('p_seed11_') || p.id.startsWith('p_kpi_') || p.id.startsWith('p_seed_page'))));
  state.tasks = state.tasks.filter(t => !(t.id && (t.id.startsWith('t_kpi_') || t.id.startsWith('t_seed_page'))));
  state.kpis = state.kpis.filter(k => !k.mode && k.source !== 'seed');
  state.okrs = state.okrs.filter(o => !(o.id && o.id.startsWith('o_seed_')));
  // v11 시드 Objective와 KR도 제거 (사용자가 직접 만든 게 아닌 시드)
  state.objectives = state.objectives.filter(o => !(o.title === '2026년 매출액 10억 달성' && state.keyResults.some(kr => kr.objectiveId === o.id && (kr.channel === 'inbound' || kr.channel === 'outbound'))));
  state.keyResults = state.keyResults.filter(kr => state.objectives.some(o => o.id === kr.objectiveId));
  saveState();
  localStorage.setItem('pour-os-v12-cleanup-shown','1');
  closeModal();
  seedKpisIfFresh();
  toast(`🔄 v12 적용: 정리 ${beforeProj-state.projects.length}/${beforeTasks-state.tasks.length}/${beforeKpis-state.kpis.length} (프로젝트/업무/KPI)`);
  navigate('okr');
}

function getMember() {
  return state.members.find(m => m.id === state.currentMember);
}

function getMyTasks() {
  return state.tasks.filter(t => t.memberId === state.currentMember);
}

function getMyProjects() {
  const me = state.currentMember;
  return state.projects.filter(p =>
    p.memberId === me ||
    p.ownerId === me ||
    (Array.isArray(p.collaboratorIds) && p.collaboratorIds.includes(me))
  );
}

function showMemberPicker() {
  renderMemberPicker();
  document.getElementById('memberPicker').style.display = 'flex';
}

function hideMemberPicker() {
  document.getElementById('memberPicker').style.display = 'none';
}

function renderMemberPicker() {
  const grid = document.getElementById('memberPickerGrid');
  grid.innerHTML = state.members.map(m => {
    const isDefault = ['m1','m2','m3'].includes(m.id);
    return `
    <div style="position:relative">
      <button class="member-pick-btn" onclick="selectMember('${m.id}')" style="width:100%">
        <div class="member-pick-avatar" style="background:${m.color}20;color:${m.color}">${m.initial}</div>
        <div class="member-pick-name">${escHtml(m.name)}</div>
        <div class="member-pick-role">${escHtml(m.role||'')}</div>
      </button>
      ${!isDefault ? `<button onclick="event.stopPropagation();deleteMember('${m.id}')" title="삭제" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(239,68,68,0.15);color:#ef4444;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">×</button>` : ''}
    </div>
  `;
  }).join('');
}

function deleteMember(id) {
  const m = state.members.find(m => m.id === id);
  if (!m) return;
  const hasData = state.tasks.some(t => t.memberId === id) || state.projects.some(p => p.memberId === id);
  const msg = hasData
    ? `"${m.name}" 담당자에게 연결된 업무·프로젝트가 있습니다. 함께 삭제됩니다. 계속할까요?`
    : `"${m.name}" 담당자를 삭제할까요?`;
  if (!confirm(msg)) return;
  state.members = state.members.filter(x => x.id !== id);
  state.tasks = state.tasks.filter(t => t.memberId !== id);
  state.projects = state.projects.filter(p => p.memberId !== id);
  state.journals = state.journals.filter(j => j.memberId !== id);
  state.okrs = state.okrs.filter(o => o.memberId !== id);
  state.kpis = state.kpis.filter(k => k.memberId !== id);
  state.meetings = (state.meetings||[]).filter(mt => mt.memberId !== id);
  state.scheduleEvents = (state.scheduleEvents||[]).filter(e => e.memberId !== id);
  if (state.currentMember === id) state.currentMember = null;
  saveState();
  renderMemberPicker();
  toast(`"${m.name}" 삭제 완료`);
  if (state.currentMember === null) showMemberPicker();
}

function selectMember(id) {
  state.currentMember = id;
  saveState();
  hideMemberPicker();
  const m = getMember();
  document.getElementById('sidebarAvatar').textContent = m.initial;
  document.getElementById('sidebarAvatar').style.background = m.color + '20';
  document.getElementById('sidebarAvatar').style.color = m.color;
  document.getElementById('sidebarName').textContent = m.name;
  document.getElementById('sidebarRole').textContent = m.role;
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('bottomNav').style.display = 'flex';
  // 대표(m1)인 경우에만 자동 KPI 시드 (커머스 KPI는 대표 담당)
  if (id === 'm1') { seedKpisIfFresh(); seedOKRIfFresh(); seedRecurringIfFresh(); }
  // 모든 사용자: 오늘의 반복 업무 자동 생성
  generateRecurringForToday();
  navigate('dashboard');
}

function openAddMember() {
  showModal(`
    <div class="modal-header"><div class="modal-title">새 담당자 추가</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">이름</label><input class="form-input" id="newMemberName" placeholder="예: 개발팀"></div>
      <div class="form-group"><label class="form-label">역할</label><input class="form-input" id="newMemberRole" placeholder="예: 제품/기술"></div>
      <div class="form-group"><label class="form-label">컬러</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${['#e8632a','#3b82f6','#22c55e','#a855f7','#eab308','#ef4444','#06b6d4','#ec4899'].map(c=>`
            <div onclick="selectColor('${c}')" id="color_${c.replace('#','')}" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:2px solid transparent;transition:all 0.15s" title="${c}"></div>
          `).join('')}
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="saveMember()">추가</button></div>
  `);
  window._selectedColor = '#e8632a';
  document.querySelector('#color_e8632a').style.borderColor = '#fff';
}

function selectColor(c) {
  document.querySelectorAll('[id^="color_"]').forEach(el => el.style.borderColor = 'transparent');
  const key = c.replace('#','');
  const el = document.getElementById('color_' + key);
  if (el) el.style.borderColor = '#fff';
  window._selectedColor = c;
}

function saveMember() {
  const name = document.getElementById('newMemberName').value.trim();
  const role = document.getElementById('newMemberRole').value.trim();
  if (!name) return toast('이름을 입력하세요');
  const color = window._selectedColor || '#e8632a';
  const initial = name.charAt(0);
  const id = 'm' + Date.now();
  state.members.push({ id, name, role, color, initial });
  saveState();
  closeModal();
  renderMemberPicker();
  toast('담당자가 추가되었습니다');
}

function renderPage(page) {
  const main = document.getElementById('mainContent');
  switch(page) {
    case 'dashboard': main.innerHTML = renderDashboard(); bindDashboard(); break;
    case 'calendar': main.innerHTML = renderUnifiedCalendar(); break;
    case 'schedule': main.innerHTML = renderUnifiedCalendar(); break;  // 호환 alias
    case 'customer': calendarTab='list';calendarFilters.customer=true;main.innerHTML = renderUnifiedCalendar(); break;  // 호환 alias
    case 'projects': main.innerHTML = renderProjects(); break;
    case 'meeting': main.innerHTML = renderMeeting(); break;
    case 'recurring': main.innerHTML = renderRecurring(); break;
    case 'manual': main.innerHTML = renderManual(); bindManual(); break;
    case 'alltasks': main.innerHTML = renderAllTasks(); break;
    case 'company': main.innerHTML = renderCompany(); break;
    case 'okr': main.innerHTML = renderOKR(); bindOKR(); break;
    case 'report': main.innerHTML = renderWeeklyReport(); break;
    case 'playbook': main.innerHTML = renderPlaybook(); break;
    default: main.innerHTML = renderDashboard(); bindDashboard();
  }
}

function renderDashboard() {
  const m = getMember();
  const today = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const weekDays = ['월','화','수','목','금'];
  const todayDay = days[today.getDay()];
  const todayStr = today.toISOString().split('T')[0];

  // Weekly plan - 우선순위 1~5 슬롯 방식
  const priorities = [1,2,3,4,5];
  const weeklyHTML = weekDays.map(d => {
    const isToday = d === todayDay;
    const dayTasks = state.tasks.filter(t => t.memberId === state.currentMember && t.weekDay === d && !t.isFixed);
    // 슬롯 1~5 매핑
    const slots = priorities.map(p => dayTasks.find(t => t.weekSlot === p) || null);
    return `
      <div class="day-col">
        <div class="day-header ${isToday ? 'today' : ''}">
          <span class="day-name">${d}요일</span>
          ${isToday ? '<span class="today-badge">오늘</span>' : ''}
        </div>
        <div class="day-tasks" id="dayTasks_${d}">
          ${slots.map((t, i) => {
            const slotNum = i + 1;
            if (t) {
              const dday = t.dueDate ? calcDday(t.dueDate) : '';
              return `
                <div class="week-slot filled ${t.done ? 'done' : ''}" onclick="editWeekSlot('${d}',${slotNum})">
                  <span class="slot-num">${slotNum}</span>
                  <span class="slot-title">${escHtml(t.title)}</span>
                  ${dday ? `<span class="slot-dday ${dday==='D-day'?'dday-today':dday.startsWith('D+')?'dday-over':''}">` + dday + `</span>` : ''}
                </div>`;
            } else {
              return `<div class="week-slot empty" onclick="addWeekTask('${d}',${slotNum})" title="클릭하면 미완료 업무 목록에서 선택하거나 새로 입력할 수 있습니다"><span class="slot-num">${slotNum}</span><span class="slot-empty-text">클릭하여 업무 배치</span></div>`;
            }
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Today tasks (table)
  const todayTasks = state.tasks.filter(t => t.memberId === state.currentMember && !t.isFixed && (t.weekDay === todayDay || t.pulledToday));
  const fixedTasks = state.tasks.filter(t => t.memberId === state.currentMember && t.isFixed);
  const myProjects = getMyProjects();

  const todayTableRows = todayTasks.map(t => {
    const proj = myProjects.find(p => p.id === t.projectId);
    const attachCount = (t.attachments || []).length;
    const dday = t.dueDate ? calcDday(t.dueDate) : '';
    const ddayClass = dday === 'D-day' ? 'dday-today' : dday.startsWith('D+') ? 'dday-over' : 'dday-upcoming';
    return `
      <tr class="${t.done ? 'done-row' : ''}" id="taskRow_${t.id}">
        <td class="task-row-check"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${t.id}')"></td>
        <td class="task-row-text"><input type="text" value="${escHtml(t.title)}" placeholder="업무 내용..." onblur="updateTaskTitle('${t.id}', this.value)"></td>
        <td class="task-row-project">
          <select class="proj-inline-select" onchange="setTaskProject('${t.id}', this.value)" title="프로젝트 선택">
            <option value="">+ 프로젝트</option>
            ${myProjects.map(p => `<option value="${p.id}" ${t.projectId===p.id?'selected':''}>${escHtml(p.name)}</option>`).join('')}
          </select>
        </td>
        <td class="task-row-priority">
          <select style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:2px 4px;cursor:pointer" onchange="updatePriority('${t.id}', this.value)">
            <option value="high" ${t.priority==='high'?'selected':''}>🔴 높음</option>
            <option value="mid" ${t.priority==='mid'||!t.priority?'selected':''}>🟡 중간</option>
            <option value="low" ${t.priority==='low'?'selected':''}>🟢 낙음</option>
          </select>
        </td>
        <td style="width:70px;text-align:center">
          ${dday ? `<span class="dday-badge ${ddayClass}">${dday}</span>` : `<input type="date" style="background:transparent;border:none;color:var(--text3);font-size:10px;cursor:pointer;width:90px" value="${t.dueDate||''}" onchange="updateDueDate('${t.id}',this.value)" title="마감일">`}
        </td>
        <td class="task-row-attach">
          <span class="attach-count" onclick="manageAttach('${t.id}')">📎 ${attachCount > 0 ? attachCount : '+'}</span>
        </td>
        <td style="width:60px;text-align:center">
          <span class="attach-count" onclick="manageNotes('${t.id}')" title="메모">📝 ${(t.notes||[]).length > 0 ? (t.notes||[]).length : '+'}</span>
        </td>
        <td class="task-done-at" style="width:70px;font-size:10px;color:var(--green);text-align:center">${t.done && t.doneAt ? '✅ ' + new Date(t.doneAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}) : ''}</td>
        <td style="width:80px;text-align:center">
          <select style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;padding:2px 3px;cursor:pointer" onchange="updateTaskStatus('${t.id}', this.value)" title="업무 상태">
            <option value="active" ${!t.status||t.status==='active'?'selected':''}>▶ 진행</option>

            <option value="stopped" ${t.status==='stopped'?'selected':''}>⛔ 중단</option>
            <option value="resume" ${t.status==='resume'?'selected':''}>🔄 재개</option>
          </select>
        </td>
        <td class="task-row-actions">
          <button class="btn-icon" onclick="deleteTask('${t.id}')" title="삭제">🗑</button>
        </td>
      </tr>
    `;
  }).join('');

  // 마감 임박 알림 (D-3 이내)
  const urgentTasks = getMyTasks().filter(t => {
    if (t.done || !t.dueDate) return false;
    const diff = Math.ceil((new Date(t.dueDate) - today) / 86400000);
    return diff >= 0 && diff <= 3;

function toggleMiniCalFilter() {
  const btn = document.getElementById('mini-cal-filter-btn');
  const wrap = document.getElementById('mini-cal-wrap');
  if (!btn || !wrap) return;
  const isActive = btn.classList.toggle('active');
  btn.textContent = isActive ? '🗓️ 미완료만 ●' : '🗓️ 미완료만';
  wrap.innerHTML = renderMiniCalendar(new Date(), isActive);
}
function renderMiniCalendar(today, filterPending) {
  const year = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayDate = today.getDate();
  const myTasks = getMyTasks().filter(t => !t.done && t.dueDate && t.dueDate.startsWith(`${year}-${String(month+1).padStart(2,'0')}`));
  const tasksByDate = {};
  myTasks.forEach(t => { const d = parseInt(t.dueDate.split('-')[2]); if (!tasksByDate[d]) tasksByDate[d] = []; tasksByDate[d].push(t); });
  // filterPending: 미완료 업무가 있는 날만 강조, 없는 날은 흐리게
  const myEvents = filterPending ? [] : (state.scheduleEvents || []).filter(e => e.date && e.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`));
  const eventsByDate = {};
  myEvents.forEach(e => { const d = parseInt(e.date.split('-')[2]); if (!eventsByDate[d]) eventsByDate[d] = []; eventsByDate[d].push(e); });
  const dayNames = ['일','월','화','수','목','금','토'];
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div style="min-height:56px"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === todayDate;
    const tasks = tasksByDate[d] || [];
    const events = eventsByDate[d] || [];
    const dayOfWeek = new Date(year, month, d).getDay();
    const isSun = dayOfWeek === 0, isSat = dayOfWeek === 6;
    const hasPending = tasks.length > 0;
    const dimDay = filterPending && !hasPending && !isToday;
    const typeColor = (type) => type==='박람회'?'var(--accent)':type==='미팅'?'var(--blue)':type==='탐방'?'var(--green)':'var(--purple)';
    const typeBg = (type) => type==='박람회'?'rgba(232,99,42,.2)':type==='미팅'?'rgba(59,130,246,.2)':type==='탐방'?'rgba(34,197,94,.2)':'rgba(168,85,247,.2)';
    cells += `<div style="background:${isToday?'rgba(232,99,42,.1)':hasPending?'rgba(239,68,68,.06)':'var(--bg2)'};border:1px solid ${isToday?'var(--accent)':hasPending&&filterPending?'var(--red)':'var(--border)'};border-radius:6px;padding:5px;min-height:56px;cursor:pointer;transition:background .1s;opacity:${dimDay?0.35:1}" onclick="${hasPending||!filterPending?"navigate('schedule')":''}" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='${isToday?'rgba(232,99,42,.1)':hasPending?'rgba(239,68,68,.06)':'var(--bg2)'}'">
      <div style="font-size:11px;font-weight:${isToday?700:500};color:${isToday?'var(--accent)':isSun?'#ef4444':isSat?'#3b82f6':'var(--text3)'}">${d}</div>
      ${events.slice(0,1).map(e => `<div style="font-size:9px;padding:1px 3px;border-radius:2px;background:${typeBg(e.type)};color:${typeColor(e.type)};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px">${escHtml(e.title)}</div>`).join('')}
      ${tasks.slice(0, events.length>0?1:2).map(t => `<div style="font-size:9px;padding:1px 3px;border-radius:2px;background:${t.priority==='high'?'rgba(239,68,68,.15)':'rgba(59,130,246,.15)'};color:${t.priority==='high'?'var(--red)':'var(--blue)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px">${escHtml(t.title)}</div>`).join('')}
      ${(tasks.length + events.length) > 2 ? `<div style="font-size:9px;color:var(--text3);margin-top:1px">+${tasks.length+events.length-2}</div>` : ''}
    </div>`;
  }
  return `<div class="card" style="overflow:hidden">
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;font-weight:600">${year}년 ${month+1}월</span>
      <span style="font-size:11px;color:var(--text3)">${myTasks.length}개 마감 업무 · ${myEvents.length}개 일정</span>
    </div>
    <div style="padding:10px 12px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
        ${dayNames.map((d,i) => `<div style="text-align:center;font-size:10px;font-weight:600;color:${i===0?'#ef4444':i===6?'#3b82f6':'var(--text3)'}">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
    </div>
  </div>`;
}
function bindDashboard() {
  // AI 데이터 카운트 업데이트
  const countEl = document.getElementById('ai-data-count');
  const abBtn = document.getElementById('ai-ab-btn');
  if (countEl) {
    const today = new Date();
    const days = ['일','월','화','수','목','금','토'];
    const todayDay = days[today.getDay()];
    const todayTasks = state.tasks.filter(t => t.memberId === state.currentMember && !t.isFixed && (t.weekDay === todayDay || t.pulledToday));
    const totalNotes = todayTasks.reduce((s, t) => s + (t.notes||[]).length, 0);
    countEl.textContent = `${todayTasks.length}개 업무 · ${totalNotes}개 메모`;

async function analyzeTasksWithAI() {
  if (!state.apiKey) { toast('Claude API 키를 먼저 설정하세요'); setApiKey(); return; }
  const today = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const todayDay = days[today.getDay()];
  const todayTasks = state.tasks.filter(t => t.memberId === state.currentMember && !t.isFixed && (t.weekDay === todayDay || t.pulledToday));
  if (todayTasks.length === 0) { toast('오늘 업무가 없습니다'); return; }
  const resultEl = document.getElementById('ai-result-content');
  if (resultEl) resultEl.innerHTML = `<div style="color:var(--text3);text-align:center;padding:20px 0">🤖 AI 분석 중... 잠시만 기다려주세요</div>`;
  // 업무 + 메모 데이터 구성
  const taskData = todayTasks.map(t => {
    const proj = state.projects.find(p => p.id === t.projectId);
    const notes = (t.notes||[]).map(n => `  - [${new Date(n.createdAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}] ${n.content||n.text||''}`).join('\n');
    return `• ${t.title}${proj ? ` (${proj.name})` : ''} [완료: ${t.done ? '✅' : '❌'}]${t.priority === 'high' ? ' [중요]' : ''}\n${notes ? `  메모:\n${notes}` : ''}`;
  }).join('\n');
  const prompt = `다음은 POUR스토어(건축물 유지보수 미디어커머스 스타트업) ${getMember().name}님의 오늘(${today.toLocaleDateString('ko-KR')}) 업무 목록과 메모입니다:\n\n${taskData}\n\n다음 형식으로 분석해주세요:\n\n✅ 오늘의 핵심 성과: (완료된 업무 기반으로 2-3가지)\n⚡ 효과적인 행동 패턴: (메모에서 발견된 성공 패턴)\n🔧 개선 포인트: (업무 흐름에서 눈에 띄는 비효율)\n💡 내일 제안 액션: (구체적인 다음 단계 2-3가지)\n📊 수치화 인사이트: (추적하거나 실험할 만한 데이터)`;
  try {
    const result = await callClaude(prompt, false);
    if (resultEl) resultEl.innerHTML = `<div style="white-space:pre-wrap;font-size:13px;line-height:1.7;color:var(--text2)">${escHtml(result)}</div>`;
    // 분석 결과를 journals에도 저장 (누적 데이터용)
    state.journals.push({ id: 'j' + Date.now(), memberId: state.currentMember, content: taskData, aiResult: result, createdAt: new Date().toISOString() });
    saveState();
    toast('분석 완료!');
    bindDashboard(); // 카운트 업데이트
  } catch(e) {
    if (resultEl) resultEl.innerHTML = `<div style="color:var(--red);text-align:center;padding:20px 0">⚠️ 분석 실패: ${escHtml(e.message)}</div>`;
  }
}

async function generateABTest() {
  if (!state.apiKey) { toast('Claude API 키를 먼저 설정하세요'); setApiKey(); return; }
  const allDoneTasks = state.tasks.filter(t => t.memberId === state.currentMember && t.done && (t.notes||[]).length > 0);
  if (allDoneTasks.length < 5) {
    toast(`메모 있는 완료 업무가 ${allDoneTasks.length}/5개입니다. 5개 이상 누적 후 사용 가능합니다.`);
    return;
  }
  const resultEl = document.getElementById('ai-result-content');
  if (resultEl) resultEl.innerHTML = `<div style="color:var(--text3);text-align:center;padding:20px 0">🔬 A/B 테스트 가설 추출 중...</div>`;
  // 업무 데이터 구성
  const taskData = allDoneTasks.slice(0, 20).map(t => {
    const proj = state.projects.find(p => p.id === t.projectId);
    const notes = (t.notes||[]).map(n => n.content||n.text||'').join(' / ');
    return `• [${new Date(t.doneAt||Date.now()).toLocaleDateString('ko-KR')}] ${t.title}${proj ? ` (${proj.name})` : ''} | 메모: ${notes}`;
  }).join('\n');
  const prompt = `다음은 POUR스토어(건축물 유지보수 미디어커머스 스타트업) 담당자의 완료 업무 데이터입니다:\n\n${taskData}\n\n위 데이터를 분석하여 실제 실행 가능한 A/B 테스트 가설을 추출해주세요:\n\n형식:\n🔬 A/B 테스트 #1: [가설 제목]\n  - 가설: [A방식 vs B방식]\n  - 실험 방법: [구체적 실행 방법]\n  - 측정 지표: [수치로 확인 가능한 지표]\n  - 기대 효과: [예상 결과]\n  - 이유: [데이터에서 도출된 근거]\n\n3개 이상의 A/B 테스트 가설을 제시하고, 마지막에 전략 기획 제안을 추가해주세요.`;
  try {
    const result = await callClaude(prompt, true);
    if (resultEl) resultEl.innerHTML = `
      <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;font-weight:700;color:var(--accent)">🔬 A/B 테스트 가설 추출 결과</span>
        <span style="font-size:11px;color:var(--text3)">${allDoneTasks.length}개 업무 데이터 기반</span>
      </div>
      <div style="white-space:pre-wrap;font-size:13px;line-height:1.7;color:var(--text2)">${escHtml(result)}</div>`;
    toast('A/B 테스트 가설 추출 완료!');
  } catch(e) {
    if (resultEl) resultEl.innerHTML = `<div style="color:var(--red);text-align:center;padding:20px 0">⚠️ 추출 실패: ${escHtml(e.message)}</div>`;
  }
}

// 다른 멤버의 업무를 내가 임시로 대신 처리
function substituteTask(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  if (t.memberId === state.currentMember) return toast('이미 내 업무입니다');
  const original = state.members.find(m => m.id === t.memberId);
  if (!confirm(`"${t.title}" 업무를 ${original?.name||'?'}님 대신 처리하시겠습니까?\n\n• 내 오늘 업무로 이동\n• 원래 담당자 기록 보존 (나중에 원복 가능)`)) return;
  t.originalAssignee = t.memberId;          // 원래 담당자 기록
  t.memberId = state.currentMember;          // 임시로 내 업무로
  t.substitutedAt = new Date().toISOString();
  saveState();
  toast(`🤝 ${original?.name||'?'}님의 업무를 가져왔습니다`);
  navigate('alltasks');
}

// 대무 해제 — 원래 담당자에게 돌리기
function restoreTaskAssignee(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t || !t.originalAssignee) return;
  const original = state.members.find(m => m.id === t.originalAssignee);
  if (!confirm(`${original?.name||'?'}님께 업무를 돌리시겠습니까?`)) return;
  t.memberId = t.originalAssignee;
  delete t.originalAssignee;
  delete t.substitutedAt;
  saveState();
  toast(`↩️ ${original?.name||'?'}님께 돌렸습니다`);
  navigate('alltasks');
}

  });

function toggleTask(id) {

    row.classList.toggle('done-row', t.done);

    if (doneCell) doneCell.textContent = t.done && t.doneAt ? '✅ ' + new Date(t.doneAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}) : '';
  }
}
function toggleWeekTask(id) {

  if (t) {
    t.done = !t.done;
    t.doneAt = t.done ? new Date().toISOString() : null;
    saveState();
    navigate('dashboard');
  }
}

function updateTaskTitle(id, val) {
  const t = state.tasks.find(t => t.id === id);
  if (t) { t.title = val; saveState(); }
}

function updatePriority(id, val) {
  const t = state.tasks.find(t => t.id === id);
  if (t) { t.priority = val; saveState(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  navigate(currentPage);
}

function calcDday(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr); due.setHours(0,0,0,0);
  const diff = Math.round((due - today) / (1000*60*60*24));
  if (diff === 0) return 'D-day';
  if (diff > 0) return `D-${diff}`;
  return `D+${Math.abs(diff)}`;
}

function updateTaskStatus(id, val) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t.status = val;
  saveState();
  // 상태에 따른 행 스타일 변경
  const row = document.getElementById('taskRow_' + id);
  if (row) {
    if (val === 'hold') { row.style.opacity = '0.6'; row.style.background = 'rgba(234,179,8,.05)'; }
    else if (val === 'stopped') { row.style.opacity = '0.4'; row.style.background = 'rgba(239,68,68,.05)'; }
    else { row.style.opacity = '1'; row.style.background = ''; }
  }
  const labels = { active: '진행 중', hold: '보류됨', stopped: '중단됨', resume: '재개됨' };
  toast(`업무 상태: ${labels[val] || val}`);
}

function updateDueDate(taskId, val) {
  const t = state.tasks.find(t => t.id === taskId);
  if (t) { t.dueDate = val; saveState(); }
}

function editWeekSlot(day, slotNum) {
  const t = state.tasks.find(t => t.memberId === state.currentMember && t.weekDay === day && t.weekSlot === slotNum);
  if (!t) return addWeekTask(day, slotNum);
  showModal(`
    <div class="modal-header"><div class="modal-title">${day}요일 우선순위 ${slotNum} 수정</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">

        <div class="form-group"><label class="form-label">마감일</label><input class="form-input" id="wt_due" type="date" value="${t.dueDate||''}"></div>
        <div class="form-group"><label class="form-label">연결 프로젝트</label>
          <select class="form-select" id="wt_project">
            <option value="">없음</option>
            ${getMyProjects().map(p=>`<option value="${p.id}" ${t.projectId===p.id?'selected':''}>${p.name}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteTask('${t.id}')">삭제</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-sm" onclick="updateWeekSlot('${t.id}')">저장</button>
    </div>
  `);
}

function updateWeekSlot(taskId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  t.title = document.getElementById('wt_title').value.trim() || t.title;
  t.dueDate = document.getElementById('wt_due').value || null;
  t.projectId = document.getElementById('wt_project').value || null;
  saveState(); closeModal(); navigate('dashboard');
}

function addWeekTask(day, slotNum) {
  const myProjects = getMyProjects();
  const projectMap = {};
  myProjects.forEach(p => { projectMap[p.id] = p; });
  // 이미 배치된 슬롯 ID 목록
  const placedIds = new Set(state.tasks.filter(t => t.memberId === state.currentMember && t.weekDay && t.weekSlot).map(t => t.id));
  // 미완료 업무 목록 (완료 안됨, 고정 아님, 아직 배치 안됨)
  const allPending = state.tasks.filter(t =>
    t.memberId === state.currentMember && !t.done && !t.isFixed && !placedIds.has(t.id)
  );
  // 프로젝트별 그룹핑
  const grouped = {};
  allPending.forEach(t => {
    const key = t.projectId && projectMap[t.projectId] ? projectMap[t.projectId].name : '📋 미분류';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(t);
  });
  const pendingListHTML = allPending.length === 0
    ? `<div style="color:var(--text3);font-size:13px;padding:12px 0;text-align:center">미완료 업무가 없습니다.<br><span style="font-size:11px">아래에서 새 업무를 직접 입력하세요.</span></div>`
    : Object.entries(grouped).map(([projName, tasks]) => `
        <div style="margin-bottom:10px">
          <div style="font-size:11px;color:var(--text3);font-weight:600;padding:3px 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px">${projName}</div>
          ${tasks.map(t => {
            const dday = t.dueDate ? calcDday(t.dueDate) : '';
            const ddayColor = dday.startsWith('D+') ? 'var(--red)' : dday === 'D-day' ? 'var(--green)' : 'var(--accent)';
            const priorityIcon = t.priority === 'high' ? '🔴' : t.priority === 'low' ? '🟢' : '🟡';
            const statusBadge = t.status === 'hold' ? ' <span style="font-size:10px;background:rgba(234,179,8,.2);color:var(--yellow);padding:1px 5px;border-radius:3px">⏸ 보류</span>' : t.status === 'stopped' ? ' <span style="font-size:10px;background:rgba(239,68,68,.15);color:var(--red);padding:1px 5px;border-radius:3px">⛔ 중단</span>' : '';
            return `<div onclick="assignPendingTask('${t.id}','${day}',${slotNum})"
              style="padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:3px;transition:all .15s"
              onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--bg3)'"
              onmouseout="this.style.borderColor='var(--border)';this.style.background='transparent'">
              <span>${priorityIcon}</span>
              <span style="flex:1">${escHtml(t.title)}${statusBadge}</span>
              ${dday ? `<span style="font-size:10px;color:${ddayColor};font-weight:600">${dday}</span>` : ''}
            </div>`;
          }).join('')}
        </div>
      `).join('');
  showModal(`
    <div class="modal-header">
      <div class="modal-title">📋 ${day}요일 ${slotNum}번 슬롯 — 업무 배치</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">📌 미완료 업무에서 선택 <span style="font-size:11px;color:var(--text3);font-weight:400">(${allPending.length}개)</span></div>
        <div style="max-height:260px;overflow-y:auto;padding-right:2px">${pendingListHTML}</div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:12px">
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">✏️ 새 업무 직접 입력</div>
        <div class="form-group"><input class="form-input" id="wt_title" placeholder="업무 내용을 입력하세요"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">마감일</label><input class="form-input" id="wt_due" type="date"></div>
          <div class="form-group"><label class="form-label">프로젝트</label>
            <select class="form-select" id="wt_project">
              <option value="">없음</option>
              ${myProjects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" style="width:100%;margin-top:4px" onclick="saveWeekTask('${day}',${slotNum})">새 업무로 추가</button>
      </div>
    </div>
  `);
}

function assignPendingTask(taskId, day, slotNum) {
  // 기존 같은 슬롯에 있던 업무 슬롯 해제
  state.tasks.forEach(other => {
    if (other.memberId === state.currentMember && other.weekDay === day && other.weekSlot === slotNum && other.id !== taskId) {
      other.weekDay = null; other.weekSlot = null;
    }
  });
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  t.weekDay = day;
  t.weekSlot = slotNum;
  saveState();
  closeModal();
  navigate('dashboard');
  toast(`"${t.title}" → ${day}요일 ${slotNum}번에 배치했습니다`);
}

function saveWeekTask(day, slotNum) {
  const title = document.getElementById('wt_title').value.trim();
  if (!title) return toast('업무 내용을 입력하세요');
  const id = 't' + Date.now();
  state.tasks.push({
    id, memberId: state.currentMember, title,
    done: false, priority: 'mid',
    projectId: document.getElementById('wt_project').value || null,
    dueDate: document.getElementById('wt_due').value || null,
    weekDay: day, weekSlot: slotNum || 1,
    isFixed: false, attachments: [], createdAt: new Date().toISOString()
  });
  saveState(); closeModal(); navigate('dashboard');
}

function pullFromWeek() {
  const today = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const todayDay = days[today.getDay()];
  const weekTasks = state.tasks.filter(t => t.memberId === state.currentMember && t.weekDay === todayDay && !t.pulledToday);
  if (weekTasks.length === 0) return toast('오늘 배치된 업무가 없습니다');
  weekTasks.forEach(t => { t.pulledToday = true; });
  saveState(); navigate('dashboard');
  toast(`${weekTasks.length}개 업무를 가져왔습니다`);
}

function clearWeekPlan() {
  if (!confirm('이번 주 업무 배치를 초기화할까요?')) return;
  state.tasks = state.tasks.filter(t => !(t.memberId === state.currentMember && !t.isFixed && !t.pulledToday));
  saveState(); navigate('dashboard');
}

function addFixedTask() {
  showModal(`
    <div class="modal-header"><div class="modal-title">고정 업무 추가</div><button class="modal-close" onclick="closeModal()">×</button></div>

      <div class="form-group"><label class="form-label">업무 내용</label><input class="form-input" id="ft_title" placeholder="예: 일일 보고서 작성" autofocus></div>
      <div class="form-group"><label class="form-label">시간 (선택)</label><input class="form-input" id="ft_time" placeholder="예: 매일 09:00"></div>

    closeModal(); navigate(currentPage);

function manageAttach(taskId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  const attachList = (t.attachments || []).map(a => `
    <div class="attach-item">
      <span>📎</span>
      <span class="attach-item-name">${escHtml(a.name)}</span>
      <span class="attach-item-size">${a.size || ''}</span>
      <button class="btn-icon" onclick="removeAttach('${taskId}','${a.id}')" style="font-size:12px">×</button>
    </div>
  `).join('');
  showModal(`
    <div class="modal-header"><div class="modal-title">📎 첨부 자료</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="margin-bottom:10px;padding:7px 10px;border-radius:5px;background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.25);font-size:11px;color:#eab308">
        ⚠️ 파일 이름과 링크만 기록됩니다. 실제 파일은 기기에 별도 보관하세요.
      </div>
      <div class="attach-list" id="attachList">${attachList || '<div style="color:var(--text3);font-size:13px">첨부 파일 없음</div>'}</div>
      <div style="margin-top:12px">
        <label style="display:block;padding:10px;border:1px dashed var(--border2);border-radius:var(--radius-sm);text-align:center;cursor:pointer;color:var(--text3);font-size:13px">
          📁 파일 선택 (클릭)
          <input type="file" multiple style="display:none" onchange="addAttach('${taskId}', this)">
        </label>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="form-label">URL 링크 추가</label>
        <div style="display:flex;gap:6px">
          <input class="form-input" id="attachUrl" placeholder="https://..." style="flex:1">
          <button class="btn btn-ghost btn-sm" onclick="addAttachUrl('${taskId}')">추가</button>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary btn-sm" onclick="closeModal()">완료</button></div>
  `);
}

function addAttach(taskId, input) {
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.attachments) t.attachments = [];
  Array.from(input.files).forEach(f => {
    t.attachments.push({ id: 'a' + Date.now() + Math.random(), name: f.name, size: formatBytes(f.size), type: 'file' });
  });
  saveState();
  const list = document.getElementById('attachList');
  if (list) list.innerHTML = t.attachments.map(a => `
    <div class="attach-item">
      <span>📎</span>
      <span class="attach-item-name">${escHtml(a.name)}</span>
      <span class="attach-item-size">${a.size || ''}</span>
      <button class="btn-icon" onclick="removeAttach('${taskId}','${a.id}')" style="font-size:12px">×</button>
    </div>
  `).join('');
}

function addAttachUrl(taskId) {
  const url = document.getElementById('attachUrl').value.trim();
  if (!url) return;
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.attachments) t.attachments = [];
  t.attachments.push({ id: 'a' + Date.now(), name: url, size: 'URL', type: 'url' });
  saveState();
  document.getElementById('attachUrl').value = '';
  const list = document.getElementById('attachList');
  if (list) list.innerHTML = t.attachments.map(a => `
    <div class="attach-item">
      <span>${a.type==='url'?'🔗':'📎'}</span>
      <span class="attach-item-name">${escHtml(a.name)}</span>
      <span class="attach-item-size">${a.size || ''}</span>
      <button class="btn-icon" onclick="removeAttach('${taskId}','${a.id}')" style="font-size:12px">×</button>
    </div>
  `).join('');
}

function removeAttach(taskId, attachId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (t) { t.attachments = (t.attachments || []).filter(a => a.id !== attachId); saveState(); }
  const list = document.getElementById('attachList');
  if (list && t) list.innerHTML = t.attachments.map(a => `
    <div class="attach-item">
      <span>📎</span>
      <span class="attach-item-name">${escHtml(a.name)}</span>
      <span class="attach-item-size">${a.size || ''}</span>
      <button class="btn-icon" onclick="removeAttach('${taskId}','${a.id}')" style="font-size:12px">×</button>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:13px">첨부 파일 없음</div>';
}

function renderNotesList(taskId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return '';
  const notes = t.notes || [];
  if (notes.length === 0) return '<div style="color:var(--text3);font-size:13px;padding:8px 0">메모가 없습니다. 첫 메모를 작성해보세요.</div>';
  return notes.map(n => `
    <div class="note-item" id="note_${n.id}" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all">${escHtml(n.content)}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">${new Date(n.createdAt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <button class="btn-icon" onclick="removeNote('${taskId}','${n.id}')" style="font-size:12px;flex-shrink:0">×</button>
      </div>
    </div>
  `).join('');
}
function manageNotes(taskId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  showModal(`
    <div class="modal-header">
      <div class="modal-title">📝 메모 — ${escHtml(t.title)}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="notesList" style="max-height:280px;overflow-y:auto;margin-bottom:12px">${renderNotesList(taskId)}</div>
      <div style="border-top:1px solid var(--border);padding-top:12px">
        <label class="form-label">새 메모 작성</label>
        <textarea class="form-input" id="noteInput" rows="3" placeholder="메모 내용을 입력하세요..." style="resize:vertical;min-height:70px"></textarea>
        <button class="btn btn-primary btn-sm" style="margin-top:8px;width:100%" onclick="addNote('${taskId}')">메모 추가</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">닫기</button>
    </div>
  `);
  setTimeout(() => document.getElementById('noteInput')?.focus(), 100);
}
function addNote(taskId) {
  const content = document.getElementById('noteInput')?.value.trim();
  if (!content) return toast('메모 내용을 입력하세요');
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  if (!t.notes) t.notes = [];
  t.notes.push({ id: 'n' + Date.now(), content, createdAt: new Date().toISOString() });
  saveState();
  // 목록 업데이트
  const list = document.getElementById('notesList');
  if (list) list.innerHTML = renderNotesList(taskId);
  document.getElementById('noteInput').value = '';
  document.getElementById('noteInput').focus();
  // 사이드바 메모 카운트 업데이트
  const noteBtn = document.querySelector(`[onclick="manageNotes('${taskId}')"]`);
  if (noteBtn) noteBtn.textContent = `📝 ${t.notes.length}`;
}
function removeNote(taskId, noteId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (!t) return;
  t.notes = (t.notes || []).filter(n => n.id !== noteId);
  saveState();
  const list = document.getElementById('notesList');
  if (list) list.innerHTML = renderNotesList(taskId);
  const noteBtn = document.querySelector(`[onclick="manageNotes('${taskId}')"]`);
  if (noteBtn) noteBtn.textContent = `📝 ${t.notes.length > 0 ? t.notes.length : '+'}`;
}

function renderCalendar() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // Build calendar cells
  const cells = [];
  for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  // Get tasks with due dates (미완료)
  const undoneTasks = state.tasks.filter(t => t.memberId === state.currentMember && !t.done && t.dueDate);

  const dayHeaders = ['월','화','수','목','금','토','일'].map(d =>
    `<div class="cal-header-cell">${d}</div>`
  ).join('');

  const calCells = cells.map(d => {
    if (!d) return `<div class="cal-cell other-month"></div>`;
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d === today.getDate();
    const dayTasks = undoneTasks.filter(t => t.dueDate === dateStr);
    const isPast = new Date(dateStr) < new Date(today.toDateString());
    return `
      <div class="cal-cell ${isToday ? 'today-cell' : ''}">
        <div class="cal-date">${d}</div>
        ${dayTasks.map(t => `
          <div class="cal-task-chip ${isPast ? 'overdue' : isToday ? 'today-task' : 'upcoming'}" title="${escHtml(t.title)}">${escHtml(t.title)}</div>
        `).join('')}
      </div>
    `;
  }).join('');

  // List view of undone tasks
  const overdueList = undoneTasks.filter(t => t.dueDate && new Date(t.dueDate) < new Date(today.toDateString()));
  const upcomingList = undoneTasks.filter(t => t.dueDate && new Date(t.dueDate) >= new Date(today.toDateString()));

  return `
    <div class="page-header">
      <div>
        <div class="page-title">📅 미완료 업무 달력</div>
        <div class="page-subtitle">${year}년 ${monthNames[month]} — 마감일 기준</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="addTaskWithDue()">+ 마감일 업무 추가</button>
      </div>
    </div>
    <div class="page-content">
      <div class="card" style="overflow:hidden">
        <div class="card-header"><div class="card-title">📅 ${year}년 ${monthNames[month]}</div></div>
        <div style="padding:12px">
          <div class="calendar-grid">
            ${dayHeaders}
            ${calCells}
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div class="section-title">🔴 기한 초과 <span class="count">${overdueList.length}</span></div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${overdueList.length === 0 ? `<div class="card"><div class="empty"><div class="empty-icon">✅</div><div class="empty-text">기한 초과 없음</div></div></div>` :
              overdueList.map(t => `
                <div class="card" style="padding:10px 12px;display:flex;align-items:center;gap:8px">
                  <input type="checkbox" onchange="toggleTask('${t.id}');navigate('calendar')" style="accent-color:var(--accent)">
                  <div style="flex:1">
                    <div style="font-size:13px">${escHtml(t.title)}</div>
                    <div style="font-size:11px;color:var(--red)">${t.dueDate}</div>
                  </div>
                  <span class="attach-count" onclick="manageNotes('${t.id}')" title="메모">📝 ${(t.notes||[]).length||'+'}</span>
                </div>
              `).join('')
            }
          </div>
        </div>
        <div>
          <div class="section-title">🔵 예정 업무 <span class="count">${upcomingList.length}</span></div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${upcomingList.length === 0 ? `<div class="card"><div class="empty"><div class="empty-icon">📋</div><div class="empty-text">예정 업무 없음</div></div></div>` :
              upcomingList.map(t => `
                <div class="card" style="padding:10px 12px;display:flex;align-items:center;gap:8px">
                  <input type="checkbox" onchange="toggleTask('${t.id}');navigate('calendar')" style="accent-color:var(--accent)">
                  <div style="flex:1">
                    <div style="font-size:13px">${escHtml(t.title)}</div>
                    <div style="font-size:11px;color:var(--blue)">${t.dueDate}</div>
                  </div>
                  <span class="attach-count" onclick="manageNotes('${t.id}')" title="메모">📝 ${(t.notes||[]).length||'+'}</span>
                </div>
              `).join('')
            }
          </div>
        </div>
      </div>
    </div>
  `;
}

function saveDueTask() {

  state.tasks.push({
    id: 't' + Date.now(), memberId: state.currentMember, title,
    done: false, priority: document.getElementById('due_priority').value,
    projectId: document.getElementById('due_project').value || null,

              </div>

          }).join('')}
        </div>
      `}
    </div>
  `;
