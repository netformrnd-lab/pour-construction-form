function saveProject(editId) {
  const name = document.getElementById('pj_name').value.trim();
  if (!name) return toast('프로젝트명을 입력하세요');
  const kpiId = document.getElementById('pj_kpi')?.value || null;
  const contribution = parseFloat(document.getElementById('pj_contribution')?.value) || 0;
  const ownerId = document.getElementById('pj_owner')?.value || state.currentMember;
  const collabSel = document.getElementById('pj_collab');
  const collaboratorIds = collabSel ? Array.from(collabSel.selectedOptions).map(o => o.value).filter(v => v !== ownerId) : [];
  if (editId) {
    const p = state.projects.find(p => p.id === editId);
    if (p) {
      p.name = name;
      p.category = document.getElementById('pj_cat').value;
      p.status = document.getElementById('pj_status').value;
      p.progress = parseInt(document.getElementById('pj_progress').value) || 0;
      p.dueDate = document.getElementById('pj_due').value;
      p.description = document.getElementById('pj_desc').value;
      p.kpiId = kpiId || null;
      p.contribution = contribution;
      p.ownerId = ownerId;
      p.collaboratorIds = collaboratorIds;
      // memberId는 ownerId와 동기화 (필터링 호환)
      p.memberId = ownerId;
    }
  } else {
    state.projects.push({
      id: 'p' + Date.now(), memberId: ownerId, name,
      ownerId: ownerId,
      collaboratorIds: collaboratorIds,
      category: document.getElementById('pj_cat').value,
      status: document.getElementById('pj_status').value,
      progress: parseInt(document.getElementById('pj_progress').value) || 0,
      dueDate: document.getElementById('pj_due').value,
      description: document.getElementById('pj_desc').value,
      kpiId: kpiId || null,
      contribution: contribution,
      createdAt: new Date().toISOString()
    });
  }
  saveState(); closeModal(); navigate(currentPage);
}

function deleteProject(id) {
  if (!confirm('프로젝트를 삭제할까요?')) return;
  state.projects = state.projects.filter(p => p.id !== id);
  state.tasks.forEach(t => { if (t.projectId === id) t.projectId = null; });
  saveState(); navigate(currentPage);
}

function buildProjectContext(projectId) {
  const p = state.projects.find(p => p.id === projectId);
  if (!p) return null;
  const pTasks = (state.tasks||[]).filter(t => t.projectId === projectId);
  const doneTasks = pTasks.filter(t => t.done);
  const pendingTasks = pTasks.filter(t => !t.done);
  const todayStr = new Date().toISOString().slice(0,10);
  const overdueTasks = pendingTasks.filter(t => t.dueDate && t.dueDate < todayStr);
  const allNotes = pTasks.flatMap(t => (t.notes||[]).map(n => '[' + (t.title||'업무') + '] ' + (n.content||n.text||'')));
  const meetingActions = (state.meetings||[]).flatMap(m =>
    (m.actionItems||[]).filter(a => a.projectId === projectId).map(a =>
      '[' + (m.title||'회의') + '/' + (m.date||'') + '] ' + a.title + ' (' + (a.assignee||'') + ', ' + (a.done?'완료':'미완료') + ')'
    )
  );
  return {
    project: p,
    stats: {
      total: pTasks.length, done: doneTasks.length,
      pending: pendingTasks.length, overdue: overdueTasks.length,
      progress: pTasks.length ? Math.round(doneTasks.length/pTasks.length*100) : (p.progress||0)
    },
    notes: allNotes, meetingActions,
    doneTasks: doneTasks.map(t => ({ title: t.title, doneAt: t.doneAt })),
    pendingTasks: pendingTasks.map(t => ({ title: t.title, dueDate: t.dueDate, priority: t.priority }))
  };
}

async function callClaude(userContent, isReport = false) {
  const systemPrompt = isReport
    ? '당신은 스타트업 성과 분석 전문가입니다. 건축물 유지보수 미디어커머스 스타트업의 업무 패턴을 분석하고 실행 가능한 인사이트를 제공합니다.'
    : '당신은 스타트업 업무 코치입니다. 건축물 유지보수 미디어커머스 스타트업(POUR스토어) 담당자의 업무일지를 분석합니다. 다음 형식으로 분석해주세요:\n\n✅ 오늘의 성과: (잘 된 것)\n⚡ 효과적인 행동: (반복할 만한 것)\n🔧 개선 포인트: (더 잘할 수 있는 것)\n💡 내일 제안: (구체적인 액션 2-3가지)\n📊 데이터 인사이트: (수치화하거나 추적할 만한 것)';

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      system: systemPrompt,
      messages: [{ role: 'user', content: userContent }]
    })
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API 오류 (${response.status})`);
  }
  const data = await response.json();
  return data.content[0].text;
}

            const mJournals = state.journals.filter(j => j.memberId === m.id).length;
            const completionRate = mTasks.length ? Math.round(mDone/mTasks.length*100) : 0;
            return `
              <div class="member-card">
                <div class="member-card-header">
                  <div class="member-avatar" style="background:${m.color}20;color:${m.color};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700">${m.initial}</div>
                  <div>
                    <div style="font-size:14px;font-weight:700">${m.name}</div>
                    <div style="font-size:11px;color:var(--text3)">${m.role}</div>
                  </div>
                  <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="selectMember('${m.id}')">전환</button>
                </div>
                <div class="member-card-body">
                  <div class="member-stat-row"><span class="member-stat-label">업무 완료율</span><span class="member-stat-value" style="color:${completionRate>=70?'var(--green)':completionRate>=40?'var(--yellow)':'var(--red)'}">${completionRate}%</span></div>
                  <div class="member-stat-row"><span class="member-stat-label">전체 업무</span><span class="member-stat-value">${mDone} / ${mTasks.length}</span></div>
                  <div class="member-stat-row"><span class="member-stat-label">진행 프로젝트</span><span class="member-stat-value">${mActive}개</span></div>
                  <div class="member-stat-row"><span class="member-stat-label">업무일지</span><span class="member-stat-value">${mJournals}개</span></div>
                  <div style="margin-top:10px">
                    <div class="progress-bar" style="height:6px"><div class="progress-fill ${completionRate>=70?'green':''}" style="width:${completionRate}%"></div></div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- 전사 프로젝트 -->
      <div>
        <div class="section-title">📁 전사 프로젝트 현황</div>
        <div class="project-list">
          ${state.projects.length === 0 ? `<div class="card"><div class="empty"><div class="empty-icon">📁</div><div class="empty-text">프로젝트 없음</div></div></div>` :
            state.projects.map(p => {
              const m = state.members.find(m => m.id === p.memberId);
              const pTasks = state.tasks.filter(t => t.projectId === p.id);
              const pDone = pTasks.filter(t => t.done).length;
              const prog = pTasks.length ? Math.round(pDone/pTasks.length*100) : (p.progress || 0);
              const statusColors = { '진행중': 'blue', '완료': 'green', '보류': 'yellow', '계획': 'gray', '중단': 'red', '재개': 'orange' };
              return `
                <div class="project-row">
                  <div style="width:36px;height:36px;border-radius:50%;background:${m?.color||'#666'}20;color:${m?.color||'#666'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${m?.initial||'?'}</div>
                  <div class="project-row-info">
                    <div class="project-row-name">${escHtml(p.name)}</div>
                    <div class="project-row-meta">
                      <span class="badge badge-${statusColors[p.status]||'gray'}">${p.status}</span>
                      <span>${m?.name||'?'}</span>
                      <span>${p.category}</span>
                    </div>
                  </div>
                  <div class="project-row-progress">
                    <div class="project-row-pct">${prog}%</div>
                    <div class="progress-bar"><div class="progress-fill ${prog>=80?'green':''}" style="width:${prog}%"></div></div>
                  </div>
                </div>
              `;
            }).join('')
          }
        </div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════
// ALL TASKS PAGE (전체 업무 현황)
// ══════════════════════════════════════════════
let allTasksView = 'fixed'; // 'fixed' | 'daily' | 'weekly' | 'monthly'
function renderAllTasks() {
  const members = state.members;
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const todayDay = ['일','월','화','수','목','금','토'][today.getDay()];
  const weekDays = ['월','화','수','목','금'];
  const view = allTasksView;

  // 탭 렌더
  const tabs = [
    { key:'fixed', label:'📌 고정업무' },
    { key:'daily', label:'📋 일간' },
    { key:'weekly', label:'📅 주간' },
    { key:'monthly', label:'🗓️ 월간' },
  ];
  const tabsHTML = tabs.map(t => `<button class="tab-btn ${view===t.key?'active':''}" onclick="allTasksView='${t.key}';navigate('alltasks')">${t.label}</button>`).join('');

  // 뷰별 컨텐츠 생성
  let bodyHTML = '';

  if (view === 'fixed') {
    // 고정업무: 모든 담당자의 isFixed=true 업무
    bodyHTML = `
      <div style="display:grid;grid-template-columns:repeat(${members.length},1fr);gap:12px">
        ${members.map(m => {
          const fixedList = state.tasks.filter(t => t.memberId === m.id && t.isFixed);
          return `
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                <div style="width:32px;height:32px;border-radius:50%;background:${m.color}20;color:${m.color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${m.initial}</div>
                <div><div style="font-size:13px;font-weight:700">${m.name}</div><div style="font-size:11px;color:var(--text3)">${m.role}</div></div>
                <span class="count" style="margin-left:auto">${fixedList.length}</span>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px">
                ${fixedList.length === 0
                  ? `<div class="card" style="padding:12px;text-align:center;color:var(--text3);font-size:12px">고정업무 없음</div>`
                  : fixedList.map(t => `
                    <div class="card" style="padding:10px 12px;display:flex;align-items:center;gap:8px">
                      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskGlobal('${t.id}')" style="accent-color:${m.color}">
                      <div style="flex:1;min-width:0">
                        <div style="font-size:12px;${t.done?'text-decoration:line-through;color:var(--text3)':''}">${escHtml(t.title)}</div>
                        ${t.dueDate?`<div style="font-size:10px;color:var(--text3)">${t.dueDate}</div>`:''}
                      </div>
                      <span class="priority-dot priority-${t.priority||'mid'}"></span>
                    </div>
                  `).join('')
                }
                <button class="btn btn-ghost btn-sm" style="width:100%;font-size:11px" onclick="addFixedTaskFor('${m.id}','${escHtml(m.name)}')" >+ 고정업무 추가</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  } else if (view === 'daily') {
    // 일간: 오늘 업무 (weekDay === todayDay 또는 pulledToday)
    bodyHTML = `
      <div style="margin-bottom:12px;font-size:12px;color:var(--text3)">📅 ${today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div>
      <div style="display:grid;grid-template-columns:repeat(${members.length},1fr);gap:12px">
        ${members.map(m => {
          const dayList = state.tasks.filter(t => t.memberId === m.id && !t.isFixed && (t.weekDay === todayDay || t.pulledToday));
          const done = dayList.filter(t=>t.done).length;
          return `
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                <div style="width:32px;height:32px;border-radius:50%;background:${m.color}20;color:${m.color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${m.initial}</div>
                <div><div style="font-size:13px;font-weight:700">${m.name}</div><div style="font-size:11px;color:var(--text3)">${done}/${dayList.length} 완료</div></div>
              </div>
              <div style="margin-bottom:8px">
                <div class="progress-bar" style="height:4px"><div class="progress-fill" style="width:${dayList.length?Math.round(done/dayList.length*100):0}%;background:${m.color}"></div></div>
              </div>
              <div style="display:flex;flex-direction:column;gap:5px">
                ${dayList.length === 0
                  ? `<div class="card" style="padding:12px;text-align:center;color:var(--text3);font-size:12px">오늘 업무 없음</div>`
                  : dayList.map(t => {
                    const isMine = m.id === state.currentMember;
                    const isSubstituted = t.originalAssignee && t.memberId === state.currentMember;
                    return `
                    <div class="card" style="padding:8px 10px;display:flex;align-items:center;gap:8px">
                      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskGlobal('${t.id}')" style="accent-color:${m.color}">
                      <div style="flex:1;min-width:0">
                        <div style="font-size:12px;${t.done?'text-decoration:line-through;color:var(--text3)':''}">${escHtml(t.title)}</div>
                        ${t.projectId?`<div style="font-size:10px;color:var(--text3)">${escHtml((state.projects.find(p=>p.id===t.projectId)||{name:''}).name)}</div>`:''}
                        ${isSubstituted ? `<div style="font-size:9px;color:var(--accent);font-weight:600">🤝 ${state.members.find(x=>x.id===t.originalAssignee)?.name||'?'}님 대신</div>` : ''}
                      </div>
                      <span class="priority-dot priority-${t.priority||'mid'}"></span>
                      ${!isMine && !t.done ? `<button class="btn-icon" onclick="event.stopPropagation();substituteTask('${t.id}')" title="내가 대신 처리" style="font-size:14px">🤝</button>` : ''}
                      ${isSubstituted ? `<button class="btn-icon" onclick="event.stopPropagation();restoreTaskAssignee('${t.id}')" title="원래 담당자에게 돌리기" style="font-size:12px">↩️</button>` : ''}
                    </div>
                  `}).join('')
                }
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  } else if (view === 'weekly') {
    // 주간: 요일별 × 담당자 매트릭스
    bodyHTML = `
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:600px">
          <thead>
            <tr>
              <th style="width:60px;padding:8px;text-align:left;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border)">요일</th>
              ${members.map(m=>`<th style="padding:8px;text-align:left;border-bottom:1px solid var(--border)">
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="width:24px;height:24px;border-radius:50%;background:${m.color}20;color:${m.color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">${m.initial}</div>
                  <span style="font-size:12px;font-weight:600">${m.name}</span>
                </div>
              </th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${weekDays.map(d => {
              const isToday = d === todayDay;
              return `<tr style="${isToday?'background:var(--accent)10':''};border-bottom:1px solid var(--border)">
                <td style="padding:8px;font-size:12px;font-weight:${isToday?700:400};color:${isToday?'var(--accent)':'var(--text2)'}">${d}${isToday?' 오늘':''}</td>
                ${members.map(m => {
                  const dayTasks = state.tasks.filter(t => t.memberId === m.id && !t.isFixed && t.weekDay === d);
                  return `<td style="padding:8px;vertical-align:top">
                    <div style="display:flex;flex-direction:column;gap:4px">
                      ${dayTasks.length === 0
                        ? `<div style="font-size:11px;color:var(--text3)">—</div>`
                        : dayTasks.map(t=>`<div style="font-size:11px;padding:3px 6px;border-radius:4px;background:${m.color}15;border-left:2px solid ${m.color};${t.done?'opacity:0.5;text-decoration:line-through':''};display:flex;align-items:center;gap:4px">
                          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskGlobal('${t.id}')" style="accent-color:${m.color};width:12px;height:12px">
                          <span>${escHtml(t.title)}</span>
                        </div>`).join('')
                      }
                    </div>
                  </td>`;
                }).join('')}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  } else if (view === 'monthly') {
    // 월간: 이번 달 마감일 있는 업무 + 프로젝트 D-day
    const year = today.getFullYear();
    const month = today.getMonth();
    const monthStr = `${year}-${String(month+1).padStart(2,'0')}`;
    bodyHTML = `
      <div style="margin-bottom:12px;font-size:12px;color:var(--text3)">🗓️ ${year}년 ${month+1}월 업무 현황</div>
      <div style="display:grid;grid-template-columns:repeat(${members.length},1fr);gap:12px">
        ${members.map(m => {
          const monthTasks = state.tasks.filter(t => t.memberId === m.id && !t.isFixed && t.dueDate && t.dueDate.startsWith(monthStr));
          const monthProjects = state.projects.filter(p => p.memberId === m.id && p.dueDate && p.dueDate.startsWith(monthStr));
          const done = monthTasks.filter(t=>t.done).length;
          return `
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                <div style="width:32px;height:32px;border-radius:50%;background:${m.color}20;color:${m.color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${m.initial}</div>
                <div><div style="font-size:13px;font-weight:700">${m.name}</div><div style="font-size:11px;color:var(--text3)">${done}/${monthTasks.length} 완료</div></div>
              </div>
              ${monthProjects.length > 0 ? `
                <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px">📁 이달 마감 프로젝트</div>
                ${monthProjects.map(p => {
                  const dday = calcDday(p.dueDate);
                  const ddayClass = dday==='D-day'?'dday-today':dday.startsWith('D+')?'dday-over':'dday-upcoming';
                  return `<div class="card" style="padding:8px 10px;margin-bottom:5px">
                    <div style="display:flex;align-items:center;gap:6px">
                      <span style="font-size:12px;flex:1">${escHtml(p.name)}</span>
                      <span class="dday-badge ${ddayClass}">${dday}</span>
                    </div>
                    <div class="progress-bar" style="height:3px;margin-top:5px"><div class="progress-fill" style="width:${p.progress||0}%;background:${m.color}"></div></div>
                  </div>`;
                }).join('')}
              ` : ''}
              <div style="font-size:11px;font-weight:600;color:var(--text2);margin:8px 0 6px">📋 이달 마감 업무</div>
              <div style="display:flex;flex-direction:column;gap:5px">
                ${monthTasks.length === 0
                  ? `<div class="card" style="padding:10px;text-align:center;color:var(--text3);font-size:12px">이달 마감 업무 없음</div>`
                  : monthTasks.sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).map(t => {
                    const dday = calcDday(t.dueDate);
                    const ddayClass = dday==='D-day'?'dday-today':dday.startsWith('D+')?'dday-over':'dday-upcoming';
                    return `<div class="card" style="padding:8px 10px;display:flex;align-items:center;gap:8px">
                      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskGlobal('${t.id}')" style="accent-color:${m.color}">
                      <div style="flex:1;min-width:0">
                        <div style="font-size:12px;${t.done?'text-decoration:line-through;color:var(--text3)':''}">${escHtml(t.title)}</div>
                        <div style="font-size:10px;color:var(--text3)">${t.dueDate}</div>
                      </div>
                      <span class="dday-badge ${ddayClass}">${dday}</span>
                    </div>`;
                  }).join('')
                }
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  return `
    <div class="page-header">
      <div>
        <div class="page-title">👥 전체 업무 현황</div>
        <div class="page-subtitle">모든 담당자의 업무를 한눈에</div>
      </div>
    </div>
    <div class="page-content">
      <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">${tabsHTML}</div>
      ${bodyHTML}
    </div>
  `;
}
function toggleTaskGlobal(taskId) {
  const t = state.tasks.find(t => t.id === taskId);
  if (t) {
    t.done = !t.done;
    t.doneAt = t.done ? new Date().toISOString() : null;
    saveState();
  }
  navigate('alltasks');
}
function addFixedTaskFor(memberId, memberName) {
  showModal(`
    <div class="modal-header"><div class="modal-title">📌 ${memberName} 고정업무 추가</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">업무 내용</label><input class="form-input" id="fix_title" placeholder="고정업무 내용" autofocus></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">우선순위</label>
          <select class="form-select" id="fix_priority">
            <option value="high">🔴 높음</option>
            <option value="mid" selected>🟡 중간</option>
            <option value="low">🟢 낮음</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">마감일 (선택)</label><input class="form-input" id="fix_due" type="date"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-sm" onclick="saveFixedTaskFor('${memberId}')">저장</button>
    </div>
  `);
}
function saveFixedTaskFor(memberId) {
  const title = document.getElementById('fix_title').value.trim();
  if (!title) return toast('업무 내용을 입력하세요');
  state.tasks.push({
    id: 't' + Date.now(), memberId,
    title, done: false,
    priority: document.getElementById('fix_priority').value,
    isFixed: true,
    dueDate: document.getElementById('fix_due').value || null,
    projectId: null, weekDay: null, pulledToday: false,
    attachments: [], createdAt: new Date().toISOString()
  });
  saveState(); closeModal(); navigate('alltasks');
}

// 전략 실행 PAGE (OKR / KPI / Project)
// ══════════════════════════════════════════════
function renderOKR() {
  const me = state.currentMember;
  const myObjs = state.objectives.filter(o => o.memberId === me);
  const myManualKpis = state.kpis.filter(k => k.memberId === me && !k.keyResultId); // KR에 안 묶인 수동 KPI (외부 지표)
  // 기본 Objective (없으면 안내)
  if (myObjs.length === 0) {
    return `
      <div class="page-header">
        <div><div class="page-title">🎯 전략 실행</div><div class="page-subtitle">O → KR → KPI → Project</div></div>
        <div class="header-actions">
          <button class="btn btn-primary btn-sm" onclick="addObjective()">+ 첫 Objective 만들기</button>
        </div>
      </div>
      <div class="page-content">
        <div class="card"><div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">Objective가 없습니다<br><span style="font-size:12px;color:var(--text3)">대표 계정 첫 진입 시 자동 시드됩니다</span></div></div></div>
      </div>
    `;
  }
  return `
    <div class="page-header">
      <div><div class="page-title">🎯 전략 실행</div><div class="page-subtitle">O → KR → KPI → Project</div></div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="addObjective()">+ Objective</button>
        <button class="btn btn-ghost btn-sm" onclick="addStandaloneKPI()">+ 외부 KPI</button>
      </div>
    </div>
    <div class="page-content">
      ${myObjs.map(obj => renderObjectiveTree(obj)).join('')}
      ${myManualKpis.length > 0 ? `
        <div style="margin-top:30px">
          <div class="section-title">📌 외부 KPI <span class="count">${myManualKpis.length}</span>
            <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:6px">OKR 트리에 속하지 않는 보조 지표</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
            ${myManualKpis.map(k => renderManualKpiCard(k)).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderObjectiveTree(obj) {
  const krs = state.keyResults.filter(kr => kr.objectiveId === obj.id);
  const krAvg = krs.length ? Math.round(krs.reduce((s,kr) => s + (kr.target ? Math.min(100, (kr.current||0)/kr.target*100) : 0), 0) / krs.length) : 0;
  const objCurrentSum = krs.reduce((s,kr) => s + (kr.current||0), 0);
  return `
    <div class="card" style="margin-bottom:18px;border-left:4px solid var(--accent)">
      <div class="card-header" style="padding-bottom:12px">
        <div style="flex:1">
          <div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px">OBJECTIVE · ${obj.year || ''}</div>
          <div class="card-title" style="font-size:17px;font-weight:700">${escHtml(obj.title)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:6px">${escHtml(obj.description||'')}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:700;color:${krAvg>=70?'var(--green)':krAvg>=40?'var(--yellow)':'var(--text)'}">${krAvg}%</div>

function renderKRBranch(kr) {
  const kpis = state.kpis.filter(k => k.keyResultId === kr.id);
  const pct = kr.target ? Math.min(100, Math.round((kr.current||0)/kr.target*100)) : 0;
  const color = pct>=100?'var(--green)':pct>=70?'var(--yellow)':pct>=40?'var(--orange)':'var(--text3)';
  const channelBadge = kr.channel === 'inbound' ? '<span class="badge badge-blue" style="font-size:10px">인바운드</span>' :
                       kr.channel === 'outbound' ? '<span class="badge badge-orange" style="font-size:10px">아웃바운드</span>' :
                       kr.channel === 'ops' ? '<span class="badge badge-purple" style="font-size:10px">운영</span>' : '';
  return `
    <div style="padding:12px;background:var(--bg2);border-radius:8px;border-left:3px solid ${color}">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-size:10px;color:var(--text3);font-weight:600">KEY RESULT</span>
            ${channelBadge}
          </div>
          <div style="font-size:14px;font-weight:600">${escHtml(kr.title)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${escHtml(kr.description||'')}</div>
        </div>
        <div style="text-align:right">
          <input type="number" value="${kr.current||0}" style="width:120px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:4px 8px;text-align:right" onchange="updateKRCurrent('${kr.id}',this.value)" title="현재값 입력">
          <div style="font-size:10px;color:var(--text3);margin-top:2px">/ ${kr.unit==='원'?formatMoney(kr.target):kr.target+(kr.unit||'')}</div>
          <div style="font-size:14px;font-weight:700;color:${color};margin-top:2px">${pct}%</div>
        </div>
        <button class="btn-icon" onclick="editKeyResult('${kr.id}')" style="font-size:13px" title="편집">⚙️</button>
        <button class="btn-icon" onclick="deleteKR('${kr.id}')" style="font-size:13px;color:var(--text3)" title="삭제">×</button>
      </div>
      <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <!-- 하위 KPI들 -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:10px">
        ${kpis.map(k => renderKpiCard(k)).join('')}
        <div onclick="addKPItoKR('${kr.id}')" style="padding:14px;border:1px dashed var(--border);border-radius:6px;text-align:center;cursor:pointer;font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:center">+ KPI 추가</div>
      </div>
    </div>
  `;
}

function renderKpiCard(k) {
  const cur = getKpiCurrentValue(k);
  const pct = k.target ? Math.min(100, Math.round(cur/k.target*100)) : 0;
  const color = pct>=100?'var(--green)':pct>=70?'var(--yellow)':pct>=40?'var(--orange)':'var(--text2)';
  const projects = k.source !== 'manual' ? state.projects.filter(p => p.kpiId === k.id) : [];
  const srcBadge = k.source === 'auto' ?
    '<span style="font-size:9px;padding:1px 5px;background:rgba(34,197,94,0.15);color:#22c55e;border-radius:3px">🔗 자동·기여</span>' :
    k.source === 'auto-progress' ?
    '<span style="font-size:9px;padding:1px 5px;background:rgba(59,130,246,0.15);color:#3b82f6;border-radius:3px">📊 자동·진척</span>' :
    '<span style="font-size:9px;padding:1px 5px;background:rgba(234,179,8,0.15);color:#eab308;border-radius:3px">✏️ 수동</span>';
  return `
    <div class="card" style="padding:10px;cursor:pointer;border-left:2px solid ${color}" onclick="openKpiDetail('${k.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        ${srcBadge}
        <span style="font-size:13px;font-weight:700;color:${color}">${cur}<span style="font-size:10px;color:var(--text3);font-weight:400">/${k.target}${k.unit}</span></span>
      </div>
      <div style="font-size:12px;font-weight:600;margin-bottom:3px">${escHtml(k.name)}</div>
      ${k.baseline ? `<div style="font-size:9px;color:var(--text3)">시작값 ${k.baseline}${k.unit}</div>` : ''}
      <div class="progress-bar" style="margin-top:6px;height:4px"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      ${k.source !== 'manual' ? `<div style="font-size:9px;color:var(--text3);margin-top:5px">🔧 연결 프로젝트 ${projects.length}개</div>` : ''}
    </div>
  `;
}

function renderManualKpiCard(k) {
  const pct = k.target ? Math.min(100, Math.round((k.current||0)/k.target*100)) : 0;
  return `
    <div class="card" style="padding:12px;cursor:pointer" onclick="openKpiDetail('${k.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <span style="font-size:9px;padding:1px 5px;background:rgba(234,179,8,0.15);color:#eab308;border-radius:3px">✏️ 수동</span>
        <span style="font-size:14px;font-weight:700">${pct}%</span>
      </div>
      <div style="font-size:12px;font-weight:600;margin-bottom:3px">${escHtml(k.name)}</div>
      <div style="font-size:11px;color:var(--text3)">${k.current||0} / ${k.target} ${k.unit}</div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill ${pct>=100?'green':''}" style="width:${pct}%"></div></div>
    </div>
  `;
}

function formatMoney(v) {
  if (v == null) return '-';
  if (v >= 100000000) return Math.round(v/10000000)/10 + '억';
  if (v >= 10000) return Math.round(v/10000) + '만';
  return v.toLocaleString();
}

// KPI 자동 추출 - 시스템 데이터에서 실시간 집계
function getAutoKPIs() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const thisMonth = todayStr.slice(0,7);
  const myTasks = (state.tasks||[]).filter(t => t.memberId === state.currentMember);
  const myProjects = (state.projects||[]).filter(p => p.memberId === state.currentMember);
  const myMeetings = (state.meetings||[]).filter(m => m.memberId === state.currentMember);
  const mySchedules = (state.scheduleEvents||[]).filter(s => s.memberId === state.currentMember);

  // 1. 이번 주 업무 완료율 (월요일 기준)
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay() + (today.getDay()===0?-6:1));
  weekStart.setHours(0,0,0,0);
  const weekStartStr = weekStart.toISOString().slice(0,10);
  const weekRangeTasks = myTasks.filter(t => {
    const created = (t.createdAt || '').slice(0,10);
    return created && created >= weekStartStr && created <= todayStr;
  });
  const weekDone = weekRangeTasks.filter(t => t.done);
  const weekRate = weekRangeTasks.length ? Math.round(weekDone.length / weekRangeTasks.length * 100) : 0;

  // 2. 오늘 업무 완료율
  const todayTasks = myTasks.filter(t => (t.createdAt || '').slice(0,10) === todayStr);
  const todayDone = todayTasks.filter(t => t.done);
  const todayRate = todayTasks.length ? Math.round(todayDone.length / todayTasks.length * 100) : 0;

  // 3. 프로젝트 평균 진척도
  const activeProjects = myProjects.filter(p => p.status !== '완료');
  const avgProgress = activeProjects.length ? Math.round(activeProjects.reduce((s,p) => s+(p.progress||0),0)/activeProjects.length) : 0;

  // 4. 이번 달 회의 횟수
  const monthMeetings = myMeetings.filter(m => (m.date||'').startsWith(thisMonth));

  // 5. 이번 달 일정 이행률
  const monthSchedules = mySchedules.filter(s => (s.date||'').startsWith(thisMonth));
  const pastSchedules = monthSchedules.filter(s => s.date <= todayStr);
  const doneSchedules = pastSchedules.filter(s => s.done);
  const scheduleRate = pastSchedules.length ? Math.round(doneSchedules.length / pastSchedules.length * 100) : 100;

  // 6. 완료 업무 수 (이번 달)
  const monthDone = myTasks.filter(t => t.done && t.doneAt && t.doneAt.startsWith(thisMonth));

  // 7. 마감 준수율 (마감일 있는 업무 중 제때 완료)
  const withDue = myTasks.filter(t => t.dueDate);
  const onTime = withDue.filter(t => t.done && t.doneAt && t.doneAt.slice(0,10) <= t.dueDate);
  const dueRate = withDue.length ? Math.round(onTime.length / withDue.length * 100) : 100;

  return [
    { icon:'✅', name:'이번 주 업무 완료율', current:weekRate, target:80, unit:'%', description:`${weekDone.length}/${weekRangeTasks.length}개 완료` },
    { icon:'📋', name:'오늘 업무 완료율', current:todayRate, target:100, unit:'%', description:`${todayDone.length}/${todayTasks.length}개 완료` },
    { icon:'📊', name:'프로젝트 평균 진척도', current:avgProgress, target:70, unit:'%', description:`진행 중 ${activeProjects.length}개 프로젝트` },
    { icon:'📅', name:'이번 달 회의 횟수', current:monthMeetings.length, target:8, unit:'회', description:`목표 월 8회 이상` },
    { icon:'✔️', name:'마감 준수율', current:dueRate, target:90, unit:'%', description:`${onTime.length}/${withDue.length}개 제때 완료` },
    { icon:'🗂️', name:'이번 달 완료 업무', current:monthDone.length, target:20, unit:'개', description:`${thisMonth} 기준` },
  ];
}

function renderSchedule() {
  const now = new Date();
  const year = state.scheduleYear || now.getFullYear();
  const month = state.scheduleMonth !== undefined ? state.scheduleMonth : now.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay();
  const totalDays = lastDay.getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 이번 달 이벤트
  const events = (state.scheduleEvents || []).filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });

  // 프로젝트 D-day 이벤트 자동 포함
  const projEvents = (state.projects || []).filter(p => p.dueDate).map(p => ({
    id: 'proj_' + p.id, type: 'project', title: p.name + ' 마감',
    date: p.dueDate, color: '#6366f1', isProject: true
  })).filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });

  // v18: 고객 이벤트 자동 포함
  const customerEvts = (state.customerEvents || []).filter(e => {
    if (!e.startDate) return false;
    const d = new Date(e.startDate);
    return d.getFullYear() === year && d.getMonth() === month;
  }).map(e => {
    const kind = CUSTOMER_EVENT_KINDS[e.eventKind] || CUSTOMER_EVENT_KINDS.other;
    const color = e.customerType === 'B2C' ? '#ec4899' : '#8b5cf6';
    return {
      id: 'cust_' + e.id, type: 'customer', title: `${kind.icon} ${e.title}`,
      date: e.startDate, color: color, isCustomer: true, originalId: e.id
    };
  });

  const allEvents = [...events, ...projEvents, ...customerEvts];

  // 달력 셀 생성
  let cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const todayDate = now.getDate();
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  const calRows = [];
  for (let r = 0; r < cells.length / 7; r++) {
    const rowCells = cells.slice(r*7, r*7+7).map((d, dow) => {
      if (!d) return `<td class="cal-cell empty"></td>`;
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvts = allEvents.filter(e => e.date === dateStr);
      const isToday = isCurrentMonth && d === todayDate;
      const isSun = dow === 0, isSat = dow === 6;
      return `<td class="cal-cell ${isToday?'cal-today':''} ${isSun?'cal-sun':''} ${isSat?'cal-sat':''}" onclick="addScheduleEvent('${dateStr}')">
        <div class="cal-day-num">${d}</div>
        ${dayEvts.map(e => `<div class="cal-evt" style="background:${e.color||'#6366f1'}20;border-left:3px solid ${e.color||'#6366f1'};color:${e.color||'#6366f1'}" onclick="event.stopPropagation();${e.isProject?'':e.isCustomer?"editCustomerEvent('" + e.originalId + "')":"editScheduleEvent('" + e.id + "')"}">` + escHtml(e.title) + `</div>`).join('')}
      </td>`;
    }).join('');
    calRows.push(`<tr>${rowCells}</tr>`);
  }

  // 다가오는 일정 목록
  const upcoming = (state.scheduleEvents || []).filter(e => new Date(e.date) >= new Date(now.toISOString().split('T')[0]))
    .sort((a,b) => a.date.localeCompare(b.date)).slice(0, 10);

  const typeMap = Object.fromEntries(SCHEDULE_TYPES.map(t => [t.value, t]));

  return `
    <div class="page-header">
      <div>
        <div class="page-title">📅 통합 캘린더</div>
        <div class="page-sub">모든 일정을 한 곳에서 관리</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addScheduleEvent('')">+ 일정 추가</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start">
      <div class="card" style="overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)">
          <button class="btn btn-ghost btn-sm" id="calPrev">◀</button>
          <div style="font-size:16px;font-weight:700">${year}년 ${monthNames[month]}</div>
          <button class="btn btn-ghost btn-sm" id="calNext">▶</button>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>${['일','월','화','수','목','금','토'].map((d,i)=>`<th class="cal-head ${i===0?'cal-sun':i===6?'cal-sat':''}">` + d + `</th>`).join('')}</tr></thead>
          <tbody>${calRows.join('')}</tbody>
        </table>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px">📌 일정 유형</div>
          ${SCHEDULE_TYPES.map(t => {
            const cnt = (state.scheduleEvents||[]).filter(e=>e.type===t.value).length;
            return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px">
              <span style="width:10px;height:10px;border-radius:50%;background:${t.color};display:inline-block"></span>
              <span style="flex:1">${t.label}</span>
              <span style="color:var(--text3)">${cnt}개</span>
            </div>`;
          }).join('')}
        </div>
        <div class="card">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px">🔜 다가오는 일정</div>
          ${upcoming.length === 0 ? '<div style="color:var(--text3);font-size:12px">예정된 일정이 없습니다</div>' : upcoming.map(e => {
            const t = typeMap[e.type] || SCHEDULE_TYPES[4];
            const dday = calcDday(e.date);
            const ddayClass = dday==='D-day'?'dday-today':dday.startsWith('D+')?'dday-over':'dday-upcoming';
            return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;cursor:pointer" onclick="editScheduleEvent('${e.id}')">
              <span style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0"></span>
              <div style="flex:1;min-width:0">
                <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(e.title)}</div>
                <div style="color:var(--text3);font-size:10px">${e.date}${e.place ? ' · ' + escHtml(e.place) : ''}</div>
              </div>
              <span class="dday-badge ${ddayClass}">${dday}</span>
            </div>`;
          }).join('')}
        </div>
        <!-- 프로젝트 D-day 목록 -->
        ${(() => {
          const projDdays = (state.projects || []).filter(p => p.dueDate && p.status !== '완료').map(p => ({
            name: p.name, dueDate: p.dueDate, progress: p.progress || 0, status: p.status, id: p.id
          })).sort((a,b) => a.dueDate.localeCompare(b.dueDate)).slice(0, 8);
          if (projDdays.length === 0) return '';
          return `<div class="card">
            <div style="font-size:13px;font-weight:600;margin-bottom:10px">📁 프로젝트 D-day</div>
            ${projDdays.map(p => {
              const dday = calcDday(p.dueDate);
              const ddayClass = dday==='D-day'?'dday-today':dday.startsWith('D+')?'dday-over':'dday-upcoming';
              return `<div style="padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="navigate('projects')">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
                  <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.name)}</span>
                  <span class="dday-badge ${ddayClass}">${dday}</span>
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                  <div class="progress-bar" style="flex:1;height:3px"><div class="progress-fill" style="width:${p.progress}%"></div></div>
                  <span style="font-size:10px;color:var(--text3)">${p.progress}%</span>
                </div>
              </div>`;
            }).join('')}
          </div>`;
        })()}
      </div>
    </div>
  `;
}

function bindSchedule() {
  const now = new Date();
  const year = state.scheduleYear || now.getFullYear();
  const month = state.scheduleMonth !== undefined ? state.scheduleMonth : now.getMonth();
  document.getElementById('calPrev')?.addEventListener('click', () => {
    let m = month - 1, y = year;
    if (m < 0) { m = 11; y--; }
    state.scheduleYear = y; state.scheduleMonth = m;
    navigate('schedule');
  });
  document.getElementById('calNext')?.addEventListener('click', () => {
    let m = month + 1, y = year;
    if (m > 11) { m = 0; y++; }
    state.scheduleYear = y; state.scheduleMonth = m;
    navigate('schedule');
  });
}

function addScheduleEvent(dateStr) {
  const typeOpts = SCHEDULE_TYPES.map(t => `<option value="${t.value}">${t.label}</option>`).join('');
  showModal(`
    <div class="modal-header"><div class="modal-title">📅 일정 추가</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">일정 제목</label><input class="form-input" id="sch_title" placeholder="일정 제목" autofocus></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">날짜</label><input class="form-input" id="sch_date" type="date" value="${dateStr}"></div>
        <div class="form-group"><label class="form-label">종료일 (선택)</label><input class="form-input" id="sch_end" type="date" value="${dateStr}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">유형</label><select class="form-select" id="sch_type" onchange="toggleSchProjectField(this.value)">${typeOpts}</select></div>
        <div class="form-group"><label class="form-label">장소 (선택)</label><input class="form-input" id="sch_place" placeholder="장소"></div>
      </div>
      <div class="form-group" id="sch_proj_wrap" style="display:none"><label class="form-label">연결 프로젝트 (선택)</label><select class="form-select" id="sch_project"><option value="">-- 프로젝트 선택 --</option>${(state.projects||[]).map(p=>`<option value="${p.id}">${escHtml(p.name)}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">메모</label><textarea class="form-input" id="sch_memo" rows="2" placeholder="메모"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="saveScheduleEvent()">저장</button></div>
  `);
}

function toggleSchProjectField(val) {
  const wrap = document.getElementById('sch_proj_wrap');
  if (wrap) wrap.style.display = val === 'project' ? '' : 'none';
}
function saveScheduleEvent() {
  const title = document.getElementById('sch_title').value.trim();
  if (!title) return toast('일정 제목을 입력하세요');
  const date = document.getElementById('sch_date').value;
  if (!date) return toast('날짜를 선택하세요');
  const typeVal = document.getElementById('sch_type').value;
  const typeInfo = SCHEDULE_TYPES.find(t => t.value === typeVal) || SCHEDULE_TYPES[4];
  const projEl = document.getElementById('sch_project');
  const projectId = projEl ? projEl.value : '';
  const project = projectId ? (state.projects||[]).find(p => p.id === projectId) : null;
  if (!state.scheduleEvents) state.scheduleEvents = [];
  state.scheduleEvents.push({
    id: 'se' + Date.now(), title, date,
    endDate: document.getElementById('sch_end').value || date,
    type: typeVal, color: typeInfo.color,
    place: document.getElementById('sch_place').value,
    memo: document.getElementById('sch_memo').value,
    projectId: projectId || null,
    projectName: project ? project.name : null,
    memberId: state.currentMember, createdAt: new Date().toISOString()
  });
  saveState(); closeModal(); navigate('schedule');
}

function editScheduleEvent(id) {
  const e = (state.scheduleEvents||[]).find(e => e.id === id);
  if (!e) return;
  const typeOpts = SCHEDULE_TYPES.map(t => `<option value="${t.value}" ${e.type===t.value?'selected':''}>${t.label}</option>`).join('');
  showModal(`
    <div class="modal-header"><div class="modal-title">📅 일정 수정</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">일정 제목</label><input class="form-input" id="sch_title" value="${escHtml(e.title)}" autofocus></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">날짜</label><input class="form-input" id="sch_date" type="date" value="${e.date}"></div>
        <div class="form-group"><label class="form-label">종료일</label><input class="form-input" id="sch_end" type="date" value="${e.endDate||e.date}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">유형</label><select class="form-select" id="sch_type">${typeOpts}</select></div>
        <div class="form-group"><label class="form-label">장소</label><input class="form-input" id="sch_place" value="${escHtml(e.place||'')}"></div>
      </div>
      <div class="form-group"><label class="form-label">메모</label><textarea class="form-input" id="sch_memo" rows="2">${escHtml(e.memo||'')}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteScheduleEvent('${id}')">삭제</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-sm" onclick="updateScheduleEvent('${id}')">저장</button>
    </div>
  `);
}

function updateScheduleEvent(id) {
  const e = (state.scheduleEvents||[]).find(e => e.id === id);
  if (!e) return;
  const typeVal = document.getElementById('sch_type').value;
  const typeInfo = SCHEDULE_TYPES.find(t => t.value === typeVal) || SCHEDULE_TYPES[4];
  e.title = document.getElementById('sch_title').value.trim() || e.title;
  e.date = document.getElementById('sch_date').value || e.date;
  e.endDate = document.getElementById('sch_end').value || e.date;
  e.type = typeVal; e.color = typeInfo.color;
  e.place = document.getElementById('sch_place').value;
  e.memo = document.getElementById('sch_memo').value;
  saveState(); closeModal(); navigate('schedule');
}

function deleteScheduleEvent(id) {
  state.scheduleEvents = (state.scheduleEvents||[]).filter(e => e.id !== id);
  saveState(); closeModal(); navigate('schedule');
}

function renderMeeting() {
  const meetings = (state.meetings || []).filter(m => m.memberId === state.currentMember || m.attendees?.includes(state.currentMember));
  const sorted = [...meetings].sort((a,b) => b.date.localeCompare(a.date));
  const members = state.members || [];

  // 통계
  const total = meetings.length;
  const allActions = meetings.flatMap(m => m.actionItems||[]);
  const doneActions = allActions.filter(a => a.done).length;
  const recentDate = sorted[0]?.date || '-';

  return `
    <div class="page-header">
      <div>
        <div class="page-title">📋 회의록</div>
        <div class="page-subtitle">회의 기록 + 액션 아이템 자동 추적</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="addMeeting()">+ 새 회의록</button>
      </div>
    </div>
    <div class="page-content">
      <!-- 통계 4종 -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
        <div class="card" style="padding:14px;text-align:center">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">전체 회의</div>
          <div style="font-size:22px;font-weight:700">${total}</div>
        </div>
        <div class="card" style="padding:14px;text-align:center">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">액션 아이템</div>
          <div style="font-size:22px;font-weight:700;color:var(--blue)">${allActions.length}</div>
        </div>
        <div class="card" style="padding:14px;text-align:center">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">완료율</div>
          <div style="font-size:22px;font-weight:700;color:var(--green)">${allActions.length?Math.round(doneActions/allActions.length*100):0}%</div>
        </div>
        <div class="card" style="padding:14px;text-align:center">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">최근 회의</div>
          <div style="font-size:13px;font-weight:700;margin-top:6px">${recentDate}</div>
        </div>
      </div>

      ${sorted.length === 0 ? `
        <div class="card" style="padding:40px;text-align:center;color:var(--text3)">
          <div style="font-size:32px;margin-bottom:10px">📋</div>
          <div style="font-size:14px;margin-bottom:14px">등록된 회의록이 없습니다</div>
          <button class="btn btn-primary btn-sm" onclick="addMeeting()">+ 첫 회의록 작성</button>

      ` : `
        <div class="section-title">📝 회의 기록 <span class="count">${sorted.length}</span></div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${sorted.map(m => {
            const actionItems = (m.actionItems || []);
            const doneAi = actionItems.filter(a => a.done).length;
            const aiPct = actionItems.length ? Math.round(doneAi/actionItems.length*100) : 0;
            const meetingType = m.type ? `<span class="badge" style="font-size:10px;padding:2px 6px;background:var(--bg3);color:var(--text2);border-radius:3px">${escHtml(m.type)}</span>` : '';
            return `
              <div class="card" style="padding:14px">
                <div style="display:flex;align-items:flex-start;gap:12px">
                  <div style="flex:1;min-width:0">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">

                    </div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">

                    </div>
                    ${m.agenda ? `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;padding:8px 10px;background:var(--bg2);border-radius:6px;white-space:pre-wrap">${escHtml(m.agenda)}</div>` : ''}

                            ${a.assignee ? (() => { const mem=state.members.find(x=>x.id===a.assignee); return mem?`<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${mem.color};color:white;font-size:9px;font-weight:600" title="${mem.name}">${mem.initial}</span>`:''; })() : ''}
                            ${a.dueDate ? `<span class="dday-badge ${calcDday(a.dueDate)==='D-day'?'dday-today':calcDday(a.dueDate).startsWith('D+')?'dday-over':'dday-upcoming'}" style="font-size:10px">${calcDday(a.dueDate)}</span>` : ''}
                          </div>`).join('')}
                      </div>

                  </div>
                  <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
                    <button class="btn btn-ghost btn-sm" onclick="editMeeting('${m.id}')" title="수정">⚙️</button>
                    <button class="btn-icon" onclick="deleteMeeting('${m.id}')" title="삭제">🗑</button>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

  showModal(`

      <div class="form-row">
        <div class="form-group"><label class="form-label">날짜</label><input class="form-input" id="mt_date" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
        <div class="form-group"><label class="form-label">시간</label><input class="form-input" id="mt_time" type="time"></div>

let _meetingActionItems = [];

function addActionItemRow() {
  const id = 'ai' + Date.now() + Math.random().toString(36).slice(2,5);
  _meetingActionItems.push({ id, text:'', assignee:'', dueDate:'', priority:'mid', promoteToProject: false, done:false });
  const list = document.getElementById('actionItemList');
  const members = state.members || [];
  const memberOpts = members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  const row = document.createElement('div');
  row.id = 'airow_' + id;
  row.style.cssText = 'background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px';
  row.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <input class="form-input" style="flex:1" placeholder="결정된 할 일 (예: 코트재 회색 색상견본 의뢰)" id="ai_text_${id}">
      <button class="btn-icon" onclick="document.getElementById('airow_${id}').remove();_meetingActionItems=_meetingActionItems.filter(a=>a.id!=='${id}')" style="flex-shrink:0;color:var(--red)">✕</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <select class="form-select" style="flex:1;min-width:100px" id="ai_who_${id}">
        <option value="">담당자 선택</option>${memberOpts}
      </select>
      <input class="form-input" style="flex:1;min-width:120px" type="date" id="ai_due_${id}" title="마감일">
      <select class="form-select" id="ai_priority_${id}" style="width:80px">
        <option value="high">🔴 높음</option>
        <option value="mid" selected>🟡 중간</option>
        <option value="low">🟢 낮음</option>
      </select>
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;color:var(--blue);padding:4px 8px;background:rgba(59,130,246,0.08);border-radius:4px" title="작은 일은 업무로, 큰 일은 프로젝트로 승격">
        <input type="checkbox" id="ai_promote_${id}" style="margin:0">📁 프로젝트로
      </label>
    </div>
  `;
  list.appendChild(row);
}

function saveMeeting() {
  const title = document.getElementById('mt_title').value.trim();
  if (!title) return toast('회의 제목을 입력하세요');
  const meetingId = 'm' + Date.now();
  const meetingDate = document.getElementById('mt_date').value;

  // 액션 아이템 수집 + task/project 자동 동기화
  const actionItems = [];
  const createdTaskIds = [];
  const createdProjIds = [];

  _meetingActionItems.forEach(a => {
    const text = document.getElementById('ai_text_' + a.id)?.value.trim();
    if (!text) return;
    const assignee = document.getElementById('ai_who_' + a.id)?.value || state.currentMember;
    const dueDate = document.getElementById('ai_due_' + a.id)?.value || '';
    const priority = document.getElementById('ai_priority_' + a.id)?.value || 'mid';
    const promote = document.getElementById('ai_promote_' + a.id)?.checked || false;

    const aiId = 'ai' + Date.now() + Math.random().toString(36).slice(2,5);
    let linkedTaskId = null, linkedProjectId = null;

    if (promote) {
      // 프로젝트로 승격
      const pid = 'p' + Date.now() + Math.random().toString(36).slice(2,5);
      state.projects.push({
        id: pid, memberId: assignee, ownerId: assignee,
        collaboratorIds: [], name: text,
        category: '내부', status: '진행중', progress: 0,
        description: `📋 ${meetingDate} 회의에서 결정`,
        dueDate: dueDate || '',
        linkedMeetingId: meetingId,
        kpiId: null, contribution: 0,
        createdAt: new Date().toISOString()
      });
      createdProjIds.push(pid);
      linkedProjectId = pid;
    } else {
      // task로 자동 등록
      const tid = 't' + Date.now() + Math.random().toString(36).slice(2,5);
      state.tasks.push({
        id: tid, memberId: assignee,
        title: text, done: false,
        priority, projectId: null,
        dueDate, weekDay: '',
        isFixed: false, attachments: [], notes: [],
        status: 'active',
        linkedMeetingId: meetingId,
        linkedActionItemId: aiId,
        createdAt: new Date().toISOString()
      });
      createdTaskIds.push(tid);
      linkedTaskId = tid;
    }

    actionItems.push({
      id: aiId, text, assignee, dueDate, priority,
      done: false,
      linkedTaskId, linkedProjectId
    });
  });

  if (!state.meetings) state.meetings = [];
  state.meetings.push({
    id: meetingId, memberId: state.currentMember,
    title, date: meetingDate,
    time: document.getElementById('mt_time').value,
    type: document.getElementById('mt_type').value,
    place: document.getElementById('mt_place').value,
    agenda: document.getElementById('mt_agenda').value,
    actionItems, createdAt: new Date().toISOString()
  });

  _meetingActionItems = [];
  saveState(); closeModal(); navigate('meeting');
  const msg = `회의록 저장${createdTaskIds.length?` · 업무 ${createdTaskIds.length}개 자동 등록`:''}${createdProjIds.length?` · 프로젝트 ${createdProjIds.length}개 생성`:''}`;
  toast(msg);
}

function editMeeting(id) {
  const m = (state.meetings||[]).find(m => m.id === id);
  if (!m) return;
  // 간단 수정: 제목과 안건만
  showModal(`
    <div class="modal-header"><div class="modal-title">📝 회의록 수정</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">회의 제목</label><input class="form-input" id="mt_edit_title" value="${escHtml(m.title)}" autofocus></div>
      <div class="form-group"><label class="form-label">안건 / 내용</label><textarea class="form-input" id="mt_edit_agenda" rows="5">${escHtml(m.agenda||'')}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-sm" onclick="updateMeeting('${id}')">저장</button>
    </div>
  `);
}

function updateMeeting(id) {
  const m = (state.meetings||[]).find(m => m.id === id);
  if (!m) return;
  m.title = document.getElementById('mt_edit_title').value.trim() || m.title;
  m.agenda = document.getElementById('mt_edit_agenda').value;
  saveState(); closeModal(); navigate('meeting');
}

function deleteMeeting(id) {
  state.meetings = (state.meetings||[]).filter(m => m.id !== id);
  saveState(); closeModal(); navigate('meeting');
}

function toggleActionItem(meetingId, actionId) {
  const m = (state.meetings||[]).find(m => m.id === meetingId);
  if (!m) return;
  const a = (m.actionItems||[]).find(a => a.id === actionId);
  if (!a) return;
  a.done = !a.done;
  // v20: linkedTaskId가 있으면 task의 done도 동기화
  if (a.linkedTaskId) {
    const t = state.tasks.find(t => t.id === a.linkedTaskId);
    if (t) {
      t.done = a.done;
      t.doneAt = a.done ? new Date().toISOString() : null;
    }
  }
  saveState();
  navigate('meeting');
}

function showModal(html, size) {
  const container = document.getElementById('modalContainer');
  const cls = size === 'large' ? 'modal modal-large' : 'modal';
  container.innerHTML = `<div class="modal-overlay" onclick="closeModalOnOverlay(event)"><div class="${cls}">${html}</div></div>`;
}

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function closeModalOnOverlay(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

트재와 시공해야 시너지","/ 시트방향: 위-하얀/매끄러운 부분, 아래-거칠고 어두운부분","<균열보수시트-0.3t>","*시트특성 : 니들펀칭 후 열처리 하여 보풀이 적음","*기능 :","1.부착력 강함","2.함침이 잘되어 약액과 같이 사용했을 시 절대 안떨어짐","3.미관상 깔끔한 시트","*사용처 : 균열, 이음부 전부","<코트재>","#기능 : 방수, 강력한 탄성 및 부착력, 우수한 시공성(원액), 콘크리트 중성화방지, 철근 부식방지","#규격 : 20kg / 18L","#색상 : 녹색,적갈색,회색,백색","#제작처 : 자체개발","#1통 당 도포 가능 면적 :1mm 도포 기준  100헤베(약30평) | 시트포함 기준 약20헤베(6평)","#건조시간 :권장 양생시간은 1일. (여름철 6시간 / 겨울철 5-6시간 이상 건조)","=> 손으로 만져보고 안묻어나면 건조 완료","#보관방법 : 비닐에 공기를 최대한 제거 후 밀폐(공기가 닿으면 변질될 가능성이 높음)","#개봉 전 저장기간 :  12개월(5~35C","실내보관 시)","#개봉 후 보관기간 : 3개월(공기를 뺀 밀봉 조건) / 식별방법 : 처음 개봉때처럼 맑아야 사용 가능 <뭉쳐 있거나 덩어리져 있으면 사용이 불가> /  이형분리(흑색이 보일 수 있음)현상 있을시 휘저어볼것","#색소첨가: 자체생산은 2000~3000헤베 이상 가능. 셀프첨가 가능하나, 배합이 잘못되면 양생 후 색상이 이상하게 보일 수 있음. 배합 중요함","#하도 PRC-100 = POUR코트재","#중도 PRC-200 ->색상: 녹색,회색,적갈색 / 가격 동일","<탑코트재>","#기능 : 자외선 차단 및 단열,차열 효과","#색상 : 적갈색,녹색,회색","<강화재","- 선택사항>","#기능: 후 공정 부착강도 증진, 콘크리트 강화","#1통 당 도포 가능 면적: 두께 50mm기준 66헤베(배합 시) / 100헤베(원액 시)","#배합비: 물7:강화재3 -> 강화액3:코트재7 =>모체강화함침액","<슈퍼복합압축시트-0.3t>","#시트특성 : 니들펀칭 후 압착처리","#장점 : 부착력, 약액함침 잘됨","#사용처 : 아스팔트슁글 지붕면, 기와이음부","(기타구조물 및 벽체이음부),슬라브이음부,듀얼복합시트접합면","<압축강화시트-0.7t>","#시트특성 : 니들펀칭 후 그리드 작업","#장점 : 인장강도 강함,부착력우수","#사용처 : 금속기와/칼라강판 지붕면, 슁글 이음부(기타구조물 및 벽체이음부)","방수강화액 혼합비율 =  강화액(물8:강화재2):코트재7","#비율 꼭 지켜야함","물이 많을 시 : 접착력이나 부착력 기능 저하","강화재가 많을 시 : 접착은 더 잘되지만 추후 시트가 으스러질 수 있음","<타사>","*우레탄방수","유기성, 수분배출 불가. 수축팽창 대응에 약해 에어포켓 발생.","시공 시 1mm씩 쌓아서 3mm로 정확하게 도막 형성해야하며","건조과정이 잘못되면 에어포켓 발생되어 하자 발생-> 시공성 어려움","*슁글탄(도료)","방수액으로만 시공 시 건조 과정에 방수층이 얇","<잘 못된 시공 시 해결방법>","-시공 중 비 맞을 시","처음부터 재 시공","*듀얼시트 재사용 가능","*0.3보강용시트(슈퍼복합시트) 재사용 불가 - 시공 시 함침으로 약액을 빨아먹어 굳어 재 시공 시 부착이 잘 안됨","-양생 부족","처음부터 재시공 코트재를 오래동안 건조해야함(동절기는 1일 이상 권장)","<하자 문의>","-듀얼시트","-날씨에 따라 들뜸 있을 수 있음 그러나 하자가 아니고 계절이 바뀌며 다시 부착됨(보통 여름에 뜨고 겨울에 가라앉음)","도막방수에서 들뜸은 치명적이나,","듀얼 복합시트는 그 부분까지 계산하고 강도를 만든 시트이기 때문에 들뜸이 있으나 하자가 아니고 일시적현상","-빗물에 씻겨남 발생 시:","(= 탑코트재 도포 전까지는 무조건 마쳐야함. 그 전에 빗물 맞으면 안됨. 시트는 재활용 불가하여 재 시공해야함)","<기타 상황 시 시공방법>","*슁글 자재이되, 슬라브 형태 시 슬라브세트로 시공","1. 바탕 정리","- 큰 이물질만 let _manualSelectedCat = null;
let _manualSearchQ = '';

function renderManual() {
  const cats = POUR_SEED_DATA.manual || [];
  const totalItems = cats.reduce((s,c) => s + (c.items||[]).length, 0);
  return `
    <div class="page-header">
      <div>
        <div class="page-title">📚 POUR스토어 업무 매뉴얼</div>
        <div class="page-subtitle">${cats.length}개 카테고리 · 총 ${totalItems}개 항목 — 마인드맵 원본에서 임베드됨</div>
      </div>
      <div class="header-actions">
        <input class="form-input" id="manualSearch" placeholder="🔍 키워드 검색 (예: 발주, 시트, 파트너사)" oninput="updateManualSearch(this.value)" style="width:280px">
      </div>
    </div>
    <div class="page-content">
      <div id="manualBody">${renderManualBody()}</div>
    </div>
  `;
}

function bindManual() {
  const inp = document.getElementById('manualSearch');
  if (inp) inp.value = _manualSearchQ || '';
}

function updateManualSearch(q) {
  _manualSearchQ = (q || '').trim();
  const body = document.getElementById('manualBody');
  if (body) body.innerHTML = renderManualBody();
}

function renderManualBody() {
  const cats = POUR_SEED_DATA.manual || [];
  const totalItems = cats.reduce((s,c)=>s+(c.items||[]).length, 0);
  const q = _manualSearchQ.toLowerCase();
  // 검색 모드: 모든 카테고리에서 일치 항목만
  if (q) {
    const hits = [];
    cats.forEach(c => {
      const matched = (c.items||[]).filter(it => it.toLowerCase().includes(q));
      if (matched.length > 0) hits.push({ cat: c, items: matched });
    });
    const totalHits = hits.reduce((s,h)=>s+h.items.length,0);
    if (hits.length === 0) {
      return `
        <div class="card" style="padding:30px;text-align:center;color:var(--text3)">
          <div style="font-size:32px;margin-bottom:10px">🔍</div>
          <div style="font-size:14px;margin-bottom:4px">"${escHtml(_manualSearchQ)}"에 대한 결과가 없습니다</div>
          <div style="font-size:11px;color:var(--text3);margin-top:8px">다른 키워드로 검색해보세요 (예: 발주, 시트, 파트너)</div>
          <button class="btn btn-ghost btn-sm" onclick="updateManualSearch('')" style="margin-top:14px">전체 카테고리로 돌아가기</button>
        </div>`;
    }
    return `
      <div class="card" style="padding:14px;margin-bottom:14px;background:rgba(232,99,42,0.05);border-left:3px solid var(--accent)">
        <div style="font-size:13px;color:var(--text)">🔍 "<strong style="color:var(--accent)">${escHtml(_manualSearchQ)}</strong>" 검색 결과 <strong>${totalHits}건</strong> · ${hits.length}개 카테고리</div>
      </div>
      ${hits.map(h => `
        <div class="card" style="margin-bottom:12px">
          <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg2);cursor:pointer" onclick="_manualSelectedCat='${h.cat.id}';updateManualSearch('')">
            <span style="font-size:18px">${manualIcon(h.cat.icon)}</span>
            <span style="font-size:13px;font-weight:700;flex:1">${escHtml(h.cat.title)}</span>
            <span class="badge" style="font-size:10px;padding:2px 6px;background:var(--bg3);color:var(--text2);border-radius:3px;font-weight:600">${h.items.length}건</span>
          </div>
          <div style="padding:6px 14px">
            ${h.items.slice(0, 10).map(it => `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;line-height:1.6">${highlightTerm(it, _manualSearchQ)}</div>`).join('')}
            ${h.items.length > 10 ? `<div style="padding:8px 0;text-align:center;font-size:11px;color:var(--text3)">…외 ${h.items.length-10}건 · 카테고리 클릭하여 전체 보기</div>` : ''}
          </div>
        </div>
      `).join('')}
    `;
  }
  // 상세 모드: 선택한 카테고리만 표시
  if (_manualSelectedCat) {
    const c = cats.find(x => x.id === _manualSelectedCat);
    if (!c) { _manualSelectedCat = null; return renderManualBody(); }
    return `
      <div style="margin-bottom:14px">
        <button class="btn btn-ghost btn-sm" onclick="_manualSelectedCat=null;updateManualSearch('')">← 카테고리 목록</button>
      </div>
      <div class="card">
        <div style="padding:18px;border-bottom:1px solid var(--border);background:linear-gradient(135deg, rgba(232,99,42,0.08), var(--bg2))">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
            <span style="font-size:28px">${manualIcon(c.icon)}</span>
            <div style="flex:1">
              <div style="font-size:16px;font-weight:700;margin-bottom:2px">${escHtml(c.title)}</div>
              <div style="font-size:11px;color:var(--text3)">${c.items.length}개 항목</div>
            </div>
          </div>
          ${c.desc ? `<div style="font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6">${escHtml(c.desc)}</div>` : ''}
        </div>
        <div style="padding:8px 16px">
          ${(c.items||[]).map((it, i) => `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.7;color:var(--text);display:flex;gap:10px">
            <span style="display:inline-block;min-width:24px;color:var(--text3);font-size:11px;text-align:right;flex-shrink:0">${i+1}.</span>
            <span style="flex:1">${escHtml(it)}</span>
          </div>`).join('')}
        </div>
      </div>
    `;
  }
  // 그리드 모드: 통계 카드 + 카테고리 그리드
  return `
    <!-- 통계 카드 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      <div class="card" style="padding:14px;text-align:center">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">전체 카테고리</div>
        <div style="font-size:22px;font-weight:700;color:var(--accent)">${cats.length}</div>
      </div>
      <div class="card" style="padding:14px;text-align:center">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">전체 항목</div>
        <div style="font-size:22px;font-weight:700;color:var(--blue)">${totalItems.toLocaleString()}</div>
      </div>
      <div class="card" style="padding:14px;text-align:center">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">평균 항목/카테고리</div>
        <div style="font-size:22px;font-weight:700;color:var(--green)">${Math.round(totalItems/cats.length)}</div>
      </div>
    </div>

    <div class="section-title">📚 카테고리 <span class="count">${cats.length}</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px">
      ${cats.map(c => `
        <div class="card" style="padding:14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent" onclick="_manualSelectedCat='${c.id}';updateManualSearch('')" onmouseover="this.style.borderLeftColor='var(--accent)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderLeftColor='transparent';this.style.transform='translateY(0)'">
          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">
            <span style="font-size:22px;flex-shrink:0">${manualIcon(c.icon)}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700;margin-bottom:3px">${escHtml(c.title)}</div>
              <span class="badge" style="font-size:10px;padding:2px 6px;background:var(--bg3);color:var(--text2);border-radius:3px;font-weight:600">${c.items.length}개 항목</span>
            </div>
          </div>
          ${c.desc ? `<div style="font-size:11px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:6px">${escHtml(c.desc)}</div>` : ''}
        </div>
      `).join('')}

  `;
}
