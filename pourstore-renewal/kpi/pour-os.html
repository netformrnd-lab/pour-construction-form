function runGlobalSearch(q) {
  const results = document.getElementById('globalSearchResults');
  if (!results) return;
  const query = (q||'').trim().toLowerCase();
  if (!query) {
    results.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center;padding:30px 0">키워드를 입력하면 모든 데이터에서 검색합니다.</div>`;
    return;
  }
  const me = state.currentMember;
  // 업무
  const taskHits = state.tasks.filter(t => t.memberId === me && !t.isFixed && (
    (t.title||'').toLowerCase().includes(query) ||
    (t.notes||[]).some(n => ((n.content||n.text||'').toLowerCase()).includes(query))
  )).slice(0, 20);
  // 프로젝트
  const projHits = state.projects.filter(p => p.memberId === me && (
    (p.name||'').toLowerCase().includes(query) ||
    (p.description||'').toLowerCase().includes(query)
  )).slice(0, 10);
  // 회의록
  const meetHits = (state.meetings||[]).filter(m => m.memberId === me && (
    (m.title||'').toLowerCase().includes(query) ||
    (m.agenda||'').toLowerCase().includes(query) ||
    (m.actionItems||[]).some(a => (a.text||a.title||'').toLowerCase().includes(query))
  )).slice(0, 10);
  // 일정
  const schedHits = (state.scheduleEvents||[]).filter(e => e.memberId === me && (
    (e.title||'').toLowerCase().includes(query) ||
    (e.memo||'').toLowerCase().includes(query)
  )).slice(0, 10);
  // 매뉴얼 (모든 사용자 공통)
  const manualHits = [];
  (POUR_SEED_DATA?.manual || []).forEach(c => {
    (c.items||[]).forEach(it => {
      if (it.toLowerCase().includes(query)) manualHits.push({ cat: c.title, catId: c.id, icon: c.icon, item: it });
    });
  });
  const manualHitsLimited = manualHits.slice(0, 15);

  const total = taskHits.length + projHits.length + meetHits.length + schedHits.length + manualHits.length;
  if (total === 0) {
    results.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center;padding:30px 0">"${escHtml(query)}"에 대한 결과가 없습니다.</div>`;
    return;
  }
  const section = (title, items, renderer) => items.length === 0 ? '' : `
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">${title} (${items.length})</div>
      ${items.map(renderer).join('')}
    </div>`;
  results.innerHTML = `
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px">총 ${total}건</div>
    ${section('📌 업무', taskHits, t => {
      const proj = state.projects.find(p => p.id === t.projectId);
      return `<div onclick="closeModal();navigate('dashboard')" style="padding:8px 10px;border-radius:5px;background:var(--bg3);margin-bottom:4px;cursor:pointer;font-size:12px">
        ${t.done?'<span style="color:var(--green)">✓</span> ':''}<span>${escHtml(t.title)}</span>
        ${proj?`<span style="color:var(--text3);font-size:10px;margin-left:6px">${escHtml(proj.name)}</span>`:''}
      </div>`;
    })}
    ${section('📁 프로젝트', projHits, p => `<div onclick="closeModal();navigate('projects')" style="padding:8px 10px;border-radius:5px;background:var(--bg3);margin-bottom:4px;cursor:pointer;font-size:12px">
      <span class="badge badge-${p.category==='커머스'?'orange':'blue'}" style="margin-right:6px">${p.category}</span>${escHtml(p.name)}
      <span style="color:var(--text3);font-size:10px;margin-left:6px">${p.status}</span>
    </div>`)}
    ${section('📝 회의록', meetHits, m => `<div onclick="closeModal();navigate('meeting')" style="padding:8px 10px;border-radius:5px;background:var(--bg3);margin-bottom:4px;cursor:pointer;font-size:12px">
      <span>${escHtml(m.title)}</span><span style="color:var(--text3);font-size:10px;margin-left:6px">${m.date}</span>
    </div>`)}
    ${section('📅 일정', schedHits, e => `<div onclick="closeModal();navigate('schedule')" style="padding:8px 10px;border-radius:5px;background:var(--bg3);margin-bottom:4px;cursor:pointer;font-size:12px">
      <span>${escHtml(e.title)}</span><span style="color:var(--text3);font-size:10px;margin-left:6px">${e.date}</span>
    </div>`)}
    ${manualHits.length === 0 ? '' : `
      <div style="margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">📚 매뉴얼 (${manualHits.length}${manualHits.length > 15 ? ', 상위 15개' : ''})</div>
        ${manualHitsLimited.map(h => `<div onclick="closeModal();_manualSelectedCat='${h.catId}';_manualSearchQ='${escHtml(query).replace(/'/g,"&#39;")}';navigate('manual')" style="padding:8px 10px;border-radius:5px;background:var(--bg3);margin-bottom:4px;cursor:pointer;font-size:12px">
          <span style="margin-right:6px">${manualIcon(h.icon)}</span>
          <span>${escHtml(h.item.length > 80 ? h.item.slice(0,80) + '…' : h.item)}</span>
          <span style="color:var(--text3);font-size:10px;display:block;margin-top:2px;margin-left:22px">${escHtml(h.cat)}</span>
        </div>`).join('')}
      </div>`}
  `;
}

function setApiKey() {
  const current = state.apiKey ? '현재 설정됨' : '미설정';
  showModal(`
    <div class="modal-header"><div class="modal-title">🔑 Claude API 키 설정</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div style="font-size:13px;color:var(--text3);margin-bottom:12px">AI 업무일지 분석 기능을 사용하려면 Anthropic API 키가 필요합니다.<br>키는 브라우저 localStorage에만 저장됩니다.</div>
      <div class="form-group">
        <label class="form-label">API 키 (현재: ${current})</label>
        <input class="form-input" id="apiKeyInput" type="password" placeholder="sk-ant-..." value="${state.apiKey||''}">
      </div>
      <div style="font-size:12px;color:var(--text3)">
        <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent)">console.anthropic.com</a>에서 발급받을 수 있습니다.
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button><button class="btn btn-primary btn-sm" onclick="saveApiKey()">저장</button></div>
  `);
}

function saveApiKey() {
  state.apiKey = document.getElementById('apiKeyInput').value.trim();
  saveState(); closeModal();
  toast(state.apiKey ? 'API 키가 저장되었습니다' : 'API 키가 삭제되었습니다');
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// 분기 동적 생성 (작년 ~ 내년)
function getQuarterRange() {
  const year = new Date().getFullYear();
  const out = [];
  for (let y = year - 1; y <= year + 1; y++) {
    for (let q = 1; q <= 4; q++) out.push(`${y}-Q${q}`);
  }
  return out;
}
function getCurrentQuarter() {
  const now = new Date();
  const q = Math.ceil((now.getMonth()+1)/3);
  return `${now.getFullYear()}-Q${q}`;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
(function init() {
  renderMemberPicker();
  if (state.currentMember) {
    const m = getMember();
    if (m) {
      document.getElementById('sidebarAvatar').textContent = m.initial;
      document.getElementById('sidebarAvatar').style.background = m.color + '20';
      document.getElementById('sidebarAvatar').style.color = m.color;
      document.getElementById('sidebarName').textContent = m.name;
      document.getElementById('sidebarRole').textContent = m.role;
      document.getElementById('memberPicker').style.display = 'none';
      document.getElementById('appShell').style.display = 'flex';
      document.getElementById('bottomNav').style.display = window.innerWidth <= 768 ? 'flex' : 'none';
      navigate('dashboard');
    }
  }
  // 초기 용량/백업 상태 표시
  saveState();
  checkBackupReminder();
  // v9에서 잘못 등록된 매뉴얼-시드 프로젝트 정리 제안 (한 번만)
  setTimeout(checkLegacyManualProjects, 1500);
  // 키보드 단축키: Cmd+K / Ctrl+K → 글로벌 검색
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      if (state.currentMember) openGlobalSearch();
    }
    // ESC → 모달 닫기
    if (e.key === 'Escape') {
      const modal = document.querySelector('.modal-overlay');
      if (modal) closeModal();
    }
  });
})();
</script>
