function renderRecurring() {
  const all = (state.recurringTasks||[]).filter(r =>
    r.assignees === 'all' ||
    (Array.isArray(r.assignees) && r.assignees.includes(state.currentMember)) ||
    r.memberId === state.currentMember
  );
  // 정렬: 주기(daily→weekly→monthly) → 시간/요일/일자
  const typeOrder = { daily: 0, weekly: 1, monthly: 2 };
  const dayOrder = { '월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':7 };
  const sorted = all.slice().sort((a,b) => {
    const t = (typeOrder[a.recurType]||9) - (typeOrder[b.recurType]||9);
    if (t !== 0) return t;
    if (a.recurType === 'weekly') return (dayOrder[a.weekDay]||9) - (dayOrder[b.weekDay]||9);
    if (a.recurType === 'monthly') {
      const av = a.monthDay === 'last' ? 999 : (a.monthDay||0);
      const bv = b.monthDay === 'last' ? 999 : (b.monthDay||0);
      return av - bv;
    }
    return (a.time||'').localeCompare(b.time||'');
  });

  // 통계
  const counts = {
    daily: all.filter(r => r.recurType==='daily').length,
    weekly: all.filter(r => r.recurType==='weekly').length,
    monthly: all.filter(r => r.recurType==='monthly').length,
    common: all.filter(r => r.assignees==='all').length
  };

  return `
    <div class="page-header">
      <div>
        <div class="page-title">🔁 반복 업무</div>
        <div class="page-subtitle">매일·매주·매월 자동 생성 (대시보드 오늘 업무에 자동 추가)</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="generateRecurringForToday();navigate('dashboard')" title="오늘 인스턴스 새로 생성">▶ 오늘 생성</button>
      </div>
    </div>
    <div class="page-content">
      <!-- 통계 -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
        <div class="card" style="padding:14px;text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">매일</div><div style="font-size:22px;font-weight:700;color:var(--accent)">${counts.daily}</div></div>
        <div class="card" style="padding:14px;text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">매주</div><div style="font-size:22px;font-weight:700;color:var(--blue)">${counts.weekly}</div></div>
        <div class="card" style="padding:14px;text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">매월</div><div style="font-size:22px;font-weight:700;color:var(--green)">${counts.monthly}</div></div>
        <div class="card" style="padding:14px;text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:4px">👥 전체 공통</div><div style="font-size:22px;font-weight:700;color:var(--yellow)">${counts.common}</div></div>
      </div>

      <!-- 엑셀 방식 표 -->
      <div class="card" style="padding:0;overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:900px">
          <thead>
            <tr style="background:var(--bg2);border-bottom:2px solid var(--border)">
              <th style="padding:10px 8px;text-align:center;width:30px;font-weight:600;color:var(--text3);font-size:11px"></th>
              <th style="padding:10px 8px;text-align:center;width:60px;font-weight:600;color:var(--text3);font-size:11px">담당</th>
              <th style="padding:10px 8px;text-align:center;width:90px;font-weight:600;color:var(--text3);font-size:11px">주기</th>
              <th style="padding:10px 8px;text-align:center;width:80px;font-weight:600;color:var(--text3);font-size:11px">요일/일자</th>
              <th style="padding:10px 8px;text-align:center;width:70px;font-weight:600;color:var(--text3);font-size:11px">시간</th>
              <th style="padding:10px 8px;text-align:left;font-weight:600;color:var(--text3);font-size:11px">업무 내용</th>
              <th style="padding:10px 8px;text-align:left;width:140px;font-weight:600;color:var(--text3);font-size:11px">프로젝트</th>
              <th style="padding:10px 8px;text-align:center;width:50px;font-weight:600;color:var(--text3);font-size:11px" title="대시보드 우측 고정업무 영역에 표시">📌</th>
              <th style="padding:10px 8px;text-align:center;width:80px;font-weight:600;color:var(--text3);font-size:11px"></th>
            </tr>
          </thead>
          <tbody>
            ${sorted.length === 0 ? `<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)"><div style="font-size:32px;margin-bottom:8px">🔁</div><div>등록된 반복업무가 없습니다</div><div style="font-size:11px;margin-top:6px">하단 입력 행에서 바로 추가하세요</div></td></tr>` :
              sorted.map(r => renderRecurringRow(r)).join('')
            }
            <!-- 빠른 추가 행 (엑셀 방식) -->
            ${renderRecurringQuickAddRow()}
          </tbody>
        </table>
      </div>

      <div style="font-size:11px;color:var(--text3);margin-top:10px;line-height:1.6">
        💡 각 항목 클릭하면 인라인 편집 · Enter로 즉시 추가 · ⏸ 일시정지 / 🗑 삭제<br>
        💡 매일·매주·매월에 따라 요일/일자 컬럼이 다르게 표시됩니다 (말일 = 매월 마지막 날)
      </div>
    </div>
  `;
}

function renderRecurringRow(r) {
  const priorityIcon = r.priority === 'high' ? '🔴' : r.priority === 'low' ? '🟢' : '🟡';
  const monthDisplay = r.monthDay === 'last' ? '말일' : (r.monthDay + '일');
  const typeLabel = r.recurType === 'daily' ? '매일' : r.recurType === 'weekly' ? '매주' : '매월';
  const whenLabel = r.recurType === 'daily' ? '-' : r.recurType === 'weekly' ? (r.weekDay + '요일') : monthDisplay;
  const proj = r.projectId ? (state.projects.find(p => p.id === r.projectId)||{}).name : '';
  // 담당자 표시
  let assigneeCell;
  if (r.assignees === 'all') {
    assigneeCell = '<span style="display:inline-flex;align-items:center;padding:2px 6px;background:rgba(232,99,42,0.15);color:var(--accent);font-size:10px;font-weight:600;border-radius:3px">전체</span>';
  } else {
    const list = Array.isArray(r.assignees) ? r.assignees : [r.memberId];
    assigneeCell = '<span style="display:inline-flex;gap:2px;justify-content:center">' +
      list.map(mid => {
        const m = state.members.find(x => x.id === mid);
        return m ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${m.color};color:white;font-size:9px;font-weight:700" title="${m.name}">${m.initial}</span>` : '';
      }).join('') + '</span>';
  }
  const isInactive = r.active === false;
  return `
    <tr style="border-bottom:1px solid var(--border);${isInactive?'opacity:0.4':''};cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='transparent'" onclick="editRecurring('${r.id}')">
      <td style="padding:8px;text-align:center">${priorityIcon}</td>
      <td style="padding:8px;text-align:center">${assigneeCell}</td>
      <td style="padding:8px;text-align:center;font-weight:600;color:var(--text2)">${typeLabel}</td>
      <td style="padding:8px;text-align:center;color:var(--text2)">${whenLabel}</td>
      <td style="padding:8px;text-align:center;color:var(--text2);font-family:monospace;font-size:11px">${r.time || '-'}</td>
      <td style="padding:8px"><div style="font-weight:600">${escHtml(r.title)}</div>${r.description?`<div style="font-size:10px;color:var(--text3);margin-top:2px">${escHtml(r.description)}</div>`:''}</td>
      <td style="padding:8px;color:var(--text3);font-size:11px">${proj?`📁 ${escHtml(proj)}`:'-'}</td>
      <td style="padding:8px;text-align:center" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="toggleRecurringPinned('${r.id}')" title="${r.pinned?'대시보드 고정 해제':'대시보드 사이드에 고정'}" style="font-size:16px;${r.pinned?'':'opacity:0.3'}">📌</button>
      </td>
      <td style="padding:8px;text-align:center;white-space:nowrap" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="toggleRecurringActive('${r.id}')" title="${isInactive?'활성화':'일시정지'}" style="font-size:13px">${isInactive?'▶':'⏸'}</button>
        <button class="btn-icon" onclick="deleteRecurring('${r.id}')" title="삭제" style="font-size:13px">🗑</button>
      </td>
    </tr>
  `;
}

// 빠른 추가 행 (인라인 입력)
let _recurQuickAdd = { title: '', type: 'daily', time: '', priority: 'mid', weekDay: '월', monthDay: 1, allMembers: false, pinned: false };

function renderRecurringQuickAddRow() {
  const q = _recurQuickAdd;
  return `
    <tr style="background:rgba(232,99,42,0.05);border-top:2px solid var(--accent)">
      <td style="padding:6px;text-align:center">
        <select id="quickRecPriority" onchange="_recurQuickAdd.priority=this.value" style="background:transparent;border:none;font-size:14px;cursor:pointer">
          <option value="high" ${q.priority==='high'?'selected':''}>🔴</option>
          <option value="mid" ${q.priority==='mid'?'selected':''}>🟡</option>
          <option value="low" ${q.priority==='low'?'selected':''}>🟢</option>
        </select>
      </td>
      <td style="padding:6px;text-align:center">
        <label style="display:flex;align-items:center;gap:3px;font-size:10px;cursor:pointer;justify-content:center">
          <input type="checkbox" id="quickRecAll" ${q.allMembers?'checked':''} onchange="_recurQuickAdd.allMembers=this.checked">전체
        </label>
      </td>
      <td style="padding:6px">
        <select id="quickRecType" onchange="_recurQuickAdd.type=this.value;navigate('recurring')" class="form-select" style="font-size:11px;padding:4px 6px">
          <option value="daily" ${q.type==='daily'?'selected':''}>매일</option>
          <option value="weekly" ${q.type==='weekly'?'selected':''}>매주</option>
          <option value="monthly" ${q.type==='monthly'?'selected':''}>매월</option>
        </select>
      </td>
      <td style="padding:6px">
        ${q.type === 'weekly' ? `
          <select id="quickRecWeekDay" onchange="_recurQuickAdd.weekDay=this.value" class="form-select" style="font-size:11px;padding:4px 6px">
            ${['월','화','수','목','금','토','일'].map(d => `<option value="${d}" ${q.weekDay===d?'selected':''}>${d}요일</option>`).join('')}
          </select>
        ` : q.type === 'monthly' ? `
          <input id="quickRecMonthDay" type="text" value="${q.monthDay}" onchange="_recurQuickAdd.monthDay=this.value==='last'?'last':(parseInt(this.value)||1)" class="form-input" style="font-size:11px;padding:4px 6px;width:60px" placeholder="1-31 또는 last">
        ` : '<span style="color:var(--text3);font-size:11px">-</span>'}
      </td>
      <td style="padding:6px">
        <input id="quickRecTime" type="time" value="${q.time}" onchange="_recurQuickAdd.time=this.value" class="form-input" style="font-size:11px;padding:4px 6px">
      </td>
      <td style="padding:6px">
        <input id="quickRecTitle" type="text" value="${escAttr(q.title)}" placeholder="업무 내용 입력 후 Enter…" onkeydown="if(event.key==='Enter'){event.preventDefault();handleRecurringQuickAdd()}" oninput="_recurQuickAdd.title=this.value" class="form-input" style="font-size:12px;padding:6px 8px;width:100%">
      </td>
      <td style="padding:6px">
        <select id="quickRecProject" class="form-select" style="font-size:11px;padding:4px 6px">
          <option value="">— 없음 —</option>
          ${getMyProjects().map(p => `<option value="${p.id}">${escHtml(p.name)}</option>`).join('')}
        </select>
      </td>
      <td style="padding:6px;text-align:center">
        <input id="quickRecPinned" type="checkbox" ${q.pinned?'checked':''} onchange="_recurQuickAdd.pinned=this.checked" title="대시보드 우측 고정업무 영역에 표시" style="cursor:pointer">
      </td>
      <td style="padding:6px;text-align:center">
        <button class="btn btn-primary btn-sm" onclick="handleRecurringQuickAdd()" style="font-size:11px;padding:4px 10px">+ 추가</button>
      </td>
    </tr>
  `;
}

function handleRecurringQuickAdd() {
  const title = document.getElementById('quickRecTitle').value.trim();
  if (!title) { toast('업무 내용을 입력하세요'); return; }
  const type = document.getElementById('quickRecType').value;
  const time = document.getElementById('quickRecTime').value;
  const priority = document.getElementById('quickRecPriority').value;
  const allMembers = document.getElementById('quickRecAll').checked;
  const projectId = document.getElementById('quickRecProject').value || null;
  const pinned = document.getElementById('quickRecPinned').checked;
  let weekDay = null, monthDay = null;
  if (type === 'weekly') weekDay = document.getElementById('quickRecWeekDay').value;
  if (type === 'monthly') {
    const v = document.getElementById('quickRecMonthDay').value;
    monthDay = v === 'last' ? 'last' : (parseInt(v) || 1);
  }
  const assignees = allMembers ? 'all' : [state.currentMember];

  if (!state.recurringTasks) state.recurringTasks = [];
  state.recurringTasks.push({
    id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    memberId: allMembers ? 'm1' : state.currentMember,
    assignees,
    title,
    recurType: type,
    weekDay, monthDay,
    time, priority, projectId,
    pinned: pinned,
    description: '',
    active: true,
    createdAt: new Date().toISOString()
  });
  saveState();
  toast(`+ 반복 업무 추가: ${title}${pinned?' (📌 고정)':''}`);
  _recurQuickAdd = { title: '', type, time: '', priority: 'mid', weekDay: weekDay||'월', monthDay: monthDay||1, allMembers, pinned: false };
  navigate('recurring');
}

function renderRecurringItem(r) {
  // v19 호환용 (단일 카드 형식 - 다른 곳에서 부를 때)
  return renderRecurringRow(r);
}

function addRecurring() { showModal(renderRecurringForm({})); }
function editRecurring(id) { showModal(renderRecurringForm({editId:id})); }

function renderRecurringForm(opts) {
  const isEdit = !!opts.editId;
  const r = isEdit ? state.recurringTasks.find(x => x.id === opts.editId) : null;
  const myProjects = getMyProjects();
  const days = ['월','화','수','목','금','토','일'];
  const members = state.members || [];
  // 현재 assignees 상태
  let curAll = r && r.assignees === 'all';
  let curList = (r && Array.isArray(r.assignees)) ? r.assignees : (r ? [r.memberId] : [state.currentMember]);
  const monthDayVal = r ? (r.monthDay === 'last' ? '' : (r.monthDay || 1)) : 1;
  const isLast = r && r.monthDay === 'last';
  return `
    <div class="modal-header"><div class="modal-title">🔁 ${isEdit ? '반복 업무 편집' : '+ 반복 업무 추가'}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">업무 내용</label><input class="form-input" id="rec_title" value="${r ? escAttr(r.title) : ''}" placeholder="예: 매일 출근 직후 CS 확인" autofocus></div>
      <div class="form-group" style="background:rgba(59,130,246,0.05);border:1px solid rgba(59,130,246,0.2);border-radius:6px;padding:10px">
        <label class="form-label" style="color:var(--blue)">👤 담당자</label>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rec_all" ${curAll?'checked':''} onchange="document.getElementById('rec_members').disabled=this.checked;document.getElementById('rec_members').style.opacity=this.checked?0.4:1">
            <strong>모든 멤버 공통</strong> (전시장 청소 등)
          </label>
        </div>
        <label class="form-label" style="font-size:11px">또는 특정 멤버 선택 (Ctrl/Cmd 다중)</label>
        <select class="form-select" id="rec_members" multiple size="3" ${curAll?'disabled':''} style="${curAll?'opacity:0.4':''}">
          ${members.map(m => `<option value="${m.id}" ${(curList.includes(m.id))?'selected':''}>${m.name} (${m.role||''})</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">반복 주기</label>
        <select class="form-select" id="rec_type" onchange="updateRecurringFormFields()">
          <option value="daily" ${r&&r.recurType==='daily'?'selected':''}>매일</option>
          <option value="weekly" ${r&&r.recurType==='weekly'?'selected':''}>매주 특정 요일</option>
          <option value="monthly" ${r&&r.recurType==='monthly'?'selected':''}>매월 특정 일자</option>
        </select>
      </div>
      <div class="form-group" id="rec_weekday_row" style="display:${r&&r.recurType==='weekly'?'':'none'}">
        <label class="form-label">요일</label>
        <select class="form-select" id="rec_weekday">
          ${days.map(d=>`<option value="${d}" ${r&&r.weekDay===d?'selected':''}>${d}요일</option>`).join('')}
        </select>
      </div>
      <div class="form-group" id="rec_monthday_row" style="display:${r&&r.recurType==='monthly'?'':'none'}">
        <label class="form-label">일자</label>
        <div style="display:flex;align-items:center;gap:10px">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;flex-shrink:0">
            <input type="checkbox" id="rec_monthlast" ${isLast?'checked':''} onchange="document.getElementById('rec_monthday').disabled=this.checked;document.getElementById('rec_monthday').style.opacity=this.checked?0.4:1">
            <strong>매월 말일</strong>
          </label>
          <input class="form-input" id="rec_monthday" type="number" min="1" max="31" value="${monthDayVal}" placeholder="1~31" ${isLast?'disabled style="opacity:0.4"':''}>
          <span style="font-size:11px;color:var(--text3)">일</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">시간 (선택)</label><input class="form-input" id="rec_time" type="time" value="${r?(r.time||''):''}"></div>
        <div class="form-group"><label class="form-label">우선순위</label>
          <select class="form-select" id="rec_priority">
            <option value="high" ${r&&r.priority==='high'?'selected':''}>🔴 높음</option>
            <option value="mid" ${!r||r.priority==='mid'?'selected':''}>🟡 중간</option>
            <option value="low" ${r&&r.priority==='low'?'selected':''}>🟢 낮음</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">연결 프로젝트 (선택)</label>
        <select class="form-select" id="rec_project">
          <option value="">— 없음 —</option>
          ${myProjects.map(p=>`<option value="${p.id}" ${r&&r.projectId===p.id?'selected':''}>${escHtml(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">설명 (선택)</label><textarea class="form-input" id="rec_desc" rows="2">${r?escHtml(r.description||''):''}</textarea></div>
    </div>
    <div class="modal-footer">
      ${isEdit?`<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteRecurring('${opts.editId}')">삭제</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-sm" onclick="${isEdit?`updateRecurring('${opts.editId}')`:'saveRecurring()'}">${isEdit?'저장':'추가'}</button>
    </div>
  `;
}

function updateRecurringFormFields() {
  const type = document.getElementById('rec_type').value;
  document.getElementById('rec_weekday_row').style.display = type === 'weekly' ? '' : 'none';
  document.getElementById('rec_monthday_row').style.display = type === 'monthly' ? '' : 'none';
}

function getRecurringFormAssignees() {
  const all = document.getElementById('rec_all').checked;
  if (all) return 'all';
  const sel = document.getElementById('rec_members');
  const arr = Array.from(sel.selectedOptions).map(o => o.value);
  return arr.length ? arr : [state.currentMember];
}

function getRecurringFormMonthDay() {
  const isLast = document.getElementById('rec_monthlast').checked;
  if (isLast) return 'last';
  return parseInt(document.getElementById('rec_monthday').value) || 1;
}

function saveRecurring() {
  const title = document.getElementById('rec_title').value.trim();
  if (!title) return toast('업무 내용을 입력하세요');
  const type = document.getElementById('rec_type').value;
  const assignees = getRecurringFormAssignees();
  state.recurringTasks.push({
    id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    memberId: Array.isArray(assignees) ? assignees[0] : 'm1',
    assignees: assignees,
    title,
    recurType: type,
    weekDay: type === 'weekly' ? document.getElementById('rec_weekday').value : null,
    monthDay: type === 'monthly' ? getRecurringFormMonthDay() : null,
    time: document.getElementById('rec_time').value || '',
    priority: document.getElementById('rec_priority').value,
    projectId: document.getElementById('rec_project').value || null,
    description: document.getElementById('rec_desc').value,
    active: true,
    createdAt: new Date().toISOString()
  });
  saveState(); closeModal(); navigate('recurring');
}

function updateRecurring(id) {
  const r = state.recurringTasks.find(x => x.id === id);
  if (!r) return;
  r.title = document.getElementById('rec_title').value.trim() || r.title;
  r.recurType = document.getElementById('rec_type').value;
  r.weekDay = r.recurType === 'weekly' ? document.getElementById('rec_weekday').value : null;
  r.monthDay = r.recurType === 'monthly' ? getRecurringFormMonthDay() : null;
  r.time = document.getElementById('rec_time').value || '';
  r.priority = document.getElementById('rec_priority').value;
  r.projectId = document.getElementById('rec_project').value || null;
  r.description = document.getElementById('rec_desc').value;
  r.assignees = getRecurringFormAssignees();
  r.memberId = Array.isArray(r.assignees) ? r.assignees[0] : 'm1';
  saveState(); closeModal(); navigate('recurring');
}

function deleteRecurring(id) {
  if (!confirm('이 반복 업무를 삭제합니다. 이미 오늘 생성된 인스턴스는 그대로 유지됩니다. 계속하시겠습니까?')) return;
  state.recurringTasks = state.recurringTasks.filter(r => r.id !== id);
  saveState();
  if (document.querySelector('.modal.show')) closeModal();
  navigate('recurring');
}

function toggleRecurringActive(id) {
  const r = state.recurringTasks.find(x => x.id === id);
  if (!r) return;
  r.active = r.active === false ? true : false;
  saveState(); navigate('recurring');
}

// v21: 대시보드 고정업무 영역 표시 토글
function toggleRecurringPinned(id) {
  const r = state.recurringTasks.find(x => x.id === id);
  if (!r) return;
  r.pinned = !r.pinned;
  // 오늘 인스턴스의 isFixed도 즉시 동기화 (이미 생성된 경우)
  const today = new Date().toISOString().split('T')[0];
  state.tasks.filter(t => t.recurringId === id && t.performedDate === today).forEach(t => {
    t.isFixed = r.pinned === true;
  });
  saveState();
  toast(r.pinned ? '📌 대시보드 우측 고정업무에 표시됩니다' : '대시보드 고정 해제됨');
  navigate('recurring');
}

// 멤버 × 프로젝트 활동 점수 계산
// = 생성 task × 1 + 완료 task × 3 + 메모 × 1 + 첨부 × 1
function calcActivityScore(memberId, projectId, fromDate, toDate) {
  const tasks = state.tasks.filter(t => {
    if (t.memberId !== memberId) return false;
    if (t.projectId !== projectId) return false;
    if (fromDate) {
      const created = t.createdAt ? new Date(t.createdAt) : null;
      if (created && created < fromDate) return false;
    }
    if (toDate) {
      const created = t.createdAt ? new Date(t.createdAt) : null;
      if (created && created > toDate) return false;
    }
    return true;
  });
  let score = 0;
  let createdCount = tasks.length;
  let doneCount = tasks.filter(t => t.done).length;
  let notesCount = tasks.reduce((s,t) => s + (t.notes||[]).length, 0);
  let attachCount = tasks.reduce((s,t) => s + (t.attachments||[]).length, 0);
  score = createdCount * 1 + doneCount * 3 + notesCount * 1 + attachCount * 1;
  return { score, createdCount, doneCount, notesCount, attachCount, taskCount: tasks.length };
}

// 전체 기여도 매트릭스: rows=members, cols=projects (해당 멤버에 보이는)
function buildContributionMatrix(fromDate, toDate) {
  const members = state.members;
  // 매트릭스에 표시할 프로젝트: 누군가가 활동한 것들 + 자기 담당 프로젝트
  const projects = state.projects.filter(p => p.status !== '완료' || (p.progress||0) > 0);
  return {
    members,
    projects,
    cells: members.map(m => projects.map(p => ({
      member: m, project: p, ...calcActivityScore(m.id, p.id, fromDate, toDate)
    })))
  };
}

let reportMode = 'company';  // 'company' | 'personal'

function renderWeeklyReport() {
  const today = new Date();
  // 이번 주 월요일 ~ 일요일
  const dow = today.getDay() || 7;
  const monday = new Date(today); monday.setDate(today.getDate() - (dow - 1)); monday.setHours(0,0,0,0);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1); monthStart.setHours(0,0,0,0);
  const yearStart = new Date(today.getFullYear(), 0, 1);

  const fmtKo = (d) => `${d.getMonth()+1}/${d.getDate()}`;
  const weekRange = `${fmtKo(monday)} ~ ${fmtKo(sunday)}`;
  const yearLabel = `${today.getFullYear()}년`;
  const monthLabel = `${today.getMonth()+1}월`;
  const me = state.members.find(m => m.id === state.currentMember);

  const header = `
    <div class="page-header">
      <div>
        <div class="page-title">📊 주간 보고서</div>

          <button class="btn btn-sm" style="font-size:12px;padding:5px 12px;background:${reportMode==='personal'?'var(--accent)':'transparent'};color:${reportMode==='personal'?'white':'var(--text2)'};border:none;cursor:pointer;border-radius:4px" onclick="reportMode='personal';navigate('report')">👤 ${me?.name||'내'} 보고</button>

          <thead><tr style="border-bottom:1px solid var(--border)">

            <th style="text-align:left;padding:8px;color:var(--text3);font-weight:600">연결 KPI</th>
          </tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px">CRM 센터</td><td style="padding:8px;color:var(--accent)">자사몰 전환율</td></tr>
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px">POUR 길잡이</td><td style="padding:8px;color:var(--accent)">자사몰 전환율</td></tr>
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px">자사몰 포스팅</td><td style="padding:8px;color:var(--accent)">자사몰 전환율</td></tr>
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px">상품 콘텐츠 패키지</td><td style="padding:8px;color:var(--accent)">SKU 증식</td></tr>
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px">매출관리 시스템</td><td style="padding:8px;color:var(--accent)">매출관리 시스템 완성도</td></tr>
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:8px">매뉴얼 시스템</td><td style="padding:8px;color:var(--accent)">매뉴얼 정리율</td></tr>
            <tr><td style="padding:8px">어드민센터</td><td style="padding:8px;color:var(--accent)">어드민센터 완성도</td></tr>

      </div>

}

function renderPlaybookObjective(obj) {
  const krs = state.keyResults.filter(kr => kr.objectiveId === obj.id);
  const objCurrent = krs.reduce((s,kr) => s + (kr.current||0), 0);
  const fmtMoney = (v) => {
    if (v == null) return '-';
    if (v >= 100000000) return Math.round(v/10000000)/10 + '억';
    if (v >= 10000) return Math.round(v/10000) + '만';
    return v.toLocaleString();
  };
  return `
    <div class="card" style="margin-bottom:16px;border-left:4px solid var(--accent)">
      <div style="padding:14px;border-bottom:1px solid var(--border);background:rgba(232,99,42,0.04)">
        <div style="font-size:10px;color:var(--accent);font-weight:600;margin-bottom:3px">OBJECTIVE · ${obj.year||''}</div>
        <div style="font-size:15px;font-weight:700">${escHtml(obj.title)}</div>
        ${obj.description ? `<div style="font-size:11px;color:var(--text3);margin-top:4px">${escHtml(obj.description)}</div>` : ''}
        ${obj.target ? `<div style="font-size:11px;color:var(--text2);margin-top:4px">목표: ${obj.unit==='원'?fmtMoney(obj.target):obj.target+(obj.unit||'')}</div>` : ''}
      </div>
      <div style="padding:14px">
        ${krs.length === 0 ? '<div style="color:var(--text3);font-size:12px;text-align:center;padding:10px">하위 KR 없음</div>' :
          krs.map(kr => renderPlaybookKR(kr)).join('')
        }
      </div>
    </div>
  `;
}

function renderPlaybookKR(kr) {
  const kpis = state.kpis.filter(k => k.keyResultId === kr.id);
  const channelLabel = kr.channel === 'inbound' ? '인바운드' : kr.channel === 'outbound' ? '아웃바운드' : kr.channel === 'ops' ? '운영' : kr.channel;
  const fmtVal = (v, unit) => {
    if (unit === '원' && v >= 10000) {
      if (v >= 100000000) return Math.round(v/10000000)/10 + '억';
      return Math.round(v/10000) + '만';
    }
    return v + (unit||'');
  };
  return `
    <div style="margin-bottom:12px;padding:12px;background:var(--bg2);border-radius:6px;border-left:3px solid var(--blue)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:9px;color:var(--text3);font-weight:600">KEY RESULT</span>
        <span class="badge" style="font-size:9px;background:var(--bg3);color:var(--text2);padding:2px 6px;border-radius:3px">${channelLabel}</span>
        <span style="font-size:11px;color:var(--text2);margin-left:auto">${fmtVal(kr.current||0,kr.unit)} / ${fmtVal(kr.target,kr.unit)}</span>
      </div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">${escHtml(kr.title)}</div>
      ${kr.description ? `<div style="font-size:11px;color:var(--text3);margin-bottom:8px">${escHtml(kr.description)}</div>` : ''}
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">
        ${kpis.map(k => renderPlaybookKPI(k)).join('')}
      </div>
    </div>
  `;
}

function renderPlaybookKPI(k) {
  const projects = state.projects.filter(p => p.kpiId === k.id);
  const srcIcon = k.source === 'auto' ? '🔗' : k.source === 'auto-progress' ? '📊' : '✏️';
  const srcLabel = k.source === 'auto' ? '자동·기여' : k.source === 'auto-progress' ? '자동·진척' : '수동';
  const cur = typeof getKpiCurrentValue === 'function' ? getKpiCurrentValue(k) : (k.current||0);
  const pct = k.target ? Math.min(100, Math.round(cur/k.target*100)) : 0;
  return `
    <div style="padding:10px;background:var(--bg);border-radius:5px;border-left:2px solid var(--green)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span style="font-size:11px">${srcIcon}</span>
        <span style="font-size:12px;font-weight:600;flex:1">${escHtml(k.name)}</span>
        <span style="font-size:11px;color:var(--text3)">${srcLabel}</span>
        <span style="font-size:11px;font-weight:700;color:${pct>=70?'var(--green)':'var(--text2)'}">${cur}/${k.target}${k.unit} (${pct}%)</span>
      </div>
      ${k.description ? `<div style="font-size:10px;color:var(--text3);margin-bottom:6px;padding-left:18px">${escHtml(k.description)}</div>` : ''}
      ${projects.length > 0 ? `
        <div style="margin-top:6px;padding-left:18px;display:flex;flex-direction:column;gap:3px">
          ${projects.map(p => {
            const owner = state.members.find(m => m.id === (p.ownerId||p.memberId));
            return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 0">
              <span style="color:var(--text3)">└─</span>
              ${owner ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:${owner.color};color:white;font-size:8px;font-weight:700" title="${owner.name}">${owner.initial}</span>` : ''}
              <span style="flex:1">${escHtml(p.name)}</span>
              ${k.source==='auto' && p.contribution ? `<span style="font-size:10px;color:var(--accent);font-weight:600">+${p.contribution}${k.unit}</span>` : ''}
              <span style="font-size:10px;color:var(--text3)">${p.progress||0}%</span>
            </div>`;
          }).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function renderPlaybookRecurring(r) {
  const proj = r.projectId ? state.projects.find(p => p.id === r.projectId) : null;
  const priority = r.priority === 'high' ? '🔴' : r.priority === 'low' ? '🟢' : '🟡';
  const monthDisplay = r.monthDay === 'last' ? '말일' : (r.monthDay + '일');
  const when = r.recurType === 'daily' ? (r.time||'시간 미지정') :
               r.recurType === 'weekly' ? `${r.weekDay} ${r.time||''}` :
               `${monthDisplay} ${r.time||''}`;
  let assigneeBadge;
  if (r.assignees === 'all') {
    assigneeBadge = '<span style="display:inline-flex;align-items:center;padding:1px 6px;background:rgba(232,99,42,0.15);color:var(--accent);font-size:10px;font-weight:600;border-radius:3px">👥 전체</span>';
  } else {
    const list = Array.isArray(r.assignees) ? r.assignees : [r.memberId];
    assigneeBadge = '<span style="display:inline-flex;gap:2px">' +
      list.map(mid => {
        const m = state.members.find(x => x.id === mid);
        return m ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:${m.color};color:white;font-size:8px;font-weight:700" title="${m.name}">${m.initial}</span>` : '';
      }).join('') + '</span>';
  }
  return `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);${r.active===false?'opacity:0.4':''}">
      <span style="font-size:12px;flex-shrink:0">${priority}</span>
      <span style="flex-shrink:0">${assigneeBadge}</span>
      <span style="font-size:12px;color:var(--text3);width:90px;flex-shrink:0">${when}</span>
      <span style="font-size:12px;flex:1;min-width:0">${escHtml(r.title)}</span>
      ${proj ? `<span style="font-size:10px;color:var(--text3)">📁 ${escHtml(proj.name)}</span>` : ''}
    </div>
  `;
}

// ══════════════════════════════════════════════
// v18: 🎁 고객 이벤트 (B2C / B2B) — CRM 센터 동기화 대비
// ══════════════════════════════════════════════

const CUSTOMER_EVENT_KINDS = {
  gift:     { icon:'🎁', label:'혜택 발송',     color:'#ec4899' },
  nps:      { icon:'⭐', label:'NPS 조사',      color:'#8b5cf6' },
  photo:    { icon:'📷', label:'포토 후기 요청', color:'#06b6d4' },
  campaign: { icon:'📣', label:'캠페인·프로모션', color:'#f97316' },
  notice:   { icon:'📩', label:'안내',          color:'#22c55e' },
  meeting:  { icon:'🤝', label:'B2B 미팅·방문',  color:'#3b82f6' },
  followup: { icon:'🔄', label:'사후 응대',      color:'#eab308' },
  other:    { icon:'📌', label:'기타',          color:'#6b7280' }
};
const CUSTOMER_EVENT_STATUSES = ['기획','진행 중','완료','취소'];
const CUSTOMER_CHANNELS = ['카카오톡','이메일','문자','전화','잔디','매장 방문'];

let customerFilterType = 'all';   // 'all'|'B2C'|'B2B'
let customerFilterStatus = 'all'; // 'all'|status

function renderCustomerEvents() {
  const events = state.customerEvents || [];
  // 필터링
  let filtered = events;
  if (customerFilterType !== 'all') filtered = filtered.filter(e => e.customerType === customerFilterType);
  if (customerFilterStatus !== 'all') filtered = filtered.filter(e => e.status === customerFilterStatus);
  // 일정순 정렬
  filtered = filtered.slice().sort((a,b) => (a.startDate||'').localeCompare(b.startDate||''));

  // 통계
  const total = events.length;
  const byStatus = events.reduce((a,e) => { a[e.status]=(a[e.status]||0)+1; return a; }, {});
  const b2c = events.filter(e => e.customerType === 'B2C').length;
  const b2b = events.filter(e => e.customerType === 'B2B').length;
  // 다음 7일 일정
  const now = new Date(); now.setHours(0,0,0,0);
  const next7 = new Date(now); next7.setDate(now.getDate()+7);
  const upcoming = events.filter(e => {
    if (!e.startDate) return false;
    const d = new Date(e.startDate);
    return d >= now && d <= next7 && e.status !== '완료' && e.status !== '취소';
  }).sort((a,b)=>(a.startDate||'').localeCompare(b.startDate||''));

  return `
    <div class="page-header">
      <div>
        <div class="page-title">🎁 고객 이벤트</div>
        <div class="page-subtitle">B2C·B2B 프로모션·NPS·후기 등 고객 접점 관리 (CRM 센터 동기화 예정)</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="addCustomerEvent()">+ 새 이벤트</button>
      </div>
    </div>
    <div class="page-content">

      <!-- 상단 통계 4종 -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
        <div class="card" style="padding:14px;text-align:center">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">전체</div>
          <div style="font-size:22px;font-weight:700">${total}</div>
        </div>
        <div class="card" style="padding:14px;text-align:center;cursor:pointer" onclick="customerFilterType='B2C';navigate('customer')">
          <div style="font-size:11px;color:#ec4899;margin-bottom:4px">B2C</div>
          <div style="font-size:22px;font-weight:700;color:#ec4899">${b2c}</div>
        </div>
        <div class="card" style="padding:14px;text-align:center;cursor:pointer" onclick="customerFilterType='B2B';navigate('customer')">
          <div style="font-size:11px;color:#8b5cf6;margin-bottom:4px">B2B</div>
          <div style="font-size:22px;font-weight:700;color:#8b5cf6">${b2b}</div>
        </div>
        <div class="card" style="padding:14px;text-align:center">
          <div style="font-size:11px;color:var(--green);margin-bottom:4px">완료율</div>
          <div style="font-size:22px;font-weight:700;color:var(--green)">${total?Math.round((byStatus['완료']||0)/total*100):0}%</div>
        </div>
      </div>

      <!-- 다음 7일 위젯 -->
      ${upcoming.length > 0 ? `
        <div class="card" style="margin-bottom:18px;padding:14px;background:rgba(232,99,42,0.05);border:1px solid rgba(232,99,42,0.2)">
          <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px">⏰ 다음 7일 일정 (${upcoming.length})</div>
          ${upcoming.slice(0,5).map(e => renderCustomerEventCompact(e)).join('')}
          ${upcoming.length > 5 ? `<div style="font-size:11px;color:var(--text3);text-align:center;padding:4px">…외 ${upcoming.length-5}건</div>` : ''}
        </div>
      ` : ''}

      <!-- 필터 -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text3)">고객:</span>
        <div style="display:flex;background:var(--bg3);border-radius:5px;padding:2px;gap:2px">
          ${['all','B2C','B2B'].map(t => `<button class="btn btn-sm" style="font-size:11px;padding:3px 10px;background:${customerFilterType===t?'var(--accent)':'transparent'};color:${customerFilterType===t?'white':'var(--text2)'};border:none;cursor:pointer;border-radius:3px" onclick="customerFilterType='${t}';navigate('customer')">${t==='all'?'전체':t}</button>`).join('')}
        </div>
        <span style="font-size:11px;color:var(--text3);margin-left:10px">상태:</span>
        <div style="display:flex;background:var(--bg3);border-radius:5px;padding:2px;gap:2px;flex-wrap:wrap">
          <button class="btn btn-sm" style="font-size:11px;padding:3px 10px;background:${customerFilterStatus==='all'?'var(--accent)':'transparent'};color:${customerFilterStatus==='all'?'white':'var(--text2)'};border:none;cursor:pointer;border-radius:3px" onclick="customerFilterStatus='all';navigate('customer')">전체</button>
          ${CUSTOMER_EVENT_STATUSES.map(s => `<button class="btn btn-sm" style="font-size:11px;padding:3px 10px;background:${customerFilterStatus===s?'var(--accent)':'transparent'};color:${customerFilterStatus===s?'white':'var(--text2)'};border:none;cursor:pointer;border-radius:3px" onclick="customerFilterStatus='${s}';navigate('customer')">${s}</button>`).join('')}
        </div>
      </div>

      <!-- 이벤트 리스트 -->
      ${filtered.length === 0 ? `
        <div class="card" style="padding:30px;text-align:center;color:var(--text3)">
          <div style="font-size:32px;margin-bottom:10px">🎁</div>
          <div style="font-size:14px;margin-bottom:6px">${total === 0 ? '등록된 고객 이벤트가 없습니다' : '필터 조건에 맞는 이벤트가 없습니다'}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:8px">우상단 + 새 이벤트로 첫 이벤트를 등록해보세요</div>
        </div>
      ` : `
        <div class="card" style="padding:0">
          ${filtered.map(e => renderCustomerEventRow(e)).join('')}
        </div>
      `}

    </div>
  `;
}

function renderCustomerEventCompact(e) {
  const kind = CUSTOMER_EVENT_KINDS[e.eventKind] || CUSTOMER_EVENT_KINDS.other;
  const ctColor = e.customerType === 'B2C' ? '#ec4899' : '#8b5cf6';
  return `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;cursor:pointer" onclick="editCustomerEvent('${e.id}')">
      <span style="display:inline-block;width:36px;font-size:10px;color:var(--text3);font-weight:600">${(e.startDate||'').slice(5)}</span>
      <span style="font-size:14px">${kind.icon}</span>
      <span class="badge" style="font-size:9px;padding:1px 5px;background:${ctColor}22;color:${ctColor};border-radius:3px;font-weight:600">${e.customerType}</span>
      <span style="flex:1">${escHtml(e.title)}</span>
      <span style="font-size:10px;color:var(--text3)">${e.status}</span>
    </div>
  `;
}

function renderCustomerEventRow(e) {
  const kind = CUSTOMER_EVENT_KINDS[e.eventKind] || CUSTOMER_EVENT_KINDS.other;
  const ctColor = e.customerType === 'B2C' ? '#ec4899' : '#8b5cf6';
  const statusColor = e.status === '완료' ? 'var(--green)' : e.status === '진행 중' ? 'var(--blue)' : e.status === '취소' ? 'var(--text3)' : 'var(--yellow)';
  const owner = state.members.find(m => m.id === e.ownerId);
  const dateDisplay = e.endDate && e.endDate !== e.startDate ? `${e.startDate} ~ ${e.endDate}` : e.startDate;
  return `
    <div style="display:grid;grid-template-columns:auto auto auto 1fr auto auto auto;gap:12px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="editCustomerEvent('${e.id}')">
      <span class="badge" style="font-size:10px;padding:2px 6px;background:${ctColor}22;color:${ctColor};border-radius:3px;font-weight:600;width:34px;text-align:center">${e.customerType}</span>
      <span style="font-size:16px" title="${kind.label}">${kind.icon}</span>
      <span style="font-size:10px;color:var(--text3);min-width:90px">${dateDisplay||'날짜 미정'}${e.time?' '+e.time:''}</span>
      <div style="min-width:0">
        <div style="font-size:13px;font-weight:600;margin-bottom:2px">${escHtml(e.title)}</div>
        <div style="font-size:11px;color:var(--text3)">
          ${e.target ? `🎯 ${escHtml(e.target)}` : ''}
          ${e.channels && e.channels.length ? ` · 📡 ${e.channels.join(', ')}` : ''}
          ${e.expectedReach ? ` · 👥 ${e.expectedReach}명` : ''}
          ${e.budget ? ` · 💰 ${e.budget.toLocaleString()}원` : ''}
        </div>
      </div>
      ${owner ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:${owner.color};color:white;font-size:10px;font-weight:700" title="${owner.name}">${owner.initial}</span>` : '<span></span>'}
      <span class="badge" style="font-size:10px;padding:2px 8px;background:${statusColor}22;color:${statusColor};border-radius:3px;font-weight:600">${e.status||'기획'}</span>
      <button class="btn-icon" onclick="event.stopPropagation();deleteCustomerEvent('${e.id}')" title="삭제">🗑</button>
    </div>
  `;
}

function addCustomerEvent() { showModal(renderCustomerEventForm({})); }
function editCustomerEvent(id) { showModal(renderCustomerEventForm({editId:id})); }

function renderCustomerEventForm(opts) {
  const isEdit = !!opts.editId;
  const e = isEdit ? state.customerEvents.find(x => x.id === opts.editId) : null;
  const members = state.members || [];
  const today = new Date().toISOString().split('T')[0];
  return `
    <div class="modal-header"><div class="modal-title">🎁 ${isEdit ? '고객 이벤트 편집' : '+ 새 고객 이벤트'}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">고객 종류</label>
          <select class="form-select" id="ce_type">
            <option value="B2C" ${e&&e.customerType==='B2C'?'selected':''}>B2C (일반 고객)</option>
            <option value="B2B" ${e&&e.customerType==='B2B'?'selected':''}>B2B (기업·파트너)</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">이벤트 종류</label>
          <select class="form-select" id="ce_kind">
            ${Object.entries(CUSTOMER_EVENT_KINDS).map(([k,v]) => `<option value="${k}" ${e&&e.eventKind===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">제목</label><input class="form-input" id="ce_title" value="${e?escAttr(e.title):''}" placeholder="예: 5월 NPS 만족도 조사 발송" autofocus></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">시작일</label><input class="form-input" id="ce_start" type="date" value="${e?(e.startDate||''):today}"></div>
        <div class="form-group"><label class="form-label">종료일 (기간 이벤트)</label><input class="form-input" id="ce_end" type="date" value="${e?(e.endDate||''):''}"></div>
        <div class="form-group"><label class="form-label">시간 (선택)</label><input class="form-input" id="ce_time" type="time" value="${e?(e.time||''):''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">담당자</label>
          <select class="form-select" id="ce_owner">
            ${members.map(m => `<option value="${m.id}" ${e&&e.ownerId===m.id?'selected':e?'':(m.id===state.currentMember?'selected':'')}>${m.name} (${m.role||''})</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">상태</label>
          <select class="form-select" id="ce_status">
            ${CUSTOMER_EVENT_STATUSES.map(s => `<option value="${s}" ${(e&&e.status===s)||(!e&&s==='기획')?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">대상 고객 (자유 입력)</label><input class="form-input" id="ce_target" value="${e?escAttr(e.target||''):''}" placeholder="예: 최근 30일 구매 고객 / 누적 5회 이상 구매 / B2B 대리점"></div>
      <div class="form-group"><label class="form-label">발송 채널 (Ctrl/Cmd 다중 선택)</label>
        <select class="form-select" id="ce_channels" multiple size="3">
          ${CUSTOMER_CHANNELS.map(c => `<option value="${c}" ${e&&(e.channels||[]).includes(c)?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">예상 대상 수</label><input class="form-input" id="ce_reach" type="number" placeholder="100" value="${e?(e.expectedReach||''):''}"></div>
        <div class="form-group"><label class="form-label">예산 (원)</label><input class="form-input" id="ce_budget" type="number" placeholder="50000" value="${e?(e.budget||''):''}"></div>
      </div>
      <div class="form-group"><label class="form-label">설명·결과 메모</label><textarea class="form-input" id="ce_notes" rows="3" placeholder="기획 의도, 진행 내용, 결과 등">${e?escHtml(e.notes||''):''}</textarea></div>
    </div>
    <div class="modal-footer">
      ${isEdit?`<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteCustomerEvent('${opts.editId}')">삭제</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-sm" onclick="${isEdit?`updateCustomerEvent('${opts.editId}')`:'saveCustomerEvent()'}">${isEdit?'저장':'추가'}</button>
    </div>
  `;
}

function getCustomerEventFormData() {
  const ch = document.getElementById('ce_channels');
  return {
    customerType: document.getElementById('ce_type').value,
    eventKind: document.getElementById('ce_kind').value,
    title: document.getElementById('ce_title').value.trim(),
    startDate: document.getElementById('ce_start').value,
    endDate: document.getElementById('ce_end').value || '',
    time: document.getElementById('ce_time').value || '',
    ownerId: document.getElementById('ce_owner').value,
    status: document.getElementById('ce_status').value,
    target: document.getElementById('ce_target').value.trim(),
    channels: Array.from(ch.selectedOptions).map(o => o.value),
    expectedReach: parseInt(document.getElementById('ce_reach').value) || 0,
    budget: parseInt(document.getElementById('ce_budget').value) || 0,
    notes: document.getElementById('ce_notes').value
  };
}

function saveCustomerEvent() {
  const data = getCustomerEventFormData();
  if (!data.title) return toast('제목을 입력하세요');
  if (!state.customerEvents) state.customerEvents = [];
  state.customerEvents.push({
    id: 'ce_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    ...data,
    attachments: [],
    createdAt: new Date().toISOString()
  });
  saveState(); closeModal(); navigate('customer');
}

function updateCustomerEvent(id) {
  const e = state.customerEvents.find(x => x.id === id);
  if (!e) return;
  const data = getCustomerEventFormData();
  if (!data.title) return toast('제목을 입력하세요');
  Object.assign(e, data);
  saveState(); closeModal(); navigate('customer');
}

function deleteCustomerEvent(id) {
  if (!confirm('이 이벤트를 삭제하시겠습니까?')) return;
  state.customerEvents = state.customerEvents.filter(e => e.id !== id);
  saveState();
  if (document.querySelector('.modal.show')) closeModal();
  navigate('customer');
}

// ══════════════════════════════════════════════
// v19: 📅 통합 캘린더 (Calendar) — 업무·일정·고객·프로젝트 한 곳
// ══════════════════════════════════════════════

let calendarTab = 'month';  // 'month' | 'list' | 'stats'
let calendarFilters = { task: true, schedule: true, customer: true, project: true };
let calendarYear, calendarMonth;

// 모든 캘린더 표시 가능 이벤트를 통합 추출
function getAllCalendarEvents(year, month) {
  const inMonth = (dateStr) => {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    return (year === undefined || d.getFullYear() === year) && (month === undefined || d.getMonth() === month);
  };
  const events = [];

  // 업무 (dueDate 있는 task)
  if (calendarFilters.task) {
    (state.tasks||[]).filter(t => t.dueDate && inMonth(t.dueDate)).forEach(t => {
      const owner = state.members.find(m => m.id === t.memberId);
      events.push({
        id: 'task_' + t.id, originalId: t.id, kind: 'task',
        title: t.title, date: t.dueDate, time: t.time||'',
        color: t.done ? '#22c55e' : '#ef4444',
        icon: t.done ? '✓' : '⚠',
        ownerColor: owner?.color, ownerName: owner?.name,
        done: t.done,
        sortKey: t.time || '00:00'
      });
    });
  }
  // 일정 (scheduleEvents) + 회의록 (meetings) 통합
  if (calendarFilters.schedule) {
    (state.scheduleEvents||[]).filter(e => inMonth(e.date)).forEach(e => {
      events.push({
        id: 'sch_' + e.id, originalId: e.id, kind: 'schedule',
        title: e.title, date: e.date, time: e.time||'',
        color: e.color || '#3b82f6',
        icon: '📅',
        sortKey: e.time || '00:00'
      });
    });
    // 회의록도 캘린더에 표시
    (state.meetings||[]).filter(m => inMonth(m.date)).forEach(m => {
      events.push({
        id: 'meet_' + m.id, originalId: m.id, kind: 'meeting',
        title: m.title, date: m.date, time: m.time||'',
        color: '#0ea5e9',
        icon: '📋',
        sortKey: m.time || '00:00'
      });
    });
  }
  // 고객 이벤트
  if (calendarFilters.customer) {
    (state.customerEvents||[]).filter(e => inMonth(e.startDate)).forEach(e => {
      const kind = CUSTOMER_EVENT_KINDS[e.eventKind] || CUSTOMER_EVENT_KINDS.other;
      const color = e.customerType === 'B2C' ? '#ec4899' : '#8b5cf6';
      events.push({
        id: 'cust_' + e.id, originalId: e.id, kind: 'customer',
        title: e.title, date: e.startDate, time: e.time||'',
        color: color, icon: kind.icon,
        customerType: e.customerType, status: e.status,
        sortKey: e.time || '00:00'
      });
    });
  }
  // 프로젝트 마감
  if (calendarFilters.project) {
    (state.projects||[]).filter(p => p.dueDate && inMonth(p.dueDate)).forEach(p => {
      events.push({
        id: 'proj_' + p.id, originalId: p.id, kind: 'project',
        title: p.name + ' 마감', date: p.dueDate,
        color: '#6366f1', icon: '🎯',
        sortKey: '23:59'
      });
    });
  }
  return events;
}

function openCalendarEvent(kind, originalId) {
  if (kind === 'task') {
    if (typeof editTask === 'function') editTask(originalId);
    else navigate('dashboard');
  } else if (kind === 'schedule') {
    if (typeof editScheduleEvent === 'function') editScheduleEvent(originalId);
  } else if (kind === 'meeting') {
    if (typeof editMeeting === 'function') editMeeting(originalId);
    else navigate('meeting');
  } else if (kind === 'customer') {
    editCustomerEvent(originalId);
  } else if (kind === 'project') {
    editProject(originalId);
  }
}

function renderUnifiedCalendar() {
  const now = new Date();
  if (calendarYear === undefined) calendarYear = now.getFullYear();
  if (calendarMonth === undefined) calendarMonth = now.getMonth();

  return `
    <div class="page-header">
      <div>
        <div class="page-title">📅 캘린더</div>
        <div class="page-subtitle">업무·일정·고객 이벤트·프로젝트 마감 통합 뷰</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="calendarYear=${now.getFullYear()};calendarMonth=${now.getMonth()};navigate('calendar')">오늘</button>
        <button class="btn btn-primary btn-sm" onclick="openCalendarAddMenu()">+ 추가</button>
      </div>
    </div>
    <div class="page-content">

      <!-- 뷰 탭 + 필터 -->
      <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:14px">
        <div style="display:flex;background:var(--bg3);border-radius:6px;padding:3px;gap:2px">
          ${[['month','📅 월간'],['list','📋 리스트'],['stats','📊 통계']].map(([k,l]) =>
            `<button class="btn btn-sm" style="font-size:12px;padding:5px 12px;background:${calendarTab===k?'var(--accent)':'transparent'};color:${calendarTab===k?'white':'var(--text2)'};border:none;cursor:pointer;border-radius:4px" onclick="calendarTab='${k}';navigate('calendar')">${l}</button>`).join('')}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span style="font-size:11px;color:var(--text3)">필터:</span>
          ${[
            ['task', '⚠ 업무 마감', '#ef4444'],
            ['schedule', '📅 회의·약속', '#3b82f6'],
            ['customer', '🎁 고객 이벤트', '#ec4899'],
            ['project', '🎯 프로젝트', '#6366f1']
          ].map(([k,l,c]) => `<label style="display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 8px;background:${calendarFilters[k]?c+'22':'var(--bg3)'};color:${calendarFilters[k]?c:'var(--text3)'};border-radius:4px;cursor:pointer;border:1px solid ${calendarFilters[k]?c+'44':'transparent'}" title="${k==='task'?'마감일이 있는 업무':k==='schedule'?'회의록 + 자유 일정·박람회·외부 약속':k==='customer'?'B2C/B2B 프로모션·NPS·후기':'프로젝트 마감일'}"><input type="checkbox" ${calendarFilters[k]?'checked':''} onchange="calendarFilters['${k}']=this.checked;navigate('calendar')" style="margin:0">${l}</label>`).join('')}
        </div>
      </div>

      ${calendarTab === 'month' ? renderCalendarMonthView() :
        calendarTab === 'list' ? renderCalendarListView() :
        renderCalendarStatsView()}

    </div>
  `;
}

function renderCalendarMonthView() {
  const year = calendarYear, month = calendarMonth;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay();
  const totalDays = lastDay.getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const events = getAllCalendarEvents(year, month);
  const eventsByDate = events.reduce((a,e) => { (a[e.date]=a[e.date]||[]).push(e); return a; }, {});

  let cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const now = new Date();
  const todayDate = now.getDate();
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  const prevMonth = month === 0 ? `calendarYear=${year-1};calendarMonth=11` : `calendarMonth=${month-1}`;
  const nextMonth = month === 11 ? `calendarYear=${year+1};calendarMonth=0` : `calendarMonth=${month+1}`;

  let rows = [];
  for (let r = 0; r < cells.length / 7; r++) {
    const row = cells.slice(r*7, r*7+7).map((d, dow) => {
      if (!d) return `<td class="cal-cell empty"></td>`;
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvts = (eventsByDate[dateStr] || []).sort((a,b)=>(a.sortKey||'').localeCompare(b.sortKey||''));
      const isToday = isCurrentMonth && d === todayDate;
      const isSun = dow === 0, isSat = dow === 6;
      return `<td class="cal-cell ${isToday?'cal-today':''} ${isSun?'cal-sun':''} ${isSat?'cal-sat':''}" onclick="openCalendarAddMenuForDate('${dateStr}')">
        <div class="cal-day-num">${d}</div>
        ${dayEvts.slice(0,4).map(e => `<div class="cal-evt" style="background:${e.color}20;border-left:3px solid ${e.color};color:${e.color}" onclick="event.stopPropagation();openCalendarEvent('${e.kind}','${e.originalId}')" title="${escAttr(e.title)}">${e.icon} ${escHtml(e.title.length > 14 ? e.title.slice(0,12)+'…' : e.title)}</div>`).join('')}
        ${dayEvts.length > 4 ? `<div style="font-size:9px;color:var(--text3);text-align:center;margin-top:2px">+${dayEvts.length-4}</div>` : ''}
      </td>`;
    }).join('');
    rows.push(`<tr>${row}</tr>`);
  }

  return `
    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:center;padding:14px;gap:14px;border-bottom:1px solid var(--border)">
        <button class="btn-icon" onclick="${prevMonth};navigate('calendar')" style="font-size:16px">◀</button>
        <span style="font-size:16px;font-weight:700;min-width:140px;text-align:center">${year}년 ${monthNames[month]}</span>
        <button class="btn-icon" onclick="${nextMonth};navigate('calendar')" style="font-size:16px">▶</button>
      </div>
      <table class="cal-table" style="width:100%;border-collapse:collapse">
        <thead><tr>
          ${['일','월','화','수','목','금','토'].map((d,i)=>`<th class="cal-head ${i===0?'cal-sun':i===6?'cal-sat':''}" style="padding:8px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border);color:${i===0?'#ef4444':i===6?'#3b82f6':'var(--text3)'}">${d}</th>`).join('')}
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>
  `;
}

function renderCalendarListView() {
  // 이번 달 + 다음 달
  const now = new Date();
  const startMonth = new Date(calendarYear, calendarMonth, 1);
  const endMonth = new Date(calendarYear, calendarMonth + 1, 0);
  endMonth.setHours(23,59,59);
  const events = getAllCalendarEvents(calendarYear, calendarMonth)
    .sort((a,b) => (a.date+a.sortKey).localeCompare(b.date+b.sortKey));

  // 날짜별 그룹
  const byDate = {};
  events.forEach(e => { (byDate[e.date]=byDate[e.date]||[]).push(e); });
  const dates = Object.keys(byDate).sort();

  if (dates.length === 0) {
    return `<div class="card" style="padding:30px;text-align:center;color:var(--text3)">
      <div style="font-size:32px;margin-bottom:10px">📅</div>
      <div>이번 달 일정이 없습니다</div>
    </div>`;
  }

  return `
    <div class="card" style="padding:0">
      ${dates.map(date => {
        const d = new Date(date);
        const dayName = ['일','월','화','수','목','금','토'][d.getDay()];
        const isToday = date === now.toISOString().split('T')[0];
        return `
          <div style="padding:12px 14px;border-bottom:1px solid var(--border);${isToday?'background:rgba(232,99,42,0.05)':''}">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span style="font-size:13px;font-weight:700;color:${isToday?'var(--accent)':'var(--text)'}">${date} (${dayName})</span>
              ${isToday?'<span class="badge" style="font-size:10px;padding:1px 6px;background:var(--accent);color:white;border-radius:3px">오늘</span>':''}
              <span style="font-size:11px;color:var(--text3);margin-left:auto">${byDate[date].length}건</span>
            </div>
            ${byDate[date].map(e => `
              <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;background:${e.color}10;border-left:3px solid ${e.color};border-radius:4px;cursor:pointer;font-size:12px" onclick="openCalendarEvent('${e.kind}','${e.originalId}')">
                <span>${e.icon}</span>
                ${e.time?`<span style="font-size:10px;color:var(--text3);width:40px">${e.time}</span>`:'<span style="width:40px"></span>'}
                <span style="flex:1">${escHtml(e.title)}</span>
                <span style="font-size:10px;color:${e.color};font-weight:600">${e.kind==='task'?'업무':e.kind==='schedule'?'일정':e.kind==='meeting'?'회의':e.kind==='customer'?(e.customerType||'고객'):e.kind==='project'?'프로젝트':''}</span>
              </div>
            `).join('')}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderCalendarStatsView() {
  const events = getAllCalendarEvents(calendarYear, calendarMonth);
  const byKind = { task: 0, schedule: 0, meeting: 0, customer: 0, project: 0 };
  events.forEach(e => byKind[e.kind] = (byKind[e.kind]||0) + 1);

  // 고객 이벤트 상세 통계
  const ces = (state.customerEvents||[]).filter(e => {
    if (!e.startDate) return false;
    const d = new Date(e.startDate);
    return d.getFullYear() === calendarYear && d.getMonth() === calendarMonth;
  });
  const b2c = ces.filter(e => e.customerType === 'B2C').length;
  const b2b = ces.filter(e => e.customerType === 'B2B').length;
  const byStatus = ces.reduce((a,e) => { a[e.status]=(a[e.status]||0)+1; return a; }, {});

  // 업무 완료율
  const monthTasks = (state.tasks||[]).filter(t => {
    if (!t.dueDate) return false;
    const d = new Date(t.dueDate);
    return d.getFullYear() === calendarYear && d.getMonth() === calendarMonth;
  });
  const doneCount = monthTasks.filter(t => t.done).length;
  const completionRate = monthTasks.length ? Math.round(doneCount/monthTasks.length*100) : 0;

  return `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
      <div class="card" style="padding:14px;text-align:center;border-top:3px solid #ef4444">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">업무 마감</div>
        <div style="font-size:24px;font-weight:700;color:#ef4444">${byKind.task}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${completionRate}% 완료</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;border-top:3px solid #3b82f6">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">회의·약속</div>
        <div style="font-size:24px;font-weight:700;color:#3b82f6">${byKind.schedule + byKind.meeting}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">회의록 ${byKind.meeting||0}건</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;border-top:3px solid #ec4899">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">고객 이벤트</div>
        <div style="font-size:24px;font-weight:700;color:#ec4899">${byKind.customer}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">B2C ${b2c} · B2B ${b2b}</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;border-top:3px solid #6366f1">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">프로젝트 마감</div>
        <div style="font-size:24px;font-weight:700;color:#6366f1">${byKind.project}</div>
      </div>
    </div>

    ${ces.length > 0 ? `
      <div class="section-title">🎁 고객 이벤트 상태별</div>
      <div class="card" style="margin-bottom:18px;padding:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${CUSTOMER_EVENT_STATUSES.map(s => `
          <div style="text-align:center;padding:10px;background:var(--bg2);border-radius:6px">
            <div style="font-size:11px;color:var(--text3)">${s}</div>
            <div style="font-size:20px;font-weight:700;margin-top:4px">${byStatus[s]||0}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <div class="section-title">📋 이번 달 전체 일정 (${events.length}건)</div>
    ${renderCalendarListView()}
  `;
}

// 추가 메뉴 - 어떤 종류 추가할지 선택
function openCalendarAddMenu(dateStr) {

// v12: O 2개 + KR 3개 + KPI 9개 + Project 17개 트리 시드
function seedKpisIfFresh() {
  if (!state.currentMember) return;
  if (state.currentMember !== 'm1') return;
  const tree = POUR_SEED_DATA.v12Tree;
  if (!tree) return;
  // 이미 매출 Objective가 있으면 시드 안 함
  const salesObj = state.objectives.find(o => o.memberId === state.currentMember && o.title === tree.objectives[0].title);
  if (salesObj) return;

  const now = new Date().toISOString();
  let addedKpis = 0, addedProjects = 0;

  // 1) Objectives 생성
  const objIdByKey = {};
  tree.objectives.forEach((o, i) => {
    const objId = 'o_' + o.key + '_' + Date.now() + '_' + i;
    objIdByKey[o.key] = objId;
    state.objectives.push({
      id: objId, memberId: state.currentMember,
      title: o.title, year: o.year, target: o.target, current: 0, unit: o.unit,
      description: o.description, createdAt: now
    });
  });

  // 2) Key Results 생성 (channel 기반 매핑)
  const krIdByChannel = {};
  tree.keyResults.forEach((kr, i) => {
    const krId = 'kr_' + kr.channel + '_' + Date.now() + '_' + i;
    krIdByChannel[kr.channel] = krId;
    state.keyResults.push({
      id: krId, objectiveId: objIdByKey[kr.objKey],
      title: kr.title, target: kr.target, current: 0, unit: kr.unit,
      channel: kr.channel, description: kr.description, createdAt: now
    });
  });

  // 3) KPI + 산하 Project 생성
  tree.kpis.forEach((k, ki) => {
    const krId = krIdByChannel[k.krChannel];
    if (!krId) return;
    const kpiId = 'kpi_' + k.name.replace(/\s/g,'_') + '_' + Date.now() + '_' + ki;
    state.kpis.push({
      id: kpiId, memberId: state.currentMember,
      keyResultId: krId,
      name: k.name, target: k.target, baseline: k.baseline || 0, unit: k.unit,
      source: k.source,                // 'auto' | 'manual' | 'auto-progress'
      current: 0,
      description: k.description, history: [], createdAt: now
    });
    addedKpis++;
    (k.projects || []).forEach((p, pi) => {
      const pid = 'p_seed12_' + kpiId + '_' + pi;
      state.projects.push({
        id: pid, memberId: p.ownerId || state.currentMember,  // 담당자가 곧 memberId
        ownerId: p.ownerId || state.currentMember,            // v15: 명시적 담당자
        collaboratorIds: [],                                   // v15: 협업자
        kpiId: kpiId,
        contribution: p.contribution,
        name: p.name, category: p.category,
        status: '진행중', progress: p.progress || 0,
        description: p.description || '', dueDate: '',
        createdAt: now
      });
      addedProjects++;
    });
  });

  saveState();
  toast(`✨ v12 시드: O ${tree.objectives.length} · KR ${tree.keyResults.length} · KPI ${addedKpis} · Project ${addedProjects}`);
}

// v12: KPI 현재값 계산
// auto: baseline + Σ(contribution × progress/100)
// auto-progress: 연결 프로젝트 progress 평균값 (운영 시스템용)
// manual: 직접 입력값
function getKpiCurrentValue(k) {
  if (!k) return 0;
  if (k.source === 'manual') return k.current || 0;
  const projects = state.projects.filter(p => p.kpiId === k.id);
  if (k.source === 'auto-progress') {
    if (projects.length === 0) return k.baseline || 0;
    const avg = projects.reduce((s,p) => s + (p.progress||0), 0) / projects.length;
    return Math.round(avg);
  }
  // auto (default)
  const sum = projects.reduce((s, p) => {
    const contrib = p.contribution || 0;
    const prog = (p.progress || 0) / 100;
    return s + contrib * prog;
  }, 0);
  return (k.baseline || 0) + Math.round(sum);
}

// 반복업무가 현재 멤버에게 할당되어 있는지 확인
function isRecurringAssignedToMe(r, memberId) {
  if (!r) return false;
  if (r.assignees === 'all') return true;
  if (Array.isArray(r.assignees)) return r.assignees.includes(memberId);
  // v14 이전 호환: memberId만 있음
  return r.memberId === memberId;
}

// 매일 호출: 오늘에 해당하는 반복 업무들을 tasks에 인스턴스로 생성
function generateRecurringForToday() {
  if (!state.currentMember) return;
  if (!state.recurringTasks) return;
  const today = new Date();
  const todayKey = today.toISOString().split('T')[0];
  const days = ['일','월','화','수','목','금','토'];
  const todayDay = days[today.getDay()];
  const todayMonthDay = today.getDate();
  // 이 달의 마지막 날 계산
  const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const isLastDayToday = todayMonthDay === lastDayOfMonth;

  const myRecurring = (state.recurringTasks||[]).filter(r =>
    r.active !== false && isRecurringAssignedToMe(r, state.currentMember)
  );

  let created = 0;
  myRecurring.forEach(r => {
    let shouldGenerate = false;
    if (r.recurType === 'daily') {
      shouldGenerate = true;
    } else if (r.recurType === 'weekly' && r.weekDay === todayDay) {
      shouldGenerate = true;
    } else if (r.recurType === 'monthly') {
      if (r.monthDay === 'last' && isLastDayToday) shouldGenerate = true;
      else if (typeof r.monthDay === 'number' && r.monthDay === todayMonthDay) shouldGenerate = true;
    }
    if (!shouldGenerate) return;

    // 중복 체크: 이 멤버가 이 반복업무 인스턴스를 오늘 이미 받았나
    const exists = state.tasks.some(t =>
      t.recurringId === r.id &&
      t.performedDate === todayKey &&
      t.memberId === state.currentMember
    );
    if (exists) return;

    state.tasks.push({
      id: 't_rec_' + r.id + '_' + state.currentMember + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      memberId: state.currentMember,
      title: r.title,
      done: false,
      priority: r.priority || 'mid',
      projectId: r.projectId || null,
      weekDay: todayDay,
      pulledToday: true,
      isFixed: r.pinned === true,    // v21: pinned 반복업무 → 대시보드 고정업무에 표시
      attachments: [], notes: [],
      status: 'active',
      dueDate: '',
      time: r.time || '',
      recurringId: r.id,
      performedDate: todayKey,
      createdAt: new Date().toISOString()
    });
    created++;
  });
  if (created > 0) {
    saveState();
    toast(`🔁 오늘의 반복 업무 ${created}개 자동 추가`);
  }
}

// 매뉴얼 카테고리 1개 → 프로젝트 1개 + 핵심 항목 N개 → 업무
function registerCategoryAsProject(catId, taskLimit = 5, silent = false) {
  const c = (POUR_SEED_DATA.manual || []).find(x => x.id === catId);
  if (!c) return null;
  if (!state.currentMember) { toast('담당자를 먼저 선택하세요'); return null; }
  // 중복 체크
  const existing = state.projects.find(p => p.memberId === state.currentMember && p.name === c.title);
  if (existing) {
    if (!silent) toast(`이미 "${c.title}" 프로젝트가 있습니다`);
    return { projectName: c.title, taskCount: 0, skipped: true };
  }
  // 프로젝트 생성
  const pid = 'p_seed_' + catId + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  const itemCount = (c.items || []).length;
  state.projects.push({
    id: pid, memberId: state.currentMember,
    name: c.title, category: manualIconToProjectCat(c.icon),
    status: '진행중', progress: 0,
    description: (c.desc||'') + `\n\n📚 원본: 매뉴얼 ${itemCount}개 항목 (매뉴얼 페이지에서 전체 보기)`,
    dueDate: '', createdAt: new Date().toISOString()
  });
  // 상위 N개 항목을 업무로 (긴 항목은 60자로 자름)
  const tasks = (c.items || []).slice(0, taskLimit);
  tasks.forEach((item, idx) => {
    const title = item.length > 60 ? item.slice(0, 60) + '…' : item;
    state.tasks.push({
      id: 't_seed_' + catId + '_' + idx + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      memberId: state.currentMember,
      title: title,
      done: false, priority: 'mid', projectId: pid,
      isFixed: false, attachments: [], notes: [],
      status: 'active', createdAt: new Date().toISOString()
    });
  });
  saveState();
  if (!silent) toast(`✅ "${c.title}" 프로젝트 등록 (업무 ${tasks.length}개 포함)`);
  return { projectName: c.title, taskCount: tasks.length, skipped: false };
}

function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const dateStr = now.toISOString().slice(0,10);
  a.href = url;
  a.download = `pour-os-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem(LAST_BACKUP_KEY, Date.now().toString());
  const reminder = document.getElementById('backupReminder');
  if (reminder) reminder.style.display = 'none';
  toast('✅ 데이터 백업 완료! 안전한 곳에 보관하세요.');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.members || !imported.tasks) {
          alert('올바른 POUR OS 백업 파일이 아닙니다.');
          return;
        }
        if (!confirm(`백업 파일(${file.name})을 복원하면 현재 데이터가 교체됩니다. 계속하시겠습니까?`)) return;
        state = migrateNoteFields(imported);
        saveState();
        navigate(currentPage || 'dashboard');
        toast('✅ 데이터 복원 완료!');
      } catch(err) {
        alert('파일을 읽는 중 오류가 발생했습니다: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
