<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ============================================================
// Constants
// ============================================================
const COLLECTIONS = {
  PARTNER_COMPANIES: 'partner-companies',
  DEALERS: 'dealers',
  DEALER_ORDERS: 'dealer-orders',
  MATCHING_REQUESTS: 'matching-requests',
};

const SESSION_KEY = 'pourPortalSession'; // { roleType, accountId, ts }
const SESSION_TTL_MS = 24 * 60 * 60 * 1000; // 24h

const DEALER_TIERS = {
  Silver: { label:'SILVER', margin:22, color:'#6B7280', bg:'#F3F4F6', border:'#D1D5DB' },
  Gold:   { label:'GOLD',   margin:28, color:'#EA580C', bg:'#FFF7ED', border:'#FED7AA' },
  Platinum:{ label:'PLATINUM',margin:35, color:'#0F1F5C', bg:'#EEF2FF', border:'#C7D2FE' },
};

const ORDER_STATUS_COLOR = {
  '신규':       { bg: '#FEE2E2', border: '#FCA5A5', color: '#DC2626' },
  '결제대기':   { bg: '#FEF3C7', border: '#FCD34D', color: '#B45309' },
  '결제완료':   { bg: '#DBEAFE', border: '#93C5FD', color: '#1E40AF' },
  '배송준비':   { bg: '#FEF3C7', border: '#FCD34D', color: '#B45309' },
  '배송중':     { bg: '#FFEDD5', border: '#FED7AA', color: '#EA580C' },
  '완료':       { bg: '#D1FAE5', border: '#6EE7B7', color: '#047857' },
  '환불':       { bg: '#F3F4F6', border: '#E5E7EB', color: '#6B7280' },
};

const REQ_STATUS_COLOR = {
  '신규':       { bg: '#FEE2E2', border: '#FCA5A5', color: '#DC2626' },
  '자동매칭':   { bg: '#DBEAFE', border: '#93C5FD', color: '#1E40AF' },
  '수동검토중': { bg: '#FEF3C7', border: '#FCD34D', color: '#B45309' },
  '파트너통보': { bg: '#FFEDD5', border: '#FED7AA', color: '#EA580C' },
  '확정':       { bg: '#D1FAE5', border: '#6EE7B7', color: '#047857' },
  '시공중':     { bg: '#FFEDD5', border: '#FED7AA', color: '#EA580C' },
  '완료':       { bg: '#ECFDF5', border: '#A7F3D0', color: '#059669' },
  '취소':       { bg: '#F3F4F6', border: '#E5E7EB', color: '#6B7280' },
};

// ============================================================
// Utilities
// ============================================================
async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function nowIso() { return new Date().toISOString(); }
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso); if (isNaN(d)) return '-';
  return d.toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }).replace(/\. /g,'-').replace('.','');
}
function fmtDateShort(iso) {
  if (!iso) return '-';
  const d = new Date(iso); if (isNaN(d)) return '-';
  return d.toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit' });
}
function fmtPrice(n) {
  if (n == null || n === '') return '-';
  return Number(n).toLocaleString('ko-KR');
}
function normalizePhone(p) { return (p || '').replace(/[^0-9]/g, ''); }

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (Date.now() - (s.ts || 0) > SESSION_TTL_MS) { localStorage.removeItem(SESSION_KEY); return null; }
    return s;
  } catch (e) { return null; }
}
function saveSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify({ ...s, ts: Date.now() })); }
function clearSession() { localStorage.removeItem(SESSION_KEY); }

function tierMeta(id) { return DEALER_TIERS[id] || DEALER_TIERS.Silver; }

function thisMonthRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const end = new Date(now.getFullYear(), now.getMonth() + 1, 1).toISOString();
  return { start, end };
}

// ============================================================
// Toast
// ============================================================
function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', bottom:32, left:'50%', transform:'translateX(-50%)', zIndex:5000,
      padding:'12px 22px', borderRadius:12, fontSize:13, fontWeight:700, color:'#fff',
      background: type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : 'var(--navy)',
      boxShadow:'0 6px 24px rgba(0,0,0,.25)', whiteSpace:'nowrap'
    }}>
      {type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} {message}
    </div>
  );
}

// ============================================================
// Modal
// ============================================================
function Modal({ open, onClose, title, children, width = 720 }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(15,31,92,.45)', zIndex:4000,
      display:'flex', alignItems:'center', justifyContent:'center', padding:18, backdropFilter:'blur(2px)'
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'#fff', borderRadius:'var(--r-lg)', width:'100%', maxWidth:width,
        maxHeight:'92vh', display:'flex', flexDirection:'column', boxShadow:'var(--shadow-lg)'
      }}>
        <div style={{ padding:'20px 24px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <h3 style={{ fontSize:16, fontWeight:900, color:'var(--navy)', letterSpacing:-0.3 }}>{title}</h3>
          <button onClick={onClose} style={{ width:32, height:32, borderRadius:8, color:'var(--text-sm)', fontSize:18 }}>✕</button>
        </div>
        <div style={{ padding:'22px 24px', overflowY:'auto', flex:1 }}>{children}</div>
      </div>
    </div>
  );
}

// ============================================================
// Login Screen
// ============================================================
function LoginScreen({ onLogin, onToast }) {
  const [phone, setPhone] = useState('');
  const [pin, setPin] = useState('');
  const [busy, setBusy] = useState(false);

  async function submit() {
    if (!phone || phone.length < 9) { onToast({ message:'전화번호를 입력하세요', type:'error' }); return; }
    if (!pin || pin.length < 4) { onToast({ message:'PIN 4자리 이상 입력', type:'error' }); return; }
    setBusy(true);
    try {
      const np = normalizePhone(phone);
      // 1) 대리점 조회
      const dealerSnap = await db.collection(COLLECTIONS.DEALERS).get();
      const dealer = dealerSnap.docs.map(d => ({ id:d.id, ...d.data() })).find(d => normalizePhone(d.contactPhone) === np);
      if (dealer) {
        const expected = dealer.portalPinHash;
        if (!expected) { onToast({ message:'PIN이 설정되지 않았습니다 — 어드민에 문의', type:'error' }); setBusy(false); return; }
        const h = await hashPin(pin);
        if (h !== expected) { onToast({ message:'PIN 불일치', type:'error' }); setBusy(false); return; }
        if (dealer.contractStatus !== '활성') { onToast({ message:'계약 상태가 활성이 아닙니다', type:'error' }); setBusy(false); return; }
        saveSession({ roleType:'dealer', accountId: dealer.id });
        onLogin({ roleType:'dealer', accountId: dealer.id });
        return;
      }
      // 2) 파트너 조회
      const partnerSnap = await db.collection(COLLECTIONS.PARTNER_COMPANIES).get();
      const partner = partnerSnap.docs.map(d => ({ id:d.id, ...d.data() })).find(p => normalizePhone(p.contactPhone) === np);
      if (partner) {
        const expected = partner.portalPinHash;
        if (!expected) { onToast({ message:'PIN이 설정되지 않았습니다 — 어드민에 문의', type:'error' }); setBusy(false); return; }
        const h = await hashPin(pin);
        if (h !== expected) { onToast({ message:'PIN 불일치', type:'error' }); setBusy(false); return; }
        if (partner.contractStatus !== '활성') { onToast({ message:'계약 상태가 활성이 아닙니다', type:'error' }); setBusy(false); return; }
        saveSession({ roleType:'partner', accountId: partner.id });
        onLogin({ roleType:'partner', accountId: partner.id });
        return;
      }
      onToast({ message:'등록된 계정을 찾을 수 없습니다', type:'error' });
    } catch (e) {
      console.error(e);
      onToast({ message:'로그인 실패: '+e.message, type:'error' });
    } finally { setBusy(false); }
  }

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24, background:'linear-gradient(135deg, #FFFBF5 0%, #FFF7ED 50%, #FFFBF5 100%)' }}>
      <div style={{ background:'#fff', borderRadius:24, padding:'40px 36px', maxWidth:440, width:'100%', boxShadow:'0 22px 48px rgba(15,31,92,.1)', border:'1px solid var(--border)' }}>
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <div style={{ width:60, height:60, margin:'0 auto 16px', borderRadius:18, background:'linear-gradient(135deg, var(--or), var(--or-d))', display:'grid', placeItems:'center', fontSize:30, color:'#fff', boxShadow:'0 8px 20px rgba(249,115,22,.3)' }}>🤝</div>
          <h1 style={{ fontSize:22, fontWeight:900, color:'var(--navy)', letterSpacing:-0.6, marginBottom:6 }}>POUR스토어 포털</h1>
          <div style={{ fontSize:12.5, color:'var(--text-sm)', fontWeight:700 }}>파트너사 · 대리점 전용</div>
        </div>
        <Field label="등록 전화번호">
          <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} onKeyDown={e => e.key==='Enter'&&submit()} placeholder="010-0000-0000" autoFocus
            style={inputStyle({ padding:'13px 16px', fontSize:15, fontWeight:700 })} />
        </Field>
        <Field label="PIN (4자리 이상)">
          <input type="password" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, '').slice(0, 8))} onKeyDown={e => e.key==='Enter'&&submit()}
            style={inputStyle({ padding:'13px 16px', fontSize:18, fontWeight:800, letterSpacing:6, textAlign:'center' })} />
        </Field>
        <button onClick={submit} disabled={busy} style={{
          width:'100%', padding:'14px', background: busy ? '#9CA3AF' : 'linear-gradient(135deg, var(--or), var(--or-d))', color:'#fff',
          fontSize:14, fontWeight:900, borderRadius:14, boxShadow:'0 6px 16px rgba(249,115,22,.3)', marginTop:6
        }}>{busy ? '확인 중...' : '로그인 →'}</button>
        <div style={{ marginTop:18, padding:'12px 14px', background:'var(--or-pale)', border:'1px solid var(--or-l)', borderRadius:10, fontSize:11.5, color:'var(--text-md)', fontWeight:700, lineHeight:1.6 }}>
          💡 PIN은 <b style={{ color:'var(--or-d)' }}>POUR스토어 어드민</b>에서 발급받으세요. 파트너·대리점 자동 인식.
        </div>
      </div>
    </div>
  );
}

// ============================================================
// Header
// ============================================================
function PortalHeader({ account, roleType, onLogout }) {
  const isDealer = roleType === 'dealer';
  const tier = isDealer ? tierMeta(account.tier) : null;
  return (
    <header style={{ background:'#fff', borderBottom:'1px solid var(--border)', padding:'16px 28px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:14, flexWrap:'wrap' }}>
      <div style={{ display:'flex', alignItems:'center', gap:14 }}>
        <div style={{ width:40, height:40, borderRadius:11, background:'linear-gradient(135deg, var(--or), var(--or-d))', display:'grid', placeItems:'center', fontSize:18, color:'#fff' }}>{isDealer ? '🏪' : '👷'}</div>
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:2 }}>
            <span style={{ fontSize:11, fontWeight:800, color:'var(--text-sm)', letterSpacing:.5, textTransform:'uppercase' }}>{isDealer ? '대리점' : '파트너사'}</span>
            {tier && <span style={{ padding:'2px 7px', background:tier.bg, border:`1px solid ${tier.border}`, color:tier.color, fontSize:10, fontWeight:900, borderRadius:4, letterSpacing:.4 }}>{tier.label} · {tier.margin}%</span>}
            {!isDealer && account.grade && <span style={{ padding:'2px 7px', background:'var(--or-pale)', border:'1px solid var(--or-l)', color:'var(--or-d)', fontSize:10, fontWeight:900, borderRadius:4 }}>등급 {account.grade}</span>}
          </div>
          <h1 style={{ fontSize:17, fontWeight:900, color:'var(--navy)', letterSpacing:-0.4 }}>{account.companyName || '(이름없음)'}</h1>
        </div>
      </div>
      <div style={{ display:'flex', gap:8, alignItems:'center' }}>
        <span style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:700 }}>{account.contactPhone || '-'}</span>
        <button onClick={onLogout} style={{ padding:'8px 14px', borderRadius:9, fontSize:12, fontWeight:800, color:'var(--text-md)', background:'var(--bg)', border:'1px solid var(--border)' }}>🔒 로그아웃</button>
      </div>
    </header>
  );
}

// ============================================================
// Dealer Dashboard
// ============================================================
function DealerDashboard({ account, orders, onUpdate, onToast }) {
  const [showOrderForm, setShowOrderForm] = useState(false);

  const myOrders = useMemo(() => orders.filter(o => o.dealerId === account.id).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||'')), [orders, account.id]);

  const monthly = useMemo(() => {
    const { start, end } = thisMonthRange();
    const list = myOrders.filter(o => o.createdAt && o.createdAt >= start && o.createdAt < end && o.status !== '환불');
    const sales = list.reduce((s, o) => s + (o.totalAmount || 0), 0);
    const tier = tierMeta(account.tier);
    return {
      count: list.length,
      sales,
      commission: Math.round(sales * tier.margin / 100),
      tierMargin: tier.margin,
    };
  }, [myOrders, account.tier]);

  const recent = myOrders.slice(0, 10);

  return (
    <div style={{ padding:'24px 28px 40px' }}>
      {/* 핵심 CTA + 이달 요약 */}
      <div style={{ display:'grid', gridTemplateColumns:'1.2fr 1fr 1fr 1fr', gap:12, marginBottom:24 }}>
        <button onClick={() => setShowOrderForm(true)} style={{
          background:'linear-gradient(135deg, var(--or), var(--or-d))', color:'#fff',
          borderRadius:'var(--r-lg)', padding:'22px 24px', textAlign:'left',
          boxShadow:'0 12px 28px rgba(249,115,22,.32)'
        }}>
          <div style={{ fontSize:11, fontWeight:800, letterSpacing:.8, marginBottom:6, opacity:.9 }}>NEW ORDER</div>
          <div style={{ fontSize:22, fontWeight:900, letterSpacing:-0.6, marginBottom:6 }}>+ 새 주문 작성</div>
          <div style={{ fontSize:11.5, opacity:.9, fontWeight:700 }}>고객 정보 + 품목 입력 → POUR스토어 결제 안내</div>
        </button>
        <SummaryCard icon="🛒" label="이달 주문 수" value={`${monthly.count}건`} color="var(--navy)" />
        <SummaryCard icon="💰" label="이달 매출 (고객 결제)" value={`${fmtPrice(monthly.sales)}원`} color="var(--or)" small />
        <SummaryCard icon="💵" label={`예상 수수료 (${monthly.tierMargin}%)`} value={`${fmtPrice(monthly.commission)}원`} color="var(--green)" small highlight />
      </div>

      {/* 정산 안내 */}
      <div style={{ padding:'14px 18px', background:'var(--green-l)', border:'1px solid var(--green-m)', borderRadius:12, marginBottom:24, display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
        <span style={{ fontSize:20 }}>💸</span>
        <div style={{ flex:1, fontSize:12.5, color:'var(--text-md)', lineHeight:1.65, fontWeight:700 }}>
          <b style={{ color:'var(--green)' }}>월말 자동 정산</b> · 고객이 POUR스토어 본사몰(Cafe24)에서 결제 → 매월 마지막 영업일에 대리점 등록 계좌로 수수료 입금
        </div>
      </div>

      {/* 최근 주문 */}
      <div style={{ background:'#fff', borderRadius:'var(--r-lg)', border:'1px solid var(--border)', overflow:'hidden' }}>
        <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <h3 style={{ fontSize:14, fontWeight:900, color:'var(--navy)', letterSpacing:-0.3 }}>📋 최근 주문 ({myOrders.length})</h3>
          <span style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:700 }}>최신순 10건 표시</span>
        </div>
        {recent.length === 0 ? (
          <div style={{ padding:'48px 24px', textAlign:'center', color:'var(--text-sm)' }}>
            <div style={{ fontSize:32, marginBottom:10 }}>🛒</div>
            <div style={{ fontSize:13, fontWeight:800, color:'var(--navy)', marginBottom:4 }}>아직 주문이 없습니다</div>
            <div style={{ fontSize:12, fontWeight:700 }}>위의 + 새 주문 작성 버튼을 눌러주세요</div>
          </div>
        ) : (
          <div style={{ overflowX:'auto' }}>
            <table style={{ width:'100%', fontSize:12.5, borderCollapse:'collapse' }}>
              <thead style={{ background:'var(--bg)' }}>
                <tr>
                  {['상태','주문번호','주문일','고객','품목','매출','수수료'].map(h => <th key={h} style={th()}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {recent.map(o => {
                  const c = ORDER_STATUS_COLOR[o.status] || ORDER_STATUS_COLOR['신규'];
                  const tier = tierMeta(account.tier);
                  const commission = Math.round((o.totalAmount || 0) * tier.margin / 100);
                  return (
                    <tr key={o.id} style={{ borderBottom:'1px solid var(--border-s)' }}>
                      <td style={td()}><span style={{ display:'inline-block', padding:'3px 9px', background:c.bg, border:`1px solid ${c.border}`, color:c.color, fontSize:10.5, fontWeight:900, borderRadius:5 }}>{o.status}</span></td>
                      <td style={td()}><span style={{ fontFamily:'monospace', fontWeight:700, color:'var(--text-md)' }}>{o.orderNo || '-'}</span></td>
                      <td style={td()}>{fmtDate(o.createdAt)}</td>
                      <td style={td()}><b style={{ color:'var(--navy)' }}>{o.customerName || '-'}</b><div style={{ fontSize:10.5, color:'var(--text-xs)', fontWeight:700, marginTop:2 }}>{o.customerPhone || ''}</div></td>
                      <td style={td()}>{(o.items || []).length}건</td>
                      <td style={{ ...td(), textAlign:'right', fontWeight:800, color:'var(--navy)' }}>{fmtPrice(o.totalAmount || 0)}원</td>
                      <td style={{ ...td(), textAlign:'right', fontWeight:800, color:'var(--green)' }}>{o.status !== '환불' ? `${fmtPrice(commission)}원` : '-'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {showOrderForm && (
        <NewOrderModal
          dealer={account}
          onClose={() => setShowOrderForm(false)}
          onSave={async (data) => {
            try {
              const payload = {
                ...data,
                source: 'dealer-store',
                dealerId: account.id,
                dealerName: account.companyName,
                status: '결제대기',
                paymentTarget: 'pourstore', // 고객 → POUR 직접 결제
                orderNo: 'OR-' + Date.now().toString().slice(-8),
                totalAmount: (data.items || []).reduce((s, it) => s + (Number(it.qty)||0) * (Number(it.unitPrice)||0), 0),
                createdAt: nowIso(),
                updatedAt: nowIso(),
                createdByPortal: true,
              };
              await db.collection(COLLECTIONS.DEALER_ORDERS).add(payload);
              onToast({ message:'주문 등록 완료 — POUR스토어가 처리합니다', type:'success' });
              setShowOrderForm(false);
              onUpdate();
            } catch (e) { console.error(e); onToast({ message:'저장 실패: '+e.message, type:'error' }); }
          }}
        />
      )}
    </div>
  );
}

function NewOrderModal({ dealer, onClose, onSave }) {
  const [data, setData] = useState({ customerName:'', customerPhone:'', shippingAddress:'', items:[{ name:'', qty:1, unitPrice:0 }], adminMemo:'' });
  const update = (k, v) => setData(d => ({ ...d, [k]: v }));
  const total = (data.items || []).reduce((s, it) => s + (Number(it.qty)||0) * (Number(it.unitPrice)||0), 0);
  const tier = tierMeta(dealer.tier);
  const commission = Math.round(total * tier.margin / 100);

  function updateItem(idx, k, v) {
    const next = data.items.map((it, i) => i === idx ? { ...it, [k]: v } : it);
    update('items', next);
  }
  function addItem() { update('items', [...data.items, { name:'', qty:1, unitPrice:0 }]); }
  function removeItem(idx) { update('items', data.items.filter((_, i) => i !== idx)); }

  function submit() {
    if (!data.customerName || !data.customerPhone) { alert('고객명과 연락처는 필수입니다'); return; }
    const validItems = data.items.filter(it => it.name && Number(it.qty) > 0 && Number(it.unitPrice) > 0);
    if (validItems.length === 0) { alert('품목을 1개 이상 입력해 주세요'); return; }
    onSave({ ...data, items: validItems });
  }

  return (
    <Modal open={true} onClose={onClose} title="새 주문 작성" width={760}>
      {/* 결제 안내 */}
      <div style={{ padding:'12px 14px', background:'var(--or-pale)', border:'1px solid var(--or-l)', borderRadius:10, fontSize:12, color:'var(--text-md)', fontWeight:700, lineHeight:1.65, marginBottom:16 }}>
        💳 <b style={{ color:'var(--or-d)' }}>고객은 POUR스토어 본사몰(Cafe24)에서 결제</b>합니다 · 대리점 카드/계좌 사용 X · 매월 말 정산 시 수수료 {tier.margin}% 입금
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
        <Field label="고객명 *"><input type="text" value={data.customerName} onChange={e => update('customerName', e.target.value)} style={inputStyle()} placeholder="홍길동" /></Field>
        <Field label="연락처 *"><input type="text" value={data.customerPhone} onChange={e => update('customerPhone', e.target.value)} style={inputStyle()} placeholder="010-0000-0000" /></Field>
      </div>
      <Field label="배송 주소"><input type="text" value={data.shippingAddress} onChange={e => update('shippingAddress', e.target.value)} style={inputStyle()} placeholder="○○도 ○○시 ○○로" /></Field>

      <Field label="주문 품목">
        <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:10, overflow:'hidden' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 80px 130px 130px 36px', gap:8, padding:'10px 12px', background:'#fff', borderBottom:'1px solid var(--border)', fontSize:11, fontWeight:800, color:'var(--text-sm)', letterSpacing:.3 }}>
            <span>품목</span><span style={{ textAlign:'right' }}>수량</span><span style={{ textAlign:'right' }}>단가</span><span style={{ textAlign:'right' }}>합계</span><span></span>
          </div>
          {data.items.map((it, idx) => {
            const sub = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
            return (
              <div key={idx} style={{ display:'grid', gridTemplateColumns:'1fr 80px 130px 130px 36px', gap:8, padding:'8px 12px', borderBottom:'1px solid var(--border-s)', alignItems:'center' }}>
                <input value={it.name} onChange={e => updateItem(idx, 'name', e.target.value)} placeholder="제품명" style={inputStyle({ padding:'7px 10px', fontSize:12.5, background:'#fff' })} />
                <input type="number" value={it.qty} onChange={e => updateItem(idx, 'qty', Number(e.target.value))} style={inputStyle({ padding:'7px 10px', fontSize:12.5, textAlign:'right', background:'#fff' })} />
                <input type="number" value={it.unitPrice} onChange={e => updateItem(idx, 'unitPrice', Number(e.target.value))} style={inputStyle({ padding:'7px 10px', fontSize:12.5, textAlign:'right', background:'#fff' })} />
                <div style={{ textAlign:'right', fontSize:12.5, fontWeight:800, color:'var(--navy)' }}>{fmtPrice(sub)}원</div>
                <button onClick={() => removeItem(idx)} style={{ width:30, height:30, borderRadius:6, color:'var(--red)', fontSize:14 }}>✕</button>
              </div>
            );
          })}
          <div style={{ padding:'10px 14px', background:'#fff' }}>
            <button onClick={addItem} style={{ padding:'7px 14px', borderRadius:8, fontSize:12, fontWeight:800, color:'var(--or-d)', background:'var(--or-pale)', border:'1px solid var(--or-l)' }}>+ 품목 추가</button>
          </div>
        </div>
      </Field>

      <Field label="메모 (선택)"><textarea value={data.adminMemo} onChange={e => update('adminMemo', e.target.value)} style={{ ...inputStyle(), minHeight:60, resize:'vertical' }} placeholder="배송 요청·특이사항 등" /></Field>

      <div style={{ padding:16, background:'var(--bg)', borderRadius:12, marginTop:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
          <span style={{ fontSize:12, color:'var(--text-md)', fontWeight:700 }}>고객 결제 금액</span>
          <span style={{ fontSize:18, fontWeight:900, color:'var(--navy)' }}>{fmtPrice(total)}원</span>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:10, borderTop:'1px solid var(--border)' }}>
          <span style={{ fontSize:11.5, color:'var(--green)', fontWeight:800 }}>예상 정산 수수료 ({tier.margin}%)</span>
          <span style={{ fontSize:16, fontWeight:900, color:'var(--green)' }}>{fmtPrice(commission)}원</span>
        </div>
      </div>

      <div style={{ display:'flex', gap:8, marginTop:24, paddingTop:18, borderTop:'1px solid var(--border-s)' }}>
        <div style={{ flex:1 }} />
        <button onClick={onClose} style={btnGhost()}>취소</button>
        <button onClick={submit} style={btnPrimary()}>주문 등록 →</button>
      </div>
    </Modal>
  );
}

function PartnerDashboard({ account, requests, onUpdate, onToast }) {
  const myRequests = useMemo(() => {
    return requests.filter(r => (r.matchedPartners || []).some(mp => mp.partnerId === account.id))
      .sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  }, [requests, account.id]);

  const counts = useMemo(() => ({
    pending: myRequests.filter(r => ['파트너통보','확정'].includes(r.status)).length,
    inProgress: myRequests.filter(r => r.status === '시공중').length,
    done: myRequests.filter(r => r.status === '완료').length,
    total: myRequests.length,
  }), [myRequests]);

  const [selected, setSelected] = useState(null);

  return (
    <div style={{ padding:'24px 28px 40px' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:12, marginBottom:24 }}>
        <SummaryCard icon="✋" label="대기 중" value={`${counts.pending}건`} color="var(--or)" />
        <SummaryCard icon="🏗" label="시공 중" value={`${counts.inProgress}건`} color="var(--amber)" />
        <SummaryCard icon="✅" label="완료" value={`${counts.done}건`} color="var(--green)" />
        <SummaryCard icon="📋" label="누적 배정" value={`${counts.total}건`} color="var(--navy)" />
      </div>

      <div style={{ background:'#fff', borderRadius:'var(--r-lg)', border:'1px solid var(--border)', overflow:'hidden' }}>
        <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border)' }}>
          <h3 style={{ fontSize:14, fontWeight:900, color:'var(--navy)', letterSpacing:-0.3 }}>🤝 배정된 시공연결 신청</h3>
        </div>
        {myRequests.length === 0 ? (
          <div style={{ padding:'48px 24px', textAlign:'center', color:'var(--text-sm)' }}>
            <div style={{ fontSize:32, marginBottom:10 }}>📭</div>
            <div style={{ fontSize:13, fontWeight:800, color:'var(--navy)', marginBottom:4 }}>배정된 신청이 없습니다</div>
            <div style={{ fontSize:12, fontWeight:700 }}>매칭 시 본 페이지에 표시됩니다</div>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column' }}>
            {myRequests.map(r => {
              const c = REQ_STATUS_COLOR[r.status] || REQ_STATUS_COLOR['신규'];
              return (
                <button key={r.id} onClick={() => setSelected(r)} style={{
                  padding:'14px 20px', borderBottom:'1px solid var(--border-s)', textAlign:'left', cursor:'pointer', background:'transparent'
                }} onMouseOver={e => e.currentTarget.style.background='var(--or-pale)'} onMouseOut={e => e.currentTarget.style.background='transparent'}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6, flexWrap:'wrap' }}>
                    <span style={{ display:'inline-block', padding:'3px 9px', background:c.bg, border:`1px solid ${c.border}`, color:c.color, fontSize:10.5, fontWeight:900, borderRadius:5 }}>{r.status}</span>
                    <b style={{ fontSize:13.5, color:'var(--navy)' }}>{r.customerName || '(이름없음)'}</b>
                    <span style={{ fontSize:11.5, color:'var(--text-sm)', fontWeight:700 }}>{r.region || '-'} · {r.buildingType || '-'}</span>
                    <span style={{ fontSize:11, color:'var(--text-xs)', fontWeight:700, marginLeft:'auto' }}>{fmtDate(r.createdAt)}</span>
                  </div>
                  <div style={{ fontSize:12, color:'var(--text-md)', fontWeight:600, lineHeight:1.55, display:'-webkit-box', WebkitLineClamp:1, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
                    {r.description || '(상세내용 없음)'}
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>

      {selected && (
        <RequestPartnerDetail
          request={selected}
          onClose={() => setSelected(null)}
          onUpdate={onUpdate}
          onToast={onToast}
        />
      )}
    </div>
  );
}

function RequestPartnerDetail({ request, onClose, onUpdate, onToast }) {
  const [status, setStatus] = useState(request.status);
  const [memo, setMemo] = useState(request.partnerMemo || '');

  async function save() {
    try {
      await db.collection(COLLECTIONS.MATCHING_REQUESTS).doc(request.id).set({
        status, partnerMemo: memo, updatedAt: nowIso()
      }, { merge:true });
      onToast({ message:'업데이트 완료', type:'success' });
      onClose();
      onUpdate();
    } catch (e) { onToast({ message:'저장 실패: '+e.message, type:'error' }); }
  }

  return (
    <Modal open={true} onClose={onClose} title={`신청 상세 — ${request.customerName || ''}`} width={680}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
        <InfoBox label="고객명" value={request.customerName || '-'} />
        <InfoBox label="연락처" value={request.customerPhone || '-'} />
        <InfoBox label="지역" value={request.region || '-'} />
        <InfoBox label="건물 유형" value={request.buildingType || '-'} />
        <InfoBox label="예상 예산" value={request.estimatedBudget || '-'} />
        <InfoBox label="신청일" value={fmtDate(request.createdAt)} />
      </div>
      <InfoBox label="현장 주소" value={request.address || '-'} block />
      <InfoBox label="상세 내용" value={request.description || '-'} block multiline />

      <Field label="상태 업데이트">
        <select value={status} onChange={e => setStatus(e.target.value)} style={inputStyle()}>
          <option value="파트너통보">파트너통보</option>
          <option value="확정">확정 (시공 진행 결정)</option>
          <option value="시공중">시공중</option>
          <option value="완료">완료</option>
          <option value="취소">취소</option>
        </select>
      </Field>
      <Field label="파트너 메모"><textarea value={memo} onChange={e => setMemo(e.target.value)} style={{ ...inputStyle(), minHeight:80, resize:'vertical' }} placeholder="현장 상황·일정·고객 협의 내용 등" /></Field>

      <div style={{ display:'flex', gap:8, marginTop:24, paddingTop:18, borderTop:'1px solid var(--border-s)' }}>
        <div style={{ flex:1 }} />
        <button onClick={onClose} style={btnGhost()}>취소</button>
        <button onClick={save} style={btnPrimary()}>저장</button>
      </div>
    </Modal>
  );
}

    <div style={{ marginBottom: block ? 14 : 0 }}>

      <div style={{
        padding:'10px 14px', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:9,
        fontSize:13, color:'var(--text)', fontWeight:600, lineHeight:1.55,
        whiteSpace: multiline ? 'pre-wrap' : 'normal'
      }}>{value}</div>

}

const th = () => ({ padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:800, color:'var(--text-sm)', letterSpacing:.3, borderBottom:'1px solid var(--border)' });
const td = () => ({ padding:'10px 14px', fontSize:12.5, color:'var(--text)', verticalAlign:'middle' });

      <label style={{ display:'block', fontSize:11, fontWeight:800, color:'var(--or-d)', letterSpacing:.5, marginBottom:6 }}>{label}</label>

// ============================================================
// App
// ============================================================
function App() {
  const [session, setSession] = useState(loadSession());
  const [account, setAccount] = useState(null);
  const [orders, setOrders] = useState([]);
  const [requests, setRequests] = useState([]);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(false);

  async function loadAccountAndData() {
    if (!session) return;
    setLoading(true);
    try {
      const collection = session.roleType === 'dealer' ? COLLECTIONS.DEALERS : COLLECTIONS.PARTNER_COMPANIES;
      const doc = await db.collection(collection).doc(session.accountId).get();
      if (!doc.exists) {
        setToast({ message:'계정을 찾을 수 없습니다', type:'error' });
        clearSession(); setSession(null); setLoading(false); return;
      }
      const acc = { id:doc.id, ...doc.data() };
      setAccount(acc);
    } catch (e) {
      console.error(e);
      setToast({ message:'데이터 로드 실패: '+e.message, type:'error' });
    } finally { setLoading(false); }
  }

  useEffect(() => { loadAccountAndData(); }, [session]);

  // 실시간 구독 — 계정 로드 후 역할별로 활성화
  useEffect(() => {
    if (!account || !session) return;
    let unsub = null;
    try {
      if (session.roleType === 'dealer') {
        unsub = db.collection(COLLECTIONS.DEALER_ORDERS)
          .where('dealerId', '==', account.id)
          .onSnapshot(snap => {
            setOrders(snap.docs.map(d => ({ id:d.id, ...d.data() })));
          }, err => {
            console.error('[orders snapshot]', err);
            // fallback to one-shot get
            db.collection(COLLECTIONS.DEALER_ORDERS).get().then(snap => {
              setOrders(snap.docs.map(d => ({ id:d.id, ...d.data() })).filter(o => o.dealerId === account.id));
            });
          });
      } else {
        unsub = db.collection(COLLECTIONS.MATCHING_REQUESTS)
          .onSnapshot(snap => {
            setRequests(snap.docs.map(d => ({ id:d.id, ...d.data() })));
          }, err => {
            console.error('[requests snapshot]', err);
            setToast({ message:'실시간 동기화 실패: '+err.message, type:'error' });
          });
      }
    } catch (e) {
      console.error('[subscribe]', e);
    }
    return () => { if (unsub) unsub(); };
  }, [account, session]);

  function logout() { clearSession(); setSession(null); setAccount(null); setOrders([]); setRequests([]); }

  if (!session) {
    return (
      <>
        <LoginScreen onLogin={s => setSession(s)} onToast={setToast} />
        {toast && <Toast {...toast} onDone={() => setToast(null)} />}
      </>
    );
  }

  if (loading || !account) {
    return (
      <div style={{ minHeight:'100vh', display:'grid', placeItems:'center', color:'var(--text-sm)', fontSize:13, fontWeight:700 }}>
        불러오는 중...
        {toast && <Toast {...toast} onDone={() => setToast(null)} />}
      </div>
    );
  }

  return (
    <div style={{ minHeight:'100vh' }}>
      <PortalHeader account={account} roleType={session.roleType} onLogout={logout} />
      {session.roleType === 'dealer'
        ? <DealerDashboard account={account} orders={orders} onUpdate={loadAccountAndData} onToast={setToast} />
        : <PartnerDashboard account={account} requests={requests} onUpdate={loadAccountAndData} onToast={setToast} />
      }
      {toast && <Toast {...toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
