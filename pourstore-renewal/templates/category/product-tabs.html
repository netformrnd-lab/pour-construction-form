<!-- ============================================================
  product-tabs — 카페24 product/list.html를 pour-products.html처럼 (제품보기+격자, 베스트+순위)
  삽입: product/list.html 스킨의 titleArea 아래(네이티브 typeMenu 위)에 한 번만.
  ★ 격자화 CSS는 스크립트와 무관하게 '항상' 적용됨(.normalpackage_box ul.prdList) → JS 막혀도 세로줄 안 됨.
  ★ '제품 보기' 타이틀/탭/상단정리는 스크립트가 처리(ptv-browse). 베스트 분류면 순위 뱃지(ptv-best).
  ★ 설정: BEST_CATE(베스트 분류번호), TABS(방수 없음).
  ============================================================ -->
<div class="ptv" data-ptv hidden>
  <h2 class="ptv-title" data-ptv-title>제품 보기</h2>
  <nav class="ptv-tabs" data-ptv-tabs aria-label="제품 카테고리"></nav>
</div>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable.css');
.ptv{ max-width:1256px; margin:0 auto; padding:30px 20px 6px; text-align:center; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
.ptv[hidden]{ display:none !important; }
.ptv *{ box-sizing:border-box; }
.ptv-title{ font-size:34px; font-weight:900; letter-spacing:-0.04em; color:#111; margin-bottom:22px; }
.ptv-tabs{ display:inline-flex; flex-wrap:wrap; justify-content:center; gap:12px 14px; }
.ptv-tab{ padding:9px 18px; border-radius:999px; font-size:17px; font-weight:700; color:#111; text-decoration:none; letter-spacing:-0.02em; white-space:nowrap; transition:background .15s,color .15s; }
.ptv-tab:hover{ background:#F2F3F7; }
.ptv-tab.on{ background:#33373D; color:#fff; }
@media (max-width:700px){ .ptv{ padding:20px 14px 4px; } .ptv-title{ font-size:25px; margin-bottom:16px; } .ptv-tabs{ gap:10px; } .ptv-tab{ font-size:15px; padding:8px 14px; } }

/* ▼▼ 격자화 — JS 없이도 항상 적용. 슬라이더(.main_product_slide)는 .normalpackage_box 밖이라 영향 없음 ▼▼ */
.normalpackage_box, .normalpackage_box .product_scrollx, .normalpackage_box .xans-product-listnormal{ overflow:visible !important; width:auto !important; max-width:100% !important; }
.normalpackage_box ul.prdList{
  display:grid !important; grid-template-columns:repeat(4,minmax(0,1fr)) !important;
  gap:30px 22px !important; width:auto !important; max-width:1256px !important; margin:0 auto !important;
  padding:0 20px !important; list-style:none !important; white-space:normal !important; }
.normalpackage_box ul.prdList > li{ width:auto !important; min-width:0 !important; margin:0 !important; padding:0 !important; float:none !important; display:block !important; }
@media (max-width:900px){ .normalpackage_box ul.prdList{ grid-template-columns:repeat(3,minmax(0,1fr)) !important; gap:24px 16px !important; } }
@media (max-width:640px){ .normalpackage_box ul.prdList{ grid-template-columns:repeat(2,minmax(0,1fr)) !important; gap:20px 12px !important; padding:0 14px !important; } }

/* ▼ 스크립트가 켜지면 카페24 기본 상단·툴바 숨김(제품보기 룩) */
html.ptv-browse .section.path, html.ptv-browse .section.titleArea, html.ptv-browse .ec-base-tab.typeMenu,
html.ptv-browse .product_top_image, html.ptv-browse .main_product_slide,
html.ptv-browse .xans-product-normalmenu, html.ptv-browse .prdCount, html.ptv-browse .ec-base-prdSort{ display:none !important; }

/* ▼ 베스트 모드: 카드에 순위 뱃지(진열 순서 = 순위) */
html.ptv-best .normalpackage_box ul.prdList{ counter-reset:pvrank; }
html.ptv-best .normalpackage_box ul.prdList > li{ counter-increment:pvrank; position:relative; }
html.ptv-best .normalpackage_box ul.prdList > li::before{ content:counter(pvrank); position:absolute; top:10px; left:10px; z-index:6;
  min-width:30px; height:30px; padding:0 7px; background:#111; color:#fff; font-size:15px; font-weight:800;
  display:inline-flex; align-items:center; justify-content:center; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.25); }
</style>
<script>
(function(){
  var BEST_CATE = '';   // ← 카페24 '베스트' 분류번호 입력(만든 뒤). 비우면 베스트 뱃지 안 씀.
  var TABS = [['전체','73'],['패키지','71'],['균열보수','88'],['도장·도색','74'],['페인트','75'],['보강자재','92'],['부자재','84'],['안전용품','63']];
  var p; try{ p = new URLSearchParams(location.search); }catch(e){ p = { get:function(){return null;} }; }
  var cate = p.get('cate_no'); var cur = cate || '73';
  document.documentElement.classList.add('ptv-browse');
  var wrap = document.querySelector('[data-ptv]'); if(wrap){ wrap.hidden=false; wrap.removeAttribute('hidden'); }
  var titleEl = document.querySelector('[data-ptv-title]'); var box = document.querySelector('[data-ptv-tabs]');
  if(BEST_CATE && String(cate)===String(BEST_CATE)){ document.documentElement.classList.add('ptv-best'); if(titleEl) titleEl.textContent='베스트'; if(box) box.style.display='none'; return; }
  if(titleEl) titleEl.textContent='제품 보기';
  if(box){ box.innerHTML = TABS.map(function(t){ var href='/product/list.html?cate_no='+t[1]; var on=(String(cur)===String(t[1])); return '<a class="ptv-tab'+(on?' on':'')+'" href="'+href+'">'+t[0]+'</a>'; }).join(''); }
})();
</script>
