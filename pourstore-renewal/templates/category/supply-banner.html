<!-- ============================================================
  supply-banner — 부자재·안전용품 분류 페이지 상단 배너 조각
  용도: 카페24 상품분류 목록 스킨(product/list.html) '상품 리스트 위'에 이 조각을 넣으면
        부자재/안전용품 분류(cate_no)에서만 배너가 뜨고, 아니면 흔적 없이 사라집니다.
  이미지: Firebase Storage  POUR스토어_리뉴얼/supply/banner.*  (자동 로드, 없으면 미표시)
  ★ 설정: 아래 CATE_NOS 에 배너 띄울 실제 분류번호(cate_no)를 넣으세요. (예: 부자재 84)
  ============================================================ -->
<div data-supply-banner style="display:none;max-width:1200px;margin:0 auto;padding:16px 20px 4px;">
  <img alt="부자재·안전용품 대량 구매 문의" style="width:100%;height:auto;border-radius:12px;display:block;box-shadow:0 6px 20px rgba(0,0,0,.08);">
</div>
<script>
(function(){
  // ★ 배너를 띄울 분류번호(cate_no) — 부자재/안전용품 분류번호를 넣으세요. 여러 개 가능.
  var CATE_NOS = ['84','63'];
  var wrap = document.querySelector('[data-supply-banner]');
  if(!wrap) return;
  var cate = new URLSearchParams(location.search).get('cate_no');
  if(!cate || CATE_NOS.indexOf(String(cate)) === -1){ wrap.remove(); return; }  // 해당 분류 아니면 제거
  var im = wrap.querySelector('img');
  var BASE = 'https://firebasestorage.googleapis.com/v0/b/pour-app-new.firebasestorage.app/o/'
           + encodeURIComponent('POUR스토어_리뉴얼') + '%2F' + encodeURIComponent('supply') + '%2F';
  var cands = ['banner.png','banner.jpg','banner.jpg.png','banner.png.png','banner.jpeg','banner.webp'];
  function tryLoad(k){
    if(k>=cands.length){ wrap.remove(); return; }              // 이미지 없으면 배너 숨김
    im.onerror = function(){ tryLoad(k+1); };
    im.onload  = function(){ wrap.style.display='block'; };
    im.src = BASE + encodeURIComponent(cands[k]) + '?alt=media';
  }
  tryLoad(0);
})();
</script>
