<!-- ============================================================
  pour-quickbtn — 전 페이지 고정 플로팅 퀵버튼 (오른쪽 하단, 원형)
  클릭 → POUR닥터 상담 페이지(/pour-doctor.html)
  설치: 카페24 공통 레이아웃(layout.html) </body> 바로 위에 1회 붙여넣기 → 모든 페이지 노출
  ※ 외부 이미지 의존 없음(인라인 SVG) → 엑박(깨진 이미지) 안 남
  네임스페이스: .pqb (자체 완결, position:fixed)
============================================================ -->
<style>
.pqb-wrap{position:fixed;right:20px;bottom:22px;z-index:9999;display:flex;align-items:center;gap:10px;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
.pqb-wrap,.pqb-wrap *{box-sizing:border-box}
.pqb-label{display:flex;flex-direction:column;background:#fff;border:1px solid #F1E3D3;border-radius:14px;padding:8px 13px;box-shadow:0 6px 20px rgba(15,31,92,.14);line-height:1.25;text-align:right;text-decoration:none;transition:.2s}
.pqb-label .t{font-size:13px;font-weight:800;color:#111;letter-spacing:-0.03em}
.pqb-label .s{font-size:11px;font-weight:600;color:#E8780F;letter-spacing:-0.02em;margin-top:1px}
.pqb-btn{position:relative;width:64px;height:64px;flex-shrink:0;border-radius:50%;background:linear-gradient(135deg,#F79A3C,#E8780F);box-shadow:0 8px 24px rgba(232,120,15,.36);cursor:pointer;text-decoration:none;display:grid;place-items:center;transition:transform .18s ease}
.pqb-btn:hover{transform:translateY(-3px) scale(1.04)}
.pqb-btn::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid #E8780F;animation:pqbPulse 2.2s ease-out infinite}
@keyframes pqbPulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.32);opacity:0}100%{opacity:0}}
.pqb-ico{position:relative;z-index:1;width:32px;height:32px;color:#fff}
.pqb-badge{position:absolute;top:-2px;right:-2px;z-index:2;min-width:19px;height:19px;padding:0 5px;border-radius:10px;background:#EF4444;color:#fff;font-size:10.5px;font-weight:800;display:grid;place-items:center;border:2px solid #fff;line-height:1}
.pqb-dot{position:absolute;left:8px;bottom:6px;z-index:2;width:12px;height:12px;border-radius:50%;background:#10B981;border:2.5px solid #fff}
@media (max-width:700px){
  .pqb-wrap{right:14px;bottom:16px;gap:8px}
  .pqb-label{display:none}
  .pqb-btn{width:56px;height:56px}
  .pqb-ico{width:28px;height:28px}
}
@media (prefers-reduced-motion:reduce){ .pqb-btn::before{animation:none;opacity:0} }
</style>
<div class="pqb-wrap" aria-label="POUR닥터 상담">
  <a class="pqb-label" href="/pour-doctor.html"><span class="t">궁금하면 물어보세요</span><span class="s">POUR닥터 · 1:1 무료상담</span></a>
  <a class="pqb-btn" href="/pour-doctor.html" aria-label="POUR닥터 상담하기">
    <svg class="pqb-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 8.9 8.9 0 0 1-3.6-.8L3 20.5l1.4-4.1A8.4 8.4 0 0 1 3.6 11.5 8.4 8.4 0 0 1 12 3.2a8.4 8.4 0 0 1 9 8.3Z"/><path d="M8.6 11.5h.01M12 11.5h.01M15.4 11.5h.01"/></svg>
    <span class="pqb-dot"></span>
    <span class="pqb-badge">1:1</span>
  </a>
</div>
