<!-- ============================================================
  pour-skin : POUR스토어 전역 브랜드 스킨 (카페24 기본 화면 통일)
  용도: 상품목록·상품상세·장바구니·주문서·마이페이지·게시판 등 카페24 기본 페이지의
        공통 크롬(브레드크럼·페이지 타이틀·버튼·테이블·탭·정렬바·페이징·폼)을
        메인/커스텀 페이지와 같은 톤(Pretendard · 네이비 #0F1F5C · 오렌지 #E8780F)으로 통일.
  삽입: 카페24 스킨 공통 레이아웃(레이아웃 HTML) <head> 안에 한 번만
        import 지시문 한 줄(경로: /pourstore_renewal/common/pour-skin.html) → 전 페이지 자동 적용.
        ※ 여기서는 실제 지시문 기호를 쓰지 않는다. 설명 주석 안에 @import 지시문을 그대로 적으면
          카페24가 이를 진짜 지시문으로 해석해 자기 자신을 import(무한 재귀)하고, 그 여파로 같은
          레이아웃의 다른 지시문(footer 등)이 해석되지 못해 푸터가 사라진다.
  원칙: 카페24 기능/변수/모듈은 절대 건드리지 않음. 색·폰트·라운드·여백만 CSS로 덮음.
        레이아웃(위치/플로트)은 바꾸지 않아 깨질 위험 최소화. 아이콘 폰트는 미대상.
  ============================================================ -->
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable.css');
:root{
  --pour-or:#E8780F; --pour-or2:#EA580C; --pour-or-pale:#FFF3E9; --pour-or-bd:#FBE2C4;
  /* 색 정책: 텍스트=검정 / 포인트=주황 / 애매한 강조=진회색 */
  --pour-navy:#111111; --pour-ink:#111111; --pour-mut:#6B7280; --pour-gray:#4B5563;
  --pour-bd:#EEF0F2; --pour-bd2:#E5E7EB; --pour-bg:#F7F8FA;
  --pour-r:12px; --pour-r-lg:16px;
  --pour-font:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}

/* ===== 0) 전역 타이포 (아이콘 폰트는 자체 font-family를 선언하므로 영향 없음) ===== */
body, input, select, textarea, button,
#contents, #container, .xans-element-,
.path, .path *, .title, .titleArea, .titleArea *,
.ec-base-table, .ec-base-table *, .ec-base-tab, .ec-base-tab *,
.ec-base-help, .ec-base-help *, .ec-base-button, .ec-base-button *,
.ec-base-prdInfo, .ec-base-prdInfo *, .ec-base-paginate, .ec-base-paginate *,
.prdList, .prdList *, .board, .board *, .step, .step *{
  font-family:var(--pour-font) !important;
  letter-spacing:-0.02em;
}
body{ color:var(--pour-ink); }
::selection{ background:var(--pour-or-pale); color:var(--pour-navy); }

/* 링크 hover 강조 */
#contents a:hover{ color:var(--pour-or); }

/* ===== 1) 브레드크럼 (홈 / 패키지 전체) ===== */
.path, .xans-layout-orderdetail .path{ font-size:12.5px !important; color:var(--pour-mut) !important; }
.path ol, .path ul{ display:flex; align-items:center; justify-content:flex-end; gap:2px; flex-wrap:wrap; }
.path a, .path li, .path strong{ color:var(--pour-mut) !important; font-weight:600 !important; }
.path li:last-child, .path strong, .path .step_now{ color:var(--pour-navy) !important; font-weight:800 !important; }
.path a:hover{ color:var(--pour-or) !important; }

/* ===== 2) 페이지 대제목 (패키지 전체 / 장바구니 …) ===== */
#contents h1, #contents .titleArea, #contents .titleArea h2,
.ec-base-title, #contents > h2.title{
  color:var(--pour-navy) !important; font-weight:900 !important; letter-spacing:-0.045em !important;
}
.titleArea{ padding:14px 0 22px !important; }
.titleArea h2{ font-size:30px !important; line-height:1.2 !important; }
.titleArea p{ color:var(--pour-mut) !important; font-size:14px !important; }

/* 소제목/구분 헤딩 (이용안내, 장바구니 이용안내 …) */
#contents h2.title, #contents h3.title, .ec-base-help > h2, .ec-base-help > h3,
.ec-base-desc .title, .boardTitleArea h2{
  color:var(--pour-navy) !important; font-weight:800 !important; font-size:16px !important;
  border-bottom-color:var(--pour-navy) !important;
}

/* ===== 3) 버튼 (텍스트형 클래스 버튼) ===== */
/* 강조/주요 액션: 주문하기·바로구매·결제 → 오렌지 필 */
.btnSubmit, a.btnSubmit, button.btnSubmit, .btnStrong, .btnEm, .btnColor,
.ec-base-button .btnSubmit, #totalProducts .btnSubmit, .btnBuy{
  background:var(--pour-or) !important; border:1px solid var(--pour-or) !important;
  color:#fff !important; border-radius:0!important; font-weight:800 !important;
  box-shadow:none !important; transition:.15s !important;
}
.btnSubmit:hover, .btnStrong:hover, .btnEm:hover, .btnColor:hover, .btnBuy:hover{
  background:#D26A0A !important; border-color:#D26A0A !important; color:#fff !important;
}
/* 보조 액션: 계속쇼핑·수량변경·관심상품 → 아웃라인 */
.btnNormal, a.btnNormal, button.btnNormal, .btnBasic, .btnMore, .btnFix, .btnWhite{
  background:#fff !important; border:1px solid var(--pour-bd2) !important;
  color:var(--pour-ink) !important; border-radius:0!important; font-weight:700 !important;
}
.btnNormal:hover, .btnBasic:hover, .btnMore:hover, .btnWhite:hover{
  border-color:var(--pour-or-bd) !important; color:var(--pour-or) !important; background:var(--pour-or-pale) !important;
}

/* ===== 4) 탭 / 주문 스텝 (1.장바구니 2.주문서작성 3.주문완료 · 국내/해외배송 탭) ===== */
.ec-base-tab .menu li a, .ec-base-tab ul.menu li{ font-weight:700 !important; color:var(--pour-mut) !important; }
.ec-base-tab .menu li.selected a, .ec-base-tab .menu li.selected,
.ec-base-tab .menu li.active a{
  color:var(--pour-navy) !important; border-color:var(--pour-navy) !important; font-weight:800 !important;
}
/* 주문 진행 스텝 */
.ec-base-step, .step{ color:var(--pour-mut) !important; }
.step .on, .step .active, .ec-base-step .on{ color:var(--pour-navy) !important; font-weight:800 !important; }

/* ===== 5) 테이블 (장바구니/주문/마이페이지) ===== */
.ec-base-table{ border-top:2px solid var(--pour-navy) !important; }
.ec-base-table th{ background:var(--pour-bg) !important; color:var(--pour-ink) !important; font-weight:800 !important; border-color:var(--pour-bd) !important; }
.ec-base-table td{ border-color:var(--pour-bd) !important; color:var(--pour-ink) !important; }
.ec-base-table .money, .ec-base-table strong.price, td .price{ color:var(--pour-navy) !important; font-weight:800 !important; }

/* ===== 6) 상품목록 상단 정렬/개수 바 ===== */
.ec-base-prdSort, .prdCount, .xans-product-normalmenu{ color:var(--pour-mut) !important; font-size:13px !important; }
.ec-base-prdSort .count strong, .prdCount strong{ color:var(--pour-navy) !important; font-weight:800 !important; }
.ec-base-prdSort select, .sortList select{ border:1px solid var(--pour-bd2) !important; border-radius:0!important; padding:6px 10px !important; color:var(--pour-ink) !important; }
/* 진열 방식(그리드) 토글 선택 시 오렌지 */
.ec-base-prdSort .btnType a.selected, .displayType a.on{ border-color:var(--pour-or) !important; }

/* ===== 6-B) 상품 목록 그리드 강제(4/3/2열 반응형) =====
   카페24 기본 그리드 CSS가 특정 화면에서 적용 안 돼 상품이 1열로 무너지는 문제 방지.
   진열설정/토글 JS와 무관하게 항상 정렬 보장. (관련상품/최근본상품 위젯은 아래에서 제외) */
.prdList{ display:grid !important; grid-template-columns:repeat(4,minmax(0,1fr)) !important; gap:26px 18px !important; float:none !important; margin:0 !important; padding:0 !important; list-style:none !important; }
.prdList > li{ width:auto !important; min-width:0 !important; float:none !important; margin:0 !important; }
@media (max-width:1024px){ .prdList{ grid-template-columns:repeat(3,minmax(0,1fr)) !important; } }
@media (max-width:767px){ .prdList{ grid-template-columns:repeat(2,minmax(0,1fr)) !important; gap:18px 12px !important; } }
/* 가로 스크롤 위젯(관련상품·최근본상품·메인진열)은 강제 그리드에서 제외 → 카페24 원래 배치 유지 */
.xans-product-relation .prdList, .xans-product-recent .prdList,
.xans-product-listmain .prdList, .xans-product-listrecommend .prdList,
.xans-product-addproduct .prdList, .ec-base-prdList.horizon .prdList{
  display:block !important; grid-template-columns:none !important;
}

/* ===== 6-C) 전(全) 상품카드 통일 (자사몰 어디서나 동일 룩) =====
   메인 진열·분류 목록·검색결과·추천/신상품/베스트·관련상품·최근본상품 등
   카페24 '모든' 상품 모듈의 카드를 하나의 룩으로 통일.
   기준: /pourstore_renewal/cafe24-skin/list_product.html 의 .pour-card 와 동일한 무신사식 클린 카드.
   원칙: 카페24 기능/변수/모듈(장바구니·옵션·품절·찜·가격계산)은 절대 무변경. 색·라운드·타이포·간격만 덮음.
        ★ 모든 모서리 라운드 = 0 (요청: 둥근효과 0%). 카드 내부 항목은 카페24 '진열항목 설정'에서 켠 만큼 최대 노출. */
/* (1) 카드 컨테이너 — 테두리/그림자 제거, 라운드 0, hover 살짝 떠오름 */
.prdList > li,
.xans-product-listmain li, .xans-product-listnormal li, .xans-product-listmore li,
.xans-product-listrecommend li, .xans-product-listnew li, .xans-product-listrank li,
.xans-product-relation li, .xans-product-recent li, .xans-product-additional li,
.ec-base-product li.item, .ec-product-item{
  background:#fff !important; border:0 !important; border-radius:0 !important;
  box-shadow:none !important; overflow:hidden; transition:transform .15s ease;
}
.prdList > li:hover{ transform:translateY(-2px); }
/* (2) 썸네일 — 1:1 정사각, 라운드 0, 이미지 꽉 채움 */
.prdList .thumbnail, .prdList .prdImg, .prdList .box, .prdList .thumb{
  margin:0 !important; border:0 !important; border-radius:0 !important; background:transparent !important;
}
.prdList .thumbnail > a, .prdList .prdImg .image-container, .prdList .prdImg > a, .prdList .box > a, .prdList .thumb > a{
  display:block; position:relative; overflow:hidden; background:#F5F6F8; aspect-ratio:1/1; border-radius:0 !important;
}
.prdList .thumbnail img, .prdList .prdImg img, .prdList .box img, .prdList .thumb img{
  border-radius:0 !important;
}
.prdList .prdImg .image-container img.default, .prdList .prdImg .image-container img.hover{
  width:100% !important; height:100% !important; object-fit:cover;
}
.prdList > li:hover .thumbnail img, .prdList > li:hover .prdImg img, .prdList > li:hover .image-container{ opacity:.94; }
/* (3) 배지·아이콘·오버레이 라운드 제거 (품절/찜/신상품/할인 배지) */
.prdList .sold, .prdList .soldOut, .prdList .wish, .prdList .icon img,
.prdList .prdIcon, .prdList .promotion img, .prdList .flag, .prdList .flagList span,
.prdList .flagList li, .prdList .newBadge, .prdList .discountBadge{
  border-radius:0 !important;
}
/* (4) 설명영역 — 좌측정렬, 이미지 라인에 맞춤 */
.prdList .description{ padding:12px 2px 4px !important; text-align:left !important; border:0 !important; background:transparent !important; margin:0 !important; }
/* (5) 상품명 — 검정, 두 줄, 상단 브랜드/타이틀 라인은 진회색 볼드 */
.prdList .description .name, .prdList .description .name a{
  display:block; font-size:13.5px !important; font-weight:500 !important; color:#111 !important;
  line-height:1.46 !important; text-decoration:none !important; margin:0 !important;
}
.prdList .description .name .title{
  display:block; font-size:12px !important; font-weight:800 !important; color:#4B5563 !important; margin-bottom:3px !important;
}
/* (6) 요약/간략설명 — 카페24 진열항목 '상품요약설명'을 켜면 이름 아래 회색 한 줄 노출 */
.prdList .description .summary, .prdList .description .prdShortDesc, .prdList .description .simpleDesc{
  display:block; font-size:12px !important; color:#6B7280 !important; margin-top:3px !important; line-height:1.5 !important; font-weight:500 !important;
}
/* (7) 가격/스펙 — 판매가 검정 볼드 / 정가(취소선) 회색 / 할인가·할인율 오렌지 포인트 */
.prdList .description .spec{ margin:9px 0 0 !important; padding:0 !important; }
.prdList .description .spec > li{
  font-size:15px !important; font-weight:800 !important; color:#111 !important;
  line-height:1.35 !important; padding:1px 0 !important; border:0 !important; background:none !important;
}
.prdList .description .spec .title{ font-size:11.5px !important; font-weight:600 !important; color:#9CA3AF !important; }
.prdList .description del, .prdList .description .custom, .prdList .description .price_del, .prdList .description strike{
  color:#9CA3AF !important; font-weight:500 !important; text-decoration:line-through !important;
}
.prdList .description .sale, .prdList .description em.sale, .prdList .description .discount,
.prdList .description .discountRate, .prdList .description .txtEm, .prdList .description em.emphasis{
  color:#E8780F !important; font-weight:800 !important;
}
/* (8) 적립금/혜택 — 진열항목 '적립금' 켜면 작은 회색 글씨 */
.prdList .description .mileage, .prdList .description .reserve, .prdList .description .benefit,
.prdList .description .accumulation{ font-size:11.5px !important; color:#6B7280 !important; font-weight:600 !important; }
/* (9) 카페24 아이콘줄(신상품/추천/품절 등) — 이름/가격 아래 정렬 */
.prdList .description .promotion, .prdList .promotion{
  margin-top:8px !important; display:flex; flex-wrap:wrap; align-items:center; gap:4px;
}
.prdList .promotion img{ vertical-align:middle; }

/* ===== 7) 페이징 ===== */
.ec-base-paginate a, .xans-product-normalpaging a{ border:1px solid var(--pour-bd2) !important; border-radius:0!important; color:var(--pour-ink) !important; font-weight:700 !important; }
.ec-base-paginate a:hover{ border-color:var(--pour-or-bd) !important; color:var(--pour-or) !important; }
.ec-base-paginate .this, .ec-base-paginate strong.this, .xans-product-normalpaging .this{
  background:var(--pour-navy) !important; border-color:var(--pour-navy) !important; color:#fff !important; border-radius:0!important;
}

/* ===== 8) 폼 인풋 포커스 ===== */
#contents input[type=text], #contents input[type=password], #contents input[type=tel],
#contents input[type=email], #contents input[type=number], #contents input[type=search],
#contents select, #contents textarea{
  border:1px solid var(--pour-bd2) !important; border-radius:0!important; color:var(--pour-ink) !important;
}
#contents input:focus, #contents select:focus, #contents textarea:focus{
  border-color:var(--pour-or) !important; outline:none !important; box-shadow:0 0 0 3px rgba(232,120,15,.12) !important;
}

/* ===== 9) 빈 상태 / 안내 박스 (장바구니가 비어 있습니다 등) ===== */
.ec-base-noData, .ec-base-prdInfo .empty, .cartEmpty{ color:var(--pour-mut) !important; }
.ec-base-help ul li, .ec-base-desc li{ color:var(--pour-mut) !important; line-height:1.7 !important; }
.ec-base-desc, .ec-base-help.typeType{ border-radius:0!important; }

/* ===== 10) 가격/강조 텍스트 통일 ===== */
#contents .price, #contents strong.price, .description .spec > li{ color:var(--pour-navy) !important; }
#contents em.emphasis, #contents .txtEm, .discount{ color:var(--pour-or2) !important; }

/* ===== 12) 검색결과 페이지 정리 — 중간 '상품검색' 제목 + 카페24 기본 검색폼 숨김
   (검색어는 상단 공용 헤더 검색바에 표시됨) ===== */
.xans-product-searchdata{ display:none !important; }
body:has(.xans-product-searchdata) .titleArea{ display:none !important; }

/* ===== 11) 반응형 (모바일) ===== */
@media (max-width:767px){
  .titleArea h2{ font-size:22px !important; }
  #contents h2.title, #contents h3.title{ font-size:15px !important; }
  .btnSubmit, .btnStrong, .btnNormal, .btnBasic{ border-radius:0!important; }
}
</style>


<!-- ============================================================
  전 페이지 실시간 채팅(POUR닥터) — 레이아웃을 건드리지 않도록 여기(pour-skin, 전 페이지 로드)에 포함.
  원본 관리본: common/pour-quickbtn.html (중복 로드 방지 가드 내장)
============================================================ -->
<!-- ============================================================
  pour-livechat — 오른쪽 하단 고정 실시간 채팅 (채널톡식)
  버튼 클릭 → 접수 폼 없이 바로 채팅창 오픈 → 입력하면 그때 상담 생성
  설치: 모든 페이지에 뜨게 하려면 공통 레이아웃 </body> 바로 위에 1회
  전역 함수: window.pourDoctorOpen() — 다른 배너/버튼에서도 열 수 있음
============================================================ -->
<style>
.pqc-launcher{position:fixed;right:20px;bottom:22px;z-index:9999;display:flex;align-items:center;gap:10px;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
.pqc-launcher,.pqc-launcher *{box-sizing:border-box}
.pqc-lbl{display:flex;flex-direction:column;background:#fff;border:1px solid #F1E3D3;border-radius:14px;padding:8px 13px;box-shadow:0 6px 20px rgba(15,31,92,.14);line-height:1.25;text-align:right;cursor:pointer}
.pqc-lbl .t{font-size:13px;font-weight:800;color:#111;letter-spacing:-0.03em}
.pqc-lbl .s{font-size:11px;font-weight:600;color:#E8780F;letter-spacing:-0.02em;margin-top:1px}
.pqc-fab{position:relative;width:64px;height:64px;flex-shrink:0;border-radius:50%;background:#fff;box-shadow:0 0 0 3px #E8780F,0 8px 24px rgba(232,120,15,.36);cursor:pointer;display:block;transition:transform .18s ease}

.pqc-ico{position:relative;z-index:1;width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:center;display:block}

.pqc-dot{position:absolute;right:3px;bottom:3px;z-index:3;width:14px;height:14px;border-radius:50%;background:#10B981;border:2.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}

  .pqc-inbar textarea,.pqc-notify-in{font-size:16px}
}

<script>
(function(){
  // 🧹 옛날 위젯(pqb/pdlg) 잔재가 다른 섹션/레이아웃에 남아있으면 제거 — 중복·옛날 폼 노출 방지
  try{ document.querySelectorAll('.pqb-wrap, .pdlg-ov, [data-pdlg]').forEach(function(n){ n.remove(); }); }catch(e){}
  // 🔒 중복 로드 방지: 한 페이지에 위젯이 2번 포함돼도(예: 레이아웃+스킨) 딱 1개만 동작
  if(window.__pourDoctorBooted){
    try{ ['.pqc-launcher','.pqc-panel'].forEach(function(sel){ var e=document.querySelectorAll(sel); if(e.length>1) e[e.length-1].remove(); }); }catch(_e){}
    return;
  }
  window.__pourDoctorBooted=true;
  var LS_KEY='pourdoctor_tid';
  var launcher=document.querySelector('[data-pqc-launcher]');
  var panel=document.querySelector('[data-pqc-panel]'); if(!panel) return;
  var badgeEl=document.querySelector('[data-pqc-badge]');
  var labelT=document.querySelector('[data-pqc-lt]');
  var logEl=panel.querySelector('[data-pqc-log]');
  var pendingBox=panel.querySelector('[data-pqc-pending]');
  var fileEl=panel.querySelector('[data-pqc-file]');
  var msgEl=panel.querySelector('[data-pqc-msg]');
  var sendBtn=panel.querySelector('[data-pqc-send]');

  var chatFiles=[];
  var threadId=null; try{ threadId=localStorage.getItem(LS_KEY)||null; }catch(e){}
  var latest=null, renderedKey='', unsub=null, chatOpen=false, reNotify=false;

  var GREETING='안녕하세요, POUR닥터예요.\n건물·방수 고민을 편하게 남겨주세요.\n사진도 함께 보내주시면 더 정확히 도와드려요.';
  var PROFILE='https://firebasestorage.googleapis.com/v0/b/pour-app-new.firebasestorage.app/o/%EB%A7%88%EC%8A%A4%EC%BD%94%ED%8A%B8%2Fbeaver_consulting_profile_circle.png?alt=media&token=6574671f-7f7d-4cac-a504-7e5f3b946f25';

  // 보낸 시각 → '오후 5:29'
  function fmtTime(ts){ try{ var d=new Date(ts); if(isNaN(d)) return ''; var h=d.getHours(), m=d.getMinutes(); var ap=h<12?'오전':'오후'; var hh=h%12; if(hh===0) hh=12; return ap+' '+hh+':'+(m<10?'0'+m:m); }catch(e){ return ''; } }
  // 고객이 탭해서 바로 물어볼 수 있는 시작 질문(원하면 여기 문구만 수정)
  var STARTERS=[
    '옥상 방수, 어떻게 시작하면 되나요?',
    '누수·균열엔 어떤 자재를 써야 하나요?',
    '셀프시공도 가능한가요?',
    '지금 진행 중인 이벤트·혜택 있나요?'
  ];

  // 링크 자동 인식(클릭 가능) + 안전하게 텍스트노드로 삽입
  function appendText(el, text){
    var re=/(https?:\/\/[^\s]+)/g, last=0, m;
    while((m=re.exec(text))){
      if(m.index>last) el.appendChild(document.createTextNode(text.slice(last,m.index)));
      var a=document.createElement('a'); a.href=m[0]; a.target='_blank'; a.rel='noopener'; a.textContent=m[0];
      el.appendChild(a); last=m.index+m[0].length;
    }
    if(last<text.length) el.appendChild(document.createTextNode(text.slice(last)));
  }
  // 상품·가이드 링크에 UTM 자동 삽입(챗봇 유입/전환을 GA가 인식하게)
  function withUtm(url, label){
    try{ var u=new URL(url);
      if(!u.searchParams.get('utm_source')){
        u.searchParams.set('utm_source','pourdoctor');
        u.searchParams.set('utm_medium','chat');
        u.searchParams.set('utm_campaign','pourdoctor_chat');
        if(label) u.searchParams.set('utm_content', String(label).slice(0,60));
        if(threadId) u.searchParams.set('utm_term', threadId);
      }
      return u.toString();
    }catch(e){ return url; }
  }
  function linkChip(label, url){
    var a=document.createElement('a'); a.className='pqc-link'; a.href=withUtm(url,label);
    a.target='_blank'; a.rel='noopener'; a.textContent=label; return a;
  }
  // **굵게** + 원시 URL 링크
  function boldRich(el, text){
    String(text).split(/(\*\*[^*]+\*\*)/).forEach(function(seg){
      if(/^\*\*[^*]+\*\*$/.test(seg)){ var b=document.createElement('strong'); appendText(b, seg.slice(2,-2)); el.appendChild(b); }
      else if(seg) appendText(el, seg);
    });
  }
  // 인라인: [라벨](URL) 축약 링크 → 칩 · 그 외엔 굵게/URL 처리
  var MDLINK=/\[([^\]\n]+)\]\((https?:\/\/[^)\s]+)\)/g;
  function inlineRich(el, text){
    var s=String(text), last=0, m; MDLINK.lastIndex=0;
    while((m=MDLINK.exec(s))){
      if(m.index>last) boldRich(el, s.slice(last,m.index));
      el.appendChild(linkChip(m[1], m[2]));
      last=m.index+m[0].length;
    }
    if(last<s.length) boldRich(el, s.slice(last));
  }
  // 블록: 줄바꿈·불릿(•,-)·굵게 렌더 (상담원/AI 답변용)
  function renderRich(container, text){
    var ul=null;
    String(text).split('\n').forEach(function(line){
      if(/^\s*[•\-]\s+/.test(line)){
        if(!ul){ ul=document.createElement('ul'); ul.className='pqc-ul'; container.appendChild(ul); }
        var li=document.createElement('li'); inlineRich(li, line.replace(/^\s*[•\-]\s+/,'')); ul.appendChild(li);
      } else {
        ul=null; var p=document.createElement('div'); p.className='pqc-p'; inlineRich(p, line); container.appendChild(p);
      }
    });
  }

  function setUnread(n){
    if(!launcher) return;
    if(n>0){ launcher.classList.add('pqc-unread'); if(badgeEl) badgeEl.textContent=String(n); if(labelT) labelT.textContent='상담원 답변이 도착했어요'; }
    else{ launcher.classList.remove('pqc-unread'); if(labelT) labelT.textContent='궁금하면 물어보세요'; }
  }
  // 📱 모바일: 키보드가 뜨면 visualViewport 높이만큼 패널을 줄여 입력창이 키보드 위에 오게 함
  function isMobile(){ return window.innerWidth<=640; }
  function fitViewport(){
    if(!panel.classList.contains('on') || !isMobile()){ panel.style.height=''; panel.style.top=''; return; }
    var vv=window.visualViewport;
    if(vv){ panel.style.height=vv.height+'px'; panel.style.top=vv.offsetTop+'px'; }
    if(chatOpen) logEl.scrollTop=logEl.scrollHeight;
  }
  if(window.visualViewport){ window.visualViewport.addEventListener('resize',fitViewport); window.visualViewport.addEventListener('scroll',fitViewport); }
  window.addEventListener('resize',fitViewport);
  window.addEventListener('orientationchange',function(){ setTimeout(fitViewport,300); });

  function open(){
    panel.classList.add('on'); if(launcher) launcher.classList.add('pqc-open');
    chatOpen=true; setUnread(0); renderLog();
    if(isMobile()) document.documentElement.style.overflow='hidden';   // 뒤 페이지 스크롤/비침 방지
    fitViewport();
    if(threadId) subscribe().catch(function(){});
    setTimeout(function(){ try{ msgEl.focus(); }catch(e){} fitViewport(); logEl.scrollTop=logEl.scrollHeight; },60);
  }
  function close(){
    panel.classList.remove('on'); if(launcher) launcher.classList.remove('pqc-open'); chatOpen=false;
    document.documentElement.style.overflow=''; panel.style.height=''; panel.style.top='';
  }
  window.pourDoctorOpen=open;
  // 새 버튼(data-pqc-open) + 옛날 CTA 버튼(data-pqb-open) 모두 새 채팅창을 열도록 연결
  document.querySelectorAll('[data-pqc-open],[data-pqb-open]').forEach(function(b){ b.addEventListener('click',function(e){ e.preventDefault(); open(); }); });
  panel.querySelectorAll('[data-pqc-close]').forEach(function(b){ b.addEventListener('click',close); });

  // ── Firebase 지연 로드 ──
  var fb=null;
  async function ensureFb(){
    if(fb) return fb;
    var a=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    var fs=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    var st=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
    var cfg={apiKey:"AIzaSyDAQLBECvSDHqG2ciC7MM0MADdEYLrSyZ0",authDomain:"pourstorecrm.firebaseapp.com",projectId:"pourstorecrm",storageBucket:"pourstorecrm.firebasestorage.app",messagingSenderId:"814387236246",appId:"1:814387236246:web:a17bec34f3c992007aa1b7"};
    var app=a.getApps().some(function(x){return x.name==='pourdoctor';})?a.getApp('pourdoctor'):a.initializeApp(cfg,'pourdoctor');
    fb={db:fs.getFirestore(app),storage:st.getStorage(app),collection:fs.collection,addDoc:fs.addDoc,doc:fs.doc,updateDoc:fs.updateDoc,onSnapshot:fs.onSnapshot,ref:st.ref,uploadBytes:st.uploadBytes,getDownloadURL:st.getDownloadURL};
    return fb;
  }
  async function uploadFiles(F,list){
    var folder='w-'+Date.now()+'-'+Math.random().toString(36).slice(2,8), urls=[];
    for(var i=0;i<list.length;i++){
      var f=list[i], ext=((f.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,''))||'jpg';
      var r=F.ref(F.storage,'chatbot_uploads/'+folder+'/'+(i+1)+'.'+ext);
      await F.uploadBytes(r,f,{contentType:f.type}); urls.push(await F.getDownloadURL(r));
    }
    return urls;
  }

  var FB_THX_UP='소중한 의견 감사해요 :)', FB_THX_DN='의견 감사해요. 더 정확히 도와드릴게요';
  function setFb(k,v,up,dn,thx){ try{ localStorage.setItem('pqc_fb_'+k, v); }catch(e){} up.classList.toggle('on',v==='up'); dn.classList.toggle('on',v==='down'); if(thx){ thx.textContent = v==='up' ? FB_THX_UP : FB_THX_DN; } }
  function bubble(mine,content,images,options,answered,ts,fbKey){
    var row=document.createElement('div'); row.className='pqc-row '+(mine?'me':'them');
    if(!mine){ var av=document.createElement('img'); av.className='pqc-av'; av.src=PROFILE; av.alt='POUR닥터'; av.onerror=function(){ this.style.visibility='hidden'; }; row.appendChild(av); }
    var cell=document.createElement('div'); cell.className='pqc-cell';
    if(!mine){ var w=document.createElement('div'); w.className='pqc-who'; w.textContent='POUR닥터'; cell.appendChild(w); }
    if(content){ var b=document.createElement('div'); b.className='pqc-msg'; if(mine) appendText(b,content); else renderRich(b,content); cell.appendChild(b); }
    if(images&&images.length){
      var box=document.createElement('div'); box.className='pqc-imgs'; box.style.justifyContent=mine?'flex-end':'flex-start';
      images.forEach(function(u){ var a=document.createElement('a'); a.href=u; a.target='_blank'; a.rel='noopener'; var im=document.createElement('img'); im.src=u; a.appendChild(im); box.appendChild(a); });
      cell.appendChild(box);
    }
    if(options&&options.length&&!answered){
      var oh=document.createElement('div'); oh.className='pqc-opthead'; oh.textContent='이어서 물어보세요'; cell.appendChild(oh);
      var op=document.createElement('div'); op.className='pqc-opts';
      options.forEach(function(o){ var btn=document.createElement('button'); btn.type='button'; btn.className='pqc-opt'; btn.textContent=o; btn.addEventListener('click',function(){ doSend(o,[]); }); op.appendChild(btn); });
      cell.appendChild(op);
    }
    if(ts){ var t=document.createElement('div'); t.className='pqc-time'; t.textContent=fmtTime(ts); if(t.textContent) cell.appendChild(t); }
    if(fbKey){
      var fbBox=document.createElement('div'); fbBox.className='pqc-fb';
      var THUMB='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10.5V21H4.5A1.5 1.5 0 0 1 3 19.5v-7.5A1.5 1.5 0 0 1 4.5 10.5H7z"/><path d="M7 10.5l4.2-7.2a1.8 1.8 0 0 1 3.3 1.3L13.6 9h5.1a2 2 0 0 1 2 2.4l-1.3 7A2 2 0 0 1 17.4 20H7"/></svg>';
      var up=document.createElement('button'); up.type='button'; up.innerHTML=THUMB; up.title='도움이 됐어요';
      var dn=document.createElement('button'); dn.type='button'; dn.innerHTML=THUMB; dn.title='아쉬워요'; dn.style.transform='rotate(180deg)';
      var thx=document.createElement('span'); thx.className='pqc-fb-thx';
      var cur=''; try{ cur=localStorage.getItem('pqc_fb_'+fbKey)||''; }catch(e){}
      if(cur==='up'){ up.classList.add('on'); thx.textContent=FB_THX_UP; }
      if(cur==='down'){ dn.classList.add('on'); thx.textContent=FB_THX_DN; }
      up.addEventListener('click',function(){ setFb(fbKey,'up',up,dn,thx); }); dn.addEventListener('click',function(){ setFb(fbKey,'down',up,dn,thx); });
      fbBox.appendChild(up); fbBox.appendChild(dn); fbBox.appendChild(thx); cell.appendChild(fbBox);
    }
    row.appendChild(cell); logEl.appendChild(row);
  }
  function typingRow(){
    var row=document.createElement('div'); row.className='pqc-row them';
    var av=document.createElement('img'); av.className='pqc-av'; av.src=PROFILE; av.onerror=function(){ this.style.visibility='hidden'; }; row.appendChild(av);
    var cell=document.createElement('div'); cell.className='pqc-cell';
    var w=document.createElement('div'); w.className='pqc-who'; w.textContent='POUR닥터'; cell.appendChild(w);
    var tp=document.createElement('div'); tp.className='pqc-typing';
    var tx=document.createElement('span'); tx.className='pqc-typing-t'; tx.textContent='상담원 배정 중이에요'; tp.appendChild(tx);
    tp.appendChild(document.createElement('i')); tp.appendChild(document.createElement('i')); tp.appendChild(document.createElement('i')); cell.appendChild(tp);
    row.appendChild(cell); logEl.appendChild(row);
  }
  // 문자 알림 받기 카드
  function notifyCard(){
    var wrap=document.createElement('div'); wrap.className='pqc-notify';
    var t=document.createElement('div'); t.className='pqc-notify-t'; t.textContent='답변을 문자로 받아보시겠어요?'; wrap.appendChild(t);
    var d=document.createElement('div'); d.className='pqc-notify-d'; d.textContent='자리를 비우셔도 상담원 답변이 오면 문자로 알려드려요.'; wrap.appendChild(d);
    var nm=document.createElement('input'); nm.className='pqc-notify-in'; nm.placeholder='성함'; nm.maxLength=20; wrap.appendChild(nm);
    var ph=document.createElement('input'); ph.className='pqc-notify-in'; ph.placeholder='휴대폰 번호 (010-0000-0000)'; ph.inputMode='numeric'; wrap.appendChild(ph);
    var btn=document.createElement('button'); btn.type='button'; btn.className='pqc-notify-btn'; btn.textContent='문자 알림 신청';
    btn.addEventListener('click',function(){ submitContact(nm.value, ph.value, btn); });
    wrap.appendChild(btn);
    logEl.appendChild(wrap);
  }
  async function submitContact(name, phone, btn){
    var nm=(name||'').trim(); var digits=(phone||'').replace(/\D/g,'');
    if(!nm){ alert('성함을 입력해주세요.'); return; }
    if(digits.length<9||digits.length>11){ alert('휴대폰 번호를 정확히 입력해주세요.'); return; }
    if(!threadId||!latest){ return; }
    btn.disabled=true; btn.textContent='신청 중…';
    try{
      var F=await ensureFb();
      var now=new Date().toISOString();
      var msg={role:'customer',content:'문자 알림 신청 · '+nm+' · '+phone.trim(),ts:now};
      var msgs=((latest&&latest.messages)||[]).concat([msg]);
      await F.updateDoc(F.doc(F.db,'pour_chatbot_threads',threadId),{ messages:msgs, customerName:nm, customerContact:phone.trim(), unread:true, updatedAt:now });
      reNotify=false;
    }catch(e){ console.error('[POUR닥터] 알림신청 실패:',e); alert('신청 중 오류가 났어요. 잠시 후 다시 시도해주세요.'); btn.disabled=false; btn.textContent='문자 알림 신청'; }
  }
  function renderLog(){
    var msgs=(latest&&latest.messages)||[];
    var key=msgs.length+'|'+(latest?latest.updatedAt:'')+'|'+chatOpen;
    if(key===renderedKey) return; renderedKey=key;
    logEl.innerHTML='';
    var s=document.createElement('div'); s.className='pqc-sys'; s.textContent='POUR닥터가 확인 후 답변드려요'; logEl.appendChild(s);
    bubble(false,GREETING,null,null,true,null,null);
    // 대화 시작 전: 시작 질문칩
    if(!threadId || !msgs.length){
      var st=document.createElement('div'); st.className='pqc-starters';
      STARTERS.forEach(function(q){ var b=document.createElement('button'); b.type='button'; b.className='pqc-starter'; b.textContent=q; b.addEventListener('click',function(){ doSend(q,[]); }); st.appendChild(b); });
      logEl.appendChild(st);
    }
    var lastAgent=-1; for(var k=0;k<msgs.length;k++){ if(msgs[k].role==='agent') lastAgent=k; }
    var answered=lastAgent>=0 && lastAgent<msgs.length-1;
    msgs.forEach(function(m,idx){
      var isLastAgent=(m.role==='agent'&&idx===lastAgent);
      bubble(m.role==='customer', m.content, m.images, isLastAgent?m.options:null, answered, m.ts, isLastAgent?(threadId+'_'+idx):null);
    });
    if(latest && latest.status==='done'){
      // 상담완료 → 완료 안내(고객이 다시 남기면 doSend가 status를 active로 되돌려 재시작)
      var done=document.createElement('div'); done.className='pqc-done';
      done.textContent='상담이 완료되었어요.\n이용해 주셔서 감사합니다.\n추가로 궁금하시면 아래에 메시지를 남겨주세요 — 다시 도와드릴게요!';
      logEl.appendChild(done);
    } else if(threadId && msgs.length && msgs[msgs.length-1].role==='customer'){
      // 답변 대기중(마지막이 고객 발화) → '상담원 배정 중' + 문자 알림받기
      typingRow();
      if(latest && latest.customerContact && !reNotify){
        var ok=document.createElement('div'); ok.className='pqc-notify-ok';
        var okt=document.createElement('span'); okt.textContent='문자 알림 신청됨 — 답변 오면 문자로 알려드려요. '; ok.appendChild(okt);
        var re=document.createElement('button'); re.type='button'; re.className='pqc-renotify'; re.textContent='번호 변경/재신청';
        re.addEventListener('click',function(){ reNotify=true; renderedKey=''; renderLog(); });
        ok.appendChild(re); logEl.appendChild(ok);
      } else {
        notifyCard();
      }
    }
    logEl.scrollTop=logEl.scrollHeight;
  }

  function renderPending(){
    pendingBox.innerHTML=''; pendingBox.hidden=chatFiles.length===0;
    chatFiles.forEach(function(f,i){
      var d=document.createElement('div'); d.className='pt';
      var im=document.createElement('img'); im.src=URL.createObjectURL(f); d.appendChild(im);
      var del=document.createElement('button'); del.type='button'; del.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
      del.addEventListener('click',function(){ chatFiles.splice(i,1); renderPending(); });
      d.appendChild(del); pendingBox.appendChild(d);
    });
  }
  fileEl.addEventListener('change',function(){ for(var i=0;i<fileEl.files.length;i++){ var f=fileEl.files[i]; if(chatFiles.length<5&&f.type.indexOf('image/')===0) chatFiles.push(f); } fileEl.value=''; renderPending(); updateSend(); });

  async function subscribe(){
    var F=await ensureFb();
    if(unsub){ try{ unsub(); }catch(e){} unsub=null; }
    if(!threadId) return;
    unsub=F.onSnapshot(F.doc(F.db,'pour_chatbot_threads',threadId),function(snap){
      if(!snap.exists()){ try{ localStorage.removeItem(LS_KEY); }catch(e){} threadId=null; latest=null; setUnread(0); renderedKey=''; if(chatOpen) renderLog(); return; }
      latest=snap.data();
      var msgs=latest.messages||[];
      var trailing=0; for(var i=msgs.length-1;i>=0;i--){ if(msgs[i].role==='agent') trailing++; else break; }
      if(chatOpen) renderLog(); else setUnread(trailing);
    },function(err){ console.error('[POUR닥터] 구독 오류:',err); });
  }

  async function doSend(text,extra){
    var content=(text||'').trim();
    var useFiles=extra||chatFiles;
    if(!content&&!useFiles.length) return;
    sendBtn.disabled=true; msgEl.disabled=true;
    try{
      var F=await ensureFb();
      var urls=useFiles.length?await uploadFiles(F,useFiles):[];
      var now=new Date().toISOString();
      var msg={role:'customer',content:content,ts:now}; if(urls.length) msg.images=urls;
      if(!threadId){
        var refDoc=await F.addDoc(F.collection(F.db,'pour_chatbot_threads'),{
          audience:'b2c', botId:'', botName:'', channel:'widget', source:'cafe24', customerName:'',
          customerContact:'', status:'waiting', unread:true, aiDraft:'',
          messages:[msg], createdAt:now, updatedAt:now
        });
        threadId=refDoc.id; try{ localStorage.setItem(LS_KEY,threadId); }catch(e){}
        await subscribe();
      }else{
        var msgs=((latest&&latest.messages)||[]).concat([msg]);
        var patch={messages:msgs,unread:true,updatedAt:now};
        if(latest&&latest.status==='done') patch.status='active';
        await F.updateDoc(F.doc(F.db,'pour_chatbot_threads',threadId),patch);
      }
      msgEl.value=''; msgEl.style.height='auto';
      if(useFiles===chatFiles){ chatFiles=[]; renderPending(); }
    }catch(e){
      console.error('[POUR닥터] 전송 실패:',e);
      alert('전송 중 오류가 났어요. 잠시 후 다시 시도해주세요.');
    }
    msgEl.disabled=false; updateSend(); try{ msgEl.focus(); }catch(e){}
  }
  function updateSend(){ sendBtn.disabled=!(msgEl.value.trim()||chatFiles.length); }
  sendBtn.addEventListener('click',function(){ doSend(msgEl.value,null); });
  msgEl.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); doSend(msgEl.value,null); } });
  msgEl.addEventListener('input',function(){ msgEl.style.height='auto'; msgEl.style.height=Math.min(msgEl.scrollHeight,96)+'px'; updateSend(); });
  msgEl.addEventListener('focus',function(){ setTimeout(function(){ logEl.scrollTop=logEl.scrollHeight; },120); });
  updateSend();

  // 📨 문자 링크(상담코드 ?pdc=)로 들어온 경우: 다른 기기·브라우저여도 그 상담을 그대로 이어서 표시
  (function(){
    var code=null; try{ code=(new URLSearchParams(location.search).get('pdc')||'').trim(); }catch(e){}
    if(code){
      threadId=code; try{ localStorage.setItem(LS_KEY,threadId); }catch(e){}
      try{ history.replaceState(null,'',location.pathname+location.hash); }catch(e){} // 주소창에서 코드 숨김
      renderedKey=''; open();   // 링크로 왔으니 채팅창 자동 오픈(open이 해당 상담 구독)
      return;
    }
    if(threadId) subscribe().catch(function(){}); // 답변 도착하면 배지
  })();
})();
</script>
