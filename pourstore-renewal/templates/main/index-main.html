<style>
.pqc-launcher{position:fixed;right:20px;bottom:22px;z-index:9999;display:flex;align-items:center;gap:10px;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}

.pqc-lbl{display:flex;flex-direction:column;background:#fff;border:1px solid #F1E3D3;border-radius:14px;padding:8px 13px;box-shadow:0 6px 20px rgba(15,31,92,.14);line-height:1.25;text-align:right;cursor:pointer}
.pqc-lbl .t{font-size:13px;font-weight:800;color:#111;letter-spacing:-0.03em}
.pqc-lbl .s{font-size:11px;font-weight:600;color:#E8780F;letter-spacing:-0.02em;margin-top:1px}
.pqc-fab{position:relative;width:64px;height:64px;flex-shrink:0;border-radius:50%;background:#fff;box-shadow:0 0 0 3px #E8780F,0 8px 24px rgba(232,120,15,.36);cursor:pointer;display:block;transition:transform .18s ease}

.pqc-fab::before{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 3px #E8780F;animation:pqcPulse 2.2s ease-out infinite;pointer-events:none}
@keyframes pqcPulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.32);opacity:0}100%{opacity:0}}
.pqc-ico{position:relative;z-index:1;width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:center;display:block}
.pqc-badge{position:absolute;top:-2px;right:-2px;z-index:2;min-width:19px;height:19px;padding:0 5px;border-radius:10px;background:#EF4444;color:#fff;font-size:10.5px;font-weight:800;display:none;place-items:center;border:2px solid #fff;line-height:1}
.pqc-launcher.pqc-unread .pqc-badge{display:grid;animation:pqcBadge 1.4s ease-in-out infinite}
.pqc-launcher.pqc-unread .pqc-lbl .t{color:#E8780F}
@keyframes pqcBadge{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
.pqc-dot{position:absolute;right:3px;bottom:3px;z-index:3;width:14px;height:14px;border-radius:50%;background:#10B981;border:2.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}

/* 도킹된 채팅 패널 (오른쪽 하단) */

.pqc-head .nm{font-size:15.5px;font-weight:900;line-height:1.2}

.pqc-inbar{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;border-top:1px solid #EEF0F2;background:#fff;flex-shrink:0}
.pqc-attach{flex-shrink:0;min-width:44px;padding:4px 7px;border-radius:11px;border:1.5px solid #F2F3F5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:#C8650D;cursor:pointer;line-height:1}

.pqc-inbar textarea{flex:1;resize:none;border:1.5px solid #F2F3F5;border-radius:12px;padding:10px 12px;font-size:14px;max-height:96px;outline:none;line-height:1.4;font-family:inherit}
.pqc-inbar textarea:focus{border-color:#E8780F}
.pqc-send{flex-shrink:0;width:40px;height:40px;border:none;border-radius:50%;background:#E8780F;color:#fff;cursor:pointer;display:grid;place-items:center}

.pqc-send svg{width:18px;height:18px}
/* 시작 질문칩 */
.pqc-starters{display:flex;flex-direction:column;gap:8px;margin:2px 0 0 38px}
.pqc-starter{align-self:flex-start;text-align:left;background:#fff;border:1px solid #EAECEF;border-radius:14px;padding:11px 14px;font-size:13.5px;color:#374151;cursor:pointer;box-shadow:0 1px 3px rgba(15,31,92,.05);line-height:1.4}

.pqc-msg a.pqc-link::after{content:'›';font-weight:900;margin-left:1px}

.pqc-opthead{font-size:12px;font-weight:800;color:#6B7280;margin:11px 0 7px}

.pqc-typing i:nth-child(4){animation-delay:.4s}
@keyframes pqcBlink{0%,60%,100%{opacity:.3}30%{opacity:1}}

.pqc-notify-t{font-size:13.5px;font-weight:800;color:#0F0F2D;margin-bottom:4px}
.pqc-notify-d{font-size:11.5px;color:#8A9099;line-height:1.5;margin-bottom:10px}

.pqc-notify-ok{margin:2px 0 0 38px;font-size:12px;color:#059669;font-weight:700;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:12px;padding:10px 13px}

.pqc-fb{display:flex;align-items:center;gap:8px;margin-top:9px;padding-left:2px}

.pqc-fb-thx{font-size:11.5px;font-weight:700;color:#0F7A54}
@media (max-width:640px){
  .pqc-launcher{right:14px;bottom:16px;gap:8px}

}
@media (prefers-reduced-motion:reduce){ .pqc-fab::before{animation:none;opacity:0} }

<script>
(function(){

  try{ document.querySelectorAll('.pqb-wrap, .pdlg-ov, [data-pdlg]').forEach(function(n){ n.remove(); }); }catch(e){}
  var LS_KEY='pourdoctor_tid';
  var launcher=document.querySelector('[data-pqc-launcher]');
  var panel=document.querySelector('[data-pqc-panel]'); if(!panel) return;

  var fileEl=panel.querySelector('[data-pqc-file]');
  var msgEl=panel.querySelector('[data-pqc-msg]');
  var sendBtn=panel.querySelector('[data-pqc-send]');

  var chatFiles=[];

  var MDLINK=/\[([^\]\n]+)\]\((https?:\/\/[^)\s]+)\)/g;

    var code=null; try{ code=(new URLSearchParams(location.search).get('pdc')||'').trim(); }catch(e){}
    if(code){
      threadId=code; try{ localStorage.setItem(LS_KEY,threadId); }catch(e){}
      try{ history.replaceState(null,'',location.pathname+location.hash); }catch(e){} // 주소창에서 코드 숨김
      renderedKey=''; open();   // 링크로 왔으니 채팅창 자동 오픈(open이 해당 상담 구독)
      return;
    }
    if(threadId) subscribe().catch(function(){}); // 답변 도착하면 배지
  })();
})();
</script>
