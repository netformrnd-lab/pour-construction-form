<section class="psm1">
<style>

.psm1 *, .psm1 *::before, .psm1 *::after { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,'Helvetica Neue','Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
.psm1 { background:#fff; color:#2F3438; line-height:1.5; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; letter-spacing:-0.02em; }
.psm1 a { color:inherit; text-decoration:none; }
.psm1 button { background:none; border:none; cursor:pointer; font:inherit; color:inherit; letter-spacing:inherit; }
.psm1 img { display:block; max-width:100%; }
.psm1 ul, .psm1 li { list-style:none; }
/* sticky 래퍼 */
.psm1-sticky { position:sticky; top:0; z-index:1000; background:#fff; }

/* 0) 상단 유틸바 */

/* 1) 메인 헤더 (로고 + 검색 + 인기검색어) */
.psm1-hd { border-bottom:1px solid #F2F3F5; background:#fff; }
.psm1-hd-inner { max-width:1256px; margin:0 auto; padding:18px 24px; display:flex; align-items:center; gap:28px; }
.psm1-logo { display:flex; align-items:center; font-weight:800; font-size:24px; color:#111827; letter-spacing:-0.045em; flex-shrink:0; }

.psm1-searchwrap { flex:1; max-width:620px; position:relative; }
.psm1-search form { margin:0; display:flex; align-items:center; gap:8px; background:#fff; border:2px solid #E8780F; border-radius:26px; padding:10px 12px 10px 18px; }
.psm1-search .psm1-search-ico { width:20px; height:20px; color:#E8780F; flex-shrink:0; }
.psm1-search input { flex:1; min-width:0; border:none; outline:none; background:none; font-size:15px; font-weight:400; color:#2F3438; letter-spacing:-0.02em; }
.psm1-search input::placeholder { color:#9E9E9E; }
.psm1-search-btn { flex-shrink:0; width:38px; height:38px; border-radius:50%; background:#E8780F; display:grid; place-items:center; transition:.15s; }

.psm1-search-btn svg { width:18px; height:18px; color:#fff; }
/* 자동완성 드롭다운 */
.psm1-ac { position:absolute; top:calc(100% + 8px); left:0; right:0; background:#fff; border:1px solid #F0F1F3; border-radius:16px; box-shadow:0 12px 40px rgba(15,31,92,.12); padding:10px; opacity:0; pointer-events:none; transform:translateY(-6px); transition:all .18s cubic-bezier(.16,1,.3,1); z-index:60; max-height:420px; overflow-y:auto; }
.psm1-ac.open { opacity:1; pointer-events:auto; transform:translateY(0); }
.psm1-ac-sec { display:flex; align-items:center; gap:5px; font-size:11.5px; font-weight:800; color:#E8780F; letter-spacing:-0.01em; padding:6px 10px 8px; }

.psm1-ac-item { display:flex; align-items:center; gap:12px; padding:9px 10px; border:1px solid transparent; border-radius:12px; cursor:pointer; font-size:14.5px; color:#2F3438; letter-spacing:-0.02em; margin-bottom:2px; transition:.12s; }

.psm1-ac-item .psm1-ac-ico { width:18px; height:18px; color:#C9CED4; flex-shrink:0; display:grid; place-items:center; }
.psm1-ac-item .psm1-ac-ico svg { width:18px; height:18px; }
.psm1-ac-item .psm1-ac-text { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.psm1-ac-item .psm1-ac-thumb { width:44px; height:44px; border-radius:10px; object-fit:cover; background:#F2F3F5; flex-shrink:0; }
.psm1-ac-item mark { background:none; color:#E8780F; font-weight:800; }
/* 인기검색어 (검색바 우측) */
.psm1-hot { flex-shrink:0; display:flex; align-items:center; gap:10px; max-width:340px; overflow:hidden; }
.psm1-hot-label { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:800; color:#E8780F; letter-spacing:-0.02em; flex-shrink:0; }
.psm1-hot-list { position:relative; height:22px; overflow:hidden; } /* 롤링 뷰포트(1줄) */

.psm1-hd-util .psm1-cart-link .count { position:absolute; top:2px; right:0; min-width:17px; height:17px; padding:0 4px; background:#E8780F; color:#fff; font-size:10px; font-weight:800; border-radius:9px; display:grid; place-items:center; line-height:1; }
.psm1-hd-util .psm1-util-ico { position:relative; display:inline-flex; width:40px; height:40px; align-items:center; justify-content:center; color:#374151; }
.psm1-hd-util .psm1-util-ico svg { width:21px; height:21px; }

.psm1-hd-mb { display:none; }
/* 2) 카테고리 탭 */
.psm1-tabs { border-bottom:1px solid #F2F3F5; background:#fff; }
.psm1-tabs-inner { max-width:1256px; margin:0 auto; padding:0 24px; display:flex; align-items:center; gap:0; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
.psm1-tabs-inner::-webkit-scrollbar { display:none; }
.psm1-tab { padding:15px 14px; font-size:15px; font-weight:600; color:#757575; white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-1px; transition:.15s; letter-spacing:-0.03em; }
.psm1-tab.on { color:#E8780F; border-color:#E8780F; font-weight:700; }
.psm1-tab:hover { color:#2F3438; }
.psm1-tab .psm1-tab-new { display:inline-block; font-size:10px; font-weight:800; color:#E8780F; vertical-align:top; margin-left:2px; letter-spacing:0; }
/* 3) 히어로 */
.psm1-hero { background:#fff; padding:20px 24px 0; }
.psm1-hero-inner { max-width:1256px; margin:0 auto; display:grid; grid-template-columns:1fr 320px; gap:20px; }
.psm1-banner { position:relative; border-radius:12px; overflow:hidden; aspect-ratio:16/9; background:#F5F6F8; cursor:pointer; display:block; }
.psm1-banner-img { width:100%; height:100%; object-fit:cover; }
.psm1-banner-grad { position:absolute; inset:0; background:linear-gradient(180deg, transparent 40%, rgba(0,0,0,.55) 100%); }
.psm1-banner-cap { position:absolute; left:24px; right:24px; bottom:24px; color:#fff; }
.psm1-banner-cap .tag { display:inline-block; font-size:12px; font-weight:700; padding:4px 9px; background:rgba(232,120,15,.92); border-radius:4px; margin-bottom:10px; letter-spacing:-0.02em; }
.psm1-banner-cap .title { font-size:22px; font-weight:800; line-height:1.35; letter-spacing:-0.04em; text-shadow:0 2px 8px rgba(0,0,0,.3); }

.psm1-banner-cap .author .av { width:20px; height:20px; border-radius:50%; background:linear-gradient(135deg,#F49A3A,#E8780F); display:grid; place-items:center; font-size:10px; font-weight:800; }
.psm1-banner-counter { position:absolute; right:14px; bottom:14px; background:rgba(15,23,42,.65); color:#fff; font-size:11px; font-weight:600; padding:4px 9px; border-radius:12px; letter-spacing:-0.02em; }
.psm1-banner-side { position:relative; border-radius:12px; overflow:hidden; background:linear-gradient(160deg,#E8780F 0%,#F49A3A 60%,#FED7AA 100%); cursor:pointer; display:flex; flex-direction:column; padding:20px 22px; min-height:100%; }
.psm1-banner-side .ad { display:inline-block; font-size:10px; font-weight:700; padding:2px 6px; background:rgba(255,255,255,.85); color:#7C2D12; border-radius:3px; align-self:flex-start; letter-spacing:0.02em; }
.psm1-banner-side .label { margin-top:18px; font-size:12px; font-weight:600; color:#7C2D12; letter-spacing:-0.02em; }
.psm1-banner-side .title { margin-top:6px; font-size:20px; font-weight:800; color:#fff; line-height:1.3; letter-spacing:-0.04em; }
.psm1-banner-side .product { margin-top:auto; padding-top:20px; align-self:center; display:grid; place-items:center; }
.psm1-banner-side .product-mock { width:120px; height:140px; background:rgba(255,255,255,.92); border-radius:10px; box-shadow:0 8px 24px rgba(124,45,18,.18); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:#0F1F5C; }
.psm1-banner-side .product-mock .pm-pkg { font-size:36px; }
.psm1-banner-side .product-mock .pm-name { font-size:10px; font-weight:700; color:#7C2D12; letter-spacing:0.02em; }
/* 배너 캐러셀 (여러 배너 자동슬라이드 + 링크) */
.psm1-banner-side { min-height:0; } /* 사이드 높이를 히어로에 맞춤(슬라이드 absolute → 행 높이는 히어로가 결정) */
.psm1-bnr-carousel { position:absolute; inset:0; overflow:hidden; z-index:1; touch-action:pan-y; }
.psm1-bnr-track { display:flex; height:100%; transition:transform .4s ease; will-change:transform; }
.psm1-bnr-slide { flex:0 0 100%; width:100%; height:100%; display:block; }
.psm1-bnr-slide picture { display:block; width:100%; height:100%; }
.psm1-bnr-slide img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; -webkit-user-drag:none; user-select:none; }
.psm1-bnr-dots { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; gap:7px; z-index:3; padding:6px 11px; background:rgba(15,23,42,.32); border-radius:999px; -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); }
.psm1-bnr-dot { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.6); cursor:pointer; transition:.22s; padding:0; border:0; }
.psm1-bnr-dot.on { background:#fff; width:24px; border-radius:5px; box-shadow:0 0 0 1px rgba(255,255,255,.35); }
.psm1-bnr-arrow { position:absolute; top:50%; transform:translateY(-50%); width:34px; height:34px; border-radius:50%; background:rgba(15,23,42,.4); color:#fff; display:grid; place-items:center; z-index:3; cursor:pointer; border:0; padding:0; font-size:20px; line-height:1; opacity:0; transition:opacity .2s, background .2s; }
.psm1-bnr-arrow:hover { background:rgba(15,23,42,.65); }
.psm1-bnr-arrow.prev { left:10px; } .psm1-bnr-arrow.next { right:10px; }
.psm1-banner:hover .psm1-bnr-arrow, .psm1-banner-side:hover .psm1-bnr-arrow { opacity:1; }
@media (max-width:700px){
  .psm1-bnr-arrow { display:none; } /* 모바일은 스와이프로 넘김 */
  /* 모바일: 서브(사이드) 배너는 가로형으로 (JS 높이동기화 무시, 16:9) */
  .psm1-banner-side.psm1-has-carousel { aspect-ratio:32/9; min-height:0 !important; height:auto !important; } /* 모바일 서브배너: 높이 절반(가로 슬림) */
}
/* 4) 카테고리 아이콘 */
.psm1-cats { padding:30px 24px 36px; }

.psm1-cat-ico.c1 { background:#F3E8FF; } .psm1-cat-ico.c2 { background:#FFE4E6; } .psm1-cat-ico.c3 { background:#DBEAFE; } .psm1-cat-ico.c4 { background:#DCFCE7; } .psm1-cat-ico.c5 { background:#FCE7F3; } .psm1-cat-ico.c6 { background:#F1F5F9; } .psm1-cat-ico.c7 { background:#FFEDD5; } .psm1-cat-ico.c8 { background:#E0F2FE; } .psm1-cat-ico.c9 { background:#CFFAFE; } .psm1-cat-ico.c10 { background:#FEE2E2; } .psm1-cat-ico.c11 { background:#EDE9FE; } .psm1-cat-ico.c12 { background:#FEF9C3; } .psm1-cat-ico.c13 { background:#E0E7FF; }
.psm1-cat-name { font-size:13px; font-weight:500; color:#2F3438; text-align:center; letter-spacing:-0.03em; }

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain: "pour-app-new.firebaseapp.com",
  projectId: "pour-app-new",
  storageBucket: "pour-app-new.firebasestorage.app",
  messagingSenderId: "411031141847",
  appId: "1:411031141847:web:e658174fd4b9652cdadf92"
};
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

(async function(){
  var section = document.querySelector('.psm1');
  if (!section) return;

  // sticky 그림자
  var sticky = section.querySelector('.psm1-sticky');
  if (sticky) {
    var onScroll = function(){ if (window.pageYOffset > 4) sticky.classList.add('psm1-scrolled'); else sticky.classList.remove('psm1-scrolled'); };
    window.addEventListener('scroll', onScroll, { passive:true }); onScroll();
  }

  var SEARCH_URL = '/product/search.html?keyword=';
  var items = [];

  // ===== config/pourstoreHotkeywords 읽기 =====
  try {
    var snap = await getDoc(doc(db, "config", "pourstoreHotkeywords"));
    var raw = snap.exists() && Array.isArray(snap.data().items) ? snap.data().items : [];
    console.log("[psm1] 인기검색어 원본 " + raw.length + "건 로드");
    // 클라 정렬: rank 오름차순 + active===true (§10.3-C, orderBy 미사용)
    items = raw.filter(function(o){ return o && o.active === true; })
               .sort(function(a,b){ return (a.rank||99) - (b.rank||99); });
    console.log("[psm1] 노출 대상 " + items.length + "건");
  } catch (e) {
    console.log("[psm1] 인기검색어 로드 실패:", e && e.message ? e.message : e);
  }

  function linkFor(o){ return (o.link && o.link.trim()) ? o.link : (SEARCH_URL + encodeURIComponent(o.keyword||'')); }

  // ===== 검색 드롭다운 '관련 콘텐츠'용 포스팅 로드 (pourstore-postings) =====
  var posts = [];
  try {
    var psnap = await getDocs(collection(db, "pourstore-postings"));
    posts = psnap.docs.map(function(d){ return Object.assign({ id:d.id }, d.data()); })
                      .filter(function(p){ return p && p.active !== false; })
                      .sort(function(a,b){ return ((a.order==null?999:a.order) - (b.order==null?999:b.order)); });
    console.log("[psm1] 관련 콘텐츠 " + posts.length + "건 로드");
  } catch (e) { console.log("[psm1] 관련 콘텐츠 로드 스킵:", e && e.message ? e.message : e); }
  var POST_TYPE = { guide:'가이드', blog:'블로그', video:'유튜브', case:'시공사례' };
  function postThumb(p){ var t=p.thumbnail||p.thumb||p.image; return (t&&String(t).trim())?'<img class="psm1-ac-thumb" src="'+t+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>':''; }
  function postItemsHtml(){
    if (!posts.length) return '';
    var h = '<div class="psm1-ac-div"></div><div class="psm1-ac-sec">관련 콘텐츠</div>';
    posts.slice(0,3).forEach(function(p){
      var isYt = /youtu\.?be/.test(p.link||'');
      h += '<a class="psm1-ac-item" href="'+(p.link||'#')+'"'+(isYt?' target="_blank" rel="noopener"':'')+'>'
        +   '<span class="psm1-ac-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2Z"/></svg></span>'
        +   '<span class="psm1-ac-text">'+(p.title||'')+(POST_TYPE[p.type]?' <span style="color:#9AA0A6;font-weight:600">· '+POST_TYPE[p.type]+'</span>':'')+'</span>'
        +   postThumb(p)
        + '</a>';
    });
    return h;
  }

  // ===== 통합 검색 인덱스 — 인기검색어 + 등록상품 + 패키지 + 콘텐츠 모두 인식 =====
  // 성능: 키워드/패키지/콘텐츠는 즉시(소량), 등록상품(대량)은 검색 첫 상호작용 시 지연 로딩.
  function norm(s){ return (s||'').toString().toLowerCase().replace(/\s+/g,''); }
  var SIDX = [];
  function idxPush(e){ if ((e.title||'').trim() && e.terms.length) SIDX.push(e); }
  items.forEach(function(o){
    idxPush({ type:'keyword', title:o.keyword||'', sub:'', link:linkFor(o), thumb:(o.thumb||o.thumbnail||o.image||''), yt:false,
      terms:[o.keyword].concat(Array.isArray(o.synonyms)?o.synonyms:[]).map(norm).filter(Boolean) });
  });
  posts.forEach(function(p){
    idxPush({ type:'content', title:p.title||'', sub:(POST_TYPE[p.type]||''), link:(p.link||'#'), thumb:(p.thumbnail||p.thumb||''), yt:/youtu\.?be/.test(p.link||''),
      terms:[p.title].concat(Array.isArray(p.tags)?p.tags:[]).map(norm).filter(Boolean) });
  });
  try {
    var pkgSnap = await getDocs(collection(db, "pourstore-packages"));
    pkgSnap.docs.map(function(d){ return Object.assign({ id:d.id }, d.data()); })
      .filter(function(p){ return p && p.active !== false && p.productNo; })
      .forEach(function(p){ idxPush({ type:'product', title:p.name||'', sub:(p.price||''), link:'/product/detail.html?product_no=' + p.productNo + '&cate_no=71', thumb:(p.thumbnail||''), yt:false, terms:[p.name].map(norm).filter(Boolean) }); });
  } catch (e) { console.log("[psm1] 패키지 로드 스킵:", e && e.message ? e.message : e); }
  console.log("[psm1] 검색 인덱스 " + SIDX.length + "건(즉시: 키워드/패키지/콘텐츠)");

  // 등록상품(대량) 지연 로딩 — 검색을 처음 쓸 때 1회만
  var productsLoading = null;
  function ensureProducts(){
    if (productsLoading) return productsLoading;
    productsLoading = (async function(){
      try {
        var snap = await getDocs(collection(db, "products"));
        var n = 0;
        snap.docs.map(function(d){ return Object.assign({ id:d.id }, d.data()); })
          .filter(function(p){ return p && p.isActive !== false; })
          .forEach(function(p){
            var no = p.channels && p.channels.imweb;
            var link = (no && String(no).trim()) ? ('/product/detail.html?product_no=' + String(no).trim()) : (SEARCH_URL + encodeURIComponent(p.name||''));
            idxPush({ type:'product', title:p.name||'', sub:(p.price?String(p.price):''), link:link, thumb:(p.thumbnail||''), yt:false,
              terms:[p.name].concat(Array.isArray(p.tags)?p.tags:[]).map(norm).filter(Boolean) });
            n++;
          });
        console.log("[psm1] 등록상품 " + n + "건 인덱스 추가 (총 " + SIDX.length + ")");
      } catch (e) { console.log("[psm1] 상품 로드 스킵:", e && e.message ? e.message : e); }
    })();
    return productsLoading;
  }

  // ===== 메인 배너 캐러셀 (config/pourstoreBanners) — 어드민 '메인 배너 관리' =====
  function normBanners(v){
    if (Array.isArray(v)) return v.filter(function(x){ return x && x.image; }).map(function(x){ return { image:x.image, imageMobile:(x.imageMobile||''), link:(x.link||'') }; });
    if (v && v.image) return [{ image:v.image, imageMobile:(v.imageMobile||''), link:(v.link||'') }]; // 구버전 단일 호환
    return [];
  }
  function renderCarousel(sel, banners, intervalSec){
    if (!banners.length) return;
    var el = section.querySelector(sel);
    if (!el) return;
    el.style.padding = '0';
    el.classList.add('psm1-has-carousel');
    var n = banners.length;
    // 인라인 스타일 병행 — 카페24 스킨 전역 CSS(img{height:auto} 등)에 밀리지 않도록
    var box = document.createElement('div'); box.className = 'psm1-bnr-carousel';
    box.style.cssText = 'position:absolute;inset:0;overflow:hidden;z-index:1;';
    var track = document.createElement('div'); track.className = 'psm1-bnr-track';
    track.style.cssText = 'display:flex;height:100%;will-change:transform;';
    banners.forEach(function(b){
      var a = document.createElement('a'); a.className = 'psm1-bnr-slide';
      a.style.cssText = 'flex:0 0 100%;width:100%;height:100%;display:block;';
      var link = (b.link||'').trim();
      if (link){ a.href = link; if (/^https?:\/\//.test(link) && link.indexOf(location.host) === -1){ a.target='_blank'; a.rel='noopener'; } }
      else { a.href = 'javascript:void(0)'; }
      var img = document.createElement('img'); img.src = b.image; img.alt = '배너'; img.loading = 'lazy'; img.draggable = false;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;';
      if (b.imageMobile) { // 모바일용 가로 이미지가 있으면 <picture>로 전환
        var pic = document.createElement('picture');
        pic.style.cssText = 'display:block;width:100%;height:100%;';
        var src = document.createElement('source'); src.media = '(max-width:700px)'; src.srcset = b.imageMobile;
        pic.appendChild(src); pic.appendChild(img);
        a.appendChild(pic);
      } else {
        a.appendChild(img);
      }
      track.appendChild(a);
    });
    box.appendChild(track); el.innerHTML = ''; el.appendChild(box);

    var cur = 0, timer = null, ds = null;
    function apply(anim){ track.style.transition = anim===false ? 'none' : 'transform .4s ease'; track.style.transform = 'translateX(-' + (cur*100) + '%)'; if (ds){ for (var i=0;i<ds.length;i++) ds[i].classList.toggle('on', i===cur); } }
    function go(i){ cur = ((i % n) + n) % n; apply(true); }
    function start(){ if (n>1 && !timer) timer = setInterval(function(){ go(cur+1); }, Math.max(2, intervalSec||5)*1000); }
    function stop(){ if (timer){ clearInterval(timer); timer=null; } }
    function reset(){ stop(); start(); }

    if (n > 1){
      // 하단 점(O) — 총 개수 표시 + 클릭 시 해당 슬라이드
      var dots = document.createElement('div'); dots.className = 'psm1-bnr-dots';
      banners.forEach(function(_, i){ var d = document.createElement('button'); d.type='button'; d.className='psm1-bnr-dot'+(i===0?' on':''); d.setAttribute('aria-label','배너 '+(i+1));
        d.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); go(i); reset(); }); dots.appendChild(d); });
      el.appendChild(dots); ds = dots.children;
      // 좌우 화살표
      var prev = document.createElement('button'); prev.type='button'; prev.className='psm1-bnr-arrow prev'; prev.setAttribute('aria-label','이전 배너'); prev.textContent='‹';
      var next = document.createElement('button'); next.type='button'; next.className='psm1-bnr-arrow next'; next.setAttribute('aria-label','다음 배너'); next.textContent='›';
      prev.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); go(cur-1); reset(); });
      next.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); go(cur+1); reset(); });
      el.appendChild(prev); el.appendChild(next);
      el.addEventListener('mouseenter', stop); el.addEventListener('mouseleave', start);

      // 스와이프/드래그로 직접 넘기기 (터치+마우스 = pointer events)
      var startX = 0, moved = 0, dragging = false, wasDrag = false;
      box.addEventListener('pointerdown', function(e){ dragging = true; wasDrag = false; startX = e.clientX; moved = 0; track.style.transition = 'none'; stop(); if (box.setPointerCapture) { try { box.setPointerCapture(e.pointerId); } catch(_){} } });
      box.addEventListener('pointermove', function(e){ if (!dragging) return; moved = e.clientX - startX; if (Math.abs(moved) > 6) wasDrag = true; track.style.transform = 'translateX(calc(-' + (cur*100) + '% + ' + moved + 'px))'; });
      var endDrag = function(){ if (!dragging) return; dragging = false; if (moved < -45) go(cur+1); else if (moved > 45) go(cur-1); else apply(true); reset(); };
      box.addEventListener('pointerup', endDrag); box.addEventListener('pointercancel', endDrag);
      // 드래그로 넘긴 경우엔 슬라이드 링크 클릭 무시(캡처 단계에서 차단)
      track.addEventListener('click', function(e){ if (wasDrag){ e.preventDefault(); e.stopPropagation(); } }, true);
    }
    apply(false); start();
  }
  try {
    var bsnap = await getDoc(doc(db, "config", "pourstoreBanners"));
    if (bsnap.exists()) {
      var bd = bsnap.data() || {}; var iv = Number(bd.intervalSec) || 5;
      renderCarousel('.psm1-banner', normBanners(bd.hero), iv);
      var sideBn = normBanners(bd.side);
      renderCarousel('.psm1-banner-side', sideBn, iv);
      if (sideBn.length) { // 사이드 높이를 히어로에 맞춤 (그리드 aspect 행높이 미반영 보정)
        var syncH = function(){ var h = section.querySelector('.psm1-banner'), s = section.querySelector('.psm1-banner-side'); if (!h || !s) return; if (window.innerWidth > 700) { if (h.offsetHeight) s.style.height = h.offsetHeight + 'px'; } else { s.style.height = ''; } };
        syncH(); window.addEventListener('resize', syncH);
        var hImg = section.querySelector('.psm1-banner img'); if (hImg) hImg.addEventListener('load', syncH);
        setTimeout(syncH, 300);
      }
      console.log('[psm1] 배너 캐러셀 적용');
    }
  } catch (e) { console.log('[psm1] 배너 로드 스킵:', e && e.message ? e.message : e); }

  // ===== 레벨1: 인기검색어 표출 (PC) =====
  var hotList = section.querySelector('[data-psm1-hot-list]');
  var hotWrap = section.querySelector('[data-psm1-hot]');
  if (hotList && items.length) {
    // 네이버 '전체언론사'식 세로 롤링 — 한 번에 1개씩 위로 굴러가며 교체
    var HOT = items.slice(0,5);
    var HH = 22; // .psm1-hot-item 높이와 일치
    var track = document.createElement('div');
    track.className = 'psm1-hot-track';
    function hotItemEl(o, rank){
      var a = document.createElement('a');
      a.className = 'psm1-hot-item';
      a.href = linkFor(o);
      a.innerHTML = '<span class="psm1-hot-rank">' + rank + '</span>' + (o.keyword||'');
      return a;
    }
    HOT.forEach(function(o, i){ track.appendChild(hotItemEl(o, i+1)); });
    if (HOT.length > 1) track.appendChild(hotItemEl(HOT[0], 1)); // 끝에 첫 항목 복제 → 무한 루프 이음새 제거
    hotList.appendChild(track);

    if (HOT.length > 1) {
      var idx = 0, timer = null;
      var advance = function(){
        idx++;
        track.style.transition = 'transform .55s cubic-bezier(.16,1,.3,1)';
        track.style.transform = 'translateY(-' + (idx * HH) + 'px)';
        if (idx === HOT.length) { // 복제본 도달 → 트랜지션 없이 처음으로 리셋
          setTimeout(function(){ track.style.transition = 'none'; track.style.transform = 'translateY(0)'; idx = 0; }, 580);
        }
      };
      var start = function(){ if (!timer) timer = setInterval(advance, 2600); };
      var stop  = function(){ if (timer) { clearInterval(timer); timer = null; } };
      hotList.addEventListener('mouseenter', stop);  // 마우스 올리면 멈춤
      hotList.addEventListener('mouseleave', start);
      start();
    }
  } else if (hotWrap) {
    hotWrap.style.display = 'none';
  }
  // 모바일 인기검색어
  var mbHot = section.querySelector('[data-psm1-mb-hot]');
  if (mbHot && items.length) {
    items.slice(0,8).forEach(function(o){
      var a = document.createElement('a');
      a.href = linkFor(o);
      a.textContent = o.keyword||'';
      mbHot.appendChild(a);
    });
  }

  // ===== 레벨2: 검색 자동완성 (데스크톱 + 모바일 공용) =====
  function esc(s){ return (s||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
  function thumbHtml(o){ var t = o.thumb || o.thumbnail || o.image; return (t && String(t).trim()) ? '<img class="psm1-ac-thumb" src="'+t+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>' : ''; }
  function highlight(text, q){ if(!q) return text; return text.replace(new RegExp('('+esc(q)+')','gi'), '<mark>$1</mark>'); }
  var TYPE_LABEL = { keyword:'검색어', product:'상품', content:'콘텐츠' };
  var TYPE_ORDER = { keyword:0, product:1, content:2 };

  function wireSearch(input, ac){
    if (!input || !ac) return null;
    function renderDefault(){
      // 입력 없을 때: 인기검색어 + (구분선) 관련 콘텐츠
      var html = '';
      if (items.length) {
        html += '<div class="psm1-ac-sec">인기 검색어</div>';
        items.slice(0,5).forEach(function(o,i){
          html += '<a class="psm1-ac-item" href="'+linkFor(o)+'"><span class="psm1-ac-rank">'+(i+1)+'</span><span class="psm1-ac-text">'+(o.keyword||'')+'</span>'+thumbHtml(o)+'</a>';
        });
      }
      html += postItemsHtml(); // 구분선 + 관련 콘텐츠(상품/컨텐츠)
      ac.innerHTML = html;
      return !!html;
    }
    function openDefault(){ if (renderDefault()) ac.classList.add('open'); }
    function renderMatches(q){
      var qn = norm(q);
      if (!qn) { ac.innerHTML=''; ac.classList.remove('open'); return; }
      var hits = SIDX.filter(function(e){ return e.terms.some(function(t){ return t.indexOf(qn) !== -1; }); });
      if (!hits.length) { ac.innerHTML=''; ac.classList.remove('open'); return; }
      // 정렬: 제목 앞부분 일치 우선 → 타입(검색어>상품>콘텐츠)
      hits.sort(function(a,b){
        var sa = norm(a.title).indexOf(qn)===0 ? 0 : 1;
        var sb = norm(b.title).indexOf(qn)===0 ? 0 : 1;
        return (sa - sb) || (TYPE_ORDER[a.type] - TYPE_ORDER[b.type]);
      });
      var html = '<div class="psm1-ac-sec">추천 검색어 · 상품 · 콘텐츠</div>';
      hits.slice(0,10).forEach(function(e){
        var thumb = (e.thumb && String(e.thumb).trim()) ? '<img class="psm1-ac-thumb" src="'+e.thumb+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>' : '';
        var sub = e.sub ? ' <span style="color:#9AA0A6;font-weight:600">· '+e.sub+'</span>' : '';
        html += '<a class="psm1-ac-item" href="'+e.link+'"'+(e.yt?' target="_blank" rel="noopener"':'')+'>'
             +    '<span class="psm1-ac-badge2 t-'+e.type+'">'+TYPE_LABEL[e.type]+'</span>'
             +    '<span class="psm1-ac-text">'+highlight(e.title||'', q)+sub+'</span>'
             +    thumb
             + '</a>';
      });
      ac.innerHTML = html;
      ac.classList.add('open');
    }
    function reRunIfTyping(){ ensureProducts().then(function(){ if (input.value.trim()) renderMatches(input.value.trim()); }); }
    input.addEventListener('focus', function(){
      reRunIfTyping(); // 등록상품 지연 로딩 시작
      if (input.value.trim()) renderMatches(input.value.trim());
      else openDefault(); // 입력 없으면 인기검색어+관련콘텐츠
    });
    input.addEventListener('input', function(){
      var q = input.value.trim();
      if (!q) openDefault();
      else { renderMatches(q); reRunIfTyping(); }
    });
    input.addEventListener('blur', function(){ setTimeout(function(){ ac.classList.remove('open'); }, 200); });
    ac.addEventListener('mousedown', function(e){ if (e.target.closest('a')) return; e.preventDefault(); });
    return { openDefault: openDefault };
  }

  // 데스크톱 + 모바일 각각 연결
  var pcInput = section.querySelector('[data-psm1-searchinput]');
  var pcAc = section.querySelector('[data-psm1-ac]');
  var pcSearch = wireSearch(pcInput, pcAc);
  wireSearch(section.querySelector('[data-psm1-mb-searchinput]'), section.querySelector('[data-psm1-mb-ac]'));

  // 인기검색어 롤링 클릭 → 검색 드롭다운 펼침(토글) — 데스크톱
  var hotBox = section.querySelector('[data-psm1-hot]');
  if (hotBox && pcSearch && pcAc && pcInput) {
    hotBox.style.cursor = 'pointer';
    hotBox.addEventListener('click', function(e){
      e.preventDefault();
      if (pcAc.classList.contains('open')) pcAc.classList.remove('open');
      else { pcSearch.openDefault(); pcInput.focus(); }
    });
  }
})();
</script>
</section>
