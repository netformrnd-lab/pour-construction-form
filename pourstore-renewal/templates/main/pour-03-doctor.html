<section class="pdq">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable.css');
.pdq *, .pdq *::before, .pdq *::after { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
/* 섹션: 다른 메인 섹션과 동일 리듬(흰 배경·80px 상하여백·라운드 0) */
.pdq { background:#fff; padding:80px 18px; color:#2F3438; letter-spacing:-0.02em; }
.pdq-inner { max-width:880px; margin:0 auto; }
/* 헤더: 형제 섹션과 동일 패턴 (kicker + h2 + p, 가운데 정렬) */
.pdq-head { text-align:center; margin-bottom:28px; }
.pdq-head .kicker { display:inline-block; font-size:12px; font-weight:800; color:#E8780F; letter-spacing:0.06em; padding:4px 12px; background:#FFF7ED; border:1px solid #FED7AA; border-radius:0; margin-bottom:12px; }
.pdq-head h2 { font-size:30px; font-weight:900; color:#111111; letter-spacing:-0.045em; line-height:1.25; margin-bottom:8px; }
.pdq-head h2 b { color:#E8780F; font-weight:900; }
.pdq-head p { font-size:13.5px; font-weight:500; color:#6B7280; }
/* 카드: 형제 섹션의 카드 룩(흰 배경·얇은 테두리·라운드 0·은은한 그림자) */
.pdq-card { display:grid; grid-template-columns:150px auto; gap:24px; align-items:center; background:#fff; border:1.5px solid #F2F3F5; border-radius:0; padding:26px 30px; text-decoration:none; color:inherit; transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease; }
.pdq-card:hover { border-color:#FED7AA; box-shadow:0 12px 32px rgba(15,31,92,.08); transform:translateY(-2px); }
/* 마스코트 — 좌측, 은은한 후광 + 가벼운 부유 */
.pdq-char { position:relative; align-self:center; display:grid; place-items:center; }
.pdq-char::after { content:''; position:absolute; left:50%; top:52%; transform:translate(-50%,-50%); width:130px; height:130px; border-radius:50%; background:radial-gradient(circle, rgba(244,154,58,.16) 0%, transparent 62%); z-index:0; animation:pdqHalo 4.5s ease-in-out infinite; }
@keyframes pdqHalo { 0%,100% { opacity:.5; transform:translate(-50%,-50%) scale(.92); } 50% { opacity:.85; transform:translate(-50%,-50%) scale(1.06); } }
.pdq-char-img { position:relative; z-index:1; display:block; width:100%; max-width:150px; height:auto; filter:drop-shadow(0 10px 16px rgba(15,31,92,.16)); animation:pdqFloat 4s ease-in-out infinite; }
@keyframes pdqFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
/* 메시지 영역 */
.pdq-msg { min-width:0; }
.pdq-status { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#059669; margin-bottom:12px; letter-spacing:0.01em; }
.pdq-dot { width:6px; height:6px; border-radius:50%; background:#10B981; box-shadow:0 0 0 3px rgba(16,185,129,.18); animation:pdqDot 1.8s ease-in-out infinite; flex-shrink:0; }
@keyframes pdqDot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.45; transform:scale(.8); } }
/* 샘플 챗 말풍선 — 챗봇 느낌 유지(연한 회색 버블), 톤은 차분하게 */
.pdq-bubble { position:relative; background:#F7F8FA; border-radius:0; padding:15px 18px; font-size:14.5px; font-weight:600; color:#374151; line-height:1.6; word-break:keep-all; }
.pdq-bubble::before { content:''; position:absolute; left:-6px; top:20px; width:12px; height:12px; background:#F7F8FA; transform:rotate(45deg); }
.pdq-bubble b { color:#111111; font-weight:800; }
/* 칩 */
.pdq-chips { margin-top:14px; display:flex; gap:7px; flex-wrap:wrap; }
.pdq-chip { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:#7C2D12; background:#FFF7ED; border:1px solid #FED7AA; border-radius:0; padding:6px 11px; letter-spacing:-0.01em; }
.pdq-chip b { color:#E8780F; font-weight:800; }
/* CTA — 형제 섹션과 동일한 플랫 오렌지 버튼(라운드 0) */
.pdq-actions { margin-top:18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.pdq-cta { display:inline-flex; align-items:center; gap:8px; padding:14px 24px; background:#E8780F; color:#fff; font-size:15px; font-weight:800; border:none; border-radius:0; letter-spacing:-0.02em; transition:background .2s ease; }
.pdq-card:hover .pdq-cta { background:#D26A0A; }
.pdq-cta-arrow { font-size:16px; transition:transform .2s ease; }
.pdq-card:hover .pdq-cta-arrow { transform:translateX(4px); }
.pdq-cta-note { font-size:12.5px; font-weight:600; color:#9CA3AF; }
@media (prefers-reduced-motion: reduce) {
  .pdq-char-img, .pdq-char::after, .pdq-dot { animation:none !important; }
}
/* 모바일 — 마스코트 상단 중앙 + 세로 스택 */
@media (max-width:700px) {
  .pdq { padding:56px 14px 60px; }
  .pdq-head h2 { font-size:24px; }
  .pdq-head p { font-size:12.5px; }
  .pdq-card { display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; padding:24px 18px; }
  .pdq-char { margin-bottom:-4px; }
  .pdq-char-img { max-width:104px; }
  .pdq-char::after { width:104px; height:104px; }
  .pdq-msg { width:100%; }
  .pdq-status { justify-content:center; }
  .pdq-bubble { text-align:left; }
  .pdq-bubble::before { left:50%; top:-6px; transform:translateX(-50%) rotate(45deg); }
  .pdq-chips { justify-content:center; }
  .pdq-actions { flex-direction:column; align-items:center; gap:9px; margin-top:16px; }
  .pdq-cta { width:100%; justify-content:center; padding:15px 18px; }
}
</style>
<div class="pdq-inner">
  <div class="pdq-head">

    <h2>건물 고민, <b>사진 한 장</b>이면 끝</h2>

  <a class="pdq-card" href="./pour-doctor.html">

      <img class="pdq-char-img" src="https://firebasestorage.googleapis.com/v0/b/pour-app-new.firebasestorage.app/o/%EB%A7%88%EC%8A%A4%EC%BD%94%ED%8A%B8%2Fbeaver_quickbanner_gown_circle_noborder.png?alt=media&token=1b20bea5-1fde-44aa-87bd-18a116b1eeee" alt="POUR닥터" loading="lazy"/>
    </div>
    <div class="pdq-msg">
      <span class="pdq-status"><span class="pdq-dot"></span>POUR닥터 · 지금 접속 중</span>
      <div class="pdq-bubble">안녕하세요! 어떤 건물 고민이 있으신가요?<br/><b>사진 한 장</b>과 함께 편하게 말씀해 주세요 😊</div>
      <div class="pdq-chips">
        <span class="pdq-chip"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M6 3v6a4 4 0 0 0 8 0V3"/><path d="M6 3H4M14 3h2"/><path d="M10 15v2a4 4 0 0 0 8 0v-1"/><circle cx="18" cy="10" r="2"/></svg>박사 직접 답변</span>
        <span class="pdq-chip"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 1.5M9 3h6"/></svg>평균 <b>3분</b></span>
        <span class="pdq-chip">무료 상담</span>
      </div>
      <div class="pdq-actions">
        <span class="pdq-cta">지금 말씀하기 <span class="pdq-cta-arrow">→</span></span>
        <span class="pdq-cta-note">사진만 첨부하면 끝</span>
      </div>
    </div>
  </a>
</div>
</section>
