<!-- ============================================================
  pour-05-shorts — 메인 'POUR스토어 숏츠 영상' 섹션
  데이터: Firestore pourstore-postings 중 type==='short' (어드민 '포스팅 관리'에서 숏츠로 등록)
  → POUR이야기의 숏츠와 동일한 실제 데이터. 등록/수정 시 자동 반영. 숏츠 없으면 섹션 자동 숨김.
  클릭: 유튜브 링크 → 메인 전역 인터셉터(pour-01-main)가 자사몰 내 모달로 재생(유튜브 이탈 없음).
  ============================================================ -->
<style>
.psy3 * { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
.psy3 { background:#FFFBF5; padding:80px 18px; position:relative; }
.psy3[hidden] { display:none; }
.psy3-inner { max-width:1200px; margin:0 auto; }
.psy3-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:14px; }
.psy3-head .left { flex:1; min-width:240px; }
.psy3-head .kicker { display:inline-flex; align-items:center; gap:8px; font-size:11.5px; font-weight:800; color:#EA580C; letter-spacing:1.5px; margin-bottom:10px; }
.psy3-head .kicker::before { content:''; width:24px; height:1.5px; background:#EA580C; }
.psy3-head h2 { font-size:32px; font-weight:900; color:#111111; letter-spacing:-1px; line-height:1.2; }
.psy3-head h2 .yt { display:inline-flex; align-items:center; gap:5px; font-size:13px; vertical-align:middle; margin-left:11px; position:relative; top:-4px; padding:6px 12px 6px 10px; background:linear-gradient(135deg,#FB923C 0%,#EA580C 100%); color:#fff; font-weight:800; letter-spacing:-0.02em; box-shadow:0 5px 14px rgba(234,88,12,.32); }
.psy3-head h2 .yt svg { width:11px; height:11px; fill:#fff; flex-shrink:0; }
.psy3-head p { font-size:13.5px; color:#6B7280; margin-top:8px; max-width:520px; }
.psy3-head .more { display:inline-flex; align-items:center; gap:6px; padding:11px 18px; background:#fff; border:1.5px solid #E5E7EB; border-radius:0; color:#111111; font-size:13px; font-weight:800; text-decoration:none; transition:all .2s; white-space:nowrap; }
.psy3-head .more:hover { border-color:#111111; background:#0F1F5C; color:#fff; }
/* 가로 스크롤(POUR이야기 숏츠와 동일 형태) */
.psy3-grid { display:flex; gap:16px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; padding-bottom:4px; scroll-snap-type:x proximity; }
.psy3-grid::-webkit-scrollbar { display:none; }
.psy3-card { flex:0 0 212px; width:212px; aspect-ratio:9/16; border-radius:8px; overflow:hidden; cursor:pointer; position:relative; transition:transform .25s, box-shadow .25s, border-color .25s; text-decoration:none; color:inherit; display:block; box-shadow:0 6px 18px rgba(15,31,92,.08); border:1px solid #F3F4F6; background:#0F1F5C; scroll-snap-align:start; }
.psy3-card:hover { transform:translateY(-6px); box-shadow:0 22px 44px rgba(15,31,92,.16); border-color:#FED7AA; }
.psy3-card .img { position:absolute; inset:0; background:#0F1F5C center/cover no-repeat; }
.psy3-card .img::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.28) 0%, transparent 32%, transparent 52%, rgba(0,0,0,.74) 100%); }
.psy3-card .brand { position:absolute; top:12px; left:12px; z-index:1; font-size:11px; font-weight:800; color:#fff; letter-spacing:.06em; opacity:.95; }
.psy3-card .play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:52px; height:52px; background:rgba(255,255,255,.95); border-radius:50%; display:grid; place-items:center; box-shadow:0 8px 22px rgba(0,0,0,.25); transition:all .25s; z-index:1; }
.psy3-card:hover .play { background:#DC2626; transform:translate(-50%,-50%) scale(1.08); box-shadow:0 8px 22px rgba(220,38,38,.4); }
.psy3-card .play::after { content:''; border:0 solid transparent; border-left:13px solid #DC2626; border-top:8px solid transparent; border-bottom:8px solid transparent; margin-left:3px; transition:border-left-color .25s; }
.psy3-card:hover .play::after { border-left-color:#fff; }
.psy3-card .duration { position:absolute; right:10px; bottom:10px; padding:3px 7px; background:rgba(0,0,0,.62); color:#fff; font-size:10.5px; font-weight:700; border-radius:0; z-index:1; }
.psy3-card .title { position:absolute; bottom:32px; left:12px; right:12px; color:#fff; font-size:13px; font-weight:700; line-height:1.4; z-index:1; letter-spacing:-.2px; text-shadow:0 1px 6px rgba(0,0,0,.4); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.psy3-empty { color:#9AA0A6; font-size:14px; font-weight:500; padding:8px 2px; }
@media (max-width:700px) {
  .psy3 { padding:48px 0 56px; }
  .psy3-inner { max-width:none; }
  .psy3-head { padding:0 18px; margin-bottom:20px; }
  .psy3-head h2 { font-size:24px; }
  .psy3-head .more { font-size:12px; padding:9px 14px; }
  .psy3-grid { padding:0 18px 6px; gap:12px; }
  .psy3-card { flex-basis:170px; width:170px; }
  .psy3-card .title { font-size:12.5px; }
  .psy3-card .play { width:46px; height:46px; }
  .psy3-empty { padding:8px 18px; }
}
@media (max-width:520px) { .psy3-head h2 { font-size:22px; } .psy3-card .title { font-size:12px; } }
.psy3fd { position:fixed; inset:0; z-index:100001; background:#0A0A0A; }
.psy3fd[hidden] { display:none; }
.psy3fd-x { position:fixed; top:14px; right:16px; width:44px; height:44px; border:0; border-radius:50%; background:#fff; color:#15171B; display:grid; place-items:center; cursor:pointer; z-index:4; box-shadow:0 2px 10px rgba(0,0,0,.28); }
.psy3fd-x svg { width:23px; height:23px; }
.psy3fd-nav { position:absolute; right:20px; width:44px; height:44px; border:0; border-radius:50%; background:rgba(255,255,255,.16); color:#fff; display:grid; place-items:center; cursor:pointer; z-index:4; }
.psy3fd-nav svg { width:24px; height:24px; } .psy3fd-nav.up { top:calc(50% - 54px); } .psy3fd-nav.down { top:calc(50% + 10px); }
.psy3fd-scroll { height:100%; overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.psy3fd-scroll::-webkit-scrollbar { display:none; }
.psy3fd-slide { height:100%; scroll-snap-align:start; scroll-snap-stop:always; position:relative; display:flex; align-items:center; justify-content:center; }
.psy3fd-stage { position:relative; height:100%; aspect-ratio:9/16; max-width:100%; background:#000; overflow:hidden; }
.psy3fd-stage img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.psy3fd-stage iframe { position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; }
.psy3fd-segs { position:absolute; top:9px; left:10px; right:10px; z-index:4; display:flex; gap:4px; }
.psy3fd-segs span { flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,.34); } .psy3fd-segs span.on { background:#fff; }
.psy3fd-meta { position:absolute; left:0; right:0; bottom:0; z-index:3; padding:56px 14px 20px; background:linear-gradient(transparent,rgba(0,0,0,.72)); color:#fff; }
.psy3fd-meta .b { display:inline-block; font-size:10.5px; font-weight:800; background:#DB2777; padding:2px 8px; }
.psy3fd-meta .t { margin-top:9px; font-size:15px; font-weight:700; line-height:1.42; }
.psy3fd-cta { margin-top:11px; display:flex; align-items:center; justify-content:center; gap:6px; height:40px; background:#E8780F; color:#fff; font-size:13.5px; font-weight:800; border-radius:8px; text-decoration:none; }
.psy3fd-rail { position:absolute; right:8px; bottom:104px; z-index:4; display:flex; flex-direction:column; gap:15px; }
.psy3fd-rbtn { border:0; background:transparent; display:flex; flex-direction:column; align-items:center; gap:4px; color:#fff; cursor:pointer; }
.psy3fd-rbtn .ic { width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,.42); display:grid; place-items:center; } .psy3fd-rbtn .ic svg { width:21px; height:21px; }
.psy3fd-rbtn.prod .ic { background:#E8780F; } .psy3fd-rbtn .lb { font-size:10.5px; font-weight:700; }
@media (max-width:700px){ .psy3fd-stage { width:100%; height:100%; aspect-ratio:auto; } .psy3fd-nav { display:none; } }
</style>
<section class="psy3" data-psy3 hidden>
  <div class="psy3-inner">
    <div class="psy3-head">
      <div class="left">
        <div class="kicker">SHORTS</div>
        <h2>숏츠 영상<span class="yt"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>1분 시공</span></h2>
        <p>간단한 시공법 — 1분이면 핵심만 쏙!</p>
      </div>
      <a class="more" href="/pourstore_renewal/story/pour-story.html">전체 영상 →</a>
    </div>
    <div class="psy3-grid" data-psy3-grid></div>

</section>
<div class="psy3fd" data-psy3fd hidden>
  <button class="psy3fd-x" data-psy3fd-x aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  <button class="psy3fd-nav up" data-psy3fd-prev aria-label="이전"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg></button>
  <button class="psy3fd-nav down" data-psy3fd-next aria-label="다음"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>
  <div class="psy3fd-scroll" data-psy3fd-scroll></div>
</div>
<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain: "pour-app-new.firebaseapp.com", projectId: "pour-app-new",
  storageBucket: "pour-app-new.firebasestorage.app", messagingSenderId: "411031141847",
  appId: "1:411031141847:web:e658174fd4b9652cdadf92"
};
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);
/* 공유 로딩 캐시(성능) — 메인의 다른 섹션이 이미 받은 pourstore-postings 재사용(중복 fetch 제거). define-if-absent. */
window.__pcache = window.__pcache || (function(){ var mem={}; return { wrap:function(key,ttl,fetcher){ if(mem[key])return mem[key]; try{var raw=sessionStorage.getItem('pc:'+key); if(raw){var o=JSON.parse(raw); if(o&&(Date.now()-o.t)<ttl){return (mem[key]=Promise.resolve(o.v));}}}catch(e){} var p=Promise.resolve().then(fetcher).then(function(v){try{sessionStorage.setItem('pc:'+key,JSON.stringify({t:Date.now(),v:v}));}catch(e){} return v;}); p.catch(function(){delete mem[key];}); return (mem[key]=p); }}; })();
var PC_TTL = 300000;
(async function(){
  var section = document.querySelector('.psy3'); if (!section) return;
  var grid = section.querySelector('[data-psy3-grid]'); if (!grid) return;
  function esc(s){ return (s||'').toString().replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function ytId(u){ var m=(u||'').match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/|live\/)([\w-]{11})/); return m?m[1]:''; }
  function ytThumb(u){ var id=ytId(u); return id?('https://img.youtube.com/vi/'+id+'/hqdefault.jpg'):''; }
  var posts = [];
  try {
    var rawPosts = await window.__pcache.wrap('col:postings', PC_TTL, function(){ return getDocs(collection(db,"pourstore-postings")).then(function(sn){ return sn.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); }); }); });
    posts = rawPosts.filter(function(p){ return p && p.active !== false && p.type === 'short'; })
                    .sort(function(a,b){ return ((a.order==null?999:a.order) - (b.order==null?999:b.order)); });
    console.log("[psy3] 숏츠 " + posts.length + "건 로드");
  } catch (e) { console.log("[psy3] 숏츠 로드 스킵:", e && e.message ? e.message : e); }
  if (!posts.length) { section.hidden = true; return; }
  grid.innerHTML = posts.slice(0,12).map(function(p){
    var thumb = p.thumbnail || p.thumb || p.image || ytThumb(p.link);
    var dur = p.duration ? '<span class="duration">'+esc(p.duration)+'</span>' : '';
    // 숏츠는 모달 없이 카드 안에서 바로 재생 → 앵커 대신 div + data-yt
    return '<div class="psy3-card" data-yt="'+esc(ytId(p.link))+'">'
      + '<div class="img"'+(thumb?' style="background-image:url(\''+esc(thumb)+'\')"':'')+'></div>'
      + '<span class="brand">POUR</span>'
      + '<div class="play"></div>' + dur
      + '<div class="title">'+esc(p.title||'')+'</div></div>';
  }).join('');
  section.hidden = false;
  var feedOpen = false;
  setupShortsAutoplay(grid);

  // 숏츠 인라인 자동재생: 하나씩 음소거 재생 → 14s마다 다음. 클릭 시 확대 피드(openFeed) 오픈.
  function mountPlayer(card){
    var id=card.getAttribute('data-yt'); if(!id || card.querySelector('iframe')) return;
    var f=document.createElement('iframe');
    f.src='https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&mute=1&loop=1&playlist='+id+'&controls=1&rel=0&modestbranding=1&playsinline=1';
    f.allow='autoplay; encrypted-media; picture-in-picture'; f.setAttribute('allowfullscreen','');
    f.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:0;z-index:2;pointer-events:none';
    card.appendChild(f); card.classList.add('psy3-playing');
  }
  function unmount(card){ var f=card.querySelector('iframe'); if(f) f.remove(); card.classList.remove('psy3-playing'); }
  function setupShortsAutoplay(row){
    var cards=[].slice.call(row.querySelectorAll('.psy3-card')); if(!cards.length) return;
    var idx=0, timer=null, manual=false;
    function play(i){ cards.forEach(function(c,j){ if(j!==i) unmount(c); }); idx=((i%cards.length)+cards.length)%cards.length; mountPlayer(cards[idx]); }
    function start(){ if(cards.length>1 && !timer && !manual) timer=setInterval(function(){ if(!manual && !feedOpen) play(idx+1); },14000); }
    function stop(){ if(timer){ clearInterval(timer); timer=null; } }
    cards.forEach(function(c,i){ c.addEventListener('click', function(){ openFeed(i); }); });
    if('IntersectionObserver' in window){
      var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ if(!manual && !feedOpen){ play(idx); start(); } } else { stop(); cards.forEach(unmount); } }); }, {threshold:.35});
      io.observe(row);
    } else { play(0); start(); }
  }

  // ===== 숏츠 확대 피드 (유튜브 쇼츠식 세로 스크롤) — 공유·상품·CTA·이전/다음 =====
  var feedEl = document.querySelector('[data-psy3fd]');
  var feedScroll = feedEl && feedEl.querySelector('[data-psy3fd-scroll]');
  var feedIO = null;
  var IC_SHARE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>';
  var IC_BAG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7h12l-1 13H7L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>';
  function feedSlide(p){
    var id=ytId(p.link), thumb=p.thumbnail||p.thumb||p.image||ytThumb(p.link), plink=(p.productLink||'').trim();
    var cta = plink ? '<a class="psy3fd-cta" href="'+esc(plink)+'"><span>제품 보러가기</span><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>' : '';
    var prodBtn = plink ? '<button class="psy3fd-rbtn prod" data-act="prod" data-plink="'+esc(plink)+'"><span class="ic">'+IC_BAG+'</span><span class="lb">상품</span></button>' : '';
    return '<div class="psy3fd-slide" data-yt="'+esc(id)+'">'
      + '<div class="psy3fd-stage">'
      +   (thumb?'<img src="'+esc(thumb)+'" alt="">':'')
      +   '<div class="psy3fd-rail">'
      +     '<button class="psy3fd-rbtn" data-act="share" data-share="'+esc(p.link||'')+'"><span class="ic">'+IC_SHARE+'</span><span class="lb">공유</span></button>'
      +     prodBtn
      +   '</div>'
      +   '<div class="psy3fd-meta"><span class="b">숏츠</span><div class="t">'+esc(p.title||'')+'</div>'+cta+'</div>'
      + '</div></div>';
  }
  function feedMount(slide){
    var id=slide.getAttribute('data-yt'); if(!id||slide.querySelector('iframe')) return;
    var f=document.createElement('iframe');
    f.src='https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&loop=1&playlist='+id+'&controls=1&rel=0&modestbranding=1&playsinline=1';
    f.allow='autoplay; encrypted-media; picture-in-picture'; f.setAttribute('allowfullscreen','');
    slide.querySelector('.psy3fd-stage').appendChild(f);
  }
  function feedUnmount(slide){ var f=slide.querySelector('iframe'); if(f) f.remove(); }
  function openFeed(startIdx){
    if(!feedEl||!feedScroll||!posts.length) return;
    [].slice.call(grid.querySelectorAll('.psy3-card')).forEach(unmount); // 배경 프리뷰 정지
    feedScroll.innerHTML = posts.map(feedSlide).join('');
    feedEl.hidden=false; feedOpen=true; document.body.style.overflow='hidden';
    var slides=[].slice.call(feedScroll.querySelectorAll('.psy3fd-slide'));
    var si=Math.max(0, Math.min(startIdx||0, slides.length-1));
    feedScroll.scrollTop = si * feedScroll.clientHeight;
    if(feedIO) feedIO.disconnect();
    if('IntersectionObserver' in window){
      feedIO=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting && e.intersectionRatio>=.6){ slides.forEach(function(s){ if(s!==e.target) feedUnmount(s); }); feedMount(e.target); } }); }, {root:feedScroll, threshold:[.6]});
      slides.forEach(function(s){ feedIO.observe(s); });
    }
    feedMount(slides[si]);
  }
  function closeFeed(){ if(!feedEl) return; feedEl.hidden=true; feedOpen=false; document.body.style.overflow=''; if(feedIO) feedIO.disconnect(); feedScroll.innerHTML=''; }
  function feedGo(dir){ if(feedScroll) feedScroll.scrollBy({top:dir*feedScroll.clientHeight, behavior:'smooth'}); }
  function feedShare(url){ if(!url) return; if(navigator.share){ navigator.share({url:url}).catch(function(){}); } else if(navigator.clipboard){ navigator.clipboard.writeText(url); } }
  if(feedEl){
    feedEl.querySelector('[data-psy3fd-x]').addEventListener('click', closeFeed);
    feedEl.querySelector('[data-psy3fd-prev]').addEventListener('click', function(){ feedGo(-1); });
    feedEl.querySelector('[data-psy3fd-next]').addEventListener('click', function(){ feedGo(1); });
    feedScroll.addEventListener('click', function(e){ var b=e.target.closest('[data-act]'); if(!b) return; var a=b.getAttribute('data-act'); if(a==='prod'){ location.href=b.getAttribute('data-plink'); } else if(a==='share'){ feedShare(b.getAttribute('data-share')); } });
    document.addEventListener('keydown', function(e){ if(feedEl.hidden) return; if(e.key==='Escape') closeFeed(); else if(e.key==='ArrowDown'){ e.preventDefault(); feedGo(1); } else if(e.key==='ArrowUp'){ e.preventDefault(); feedGo(-1); } });
  }
})();
</script>
