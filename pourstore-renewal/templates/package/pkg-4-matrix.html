<style>
  .ppr4 * { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
  .ppr4 { background:#fff; padding:72px 18px; }
  .ppr4-inner { max-width:1200px; margin:0 auto; }
  .ppr4-head { text-align:center; margin-bottom:28px; }
  .ppr4-head .kicker { font-size:11.5px; font-weight:800; color:#EA580C; letter-spacing:1.5px; margin-bottom:8px; }
  .ppr4-head h2 { font-size:32px; font-weight:900; color:#111111; letter-spacing:-1px; line-height:1.2; margin-bottom:10px; }
  .ppr4-head p { font-size:14px; color:#6B7280; max-width:580px; margin:0 auto; }
  .ppr4-line { display:flex; gap:8px; justify-content:center; margin-bottom:28px; flex-wrap:wrap; }
  .ppr4-line button { padding:10px 20px; background:#fff; border:1.5px solid #F3F4F6; border-radius:0; font-size:13px; font-weight:700; color:#6B7280; cursor:pointer; transition:all .2s; }
  .ppr4-line button:hover { border-color:#FED7AA; color:#EA580C; }
  .ppr4-line button.active { background:linear-gradient(135deg,#F97316,#EA580C); color:#fff; border-color:transparent; box-shadow:0 6px 16px rgba(249,115,22,.3); }
  .ppr4-section { margin-bottom:36px; }
  .ppr4-section:last-child { margin-bottom:0; }
  .ppr4-section .group-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:12px; border-bottom:2px solid #FFEDD5; flex-wrap:wrap; }
  .ppr4-section .group-head .badge { width:36px; height:36px; border-radius:0; background:linear-gradient(135deg,#FFEDD5,#FED7AA); display:grid; place-items:center; font-size:18px; flex-shrink:0; }
  .ppr4-section .group-head h3 { font-size:17px; font-weight:900; color:#111111; letter-spacing:-.3px; flex:1; }
  .ppr4-section .group-head .self { font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:0; }
  .ppr4-section .group-head .self.ok { background:#ECFDF5; border:1px solid #A7F3D0; color:#059669; }
  .ppr4-section .group-head .self.warn { background:#FEF3C7; border:1px solid #FCD34D; color:#B45309; }
  .ppr4-section .group-head .self.pro { background:#FEE2E2; border:1px solid #FCA5A5; color:#DC2626; }
  .ppr4-row { display:grid; grid-template-columns:120px 1fr; gap:14px; margin-bottom:8px; align-items:start; }
  .ppr4-row:last-child { margin-bottom:0; }
  .ppr4-tier { padding:14px 12px; background:#FFFBF5; border:1.5px solid #F3F4F6; border-radius:0; text-align:center; align-self:stretch; display:flex; flex-direction:column; justify-content:center; }
  .ppr4-tier.full { background:linear-gradient(135deg,#FFF7ED,#FFEDD5); border-color:#F97316; }
  .ppr4-tier .name { font-size:12px; font-weight:900; color:#111111; letter-spacing:-.3px; margin-bottom:4px; }
  .ppr4-tier.full .name { color:#EA580C; }
  .ppr4-tier .scope { font-size:10.5px; color:#9CA3AF; font-weight:700; line-height:1.4; }
  .ppr4-items { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:8px; }
  .ppr4-item { background:#fff; border:1px solid #F3F4F6; border-radius:0; overflow:hidden; transition:all .25s; text-decoration:none; display:flex; }
  .ppr4-item:hover { transform:translateY(-2px); box-shadow:0 10px 20px rgba(15,31,92,.06); border-color:#FED7AA; }
  .ppr4-item .thumb { width:64px; aspect-ratio:1/1; background-size:cover; background-position:center; flex-shrink:0; }
  .ppr4-item .info { padding:8px 10px; flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
  .ppr4-item .name { font-size:11.5px; font-weight:800; color:#111111; margin-bottom:3px; line-height:1.3; letter-spacing:-.3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .ppr4-item .price { font-size:11.5px; font-weight:900; color:#EA580C; }
  .ppr4-item.empty { background:#F9FAFB; border-style:dashed; align-items:center; justify-content:center; padding:14px 10px; color:#9CA3AF; font-size:11px; font-weight:700; text-align:center; }
  .ppr4-empty-msg { padding:14px 16px; background:#F9FAFB; border:1px dashed #E5E7EB; border-radius:0; color:#9CA3AF; font-size:11.5px; font-weight:700; text-align:center; }
  @media (max-width:640px) { .ppr4-head h2 { font-size:24px; } .ppr4-row { grid-template-columns:1fr; } .ppr4-tier { text-align:left; flex-direction:row; gap:8px; align-items:center; } }
  </style>

        <div class="kicker">FULL PACKAGE MATRIX</div>
        <h2>전체 패키지 매트릭스</h2>

<script type="module">
// 전체 패키지 매트릭스 — 어드민 '패키지 구성 관리'(pourstore-packages)의 부위·등급 설정으로 자동 생성
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = { apiKey:"AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU", authDomain:"pour-app-new.firebaseapp.com", projectId:"pour-app-new", storageBucket:"pour-app-new.firebasestorage.app", messagingSenderId:"411031141847", appId:"1:411031141847:web:e658174fd4b9652cdadf92" };
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);
/* 공유 로딩 캐시(성능) — 중복 fetch 제거 + 페이지 이동 시 재사용. define-if-absent. */
window.__pcache = window.__pcache || (function(){ var mem={}; return { wrap:function(key,ttl,fetcher){ if(mem[key])return mem[key]; try{var raw=sessionStorage.getItem('pc:'+key); if(raw){var o=JSON.parse(raw); if(o&&(Date.now()-o.t)<ttl){return (mem[key]=Promise.resolve(o.v));}}}catch(e){} var p=Promise.resolve().then(fetcher).then(function(v){try{sessionStorage.setItem('pc:'+key,JSON.stringify({t:Date.now(),v:v}));}catch(e){} return v;}); p.catch(function(){delete mem[key];}); return (mem[key]=p); }}; })();
var PC_TTL = 300000;
const esc=(s)=>(s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const STAR='<svg viewBox="0 0 24 24" width="1em" height="1em" fill="#F59E0B" style="vertical-align:-0.14em"><path d="M12 3l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 18l-5.8 3 1.1-6.5L2.6 9.8l6.5-.9z"/></svg>';
const CHK='<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/></svg>';
const AREAS=[
  {key:'slab', label:'슬라브 (옥상)', self:'ok', selfLabel:'셀프 OK', selfIcon:CHK, icon:'<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em"><rect x="3" y="4" width="18" height="5" rx="1"/><rect x="3" y="11" width="18" height="5" rx="1"/><path d="M3 19h18"/></svg>'},
  {key:'roof', label:'아스팔트 슁글 / 금속 기와 (경사 지붕)', self:'pro', selfLabel:'안전 시공 권장', selfIcon:'<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em"><path d="M3 15a9 9 0 0 1 18 0"/><path d="M2 15h20v3H2z"/><path d="M12 6v3M9 7v2M15 7v2"/></svg>', icon:'<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em"><path d="M3 11l9-8 9 8"/><path d="M5 10v9h14v-9"/></svg>'},
  {key:'wall', label:'균열 보수 / 외벽 재도장', self:'warn', selfLabel:'저층만 셀프', selfIcon:'<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg>', icon:'<svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" style="vertical-align:-0.14em"><path d="M13 2L4 14h6l-1 8 9-13h-6z"/></svg>'},
  {key:'drain', label:'배수로·베란다 / 지하주차장 / 이음부', self:'ok', selfLabel:'셀프 OK', selfIcon:CHK, icon:'<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.14em"><path d="M2 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0M2 14c2-2 4-2 6 0s4 2 6 0 4-2 6 0M2 20c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/></svg>'}
];
const TIERS=[{key:'full',label:'풀패키지',scope:'전체 부위',full:true},{key:'partial',label:'부분 패키지',scope:'부분 시공'},{key:'coating',label:'단순 코팅',scope:'표면만'}];
function itemHtml(p){
  const t=p.thumbnail?("url('"+esc(p.thumbnail)+"') center/cover no-repeat, "):"";
  return '<a class="ppr4-item" href="/product/detail.html?product_no='+esc(p.productNo)+'&cate_no=71"><div class="thumb" style="background:'+t+'linear-gradient(135deg,#FFEDD5,#F6B87A)"></div><div class="info"><div class="name">'+esc(p.name)+'</div><div class="price">'+esc(p.price||'')+'</div></div></a>';
}
(async function(){
  const bodyEl=document.querySelector('[data-ppr4-body]'); if(!bodyEl) return;
  let pkgs=[];
  try{ pkgs=await window.__pcache.wrap('col:packages',PC_TTL,()=>getDocs(collection(db,"pourstore-packages")).then(sn=>sn.docs.map(d=>({id:d.id,...d.data()})))); console.log('[ppr4] 패키지 '+pkgs.length+'건 로드'); }
  catch(e){ console.log('[ppr4] 로드 실패:', e && e.message); return; }
  const active=pkgs.filter(p=>p.active!==false);
  if(!active.length) return;
  let html='';
  AREAS.forEach(a=>{
    const inArea=active.filter(p=>p.area===a.key);
    if(!inArea.length) return;
    html+='<div class="ppr4-section"><div class="group-head"><div class="badge">'+a.icon+'</div><h3>'+esc(a.label)+'</h3><span class="self '+a.self+'">'+a.selfIcon+' '+esc(a.selfLabel)+'</span></div>';
    TIERS.forEach(t=>{
      const items=inArea.filter(p=>p.tier===t.key).sort((x,y)=>((x.order??999)-(y.order??999)));
      html+='<div class="ppr4-row"><div class="ppr4-tier'+(t.full?' full':'')+'"><div class="name">'+(t.full?(STAR+' '+t.label):t.label)+'</div><div class="scope">'+t.scope+'</div></div><div class="ppr4-items">'+(items.length?items.map(itemHtml).join(''):'<a class="ppr4-item empty">현재 없음</a>')+'</div></div>';
    });
    html+='</div>';
  });
  bodyEl.innerHTML=html;
})();
</script>
