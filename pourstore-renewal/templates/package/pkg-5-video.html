<style>
  .ppr5 * { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
  .ppr5 { background:#FFFBF5; padding:72px 18px; }

  .ppr5-head { text-align:center; margin-bottom:28px; }

  .ppr5-tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:28px; }
  .ppr5-tab { padding:10px 20px; background:#fff; border:1.5px solid #F3F4F6; border-radius:0; font-size:13px; font-weight:700; color:#6B7280; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }

  .ppr5-tab.active { background:linear-gradient(135deg,#F97316,#EA580C); color:#fff; border-color:transparent; box-shadow:0 6px 16px rgba(249,115,22,.3); }
  .ppr5-grid { display:grid; grid-template-columns:1.4fr 1fr; gap:18px; margin-bottom:32px; }
  .ppr5-feature { position:relative; aspect-ratio:16/10; border-radius:8px; overflow:hidden; background-size:cover; background-position:center; text-decoration:none; transition:transform .3s; }
  .ppr5-feature:hover { transform:translateY(-3px); }
  .ppr5-feature::after { content:''; position:absolute; inset:0; background:linear-gradient(0deg, rgba(15,31,92,.88) 0%, rgba(15,31,92,.2) 50%, transparent 100%); }
  .ppr5-feature .play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.95); display:grid; place-items:center; box-shadow:0 12px 32px rgba(0,0,0,.3); z-index:1; transition:transform .3s; }
  .ppr5-feature:hover .play { transform:translate(-50%,-50%) scale(1.1); }
  .ppr5-feature .play svg { width:28px; height:28px; fill:#EA580C; margin-left:4px; }

  .ppr5-feature .meta { font-size:12px; opacity:.9; font-weight:700; }
  .ppr5-list { display:flex; flex-direction:column; gap:12px; }
  .ppr5-mini { display:flex; gap:12px; padding:12px; background:#fff; border:1px solid #F3F4F6; border-radius:8px; transition:all .25s; text-decoration:none; }
  .ppr5-mini:hover { transform:translateX(3px); box-shadow:0 10px 24px rgba(15,31,92,.08); border-color:#FED7AA; }
  .ppr5-mini .thumb { width:120px; aspect-ratio:16/10; flex-shrink:0; border-radius:8px; background-size:cover; background-position:center; position:relative; }
  .ppr5-mini .thumb .dur { position:absolute; bottom:5px; right:5px; padding:2px 6px; background:rgba(0,0,0,.7); color:#fff; font-size:10px; font-weight:800; border-radius:8px; letter-spacing:.3px; }
  .ppr5-mini .text { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
  .ppr5-mini .sub { font-size:10.5px; font-weight:800; color:#EA580C; letter-spacing:.5px; margin-bottom:4px; }
  .ppr5-mini .title { font-size:13px; font-weight:800; color:#111111; line-height:1.4; margin-bottom:4px; letter-spacing:-.3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .ppr5-mini .meta { font-size:10.5px; color:#9CA3AF; font-weight:700; }
  .ppr5-divider { height:1px; background:linear-gradient(90deg, transparent, #FED7AA, transparent); margin:32px 0 24px; }
  .ppr5-docs-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px; }
  .ppr5-docs-head .left .label { font-size:11px; font-weight:800; color:#EA580C; letter-spacing:1px; margin-bottom:4px; }
  .ppr5-docs-head .left h3 { font-size:22px; font-weight:900; color:#111111; letter-spacing:-.4px; }
  .ppr5-docs-head .more { font-size:13px; font-weight:700; color:#EA580C; text-decoration:none; padding:8px 14px; border:1px solid #FED7AA; border-radius:0; background:#fff; }
  .ppr5-docs { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:12px; }
  .ppr5-doc { display:flex; gap:14px; align-items:center; padding:16px 18px; background:#fff; border:1px solid #F3F4F6; border-radius:0; text-decoration:none; transition:all .25s; }
  .ppr5-doc:hover { transform:translateY(-2px); border-color:#FED7AA; box-shadow:0 12px 28px rgba(15,31,92,.06); }
  .ppr5-doc .pdf-icon { width:42px; height:48px; background:linear-gradient(135deg,#FEE2E2,#FECACA); border-radius:0; display:grid; place-items:center; font-size:11px; font-weight:900; color:#DC2626; flex-shrink:0; letter-spacing:.3px; }
  .ppr5-doc .info { flex:1; min-width:0; }
  .ppr5-doc .area { font-size:10px; font-weight:800; color:#EA580C; letter-spacing:.5px; margin-bottom:3px; }
  .ppr5-doc .name { font-size:13px; font-weight:800; color:#111111; margin-bottom:4px; line-height:1.35; letter-spacing:-.3px; }
  .ppr5-doc .meta { font-size:10.5px; color:#9CA3AF; font-weight:700; }
  .ppr5-coach { margin-top:20px; padding:18px 22px; background:linear-gradient(135deg,#FFF7ED,#FFEDD5); border:1px solid #FED7AA; border-radius:0; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .ppr5-coach .ico { font-size:26px; flex-shrink:0; }
  .ppr5-coach .text { flex:1; font-size:13px; color:#4B5563; line-height:1.65; min-width:240px; }
  .ppr5-coach .text b { color:#111111; font-weight:900; }
  .ppr5-coach .btn { padding:10px 18px; background:#fff; border:1.5px solid #F97316; color:#EA580C; font-size:13px; font-weight:900; border-radius:0; text-decoration:none; transition:all .2s; }
  .ppr5-coach .btn:hover { background:#F97316; color:#fff; }
  @media (max-width:880px) { .ppr5-grid { grid-template-columns:1fr; } .ppr5-head h2 { font-size:24px; } }

<script type="module">
// 패키지 시공영상 — 어드민 '포스팅 관리'에서 placements에 'pkg-video' 지정한 콘텐츠를 노출
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain: "pour-app-new.firebaseapp.com",
  projectId: "pour-app-new",
  storageBucket: "pour-app-new.firebasestorage.app",
  messagingSenderId: "411031141847",
  appId: "1:411031141847:web:e658174fd4b9652cdadf92"
};
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);
/* 공유 로딩 캐시(성능) — 중복 fetch 제거 + 페이지 이동 시 재사용. define-if-absent. */
window.__pcache = window.__pcache || (function(){ var mem={}; return { wrap:function(key,ttl,fetcher){ if(mem[key])return mem[key]; try{var raw=sessionStorage.getItem('pc:'+key); if(raw){var o=JSON.parse(raw); if(o&&(Date.now()-o.t)<ttl){return (mem[key]=Promise.resolve(o.v));}}}catch(e){} var p=Promise.resolve().then(fetcher).then(function(v){try{sessionStorage.setItem('pc:'+key,JSON.stringify({t:Date.now(),v:v}));}catch(e){} return v;}); p.catch(function(){delete mem[key];}); return (mem[key]=p); }}; })();
var PC_TTL = 300000;
const ytId = (u)=>{ const m=(u||'').match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/)([\w-]{11})/); return m?m[1]:null; };
const ytThumb = (u)=>{ const id=ytId(u); return id?('https://img.youtube.com/vi/'+id+'/hqdefault.jpg'):''; };
const esc = (s)=>(s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const PLAY = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
(async function(){
  const grid = document.querySelector('[data-ppr5-grid]');
  if (!grid) return;
  let posts = [];
  try {
    posts = await window.__pcache.wrap('col:postings',PC_TTL,()=>getDocs(collection(db,"pourstore-postings")).then(sn=>sn.docs.map(d=>({id:d.id,...d.data()}))));
    console.log('[ppr5] 포스팅 ' + posts.length + '건 로드');
  } catch(e){ console.log('[ppr5] 포스팅 로드 실패:', e && e.message); return; }
  const vids = posts
    .filter(p => p.active !== false)
    .filter(p => Array.isArray(p.placements) && p.placements.includes('pkg-video'))
    .sort((a,b) => ((a.order??999)-(b.order??999)));
  console.log('[ppr5] 패키지 시공영상 ' + vids.length + '건');
  if (!vids.length) return; // 없으면 '준비 중' 유지
  const thumbOf = p => (p.thumbnail || ytThumb(p.link) || '');
  const linkAttr = p => (/youtu\.?be/.test(p.link||'') ? ' target="_blank" rel="noopener"' : '');
  const f = vids[0];
  const rest = vids.slice(1, 5);
  let html =
    '<a class="ppr5-feature" href="'+esc(f.link||'#')+'"'+linkAttr(f)+' style="background-image:url(\''+esc(thumbOf(f))+'\')">'+
      '<div class="play">'+PLAY+'</div>'+
      '<div class="info"><span class="badge">FEATURED</span>'+
        '<div class="title">'+esc(f.title||'')+'</div>'+
        ((f.duration||f.summary) ? '<div class="meta">'+esc([f.duration,f.summary].filter(Boolean).join(' · '))+'</div>' : '')+
      '</div>'+
    '</a>';
  if (rest.length){
    html += '<div class="ppr5-list">';
    rest.forEach(p => {
      const sub = (Array.isArray(p.tags)&&p.tags[0]) ? ('#'+p.tags[0]) : '시공 영상';
      html +=
        '<a class="ppr5-mini" href="'+esc(p.link||'#')+'"'+linkAttr(p)+'>'+
          '<div class="thumb" style="background-image:url(\''+esc(thumbOf(p))+'\')">'+
            (p.duration ? '<div class="dur">'+esc(p.duration)+'</div>' : '')+
          '</div>'+
          '<div class="text"><div class="sub">'+esc(sub)+'</div>'+
            '<div class="title">'+esc(p.title||'')+'</div>'+
            (p.summary ? '<div class="meta">'+esc(p.summary)+'</div>' : '')+
          '</div>'+
        '</a>';
    });
    html += '</div>';
  } else {
    grid.style.gridTemplateColumns = '1fr';
  }
  grid.innerHTML = html;
})();
</script>
