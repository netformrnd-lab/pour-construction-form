<!-- ============================================================
  pour-package-cate  —  '패키지 전체'(cate_no=71) 상품목록 '상단' 삽입 조각
  용도: 카페24 상품분류 목록 스킨(product/list.html)의 상품 리스트 '위'에
        이 한 줄만 @import 하면, cate_no=71 화면에서만 패키지 디자인이 뜨고
        그 아래로 기존 17개 상품이 그대로 노출됩니다. (네이버식: 상단 콘텐츠 + 하단 상품)
  동작: JS가 URL의 cate_no를 확인 → 71이면 표시, 아니면 통째로 제거(다른 분류엔 영향 없음).
  구성: 이미 업로드된 pkg-*.html 6개를 그대로 재사용(@import) → 추가 업로드는 이 파일 1개뿐.
  주의: pour-package.html(별도 페이지용, @layout 포함)과 다른 파일. 이건 삽입 전용(@layout 없음).
  ============================================================ -->
<section class="ppcate" data-ppcate hidden>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable.css');
.ppcate[hidden]{ display:none !important; }
/* ── cate_no=71 페이지 전용 UI 통일 (스코프: .ppcate만 → 별도 패키지 페이지엔 무영향) ── */
.ppcate{ max-width:1200px; margin:0 auto 24px; background:#fff; }
.ppcate > section{ margin:0; }
/* 배경 띠 제거 → 하나의 연속된 면처럼. 섹션 여백 통일 */
.ppcate .ppr2, .ppcate .ppr3, .ppcate .ppr4, .ppcate .ppr5{ background:#fff !important; padding:54px 20px !important; }
/* 첫 섹션(대표 방수·보강 패키지) 상단 여백 축소 → 깔끔하게 시작 */
.ppcate .ppr2{ padding-top:32px !important; }
/* 섹션 사이 얇은 구분선으로 리듬 */
.ppcate > section + section{ border-top:1px solid #F1ECE4; }
/* 제목 크기·정렬 통일(모두 좌측 정렬) */
.ppcate .ppr2-head h2, .ppcate .ppr3-head h2, .ppcate .ppr4-head h2, .ppcate .ppr5-head h2{ font-size:27px !important; letter-spacing:-0.8px !important; }
.ppcate .ppr4-head, .ppcate .ppr5-head{ text-align:left !important; }
.ppcate .ppr4-head p, .ppcate .ppr5-head p{ margin-left:0 !important; margin-right:0 !important; }
/* 이 페이지에선 중복되는 '전체 패키지' 링크·비작동 라인필터 숨김 */
.ppcate .ppr2-head .more, .ppcate .ppr3-head .more{ display:none !important; }
.ppcate .ppr4-line{ display:none !important; }
@media (max-width:640px){ .ppcate .ppr2, .ppcate .ppr3, .ppcate .ppr4, .ppcate .ppr5{ padding:40px 16px !important; } .ppcate .ppr2{ padding-top:24px !important; } .ppcate .ppr2-head h2, .ppcate .ppr3-head h2, .ppcate .ppr4-head h2, .ppcate .ppr5-head h2{ font-size:22px !important; } }
</style>
<!-- [보류] 나중에 고도화 시 '대표 패키지' 위에 다시 노출할 섹션 — 경로만 보존(현재는 미노출).
     복구하려면 아래 두 경로를 정상 @import 지시자로 되살리세요:
       /pourstore_renewal/package/pkg-1-check.html   (부위별 네비)
       /pourstore_renewal/package/pkg-t-scope.html   (등급 3단계 안내)
     → 현재는 '대표 방수·보강 패키지'(pkg-2-best)부터 시작합니다. -->
<!--@import(/pourstore_renewal/package/pkg-2-best.html)-->
<!--@import(/pourstore_renewal/package/pkg-3-new.html)-->
<!--@import(/pourstore_renewal/package/pkg-4-matrix.html)-->
<!--@import(/pourstore_renewal/package/pkg-5-video.html)-->
<script>
(function(){
  var el = document.querySelector('[data-ppcate]');
  if (!el) return;
  var cate = new URLSearchParams(location.search).get('cate_no');
  if (cate === '71') {           // 패키지 전체 분류에서만 노출
    el.hidden = false;
    el.removeAttribute('hidden');
    console.log('[ppcate] cate_no=71 패키지 디자인 노출');
  } else {                        // 다른 분류에선 흔적 없이 제거
    el.parentNode && el.parentNode.removeChild(el);
  }
})();
</script>
</section>
