<!-- ============================================================
  pour-02-search-content — 검색결과 '관련 콘텐츠' (상품 목록 '위'로 자동 이동)
  데이터: Firestore pourstore-postings, 검색어 태그 매칭(0건이면 숨김).
  구성: 1줄=숏츠(9:16) / 2줄=그 외(뉴스·가이드·사례·인터뷰·영상·컨텐츠…).
  재생: 한 번에 하나만 미리보기 자동재생(음소거).
    · 숏츠 = 하나씩 순환 자동재생, 클릭 시 모달(회색 반투명 + 우상단 X)에서 재생.
    · 동영상(그 외 유튜브) = 마우스 올리면(hover) 자동재생, 클릭 시 모달.
  모바일 최적화: 모달 풀스크린, hover 없는 터치기기는 탭→모달.
  ============================================================ -->
<section class="psrc" data-psrc>
<style>
.psrc, .psrc *, .psrc *::before, .psrc *::after { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
.psrc { max-width:1256px; margin:0 auto; padding:14px 24px 8px; }
.psrc-inner { display:none; }
.psrc-inner.on { display:block; animation:psrc-in .3s ease; }
@keyframes psrc-in { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
.psrc-head { display:flex; align-items:baseline; gap:7px; margin:2px 2px 12px; }
.psrc-head .ico { display:inline-flex; color:#E8780F; align-self:center; }
.psrc-head .ico svg { width:17px; height:17px; }
.psrc-head .k { font-size:16px; font-weight:800; color:#111827; letter-spacing:-0.02em; }
.psrc-head .k b { color:#E8780F; }
.psrc-head .sub { font-size:12px; font-weight:700; color:#9AA0A6; }
.psrc-row { display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; padding-bottom:2px; }
.psrc-row::-webkit-scrollbar { display:none; }
.psrc-row + .psrc-row { margin-top:12px; }
/* 숏츠(9:16) */
.psrc-short { flex:0 0 132px; width:132px; aspect-ratio:9/16; position:relative; border-radius:8px; overflow:hidden; background:#0F0F0F; cursor:pointer; }
.psrc-short img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.psrc-short iframe { position:absolute; inset:0; width:100%; height:100%; border:0; z-index:2; pointer-events:none; }
.psrc-short .grad { position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.22) 0%,transparent 30%,transparent 55%,rgba(0,0,0,.72) 100%); pointer-events:none; z-index:3; }
.psrc-short .play { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,.5); display:grid; place-items:center; z-index:3; }
.psrc-short .play svg { width:15px; height:15px; margin-left:2px; fill:#fff; }
.psrc-short .tt { position:absolute; left:8px; right:8px; bottom:8px; z-index:3; color:#fff; font-size:11.5px; font-weight:700; line-height:1.35; text-shadow:0 1px 5px rgba(0,0,0,.5); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.psrc-short .live { position:absolute; top:7px; left:7px; z-index:3; font-size:9px; font-weight:800; color:#fff; background:#DB2777; padding:2px 6px; }
.psrc-short.previewing .play, .psrc-card.previewing .psrc-play2 { display:none; }
/* 그 외(16:9) */
.psrc-card { flex:0 0 214px; width:214px; display:flex; flex-direction:column; border:1px solid #EEF0F2; border-radius:8px; overflow:hidden; background:#fff; transition:.15s; cursor:pointer; text-decoration:none; color:inherit; }
.psrc-card:hover { border-color:#FBE2C4; box-shadow:0 8px 20px rgba(232,120,15,.10); transform:translateY(-2px); }
.psrc-thumb { position:relative; aspect-ratio:16/9; background:#F2F3F5; overflow:hidden; }
.psrc-thumb .ph { position:absolute; inset:0; display:grid; place-items:center; color:#C4C9CF; }
.psrc-thumb .ph svg { width:28px; height:28px; }
.psrc-thumb img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.psrc-thumb iframe { position:absolute; inset:0; width:100%; height:100%; border:0; z-index:2; pointer-events:none; }
.psrc-badge { position:absolute; top:8px; left:8px; z-index:3; display:inline-flex; align-items:center; gap:3px; font-size:10.5px; font-weight:800; color:#fff; padding:3px 7px; }
.psrc-badge svg { width:10px; height:10px; }
.psrc-play2 { position:absolute; inset:0; z-index:3; display:grid; place-items:center; }
.psrc-play2 span { width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,.5); display:grid; place-items:center; }
.psrc-play2 svg { width:14px; height:14px; margin-left:2px; fill:#fff; }
.psrc-body { padding:9px 11px 11px; }
.psrc-title { font-size:12.5px; font-weight:700; color:#2F3438; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.psrc-sum { margin-top:4px; font-size:11px; font-weight:500; color:#9AA0A6; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
/* 모달 (회색 반투명 + 우상단 X) */
.psrc-modal { position:fixed; inset:0; z-index:100000; background:rgba(48,52,60,.62); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:24px; }
.psrc-modal[hidden] { display:none; }
.psrc-modal-x { position:fixed; top:16px; right:18px; width:44px; height:44px; border:0; border-radius:50%; background:rgba(0,0,0,.5); color:#fff; display:grid; place-items:center; cursor:pointer; z-index:2; transition:.15s; }
.psrc-modal-x:hover { background:rgba(0,0,0,.72); }
.psrc-modal-x svg { width:23px; height:23px; }
.psrc-modal-box { background:#000; border-radius:12px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.45); }
.psrc-modal-box.short { width:min(92vw,392px); aspect-ratio:9/16; }
.psrc-modal-box.video { width:min(94vw,960px); aspect-ratio:16/9; }
.psrc-modal-box iframe { width:100%; height:100%; border:0; display:block; }
/* 숏츠 확대 피드 (인스타그램 스토리식 가로 캐러셀) */
.psfs { position:fixed; inset:0; z-index:100001; background:#2B2B2B; overflow:hidden; }
.psfs[hidden] { display:none; }
.psfs-brand { position:fixed; top:16px; left:22px; z-index:7; color:#fff; font-size:19px; font-weight:800; letter-spacing:-.04em; }
.psfs-brand .or { color:#F49A3A; }
.psfs-x { position:fixed; top:13px; right:18px; z-index:7; width:42px; height:42px; border:0; background:transparent; color:#fff; display:grid; place-items:center; cursor:pointer; }
.psfs-x svg { width:28px; height:28px; }
.psfs-stage { position:absolute; inset:0; }
.psfs-arrow { position:absolute; top:50%; z-index:7; width:36px; height:36px; margin-top:-18px; border-radius:50%; border:0; background:rgba(255,255,255,.92); color:#111; display:grid; place-items:center; cursor:pointer; box-shadow:0 2px 10px rgba(0,0,0,.3); }
.psfs-arrow svg { width:22px; height:22px; } .psfs-arrow[hidden] { display:none; }
.psfs-card { position:absolute; top:0; left:0; border-radius:10px; overflow:hidden; background:#000; box-shadow:0 10px 44px rgba(0,0,0,.5); transition:width .3s cubic-bezier(.33,0,.2,1),height .3s cubic-bezier(.33,0,.2,1),left .3s cubic-bezier(.33,0,.2,1),top .3s cubic-bezier(.33,0,.2,1),opacity .3s,filter .3s; cursor:pointer; }
.psfs-card > img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.psfs-card iframe { position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; }
.psfs-card.is-side { filter:brightness(.46); }
.psfs-card.is-side .psfs-meta, .psfs-card.is-side .psfs-rail, .psfs-card.is-side .psfs-segs { display:none; }
.psfs-segs { position:absolute; top:9px; left:9px; right:9px; z-index:3; display:flex; gap:4px; }
.psfs-segs span { flex:1; height:2.5px; border-radius:2px; background:rgba(255,255,255,.85); }
.psfs-meta { position:absolute; left:0; right:0; bottom:0; z-index:3; padding:50px 14px 16px; background:linear-gradient(transparent,rgba(0,0,0,.7)); color:#fff; }
.psfs-meta .b { display:inline-block; font-size:10.5px; font-weight:800; background:#DB2777; padding:2px 8px; }
.psfs-meta .t { margin-top:8px; font-size:14.5px; font-weight:700; line-height:1.4; }
.psfs-cta { margin-top:11px; display:flex; align-items:center; justify-content:center; gap:6px; height:40px; background:#E8780F; color:#fff; font-size:13.5px; font-weight:800; border-radius:8px; text-decoration:none; }
.psfs-rail { position:absolute; right:8px; bottom:96px; z-index:4; display:flex; flex-direction:column; gap:14px; }
.psfs-rbtn { border:0; background:transparent; display:flex; flex-direction:column; align-items:center; gap:4px; color:#fff; cursor:pointer; }
.psfs-rbtn .ic { width:42px; height:42px; border-radius:50%; background:rgba(0,0,0,.4); display:grid; place-items:center; } .psfs-rbtn .ic svg { width:20px; height:20px; }
.psfs-rbtn.prod .ic { background:#E8780F; } .psfs-rbtn .lb { font-size:10px; font-weight:700; }
@media (max-width:700px){ .psfs-arrow { display:none; } }
@media (max-width:700px){
  .psrc { padding:12px 14px 6px; }
  .psrc-short { flex-basis:118px; width:118px; }
  .psrc-card { flex-basis:180px; width:180px; }
  .psrc-head .k { font-size:15px; }
  .psrc-modal { padding:0; }
  .psrc-modal-box { border-radius:0; box-shadow:none; }
  .psrc-modal-box.short { width:100vw; height:100dvh; aspect-ratio:auto; }
  .psrc-modal-box.video { width:100vw; }
  .psrc-modal-x { top:10px; right:10px; width:40px; height:40px; }
}
</style>
<div class="psrc-inner" data-psrc-inner>
  <div class="psrc-head">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
    <span class="k">'<b data-psrc-kw></b>' <span data-psrc-label>관련 콘텐츠</span></span>
    <span class="sub" data-psrc-sub></span>
  </div>
  <div class="psrc-row" data-psrc-shorts hidden></div>
  <div class="psrc-row" data-psrc-rest hidden></div>
</div>
<div class="psrc-modal" data-psrc-modal hidden>
  <button class="psrc-modal-x" data-psrc-x type="button" aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  <div class="psrc-modal-box" data-psrc-modal-box></div>
</div>
<div class="psfs" data-psfs hidden>
  <div class="psfs-brand"><span class="or">POUR</span>스토어</div>
  <button class="psfs-x" data-psrc-feed-x type="button" aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  <button class="psfs-arrow prev" data-feed-prev type="button" aria-label="이전 숏츠"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
  <button class="psfs-arrow next" data-feed-next type="button" aria-label="다음 숏츠"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
  <div class="psfs-stage" data-psrc-feed-scroll></div>
</div>
<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = { apiKey:"AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU", authDomain:"pour-app-new.firebaseapp.com", projectId:"pour-app-new", storageBucket:"pour-app-new.firebasestorage.app", messagingSenderId:"411031141847", appId:"1:411031141847:web:e658174fd4b9652cdadf92" };
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);
window.__pcache = window.__pcache || (function(){ var mem={}; return { wrap:function(key,ttl,fetcher){ if(mem[key])return mem[key]; try{var raw=sessionStorage.getItem('pc:'+key); if(raw){var o=JSON.parse(raw); if(o&&(Date.now()-o.t)<ttl){return (mem[key]=Promise.resolve(o.v));}}}catch(e){} var p=Promise.resolve().then(fetcher).then(function(v){try{sessionStorage.setItem('pc:'+key,JSON.stringify({t:Date.now(),v:v}));}catch(e){} return v;}); p.catch(function(){delete mem[key];}); return (mem[key]=p); }}; })();
const PC_TTL = 300000;
const IC_PLAY  = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const IC_DOC   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2Z"/><path d="M9 13h6M9 17h4"/></svg>';
const IC_BLD   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M6 21V8l6-4 6 4v13"/><path d="M10 12h.01M14 12h.01M10 16h.01M14 16h.01"/></svg>';
const IC_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
const IC_SHARE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg>';
const IC_BAG   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>';
const TYPE = {
  news:{label:'뉴스',color:'#2563EB',icon:IC_DOC}, guide:{label:'시공가이드',color:'#059669',icon:IC_CHECK},
  case:{label:'시공사례',color:'#EA580C',icon:IC_BLD}, interview:{label:'인터뷰',color:'#7C3AED',icon:IC_DOC},
  video:{label:'영상',color:'#DC2626',icon:IC_PLAY}, short:{label:'숏츠',color:'#DB2777',icon:IC_PLAY},
  blog:{label:'컨텐츠',color:'#0891B2',icon:IC_DOC}, event:{label:'이벤트',color:'#D97706',icon:IC_DOC}
};
const MAX_REST=8, MAX_SHORTS=10;
const norm=(s)=>(s||'').toString().toLowerCase().replace(/\s+/g,'');
const esc=(s)=>(s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ytId=(u)=>{const m=(u||'').match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/|live\/)([\w-]{11})/);return m?m[1]:'';};
const ytThumb=(u)=>{const id=ytId(u);return id?('https://img.youtube.com/vi/'+id+'/hqdefault.jpg'):'';};
const isYt=(u)=>/youtu\.?be/.test(u||'');

(async function(){
  const sec = document.querySelector('.psrc'); if(!sec) return;
  const params = new URLSearchParams(location.search);
  const kw = (params.get('keyword')||params.get('keyword2')||'').trim(); if(!kw) return;
  const kwN = norm(kw);
  let expand = new Set([kwN]);
  try { const hk = await window.__pcache.wrap('cfg:hot', PC_TTL, ()=>getDoc(doc(db,"config","pourstoreHotkeywords")).then(s=>s.exists()&&Array.isArray(s.data().items)?s.data().items:[]));
    hk.forEach(o=>{ const pool=[o.keyword,...(Array.isArray(o.synonyms)?o.synonyms:[])].map(norm); if(pool.includes(kwN)) pool.forEach(t=>t&&expand.add(t)); });
  } catch(e){}
  let posts = [];
  try { posts = await window.__pcache.wrap('col:postings', PC_TTL, ()=>getDocs(collection(db,"pourstore-postings")).then(sn=>sn.docs.map(d=>({id:d.id,...d.data()})))); }
  catch(e){ console.log('[psrc] 포스팅 로드 실패:', e&&e.message); return; }
  const terms=[...expand];
  const matched = posts.filter(p=>p.active!==false).filter(p=>{ const tags=(Array.isArray(p.tags)?p.tags:[]).map(norm).filter(Boolean); return tags.some(t=>terms.some(q=>t.includes(q)||q.includes(t))); }).sort((a,b)=>((a.order??999)-(b.order??999)));
  console.log('[psrc] "'+kw+'" 매칭 '+matched.length+'건');
  if(!matched.length) return;
  const shorts = matched.filter(p=>p.type==='short').slice(0,MAX_SHORTS);
  const rest   = matched.filter(p=>p.type!=='short').slice(0,MAX_REST);

  sec.querySelector('[data-psrc-kw]').textContent = kw;
  sec.querySelector('[data-psrc-sub]').textContent = matched.length+'개';

  // ===== 한 번에 하나만: 미리보기 매니저 =====
  let activePrev = null;      // 현재 미리보기(음소거) 중인 카드
  function previewOn(card, id, cls){
    if(activePrev===card) return;
    previewOff();
    const holder = card.querySelector(cls);
    if(!holder || holder.querySelector('iframe')) return;
    const f=document.createElement('iframe');
    f.src='https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&mute=1&loop=1&playlist='+id+'&controls=0&rel=0&modestbranding=1&playsinline=1';
    f.allow='autoplay; encrypted-media'; holder.appendChild(f); card.classList.add('previewing'); activePrev=card;
  }
  function previewOff(){ if(activePrev){ const f=activePrev.querySelector('iframe'); if(f) f.remove(); activePrev.classList.remove('previewing'); activePrev=null; } }

  // ===== 모달 (클릭 시) =====
  const modal=sec.querySelector('[data-psrc-modal]'), mBox=sec.querySelector('[data-psrc-modal-box]');
  let mOv='';
  function openModal(id, isShort){
    if(!id) return;
    stopShortsCycle(); previewOff();
    mBox.className='psrc-modal-box '+(isShort?'short':'video');
    mBox.innerHTML='<iframe src="https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>';
    modal.hidden=false; mOv=document.documentElement.style.overflow; document.documentElement.style.overflow='hidden';
  }
  function closeModal(){ modal.hidden=true; mBox.innerHTML=''; document.documentElement.style.overflow=mOv; startShortsCycle(); }
  sec.querySelector('[data-psrc-x]').addEventListener('click', closeModal);
  modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });

  // ===== 숏츠 확대 피드 (인스타그램 스토리식 가로 캐러셀 — 좌우 이전/다음 미리보기) =====
  const feed=sec.querySelector('[data-psfs]'), stage=sec.querySelector('[data-psrc-feed-scroll]');
  const aPrev=sec.querySelector('[data-feed-prev]'), aNext=sec.querySelector('[data-feed-next]');
  let cur=0, cardEls=[], feedItems=[];
  function cardInner(p){
    const th=p.thumbnail||p.thumb||ytThumb(p.link), pl=p.productLink||'';
    const cta=pl?'<a class="psfs-cta" href="'+esc(pl)+'">제품 보러가기 →</a>':'';
    const prodBtn=pl?'<button class="psfs-rbtn prod" data-act="prod" type="button" aria-label="상품"><span class="ic">'+IC_BAG+'</span><span class="lb">상품</span></button>':'';
    return (th?'<img src="'+esc(th)+'" alt=""/>':'')
      + '<div class="psfs-segs"><span></span></div>'
      + '<div class="psfs-rail"><button class="psfs-rbtn" data-act="share" type="button" aria-label="공유"><span class="ic">'+IC_SHARE+'</span><span class="lb">공유</span></button>'+prodBtn+'</div>'
      + '<div class="psfs-meta"><span class="b">숏츠</span><div class="t">'+esc(p.title||'')+'</div>'+cta+'</div>';
  }
  function buildCards(){ stage.innerHTML=feedItems.map(function(p,i){ return '<div class="psfs-card" data-i="'+i+'" data-yt="'+esc(ytId(p.link))+'" data-plink="'+esc(p.productLink||'')+'" data-share="'+esc(p.link||'')+'">'+cardInner(p)+'</div>'; }).join(''); cardEls=[].slice.call(stage.querySelectorAll('.psfs-card')); }
  function mountActive(){ cardEls.forEach(function(el,i){ var f=el.querySelector('iframe'); if(i===cur){ if(!f){ var id=el.getAttribute('data-yt'); if(id){ f=document.createElement('iframe'); f.src='https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&loop=1&playlist='+id+'&rel=0&modestbranding=1&playsinline=1'; f.allow='autoplay; encrypted-media; picture-in-picture; fullscreen'; f.setAttribute('allowfullscreen',''); el.appendChild(f); } } } else if(f){ f.remove(); } }); }
  function layout(){ if(!cardEls.length) return; var W=window.innerWidth,H=window.innerHeight; var cardH=Math.min(H*0.86,780),cardW=cardH*9/16; if(cardW>W*0.86){cardW=W*0.86;cardH=cardW*16/9;} var cx=W/2,cy=H/2,gap=18,w1=cardW*0.8,w2=cardW*0.62; function centerOf(o){ if(o===0)return cx; var s=o>0?1:-1,k=Math.abs(o); if(k===1)return cx+s*(cardW/2+gap+w1/2); return cx+s*(cardW/2+gap+w1+gap+w2/2); }
    cardEls.forEach(function(el,i){ var o=i-cur,ao=Math.abs(o); if(ao>2){el.style.display='none';return;} el.style.display='block'; var w=ao===0?cardW:ao===1?w1:w2,h=w*16/9,ccx=centerOf(o); el.style.width=w+'px';el.style.height=h+'px';el.style.left=(ccx-w/2)+'px';el.style.top=(cy-h/2)+'px'; el.style.opacity=ao===0?'1':ao===1?'0.95':'0.85'; el.style.zIndex=ao===0?'5':ao===1?'3':'2'; el.classList.toggle('is-side',ao!==0); });
    aPrev.hidden=cur<=0; aNext.hidden=cur>=cardEls.length-1; aPrev.style.left=(cx-cardW/2-44)+'px'; aNext.style.left=(cx+cardW/2+8)+'px'; mountActive();
  }
  function goTo(i){ i=Math.max(0,Math.min(i,feedItems.length-1)); if(i===cur)return; cur=i; layout(); }
  function openShortsFeed(startIdx){ if(!feed||!stage||!shorts.length) return; stopShortsCycle(); previewOff(); feedItems=shorts; buildCards(); cur=Math.max(0,Math.min(startIdx||0,feedItems.length-1)); feed.hidden=false; mOv=document.documentElement.style.overflow; document.documentElement.style.overflow='hidden'; layout(); }
  function closeFeed(){ stage.innerHTML=''; cardEls=[]; feed.hidden=true; document.documentElement.style.overflow=mOv; startShortsCycle(); }
  function feedShare(url){ if(!url) return; if(navigator.share){ navigator.share({url:url}).catch(function(){}); } else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(function(){ alert('링크를 복사했어요'); }).catch(function(){}); } else { window.open(url,'_blank','noopener'); } }
  sec.querySelector('[data-psrc-feed-x]').addEventListener('click', closeFeed);
  aPrev.addEventListener('click', function(){ goTo(cur-1); });
  aNext.addEventListener('click', function(){ goTo(cur+1); });
  stage.addEventListener('click', function(e){ var act=e.target.closest&&e.target.closest('[data-act]'); if(act){ e.stopPropagation(); var card=act.closest('.psfs-card'); if(!card) return; if(act.getAttribute('data-act')==='prod'){ var pl=card.getAttribute('data-plink'); if(pl) location.href=pl; } else feedShare(card.getAttribute('data-share')); return; } if(e.target.closest('.psfs-cta')) return; var c2=e.target.closest('.psfs-card'); if(!c2) return; goTo(+c2.getAttribute('data-i')); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ if(!modal.hidden) closeModal(); else if(!feed.hidden) closeFeed(); } else if(!feed.hidden){ if(e.key==='ArrowRight'){ e.preventDefault(); goTo(cur+1); } else if(e.key==='ArrowLeft'){ e.preventDefault(); goTo(cur-1); } } });
  var _tsx=0; stage.addEventListener('touchstart', function(e){ _tsx=e.touches[0].clientX; }, {passive:true}); stage.addEventListener('touchend', function(e){ var dx=e.changedTouches[0].clientX-_tsx; if(Math.abs(dx)>44) goTo(cur+(dx<0?1:-1)); }, {passive:true});
  window.addEventListener('resize', function(){ if(feed && !feed.hidden) layout(); });

  // ===== 1줄: 숏츠 (하나씩 순환 자동재생 · 클릭→모달) =====
  const shortsRow = sec.querySelector('[data-psrc-shorts]');
  let scTimer=null, scIdx=0, scCards=[];
  function scPlay(i){ if(!scCards.length) return; scIdx=((i%scCards.length)+scCards.length)%scCards.length; const c=scCards[scIdx]; previewOn(c, c.getAttribute('data-yt'), '.psrc-short'); }
  function startShortsCycle(){ if(scCards.length && !scTimer && modal.hidden){ scPlay(scIdx); scTimer=setInterval(()=>{ if(modal.hidden) scPlay(scIdx+1); },14000); } }
  function stopShortsCycle(){ if(scTimer){ clearInterval(scTimer); scTimer=null; } }
  if(shorts.length){
    shorts.forEach((p,i)=>{ const id=ytId(p.link); const th=p.thumbnail||p.thumb||ytThumb(p.link);
      const c=document.createElement('div'); c.className='psrc-short'; c.setAttribute('data-yt',id);
      c.innerHTML=(th?'<img src="'+esc(th)+'" alt="" loading="lazy"/>':'')+'<div class="grad"></div><span class="live">숏츠</span><div class="play">'+IC_PLAY+'</div><div class="tt">'+esc(p.title||'')+'</div>';
      c.addEventListener('click', ()=>openShortsFeed(i));   // 클릭 → 쇼츠 피드(세로 스크롤)
      shortsRow.appendChild(c);
    });
    shortsRow.hidden=false; scCards=[].slice.call(shortsRow.querySelectorAll('.psrc-short'));
  }

  // ===== 2줄: 그 외 (유튜브면 hover 자동재생+클릭 모달 / 아니면 링크) =====
  const restRow = sec.querySelector('[data-psrc-rest]');
  if(rest.length){
    rest.forEach(p=>{ const t=TYPE[p.type]||TYPE.blog; const yt=isYt(p.link); const id=yt?ytId(p.link):'';
      const th=p.thumbnail||p.thumb||(yt?ytThumb(p.link):'');
      const img=th?'<img src="'+esc(th)+'" alt="" loading="lazy" onerror="this.remove()"/>':'';
      const play=yt?'<div class="psrc-play2"><span>'+IC_PLAY+'</span></div>':'';
      const inner='<div class="psrc-thumb"><div class="ph">'+t.icon+'</div>'+img+play+'<span class="psrc-badge" style="background:'+t.color+'">'+t.icon+' '+t.label+'</span></div><div class="psrc-body"><div class="psrc-title">'+esc(p.title||'')+'</div>'+(p.summary?'<div class="psrc-sum">'+esc(p.summary)+'</div>':'')+'</div>';
      let el;
      if(yt){ el=document.createElement('div'); el.className='psrc-card'; el.setAttribute('data-yt',id); el.innerHTML=inner;
        // 마우스 올리면 미리보기(음소거) → 숏츠 순환 잠시 멈춤. 벗어나면 재개.
        el.addEventListener('mouseenter', ()=>{ stopShortsCycle(); previewOn(el, id, '.psrc-thumb'); });
        el.addEventListener('mouseleave', ()=>{ if(activePrev===el) previewOff(); startShortsCycle(); });
        el.addEventListener('click', ()=>openModal(id, false));
      } else { el=document.createElement('a'); el.className='psrc-card'; el.href=p.link||'#'; if(/^https?:/.test(p.link||'')){ el.target='_blank'; el.rel='noopener'; } el.innerHTML=inner; }
      restRow.appendChild(el);
    });
    restRow.hidden=false;
  }

  sec.querySelector('[data-psrc-inner]').classList.add('on');

  // ===== 상품 목록 '위'로 이동 =====
  try {
    const host = document.querySelector('#contents') || document.querySelector('#container') || sec.parentNode;
    if(host && host.firstChild!==sec) host.insertBefore(sec, host.firstChild);
  } catch(e){}

  // 화면에 보일 때만 숏츠 순환(성능/배터리)
  if('IntersectionObserver' in window){
    new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting) startShortsCycle(); else { stopShortsCycle(); if(activePrev && activePrev.classList.contains('psrc-short')) previewOff(); } }); }, {threshold:.2}).observe(shortsRow);
  } else { startShortsCycle(); }
})();
</script>
</section>
