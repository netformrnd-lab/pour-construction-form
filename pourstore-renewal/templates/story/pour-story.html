/* 본문 이미지 + 상품 핫스팟 */

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain: "pour-app-new.firebaseapp.com", projectId: "pour-app-new",
  storageBucket: "pour-app-new.firebasestorage.app", messagingSenderId: "411031141847",
  appId: "1:411031141847:web:e658174fd4b9652cdadf92"
};
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

(async function(){
  var root = document.querySelector('.pstory');
  if (!root) return;
  var $ = function(s){ return root.querySelector(s); };

  var TYPE = {
    news:{l:'뉴스',c:'#2563EB'}, guide:{l:'시공가이드',c:'#059669'}, case:{l:'시공사례',c:'#EA580C'},
    interview:{l:'인터뷰',c:'#7C3AED'}, video:{l:'영상',c:'#DC2626'}, short:{l:'숏츠',c:'#DB2777'}, blog:{l:'컨텐츠',c:'#0891B2'}, event:{l:'이벤트',c:'#D97706'}
  };
  var CAT_ORDER = ['news','guide','case','interview','video','short','blog','event'];

  function esc(s){ return (s||'').toString().replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function ytId(u){ var m=(u||'').match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/)([\w-]{11})/); return m?m[1]:null; }
  function isYt(u){ return /youtu\.?be/.test(u||''); }
  function thumbOf(p){ var t=p.thumbnail||p.thumb||p.image; if(t&&String(t).trim())return t; var id=ytId(p.link); return id?('https://img.youtube.com/vi/'+id+'/hqdefault.jpg'):''; }
  function typeLabel(t){ return (TYPE[t]||{}).l || '이야기'; }
  function dateOf(p){ var m=String(p.displayDate||p.createdAt||p.updatedAt||'').match(/^(\d{4})-(\d{2})-(\d{2})/); return m?(m[1]+'.'+m[2]+'.'+m[3]):''; }
  function tgt(p){ return isYt(p.link) ? ' target="_blank" rel="noopener"' : ''; }
  function ytAttrs(p){ var id=isYt(p.link)?ytId(p.link):null; return id ? (' data-yt="'+id+'" data-pid="'+esc(p.id||'')+'"') : ''; }
  function realLink(p){ return p.link && p.link!=='#' && /^https?:\/\//.test(p.link); }
  // 클릭 라우팅: 영상=재생 모달 / 본문 있거나 외부링크 없음=자사몰 아티클 / 그 외=외부링크 이동
  function clickAttrs(p){
    if (isYt(p.link)) return ytAttrs(p);
    if ((p.body && p.body.trim()) || !realLink(p)) return ' data-article="'+esc(p.id||'')+'"';
    return '';
  }
  // 본문 파서: 한 줄이 이미지 URL이면 <img>, 아니면 문단(<p>). 빈 줄로 문단 구분.
  function renderBodyBlocks(body){
    var lines = String(body||'').split(/\r?\n/), html='', para=[];
    function flush(){ if(para.length){ html += '<p>'+para.join('<br>')+'</p>'; para=[]; } }
    lines.forEach(function(ln){
      var t=ln.trim();
      if(!t){ flush(); return; }
      if(/^https?:\/\/\S+$/i.test(t)){ flush(); html += '<img src="'+esc(t)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>'; } // 한 줄에 URL만 → 이미지로 삽입(깨지면 자동 숨김)
      else { para.push(esc(t)); }
    });
    flush();
    return html || '<p style="color:#9AA0A6">본문이 준비 중입니다.</p>';
  }
  // 블록 렌더: text→<p>, image→이미지+상품 핫스팟
  function renderBlocksHtml(blocks){
    if (!Array.isArray(blocks) || !blocks.length) return '';
    return blocks.map(function(b){
      if (b.type === 'image' && b.url){
        var hots = (b.hotspots||[]).filter(function(h){ return h && (h.link||h.name); }).map(function(h){
          var card = '<div class="pstory-hotpop"><a class="pstory-hotpop-inner" href="'+esc(h.link||'#')+'">'
            + (h.thumb ? '<img src="'+esc(h.thumb)+'" alt="" onerror="this.style.display=\'none\'"/>' : '')
            + '<div class="pstory-hotpop-body"><div class="pstory-hotpop-nm">'+esc(h.name||'상품 보기')+'</div>'
            + (h.price ? '<div class="pstory-hotpop-pr">'+esc(h.price)+'</div>' : '')+'</div>'
            + '<span class="pstory-hotpop-go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></a></div>';
          return '<button class="pstory-hot" type="button" style="left:'+(Number(h.x)||0)+'%;top:'+(Number(h.y)||0)+'%" aria-label="상품">+</button>'+card;
        }).join('');
        return '<div class="pstory-shopimg"><img src="'+esc(b.url)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>'+hots+'</div>';
      }
      var txt = esc(b.text||'').replace(/\n/g,'<br>');
      return txt ? '<p>'+txt+'</p>' : '';
    }).join('') || '<p style="color:#9AA0A6">본문이 준비 중입니다.</p>';
  }
  function imgOrPh(p){ var t=thumbOf(p); return t ? '<img src="'+esc(t)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>' : '<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h16v14H4z"/><path d="M4 15l4-4 3 3 4-5 5 6"/></svg></div>'; }
  function playSpan(p){ return isYt(p.link) ? '<div class="pstory-play"><span><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></div>' : ''; }

  // ===== 데이터 로드 =====
  var posts = [];
  try {
    var snap = await getDocs(collection(db, "pourstore-postings"));
    posts = snap.docs.map(function(d){ return Object.assign({ id:d.id }, d.data()); })
      .filter(function(p){ return p && p.active !== false; })
      .sort(function(a,b){ var o=(a.order==null?999:a.order)-(b.order==null?999:b.order); return o!==0?o:String(b.createdAt||'').localeCompare(String(a.createdAt||'')); });
    console.log("[pstory] 글 " + posts.length + "건 로드");
  } catch (e) {
    console.error("[pstory] 로드 실패:", e && e.message ? e.message : e);
    $('[data-loading]').textContent = '콘텐츠를 불러오지 못했습니다.';
    return;
  }
  $('[data-loading]').hidden = true;
  if (!posts.length){
    $('[data-loading]').hidden = false;
    $('[data-loading]').innerHTML = '아직 등록된 콘텐츠가 없습니다.<br>어드민 ‘포스팅 관리’에서 글을 등록하면 유형별로 자동 정리됩니다.';
    return;
  }

  var videos = posts.filter(function(p){ return isYt(p.link); });

  // ===== 특집 (상위 3) =====
  var feat = posts.slice(0,3);
  $('[data-feat]').innerHTML = feat.map(function(p){
    return '<a class="pstory-feat-card" href="'+esc(p.link||'#')+'"'+tgt(p)+clickAttrs(p)+'>'
      + '<div class="pstory-feat-th">'+imgOrPh(p)+playSpan(p)+'</div>'
      + '<div class="pstory-feat-ct">'+esc(typeLabel(p.type))+'</div>'
      + '<div class="pstory-feat-tt">'+esc(p.title||'')+'</div>'
      + (p.summary?'<div class="pstory-feat-sm">'+esc(p.summary)+'</div>':'')
      + (dateOf(p)?'<div class="pstory-feat-dt">'+dateOf(p)+'</div>':'')
      + '</a>';
  }).join('');
  $('[data-sec-feat]').hidden = false;

  // ===== POUR 쇼츠 (영상) =====
  if (videos.length){
    $('[data-shorts]').innerHTML = videos.map(function(p){
      var dur = p.duration ? '<span class="pstory-short-dur">'+esc(p.duration)+'</span>' : '';
      return '<a class="pstory-short" href="'+esc(p.link||'#')+'"'+tgt(p)+ytAttrs(p)+'>'
        + '<div class="pstory-short-th">'+imgOrPh(p)+'<div class="pstory-short-grad"></div>'
        +   '<span class="pstory-short-brand">POUR</span>'
        +   '<div class="pstory-short-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>'
        +   '<div class="pstory-short-tt">'+esc(p.title||'')+'</div>'+dur
        + '</div></a>';
    }).join('');
    $('[data-sec-shorts]').hidden = false;
  }

  // ===== BEST 매거진 (순번 랭킹, 4건 이상일 때) =====
  if (posts.length >= 4){
    $('[data-best]').innerHTML = posts.slice(0,10).map(function(p,i){
      return '<a class="pstory-best-item" href="'+esc(p.link||'#')+'"'+tgt(p)+clickAttrs(p)+'>'
        + '<span class="pstory-best-rank">'+(i+1)+'</span>'
        + '<div class="pstory-best-body"><div class="pstory-best-tt">'+esc(p.title||'')+'</div>'
        +   '<div class="pstory-best-meta">'+esc(typeLabel(p.type))+(dateOf(p)?' · '+dateOf(p):'')+'</div></div>'
        + (thumbOf(p)?'<img class="pstory-best-th" src="'+esc(thumbOf(p))+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'"/>':'')
        + '</a>';
    }).join('');
    $('[data-sec-best]').hidden = false;
  }

  // ===== 매거진 전체 (칩 + 그리드) =====
  function countFor(cat){ return cat==='all' ? posts.length : posts.filter(function(p){ return p.type===cat; }).length; }
  var cats = [{key:'all',label:'전체'}].concat(CAT_ORDER.filter(function(k){ return countFor(k)>0; }).map(function(k){ return {key:k,label:TYPE[k].l}; }));
  var cur = 'all';
  function cardHtml(p){
    var ty=TYPE[p.type];
    return '<a class="pstory-card" href="'+esc(p.link||'#')+'"'+tgt(p)+clickAttrs(p)+'>'
      + '<div class="pstory-thumb">'+imgOrPh(p)+(ty?'<span class="pstory-badge" style="background:'+ty.c+'">'+esc(ty.l)+'</span>':'')+playSpan(p)+'</div>'
      + '<span class="pstory-ct">'+esc(typeLabel(p.type))+'</span>'
      + '<div class="pstory-tt">'+esc(p.title||'')+'</div>'
      + (p.summary?'<div class="pstory-sm">'+esc(p.summary)+'</div>':'')
      + (dateOf(p)?'<div class="pstory-date">'+dateOf(p)+'</div>':'')
      + '</a>';
  }
  function renderChips(){
    $('[data-chips]').innerHTML = cats.map(function(c){
      return '<button type="button" class="pstory-chip'+(c.key===cur?' on':'')+'" data-chip="'+c.key+'">'+esc(c.label)+'<span class="n">'+countFor(c.key)+'</span></button>';
    }).join('');
  }
  function renderGrid(){
    var arr = (cur==='all') ? posts : posts.filter(function(p){ return p.type===cur; });
    $('[data-grid]').innerHTML = arr.length ? arr.map(cardHtml).join('') : '<div class="pstory-empty" style="grid-column:1/-1">이 분류엔 아직 글이 없습니다.</div>';
  }
  $('[data-chips]').addEventListener('click', function(e){
    var b=e.target.closest('[data-chip]'); if(!b) return;
    cur=b.getAttribute('data-chip'); renderChips(); renderGrid();
  });
  renderChips(); renderGrid();
  $('[data-sec-all]').hidden = false;

  // '영상 전체 →' → 매거진 영상 칩으로 필터 + 스크롤
  var moreShorts = $('[data-more-shorts]');
  if (moreShorts) moreShorts.addEventListener('click', function(){ cur='video'; renderChips(); renderGrid(); $('[data-sec-all]').scrollIntoView({behavior:'smooth'}); });

  // ===== 영상 시청 모달 (유튜브 watch식) =====
  var modal=$('[data-modal]'), mPlayer=$('[data-modal-player]'), mMeta=$('[data-modal-meta]'), mSide=$('[data-modal-side]'), _mOverflow='';
  function byId(id){ return posts.filter(function(x){ return String(x.id)===String(id); })[0]; }
  function relThumb(p){ var t=thumbOf(p); return t ? '<img src="'+esc(t)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>' : '<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h16v14H4z"/><path d="M4 15l4-4 3 3 4-5 5 6"/></svg></div>'; }
  function relHtml(p){
    var yt=isYt(p.link);
    return '<a class="pstory-rel" href="'+esc(p.link||'#')+'"'+(yt?ytAttrs(p):(/^https?:/.test(p.link||'')?' target="_blank" rel="noopener"':''))+'>'
      + '<div class="pstory-rel-th">'+relThumb(p)+(yt?'<span class="pstory-rel-badge">▶ 영상</span>':'')+'</div>'
      + '<div><div class="pstory-rel-tt">'+esc(p.title||'')+'</div><div class="pstory-rel-ct">'+esc(typeLabel(p.type))+(dateOf(p)?' · '+dateOf(p):'')+'</div></div></a>';
  }
  function openWatch(p){
    if (!modal || !p) return; var id=ytId(p.link); if(!id) return;
    mPlayer.innerHTML = '<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0&modestbranding=1&playsinline=1" title="'+esc(p.title||'')+'" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>';
    mMeta.innerHTML = '<div class="pstory-watch-tt">'+esc(p.title||'')+'</div>'
      + '<div class="pstory-watch-row"><span class="pstory-watch-ct">'+esc(typeLabel(p.type))+'</span>'
      +   (dateOf(p)?'<span class="pstory-watch-dt">'+dateOf(p)+'</span>':'')
      +   '<a class="pstory-watch-yt" href="'+esc(p.link)+'" target="_blank" rel="noopener">YouTube <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></a></div>'
      + (p.summary?'<div class="pstory-watch-sm">'+esc(p.summary)+'</div>':'');
    var vs=posts.filter(function(x){ return x!==p && isYt(x.link); });
    var os=posts.filter(function(x){ return x!==p && !isYt(x.link); });
    var rel=vs.concat(os).slice(0,12);
    mSide.innerHTML = '<div class="pstory-side-h">관련 콘텐츠</div>' + (rel.length ? rel.map(relHtml).join('') : '<div class="pstory-side-empty">관련 콘텐츠가 없습니다.</div>');
    if (modal.hidden){ modal.hidden=false; _mOverflow=document.documentElement.style.overflow; document.documentElement.style.overflow='hidden'; }
    modal.scrollTop=0;
  }
  function closeVideo(){ if(!modal) return; modal.hidden=true; mPlayer.innerHTML=''; document.documentElement.style.overflow=_mOverflow; }

  // ===== 자사몰 아티클 오버레이 =====
  var artModal=$('[data-article-modal]'), artScroll=$('[data-art-scroll]'), _aOverflow='';
  function relCardHtml(p){
    return '<a class="pstory-rel2" href="'+esc(p.link||'#')+'"'+tgt(p)+clickAttrs(p)+'>'
      + '<div class="pstory-rel2-th">'+imgOrPh(p)+playSpan(p)+'</div>'
      + '<div class="pstory-rel2-ct">'+esc(typeLabel(p.type))+'</div>'
      + '<div class="pstory-rel2-tt">'+esc(p.title||'')+'</div></a>';
  }
  function openArticle(p){
    if (!artModal || !p) return;
    var hero = thumbOf(p) ? '<div class="pstory-art-hero"><img src="'+esc(thumbOf(p))+'" alt="" onerror="this.parentNode.style.display=\'none\'"/></div>' : '';
    var ext = (realLink(p) && !isYt(p.link)) ? p.link : '';
    var cta = '<div class="pstory-art-cta"><a class="primary" href="/product/list.html">제품 보러가기</a>'
      + (ext ? '<a class="ghost" href="'+esc(ext)+'" target="_blank" rel="noopener">원문 보기 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></a>' : '')
      + '</div>';
    var bodyHtml = (Array.isArray(p.blocks) && p.blocks.length) ? renderBlocksHtml(p.blocks)
      : ((p.body && p.body.trim()) ? renderBodyBlocks(p.body) : (p.summary ? '<p>'+esc(p.summary)+'</p>' : '<p style="color:#9AA0A6">본문이 준비 중입니다.</p>'));
    var rel = posts.filter(function(x){ return x!==p; }).slice(0,4);
    artScroll.innerHTML = hero
      + '<div class="pstory-art-wrap">'
      +   '<div class="pstory-art-ct">'+esc(typeLabel(p.type))+'</div>'
      +   '<div class="pstory-art-tt">'+esc(p.title||'')+'</div>'
      +   '<div class="pstory-art-dt">'+(dateOf(p)||'')+'</div>'
      +   '<div class="pstory-art-body">'+bodyHtml+'</div>'
      +   cta
      + '</div>'
      + (rel.length ? '<div class="pstory-art-rel"><div class="pstory-art-rel-top"></div><div class="pstory-art-rel-h">다른 이야기</div><div class="pstory-art-rel-list">'+rel.map(relCardHtml).join('')+'</div></div>' : '');
    if (artModal.hidden){ artModal.hidden=false; _aOverflow=document.documentElement.style.overflow; document.documentElement.style.overflow='hidden'; }
    artModal.scrollTop=0;
  }
  function closeArticle(){ if(!artModal) return; artModal.hidden=true; artScroll.innerHTML=''; document.documentElement.style.overflow=_aOverflow; }

  // 닫기 + 클릭 라우팅(영상=재생 / 아티클=본문 / 그외=외부이동)
  if ($('[data-art-close]')) $('[data-art-close]').addEventListener('click', closeArticle);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ if(modal && !modal.hidden) closeVideo(); else if(artModal && !artModal.hidden) closeArticle(); } });
  if (modal) $('[data-modal-x]').addEventListener('click', closeVideo);
  // 상품 핫스팟 점 클릭 → 상품 미니카드 토글 (아티클 본문 이미지)
  if (artScroll){
    artScroll.addEventListener('click', function(e){
      var dot=e.target.closest('.pstory-hot');
      var opened=Array.prototype.slice.call(artScroll.querySelectorAll('.pstory-hotpop.open'));
      opened.forEach(function(x){ x.classList.remove('open'); });
      if (dot){
        e.preventDefault();
        var pop=dot.nextElementSibling;
        if (pop && opened.indexOf(pop)===-1){
          pop.style.marginLeft='0px'; pop.classList.add('open');
          var box=dot.parentNode; // .pstory-shopimg
          var pr=pop.getBoundingClientRect(), cr=box.getBoundingClientRect(), shift=0;
          if (pr.left < cr.left+6) shift=(cr.left+6)-pr.left;
          else if (pr.right > cr.right-6) shift=(cr.right-6)-pr.right;
          if (shift) pop.style.marginLeft=Math.round(shift)+'px';
        }
      }
    });
  }
  root.addEventListener('click', function(e){
    var v=e.target.closest('[data-yt]'); if(v){ e.preventDefault(); var p=byId(v.getAttribute('data-pid')); if(p) openWatch(p); return; }
    var a=e.target.closest('[data-article]'); if(a){ e.preventDefault(); var q=byId(a.getAttribute('data-article')); if(q) openArticle(q); return; }
  });
})();
</script>
</section>
