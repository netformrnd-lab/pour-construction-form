<!-- ============================================================
  pour-story  —  POUR이야기 콘텐츠 허브 (상단 탭 'POUR이야기' 랜딩)
  용도: 카페24에 별도 화면/페이지로 등록 → POUR이야기 탭 href를 이 페이지 URL로 연결.
  데이터: Firestore pourstore-postings (어드민 '포스팅 관리').
         하위 탭 = placements의 story-* 값으로 필터. '전체'는 story-* 하나라도 있으면 노출.
  주의: 이모지 미사용(인라인 SVG). 단일 파일(자체 완결) — @layout/@import 없음.
  ============================================================ -->
<section class="pstory">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable.css');
.pstory *, .pstory *::before, .pstory *::after { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
.pstory { background:#fff; color:#2F3438; line-height:1.5; letter-spacing:-0.02em; -webkit-font-smoothing:antialiased; }
.pstory a { color:inherit; text-decoration:none; }
.pstory img { display:block; max-width:100%; }
/* 헤더 */
.pstory-head { max-width:1256px; margin:0 auto; padding:40px 24px 8px; }
.pstory-title { display:flex; align-items:center; gap:9px; font-size:28px; font-weight:800; color:#111827; letter-spacing:-0.04em; }
.pstory-title .ico { width:30px; height:30px; color:#E8780F; flex-shrink:0; }
.pstory-sub { margin-top:8px; font-size:15px; color:#6B7280; font-weight:500; }
/* 하위 탭 */
.pstory-tabs { position:sticky; top:0; z-index:20; background:#fff; border-bottom:1px solid #F0F1F3; }
.pstory-tabs-inner { max-width:1256px; margin:0 auto; padding:0 24px; display:flex; gap:0; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
.pstory-tabs-inner::-webkit-scrollbar { display:none; }
.pstory-tab { padding:15px 15px; font-size:15px; font-weight:600; color:#8B95A1; white-space:nowrap; border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; transition:.15s; background:none; }
.pstory-tab:hover { color:#4B5563; }
.pstory-tab.on { color:#E8780F; border-color:#E8780F; font-weight:800; }
/* 그리드 */
.pstory-grid { max-width:1256px; margin:0 auto; padding:26px 24px 60px; display:grid; grid-template-columns:repeat(4,1fr); gap:26px 20px; }
.pstory-card { display:flex; flex-direction:column; cursor:pointer; }
.pstory-thumb { position:relative; width:100%; aspect-ratio:4/3; border-radius:14px; overflow:hidden; background:#F3F4F6; }
.pstory-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .3s ease; }
.pstory-card:hover .pstory-thumb img { transform:scale(1.04); }
.pstory-thumb .ph { width:100%; height:100%; display:grid; place-items:center; color:#D1D5DB; }
.pstory-thumb .ph svg { width:40px; height:40px; }
.pstory-badge { position:absolute; top:10px; left:10px; font-size:11px; font-weight:800; padding:4px 9px; border-radius:6px; color:#fff; letter-spacing:-0.02em; }
.pstory-play { position:absolute; inset:0; display:grid; place-items:center; pointer-events:none; }
.pstory-play span { width:46px; height:46px; border-radius:50%; background:rgba(15,23,42,.55); display:grid; place-items:center; }
.pstory-play svg { width:20px; height:20px; color:#fff; margin-left:2px; }
.pstory-info { padding:12px 4px 0; }
.pstory-ct { display:inline-block; font-size:11.5px; font-weight:700; color:#E8780F; margin-bottom:5px; }
.pstory-tt { font-size:15.5px; font-weight:700; color:#1F2937; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.pstory-sm { margin-top:6px; font-size:13px; color:#8B95A1; font-weight:500; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.pstory-empty { grid-column:1/-1; padding:70px 20px; text-align:center; color:#9AA0A6; font-size:15px; font-weight:500; }
.pstory-loading { max-width:1256px; margin:0 auto; padding:60px 24px; text-align:center; color:#9AA0A6; font-size:14px; }
/* 반응형 */
@media (max-width:1000px){ .pstory-grid { grid-template-columns:repeat(3,1fr); } }
@media (max-width:700px){
  .pstory-head { padding:26px 16px 6px; }
  .pstory-title { font-size:23px; } .pstory-title .ico { width:25px; height:25px; }
  .pstory-sub { font-size:13.5px; }
  .pstory-tabs-inner { padding:0 16px; }
  .pstory-tab { font-size:14px; padding:13px 12px; }
  .pstory-grid { grid-template-columns:repeat(2,1fr); gap:20px 12px; padding:18px 16px 48px; }
  .pstory-tt { font-size:14px; }
}
</style>

<div class="pstory-head">
  <h1 class="pstory-title"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5v3a1 1 0 0 0 1 1h2l10 4.5V5L6 9.5H4a1 1 0 0 0-1 1z"/><path d="M6 14.5V18a1.5 1.5 0 0 0 3 0v-2"/><path d="M19 9.8a3.4 3.4 0 0 1 0 4.4"/></svg></span>POUR이야기</h1>
  <p class="pstory-sub">쉽고 오래가는 유지보수 이야기 — 브랜드부터 시공가이드·사례·소식까지</p>
</div>
<nav class="pstory-tabs" aria-label="POUR이야기 분류">
  <div class="pstory-tabs-inner" data-story-tabs></div>
</nav>
<div class="pstory-grid" data-story-grid>
  <div class="pstory-loading">불러오는 중…</div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain: "pour-app-new.firebaseapp.com",
  projectId: "pour-app-new",
  storageBucket: "pour-app-new.firebasestorage.app",
  messagingSenderId: "411031141847",
  appId: "1:411031141847:web:e658174fd4b9652cdadf92"
};
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

(async function(){
  var root = document.querySelector('.pstory');
  if (!root) return;
  var tabsBox = root.querySelector('[data-story-tabs]');
  var grid = root.querySelector('[data-story-grid]');

  // 하위 탭 정의 — key는 placements의 story-* 와 매칭 ('all'은 전체)
  var TABS = [
    { key:'all',         label:'전체' },
    { key:'story-brand', label:'브랜드 이야기' },
    { key:'story-guide', label:'시공가이드' },
    { key:'story-case',  label:'시공사례' },
    { key:'story-news',  label:'뉴스' },
    { key:'story-short', label:'숏폼' },
    { key:'story-event', label:'이벤트' }
  ];
  var TYPE = { guide:{l:'가이드',c:'#059669'}, blog:{l:'블로그',c:'#03C75A'}, video:{l:'영상',c:'#DC2626'}, case:{l:'시공사례',c:'#EA580C'} };
  var STORY_KEYS = TABS.filter(function(t){ return t.key!=='all'; }).map(function(t){ return t.key; });

  function esc(s){ return (s||'').toString().replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function ytId(u){ var m=(u||'').match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/)([\w-]{11})/); return m?m[1]:null; }
  function isYt(u){ return /youtu\.?be/.test(u||''); }
  function thumbOf(p){
    var t = p.thumbnail || p.thumb || p.image;
    if (t && String(t).trim()) return t;
    var id = ytId(p.link); return id ? ('https://img.youtube.com/vi/'+id+'/hqdefault.jpg') : '';
  }

  // 데이터 로드
  var posts = [];
  try {
    var snap = await getDocs(collection(db, "pourstore-postings"));
    posts = snap.docs.map(function(d){ return Object.assign({ id:d.id }, d.data()); })
      .filter(function(p){ return p && p.active !== false; })
      // POUR이야기 노출 = story-* placement 하나라도 있는 글만
      .filter(function(p){ return Array.isArray(p.placements) && p.placements.some(function(k){ return STORY_KEYS.indexOf(k)!==-1; }); })
      .sort(function(a,b){ return ((a.order==null?999:a.order) - (b.order==null?999:b.order)); });
    console.log("[pstory] POUR이야기 글 " + posts.length + "건 로드");
  } catch (e) {
    console.error("[pstory] 로드 실패:", e && e.message ? e.message : e);
    grid.innerHTML = '<div class="pstory-empty">콘텐츠를 불러오지 못했습니다.</div>';
    return;
  }

  function countFor(key){
    if (key==='all') return posts.length;
    return posts.filter(function(p){ return (p.placements||[]).indexOf(key)!==-1; }).length;
  }

  // 탭 렌더 (글이 있는 탭 + 전체만 노출)
  var cur = 'all';
  var visibleTabs = TABS.filter(function(t){ return t.key==='all' || countFor(t.key)>0; });
  function renderTabs(){
    tabsBox.innerHTML = '';
    visibleTabs.forEach(function(t){
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'pstory-tab' + (t.key===cur ? ' on' : '');
      b.textContent = t.label + (t.key!=='all' ? ' ' + countFor(t.key) : '');
      b.addEventListener('click', function(){ cur = t.key; renderTabs(); renderGrid(); });
      tabsBox.appendChild(b);
    });
  }

  function cardHtml(p){
    var th = thumbOf(p);
    var ty = TYPE[p.type] || null;
    var yt = isYt(p.link);
    var thumb = th
      ? '<img src="'+esc(th)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>'
      : '<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h16v14H4z"/><path d="M4 15l4-4 3 3 4-5 5 6"/><circle cx="9" cy="9" r="1.4"/></svg></div>';
    var badge = ty ? '<span class="pstory-badge" style="background:'+ty.c+'">'+ty.l+'</span>' : '';
    var play = yt ? '<div class="pstory-play"><span><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></div>' : '';
    var target = yt ? ' target="_blank" rel="noopener"' : '';
    return '<a class="pstory-card" href="'+esc(p.link||'#')+'"'+target+'>'
      + '<div class="pstory-thumb">'+thumb+badge+play+'</div>'
      + '<div class="pstory-info">'
      +   (ty ? '<span class="pstory-ct">'+ty.l+'</span>' : '')
      +   '<div class="pstory-tt">'+esc(p.title||'')+'</div>'
      +   (p.summary ? '<div class="pstory-sm">'+esc(p.summary)+'</div>' : '')
      + '</div></a>';
  }

  function renderGrid(){
    var arr = (cur==='all') ? posts : posts.filter(function(p){ return (p.placements||[]).indexOf(cur)!==-1; });
    if (!arr.length){ grid.innerHTML = '<div class="pstory-empty">아직 등록된 콘텐츠가 없습니다.</div>'; return; }
    grid.innerHTML = arr.map(cardHtml).join('');
  }

  if (!posts.length){
    tabsBox.innerHTML = '';
    grid.innerHTML = '<div class="pstory-empty">아직 등록된 콘텐츠가 없습니다.<br>어드민 ‘포스팅 관리’에서 POUR이야기 분류로 글을 등록해 주세요.</div>';
    return;
  }
  renderTabs();
  renderGrid();
})();
</script>
</section>
