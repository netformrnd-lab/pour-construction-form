<!-- ============================================================
  pour-story  —  POUR이야기 콘텐츠 허브 (상단 탭 'POUR이야기' 랜딩)
  용도: 카페24 pourstore_renewal/story/pour-story.html. POUR이야기 탭이 이 페이지로 연결.
  데이터: Firestore pourstore-postings (어드민 '포스팅 관리').
         모든 활성 글을 '유형(type)'별로 자동 정리 — 뉴스/시공가이드/시공사례/인터뷰/영상/컨텐츠/이벤트.
         글 등록 시 유형만 고르면 해당 탭에 자동 노출(별도 태깅 불필요).
  주의: 이모지 미사용(인라인 SVG). 단일 파일(자체 완결).
  ============================================================ -->
<section class="pstory">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable.css');
.pstory *, .pstory *::before, .pstory *::after { box-sizing:border-box; margin:0; padding:0; font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
.pstory { background:#fff; color:#2F3438; line-height:1.5; letter-spacing:-0.02em; -webkit-font-smoothing:antialiased; }
.pstory a { color:inherit; text-decoration:none; }
.pstory img { display:block; max-width:100%; }
/* 히어로 */
.pstory-hero { background:linear-gradient(135deg,#FFF6EE 0%,#FFEEDD 55%,#FFF 100%); border-bottom:1px solid #F4ECE2; }
.pstory-hero-inner { max-width:1256px; margin:0 auto; padding:44px 24px 34px; }
.pstory-kicker { display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:800; color:#E8780F; background:#fff; border:1px solid #FBD9B8; border-radius:999px; padding:6px 12px; letter-spacing:-0.01em; }
.pstory-kicker svg { width:15px; height:15px; }
.pstory-title { margin-top:14px; font-size:32px; font-weight:800; color:#151B26; letter-spacing:-0.05em; }
.pstory-title .or { color:#E8780F; }
.pstory-sub { margin-top:9px; font-size:15.5px; color:#6B7280; font-weight:500; }
/* 분류 칩 (sticky) */
.pstory-chips { position:sticky; top:0; z-index:20; background:rgba(255,255,255,.92); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-bottom:1px solid #F0F1F3; }
.pstory-chips-inner { max-width:1256px; margin:0 auto; padding:13px 24px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
.pstory-chips-inner::-webkit-scrollbar { display:none; }
.pstory-chip { flex:0 0 auto; padding:9px 16px; border-radius:999px; font-size:14px; font-weight:700; color:#5A6472; background:#F3F4F6; white-space:nowrap; cursor:pointer; border:0; transition:.15s; letter-spacing:-0.02em; }
.pstory-chip:hover { background:#E9EBEF; }
.pstory-chip.on { color:#fff; background:#E8780F; box-shadow:0 3px 10px rgba(232,120,15,.28); }
.pstory-chip .n { opacity:.6; font-weight:600; margin-left:3px; }
.pstory-chip.on .n { opacity:.85; }
/* 본문 */
.pstory-body { max-width:1256px; margin:0 auto; padding:28px 24px 64px; }
.pstory-loading, .pstory-empty { padding:72px 20px; text-align:center; color:#9AA0A6; font-size:15px; font-weight:500; line-height:1.7; }
/* 대표(featured) 카드 */
.pstory-feat { display:grid; grid-template-columns:1.25fr 1fr; gap:0; border:1px solid #EFEFF1; border-radius:20px; overflow:hidden; margin-bottom:34px; transition:box-shadow .2s, transform .2s; }
.pstory-feat:hover { box-shadow:0 14px 40px rgba(15,23,42,.1); transform:translateY(-2px); }
.pstory-feat-thumb { position:relative; aspect-ratio:16/10; background:#F3F4F6; overflow:hidden; }
.pstory-feat-thumb img { width:100%; height:100%; object-fit:cover; }
.pstory-feat-body { padding:34px 34px; display:flex; flex-direction:column; justify-content:center; }
.pstory-feat-ct { font-size:12.5px; font-weight:800; color:#E8780F; letter-spacing:0; }
.pstory-feat-tt { margin-top:12px; font-size:24px; font-weight:800; color:#151B26; line-height:1.32; letter-spacing:-0.04em; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.pstory-feat-sm { margin-top:12px; font-size:14.5px; color:#6B7280; font-weight:500; line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.pstory-feat-more { margin-top:20px; display:inline-flex; align-items:center; gap:5px; font-size:14px; font-weight:800; color:#E8780F; }
.pstory-feat-more svg { width:16px; height:16px; }
/* 그리드 */
.pstory-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:30px 22px; }
.pstory-card { display:flex; flex-direction:column; cursor:pointer; }
.pstory-thumb { position:relative; width:100%; aspect-ratio:4/3; border-radius:14px; overflow:hidden; background:#F3F4F6; }
.pstory-thumb img { width:100%; height:100%; object-fit:cover; transition:transform .3s ease; }
.pstory-card:hover .pstory-thumb img { transform:scale(1.05); }
.pstory-thumb .ph { width:100%; height:100%; display:grid; place-items:center; color:#D1D5DB; }
.pstory-thumb .ph svg { width:38px; height:38px; }
.pstory-badge { position:absolute; top:10px; left:10px; font-size:11px; font-weight:800; padding:4px 9px; border-radius:6px; color:#fff; letter-spacing:-0.02em; }
.pstory-play { position:absolute; inset:0; display:grid; place-items:center; pointer-events:none; }
.pstory-play span { width:44px; height:44px; border-radius:50%; background:rgba(15,23,42,.5); display:grid; place-items:center; -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); }
.pstory-play svg { width:19px; height:19px; color:#fff; margin-left:2px; }
.pstory-info { padding:13px 3px 0; }
.pstory-ct { display:inline-block; font-size:11.5px; font-weight:800; color:#E8780F; margin-bottom:6px; }
.pstory-tt { font-size:15.5px; font-weight:700; color:#1F2937; line-height:1.42; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.pstory-sm { margin-top:6px; font-size:13px; color:#8B95A1; font-weight:500; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.pstory-date { margin-top:8px; font-size:12px; color:#B0B5BB; font-weight:500; }
/* 영상 인사이트 재생 모달 */
.pstory-modal { position:fixed; inset:0; z-index:99999; display:flex; align-items:center; justify-content:center; padding:24px; }
.pstory-modal[hidden] { display:none; }
.pstory-modal-bk { position:absolute; inset:0; background:rgba(9,12,18,.82); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
.pstory-modal-box { position:relative; z-index:1; width:100%; max-width:920px; }
.pstory-modal-x { position:absolute; top:-44px; right:0; width:38px; height:38px; display:grid; place-items:center; color:#fff; background:rgba(255,255,255,.14); border-radius:50%; border:0; cursor:pointer; transition:.15s; }
.pstory-modal-x:hover { background:rgba(255,255,255,.28); }
.pstory-modal-x svg { width:22px; height:22px; }
.pstory-modal-player { position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:14px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.55); }
.pstory-modal-player iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
.pstory-modal-meta { margin-top:16px; color:#fff; }
.pstory-modal-ct { font-size:12.5px; font-weight:800; color:#FDBA74; letter-spacing:-0.01em; }
.pstory-modal-tt { margin-top:6px; font-size:19px; font-weight:800; letter-spacing:-0.03em; line-height:1.4; }
.pstory-modal-sm { margin-top:8px; font-size:14px; color:#C6CBD2; font-weight:500; line-height:1.6; }
.pstory-modal-link { margin-top:13px; display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:700; color:#9AA0A6; }
.pstory-modal-link:hover { color:#fff; }
.pstory-modal-link svg { width:14px; height:14px; }
/* 반응형 */
@media (max-width:1000px){ .pstory-grid { grid-template-columns:repeat(3,1fr); } }
@media (max-width:760px){
  .pstory-hero-inner { padding:30px 16px 24px; }
  .pstory-title { font-size:25px; } .pstory-sub { font-size:14px; }
  .pstory-chips-inner { padding:11px 16px; }
  .pstory-body { padding:20px 16px 52px; }
  .pstory-feat { grid-template-columns:1fr; margin-bottom:26px; }
  .pstory-feat-thumb { aspect-ratio:16/9; }
  .pstory-feat-body { padding:20px 18px 24px; }
  .pstory-feat-tt { font-size:19px; }
  .pstory-grid { grid-template-columns:repeat(2,1fr); gap:24px 12px; }
  .pstory-tt { font-size:14px; }
  .pstory-modal { padding:14px; } .pstory-modal-x { top:-40px; } .pstory-modal-tt { font-size:16px; }
}
</style>

<div class="pstory-hero">
  <div class="pstory-hero-inner">
    <span class="pstory-kicker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5v3a1 1 0 0 0 1 1h2l10 4.5V5L6 9.5H4a1 1 0 0 0-1 1z"/><path d="M6 14.5V18a1.5 1.5 0 0 0 3 0v-2"/><path d="M19 9.8a3.4 3.4 0 0 1 0 4.4"/></svg>POUR이야기</span>
    <h1 class="pstory-title"><span class="or">POUR</span>이야기</h1>
    <p class="pstory-sub">뉴스·시공가이드·사례·인터뷰·영상까지, 유지보수의 모든 이야기를 한곳에.</p>
  </div>
</div>
<nav class="pstory-chips" aria-label="분류"><div class="pstory-chips-inner" data-story-chips></div></nav>
<div class="pstory-body" data-story-body><div class="pstory-loading">불러오는 중…</div></div>
<div class="pstory-modal" data-modal hidden>
  <div class="pstory-modal-bk" data-modal-bk></div>
  <div class="pstory-modal-box">
    <button class="pstory-modal-x" data-modal-x type="button" aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <div class="pstory-modal-player" data-modal-player></div>
    <div class="pstory-modal-meta" data-modal-meta></div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain: "pour-app-new.firebaseapp.com",
  projectId: "pour-app-new",
  storageBucket: "pour-app-new.firebasestorage.app",
  messagingSenderId: "411031141847",
  appId: "1:411031141847:web:e658174fd4b9652cdadf92"
};
const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

(async function(){
  var root = document.querySelector('.pstory');
  if (!root) return;
  var chipsBox = root.querySelector('[data-story-chips]');
  var body = root.querySelector('[data-story-body]');

  // 유형(type) = 허브 분류. 어드민 '포스팅 관리'의 유형과 동일 키.
  var TYPE = {
    news:{l:'뉴스',c:'#2563EB'}, guide:{l:'시공가이드',c:'#059669'}, case:{l:'시공사례',c:'#EA580C'},
    interview:{l:'인터뷰',c:'#7C3AED'}, video:{l:'영상',c:'#DC2626'}, blog:{l:'컨텐츠',c:'#0891B2'}, event:{l:'이벤트',c:'#D97706'}
  };
  var CAT_ORDER = ['news','guide','case','interview','video','blog','event'];

  function esc(s){ return (s||'').toString().replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function ytId(u){ var m=(u||'').match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/)([\w-]{11})/); return m?m[1]:null; }
  function isYt(u){ return /youtu\.?be/.test(u||''); }
  function thumbOf(p){ var t=p.thumbnail||p.thumb||p.image; if(t&&String(t).trim())return t; var id=ytId(p.link); return id?('https://img.youtube.com/vi/'+id+'/hqdefault.jpg'):''; }
  function typeLabel(t){ return (TYPE[t]||{}).l || '이야기'; }
  function dateOf(p){ var d=p.createdAt||p.updatedAt||''; var m=String(d).match(/^(\d{4})-(\d{2})-(\d{2})/); return m?(m[1]+'.'+m[2]+'.'+m[3]):''; }

  // 데이터 로드 — 모든 활성 글
  var posts = [];
  try {
    var snap = await getDocs(collection(db, "pourstore-postings"));
    posts = snap.docs.map(function(d){ return Object.assign({ id:d.id }, d.data()); })
      .filter(function(p){ return p && p.active !== false; })
      .sort(function(a,b){
        var o = (a.order==null?999:a.order) - (b.order==null?999:b.order);
        if (o!==0) return o;
        return String(b.createdAt||'').localeCompare(String(a.createdAt||''));
      });
    console.log("[pstory] POUR이야기 글 " + posts.length + "건 로드");
  } catch (e) {
    console.error("[pstory] 로드 실패:", e && e.message ? e.message : e);
    body.innerHTML = '<div class="pstory-empty">콘텐츠를 불러오지 못했습니다.</div>';
    return;
  }

  if (!posts.length){
    chipsBox.innerHTML = '';
    body.innerHTML = '<div class="pstory-empty">아직 등록된 콘텐츠가 없습니다.<br>어드민 ‘포스팅 관리’에서 글을 등록하면 유형별로 자동 정리됩니다.</div>';
    return;
  }

  function countFor(cat){ return cat==='all' ? posts.length : posts.filter(function(p){ return p.type===cat; }).length; }

  // 칩: 전체 + 글이 있는 유형만
  var cats = [{key:'all',label:'전체'}].concat(
    CAT_ORDER.filter(function(k){ return countFor(k)>0; }).map(function(k){ return {key:k,label:TYPE[k].l}; })
  );
  var cur = 'all';

  function renderChips(){
    chipsBox.innerHTML = '';
    cats.forEach(function(c){
      var b = document.createElement('button');
      b.type='button'; b.className='pstory-chip'+(c.key===cur?' on':'');
      b.innerHTML = esc(c.label) + '<span class="n">'+countFor(c.key)+'</span>';
      b.addEventListener('click', function(){ cur=c.key; renderChips(); renderBody(); });
      chipsBox.appendChild(b);
    });
  }

  function playOverlay(p){ return isYt(p.link) ? '<div class="pstory-play"><span><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span></div>' : ''; }
  function thumbInner(p){
    var th=thumbOf(p);
    return th ? '<img src="'+esc(th)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"/>'
      : '<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h16v14H4z"/><path d="M4 15l4-4 3 3 4-5 5 6"/><circle cx="9" cy="9" r="1.4"/></svg></div>';
  }
  function tgt(p){ return isYt(p.link) ? ' target="_blank" rel="noopener"' : ''; }
  // 유튜브 글이면 인사이트 재생용 데이터 부착(클릭 시 모달로 가로챔). href는 JS 미동작 시 폴백.
  function ytAttrs(p){ var id=isYt(p.link)?ytId(p.link):null; return id ? (' data-yt="'+id+'" data-vtitle="'+esc(p.title||'')+'" data-vsub="'+esc(p.summary||'')+'" data-vlink="'+esc(p.link||'')+'"') : ''; }

  function featHtml(p){
    var ty=TYPE[p.type];
    return '<a class="pstory-feat" href="'+esc(p.link||'#')+'"'+tgt(p)+ytAttrs(p)+'>'
      + '<div class="pstory-feat-thumb">'+thumbInner(p)+playOverlay(p)+'</div>'
      + '<div class="pstory-feat-body">'
      +   '<span class="pstory-feat-ct">'+esc(typeLabel(p.type))+(dateOf(p)?'  ·  '+dateOf(p):'')+'</span>'
      +   '<div class="pstory-feat-tt">'+esc(p.title||'')+'</div>'
      +   (p.summary?'<div class="pstory-feat-sm">'+esc(p.summary)+'</div>':'')
      +   '<span class="pstory-feat-more">자세히 보기 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>'
      + '</div></a>';
  }
  function cardHtml(p){
    var ty=TYPE[p.type];
    return '<a class="pstory-card" href="'+esc(p.link||'#')+'"'+tgt(p)+ytAttrs(p)+'>'
      + '<div class="pstory-thumb">'+thumbInner(p)
      +   (ty?'<span class="pstory-badge" style="background:'+ty.c+'">'+esc(ty.l)+'</span>':'')+playOverlay(p)+'</div>'
      + '<div class="pstory-info">'
      +   '<span class="pstory-ct">'+esc(typeLabel(p.type))+'</span>'
      +   '<div class="pstory-tt">'+esc(p.title||'')+'</div>'
      +   (p.summary?'<div class="pstory-sm">'+esc(p.summary)+'</div>':'')
      +   (dateOf(p)?'<div class="pstory-date">'+dateOf(p)+'</div>':'')
      + '</div></a>';
  }

  function renderBody(){
    var arr = (cur==='all') ? posts : posts.filter(function(p){ return p.type===cur; });
    if (!arr.length){ body.innerHTML='<div class="pstory-empty">이 분류엔 아직 글이 없습니다.</div>'; return; }
    var html='';
    var rest=arr;
    // '전체'에서 글이 2개 이상이면 첫 글을 대표(featured)로
    if (cur==='all' && arr.length>=2){ html += featHtml(arr[0]); rest = arr.slice(1); }
    html += '<div class="pstory-grid">' + rest.map(cardHtml).join('') + '</div>';
    body.innerHTML = html;
  }

  // ===== 자사몰 내 영상 재생 모달 =====
  var modal = root.querySelector('[data-modal]');
  var mPlayer = root.querySelector('[data-modal-player]');
  var mMeta = root.querySelector('[data-modal-meta]');
  var _mOverflow = '';
  function openVideo(id, title, sub, link){
    if (!modal || !id) return;
    mPlayer.innerHTML = '<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0&modestbranding=1&playsinline=1" title="'+esc(title||'')+'" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>';
    mMeta.innerHTML = '<div class="pstory-modal-ct">영상</div>'
      + '<div class="pstory-modal-tt">'+esc(title||'')+'</div>'
      + (sub ? '<div class="pstory-modal-sm">'+esc(sub)+'</div>' : '')
      + (link ? '<a class="pstory-modal-link" href="'+esc(link)+'" target="_blank" rel="noopener">YouTube에서 보기 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg></a>' : '');
    modal.hidden = false;
    _mOverflow = document.documentElement.style.overflow;
    document.documentElement.style.overflow = 'hidden';
  }
  function closeVideo(){
    if (!modal) return;
    modal.hidden = true;
    mPlayer.innerHTML = ''; // iframe 제거 → 재생 정지
    document.documentElement.style.overflow = _mOverflow;
  }
  if (modal){
    root.querySelector('[data-modal-bk]').addEventListener('click', closeVideo);
    root.querySelector('[data-modal-x]').addEventListener('click', closeVideo);
    document.addEventListener('keydown', function(e){ if (e.key==='Escape' && !modal.hidden) closeVideo(); });
    // 유튜브 카드 클릭 → 새 탭 대신 모달 재생 (본문은 재렌더되므로 컨테이너에 위임)
    body.addEventListener('click', function(e){
      var v = e.target.closest('[data-yt]');
      if (v){ e.preventDefault(); openVideo(v.getAttribute('data-yt'), v.getAttribute('data-vtitle'), v.getAttribute('data-vsub'), v.getAttribute('data-vlink')); }
    });
  }

  renderChips();
  renderBody();
})();
</script>
</section>
