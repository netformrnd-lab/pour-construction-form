<style>
:root{
 --navy:#0F1F5C; --navy2:#16266b;
 --or:#F25C05; --or-soft:#FFF3EC; --or-dim:rgba(242,92,5,.09);
 --t1:#191F28; --t2:#4E5968; --t3:#8B95A1;
 --bg:#F7F8FA; --card:#FFFFFF; --soft:#F9FAFB; --soft2:#F2F4F6;
 --border:#E5E8EB; --line:#F2F4F6;
 --blue:#2563EB; --blue-l:#EFF6FF;
 --green:#0a7d3f; --green-l:#E7F7EE; --red:#F04452; --red-l:#FEECEC; --amber:#B45309;
 --r:12px; --r-sm:8px; --r-lg:18px;
 --shadow:0 1px 6px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
 --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;
 background:var(--bg);color:var(--t1);line-height:1.5;-webkit-font-smoothing:antialiased;
 font-feature-settings:'tnum' on,'lnum' on;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:14px;color:var(--t1)}
.mono{font-variant-numeric:tabular-nums}

/* ── header ── */
.top{position:sticky;top:0;z-index:30;background:var(--navy);color:#fff}
.top-in{max-width:1360px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;gap:14px}
.top .brand{font-weight:800;font-size:16px;letter-spacing:-.02em}
.top .brand .o{color:var(--or)}
.top .sub{font-size:12px;color:#9fb0c7;font-weight:600}
.top .spacer{flex:1}
.savechip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#cdd7e5;
 background:rgba(255,255,255,.08);border-radius:9px;padding:7px 12px}
.savechip .dot{width:8px;height:8px;border-radius:50%;background:#7d8aa3}
.savechip.dirty .dot{background:var(--or)} .savechip.saved .dot{background:#13B877} .savechip.error .dot{background:var(--red)}
.top .btn{font-size:13px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.22);padding:8px 14px;border-radius:9px}
.top .btn.primary{background:var(--or);border-color:var(--or)}
.top .btn:disabled{opacity:.5;cursor:default}

/* ── tabs ── */
.tabs{max-width:1360px;margin:0 auto;padding:16px 20px 0;display:flex;gap:8px;flex-wrap:wrap}
.tab{padding:10px 18px;border-radius:999px;background:var(--card);border:1px solid var(--border);
 font-size:13.5px;font-weight:700;color:var(--t2);transition:.12s}
.tab:hover{border-color:var(--or)}
.tab.on{background:var(--navy);border-color:var(--navy);color:#fff}
.tab .n{font-size:10.5px;font-weight:800;margin-left:6px;padding:1px 6px;border-radius:6px;background:var(--soft2);color:var(--t3)}
.tab.on .n{background:rgba(255,255,255,.2);color:#fff}

.wrap{max-width:1360px;margin:0 auto;padding:18px 20px 80px}

/* ── cards / summary ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.mcard .k{font-size:12px;color:var(--t3);font-weight:600;margin-bottom:6px}
.mcard .v{font-size:22px;font-weight:800;letter-spacing:-.02em}
.mcard .v small{font-size:13px;font-weight:700;color:var(--t3);margin-left:3px}

/* ── controls ── */
.ctrls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.search{flex:1;min-width:200px;border:1px solid var(--border);border-radius:11px;padding:11px 14px;font-size:14px;background:var(--card)}
.search:focus{outline:none;border-color:var(--or)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--border);background:var(--card);color:var(--t2);border-radius:999px;
 padding:8px 14px;font-size:12.5px;font-weight:600;transition:.12s}
.chip:hover{border-color:var(--or)} .chip.on{background:var(--or);color:#fff;border-color:var(--or)}
.btn2{border:1px solid var(--border);background:var(--card);color:var(--t2);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;white-space:nowrap}
.btn2:hover{border-color:var(--navy);color:var(--navy)}
.btn2.or{background:var(--or);color:#fff;border-color:var(--or)}
.btn2.or:hover{color:#fff}
.count{font-size:12.5px;color:var(--t3);font-weight:600;margin-left:auto}

/* ── table ── */
.tablecard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.tscroll{overflow:auto;max-height:72vh}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--navy);color:#fff;font-weight:700;font-size:11.5px;
 padding:11px 8px;text-align:center;white-space:nowrap;z-index:4;border-bottom:2px solid #0a1642}
thead th .cc{display:block;font-size:9.5px;color:var(--or);font-weight:800;margin-top:2px}
thead th.base{background:var(--or)} thead th.base .cc{color:#fff}
th.stick,td.stick{position:sticky;left:0;text-align:left;min-width:210px;max-width:210px}
thead th.stick{z-index:6;background:#0a1642}
tbody td.stick{background:var(--card);z-index:2;border-right:1px solid var(--border)}
tbody tr:hover td{background:var(--soft)} tbody tr:hover td.stick{background:#f5f7fa}
tbody td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle;white-space:nowrap}
td.base{background:var(--or-dim)}
.cat{font-size:9.5px;color:var(--t3);font-weight:700}
.nm{font-weight:600;color:var(--t1);font-size:12.5px}
.sp{color:var(--t3);font-size:10.5px}
.price{font-weight:700;color:var(--t1);font-variant-numeric:tabular-nums;font-size:12.5px}
.dash{color:#CDD2D9}
.badge{display:inline-block;margin-top:2px;font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;font-variant-numeric:tabular-nums}
.d0{color:var(--t3);background:var(--soft2)} .d1{color:#0a7d3f;background:#e7f7ee}
.d2{color:#b45309;background:#fff4e0} .d3{color:#c2410c;background:#ffe6d8} .d4{color:#fff;background:var(--or)}
.over{color:#fff;background:var(--red)} .base-b{color:var(--or);background:#fff;border:1px solid var(--or)}
.pos{color:#0a7d3f;font-weight:800} .neg{color:var(--red);font-weight:800}

/* editable cell */
.ecell{cursor:pointer;border-radius:6px;min-width:64px;transition:background .1s}
.ecell:hover{background:var(--blue-l);box-shadow:inset 0 0 0 1px var(--blue)}
.einput{width:88px;border:1.5px solid var(--or);border-radius:7px;padding:5px 6px;font-size:12.5px;
 text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.einput:focus{outline:none}
.rowdel{color:var(--red);font-size:15px;font-weight:800;opacity:.35}
.rowdel:hover{opacity:1}

/* MOQ break editor */
.brks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:6px}
.brk{background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:12px}
.brk .lb input{width:100%;border:none;background:transparent;text-align:center;font-weight:800;color:var(--navy);font-size:12.5px}
.brk .lb input:focus{outline:none}
.brk .row{display:flex;align-items:center;gap:5px;justify-content:center;margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
.brk .row label{font-size:11px;color:var(--t3)}
.brk .row input{width:56px;border:1px solid var(--border);border-radius:7px;padding:5px;text-align:right;font-weight:700;color:var(--or)}
.brk .row input:focus{outline:none;border-color:var(--or)}
.brk .row span{font-size:11px;color:var(--t3)}
.brk .x{float:right;color:var(--red);font-weight:800;opacity:.4;font-size:13px}.brk .x:hover{opacity:1}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel h3{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:4px}
.panel .psub{font-size:12px;color:var(--t3);margin-bottom:14px;line-height:1.6}
td.last{background:var(--or-soft)} td.last .price{color:var(--or)}
.review td{background:#fff8f2} .rv{color:var(--red);font-weight:700;font-size:11px}
.ng{background:#fdeaea;color:var(--red)} .ok{color:#0a7d3f;font-weight:800;font-size:11px}

/* modal */
.mask{position:fixed;inset:0;background:rgba(15,31,92,.28);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:440px;padding:24px;max-height:90vh;overflow:auto}
.modal h2{font-size:17px;font-weight:800;margin-bottom:4px}
.modal .msub{font-size:12.5px;color:var(--t3);margin-bottom:18px}
.frow{margin-bottom:13px}
.frow label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px}
.frow input,.frow select{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;background:var(--soft)}
.frow input:focus,.frow select:focus{outline:none;border-color:var(--or);background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mact{display:flex;gap:10px;margin-top:20px}
.mact .btn2{flex:1;justify-content:center;text-align:center;padding:12px}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:2000;padding:12px 22px;border-radius:12px;
 font-size:13px;font-weight:700;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.25);white-space:nowrap}
.toast.ok{background:#059669} .toast.err{background:var(--red)} .toast.info{background:var(--navy)}

/* gate */
.gate{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.gatebox{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:360px;padding:30px 26px;text-align:center}
.gatebox h1{font-size:18px;font-weight:800;margin-bottom:6px}.gatebox p{font-size:12.5px;color:var(--t3);margin-bottom:20px}
.gatebox input{width:100%;padding:13px;border:1px solid var(--border);border-radius:11px;text-align:center;letter-spacing:.3em;font-size:18px;font-weight:700;background:var(--soft)}
.gatebox input:focus{outline:none;border-color:var(--or);background:#fff}
.gatebox .gbtn{width:100%;margin-top:12px;padding:13px;background:var(--or);color:#fff;border-radius:11px;font-weight:800;font-size:14px}
.gatebox .gerr{color:var(--red);font-size:12px;font-weight:700;margin-top:10px;min-height:16px}
.help{font-size:12px;color:var(--t2);line-height:1.7;background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.help b{color:var(--navy)}
@media(max-width:720px){.top .sub{display:none}.mcard .v{font-size:18px}}
</style>

/* ══════════════ 유틸 ══════════════ */
const won = n => (n==null?'':Number(n).toLocaleString('ko-KR'));
const round10 = x => Math.round(x/10)*10;
const parseNum = v => {
  if(v==null) return null;
  const s = String(v).replace(/[,\s원]/g,'').trim();
  if(s==='') return null;
  const n = Number(s);
  return isFinite(n) ? n : null;
};
const nextId = () => 'p'+Date.now().toString(36);
const sanitize = obj => JSON.parse(JSON.stringify(obj, (k,v)=> v===undefined ? null : v));

async function hashPin(pin){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* 채널 정가대비 할인% */
function chDisc(px,i){ const ja=px[CH_BASE]; if(ja==null||ja===0||px[i]==null) return null; return (ja-px[i])/ja*100; }
function dcls(d){ if(d==null)return'd0'; if(d<0)return'over'; if(d<=2)return'd0'; if(d<=8)return'd1'; if(d<=15)return'd2'; if(d<25)return'd3'; return'd4'; }
/* MOQ 구간 계산 (원본 로직 유지) */
function moqCalc(chong,jasa,breaks){
  if(chong==null || chong<=0 || chong>=jasa){
    return {ok:false, why: (chong==null||chong<=0)?'총판가 없음':'자사몰<총판 역전'};
  }
  const cells = breaks.map(b=>{
    let p = round10(jasa-(jasa-chong)*b.frac);
    if(p<chong) p=chong;
    return {price:p, disc:(jasa-p)/jasa*100};
  });
  const note = (chong < jasa*0.5) ? '총판 과소-확인' : '';
  return {ok:true, cells, note};
}
function mcls(d){ if(d<=0)return'd0'; if(d<=8)return'd1'; if(d<=13)return'd2'; if(d<18.4)return'd3'; return'd4'; }

/* ══════════════ Toast ══════════════ */
function Toast({t,onDone}){
  useEffect(()=>{ const id=setTimeout(onDone,2600); return ()=>clearTimeout(id); },[]);
  return <div className={'toast '+(t.type||'info')}>{t.msg}</div>;
}

/* ══════════════ 편집 셀 ══════════════ */
function EditCell({value, onCommit, cls, fmt}){
  const [editing,setEditing]=useState(false);
  const ref=useRef();
  useEffect(()=>{ if(editing&&ref.current){ref.current.focus();ref.current.select();} },[editing]);
  if(editing){
    return <input ref={ref} className="einput" defaultValue={value==null?'':value}
      onKeyDown={e=>{ if(e.key==='Enter'){onCommit(parseNum(e.target.value));setEditing(false);} if(e.key==='Escape')setEditing(false); }}
      onBlur={e=>{onCommit(parseNum(e.target.value));setEditing(false);}} />;
  }
  return <div className={'ecell '+(cls||'')} onClick={()=>setEditing(true)} title="클릭하여 수정">
    {value==null ? <span className="dash">–</span> : (fmt?fmt(value):won(value))}
  </div>;
}

function ChannelTab({products,setProducts,cat,q,toast}){
  const rows = useMemo(()=>products.filter(r=>(cat==='전체'||r.cat===cat)&&(!q||r.name.toLowerCase().includes(q))),[products,cat,q]);
  const setPx=(id,i,v)=>setProducts(ps=>ps.map(p=>{ if(p.id!==id)return p; const px=p.px.slice(); px[i]=v; return {...p,px}; }));
  const setCost=(id,v)=>setProducts(ps=>ps.map(p=>p.id===id?{...p,cost:v}:p));
  const del=(id,name)=>{ if(confirm('['+name+'] 품목을 삭제할까요?')) setProducts(ps=>ps.filter(p=>p.id!==id)); };
  const exportCSV=()=>{
    const head=['카테고리','제품명','포장','단위','매입가',...CHANNELS.map(c=>c.label+'('+c.cc+')')];
    const lines=[head.join(',')];
    rows.forEach(r=>{ lines.push([r.cat,'"'+r.name+'"',r.pack,r.spec,r.cost==null?'':r.cost,...r.px.map(v=>v==null?'':v)].join(',')); });

    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='POUR_채널단가표.csv'; a.click();
    toast('CSV 내보내기 완료','ok');
  };
  return (<>
    <div className="help">
      <b>채널 단가표</b> — 셀을 <b>클릭</b>하면 바로 수정됩니다. <b>P2 총판유통</b>이 MOQ 하한, <b>P8 자사몰정가</b>가 소비자 기준가입니다.
      배지는 자사몰 정가 대비 할인율(초과 시 <span style={{color:'var(--red)'}}>빨강</span>). 매입가를 넣으면 <b>순익</b> 탭에서 채널별 마진이 계산됩니다.
    </div>
    <div className="ctrls" style={{marginBottom:12}}>
      <button className="btn2 or" onClick={()=>window.__openAdd&&window.__openAdd()}>＋ 품목 추가</button>
      <button className="btn2" onClick={exportCSV}>CSV 내보내기</button>
      <span className="count">{rows.length}개 품목</span>
    </div>
    <div className="tablecard"><div className="tscroll">
      <table>
        <thead><tr>
          <th className="stick">제품</th>
          <th style={{background:'#0a1642'}}>매입가<span className="cc" style={{color:'#9fb0c7'}}>원가</span></th>
          {CHANNELS.map(c=><th key={c.key} className={c.base?'base':''}>{c.label}<span className="cc">{c.cc}</span></th>)}
          <th style={{background:'#0a1642'}}></th>
        </tr></thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id}>
              <td className="stick"><span className="cat">{r.cat}</span><br/><span className="nm">{r.name}</span> <span className="sp">{r.pack}·{r.spec}</span></td>
              <td style={{background:'#fafbff'}}><EditCell value={r.cost} onCommit={v=>setCost(r.id,v)} /></td>
              {CHANNELS.map(c=>{
                const v=r.px[c.i], d=chDisc(r.px,c.i);
                return (<td key={c.key} className={c.base?'base':''}>
                  <EditCell value={v} onCommit={nv=>setPx(r.id,c.i,nv)} />
                  {v!=null && (c.base
                    ? <span className="badge base-b">기준</span>
                    : (d!=null && <span className={'badge '+dcls(d)}>{(d<0?'+':'−')+Math.abs(d).toFixed(1)+'%'}</span>))}

    </div></div>
  </>);
}

        <b> 0% = 자사몰 정가, 100% = 총판유통(하한)</b>. 값은 하한을 절대 넘지 않습니다. 총판/자사몰 단가는 <b>채널 단가표</b> 탭에서 수정합니다.</div>

        <tbody>
          {rows.map(r=>{
            const chong=r.px[CH_FLOOR], jasa=r.px[CH_BASE];
            const c=moqCalc(chong,jasa,breaks);
            if(!c.ok){
              return (<tr className="review" key={r.id}>
                <td className="stick"><span className="cat">{r.cat}</span><br/><span className="nm">{r.name}</span> <span className="sp">{r.spec}</span></td>
                <td className="sp">{r.pack}</td>
                <td className="mono">{chong?won(chong):'-'}</td>
                <td className="mono" style={{fontWeight:700,color:'var(--navy)'}}>{jasa?won(jasa):'-'}</td>
                <td colSpan={breaks.length} className="rv">검토필요 — {c.why} · 하한 기준 없음</td>
                <td><span className="badge ng">검토</span></td>
              </tr>);
            }
            return (<tr key={r.id}>
              <td className="stick"><span className="cat">{r.cat}</span><br/><span className="nm">{r.name}</span> <span className="sp">{r.spec}</span></td>
              <td className="sp">{r.pack}</td>
              <td className="mono" style={{fontWeight:800,color:'var(--or)'}}>{won(chong)}</td>
              <td className="mono" style={{fontWeight:700,color:'var(--navy)'}}>{won(jasa)}</td>
              {c.cells.map((cl,i)=>{ const last=i===breaks.length-1;
                return (<td key={i} className={last?'last':''}>
                  <div className="price">{won(cl.price)}</div>
                  <span className={'badge '+mcls(cl.disc)}>{cl.disc<=0?'0%':'−'+cl.disc.toFixed(1)+'%'}</span>
                </td>);
              })}
              <td>{c.note?<span className="badge ng">확인</span>:<span className="ok">OK</span>}</td>
            </tr>);
          })}
        </tbody>
      </table>
    </div></div>
  </>);
}

/* ══════════════ 순익 분석 탭 ══════════════ */
const PROFIT_CH = [1,7,6]; // 총판(P2), 자사몰(P8), 쿠팡(P7)
function ProfitTab({products,setProducts,cat,q}){
  const rows = useMemo(()=>products.filter(r=>(cat==='전체'||r.cat===cat)&&(!q||r.name.toLowerCase().includes(q))),[products,cat,q]);
  const setCost=(id,v)=>setProducts(ps=>ps.map(p=>p.id===id?{...p,cost:v}:p));
  const margin=(price,cost)=>{ if(price==null||cost==null||price===0)return null; return {won:price-cost, pct:(price-cost)/price*100}; };
  return (<>
    <div className="help">
      <b>순익 분석</b> — 품목별 <b>매입가(원가)</b>를 입력하면 채널별 <b>순이익액</b>과 <b>마진율</b>이 자동 계산됩니다.
      매입가는 이 표에서도, 채널 단가표에서도 수정할 수 있습니다(같은 값). 마진이 <span style={{color:'var(--red)'}}>빨강</span>이면 원가 이하(손실)입니다.
    </div>
    <div className="tablecard"><div className="tscroll">
      <table>
        <thead><tr>
          <th className="stick">제품</th>
          <th style={{background:'#0a1642'}}>매입가<span className="cc" style={{color:'#9fb0c7'}}>원가</span></th>
          {PROFIT_CH.map(ci=><th key={ci} className={ci===CH_BASE?'base':''}>{CHANNELS[ci].label}<span className="cc">{CHANNELS[ci].cc} 순익/마진</span></th>)}
        </tr></thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id}>
              <td className="stick"><span className="cat">{r.cat}</span><br/><span className="nm">{r.name}</span> <span className="sp">{r.pack}·{r.spec}</span></td>
              <td style={{background:'#fafbff'}}><EditCell value={r.cost} onCommit={v=>setCost(r.id,v)} /></td>
              {PROFIT_CH.map(ci=>{
                const price=r.px[ci]; const m=margin(price,r.cost);
                return (<td key={ci} className={ci===CH_BASE?'base':''}>
                  {price==null ? <span className="dash">–</span>
                   : r.cost==null ? <span className="sp">매입가 입력</span>
                   : <><div className={'price '+(m.won<0?'neg':'pos')}>{(m.won<0?'−':'+')+won(Math.abs(m.won))}</div>
                       <span className={'badge '+(m.pct<0?'over':(m.pct<15?'d2':'d1'))}>{m.pct.toFixed(1)+'%'}</span></>}
                </td>);
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div></div>
  </>);
}

/* ══════════════ App ══════════════ */
function App(){
  const [gate,setGate]=useState('checking'); // checking|need|setup|ok
  const [pin,setPin]=useState(''); const [gerr,setGerr]=useState('');
  const [products,setProducts]=useState([]);
  const [breaks,setBreaks]=useState(SEED_BREAKS);
  const [tab,setTab]=useState('channel');
  const [cat,setCat]=useState('전체'); const [q,setQ]=useState('');
  const [loaded,setLoaded]=useState(false);
  const [dirty,setDirty]=useState(false);
  const [saveState,setSaveState]=useState('idle'); // idle|saving|saved|error
  const [showAdd,setShowAdd]=useState(false);
  const [toast,setToast]=useState(null);
  const skipDirty=useRef(true);
  const notify=(msg,type)=>setToast({msg,type});

  /* PIN 게이트 (index.html/admin.html 공유 키) */
  useEffect(()=>{
    if(sessionStorage.getItem('priceListAuthed')==='1'){ setGate('ok'); return; }
    const stored=localStorage.getItem('pourAdminPin');
    setGate(stored ? 'need' : 'setup');
  },[]);
  const submitPin=async()=>{
    if(pin.length<4){ setGerr('4자리 이상 입력하세요.'); return; }
    const h=await hashPin(pin);
    if(gate==='setup'){ localStorage.setItem('pourAdminPin',h); }
    else if(h!==localStorage.getItem('pourAdminPin')){ setGerr('PIN이 일치하지 않습니다.'); setPin(''); return; }
    sessionStorage.setItem('priceListAuthed','1'); setGate('ok');
  };

  /* Firestore 로드 */
  const load=async()=>{
    try{
      const snap=await DOC.get();
      if(snap.exists){
        const d=snap.data();
        const ps=Array.isArray(d.products)?d.products:[];
        console.log('[price-list] products '+ps.length+'건 · breaks '+((d.breaks||[]).length)+'개 로드');
        skipDirty.current=true;
        setProducts(ps.map(p=>({cost:null,...p, px:(p.px||[]).slice()})));
        setBreaks(Array.isArray(d.breaks)&&d.breaks.length?d.breaks:SEED_BREAKS);
        setDirty(false);
      }else{
        console.log('[price-list] 문서 없음 → 시드 데이터 로드 (미저장)');
        skipDirty.current=true;
        setProducts(seedProducts());
        setBreaks(SEED_BREAKS);
        setDirty(true);
        notify('초기 데이터를 불러왔습니다. 저장 버튼을 눌러 Firestore에 반영하세요.','info');
      }
    }catch(e){
      console.error('[price-list] 로드 실패:',e);
      notify('로드 실패: '+e.message,'err');
    }finally{ setLoaded(true); }
  };
  useEffect(()=>{ if(gate==='ok'&&!loaded) load(); },[gate]);

  /* 변경 감지 */
  useEffect(()=>{
    if(!loaded) return;
    if(skipDirty.current){ skipDirty.current=false; return; }
    setDirty(true); setSaveState('idle');
  },[products,breaks]);

  /* 저장 */
  const save=async()=>{
    setSaveState('saving');
    try{
      await DOC.set(sanitize({
        products, breaks,
        updatedAt:new Date().toISOString(),
        updatedBy:'price-list-dashboard',
      }));
      console.log('[price-list] 저장 완료 · products '+products.length+'건');
      setDirty(false); setSaveState('saved'); notify('저장 완료','ok');
    }catch(e){
      console.error('[price-list] 저장 실패:',e);
      setSaveState('error'); notify('저장 실패: '+e.message,'err');
    }
  };
  // 실수 이탈 방지
  useEffect(()=>{
    const h=e=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } };
    window.addEventListener('beforeunload',h); return ()=>window.removeEventListener('beforeunload',h);
  },[dirty]);
  window.__openAdd=()=>setShowAdd(true);

  /* 요약 수치 */
  const stats=useMemo(()=>{
    const withCost=products.filter(p=>p.cost!=null).length;
    const moqOk=products.filter(p=>moqCalc(p.px[CH_FLOOR],p.px[CH_BASE],breaks).ok).length;
    return {total:products.length,withCost,moqOk,review:products.length-moqOk};
  },[products,breaks]);

  if(gate==='checking') return null;
  if(gate!=='ok'){
    return (<div className="gate"><div className="gatebox">
      <h1>{gate==='setup'?'관리 PIN 설정':'단가·공급망 관리'}</h1>
      <p>{gate==='setup'?'처음 접속입니다. 사용할 PIN을 설정하세요. (index/admin과 공유)':'관리 PIN을 입력하세요.'}</p>
      <input type="password" inputMode="numeric" value={pin} maxLength={12}
        onChange={e=>{setPin(e.target.value);setGerr('');}}
        onKeyDown={e=>{if(e.key==='Enter')submitPin();}} placeholder="••••" autoFocus/>
      <button className="gbtn" onClick={submitPin}>{gate==='setup'?'설정하고 시작':'입장'}</button>
      <div className="gerr">{gerr}</div>
    </div></div>);
  }

  return (<>
    <div className="top"><div className="top-in">
      <div className="brand">POUR<span className="o">스토어</span> 단가·공급망</div>
      <div className="sub">채널 단가표 · MOQ 수량구간 · 순익</div>
      <div className="spacer"></div>
      <div className={'savechip '+(saveState==='saving'?'':dirty?'dirty':saveState==='error'?'error':'saved')}>
        <span className="dot"></span>{saveState==='saving'?'저장 중…':dirty?'미저장 변경':saveState==='error'?'저장 오류':'저장됨'}
      </div>
      <button className="btn" onClick={load} disabled={saveState==='saving'}>새로고침</button>
      <button className="btn primary" onClick={save} disabled={saveState==='saving'||!dirty}>저장</button>
    </div></div>

    <div className="tabs">
      <button className={'tab '+(tab==='channel'?'on':'')} onClick={()=>setTab('channel')}>채널 단가표<span className="n">{products.length}</span></button>
      <button className={'tab '+(tab==='moq'?'on':'')} onClick={()=>setTab('moq')}>MOQ 수량구간<span className="n">{stats.moqOk}</span></button>
      <button className={'tab '+(tab==='profit'?'on':'')} onClick={()=>setTab('profit')}>순익 분석<span className="n">{stats.withCost}</span></button>
    </div>

    <div className="wrap">
      {!loaded ? <div className="mcard">데이터 불러오는 중…</div> : <>
        <div className="cards">
          <div className="mcard"><div className="k">총 품목</div><div className="v">{stats.total}<small>개</small></div></div>
          <div className="mcard"><div className="k">MOQ 산출 가능</div><div className="v">{stats.moqOk}<small>개</small></div></div>
          <div className="mcard"><div className="k">MOQ 검토필요</div><div className="v" style={{color:stats.review?'var(--red)':'var(--t1)'}}>{stats.review}<small>개</small></div></div>
          <div className="mcard"><div className="k">매입가 입력</div><div className="v">{stats.withCost}<small>/ {stats.total}</small></div></div>
        </div>

        <div className="ctrls">
          <input className="search" placeholder="제품 검색 (코트재, 시트, 파우더 …)" value={q}
            onChange={e=>setQ(e.target.value.trim().toLowerCase())}/>
          <div className="chips">
            {CATS.map(c=><button key={c} className={'chip '+(c===cat?'on':'')} onClick={()=>setCat(c)}>{c}</button>)}
          </div>
        </div>

        {tab==='channel' && <ChannelTab products={products} setProducts={setProducts} cat={cat} q={q} toast={notify}/>}
        {tab==='moq' && <MoqTab products={products} setProducts={setProducts} breaks={breaks} setBreaks={setBreaks} cat={cat} q={q} toast={notify}/>}
        {tab==='profit' && <ProfitTab products={products} setProducts={setProducts} cat={cat} q={q}/>}
      </>}
    </div>

    {showAdd && <AddModal onClose={()=>setShowAdd(false)} onAdd={p=>{skipDirty.current=false;setProducts(ps=>[...ps,p]);}}/>}
    {toast && <Toast t={toast} onDone={()=>setToast(null)}/>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
