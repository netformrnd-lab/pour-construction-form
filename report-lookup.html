<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>POUR솔루션 | 고객 맞춤 제안서 조회</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU",
  authDomain:"pour-app-new.firebaseapp.com",
  projectId:"pour-app-new",
  storageBucket:"pour-app-new.firebasestorage.app",
  messagingSenderId:"411031141847",
  appId:"1:411031141847:web:e658174fd4b9652cdadf92"
});
const db=firebase.firestore();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:#F9FAFB;color:#111827;min-height:100dvh;}
:root{
  --navy:#0D1B2A;--accent:#2563EB;--accent-l:#EFF6FF;--accent-m:#BFDBFE;
  --green:#059669;--green-l:#ECFDF5;--red:#DC2626;--gold:#D97706;
  --text:#111827;--text-md:#4B5563;--text-sm:#9CA3AF;
  --bg:#F9FAFB;--card:#FFFFFF;--border:#E5E7EB;
  --shadow:0 1px 6px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --r:12px;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* URL 파라미터 파싱 */
function getParams(){
  const p=new URLSearchParams(window.location.search);
  return{id:p.get('id')||'',name:p.get('name')||'',phone:p.get('phone')||''};
}

/* 날짜 포맷 */
function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

/* 공법 카드 */
function MethodCard({m,idx}){
  const [open,setOpen]=useState(true);
  return(
    <div style={{borderRadius:14,border:'1px solid var(--border)',overflow:'hidden',background:'var(--card)',boxShadow:'var(--shadow)',marginBottom:12}}>
      <div onClick={()=>setOpen(o=>!o)}
        style={{padding:'10px 14px',background:'var(--navy)',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
        <span style={{fontSize:9,fontWeight:800,color:'rgba(255,255,255,.5)',background:'rgba(255,255,255,.1)',borderRadius:4,padding:'2px 6px'}}>0{idx+1}</span>
        <span style={{fontSize:14,fontWeight:800,color:'#fff',flex:1}}>{m.label}</span>
        {m.cat&&<span style={{fontSize:9,color:'rgba(255,255,255,.5)',border:'1px solid rgba(255,255,255,.2)',borderRadius:4,padding:'2px 6px'}}>{m.cat}</span>}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}><path d="M6 9l6 6 6-6"/></svg>
      </div>
      {open&&(
        <div style={{padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
          {m.cause&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'var(--red)',marginBottom:4}}>왜 이 문제가 생기나</div>
              <p style={{fontSize:12,lineHeight:1.7,color:'var(--text)',margin:0,wordBreak:'keep-all'}}>{m.cause}</p>
            </div>
          )}
          {m.process?.length>0&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'var(--green)',marginBottom:6}}>POUR 시공 공정</div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {m.process.map((step,si)=>(
                  <span key={si} style={{fontSize:11,background:'var(--green-l)',border:'1px solid #A7F3D0',borderRadius:6,padding:'4px 10px',fontWeight:600,color:'var(--text)'}}>
                    {si+1}. {step}
                  </span>
                ))}
              </div>
            </div>
          )}
          {m.solution&&(
            <div style={{background:'var(--green-l)',borderRadius:10,padding:'10px 12px',borderLeft:'3px solid var(--green)'}}>
              <p style={{fontSize:12,lineHeight:1.6,color:'var(--text)',margin:0,wordBreak:'keep-all'}}>{m.solution}</p>
            </div>
          )}
          {m.stats?.length>0&&(
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'var(--gold)',marginBottom:6}}>
                📊 공인 성능 수치
                {m.cert&&<span style={{fontSize:9,opacity:.7,marginLeft:4}}>— {m.cert}</span>}
              </div>
              <div style={{display:'flex',gap:6,overflowX:'auto',scrollbarWidth:'none',msOverflowStyle:'none',paddingBottom:2}}>
                {m.stats.map((s,si)=>(
                  <div key={si} style={{flex:'0 0 auto',borderRadius:10,border:'1px solid rgba(217,119,6,.2)',background:'rgba(217,119,6,.04)',padding:'10px 12px',minWidth:88,position:'relative',overflow:'hidden'}}>
                    <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'var(--gold)',opacity:.4}}/>
                    {s.src&&<div style={{fontSize:7,fontWeight:800,color:'var(--gold)',letterSpacing:'.06em',marginBottom:3,opacity:.8}}>{s.src}</div>}
                    <div style={{fontSize:18,fontWeight:900,color:'var(--navy)',lineHeight:1}}>
                      {s.value}<span style={{fontSize:10,fontWeight:700,color:'var(--text-md)'}}>{s.unit}</span>
                    </div>
                    <div style={{fontSize:9,fontWeight:700,color:'var(--text-md)',marginTop:2,marginBottom:2}}>{s.label}</div>
                    {s.note&&<div style={{fontSize:8,color:'var(--text-sm)',lineHeight:1.3}}>{s.note}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* 제안서 뷰 */
function ReportView({report}){
  return(
    <div>
      {/* 고객 정보 헤더 */}
      <div style={{background:'var(--navy)',borderRadius:14,padding:'14px 16px',marginBottom:14,color:'#fff'}}>
        <div style={{fontSize:10,opacity:.6,marginBottom:4}}>고객 맞춤 제안서</div>
        <div style={{fontSize:18,fontWeight:900,marginBottom:4}}>{report.name||'이름 없음'}님</div>
        <div style={{fontSize:11,opacity:.7,display:'flex',gap:10,flexWrap:'wrap'}}>
          {report.building&&<span>🏢 {report.building}</span>}
          {report.staffName&&<span>👤 {report.staffName} 담당</span>}
          <span>📅 {fmtDate(report.createdAt)}</span>
        </div>
      </div>
      {/* 공법 목록 */}
      {report.methods?.length===0&&(
        <div style={{textAlign:'center',padding:'30px 0',color:'var(--text-sm)',fontSize:13}}>
          등록된 공법 내용이 없습니다.
        </div>
      )}
      {(report.methods||[]).map((m,i)=>(
        <MethodCard key={m.id||i} m={m} idx={i}/>
      ))}
      {/* 문의 안내 */}
      <div style={{background:'var(--accent-l)',border:'1px solid var(--accent-m)',borderRadius:14,padding:'14px 16px',textAlign:'center',marginTop:4}}>
        <div style={{fontSize:13,fontWeight:800,color:'var(--accent)',marginBottom:6}}>추가 문의 · 현장 방문 진단</div>
        <div style={{fontSize:11,color:'var(--text-md)',lineHeight:1.6,marginBottom:10}}>
          이 제안서의 공법에 대해 궁금한 점이 있으시면<br/>아래로 연락주세요. 전문가가 안내해 드립니다.
        </div>
        <a href="tel:1577-6587"
          style={{display:'inline-block',padding:'10px 24px',borderRadius:10,background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:800,textDecoration:'none'}}>
          📞 1577-6587 문의하기
        </a>
      </div>
    </div>
  );
}

function App(){
  const params=getParams();
  /* 상태 */
  const [mode,setMode]=useState(params.id?'loading':'search'); // 'search'|'loading'|'result'|'list'|'error'|'empty'
  const [searchName,setSearchName]=useState(params.name||'');
  const [searchPhone,setSearchPhone]=useState(params.phone||'');
  const [reports,setReports]=useState([]);
  const [selectedReport,setSelectedReport]=useState(null);
  const [searching,setSearching]=useState(false);
  const [errorMsg,setErrorMsg]=useState('');

  /* URL에 id 있으면 바로 로드 */
  useEffect(()=>{
    if(params.id){
      (async()=>{
        try{
          const doc=await db.collection('customer-reports').doc(params.id).get();
          if(doc.exists){
            setSelectedReport({id:doc.id,...doc.data()});
            setMode('result');
          }else{
            setErrorMsg('제안서를 찾을 수 없습니다.');
            setMode('error');
          }
        }catch(e){
          setErrorMsg('조회 중 오류가 발생했습니다.');
          setMode('error');
        }
      })();
    }
  },[]);

  /* 검색 */
  const doSearch=async()=>{
    const name=searchName.trim();
    const phone=searchPhone.replace(/[^0-9]/g,'');
    if(!name||!phone){setErrorMsg('성함과 연락처를 모두 입력해 주세요.');return;}
    setSearching(true);setErrorMsg('');
    try{
      const snap=await db.collection('customer-reports')
        .where('name','==',name).where('phone','==',phone).get();
      console.log(`[customer-reports] 검색결과 ${snap.size}건`);
      if(snap.size===0){setMode('empty');}
      else if(snap.size===1){
        const doc=snap.docs[0];
        setSelectedReport({id:doc.id,...doc.data()});
        setMode('result');
      }else{
        const list=snap.docs.map(d=>({id:d.id,...d.data()}));
        list.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
        setReports(list);
        setMode('list');
      }
    }catch(e){
      setErrorMsg('조회 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
    }finally{setSearching(false);}
  };

  /* ── 렌더링 ── */

  if(mode==='loading'){
    return(
      <div style={{minHeight:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
        <div style={{width:32,height:32,borderRadius:'50%',border:'3px solid var(--accent-m)',borderTopColor:'var(--accent)',animation:'spin 1s linear infinite'}}/>
        <div style={{fontSize:13,color:'var(--text-sm)'}}>제안서 불러오는 중...</div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  if(mode==='result'&&selectedReport){
    return(
      <div style={{maxWidth:520,margin:'0 auto',padding:'16px 14px 40px'}}>
        {/* 상단 로고 */}
        <div style={{textAlign:'center',marginBottom:14}}>
          <div style={{fontSize:16,fontWeight:900,color:'var(--navy)',letterSpacing:'.04em'}}>POUR솔루션</div>
          <div style={{fontSize:10,color:'var(--text-sm)',marginTop:2}}>고객 맞춤 제안서</div>
        </div>
        <ReportView report={selectedReport}/>
        {(mode==='result'&&(searchName||reports.length>1))&&(
          <button onClick={()=>{setMode(reports.length>1?'list':'search');setSelectedReport(null);}}
            style={{marginTop:14,width:'100%',padding:'12px',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',color:'var(--text-md)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
            ← 목록으로 돌아가기
          </button>
        )}
      </div>
    );
  }

  if(mode==='list'){
    return(
      <div style={{maxWidth:520,margin:'0 auto',padding:'16px 14px 40px'}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:16,fontWeight:900,color:'var(--navy)'}}>POUR솔루션</div>
          <div style={{fontSize:11,color:'var(--text-sm)',marginTop:2}}>제안서 목록 ({reports.length}건)</div>
        </div>
        {reports.map(r=>(
          <div key={r.id} onClick={()=>{setSelectedReport(r);setMode('result');}}
            style={{background:'var(--card)',borderRadius:14,border:'1px solid var(--border)',padding:'14px 16px',marginBottom:8,cursor:'pointer',boxShadow:'var(--shadow)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:'var(--text)',marginBottom:3}}>
                  {r.name} · {r.building||'건물명 없음'}
                </div>
                <div style={{fontSize:11,color:'var(--text-sm)'}}>
                  {fmtDate(r.createdAt)} · {r.methods?.length||0}개 공법 · {r.staffName||'담당자 없음'}
                </div>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-sm)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </div>
          </div>
        ))}
        <button onClick={()=>{setMode('search');setSelectedReport(null);setReports([]);}}
          style={{marginTop:6,width:'100%',padding:'12px',borderRadius:10,border:'1.5px solid var(--border)',background:'#fff',color:'var(--text-md)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
          ← 다시 검색
        </button>
      </div>
    );
  }

  /* search / empty / error 모드 — 검색 폼 */
  return(
    <div style={{maxWidth:480,margin:'0 auto',padding:'32px 16px 60px'}}>
      {/* 로고 헤더 */}
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:20,fontWeight:900,color:'var(--navy)',letterSpacing:'.04em',marginBottom:6}}>POUR솔루션</div>
        <div style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>📋 고객 맞춤 제안서 조회</div>
        <div style={{fontSize:11,color:'var(--text-sm)',marginTop:6,lineHeight:1.6}}>
          박람회·현장 상담 시 담당자가 생성한<br/>고객 맞춤 제안서를 확인하실 수 있습니다.
        </div>
      </div>

      <div style={{background:'var(--card)',borderRadius:16,border:'1px solid var(--border)',padding:'20px',boxShadow:'var(--shadow)'}}>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',display:'block',marginBottom:6}}>
            성함 <span style={{color:'#EF4444'}}>*</span>
          </label>
          <input value={searchName} onChange={e=>setSearchName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')doSearch();}}
            placeholder="예) 홍길동"
            style={{width:'100%',padding:'12px 14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:14,color:'var(--text)',background:'#fff',outline:'none',fontFamily:'inherit'}}
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--text-md)',display:'block',marginBottom:6}}>
            연락처 <span style={{color:'#EF4444'}}>*</span>
          </label>
          <input value={searchPhone} onChange={e=>setSearchPhone(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')doSearch();}}
            type="tel" placeholder="예) 010-1234-5678"
            style={{width:'100%',padding:'12px 14px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:14,color:'var(--text)',background:'#fff',outline:'none',fontFamily:'inherit'}}
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        </div>

        {/* 에러/빈 결과 메시지 */}
        {(errorMsg||mode==='empty')&&(
          <div style={{marginBottom:14,padding:'10px 12px',borderRadius:8,
            background:mode==='empty'?'#FEF3C7':'#FEF2F2',
            border:`1px solid ${mode==='empty'?'#FDE68A':'#FCA5A5'}`,
            fontSize:12,color:mode==='empty'?'#92400E':'var(--red)',fontWeight:600}}>
            {mode==='empty'
              ?'📭 해당 정보로 등록된 제안서가 없습니다.\n담당자에게 문의해 주세요.'
              :errorMsg}
          </div>
        )}

        <button onClick={doSearch} disabled={searching}
          style={{width:'100%',padding:'14px',borderRadius:12,border:'none',
            background:searching?'#93C5FD':'var(--accent)',color:'#fff',
            fontSize:14,fontWeight:800,cursor:searching?'default':'pointer',
            fontFamily:'inherit',transition:'opacity .2s'}}>
          {searching?'조회 중...':'🔍 제안서 조회'}
        </button>
      </div>

      <div style={{textAlign:'center',marginTop:20,fontSize:10,color:'var(--text-sm)',lineHeight:1.7}}>
        제안서 조회가 안 되는 경우 담당자에게 문의해 주세요.<br/>
        <a href="tel:1577-6587" style={{color:'var(--accent)',fontWeight:700,textDecoration:'none'}}>📞 1577-6587</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
