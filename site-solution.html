<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>POUR솔루션 | 문의하기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyByDdBamhF6yINMm8uE0t7NRN0w865sYNE",
  authDomain:"pour-app-prod.firebaseapp.com",
  projectId:"pour-app-prod",
  storageBucket:"pour-app-prod.firebasestorage.app",
  messagingSenderId:"258161197518",
  appId:"1:258161197518:web:e4f99fad335c981e78ab9f"
});
const db=firebase.firestore();
</script>
<style>
:root{--brand:#2563EB;--brand-l:#EFF6FF;--brand-m:#BFDBFE;--text:#1E293B;--text-md:#64748B;--text-sm:#94A3B8;--bg:#F8FAFC;--card:#FFF;--border:#E2E8F0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}
.wrap{max-width:480px;margin:0 auto;padding:24px 20px 60px;}
.logo{text-align:center;margin-bottom:24px;}
.logo-text{font-size:20px;font-weight:900;color:var(--brand);}
.logo-sub{font-size:12px;color:var(--text-md);margin-top:4px;}
.card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.title{font-size:18px;font-weight:800;margin-bottom:6px;color:var(--brand);}
.sub{font-size:13px;color:var(--text-md);margin-bottom:20px;line-height:1.5;}
.fg{margin-bottom:14px;}
.fl{font-size:12px;font-weight:700;color:var(--text-md);margin-bottom:6px;display:block;}
.fl .req{color:#EF4444;}
.fi{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:var(--card);outline:none;font-family:inherit;}
.fi:focus{border-color:var(--brand);}
textarea.fi{resize:vertical;min-height:80px;}
select.fi{background:var(--card);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:10px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;color:var(--text);}
.chip.on{border-color:var(--brand);background:var(--brand-l);color:var(--brand);}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--brand);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:20px;transition:opacity .2s;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.done{text-align:center;padding:40px 0;}
.done-icon{font-size:48px;margin-bottom:12px;}
.done-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.done-sub{font-size:13px;color:var(--text-md);line-height:1.6;}
.privacy{font-size:10px;color:var(--text-sm);text-align:center;margin-top:12px;line-height:1.5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const BRAND={name:'POUR솔루션',code:'solution',color:'#2563EB',types:['방수 상담','도장 상담','보수/보강 상담','토목 상담','견적 요청','현장 방문 요청','기타']};

function App(){
  const [form,setForm]=useState({name:'',phone:'',email:'',company:'',type:'',building:'',detail:''});
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);

  const save=async()=>{
    if(!form.name.trim()||!form.phone.trim()){alert('성함과 연락처를 입력해주세요');return;}
    if(!form.type){alert('문의 유형을 선택해주세요');return;}
    setSaving(true);
    try{
      await db.collection('site-inquiries').add({
        brand:BRAND.code,brandName:BRAND.name,
        name:form.name,phone:form.phone,email:form.email,company:form.company,
        inquiryType:form.type,buildingType:form.building,detail:form.detail,
        status:'신규',createdAt:new Date().toISOString(),source:'site-solution'
      });
      setDone(true);
    }catch(e){console.error(e);alert('접수 중 오류가 발생했습니다');}
    setSaving(false);
  };

  if(done)return(
    <div className="wrap"><div className="card done">
      <div className="done-icon">✅</div>
      <div className="done-title">문의 접수 완료</div>
      <div className="done-sub">담당자 확인 후 빠르게 연락드리겠습니다.<br/>감사합니다.</div>
      <button className="btn" style={{marginTop:24}} onClick={()=>{setForm({name:'',phone:'',email:'',company:'',type:'',building:'',detail:''});setDone(false);}}>새 문의하기</button>
    </div></div>
  );

  return(
    <div className="wrap">
      <div className="logo">
        <div className="logo-text">{BRAND.name}</div>
        <div className="logo-sub">건축물 유지보수 전문 · 의뢰자 상담</div>
      </div>
      <div className="card">
        <div className="title">💬 문의하기</div>
        <div className="sub">아래 내용을 작성해주시면 담당자가 빠르게 연락드립니다.</div>
        <div className="fg"><label className="fl">문의 유형 <span className="req">*</span></label>
          <div className="chips">{BRAND.types.map(t=>(<button key={t} className={`chip ${form.type===t?'on':''}`} onClick={()=>setForm({...form,type:t})}>{t}</button>))}</div>
        </div>
        <div className="fg"><label className="fl">성함 <span className="req">*</span></label><input className="fi" placeholder="홍길동" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
        <div className="fg"><label className="fl">연락처 <span className="req">*</span></label><input className="fi" placeholder="010-0000-0000" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} inputMode="tel"/></div>
        <div className="fg"><label className="fl">이메일 (선택)</label><input className="fi" placeholder="example@email.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} inputMode="email"/></div>
        <div className="fg"><label className="fl">소속/건물명 (선택)</label><input className="fi" placeholder="OO아파트 관리사무소" value={form.company} onChange={e=>setForm({...form,company:e.target.value})}/></div>
        <div className="fg"><label className="fl">건물 유형 (선택)</label>
          <select className="fi" value={form.building} onChange={e=>setForm({...form,building:e.target.value})}>
            <option value="">선택</option>
            {['아파트','관공서','주택','빌라/오피스텔','병원','학교','기타'].map(b=><option key={b} value={b}>{b}</option>)}
          </select></div>
        <div className="fg"><label className="fl">상세 내용 (선택)</label><textarea className="fi" placeholder="문의 내용을 자세히 입력해주세요" value={form.detail} onChange={e=>setForm({...form,detail:e.target.value})} rows={4}/></div>
        <button className="btn" disabled={saving} onClick={save}>{saving?'접수 중...':'📩 문의 접수하기'}</button>
      </div>
      <div className="privacy">수집된 정보는 상담 목적으로만 활용됩니다.</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
