async function insertTestData() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '삽입 중...';
  const log = document.getElementById('log');

  let count = 0;
  for (const lead of TEST_LEADS) {
    const data = {
      ...lead,
      savedAt: new Date(2026, 3, lead.day ? parseInt(lead.day.split('/')[1]) : 6, 9 + Math.floor(Math.random()*8), Math.floor(Math.random()*60)).toISOString(),
    };
    if (lead.source === 'inbound-form' || lead.source === 'site-solution') {
      data.desiredStartDate = '2026-06-01';
      data.docDeadline = '2026-05-15';
    }
    try {
      const ref = await db.collection('leads').add(data);
      count++;
      log.innerHTML += `<div>✅ ${count}. ${lead.name} (${lead.status}) → ${ref.id}</div>`;
    } catch(e) {
      log.innerHTML += `<div style="color:red">❌ ${lead.name}: ${e.message}</div>`;
    }
  }

  btn.textContent = `완료! ${count}건 삽입됨`;
  btn.style.background = '#059669';
  log.innerHTML += `<br><div style="font-weight:bold;color:#059669">🎉 총 ${count}건 테스트 데이터 삽입 완료</div>`;
  log.innerHTML += `<div style="color:#94A3B8;font-size:12px;margin-top:8px">확인 후 삭제하려면 박람회 관리자 > 유입관리에서 선택 삭제하세요</div>`;
}
