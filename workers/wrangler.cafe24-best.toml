# Cloudflare Workers — 카페24 판매량 → Firestore 베스트 랭킹 동기화
# 배포: npx wrangler deploy --config workers/wrangler.cafe24-best.toml

name = "cafe24-best-sync"
main = "cafe24-best-sync.js"
compatibility_date = "2024-06-01"

# ── Cron 스케줄 (매일 KST 04:30 = UTC 19:30, 전일 마감 후) ──
[triggers]
crons = ["30 19 * * *"]

# ── 평문 변수 (민감정보 아님) ──
[vars]
CAFE24_MALL_ID = "pourstore"        # 카페24 mall_id (도메인 앞부분: pourstore.cafe24.com → "pourstore")
CAFE24_API_VERSION = "2024-06-01"

# ── KV (회전하는 refresh_token 보관) ──
# 1) 네임스페이스 생성: npx wrangler kv namespace create CAFE24_KV --config workers/wrangler.cafe24-best.toml
# 2) 출력된 id를 아래 id에 붙여넣기
[[kv_namespaces]]
binding = "CAFE24_KV"
id = "PUT_KV_NAMESPACE_ID_HERE"

# ── 시크릿 등록 (CLI) ──
# npx wrangler secret put CAFE24_CLIENT_ID     --config workers/wrangler.cafe24-best.toml
# npx wrangler secret put CAFE24_CLIENT_SECRET  --config workers/wrangler.cafe24-best.toml
# npx wrangler secret put FIREBASE_API_KEY      --config workers/wrangler.cafe24-best.toml   (값: AIzaSyBbct9tO8nCUCjz4s9GnXQLkHuHe2FFyyU)
# npx wrangler secret put WORKER_SECRET         --config workers/wrangler.cafe24-best.toml   (값: 임의의 긴 문자열, /sync·/seed 인증용)
